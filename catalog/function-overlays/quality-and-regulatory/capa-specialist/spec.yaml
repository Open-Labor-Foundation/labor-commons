      location: https://www.iso.org/standard/62085.html
      authority_reason: ISO 9001 is the core international QMS baseline for
        nonconformity, corrective action, performance evaluation, and continual
        improvement across industries.
      last_reviewed_at: 2026-03-27
      refresh_interval_days: 365
      decay_policy: review_required_after_interval
      status: active
    - source_id: iso-quality-management-principles
      title: "Quality management principles: The foundation for success"
      publisher: International Organization for Standardization
      source_type: standards-body-guidance
      location: https://www.iso.org/quality-management/principles
      authority_reason: ISO's public quality-management-principles guidance supports
        evidence-based decision making, process approach, leadership, and
        continual improvement that underpin CAPA system design.
      last_reviewed_at: 2026-03-27
      refresh_interval_days: 365
      decay_policy: review_required_after_interval
      status: active
    - source_id: iso-13485-2016
      title: ISO 13485:2016 - Medical devices - Quality management systems -
        Requirements for regulatory purposes
      publisher: International Organization for Standardization
      source_type: standards-reference
      location: https://www.iso.org/standard/59752.html
      authority_reason: ISO 13485 is the authoritative international medical-device
        QMS baseline and is directly relevant when CAPA work touches regulated
        device environments.
      last_reviewed_at: 2026-03-27
      refresh_interval_days: 365
      decay_policy: review_required_after_interval
      status: active
    - source_id: fda-qmsr-faq
      title: Quality Management System Regulation - Frequently Asked Questions
      publisher: U.S. Food and Drug Administration
      source_type: official-regulatory-guidance
      location: https://www.fda.gov/medical-devices/quality-management-system-regulation-qmsr/quality-management-system-regulation-frequently-asked-questions
      authority_reason: FDA's QMSR FAQ is an authoritative current source on the
        February 2, 2026 effective date, ISO 13485 incorporation, and the
        device-inspection transition away from QSIT.
      last_reviewed_at: 2026-03-27
      refresh_interval_days: 120
      decay_policy: review_required_after_interval
      status: active
    - source_id: fda-cp-7382-850
      title: Inspection of Medical Device Manufacturers (Compliance Program 7382.850)
      publisher: U.S. Food and Drug Administration
      source_type: official-compliance-program
      location: https://www.fda.gov/media/80195/download
      authority_reason: FDA Compliance Program 7382.850 is the authoritative public
        inspection program for device manufacturers under QMSR and is directly
        relevant to CAPA evidence, inspection expectations, and escalation risk.
      last_reviewed_at: 2026-03-27
      refresh_interval_days: 120
      decay_policy: review_required_after_interval
      status: active
    - source_id: ich-q10-pharmaceutical-quality-system
      title: ICH Q10 Pharmaceutical Quality System
      publisher: International Council for Harmonisation of Technical Requirements for
        Pharmaceuticals for Human Use
      source_type: official-guideline
      location: https://database.ich.org/sites/default/files/Q10_Guideline.pdf
      authority_reason: ICH Q10 is an authoritative global guideline that explicitly
        defines the CAPA system, root-cause expectations, lifecycle application,
        and management-review links for pharmaceutical quality systems.
      last_reviewed_at: 2026-03-27
      refresh_interval_days: 365
      decay_policy: review_required_after_interval
      status: active
    - source_id: asq-capa-course
