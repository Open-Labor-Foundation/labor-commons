  - operational-risk-specialist
  - business-continuity-operations-specialist
  - vendor-operations-specialist
  - incident-response-specialist
  - service-delivery-specialist
  - security-governance-and-policy-specialist
  - legal-privacy-and-contract-coordination-specialist
