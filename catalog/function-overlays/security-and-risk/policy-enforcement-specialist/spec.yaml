  - controls-testing-specialist
  - it-governance-specialist
  - security-controls-mapping-specialist
  - security-governance-and-policy-specialist
  - legal-privacy-and-contract-coordination-specialist
  - risk-reporting-specialist
  - incident-governance-specialist
