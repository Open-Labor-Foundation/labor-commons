      publisher: Society for Human Resource Management
      source_type: professional-body-education
      location: https://www.shrm.org/events-education/education/seminars/talent-acquisition---retention/foundations-of-compensation
      authority_reason: SHRM's public compensation education offering is a credible
        professional-body reference for compensation planning concepts, pay
        structures, and compensation governance terminology.
      last_reviewed_at: 2026-03-22
      refresh_interval_days: 365
      decay_policy: review_required_after_interval
      status: active
