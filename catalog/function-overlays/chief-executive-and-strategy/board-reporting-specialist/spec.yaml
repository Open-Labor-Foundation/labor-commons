      source_type: official-narrative-reporting-guidance
      location: https://www.frc.org.uk/library/standards-codes-policy/accounting-and-reporting-policy/guidance-on-the-strategic-report/
      authority_reason: The FRC's strategic-report guidance is an authoritative public
        source for concise, fair, and decision-useful narrative reporting on
