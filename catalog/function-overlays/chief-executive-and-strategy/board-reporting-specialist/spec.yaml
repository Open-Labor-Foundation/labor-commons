      authority_reason: The Wates principles provide public governance expectations
        for large private companies, making them useful when the board-reporting
        specialist is used outside listed-company contexts.
      last_reviewed_at: 2026-03-22
      refresh_interval_days: 180
      decay_policy: review_required_after_interval
      status: active
    - source_id: sec-form-8-k
