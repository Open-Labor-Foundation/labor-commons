      publisher: Financial Reporting Council
      source_type: official-governance-guidance
      location: https://media.frc.org.uk/documents/Guidance_on_Board_Effectiveness_2018.pdf
      authority_reason: The FRC's board-effectiveness guidance is a primary public
        source on the quality, clarity, and suitability of information boards
        receive and how reporting should support effective board oversight.
      last_reviewed_at: 2026-03-22
      refresh_interval_days: 365
      decay_policy: review_required_after_interval
      status: active
    - source_id: frc-risk-management-and-internal-control-guidance
