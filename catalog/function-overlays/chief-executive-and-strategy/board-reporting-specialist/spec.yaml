      publisher: Financial Reporting Council
      source_type: official-governance-code
      location: https://www.frc.org.uk/library/standards-codes-policy/corporate-governance/uk-corporate-governance-code/
      authority_reason: The FRC code is an authoritative public governance baseline
        for board leadership, reporting, internal control, and
        board-accountability expectations used widely in board-pack design and
        board reporting review.
      last_reviewed_at: 2026-03-22
      refresh_interval_days: 180
      decay_policy: review_required_after_interval
      status: active
    - source_id: frc-board-effectiveness-guidance
