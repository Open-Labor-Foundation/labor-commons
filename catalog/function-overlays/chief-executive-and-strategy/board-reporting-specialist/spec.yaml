      source_type: official-risk-reporting-guidance
      location: https://media.frc.org.uk/documents/Guidance_on_Risk_Management_Internal_Control_and_Related_Financial_and_Business_Reporting.pdf
      authority_reason: This FRC guidance is directly relevant to board-reporting
        quality because it frames how boards should receive, interpret, and
        challenge risk, control, and business-reporting information.
      last_reviewed_at: 2026-03-22
      refresh_interval_days: 365
      decay_policy: review_required_after_interval
      status: active
    - source_id: frc-strategic-report-guidance
