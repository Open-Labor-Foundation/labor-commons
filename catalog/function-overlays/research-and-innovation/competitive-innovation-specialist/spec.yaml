knowledge_baseline:
  authority_sources:
    - source_id: iso-56006-strategic-intelligence
      title: ISO 56006:2021 Innovation management — Tools and methods for strategic
        intelligence management — Guidance
      publisher: International Organization for Standardization
      source_type: international-standard
      location: https://www.iso.org/standard/72621.html
      authority_reason: Directly governs strategic-intelligence practice inside
        innovation management and is the strongest standards-body source for how
        competitor innovation signals should be structured, interpreted, and
        refreshed.
      last_reviewed_at: 2026-03-26
      refresh_interval_days: 365
      decay_policy: review_required_after_interval
      status: active
    - source_id: iso-56000-innovation-fundamentals
      title: ISO 56000:2025 Innovation management — Fundamentals and vocabulary
      publisher: International Organization for Standardization
      source_type: international-standard
      location: https://www.iso.org/standard/84436.html
      authority_reason: Provides the current shared vocabulary and conceptual baseline
        for innovation-management work so competitor innovation analysis stays
        anchored to recognized innovation concepts rather than generic market
        commentary.
      last_reviewed_at: 2026-03-26
      refresh_interval_days: 365
      decay_policy: review_required_after_interval
      status: active
    - source_id: iso-56002-innovation-management-system
      title: ISO 56002:2019 Innovation management — Innovation management system —
        Guidance
      publisher: International Organization for Standardization
      source_type: international-standard
      location: https://www.iso.org/standard/68221.html
      authority_reason: Defines innovation-management-system guidance that helps link
        competitor innovation evidence to bounded governance, intent, and
        capability questions inside a research-and-innovation function.
      last_reviewed_at: 2026-03-26
      refresh_interval_days: 365
      decay_policy: review_required_after_interval
      status: active
    - source_id: oecd-oslo-manual-2018
      title: "Oslo Manual 2018: Guidelines for Collecting, Reporting and Using Data on
        Innovation"
      publisher: Organisation for Economic Co-operation and Development and Eurostat
      source_type: intergovernmental-guidance
      location: https://www.oecd.org/en/publications/oslo-manual-2018_9789264304604-en.html
      authority_reason: The Oslo Manual is the public reference for defining and
        measuring innovation activity, keeping competitor innovation comparisons
        tied to recognized innovation indicators instead of anecdotal claims.
      last_reviewed_at: 2026-03-26
      refresh_interval_days: 365
      decay_policy: review_required_after_interval
      status: active
    - source_id: oecd-patent-statistics-manual
