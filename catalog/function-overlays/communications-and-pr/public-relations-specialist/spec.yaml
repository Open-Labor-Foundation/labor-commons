knowledge_baseline:
  authority_sources:
    - source_id: prsa-code-of-ethics
      title: PRSA Code of Ethics
      publisher: Public Relations Society of America
      source_type: professional-body-ethics-code
      location: https://www.prsa.org/professional-development/prsa-resources/ethics#code
      authority_reason: PRSA is a major public relations professional body and its
        ethics code provides a recognized baseline for advocacy, honesty,
        expertise, independence, loyalty, and fairness in public relations work.
      last_reviewed_at: 2026-03-26
      refresh_interval_days: 365
      decay_policy: review_required_after_interval
      status: active
    - source_id: iabc-global-standard
      title: Global Standard
      publisher: International Association of Business Communicators
      source_type: professional-practice-standard
      location: https://www.iabc.com/about/what-we-do/standards/global-standard
      authority_reason: IABC's Global Standard is a recognized communication-practice
        framework for audience analysis, strategic alignment, governance, and
        evaluation that directly informs PR planning and recommendation quality.
      last_reviewed_at: 2026-03-26
      refresh_interval_days: 365
      decay_policy: review_required_after_interval
      status: active
    - source_id: amec-integrated-evaluation-framework
      title: AMEC Integrated Evaluation Framework
      publisher: International Association for the Measurement and Evaluation of
        Communication
      source_type: industry-framework
      location: https://amecorg.com/amecframework/
      authority_reason: AMEC provides the leading vendor-neutral framework for
        measuring communication objectives, outputs, outtakes, outcomes, and
        organizational impact, which is essential for defensible PR measurement
        plans.
      last_reviewed_at: 2026-03-26
      refresh_interval_days: 365
      decay_policy: review_required_after_interval
      status: active
    - source_id: global-alliance-ethics-principles
      title: Global Principles of Ethical Practice in Public Relations and
        Communication Management
      publisher: Global Alliance for Public Relations and Communication Management
      source_type: global-professional-guidance
      location: https://www.globalalliancepr.org/s/Global-Principles-of-ethics-GA-et-al.pdf
      authority_reason: Global Alliance aggregates public relations and communication
        associations internationally, giving this document weight as globally
        portable ethics guidance for truthful, transparent, and responsible PR
        practice.
      last_reviewed_at: 2026-03-26
      refresh_interval_days: 365
      decay_policy: review_required_after_interval
      status: active
    - source_id: ftc-endorsement-guides-faq
      title: "The FTC's Endorsement Guides: What People Are Asking"
      publisher: Federal Trade Commission
      source_type: official-business-guidance
      location: https://www.ftc.gov/business-guidance/resources/ftcs-endorsement-guides-what-people-are-asking
      authority_reason: FTC guidance is the authoritative U.S. baseline for disclosure
        expectations around endorsements, testimonials, and sponsored
        amplification, which PR specialists must recognize and escalate when
        planning public-facing campaigns.
      last_reviewed_at: 2026-03-26
      refresh_interval_days: 180
      decay_policy: review_required_after_interval
      status: active
    - source_id: cdc-cerc-manual
      title: Crisis and Emergency Risk Communication Manual
      publisher: Centers for Disease Control and Prevention
      source_type: official-risk-communication-guidance
      location: https://www.cdc.gov/cerc/php/about/index.html
      authority_reason: CDC CERC is authoritative public-sector guidance for timely,
        credible, uncertainty-aware communication under pressure and is useful
        when PR work approaches issue escalation or crisis-adjacent conditions.
      last_reviewed_at: 2026-03-26
      refresh_interval_days: 365
      decay_policy: review_required_after_interval
      status: active
