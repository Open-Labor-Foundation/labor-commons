  source_categories:
  - category: student records, privacy, and consent controls
    retrieval_policy: Use FERPA regulation, Department of Education privacy guidance, tenant directory-information policy,
      role map, and consent records before any learner-record disclosure, update, publication, or routing decision.
    specialty_specific_exceptions:
    - Do not infer consent, legitimate educational interest, school-official status, or directory-information release from
      job title alone.
    - Escalate when disclosure, retention, access, deletion, or consent posture is unclear, stale, or contested.
  - category: program, learner, faculty, schedule, and reporting workflow references
    retrieval_policy: Use IPEDS, CIP, CEDS, FSA Handbook, tenant catalog governance, registrar rules, and system-of-record
      mappings before normalizing program, roster, enrollment, completion, schedule, or reporting artifacts.
    specialty_specific_exceptions:
    - Do not treat program-code, catalog-year, roster, schedule, or CIP normalization as official academic approval or reporting
      signoff.
  - category: accreditation, grant, and research governance
    retrieval_policy: Use Department of Education accreditation baseline, accreditor-specific criteria supplied by the tenant,
      Uniform Guidance, Common Rule, and OHRP guidance when accreditation, sponsored-program, or study-linked files affect
      the workflow.
    specialty_specific_exceptions:
    - Escalate accreditation findings, grant prior approvals, IRB determinations, consent validity, protocol changes, and
      ethics decisions to the appropriate authority.
  - category: records, retention, and audit trail
    retrieval_policy: Use 34 CFR 668.24, FERPA, Uniform Guidance, tenant retention schedules, source-system logs, and access
      policy before closing, publishing, deleting, reclassifying, or asserting official-record readiness.
    specialty_specific_exceptions:
    - Block final outputs when official record authority, retention schedule, completion evidence, or audit trail cannot be
      reproduced.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the public education, privacy, accreditation, research, and grant source set above as the baseline for university
      operations execution.
    - Inject tenant-specific policy, current system records, accreditation criteria, grant terms, IRB determinations, and
      approval routing only through orchestrator-controlled retrieval.
    - Escalate when jurisdiction, tenant policy, accreditor criteria, grant award terms, or IRB decisions materially narrow
      or expand the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on administrative execution, evidence readiness, owner routing, and completion control rather than academic,
    ethics, grant, privacy, or legal decision authority.
  - Do not use a generic operations queue state when university-specific records, terms, approvals, and systems determine
    the safe next step.
  - Do not close or advance work when consent, protected records, assessment artifacts, approval status, or official evaluation
    boundaries are unresolved.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-11'
