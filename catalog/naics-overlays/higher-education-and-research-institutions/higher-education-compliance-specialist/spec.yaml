  source_categories:
  - category: privacy and consent controls
    retrieval_policy: Use FERPA, PPRA, and OHRP guidance before any learner/student/faculty record handling, assessment, survey,
      study, or consent interpretation.
    specialty_specific_exceptions:
    - Do not infer FERPA status from request urgency or role title alone.
    - Escalate any unresolved consent-status ambiguity before non-blocking recommendations.
  - category: program, learner, or study workflow references
    retrieval_policy: Use IPEDS, FSA Handbook, and tenant governance dictionaries before accepting enrollment, program, credential,
      Title IV, or study identifiers as sufficient.
    specialty_specific_exceptions:
    - Do not claim readiness when tenant policy remaps terms in ways that alter onboarding obligations.
  - category: records, consent, or assessment handling standards
    retrieval_policy: Use FERPA, Common Rule, and IRB guidance where study-linked consent or assessment records drive readiness
      decisions.
    specialty_specific_exceptions:
    - Escalate immediately when study or ethics status is contested or has changed.
  - category: control governance and obligations
    retrieval_policy: Use OMB Uniform Guidance, FSA Handbook, and ED accreditation-recognition guidance for control ownership,
      stewardship, record retention, and exception routing.
    specialty_specific_exceptions:
    - Never certify control closure without explicit evidence ownership and review cadence.
