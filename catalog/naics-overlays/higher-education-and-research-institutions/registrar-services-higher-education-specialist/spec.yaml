    authority_reason: The eCFR publishes the controlling FERPA regulatory text for education records, student rights, disclosure
      conditions, and written-consent requirements that directly govern registrar-services record access and disclosure readiness.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ed-ferpa-consent-faq
