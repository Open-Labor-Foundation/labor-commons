    publisher: U.S. Department of Education Student Privacy Policy Office
    source_type: official-education-privacy-guidance
    location: https://studentprivacy.ed.gov/faq/what-must-consent-disclose-education-records-contain
    authority_reason: The Department of Education office responsible for student privacy guidance explains FERPA consent elements,
      making it authoritative for registrar disclosure-readiness checks and evidence-gap scenarios.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
