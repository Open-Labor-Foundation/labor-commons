  source_categories:
  - category: student records, privacy, consent, and retention
    retrieval_policy: Use FERPA, Department of Education privacy guidance, 34 CFR 668.24, FSA Handbook Volume 2, tenant directory-information
      policy, role authorization, consent records, and retention schedules before any record disclosure, publication, reclassification,
      or completion claim.
    specialty_specific_exceptions:
    - Do not infer consent, legitimate educational interest, or school-official status from a requester's title alone.
    - Block or return when education-record, conduct-record, disability, clinical, participant-data, or disclosure basis is
      absent or contested.
  - category: student affairs program, event, and case execution
    retrieval_policy: Use CAS, NASPA, ACPA/NASPA competencies, tenant student affairs service model, event and organization
      policy, case-management records, schedule systems, and official owner maps before progressing work.
    specialty_specific_exceptions:
    - Do not treat co-curricular readiness as safety approval, conduct adjudication, accommodation approval, or instructional
      evaluation.
    - Require participant, schedule, owner, communication, accessibility, safety-routing, and event-delivery evidence before
      closing work.
  - category: campus safety, conduct, Title IX, disability, and learner-harm boundaries
    retrieval_policy: Use Clery regulations, Title IX regulations, OCR disability guidance, tenant conduct code, Title IX
      routing, disability services workflow, counseling/wellness policy, emergency protocols, and campus safety owner map
      before handling high-risk student affairs work.
    specialty_specific_exceptions:
    - Escalate conduct findings, sanctions, Title IX determinations, accommodation approvals, clinical decisions, and safety-critical
      actions to the proper authority.
  - category: academic, accreditation, grant, and research governance
    retrieval_policy: Use FSA Handbook, accreditation criteria supplied by tenant, Uniform Guidance, Common Rule, OHRP consent
      guidance, registrar/faculty policy, and research administration records when student affairs work touches programs,
      assessments, grants, or studies.
    specialty_specific_exceptions:
    - Escalate grading, instructional judgment, official evaluation, IRB status, consent validity, accreditation signoff,
      and grant approval.
