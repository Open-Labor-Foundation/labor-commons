  source_categories:
  - category: privacy and consent controls
    retrieval_policy: Use FERPA + OCR guidance first, then tenant consent and role-policy maps before any disclosure or service
      action.
    specialty_specific_exceptions:
    - Do not infer consent from role title without tenant verification artifacts.
  - category: program and study workflow
    retrieval_policy: Use IMS, IPEDS, accreditation, and institutional records policy first to normalize faculty role, course
      section, enrollment, program, and study context before any service escalation.
    specialty_specific_exceptions:
    - Do not assume schedule, workload, course-shell, or roster precedence without faculty/program approver records.
  - category: research governance
    retrieval_policy: Use 45 CFR 46 and OHRP practical guidance whenever a request references study participants, protocols,
      or ethics approvals.
    specialty_specific_exceptions:
    - Stop and escalate immediately when IRB status or informed-consent state is disputed.
