  source_categories:
  - category: sponsored-program lifecycle and federal award administration
    retrieval_policy: Use Uniform Guidance, Grants.gov lifecycle/reporting, sponsor opportunity, award terms, and tenant routing
      policy before lifecycle or completion claims.
    specialty_specific_exceptions:
    - Do not infer submission authority, budget approval, eligibility, or award readiness from administrative completeness
      alone.
    - Escalate when sponsor-specific rules or institutional delegation conflict with public baseline.
  - category: research governance and consent controls
    retrieval_policy: Use Common Rule, OHRP guidance, tenant IRB/IACUC policy, and study approval records before acting on
      study-linked sponsored work.
    specialty_specific_exceptions:
    - Do not decide IRB status, consent sufficiency, protocol deviations, or ethics-board outcomes.
    - Escalate when study approval, consent, or participant data changes the workflow outcome.
  - category: student, faculty, program, accreditation, and assessment records
    retrieval_policy: Use FERPA, IPEDS, accreditation context, SIS/LMS/research administration records, and tenant records
      policy before handling learner, faculty, assessment, or institutional evidence.
    specialty_specific_exceptions:
    - Do not disclose education records or assessment evidence without documented role authority and purpose.
    - Do not convert administrative record handling into grading, instructional, accreditation, or faculty-review authority.
