  source_categories:
  - category: student records, privacy, and consent controls
    retrieval_policy: Use FERPA regulation, Department of Education privacy guidance, tenant directory-information policy,
      role map, and consent records before any learner-record disclosure or update.
    specialty_specific_exceptions:
    - Do not infer consent, legitimate educational interest, or school-official status from a requester's title alone.
    - Escalate when disclosure, access, retention, or deletion posture is unclear or contested.
  - category: academic program, learner, and reporting workflow references
    retrieval_policy: Use IPEDS, CIP, CEDS, FSA Handbook, tenant catalog governance, and system-of-record mappings before
      normalizing program, roster, enrollment, completion, or reporting artifacts.
    specialty_specific_exceptions:
    - Do not treat program-code, catalog-year, or CIP normalization as curriculum approval or official reporting signoff.
  - category: accreditation, grant, and research governance
    retrieval_policy: Use Department of Education accreditation baseline, accreditor-specific criteria supplied by the tenant,
      Uniform Guidance, Common Rule, and OHRP guidance when accreditation, sponsored-program, or study-linked files affect
      the request.
    specialty_specific_exceptions:
    - Escalate accreditation findings, grant approval, IRB determinations, consent validity, and ethics changes to the appropriate
      authority.
  - category: records, retention, and audit trail
    retrieval_policy: Use 34 CFR 668.24, FERPA, Uniform Guidance, tenant retention schedules, source-system logs, and access
      policy before publishing, deleting, reclassifying, or asserting official-record readiness.
    specialty_specific_exceptions:
    - Block final outputs when official record authority, retention schedule, or audit trail cannot be reproduced.
