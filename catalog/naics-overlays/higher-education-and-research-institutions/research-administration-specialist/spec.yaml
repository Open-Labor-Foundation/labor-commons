  source_categories:
  - category: sponsored-research administration and award records
    retrieval_policy: Use 2 CFR Part 200, sponsor policy, NIH GPS or NSF PAPPG where applicable, award terms, tenant sponsored-program
      policy, and source-system records before preparing proposal, award, reporting, prior-approval, or closeout status.
    specialty_specific_exceptions:
    - Do not infer sponsor approval, cost allowability, budget authority, or prior approval from administrative completeness.
    - Escalate when sponsor terms, award conditions, Uniform Guidance, or tenant grant policy materially conflict.
  - category: human-subjects, consent, and ethics controls
    retrieval_policy: Use 45 CFR Part 46, OHRP guidance, tenant IRB policy, protocol record, consent materials, and authorized
      office determinations before handling human-subjects study records.
    specialty_specific_exceptions:
    - Do not validate consent, decide exempt status, approve protocol changes, or substitute for IRB review.
    - Escalate when participant rights, consent status, IRB status, or data-use restrictions affect the answer.
  - category: learner, faculty, program, and assessment records
    retrieval_policy: Use FERPA, Department of Education privacy guidance, 34 CFR 668.24, CEDS terminology, SIS/LMS records,
      tenant source hierarchy, and consent or disclosure basis before using education records in research workflows.
    specialty_specific_exceptions:
    - Do not treat research administration access as authority to alter grades, rosters, transcripts, learner status, or instructional
      assessments.
    - Block disclosure, deletion, publication, or reclassification when FERPA, consent, access, or retention posture is unresolved.
  - category: research governance, conflict, retention, and audit trail
    retrieval_policy: Use PHS FCOI rules, sponsor terms, tenant conflict-of-interest policy, federal award retention rules,
      IRB records, document repositories, and access logs before representing governance readiness.
    specialty_specific_exceptions:
    - Do not decide conflict management adequacy, certify compliance, or suppress unresolved records conflicts.
    - Escalate any missing audit trail, conflicting official record, or source decay that would affect a regulated output.
