knowledge_baseline:
  source_classes:
  - class: Public manufacturing, quality, or food-safety standards
    rationale: FAA and IAQG public guidance define production, quality, traceability, and evidence standards that constrain
      aerospace analytical reporting behavior.
  - class: Supplier, traceability, or inventory-control workflow guidance
    rationale: DFARS clauses and aerospace supply-chain references define source hierarchy, supplier evidence, lot/batch genealogy,
      and procurement controls relevant to analytics trust boundaries.
  - class: Release, hold, or nonconformance operating references
    rationale: FAA production-control guidance and AS9100-style quality standards define hold, nonconformance, and release-related
      workflow boundaries that reporting cannot bypass.
  - class: Vendor-neutral workflow references that clarify terminology
    rationale: GS1 and NIST operational control references support consistent part, serial, and batch identifier handling
      across enterprise records.
  source_selection_approach: 'Use FAA 14 CFR Part 21 and AC 21-43A first when production approvals, release controls, conformity,
    and supplier-control expectations are involved.

    Use IAQG 9100 and AS9102 and Supply Chain Management references for terminology, traceability, nonconformance, and quality
    record lineage.

    Use DFARS parts-control clauses when substitution, source qualification, and counterfeit/quality risk are in scope.

    Use NASA workmanship and records guidance to stabilize reporting assumptions for controlled workflows.

    Use SEC reporting guidance when audience or publication posture becomes disclosure-oriented.

    Require tenant policy overlays for jurisdiction, contract flowdown, line-level hold rules, and release authority before
    confident reporting.

    '
