materialization:
  olf_agent_pa_requirements:
  - 'task metadata: issue slug, industry overlay, lane template, runtime strategy, target delivery level, workflow phase,
    resolved profile, and source baseline version'
  - 'boundary metadata: allowed decisions, refusal triggers, adjacent specialists, output shapes, and orchestrator return
    policy'
  - 'retrieval metadata: connectors for ERP, MES, WMS, QMS, supplier management, planning, logistics, traceability, and incident
    systems'
  - 'tenant facts: CCB map, MRB authority, release authority, supplier approval and substitution policy, incident-response
    precedence, and export-control/classification constraints'
  - 'regulated-lane caveats: no autonomous engineering, security-release, legal, safety-critical, procurement-approval, or
    direct execution authority'
  - 'orchestrator return rules: missing records, unresolved source or policy conflict, ambiguous ownership, or direct execution
    pressure'
  promotion_to_trusted_build:
  - Collect repeated usage and stable owner maps with consistent evidence acceptance before trusting runtime beyond specification-based.
  - Promote only after a separate retained implementation including runtime prompts, connectors, permissions, logging, and
    rollout/rollback controls is committed.
  - Keep this package at specification-based until a governance review signs off a separate trusted build.
commercialization:
  market_positioning: validated aerospace-and-defense security-program coordination overlay for organizations requiring evidence-backed
    handoffs across protective-controls incidents, lot traceability, supplier security events, and production hold/release
    boundaries.
  packaging_notes:
  - Route as a coordination specialist, not a security control executor, release authority, procurement system, or legal decisioning
    lane.
  - Position for program teams needing explicit ownership handoffs across security, quality, production, inventory, supplier,
    planning, and logistics domains.
  - Runtime remains specification-based and explicitly not retained-implementation until separate promotion is approved.
