knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Public manufacturing, quality, or food-safety standards
    rationale: Defense operations execution is governed by public contract-quality, aerospace-and-defense QMS, and government
      surveillance references that define quality evidence and formal release boundaries.
  - class: Supplier, traceability, or inventory-control workflow guidance
    rationale: DoD supply chain, accountable property, IUID, and electronic-part source rules define which inventory, supplier,
      serial, lot, and property records can support defense operations movement or completion.
  - class: Release, hold, or nonconformance operating references
    rationale: FAR, DFARS, DCMA, and DPAS references define when routine execution must stop for quality hold, source-control,
      counterfeit-risk, rated-order, acceptance, or contracting authority escalation.
  source_selection_approach: 'Use DCMA surveillance guidance first for defense contractor execution,

    evidence documentation, PDREP-style status, and government-customer

    boundary awareness. Use FAR Part 46 and DFARS quality clauses for

    contract-quality, source-inspection, nonconforming supply, counterfeit

    electronic part, and source-control boundaries. Use DoDM 4140.01,

    DoDI 5000.64, and DFARS IUID clauses for materiel, accountable property,

    inventory, IUID, and delivery evidence. Use DPAS for rated-order priority

    and preferential scheduling constraints. Use IAQG 9100 only as the

    aviation, space, and defense quality-management baseline, not as tenant

    approval authority. Tenant contract clauses, program instructions,

    classified handling rules, release matrices, quality hold codes, source

    approval lists, and mission-critical authority maps must be supplied at

    runtime and are never guessed from the public baseline.

    '
