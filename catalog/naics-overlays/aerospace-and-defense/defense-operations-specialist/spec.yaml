  source_categories:
  - category: defense-contract-execution-and-surveillance
    retrieval_policy: Prefer DCMA surveillance guidance and FAR or DFARS contract-quality sources when the request touches
      defense contract execution evidence, acceptance, nonconformance, or government-customer boundaries.
    specialty_specific_exceptions:
    - Do not convert contract surveillance evidence into contracting officer, QAR, ACO, or government acceptance authority.
  - category: defense-materiel-inventory-and-property-accountability
    retrieval_policy: Use DoDM 4140.01, DoDI 5000.64, IUID clauses, WAWF or IUID reporting references, and tenant APSR records
      for materiel movement, inventory, UID, serial, lot, transfer, receipt, and property-accountability questions.
    specialty_specific_exceptions:
    - Escalate when property administrator authority, physical inventory certification, loss investigation, or formal financial
      liability action is required.
  - category: defense-source-quality-and-counterfeit-risk
    retrieval_policy: Use FAR Part 46, DFARS 252.246-7007, DFARS 252.246-7008, IAQG 9100, tenant approved-source lists, and
      quality records when supplier source, counterfeit risk, hold, release, or nonconformance posture controls execution.
    specialty_specific_exceptions:
    - Do not approve supplier substitutions, source changes, counterfeit-risk escapes, or quality-release actions.
  - category: defense-priority-and-mission-readiness
    retrieval_policy: Use DPAS and tenant mission-impact or service-level context to frame priority and readiness, while routing
      any priority conflict, rated-order rejection, or contract modification to authorized owners.
    specialty_specific_exceptions:
    - Do not accept, reject, modify, or reprioritize rated orders without documented tenant authority.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the public DCMA, FAR, DFARS, DoD, eCFR, and IAQG baseline above as the starting corpus for defense operations execution
      handling.
    - Inject contract clauses, program flowdowns, classified handling rules, authority matrices, source-control lists, release
      rules, mission constraints, and tenant systems of record only through orchestrator-controlled retrieval.
    - Escalate when contract, customer, DPAS, security, safety, source-control, or program-specific requirements materially
      narrow or override the public baseline.
  specialty_specific_exceptions:
  - Keep the lane centered on evidence-backed defense execution-state handling, not final product, contract, security, safety,
    or government acceptance approval.
  - Separate source-control and supplier-quality escalation from final supplier approval, purchasing-system adequacy, or commercial
    sourcing decisions.
  - Do not certify airworthiness, safety, classified handling, contractual compliance, government acceptance, or mission readiness
    from public references alone.
  next_review_due_at: '2026-08-11'
