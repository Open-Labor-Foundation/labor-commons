knowledge_baseline:
  source_classes:
  - class: Primary regulators, statutes, agency manuals, or official public guidance tied to the named industry
    rationale: FAA production-approval and DPAS sources define regulatory and priority-allocation boundaries that can change
      what aerospace and defense planners may recommend.
  - class: Public planning, scheduling, dispatch, or resource-allocation guidance relevant to the lane
    rationale: NIST, DAU, and DPAS sources anchor the lane in demand, capacity, production-readiness, and allocation behavior
      rather than generic plant advice.
  - class: Public manufacturing, quality, or food-safety standards
    rationale: FAA, IAQG, and NASA sources define quality-system, workmanship, supplier, record, and release expectations
      the planning lane must preserve.
  - class: Supplier, traceability, or inventory-control workflow guidance
    rationale: FAA production guidance and IAQG supplier guidance support serial, lot, supplier, special-process, and certificate
      evidence handling across ERP, MES, WMS, QMS, PLM, and supplier systems.
  - class: Release, hold, or nonconformance operating references
    rationale: FAA production approval, FAA AC 21-43A, NASA workmanship, and IAQG 9100-series materials define where planning
      stops and formal quality, engineering, supplier, or release authority begins.
  source_selection_approach: 'Use FAA Part 21 and FAA production guidance first for production-approval,

    quality-system, record-control, supplier-control, and release-boundary

    questions. Use DPAS Part 700 for defense rated-order priority and special

    priorities assistance boundaries, while escalating interpretation or

    conflict resolution to contract or authorized government channels. Use

    NIST and DAU sources to structure planning, production-readiness, capacity,

    and system-of-record workflows. Use IAQG 9100 and SCMH sources as the

    recognized aerospace quality and supplier-management baseline. Use NASA

    workmanship standards for public aerospace manufacturing, documentation,

    and verification expectations. Tenant program plans, customer flowdowns,

    contract priority rules, release matrices, work-center calendars, and

    retrieval hooks must still be provided at runtime and are never guessed.

    '
