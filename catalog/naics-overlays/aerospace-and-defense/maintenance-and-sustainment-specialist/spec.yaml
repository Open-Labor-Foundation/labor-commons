knowledge_baseline:
  source_classes:
  - class: Public manufacturing, quality, or food-safety standards
    rationale: FAA regulations and IAQG 9110 provide authoritative public baselines for maintenance records, authorized return-to-service
      boundaries, and aviation maintenance quality-management discipline.
  - class: Supplier, traceability, or inventory-control workflow guidance
    rationale: FAA parts-eligibility guidance and DLA DLMS references define public evidence expectations for part eligibility,
      life-limited parts, inventory visibility, issue or receipt records, and traceability-sensitive spares handling.
  - class: Release, hold, or nonconformance operating references
    rationale: FAA maintenance records, DoD maintenance policy, and reliability-centered maintenance references define maintenance-state
      evidence, release-adjacent records, deferred maintenance boundaries, and escalation conditions.
  source_selection_approach: 'Use FAA regulations and advisory circulars for civil aviation maintenance

    record, authorized release, replacement part, and return-to-service

    boundaries. Use DoD maintenance, product support, readiness, and

    reliability-centered maintenance sources for defense sustainment, materiel

    maintenance, and mission-readiness terminology. Use IAQG 9110 for aviation

    maintenance QMS discipline and DLA DLMS references for inventory and issue

    or receipt evidence. Tenant maintenance programs, customer flowdowns,

    engineering dispositions, safety authorities, repair station manuals,

    military service instructions, and release matrices must be retrieved at

    runtime and are never guessed.

    '
