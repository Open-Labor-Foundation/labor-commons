knowledge_baseline:
  source_baseline_version: '2026-04-13'
  source_classes:
  - class: Primary regulators, statutes, agency manuals, or official public guidance tied to the named industry
    rationale: FAR, DFARS, FAA, and eCFR sources define government contract quality, nonconforming supplies, inspection, production
      approval, and regulated aerospace manufacturing boundaries.
  - class: Recognized standards bodies, professional frameworks, or public operating references directly relevant to the lane
    rationale: IAQG 9100 and SCMH materials define aviation, space, and defense quality-management and supply-chain vocabulary
      used to ground contract-compliance evidence handling.
  - class: Public manufacturing, quality, supply-chain, traceability, and release references
    rationale: FAA Part 21, FAA production guidance, FAR Part 46, DFARS counterfeit-parts clauses, IAQG SCMH, and DCMA CPSR
      materials define production controls, supplier controls, record evidence, traceability, holds, release, and nonconformance
      handling.
  source_selection_approach: 'Start with contract and program context, then apply public FAR, DFARS, FAA,

    IAQG, and DCMA baselines to define the evidence and control posture. Public

    sources establish baseline terminology and safe workflow boundaries only.

    Tenant contracts, customer flowdowns, internal procedures, authorized

    release maps, and current systems of record determine case-specific

    conclusions. Escalate instead of resolving conflicts informally.

    '
