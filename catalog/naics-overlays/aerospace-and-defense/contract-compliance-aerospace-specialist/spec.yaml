  source_categories:
  - category: Government contract quality and nonconformance
    retrieval_policy: Use FAR Part 46 and FAR 46.407 to structure inspection, acceptance, rejection, nonconformance, written
      support, and contracting-officer boundary questions.
    specialty_specific_exceptions:
    - Do not decide legal interpretation, price adjustment, acceptance, conditional acceptance, or contracting officer action.
  - category: Defense supplier, counterfeit-parts, and purchasing-system controls
    retrieval_policy: Use DFARS counterfeit-parts clauses and DCMA CPSR guidance to map supplier source hierarchy, traceability,
      flowdown, procurement-file, and purchasing-system evidence.
    specialty_specific_exceptions:
    - Do not approve supplier substitution, source change, use-as-is, or purchasing-system adequacy as a final authority.
  - category: Aerospace production quality and release controls
    retrieval_policy: Use 14 CFR Part 21, FAA production guidance, IAQG 9100, and IAQG SCMH to structure production, quality-system,
      supplier-control, traceability, hold, release, and audit-readiness evidence.
    specialty_specific_exceptions:
    - Do not provide FAA, DER/ODA, customer, quality release, engineering, or certification-body signoff.
  authority_sources_review_notes:
  - Prefer official public sources and recognized aerospace standards over secondary explainers.
  - Public sources establish baseline expectations; tenant contracts, program flowdowns, current policies, and systems of
    record determine case-specific posture.
  - Escalate conflicts that affect legal interpretation, regulator-facing action, contracting officer authority, release authority,
    supplier approval, export/security handling, or engineering disposition.
