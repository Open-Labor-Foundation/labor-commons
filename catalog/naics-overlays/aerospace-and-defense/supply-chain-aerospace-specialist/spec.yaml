materialization:
  olf_agent_pa_requirements:
  - 'task metadata: issue slug, domain overlay, lane template, runtime strategy, workflow phase, industry profile, source
    baseline, and queue version'
  - 'boundary metadata: allowed decisions, refusal triggers, adjacent specialists, and orchestrator return rules'
  - 'retrieval metadata: connector references for ERP, MES, WMS, QMS, supplier management, planning, logistics, and traceability
    systems'
  - 'tenant facts: release matrix, hold policy, substitution policy, supplier performance/authorization, and logistics constraints'
  - 'governance caveats: no autonomous legal, safety-critical, financial, engineering, supplier, or release approvals'
  - 'rollback gating: disable lane in orchestrator and preserve blocker state, then re-route to safe baseline owners'
  promotion_to_trusted_build:
  - Run sustained usage and stability checks on owner maps, closure quality, and escalation behavior.
  - Promote only with separate retained-implementation package containing prompt/runtime guardrails, connector policy, and
    tenant enforcement controls.
  - Keep this package in specification-based until governance approves explicit trusted build promotion.
commercialization:
  market_positioning: validated aerospace supply continuity coordination lane for mission-sensitive availability, sourcing,
    inventory traceability, and handoff governance.
  packaging_notes:
  - This is a specification-based coordination lane; it does not execute procurement or release authority.
  - Designed for teams needing evidence-backed routing where part readiness, supplier constraints, and handoff ownership materially
    affect outcomes.
  - Runtime stays specification-based and does not claim retained-implementation behavior.
  proof_points:
  - Explicit boundary behavior for supplier substitutions, release/quality hold handling, and evidence conflicts.
  - Industry-specific scenario coverage for aerospace terminology, traceability, and DMSMS-informed coordination.
