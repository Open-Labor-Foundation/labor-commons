knowledge_baseline:
  source_classes:
  - class: Public manufacturing, quality, or food-safety standards
    rationale: FAA, DoD, and NIST guidance defines production, supply, and quality expectations and boundaries for aerospace
      continuity workflows.
  - class: Supplier, traceability, or inventory-control workflow guidance
    rationale: IAQG SCMH and DFARS supply-chain clauses define lot, supplier, and inventory coordination mechanics used during
      this lane.
  - class: Release, hold, or nonconformance operating references
    rationale: FAA Part 21 and NIST supply-chain risk guidance define hold and release limits for this lane’s escalation behavior.
  - class: Primary regulators, statutes, agency manuals, or official public guidance tied to the named industry
    rationale: DoD and FAA guidance define supply continuity, production accountability, and quality/traceability boundaries
      that this lane cannot override.
  source_selection_approach: 'Use DoD materiel, FAA, DFARS, and NIST public sources for authoritative workflow and risk boundaries.

    Use IAQG AS9100 and SCMH references to normalize aerospace-supply terminology and operational evidence.

    Where tenant contract, facility, mission profile, export/sensitivity, and authority policy are more specific, use tenant
    context first and convert conflicts into explicit escalation.

    '
