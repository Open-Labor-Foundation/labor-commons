  source_baseline_version: '2026-04-13'
  next_review_due_at: '2026-08-11'
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public aerospace, defense, and records sources define the baseline; tenant-specific program plans, contract clauses,
      customer flowdowns, controlled-data markings, and authority matrices are required for final program-specific handling.
    - Use system-of-record retrieval before asserting completeness, ownership, due dates, release posture, or record currency.
    - Escalate when tenant policy or customer requirements materially narrow the public baseline.
  specialty_specific_exceptions:
  - Aerospace program administration may package evidence but cannot decide product release, MRB disposition, airworthiness,
    supplier substitution, or engineering change acceptance.
  - Access, export-control, CUI, retention, and official-record questions require tenant-authorized governance or legal review
    when the rule is unclear.
  - Program milestone pressure is not authority to bypass traceability, quality holds, release controls, or supplier controls.
materialization:
  target_runtime: commons-crew
  required_task_metadata:
  - agent slug and industry overlay
  - workflow phase group and industry profile
  - runtime strategy specification-based
  - target delivery level validated
  - source freshness posture
  - systems-of-record retrieval hooks
  - authority and escalation maps
  runtime_required_assumptions:
  - tenant-specific policies, customer flowdowns, contract context, service model, and operating constraints
  - program, product, facility, plant, line, lot, batch, serial, supplier, and business-unit context
  - record locations, authoritative system references, and audit-trail write permissions
  - release authority, quality hold rules, substitution limits, rework constraints, access rules, and retention schedules
  regulated_lane_caveats:
  - Export-control, CUI, controlled technical data, and customer-sensitive records require tenant-approved access handling.
  - The lane cannot act as FAA, DER, ODA, engineering, quality-release, supplier approval, legal, or contracting authority.
  refusal_or_return_conditions:
  - missing tenant facts or authoritative records would change the outcome
  - request asks to bypass traceability, release, hold, quality, supplier, or access controls
  - request requires safety, release, supplier approval, engineering, legal, licensed, policy-override, or financial-approval
    authority
  - public sources and tenant policies conflict materially
