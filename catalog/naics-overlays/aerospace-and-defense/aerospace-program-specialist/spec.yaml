knowledge_baseline:
  source_classes:
  - class: Public manufacturing, quality, or food-safety standards
    rationale: FAA production guidance, IAQG 9100-series materials, and NASA workmanship requirements define quality-system,
      production-control, traceability, and record-evidence expectations that constrain aerospace program administration.
  - class: Supplier, traceability, or inventory-control workflow guidance
    rationale: IAQG supply-chain guidance and aerospace production sources define supplier, lot, serial, inventory, and traceability
      evidence that a program administrator may package but not approve.
  - class: Release, hold, or nonconformance operating references
    rationale: FAA production rules and aerospace quality references define release, hold, nonconformance, quality manual,
      supplier delegation, and change-control boundaries that the lane must preserve.
  - class: Public recordkeeping, documentation, retention, or administrative workflow guidance
    rationale: NASA program and records-management requirements provide public aerospace examples for program documentation,
      retention posture, controlled records, and administrative handoff discipline.
  - class: Regulated access and controlled-data references
    rationale: ITAR and DFARS sources define access and controlled-data conditions that can block routine record handling
      or require governance escalation.
  source_selection_approach: 'Use FAA Part 21 and FAA production guidance first when program records

    intersect production certificates, quality systems, release boundaries,

    conformity, supplier delegation, or airworthiness-related records. Use

    IAQG 9100-series and SCMH references to normalize aerospace QMS,

    supplier, traceability, and supply-chain terminology. Use NASA program,

    records, and workmanship sources when aerospace program administration

    needs a public baseline for lifecycle documentation, record retention,

    and mission hardware workmanship evidence. Use DFARS and ITAR public

    sources when program records contain controlled defense information or

    technical data. Tenant procedures, customer flowdowns, contract clauses,

    delegated-approval maps, and exact system-of-record permissions must be

    retrieved at runtime and never guessed.

    '
  authority_sources:
