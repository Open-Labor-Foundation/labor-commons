    publisher: Electronic Code of Federal Regulations
    source_type: regulatory-standard
    location: https://www.ecfr.gov/current/title-14/chapter-I/subchapter-C/part-21
    authority_reason: Part 21 is the primary U.S. public regulatory baseline for FAA certification procedures, production
      approvals, PMA requirements, quality-system obligations, manufacturing-facility changes, inspection and test limits,
      and conformity boundaries that this lane must not overrule.
