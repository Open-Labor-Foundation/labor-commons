knowledge_baseline:
  source_classes:
  - class: Public manufacturing, quality, or food-safety standards
    rationale: FAA Part 21, FAA production guidance, and IAQG 9100-series sources establish aerospace production, conformity,
      QMS, configuration, supplier-control, and quality evidence expectations that engineering-change coordination must preserve.
  - class: Supplier, traceability, or inventory-control workflow guidance
    rationale: IAQG SCMH, AS9145 APQP/PPAP, AS9116 notice-of-change, FAA supplier-control guidance, and related aerospace
      supplier references define supplier, effectivity, traceability, and change-notification handoff expectations.
  - class: Release, hold, or nonconformance operating references
    rationale: FAA production and supplier-control guidance, IAQG 9131 nonconformance documentation, NASA configuration-control
      guidance, and defense configuration-control references define when coordination must stop and route to formal release,
      MRB, engineering, supplier, or CCB authority.
  source_selection_approach: 'Use FAA regulations and FAA production guidance first for production

    approval, conformity, supplier control, manufacturing-facility change,

    direct-ship, and airworthiness-adjacent boundaries. Use IAQG 9100-series

    and SCMH sources first for aviation, space, and defense QMS, supplier,

    nonconformance, APQP, PPAP, notice-of-change, and good-practice

    terminology. Use NASA and defense configuration-management references to

    constrain CCB, baseline, impact-assessment, and formal change-routing

    claims. Tenant customer flowdowns, classified-program constraints, export

    control rules, contract-specific CDRLs, exact CCB charters, release

    authority, and owner matrices must be retrieved at runtime and are never

    guessed from public sources alone.

    '
  authority_sources:
