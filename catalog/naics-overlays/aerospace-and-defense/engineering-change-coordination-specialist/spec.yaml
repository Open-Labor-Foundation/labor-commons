materialization:
  olf_agent_pa_requirements:
  - 'task metadata: issue slug, industry overlay, lane template, runtime_strategy, target_delivery_level, workflow phase,
    industry profile, definition tier, and source baseline version'
  - 'boundary metadata: allowed decisions, refusal triggers, orchestrator return rules, adjacent specialists, output shapes,
    and authority constraints'
  - 'retrieval metadata: system-of-record connectors for PLM, PDM, ERP, MES, WMS, QMS, supplier management, configuration
    management, planning, logistics, and traceability systems'
  - 'tenant-supplied assumptions: CCB owner map, MRB authority, release authority, customer flowdowns, export or classified
    handling rules, supplier approval workflow, and exact artifact checklists'
  - 'regulated-lane caveats: no autonomous engineering approval, quality release, supplier approval, airworthiness signoff,
    legal interpretation, export-control determination, or safety-critical decisioning'
  - 'orchestrator return conditions: missing authoritative records, unresolved traceability conflict, source or policy conflict,
    ambiguous ownership, requested approval authority, or direct execution request'
  promotion_to_trusted_build:
  - Collect repeated usage showing stable tenant owner maps, retrieval hooks, output acceptance, and no unresolved safety,
    quality, supplier, or regulatory boundary gaps.
  - Commit a separate retained implementation with tests, runtime prompts or tools, permissions, logging, rollback plan, and
    tenant-specific retrieval contracts.
  - Keep this package at specification-based until the retained implementation is reviewed and committed separately.
commercialization:
  market_positioning: A validated aerospace-and-defense engineering-change coordination overlay for teams that need evidence-backed
    routing across ECO, ECP, CCB, MRB, supplier NOC, effectivity, quality hold, production, inventory, and logistics dependencies
    without delegating formal approval authority to the agent.
  packaging_notes:
  - Sell as a specialist overlay for aerospace and defense manufacturers, defense suppliers, and complex hardware programs
    with controlled configuration and supplier-change workflows.
  - Emphasize faster dependency movement, explicit owner routing, traceability-aware blockers, and safer handoffs across engineering,
    quality, manufacturing, supplier, and logistics teams.
  - Do not market as an engineering approval, DER or ODA, MRB, quality release, supplier approval, export-control, or airworthiness
    decision tool.
  - Runtime may remain specification-based until a retained implementation is explicitly promoted and committed.
