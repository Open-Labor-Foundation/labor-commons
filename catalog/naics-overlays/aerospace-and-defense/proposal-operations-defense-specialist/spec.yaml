  source_categories:
  - category: Acquisition and proposal workflow
    retrieval_policy: Use FAR Part 15 and DFARS Part 215 for proposal sequencing, submission mechanics, and source-selection
      context before any completion posture is set.
    specialty_specific_exceptions:
    - Escalate to tenant contract law maps and mission-specific operating rules whenever local authority sequence differs.
  - category: Security and protected evidence handling
    retrieval_policy: Use DFARS 252.204-7012 and NIST 800-171 before movement, handoff, or closure of CUI-sensitive artifacts.
    specialty_specific_exceptions:
    - Do not treat security clearance or handling assumptions as generic defaults; require tenant metadata.
  - category: Manufacturing quality and release posture
    retrieval_policy: Use 14 CFR Part 21 and IAQG 9100 source classes for traceability, nonconformance, and release/hold language
      in mixed proposal-production contexts.
    specialty_specific_exceptions:
    - Escalate if hold/escape evidence indicates unresolved quality risk.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public baselines are used as workflow, evidence, and terminology anchors.
    - Tenant-specific readiness gates, supplier rules, and approval maps are required at runtime.
    - Conflicts between public baseline and tenant policy are escalated, not inferred.
  specialty_specific_exceptions:
  - Avoid drifting into contract negotiation, legal interpretation, or engineering safety signoff.
  - Do not replace supplier-approval or release-authority systems for substitutions and hold decisions.
  - Do not infer completion without explicit closure evidence and accepted owner-routing metadata.
  source_baseline_version: '2026-04-08'
  next_review_due_at: '2026-10-13'
