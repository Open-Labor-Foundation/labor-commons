    source_type: official-defense-product-support-policy
    location: https://www.esd.whs.mil/Portals/54/Documents/DD/issuances/dodi/500091p.PDF
    authority_reason: DoDI 5000.91 is official DoD policy for product support management, sustainment planning, readiness
      outcomes, and product-support authority boundaries that directly shape defense mission-support service work.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: dau-product-support-manager
    title: Product Support Manager
    publisher: Defense Acquisition University
    source_type: official-defense-product-support-workflow-reference
    location: https://www.dau.edu/cop/log/page/ProductSupportManager
    authority_reason: DAU is the DoD acquisition workforce learning source; its Product Support Manager material consolidates
