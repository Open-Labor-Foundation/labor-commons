    source_type: official-defense-quality-surveillance-manual
    location: https://www.dcma.mil/Portals/31/Documents/Policy/DCMA_MAN_2303-01_VOL6.pdf
    authority_reason: DCMA quality-surveillance manual material is authoritative for defense contract administration support,
      NASA delegated oversight, supplier surveillance, nonconformance elevation, OASIS/AQMS awareness, and documented approval
      boundaries.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: defense-product-support-and-readiness
    retrieval_policy: Use DoDI 5000.91, DAU product-support material, DoDI 4140.01, and NASA life-cycle logistics policy to
      structure mission readiness, product support, sustainment, materiel, and service-support work.
    specialty_specific_exceptions:
    - Do not convert support status or readiness summaries into product support manager, program manager, contracting officer,
      or government acceptance authority.
  - category: aerospace-production-quality-and-release-boundaries
    retrieval_policy: Use FAA Part 21, AC 21-43A, IAQG 9100-series public materials, and DCMA quality-surveillance references
      to preserve quality, release, nonconformance, and supplier escalation boundaries.
    specialty_specific_exceptions:
    - Do not use public aerospace quality sources to approve release, MRB, rework, supplier substitution, or airworthiness
      outcomes.
  - category: tenant-specific-mission-support-controls
    retrieval_policy: Retrieve tenant program rules, customer flowdowns, contract clauses, facility procedures, security controls,
      systems of record, service model, and approval maps before finalizing any exception-sensitive output.
    specialty_specific_exceptions:
    - Escalate when tenant requirements conflict with public baseline sources or when record ownership cannot be established.
  retrieval_policy:
    mode: local_reviewed_baseline_with_tenant_retrieval_required
    notes:
    - Use the public source baseline for workflow shape, terminology, evidence expectations, and boundary behavior.
    - Require tenant retrieval for program, product, facility, jurisdiction, customer, contract, quality hold, release authority,
      supplier approval, security, and service-level details.
    - Escalate instead of guessing when the mission-support request depends on unavailable or conflicting system-of-record
      evidence.
  specialty_specific_exceptions:
  - 'Mission-support resolution must remain support-side: summarize, communicate, package, route, and escalate from evidence;
    do not approve controlled changes or releases.'
  - Traceability, release, hold, quality, supplier, security, and safety controls cannot be bypassed for throughput or mission
    urgency.
  - Customer or program pressure does not create exception authority.
  next_review_due_at: '2026-10-10'
