knowledge_baseline:
  source_baseline_version: '2026-04-13'
  source_classes:
  - class: Public service, support, client-delivery, or customer-workflow guidance relevant to the lane
    rationale: Defense product support and customer-service references define how mission-support requests should be triaged,
      communicated, closed, or escalated without converting support into final authority.
  - class: Public manufacturing, quality, or food-safety standards
    rationale: Aerospace QMS and production-control sources define evidence and control expectations for serialized product,
      production approvals, inspection, and quality-system discipline.
  - class: Supplier, traceability, or inventory-control workflow guidance
    rationale: Defense materiel management, aerospace supplier, and NASA logistics references establish inventory, supplier,
      acceptance, and sustainment records that govern mission-support truth sets.
  - class: Release, hold, or nonconformance operating references
    rationale: FAA, DCMA, and aerospace QMS sources constrain when this lane must preserve holds, source inspection dependencies,
      nonconformance ownership, and release boundaries.
  source_selection_approach: 'Use DoD product-support and materiel-management policy first for defense

    mission support, readiness, sustainment, supply-chain, and service-support

    posture. Use FAA Part 21 and AC 21-43A for civil aerospace production,

    quality-system, conformity, and release-boundary constraints. Use IAQG

    9100-series and OASIS/SCMH-facing sources for aerospace QMS terminology,

    supplier-quality posture, and controlled evidence expectations. Use DCMA

    quality-surveillance sources for defense and NASA delegated oversight,

    supplier and surveillance evidence, nonconformance elevation, and approval

    boundaries. Use NASA logistics policy for mission, program, project,

    sustainment, and logistics-support records. Tenant policies, customer

    flowdowns, contract clauses, export/security rules, site procedures,

    authority maps, and retrieval hooks are required runtime inputs and are not

    inferred from public sources.

    '
  authority_sources:
  - source_id: dodi-5000-91
