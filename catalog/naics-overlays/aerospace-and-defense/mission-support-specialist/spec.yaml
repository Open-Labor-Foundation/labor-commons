      and defense QMS terminology and control posture for quality evidence, supplier controls, and nonconformance handling.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: dcma-man-2303-01-vol6
