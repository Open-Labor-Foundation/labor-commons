  source_categories:
  - category: aerospace-quality-and-release-boundaries
    retrieval_policy: Prefer FAA regulations and FAA production guidance for release, production approval, conformity, and
      quality-system boundary questions.
    specialty_specific_exceptions:
    - Do not convert FAA production or QSA guidance into delegated approval authority for the specialist.
  - category: supplier-traceability-and-evidence-control
    retrieval_policy: Use supplier-quality and traceability materials to identify lot, serial, and source-of-origin requirements
      before recommending hold-release posture.
    specialty_specific_exceptions:
    - Treat supplier substitution and source-change authority as tenant/program-level decisions.
  - category: aerospace-quality-management-and-supplier-discipline
    retrieval_policy: Use IAQG 9100-series materials and deployment support to structure supplier-quality, CAPA, audit, and
      quality-system workflow expectations.
    specialty_specific_exceptions:
    - Use IAQG materials to define good-practice quality-system posture, not to invent tenant-specific contract obligations.
  - category: public-aerospace-workmanship-and-quality-evidence
    retrieval_policy: Use public NASA workmanship standards to sharpen evidence expectations, controlled-process discipline,
      and verification records.
    specialty_specific_exceptions:
    - Escalate whenever customer-specific workmanship, military, or program requirements override the public baseline.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the public FAA, IAQG, and NASA baseline above as the starting corpus for aerospace quality-system handling.
    - Inject customer-specific flowdowns, program quality plans, delegated-approval rules, and internal QMS procedures only
      through orchestrator-controlled retrieval.
    - Escalate when contract, customer, or program requirements materially narrow or override the public baseline.
  specialty_specific_exceptions:
  - Keep the lane centered on evidence-backed quality-system handling, not final product approval.
  - Separate supplier-quality escalation from final commercial supplier disposition.
  - Do not certify airworthiness, contractual compliance, or engineering adequacy from public references alone.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-10-13'
  source_classes:
  - class: Public manufacturing, quality, or food-safety standards
    rationale: FAA and IAQG materials provide the controlling baseline for quality evidence, manufacturing recordkeeping,
      and release discipline in aerospace production.
  - class: Supplier, traceability, or inventory-control workflow guidance
    rationale: Supplier certification and workmanship materials define how lot and serial evidence interacts with supplier
      changes, substitutions, and incoming material controls.
  - class: Release, hold, or nonconformance operating references
    rationale: FAA production and corrective-action references define when holds persist, how nonconformance decisions are
      documented, and where final release authority begins.
