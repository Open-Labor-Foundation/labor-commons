    source_type: industry-governance-reference
    location: https://www.iatfglobaloversight.org/oem-requirements/customer-specific-requirements/
    authority_reason: IATF Global Oversight is the official public steward for IATF governance content, and its OEM customer-specific
      requirements portal is the authoritative public pointer to current automotive customer requirement sets that materially
      change parts workflow boundaries.
    last_reviewed_at: '2026-04-10'
