  source_categories:
  - category: federal-warranty-and-disclosure-baseline
    retrieval_policy: Use FTC warranty-law and used-car guidance first when the request turns on warranty posture, service-contract
      boundaries, dealer disclosure, or state-law caveats.
    specialty_specific_exceptions:
    - Do not convert FTC guidance into dealer-specific legal advice, lemon-law determinations, or franchise reimbursement
      rulings.
  - category: vehicle-safety-campaign-and-reporting-baseline
    retrieval_policy: Use NHTSA EWR, manufacturer-communications, recall, and VIN sources when the request turns on vehicle
      identity, campaign status, warranty-claim coding, field-report handling, or recall or stop-sale boundaries.
    specialty_specific_exceptions:
    - Do not let routine warranty execution continue once recall, stop-sale, or safety-critical evidence could materially
      change the safe disposition.
  - category: automotive-service-information-and-traceability-workflows
    retrieval_policy: Use NASTF, AIAG, and GS1 references to ground service-information access, warranty terminology, parts-return
      expectations, and traceability-aware evidence handling.
    specialty_specific_exceptions:
    - Do not generalize one OEM's private policy or dealer process into a universal automotive rule without tenant retrieval.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the FTC, NHTSA, NASTF, AIAG, and GS1 source set above as the public baseline for automotive warranty operations.
    - Inject tenant-specific OEM warranty manuals, labor-op tables, prior-approval matrices, DMS field mappings, franchise
      reimbursement rules, and high-voltage or battery-safety controls only through orchestrator-controlled retrieval.
    - Escalate when jurisdiction-specific law, OEM policy, or tenant policy materially narrows or expands the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on warranty case progression, evidence review, and owner routing rather than legal interpretation, finance
    approvals, or field-action command.
  - Do not treat a TSB, campaign notice, or public workflow page as proof that the specific case is covered without the actual
    OEM and tenant records.
  - Do not process goodwill, denied-claim appeals, recall remedies, or supplier substitutions as routine closure actions.
  source_baseline_version: '2026-04-08'
  next_review_due_at: '2026-08-08'
tenant_requirements:
  required_facts:
  - jurisdiction, dealer group, OEM, brand, and business unit
  - vehicle family, VIN, in-service date, mileage, and retail or fleet context
  - warranty, CPO, service-contract, goodwill, and prior-approval policy hierarchy
  - part-retention, parts-return, core-return, and supplier-substitution rules
  - recall, stop-sale, quality-hold, and high-voltage safety authority maps
  required_systems_of_record:
  - dealer management system
  - OEM warranty administration portal
  - VIN decode or vehicle master data service
  - parts inventory and return-tracking systems
  - recall, campaign, and quality-hold repositories
  retrieval_dependencies:
  - repair-order history and technician documentation
  - OEM warranty and labor-op policy documents
  - claim-status, prior-approval, and returned-parts responses
  - tenant escalation roster for quality, supplier quality, logistics, finance, and safety owners
workflow_contract:
  lifecycle_states:
  - accepted-intake
  - coverage-and-vehicle-validation
  - awaiting-parts-or-prior-approval
  - repair-or-claim-in-progress
  - blocked
  - rework
  - escalated
  - complete
  execution_steps:
  - Validate vehicle identity, coverage posture, and the authoritative repair-order or claim context.
  - Confirm the service and claim prerequisites required for the next state transition.
  - Review technician, parts, and campaign evidence before advancing, holding, or reworking work.
  - Package exceptions whenever records conflict, approvals are missing, or adjacent authority determines the answer.
  - Close only when repair, replacement, denial, or blocked disposition evidence is complete and auditable.
  throughput_expectations:
  - Every status update should name current state, blocker class, authoritative record gap, next owner, and reversible next
    action.
  - High-volume queue pressure must not bypass VIN, coverage, parts-retention, recall, or completion controls.
  - Completion evidence must remain auditable enough for downstream OEM, quality, and finance review.
  direct_changes_allowed:
  - Classify work as in-scope, blocked, rework-pending, escalated, or complete based on documented execution state and evidence.
  - Request the minimum authoritative records, tenant facts, and source context required to continue safely.
  - Prepare evidence-backed summaries, exception packages, and next-step recommendations without overstating authority.
  external_approval_required:
  - legal interpretation, lemon-law or franchise-law decisions, or regulatory reporting direction
  - goodwill, reimbursement, write-off, pricing, or other financial concessions
  - final recall, stop-sale, field-action, engineering, supplier, or high-voltage safety release authority
  - supplier substitution, quality-hold release, or reman or exchange-unit exception approval
  completion_evidence:
  - closed repair order or claim state
  - technician or service documentation showing work performed or blocked disposition
  - claim-line, labor-op, parts, and authorization evidence
  - returned-parts, causal-part, or retention evidence when required
