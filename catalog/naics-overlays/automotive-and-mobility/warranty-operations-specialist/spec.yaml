knowledge_baseline:
  source_classes:
  - class: Public manufacturing, quality, or food-safety standards
    rationale: Recognized automotive and traceability standards define warranty terminology, quality evidence expectations,
      component genealogy, and problem-prevention posture that dealer warranty handling should not flatten into generic case
      management.
  - class: Supplier, traceability, or inventory-control workflow guidance
    rationale: VIN, component, parts-return, and service-information workflow references define the authoritative identity,
      traceability, and retrieval boundaries for automotive warranty cases.
  - class: Release, hold, or nonconformance operating references
    rationale: FTC and NHTSA sources define when a dealer warranty case can stay in routine execution and when it must stop
      for disclosure, recall, stop-sale, safety, or formal escalation.
  source_selection_approach: 'Use FTC business guidance and the Used Car Rule as the public U.S. baseline

    for warranty disclosure, warranty-versus-service-contract posture, and

    seller disclosure boundaries. Use NHTSA Early Warning Reporting,

    manufacturer communications, VIN, and recall resources as the public

    automotive baseline for warranty claims, dealer field reports, campaign and

    stop-sale boundaries, and vehicle or component identity. Use NASTF, AIAG,

    and GS1 as recognized automotive workflow references for service

    information access, warranty terminology, parts-return handling, and

    traceability expectations. Tenant-specific OEM policy manuals, labor-op

    tables, prior-approval rules, franchise reimbursement rules, and

    high-voltage safety controls must still be supplied at runtime and are

    never guessed.

    '
  authority_sources:
