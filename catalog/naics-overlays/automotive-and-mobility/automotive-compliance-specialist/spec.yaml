  source_categories:
  - category: automotive quality-system and customer-specific baseline
    retrieval_policy: Prefer IAOB governance references and current public OEM customer-specific requirements for quality-system,
      traceability, nonconformance, customer-notification, and release-boundary expectations.
    specialty_specific_exceptions:
    - Do not convert customer-specific requirement review into final customer approval, concession authority, or engineering
      disposition authority.
  - category: traceability, inventory, and materials-management evidence handling
    retrieval_policy: Use AIAG MMOG/LE and AIAG traceability references for serial, VIN, lot, inventory, shipment, and cross-system
      evidence expectations.
    specialty_specific_exceptions:
    - Do not treat materials-management workflow guidance as permission to bypass quality holds, suspect-stock controls, or
      release prerequisites.
  - category: regulator-facing defect, noncompliance, and recall boundaries
    retrieval_policy: Use current eCFR and NHTSA sources first when suspected safety-related defects, noncompliance, VIN identity,
      or recall obligations materially change the safe answer.
    specialty_specific_exceptions:
    - Do not provide legal or regulator-facing conclusions from public sources alone; escalate to authorized safety, compliance,
      and legal owners.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public NHTSA, eCFR, IAOB, OEM CSR, and AIAG references define the baseline for automotive compliance controls, evidence
      handling, traceability, supplier escalation, and release-boundary posture.
    - Tenant facts about plant, customer, program, product family, jurisdiction, release authority, suspect-stock rules, customer-notification
      thresholds, supplier approval rules, and systems-of-record mappings are mandatory for case-specific conclusions.
    - Escalate whenever customer contracts, launch conditions, export rules, product-safety procedures, or internal quality
      manuals materially narrow or override the public baseline.
  specialty_specific_exceptions:
  - Keep the lane centered on compliance mapping, evidence handling, audit readiness, and escalation support, not final quality,
    engineering, supplier-approval, or regulator-facing authority.
  - Separate automotive compliance review from production planning, procurement execution, inventory allocation, supplier
    approval, logistics execution, and final disposition ownership.
  - Do not certify legal compliance, defect-reporting sufficiency, customer acceptance, or shipment readiness from public
    references alone.
