    authority_reason: NHTSA is the primary U.S. vehicle-safety regulator. Its EV safety page is an authoritative public baseline
      for EV-specific safety framing, including propulsion battery requirements and the warning that high-voltage systems
      should be serviced by qualified technicians with EV-specific training.
