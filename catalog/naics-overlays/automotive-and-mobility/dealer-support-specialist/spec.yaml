    source_type: consumer-protection-guidance
    location: https://www.ftc.gov/business-guidance/resources/businesspersons-guide-federal-warranty-law
    authority_reason: FTC business guidance is authoritative for the Magnuson-Moss Warranty Act baseline, including written
      warranty structure, dispute framing, and the reminder that state-law warranty rights and remedies can vary.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ecfr-16-cfr-part-701
    title: 16 CFR Part 701 - Disclosure of Written Consumer Product Warranty Terms and Conditions
    publisher: Electronic Code of Federal Regulations
    source_type: regulatory-standard
    location: https://www.ecfr.gov/current/title-16/chapter-I/subchapter-G/part-701
    authority_reason: The eCFR is the current public codification of FTC warranty rules. Part 701 is authoritative for covered
      products, remedy statements, term start, exclusions, and consumer obligations that must be visible in warranty support
      records.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
