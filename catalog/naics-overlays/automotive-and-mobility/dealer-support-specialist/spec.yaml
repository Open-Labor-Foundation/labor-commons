- procurement-specialist
- supplier-quality-specialist
- logistics-specialist
knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Public service, support, client-delivery, or customer-workflow guidance relevant to the lane
    rationale: Dealer support must stay grounded in actual warranty and service workflow evidence instead of generic support
      playbooks.
  - class: Public manufacturing, quality, or food-safety standards
    rationale: Automotive quality-management and warranty-management standards define the traceability, nonconformance, and
      corrective-action posture behind dealer support outputs.
  - class: Supplier, traceability, or inventory-control workflow guidance
    rationale: Supplier, materials-management, and traceability references define the authoritative records for parts genealogy,
      inventory state, and downstream containment.
  - class: Release, hold, or nonconformance operating references
    rationale: Recall, stop-sale, customer notification, and nonconformance references define when the lane must stop normal
      service handling and escalate.
  source_selection_approach: 'Use FTC warranty-law guidance and current eCFR warranty-disclosure rules as

    the public U.S. baseline for what warranty records and remedy descriptions

    must support. Use NHTSA recall and defect sources first when safety-related

    defect, stop-sale, campaign, or no-charge remedy boundaries matter. Use

    AIAG warranty, traceability, and materials-management references plus IATF

    public supplier-quality materials to ground warranty terminology,

    traceability, nonconformance, change-control, and supplier-boundary logic.

    Use current OEM public warranty guides only to sharpen workflow language

    and evidence expectations, never to generalize one brand''s private rules

    across all tenants. Tenant-specific dealer agreements, OEM portal logic,

    prior-approval matrices, claim coding, goodwill authority, and private

    customer-specific requirements must be supplied at runtime and are never

    guessed.

    '
  authority_sources:
