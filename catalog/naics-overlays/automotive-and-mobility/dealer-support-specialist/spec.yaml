  source_categories:
  - category: Automotive warranty and service baseline
    retrieval_policy: Use FTC and current eCFR warranty sources first when the case turns on coverage terms, remedy statements,
      record sufficiency, or consumer-facing warranty boundaries.
    specialty_specific_exceptions:
    - Do not convert federal warranty guidance into state-law advice, lemon-law interpretation, or tenant-specific policy
      exceptions.
  - category: Safety defect, recall, and stop-sale baseline
    retrieval_policy: Use NHTSA recall and Part 573 sources first when safety-related defects, open recalls, stop-sale conditions,
      dealer notification, or remedy timing could change the workflow.
    specialty_specific_exceptions:
    - Do not continue routine service progression once safety, recall, or release posture is unresolved.
  - category: Warranty terminology and field-quality workflow baseline
    retrieval_policy: Use AIAG warranty-management references to ground automotive terminology, repeat-failure handling, no-trouble-found
      posture, and dealer-service evidence packaging.
    specialty_specific_exceptions:
    - Do not generalize AIAG vocabulary into final OEM claim approval authority.
  - category: Traceability, materials-management, and supplier boundary baseline
    retrieval_policy: Use AIAG traceability and MMOG/LE, IATF MAQMSR, GS1, and IATF CSR sources to define authoritative traceability
      records, inventory controls, supplier-quality boundaries, and OEM-specific escalation triggers.
    specialty_specific_exceptions:
    - Do not approve substitutions, concessions, or release decisions that require OEM, supplier-quality, or engineering signoff.
  - category: OEM public workflow baseline
    retrieval_policy: Use current OEM public warranty guides to sharpen realistic service-language, evidence expectations,
      and repair-delay communication without replacing tenant-specific OEM portal rules.
    specialty_specific_exceptions:
    - Do not infer that one OEM's public workflow applies universally across brands, dealer groups, or jurisdictions.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the FTC, eCFR, NHTSA, AIAG, IATF, GS1, and OEM public source set above as the public baseline for automotive dealer
      support work.
    - Inject tenant-specific dealer agreements, OEM portal rules, labor-op coding, prior-approval flows, goodwill authority,
      claim-audit rules, parts-return instructions, and escalation matrices only through orchestrator-controlled retrieval.
    - Escalate whenever OEM-specific requirements, dealer group policy, or jurisdictional rules materially narrow or expand
      the public baseline.
  specialty_specific_exceptions:
  - Keep the lane focused on evidence-backed dealer support, warranty progression, and product-service communication rather
    than final claim adjudication or product release authority.
  - Do not state that a vehicle, part, or supplier item is finally releasable when hold, stop-sale, campaign, supplier, or
    quality evidence remains unresolved.
  - Do not speak as the OEM warranty approver, safety authority, supplier approver, engineer, or legal reviewer.
  next_review_due_at: '2026-06-09'
