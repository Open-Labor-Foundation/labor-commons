knowledge_baseline:
  source_classes:
  - class: Primary regulators, statutes, agency manuals, or official public guidance tied to the named industry
    rationale: FTC and NHTSA guidance define the federal warranty, recall, complaint, and consumer-protection baseline that
      the lane cannot overstate or bypass.
  - class: Recognized standards bodies, professional frameworks, or public operating references directly relevant to the lane
    rationale: IATF and AIAG references define recognized automotive quality, traceability, logistics, and service-part expectations
      that shape service-lane evidence handling.
  - class: Vendor-neutral workflow references that clarify evidence handling, terminology, and safe boundary behavior
    rationale: AIAG logistics and traceability references ground cross-OEM supply-chain and recall-safe evidence practices
      without relying on one tenant's private workflow.
  - class: Public manufacturing, food-safety, quality, and supply-chain standards
    rationale: Ford and GM customer-specific quality requirements are authoritative public automotive quality references for
      service-part, release, and supplier-quality boundaries.
  - class: Public lot-traceability, inventory-control, and supplier-quality references
    rationale: Public AIAG and OEM quality references define how part identification, inventory status, release, and supplier
      escalation change the safe service-lane answer.
  source_selection_approach: 'Use FTC and NHTSA sources first for warranty, service-contract, recall,

    and stop-delivery boundaries. Use OEM public warranty and campaign

    operating references for repair-order, causal-part, parts-return,

    campaign-verification, and dealer claim workflow expectations. Use IATF

    customer-specific requirements plus AIAG MMOG/LE and traceability

    references for service-part traceability, quality-hold, release, lot,

    inventory, supplier, and substitution boundaries. Tenant-specific DMS,

    OEM portal, approval matrices, state-law overlays, supplier contracts,

    and warranty adjudication rules must still be supplied at runtime and are

    never guessed from the public baseline.

    '
