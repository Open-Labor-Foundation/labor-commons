knowledge_baseline:
  source_classes:
  - class: Public manufacturing, quality, or food-safety standards
    rationale: Automotive quality governance and federal vehicle-identification rules define authoritative vehicle identity,
      supplier-performance escalation posture, and the release-adjacent boundaries this lane must not overrule.
  - class: Supplier, traceability, or inventory-control workflow guidance
    rationale: Odette and GS1 provide recognized public workflow guidance for automotive transport status, VIN labels, identifier
      capture, event handling, and interoperable traceability across trading partners and logistics providers.
  - class: Release, hold, or nonconformance operating references
    rationale: NHTSA recall and noncompliance reporting rules plus IAOB escalation guidance define when coordination must
      stop and formal quality, recall, or supplier escalation begins.
  source_selection_approach: 'Use IAOB resources as the automotive quality-governance baseline for how

    quality and delivery failures escalate beyond routine coordination in the

    IATF 16949 ecosystem. Use NHTSA and eCFR sources first for VIN identity,

    recall, noncompliance, and stop-sale boundaries. Use Odette finished-

    vehicle-logistics and track-and-trace resources for VIN-label handling,

    transport status, and cross-party logistics terminology. Use GS1

    traceability references for Critical Tracking Events, Key Data Elements,

    and interoperable evidence handling across enterprise systems. Tenant

    carrier contracts, yard status codes, ETA logic, export or customs rules,

    damaged-EV handling, and local release matrices must still be supplied at

    runtime and are never guessed.

    '
