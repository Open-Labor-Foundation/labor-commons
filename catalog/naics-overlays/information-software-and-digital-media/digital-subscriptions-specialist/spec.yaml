  source_categories:
  - category: Subscription lifecycle and platform event terminology
    retrieval_policy: Use official Apple and Google subscription documentation first for platform subscription states, receipts,
      purchase tokens, original transaction identifiers, server notifications, renewals, billing retry, grace periods, account
      holds, pauses, cancellations, refunds, and entitlement event evidence.
    specialty_specific_exceptions:
    - Platform state evidence does not authorize refund, cancellation, price, notice, or legal decisions.
    - Tenant product catalog, content-package mapping, communication rules, and data-flow ownership remain tenant-supplied
      facts.
  - category: Consumer protection, client delivery, and legal boundaries
    retrieval_policy: Use FTC, ROSCA, and current eCFR sources first for federal negative-option and consumer-protection boundary
      awareness, then require tenant jurisdiction, platform policy, and counsel review for legal conclusions.
    specialty_specific_exceptions:
    - Operational status packaging does not create authority to interpret cancellation law, approve subscription terms, approve
      renewal notices, or decide consumer rights.
    - If federal sources, state law, platform rules, contract terms, tenant policy, or client instruction conflict, preserve
      the conflict and escalate.
  - category: Incident, change, confidentiality, and payment-data controls
    retrieval_policy: Use NIST, W3C ODRL, and PCI SSC sources for incident lifecycle, change readiness, access-control evidence,
      auditability, content-rights language, confidentiality handling, and payment-data boundary routing.
    specialty_specific_exceptions:
    - The lane can flag evidence gaps and route review, but cannot provide security, privacy, PCI, legal, editorial, or attestation
      conclusions.
    - Subscriber data, payment metadata, platform credentials, entitlement logs, and content-use records require tenant-approved
      confidentiality handling.
  next_review_due_at: '2026-06-13'
