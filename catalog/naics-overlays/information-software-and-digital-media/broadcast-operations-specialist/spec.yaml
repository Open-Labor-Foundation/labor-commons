  source_categories:
  - category: Broadcast regulatory records and public-facing obligations
    retrieval_policy: Use current eCFR and FCC public-file guidance before advancing work that touches EAS, OPIF, sponsorship,
      political file, station-log, or public-facing evidence.
    specialty_specific_exceptions:
    - Do not decide legal sufficiency of EAS, OPIF, sponsorship, or political file records in-lane.
    - Block or escalate when regulatory record timing, retention, or upload rules are missing, stale, or contradicted by tenant
      policy.
  - category: Broadcast schedule, traffic, automation, and delivery workflow
    retrieval_policy: Use SMPTE BXF terminology, tenant traffic logs, automation playlists, as-run records, MAM records, AMWA
      delivery profile, and tenant closure criteria before moving work to ready, in-progress, or completed.
    specialty_specific_exceptions:
    - Missing traffic instructions, media IDs, kill dates, break placement, rights windows, QC results, or as-run records
      prevent completion.
  - category: Quality, confidentiality, rights, and professional boundaries
    retrieval_policy: Use ATSC A/85, TPN content-security posture, U.S. Copyright Office rights boundary, tenant confidentiality
      rules, and approval owner maps before preparing delivery or escalation language.
    specialty_specific_exceptions:
    - Requests to waive QC, expose pre-release content, clear rights, or approve professional judgment transfer to the designated
      owner.
