  source_categories:
  - category: Platform service management and reliability
    retrieval_policy: Use ISO/IEC 20000, ITIL, Google SRE, and NAICS sector definitions first for platform operations lifecycle,
      incident, service request, problem, change, release, monitoring, status, and reliability terminology.
    specialty_specific_exceptions:
    - Reliability or service-management terminology does not authorize production fixes, access grants, legal commitments,
      service credits, or final client acceptance.
    - Platform-specific state names, support tiers, SLOs, and service commitments remain tenant-supplied facts.
  - category: Incidents, access, configuration, and change readiness
    retrieval_policy: Use NIST SP 800-61, SP 800-128, and SP 800-53 first for incident lifecycle, access-control evidence,
      change control, impact analysis, test evidence, rollback planning, monitoring, and closeout discipline.
    specialty_specific_exceptions:
    - Operational status tracking does not create authority to approve security exceptions, access-control overrides, production
      engineering changes, or contractual commitments.
    - If public guidance, tenant policy, security controls, contract terms, and client instructions conflict, preserve the
      conflict and escalate.
  - category: Confidentiality, client commitments, and content workflow boundaries
    retrieval_policy: Use NIST Privacy Framework, FTC data-security guidance, AICPA trust services criteria, and Copyright
      Office Section 512 sources first for confidentiality, privacy, trust claims, data handling, and digital content workflow
      boundary triggers.
    specialty_specific_exceptions:
    - The lane can flag evidence gaps and route review, but cannot provide legal, privacy, editorial, security, contractual,
      or attestation conclusions.
    - Subscriber data, client files, operational logs, platform credentials, unpublished content, and client commitments require
      tenant-approved confidentiality and delivery handling.
  next_review_due_at: '2026-08-12'
