  source_categories:
  - category: Moderation workflow, notice, and appeal evidence
    retrieval_policy: Use DSA, DSA transparency database concepts, DMCA notice-and-counter-notice requirements, tenant policy,
      and moderation case records before deciding whether a case can advance or close.
    specialty_specific_exceptions:
    - Do not treat a reporter claim, automation label, or reviewer note as sufficient when required content, account, policy,
      notice, appeal, or action-log evidence is missing.
    - Do not publish a statement of reasons, complete a takedown, or restore content when the required authority owner or
      legal sufficiency review is outside lane scope.
  - category: Safety-critical, confidentiality, and restricted records
    retrieval_policy: Use U.S. child-safety reporting law, NCMEC workflow, UK online safety guidance, NIST privacy controls,
      and tenant confidentiality rules before handling harmful-content reports, user data, reporter identity, or moderation
      logs.
    specialty_specific_exceptions:
    - Escalate suspected CSAM, imminent harm, law-enforcement response, preservation, or regulated safety reporting through
      approved safety and legal owners.
    - Do not expose user data, claimant materials, reporter identity, reviewer notes, or moderation logs outside authorized
      tenant, jurisdiction, and confidentiality controls.
  - category: Trust and safety operations terminology
    retrieval_policy: Use DTSP and TSPA public trust and safety frameworks plus tenant terminology to preserve moderation-specific
      queue, QA, incident, appeal, policy, and change-readiness semantics.
    specialty_specific_exceptions:
    - Do not collapse content review, notice-and-action, appeals, QA sampling, classifier release readiness, and incident
      response into generic ticket handling.
    - Route policy design, editorial standards, legal compliance, public policy, law-enforcement response, privacy, security,
      engineering, quality, delivery, or account-owner work when ownership shifts.
  next_review_due_at: '2026-07-13'
workflow_model:
  lifecycle_states:
  - intake-received
  - blocked-missing-prerequisites
  - policy-and-records-ready
  - review-in-progress
  - action-prepared
  - appeal-or-qa-rework
  - incident-or-safety-escalated
  - system-dependency-blocked
  - approval-pending
  - completed-with-evidence
  - returned-to-orchestrator
  execution_steps:
  - Validate tenant policy scope, jurisdiction, product surface, confidentiality constraints, case priority, reviewer authority,
    and system access.
  - Confirm content, account, notice, appeal, enforcement history, report source, action log, QA, and communication records.
  - Classify the request as in-scope, out-of-scope, or blocked on missing prerequisites.
  - Prepare or progress in-scope moderation actions, appeal packets, QA rework, incident summaries, or change-readiness checks
    under tenant-approved rules.
  - Queue exceptions for missing evidence, broken tooling, conflicting policy, urgent harm, rights-sensitive claims, confidentiality
    conflicts, or approval gaps.
  - Prepare status, disposition, exception, incident, change-readiness, completion, and adjacent-lane handoff records with
    evidence links and lifecycle state.
  throughput_expectations:
  - Moderation queues should be worked by tenant priority, harm severity, appeal deadline, notice SLA, contractual commitment,
    and reviewer availability.
  - Exception queues must identify blocker, owner, source evidence gap, user or client impact, age, and next retrieval or
    approval step.
  - Completion records must remain reversible when later evidence, appeal outcome, legal instruction, QA finding, or system
    failure invalidates the disposition.
  record_of_truth_systems:
  - moderation console and trust and safety case system
  - content management system and asset store
  - policy repository and enforcement matrix
  - appeal and user-notice system
  - evidence repository and reviewer notes
  - quality assurance and sampling tools
  - ticketing, incident, and change-management systems
  - CRM, client communication, and approval logs
