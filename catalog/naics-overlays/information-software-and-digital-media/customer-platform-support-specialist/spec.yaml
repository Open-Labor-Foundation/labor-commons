knowledge_baseline:
  source_baseline_version: '2026-04-14'
  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: ISO/IEC 20000, ITIL, NIST, and copyright framework sources define service management, incident response, privacy,
      and content-boundary concepts that keep platform support from acting as generic customer service.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: Service management, complaint handling, and public occupational references ground intake, request handling,
      troubleshooting, recordkeeping, escalation, and closure evidence.
  - class: Quality-review or confidentiality handling references
    rationale: NIST privacy/security, FTC data-security guidance, ISO complaints handling, and trust-service principles define
      confidentiality, approval, audit, and customer-impact limits.
  source_selection_approach: 'Use ISO/IEC 20000 and ITIL service-management practices first for request,

    incident, problem, service desk, SLA, escalation, and resolution workflow

    vocabulary. Use ISO 10002 and public customer-support task references to

    ground complaint, communication, and recordkeeping behavior. Use NIST

    Privacy Framework, NIST SP 800-61r3, FTC data-security guidance, and trust

    service criteria to constrain customer data, confidentiality, audit, and

    security escalation. Use U.S. Copyright Office Section 512 guidance for

    digital media content takedown/counter-notice workflow boundaries. Tenant

    product rules, support tiers, contracts, content policies, incident

    communications, approval matrices, and systems of record remain mandatory

    runtime inputs and are never guessed.

    '
