  source_categories:
  - category: Service management and support workflow
    retrieval_policy: Use ISO/IEC 20000 and ITIL service-request guidance to structure intake, disposition, communication,
      escalation, and resolution evidence before closing a supported request.
    specialty_specific_exceptions:
    - Escalate when tenant service model, SLA, approval rule, or source-of-truth precedence is missing or conflicts with support
      records.
  - category: Connectivity delivery, ordering, and activation evidence
    retrieval_policy: Use TM Forum, MEF, and Open-IX sources to normalize service-order, trouble-ticket, cross-connect, interconnection,
      and activation-test artifacts before stating status.
    specialty_specific_exceptions:
    - Do not claim turn-up, cross-connect completion, or service restoration without tenant-required order, test, telemetry,
      and customer-confirmation evidence.
  - category: Confidentiality, availability, incident, and regulatory boundaries
    retrieval_policy: Use NIST, AICPA Trust Services Criteria, and FCC/eCFR references to identify confidentiality, incident-response,
      outage-reporting, and authorized-signoff boundaries before customer communication.
    specialty_specific_exceptions:
    - Escalate 911/988, regulated outage, security incident, privacy, legal, and customer-rights questions to authorized owners.
