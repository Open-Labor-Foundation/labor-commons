knowledge_baseline:
  source_baseline_version: '2026-04-14'
  next_review_due_at: '2026-07-13'
  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: Recognized IT service-management, cybersecurity, interconnection, and service activation frameworks define
      workflow terminology, support boundaries, and evidence-backed service resolution behavior.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: Public service-order, trouble-ticket, activation-test, and interconnection references ground service delivery
      in tickets, orders, tests, and customer or provider handoff artifacts.
  - class: Quality-review or confidentiality handling references
    rationale: Availability, confidentiality, incident-response, outage reporting, and legally authorized submission references
      constrain support communications and signoff boundaries.
  source_selection_approach: 'Use ISO/IEC 20000, ITIL, TM Forum Open APIs, MEF service activation

    testing, Open-IX OIX-2, NIST SP 800-61 Rev. 3, AICPA Trust Services

    Criteria, and FCC/eCFR outage reporting rules before drafting workflow

    claims. Treat tenant service model, contract terms, facility procedures,

    customer commitments, jurisdiction, systems of record, and approval matrix

    as runtime retrieval dependencies.

    '
