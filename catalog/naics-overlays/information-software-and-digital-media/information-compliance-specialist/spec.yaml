  source_categories:
  - category: Software, security, and service control frameworks
    retrieval_policy: Use NIST CSF, NIST SP 800-53, NIST SP 800-218, NIST SP 800-61, NIST SP 800-128, CISA Secure by Design,
      and CSA CCM before making software, SaaS, incident, release, vulnerability, configuration, audit-log, or cloud-control
      workflow claims.
    specialty_specific_exceptions:
    - The lane maps controls and evidence, but it cannot certify security posture, approve engineering changes, accept risk,
      or produce attestation conclusions.
    - If framework scope, product scope, data classification, cloud responsibility, or tenant policy materially changes the
      answer, hold the control and escalate.
  - category: Privacy, personal information, and subscriber data handling
    retrieval_policy: Use FTC personal-information guidance and tenant privacy sources when work touches collection, use,
      retention, access, vendor handling, incident response, consent, preference, data-subject, subscriber, or child-directed
      service records.
    specialty_specific_exceptions:
    - The lane can flag privacy evidence gaps and route issues, but it cannot provide privacy-law interpretation or approve
      data-use posture.
    - Jurisdiction, age-audience, product, and tenant source hierarchy must be retrieved before anything more than a safe
      hold or evidence request.
  - category: Digital content, rights, accessibility, and client delivery
    retrieval_policy: Use W3C WCAG, U.S. Copyright Office Section 512, tenant content policies, client commitments, SOW terms,
      quality standards, and approved delivery rules when work touches content assets, publication, moderation, accessibility
      evidence, takedown files, rights records, client files, deliverables, or approved-recipient constraints.
    specialty_specific_exceptions:
    - The lane cannot approve editorial content, accessibility legal sufficiency, copyright legal posture, takedown legal
      strategy, client commitments, or final acceptance.
    - Confidential materials, subscriber records, source files, rights records, takedown files, and client deliverables must
      remain inside approved engagement, recipient, channel, purpose, and tenant-security rules.
  next_review_due_at: '2026-07-13'
