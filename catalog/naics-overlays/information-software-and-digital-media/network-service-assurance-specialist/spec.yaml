knowledge_baseline:
  source_baseline_version: '2026-04-14'
  next_review_due_at: '2026-07-13'
  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: Service-management, quality-management, QoS, and risk frameworks define assurance terminology, service quality
      objectives, evidence discipline, and escalation behavior.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: Public service-test, service-problem, alarm, activation-test, and delivery references ground assurance work
      in tickets, tests, incidents, records, and review artifacts.
  - class: Quality-review or confidentiality handling references
    rationale: Availability, confidentiality, processing integrity, incident-response, and outage-reporting references constrain
      assurance findings, customer communication, signoff, and disclosure.
  source_selection_approach: 'Use ISO/IEC 20000 service-management discipline, ITU-T QoS terminology,

    TM Forum service test/problem/alarm workflow references, MEF service

    activation testing, NIST incident-response guidance, AICPA Trust Services

    Criteria, and 47 CFR Part 4 outage-reporting rules before drafting network

    service assurance claims. Treat tenant service model, contract terms,

    system-of-record precedence, customer commitments, jurisdiction,

    confidentiality controls, and approval matrix as runtime prerequisites.

    '
  authority_sources:
  - source_id: iso-iec-20000-1-2018
    title: ISO/IEC 20000-1:2018 Information technology - Service management
    publisher: International Organization for Standardization / International Electrotechnical Commission
    source_type: Professional standards or recognized public frameworks
    location: https://www.iso.org/standard/70636.html
    authority_reason: International service-management system standard used to ground incident, service request, service-level,
      change, supplier, and continual-improvement controls for network service assurance.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: itu-t-e-800
    title: 'ITU-T E.800: Definitions of terms related to quality of service'
    publisher: International Telecommunication Union
    source_type: Professional standards or recognized public frameworks
    location: https://www.itu.int/rec/t-rec-e.800
    authority_reason: ITU-T is the recognized telecommunications standards body; E.800 is directly authoritative for QoS terminology
      used in network service assurance claims.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: tmforum-tmf653-service-test-management
    title: TMF653 Service Test Management API
    publisher: TM Forum
    source_type: Client-delivery, documentation, or engagement workflow guidance
    location: https://github.com/tmforum-apis/TMF653_ServiceTestManagement
    authority_reason: TM Forum Open APIs are recognized telecom and digital-service interface standards; service test management
      defines service-test evidence and result handling used by assurance workflows.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: tmforum-tmfc043-fault-management
    title: TMFC043 Fault Management component
    publisher: TM Forum
    source_type: Client-delivery, documentation, or engagement workflow guidance
    location: https://www.tmforum.org/oda/directory/components-map/production/TMFC043
    authority_reason: TM Forum's ODA component directory defines vendor-neutral fault management capabilities for alarm lifecycle,
      correlation, and operational assurance handoffs.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: tmforum-tmf656-service-problem-management
    title: TMF656 Service Problem Management API
    publisher: TM Forum
    source_type: Client-delivery, documentation, or engagement workflow guidance
    location: https://github.com/tmforum-apis/TMF656_ServiceProblem
    authority_reason: TM Forum service problem records are directly relevant to repeat defect, unresolved service problem,
      incident, and corrective-action escalation packages.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: mef-48-1-service-activation-testing
    title: MEF 48.1 Ethernet Service Activation Testing
    publisher: Mplify Alliance / MEF
    source_type: Client-delivery, documentation, or engagement workflow guidance
    location: https://www.mplify.net/resources/mef-48-1-ethernet-service-activation-testing/
    authority_reason: MEF is a recognized network-service standards body; MEF 48.1 defines service activation testing, performance
      verification, and SAT records before service delivery.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nist-sp-800-61r3
    title: SP 800-61 Rev. 3, Incident Response Recommendations and Considerations for Cybersecurity Risk Management
    publisher: National Institute of Standards and Technology
    source_type: Quality-review or confidentiality handling references
    location: https://csrc.nist.gov/pubs/sp/800/61/r3/final
    authority_reason: Official NIST incident-response publication that constrains preparation, detection, response, recovery,
      information sharing, and escalation when assurance work intersects incident response.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: aicpa-trust-services-criteria
    title: Trust Services Criteria for Security, Availability, Processing Integrity, Confidentiality, and Privacy
    publisher: American Institute of Certified Public Accountants
    source_type: Quality-review or confidentiality handling references
    location: https://www.aicpa-cima.com/resources/download/2017-trust-services-criteria-with-revised-points-of-focus-2022
    authority_reason: Recognized service-organization control criteria for availability, confidentiality, processing integrity,
      privacy, and security commitments that inform assurance evidence and customer commitment boundaries.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ecfr-47-cfr-part-4
    title: 47 CFR Part 4 - Disruptions to Communications
    publisher: Electronic Code of Federal Regulations / Federal Communications Commission
    source_type: Quality-review or confidentiality handling references
    location: https://www.ecfr.gov/current/title-47/chapter-I/subchapter-A/part-4
    authority_reason: Primary U.S. communications outage-reporting regulation used to identify reportability and authorized-submission
      escalation boundaries, not lane-owned filing authority.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: Service management and QoS assurance baseline
    retrieval_policy: Use ISO/IEC 20000 and ITU-T QoS terminology to structure assurance status, service-level context, control
      objectives, and quality evidence before recommending hold, release, investigation, or corrective action.
    specialty_specific_exceptions:
    - Escalate when tenant SLA/SLO definitions, service model, quality standards, or source-of-truth precedence are missing
      or conflict with operational records.
  - category: Service test, fault, problem, and activation evidence
    retrieval_policy: Use TM Forum and MEF references to normalize service-test, alarm, problem, activation-test, SAT record,
      and service delivery artifacts before clearing findings or release gates.
    specialty_specific_exceptions:
    - Do not clear holds, release services, close incidents, or close nonconformance records without tenant-required ticket,
      telemetry, test, review, approval, and customer-impact evidence.
  - category: Confidentiality, incident, and regulatory boundaries
    retrieval_policy: Use NIST, AICPA Trust Services Criteria, and FCC/eCFR references to identify confidentiality, incident-response,
      outage-reporting, authorized-signoff, and customer-communication limits.
    specialty_specific_exceptions:
    - Escalate security incident, privacy, regulated outage, 911/988, legal, editorial, contractual, customer-rights, and
      formal QA decisions to authorized owners.
