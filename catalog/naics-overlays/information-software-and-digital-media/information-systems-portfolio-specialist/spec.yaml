knowledge_baseline:
  source_baseline_version: '2026-04-14'
  next_review_due_at: '2026-07-13'
  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: Portfolio management, IT governance, software lifecycle, and risk-management standards define terminology,
      planning stages, decision surfaces, and authority boundaries for information systems portfolios.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: Public lifecycle, service-management, and technology business management references ground portfolio work in
      demand records, delivery artifacts, evidence, cost/resource allocation, and documentation discipline.
  - class: Quality-review or confidentiality handling references
    rationale: Security, confidentiality, privacy, availability, processing integrity, and information-resource management
      references constrain communications, review, signoff, and escalation behavior.
  source_selection_approach: 'Use ISO 21504 portfolio management, ISO/IEC 38500 IT governance,

    ISO/IEC/IEEE 12207 software life cycle processes, PMI portfolio management,

    ISACA COBIT, NIST RMF, OMB Circular A-130, AICPA Trust Services Criteria,

    TBM Council taxonomy, and NAICS Sector 51 before drafting workflow claims.

    Treat tenant portfolio records, client commitments, approval matrix,

    confidentiality rules, and systems-of-record retrieval hooks as runtime

    dependencies that narrow the public baseline.

    '
