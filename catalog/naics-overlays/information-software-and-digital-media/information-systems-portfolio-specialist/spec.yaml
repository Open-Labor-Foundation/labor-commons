  source_categories:
  - category: Portfolio governance and prioritization
    retrieval_policy: Use portfolio, IT governance, COBIT, and PMI/ISO guidance to frame recommendation-only allocation and
      escalation before ranking demand.
    specialty_specific_exceptions:
    - Do not infer final portfolio, funding, or roadmap approval from governance frameworks.
  - category: Lifecycle, delivery, and documentation
    retrieval_policy: Use software lifecycle, RMF, TBM, service catalog, workpaper, engagement, and delivery records to validate
      evidence and dependency maps.
    specialty_specific_exceptions:
    - Do not convert lifecycle or cost-allocation references into execution, procurement, release, or finance authority.
  - category: Quality, confidentiality, and control handling
    retrieval_policy: Use OMB, NIST controls, and AICPA TSC for confidentiality, privacy, availability, quality-review, approval,
      and signoff boundaries.
    specialty_specific_exceptions:
    - Escalate when tenant policy, client commitment, content rights, or legal/regulatory interpretation determines the answer.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define baseline terminology and evidence discipline; tenant systems and approval rules decide final priorities
      and authority.
    - Refuse deterministic scheduling or allocation when source-of-truth records, priority policy, or approval ownership are
      missing or conflicting.
    - Do not output final approval, legal, editorial, product, contractual, security, attestation, or financial decisions.
