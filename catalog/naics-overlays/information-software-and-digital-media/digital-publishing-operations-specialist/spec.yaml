  source_categories:
  - category: Digital publication package and web accessibility standards
    retrieval_policy: Use W3C EPUB, EPUB Accessibility, and WCAG sources first when a request touches EPUB packages, manifests,
      reading order, accessibility metadata, web content accessibility, or accessibility evidence.
    specialty_specific_exceptions:
    - Operational accessibility checks do not authorize formal conformance certification or legal accessibility advice.
    - Missing or conflicting accessibility evidence holds the workflow for QA, accessibility, or legal review.
  - category: Metadata, DOI, and publishing supply-chain workflow
    retrieval_policy: Use ONIX, BISG, Crossref, and NISO JATS sources first when content metadata, ISBN or DOI records, article
      XML, product feeds, landing pages, and partner delivery evidence govern the workflow.
    specialty_specific_exceptions:
    - Metadata operations may package evidence and identify gaps but may not claim rights-to-register, legal ownership, final
      editorial approval, or contractual acceptance.
    - Conflicting metadata records across CMS, DAM, DOI, ONIX, JATS, and partner systems require escalation.
  - category: News exchange, copyright, confidentiality, and change controls
    retrieval_policy: Use IPTC, U.S. Copyright Office, and NIST sources first when news package exchange, rights metadata,
      takedown routing, access, incident, change-readiness, rollback, or interface dependencies materially affect publishing
      operations.
    specialty_specific_exceptions:
    - DMCA, copyright, security, access, and change-control questions are routed to designated authority owners when facts
      are incomplete or judgment is required.
    - A system change without test, rollback, access, security, approval, and owner evidence remains an exception state.
  next_review_due_at: '2026-08-12'
