  source_categories:
  - category: Ad-tech standards and interface terminology
    retrieval_policy: Use IAB Tech Lab OpenRTB, VAST, sellers.json, SupplyChain Object, ads.txt/app-ads.txt, and GPP sources
      first for interface, tag, video, supply-chain, and privacy-signal terminology.
    specialty_specific_exceptions:
    - Technical conformance does not authorize launch or completion if tenant approval, testing, rollback, confidentiality,
      or client evidence is missing.
    - Platform-specific rules remain tenant-supplied facts and must be escalated when they conflict with public standards.
  - category: Client delivery, incidents, and change readiness
    retrieval_policy: Use IAB/4A's terms for digital advertising delivery obligations and NIST incident and configuration-management
      sources for incident lifecycle, access prerequisites, change control, impact analysis, testing, rollback, and closeout
      evidence.
    specialty_specific_exceptions:
    - Operational status tracking does not create authority to approve service credits, makegoods, production engineering
      changes, access exceptions, or contractual commitments.
    - If client instructions, contract terms, tenant policy, security controls, and public guidance conflict, preserve the
      conflict and escalate.
  - category: Measurement quality, confidentiality, and regulated boundaries
    retrieval_policy: Use MRC, NIST SP 800-53, FTC, NAI, and IAB GPP sources first for IVT, measurement evidence, confidentiality,
      access control, privacy signals, regulated advertising, and data-use boundaries.
    specialty_specific_exceptions:
    - The lane can flag evidence gaps and route review, but cannot provide legal, privacy, security, or attestation conclusions.
    - Audience-data, consumer-choice, access-control, or regulated-claim questions require the correct owner when tenant facts
      are incomplete.
  next_review_due_at: '2026-08-12'
