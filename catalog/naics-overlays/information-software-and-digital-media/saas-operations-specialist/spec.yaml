knowledge_baseline:
  source_baseline_version: '2026-04-14'
  next_review_due_at: '2026-07-13'
  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: Recognized IT service-management, cybersecurity, cloud-control, trust-service, and interconnection frameworks
      define SaaS operations terminology, execution controls, evidence expectations, and support boundaries.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: Service-order, trouble-ticket, activation-test, notice workflow, and industry classification references ground
      execution in orders, tickets, tests, content workflow records, delivery artifacts, and customer handoffs.
  - class: Quality-review or confidentiality handling references
    rationale: Privacy, confidentiality, availability, incident-response, personal-information handling, content-rights, outage,
      and trust-service references constrain communications, approvals, signoff, and closure evidence.
  source_selection_approach: 'Use NAICS 2022 for the named industry boundary around software, web

    hosting, cloud, data processing, and streaming support. Use ISO/IEC 20000

    and ITIL for service-management lifecycle, service request, incident,

    change, service-level, supplier, knowledge, and completion discipline. Use

    TM Forum and MEF references for service-order, trouble-ticket, connectivity,

    and activation-test artifacts. Use NIST, CSA CCM, AICPA Trust Services

    Criteria, FTC guidance, U.S. Copyright Office Section 512 resources, and

    FCC/eCFR outage rules to constrain confidentiality, privacy, availability,

    content, security, outage, and signoff boundaries. Tenant service model,

    contracts, system mappings, approvals, quality standards, runbooks, and

    confidentiality rules remain required runtime inputs and are never guessed.

    '
