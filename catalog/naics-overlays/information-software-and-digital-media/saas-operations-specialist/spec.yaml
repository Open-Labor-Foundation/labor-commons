  source_categories:
  - category: SaaS operations execution and fulfillment
    retrieval_policy: Use ISO/IEC 20000 and ITIL to structure lifecycle state, service request, incident, change, fulfillment,
      communication, and completion-evidence handling.
    specialty_specific_exceptions:
    - Escalate when tenant service model, change window, quality gate, approval rule, or source-of-truth precedence is missing
      or conflicts with work records.
  - category: Hosted-service, colocation, and connectivity artifacts
    retrieval_policy: Use NAICS, TM Forum, and MEF sources to normalize service-order, trouble-ticket, activation-test, hosted-service,
      cloud, web-hosting, streaming-support, and connectivity evidence.
    specialty_specific_exceptions:
    - Do not claim activation, restoration, turn-up, or completion without tenant-required order, test, telemetry, change,
      approval, and customer-confirmation evidence.
  - category: Confidentiality, control, content, and authority boundaries
    retrieval_policy: Use NIST, CSA, AICPA, FTC, Copyright Office, and FCC/eCFR sources to identify privacy, confidentiality,
      security, content, outage, availability, and contractual-claim boundaries before communication or closure.
    specialty_specific_exceptions:
    - Escalate regulated outage, content rights, data disclosure, security incident, service credit, customer-rights, and
      professional-judgment questions to authorized owners.
