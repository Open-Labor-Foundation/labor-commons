  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: ISO/IEC/IEEE measurement process, SEC KPI guidance, W3C provenance standards, and MRC digital measurement standards
      define measurement, metric definition, disclosure, provenance, and digital audience terminology for the lane.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: W3C data publication and metadata practices plus tenant engagement and delivery records anchor source documentation,
      versioning, source lineage, usage feedback, and delivery artifacts for analytics work.
  - class: Quality-review or confidentiality handling references
    rationale: W3C DQV, NIST privacy and security controls, FTC personal-information guidance, FTC claim guidance, and MRC
      quality controls constrain data quality, privacy, confidentiality, measurement caveats, and refusal behavior.
  source_categories:
  - category: metric definition, measurement, and disclosure discipline
    retrieval_policy: Use ISO/IEC/IEEE 15939, SEC KPI guidance, MRC measurement standards, metric dictionaries, and tenant
      source-precedence rules before presenting product, subscriber, content, funnel, experiment, retention, churn, engagement,
      or benchmark metrics.
    specialty_specific_exceptions:
    - Do not publish or imply certainty when denominator logic, exclusions, source hierarchy, refresh state, metric changes,
      or audience caveats are unresolved.
    - Disclosure-style outputs require the tenant disclosure or approval owner before publication.
  - category: source lineage, metadata, and data-quality handling
    retrieval_policy: Use W3C Data on the Web Best Practices, W3C PROV-O, W3C DQV, and tenant lineage records before treating
      analytic extracts, warehouse tables, dashboards, or derived metrics as source-supported.
    specialty_specific_exceptions:
    - Do not collapse conflicting telemetry, warehouse, billing, entitlement, CRM, support, CMS, experiment, or dashboard
      records into a single metric without a reconciliation note.
    - Tenant-specific metric adaptations must preserve baseline definitions and historical comparability notes.
  - category: privacy, confidentiality, claim, and authority boundaries
    retrieval_policy: Use NIST Privacy Framework, NIST SP 800-53, FTC personal-information guidance, FTC advertising guidance,
      and tenant confidentiality and approval policy before sharing restricted data or making product-performance claims.
    specialty_specific_exceptions:
    - The lane can flag evidence gaps and disclosure risk, but cannot provide legal, privacy, editorial, security, contractual,
      financial, or attestation conclusions.
    - Client rights, content rights, subscriber privacy, regulated claims, minor-user data, or professional judgment require
      the correct owner when tenant facts are incomplete.
  next_review_due_at: '2026-08-12'
