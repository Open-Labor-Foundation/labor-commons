    location: https://www.cms.gov/medicare/provider-enrollment-and-certification/surveycertificationgeninfo/policy-and-memos-to-states-and-regions-items/cms1256388
    authority_reason: CMS is the primary federal authority for Medicare participation and outpatient hospital requirements.
      This guidance is directly relevant to ambulatory scheduling because it defines who may order or refer hospital outpatient
      services and under what written hospital policy and scope conditions.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
