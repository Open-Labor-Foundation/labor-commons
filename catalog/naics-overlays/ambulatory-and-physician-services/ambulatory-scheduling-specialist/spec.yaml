    publisher: Agency for Healthcare Research and Quality
    source_type: recognized-workflow-reference
    location: https://www.ahrq.gov/cahps/quality-improvement/improvement-guide/6-strategies-for-improving/access/strategy6g-rapid-referral.html
    authority_reason: AHRQ's rapid-referral guidance is a direct public ambulatory workflow reference for how physician offices
      reduce lost-to-follow-up referral delays, manage handoffs, and make specialist access more timely.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
