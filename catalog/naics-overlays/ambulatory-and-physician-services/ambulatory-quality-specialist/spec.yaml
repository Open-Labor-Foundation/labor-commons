  source_categories:
  - category: asc regulatory and survey baseline
    retrieval_policy: Use 42 CFR Part 416, CMS ASC certification materials, Appendix L, and ASCQR guidance first for ambulatory
      surgery questions involving Conditions for Coverage, QAPI, survey readiness, infection control, medical records, and
      quality reporting.
    specialty_specific_exceptions:
    - Do not convert CMS survey guidance into final survey-agency, accreditor, or reopening authority for the lane.
  - category: physician and clinic quality reporting baseline
    retrieval_policy: Use QPP quality requirements and current eCQM update materials first when the question turns on reporting
      year, measure logic, denominator and exclusion handling, chart abstraction, eCQM output, or submission prerequisites
      for physician practices.
    specialty_specific_exceptions:
    - Do not infer measure eligibility, denominator closure, or final submission authority without the tenant's actual reporting
      program and current reporting year.
  - category: ambulatory patient safety and infection-prevention controls
    retrieval_policy: Use AHRQ ambulatory safety-culture and ASC safety toolkit materials first when the work involves incident
      review, communication, teamwork, infection-prevention controls, or outpatient procedure safety.
    specialty_specific_exceptions:
    - Do not convert safety-culture or toolkit guidance into direct clinical decision-making or reportable-event legal interpretation.
  - category: ambulatory patient-experience evidence
    retrieval_policy: Use CAHPS Clinician & Group and OAS CAHPS materials first when the request involves patient-experience
      evidence, survey interpretation, follow-up ownership, or outpatient communication trends.
    specialty_specific_exceptions:
    - Do not treat patient-experience survey signals as standalone proof of clinical appropriateness or final disciplinary
      action.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public CMS and AHRQ ambulatory sources define the baseline for outpatient quality reporting, survey evidence, patient-safety
      review, infection-prevention expectations, and patient-experience workflows.
    - Tenant facts about service setting, jurisdiction, accreditor, reporting year, quality program enrollment, reportable-event
      rules, final submission owners, and systems-of-record mappings are mandatory before case-specific conclusions.
    - Escalate when state law, accreditor standards, payer-program rules, and tenant policy materially change whether a finding
      can close, a hold can lift, or a reporting package can be submitted.
  specialty_specific_exceptions:
  - Keep the lane centered on ambulatory quality evidence review and escalation, not clinical decision-making, peer review
    discipline, or final survey or reporting signoff.
  - Separate physician-practice measure support from final analytics certification, coding ownership, revenue impact decisions,
    or executive attestation.
  - Do not certify legal reportability, clinical safety disposition, or accreditor compliance from public references alone.
  source_baseline_version: '2026-04-10'
  next_review_due_at: '2026-07-09'
