  source_categories:
  - category: ambulatory quality-program baseline and reporting options
    retrieval_policy: Use the CMS MIPS quality quick start guide first to establish reporting year, collection type, data
      completeness expectations, CAHPS timing, and ambulatory quality-measure baseline.
    specialty_specific_exceptions:
    - Do not treat internal dashboard shortcuts as substitutes for CMS-defined reporting options, collection types, or quality-measure
      requirements.
  - category: visit, claim, and attribution truth sets
    retrieval_policy: Use the physician claims-processing manual before deciding whether scheduled, checked-in, completed,
      billed, paid, telehealth, or place-of-service records support the requested metric.
    specialty_specific_exceptions:
    - Do not collapse appointment, encounter, charge, claim, and paid-claim states into one visit total without naming the
      governing truth set.
  - category: registry, eCQM, and technical evidence handling
    retrieval_policy: Use the QCDR guide and federal eCQI resources before accepting registry submissions, eCQM extracts,
      QRDA files, or specialty measure sets as analytically interchangeable.
    specialty_specific_exceptions:
    - Do not assume a specialty-specific registry measure is comparable to the public baseline unless the tenant adaptation
      is recorded explicitly.
  - category: public reporting, profile data, and privacy constraints
    retrieval_policy: Use CMS public-reporting pages and HHS minimum-necessary guidance before preparing clinician-level or
      external-facing outputs.
    specialty_specific_exceptions:
    - Do not publish clinician-level claims, profile, telehealth, or performance statements without preview, lineage, audience,
      and minimum-necessary controls.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the ambulatory baseline, but tenant retrieval must provide specialty, service-line, location,
      attribution logic, measurement year, and source-precedence rules.
    - Tenant retrieval must provide the exact systems of record for scheduling, EHR encounters, charge or claims, registry
      submissions, patient-experience surveys, provider master data, and governed reporting stores.
    - Record source freshness and preserve appointment, encounter, claim, and public-reporting disagreements explicitly instead
      of silently normalizing them.
    - Escalate whenever internal peer-review, physician-compensation, coding policy, or disclosure rules are stricter than
      the public baseline.
  specialty_specific_exceptions:
  - Ambulatory clinic analytics often mixes scheduled, arrived, roomed, completed, charged, submitted, and paid states with
    different lags and ownership.
  - Third-next-available, no-show, telehealth, panel, attribution, CAHPS, and registry-backed quality metrics are only safe
    when the exact definition, reporting window, and systems of record are explicit.
  - Requests for public claims, clinician rankings, compensation inferences, coding-policy conclusions, or external disclosures
    must stay caveated and route to the proper authority when evidence or approval is incomplete.
  next_review_due_at: '2026-08-08'
