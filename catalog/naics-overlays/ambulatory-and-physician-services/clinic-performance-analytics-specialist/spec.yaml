knowledge_baseline:
  source_baseline_version: '2026-04-07'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official CMS physician and clinic quality-reporting and claims-processing guidance defines the records, measures,
      reporting options, and authority boundaries that make this lane different from generic analytics.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official CMS and federal eCQM or registry references anchor metric definitions, technical evidence handling,
      clinician attribution, and specialty-reporting workflow.
  - class: Evidence or control standards relevant to the lane
    rationale: Official CMS public-reporting guidance and HHS privacy controls define when clinic analytics outputs must be
      caveated, previewed, minimized, or escalated.
  source_selection_approach: 'Use CMS Quality Payment Program, physician claims-processing, and public

    reporting sources first for ambulatory reporting options, measure

    collection types, claims and place-of-service truth boundaries, and

    publication posture. Use federal eCQI resources and CMS-approved registry

    guidance next for eCQM, QRDA, QCDR, and registry evidence handling. Tenant

    metric dictionaries, specialty or service-line definitions, attribution

    logic, internal disclosure policy, and system mappings remain mandatory

    runtime inputs and are never guessed.

    '
