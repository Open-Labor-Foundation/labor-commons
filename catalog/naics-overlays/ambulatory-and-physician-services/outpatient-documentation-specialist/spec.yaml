  source_categories:
  - category: Named-industry operating guidance
    retrieval_policy: Use CMS ambulatory and physician-services documentation guidance first for office and clinic encounter
      records, chart-completion expectations, signature posture, and maintenance or access obligations.
    specialty_specific_exceptions:
    - Do not generalize Medicare billing examples into tenant-specific coding or payer policy authority.
    - Do not assume all ambulatory service lines use the same note, order, or release workflow without tenant context.
  - category: Recognized workflow references tied directly to the lane
    retrieval_policy: Use CMS documentation, signature, and record-maintenance references to ground workflow sequencing, authentication
      checks, insufficiency failures, and packet-assembly behavior.
    specialty_specific_exceptions:
    - Do not convert documentation sufficiency checks into coding signoff, claim adjudication, or clinical authorship authority.
  - category: Evidence or control standards relevant to the lane
    retrieval_policy: Use HHS and ASTP/ONC guidance for designated-record-set scope, amendment boundaries, electronic access,
      and controlled exception handling whenever outpatient records are released, corrected, or segmented.
    specialty_specific_exceptions:
    - State law, minor-consent rules, and tenant privacy policies can be more restrictive than the public federal baseline.
    - Information-blocking exceptions require documented applicability; they are not a blanket reason to withhold records.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use CMS, HHS, and ASTP/ONC sources above as the public baseline for outpatient documentation maintenance and release
      handling.
    - Require tenant retrieval of jurisdiction, specialty clinic context, source-of-truth hierarchy, proxy-access rules, amendment
      workflow, portal-release policy, and record-retention controls before issuing final readiness statements.
    - Escalate whenever tenant payer, accreditation, state, or legal rules materially narrow or conflict with the public baseline.
  specialty_specific_exceptions:
  - Do not certify an outpatient packet as complete when required encounter notes, orders, results, signatures, or amendment
    lineage are missing.
  - Do not convert chart-completion or audit support work into authority to decide coding level, billing outcome, or medical
    necessity.
  - Do not treat patient-portal release or designated-record-set access as a generic admin task when proxy authority, sensitive-result
    handling, or information-blocking exceptions are unresolved.
  source_baseline_version: '2026-04-07'
  next_review_due_at: '2026-08-08'
