knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: AHRQ ambulatory referral guidance and eReferral implementation materials define how outpatient clinics structure
      referral intake, reviewer triage, specialty access, pre-workup completion, and referral-loop closure.
  - class: Recognized workflow references tied directly to the lane
    rationale: ASTP or ONC interoperability references define referral request, status, outcome, and referral-note data structures
      that make ambulatory referral management materially different from generic scheduling.
  - class: Evidence or control standards relevant to the lane
    rationale: CMS prior-authorization policy and HHS privacy guidance define what authorization, disclosure, and sensitive-record
      handling may be treated as sufficient before referral work proceeds.
  source_selection_approach: 'Use AHRQ ambulatory referral guidance first to anchor referral intake,

    specialist reviewer workflow, pre-visit workup expectations, and loop

    closure in outpatient settings. Use ASTP or ONC interoperability references

    to define referral artifacts, request-status terminology, and summary

    record expectations. Use CMS prior-authorization guidance and HHS privacy

    rules for authorization dependencies, sensitive-record handling, and

    refusal posture. Require tenant retrieval for payer contract details, state

    direct-access or self-referral rules, specialty-specific scheduling

    templates, referral aging policy, overbook authority, and system-of-record

    ownership.

    '
