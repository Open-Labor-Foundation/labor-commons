  source_categories:
  - category: ambulatory-referral-operating-workflow
    retrieval_policy: Use AHRQ referral sources first for outpatient referral review, pre-visit workup completeness, specialist
      reviewer workflow, and referral-loop closure.
    specialty_specific_exceptions:
    - Do not turn AHRQ workflow guidance into final clinical urgency or medical-necessity decisions.
    - Tenant specialty prerequisites and payer contracts override generalized outpatient assumptions.
  - category: referral-artifacts-and-status-standards
    retrieval_policy: Use ASTP or ONC ISA and USCDI references for referral request, status, outcome, and summary-record artifacts.
    specialty_specific_exceptions:
    - Interoperability references define artifacts and status expectations, not final scheduling approval authority.
  - category: authorization-and-privacy-controls
    retrieval_policy: Use CMS prior-authorization guidance and HHS privacy guidance for payer dependency, disclosure, and
      sensitive-record controls.
    specialty_specific_exceptions:
    - Do not infer contract-specific authorization sufficiency or state-law disclosure posture without tenant retrieval.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to AHRQ, ASTP or ONC, CMS, and HHS sources for the public ambulatory referral baseline.
    - Tenant retrieval must provide jurisdiction, payer mix, referral aging policy, direct-access or self-referral posture,
      overbook authority, specialty-specific prerequisites, and systems-of-record ownership.
    - Escalate when payer, specialty, or state-specific rules materially change whether the referral can be scheduled, routed,
      or disclosed.
  specialty_specific_exceptions:
  - This lane coordinates referral readiness and planning; it does not become the clinician, utilization reviewer, or final
    approver.
  - Ambulatory and physician services require explicit handling of referral orders, PCP attribution, specialist-template constraints,
    pre-visit workup, and consult-closure artifacts rather than generic appointment scheduling logic.
  - Sensitive behavioral-health or SUD referral packets can trigger stricter disclosure controls and must not be normalized
    into routine outbound scheduling behavior.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-08'
