  source_categories:
  - category: ambulatory scheduling and appointment access
    retrieval_policy: Use the AHRQ ambulatory care improvement guide and the open-access scheduling strategy first when the
      case turns on appointment capacity, urgent-versus-routine access, no-show loops, or schedule-readiness controls.
    specialty_specific_exceptions:
    - Do not convert scheduling guidance into symptom triage or care-priority decisions that belong to licensed clinical owners.
  - category: referral intake and authorization workflow
    retrieval_policy: Use the AHRQ rapid-referral guidance and CMS prior-authorization final rule first when the case depends
      on referral completeness, specialty handoff ownership, authorization packet content, decision timing, or denial-reason
      handling.
    specialty_specific_exceptions:
    - Do not treat CMS prior-authorization process expectations as permission to decide payer coverage, medical necessity,
      or appeal strategy.
  - category: transitions of care and consult-document exchange
    retrieval_policy: Use AHRQ transitions-of-care materials and ONC transitions-of-care or referral-note guidance first when
      the workflow depends on exchangeable summaries, consult notes, discharge handoffs, or outside-record receipt.
    specialty_specific_exceptions:
    - Do not imply clinical acceptance of a transition or consult simply because a document was exchanged; clinical review
      remains outside this lane.
  - category: privacy and physician-practice controls
    retrieval_policy: Use HHS HIPAA provider guidance and HHS OIG physician-practice compliance guidance first when access,
      disclosure, documentation integrity, auditability, or closure controls are in question.
    specialty_specific_exceptions:
    - Do not disclose or route more protected information than the workflow requires, and do not infer privacy-law conclusions
      when tenant or jurisdiction-specific rules materially change the answer.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant-specific payer rules, specialty service-line requirements, scheduling-template logic, state referral rules,
      result-routing rules, and EHR or referral-platform configuration only through orchestrator-controlled retrieval.
    - Require clinic or specialty context, jurisdiction, payer or program context, current lifecycle state, and authoritative
      systems-of-record map whenever those facts could change the answer.
    - Record unresolved ambiguity instead of guessing when payer policy, state requirements, or tenant workflow materially
      change the result.
    - Escalate when public baseline guidance is narrower or broader than tenant policy, payer contract, or state-specific
      ambulatory requirements.
  specialty_specific_exceptions:
  - Keep the lane on ambulatory operations administration, evidence sufficiency, owner tracking, and queue control rather
    than clinical or licensed care decisions.
  - Treat referral orders, authorization records, scheduling templates, consult notes, visit summaries, discharge or transition
    summaries, and outreach logs as named records rather than generic notes.
  - Do not collapse ambulatory clinic operations into generic scheduling or customer-support behavior; authorization, referral,
    EHR, and privacy constraints materially change the workflow.
  - Do not assume one specialty clinic's scheduling, prior-authorization, or follow-up path governs another clinic without
    retrieved tenant policy and service-line context.
  next_review_due_at: '2026-08-08'
