knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Named-industry operating guidance
    rationale: CMS professional-claims and place-of-service guidance defines the claim forms, settings, provider billing facts,
      and claim-support expectations that govern medical-office revenue work.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official remittance, claim-status, operating-rule, and Medicare-appeal references translate billing and posting
      rules into concrete workflow stages, status handling, and escalation points.
  - class: Evidence or control standards relevant to the lane
    rationale: Official compliance, documentation, privacy, and physician-practice control guidance constrains what evidence
      is sufficient and when escalation is mandatory.
  source_selection_approach: 'Use CMS professional-claims, remittance, claim-status, denial, and

    documentation guidance plus HHS OCR privacy guidance and OIG physician

    practice compliance guidance before drafting workflow claims. Treat tenant

    payer contracts, MAC bulletins, state Medicaid manuals, provider

    enrollment status, fee schedules, approval matrices, and system-of-record

    precedence as runtime retrieval dependencies that narrow but do not replace

    the public baseline.

    '
  authority_sources:
