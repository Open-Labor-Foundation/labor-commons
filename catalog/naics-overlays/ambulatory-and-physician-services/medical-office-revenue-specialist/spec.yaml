    authority_reason: This HHS OCR guidance is authoritative for limiting PHI access and disclosure in payment and operations
      workflows, which directly constrains what a medical-office revenue specialist may request, view, and share.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: professional-claim origination and submission baseline
    retrieval_policy: Use CMS-1500, 837P, and place-of-service guidance first when the work involves physician-office charge
      support, claim formation, provider billing identity, or filing posture.
    specialty_specific_exceptions:
    - Do not use the Medicare professional-claim baseline to guess commercial or Medicaid plan-specific edits, filing windows,
      or coverage rules that have not been retrieved.
  - category: status, remittance, and denial workflow control
    retrieval_policy: Use CMS remittance, companion-guide, CAQH CORE, and redetermination workflow references before drafting
      claim-status, ERA, posting, reconciliation, or denial-escalation claims.
    specialty_specific_exceptions:
    - Do not assume that a claim-status response, ERA code, or payer portal note authorizes a financial correction unless
      the supporting records and tenant approvals are present.
  - category: documentation, compliance, and privacy boundaries
    retrieval_policy: Use CMS compliance, OIG physician-practice guidance, and HHS OCR minimum-necessary guidance before approving
      documentation sufficiency, override requests, or PHI access.
    specialty_specific_exceptions:
    - Do not convert documentation-control or privacy guidance into coding, clinical, or legal determinations that belong
      to adjacent lanes.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant payer contracts, MAC articles, state Medicaid manuals, provider enrollment status, approval thresholds,
      and system-of-record precedence only through orchestrator-controlled retrieval.
    - Require payer, place of service, rendering and billing provider, source documentation path, and requested financial
      action before applying public guidance to a specific case.
    - Record unresolved ambiguity instead of guessing when Medicare, Medicare Advantage, Medicaid, commercial, or tenant-specific
      rules materially change the answer.
  specialty_specific_exceptions:
  - Keep the lane focused on medical-office revenue evidence handling, CMS-1500 or 837P readiness, remittance posting, reconciliation,
    and escalation packaging rather than generic bookkeeping or payer-policy interpretation.
  - Separate operational revenue handling from diagnosis or procedure coding, medical-necessity review, formal appeal filing,
    accounting signoff, refund approval, legal interpretation, and privacy approval authority.
  - Do not imply that a claim or adjustment is supportable solely because one system agrees if the EHR, practice-management,
    clearinghouse, remittance, or patient-ledger records materially conflict.
  - Do not treat the ambulatory-and-physician-services overlay as cosmetic; office, telehealth, urgent-care, and hospital-based
    outpatient claim contexts can require materially different records and owners.
  next_review_due_at: '2026-08-08'
