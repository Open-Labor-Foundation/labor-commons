    authority_reason: This official CMS billing booklet directly governs professional-claim form use, electronic 837P submission
      expectations, place-of-service handling, filing deadlines, and documentation dependencies for physician-office revenue
      workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
