  source_categories:
  - category: ambulatory prior-authorization operating baseline
    retrieval_policy: Use CMS outpatient and physician-facing prior-authorization guidance first to determine what records,
      request facts, and statuses control intake acceptance, pending, or rejection.
    specialty_specific_exceptions:
    - Do not treat a Medicare operational example as universal commercial or Medicaid payer policy; require tenant payer overlays
      before final payer-specific claims.
  - category: documentation and transaction workflow
    retrieval_policy: Use CMS DRLS, WISeR public guidance, and CAQH CORE operating rules to identify expected attachments,
      submission routes, acknowledgements, and record-traceability posture.
    specialty_specific_exceptions:
    - Recognized workflow rules inform transport and evidence discipline but do not override payer contract terms or plan-specific
      medical policies.
  - category: privacy and evidence control
    retrieval_policy: Use HHS minimum-necessary guidance and CMS electronic-prior-auth controls when deciding what PHI, denial
      reasons, and documentation metadata may be requested, shared, or treated as sufficient.
    specialty_specific_exceptions:
    - Escalate privacy-law interpretation or disclosure disputes instead of inferring a permitted use from workflow ownership.
  - category: physician-practice terminology and operating context
    retrieval_policy: Use recognized physician-practice workflow references to keep terminology, handoffs, and queue outputs
      grounded in ambulatory and physician-service operations rather than generic call-center language.
    specialty_specific_exceptions:
    - Do not convert a professional-body workflow recommendation into a payer determination rule without primary-source support.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the public baseline above to constrain intake acceptance, documentation sufficiency, submission channels, privacy
      posture, and escalation logic.
    - Require tenant retrieval of payer mix, state or program rules, covered-service lists, site-of-service conventions, referral
      policies, turnaround expectations, and system-of-record precedence before finalizing disposition.
    - Escalate when tenant or payer policy changes required coding, attachments, urgency handling, or whether prior authorization
      is required.
  specialty_specific_exceptions:
  - Do not treat ambulatory prior-authorization work like generic customer-service intake; service codes, site of service,
    ordering context, and payer-specific evidence materially change the output.
  - Do not assume that possession of clinical records gives the lane authority to determine medical necessity or approve treatment.
  - Do not let scheduling pressure bypass referral or prior-auth prerequisites.
  - Do not promise retro-authorization or post-service claim outcomes from an intake lane.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-10-07'
