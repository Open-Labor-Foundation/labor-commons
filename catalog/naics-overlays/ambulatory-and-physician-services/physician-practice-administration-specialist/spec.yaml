  source_categories:
  - category: Named-industry operating guidance
    retrieval_policy: Use CMS enrollment and PECOS sources plus OIG physician-practice compliance guidance first when the
      request depends on physician roster, practice location, reassignment, managing-control, or billing-agency artifacts.
    specialty_specific_exceptions:
    - Do not treat PECOS or CMS enrollment presence as final credentialing, privileging, or payer-network approval.
    - Escalate when MAC, payer, or state requirements change the update path or evidence set.
  - category: Recognized workflow references tied directly to the lane
    retrieval_policy: Use the CMS reassignment bulletin and AHRQ clinic workflow guide to ground session-readiness, document
      routing, turnaround expectations, and handoff sequence.
    specialty_specific_exceptions:
    - Do not convert workflow references into clinical scheduling approval or patient-care decision authority.
  - category: Evidence or control standards relevant to the lane
    retrieval_policy: Use HHS HIPAA access and privacy-notice guidance plus NPPES data standards for records-access, notice-posting,
      directory publication, and practice-location data controls.
    specialty_specific_exceptions:
    - NPI presence or NPPES publication does not prove licensure, credentialing, or billing readiness.
    - HIPAA access and notice rules do not authorize the lane to release records without tenant-confirmed workflow and owner
      approval.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the CMS, HHS, OIG, and AHRQ sources above as the public baseline for physician-practice administration work.
    - Require tenant retrieval of jurisdiction, source-of-truth hierarchy, roster publication policy, delegated-official authority,
      privacy workflow, and practice-management identifiers whenever those facts could change the outcome.
    - Escalate when public baseline guidance is narrower or broader than tenant policy, payer directory rules, state law,
      or physician-group operating requirements.
  specialty_specific_exceptions:
  - Keep the lane on administrative readiness, record completeness, publication posture, document routing, and traceability
    rather than on clinical, credentialing, billing, or legal ownership.
  - Treat PECOS, NPPES, practice-location, reassignment, records-custody, privacy-notice, and external-document-routing artifacts
    as required physician-practice controls rather than generic office files.
  - Do not certify a physician-practice event or location as ready when location data, practitioner assignment, records-custody,
    privacy posting, or document-routing facts are missing.
  - Do not infer legal or compliance sufficiency from a complete-looking admin packet when disclosure authority, payer rules,
    or state retention requirements remain unresolved.
  next_review_due_at: '2026-05-10'
type: agent_definition
