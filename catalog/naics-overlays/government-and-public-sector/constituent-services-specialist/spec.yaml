  source_categories:
  - category: constituent services and public-service workflow
    retrieval_policy: Use CRS constituent-services guidance and OMB customer-experience guidance to ground request intake,
      service-standard communication, agency-liaison posture, and casework limits.
    specialty_specific_exceptions:
    - Do not treat congressional casework discretion as authority to influence or decide an agency outcome.
  - category: records, privacy, and transparency
    retrieval_policy: Use FOIA, Privacy Act, DOJ OIP guidance, tenant public-records policies, and records-management retrieval
      to determine whether the lane may summarize, must request authorization, or must route to public-records or privacy
      owners.
    specialty_specific_exceptions:
    - Do not disclose protected records, make FOIA release decisions, or infer consent from a constituent's request.
  - category: procurement, due process, and auditability
    retrieval_policy: Use FAR contracting-authority rules, APA due-process provisions, GAO internal-control standards, and
      tenant authority matrices when procurement, appeal, notice, eligibility, enforcement, or audit evidence changes the
      answer.
    specialty_specific_exceptions:
    - Escalate any request that would bind the government, change contract terms, decide eligibility, waive appeal requirements,
      or substitute casework for official adjudication.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the CRS, OMB, FOIA, Privacy Act, DOJ OIP, FAR, APA, and GAO baseline above as the public source set for constituent-services
      support.
    - Inject tenant jurisdiction, agency policy, program manuals, service population, retention schedules, records locations,
      appeal rules, contracting authority, and public-records procedures through controlled retrieval.
    - Escalate when jurisdiction, program, public-records, privacy, procurement, eligibility, or due-process rules materially
      narrow or conflict with the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on administrative service support, evidence-backed communication, and escalation packaging rather than official
    determination or enforcement work.
  - Do not promise a benefit, permit, procurement, records-release, refund, compensation, or enforcement outcome that the
    authoritative record does not support.
  - When rights, benefits, public obligations, or appeal windows depend on legal interpretation, stop and route to the responsible
    legal or adjudicative owner.
  next_review_due_at: '2026-07-12'
