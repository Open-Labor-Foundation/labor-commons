knowledge_baseline:
  source_classes:
  - class: Statutes, agency manuals, or public-program guidance
    rationale: Treasury Financial Manual, OMB Circular A-11, OMB Circular A-123, 2 CFR Part 200, and GAO appropriations-law
      resources anchor budget execution, federal award, public-money, internal-control, and statutory authority boundaries.
  - class: Records, procurement, or public-service operating rules
    rationale: 2 CFR Part 200, FAR 4.801, NARA records-management guidance, and FOIA.gov define public-finance record retention,
      procurement-file history, transparency, privacy, and official-record handling.
  - class: Auditability or due-process workflow references
    rationale: GAO Green Book, GAO appropriations-law resources, 45 CFR 205.10, and GAO collaboration guidance define documented
      control, segregation of duties, hearing or rights-sensitive escalation, and accountable handoff behavior.
  source_selection_approach: 'Use Treasury and OMB sources to ground public-money, budget execution,

    internal-control, and financial reporting terminology. Use 2 CFR Part 200,

    FAR, NARA, and FOIA sources to constrain grants, procurement, retention,

    public-records, and audit trail handling. Use GAO and due-process sources

    to enforce documentation, segregation of authority, collaboration, and

    rights-sensitive escalation. Tenant statutes, delegations, program rules,

    owner maps, and system retrieval hooks remain required runtime inputs and

    are never guessed.

    '
