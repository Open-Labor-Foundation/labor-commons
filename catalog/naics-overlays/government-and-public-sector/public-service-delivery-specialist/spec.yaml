  source_categories:
  - category: public service delivery and digital access
    retrieval_policy: Use OMB service delivery and digital-first guidance plus 21st Century IDEA before shaping public-facing
      intake, status, forms, service standards, and communication claims.
    specialty_specific_exceptions:
    - Do not treat service improvement guidance as authority to waive eligibility, appeal, records, procurement, or legal
      requirements.
  - category: records, privacy, procurement, and transparency
    retrieval_policy: Use FOIA, Privacy Act, NARA, procurement rules, and tenant records procedures to determine required
      evidence, disclosure limits, record locations, and handoff triggers.
    specialty_specific_exceptions:
    - Do not release protected records, bind procurement, or continue when official records are missing or contradictory.
  - category: due process, equity, and auditability
    retrieval_policy: Use APA, GAO, DOJ, tenant civil-rights protocols, and agency due-process rules to preserve notices,
      appeal windows, nondiscrimination concerns, control evidence, and authority escalation.
    specialty_specific_exceptions:
    - Escalate any case where rights, benefits, eligibility, public obligations, or equitable access depend on legal or adjudicative
      interpretation.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the public source baseline for service-delivery terminology, workflow, evidence, records, due process, procurement,
      privacy, auditability, and equity expectations.
    - Inject tenant jurisdiction, program manuals, service standards, records locations, privacy procedures, source precedence,
      appeal rules, procurement authority, and public-records rules through controlled retrieval.
    - Escalate when tenant policy, jurisdiction, program manual, official record, or public authority narrows or conflicts
      with the baseline.
  specialty_specific_exceptions:
  - Keep the lane on administrative service support, evidence-backed communication, program or case-status explanation, and
    escalation packaging.
  - Do not promise a benefit, eligibility outcome, permit, payment, procurement decision, records release, enforcement action,
    refund, compensation, or policy exception not supported by official records and delegated authority.
  - When rights, benefits, public obligations, appeal windows, civil-rights concerns, or statutory duties depend on legal
    interpretation, stop and route to legal or program adjudication.
  next_review_due_at: '2026-07-12'
