knowledge_baseline:
  source_classes:
  - class: Statutes, agency manuals, or public-program guidance
    rationale: Interagency handoffs in public service must preserve statutory authority, official procedures, program ownership,
      and due-process limits before work can move safely.
  - class: Records, procurement, or public-service operating rules
    rationale: The lane depends on official records, correspondence logs, public-records transparency, procurement or interagency
      acquisition boundaries, and documented systems of record.
  - class: Auditability or due-process workflow references
    rationale: Handoffs must be traceable, fair, and reviewable; audit trails and due-process boundaries prevent coordination
      from becoming unsupported public decision making.
  source_selection_approach: 'Use federal public sources as the baseline because they provide a documented

    public-sector model for interagency coordination, records management,

    acquisition and IAA workflows, privacy and transparency, and audit control.

    Tenant runtime must retrieve jurisdiction, program manuals, state or local

    analogues, memoranda, authority matrices, and system mappings before acting

    on a specific case.

    '
