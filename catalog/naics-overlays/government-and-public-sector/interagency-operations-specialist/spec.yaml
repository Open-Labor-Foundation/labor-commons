materialization:
  olf_agent_pa_requirements:
    required_task_metadata:
    - workflow type, public program, jurisdiction, current owner, receiving owner, requested outcome, deadline, and authority
      basis
    - handoff rule, source records, required artifacts, system-of-record links, privacy basis, and audit-log references
    - adjacent specialist routing map and orchestrator return conditions
    runtime_retrieval_dependencies:
    - tenant policy and public program manual
    - MOU or interagency agreement terms
    - case-management, document-management, correspondence, records, procurement, IAA, and audit-system retrieval hooks
    - authority matrix, records schedule, privacy and disclosure rules, and closure confirmation rules
    regulated_lane_caveats:
    - The runtime may package evidence and route work but cannot adjudicate benefits, enforce laws, issue legal opinions,
      disclose records, award procurements, obligate funds, or approve policy exceptions.
    - Rights-sensitive, eligibility-sensitive, public-records, procurement, fiscal, or due-process ambiguity requires human
      authority owner review.
    refusal_or_orchestrator_return_conditions:
    - Required official records, referral authority, privacy basis, receiving-owner confirmation, or audit trail are missing.
    - Statutes, policies, MOUs, records rules, or jurisdictional authorities conflict materially.
    - The request asks for official adjudication, enforcement, procurement, disclosure, legal, fiscal, safety-critical, licensed,
      or policy-override authority.
