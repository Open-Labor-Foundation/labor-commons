  source_categories:
  - category: grant lifecycle and award administration
    retrieval_policy: Use Uniform Guidance, Grants.gov lifecycle guidance, NOFO, Notice of Award, and tenant agency policy
      before generating workflow claims.
    specialty_specific_exceptions:
    - Do not infer eligibility or award authority from generic applicant categories.
    - Do not treat pre-award completeness as selection, scoring, or award decision authority.
  - category: records, reporting, and public access
    retrieval_policy: Use Uniform Guidance record access and retention rules, NARA schedules, FOIA/public-records policy,
      and tenant retention overlays.
    specialty_specific_exceptions:
    - Escalate protected PII, sensitive information, public-record disclosure, and retention conflicts.
  - category: auditability and due process
    retrieval_policy: Use Uniform Guidance remedies, opportunities to object, GAO Green Book, and OMB Compliance Supplement
      for audit trail and exception handling.
    specialty_specific_exceptions:
    - Do not decide remedies, audit opinions, suspension, termination, or appeal outcomes.
