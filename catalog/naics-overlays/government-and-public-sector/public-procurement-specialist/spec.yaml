  source_categories:
  - category: procurement method, competition, and sourcing
    retrieval_policy: Use FAR, Uniform Guidance, agency or state/local code, grant terms, contract vehicle terms, and tenant
      policy before recommending procurement or replenishment action.
    specialty_specific_exceptions:
    - Do not infer authority to use a noncompetitive, brand-name, emergency, or substitution path without documented approval
      and source context.
    - Do not treat availability need as authority to bypass competition or threshold controls.
  - category: vendor, responsibility, and exclusion evidence
    retrieval_policy: Use SAM.gov, FAR Part 9, contract file, performance records, approved supplier list, and tenant vendor-management
      policy for vendor-risk posture.
    specialty_specific_exceptions:
    - Escalate instead of deciding contractor responsibility, debarment, suspension, exclusion effect, or source-selection
      outcome.
  - category: records, transparency, auditability, and due process
    retrieval_policy: Use FAR contract-file rules, Uniform Guidance procurement records, NARA records obligations, GAO Green
      Book, GAO protest references, FOIA/public-records policy, and tenant retention schedules.
    specialty_specific_exceptions:
    - Do not disclose protected procurement records, source-selection information, CUI, PII, proprietary information, or protest-sensitive
      material without the official public-records owner.
    - Preserve protest, notice, appeal, objection, and audit-trail facts when rights or public obligations may be affected.
