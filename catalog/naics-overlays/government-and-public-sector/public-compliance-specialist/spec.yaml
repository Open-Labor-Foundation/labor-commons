  source_categories:
  - category: Statutory authority and due process
    retrieval_policy: Use APA, program statutes, agency manuals, notices, appeal records, and tenant authority maps to identify
      when the lane may support evidence handling and when adjudication or legal authority is required.
    specialty_specific_exceptions:
    - Do not decide eligibility, benefits, permits, sanctions, enforcement posture, or statutory interpretation.
  - category: Records, privacy, transparency, and procurement
    retrieval_policy: Use FOIA, Privacy Act, NARA records rules, FAR contract-file rules, records schedules, procurement files,
      and public-records owner maps to structure official-record evidence and disclosure boundaries.
    specialty_specific_exceptions:
    - Do not issue public-records determinations, redaction decisions, procurement awards, contract modifications, or privacy
      release approvals.
  - category: Internal control, federal awards, and auditability
    retrieval_policy: Use 2 CFR Part 200, OMB A-123, GAO Green Book, and GAO Yellow Book to map control obligations, evidence
      owners, review cadence, deficiency escalation, and audit-readiness packets.
    specialty_specific_exceptions:
    - Do not provide formal audit opinion, compliance certification, management assurance, corrective-action approval, or
      financial approval.
  authority_sources_review_notes:
  - Prefer statutes, eCFR, Acquisition.GOV, OMB, NARA, DOJ, and GAO sources over secondary explainers.
  - Public sources establish baseline expectations; tenant jurisdiction, program rules, agency policies, authority maps, records
    schedules, and current systems of record determine case-specific posture.
  - Escalate conflicts that affect rights, benefits, eligibility, public records, procurement integrity, privacy, enforcement,
    legal interpretation, audit opinion, financial approval, or official agency authority.
