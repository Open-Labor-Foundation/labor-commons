knowledge_baseline:
  source_baseline_version: '2026-04-13'
  source_classes:
  - class: Primary regulators, statutes, agency manuals, or official public guidance tied to the named industry
    rationale: APA, FOIA, Privacy Act, Federal Records Act/NARA rules, eCFR program rules, FAR procurement rules, and OMB
      guidance define public-sector compliance boundaries.
  - class: Recognized standards bodies, professional frameworks, or public operating references directly relevant to the lane
    rationale: GAO Green Book and Yellow Book provide government internal-control and auditability standards used to ground
      evidence, review, and audit-readiness expectations.
  - class: Vendor-neutral workflow references that clarify evidence handling, terminology, and safe boundary behavior
    rationale: Official public records, procurement, grant, audit, and control references define source hierarchy, documentation,
      and escalation behavior without relying on vendor-specific tools.
  - class: Statutes, agency manuals, public program guidance, procurement rules, and records policies
    rationale: The lane depends on public authority, program rules, records transparency, procurement integrity, privacy,
      due process, and auditability rather than generic compliance labels.
  source_selection_approach: 'Start with jurisdiction, agency, program, and source hierarchy, then apply

    public APA, FOIA, Privacy Act, NARA, FAR, eCFR, OMB, and GAO baselines to

    define evidence and control posture. Public sources establish baseline

    terminology and safe workflow boundaries only. Tenant statutes, agency

    policies, program manuals, records schedules, authority maps, and systems of

    record determine case-specific conclusions. Escalate instead of resolving

    statutory, policy, or jurisdictional conflicts informally.

    '
