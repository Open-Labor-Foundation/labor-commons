knowledge_baseline:
  source_baseline_version: '2026-04-13'
  source_classes:
  - class: Statutes, agency manuals, or public-program guidance
    rationale: OMB, eCFR, and U.S. Code materials define information quality, open data, performance, information collection,
      and federal award reporting obligations that constrain public data reporting.
  - class: Records, procurement, or public-service operating rules
    rationale: NARA, DOJ FOIA, FAR, Privacy Act, and public records rules define the official record set, disclosure limits,
      procurement documentation, and release boundaries.
  - class: Auditability or due-process workflow references
    rationale: GAO, OMB, and administrative procedure references define internal control, audit evidence, documentation, and
      fairness boundaries that prevent unsupported or over-authoritative reporting.
  source_selection_approach: 'Use primary statutes, official federal policy, agency manuals, and recognized

    government auditing standards first. Tenant jurisdiction, program authority,

    state or local public records law, agency policy, publication signoff, and

    system-of-record access remain mandatory before case-specific reporting or

    disclosure output is safe.

    '
