  source_categories:
  - category: Public metric, reporting, and open data obligations
    retrieval_policy: Use OMB M-19-23, OMB M-19-15, Circular A-11, Federal Data Strategy resources, and tenant metric dictionaries
      first for metric definition, quality, publication cadence, and source-lineage expectations.
    specialty_specific_exceptions:
    - Do not turn information quality or performance guidance into final policy interpretation or publication signoff.
    - Do not publish a metric when numerator, denominator, population, exclusions, reporting period, or source hierarchy is
      disputed.
  - category: Official records, public disclosure, privacy, and procurement records
    retrieval_policy: Use NARA records policy, DOJ FOIA guidance, Privacy Act references, FAR Part 4, and tenant public records
      rules to determine official record dependencies and disclosure-risk escalation.
    specialty_specific_exceptions:
    - Do not decide whether a record must be released, withheld, redacted, or disclosed.
    - Do not bypass procurement file, retention, privacy, or public records owner review.
  - category: Auditability, controls, grants, and due-process constraints
    retrieval_policy: Use 2 CFR Part 200, GAO Green Book, GAO Yellow Book, APA references, and tenant due-process procedures
      to preserve evidence, internal controls, rights-sensitive handling, and audit trails.
    specialty_specific_exceptions:
    - Do not issue audit findings, adjudicate eligibility, or resolve rights-sensitive exceptions.
    - Do not collapse source conflicts when an official reviewer must resolve them.
  next_review_due_at: '2026-07-12'
