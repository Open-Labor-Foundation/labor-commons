  source_categories:
  - category: statutory licensing and permit authority
    retrieval_policy: Use APA licensing definitions and agency or jurisdiction-specific statutes before any licensing or permit
      workflow conclusion.
    specialty_specific_exceptions:
    - Do not infer issuance, denial, suspension, revocation, or enforcement authority from administrative support scope.
  - category: official records and transparency
    retrieval_policy: Use NARA and tenant records rules to verify case file capture, metadata, correspondence, retention,
      public-records handling, and audit trail traceability.
    specialty_specific_exceptions:
    - Missing official records, public-records rules, retention schedules, or record owners block readiness claims.
  - category: procurement and system dependency
    retrieval_policy: Use procurement rules and tenant procurement files when permit systems, outsourced review services,
      vendors, or contract records affect the lane.
    specialty_specific_exceptions:
    - Do not approve vendor selections, procurement protests, contract changes, or financial commitments.
  - category: auditability, due process, and public-service equity
    retrieval_policy: Use GAO, OMB, APA, and DOJ sources to require control evidence, owner accountability, notices, appeal/hearing
      routing, nondiscrimination escalation, and unresolved ambiguity capture.
    specialty_specific_exceptions:
    - Escalate any case where rights, benefits, eligibility, public obligations, or nondiscrimination requirements depend
      on legal interpretation.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to statutory and official public-program sources before standards or secondary explanations.
    - Tenant retrieval must provide jurisdiction, program, agency policy, official case file, source precedence, record locations,
      systems of record, and delegated authority before case-specific support proceeds.
    - Record source conflicts and jurisdictional variation as ambiguity; do not guess when an official public-service decision
      could change.
  specialty_specific_exceptions:
  - This lane prepares evidence-backed administrative support; it does not become the agency decision maker.
  - Licensing and permit outputs must preserve application, case file, notice, hearing, appeal, inspection, procurement, public-records,
    and audit-trail context.
  - Rights-sensitive and due-process exceptions require escalation even when the operational record appears complete.
  next_review_due_at: '2026-10-13'
