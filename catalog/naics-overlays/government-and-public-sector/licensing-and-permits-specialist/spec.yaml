knowledge_baseline:
  source_baseline_version: '2026-04-13'
  source_classes:
  - class: Statutes, agency manuals, or public-program guidance
    rationale: Administrative Procedure Act licensing provisions and public permitting guidance establish the baseline vocabulary
      for licenses, permits, adjudication, notices, and authorization workflow support.
  - class: Records, procurement, or public-service operating rules
    rationale: NARA records requirements, eCFR procurement standards, and public records/transparency rules define the records
      that must exist before licensing and permit support can be auditable and fair.
  - class: Auditability or due-process workflow references
    rationale: GAO internal-control standards, OMB A-123, APA notice rules, and DOJ Title VI guidance constrain evidence sufficiency,
      control documentation, equity, and escalation when public rights or obligations are affected.
  source_selection_approach: 'Use statutes and official public-program guidance first to anchor license,

    permit, adjudication, and public-service terminology. Use NARA, eCFR, GAO,

    OMB, and DOJ references to define records, procurement, auditability,

    internal control, transparency, and equity expectations. Public sources are

    baselines only. Tenant-specific jurisdiction, program, statute, case record,

    current agency policy, and delegated authority determine whether a concrete

    request can proceed.

    '
