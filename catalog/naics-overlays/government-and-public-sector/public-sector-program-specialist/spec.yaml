  source_categories:
  - category: public program workflow and service delivery
    retrieval_policy: Use OMB service-delivery guidance, tenant program manuals, program statutes, public guidance, service
      standards, and official program records before producing workflow claims.
    specialty_specific_exceptions:
    - Do not infer eligibility, participation rights, program priority, or official status from generic roster or service
      language.
  - category: records, transparency, privacy, and procurement
    retrieval_policy: Use NARA, FOIA, Privacy Act, FAR, 2 CFR Part 200, and tenant records schedules or procurement policies
      when the request touches official records, disclosure, retention, or procurement documents.
    specialty_specific_exceptions:
    - Escalate disclosure, retention, protected information, contract-file sufficiency, and official-record disposition questions
      outside lane authority.
  - category: auditability and due process
    retrieval_policy: Use GAO internal-control standards, APA provisions, 45 CFR hearing references, 2 CFR remedies/hearing
      provisions, and tenant authority matrices for audit trails, notices, appeal windows, segregation of duties, and owner-state
      controls.
    specialty_specific_exceptions:
    - Do not decide hearings, appeals, sanctions, remedies, audit findings, legal interpretation, or enforcement posture.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the public baseline above to constrain administrative program support.
    - Inject tenant jurisdiction, program statute, agency policy, service population, public-records rules, privacy rules,
      retention schedules, procurement procedures, authority maps, owner maps, and systems of record through controlled retrieval.
    - Escalate when tenant sources narrow or conflict with the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on administrative maintenance, evidence packaging, status tracking, and routing rather than official decisions.
  - Do not promise a benefit, permit, roster, procurement, enforcement, public-records, privacy, audit, or legal outcome that
    the authoritative record does not support.
  - When rights, benefits, obligations, eligibility, appeal windows, or public duties depend on legal interpretation, stop
    and route to the responsible legal or adjudicative owner.
  next_review_due_at: '2026-07-12'
