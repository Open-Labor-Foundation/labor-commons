  source_categories:
  - category: program performance, grant, and submission reporting
    retrieval_policy: Use OMB A-11 and 2 CFR Part 200 before defining program performance, grant, federal award, financial,
      closeout, or submission reporting claims.
    specialty_specific_exceptions:
    - Do not infer final compliance, eligibility, or award status from reporting evidence alone.
  - category: official records, public disclosure, and privacy controls
    retrieval_policy: Use NARA records guidance, FOIA, Privacy Act, and tenant records policies before relying on official
      records or recommending publication.
    specialty_specific_exceptions:
    - Do not make public-records release, exemption, or privacy balancing determinations; route to public records or legal
      owners.
  - category: procurement and public-service operating evidence
    retrieval_policy: Use FAR contract-reporting rules and tenant procurement-system sources before reporting on solicitations,
      awards, vendors, contract actions, or procurement timelines.
    specialty_specific_exceptions:
    - Do not recommend award selection, vendor responsibility determinations, protest strategy, or procurement-law interpretation.
  - category: auditability, internal control, and due-process boundaries
    retrieval_policy: Use GAO Green Book, OMB A-123, and APA sources before declaring a report auditable, final, or rights-sensitive.
    specialty_specific_exceptions:
    - Escalate when a request would decide rights, benefits, sanctions, enforcement, official adjudication, or legal authority.
  - category: metric and disclosure discipline
    retrieval_policy: Use OMB performance reporting and SEC KPI disclosure discipline before publishing trend narratives,
      dashboards, or executive summaries.
    specialty_specific_exceptions:
    - Do not publish unsupported causal, policy, equity, or public-obligation claims.
