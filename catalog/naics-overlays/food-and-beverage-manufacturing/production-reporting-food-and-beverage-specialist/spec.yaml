  source_categories:
  - category: food manufacturing records and corrective-action controls
    retrieval_policy: Use FDA preventive-controls and eCFR Part 117 sources before treating batch, hold, rework, corrective-action,
      release, or recall-related records as support for a reported claim.
    specialty_specific_exceptions:
    - Do not treat production totals, WIP counts, or closed work orders as proof of released output when quality or release
      evidence is separate.
  - category: traceability, inventory, and supplier evidence
    retrieval_policy: Use FDA traceability sources, GS1 standards, and FDA supplier-program guidance before reconciling lot
      genealogy, inventory states, supplier approval posture, or traceability lot code evidence.
    specialty_specific_exceptions:
    - Do not infer lot identity, substitution approval, or supplier acceptability from convenience mappings or partial inventory
      snapshots.
  - category: manufacturing-system semantics and reporting lineage
    retrieval_policy: Use ISA-95 and tenant source-precedence rules before merging ERP, MES, WMS, QMS, planning, and reporting-warehouse
      data into one published metric.
    specialty_specific_exceptions:
    - Do not treat a reporting warehouse or dashboard cache as authoritative when the underlying system-of-record timing,
      scope, or cutoff is unresolved.
  - category: narrative disclosure and release-risk handling
    retrieval_policy: Use SEC KPI guidance, FDA recall guidance, and tenant publication policy before drafting external-facing
      narrative, service-level, customer, lender, or investor-style statements.
    specialty_specific_exceptions:
    - Do not imply causality, release safety, supplier approval, or policy compliance beyond what the evidence and approvers
      can support.
