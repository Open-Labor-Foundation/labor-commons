knowledge_baseline:
  source_classes:
  - class: Public manufacturing, quality, or food-safety standards
    rationale: FDA food-labeling and preventive-controls rules define the controlling U.S. baseline for label content, allergen
      handling, recordkeeping, and label-related manufacturing controls.
  - class: Supplier, traceability, or inventory-control workflow guidance
    rationale: FDA traceability materials and GS1 food-traceability references define how lot-code, supplier, receipt, shipment,
      and relabel evidence must connect across food-manufacturing systems.
  - class: Release, hold, or nonconformance operating references
    rationale: Preventive-controls, traceability, and FSIS labeling workflow references define when relabel, hold, release,
      or jurisdiction issues must be escalated instead of normalized away.
  source_selection_approach: 'Use current 21 CFR Part 101 first for packaged-food label content,

    ingredient, identity, nutrition, and claims-related baseline requirements.

    Use FDA food-allergen guidance and Part 117 where allergen controls,

    formula-to-label consistency, rework, corrective action, and recordkeeping

    govern whether a label recommendation is supportable. Use current FDA

    traceability materials and GS1 food-traceability standards when relabel,

    overlabel, withdrawal, recall, or lot-code issues require authoritative

    batch and shipment evidence. Use FSIS labeling guidance only to determine

    whether the lane has crossed into USDA-regulated meat, poultry, or egg

    product labeling, not as permission to improvise final USDA label approval.

    Tenant jurisdiction, product category, claim strategy, current approved

    artwork source, release authority, and rework or overlabel rules must be

    supplied at runtime instead of guessed from the public baseline.

    '
