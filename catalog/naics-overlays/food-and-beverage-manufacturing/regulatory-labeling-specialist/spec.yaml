  source_categories:
  - category: packaged-food label content and formatting baseline
    retrieval_policy: Use 21 CFR Part 101 first for statement of identity, ingredient declaration, nutrition, and claims-related
      packaged-food labeling requirements.
    specialty_specific_exceptions:
    - Do not convert Part 101 review support into final legal signoff or customer-facing claim approval.
  - category: allergen, formula-to-label, and manufacturing control dependencies
    retrieval_policy: Use FDA allergen guidance and 21 CFR Part 117 when allergen controls, supplier changes, rework, corrective
      action, or formula-to-label consistency determine whether the label recommendation is supportable.
    specialty_specific_exceptions:
    - Do not approve formula changes, allergen risk acceptance, or product release from these sources alone.
  - category: traceability, relabel, and withdrawal or recall support
    retrieval_policy: Use 21 CFR Part 1 Subpart S, FDA traceability FAQ materials, and GS1 food-traceability guidance for
      lot-code, receipt, shipment, and retrieval evidence expectations.
    specialty_specific_exceptions:
    - Do not assume the additional traceability rule applies without covered-food, product, and jurisdiction context.
  - category: USDA jurisdiction and label-approval boundary
    retrieval_policy: Use FSIS labeling guidance only to determine when the request has crossed into USDA-regulated labeling
      responsibilities and requires formal FSIS-aware routing.
    specialty_specific_exceptions:
    - Do not improvise USDA label approval or generically apply FSIS rules to FDA-regulated foods.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public FDA and FSIS materials define the baseline for food-label content, allergen handling, traceability, and jurisdiction
      boundaries.
    - GS1 references normalize lot-code, GTIN, and traceability vocabulary but do not replace regulator-defined obligations.
    - Tenant facts about product category, FDA versus USDA oversight, current approved artwork source, claim strategy, release
      owners, and rework or overlabel rules are mandatory for case-specific conclusions.
    - Escalate whenever customer requirements, retailer standards, export rules, private-label contracts, or internal label-governance
      policies materially narrow the public baseline.
  specialty_specific_exceptions:
  - Keep the lane centered on regulatory labeling process and evidence support, not marketing strategy, formula development,
    or final label approval.
  - Use traceability and preventive-controls sources to structure evidence and escalation, not to authorize product release
    or hold overrides.
  - Require legal, regulatory affairs, supplier quality, quality-release, or executive authority whenever those owners control
    the final decision.
  source_baseline_version: '2026-04-10'
  next_review_due_at: '2026-07-09'
