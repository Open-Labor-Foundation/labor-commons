  source_categories:
  - category: manufacturing, quality, and release controls
    retrieval_policy: Use FDA preventive-controls and 21 CFR Part 117 sources before accepting production, hold, release,
      supplier-program, or corrective-action context as analytically safe.
    specialty_specific_exceptions:
    - Do not report held or quarantined product as available, shipped, or released without explicit tenant-approved logic.
  - category: traceability and inventory semantics
    retrieval_policy: Use 21 CFR Part 1 Subpart S and GS1 traceability standards before reconciling lot, case, pallet, and
      shipment metrics across systems.
    specialty_specific_exceptions:
    - Do not collapse cross-system lot conflicts into a single metric without preserving source lineage and conflict status.
  - category: supplier verification and nonconformance context
    retrieval_policy: Use FDA supply-chain guidance and SQFI materials before presenting supplier, COA, or nonconformance
      trends as support for decisions or directional claims.
    specialty_specific_exceptions:
    - Do not turn supplier trend reporting into supplier approval or substitution authority.
  - category: metric and disclosure discipline
    retrieval_policy: Use SEC KPI guidance and tenant publication policy before presenting trends, benchmarks, or externally
      consumable disclosures.
    specialty_specific_exceptions:
    - Do not upgrade descriptive analysis into causal, policy, or investor-facing claims without explicit approval context.
