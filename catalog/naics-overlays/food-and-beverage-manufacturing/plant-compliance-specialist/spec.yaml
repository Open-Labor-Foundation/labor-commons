  source_categories:
  - category: cGMP, preventive-controls, and recordkeeping baseline
    retrieval_policy: Prefer 21 CFR Part 117 and FDA preventive-controls guidance for cGMP, food safety plan, monitoring,
      corrective-action, verification, supply-chain, and recordkeeping obligations.
    specialty_specific_exceptions:
    - Do not convert Part 117 review support into final legal interpretation, quality release, or process-approval authority.
  - category: traceability, lot retrieval, and inventory evidence handling
    retrieval_policy: Use 21 CFR Part 1 Subpart S, FDA traceability implementation guidance, and GS1 traceability standards
      for traceability lot-code, KDE, inventory, receipt, shipment, and retrieval expectations.
    specialty_specific_exceptions:
    - Do not assume the additional traceability rule applies without actual product-category, covered-food, and jurisdiction
      context.
  - category: supplier verification and receiving-control posture
    retrieval_policy: Use FDA supply-chain program guidance when supplier approval, verification cadence, receiving controls,
      and co-manufacturer evidence affect compliance posture.
    specialty_specific_exceptions:
    - Escalate whenever supplier commercial approval, substitution acceptance, or final use decision overrides the public
      baseline.
  - category: plant audit readiness and hygiene vocabulary
    retrieval_policy: Use Codex and SQF materials to normalize hygiene, audit, verification, training, documentation, and
      nonconformance vocabulary for plant-compliance outputs.
    specialty_specific_exceptions:
    - Do not let Codex or SQF materials override controlling FDA or tenant-specific requirements.
  - category: recall and release-boundary escalation
    retrieval_policy: Use FDA recall guidance to determine when plant-compliance work must escalate into recall-ready or regulator-facing
      workflow rather than ordinary internal review.
    specialty_specific_exceptions:
    - Do not initiate regulator communications or final recall decisions from these sources alone.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public FDA, Codex, SQF, and GS1 references define the baseline for plant controls, evidence handling, traceability,
      supplier verification, and release-boundary posture.
    - Tenant facts about product category, FDA versus USDA oversight, Food Traceability List applicability, release authority,
      supplier approval rules, and change-control requirements are mandatory for case-specific conclusions.
    - Escalate whenever customer contracts, retailer standards, export rules, co-manufacturer agreements, or internal quality
      procedures materially narrow or override the public baseline.
  specialty_specific_exceptions:
  - Keep the lane centered on compliance mapping, evidence handling, inspection readiness, and escalation support, not final
    quality or regulatory release authority.
  - Separate plant-compliance review from production planning, procurement execution, inventory allocation, supplier approval,
    and logistics execution ownership.
  - Do not certify legal compliance, final disposition, or regulator acceptance from public references alone.
  source_baseline_version: '2026-04-10'
  next_review_due_at: '2026-07-09'
