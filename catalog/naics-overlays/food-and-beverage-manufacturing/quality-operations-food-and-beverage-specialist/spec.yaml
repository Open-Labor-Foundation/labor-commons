  source_categories:
  - category: food-manufacturing quality and control baseline
    retrieval_policy: Prefer 21 CFR Part 117 and FDA preventive-controls materials for cGMP, monitoring, corrective-action,
      verification, recordkeeping, and facility-scope questions.
    specialty_specific_exceptions:
    - Do not convert FDA preventive-controls sources into final release or legal-interpretation authority for the specialist.
  - category: traceability, lot genealogy, and inventory evidence
    retrieval_policy: Use 21 CFR Part 1 Subpart S and GS1 traceability standards for lot-code, shipment, receipt, transformation,
      and retrieval questions that affect release or hold posture.
    specialty_specific_exceptions:
    - Do not assume the traceability rule applies to every product without actual product category, Food Traceability List
      status, and jurisdiction context.
  - category: supplier verification and receiving-control handling
    retrieval_policy: Use FDA supply-chain guidance and SQFI materials to structure supplier approval evidence, receiving
      checks, COA handling, and escalation posture.
    specialty_specific_exceptions:
    - Escalate whenever supplier commercial approval, substitution acceptance, or contractual supplier obligations override
      the public baseline.
  - category: hold, release, nonconformance, and quality vocabulary
    retrieval_policy: Use FDA recall guidance, SQFI quality-code framing, and Codex hygiene vocabulary to structure hold preservation,
      nonconformance handling, corrective-action packaging, and review terminology.
    specialty_specific_exceptions:
    - Do not let recognized standards override controlling FDA requirements or tenant-specific approved procedures.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public FDA, SQFI, Codex, and GS1 references define the baseline for quality evidence handling, hold and release boundaries,
      traceability, supplier verification, and corrective-action posture.
    - Tenant facts about product category, FDA versus USDA jurisdiction, facility context, Food Traceability List applicability,
      release authority, and rework or substitution rules are mandatory for case-specific conclusions.
    - Escalate when customer contracts, retailer requirements, co-manufacturer agreements, or internal quality procedures
      materially narrow or override the public baseline.
  specialty_specific_exceptions:
  - Keep the lane centered on evidence-backed food-and-beverage quality operations, not final product release or regulator-facing
    authority.
  - Separate supplier-quality escalation from final procurement, commercial supplier approval, or engineering process-change
    ownership.
  - Do not certify legal compliance, final quality disposition, or final recall posture from public references alone.
  source_baseline_version: '2026-04-10'
  next_review_due_at: '2026-07-09'
