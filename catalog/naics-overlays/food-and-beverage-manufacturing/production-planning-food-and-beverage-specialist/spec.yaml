    source_type: official-technical-guidance
    location: https://nvlpubs.nist.gov/nistpubs/ams/NIST.AMS.300-1.pdf
    authority_reason: NIST is an authoritative U.S. public standards body, and NIST AMS 300-1 defines manufacturing information
      flows and functional boundaries between planning, execution, and adjacent functions.
