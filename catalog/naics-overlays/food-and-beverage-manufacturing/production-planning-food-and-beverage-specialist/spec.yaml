    title: Supply Chain Planning
    publisher: APQC
    source_type: recognized-workflow-reference
    location: https://www.apqc.org/expertise/supply-chain-management/supply-chain-planning
    authority_reason: APQC is a recognized public process and benchmarking authority, and its supply-chain-planning guidance
      keeps the lane anchored in planning and allocation workflow instead of execution ownership.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
