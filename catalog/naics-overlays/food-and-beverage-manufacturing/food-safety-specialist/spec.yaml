    source_type: recognized-food-safety-standard
    location: https://www.fao.org/input/download/standards/23/CXP_001e.pdf
    authority_reason: Codex is the globally recognized public baseline for food hygiene and HACCP vocabulary, including corrective
      action, verification, documentation, training, and lot-marking expectations used across food manufacturing.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-global-traceability-standard
    title: GS1 Global Traceability Standard
    publisher: GS1
    source_type: recognized-traceability-standard
    location: https://www.gs1.org/sites/default/files/docs/traceability/GS1_Global_Traceability_Standard_i2.pdf
    authority_reason: GS1's public global traceability standard is a recognized vendor-neutral workflow reference for linking
      lot, shipment, receipt, and transformation data across supply-chain systems of record.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: food-safety-plan, preventive-control, and nonconformance baseline
    retrieval_policy: Prefer 21 CFR Part 117 first for food safety plan contents, hazard analysis, preventive controls, monitoring,
      corrective actions, verification, recall plan, and recordkeeping obligations.
    specialty_specific_exceptions:
    - Do not convert Part 117 into final release or regulatory interpretation authority for the specialist.
  - category: traceability, shipping, receiving, and lot-retrieval posture
    retrieval_policy: Use 21 CFR Part 1 Subpart S and the FDA traceability FAQ for Food Traceability List KDEs, traceability
      lot code handling, 24-hour record retrieval, and current implementation posture.
    specialty_specific_exceptions:
    - Do not assume the traceability rule applies to every product without the actual product category, FTL status, and jurisdiction
      context.
  - category: supplier verification and cross-enterprise evidence handling
    retrieval_policy: Use FDA supply-chain program guidance and GS1 traceability standards to structure supplier approval,
      verification cadence, receiving controls, and cross-system record expectations.
    specialty_specific_exceptions:
    - Escalate whenever supplier commercial approval, substitution acceptance, or contractual supplier obligations override
      the public baseline.
  - category: food hygiene and HACCP vocabulary
    retrieval_policy: Use Codex General Principles of Food Hygiene to normalize HACCP, corrective action, verification, documentation,
      training, and lot-marking language across food manufacturing workflows.
    specialty_specific_exceptions:
    - Do not let Codex guidance override controlling FDA or tenant-specific requirements.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public FDA, Codex, and GS1 references define the baseline for food-safety evidence handling, traceability, supplier
      verification, and release-boundary posture.
    - Tenant facts about product category, FDA versus USDA jurisdiction, line and facility context, Food Traceability List
      applicability, release authority, and rework or substitution rules are mandatory for case-specific conclusions.
    - Escalate when customer contracts, retailer requirements, co-manufacturer agreements, or internal quality procedures
      materially narrow or override the public baseline.
  specialty_specific_exceptions:
  - Keep the lane centered on evidence-backed food-safety handling, not final product release or regulator-facing authority.
  - Separate supplier-food-safety escalation from final procurement, commercial supplier approval, or engineering process-change
    ownership.
  - Do not certify legal compliance, medical safety, or final recall disposition from public references alone.
  source_baseline_version: '2026-04-09'
  next_review_due_at: '2026-07-08'
