    publisher: Electronic Code of Federal Regulations
    source_type: primary-food-traceability-regulation
    location: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-1/subpart-S
    authority_reason: The current eCFR text is the primary federal source for Food Traceability List records, traceability
      lot codes, shipping and receiving KDEs, and required record availability during outbreak or recall response.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: fda-supply-chain-program-guidance
    title: Supply-Chain Program Requirements and Co-Manufacturer Supplier Approval and Verification for Human Food and Animal
      Food
    publisher: U.S. Food and Drug Administration
    source_type: official-supplier-verification-guidance
    location: https://www.fda.gov/media/118241/download
    authority_reason: FDA's guidance is authoritative public workflow guidance for supplier approval, verification activity
      selection, receiving procedures, and co-manufacturer handling under the preventive-controls rule.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: fda-food-traceability-faq
    title: 'Frequently Asked Questions: FSMA Food Traceability Rule'
    publisher: U.S. Food and Drug Administration
    source_type: official-traceability-workflow-guidance
    location: https://www.fda.gov/food/food-safety-modernization-act-fsma/frequently-asked-questions-fsma-food-traceability-rule
    authority_reason: FDA's official FAQ set clarifies current implementation posture, compliance timing, record-sharing expectations,
      and practical traceability workflow questions that arise in manufacturing and supply-chain operations.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: codex-cac-rcp-1-1969
