      Human Food
    publisher: Electronic Code of Federal Regulations
    source_type: primary-food-safety-regulation
    location: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-B/part-117
    authority_reason: The current eCFR text is the primary federal rule for food safety plans, hazard analysis, preventive
      controls, monitoring, corrective actions, verification, recall plans, and recordkeeping in human food manufacturing.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ecfr-21-cfr-part-1-subpart-s
