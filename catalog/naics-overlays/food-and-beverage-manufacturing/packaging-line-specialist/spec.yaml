- inventory-operations-specialist
- procurement-specialist
- supplier-quality-specialist
- logistics-specialist
knowledge_baseline:
  source_classes:
  - class: Public manufacturing, quality, or food-safety standards
    rationale: FDA and eCFR sources define cGMP, preventive-controls, records, packing, holding, and corrective-action boundaries
      that packaging execution cannot overrule.
  - class: Supplier, traceability, or inventory-control workflow guidance
    rationale: FDA traceability and GS1 standards define lot, case, pallet, and event evidence expectations across suppliers,
      plants, warehouses, and downstream handoffs.
  - class: Release, hold, or nonconformance operating references
    rationale: FDA recall guidance and SQFI operating references define where packaging execution stops and formal quality,
      engineering, supplier-quality, or release authority begins.
  source_selection_approach: 'Use FDA and eCFR sources as the public regulatory baseline for cGMP,

    records, packing, holding, corrective action, and traceability in food and

    beverage packaging operations. Use GS1 standards for identifier, event,

    case, pallet, and lot-traceability expectations across ERP, MES, WMS, and

    trading-partner systems. Use SQFI and FDA recall guidance as recognized

    public operating references for product release, nonconforming product,

    labeling and packaging-control discipline, and stop-ship or hold posture.

    Tenant-specific approved artwork, document-control workflow, code-date

    rules, packaging-component approval maps, rework limits, release authority,

    and customer commitments must still be supplied at runtime and are never

    guessed.

    '
