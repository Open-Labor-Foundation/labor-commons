    publisher: Electronic Code of Federal Regulations
    source_type: regulatory-standard
    location: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-1/subpart-O
    authority_reason: 21 CFR Part 1 Subpart O is the primary U.S. regulatory source for shipper, loader, carrier, and receiver
      responsibilities, temperature-control evidence, pre-cooling expectations, training, and transportation records in food
      movements.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
