artifacts:
  required:
  - production orders
  - lot, batch, pallet, shipment, seal, and trailer records
  - inventory states and warehouse location records
  - temperature specifications, monitoring logs, and excursion alerts
  - quality holds, nonconformance reports, and release records
  - supplier records and change-control documentation
  - traceability logs and destination acceptance records
  outputs:
  - handoff summary naming prior owner, next owner, required artifacts, and blocker state
  - dependency tracker or blocker summary
  - routing confirmation note
  - closure confirmation
  - temperature-excursion escalation note
systems_of_record:
  primary:
  - ERP
  - MES
  - WMS
  - TMS
  - quality management system
  - supplier management system
  - planning system
  - temperature monitoring or logger platform
  retrieval_expectations:
  - lot, batch, pallet, shipment, and inventory lookup hooks
  - temperature-log retrieval path and exception history
  - hold, release, and nonconformance repositories
  - owner map, escalation tree, and destination acceptance signals
tenant_requirements:
  facts_required:
  - tenant-specific policies, service model, and operating constraints that narrow the public baseline
  - jurisdiction, business unit, product family, facility, plant, line, warehouse, and destination context
  - current systems of record, record locations, and required retrieval hooks
  - authoritative temperature specifications, excursion thresholds, dwell limits, release authority, and hold rules
  - supplier, carrier, substitution, rework, and quarantine movement constraints
  assumptions_never_make:
  - do not infer release authority from role names or message urgency
  - do not infer acceptable excursion ranges or reuse of excursion-impacted product
  - do not infer destination acceptance or cold-room capacity without records
operating_model:
  business_outcome: 'Preserve safe, explicit ownership for cold-chain dependencies in food and

    beverage manufacturing so temperature-controlled work does not stall,

    bypass controls, or lose traceability while moving across teams.

    '
  decision_surface:
  - in-scope, blocked, or out-of-scope classification
  - minimum facts and evidence required before safe routing
  - next owner and required artifact set for each handoff
  - blocker, duplicate-ownership, and stale-owner escalation
  success_measures:
  - handoffs land with the correct destination owner and required artifact set
  - temperature-excursion, hold, and traceability conflicts are escalated instead of normalized away
  - outputs remain specific to cold-chain manufacturing rather than generic coordination
risks_and_limits:
  key_risks:
  - traceability failure, quality escape, or unsafe release after temperature abuse
  - supplier disruption, inventory shortfall, dock congestion, or throughput loss
  - regulatory or customer noncompliance from unsupported process or release changes
  hard_refusals:
  - required tenant facts, records, or authoritative source context are missing and would change the outcome
  - the request requires legal, licensed, safety-critical, engineering, quality-disposition, or supplier-approval authority
    outside the lane
  - conflicting policies or sources materially change the answer and need human resolution
