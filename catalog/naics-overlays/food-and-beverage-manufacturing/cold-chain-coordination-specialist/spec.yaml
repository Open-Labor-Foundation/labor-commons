    publisher: U.S. Food and Drug Administration
    source_type: food-safety-guidance
    location: https://www.fda.gov/food/food-safety-modernization-act-fsma/frequently-asked-questions-fsma-food-traceability-rule
    authority_reason: FDA FAQ is the current authoritative public explanation of traceability-plan, record-retrieval, and
      covered-food expectations that govern cold-chain lot and shipment evidence handling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ecfr-21-cfr-part-117
