    authority_reason: 21 CFR Part 117 is the primary public regulatory baseline for warehousing and distribution, hazard analysis,
      preventive-control monitoring, corrective action, recall planning, and supply-chain-program boundaries in food manufacturing.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
