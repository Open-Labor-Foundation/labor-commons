    publisher: U.S. Food and Drug Administration
    source_type: food-safety-rule
    location: https://www.fda.gov/food/food-safety-modernization-act-fsma/fsma-final-rule-preventive-controls-human-food
    authority_reason: FDA's preventive-controls rule page is the authoritative U.S. public baseline for facilities that manufacture,
      process, pack, or hold human food and it defines monitoring, corrective-action, and supply-chain expectations that production
      execution cannot bypass.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
