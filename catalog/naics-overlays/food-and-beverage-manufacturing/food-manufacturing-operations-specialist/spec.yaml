      Human Food
    publisher: Electronic Code of Federal Regulations
    source_type: regulatory-standard
    location: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-B/part-117
    authority_reason: 21 CFR Part 117 is the primary public regulatory baseline for cGMP, records, warehousing, distribution,
      holding, and corrective-action obligations in food manufacturing operations.
