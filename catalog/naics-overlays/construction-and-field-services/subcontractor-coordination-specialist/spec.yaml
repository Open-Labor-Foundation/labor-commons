    authority_reason: GSA publishes the official federal progress-reporting form and instructions used to document schedule
      status, contractor coordination, deficiencies, and pending issues, making it authoritative for handoff and blocker evidence
      expectations.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gsa-pbs-project-planning-guide
    title: PBS-PQ100 Project Planning Guide
