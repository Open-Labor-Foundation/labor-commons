    publisher: Seattle Department of Construction and Inspections
    source_type: official-guidance
    location: https://www.seattle.gov/documents/departments/sdci/inspections/residentialfinalinspectionquicksheet.pdf
    authority_reason: A public building-department quick sheet that specifies permit-card, approved-plan, address, and final-inspection
      readiness conditions before permit completion, making it authoritative for permit and inspection artifact expectations.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nyc-after-permit
    title: After You Get a Permit
    publisher: New York City Department of Buildings
    source_type: official-guidance
    location: https://www.nyc.gov/site/buildings/property-or-business-owner/after-you-get-a-permit.page
    authority_reason: NYC DOB is the official authority having jurisdiction for New York City permits and inspections. Its
      public guidance explains permit-holder duties, approved-plan posting, inspection signoff, and permit sign-off steps
      relevant to coordination outputs.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gsa-184-construction-progress-report
