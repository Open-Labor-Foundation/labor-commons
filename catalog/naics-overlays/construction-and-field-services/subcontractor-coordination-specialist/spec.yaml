    authority_reason: GSA's project planning and closeout guidance defines deficiency correction, testing and commissioning,
      training, O&M turnover, as-built, and final completion expectations that constrain closeout handoffs.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: usace-contractor-guide
    title: Resident Management System Contractor Guide
    publisher: U.S. Army Corps of Engineers
    source_type: official-manual
