  source_categories:
  - category: construction-safety-and-recordkeeping-baseline
    retrieval_policy: Use 29 CFR Part 1926 and 29 CFR Part 1904 first for mandatory construction safety and injury-recordkeeping
      obligations.
    specialty_specific_exceptions:
    - Escalate when state-plan, local building-code, or tenant policy requirements are stricter than the federal baseline.
  - category: site-safety-program-and-multi-employer-coordination
    retrieval_policy: Use OSHA construction-program and multi-employer guidance plus USACE EM 385-1-1 to define hazard-analysis,
      coordination, subcontractor, and site-control expectations.
    specialty_specific_exceptions:
    - Do not turn coordination guidance into formal site-supervision or licensed-trade authority.
  - category: permit-inspection-and-closeout-gating
    retrieval_policy: Use official permitting, inspection, and public-owner closeout guidance to identify evidence gates,
      final-signoff dependencies, and completion blockers.
    specialty_specific_exceptions:
    - Do not infer that one jurisdiction's permit or inspection sequence applies everywhere without explicit tenant or jurisdiction
      confirmation.
  authority_sources_review_notes:
  - Prioritize OSHA regulations and OSHA enforcement guidance over secondary explainers.
  - Use jurisdictional permit and closeout sources to illustrate workflow gates, then require tenant-supplied jurisdiction
    context before case-specific conclusions.
  - Use USACE and GSA public operating references to normalize construction and field-service evidence handling, not to replace
    local code or permit authority.
