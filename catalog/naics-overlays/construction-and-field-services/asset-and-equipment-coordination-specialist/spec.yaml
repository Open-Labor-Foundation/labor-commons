  source_categories:
  - category: Permit and inspection baseline
    retrieval_policy: Use AHJ or public-owner permit guidance to confirm permit status, approved-plan availability, inspection
      sequence, operational-test prerequisites, correction notices, and occupancy or turnover gates before routing.
    specialty_specific_exceptions:
    - Never infer permit approval, final inspection signoff, or local code interpretation from generic baseline guidance.
  - category: Safety, staging, and site-control baseline
    retrieval_policy: Use OSHA construction standards to determine when site conditions, storage, staging, equipment condition,
      or competent-person inspection obligations block work progression.
    specialty_specific_exceptions:
    - Never convert OSHA baseline into autonomous safety signoff or field means-and-methods direction.
  - category: Schedule, submittal, work-order, and closeout evidence
    retrieval_policy: Use GSA, Caltrans, and USACE references to normalize schedule, work-order, submittal, equipment-data,
      daily-report, startup, and turnover artifact expectations.
    specialty_specific_exceptions:
    - Tenant PMIS, CMMS, and contract documents still control the exact owner map, activity codes, and acceptance mechanism.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline workflow, but tenant systems, contract terms, jurisdiction, equipment classes, and
      project-specific inspection regimes remain required for safe routing.
    - Escalate when jurisdictional guidance or tenant policy materially changes permit, inspection, safety, startup, or closeout
      posture.
    - Never infer licensed trade, engineer-of-record, or AHJ authority.
  specialty_specific_exceptions:
  - Permit, startup, testing, and final inspection obligations vary by jurisdiction, project type, and tenant delivery model.
  - Equipment classes can trigger trade-specific licensing, commissioning, or manufacturer-certification requirements that
    this lane must not guess.
  - Installed property list, O&M, warranty, and turnover requirements vary by owner and contract and may materially alter
    the next owner.
  next_review_due_at: '2026-10-06'
