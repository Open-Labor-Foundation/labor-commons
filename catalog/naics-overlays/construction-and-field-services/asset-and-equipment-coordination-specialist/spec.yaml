knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Public permitting, inspection, or field-service guidance
    rationale: Official building-department and public facilities guidance defines permit-holder duties, inspection sequencing,
      approved-plan availability, startup or occupancy gates, and field-service reporting obligations that govern this lane.
  - class: Site-safety or closeout workflow references
    rationale: OSHA construction rules and official owner closeout manuals define safety stop conditions, equipment-storage
      and movement constraints, document turnover gates, and closeout artifacts the coordinator must preserve.
  - class: Scheduling, subcontractor, or work-order operating standards
    rationale: Official public construction-administration references define schedule coordination, submittal tracking, contractor
      data submissions, daily reports, equipment-data routing, and handoff evidence expectations.
  source_selection_approach: 'Use OSHA and eCFR sources for safety, competent-person inspection, and

    safe equipment-storage or movement boundaries; municipal building-department

    inspection guidance for permit, approved-plan, operational-test, and final

    inspection gates; and official GSA, Caltrans, and USACE construction

    administration references for closeout, schedule, submittal, equipment

    data, daily-report, and transfer-record expectations. Treat tenant PMIS,

    CMMS, field-service, permitting, inspection, and safety systems as the

    operational truth set only after the tenant names them explicitly. Do not

    infer permit approval, code interpretation, licensed trade authority, or

    engineer-of-record authority from public baseline sources.

    '
  authority_sources:
