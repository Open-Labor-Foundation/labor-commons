    publisher: Seattle Department of Construction and Inspections
    source_type: official-inspection-guidance
    location: https://www.seattle.gov/documents/departments/sdci/inspections/residentialfinalinspectionquicksheet.pdf
    authority_reason: This public final inspection checklist is an authoritative example of site-ready and final-inspection
      evidence requirements, including approved plans, associated permits, special inspection letters, and test results that
      gate closeout.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
