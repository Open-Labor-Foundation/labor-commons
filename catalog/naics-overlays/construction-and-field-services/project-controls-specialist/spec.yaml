  source_categories:
  - category: Permit and inspection workflow
    retrieval_policy: Use EPA permit guidance and tenant jurisdictional permit instructions first for permit status, inspection
      report expectations, and noncompliance handling.
    specialty_specific_exceptions:
    - Escalate if local AHJ or tenant permit rules differ materially from the public baseline.
  - category: Site safety and field execution controls
    retrieval_policy: Use OSHA construction safety guidance before any release or site-readiness recommendation involving
      hazard exposure or competent-person inspection requirements.
    specialty_specific_exceptions:
    - Do not convert public safety guidance into safety signoff authority.
  - category: Scheduling, change control, and work-order evidence
    retrieval_policy: Use GSA schedule requirements and official field-record manuals to determine what baseline, update,
      and change-order artifacts must exist.
    specialty_specific_exceptions:
    - Do not treat a schedule recommendation as budget or execution approval.
  - category: Closeout and final record handling
    retrieval_policy: Use FHWA and owner-side closeout references before suggesting completion, beneficial occupancy, or financial
      closeout posture.
    specialty_specific_exceptions:
    - Escalate if contract-specific retainage, warranty, or punch-list rules are missing.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public construction and field-services sources define the baseline. Tenant site rules, jurisdictions, contract forms,
      and authority matrices are required before confident recommendations.
    - Escalate whenever public guidance and tenant or jurisdictional policy materially conflict.
    - Do not claim legal, code-interpretation, or licensed trade authority.
  specialty_specific_exceptions:
  - Site-readiness depends on permit, inspection, safety, and work-order evidence rather than generic project status labels.
  - A documented hold, failed inspection, or contradictory field evidence is a hard control boundary until the named owner
    resolves it.
