    authority_reason: A city building department is the authoritative local permitting and occupancy regulator. This guidance
      defines final approval, temporary occupancy, and unresolved-issue boundaries that can gate turnover and scheduled completion.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
