    publisher: Occupational Safety and Health Administration
    source_type: official-safety-guidance
    location: https://www.osha.gov/etools/construction/trenching/excavation-check
    authority_reason: OSHA is the primary U.S. federal workplace safety authority. This official construction eTool gives
      concrete competent-person inspection and stop-work expectations that materially affect site-readiness and execution-state
      decisions.
    last_reviewed_at: '2026-04-09'
