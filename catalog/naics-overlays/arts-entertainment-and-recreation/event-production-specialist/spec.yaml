    publisher: City of Seattle Special Events Office
    source_type: official-special-event-application-guidance
    location: https://www.seattle.gov/special-events/permits/application-and-instructions
    authority_reason: The Seattle Special Events Office is an official municipal permitting authority. Its application instructions
      define required artifacts such as event maps, run-of-show details, vendor lists, insurance documents, and public-safety-plan
      inputs used to determine whether an event package is complete enough to review or advance.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
