    publisher: City of Seattle Special Events Office
    source_type: official-special-event-lifecycle-guidance
    location: https://www.seattle.gov/special-events/permits/permitting-process
    authority_reason: This official city permitting workflow explains when a special-event permit is required, which event
      conditions trigger review, the application timeline, fee-payment gating, and the relationship between permit issuance
      and required approvals.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
