knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Consumer-protection or public hospitality workflow guidance
    rationale: Official special-event permitting and public-assembly workflow sources define the baseline records, lead times,
      public-safety planning, and permit conditions that govern whether event-production work may proceed.
  - class: Pricing, booking, refund, or guest-service operating references
    rationale: Official live-ticket pricing and card-billing guidance defines what event operators must disclose up front,
      which records matter for booking and payment mismatches, and where merchant-versus-issuer or operator-versus-approver
      boundaries apply.
  - class: Safety, fraud, or loss-prevention handling guidance
    rationale: Official public-safety and ticket-fraud sources plus recognized event-safety standards define crowd-management,
      emergency-planning, security, and suspicious-ticket handling conditions that force escalation rather than routine completion.
  source_selection_approach: 'Use Seattle Special Events Office workflow, insurance, and public-safety

    guidance first for public special-event permitting, application artifacts,

    timing, insurance evidence, crowd-management, and emergency-plan

    expectations. Use FTC ticket-fee and BOTS Act sources plus CFPB billing-

    error guidance for ticket-pricing disclosure, payment mismatch, and fraud-

    sensitive ticketing boundaries. Use Event Safety Alliance standards and

    guidance as the recognized event-safety baseline for event-specific

    terminology, crowd-management, communication, weather, security, and

    temporary-structure awareness. Tenant refund matrices, cancellation rules,

    ticketing-platform contracts, venue SOPs, promoter approvals, incident

    response plans, and jurisdiction-specific permit conditions remain

    mandatory runtime inputs and are never guessed.

    '
  authority_sources:
