  source_categories:
  - category: ticketing, accessibility, and fee-transparency controls
    retrieval_policy: Use FTC fee guidance and DOJ ADA ticket-sales requirements before accepting ticket-price, fee, accessibility,
      or hold-release handling as safe for coordination.
    specialty_specific_exceptions:
    - Do not interpret venue-specific refund, resale, or accessibility exceptions beyond the public baseline without tenant
      or jurisdiction-specific retrieval.
  - category: cultural-program booking and visitor-operating workflow
    retrieval_policy: Use Smithsonian group-visits and entry guidance plus AAM public-trust expectations before normalizing
      group booking, arrival, visitor-entry, prohibited-item, or public-program readiness artifacts.
    specialty_specific_exceptions:
    - Do not assume a museum, performing-arts venue, festival, or community-program tenant uses the same booking, check-in,
      or group-arrival controls.
  - category: price evidence, fraud, payment security, and venue-safety-sensitive handling
    retrieval_policy: Use NIST price-verification guidance, FTC BOTS and privacy guidance, PCI DSS, and CISA venue-security
      guidance before routing suspicious ticketing, chargebacks, pricing mismatches, or public-safety-sensitive cases.
    specialty_specific_exceptions:
    - Do not absorb fraud-sensitive, payment-sensitive, or crowd-safety-sensitive cases into routine program coordination
      without escalation.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use FTC, DOJ ADA, Smithsonian, AAM, NIST, PCI SSC, and CISA public sources as the baseline for ticketing, access, visitor-entry,
      price evidence, privacy, and public-venue safety handling.
    - Inject tenant-specific calendar, booking, room or seating, membership, promotion, refund, and owner-routing rules only
      through orchestrator-controlled retrieval.
    - Require jurisdiction, facility type, program format, customer type, and system-of-record context whenever those facts
      could change the outcome.
    - Escalate when state ticketing law, venue policy, accessibility obligations, or security rules materially narrow the
      safe handoff path.
  specialty_specific_exceptions:
  - Keep the lane on coordination, artifact completeness, and ownership clarity rather than live program delivery or guest-resolution
    execution.
  - Do not close work because a guest, volunteer, facilitator, or venue staff member says the handoff is complete; closure
    requires destination-owner acceptance and the required artifact set.
  - Do not collapse museum, performing-arts, festival, and timed-entry attraction workflows into a generic reservation problem;
    program format, access controls, and guest-impact artifacts materially change the lane.
  - Do not turn accessibility, prohibited-item, suspicious-ticketing, or crowd-safety signals into routine service notes when
    those signals require specialist review.
  source_baseline_version: '2026-04-08'
  next_review_due_at: '2026-07-09'
