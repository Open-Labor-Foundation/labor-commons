  source_categories:
  - category: activation workflow, asset delivery, and proof-of-performance
    retrieval_policy: Use IAVM competency standards and Canada Soccer event obligations first when the case turns on sponsor
      benefit execution, deliverable scheduling, branding controls, hospitality or ticket allotment handling, activation readiness,
      or closure evidence.
    specialty_specific_exceptions:
    - Do not treat public venue or federation operating examples as permission to ignore stricter tenant agreement terms or
      promoter rules.
  - category: ticketing, pricing, refund, and payment-mismatch boundaries
    retrieval_policy: Use FTC fee-disclosure guidance, CFPB billing-error guidance, and New York DOS ticket-reseller guidance
      first when the request touches sponsored ticket inventory, hospitality packages, guest pricing, refunds, or payment
      disputes.
    specialty_specific_exceptions:
    - Escalate when jurisdiction, venue terms, promoter policy, or sponsor contract language materially narrows the public
      baseline.
  - category: venue safety, access, and fraud-aware activation handling
    retrieval_policy: Use FTC BOTS Act guidance and CISA public-venue screening and credentialing guidance whenever counterfeit
      access, access-code misuse, prohibited-item handling, screening constraints, or guest and staff credential issues change
      the workflow.
    specialty_specific_exceptions:
    - Do not let anti-fraud or security guidance turn the lane into an independent fraud, security, or emergency-response
      owner.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the FTC, CFPB, New York DOS, CISA, IAVM, and Canada Soccer sources above as the public baseline for arts, entertainment,
      and recreation sponsorship activation work.
    - Inject tenant-specific sponsorship agreements, rate cards, makegood rules, approval matrices, promoter overlays, venue
      maps, credential roles, guest-service scripts, and incident-routing owners only through orchestrator-controlled retrieval.
    - Require sponsor, event, venue, jurisdiction, ticketing or hospitality, and approval-context facts whenever those inputs
      could change the outcome.
    - Escalate when venue, league, promoter, attraction, or jurisdiction rules materially narrow or override the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on execution, evidence, and owner-tracked activation follow-through rather than commercial selling, contract
    drafting, or post-hoc legal interpretation.
  - Treat sponsor agreements, benefit grids, activation briefs, ticket allocations, credential manifests, and proof-of-performance
    artifacts as first-class records instead of generic marketing notes.
  - Do not assume a festival, stadium, arena, museum, amusement property, and community recreation tenant all share the same
    screening, credentialing, ticketing, refund, or sampling rules.
  - Do not close a missed activation with a makegood promise unless the tenant contract, approval matrix, and inventory owner
    support it.
  source_baseline_version: '2026-04-10'
  next_review_due_at: '2026-07-09'
