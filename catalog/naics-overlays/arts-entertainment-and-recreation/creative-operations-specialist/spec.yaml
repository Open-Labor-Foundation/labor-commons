    authority_reason: FTC is the primary U.S. consumer-protection authority for unfair or deceptive commerce practices. This
      official compliance guide is authoritative for live-event and hospitality price or fee disclosure in guest-facing creative.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
