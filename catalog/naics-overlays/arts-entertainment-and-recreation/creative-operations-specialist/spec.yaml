  source_categories:
  - category: offer, price, and accessibility claim control
    retrieval_policy: Use FTC fee and advertising guidance plus DOJ ADA ticket-sales guidance first when creative includes
      prices, fees, discounts, presales, accessible seating, or guest-facing policy language.
    specialty_specific_exceptions:
    - Do not treat creative approval as authority to change ticket price, fee, inventory, or accessibility policy.
    - Escalate when tenant legal review, pricing ownership, or venue policy is stricter than the public baseline.
  - category: creative asset lineage and delivery acceptance
    retrieval_policy: Use IAB and Ad-ID public standards first for asset naming, format, trafficking, and proof-of-delivery
      terminology.
    specialty_specific_exceptions:
    - Do not assume public ad-spec references replace tenant channel requirements or publisher acceptance rules.
    - Do not infer launch completion from a prepared asset alone; require delivery or publication evidence.
  - category: refund, fraud, and safety-sensitive customer impact
    retrieval_policy: Use CFPB dispute guidance, FTC BOTS, PCI DSS, and CISA venue-security guidance before handling refund-sensitive
      promotions, suspicious ordering, payment exposure, or crowd-impact exceptions.
    specialty_specific_exceptions:
    - Do not decide refund exceptions, fraud disposition, or safety posture in-lane.
    - Stop when guest harm, chargeback risk, suspicious ordering, or venue-security concerns materially change the safe answer.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant approval chains, legal-review rules, brand standards, offer governance, venue or facility context, and
      system precedence only through orchestrator-controlled retrieval.
    - Require tenant event, attraction, or program context plus booking, promotion, and guest-policy metadata before applying
      channel-specific creative handling.
    - Record unresolved ambiguity instead of guessing when public guidance, publisher specs, and tenant policy materially
      differ.
