  source_categories:
  - category: ticketing, booking, and fee transparency controls
    retrieval_policy: Use FTC live-event fee guidance and ADA ticket-sales requirements before accepting ticket-price, fee,
      accessibility, waitlist, or hold-release metrics as analytically safe.
    specialty_specific_exceptions:
    - Do not interpret venue-specific refund, resale, season-pass, or accessibility exceptions beyond the public baseline
      without tenant or jurisdiction-specific retrieval.
  - category: visitor counting, price evidence, and operational metric logic
    retrieval_policy: Use NPS visitor-use definitions and NIST price-verification guidance before reconciling visits, attendance,
      occupancy, per-cap spend, concessions, parking, or promotion metrics.
    specialty_specific_exceptions:
    - Do not treat a ticket sold, scan, reservation, or posted price artifact as interchangeable with visits, attendance,
      or net realized spend without explicit metric definition.
  - category: fraud, payment security, and venue-safety-sensitive handling
    retrieval_policy: Use FTC BOTS, Red Flags, and personal-information guidance, PCI DSS, and CISA venue-security guidance
      before analyzing suspicious ticketing, chargebacks, duplicate scans, crowd incidents, or security screening patterns.
    specialty_specific_exceptions:
    - Do not absorb fraud-sensitive, safety-sensitive, or crowd-security cases into routine analytics without escalation.
  - category: metric and disclosure discipline
    retrieval_policy: Use SEC KPI guidance and tenant publication policy before presenting trend narratives, forecasts, executive
      summaries, or disclosure-ready visitor outputs.
    specialty_specific_exceptions:
    - Do not upgrade descriptive visitor analysis into causal, policy, attestation, or investor-facing claims without explicit
      approval context.
  source_baseline_version: '2026-04-10'
  next_review_due_at: '2026-07-09'
