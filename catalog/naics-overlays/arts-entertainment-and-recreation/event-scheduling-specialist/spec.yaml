    title: Workforce Planning Toolkit
    publisher: APQC
    source_type: recognized-workflow-reference
    location: https://www.apqc.org/resource-library/resource-collection/workforce-planning-toolkit
    authority_reason: APQC is a recognized process and benchmarking authority. Its workforce-planning toolkit provides the
      public demand, supply, gap, and action-planning structure that constrains recommendation-safe event scheduling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
