    publisher: U.S. Department of Justice, Civil Rights Division
    source_type: official-public-accommodation-guidance
    location: https://www.ada.gov/resources/ticket-sales/
    authority_reason: The DOJ is the primary federal authority for ADA public-accommodation enforcement. Its ticket-sales
      guidance is the controlling public baseline for accessible seating sales, hold and release behavior, and comparable
      booking conditions for event venues.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
