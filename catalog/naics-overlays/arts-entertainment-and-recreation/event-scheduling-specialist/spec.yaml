    authority_reason: The FTC is the primary U.S. federal consumer-protection authority. Its fee-rule FAQ explicitly covers
      live-event ticketing and total-price disclosure, which directly constrains pricing-aware booking recommendations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
