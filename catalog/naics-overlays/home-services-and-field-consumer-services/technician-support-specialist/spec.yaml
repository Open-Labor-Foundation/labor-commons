knowledge_baseline:
  source_baseline_version: '2026-04-08'
  research_contract_version: '2026-04-08'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: DMEPOS supplier standards, DMEPOS scope and conditions, HIPAA privacy guidance, and medical-device safety references
      define the regulated limits for healthcare-linked technician support and PHI handling.
  - class: Public payer or provider operating guidance
    rationale: CMS Medicare benefit and claims manuals define DME repair, maintenance, replacement, warranty, order, documentation,
      HCPCS, claim, and payment dependencies that technician support must route without payer interpretation.
  - class: Recognized healthcare workflow or measure guidance
    rationale: CAQH CORE and ASTP/ONC references ground eligibility, authorization, claim-status, remittance, patient, device,
      order, encounter, and documentation terminology used in evidence handling.
  - class: Public service, support, client-delivery, or customer-workflow guidance
    rationale: DMEPOS complaint-resolution standards and FTC warranty guidance constrain customer/stakeholder communication,
      service-contract language, and exception handling for dealer, warranty, and product-service workflows.
  source_selection_approach: 'Use primary eCFR, CMS, HHS OCR, FDA, CAQH CORE, ASTP/ONC, and FTC sources

    first. Treat CMS DMEPOS rules as controlling public baseline for

    healthcare-linked equipment support. Use HHS OCR to constrain PHI handling.

    Use CAQH CORE and ASTP/ONC to normalize healthcare transaction and record

    terminology. Use FDA home-use device guidance for safety-sensitive device

    escalation and FTC warranty guidance for non-healthcare consumer warranty

    framing, without letting consumer warranty guidance override payer, clinical,

    privacy, or tenant rules. Tenant policy, payer contracts, state Medicaid,

    manufacturer programs, dealer terms, current systems of record, and

    jurisdiction narrow the baseline at runtime.

    '
  authority_sources:
  - source_id: ecfr-42-cfr-424-57-dmepos-supplier-standards
    title: 42 CFR 424.57 - Special payment rules for items furnished by DMEPOS suppliers and issuance of DMEPOS supplier billing
      privileges
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-B/part-424/subpart-D/section-424.57
    authority_reason: Primary federal regulatory text for DMEPOS supplier standards, including warranty notification, repair
      or replacement handling, complaint protocols, and complaint record elements that directly govern healthcare-linked technician
      support evidence.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval_or_cms_regulatory_update
    status: active
  - source_id: ecfr-42-cfr-410-38-dmepos-conditions
    title: 42 CFR 410.38 - DMEPOS scope and conditions
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-B/part-410/subpart-B/section-410.38
    authority_reason: Primary federal DMEPOS coverage and payment condition regulation for written orders, face-to-face encounter
      dependencies, documentation retention, refill verification, and supporting medical-record evidence.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval_or_cms_regulatory_update
    status: active
  - source_id: hhs-ocr-hipaa-minimum-necessary
    title: Minimum Necessary Requirement
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR is the HIPAA privacy regulator, and this guidance constrains PHI uses, disclosures, non-routine
      requests, reasonable reliance, and escalation packets for technician support work.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_ocr_revision
    status: active
  - source_id: cms-benefit-policy-manual-ch15-dme
    title: Medicare Benefit Policy Manual, Chapter 15 - Covered Medical and Other Health Services
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/bp102c15.pdf
    authority_reason: CMS administers Medicare benefit policy, and Chapter 15 defines DME coverage, repairs, maintenance,
      replacement, reasonable useful lifetime, supplies, accessories, and physician order dependencies that constrain technician
      support recommendations.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval_or_cms_manual_update
    status: active
  - source_id: cms-claims-processing-manual-ch20-dmepos
    title: Medicare Claims Processing Manual, Chapter 20 - Durable Medical Equipment, Prosthetics, Orthotics, and Supplies
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/clm104c20.pdf
    authority_reason: CMS claims processing guidance defines DMEPOS billing, maintenance and service payment, replacement
      equipment, delivery and service charges, written orders, CMN history, HCPCS, modifiers, claim, and remittance dependencies.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval_or_cms_manual_update
    status: active
  - source_id: caqh-core-operating-rules
    title: CAQH CORE Operating Rules
    publisher: CAQH CORE
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.caqh.org/core/operating-rules
    authority_reason: CAQH CORE is designated by HHS as the national operating rule authoring entity for HIPAA administrative
      transactions; its rules ground eligibility, benefits, prior authorization, claim status, payment, remittance, and attachment
      workflow terminology.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_core_rule_revision
    status: active
  - source_id: onc-uscdi
    title: United States Core Data for Interoperability
    publisher: Assistant Secretary for Technology Policy / Office of the National Coordinator for Health IT
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.healthit.gov/isa/united-states-core-data-interoperability-uscdi
    authority_reason: ASTP/ONC USCDI is the federal interoperability data baseline for patient, encounter, device, order,
      care team, coverage, procedure, and clinical-note terminology used by EHR and health information exchange systems.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_uscdi_revision
    status: active
  - source_id: fda-home-use-devices
    title: Home Use Devices
    publisher: U.S. Food and Drug Administration
    source_type: public-healthcare-regulator-guidance
    location: https://www.fda.gov/medical-devices/home-use-devices/home-use-devices
    authority_reason: FDA regulates medical devices and its home-use device guidance grounds patient-safety escalation when
      technician support touches device malfunction, continued use, labeling, user instructions, adverse event, or home environment
      risk.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_fda_device_guidance_update
    status: active
  - source_id: ftc-federal-warranty-law
    title: Businessperson's Guide to Federal Warranty Law
    publisher: Federal Trade Commission
    source_type: public-service-support-client-delivery-or-customer-workflow-guidance
    location: https://www.ftc.gov/business-guidance/resources/businesspersons-guide-federal-warranty-law
    authority_reason: FTC is the federal consumer-protection authority for written consumer warranty and service-contract
      guidance, which supports non-healthcare warranty terminology and exception-boundary handling for dealer or product-service
      communication.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_ftc_guidance_update
    status: active
  source_categories:
  - category: DMEPOS regulatory and supplier standards
    retrieval_policy: Use eCFR DMEPOS supplier and payment-condition regulations first when a technician support case touches
      DME/HME equipment, warranty notice, repair/replacement support, complaint record, order, face-to-face encounter, or
      supporting medical-record documentation.
    specialty_specific_exceptions:
    - Do not infer medical necessity, coverage approval, repair reimbursement, or complaint closure from the regulation without
      tenant payer and system evidence.
  - category: Payer/provider operating guidance
    retrieval_policy: Use CMS benefit and claims manuals for DME repair, maintenance, replacement, delivery, written order,
      HCPCS, modifier, claim, remittance, denial, and appeal dependencies.
    specialty_specific_exceptions:
    - Do not decide coding, claim payment, denial response, authorization validity, or payer-policy interpretation.
  - category: Healthcare workflow and terminology
    retrieval_policy: Use CAQH CORE and ASTP/ONC sources to normalize eligibility, authorization, claim-status, remittance,
      patient, encounter, device, order, and clinical-documentation terms before preparing evidence packets.
    specialty_specific_exceptions:
    - Do not treat data standards as authority to disclose PHI or decide clinical or payer outcomes.
  - category: Privacy, safety, and consumer service boundaries
    retrieval_policy: Use HHS OCR for PHI handling, FDA for medical-device safety escalation, and FTC for consumer warranty/service-contract
      framing; tenant, manufacturer, payer, and clinical owners determine final action.
    specialty_specific_exceptions:
    - Escalate when PHI handling, device malfunction, patient safety, warranty exception, or service-contract interpretation
      changes the answer.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the public source set as baseline constraints, then require tenant policies, payer contracts, manufacturer/dealer
      programs, source hierarchy, and live systems of record before final disposition.
    - Require tenant, jurisdiction, service model, payer, plan, provider type, facility or service setting, patient/member
      status, service date, equipment identity, warranty posture, work-order state, source hierarchy, privacy posture, and
      routing matrix before resolving.
    - Escalate when public guidance, tenant policy, payer rules, manufacturer warranty, service-contract terms, state program
      requirements, PHI constraints, clinical indicators, or system records materially conflict.
  specialty_specific_exceptions:
  - Do not turn technician support into diagnosis, treatment planning, utilization management, coding, billing, payer operations,
    privacy approval, legal interpretation, warranty adjudication, dispatch control, field engineering, licensed trade signoff,
    or technician execution.
  - Do not promise repair, replacement, coverage, part release, refund, authorization, claim payment, or exception approval
    when records only support escalation or retrieval.
  - Do not close repeat failures or complaints without source record links, complaint summary, actions taken, unresolved item
    owner, and reopen criteria.
  next_review_due_at: '2026-07-13'
