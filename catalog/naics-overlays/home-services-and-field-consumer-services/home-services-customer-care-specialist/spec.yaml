knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Home health and medically adjacent in-home service support is constrained by federal conditions of participation,
      patient rights, care coordination, privacy, and patient-safety requirements.
  - class: Public payer or provider operating guidance
    rationale: Customer care decisions depend on home health eligibility, coverage, referral, authorization, certification,
      visit, ABN, and payment boundary evidence from payer and provider operating rules.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Home services support needs vendor-neutral terminology and workflow references for eligibility transactions,
      OASIS assessment artifacts, status codes, acknowledgements, and evidence handling.
  source_selection_approach: 'Use eCFR, CMS, Medicare.gov, and HHS OCR sources first for regulatory,

    payer, provider, and privacy baselines. Use CMS OASIS and CAQH CORE to

    ground home health assessment terminology, administrative transaction

    workflow, and evidence expectations. Tenant policy remains controlling for

    service model, payer contracts, state Medicaid, field-staff role limits,

    jurisdiction-specific rules, source hierarchy, and escalation thresholds.

    '
