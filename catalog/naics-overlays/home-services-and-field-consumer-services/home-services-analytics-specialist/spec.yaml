  source_categories:
  - category: home-health service workflow and prerequisites
    retrieval_policy: Use eCFR Part 484, CMS home-health conditions, and tenant policy before resolving service analytics
      tied to care planning, field visits, documentation, patient rights, quality, or completion posture.
    specialty_specific_exceptions:
    - Do not treat a CRM ticket or BI extract as sufficient if required EHR, field-note, plan-of-care, referral, authorization,
      eligibility, or OASIS evidence is missing.
  - category: payer, claim, and authorization dependencies
    retrieval_policy: Use CMS benefit, claims-processing, prior-authorization, payer portal, and tenant revenue-cycle sources
      before deciding whether eligibility, referral, authorization, claim, denial, or appeal evidence supports the metric.
    specialty_specific_exceptions:
    - Do not infer coverage, medical necessity, appeal strategy, coding correction, or payer-policy interpretation from analytics
      alone.
  - category: quality measure, OASIS, and public-reporting evidence
    retrieval_policy: Use CMS HH QRP, OASIS, Home Health Star Ratings, Care Compare, and tenant measure dictionaries before
      accepting numerator, denominator, exclusion, benchmark, or public-facing claim logic.
    specialty_specific_exceptions:
    - Do not substitute a tenant dashboard label for formal OASIS or quality-measure logic when the output is treated as quality
      or public-reporting evidence.
  - category: privacy, PHI, and patient safety
    retrieval_policy: Use HHS minimum-necessary guidance, tenant privacy controls, consent context, and disclosure approvals
      before including identifiable or low-volume home-services examples.
    specialty_specific_exceptions:
    - Do not resolve service requests that require privacy-law interpretation, patient-safety judgment, or clinical review
      inside this lane.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the home-services healthcare baseline, but tenant retrieval must provide system locations, source-precedence
      rules, payer or plan context, service setting, metric dictionaries, privacy rules, and approval owners.
    - Every output must record request id, reporting period, cohort logic, patient/member context, service dates, referral
      and authorization dependencies, source freshness, denominator rules, payer or product context, intended audience, and
      confidence posture.
    - Preserve disagreements between referral, authorization, eligibility, EHR encounter, field-note, OASIS, charge, claim,
      remittance, denial, appeal, CRM, and BI records instead of silently normalizing them.
    - Escalate whenever tenant policy, payer contract, public guidance, privacy posture, clinical safety, licensed review,
      quality attestation, or policy authority materially changes the answer.
  specialty_specific_exceptions:
  - Home-services analytics mixes service-support ticketing with healthcare records that have different lags, owners, and
    authority levels.
  - Start-of-care, field-visit, authorization, referral, denial, OASIS, quality, and episode metrics are safe only when patient/member
    context, payer, service setting, denominator logic, exclusions, source hierarchy, refresh window, and intended audience
    are explicit.
  - PHI handling, low-volume denominators, medical necessity, payer interpretation, treatment planning, patient-safety judgment,
    and policy exceptions all require escalation outside this lane.
  next_review_due_at: '2026-08-11'
