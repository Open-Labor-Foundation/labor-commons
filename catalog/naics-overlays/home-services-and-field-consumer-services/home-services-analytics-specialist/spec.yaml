knowledge_baseline:
  source_baseline_version: '2026-04-07'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: CMS, HHS OCR, and eCFR sources define home-health conditions of participation, PHI controls, public reporting
      posture, and regulated boundaries that constrain service analytics outputs.
  - class: Public payer or provider operating guidance
    rationale: CMS Medicare benefit, claims-processing, and prior-authorization guidance establish the workflow prerequisites
      behind eligibility, referral, authorization, encounter, claim, remittance, denial, and appeal truth sets.
  - class: Recognized healthcare workflow or measure guidance
    rationale: CMS Home Health Quality Reporting Program, OASIS, Home Health Star Ratings, Care Compare, and ONC interoperability
      resources define measure, data item, terminology, and evidence handling for home-services analytics.
  - class: Public service, support, client-delivery, or customer-workflow guidance relevant to the lane
    rationale: Home-health conditions of participation and CMS home-health operating references anchor service-request handling
      to field-visit, care-planning, documentation, quality, and patient-rights workflow expectations.
  source_selection_approach: 'Use CMS and eCFR home-health sources first for home-service scope,

    care-planning, coordination, documentation, quality, and field-visit

    prerequisites. Use CMS benefit, claims-processing, and prior-authorization

    references for payer/provider dependencies and claim truth-set boundaries.

    Use HHS OCR minimum-necessary guidance before including PHI, low-volume, or

    patient/member-specific examples. Use CMS Home Health Quality Reporting,

    OASIS, Home Health Star Ratings, Care Compare, and ONC USCDI for measure,

    terminology, data-lineage, and public-reporting constraints. Tenant

    policies, payer contracts, metric dictionaries, current systems of record,

    retrieval hooks, local privacy rules, and approval owners remain mandatory

    runtime overlays.

    '
