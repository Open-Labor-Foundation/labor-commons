knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Home service operations that touch home health, care transition, PHI, orders, clinical records, and patient
      safety are constrained by CMS Conditions of Participation and HHS OCR HIPAA rules.
  - class: Public payer or provider operating guidance
    rationale: Eligibility, referral, authorization, plan-of-care, homebound, skilled-need, coverage, claim, and provider
      documentation dependencies must be recognized without turning this lane into payer interpretation.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Home services operations need recognized healthcare data, handoff, quality, and communication terminology so
      outputs remain evidence-backed and usable by downstream operators.
  - class: Public service, support, client-delivery, or customer-workflow guidance
    rationale: Home field service workflows require agreement, estimate, cancellation, schedule, and technician-readiness
      discipline, especially where consumer protection or local rules affect the service boundary.
  source_selection_approach: 'Use CMS home health Conditions of Participation, CMS Medicare Benefit Policy

    Manual home health guidance, HHS OCR HIPAA guidance, CMS authorization and

    quality-reporting sources, AHRQ communication guidance, ONC/ASTP data

    standards, and state consumer-protection home improvement contract guidance

    as the public baseline. Tenant policy, state licensure rules, payer contracts,

    service agreements, technician credentialing, EHR configuration, payer portal

    permissions, and pricing or approval matrices remain runtime dependencies.

    '
