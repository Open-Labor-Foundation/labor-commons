  source_categories:
  - category: Public healthcare regulator guidance
    retrieval_policy: Use eCFR CMS Conditions of Participation and HHS OCR HIPAA guidance before operational action that touches
      home health care coordination, clinical records, PHI, care instructions, or patient safety.
    specialty_specific_exceptions:
    - Federal baseline does not replace state licensure, tenant policy, physician or allowed practitioner orders, clinical
      manager instructions, or facility-specific privacy controls.
  - category: Public payer or provider operating guidance
    retrieval_policy: Use CMS home health and authorization sources to identify prerequisite categories, then require tenant
      payer, plan, provider, authorization, referral, eligibility, and documentation records.
    specialty_specific_exceptions:
    - Do not infer coverage approval, medical necessity, authorization validity, skilled need, or claim disposition from public
      baseline language.
  - category: Recognized healthcare workflow or measure guidance
    retrieval_policy: Use CMS quality, AHRQ communication, and ONC/ASTP interoperability references to define workflow, handoff,
      quality, data, and evidence terminology.
    specialty_specific_exceptions:
    - Do not treat workflow or measure guidance as permission to provide clinical judgment or bypass patient-specific records.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public sources as baseline constraints; tenant policy and source-of-truth hierarchy are mandatory for operational
      disposition.
    - Require tenant, jurisdiction, payer, provider type, service model, branch or business unit, systems of record, RACI,
      privacy controls, agreement or estimate policy, and escalation SLA before final action.
    - Escalate when public guidance, tenant policy, payer rule, agreement term, clinical record, order, plan of care, authorization,
      referral, eligibility, or field-service evidence conflicts.
  specialty_specific_exceptions:
  - Do not infer service readiness when order, plan-of-care, authorization, referral, eligibility, agreement, estimate, consent,
    privacy, service-address, or technician-readiness records are missing.
  - Do not transform home service operations into clinical review, patient access, utilization management, revenue cycle,
    medical coding, privacy approval, payer operations, or licensed technician ownership.
  - Do not claim resolution until source record, action taken, owner acceptance or handoff, unresolved items, stakeholder
    communication, and audit-ready evidence are recorded.
  next_review_due_at: '2026-08-12'
