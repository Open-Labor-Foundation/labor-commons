  source_categories:
  - category: home-health regulatory and survey baseline
    retrieval_policy: Use 42 CFR Part 484 and CMS HHA certification and survey materials first for Conditions of Participation,
      patient rights, care planning, coordination, quality assessment, and deficiency posture.
    specialty_specific_exceptions:
    - Do not convert regulatory baseline review into final survey, legal, accreditation, or clinical authority.
  - category: home-health payer and claim baseline
    retrieval_policy: Use CMS Medicare Benefit Policy Manual Chapter 7 and Claims Processing Manual Chapter 10 first for eligibility,
      certification, face-to-face, plan-of-care, NOA, claim, remittance, denial, and appeal dependencies.
    specialty_specific_exceptions:
    - Do not decide medical necessity, final coverage, coding correctness, or payer-policy interpretation.
  - category: home-health quality and field-measure evidence
    retrieval_policy: Use HH QRP, Home Health Quality Measures, OASIS, iQIES, HHCAHPS, and HHVBP sources for quality-measure,
      assessment, patient-experience, submission, and performance-report evidence.
    specialty_specific_exceptions:
    - Do not alter OASIS, measure, patient-experience, or performance conclusions without current tenant records and authorized
      reviewer support.
  - category: privacy and patient-safety controls
    retrieval_policy: Use HHS OCR privacy guidance and tenant policy for PHI minimization, permitted access, disclosure, consent,
      and non-routine request handling.
    specialty_specific_exceptions:
    - Do not determine privacy obligations or breach handling; route those questions to privacy or compliance owners.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public CMS, eCFR, and HHS sources define the baseline for home-health field-quality support, quality reporting, payer
      prerequisites, evidence handling, privacy, and boundary behavior.
    - Tenant facts about jurisdiction, payer, plan, service model, agency certification, patient/member status, service dates,
      authorization, referral, consent, clinical reviewer, and systems-of-record locations are mandatory before case-specific
      conclusions.
    - Escalate when payer, state Medicaid, accreditation, tenant policy, or source conflicts materially change release, closure,
      authorization, quality reporting, privacy, claim, or corrective-action posture.
  specialty_specific_exceptions:
  - Keep the lane centered on home-health field quality evidence and service-resolution support, not clinical decision-making,
    payer interpretation, privacy investigation, coding, utilization management, or final claim approval.
  - Separate administrative quality findings from licensed judgments about diagnosis, skilled need, treatment, homebound status,
    or medical necessity.
  - Do not certify legal reportability, clinical safety disposition, privacy compliance, or final HHA quality attestation
    from public references alone.
  source_baseline_version: '2026-04-13'
  next_review_due_at: '2026-07-12'
