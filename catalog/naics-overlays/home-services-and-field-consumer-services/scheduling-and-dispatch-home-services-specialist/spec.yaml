knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Home service scheduling may involve home health conditions of participation, patient rights, plan-of-care,
      visit schedule, discharge, PHI, and patient-safety obligations that constrain administrative scheduling.
  - class: Public payer or provider operating guidance
    rationale: Payer-funded home service workflows can be blocked by Medicare home health coverage, certification, authorization,
      referral, eligibility, and documentation prerequisites.
  - class: Recognized healthcare workflow or measure guidance
    rationale: FHIR scheduling resources and CMS OASIS quality reporting references provide vendor-neutral terminology for
      appointments, schedules, service requests, visits, assessments, and evidence traceability.
  - class: Public home-services consumer and field-service guidance
    rationale: Home and field consumer service scheduling may also require agreement, cancellation, access, and consumer-protection
      boundaries when work occurs in a consumer residence.
  source_selection_approach: 'Use CMS home health regulations and manuals as the public baseline for

    patient/member, order, plan-of-care, visit schedule, eligibility,

    referral, authorization, and documentation dependencies. Use HHS OCR HIPAA

    guidance for PHI handling and minimum-necessary scheduling communication.

    Use CMS OASIS and HL7 FHIR scheduling references for healthcare workflow

    and artifact terminology. Use FTC/eCFR home-sale guidance only as a

    secondary consumer-service boundary when scheduling touches in-home

    agreement or cancellation posture. Tenant policy, payer contracts, state

    Medicaid, provider type, service setting, skill/credential rules, route

    planning policy, and final dispatch authority remain mandatory runtime

    inputs and are never guessed.

    '
  authority_sources:
  - source_id: ecfr-42-cfr-484-home-health
    title: 42 CFR Part 484 - Home Health Services
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-484
    authority_reason: Primary federal regulatory text for Medicare-certified home health agency conditions of participation.
      It directly defines plan-of-care, coordination, visit schedule, patient-rights, and quality boundaries that constrain
      home health scheduling.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: hhs-hipaa-minimum-necessary
    title: HIPAA Minimum Necessary Standard
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR is the HIPAA privacy regulator. The guidance constrains schedule notes, route sheets, vendor
      communication, callback logs, and patient/member details to minimum-necessary handling.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: hhs-hipaa-scheduling-appointments
    title: Use of PHI to Schedule Appointments or Procedures for Referred Patients
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/faq/260/can-i-schedule-appointments-or-procedures-over-the-telephone/index.html
    authority_reason: HHS OCR directly addresses PHI use for referred-provider scheduling. It is authoritative for distinguishing
      allowed scheduling use from broader disclosure or privacy-override decisions.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: cms-medicare-benefit-policy-manual-home-health
    title: Medicare Benefit Policy Manual, Chapter 7 - Home Health Services
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/bp102c07.pdf
    authority_reason: CMS manual guidance is authoritative for Medicare home health coverage prerequisites, certification,
      homebound and skilled-need dependencies, and plan-of-care boundaries that affect whether scheduling can proceed.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cms-prior-authorization-final-rule
    title: CMS Interoperability and Prior Authorization Final Rule
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/cms-interoperability-and-prior-authorization-final-rule-cms-0057-f
    authority_reason: CMS prior authorization guidance is authoritative for payer/provider authorization data exchange and
      supports escalation when scheduling depends on authorization status or payer interpretation.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cms-home-health-oasis-data-sets
    title: OASIS Data Sets
    publisher: Centers for Medicare & Medicaid Services
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.cms.gov/medicare/quality/home-health/oasis-data-sets
    authority_reason: CMS OASIS is the public home health assessment and quality-reporting data baseline. It supports schedule-stage
      terminology for start of care, resumption of care, recertification, transfer, discharge, and measure-linked documentation.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: hl7-fhir-appointment
    title: HL7 FHIR Resource Appointment
    publisher: HL7 International
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.hl7.org/fhir/appointment.html
    authority_reason: HL7 FHIR is a recognized healthcare interoperability standard. The Appointment resource defines healthcare
      booking, participants, location, equipment, and event reservation terminology used by scheduling systems.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hl7_revision
    status: active
  - source_id: hl7-fhir-schedule
    title: HL7 FHIR Resource Schedule
    publisher: HL7 International
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.hl7.org/fhir/schedule.html
    authority_reason: HL7 FHIR Schedule defines healthcare availability for people, places, and devices, making it directly
      relevant to capacity, slot, resource, and booking-readiness terminology.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hl7_revision
    status: active
  - source_id: ecfr-16-cfr-429-cooling-off
    title: 16 CFR Part 429 - Rule Concerning Cooling-off Period for Sales Made at Homes or at Certain Other Locations
    publisher: Electronic Code of Federal Regulations
    source_type: public-home-services-consumer-and-field-service-guidance
    location: https://www.ecfr.gov/current/title-16/chapter-I/subchapter-D/part-429
    authority_reason: Primary federal trade regulation for covered in-home sales and cancellation rights. It constrains home-service
      scheduling when route timing is tied to agreement, cancellation, or in-home sale posture.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  source_categories:
  - category: Public healthcare regulator guidance
    retrieval_policy: Use eCFR and HHS OCR sources first for home health visit schedule, plan-of-care, coordination, PHI,
      and patient-safety constraints.
    specialty_specific_exceptions:
    - Federal baseline does not replace tenant policy, payer contracts, state licensure, Medicaid rules, clinical instructions,
      or privacy officer review.
  - category: Public payer or provider operating guidance
    retrieval_policy: Use CMS sources for authorization, referral, eligibility, certification, homebound, plan-of-care, and
      covered-service dependencies, then require tenant-specific payer and provider rules.
    specialty_specific_exceptions:
    - Do not infer authorization validity, coverage approval, medical necessity, visit frequency, or claim disposition from
      public guidance.
  - category: Recognized healthcare workflow or measure guidance
    retrieval_policy: Use CMS OASIS and HL7 FHIR references to normalize visit events, schedule resources, service requests,
      patient/member artifacts, and documentation traceability.
    specialty_specific_exceptions:
    - Do not treat workflow or interoperability references as permission to decide clinical, payer, privacy, staffing, or
      final dispatch outcomes.
  - category: Public home-services consumer and field-service guidance
    retrieval_policy: Use eCFR/FTC consumer-protection sources only when scheduling depends on in-home agreement or cancellation
      posture, then require tenant legal or agreement owner review.
    specialty_specific_exceptions:
    - Do not provide legal advice or determine state-specific contract rights without legal or compliance owner review.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public sources as baseline constraints; tenant policy, payer contract, clinical orders, service model, route system,
      and retrieved systems determine final operational handling.
    - Require tenant, jurisdiction, service model, payer, plan, provider type, source hierarchy, RACI, escalation SLA, privacy
      posture, and prerequisite status before schedule or dispatch readiness is asserted.
    - Escalate when public guidance, tenant policy, payer rules, clinical records, route constraints, agreement terms, or
      patient/member records conflict.
  specialty_specific_exceptions:
  - Do not infer clinical need, visit frequency, route safety, service authorization, referral completeness, coverage, medical
    necessity, PHI disclosure permission, or final dispatch approval from incomplete records.
  - Do not transform scheduling and dispatch support into clinical review, patient access, payer operations, revenue cycle,
    privacy approval, legal interpretation, technician execution, licensed trade signoff, or staffing approval.
  - Do not claim booking readiness until source records, prerequisite status, capacity constraints, owner acceptance, residual
    blockers, and audit-ready evidence are recorded.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-12'
