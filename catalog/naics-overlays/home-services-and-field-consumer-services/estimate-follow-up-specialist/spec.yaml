- finance-or-approval-owner
knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Estimate follow-up can involve patient/member records, good faith estimate obligations, PHI handling, and clinical-safety
      boundaries that are constrained by federal healthcare regulations and HHS OCR guidance.
  - class: Public payer or provider operating guidance
    rationale: Home, field, DME/HME, and home-health estimate follow-up may be blocked by coverage, plan, authorization, referral,
      provider, and service-setting prerequisites that must be routed without payer interpretation.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Estimate artifacts, patient/member identifiers, encounter/order/service terminology, and healthcare handoff
      records require recognized public workflow and interoperability references.
  - class: Public contractor and home-services consumer guidance
    rationale: Home services estimate follow-up must preserve agreement, cancellation, in-home sale, scope, and technician-readiness
      boundaries rather than acting as generic sales follow-up.
  authority_sources:
  - source_id: ecfr-45-cfr-149-610-good-faith-estimates
    title: 45 CFR 149.610 - Requirements for provision of good faith estimates of expected charges for uninsured or self-pay
      individuals
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-45/subtitle-A/subchapter-B/part-149/subpart-G/section-149.610
    authority_reason: Primary federal regulatory text for good faith estimate requirements. It directly grounds healthcare-linked
      estimate content, status, and dispute-boundary handling.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: hhs-hipaa-minimum-necessary
    title: HIPAA Minimum Necessary Standard
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR is the HIPAA privacy regulator. The guidance determines when estimate follow-up artifacts containing
      PHI require limited disclosure, role controls, and privacy escalation.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: cms-prior-authorization-final-rule
    title: CMS Interoperability and Prior Authorization Final Rule
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/cms-interoperability-and-prior-authorization-final-rule-cms-0057-f
    authority_reason: CMS prior authorization guidance is authoritative for payer/provider authorization workflow expectations
      and supports escalation when estimate follow-up is blocked by authorization status.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cms-medicare-benefit-policy-manual-home-health
    title: Medicare Benefit Policy Manual, Chapter 7 - Home Health Services
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/bp102c07.pdf
    authority_reason: CMS manual guidance is authoritative for Medicare home health coverage prerequisites, plan-of-care dependencies,
      homebound criteria, and clinical-versus-administrative escalation boundaries for home service workflows.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cms-sample-good-faith-estimate
    title: Sample Good Faith Estimate for Uninsured (or Self-Pay) Individuals
    publisher: Centers for Medicare & Medicaid Services
    source_type: recognized-healthcare-workflow-guidance
    location: https://www.cms.gov/files/document/nsa-sample-good-faith-estimate.pdf
    authority_reason: CMS provides the public sample form and itemized workflow expectations for healthcare good faith estimate
      artifacts, co-provider notes, expected charges, disclaimers, and dispute process references.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: onc-uscdi-v6
    title: United States Core Data for Interoperability Version 6
    publisher: Assistant Secretary for Technology Policy / Office of the National Coordinator for Health IT
    source_type: recognized-healthcare-workflow-guidance
    location: https://www.healthit.gov/isa/united-states-core-data-interoperability-uscdi
    authority_reason: ASTP/ONC USCDI is the federal interoperability data baseline for patient, encounter, order, care team,
      procedure, and clinical note terminology used by EHR and operational systems.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_uscdi_revision
    status: active
  - source_id: ecfr-16-cfr-429-cooling-off
    title: 16 CFR Part 429 - Rule Concerning Cooling-off Period for Sales Made at Homes or at Certain Other Locations
    publisher: Electronic Code of Federal Regulations
    source_type: public-contractor-and-home-services-consumer-guidance
    location: https://www.ecfr.gov/current/title-16/chapter-I/subchapter-D/part-429
    authority_reason: Primary federal trade regulation for covered in-home sales and cancellation rights. It constrains home-service
      estimate follow-up when agreement, cancellation, or in-home sale posture is implicated.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: ftc-cooling-off-consumer-guidance
    title: 'Buyer''s Remorse: The FTC''s Cooling-Off Rule May Help'
    publisher: Federal Trade Commission
    source_type: public-contractor-and-home-services-consumer-guidance
    location: https://consumer.ftc.gov/articles/buyers-remorse-ftcs-cooling-rule-may-help
    authority_reason: FTC is the federal consumer-protection regulator. The guidance explains covered in-home sale, cancellation-form,
      refund, and exception concepts that estimate follow-up must route rather than override.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_ftc_revision
    status: active
  source_categories:
  - category: Public healthcare regulator guidance
    retrieval_policy: Use eCFR, HHS OCR, and CMS sources first for good faith estimate, PHI, and healthcare estimate follow-up
      constraints.
    specialty_specific_exceptions:
    - Federal baseline does not replace tenant policy, payer contracts, state law, clinical instructions, or legal review.
  - category: Public payer or provider operating guidance
    retrieval_policy: Use CMS payer/provider sources for authorization, referral, eligibility, home health, plan-of-care,
      and coverage dependencies, then require tenant-specific payer and provider rules.
    specialty_specific_exceptions:
    - Do not infer authorization validity, coverage approval, medical necessity, or claim disposition from public guidance.
  - category: Recognized healthcare workflow or measure guidance
    retrieval_policy: Use CMS GFE samples and ONC/ASTP data references to define estimate fields, patient/member artifacts,
      order and encounter terms, and documentation traceability.
    specialty_specific_exceptions:
    - Do not treat samples or data standards as permission to decide clinical, payer, privacy, or pricing outcomes.
  - category: Public contractor and home-services consumer guidance
    retrieval_policy: Use FTC and eCFR sources for in-home sale, cancellation, refund, and agreement-boundary facts, then
      require tenant jurisdiction and contract-policy review.
    specialty_specific_exceptions:
    - Do not provide legal advice or determine state-specific contract rights without legal or compliance owner review.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public sources as baseline constraints; tenant policy, payer contract, agreement terms, and retrieved systems determine
      final operational handling.
    - Require tenant, jurisdiction, service model, payer, plan, provider type, source-of-truth hierarchy, RACI, escalation
      SLA, privacy posture, and prerequisite status before final follow-up disposition.
    - Escalate when public guidance, tenant policy, payer rules, agreement terms, contractor rules, or patient/member records
      conflict.
  specialty_specific_exceptions:
  - Do not infer agreement acceptance, cancellation validity, clinical need, payer coverage, authorization validity, referral
    completeness, or PHI disclosure permission from incomplete records.
  - Do not transform estimate follow-up into sales, clinical review, payer operations, revenue cycle, privacy approval, legal
    interpretation, technician execution, licensed trade signoff, or financial approval.
  - Do not claim completion until source record, owner acceptance, residual blockers, and audit-ready evidence are recorded.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-11'
