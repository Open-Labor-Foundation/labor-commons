knowledge_baseline:
  source_baseline_version: v0.1.0
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Service agreement work can involve PHI, healthcare operations, authorization, DMEPOS, and home health prerequisites
      constrained by CMS, HHS OCR, and eCFR guidance.
  - class: Public payer or provider operating guidance
    rationale: Care-adjacent home and field service agreements may be blocked by coverage, plan, authorization, referral,
      provider, supplier, delivery, maintenance, and service-setting prerequisites.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Agreement artifacts that touch patient/member identity, orders, encounters, authorizations, claims, and service
      records require recognized public workflow and interoperability references.
  - class: Public home-services consumer and warranty guidance
    rationale: Home service agreements, in-home sales, warranty, service-contract, cancellation, and service-boundary facts
      must be grounded in consumer-protection and warranty authorities.
  authority_sources:
  - source_id: ftc-businesspersons-guide-federal-warranty-law
    title: Businessperson's Guide to Federal Warranty Law
    publisher: Federal Trade Commission
    source_type: public-home-services-consumer-and-warranty-guidance
    location: https://www.ftc.gov/business-guidance/resources/businesspersons-guide-federal-warranty-law
    authority_reason: FTC business guidance is authoritative for federal warranty and service-contract concepts, including
      written warranty, service contract, pre-sale availability, and dispute-boundary principles that constrain service agreement
      handling.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_ftc_revision
    status: active
  - source_id: ecfr-16-cfr-part-701
    title: 16 CFR Part 701 - Disclosure of Written Consumer Product Warranty Terms and Conditions
    publisher: Electronic Code of Federal Regulations
    source_type: public-home-services-consumer-and-warranty-guidance
    location: https://www.ecfr.gov/current/title-16/chapter-I/subchapter-G/part-701
    authority_reason: Primary federal regulation for disclosure of written consumer product warranty terms, supporting the
      requirement that coverage, duration, remedy, exclusion, and owner facts be retrieved rather than guessed.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: ecfr-16-cfr-429-cooling-off
    title: 16 CFR Part 429 - Rule Concerning Cooling-off Period for Sales Made at Homes or at Certain Other Locations
    publisher: Electronic Code of Federal Regulations
    source_type: public-home-services-consumer-and-warranty-guidance
    location: https://www.ecfr.gov/current/title-16/chapter-I/subchapter-D/part-429
    authority_reason: Primary federal trade regulation for covered in-home sales and cancellation notice posture, directly
      relevant when a home service agreement touches cancellation, renewal, or customer communication boundaries.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: ecfr-42-cfr-424-57-dmepos-supplier-standards
    title: 42 CFR 424.57 - DMEPOS Supplier Standards
    publisher: Electronic Code of Federal Regulations
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-B/part-424/subpart-D/section-424.57
    authority_reason: Primary federal supplier standard for Medicare DMEPOS suppliers, including warranty, maintenance, repair,
      delivery proof, beneficiary complaint, contact, and documentation requirements for covered items.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: hhs-hipaa-minimum-necessary
    title: HIPAA Minimum Necessary Standard
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR is the HIPAA privacy regulator. This guidance constrains agreement notes, service records, vendor
      routing, and escalation packets that include PHI.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: hhs-ocr-treatment-payment-healthcare-operations
    title: Uses and Disclosures for Treatment, Payment, and Health Care Operations
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/disclosures-treatment-payment-health-care-operations/index.html
    authority_reason: HHS OCR guidance is authoritative for when healthcare operations or payment activities may use PHI and
      when agreement workflow routing must stop for privacy review.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: cms-interoperability-prior-authorization
    title: Interoperability and Prior Authorization
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/priorities/key-initiatives/burden-reduction/prior-authorization
    authority_reason: CMS is authoritative for covered payer prior authorization interoperability requirements and authorization
      status evidence, supporting hold and escalation rules when agreement service depends on authorization or referral state.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cms-medicare-benefit-policy-manual-home-health
    title: Medicare Benefit Policy Manual, Chapter 7 - Home Health Services
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/bp102c07.pdf
    authority_reason: CMS manual guidance is authoritative for Medicare home health prerequisites, plan-of-care dependencies,
      homebound criteria, and the need to route clinical or medical-necessity questions outside administrative agreement handling.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: onc-uscdi-v6
    title: United States Core Data for Interoperability Version 6
    publisher: Assistant Secretary for Technology Policy / Office of the National Coordinator for Health IT
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.healthit.gov/isa/united-states-core-data-interoperability-uscdi
    authority_reason: ASTP/ONC USCDI is the federal healthcare interoperability data baseline for patient, encounter, order,
      procedure, care team, and clinical note terminology used by EHR, payer, CRM, and service agreement systems.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_uscdi_revision
    status: active
  - source_id: caqh-core-operating-rules
    title: CAQH CORE Operating Rules
    publisher: CAQH CORE
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.caqh.org/core/operating-rules
    authority_reason: CAQH CORE operating rules are recognized national healthcare administrative operating rules for eligibility,
      claim status, prior authorization, payment, and remittance transactions used in provider and payer workflows.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_caqh_revision
    status: active
  source_categories:
  - category: consumer-warranty-service-contract-and-in-home-sale-guidance
    retrieval_policy: Use FTC and eCFR sources for warranty, service-contract, disclosure, in-home sale, cancellation, refund,
      and agreement-boundary facts, then require tenant jurisdiction and contract-policy review.
    specialty_specific_exceptions:
    - Do not provide legal advice or decide state-specific contract rights without legal or compliance owner review.
  - category: healthcare-regulator-and-privacy-guidance
    retrieval_policy: Use HHS OCR, CMS, and eCFR sources first for PHI, DMEPOS, healthcare operations, and patient/member
      agreement-service constraints.
    specialty_specific_exceptions:
    - Do not infer authorization validity, coverage approval, medical necessity, or PHI disclosure permission from public
      guidance alone.
  - category: payer-provider-and-healthcare-workflow-guidance
    retrieval_policy: Use CMS, ONC/ASTP, and CAQH CORE sources to define authorization, referral, eligibility, order, encounter,
      claim, remittance, and system-of-record terminology.
    specialty_specific_exceptions:
    - Do not treat workflow standards as permission to decide clinical, payer, privacy, coding, claim, or reimbursement outcomes.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public sources as baseline constraints; tenant policy, payer contract, service agreement terms, warranty terms,
      source-system records, and accountable owners determine final operational handling.
    - Require tenant, jurisdiction, service model, payer, plan, provider type, service setting, source-of-truth hierarchy,
      RACI, escalation SLA, privacy posture, agreement terms, and prerequisite status before final agreement disposition.
    - Escalate when public guidance, tenant policy, payer rules, agreement terms, warranty terms, state law, patient/member
      records, or source systems conflict.
  specialty_specific_exceptions:
  - Do not infer agreement acceptance, renewal, cancellation validity, coverage entitlement, clinical need, payer coverage,
    authorization validity, referral completeness, warranty obligation, or PHI disclosure permission from incomplete records.
  - Do not transform service agreement handling into sales, legal interpretation, clinical review, payer operations, revenue
    cycle, coding, privacy approval, dispatch, technician execution, licensed trade signoff, or financial approval.
  - Do not claim completion until agreement status, service disposition, source record, owner acceptance, residual blockers,
    and audit-ready evidence are recorded.
  next_review_due_at: '2026-08-12'
