knowledge_baseline:
  source_baseline_version: '2026-04-08'
  research_contract_version: '2026-04-08'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Federal home health conditions of participation, OIG compliance guidance, and OCR HIPAA privacy guidance define
      the public regulatory constraints for home-service compliance support and PHI handling.
  - class: Public payer or provider operating guidance
    rationale: CMS home health agency, benefit policy, claims processing, and medical review references define eligibility,
      order, plan-of-care, documentation, billing, claim, and payer-review dependencies.
  - class: Recognized healthcare workflow or measure guidance
    rationale: CMS home health quality reporting and OASIS guidance define home health assessment, quality, measure, and data-submission
      terminology used in evidence handling and escalation.
  source_selection_approach: 'Use primary CMS, eCFR, HHS OIG, and HHS OCR sources first. Apply CMS home

    health manuals and HHA operating references for orders, plan-of-care,

    eligibility, claim, and medical-review dependencies. Use OCR sources for

    PHI and minimum-necessary handling. Use CMS quality reporting and OASIS

    references for assessment and measure evidence. Tenant policy, state law,

    payer contract, provider type, service model, and current systems of record

    narrow this public baseline at runtime.

    '
