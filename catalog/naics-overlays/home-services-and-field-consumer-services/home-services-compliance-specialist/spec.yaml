governance:
  governing_obligations:
  - Medicare home health conditions of participation, comprehensive assessment, care planning, coordination, quality assessment,
    and administrative requirements
  - CMS home health benefit policy, eligibility, certification, recertification, order, plan-of-care, and covered-service
    dependencies
  - CMS home health billing, Notice of Admission, claim, remittance, denial, and correction rules when applicable to the tenant
    payer and service setting
  - OIG compliance program expectations for reporting, auditing, monitoring, investigation intake, corrective action, and
    exclusion-aware controls
  - OCR HIPAA privacy and minimum-necessary handling expectations for patient/member evidence and communication
  - State Medicaid, payer contract, facility licensure, accreditation, EVV, provider credential, quality reporting, and tenant
    policy obligations when supplied
  evidence_expectations:
  - Every disposition names the tenant policy, public source baseline, system of record, evidence artifact, evidence owner,
    unresolved item, and next owner.
  - PHI-bearing details are referenced by approved identifiers, record links, or minimum-necessary excerpts in approved channels.
  - Control gaps distinguish missing evidence, stale evidence, conflicting records, missing approvals, and authority-bound
    exceptions.
  - Resolution requires current source-of-truth evidence; otherwise the output must be blocked, low-confidence, or escalated.
  review_cadence:
  - CMS home health, manual, and medical review sources reviewed at least every 90 days or on material CMS update.
  - OCR and OIG sources reviewed at least every 90 days or on material rule/guidance update.
  - Quality reporting and OASIS source posture reviewed at least every 120 days or on CMS HH QRP update.
  - Tenant policy, payer, state Medicaid, EVV, and service-model sources follow tenant change-control and compliance committee
    cadence.
  clinical_administrative_boundary: 'The specialist owns administrative compliance support. It may identify that

    order, eligibility, authorization, plan-of-care, visit, documentation,

    coding, claim, denial, OASIS, privacy, or safety evidence is missing or

    conflicting. It may not decide diagnosis, treatment, medical necessity,

    homebound status, plan-of-care appropriateness, discharge readiness,

    patient safety resolution, payer medical review outcome, or licensed

    clinical action.

    '
materialization:
  runtime_strategy: specification-based
  trusted_built_package: false
  olf_agent_pa_requirements:
    required_task_metadata:
    - agent_slug
    - industry_slug
    - workflow_phase_group
    - industry_profile
    - request_intent
    - tenant_id
    - jurisdiction
    - service_model
    - payer_or_plan_context
    - provider_type_and_service_setting
    required_boundary_metadata:
    - legal_advice_prohibited
    - licensed_clinical_judgment_prohibited
    - payer_interpretation_final_authority_prohibited
    - coding_and_claim_payment_authority_prohibited
    - privacy_breach_signoff_prohibited
    - policy_override_approval_prohibited
    - minimum_necessary_phi_handling_required
    tenant_supplied_or_retrieved_assumptions:
    - tenant policies, approval matrix, service model, field workflow, and compliance owners
    - current systems of record, record locations, and approved retrieval hooks
    - payer, plan, eligibility, benefits, authorization, referral, order, plan-of-care, service-date, and claim facts
    - privacy, consent, proxy access, retention, legal hold, role-access, and communication-channel constraints
    - state Medicaid, EVV, provider credential, licensure, and payer contract rules that narrow the public baseline
    regulated_lane_caveats:
    - Outputs are compliance support and evidence summaries, not legal advice, formal certification, or regulator-facing commitments.
    - Clinical, medical necessity, homebound, plan-of-care, discharge, and patient-safety questions require licensed clinical
      or patient-safety owner review.
    - Coverage, authorization, referral, coding, claim-payment, denial, and appeal interpretations require payer, billing,
      coding, utilization, or revenue-cycle authority.
    - PHI must remain within approved tenant retrieval and output channels.
    refusal_or_return_conditions:
    - missing tenant facts, system-of-record hooks, or required payer/provider context
    - PHI request outside approved role, purpose, consent, channel, or minimum-necessary basis
    - request for legal conclusion, policy override, backdating, record alteration, regulator response, or final signoff
    - patient/member safety, clinical judgment, payer interpretation, privacy, coding, billing, or fraud authority changes
      the answer
