knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Parts procurement can involve DME/HME supplier obligations, patient/member records, PHI handling, and clinical-safety
      boundaries constrained by federal healthcare regulations and HHS OCR guidance.
  - class: Public payer or provider operating guidance
    rationale: Care-adjacent parts, DME/HME, and home-health support may be blocked by coverage, plan, authorization, referral,
      provider, and documentation prerequisites that must be routed without payer interpretation.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Patient/member identifiers, encounter/order/service terms, DME or medical-device identifiers, and healthcare
      handoff records require recognized public workflow and interoperability references.
  - class: Public environmental and occupational safety regulator guidance
    rationale: HVAC refrigerants, hazardous chemicals, batteries, and other controlled parts may require EPA or OSHA-constrained
      handling, documentation, and escalation.
  - class: Public consumer product safety and home-services guidance
    rationale: Home-services parts may be affected by recalls, stop-use notices, in-home sale or service rules, warranty posture,
      or consumer-safety communication boundaries.
  authority_sources:
  - source_id: hhs-hipaa-minimum-necessary
    title: HIPAA Minimum Necessary Standard
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR is the HIPAA privacy regulator. The guidance constrains patient/member data in vendor sourcing,
      shipping, address, callback, and parts-status communications.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: ecfr-42-cfr-424-57-dmepos
    title: 42 CFR 424.57 - Special payment rules for items furnished by DMEPOS suppliers and issuance of DMEPOS supplier billing
      privileges
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-B/part-424/subpart-D/section-424.57
    authority_reason: Primary federal regulatory text for DMEPOS supplier standards and billing privilege conditions, grounding
      DME/HME supplier, order, service, and patient-safety boundaries.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: cms-dmepos-quality-standards
    title: DMEPOS Quality Standards
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/Medicare/Medicare-Fee-for-Service-Payment/DMEPOSCompetitiveBid/Downloads/dmepos_qualitystandards.pdf
    authority_reason: CMS quality standards are authoritative for DMEPOS supplier operations, delivery, setup, patient instruction,
      service, complaint, and record expectations relevant to parts readiness.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cms-prior-authorization-final-rule
    title: CMS Interoperability and Prior Authorization Final Rule
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/cms-interoperability-and-prior-authorization-final-rule-cms-0057-f
    authority_reason: CMS prior authorization guidance is authoritative for payer/provider authorization workflow expectations
      and supports escalation when parts fulfillment is blocked by authorization or payer-data status.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: onc-uscdi-v6
    title: United States Core Data for Interoperability Version 6
    publisher: Assistant Secretary for Technology Policy / Office of the National Coordinator for Health IT
    source_type: recognized-healthcare-workflow-guidance
    location: https://www.healthit.gov/isa/united-states-core-data-interoperability-uscdi
    authority_reason: ASTP/ONC USCDI is the federal interoperability data baseline for patient, encounter, order, care team,
      procedure, clinical note, and device terminology used by EHR and operational systems.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_uscdi_revision
    status: active
  - source_id: fda-unique-device-identification-system
    title: Unique Device Identification System
    publisher: U.S. Food and Drug Administration
    source_type: recognized-healthcare-workflow-guidance
    location: https://www.fda.gov/medical-devices/device-advice-comprehensive-regulatory-assistance/unique-device-identification-system-udi-system
    authority_reason: FDA is the federal medical-device regulator. UDI guidance grounds medical-device identifier, model,
      lot, serial, and traceability terminology when home-service parts include DME/HME or medical devices.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_fda_revision
    status: active
  - source_id: epa-section-608-stationary-refrigeration
    title: Stationary Refrigeration and Air Conditioning
    publisher: U.S. Environmental Protection Agency
    source_type: public-environmental-regulator-guidance
    location: https://www.epa.gov/section608/stationary-refrigeration-and-air-conditioning
    authority_reason: EPA administers Clean Air Act Section 608 rules for refrigerant handling, recovery, certification, and
      service constraints that can block HVAC parts procurement or fulfillment.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_epa_revision
    status: active
  - source_id: ecfr-29-cfr-1910-1200-hazcom
    title: 29 CFR 1910.1200 - Hazard communication
    publisher: Electronic Code of Federal Regulations
    source_type: public-occupational-safety-regulator-guidance
    location: https://www.ecfr.gov/current/title-29/subtitle-B/chapter-XVII/part-1910/section-1910.1200
    authority_reason: Primary OSHA hazard-communication regulation for chemical classification, labels, and safety data sheets
      that constrain sourcing, storage, and technician handoff for hazardous service parts.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: cpsc-recalls
    title: Recalls
    publisher: U.S. Consumer Product Safety Commission
    source_type: public-consumer-product-safety-guidance
    location: https://www.cpsc.gov/Recalls
    authority_reason: CPSC is the federal consumer product safety regulator. Recall data constrains whether consumer parts,
      equipment, and replacement units may be sourced, released, or escalated.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval_or_recall_update
    status: active
  - source_id: ecfr-16-cfr-429-cooling-off
    title: 16 CFR Part 429 - Rule Concerning Cooling-off Period for Sales Made at Homes or at Certain Other Locations
    publisher: Electronic Code of Federal Regulations
    source_type: public-home-services-consumer-guidance
    location: https://www.ecfr.gov/current/title-16/chapter-I/subchapter-D/part-429
    authority_reason: Primary federal trade regulation for covered in-home sales and cancellation rights. It constrains parts
      or service procurement when agreement, cancellation, or in-home sale posture is implicated.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  source_categories:
  - category: Public healthcare regulator guidance
    retrieval_policy: Use HHS OCR and eCFR healthcare sources first for PHI, DMEPOS supplier, patient/member, order, delivery,
      and service-boundary constraints.
    specialty_specific_exceptions:
    - Federal baseline does not replace tenant policy, payer contracts, state law, clinical instructions, or legal review.
  - category: Public payer or provider operating guidance
    retrieval_policy: Use CMS payer/provider sources for DMEPOS, authorization, referral, eligibility, order, supplier, delivery,
      complaint, and documentation dependencies, then require tenant-specific payer and provider rules.
    specialty_specific_exceptions:
    - Do not infer authorization validity, coverage approval, medical necessity, claim disposition, or billability from public
      guidance.
  - category: Recognized healthcare workflow or measure guidance
    retrieval_policy: Use ONC/ASTP and FDA references to define patient/member, device, model, lot, serial, order, encounter,
      and documentation traceability terms.
    specialty_specific_exceptions:
    - Do not treat data standards as permission to decide clinical, payer, privacy, quality-release, or product-substitution
      outcomes.
  - category: Public environmental and occupational safety regulator guidance
    retrieval_policy: Use EPA and OSHA sources to flag refrigerant, hazardous-material, label, SDS, certification, storage,
      and safety handoff constraints.
    specialty_specific_exceptions:
    - Do not determine technician certification sufficiency, hazardous-material release, or safe installation method without
      accountable safety or licensed owner review.
  - category: Public consumer product safety and home-services guidance
    retrieval_policy: Use CPSC, FTC, and eCFR consumer sources for recall, stop-use, cancellation, replacement, warranty,
      and customer communication boundary facts.
    specialty_specific_exceptions:
    - Do not provide legal advice or determine state-specific contract, recall remedy, warranty, or cancellation rights without
      legal or compliance owner review.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public sources as baseline constraints; tenant policy, payer contract, vendor terms, product documentation, and
      retrieved systems determine final operational handling.
    - Require tenant, jurisdiction, service model, product category, payer, plan, provider type, source-of-truth hierarchy,
      RACI, escalation SLA, privacy posture, and prerequisite status before final disposition.
    - Escalate when public guidance, tenant policy, payer rules, vendor terms, product safety, warranty posture, recall records,
      or patient/member records conflict.
  specialty_specific_exceptions:
  - Do not infer approved substitute, vendor acceptability, warranty remedy, authorization validity, referral completeness,
    clinical need, payer coverage, PHI disclosure permission, or safety release from incomplete records.
  - Do not transform parts procurement into clinical review, payer operations, revenue cycle, privacy approval, legal interpretation,
    supplier approval, licensed trade signoff, technician execution, or financial approval.
  - Do not claim resolution until source record, owner acceptance, residual blockers, and audit-ready evidence are recorded.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-12'
