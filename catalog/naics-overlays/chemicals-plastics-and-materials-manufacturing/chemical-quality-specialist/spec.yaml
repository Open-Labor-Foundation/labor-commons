    publisher: Occupational Safety and Health Administration
    source_type: primary-process-safety-regulation
    location: https://www.osha.gov/laws-regs/regulations/standardnumber/1910/1910.119
    authority_reason: The OSHA standard is the primary federal rule for threshold-driven covered-process applicability, process
      safety information, pre-startup review, mechanical integrity, hot-work permits, incident investigation, compliance audits,
      and quality-assurance checks on process equipment in covered chemical operations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: osha-cpl-02-01-065
    title: CPL 02-01-065 Process Safety Management of Highly Hazardous Chemicals
    publisher: Occupational Safety and Health Administration
    source_type: official-psm-enforcement-manual
    location: https://www.osha.gov/sites/default/files/enforcement/directives/CPL_02-01-065.pdf
    authority_reason: This OSHA enforcement manual is authoritative for how the agency interprets and inspects PSM evidence,
      including process safety information, operating procedures, mechanical-integrity records, incident investigations, and
      compliance-audit sufficiency.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ecfr-40-part-68
    title: 40 CFR Part 68 - Chemical Accident Prevention Provisions
    publisher: Electronic Code of Federal Regulations
    source_type: primary-environmental-process-safety-regulation
    location: https://www.ecfr.gov/current/title-40/chapter-I/subchapter-C/part-68
    authority_reason: The current eCFR text is the primary federal rule for RMP threshold determination, safety information,
      maintenance, incident investigation, audit, recordkeeping, permit-linked data, and covered-process registration relevant
      to chemical-manufacturing quality and safety boundaries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
