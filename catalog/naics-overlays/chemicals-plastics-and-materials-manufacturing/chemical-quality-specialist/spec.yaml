      the operating record set.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: epa-sccap-fact-sheet
    title: 'Fact Sheet for Regulated Facilities: Safer Communities by Chemical Accident Prevention - Risk Management Program
      Final Rule'
    publisher: U.S. Environmental Protection Agency
    source_type: official-rmp-amendment-guidance
    location: https://www.epa.gov/rmp/fact-sheet-regulated-facilities-safer-communities-chemical-accident-prevention-risk-management
    authority_reason: EPA's fact sheet is authoritative for current RMP rule changes affecting root-cause analysis, third-party
      audits, emergency-response exercises, and updated information-availability expectations at NAICS 325 facilities.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: nist-metrological-traceability
    title: Metrological Traceability Frequently Asked Questions and NIST Policy
    publisher: National Institute of Standards and Technology
    source_type: recognized-metrology-policy-reference
    location: https://www.nist.gov/metrology/metrological-traceability
    authority_reason: NIST is the U.S. national metrology institute and this policy defines documented traceability, measurement
      uncertainty, provider responsibility, and the limits of calibration claims that directly constrain chemical test and
      calibration evidence.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: nist-measurement-sampling-standards
    title: Measurement and Sampling Standards
    publisher: National Institute of Standards and Technology
    source_type: recognized-chemical-measurement-reference
    location: https://www.nist.gov/programs-projects/measurement-and-sampling-standards
    authority_reason: NIST's measurement and sampling standards program is authoritative public guidance that ties analytical
      quality to reference materials, calibration services, vetted data, and validated methods used in chemical measurements.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: acc-rcms-technical-specification
    title: Responsible Care Management System Technical Specification
    publisher: American Chemistry Council
    source_type: recognized-chemical-industry-management-framework
    location: https://www.americanchemistry.com/content/download/3594/file/Responsible-Care-Management-System-Technical-Specification.pdf
    authority_reason: ACC's Responsible Care Management System is a recognized chemical-industry framework for documented
      risk review, management of change, internal audits, nonconformity investigation, corrective action, and management review.
      It informs workflow discipline but does not override law or tenant controls.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: threshold, process-safety, and permit-linked operating baseline
    retrieval_policy: Use OSHA 1910.119, OSHA enforcement guidance, 40 CFR Part 68, and EPA RMP guidance first for covered-process
      thresholds, permit-linked data, inspection expectations, and incident or audit posture.
    specialty_specific_exceptions:
    - Do not use PSM or RMP sources to claim final engineering, environmental, or regulator-facing authority.
  - category: laboratory, calibration, and measurement-evidence handling
    retrieval_policy: Use NIST metrological traceability and measurement standards for test-result credibility, calibration
      chains, measurement uncertainty, and reference-material discipline.
    specialty_specific_exceptions:
    - Do not infer that a tenant laboratory result is automatically fit for purpose without method, uncertainty, calibration,
      and record context.
  - category: chemical-industry quality-system and corrective-action discipline
    retrieval_policy: Use ACC Responsible Care as a recognized industry-management framework for documented nonconformance,
      corrective-action, audit, and management-review handling.
    specialty_specific_exceptions:
    - Do not let trade-association framework language override controlling law, customer specifications, or tenant SOPs.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public OSHA, EPA, NIST, and ACC sources define the baseline for chemical-quality evidence handling, threshold-aware
      safety boundaries, calibration traceability, and corrective-action discipline.
    - Tenant facts about product family, exact specifications, customer contracts, permit conditions, rework rules, release
      authority, and systems-of-record locations are mandatory for case-specific conclusions.
    - Escalate when local permits, customer requirements, jurisdiction-specific environmental rules, or tenant quality procedures
      materially narrow or override the public baseline.
  specialty_specific_exceptions:
  - Keep the lane centered on chemical-quality evidence review and escalation, not final product disposition or regulator-facing
    quality certification.
  - Separate chemical-quality support from engineering design approval, EHS command, maintenance execution, and environmental-reporting
    ownership.
  - Do not certify legal compliance, environmental permit sufficiency, or final customer release from public references alone.
  source_baseline_version: '2026-04-10'
  next_review_due_at: '2026-07-09'
