    publisher: U.S. Environmental Protection Agency
    source_type: official-rmp-guidance
    location: https://www.epa.gov/rmp/risk-management-program-rmp-rule-overview
    authority_reason: EPA's overview is authoritative public guidance for which facilities must submit an RMP, what hazard
