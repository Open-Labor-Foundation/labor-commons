knowledge_baseline:
  source_classes:
  - class: Environmental, safety, or industrial regulator guidance
    rationale: OSHA, PHMSA, EPA, and eCFR requirements define the public baseline for hazardous-material packaging, shipping
      papers, training, manifesting, and safety boundaries.
  - class: Public permitting, inspection, or incident workflow references
    rationale: Official PHMSA and EPA workflow guidance defines registration thresholds, incident-response information, e-Manifest
      handling, and shipping-document evidence expectations.
  - class: Recognized maintenance, operational safety, or field-evidence standards
    rationale: Recognized UN and emergency-response references define packaging terminology, package-performance vocabulary,
      and field evidence expectations used in chemical shipping operations.
  source_selection_approach: 'Use OSHA HazCom, PHMSA hazardous-materials regulations and workflow

    guidance, EPA hazardous-waste transportation guidance, and recognized UN

    dangerous-goods standards as the public baseline for package readiness,

    shipping-document handling, training evidence, threshold and registration

    dependencies, field-condition escalation, and waste-shipment routing.

    Tenant-specific carrier qualification rules, state registrations, package

    engineering approvals, product classifications, and site-release controls

    must still be supplied at runtime and are never guessed.

    '
