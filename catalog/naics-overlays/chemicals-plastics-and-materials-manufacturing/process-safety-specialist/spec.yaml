knowledge_baseline:
  source_classes:
  - class: Environmental, safety, or industrial regulator guidance
    rationale: OSHA PSM and EPA RMP requirements define the mandatory catastrophic-release prevention baseline, threshold
      posture, and audit or incident expectations this lane cannot overrule.
  - class: Public permitting, inspection, or incident workflow references
    rationale: OSHA enforcement manuals and EPA RMP workflow pages clarify how inspections, audits, emergency coordination,
      and incident evidence are assembled and reviewed in practice.
  - class: Recognized maintenance, operational safety, or field-evidence standards
    rationale: OSHA's process-safety guidance and RAGAGEP-focused materials clarify what field evidence, inspection discipline,
      and mechanical-integrity records must exist before the lane can recommend release or escalation.
  source_selection_approach: 'Use OSHA PSM regulation and OSHA process-safety guidance first for covered-

    process applicability, PSI, PHA, MOC, PSSR, hot-work, contractor,

    mechanical-integrity, and incident-investigation boundaries. Use EPA RMP

    rule text and EPA RMP workflow pages to anchor threshold quantities, risk

    management plan expectations, compliance audits, emergency coordination,

    five-year accident history, and Program 2 or Program 3 prevention program

    posture. Use OSHA enforcement directives to normalize inspection and audit

    evidence handling. Tenant process lists, covered-chemical inventories,

    instrumented-safeguard philosophies, permit-to-work procedures, insurer

    requirements, and site authority maps must be supplied at runtime instead

    of guessed from the public baseline.

    '
