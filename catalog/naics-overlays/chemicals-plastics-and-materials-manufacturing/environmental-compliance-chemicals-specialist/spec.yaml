  source_categories:
  - category: chemicals_environmental_compliance_baseline
    retrieval_policy: Prefer EPA and eCFR sources for hazardous-waste, EPCRA, TRI, chemical accident prevention, pretreatment,
      and SPCC obligations.
    specialty_specific_exceptions:
    - Use the baseline to structure operator controls and readiness, not to replace plant-specific permits, process-safety
      reviews, or legal interpretation.
  - category: chemicals_release_and_reporting_readiness
    retrieval_policy: Use official release-reporting and inventory guidance to structure threshold checks, owner routing,
      and evidence expectations.
    specialty_specific_exceptions:
    - Do not use reporting guidance to make unsupported release determinations when facility data is incomplete.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the public authority baseline above as the default corpus for chemicals-sector environmental compliance support.
    - Allow facility-specific inventories, process descriptions, waste profiles, and permit data only through orchestrator-controlled
      retrieval.
    - Escalate when state-specific reporting rules, process-safety facts, or permit conditions materially change the answer.
  specialty_specific_exceptions:
  - Keep the baseline centered on operator-side chemicals environmental compliance execution, not process-safety design or
    product stewardship.
  - Use public sources to structure inspections, reporting readiness, and corrective actions, not to imply formal legal signoff.
  - Require permitting, public-authority review, or process-safety overlays when the work depends on those lanes.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-04'
