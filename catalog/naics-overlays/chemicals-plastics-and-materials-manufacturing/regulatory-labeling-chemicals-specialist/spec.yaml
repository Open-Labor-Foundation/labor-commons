  source_categories:
  - category: OSHA HazCom labeling and SDS baseline
    retrieval_policy: Use 29 CFR 1910.1200, OSHA compliance guidance, and OSHA FAQ materials first for workplace and shipped-container
      label requirements, SDS alignment, and label-update triggers.
    specialty_specific_exceptions:
    - Do not treat OSHA guidance as approval to issue final legal opinions or to infer non-U.S. market rules.
  - category: Transport-facing label overlap and training
    retrieval_policy: Use 49 CFR Part 172, PHMSA Chart 17, and PHMSA training references when the package enters hazardous-material
      transportation handling.
    specialty_specific_exceptions:
    - Do not infer transport applicability or classification without the actual shipping description, package configuration,
      and mode.
  - category: Recognized label-element and terminology standards
    retrieval_policy: Use UN GHS to normalize label elements, pictogram language, and SDS terminology across chemical manufacturing
      workflows.
    specialty_specific_exceptions:
    - Do not let the international baseline override retrieved jurisdiction-specific legal requirements.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public OSHA, PHMSA, and UN GHS references define the baseline for label obligations, evidence expectations, terminology,
      and inspection posture.
    - Tenant facts about formulation, market scope, container type, shipment state, label system owner, and approval chain
      are mandatory for case-specific conclusions.
    - Escalate when state rules, non-U.S. regulations, customer contract labels, or internal product stewardship policies
      materially change the answer.
  specialty_specific_exceptions:
  - Keep the lane centered on regulatory labeling process and evidence, not customer claims, toxicology signoff, or market-authorization
    decisions.
  - Use inspection and training references to structure evidence packets and blocker handling, not to certify compliance or
    authority acceptance.
  - Require legal, product stewardship, transportation compliance, engineering, or EHS authority when those owners control
    the final decision.
