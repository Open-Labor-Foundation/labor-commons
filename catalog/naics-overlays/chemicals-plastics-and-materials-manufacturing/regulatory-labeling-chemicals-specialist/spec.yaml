knowledge_baseline:
  source_classes:
  - class: Environmental, safety, or industrial regulator guidance
    rationale: OSHA and PHMSA define the mandatory U.S. baseline for chemical label content, SDS alignment, hazmat package
      labeling, and worker training boundaries.
  - class: Public permitting, inspection, or incident workflow references
    rationale: OSHA enforcement and compliance workflow materials define how label, SDS, and training evidence are inspected,
      updated, and packaged for review.
  - class: Recognized maintenance, operational safety, or field-evidence standards
    rationale: UN GHS and related public operating references normalize label elements, terminology, and field-ready evidence
      handling used across chemical manufacturing workflows.
  source_selection_approach: 'Use the current OSHA Hazard Communication Standard and OSHA compliance or

    enforcement materials first for workplace and shipped-container labeling,

    SDS maintenance, and label-update triggers. Use PHMSA references where the

    package or shipment enters hazardous-material transportation handling and

    label obligations overlap with the HMR. Use the UN GHS baseline to anchor

    label-element structure, terminology, and change-control vocabulary without

    treating the international baseline as a substitute for tenant-specific or

    jurisdiction-specific law. Tenant market scope, exact formulation, transport

    mode, container state, label system owner, and non-U.S. regulatory overlays

    must be supplied at runtime instead of guessed from the public baseline.

    '
