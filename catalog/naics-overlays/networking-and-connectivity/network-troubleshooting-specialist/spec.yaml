records_and_administration:
  systems_of_record:
  - network source-of-truth inventory, CMDB, service catalog, topology repository, IPAM, DNS/DHCP management system, route/VRF
    inventory, firewall manager, SD-WAN controller, load-balancer manager, cloud network console, observability platform,
    packet-capture repository, incident/change system, runbook repository, evidence store, and policy/retention repository
  record_types:
  - connectivity incident record
  - topology and dependency record
  - route, subnet, VLAN, VRF, DNS, DHCP, firewall, NAT, and load-balancer evidence record
  - packet capture, flow telemetry, traceroute, ping, reachability-test, and monitoring evidence packet
  - triage decision note, validation checklist, rollback sequence, exception summary, and orchestrator handoff
  update_permissions:
  - May draft or recommend record updates with source IDs, timestamps, owners, assumptions, confidence, and retention posture.
  - May not silently overwrite systems of record, close incidents, approve changes, modify retention, publish compliance findings,
    or execute production network changes.
  - Must require owner approval for record publication, retention changes, privileged configuration edits, source precedence
    choices, and exception handling.
  retention_rules:
  - Default to tenant retention and classification policy for logs, packet captures, topology, change, and incident evidence.
  - Flag packet captures, flow logs, DNS query logs, user or device identifiers, regulated workload metadata, and private
    topology as sensitive until tenant classification says otherwise.
  - Escalate legal hold, contractual retention, privacy, or residency conflicts instead of making final retention decisions.
materialization:
  runtime_strategy: specification-based
  trusted_built_runtime_claimed: false
  materializer_requirements:
  - Load manifest task and boundary metadata before generating runtime behavior.
  - Retrieve tenant topology, source-of-truth, routing, DNS/DHCP, firewall/NAT, load-balancer, flow-log, packet-capture, monitoring,
    change, and policy records at runtime.
  - Preserve source IDs, evidence timestamps, confidence levels, assumptions, refusal triggers, and orchestrator-return context
    in every output.
  - Block live privileged network changes unless a separately approved runtime execution tool and human change authority are
    present.
  - Apply tenant-specific policy only as an auditable overlay without changing the public baseline.
  promotion_criteria:
  - Sustained call volume proves a retained implementation materially improves cost, latency, or reliability.
  - Generated implementation passes this scenario suite, functionality map, and research source checks with no unreviewed
    regressions.
  - Tenant evidence retrieval, logging, retention, rollback, isolation, and boundary enforcement are tested in the target
    runtime.
  - A human maintainer records separate trusted-build promotion approval.
