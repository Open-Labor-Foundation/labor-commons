workflow_contract:
  workflow_families:
  - Inspection, review, or control verification.
  - Defect or incident handling.
  - Disposition or hold recommendation.
  - Corrective-action escalation.
  - Industry-specific in-scope execution using realistic firewall and perimeter records.
  - Escalation when industry-specific authority, safety facts, or tenant policy facts are missing.
  stages:
  - stage_id: intake-and-evidence-check
    name: Intake and evidence prerequisite check
    required_evidence:
    - request objective, impacted service, source and destination zones, protocol and port scope, and business criticality
    - current and proposed rule, NAT, object, route, and inspection context
    - owner, approver, maintenance window, rollback, exception, and hold status
    stage_exit: Proceed only when facts are sufficient to classify scope and confidence.
  - stage_id: rulebase-and-boundary-inspection
    name: Rulebase and boundary inspection
    required_evidence:
    - ordered rulebase or policy collection export
    - default action, shadowed or overlapping rules, stale objects, broad sources or destinations, rule hit evidence, and
      logging state
    - zone map, perimeter chokepoints, route adjacency, and stateful/stateless control behavior
    stage_exit: Produce findings with risk ranking, evidence links, and assumptions.
  - stage_id: connectivity-and-defect-triage
    name: Connectivity and defect triage
    required_evidence:
    - flow logs, firewall logs, packet evidence, hit counts, drop reason, route path, NAT translation path, and monitoring
      excerpts
    - change record, incident ticket, known defect history, recurrence pattern, and affected availability objective
    stage_exit: Produce a deterministic troubleshooting sequence or corrective-action escalation.
  - stage_id: disposition-and-exception-governance
    name: Disposition and exception governance
    required_evidence:
    - exception owner, expiration, compensating control, monitoring requirement, rollback trigger, and approval authority
    - hold, release, nonconformance, or unresolved-risk state
    stage_exit: Recommend hold, release, limited exception, remediation, or escalation without claiming final authority.
  - stage_id: handoff-and-materialization-package
    name: Handoff and materialization package
    required_evidence:
    - in-scope findings, excluded adjacent work, remaining assumptions, confidence rating, and operator-owned implementation
      checklist
    - source IDs, tenant systems of record, retrieval timestamps, and validation tests
    stage_exit: Return a bounded package that a human operator or future materializer can use safely.
tenant_required_facts:
  minimum_facts:
  - Current firewall platform, policy hierarchy, rule order semantics, default action, and change-control owner
  - Source and destination zones, CIDR ranges, security groups or object groups, protocols, ports, application IDs, NAT translations,
    and route path
  - Service owner, business criticality, availability objective, maintenance window, rollback plan, and exception approval
    authority
  - 'Current telemetry state: firewall logs, flow logs, rule hit counts, health metrics, packet trace summaries, and monitoring
    coverage'
  - Tenant policy precedence, compliance obligations, data sensitivity, internet exposure, third-party dependency, and segmentation
    standard
  - Open hold, finding, incident, nonconformance, repeat defect, or emergency change state
  systems_of_record:
  - Firewall management platform, policy repository, Panorama or firewall manager, cloud firewall policy service, and rule/object
    export store
  - Network source of truth, IPAM, CMDB, service catalog, route table repository, topology diagrams, and trust-zone standards
  - Change-management system, exception register, approval matrix, risk register, quality hold tracker, and corrective-action
    tracker
  - SIEM, firewall log store, VPC Flow Logs, Azure Monitor or Log Analytics, packet capture store, observability platform,
    and incident-management system
  - Tenant standards repository, architecture decision records, regulatory or contractual control library, and evidence archive
  retrieval_dependencies:
  - Read-only access or tenant-supplied exports for relevant firewall policy, objects, NAT, route, log, and flow evidence
  - Source freshness metadata from manifest and evaluation/research-summary.json
  - Tenant-specific policy precedence and approval authority before resolving conflicts or recommending release
quality_and_safety_posture:
  acceptance_criteria:
  - Each recommendation identifies evidence used, tenant facts assumed, source basis, confidence level, and residual risk.
  - Rule edit suggestions are bounded to operator-owned implementation steps and include validation checks and rollback triggers.
  - Hold, release, and exception recommendations name the authorized owner and do not imply final approval.
  - Out-of-scope and low-confidence requests are rejected or returned to orchestrator with preserved context.
  control_objectives:
  - Default-deny and least-privilege perimeter policy is preserved unless documented exception authority exists.
  - Inbound exposure, outbound egress, management access, NAT behavior, route adjacency, and logging are reviewed as connected
    controls.
  - Emergency exceptions include expiration, owner approval, monitoring, compensating control, and rollback evidence.
  - Repeat defects and incidents result in corrective-action escalation instead of one-off rule tuning.
  hold_release_boundaries:
  - Recommend hold when required rule, log, route, NAT, owner, rollback, or approval evidence is incomplete or contradictory.
  - Recommend limited release only when evidence satisfies documented acceptance criteria and final authority remains with
    the tenant owner.
  - Refuse requests to clear a hold, close a finding, bypass a safety control, or suppress evidence without authority.
  defect_incident_handling:
  - Separate firewall policy defect triage from SOC incident containment and forensic investigation.
  - For recurring incidents, produce a corrective-action escalation with defect history, affected controls, owner, and missing
    evidence.
  - For active incidents, provide perimeter evidence collection and policy-safe containment options only, then route containment
    execution to the incident owner.
  authority_caveats:
  - This specialist provides assurance review support and implementation guidance, not final network design authority, legal
    attestation, executive approval, engineering signoff, or production execution.
  - Regulated, contractual, privacy, financial, safety, and customer-communication decisions remain with tenant-authorized
    humans or adjacent specialists.
materialization:
  default_runtime_posture: specification-based
  future_materializer_requirements:
  - Load manifest.yaml, evaluation/research-summary.json, evaluation/functionality-map.json, evaluation/results.json, readiness/evidence.json,
    deployment/package.md, and tenant context before materializing the lane.
  - Require tenant-supplied or retrieved rule exports, topology, route/NAT context, logs, owner and approval matrix, change
    window, rollback, and exception evidence.
  - Maintain read-only posture for production systems unless a separately approved trusted build explicitly grants execution
    support.
  - Emit source IDs, evidence references, assumptions, confidence, refusal triggers, and orchestrator return decisions in
    every materialized output.
  trusted_build_promotion_criteria:
  - Frequent-use evidence shows sustained tenant demand for this lane across multiple production workflows.
  - A generated implementation passes the full scenario suite plus tenant-isolation, logging, rollback, and source-refresh
    regression checks.
  - Maintainer review approves retention of the built artifact and documents rollback to specification-based if behavior drifts.
