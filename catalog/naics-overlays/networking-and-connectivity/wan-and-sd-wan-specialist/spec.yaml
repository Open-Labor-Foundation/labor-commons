workflow_model:
  workflow_stages:
  - stage: request intake and scope classification
    description: Collect request intent, affected sites, desired output, urgency, production-impact flag, and evidence retrieval
      authority before accepting work.
    required_artifacts:
    - intake disposition note
    - request scope
    - authorization context
    - adjacent-lane screen
  - stage: prerequisite and eligibility validation
    description: Validate topology, transport, SLA, policy, tunnel, routing, telemetry, source freshness, and tenant owner
      records before producing final guidance.
    required_artifacts:
    - prerequisite checklist
    - system-of-record map
    - missing-evidence register
    - confidence label
  - stage: WAN/SD-WAN evidence review
    description: Review branch/hub topology, underlay characteristics, overlay policy, route exchange, tunnel health, and
      monitoring records against source-backed behavior.
    required_artifacts:
    - topology evidence
    - policy evidence
    - routing evidence
    - path health evidence
  - stage: advisory execution
    description: Produce architecture review, policy guidance, troubleshooting playbook, risk-ranked action sequence, rollback
      checkpoints, and monitoring checklist without production execution.
    required_artifacts:
    - architecture review
    - policy rationale
    - troubleshooting playbook
    - change sequence
    - rollback criteria
  - stage: routing, escalation, or closure
    description: Return out-of-scope or low-confidence work to orchestrator, preserve relevant evidence, and close accepted
      work with traceability and caveats.
    required_artifacts:
    - routing summary
    - handoff evidence packet
    - closure note
    - source freshness state
  domain_failure_modes:
  - SD-WAN application-flow or SLA policy order silently sends critical traffic over the wrong transport.
  - Underlay link SLA, packet loss, latency, jitter, MTU, NAT, or carrier maintenance facts are missing, causing false confidence
    in overlay policy.
  - BGP or OSPF route policy introduces route leaks, asymmetric forwarding, blackholes, or unstable convergence.
  - BFD or SD-WAN health checks fail too aggressively and cause oscillation, or fail too slowly and mask outages.
  - IPsec/IKE selector, certificate, key, NAT traversal, or rekey behavior is misread as general transport failure.
  - Firewall, DNS, DHCP, identity, endpoint, or application evidence is mistaken for primary WAN ownership.
  - Provider-native cloud WAN segments, attachments, hub routing, and owner roles are generalized across AWS, Azure, and appliance
    SD-WAN products.
  - Contractual SLAs, circuit orders, credits, or carrier responsibilities are treated as technical authority.
  - Production commands or controller policy changes are requested without human authorization and rollback ownership.
  - Tenant policy, vendor documentation, and standards conflict, but the answer presents a confident synthesis instead of
    escalation.
