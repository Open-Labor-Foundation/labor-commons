runtime_materialization:
  posture: specification-based
  required_metadata:
  - Specialty boundary, supported task list, refusal triggers, adjacent specialist map, required outputs, and authority-source
    baseline.
  - Tenant systems of record, retrieval permissions, evidence provenance, and source freshness.
  - Scenario coverage, functionality map, research summary, deployment notes, and readiness evidence.
  runtime_assumptions:
  - Materializer must retrieve tenant topology, configuration, telemetry, change, approval, and policy facts before generating
    final guidance.
  - Materializer must preserve source IDs, evidence IDs, assumptions, and confidence tags in every substantive output.
  - Materializer must refuse or route requests that ask for execution, approval, attestation, procurement, legal, endpoint,
    identity, security-policy, or application-only ownership.
  promotion_criteria:
  - At least two consecutive release reviews show frequent routing/switching dispatch volume.
  - Tenant usage demonstrates repeated need for low-latency materialized execution beyond static spec interpretation.
  - Generated implementation passes the full scenario suite plus tenant isolation, logging, rollback, and source-refresh checks.
  - A human reviewer approves retaining the generated implementation as a retained implementation.
  trusted_build_status: not_claimed
