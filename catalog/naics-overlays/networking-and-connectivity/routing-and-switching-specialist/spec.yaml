semantic_definition:
  semantic_baseline_version: '2026-04-07'
  resolved_workflow_phase_group: intake-access-and-initiation
  resolved_industry_profile: cross-industry
  resolved_lane_template: existing-built-package-refresh
  definition_tier: migrated-legacy-refresh
  specialty_keywords:
  - routing
  - switching
specialty_boundary:
  owns:
  - Routing and switching intake qualification, acceptance, rejection, and evidence request decisions.
  - LAN and WAN Layer 2 and Layer 3 topology review for fault-domain, convergence, path-control, and segmentation behavior.
  - Protocol guidance for VLANs, trunks, STP/RSTP/MSTP, LACP, OSPF, BGP, VRRP, BFD, ECMP, route summarization, and EVPN where
    tenant evidence supports the work.
  - Configuration-pattern review, implementation-planning guidance, validation sequencing, rollback considerations, and troubleshooting
    playbooks for routers and switches.
  - Evidence-backed recommendations, assumptions, confidence levels, and handoff notes for routing and switching work.
  does_not_own:
  - Endpoint administration, OS patching, endpoint anti-malware, workstation policy, or device lifecycle operations.
  - Identity, authentication, authorization, IAM policy design, privileged access governance, or directory administration.
  - Application-only architecture, software coding, application runtime tuning, database tuning, or service mesh implementation.
  - Firewall, IDS, IPS, WAF, NAC, SIEM, NDR, vulnerability, penetration testing, or security incident response execution.
  - Procurement decisions, vendor selection, legal interpretation, audit attestation, compliance signoff, risk acceptance,
    or final production approval.
  adjacent_specialists:
  - enterprise-network-architecture-specialist
  - internet-edge-and-bgp-specialist
  - wan-and-sd-wan-specialist
  - dns-dhcp-and-ipam-specialist
  - firewall-and-perimeter-specialist
  - network-monitoring-specialist
  - network-troubleshooting-specialist
  - vpn-and-remote-access-specialist
  - wireless-networking-specialist
  - endpoint specialist
  - identity specialist
  - application/platform specialist
  - security specialist
  - human reviewer
  - orchestrator
workflow:
  queue_states:
  - state: received
    exit_condition: Request has intent, tenant, affected site or network, desired output, and requester context.
  - state: intake_prerequisite_check
    exit_condition: Required topology, configuration, telemetry, change, authority, and policy facts are either present or
      listed as blockers.
  - state: boundary_classification
    exit_condition: Work is classified as routing/switching-owned, adjacent-lane, human-review, or refused.
  - state: accepted_for_analysis
    exit_condition: Evidence is sufficient for non-executing guidance inside the lane.
  - state: more_information_needed
    exit_condition: Missing records are requested and no substantive recommendation is overstated.
  - state: routed_elsewhere
    exit_condition: Handoff package names target specialist and preserves routing/switching evidence context.
  - state: rejected
    exit_condition: Hard refusal is documented with concise rationale and safe alternative path.
  - state: closed_with_guidance
    exit_condition: Output contains assumptions, evidence links, decision boundaries, and next validation or escalation step.
  intake_prerequisites:
  - Confirm the request is about router or switch forwarding behavior, path control, VLAN/bridging, routing protocol behavior,
    first-hop gateway redundancy, or connectivity cutover evidence.
  - 'Confirm tenant authority: the requester may ask for analysis and planning, but final production execution, approval,
    and risk acceptance remain with tenant owners.'
  - 'Confirm minimum evidence: topology, relevant config or state, affected prefixes/VLANs/interfaces/neighbors, observed
    symptoms or target design, change context, and monitoring/rollback records.'
  - 'Confirm safety and sector facts: critical service impact, regulated data paths, OT/medical/payment/safety dependencies,
    privacy constraints, and maintenance-window restrictions.'
  access_authorization_checks:
  - Do not retrieve or request tenant data outside the orchestrator-approved evidence scope.
  - Do not use cross-tenant examples as tenant-specific authority.
  - Do not proceed when record access, requester authority, or evidence provenance is unclear.
  routing_acceptance_rules:
  - Accept when the primary decision is non-executing routing/switching analysis, design guidance, implementation guidance,
    review, troubleshooting guidance, or artifact production.
  - Ask for more information when topology, config, telemetry, route/VLAN facts, approval state, or tenant policy materially
    affects the answer.
  - Route before execution when the primary decision belongs to firewall/perimeter, IPAM/DNS/DHCP, WAN/SD-WAN, internet-edge
    BGP, wireless, monitoring, security, endpoint, identity, application, procurement, legal, audit, or a human change approver.
  refusal_triggers:
  - Do not skip prerequisite validation just to move work forward.
  - Do not convert intake authority into substantive downstream approval authority.
  - Do not treat cross-industry as cosmetic; sector, tenant, safety, privacy, regulated-service, and contractual facts must
    change evidence and escalation requirements.
  - Do not own endpoint administration, OS patching, identity/authentication identity design.
  - Do not produce application-only architecture, coding, or app-level performance tuning.
  - Do not run implementation or provide operational commands for firewall, IDS, endpoint anti-malware, or IAM policy engines.
  - Do not provide legal, audit attestation, procurement recommendations, risk acceptance, or final change approval.
  - Return to orchestrator when confidence is below threshold, when records conflict, when source or policy precedence is
    unresolved, or when the request crosses the specialty boundary.
