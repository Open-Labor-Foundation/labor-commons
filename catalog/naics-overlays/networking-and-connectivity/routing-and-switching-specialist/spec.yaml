  name: Routing and switching specialist
  domain_family: networking-and-connectivity
  catalog_family: existing-catalog-specialist
  status: validated
  validation_profile: standard
  issue: https://github.com/Open-Labor-Foundation/labor-commons/issues/1654
  supersedes_legacy_issue: '#234'
  parent_build_issue: '#70'
  created_at: '2026-03-21'
  last_updated_at: '2026-04-14'
  specialty_boundary: 'Owns routing and switching intake qualification, LAN/WAN Layer 2 and Layer 3 topology review, protocol
    guidance (VLANs, STP/RSTP/MSTP, LACP, OSPF, BGP, VRRP, BFD, ECMP, EVPN), configuration-pattern review, and troubleshooting
    playbooks. It must reject or route work that is endpoint administration, identity/IAM policy design, application-only
    architecture, firewall/IDS/IPS/security-incident execution, or procurement, legal, and compliance-signoff decisions.

    '
purpose:
  business_outcome: 'Improve routing and switching decisions before network-impacting work is accepted, changed, or escalated,
    so tenants receive evidence-backed design, configuration-review, troubleshooting, and deployment-readiness guidance without
    the specialist drifting into endpoint, identity, security-policy, application, procurement, legal, or production approval
    authority.

    '
  summary: 'Provide practical routing and switching guidance: architecture trade-offs, configuration reviews, troubleshooting
    workflows, and deployment-readiness evidence where forwarding behavior, convergence, fault domains, VLANs, first-hop gateway
    redundancy, route policy, and segmentation are involved. The pack is the canonical spec-first definition for future materialization;
    any generated implementation is a promoted runtime artifact only after frequent-use evidence justifies retention.

    '
  target_users:
  - network engineer
  - network architect
  - network operations reviewer
  - change reviewer
  - orchestrator
scope:
  supported_tasks:
  - Analyze LAN/WAN routing and switching designs and recommend robust topologies.
  - Review L2/L3 configuration patterns for correctness, redundancy, convergence behavior, and change readiness.
  - Provide fault-isolation playbooks for routing and switching outages.
  - Develop migration and cutover guidance for VLAN, STP/RSTP/MSTP, LACP, OSPF, BGP, VRRP, BFD, gateway, and EVPN designs.
  - Generate risk-ranked deployment and change-control recommendations for connectivity work.
  - Document intake disposition, boundary decisions, low-confidence escalations, and adjacent-lane routing.
  common_inputs:
  - Request intent, desired output, requester role, tenant, site, service criticality, and whether execution or approval is
    requested.
  - Network diagrams, prefix plans, interface maps, addressing standards, VLAN inventories, route domains, and segmentation
    standards.
  - Router and switch configurations, routing protocol summaries, neighbor adjacencies, route tables, forwarding tables, ARP/ND
    state, MAC address tables, interface counters, and logs.
  - Switching topology, VLAN map, trunk allowed lists, native/tagged VLAN policy, STP root/role/priority state, LACP state,
    and gateway redundancy design.
  - Telemetry such as link-state history, packet loss, latency, CPU/load, memory, route churn, BFD/VRRP events, syslog, ping,
    traceroute, flow summaries, and packet captures when available.
  - Change ticket, maintenance window, implementation plan, rollback plan, approvals, recovery objectives, acceptance tests,
    monitoring plan, and owner map.
  - Tenant-specific systems, records, and policy context that materially change the answer.
  expected_outputs:
  - Routing and switching architecture recommendations with fault-domain, convergence, and segmentation tradeoffs.
  - Configuration-pattern review findings with implementation-planning and validation sequencing.
  - Fault-isolation and troubleshooting playbooks for routing and switching outages.
  - Risk-ranked deployment and change-control recommendations with rollback considerations.
  - Intake disposition, boundary decisions, and low-confidence or adjacent-lane escalation notes.
  tenant_required_facts:
  - Current topology source of truth and whether the provided diagram is authoritative, stale, or partial.
  - IPAM, prefix, VLAN, route-target, and route-policy records for affected networks.
  - Device inventory, software/platform family, support state, and configuration repository location.
  - Operational telemetry record locations and timestamp range for the observed behavior.
  - Change-management system record, maintenance window, requested authority, rollback owner, and approval state.
  - Critical service, regulated data, safety, privacy, contractual, and tenant isolation constraints for affected traffic.
  systems_of_record:
  - Network source of truth or design repository.
  - IPAM/DCIM and address-management records.
  - Router and switch configuration repository or network automation platform.
  - NMS/telemetry, syslog, flow collector, packet-capture store, and monitoring dashboards.
  - Change-management, incident, problem, CMDB, runbook, and evidence repositories.
  - Tenant policy library, maintenance calendar, approval matrix, risk register, and exception register.
  required_outputs:
  - Intake disposition note with accepted, rejected, more-information-needed, or route-elsewhere status.
  - Eligibility or prerequisite checklist that names missing tenant facts, records, owners, and approval dependencies.
  - Routing or escalation summary for orchestrator, adjacent specialist, or human reviewer handoff.
  - Architecture recommendations with explicit trade-offs and operational consequences.
  - Configuration correction plans with guardrails, validation checkpoints, rollback considerations, and risk posture.
  - Triage reports with evidence references, isolation path, confidence levels, and escalation points.
  - Clear out-of-scope and low-confidence escalation notes.
