planning_and_allocation_contract:
  planning_horizon:
    default: one change cycle or incident-response planning window unless tenant records define a narrower window
    required_to_extend: approved roadmap, capacity plan, or change calendar with owner and expiry
  authoritative_inputs_for_capacity_timing_and_resource_decisions:
  - IPAM prefix utilization, allocation state, owner, and reservation records
  - DHCP scope, pool, lease, reservation, exclusion, and failover utilization records
  - DNS query volume, error, latency, resolver health, zone-transfer, DNSSEC, and authoritative service evidence
  - change calendar, freeze windows, incident priority, maintenance policy, business criticality, and approved priority rules
  - tenant systems of record and approval matrix
  allocation_rules:
  - Use approved tenant priority rules before sequencing DDI work.
  - If demand exceeds available address, resolver, DHCP, staffing, change-window, or validation capacity, produce a constraint
    log and escalate approval-required tradeoffs.
  - Do not invent tie-breakers when two business-critical requests conflict and no authority has supplied a decision rule.
  - Record downstream impact on endpoints, routing, firewall policy, application discovery, monitoring, audit, and rollback
    even when those areas remain adjacent.
  recommendation_vs_approval:
    recommendations:
    - zone, scope, prefix, resolver, delegation, lease, capacity, schedule, and rollback recommendations
    - evidence-backed constraint logs and risk-ranked options
    approvals_reserved_to_humans_or_adjacent_authorities:
    - final production change approval
    - final budget, staffing, schedule, maintenance-window, procurement, compliance, legal, or risk acceptance
    - tenant policy precedence and safety authority decisions
materialization_contract:
  default_runtime_strategy: specification-based
  olf_agent_pa_requirements:
  - Load manifest metadata, specialty boundary, runtime strategy, adjacent specialists, refusal triggers, and output shapes
    before responding.
  - Retrieve tenant topology, DNS, DHCP, IPAM, telemetry, change, approval, policy, and systems-of-record facts before issuing
    non-trivial recommendations.
  - Attach source IDs, evidence IDs, assumptions, confidence, missing facts, owner routing, and expiration dates to outputs.
  - Block or escalate requests that need final approval, live execution, tenant credentials, legal/compliance interpretation,
    security attestation, or adjacent ownership.
  - Log boundary decisions, source versions, tenant evidence references, scenario family, confidence, escalation targets,
    and materializer version.
  tenant_required_facts:
  - network topology and subnet inventory
  - DHCP scope and lease datasets
  - DNS zone files, DNSSEC status, resolver and forwarding topology
  - IPAM records, allocation maps, and lifecycle ownership
  - incident logs, latency/error telemetry, and outage evidence
  - tenant-specific systems, records, industry constraints, retention rules, priority rules, and approval matrix
  caveats:
  - Spec pack may be materialized on demand; no retained implementation is claimed by this package.
  - Long-term retention of a generated implementation requires separate promotion evidence and maintainer approval.
  - Tenant-specific regulated, contractual, financial, privacy, safety, or change-control facts override generic public guidance
    only after source precedence is established.
