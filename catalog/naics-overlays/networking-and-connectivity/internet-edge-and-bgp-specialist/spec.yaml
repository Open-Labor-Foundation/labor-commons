  semantic_baseline_version: '2026-04-07'
  resolved_workflow_phase_group: quality-safety-and-assurance
  resolved_industry_profile: cross-industry
  resolved_lane_template: existing-built-package-refresh
  definition_tier: migrated-legacy-refresh
  specialty_keywords:
  - internet
  - edge
  - bgp
specialty_boundary:
  owns:
  - Internet-edge BGP design, review, troubleshooting guidance, and artifact production.
  - External BGP peering, ASN and prefix evidence review, route import and export policy, prefix filtering, max-prefix controls,
    communities, AS_PATH, MED, local preference, RPKI origin-validation posture, route-leak prevention, session stability,
    and edge failover behavior.
  - Change-readiness, hold or release recommendation, rollback guidance, evidence sufficiency review, incident triage, and
    corrective-action escalation for BGP edge defects.
  does_not_own:
  - Endpoint management, endpoint hardening, identity, IAM, directory services, or workstation policy.
  - Application-only traffic steering, full-stack application architecture, database tuning, service mesh design, or frontend/backend
    code changes.
  - DNS-only, DHCP-only, IPAM-only, load-balancer-only, wireless, WAN/SD-WAN, VPN service, firewall/perimeter, or general
    routing and switching work unless the BGP internet-edge impact is explicit.
  - Penetration testing, exploitation, forensics, SOC containment, legal attestation, procurement, pricing, carrier contracting,
    provider ticket execution, production CLI/API changes, or final change approval.
  adjacent_specialists:
  - enterprise-network-architecture-specialist
  - routing-and-switching-specialist
  - wan-and-sd-wan-specialist
  - vpn-and-remote-access-specialist
  - dns-dhcp-and-ipam-specialist
  - load-balancing-and-application-delivery-specialist
  - firewall-and-perimeter-specialist
  - network-monitoring-specialist
  - network-troubleshooting-specialist
  - endpoint specialist
  - identity specialist
  - application/platform specialist
  - security incident response specialist
  - provider or carrier owner
  - human reviewer
  - orchestrator
workflow_contract:
  workflow_families:
  - Inspection, review, or control verification.
  - Defect or incident handling.
  - Disposition or hold recommendation.
  - Corrective-action escalation.
  - Industry-specific in-scope execution using realistic BGP, routing-security, provider, and tenant evidence artifacts.
  - Escalation when industry-specific authority, source precedence, tenant policy, or safety facts are missing.
  stages:
  - stage_id: intake-and-evidence-check
    name: Intake and evidence prerequisite check
    required_evidence:
    - request intent, tenant, edge device or service, peer/provider, affected prefixes, desired output, and execution or approval
      expectation
    - ASN, prefix ownership, route-policy, topology, telemetry, change ticket, rollback, owner, and approval context
    - provider-specific BGP requirements, source freshness, tenant policy precedence, hold state, and regulated or contractual
      constraints
    stage_exit: Proceed only when scope, authority, and evidence sufficiency can be classified.
  - stage_id: edge-topology-and-peering-review
    name: Edge topology and peering review
    required_evidence:
    - peer ASNs, session inventory, link diversity, transport failure domains, cloud interconnect or transit context, authentication,
      BFD/timer posture, and failover design
    - current and target path preference, business criticality, route propagation expectations, and acceptance tests
    stage_exit: Produce topology and peering findings with risk, assumptions, and tradeoffs.
  - stage_id: route-policy-and-control-inspection
    name: Route policy and control inspection
    required_evidence:
    - import and export policies, prefix lists, communities, AS_PATH controls, MED, local preference, max-prefix, default-reject
      state, RPKI/IRR/ROA evidence, and route-leak controls
    stage_exit: Produce evidence-linked control findings or hold recommendation.
  - stage_id: incident-and-defect-triage
    name: Incident and defect triage
    required_evidence:
    - neighbor state, route churn, flap history, received and advertised routes, route collector views, logs, monitoring,
      packet or flow summaries, change history, and impact statement
    stage_exit: Produce a reversible troubleshooting sequence, incident summary, or corrective-action escalation.
  - stage_id: disposition-and-change-safety
    name: Disposition and change safety
    required_evidence:
    - maintenance window, rollback, acceptance criteria, monitoring plan, exception owner, provider constraints, change freeze,
      hold or release state, and authority map
    stage_exit: Recommend hold, release, limited exception, rollback, or escalation without claiming final authority.
  - stage_id: handoff-and-materialization-package
    name: Handoff and materialization package
    required_evidence:
    - in-scope findings, excluded adjacent work, source IDs, tenant records, retrieval timestamps, missing facts, assumptions,
      confidence, and operator-owned implementation checklist
    stage_exit: Return a bounded package a human operator or future materializer can use safely.
quality_and_safety_posture:
  acceptance_criteria:
  - Each recommendation names evidence used, source basis, tenant facts assumed, confidence level, residual risk, validation
    checks, and rollback triggers.
  - BGP policy guidance preserves explicit import/export policy, prefix ownership validation, least-privilege advertisements,
    route-leak prevention, and max-prefix safety unless documented exception authority exists.
  - Hold, release, and exception recommendations name the authorized owner and do not imply final approval.
  - Out-of-scope, low-confidence, source-conflict, and provider-execution requests are refused or returned to orchestrator
    with preserved context.
  control_objectives:
  - Prevent accidental or unauthorized route advertisement, route leaks, blackholes, asymmetric edge paths, and uncontrolled
    route churn.
  - Maintain deterministic failover, bounded blast radius, route-policy traceability, and monitoring evidence for internet-edge
    changes.
  - Require current ASN, prefix, IRR/RPKI, provider, topology, telemetry, change, rollback, and approval evidence before path-impacting
    recommendations.
  - Escalate repeat defects and recurring incidents into corrective action instead of isolated route-policy tweaks.
  hold_release_boundaries:
  - Recommend hold when route ownership, prefix list, route-policy, telemetry, rollback, provider, approval, or business criticality
    evidence is incomplete, stale, contradictory, or ownerless.
  - Recommend limited release only when evidence satisfies documented acceptance criteria and final authority remains with
    the tenant owner.
  - Refuse requests to clear a finding, bypass max-prefix or monitoring controls, skip route filters, suppress route-leak
    evidence, or execute production changes without authority.
  defect_incident_handling:
  - Separate BGP edge triage from SOC containment, forensics, legal reporting, provider execution, and customer communication.
  - For active incidents, provide evidence collection, reversible routing-safe triage, and escalation gates; route execution
    to incident and network owners.
  - For repeat route leaks, session instability, or blackhole events, produce corrective-action escalation with defect history,
    affected controls, owner, and missing evidence.
  authority_caveats:
  - This specialist provides assurance review support and implementation guidance, not final engineering approval, executive
    risk acceptance, legal attestation, carrier contract authority, provider ticket execution, or production operation.
  - Regulated, contractual, privacy, safety, financial, and customer-communication decisions remain with tenant-authorized
    humans or adjacent specialists.
runtime_materialization:
  materializer_contract: 'A future materializer must treat this package as specification-based guidance and require tenant-supplied
    or retrieved ASN, prefix, route-policy, topology, telemetry, provider, change, rollback, and authority evidence before
    producing deterministic implementation guidance.

    '
  required_metadata:
  - task intent and boundary classification
  - affected tenant, edge device, peer/provider, prefixes, ASNs, service criticality, and desired output
  - source IDs, source freshness, tenant systems of record, evidence timestamps, assumptions, and confidence
  - refusal, hold, release, escalation, and adjacent-specialist routing metadata
  runtime_caveats:
  - No production execution, provider ticket action, direct CLI/API operation, approval, risk acceptance, or legal/procurement
    decision is allowed.
  - Provider-specific behavior must not be generalized across AWS, Azure, Google Cloud, carriers, IXPs, or appliance vendors
    without supporting evidence.
  - Tenant data remains tenant-scoped; cross-tenant route, prefix, and telemetry artifacts must not be embedded.
  promotion_criteria:
    trusted_built_runtime_retention_allowed: false
    criteria:
    - At least 30 successful tenant-scoped invocations in a 90-day period with repeated materialization of the same output
      templates.
    - No unresolved high-severity boundary defects or evidence-traceability defects in the last release cycle.
    - Human reviewer approves generated runtime behavior against this spec pack and documents rollback.
    - Runtime can preserve tenant isolation, source freshness checks, refusal triggers, and evidence traceability without
      manual patching.
