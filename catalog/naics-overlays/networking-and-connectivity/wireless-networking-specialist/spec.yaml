- orchestrator
knowledge_baseline:
  source_baseline_version: '2026-04-14'
  current_review_date: '2026-04-14'
  next_review_due_at: '2026-07-13'
  source_classes:
  - class: Named-industry operating guidance
    rationale: NIST WLAN security guidance, FCC spectrum rules, and official vendor operating guides define practical enterprise
      WLAN planning, secure access, RF constraints, and operational boundaries.
  - class: Recognized workflow references tied directly to the lane
    rationale: IEEE 802.11, Cisco controller/RF documentation, Meraki mesh guidance, and IETF access/addressing standards
      define wireless admission, association, authentication, DHCP/DNS/IPv6, roaming, and troubleshooting terminology used
      by the lane.
  - class: Evidence or control standards relevant to the lane
    rationale: NIST SP 800-53, NIST SP 800-153, IETF RFCs, and vendor telemetry documentation constrain evidence quality,
      control mapping, and refusal handling.
  source_selection_approach: 'Use recognized standards and public regulatory or vendor documents for

    wireless LAN behavior, authentication, addressing, security controls, and

    spectrum constraints. Prefer IEEE, IETF, NIST, FCC, Cisco, and vendor

    product documentation over secondary explainers. Use tenant vendor

    documentation only for platform-specific behavior and do not generalize it

    beyond the cited platform.

    '
  authority_sources:
  - source_id: nist-sp-800-153
    title: Guidelines for Securing Wireless Local Area Networks
    publisher: National Institute of Standards and Technology (NIST)
    source_type: named-industry-operating-guidance
    location: https://csrc.nist.gov/pubs/sp/800/153/final
    authority_reason: NIST publishes U.S. federal security guidance, and SP 800-153 directly covers WLAN security life cycle,
      planning, deployment, operation, maintenance, and secure use.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_nist_revision
    status: active
  - source_id: ieee-802-11-working-group
    title: IEEE 802.11 Wireless LAN Working Group
    publisher: IEEE
    source_type: recognized-workflow-reference
    location: https://www.ieee802.org/11/
    authority_reason: IEEE 802.11 is the primary standards venue for wireless LAN MAC and PHY behavior, amendments, and terminology
      that constrain RF, association, roaming, and client capability claims.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_ieee_802_11_revision
    status: active
  - source_id: ietf-rfc-3748-eap
    title: RFC 3748 Extensible Authentication Protocol
    publisher: Internet Engineering Task Force (IETF)
    source_type: recognized-workflow-reference
    location: https://datatracker.ietf.org/doc/html/rfc3748
    authority_reason: Defines EAP framework behavior used in enterprise WLAN 802.1X authentication and access-intake decisioning.
    last_reviewed_at: '2026-04-14'
