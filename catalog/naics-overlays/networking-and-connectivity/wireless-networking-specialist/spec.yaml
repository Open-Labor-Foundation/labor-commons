workflow_contract:
  phase_group: intake-access-and-initiation
  workflow_families:
  - Request or case intake.
  - Eligibility, authorization, or prerequisite validation.
  - Routing, acceptance, or rejection.
  - Escalation when required records or approvals are missing.
  - Industry-specific in-scope execution.
  - Escalation when industry-specific authority or safety facts are missing.
  stages:
  - stage: wireless request intake
    responsibilities:
    - Normalize request scope, tenant/site identity, affected SSIDs/APs/controllers, client population, time range, desired
      output, and production-impact intent.
    - Capture whether the request is design, troubleshooting, readiness, access-integration, routing/addressing, or packaging
      work.
    closure_evidence:
    - intake disposition note
    - request scope and owner map
    - missing-evidence register
  - stage: prerequisite and authorization validation
    responsibilities:
    - Validate RF plans, AP/controller inventory, WLAN configuration summaries, authentication records, DHCP/DNS/IPv6 records,
      monitoring telemetry, ticket/change context, approval owners, and regulatory region facts.
    - Block intake rather than guess when required evidence or authority is missing.
    closure_evidence:
    - eligibility or prerequisite checklist
    - retrieval dependency map
    - authority and approval note
  - stage: acceptance, refusal, or adjacent routing
    responsibilities:
    - Accept in-scope wireless advisory work, refuse prohibited execution or adjacent ownership, and route endpoint, identity,
      application, firewall, WAN, BGP, DNS/IPAM, legal, procurement, or compliance-primary work before execution begins.
    - Preserve relevant wireless evidence in the handoff package.
    closure_evidence:
    - routing or escalation summary
    - scope verdict
    - handoff evidence packet
  - stage: source-grounded wireless analysis
    responsibilities:
    - Produce design, troubleshooting, capacity, authentication-integration, routing/addressing, monitoring, readiness, and
      rollback guidance tied to public sources and tenant records.
    - Separate facts, assumptions, tradeoffs, confidence, and success criteria.
    closure_evidence:
    - wireless design guidance
    - troubleshooting plan
    - routing/addressing recommendation
    - deployment evidence note
  - stage: safety, regulatory, and authority escalation
    responsibilities:
    - Escalate when spectrum region, 6 GHz power class, DFS/AFC/geofencing posture, safety-critical client requirements, legal/compliance
      interpretation, or production approval facts are missing or conflicting.
    - Record unresolved ambiguity rather than synthesizing unsupported definitive guidance.
    closure_evidence:
    - low-confidence escalation note
    - source or policy conflict note
    - human-review routing
  - stage: closure and evidence packaging
    responsibilities:
    - Package assumptions, source IDs, tenant evidence, success criteria, rollback checks, monitoring gates, next owners,
      and commercialization proof points.
    - Keep tenant execution logs tenant-scoped and out of the baseline spec pack.
    closure_evidence:
    - evidence packet
    - acceptance and rollback checklist
    - commercialization readiness note
  routing_states:
  - submitted
  - intake-blocked
  - accepted-for-wireless-analysis
  - low-confidence-escalation
  - routed-adjacent
  - refused
  - completed
  update_permissions:
  - May propose WLAN design, SSID segmentation, RF/channel policy, AP/controller topology, authentication integration, DHCP/DNS/IPv6
    client-edge guidance, monitoring gates, rollback criteria, and evidence packet structure.
  - May not directly update controllers, APs, RADIUS/NAC systems, DNS/DHCP/IPAM systems, firewalls, endpoint managers, identity
    providers, applications, procurement records, legal records, or production change tickets.
  - Every proposed change must name affected tenant/site, evidence source, assumptions, expected impact, rollback condition,
    and required approver.
  audit_trail_expectations:
  - Preserve public source IDs, source review dates, tenant evidence links, retrieval timestamps, assumptions, confidence
    tags, and adjacent-owner routing.
  - Record refusals, orchestrator returns, unresolved ambiguity, conflicting policies, and low-confidence escalations with
    rationale.
  - Retain evaluation, readiness, research, and functionality evidence in the package; tenant-specific execution evidence
    remains tenant-scoped.
  administrative_boundary: 'The lane administers wireless-networking advisory intake, evidence, and

    recommendations. It does not authorize final production changes, legal or

    regulatory compliance, procurement, spectrum certification, safety risk

    acceptance, endpoint policy, identity policy, application fixes, or

    adjacent networking implementation.

    '
materialization_contract:
  posture: specification-based
  safe_materialization_requires:
  - task metadata for supported wireless advisory decision types and prohibited execution actions
  - tenant connectors or retrieval summaries for wireless controller/cloud management, RF survey, DHCP/DNS/IPAM, RADIUS/NAC,
    network monitoring, ticketing, CMDB, policy, and evidence repositories
  - tenant RF region, site constraints, AP/controller vendor scope, client class inventory, SSID/VLAN/subnet map, authentication
    model, and rollback owner
  - prompt and policy guardrails that block direct controller execution, endpoint/identity/application work, legal/compliance
    signoff, procurement approval, and unsupported vendor command scripting
  - audit logging for scope verdict, evidence references, assumptions, confidence, refusal triggers, source refresh state,
    and next-owner routing
  tenant_supplied_or_retrieved_assumptions:
  - authorized requester role and allowed advisory decision type
  - tenant/site/floor identity and affected SSIDs, APs, controllers, clients, and time range
  - RF survey or predictive model, AP inventory, channel plan, power settings, firmware matrix, and client capability mix
  - authentication, DHCP, DNS, IPv6, VLAN, gateway, firewall handoff, monitoring, ticket, and change evidence
  - regulatory region, spectrum constraints, tenant policy, contractual requirements, data classification, safety caveats,
    and approval matrix
  refusal_or_return_conditions:
  - direct action, production command, change approval, vendor command script, or platform-specific execution is requested
  - required facts, RF records, telemetry, authentication logs, DHCP/DNS/IPv6 records, regulatory region, approval owner,
    or source precedence are missing or conflicting
  - endpoint, identity, application, firewall, WAN, BGP, DNS/IPAM-primary, legal, procurement, safety, or compliance ownership
    is primary
  - public guidance, vendor documentation, tenant policy, contract, jurisdiction, or spectrum rules conflict materially
  trusted_build_promotion_criteria:
  - two consecutive release cycles show frequent lane usage with stable request patterns and repeatable tenant retrieval contracts
  - wireless controller, RF survey, authentication, DHCP/DNS/IPAM, monitoring, ticketing, and evidence connectors are implemented
    and tested with tenant isolation
  - scenario suite remains at or above standard acceptance with no unreviewed regressions
  - human networking reviewer approves retention of generated implementation artifacts
  - rollback and deprecation path for built runtime artifacts is documented
  trusted_built_runtime_claimed: false
