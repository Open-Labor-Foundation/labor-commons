quality_and_assurance_contract:
  control_objectives:
  - Voice networking recommendations must be traceable to named topology, trunk, route, firewall, DNS, DHCP, monitoring, call-record,
    packet, or change evidence.
  - Hold, release, exception, emergency-call, and safety-control boundaries must remain recommendations or escalation notes
    unless authorized human approval is supplied.
  - Incident summaries must distinguish signaling-plane, media-plane, DNS/DHCP, firewall/NAT, QoS, platform, endpoint, identity,
    and application ownership.
  - Corrective-action escalation is required for repeat defects, recurring incidents, unresolved control failures, missing
    evidence, or conflicting source-of-truth records.
  acceptance_criteria:
  - The output states in-scope network decision surface, assumptions, evidence, risk, confidence, and owner handoffs.
  - The output cites source IDs or tenant artifacts sufficient for audit.
  - The output rejects or routes adjacent work without attempting endpoint, identity, application, procurement, legal, or
    approval authority.
  - The output records unresolved ambiguity instead of guessing where sources, tenant policy, emergency-call requirements,
    or records conflict.
  hold_or_release_boundaries:
  - Recommend hold when SIP/SBC topology, firewall/NAT, DNS discovery, DHCP/addressing, route policy, call-quality telemetry,
    emergency-call path evidence, rollback plan, or approval authority is materially incomplete.
  - Recommend limited release only when tenant evidence, source support, owner approval, rollback checkpoints, monitoring
    gates, and emergency-call path caveats are documented.
  - Never clear a hold, approve a release, or certify emergency-call compliance without explicit authorized human decision.
  defect_incident_nonconformance_handling:
  - For call setup failures, identify signaling evidence required before media or endpoint changes are recommended.
  - For one-way audio, jitter, loss, or media resets, require RTP/SRTP, NAT, route, QoS, packet, and monitoring evidence before
    causal claims.
  - For repeat registration, routing, failover, or quality incidents, produce a corrective-action escalation with owner, recurrence
    signal, missing evidence, and next review gate.
  - For conflicting provider guidance and tenant policy, stop confident synthesis and route to owner resolution.
materialization:
  runtime_strategy: specification-based
  safe_materialization_requires:
  - task metadata, scope verdict schema, output shape selector, and adjacent specialist map
  - tenant topology, trunk, SBC, firewall, DNS, DHCP, routing, call-quality, monitoring, incident, change, and approval retrieval
    hooks
  - source baseline version, source freshness checks, tenant policy precedence, and conflict escalation rules
  - refusal triggers, hold/release boundaries, emergency-call caveats, evidence retention rules, and low-confidence thresholds
  - audit logging for scenario IDs, source IDs, evidence artifacts, confidence, assumptions, refusals, and orchestrator returns
  trusted_build_promotion_criteria:
  - frequent-use evidence shows this lane is invoked often enough to justify retaining generated implementation in-repo
  - full 20-scenario regression remains passing under strict profile
  - human review approves source freshness, tenant isolation, monitoring/logging, rollback path, and promotion evidence
  - generated runtime has deterministic evidence traceability, refusal behavior, and no drift from this spec pack
  long_term_storage_default: do_not_retain_generated_implementation_without_promotion_evidence
