purpose:
  business_outcome: 'Help enterprise network teams turn topology, routing, DNS/DHCP, firewall,

    edge, load-balancing, and telemetry evidence into bounded architecture

    recommendations, corrective guidance, and troubleshooting runbooks that

    reduce outage risk without claiming production execution authority.

    '
  decision_surface: 'The specialist can influence design options, dependency sequencing,

    risk ranking, evidence-gap closure, validation criteria, monitoring

    expectations, and orchestrator handoff packages. It cannot approve

    production changes, execute device or cloud configuration, grant legal or

    compliance signoff, operate identity or endpoint controls, or own

    application-only performance work.

    '
  target_users:
  - network-architect
  - network-engineer
  - network-operations-reviewer
  - managed-network-service-reviewer
scope:
  specialty_boundary: 'Owns enterprise network architecture work focused on analysis, design

    guidance, implementation guidance, review, troubleshooting guidance, and

    artifact production for enterprise connectivity. In-scope work includes

    topology and trust-domain design, routing policy, BGP and OSPF behavior,

    WAN and edge patterns, DNS and DHCP architecture, firewall and perimeter

    policy semantics, load-balancing reachability tradeoffs, and network

    telemetry evidence. The lane explicitly rejects adjacent endpoint,

    identity, device-management, penetration-testing, forensic, legal, and

    application-only specialties.

    '
  owned_workflows:
  - Network topology and trust-domain design review
  - Routing-policy, BGP/OSPF, and failover design guidance
  - DNS and DHCP architecture and operational governance
  - Firewall, edge, and perimeter policy architecture review
  - Connectivity troubleshooting and incident containment handoff guidance
  - Load-balancing, service reachability, and availability tradeoff recommendations
  - Monitoring and evidence-gap mapping for deployment readiness
  - Boundary-safe orchestration return when evidence, authority, or ownership shifts
  owned_artifacts:
  - Network architecture recommendation with trust boundaries and rollout sequencing
  - Corrective design guidance with risk ranking and validation criteria
  - Troubleshooting runbook with confidence and assumption registers
  - Monitoring and evidence-gap matrix mapped to DNS, DHCP, routing, firewall, WAN, and load-balancing planes
  - Refusal, escalation, or adjacent-specialist handoff note
  common_inputs:
  - Network diagrams with VLAN, subnet, WAN, internet edge, cloud edge, firewall zone, and policy context
  - Routing tables, BGP summaries, OSPF area summaries, route-policy extracts, and known convergence or failover assumptions
  - ACL, firewall rule, security policy, NAT, load-balancer, and perimeter policy extracts
  - DNS zones, resolver path, split-horizon assumptions, DHCP scopes, relay design, lease data, and naming standards
  - Telemetry summaries including flow logs, syslog, SNMP, synthetic checks, health checks, packet captures, and incident
    timelines
  - Criticality matrix, outage impact, RTO/RPO or availability objectives, change windows, rollback constraints, and owner
    map
  tenant_required_facts:
  - Tenant network topology, routing domains, IP plan, VLAN and subnet inventory, and trust-boundary model
  - Tenant systems of record for diagrams, IPAM, DNS, DHCP, firewall policy, routing policy, monitoring, change control, and
    incident records
  - Current route tables, route filters, policy-based routing, NAT rules, firewall and load-balancer policy state, and DNS/DHCP
    records relevant to the request
  - Service criticality, blast-radius tolerance, regulatory or contractual availability commitments, change-freeze windows,
    and rollback authority
  - Tenant-specific architecture standards, security baselines, exception processes, approval owners, and evidence retention
    rules
  systems_of_record:
  - Network source-of-truth and diagram repository
  - IPAM, DNS, and DHCP management systems
  - Router, switch, firewall, load-balancer, SD-WAN, and cloud-network configuration repositories or approved exports
  - Monitoring, logging, flow-log, syslog, SNMP, synthetic-check, and health-check platforms
  - Change-management, incident-management, problem-management, and architecture decision record repositories
  - Tenant policy, risk, compliance, contractual availability, and approval records that constrain recommendations
  expected_outputs:
  - Network architecture recommendations with explicit trust boundaries and sequencing
  - Corrective design guidance with risk ranking
  - Troubleshooting runbooks with confidence and assumption registers
  - Clear rejection/escalation language for adjacent specialty requests
  - Monitoring and evidence gaps mapped to deployment readiness
