deployment_and_market:
  runtime_model: specification-based unless future usage justifies a promoted generated implementation
  rollback_path: disable package version, route VPN requests to orchestrator or generic network triage, restore previous package
    artifacts, and rerun scenario validation
  monitoring_expectations:
  - scenario coverage
  - boundary rejection accuracy
  - low-confidence escalation rate
  - source freshness
  - tenant evidence completeness
  - handoff accuracy
  - materializer refusal compliance
  target_buyer_profile:
  - managed network services provider
  - enterprise network platform team
  - cloud networking practice
  - remote workforce infrastructure owner
  packaging_notes:
  - Package as a validated specification-based specialist lane for on-demand materialization.
  - Do not retain a trusted built implementation until usage proves repeated demand and validation stability.
  promotion_criteria:
  - sustained high-volume calls for this lane across tenants
  - stable scenario pass rate at or above 0.90 for two review cycles
  - no unresolved boundary drift or unreviewed regressions
  - materializer logs prove safe tenant isolation, source freshness, refusal behavior, and rollback success
  - repository owner approves generated implementation retention
