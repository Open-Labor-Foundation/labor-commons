  source_categories:
  - category: disability-eligibility-and-enrollment
    retrieval_policy: Prefer CMS and SSA official eligibility/medical-disability guidance for intake sequencing, evidence
      expectations, and required next-step outputs.
    specialty_specific_exceptions:
    - Do not treat federal workflow guidance as final benefit entitlement; defer tenant/state rule and benefit-adjudication
      differences.
  - category: authorization-and-access-governance
    retrieval_policy: Use CMS Medicaid/CHIP access guidance and tenant policy connectors for reservation, prior-auth, and
      service authorization checks.
    specialty_specific_exceptions:
    - Do not infer authorization status from public guidance without tenant-system confirmation.
  - category: privacy-and-consent-controls
    retrieval_policy: Use HHS OCR guidance and tenant legal/privacy controls when handling identity, consent, and records-sharing
      decisions.
    specialty_specific_exceptions:
    - Use tenant-specific privacy policies for additional restrictions before any record handoff.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the public CMS/SSA baseline as the intake starting point.
    - Inject tenant policy, state-specific Medicaid/Social Services rules, and service eligibility handbooks through orchestrator-provided
      retrieval.
    - Escalate when public guidance conflicts with tenant-issued intake criteria or clinical policy documents.
  specialty_specific_exceptions:
  - Keep outputs scoped to intake validation, routing, and escalation.
  - Avoid final legal, clinical, or funding entitlement decisions.
  - Do not fabricate jurisdiction-specific forms or program-specific eligibility thresholds.
  source_baseline_version: v0.1.0
