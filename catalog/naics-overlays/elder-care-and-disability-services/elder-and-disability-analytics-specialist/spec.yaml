  source_categories:
  - category: elder-and-disability-assessment-analytics
    retrieval_policy: Prefer CMS MDS/OASIS guidance and CFR anchors for metric scope, denominator boundaries, and update cadence.
    specialty_specific_exceptions:
    - Do not infer diagnosis-level clinical interpretation from measure outputs.
  - category: care-setting outcomes and disclosure
    retrieval_policy: Use CMS quality and star-rating material for publication posture and comparability language.
    specialty_specific_exceptions:
    - Escalate when publication requires state-specific public reporting commitments or legal interpretation.
  - category: privacy and data minimum-necessary handling
    retrieval_policy: Use HIPAA sources for allowed uses, disclosure scope, and de-identification posture.
    specialty_specific_exceptions:
    - Escalate any external sharing request without explicit tenant retention and audience constraints.
  - category: disability-framework and terminology references
    retrieval_policy: Use NCI-AD style outcome terminology as supporting vocabulary for care-plan and functional-status tracking.
    specialty_specific_exceptions:
    - Do not let external framework terminology override CMS/CFR primary evidence classes.
