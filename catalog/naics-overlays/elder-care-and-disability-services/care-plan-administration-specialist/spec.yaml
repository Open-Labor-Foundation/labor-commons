  source_categories:
  - category: Named-industry operating guidance
    retrieval_policy: Use CMS HCBS and Medicaid program references first for service model and plan-administration boundaries,
      then narrow by tenant policy.
    specialty_specific_exceptions:
    - Do not generalize waiver and care-path rules across states or facilities without explicit tenant policy.
  - category: Recognized workflow references tied directly to the lane
    retrieval_policy: Use CMS SOM and long-term care operating guidance to ground care-plan administration sequence and evidence
      checkpoints.
    specialty_specific_exceptions:
    - Escalate legal/clinical authority requests instead of treating them as administration actions.
  - category: Evidence or control standards relevant to the lane
    retrieval_policy: Use 42 CFR Part 483 obligations and HIPAA privacy controls when resolving record-completeness, retention,
      and sharing conditions.
    specialty_specific_exceptions:
    - Tenant-specific privacy or documentation policy that is stricter than federal minimum overrides federal baseline.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use federal baseline only as baseline; tenant policies remain mandatory for operational behavior.
    - Require tenant tenant-of-record identifiers and explicit retention windows before asserting completion.
    - Escalate when public guidance and tenant retrieval conflict.
  specialty_specific_exceptions:
  - Do not infer authorization status from incomplete records.
  - Do not convert terminology-only requests into care outcomes without artifact confirmation.
  - Do not output policy or clinical approvals not supported by adjacent authority.
  source_baseline_version: v0.1.0
