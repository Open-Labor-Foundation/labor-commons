  source_categories:
  - category: named-industry access and intake guidance
    retrieval_policy: Use CMS and CMS-linked Medicaid references for baseline service models, then inject state-specific tenant
      policies and routing dictionaries.
    specialty_specific_exceptions:
    - Do not infer local service-line policies from CMS text without tenant retrieval context.
  - category: authorization and reservation governance
    retrieval_policy: Use public managed-care and waiver baseline to identify expected authorization and reservation records,
      then verify tenant/system-level availability.
    specialty_specific_exceptions:
    - Never assume reservation status is approved without tenant-system confirmation.
  - category: privacy and consent constraints
    retrieval_policy: Use HIPAA and tenant policy for disclosure thresholds, then map to queue-level routing and refusal points.
    specialty_specific_exceptions:
    - Tenant legal/policy rules can be more restrictive than HIPAA minimum.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public baseline sources as industry defaults only.
    - Resolve state, facility, and MCO policy rules through tenant retrieval before authority conclusions.
    - Escalate when public and tenant guidance conflict materially.
  specialty_specific_exceptions:
  - No clinical eligibility or treatment-authorization authority is exercised in this lane.
  - No legal policy overrides are approved without a higher-authority specialist or human reviewer.
  - Use of PASRR/HCBS/ILP/PDP terminology requires explicit artifact mapping to tenant dictionaries.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-10-09'
