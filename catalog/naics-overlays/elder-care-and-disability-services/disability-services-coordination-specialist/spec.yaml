    authority_reason: Defines federally referenced care-coordination and continuity obligations in managed care, directly
      governing coordination and handoff quality assumptions for Medicaid-related elder and disability service workflows.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ecfr-42-cfr-441.725
    title: 42 CFR 441.725 - Person-centered service plan
    publisher: Electronic Code of Federal Regulations
    source_type: primary-regulatory-standard
    location: https://www.law.cornell.edu/cfr/text/42/441.725
    authority_reason: Defines required person-centered planning records and responsibilities that coordination handoffs must
      preserve and track in elderly and disability HCBS workflows.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-hcbs-fact-sheet
