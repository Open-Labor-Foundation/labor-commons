    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: hipaa-privacy-rule
    title: Health Insurance Portability and Accountability Act (HIPAA) Privacy Rule
    publisher: U.S. Department of Health and Human Services / eCFR
    source_type: primary-privacy-regulation
    location: https://www.ecfr.gov/current/title-45/subtitle-A/subchapter-C/part-164/subpart-E
    authority_reason: Defines minimum handling and disclosure controls for protected health information during care coordination
      handoffs and cross-queue sharing.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
