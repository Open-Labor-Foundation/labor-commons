  source_categories:
  - category: care-coordination-regulatory-basis
    retrieval_policy: Prefer federal Part C Medicaid/CMS HCBS and managed-care requirements for handoff prerequisites, assessments,
      and person-centered planning assumptions.
    specialty_specific_exceptions:
    - Do not use broad service-level assumptions where state-specific eligibility rules override the public baseline.
  - category: workflow-and-continuity-operations
    retrieval_policy: Use CMS and ACL HCBS guidance for sequencing and handoff expectations, but avoid converting educational
      material into live authority.
    specialty_specific_exceptions:
    - Route contradictory state or contract workflows to human adjudication when they alter sequencing or ownership.
  - category: privacy-and-evidence-controls
    retrieval_policy: Use HIPAA Privacy subpart standards to bound record-sharing and consent requirements in cross-team routing.
    specialty_specific_exceptions:
    - Never treat this lane as a blanket authorization channel; require tenant-level consent and policy context.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public federal and program guidance is the default baseline for coordination policy and handoff expectations.
    - Tenant retrieval should inject state plans, provider policy manuals, internal case-management systems, and signed consent
      artifacts.
    - Escalate immediately when public and tenant sources conflict on authority, scope, or required evidence.
  specialty_specific_exceptions:
  - Coordination posture is ownership-aware, not decision-centric.
  - Evidence sufficiency is tracked as a handoff precondition, not a guarantee of final approval.
  - Legal or licensed clinical conclusions must be handled by explicit adjacent specialties.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-10-09'
