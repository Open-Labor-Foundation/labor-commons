    publisher: Centers for Medicare & Medicaid Services
    source_type: official-guidance
    location: https://www.cms.gov/newsroom/fact-sheets/home-and-community-based-services
    authority_reason: CMS publishes person-centered and service planning expectations that materially shape evidence and handoff
      language for disability and elder-care service delivery programs.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: acl-hcbs-settings-rule
