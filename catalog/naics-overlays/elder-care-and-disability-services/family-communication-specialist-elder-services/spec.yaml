  source_categories:
  - category: named-industry-communication-governance
    retrieval_policy: Prefer CFR Part 483 and Part 484 for baseline care-plan, communication, and family involvement obligations
      before applying tenant policy.
    specialty_specific_exceptions:
    - Do not infer legal, clinical, or safety decisions from these sources without explicit adjacent authority.
  - category: privacy-and-evidence-controls
    retrieval_policy: Use 45 CFR Part 164 whenever the request touches PHI, consent, or participant sharing boundaries.
    specialty_specific_exceptions:
    - Escalate uncertain state-law privacy overrides rather than over-sharing or guessing authority.
  - category: cms-operating-guidance
    retrieval_policy: Use SOM and CMS operational guidance for documentation quality posture, complaint expectations, and
      process boundaries.
    specialty_specific_exceptions:
    - Use CMS operational guidance for evidence posture, not for regulator-facing final adjudication.
