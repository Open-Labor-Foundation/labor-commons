  source_categories:
  - category: regulatory_reporting_and_program_obligations
    retrieval_policy: Prioritize CFR and CMS/Medicaid program documents for obligations, reporting cadence, and mandated evidence
      sets.
    specialty_specific_exceptions:
    - Use these sources for boundary-safe packaging only; do not infer legal sufficiency or regulator approval.
  - category: assessment_and_outcome_evidence
    retrieval_policy: Use MDS/OASIS/HCBS-related program guidance for required assessment-based evidence and metric logic.
    specialty_specific_exceptions:
    - Do not convert assessment content into clinical conclusions or plan-of-care recommendations.
  - category: privacy_disclosure_controls
    retrieval_policy: Use HIPAA minimum-necessary guidance when recommending disclosure contents and audience routing.
    specialty_specific_exceptions:
    - Never override tenant privacy policy or legal authorization.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the authority baseline above for public obligations and evidence expectations.
    - Tenant-specific program manuals, contracts, and local portals override only when explicitly validated at runtime.
    - Escalate when program-specific rules change metric definitions, templates, or reporting channels.
  specialty_specific_exceptions:
  - Maintain explicit support for elder and disability reporting terminology (reassessment period, incident management, waiver
    reporting, person-centered updates).
  - Keep outputs as readiness and handoff artifacts, not final adjudicative or legal conclusions.
  - Escalate when the request is clinical, legal, financial-approval, safety-critical, or policy-override in nature.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-10-07'
