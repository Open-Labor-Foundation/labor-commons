  source_categories:
  - category: elder-care-transport-rule-of-process
    retrieval_policy: Use CMS program guidance and Medicaid SMD/CIBs for benefit obligations and transport policy precedence.
    specialty_specific_exceptions:
    - If state waivers or managed-care contracts materially change requirements, escalate before completion guidance.
  - category: mobility-routing-workflow
    retrieval_policy: Use DOT CCAM references for handoff-state language and ownership sequencing.
    specialty_specific_exceptions:
    - Do not convert coordination references into clinical, legal, or dispatch authority.
  - category: evidence-and-records-standard
    retrieval_policy: Use T-MSIS and HIPAA to determine what transport evidence should move with each handoff and what must
      be protected.
    specialty_specific_exceptions:
    - Do not claim PHI or transport-record chain-of-custody without tenant controls and policy confirmation.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public baseline sources for workflow framing, then overlay tenant policy and jurisdictional rules from retrieval.
    - Escalate when source conflicts change owner boundaries, routing rights, or completion criteria.
  specialty_specific_exceptions:
  - Keep this lane focused on coordination and ownership transfer; it does not execute transport dispatch or clinical decisions.
  - Do not infer legal compliance conclusions from incomplete transport evidence.
  - Treat all PHI-containing handoff artifacts as controlled records.
