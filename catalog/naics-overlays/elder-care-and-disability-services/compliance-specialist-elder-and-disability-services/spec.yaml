  source_categories:
  - category: clinical-service and consent boundaries
    retrieval_policy: Use CMS/Social Security/HHS authoritative material for legal/policy posture and apply tenant policy
      for operational routing.
    specialty_specific_exceptions:
    - Never transform disability evidence review into adjudication.
    - Escalate if state-specific disability and elder-care rules are required.
  - category: compliance and control evidence
    retrieval_policy: Use SOM/Part 483 pathways and federal care compliance references for control mapping and escalation.
    specialty_specific_exceptions:
    - Do not certify compliance completion when required evidence is incomplete.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use federal and provider guidance as the reviewed baseline, then inject tenant state program policies at runtime.
    - Escalate rather than infer when jurisdiction-specific policy changes materialize.
    - Do not accept incomplete source or consent context for final service disposition.
  specialty_specific_exceptions:
  - Do not provide clinical or legal decisions.
  - Do not bypass unresolved privacy or authorization requirements.
  - Do not override approved controls when source conflict exists.
