knowledge_baseline:
  source_baseline_version: v0.1.0
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: HHS/OCR privacy guidance defines PHI, minimum-necessary, consent, and disclosure limits when property systems
      include patient/member, care-transition lodging, or claim-administrative facts.
  - class: Public payer or provider operating guidance
    rationale: CMS manuals define payer, claim, organization-determination, grievance, denial, and appeal boundaries that
      property-system workflows must route rather than decide.
  - class: Recognized healthcare workflow or measure guidance
    rationale: CMS HCAHPS gives a public patient-experience baseline for communication, discharge, and care-transition terminology
      without granting clinical authority.
  - class: Recognized information-security and change-management standards
    rationale: NIST incident-response and configuration-management publications define public lifecycle and control language
      for incidents, access, change readiness, evidence, and escalation.
  - class: Public hospitality, accessibility, consumer-protection, payment-security, and interoperability guidance
    rationale: DOJ, FTC, PCI SSC, and OpenTravel sources constrain accessible-room reservation data, fee display, cardholder-data
      handling, and hotel-system interface terminology.
  source_selection_approach: 'Use HHS/OCR, CMS, CMS HCAHPS, NIST, PCI SSC, DOJ, FTC, and OpenTravel

    sources before making workflow claims. Treat tenant PMS/CRS runbooks,

    service catalogs, vendor procedures, payer/provider manuals, property

    policies, role matrices, change calendars, interface maps, and approval

    thresholds as runtime retrieval dependencies that narrow but do not replace

    the public baseline.

    '
  authority_sources:
  - source_id: hhs-ocr-hipaa-minimum-necessary
    title: 'HIPAA Privacy Rule: Minimum Necessary Requirement'
    publisher: U.S. Department of Health and Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS/OCR is the federal HIPAA Privacy Rule enforcement authority, and this guidance directly constrains
      PHI use, disclosure, and minimum-necessary handling in patient/member lodging or travel-support workflows.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-medicare-managed-care-manual-chapter-13
    title: 'Medicare Managed Care Manual, Chapter 13: Medicare Managed Care Beneficiary Grievances, Organization Determinations,
      and Appeals'
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-operating-guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/mc86c13.pdf
    authority_reason: CMS administers Medicare and this public manual defines organization determination, grievance, appeal,
      and payer-sensitive boundaries relevant to authorization or coverage-sensitive lodging support.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-medicare-claims-processing-manual-chapter-1
    title: 'Medicare Claims Processing Manual, Chapter 1: General Billing Requirements'
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/clm104c01.pdf
    authority_reason: CMS public claims-processing guidance is authoritative for Medicare claim processing concepts and keeps
      the lane from treating charge, claim, remittance, denial, or appeal records as property-system facts it can change.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-hcahps
    title: 'HCAHPS: Patients'' Perspectives of Care Survey'
    publisher: Centers for Medicare & Medicaid Services
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.cms.gov/medicare/quality/initiatives/hospital-quality-initiative/hcahps-patients-perspectives-care-survey
    authority_reason: CMS administers HCAHPS as a national patient-experience measure, making it authoritative for communication,
      responsiveness, discharge, and care-transition terminology used in healthcare-adjacent property-system work.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: nist-sp-800-61r3
    title: 'NIST SP 800-61 Rev. 3: Incident Response Recommendations and Considerations for Cybersecurity Risk Management'
    publisher: National Institute of Standards and Technology
    source_type: recognized-information-security-standard
    location: https://csrc.nist.gov/pubs/sp/800/61/r3/final
    authority_reason: NIST is a U.S. federal standards authority for cybersecurity guidance, and SP 800-61 Rev. 3 provides
      the public incident-response lifecycle language used to constrain system-incident triage and escalation.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: nist-sp-800-128
    title: 'NIST SP 800-128: Guide for Security-Focused Configuration Management of Information Systems'
    publisher: National Institute of Standards and Technology
    source_type: recognized-change-and-configuration-standard
    location: https://csrc.nist.gov/pubs/sp/800/128/final
    authority_reason: NIST SP 800-128 is authoritative public guidance for configuration management, change control, security
      impact analysis, monitoring, and evidence expected before system changes proceed.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: pci-dss
    title: 'PCI DSS: Payment Card Industry Data Security Standard'
    publisher: PCI Security Standards Council
    source_type: payment-security-standard
    location: https://www.pcisecuritystandards.org/standards/pci-dss/
    authority_reason: PCI SSC is the recognized global payment-card security standards body, and PCI DSS directly constrains
      PMS, POS, payment-token, folio, call-center, and booking-engine handling of cardholder data.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: doj-ada-title-iii-lodging-reservations
    title: Americans with Disabilities Act Title III Regulations
    publisher: U.S. Department of Justice
    source_type: public-hospitality-accessibility-regulation
    location: https://www.ada.gov/law-and-regs/regulations/title-iii-regulations/
    authority_reason: DOJ is the primary federal ADA Title III enforcement authority, and its lodging reservation provisions
      govern accessible-room descriptions, reservation parity, and third-party reservation-service duties.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-unfair-deceptive-fees
    title: 'The Rule on Unfair or Deceptive Fees: Frequently Asked Questions'
    publisher: Federal Trade Commission
    source_type: consumer-protection-guidance
    location: https://www.ftc.gov/business-guidance/resources/rule-unfair-or-deceptive-fees-frequently-asked-questions
    authority_reason: FTC is the primary U.S. consumer-protection regulator, and this guidance constrains short-term lodging
      fee display and property-system price or folio communication.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 60
    decay_policy: review_required_after_interval
    status: active
  - source_id: opentravel-specifications
    title: OpenTravel Alliance Specifications
    publisher: OpenTravel Alliance
    source_type: hospitality-interoperability-standard
    location: https://opentravel.org/resources/specifications/
    authority_reason: OpenTravel is a travel-industry standards body for vendor-neutral message specifications, making it
      authoritative for hotel availability, rate, inventory, reservation, profile, and interface terminology.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: Healthcare privacy, payer, claim, and patient/member safety
    retrieval_policy: Use HHS/OCR and CMS guidance whenever patient/member, eligibility, referral, authorization, encounter,
      claim, denial, appeal, or PHI records affect property-system handling.
    specialty_specific_exceptions:
    - Do not turn property-system status work into clinical advice, payer-policy interpretation, privacy interpretation, or
      claim adjustment.
  - category: System incident, access, configuration, and change controls
    retrieval_policy: Use NIST incident-response and configuration-management guidance to define lifecycle state, evidence
      sufficiency, change-readiness, escalation, and refusal behavior.
    specialty_specific_exceptions:
    - Do not approve access, production changes, data repair, or security exceptions from inside the property-system execution
      lane.
  - category: Hospitality property-system, accessibility, fee, and payment controls
    retrieval_policy: Use PCI DSS, DOJ ADA lodging rules, FTC fee guidance, and OpenTravel standards when payment, accessible-room
      reservation, fee-display, or interface terminology changes the safe workflow.
    specialty_specific_exceptions:
    - Do not promise accessible-room, rate, fee, payment, refund, or interface outcomes without tenant records and owner approval.
  next_review_due_at: '2026-06-13'
