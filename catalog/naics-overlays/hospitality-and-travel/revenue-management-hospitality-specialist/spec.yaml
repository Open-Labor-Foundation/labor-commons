knowledge_baseline:
  source_baseline_version: '2026-04-14'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: CMS, HHS OCR, and HHS OIG sources define claims, payment, remittance, privacy, fraud, abuse, and compliance
      boundaries for healthcare revenue workflows embedded in hospitality or travel settings.
  - class: Public payer or provider operating guidance
    rationale: CMS payer and provider references define authorization, pre-claim review, appeal, remittance, eligibility,
      and claim prerequisites used to identify upstream blockers.
  - class: Recognized healthcare workflow or measure guidance
    rationale: CAQH CORE and HFMA references normalize healthcare administrative transaction, denial, remittance, and revenue
      cycle terminology used in planning and allocation outputs.
  - class: Public hospitality and consumer-protection guidance
    rationale: FTC and DOJ sources constrain lodging fee, reservation, accessibility, and guest-impact cases when hospitality
      records are part of the revenue truth set.
  - class: Payment, recordkeeping, and hospitality finance references
    rationale: IRS, PCI SSC, and HFTP references support source-document discipline, payment-card boundaries, and lodging
      revenue terminology without granting tax, accounting, or payment-security approval authority.
  source_selection_approach: 'Use healthcare authorities first whenever eligibility, authorization,

    referral, encounter, claim, remittance, denial, appeal, PHI, patient/member

    safety, or payer rules affect the answer. Use hospitality, consumer

    protection, payment, tax recordkeeping, and lodging finance sources only

    to shape hospitality terminology, guest-impact caveats, payment evidence,

    and lodging revenue records. Tenant policy, payer contracts, state Medicaid

    manuals, MAC articles, brand standards, PMS configuration, EHR/EMR setup,

    source hierarchy, approval matrices, and privacy channels are runtime

    dependencies that narrow but do not replace the public baseline.

    '
