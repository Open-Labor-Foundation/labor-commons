knowledge_baseline:
  source_baseline_version: '2026-04-07'
  source_classes:
  - class: Primary hospitality, travel, or consumer-protection regulator guidance
    rationale: FTC, DOJ ADA, and DOT/BTS sources define fee disclosure, accessible lodging reservation, airline reporting,
      and traveler-facing data boundaries that govern safe hospitality and travel analytics outputs.
  - class: Public healthcare regulator guidance
    rationale: CMS, HHS, and federal health IT sources define healthcare quality measurement, privacy, public reporting, claims,
      prior authorization, and interoperability constraints required by the resolved healthcare-and-care-delivery profile.
  - class: Public payer or provider operating guidance
    rationale: CMS claims and prior-authorization references establish the workflow records and dependencies behind claim,
      eligibility, referral, authorization, remittance, and denial truth sets when hospitality analytics intersects patient
      or member operations.
  - class: Recognized hospitality, travel, healthcare workflow, or measure guidance
    rationale: STR, NCQA HEDIS, eCQI, ONC, and recognized public reporting references define metric terminology, denominator
      logic, benchmark limits, data lineage, and evidence handling.
  - class: Public metric-definition, reporting, disclosure, or benchmark guidance
    rationale: CoStar STR hotel metric definitions, BTS airline performance reporting, CMS measure guidance, and SEC KPI guidance
      constrain how metrics, assumptions, caveats, and trend statements are framed.
  source_selection_approach: 'Use hospitality and travel sources first for room, rate, booking,

    accessible-room, fee, channel, travel, and guest-facing metric logic. Use

    CMS, HHS, ONC, eCQI, and NCQA sources when the requested analysis touches

    patient or member context, payer or provider workflow, authorization,

    referral, claim, remittance, denial, quality measures, PHI, or public

    healthcare reporting. Use SEC KPI guidance whenever outputs are intended

    for board, investor-style, public, or otherwise formal disclosure. Tenant

    metric dictionaries, source-precedence policies, record locations,

    retrieval hooks, privacy controls, payer and plan rules, accessibility

    policies, channel definitions, and approval matrices remain mandatory

    runtime inputs.

    '
