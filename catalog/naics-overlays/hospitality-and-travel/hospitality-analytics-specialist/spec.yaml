  source_categories:
  - category: hospitality and travel metric definition
    retrieval_policy: Use STR and tenant metric dictionaries for occupancy, ADR, RevPAR, TrevPAR, RGI, comp set, booking pace,
      channel mix, pickup, no-show, group block, itinerary, and service recovery metrics before publishing.
    specialty_specific_exceptions:
    - Do not substitute a tenant dashboard label for denominator, room inventory, channel, or comp-set logic when the output
      will be used for benchmark or executive reporting.
  - category: fee, accessibility, and traveler disclosure controls
    retrieval_policy: Use FTC fee guidance, DOJ ADA lodging reservation rules, BTS airline reporting directives, tenant policies,
      and approval matrices before making guest-facing, traveler-facing, accessibility, refundability, or disclosure claims.
    specialty_specific_exceptions:
    - Do not treat pricing, fee, accessible-room, or on-time performance analytics as legal compliance approval.
  - category: healthcare prerequisite, claim, and payer truth sets
    retrieval_policy: Use tenant systems constrained by CMS claims-processing and prior-authorization guidance when patient/member,
      eligibility, referral, authorization, encounter, charge, claim, remittance, denial, or payer context affects the metric.
    specialty_specific_exceptions:
    - Do not infer authorization, eligibility, coverage, medical necessity, claim status, or payer interpretation from hospitality
      records.
  - category: privacy, PHI, and disclosure control
    retrieval_policy: Use HHS minimum-necessary guidance, tenant privacy policy, and payment/guest privacy controls before
      including PHI, low-volume cohorts, identifiable guest/traveler/patient examples, or clinician-level disclosure.
    specialty_specific_exceptions:
    - Do not publish or share privacy-sensitive analysis until audience, purpose, minimum-necessary basis, and approval owner
      are confirmed.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the hospitality, travel, and healthcare-adjacent analytics baseline, but tenant retrieval must
      provide system locations, source-precedence rules, metric dictionaries, payer or plan context, property or market context,
      service setting, privacy controls, and approval owners.
    - Record source freshness, cohort logic, denominator rules, room inventory, booking channel, guest/traveler or patient/member
      status, service dates, authorization and referral dependencies, payer or product context, and disclosure audience in
      every output.
    - Preserve PMS, CRS, RMS, POS, CRM, loyalty, channel, folio, travel, EHR, encounter, claim, charge, remittance, denial,
      authorization, referral, and quality-measure disagreements explicitly instead of silently normalizing them.
    - Escalate whenever tenant policy, payer contract, public guidance, accessibility posture, privacy posture, clinical safety,
      guest safety, payment risk, or licensed review authority materially changes the answer.
  specialty_specific_exceptions:
  - Hospitality analytics can mix lodging, event, guest, travel, payment, healthcare-adjacent, administrative, financial,
    clinical-operational, and quality-measure records with different lags, owners, and authority levels.
  - Occupancy, ADR, RevPAR, booking pace, guest experience, access, utilization, denial, quality, and operational KPIs are
    only safe when property or facility context, channel logic, guest/traveler or patient/member context, payer, service setting,
    denominator logic, exclusions, source hierarchy, refresh window, and intended audience are explicit.
  - PHI handling, low-volume denominators, payment-card sensitivity, public reporting, fee disclosure, accessibility rules,
    payer interpretation, medical necessity, diagnosis, treatment planning, clinical safety, guest safety, and traveler safety
    all require escalation outside this lane.
  next_review_due_at: '2026-08-12'
