knowledge_baseline:
  source_baseline_version: v0.1.0
  research_contract_version: '2026-04-08'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Healthcare-sensitive travel operations are constrained by Medicaid transportation rules, HIPAA privacy, prior
      authorization policy, patient billing protections, and clinical-administrative boundaries.
  - class: Public payer or provider operating guidance
    rationale: Eligibility, benefits, referral, authorization, broker, claim, denial, and appeal records gate whether travel
      or lodging execution can proceed.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Vendor-neutral administrative transaction rules, patient-experience measures, and patient-identification guidance
      ground evidence handling, terminology, and failure escalation.
  - class: Public travel accessibility or passenger-rights guidance
    rationale: DOT disability air-travel rules and guidance constrain accessible travel assistance boundaries when patient/member
      travel includes air segments or disability-sensitive travel support.
  source_selection_approach: 'Use CMS, Medicaid.gov, HHS OCR, CAQH CORE, AHRQ, Joint Commission, and DOT

    public sources before drafting workflow claims about NEMT, eligibility,

    authorization, PHI, patient/member communication, administrative

    transaction evidence, patient safety, patient experience, and accessible

    travel handling. Tenant policies, payer contracts, state Medicaid rules,

    facility protocols, transportation broker manuals, supplier terms, and

    jurisdictional rules narrow the public baseline at runtime.

    '
