execution_model:
  lifecycle_states:
  - accepted
  - prerequisite-check
  - ready-to-book
  - booked
  - confirmed
  - in-transit
  - exception
  - rework
  - held
  - escalated
  - completed
  - closed-with-evidence
  state_transition_rules:
  - accepted to prerequisite-check requires patient/member, requester, service date, facility, requested travel action, and
    tenant program context.
  - prerequisite-check to ready-to-book requires required eligibility, referral, authorization, appointment, discharge, privacy,
    and travel-policy dependencies to be documented or explicitly not applicable.
  - ready-to-book to booked requires booking, broker, lodging, dispatch, or supplier record with confirmation reference and
    evidence source.
  - booked to confirmed requires traveler communication, pickup/drop-off windows, lodging or transport confirmation, unresolved
    risks, and next-owner visibility.
  - confirmed to completed requires trip, lodging, transport, or service fulfillment evidence, exception resolution state,
    and closure support.
  - Any state may move to exception, rework, held, escalated, or orchestrator return when evidence fails, sources conflict,
    PHI controls are unresolved, clinical or payer authority is required, or completion evidence is missing.
  throughput_expectations:
  - Work queues must preserve lifecycle state, owner, blocker, customer impact, evidence age, and next action.
  - 'Exceptions must be reversible: a rework or hold state names the failed evidence and the condition required to proceed.'
  - Completion is audit-ready only when source records, action taken, communication summary, unresolved items, and closure
    rationale are present.
  direct_execution_allowed:
  - Update administrative lifecycle state within tenant policy.
  - Request missing facts or source records.
  - Prepare booking, transport, lodging, readiness, exception, rework, and completion summaries.
  - Route to adjacent owners with minimum-necessary evidence.
  external_approval_required:
  - Clinical risk, discharge instruction, medical necessity, utilization review, authorization, payer interpretation, privacy
    release, identity correction, coding, claim, appeal, refund, waiver, compensation, legal, safety-critical transport, or
    financial exception decisions.
tenant_adaptation:
  required_tenant_facts:
  - tenant-specific travel operations policy, medical travel program, service model, source hierarchy, authority matrix, and
    escalation SLAs
  - jurisdiction, business unit, payer/product, facility, provider type, service setting, program type, and broker or supplier
    rules
  - systems of record, record locations, retrieval hooks, audit requirements, and approved communication channels
  - patient/member status, service date, appointment, referral, authorization, discharge, transport, lodging, privacy, and
    minimum-necessary handling facts
  adaptation_rule: 'Tenant policy may narrow the public baseline, add retrieval steps, and

    define stricter routing or approval thresholds. It may not remove clinical,

    privacy, payer, authorization, documentation, evidence, or completion

    controls required by the resolved healthcare profile.

    '
deployment:
  package_type: spec-pack
  trusted_built_runtime: false
  deployment_note: Deploy as a specification-based validated overlay until a separate retained implementation is committed.
  rollback_note: Rollback by removing the package from catalog publication or routing configuration; preserve audit evidence
    generated while active.
  promotion_note: Promote to trusted built only through a separate PR with runtime connectors, PHI controls, source retrieval
    tests, authority-map enforcement, scenario tests, and operational deployment evidence.
