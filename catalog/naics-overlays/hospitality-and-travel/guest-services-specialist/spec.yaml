knowledge_baseline:
  source_baseline_version: v0.1.0
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Healthcare guest-service work is constrained by HIPAA privacy, treatment/payment/operations disclosure rules,
      No Surprises patient billing protections, and CMS prior authorization rules.
  - class: Public payer or provider operating guidance
    rationale: Service requests depend on eligibility, benefits, authorization, grievance, appeal, patient-provider dispute,
      claim, and payer/provider workflow records before resolution can be communicated.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Vendor-neutral administrative transaction rules and patient-experience standards ground terminology, evidence
      expectations, and service failure measurement.
  source_selection_approach: 'Use CMS, HHS OCR, CAQH CORE, AHRQ CAHPS, and Joint Commission public

    sources before drafting claims about eligibility, authorization,

    grievance, appeal, PHI, guest-service communication, patient experience,

    and patient-safety boundaries. Tenant policy remains required for service

    recovery authority, lodging or transport arrangements, facility rules,

    payer contracts, jurisdiction, source hierarchy, delegated approval limits,

    and communication templates.

    '
  authority_sources:
  - source_id: cms-hets-270-271
    title: HIPAA Eligibility Transaction System (HETS) 270/271
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/research-statistics-data-and-systems/cms-information-technology/hetshelp
    authority_reason: CMS operates Medicare eligibility transaction infrastructure. HETS supports eligibility evidence expectations
      and the distinction between coverage evidence and broader service clearance.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_transaction_revision
    status: active
  - source_id: cms-prior-authorization-final-rule
    title: CMS Interoperability and Prior Authorization Final Rule (CMS-0057-F)
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.cms.gov/priorities/burden-reduction/overview/interoperability/policies-regulations/cms-interoperability-prior-authorization-final-rule-cms-0057-f
    authority_reason: CMS-0057-F is federal public policy for impacted payer prior authorization APIs, status transparency,
      and denial-reason communication. It supports authorization-status handling without granting approval authority to this
      lane.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: cms-managed-care-appeals-grievances
    title: 'Managed Care Appeals and Grievances: Appeals Overview'
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/medicare/appeals-grievances/managed-care-appeals-grievances/appeals-overview
    authority_reason: CMS administers Medicare managed care appeals and grievances guidance. The public appeals and grievance
      workflow defines when a complaint, organization determination, reconsideration, or appeal must move to designated payer
      or appeal ownership.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_guidance_revision
    status: active
  - source_id: cms-no-surprises-provider-requirements
    title: Provider requirements and resources under the No Surprises Act
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.cms.gov/nosurprises/policies-and-resources/provider-requirements-and-resources
    authority_reason: CMS public provider guidance describes No Surprises requirements, transparency expectations, good faith
      estimate context, and patient-provider dispute resources that constrain service recovery and billing communication.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_no_surprises_revision
    status: active
  - source_id: hhs-hipaa-minimum-necessary
    title: HIPAA Minimum Necessary Standard
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR is the HIPAA privacy regulator. Minimum-necessary guidance directly constrains guest-service
      evidence requests, stakeholder communications, and escalation packets containing PHI.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: hhs-hipaa-tpo-disclosures
    title: Uses and Disclosures for Treatment, Payment, and Health Care Operations
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/disclosures-treatment-payment-health-care-operations/index.html
    authority_reason: HHS OCR guidance is authoritative for when PHI may be used or disclosed for treatment, payment, and
      operations, including health-plan customer service, while preserving limits and protections.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: caqh-core-operating-rules
    title: CAQH CORE Operating Rules
    publisher: CAQH CORE
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.caqh.org/core/operating-rules
    authority_reason: CAQH CORE is designated by HHS as the national operating rule authoring entity for HIPAA-covered administrative
      transactions, including eligibility and benefits, claim status, payment/remittance, prior authorization, referrals,
      and attachments.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_core_rule_revision
    status: active
  - source_id: ahrq-cahps-health-plan-survey
    title: CAHPS Health Plan Survey
    publisher: Agency for Healthcare Research and Quality
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.ahrq.gov/cahps/surveys-guidance/hp/index.html
    authority_reason: AHRQ CAHPS is the national standardized patient-experience survey program for health plan services,
      including customer service, getting needed care, and getting care quickly; it anchors service terminology and failure
      modes without creating approval authority.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_ahrq_cahps_revision
    status: active
  - source_id: joint-commission-right-patient-right-care
    title: 'National Performance Goal #1: Right Patient, Right Care'
    publisher: The Joint Commission
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.jointcommission.org/en-us/standards/national-performance-goals/right-patient-right-care
    authority_reason: The Joint Commission is a recognized healthcare accrediting body. Its patient identification and handoff
      focus supports refusal to resolve guest-service work when identity or service matching is uncertain.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_joint_commission_revision
    status: active
  source_categories:
  - category: Eligibility, referral, authorization, and payer prerequisite baseline
    retrieval_policy: Use CMS HETS, CMS prior authorization policy, CMS grievance/appeal guidance, and CAQH CORE operating
      rules when service resolution depends on coverage, benefit, referral, authorization, claim status, denial, appeal, or
      payer workflow state.
    specialty_specific_exceptions:
    - Do not convert eligibility evidence into final payer interpretation or authorization approval.
  - category: PHI, requester, communication, and service recovery baseline
    retrieval_policy: Use HHS OCR minimum-necessary and treatment/payment/operations disclosure guidance whenever a guest,
      family member, visitor, medical traveler, employer, supplier, or internal stakeholder requests patient/member information.
    specialty_specific_exceptions:
    - Do not disclose PHI or summarize full clinical details when requester authority, channel, purpose, or minimum-necessary
      scope is unresolved.
  - category: Patient experience, complaint, and safety-sensitive service baseline
    retrieval_policy: Use AHRQ CAHPS and Joint Commission patient identification guidance when complaints, repeat failures,
      communication breakdowns, handoffs, or patient safety signals affect the service-resolution posture.
    specialty_specific_exceptions:
    - Do not close a complaint or repeat failure as routine service recovery when clinical, safety, identity, or policy escalation
      remains open.
  next_review_due_at: '2026-08-12'
