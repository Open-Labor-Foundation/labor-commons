knowledge_baseline:
  source_baseline_version: '2026-04-08'
  research_contract_version: '2026-04-08'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: OIG, HHS OCR, and CMS guidance define healthcare compliance program infrastructure, PHI handling, medical review,
      payer, authorization, and evidence boundaries that gate hospitality-and-travel services tied to patient/member care.
  - class: Public payer or provider operating guidance
    rationale: CMS manuals, medical review guidance, organization-determination guidance, and discharge planning guidance
      identify payer/provider records, authorization, payment, care-transition, and documentation dependencies.
  - class: Recognized healthcare workflow or measure guidance
    rationale: CMS/AHRQ and AHRQ patient-safety references define event, QAPI, transition, and safety terminology that constrains
      escalation when hospitality or travel support intersects with patient/member safety.
  - class: Public hospitality and travel operating guidance
    rationale: DOJ ADA lodging, FTC lodging-fee, and CDC travel-associated outbreak guidance define lodging, accessibility,
      fee-disclosure, and accommodation safety evidence expectations that keep the package hospitality-specific.
  source_selection_approach: 'Use primary public regulators and official manuals first. OIG anchors

    compliance program, monitoring, reporting, exclusion, audit, remediation,

    and fraud-boundary expectations. OCR anchors PHI and minimum-necessary

    handling. CMS anchors medical review, authorization or payment decisions,

    payer/provider documentation, and discharge or care-transition obligations.

    AHRQ and CMS/AHRQ sources anchor patient-safety workflow. DOJ, FTC, and CDC

    anchor lodging accessibility, short-term lodging fee disclosure, and

    travel-associated accommodation safety handling. Tenant policy, state law,

    payer contracts, facility type, service setting, lodging partner terms, and

    current systems of record narrow this public baseline at runtime.

    '
  authority_sources:
