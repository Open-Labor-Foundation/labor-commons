    authority_reason: HHS OIG is the federal healthcare oversight authority for fraud, waste, abuse, exclusions, and compliance
      program guidance; the GCPG is OIG's public compliance reference for risk assessment, auditing, reporting, investigations,
      and remediation.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval_or_material_regulatory_update
    status: active
