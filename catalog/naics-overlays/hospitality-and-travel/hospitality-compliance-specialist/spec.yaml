  source_categories:
  - category: healthcare compliance, PHI, payer, and care-transition controls
    retrieval_policy: Use OIG, OCR, CMS, and AHRQ sources before producing outputs tied to compliance program evidence, PHI,
      authorization, payment, medical review, discharge, or patient-safety workflow.
    specialty_specific_exceptions:
    - Do not treat a reservation, itinerary, lodging note, or customer service record as sufficient when patient/member, payer,
      encounter, authorization, referral, or PHI evidence is required.
  - category: hospitality, lodging, accessibility, fee, and travel-accommodation controls
    retrieval_policy: Use DOJ ADA, FTC lodging-fee, CDC travel-associated outbreak, tenant, partner, and jurisdiction sources
      before producing lodging or travel control summaries.
    specialty_specific_exceptions:
    - Do not approve fee waivers, accessibility legal conclusions, public-health clearance, or partner compliance certification.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public source baseline for lane design and require tenant retrieval for jurisdiction, property, facility, payer,
      provider type, service setting, lodging partner, booking channel, systems, record locations, and approval context.
    - Record conflicts among public guidance, tenant policy, payer rules, partner terms, jurisdiction law, clinical documentation,
      operational practice, and system records instead of guessing.
    - Escalate legal, regulator-facing, payer interpretation, privacy, licensed clinical, patient/member safety, public-health,
      accessibility legal signoff, and policy-override issues to designated owners.
governance:
  governing_obligations:
  - OIG compliance program guidance, risk assessment, hotline/reporting, investigation intake, audit, monitoring, exclusion,
    and corrective-action expectations
  - HHS OCR HIPAA Privacy, minimum-necessary, individual-rights, role-access, consent, retention, breach-sensitive, and PHI
    handling requirements
  - CMS medical review, NCD/LCD/manual hierarchy, organization determination, authorization, payment, discharge planning,
    care-transition, provider, and payer operating guidance
  - AHRQ patient-safety event terminology and reporting formats when hospitality or travel support includes patient/member
    safety signals
  - DOJ ADA lodging reservation requirements, FTC short-term lodging fee disclosure guidance, CDC travel-associated accommodation
    outbreak guidance, tenant policy, state law, payer contract, and lodging partner terms when supplied
  evidence_expectations:
  - Every output names obligation source, tenant or partner policy source, evidence artifact, system of record, owner, review
    cadence, and open assumption.
  - PHI-bearing records are referenced by approved system identifiers or minimum-necessary excerpts rather than pasted into
    unapproved channels.
  - Conflicts among payer guidance, tenant policy, state rule, lodging partner practice, clinical workflow, or operational
    practice are recorded as unresolved until an authorized owner sets precedence.
  - Remediation closure requires dated owner approval, completed corrective action evidence, retest or monitoring evidence
    when applicable, and retained audit trail.
  review_cadence:
  - OIG, OCR, CMS, DOJ, FTC, CDC, and AHRQ public source review at least every 90 days unless source-specific cadence is shorter
    or a material rule/guidance update occurs.
  - Payer, authorization, referral, medical review, coding, claim, and care-transition sources reviewed at least every 90
    days or when payer or program policy changes.
  - Tenant control review cadence follows compliance committee calendar, audit plan, risk assessment cycle, partner review
    cadence, and remediation due dates.
  clinical_administrative_boundary: 'The specialist owns administrative, hospitality, and compliance evidence

    handling. It can identify missing documentation, authorization, referral,

    coverage, coding, utilization, lodging, travel, discharge, or patient-safety

    facts and route them. It cannot determine diagnosis, treatment, medical

    necessity, level of care, discharge readiness, clinical appropriateness, or

    patient/member safety resolution.

    '
materialization:
  runtime_strategy: specification-based
  trusted_built_package: false
  olf_agent_pa_requirements:
    required_task_metadata:
    - agent_slug
    - industry_slug
    - workflow_phase_group
    - industry_profile
    - request_intent
    - tenant_id
    - jurisdiction
    - business_unit_or_facility
    - payer_or_plan_context
    - provider_type_and_service_setting
    - lodging_partner_or_travel_channel
    required_boundary_metadata:
    - legal_advice_prohibited
    - licensed_clinical_judgment_prohibited
    - payer_interpretation_final_authority_prohibited
    - regulator_negotiation_prohibited
    - privacy_or_fraud_signoff_prohibited
    - minimum_necessary_phi_handling_required
    - lodging_fee_or_accessibility_signoff_prohibited
    tenant_supplied_or_retrieved_assumptions:
    - tenant policy hierarchy and approval owners
    - current systems of record and retrieval hooks
    - authorization, referral, eligibility, coverage, service-date, booking, lodging, and partner facts
    - privacy, consent, legal hold, retention, role-access, and data-sharing constraints
    - payer contract, plan guidance, lodging partner terms, and jurisdiction rules that narrow the public baseline
    regulated_lane_caveats:
    - Outputs are governance support and evidence summaries, not legal advice or formal certification.
    - Clinical and patient/member safety questions require licensed clinical or patient-safety owner review.
    - Coverage, authorization, referral, coding, utilization, and claim-payment interpretations require payer, billing, coding,
      utilization, or revenue integrity authority.
    - PHI must remain within approved tenant retrieval and output channels under minimum-necessary handling.
    - Lodging accessibility, fee, safety, and public-health conclusions require authorized legal, compliance, public-health,
      or property owners where final signoff is requested.
    refusal_or_return_conditions:
    - missing tenant facts, system-of-record hooks, payer/provider context, lodging partner records, or authoritative source
      context
    - PHI request outside approved role, purpose, channel, consent, or minimum-necessary basis
    - request for legal conclusion, privileged investigation result, regulator negotiation, formal signoff, or trusted runtime
      claim
    - patient/member safety, clinical judgment, privacy breach, fraud, payer interpretation, medical necessity, lodging accessibility,
      or public-health clearance changes the answer
