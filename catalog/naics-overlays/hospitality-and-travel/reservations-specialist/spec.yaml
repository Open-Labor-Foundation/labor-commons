knowledge_baseline:
  source_baseline_version: v0.1.0
  research_contract_version: '2026-04-08'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: The resolved domain profile requires PHI, prior authorization, estimate, and clinical-administrative boundaries
      when reservations involve patient/member access, covered travel, care-transition lodging, or healthcare support.
  - class: Public payer or provider operating guidance
    rationale: Eligibility, benefits, referral, authorization, and payer/provider workflow evidence can gate whether downstream
      hospitality or travel booking work may proceed.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Vendor-neutral healthcare administrative transaction, data, and identity references ground terminology, evidence,
      and refusal behavior.
  - class: Public hospitality or travel booking guidance
    rationale: Federal accessibility, fee-disclosure, and travel-accessibility guidance defines nonnegotiable booking constraints
      for lodging, travel, and reservation offers.
  - class: Recognized travel reservation standards
    rationale: Travel reservation data standards define interoperable booking, itinerary, passenger/guest, payment, and supplier-message
      terminology used for reservation evidence handling.
  source_selection_approach: 'Use public regulators and recognized standards first: DOJ ADA lodging

    reservation rules for accessible room handling, FTC fee guidance for

    short-term lodging and live-event price disclosure, DOT disability travel

    guidance for accessible travel handling, CMS and HHS guidance for

    prior authorization, eligibility, and PHI boundaries, CAQH CORE for

    administrative transaction workflow, ASTP/ONC USCDI for healthcare data

    terminology, and OpenTravel standards for reservation message and

    itinerary terminology. Tenant policy, payer contract, property

    brand standard, supplier terms, reservation terms, and jurisdiction rules

    narrow this baseline at runtime.

    '
  authority_sources:
  - source_id: doj-ada-title-iii-lodging-reservations
    title: Americans with Disabilities Act Title III Regulations
    publisher: U.S. Department of Justice
    source_type: public-hospitality-or-travel-booking-guidance
    location: https://www.ada.gov/law-and-regs/regulations/title-iii-regulations/
    authority_reason: DOJ is the primary federal civil-rights authority for ADA Title III, and the lodging reservation provisions
      directly govern accessible-room descriptions, blocking, and guarantees during hotel reservation intake.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_doj_revision
    status: active
  - source_id: ftc-unfair-or-deceptive-fees-rule
    title: 'Rule on Unfair or Deceptive Fees: Frequently Asked Questions'
    publisher: Federal Trade Commission
    source_type: public-hospitality-or-travel-booking-guidance
    location: https://www.ftc.gov/business-guidance/resources/rule-unfair-or-deceptive-fees-frequently-asked-questions
    authority_reason: FTC is the primary U.S. consumer-protection regulator, and the rule covers short-term lodging and live-event
      ticket fee disclosure, which constrains reservation offer, lodging rate, and mandatory-fee intake evidence.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 60
    decay_policy: review_required_after_interval_or_ftc_rule_revision
    status: active
  - source_id: dot-air-travel-disability-rights
    title: Passengers with Disabilities
    publisher: U.S. Department of Transportation
    source_type: public-hospitality-or-travel-booking-guidance
    location: https://www.transportation.gov/airconsumer/passengers-disabilities
    authority_reason: DOT enforces air-travel disability protections and official passenger guidance, making it authoritative
      for accessible assistance, seating, service-animal, and air-travel escalation boundaries.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_dot_revision
    status: active
  - source_id: opentravel-specifications
    title: OpenTravel Specifications
    publisher: OpenTravel Alliance
    source_type: recognized-travel-reservation-standards
    location: https://opentravel.org/specifications/
    authority_reason: OpenTravel Alliance is a travel-industry standards body. Its specifications provide vendor-neutral hotel,
      air, rail, vehicle, package, payment, profile, and itinerary message terminology that grounds reservation evidence and
      system interoperability.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_opentravel_revision
    status: active
  - source_id: cms-hets-270-271
    title: HIPAA Eligibility Transaction System (HETS) 270/271
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/research-statistics-data-and-systems/cms-information-technology/hetshelp
    authority_reason: CMS operates Medicare eligibility transaction infrastructure. HETS anchors eligibility response evidence
      and supports the boundary between active coverage evidence and booking or access clearance.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_transaction_revision
    status: active
  - source_id: cms-prior-authorization-final-rule
    title: CMS Interoperability and Prior Authorization Final Rule (CMS-0057-F)
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.cms.gov/priorities/burden-reduction/overview/interoperability/policies-regulations/cms-interoperability-prior-authorization-final-rule-cms-0057-f
    authority_reason: CMS-0057-F is federal public policy for impacted payer prior authorization APIs, status transparency,
      and denial-reason communication. It constrains booking workflows that depend on authorization status without granting
      approval authority.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: hhs-hipaa-minimum-necessary
    title: HIPAA Minimum Necessary Standard
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR is the HIPAA privacy regulator. Minimum-necessary guidance directly constrains travel, lodging,
      roster, eligibility, referral, authorization, and escalation packets containing PHI.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: hhs-hipaa-tpo-care-coordination
    title: HIPAA Privacy Rule and Care Coordination
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/disclosures-treatment-payment-health-care-operations/index.html
    authority_reason: HHS OCR guidance on treatment, payment, and health care operations is authoritative for PHI disclosure
      boundaries that can affect healthcare-related lodging and travel booking coordination.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: caqh-core-operating-rules
    title: CAQH CORE Operating Rules
    publisher: CAQH CORE
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.caqh.org/core/operating-rules
    authority_reason: CAQH CORE is designated by HHS as the national operating-rule authoring entity for HIPAA administrative
      transactions and supports eligibility, prior authorization, referral, attachment, acknowledgement, and error-handling
      workflow.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_core_rule_revision
    status: active
  - source_id: onc-uscdi-v6
    title: United States Core Data for Interoperability Version 6
    publisher: Assistant Secretary for Technology Policy / Office of the National Coordinator for Health IT
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://isp.healthit.gov/uscdi
    authority_reason: ASTP/ONC USCDI is the federal interoperability baseline for patient demographics, encounters, care team,
      coverage, insurance, and clinical artifact terminology used in EHR-linked booking and access evidence normalization.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_uscdi_revision
    status: active
  next_review_due_at: '2026-06-13'
