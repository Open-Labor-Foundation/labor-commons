knowledge_baseline:
  source_baseline_version: '2026-04-08'
  research_contract_version: '2026-04-08'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: HHS/OCR and CMS sources define the healthcare privacy, discharge, care-transition, and administrative record
      boundaries that the resolved healthcare profile requires.
  - class: Public payer or provider operating guidance
    rationale: CMS managed-care and hospital discharge-planning sources define authorization, referral, provider, plan, and
      care-transition dependencies that can block hospitality or travel fulfillment when the customer journey is healthcare-related.
  - class: Recognized healthcare workflow or measure guidance
    rationale: HL7 FHIR workflow guidance supplies vendor-neutral request, event, task, encounter, coverage, claim, and document-reference
      terminology for evidence and lifecycle handling.
  - class: Primary regulators, statutes, agency manuals, or official public guidance tied to the named industry
    rationale: DOT, FTC, DOJ, and PCI SSC sources define hospitality and travel booking, fee, accessibility, payment, and
      customer-impact boundaries.
  source_selection_approach: 'Use primary public healthcare and hospitality/travel authorities before

    tenant summaries: HHS/OCR for PHI and minimum-necessary handling; CMS for

    managed-care authorization and hospital discharge or care-transition

    records; HL7 FHIR for workflow evidence terminology; DOJ ADA lodging rules

    for accessible-room and accommodation-sensitive readiness; FTC short-term

    lodging and travel fee guidance for customer-facing fee boundaries; DOT air

    travel complaint and refund guidance for traveler-impact routing; and PCI

    SSC standards for payment-card handling. Tenant policy, brand standard,

    payer plan rule, provider policy, supplier term, processor rule, and

    jurisdictional requirement narrow this baseline at runtime and must be

    retrieved before final operational closure.

    '
  authority_sources:
  - source_id: hhs-ocr-minimum-necessary
    title: Minimum Necessary Requirement
    publisher: U.S. Department of Health and Human Services Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR administers and enforces HIPAA Privacy Rule guidance. The minimum-necessary guidance is authoritative
      for PHI access, disclosure, and controlled handling when hospitality operations touches patient or member records.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-medicare-managed-care-manual-chapter-4
    title: Medicare Managed Care Manual Chapter 4 - Benefits and Beneficiary Protections
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/mc86c04.pdf
    authority_reason: CMS publishes Medicare managed-care operating guidance, including benefit, coverage, enrollee-protection,
      organization-determination, and authorization concepts that constrain patient/member hospitality or travel support when
      payer prerequisites matter.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-hospital-discharge-planning
    title: Hospital Discharge Planning Interpretive Guidelines
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/Medicare/Provider-Enrollment-and-Certification/SurveyCertificationGenInfo/Downloads/Survey-and-Cert-Letter-13-32.pdf
    authority_reason: CMS survey guidance interprets hospital discharge-planning conditions of participation, including medical-record
      documentation, patient preferences, transfer/referral obligations, and implementation responsibilities that gate care-transition
      hospitality or travel support.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: hl7-fhir-workflow
    title: FHIR Workflow
    publisher: HL7 International
    source_type: recognized-healthcare-workflow-guidance
    location: https://www.hl7.org/fhir/workflow.html
    authority_reason: HL7 is the recognized healthcare interoperability standards body, and FHIR workflow defines request,
      event, task, encounter, coverage, eligibility, claim, and document-reference patterns used for healthcare-administrative
      evidence and lifecycle mapping.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: doj-ada-title-iii-lodging-reservations
    title: Americans with Disabilities Act Title III Regulations
    publisher: U.S. Department of Justice
    source_type: hospitality-accessibility-regulation
    location: https://www.ada.gov/law-and-regs/regulations/title-iii-regulations/
    authority_reason: DOJ is the primary federal civil-rights authority for ADA Title III enforcement, and the lodging-reservation
      provisions govern accessible-room descriptions, holding, blocking, and accommodation-sensitive hospitality readiness.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-unfair-fees-short-term-lodging-faq
    title: 'The Rule on Unfair or Deceptive Fees: Frequently Asked Questions'
    publisher: Federal Trade Commission
    source_type: hospitality-consumer-protection-guidance
    location: https://www.ftc.gov/business-guidance/resources/rule-unfair-or-deceptive-fees-frequently-asked-questions
    authority_reason: FTC is the primary U.S. consumer-protection regulator, and this official short-term lodging and travel-agent
      fee guidance constrains fee, rate, and customer-communication handling in hospitality operations.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 60
    decay_policy: review_required_after_interval
    status: active
  - source_id: dot-fly-rights
    title: 'Fly Rights: A Consumer Guide to Air Travel'
    publisher: U.S. Department of Transportation
    source_type: travel-consumer-operating-guidance
    location: https://www.transportation.gov/airconsumer/fly-rights
    authority_reason: DOT is the U.S. aviation consumer-protection authority, and this official guide describes booking details,
      flight details, complaints, service issues, and travel-agency routing that shape traveler-impact exception handling.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: dot-automatic-refunds
    title: What Airline Passengers Need to Know About DOT's Automatic Refund Rule
    publisher: U.S. Department of Transportation
    source_type: travel-refund-consumer-guidance
    location: https://www.transportation.gov/airconsumer/automatic-refunds
    authority_reason: DOT's official refund guidance constrains cancellation, significant-change, ancillary-service, and ticket-agent
      refund boundaries so this lane routes refund-sensitive cases instead of approving them.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 60
    decay_policy: review_required_after_interval
    status: active
  - source_id: pci-security-standards
    title: PCI Security Standards
    publisher: PCI Security Standards Council
    source_type: recognized-payment-security-standard
    location: https://www.pcisecuritystandards.org/standards/
    authority_reason: PCI SSC is the recognized payment-card security standards body, and its standards constrain cardholder-data
      handling, payment-token evidence, and folio or guarantee workflows in hospitality operations.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public source baselines for lane design and require tenant retrieval for property, facility, payer, plan, provider,
      service-setting, brand, system, record-location, approval, and jurisdiction context.
    - Record conflicts among public guidance, tenant policy, brand standards, payer rules, supplier terms, processor rules,
      and jurisdiction-specific law instead of guessing.
    - Escalate clinical, payer-policy, privacy, legal, safety/security, fraud, public-health, and financial-approval issues
      to designated owners.
  specialty_specific_exceptions:
  - Keep the lane on hospitality and travel execution, readiness, evidence capture, and exception packaging rather than clinical
    judgment, payer interpretation, pricing approval, refund approval, fraud adjudication, or safety command.
  - Do not treat a guest preference, patient/member note, EHR task, or PMS comment as sufficient evidence when authorization,
    referral, discharge, consent, room-readiness, payment, or closure records are missing.
  - Do not expose PHI, guest identity data, or full payment-card data through unapproved communications or non-minimum-necessary
    summaries.
  next_review_due_at: '2026-06-13'
