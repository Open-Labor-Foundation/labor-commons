  source_categories:
  - category: Healthcare privacy and patient/member safety
    retrieval_policy: Use HHS/OCR HIPAA guidance whenever a request includes patient, member, caregiver, diagnosis, appointment,
      discharge, claim, or benefit information, and escalate when identity, consent, authorization, or minimum-necessary handling
      is unclear.
    specialty_specific_exceptions:
    - Do not turn a guest-experience communication into clinical advice or a PHI disclosure without controlled handling.
  - category: Payer, authorization, referral, claim, grievance, and appeal boundaries
    retrieval_policy: Use CMS payer operating guidance and tenant payer/provider manuals when eligibility, referral, authorization,
      organization determination, denial, appeal, grievance, or reimbursement status changes the answer.
    specialty_specific_exceptions:
    - Do not interpret coverage, medical necessity, coding, or appeal merits; package the facts for payer operations, utilization
      management, revenue cycle, or clinical review.
  - category: Experience, hospitality, travel, accessibility, fee, and payment controls
    retrieval_policy: Use CMS/AHRQ experience measures, DOJ lodging accessibility rules, DOT passenger disability guidance,
      FTC fee guidance, and PCI SSC payment guidance whenever communication quality, accessible service, fee disclosure, payment-data
      handling, or travel/lodging experience constraints determine safe wording.
    specialty_specific_exceptions:
    - Do not promise accessibility, refunds, compensation, or payment actions without tenant policy, authoritative records,
      and approval authority.
