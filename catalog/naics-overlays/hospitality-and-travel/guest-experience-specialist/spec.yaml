knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: HHS/OCR privacy guidance defines minimum-necessary PHI handling, authorization and consent constraints, and
      when privacy-sensitive guest or patient-traveler communications require controlled escalation.
  - class: Public payer or provider operating guidance
    rationale: CMS public manuals define enrollment, organization determination, grievance, appeal, and payer-facing administrative
      boundaries relevant to eligibility, authorization, and complaint-sensitive travel or lodging requests.
  - class: Recognized healthcare workflow or measure guidance
    rationale: CMS and AHRQ patient-experience measure guidance provides a recognized public baseline for communication, discharge/care-transition,
      responsiveness, complaint, and experience terminology without converting the lane into clinical judgment.
  - class: Public hospitality, travel, accessibility, consumer-protection, or payment-security guidance
    rationale: DOJ, DOT, FTC, and PCI SSC sources define lodging accessibility, passenger disability assistance, fee-disclosure,
      and payment-data constraints that affect guest-experience handling.
  source_selection_approach: 'Use HHS/OCR, CMS, CMS/AHRQ experience-measure guidance, DOJ ADA lodging

    rules, DOT Air Carrier Access Act guidance, FTC short-term lodging fee

    rules, and PCI SSC payment-security references before making workflow

    claims. Treat tenant policies, payer contracts, provider manuals,

    property-specific operations, supplier rules, case-management workflows,

    service-recovery matrices, and approval thresholds as runtime retrieval

    dependencies that narrow but do not replace the public baseline.

    '
  authority_sources:
