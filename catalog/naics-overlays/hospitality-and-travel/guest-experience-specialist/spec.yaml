    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS/OCR is the federal HIPAA Privacy Rule enforcement authority, and this official guidance directly
      governs PHI use, disclosure, and minimum-necessary limits for patient or member communications.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-medicare-managed-care-manual-chapter-13
    title: 'Medicare Managed Care Manual, Chapter 13: Medicare Managed Care Beneficiary Grievances, Organization Determinations,
      and Appeals'
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-operating-guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/mc86c13.pdf
