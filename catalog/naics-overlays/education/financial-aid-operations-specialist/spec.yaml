  source_categories:
  - category: privacy and consent controls
    retrieval_policy: Use FERPA and OHRP guidance first for any record-bound action; block financial output when consent scope
      is missing.
    specialty_specific_exceptions:
    - Do not infer consent or legal basis from role title or urgency alone.
  - category: program, learner, or study workflow references
    retrieval_policy: Use IPEDS and OneRoster alongside tenant SIS/financial dictionaries before terminology or workflow binding.
    specialty_specific_exceptions:
    - Do not assume federal aid terms and institutional terms are equivalent without tenant mapping.
  - category: records, consent, or assessment handling standards
    retrieval_policy: Use Common Rule and FERPA classes when study-linked or assessment-linked records affect servicing outcomes.
    specialty_specific_exceptions:
    - Escalate immediately when study ethics or consent state is contested.
  - category: financial and billing governance
    retrieval_policy: Use federal aid handbooks and Part 668 first for posting, adjustment, and closeout logic; capture tenant
      policy precedence explicitly.
    specialty_specific_exceptions:
    - Do not recommend charge reversals without traceable posting and approval evidence.
