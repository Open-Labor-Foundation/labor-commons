  source_categories:
  - category: privacy and consent controls
    retrieval_policy: Use FERPA and OHRP guidance with tenant consent artifacts before any record-sharing or role-change support.
    specialty_specific_exceptions:
    - Do not infer release rights from title or job code without explicit tenant FERPA/consent context.
  - category: program, learner, or study workflow references
    retrieval_policy: Use enrollment/program references and IMS standards before advancing setup or activation outcomes.
    specialty_specific_exceptions:
    - Do not treat readiness as complete without tenant workflow prerequisites and evidence mapping.
  - category: records, consent, or assessment handling standards
    retrieval_policy: Use Common Rule and official LMS/privacy guidance when study-linked learner or assessment actions are
      present.
