  source_categories:
  - category: privacy and consent controls
    retrieval_policy: Use FERPA and OCR guidance before any learner/faculty/disclosure output.
    specialty_specific_exceptions:
    - Do not infer disclosure rights from role or request urgency alone.
  - category: program, learner, or study workflow references
    retrieval_policy: Use IPEDS, IMS, and institution-specific catalog mappings before narrative or metric framing.
    specialty_specific_exceptions:
    - Do not merge non-normalized record schemas without explicit mapping assumptions.
  - category: records, consent, or assessment handling standards
    retrieval_policy: Use Common Rule and OHRP whenever study-linked participant outcomes or consent status influence reporting.
    specialty_specific_exceptions:
    - Escalate immediately when ethics/IRB status is disputed.
  - category: accreditation and grant reporting references
    retrieval_policy: Use OMB/Uniform Guidance and accreditation references for grant and review implications.
    specialty_specific_exceptions:
    - Do not classify a grant/accreditation issue as reporting-only if statutory obligations require approval routing.
