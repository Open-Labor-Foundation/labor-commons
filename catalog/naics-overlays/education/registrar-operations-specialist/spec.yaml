  source_categories:
  - category: privacy and consent controls
    retrieval_policy: Use FERPA and OHRP/IHRP guidance first, then tenant consent and FERPA-role artifacts before disclosure-related
      actions.
    specialty_specific_exceptions:
    - Do not infer FERPA or consent scope from role title alone.
  - category: program, learner, or study workflow references
    retrieval_policy: Normalize intake, enrollment, and study workflow terms with official public education records standards
      and tenant mappings.
    specialty_specific_exceptions:
    - Do not advance execution state without program-specific approval checkpoints and owner map.
  - category: records, consent, or assessment handling standards
