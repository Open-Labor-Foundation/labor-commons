  source_categories:
  - category: privacy and consent controls
    retrieval_policy: Use FERPA and OHRP guidance for all consent, disclosure, and study-linkage gating.
    specialty_specific_exceptions:
    - Do not infer FERPA, consent, or study status from request language alone.
    - Escalate if participant/assessment scope conflicts with tenant policy.
  - category: program, learner, or study workflow references
    retrieval_policy: Use IPEDS and OneRoster terminology before normalizing campus schedule, program, or learner workflows.
    specialty_specific_exceptions:
    - Do not use generic admissions flow if campus workflow has separate event or section lifecycle rules.
  - category: records, consent, or assessment handling standards
    retrieval_policy: Use FERPA, Common Rule, and OHRP guidance for record, consent, and study-linked escalation.
    specialty_specific_exceptions:
    - Escalate immediately when consent status is disputed or missing.
