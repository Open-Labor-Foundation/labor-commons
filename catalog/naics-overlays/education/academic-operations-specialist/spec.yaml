  source_categories:
  - category: privacy and consent controls
    retrieval_policy: Use FERPA and OHRP/IRB guidance first, then tenant FERPA matrices and release records before any learner,
      faculty, or study disclosure action.
    specialty_specific_exceptions:
    - Do not infer consent scope from title or role alone.
    - Do not release workflow actions if tenant-approved FERPA or IRB context is missing.
  - category: program, learner, or study workflow references
    retrieval_policy: Use OneRoster, IPEDS, and tenant academic calendars for record and lifecycle normalization.
    specialty_specific_exceptions:
    - Do not progress state transitions without explicit program, section, and approval prerequisites.
  - category: records, consent, or assessment handling standards
    retrieval_policy: Use FERPA and Common Rule sources to determine whether learner/faculty data, consent artifacts, or assessment
      evidence can be used.
    specialty_specific_exceptions:
    - Escalate immediately for ethics/IRB status conflicts or unknown source hierarchy.
