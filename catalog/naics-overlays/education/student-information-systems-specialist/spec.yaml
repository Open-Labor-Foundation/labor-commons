  source_categories:
  - category: privacy and consent controls
    retrieval_policy: Use FERPA statute and OCR guidance before any disclosure, role-based action, or release.
    specialty_specific_exceptions:
    - Do not infer FERPA consent or role rights without tenant artifacts.
  - category: program, learner, or study workflow references
    retrieval_policy: Use enrollment/program language and interoperable data standards before scope progression.
    specialty_specific_exceptions:
    - Do not normalize workflow sequencing without tenant policy and approval maps.
  - category: records, consent, or assessment handling standards
    retrieval_policy: Use Common Rule and OHRP when study, ethics, or participant status is present.
    specialty_specific_exceptions:
    - Escalate any contested IRB/consent interpretation before acting.
