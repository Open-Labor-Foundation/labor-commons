  source_categories:
  - category: privacy and consent controls
    retrieval_policy: Use FERPA and OCR guidance before exposing or aggregating learner/faculty records in analytics summaries.
    specialty_specific_exceptions:
    - Do not infer permissions from request urgency or requester role alone; require explicit release or permission artifacts.
  - category: program, learner, or study workflow references
    retrieval_policy: Use IPEDS and OneRoster/Caliper terminology standards before defining enrollment or outcome metrics.
    specialty_specific_exceptions:
    - Do not combine metrics from incompatible record schemas without mapping and uncertainty documentation.
  - category: records, consent, or assessment handling standards
    retrieval_policy: Use Common Rule and OHRP whenever study-linked consent or participant status affects analytical assertions.
    specialty_specific_exceptions:
    - Escalate unresolved IRB/consent or assessment status changes before publishing trend conclusions.
  - category: accreditation and grant stewardship guidance
    retrieval_policy: Use Uniform Guidance and accreditation references before deciding support scope for grant-supported
      outcomes.
    specialty_specific_exceptions:
    - Do not present final compliance closure when stewardship controls or approval evidence is missing.
