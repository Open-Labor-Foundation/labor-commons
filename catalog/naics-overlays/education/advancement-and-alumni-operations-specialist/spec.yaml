  source_categories:
  - category: privacy and consent controls
    retrieval_policy: Use FERPA and OHRP/IHRP guidance first for record-linked advancement actions; block disclosure without
      tenant-confirmed consent or role authorization.
    specialty_specific_exceptions:
    - Do not infer consent from alumni role labels, campaign urgency, or donor intent statements alone.
  - category: program, learner, or study workflow references
    retrieval_policy: Use IPEDS and OneRoster vocabulary to normalize student/alumni/program linkages and campaign handoff
      terminology.
    specialty_specific_exceptions:
    - Do not map student records to alumni profiles without explicit tenant identity-link policy.
  - category: records, consent, or assessment handling standards
    retrieval_policy: Use FERPA and Common Rule sources when study or participant records are attached to advancement workflows.
    specialty_specific_exceptions:
    - Escalate immediately on disputed IRB, FERPA, or donor-privacy interpretation.
  - category: advancement and donor stewardship governance
    retrieval_policy: Use CASE and IRS public nonprofit guidance only for domain vocabulary and policy posture; do not treat
      as legal authority when tenant policy is stricter.
    specialty_specific_exceptions:
    - Escalate financial or solicitation-policy decisions to the correct adjacent specialist.
