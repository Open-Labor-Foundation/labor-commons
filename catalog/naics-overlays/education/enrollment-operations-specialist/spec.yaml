  source_categories:
  - category: privacy and consent controls
    retrieval_policy: Use FERPA statute and OCR guidance first, then tenant role and consent policies before any record-sharing
      decision.
    specialty_specific_exceptions:
    - Do not infer FERPA scope from request language; require explicit release and record context.
  - category: program, learner, or study workflow references
    retrieval_policy: Use IPEDS and IMS standards to normalize enrollment, cohort, section, and study terms before routing
      to avoid generic handling.
    specialty_specific_exceptions:
    - Do not mark intake-ready if tenant admission sequencing or placement precedence rules are missing.
  - category: records, consent, or assessment handling standards
    retrieval_policy: Use FERPA and Common Rule/OHRP guidance when study, assessment, or consent context is present.
    specialty_specific_exceptions:
    - Escalate unresolved consent/ethics interpretation without finalizing.
