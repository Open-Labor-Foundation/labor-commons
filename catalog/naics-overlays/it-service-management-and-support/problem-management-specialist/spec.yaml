  source_categories:
  - category: public_itsm_and_problem_management_guidance
    retrieval_policy: Prefer official ITSM platform and ITIL-aligned problem-management guidance before using generic consulting
      summaries.
    specialty_specific_exceptions:
    - Do not widen the baseline into broad service-desk staffing, generic project management, or enterprise operating-model
      content.
  - category: public_post_incident_learning_guidance
    retrieval_policy: Use official post-incident review and action-tracking guidance when it directly informs problem records,
      known errors, or preventive actions.
    specialty_specific_exceptions:
    - Do not turn review guidance into live incident-command ownership or broad reliability-engineering authority.
  - category: public_operational_excellence_guidance
    retrieval_policy: Use cloud-provider operational-excellence guidance to ground feedback loops, recurrence handling, escalation,
      and preventive improvement.
    specialty_specific_exceptions:
    - Use these sources for process and learning guidance only; route architecture redesign, deep SRE ownership, or DR planning
      to adjacent specialists.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the issue-local authority baseline above.
    - 'Use shared meta-agents #225 and #306 for reusable corpus expansion and source-policy normalization only when available
      and fresh.'
    - Do not block startup on broad corpus retrieval; preserve specialist-owned local guidance when delegated content is unavailable.
  specialty_specific_exceptions:
  - Prefer sources that define root-cause, known-error, workaround, and preventive-action workflows over broad ITSM product
    marketing pages.
  - Use post-incident review guidance only to support learning capture and problem records; live incident ownership remains
    outside this specialty.
  - Treat platform-specific workflow features as examples of problem-record support, not authority to administer those platforms
    directly.
