shared_meta_agent_contracts:
  bootstrap_metadata:
    package_slug: asset-and-configuration-management-specialist
    domain_slug: it-service-management-and-support
    priority: high
    validation_profile: standard
    specialist_owned_responsibilities:
    - Define the narrow asset/configuration operational boundary and explicit adjacent-specialty rejection map.
    - Provide specialty-specific guidance for lifecycle-state handling, record-quality triage, service-impact prioritization,
      and support-process evidence.
    - Specify bootstrap metadata and request/response contracts for shared meta-agent calls.
    - Define fallback behavior when delegated outputs are unavailable, stale, low-confidence, or boundary-conflicting.
    delegated_responsibilities:
    - Best-practice corpus retrieval and normalization.
    - Evaluation-suite normalization and reusable rubric packaging.
    - Readiness evidence normalization and repeated release boilerplate.
    - Deployment package boilerplate and commercialization boilerplate.
    - Authority-source policy normalization and generic boundary review normalization.
    delegated_contracts:
      agent: best-practices-curation-specialist
      request_contract:
        request_type: authoritative_source_set
        required_fields:
        - source_category
        - itsm_process
        - operational_topic
        - refresh_expectation
        - specialty_exception
      response_contract:
        deliverable: source additions or refresh candidates for asset/configuration management baseline
      agent: evaluation-design-specialist
      request_contract:
        request_type: scenario_validation
        required_fields:
        - scenario_id
        - risk_level
        - failure_mode
        - expected_behavior
        - boundary_rule
      response_contract:
        deliverable: normalized scenario set with pass criteria and risk coverage checks
      agent: readiness-and-evidence-specialist
      request_contract:
        request_type: evidence_packaging
        required_fields:
        - delivery_status
        - human_verification
        - deployment_readiness
        - commercialization_readiness
        - readiness_notes
      response_contract:
        deliverable: structured readiness evidence draft
      agent: deployment-package-specialist
      request_contract:
        request_type: ops_runbook
        required_fields:
        - runtime_profile
        - tenant_isolation_model
        - monitoring_expectations
        - rollback_path
        - support_model
      response_contract:
        deliverable: deployment package and rollback notes
      agent: commercialization-and-packaging-specialist
      request_contract:
        request_type: commercial_readiness
        required_fields:
        - target_buyer
        - core_problem
        - subscription_model
        - proof_points
        - gtm_gaps
      response_contract:
        deliverable: marketing readiness and packaging language
      agent: authority-source-policy-specialist
      request_contract:
        request_type: source_policy
        required_fields:
        - source_categories
        - refresh_policy
        - decay_policy
        - stale_threshold
      response_contract:
        deliverable: source refresh and decay recommendations
      agent: specialty-boundary-and-routing-specialist
      request_contract:
        request_type: boundary_review
        required_fields:
        - specialty_boundary
        - out_of_scope_rules
        - adjacent_specialists
        - handoff_targets
      response_contract:
        deliverable: boundary conflict review and routing suggestions
      agent: agent-package-scaffolding-specialist
      request_contract:
        request_type: scaffold_validation
        required_fields:
        - file_layout
        - required_artifacts
        - template_compliance
      response_contract:
        deliverable: package completion checklist
  fallback:
    stale_threshold_days: 30
    unresponsive_threshold_minutes: 15
    on_stale: Continue with manifest baseline only, mark delegated evidence as stale, and avoid expanding claims beyond specialist-owned
      evidence.
    on_unresponsive: Return a clear orchestrator escalation with the missing delegated artifact type and do not present synthetic
      boilerplate as verified.
    on_low_confidence: State uncertainty, request additional evidence, and prefer conservative support-process guidance or
      refusal over speculative recommendations.
    on_boundary_conflict: Prefer this manifest's narrow specialty boundary and route the conflicting work back to the orchestrator.
