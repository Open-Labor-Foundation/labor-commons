  source_categories:
  - category: public_itsm_and_service_desk_guidance
    retrieval_policy: Prefer standards and official ITIL practice references that define service-desk accountability, metrics,
      workflow control, and continual-improvement expectations before generalized consulting content.
    specialty_specific_exceptions:
    - Do not widen the baseline into broad HR workforce management, contact-center sales operations, or enterprise operating-model
      strategy.
  - category: official_support_platform_documentation
    retrieval_policy: Use vendor-official documentation for queues, assignment methods, overflow handling, views, routing,
      capacity, and agent availability where platform behavior materially shapes service desk operations guidance.
    specialty_specific_exceptions:
    - Platform documentation informs operational guidance but does not authorize direct system administration, implementation,
      or dashboard build ownership.
  - category: public_support_process_and_operational_guidance
    retrieval_policy: Use public support-process guidance only when it sharpens backlog review, triage rhythm, workload balancing,
      queue aging, and escalation controls for frontline support operations.
    specialty_specific_exceptions:
    - Do not broaden into incident command, request execution, end-user troubleshooting, knowledge-lifecycle ownership, or
      workforce HR policy.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the issue-local authority baseline above.
    - 'Use shared meta-agents #225 and #306 for reusable corpus expansion and source-policy normalization only when available
      and fresh.'
    - Do not block startup on broad corpus retrieval; preserve specialist-owned local guidance when delegated content is unavailable.
  specialty_specific_exceptions:
  - Prefer sources that define queue operations, work distribution, shift handoffs, backlog controls, and routing behavior
    over broad ITSM or customer-service marketing content.
  - Use platform routing and queue features to ground operational guidance, not to absorb direct product configuration or
    implementation ownership.
  - Keep frontline troubleshooting, incident response, request fulfillment, knowledge-authoring governance, and HR staffing
    administration outside this specialty even when queue data references them.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-09-18'
shared_meta_agent_integration:
  bootstrap_metadata:
    issue_id: 107
    local_baseline_required: true
    deferred_initialization_supported: true
    startup_sequence:
    - Load local manifest, evaluation artifacts, and readiness evidence first.
    - Optionally invoke shared meta-agents for normalization after local baseline validation succeeds.
    - Refuse any delegated output that broadens scope beyond the service-desk-operations boundary.
    request_context_fields:
    - agent_slug
    - domain_family
    - release_version
    - specialty_boundary
    - target_delivery_level
    - source_categories
    - fallback_mode
  specialist_owned_responsibilities:
  - Define the narrow service-desk-operations specialty boundary, adjacent-specialty routing, and explicit refusal behavior.
  - Maintain the minimum authoritative source baseline, source categories, and specialty-specific exceptions required for
    safe startup.
  - Provide service-desk-operations-specific scenarios, queue and handoff rules, low-confidence handling, and evidence statements.
  - Define request and response contracts plus fallback behavior for delegated shared meta-agent calls.
  delegated_responsibilities:
  - Reusable best-practice corpus retrieval and normalization
  - Repeated evaluation-suite normalization and regression-coverage patterns
  - Readiness evidence consistency review and packaging normalization
  - Deployment package boilerplate normalization
  - Commercialization and packaging boilerplate normalization
  - Authority-source policy normalization
  - Boundary-routing phrasing normalization where centrally derivable
  - Package scaffolding consistency review
  delegated_contracts:
  - issue_id: 225
    slug: best-practices-curation-specialist
    purpose: Expand reusable service-desk-operations best-practice coverage without rebuilding the shared corpus locally.
    request_contract:
      required_fields:
      - agent_slug
      - source_categories
      - specialty_boundary
      - retrieval_policy.mode
      optional_fields:
      - tenant_context_excluded_confirmation
      - specialty_specific_exceptions
    expected_response:
      required_outputs:
      - candidate public source additions
      - normalization notes
      - staleness timestamp
      rejection_condition: Reject if sources are not public, authoritative, or boundary-consistent.
    fallback_if_unavailable: Keep the local source baseline only and state that broader corpus normalization is deferred.
  - issue_id: 302
    slug: evaluation-design-specialist
    purpose: Normalize scenario taxonomy and coverage framing across repeated specialist packages.
    request_contract:
      required_fields:
      - minimum_scenario_count
      - acceptance_thresholds
      - required_coverage_classes
      - specialty_boundary
      optional_fields:
      - existing_scenarios
    expected_response:
      required_outputs:
      - coverage review
      - gap list
      - normalization recommendations
      rejection_condition: Reject if proposed scenarios dilute service-desk-operations specificity or remove out-of-scope
        and low-confidence coverage.
    fallback_if_unavailable: Use the local 12-scenario matrix and record pass or fail rationale directly in repository artifacts.
  - issue_id: 303
    slug: readiness-and-evidence-specialist
    purpose: Review consistency across manifest, evaluation results, readiness evidence, and release notes.
    request_contract:
      required_fields:
      - delivery_status
      - evaluation_results_path
      - readiness_evidence_path
      - release_readiness_path
      optional_fields:
      - human_verification_notes
    expected_response:
      required_outputs:
      - consistency check result
      - missing evidence list
      - readiness normalization notes
      rejection_condition: Reject if the delegated review attempts to replace local human verification or specialist-owned
        evidence.
    fallback_if_unavailable: Rely on local readiness checklist, local evidence review, and repository validation scripts.
  - issue_id: 304
    slug: deployment-package-specialist
    purpose: Normalize deployment-package structure for runtime, isolation, rollback, and monitoring notes.
    request_contract:
      required_fields:
      - deployment_model
      - tenant_adaptation_policy
      - rollback_requirements
      - monitoring_expectations
      optional_fields:
      - shared_meta_agent_dependencies
    expected_response:
      required_outputs:
      - package structure review
      - missing deployment note list
      - normalization recommendations
      rejection_condition: Reject if the response changes the service-desk-operations runtime constraints or weakens rollback
        requirements.
    fallback_if_unavailable: Ship the local deployment package with conservative isolation, monitoring, and rollback requirements.
  - issue_id: 305
    slug: commercialization-and-packaging-specialist
    purpose: Normalize buyer profile, subscription framing, and proof-point wording.
    request_contract:
      required_fields:
      - target_buyer_profile
      - target_user_profile
      - proof_points
      - go_to_market_gaps
      optional_fields:
      - subscription_model
    expected_response:
      required_outputs:
      - positioning review
      - proof-point normalization notes
      - gap framing
      rejection_condition: Reject if the response widens the product claim beyond the reviewed validated evidence.
    fallback_if_unavailable: Use the local marketing readiness notes and keep commercialization claims tied to repository
      evidence only.
  - issue_id: 306
    slug: authority-source-policy-specialist
    purpose: Normalize source categories, refresh policies, and decay handling across packages.
    request_contract:
      required_fields:
      - authority_sources
      - source_categories
      - specialty_specific_exceptions
      - next_review_due_at
      optional_fields:
      - source_baseline_version
    expected_response:
      required_outputs:
      - source-policy review
      - refresh or decay adjustments
      - staleness warnings
      rejection_condition: Reject if the response removes reviewed public sources or broadens the specialty boundary.
    fallback_if_unavailable: Retain the locally reviewed source policy and review dates.
  - issue_id: 307
    slug: specialty-boundary-and-routing-specialist
    purpose: Normalize adjacent-specialty phrasing and orchestrator-routing clarity where centrally derivable.
    request_contract:
      required_fields:
      - specialty_boundary
      - out_of_scope_rules
      - orchestrator_return_rules
      - adjacent_specialties
      optional_fields:
      - example_boundary_cases
    expected_response:
      required_outputs:
      - boundary review
      - routing conflict list
      - normalization suggestions
      rejection_condition: Reject if the response blurs the narrow service-desk-operations boundary or absorbs adjacent specialties.
    fallback_if_unavailable: Use the local boundary and routing rules with conservative refusal behavior.
  - issue_id: 308
    slug: agent-package-scaffolding-specialist
    purpose: Review scaffold completeness and artifact alignment for the package layout.
    request_contract:
      required_fields:
      - manifest_path
      - evaluation_paths
      - readiness_paths
      - deployment_and_marketing_paths
      optional_fields:
      - template_version
    expected_response:
      required_outputs:
      - scaffold completeness check
      - artifact mismatch list
      - normalization recommendations
      rejection_condition: Reject if the response requires removing specialist-owned evidence or claims unsupported by local
        artifacts.
    fallback_if_unavailable: Rely on repository templates, local review, and validation scripts.
