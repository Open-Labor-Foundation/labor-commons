- asset-performance-engineering-specialist
knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Named-industry operating guidance
    rationale: EIA, EPA, and NERC power-sector materials define the plant, unit, outage, fuel, emissions, and reporting records
      that materially change power analytics behavior.
  - class: Recognized workflow references tied directly to the lane
    rationale: IEEE and NERC workflow references define reliability, availability, outage, and performance terminology used
      to produce comparable power analytics.
  - class: Evidence or control standards relevant to the lane
    rationale: EPA, FERC, and SEC controls constrain what may be claimed, published, or treated as authoritative in emissions,
      financial, and public-disclosure contexts.
  source_selection_approach: 'Use EIA form and electric-power guidance first for generator, generation,

    fuel, and balancing records. Use NERC GADS and IEEE 762 to anchor outage,

    availability, and reliability terminology before accepting fleet

    benchmarking logic. Use EPA Part 75 and ECMPS guidance for emissions,

    monitoring, and QA evidence. Use FERC Form 1 and SEC KPI guidance when the

    analysis could inform regulated or investor-style disclosure. Tenant metric

    dictionaries, ISO or RTO rules, plant historian mappings, disclosure

    approvals, and source-precedence policy remain required runtime inputs and

    are never guessed.

    '
