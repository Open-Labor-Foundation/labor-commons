  source_categories:
  - category: generator, plant, and balancing-area records
    retrieval_policy: Use EIA electric-power form guidance before treating generator attributes, seasonal capability, generation
      totals, balancing-area context, or fuel records as comparable across plants or periods.
    specialty_specific_exceptions:
    - Do not mix gross and net generation or nameplate and seasonal capability without an explicit metric-definition note.
  - category: outage, availability, and reliability performance
    retrieval_policy: Use NERC GADS and IEEE 762 before preparing outage-rate, equivalent availability, reliability, or benchmarking
      outputs.
    specialty_specific_exceptions:
    - Do not reuse outage classifications, equivalent-hour logic, or reliability indexes across technologies or fleets without
      a documented mapping.
  - category: emissions and environmental evidence
    retrieval_policy: Use EPA Part 75 and ECMPS guidance before using hourly emissions or monitoring-plan data in reports
      or disclosures.
    specialty_specific_exceptions:
    - Do not imply environmental compliance certification from analytics outputs alone.
  - category: regulated and external disclosure
    retrieval_policy: Use FERC Form 1 and SEC KPI guidance before preparing any utility, regulatory, or investor-style narrative
      that could be interpreted as an external disclosure.
    specialty_specific_exceptions:
    - Do not publish causal, benchmark, or materiality claims without defined methodology, audience context, and approver
      signoff.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline workflow, but tenant historian mappings, plant master data, market-region rules,
      metric dictionaries, and disclosure approvals remain required for safe execution.
    - Tenant retrieval must provide fleet scope, asset hierarchy, unit technology, market participation model, metric dictionary,
      source-precedence policy, and adjacent-owner escalation map.
    - Escalate whenever ISO or RTO rules, environmental permit conditions, tariff language, or tenant policy materially change
      metric definition, reportability, or disclosure posture.
  specialty_specific_exceptions:
  - Power analytics routinely crosses plant, market, environmental, and disclosure records that operate on different refresh
    cycles and different denominator rules.
  - Availability, outage, emissions, and capacity-factor metrics are only safe when unit state, reporting interval, fuel class,
    and method-of-measurement are explicit.
  - Requests for public claims, compliance posture, dispatch readiness, or root-cause conclusions must stay caveated and route
    to the proper authority when evidence or signoff is incomplete.
  next_review_due_at: '2026-10-06'
