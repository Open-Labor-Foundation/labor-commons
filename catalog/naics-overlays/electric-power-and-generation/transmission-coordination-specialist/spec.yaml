knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Primary transmission-access, tariff, and reliability guidance
    rationale: FERC and NERC sources define the enforceable reliability and transmission-access posture that governs what
      records, notifications, and owner boundaries matter in transmission coordination.
  - class: Recognized workflow references tied directly to transmission coordination
    rationale: NERC functional role references and NAESB WEQ standards define the operating entities, interchange workflow,
      and reservation terminology needed for safe handoffs.
  - class: Evidence and control standards for transmission operations
    rationale: TOP-family standards define operating-instruction evidence, outage and emergency notifications, data-specification
      exchange, and retention expectations that materially constrain this lane.
  source_selection_approach: 'Use FERC transmission-access and OATT reform guidance to frame OASIS,

    transmission-service, and tariff-related workflow boundaries; use the NERC

    Functional Model plus TOP standards to define owner roles, notification

    duties, operator evidence, and data-exchange obligations; and use NAESB

    WEQ standards to normalize interchange, e-Tag, and approval terminology.

    Treat tenant outage schedulers, OASIS implementations, e-Tag tooling,

    EMS or SCADA evidence, operator logs, and regional procedures as the

    operational truth set only after the tenant names them explicitly. Never

    infer outage approval, switching authority, tariff interpretation,

    engineering signoff, or compliance determinations from the public baseline.

    '
  authority_sources:
  - source_id: ferc-oatt-reform
    title: Open Access Transmission Tariff (OATT) Reform
    publisher: Federal Energy Regulatory Commission
    source_type: official-regulatory-order
    location: https://www.ferc.gov/power-sales-and-markets/open-access-transmission-tariff-oatt-reform
    authority_reason: FERC is the federal regulator for open access transmission tariff requirements. Its OATT reform guidance
      defines regional and interregional transmission planning and coordination obligations, tariff-based access boundaries,
      and the public-posting context behind OASIS workflow.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: nerc-functional-model
    title: NERC Reliability Functional Model
    publisher: North American Electric Reliability Corporation
    source_type: official-functional-reference
    location: https://www.nerc.com/globalassets/standards/resources/documents/functional_model_v5.1_clean_10082019.pdf
    authority_reason: NERC publishes the reliability functional model used across the bulk power system to distinguish roles
      such as Reliability Coordinator, Transmission Operator, Balancing Authority, and Transmission Service Provider, which
      directly constrains transmission-coordination handoffs.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: nerc-top-001-6
    title: TOP-001-6 - Transmission Operations
    publisher: North American Electric Reliability Corporation
    source_type: reliability-standard
    location: https://www.nerc.com/globalassets/standards/reliability-standards/top/top-001-6.pdf
    authority_reason: TOP-001-6 is a NERC reliability standard that defines operating-instruction evidence, emergency and
      outage notifications, and impacted-entity communication duties for transmission operators and neighboring reliability
      entities.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: nerc-top-003-5
    title: TOP-003-5 - Operational Reliability Data
    publisher: North American Electric Reliability Corporation
    source_type: reliability-standard
    location: https://www.nerc.com/globalassets/standards/reliability-standards/top/top-003-5.pdf
    authority_reason: TOP-003-5 defines the documented data specifications, exchange obligations, conflict-resolution expectations,
      and retention posture needed for transmission operators and balancing authorities to coordinate safely.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: naesb-weq-standards
    title: NAESB WEQ Standards
    publisher: North American Energy Standards Board
    source_type: industry-standard
    location: https://www.naesb.org/weq/weq_final.asp
    authority_reason: NAESB WEQ standards are the recognized industry business-practice baseline for interchange tagging,
      OASIS and communications protocols, and related approval workflows used by transmission coordination teams.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nerc-glossary
    title: NERC Glossary of Terms
    publisher: North American Electric Reliability Corporation
    source_type: official-terminology-reference
    location: https://www.nerc.com/globalassets/standards/reliability-standards/glossary_of_terms_111225.pdf
    authority_reason: NERC maintains the bulk-power glossary used to define transmission-operations vocabulary such as Reliability
      Coordinator, Transmission Operator, Operating Instruction, and related terms that change artifact naming and boundary
      behavior.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: Transmission service and reservation baseline
    retrieval_policy: Use FERC OATT and current NAESB WEQ guidance to confirm reservation, posting, interchange, denial-reason,
      and transmission-service communication expectations before routing work.
    specialty_specific_exceptions:
    - Never infer tariff interpretation, reservation approval, or curtailment authority from generic public guidance.
  - category: Reliability operations and notification baseline
    retrieval_policy: Use NERC Functional Model and TOP-family standards to confirm which entities own notifications, operating-instruction
      evidence, outage communications, and data-exchange obligations.
    specialty_specific_exceptions:
    - Never convert reliability guidance into emergency-control, outage-approval, or SOL or IROL decision authority.
  - category: Terminology and evidence baseline
    retrieval_policy: Use NERC glossary and TOP measures to normalize terminology and minimum evidence expectations such as
      operator logs, voice recordings, electronic communications, and documented specifications.
    specialty_specific_exceptions:
    - Never treat terminology normalization as permission to invent tenant-specific systems, timing windows, or acceptance
      rules.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the transmission coordination baseline, but tenant systems, regional procedures, outage-priority
      rules, and tariff implementations remain required for safe routing.
    - Escalate when tenant policy or regional manuals materially change outage windows, switching boundaries, service priorities,
      or closure conditions.
    - Never infer control-room approval, engineering authority, or compliance signoff.
  specialty_specific_exceptions:
  - RC, TOP, BA, and TSP responsibilities vary materially with region, registration, and tenant operating model.
  - Transmission outage approval windows, TLR or congestion rules, and interchange tooling differ across RTO, ISO, and vertically
    integrated utility environments.
  - Closure requires tenant-specific destination-owner acceptance even when public sources define common coordination artifacts.
  next_review_due_at: '2026-10-07'
