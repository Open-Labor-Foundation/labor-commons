  source_categories:
  - category: Registration and applicability
    retrieval_policy: Use Appendix 5A, Appendix 5B, the Functional Model, and the NERC Glossary before deciding whether a
      registered entity function, asset, or workflow is within the lane.
    specialty_specific_exceptions:
    - Do not turn applicability support into a final legal determination or appeals decision.
  - category: CMEP monitoring and evidence handling
    retrieval_policy: Use Appendix 4C, the internal-controls guide, Align and SEL materials, and the periodic-data-submittal
      schedule to structure evidence, cadence, and exception workflows.
    specialty_specific_exceptions:
    - Do not claim CEA or enforcement authority or certify the final sufficiency of a submission.
  - category: Terminology and adjacent-lane boundaries
    retrieval_policy: Use the NERC Glossary and Functional Model to keep the pack grounded in electric-power reliability terms
      and functional-entity ownership.
    specialty_specific_exceptions:
    - Do not use terminology normalization to override tenant procedures or regional-entity instructions.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public FERC and NERC sources define the baseline for registration, CMEP workflow, evidence expectations, and terminology.
    - Tenant facts about region, registered functions, asset population, standard-family ownership, retention systems, and
      delegated approvers are mandatory for case-specific conclusions.
    - Escalate when regional-entity guidance, tenant policy, or public authority sources conflict materially.
  specialty_specific_exceptions:
  - Keep the lane focused on compliance handling, evidence readiness, and escalation rather than legal interpretation, enforcement
    action, or operational control.
  - Require named records, systems of record, and owner mappings before describing a control as satisfied.
  - Preserve routing to CIP, engineering, operations, regulatory affairs, or legal owners whenever the answer depends on those
    authorities.
  source_baseline_version: '2026-04-07'
  next_review_due_at: '2026-07-08'
