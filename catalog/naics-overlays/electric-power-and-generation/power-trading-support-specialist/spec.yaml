- grid-dispatch-support-specialist
knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Primary FERC and organized-market sources define wholesale-power sales, transmission access, settlements, and
      reporting artifacts that make this lane materially different from generic support.
  - class: Recognized workflow references tied directly to the lane
    rationale: NAESB and NERC references define OASIS, interchange, EIR, and schedule workflow expectations that constrain
      support handling.
  - class: Evidence or control standards relevant to the lane
    rationale: FERC conduct, anti-manipulation, and reporting rules constrain what support staff may say, share, escalate,
      or treat as final.
  source_selection_approach: 'Use FERC wholesale-power and market-conduct sources, NAESB WEQ standards,

    NERC interchange workflow standards, and organized-market settlement

    references before drafting claims about tagging, transmission reservations,

    settlements, billing disputes, or stakeholder communication. Treat tenant

    ISO or RTO market manuals, tariff versions, ETRM mappings, approval

    matrices, credit rules, and routing owners as runtime retrieval dependencies

    that narrow but do not replace the public baseline.

    '
  authority_sources:
  - source_id: ferc-mbr-order-697d
    title: Order No. 697-D
    publisher: Federal Energy Regulatory Commission
    source_type: primary-regulatory-guidance
    location: https://www.ferc.gov/sites/default/files/2020-06/OrderNo.697D.pdf
    authority_reason: FERC Order No. 697 and its progeny are the core federal framework for market-based-rate sales, affiliate
      restrictions, and market behavior obligations in wholesale electric markets, which define boundary conditions around
      support work for trading activities.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ferc-eqr
    title: Electric Quarterly Reports (EQR)
    publisher: Federal Energy Regulatory Commission
    source_type: primary-regulatory-guidance
    location: https://www.ferc.gov/power-sales-and-markets/electric-quarterly-reports-eqr
    authority_reason: FERC's EQR page is the public authority for the contract and transaction data sellers must report for
      jurisdictional power sales and transmission service, making it authoritative for evidence classes and adjacent regulatory-reporting
      boundaries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ferc-standards-of-conduct
    title: Standards of Conduct for Transmission Providers
    publisher: Federal Energy Regulatory Commission
    source_type: evidence-and-control-standard
    location: https://www.ferc.gov/major-orders-regulations/standards-conduct-transmission-providers
    authority_reason: FERC's standards-of-conduct rules define the independent-functioning, no-conduit, and transparency obligations
      that constrain what transmission-function information may be used or shared in trading-support workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ferc-anti-manipulation
    title: Prohibition of Energy Market Manipulation
    publisher: Federal Energy Regulatory Commission
    source_type: evidence-and-control-standard
    location: https://www.ferc.gov/enforcement-legal/enforcement/prohibition-energy-market-manipulation
    authority_reason: FERC's anti-manipulation rule is authoritative for conduct boundaries in jurisdictional power and transmission
      sales, which means support staff must not improvise actions or communications that could affect market conduct or misstate
      material facts.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: naesb-weq-standards
    title: Wholesale Electric Quadrant Standards
    publisher: North American Energy Standards Board
    source_type: recognized-workflow-reference
    location: https://www.naesb.org/weq/weq_standards.asp
    authority_reason: NAESB's WEQ standards are the recognized electric-industry business-practice references for OASIS, coordinate
      interchange, schedule communication, and EIR usage, all of which materially define power-trading support workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nerc-int-006-5
    title: INT-006-5 Evaluation of Interchange Transactions
    publisher: North American Electric Reliability Corporation
    source_type: recognized-workflow-reference
    location: https://www.nerc.com/globalassets/standards/reliability-standards/int/int-006-5.pdf
    authority_reason: NERC INT-006-5 is the authoritative reliability standard for evaluation and approval workflow around
      arranged interchange, giving concrete timing, approval, denial, and confirmed-interchange handling expectations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: caiso-settlements
    title: Settlements
    publisher: California ISO
    source_type: named-industry-operating-guidance
    location: https://www.caiso.com/market-operations/settlements
    authority_reason: CAISO is an organized-market operator, and its settlements page is authoritative for the cycle, reports,
      invoice and payment artifacts, and dispute interfaces market participants actually use in one major U.S. power market.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: pjm-msrs
    title: Market Settlements Reporting System (MSRS)
    publisher: PJM Interconnection
    source_type: named-industry-operating-guidance
    location: https://www.pjm.com/markets-and-operations/etools/msrs
    authority_reason: PJM is an organized-market operator, and its MSRS reference is authoritative for how participants retrieve
      market-settlement reports and monthly billing statements in another major U.S. power market.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: pjm-etools
    title: eTools
    publisher: PJM Interconnection
    source_type: recognized-workflow-reference
    location: https://www.pjm.com/markets-and-operations/etools.aspx
    authority_reason: PJM's eTools page is authoritative for the participant-facing tools used to request and confirm external
      bilateral transactions, view credit position, access billing functions, and handle market-operational support tasks.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: wholesale power sales, reporting, and conduct boundaries
    retrieval_policy: Use FERC market-based-rate, EQR, standards-of-conduct, and anti-manipulation references before drafting
      support claims that touch trade authority, information-sharing, reporting, or market conduct.
    specialty_specific_exceptions:
    - Do not infer trade approval, regulatory signoff, or legal interpretation from public FERC guidance alone.
    - Do not convert support summaries into statements that a trade or settlement posture is compliant, permissible, or final.
  - category: schedule, transmission, and interchange workflow
    retrieval_policy: Use NAESB WEQ and NERC interchange references for OASIS, coordinate interchange, EIR, e-Tag, and confirmed-interchange
      workflow claims.
    specialty_specific_exceptions:
    - Do not assume one RTO or balancing-authority implementation applies everywhere; require tenant market and system context.
    - Do not bypass timing, approval, or denial workflow simply because a commercial deadline is under pressure.
  - category: organized-market settlements, invoices, and disputes
    retrieval_policy: Use ISO and RTO public settlement references to define statement, invoice, payment, and dispute artifacts
      before drafting resolution or escalation logic.
    specialty_specific_exceptions:
    - Do not assume CAISO or PJM naming, dispute windows, or tool names apply unchanged to every market.
    - Do not treat preliminary market statements as final settlement approval when later statement versions or tenant policy
      may change the answer.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define baseline workflow, but tenant market participation model, ISO or RTO manuals, tariff version,
      ETRM mappings, credit rules, and routing owners remain required for safe execution.
    - Tenant retrieval must provide market, balancing authority, product type, trade and schedule identifiers, tariff or manual
      version, systems-of-record map, and adjacent-owner escalation matrix.
    - Escalate whenever tariff language, market manual language, standards-of-conduct posture, or tenant policy materially
      changes dispute timing, communication posture, or ownership.
  specialty_specific_exceptions:
  - Power trading support routinely crosses commercial, transmission, scheduling, settlement, and regulatory artifacts that
    have different owners and different approval rights.
  - Support summaries are only safe when market, product, path, interval, statement version, and transmission or scheduling
    context are explicit.
  - Requests for trading strategy, credit approval, tariff interpretation, regulatory signoff, or conduct-sensitive information
    handling must route to the proper authority.
  next_review_due_at: '2026-10-10'
