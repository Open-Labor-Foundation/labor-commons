  source_categories:
  - category: Named-industry operating guidance
    retrieval_policy: Use reliability and utility-regional guidance first for capability, capability validation, and outage
      submission expectations.
    specialty_specific_exceptions:
    - Do not convert reliability guidance into dispatch authority or legal approval posture.
  - category: Recognized workflow references tied directly to the lane
    retrieval_policy: Use PJM and ISO-NE outage-planning references to structure sequencing constraints, lead-time handling,
      and handoff patterns.
    specialty_specific_exceptions:
    - Regional workflow timing and market gates are tenant/Jurisdiction specific and must be tenant-supplied.
  - category: Evidence or control standards relevant to the lane
    retrieval_policy: Use NERC reporting and model-verification documents for minimum evidence quality and control dependency
      checks before making recommendations.
    specialty_specific_exceptions:
    - Where reporting schemas differ by tenant systems, route to orchestrator retrieval and note variance before high-confidence
      recommendations.
