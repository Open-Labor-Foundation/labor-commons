knowledge_baseline:
  authority_sources:
  - source_id: ferc-reliability-explainer
    title: Reliability Explainer
    publisher: Federal Energy Regulatory Commission
    source_type: primary-regulator-context
    location: https://www.ferc.gov/reliability-explainer
    authority_reason: FERC explains the federal reliability framework and the boundary between reliability oversight and state
      or utility-local operational authority, which constrains what this lane may treat as authoritative.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: doe-electricity-industry-primer
    title: United States Electricity Industry Primer
    publisher: U.S. Department of Energy
    source_type: vendor-neutral restoration workflow reference
    location: https://www.energy.gov/sites/prod/files/2015/12/f28/united-states-electricity-industry-primer.pdf
    authority_reason: DOE provides the most accessible federal baseline for outage-restoration stages, mutual-assistance mobilization,
      restoration priorities, and utility terminology used across U.S. electric utilities.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 3650
    decay_policy: review_required_after_interval
    status: active
  - source_id: osha-1910-269
    title: 29 CFR 1910.269 - Electric power generation, transmission, and distribution
    publisher: Occupational Safety and Health Administration
    source_type: worker-safety-regulation
    location: https://www.osha.gov/laws-regs/regulations/standardnumber/1910/1910.269
    authority_reason: OSHA sets the controlling federal worker-safety baseline for utility restoration work, which limits
      any autonomous handling of energized conductors, minimum approach distance decisions, and job-briefing-dependent work.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: nerc-glossary
    title: Glossary of Terms Used in NERC Reliability Standards
    publisher: North American Electric Reliability Corporation
    source_type: official-terminology-reference
    location: https://www.nerc.com/globalassets/standards/reliability-standards/glossary_of_terms_111225.pdf
    authority_reason: NERC's glossary provides the official reliability vocabulary needed to distinguish outage-restoration
      coordination from adjacent reliability, dispatch, and compliance lanes.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: cpuc-go-166
    title: 'General Order 166: Standards for Operation, Reliability, and Safety During Emergencies and Disasters'
    publisher: California Public Utilities Commission
    source_type: state-regulator emergency operations guidance
    location: https://docs.cpuc.ca.gov/PublishedDocs/Published/G000/M464/K730/464730514.pdf
    authority_reason: GO 166 is a detailed public utility-regulator source that defines emergency plans, damage-assessment
      processes, restoration-priority establishment, ETR handling, personnel redeployment, and annual reporting obligations
      for electric utilities.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ny-electric-emergency-plans
    title: 16 NYCRR Part 105 Electric Utility Emergency Plans
    publisher: New York State Department of Public Service
    source_type: state-regulator emergency restoration rule
    location: https://documents.dps.ny.gov/public/Common/ViewDoc.aspx?DocRefId=%7B976912F5-CED0-40BA-83D7-46ACA38B885A%7D&DocTitle=2022-05-04+NYSEG-RGE+Electric+Utility+Emergency+Plan+Updated+-+Appendix+B+%2821-E-0567%29
    authority_reason: This public DPS-hosted emergency-plan appendix reproduces the governing Part 105 requirements for service-restoration
      procedures, customer contacts, mutual-assistance agreements, and commission review of restoration performance.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: appa-mutual-aid-playbook
    title: Mutual Aid Playbook
    publisher: American Public Power Association
    source_type: recognized-industry-workflow-reference
    location: https://www.publicpower.org/resource/mutual-aid-playbook
    authority_reason: APPA is a recognized U.S. utility trade body and its June 2024 playbook gives concrete mutual-aid coordination
      roles, resource-information forms, and crew-coordination artifacts used during restoration mobilizations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: Named-industry operating guidance
    retrieval_policy: Use DOE, CPUC, and NY DPS emergency-plan references first to determine restoration stages, emergency-plan
      records, customer-contact posture, and mutual-aid expectations.
    specialty_specific_exceptions:
    - Do not infer utility-specific switching authority, ETR publication rights, or critical-customer rules from public guidance
      alone.
  - category: Recognized workflow references tied directly to the lane
    retrieval_policy: Use DOE and APPA references to structure restoration sequencing, mutual-aid coordination, resource-tracking
      artifacts, and outage-specific terminology.
    specialty_specific_exceptions:
    - Mutual-aid coordination mechanics vary by investor-owned, cooperative, and public-power models and must be narrowed
      with tenant context.
  - category: Evidence or control standards relevant to the lane
    retrieval_policy: Use OSHA and state emergency-plan rules to define safety-boundary refusals, damage-assessment evidence,
      ETR methodology expectations, and completion safeguards.
    specialty_specific_exceptions:
    - Safety and restoration evidence requirements bound the lane; they do not grant authority to approve switching, energization,
      or external public commitments.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the public source set as the baseline for outage-restoration terminology, emergency-plan stages, mutual-aid artifacts,
      and authority boundaries.
    - Retrieve tenant-specific feeder priority rules, critical-customer lists, switching ownership, ETR approval policy, and
      systems-of-record connectors at request time.
    - Escalate whenever utility ownership model, jurisdiction, or emergency-plan rules materially change the valid restoration
      answer.
  specialty_specific_exceptions:
  - The lane is execution support for outage restoration, not a substitute for control-room switching authority, engineering
    release, or regulator-facing communications ownership.
  - Completion evidence must come from tenant outage, switching, and field records; it cannot be inferred from public restoration
    playbooks.
  - Requests involving public messaging approval, legal or regulatory interpretation, or engineering-safe return-to-service
    judgments require adjacent specialists or human review.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-10-10'
