    source_type: primary regulator guidance
    location: https://ferc.gov/transmission-line-vegetation-management
    authority_reason: FERC explains the federal reliability context for transmission vegetation management and clarifies that
      bulk-power transmission obligations are distinct from lower-voltage distribution customer-outage handling.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: nerc-fac-003-5
    title: FAC-003-5 Transmission Vegetation Management
    publisher: North American Electric Reliability Corporation
    source_type: reliability-standard
    location: https://www.nerc.com/globalassets/standards/projects/2015-09/2015-09_fac-003-5---clean.pdf
    authority_reason: Primary reliability standard for transmission vegetation programs; defines annual work plans, inspections,
      corrective actions, and evidence examples that materially shape vegetation scheduling and escalation logic.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: osha-1910-269
