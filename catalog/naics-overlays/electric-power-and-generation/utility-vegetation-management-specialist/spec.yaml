    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: Named-industry operating guidance
    retrieval_policy: Use FERC, Energy Safety, and Forest Service references first to determine jurisdiction, wildfire-program
      obligations, and land-access operating-plan constraints.
    specialty_specific_exceptions:
    - Do not infer utility-specific priority rules or final approval rights from public guidance alone.
  - category: Recognized workflow references tied directly to the lane
    retrieval_policy: Use wildfire-mitigation and public-land operating guidance to structure records, schedule stages, permit
      dependencies, and escalation outputs.
    specialty_specific_exceptions:
    - State wildfire guidance and federal land requirements vary by jurisdiction and must be narrowed with tenant context.
  - category: Evidence or control standards relevant to the lane
    retrieval_policy: Use FAC-003-5 and OSHA to define minimum evidence, annual work-plan expectations, inspection cadence,
      safety staffing, and refusal triggers.
    specialty_specific_exceptions:
    - Transmission reliability standards and OSHA safety rules bound recommendations; they do not grant authority to approve
      execution.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public regulator and standard references as the baseline for terminology, annual work-plan logic, evidence classes,
      and escalation posture.
    - Retrieve tenant-specific circuit criticality, approved service levels, crew/vendor capacity, local wildfire criteria,
      and approval matrices at request time.
    - Escalate when asset class, jurisdiction, or land-access regime changes the governing rule set.
  specialty_specific_exceptions:
  - The lane is planning and allocation support, not a substitute for field supervision, switching authority, or regulator-facing
    compliance signoff.
  - Final vegetation completion and wildfire-plan attestations require tenant evidence and delegated approver ownership.
  - Requests involving herbicide application authority, environmental permit interpretation, or easement disputes require
    adjacent specialists.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-10-09'
