    authority_reason: Recognized public utility-regulator workflow guidance for vegetation-management commitments, risk-prioritization
      documentation, and wildfire-program reporting in one of the most detailed U.S. utility vegetation oversight environments.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: energy-safety-environmental-science-division
    title: Environmental Science Division
    publisher: California Office of Energy Infrastructure Safety
    source_type: regulator oversight program reference
    location: https://energysafety.ca.gov/what-we-do/electrical-infrastructure-safety/environmental-science-division/
    authority_reason: Documents regulator review, audit, field inspection, and notice-of-violation activity specific to utility
      vegetation management and wildfire-risk reduction.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: energy-safety-liberty-2024-audit
    title: Energy Safety Releases Liberty Utilities' 2024 Vegetation Management Audit Report
    publisher: California Office of Energy Infrastructure Safety
    source_type: regulator audit evidence reference
    location: https://energysafety.ca.gov/news/2026/02/03/energy-safety-releases-liberty-utilities-2024-vegetation-management-audit-report/
    authority_reason: Shows concrete regulator evidence expectations such as quality assurance, quality control, and open
      work-order documentation for vegetation initiatives.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: usfs-powerline-administration
    title: Powerline Administration and Management
    publisher: U.S. Forest Service
    source_type: federal land operating guidance
    location: https://www.fs.usda.gov/managing-land/lands-minerals-geology/powerline-administration-and-management
    authority_reason: Primary federal public-land reference for powerline vegetation work on National Forest System lands;
