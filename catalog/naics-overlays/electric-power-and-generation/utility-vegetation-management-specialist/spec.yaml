    publisher: Occupational Safety and Health Administration
    source_type: worker-safety-regulation
    location: https://www.osha.gov/laws-regs/regulations/standardnumber/1910/1910.269
    authority_reason: OSHA sets the federal safety baseline for electric utility work, including line-clearance tree trimming
      staffing, minimum approach distance, and job-briefing constraints that limit autonomous scheduling recommendations.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: energy-safety-wmp-guidelines
