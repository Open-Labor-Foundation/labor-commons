    authority_reason: NIST Office of Weights and Measures publishes the public model used by many U.S. jurisdictions for price
      verification, unit pricing, method of sale, package labeling, and scanner/POS controls that constrain grocery inventory
      recommendations involving weighed, substituted, or promoted items.
