    publisher: Federal Trade Commission
    source_type: consumer-protection-guidance
    location: https://www.ftc.gov/business-guidance/resources/business-guide-ftcs-mail-internet-or-telephone-order-merchandise-rule
    authority_reason: FTC is the primary U.S. consumer-protection regulator for remote-order handling. The guide is authoritative
      for delay notices, cancellations, prompt refunds, and order records when grocery shortages or substitutions affect pickup,
      delivery, or online orders.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
