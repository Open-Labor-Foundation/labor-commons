    authority_reason: FDA Food Code is the public model used by many retail food regulators for retail food establishment
      controls. It is authoritative for approved-source, receiving, time-temperature, contamination, date marking, shellstock,
      and hold boundaries that inventory work must not override.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
