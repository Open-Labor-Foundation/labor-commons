knowledge_baseline:
  source_classes:
  - class: Consumer-protection or public hospitality workflow guidance
    rationale: Store replenishment creates customer-facing availability, substitution, order, and refund impacts, so public
      consumer-protection sources constrain how customer commitments and missing merchandise are handled.
  - class: Pricing, booking, refund, or guest-service operating references
    rationale: Grocery replenishment touches advertised availability, unit price, e-commerce orders, substitutions, rain checks,
      and refunds, so public pricing and order references define where the lane must stop.
  - class: Safety, fraud, or loss-prevention handling guidance
    rationale: Replenishment cannot put recalled, unsafe, held, suspicious, or loss-prevention-sensitive product back into
      customer-facing availability.
  authority_sources:
  - source_id: cips-effective-inventory-control
    title: Segment 4.2 Effective Inventory Control
    publisher: Chartered Institute of Procurement & Supply
    source_type: professional-inventory-standard
    location: https://globalstandard.cips.org/segments/segment-4.2-effective-inventory-control/
    authority_reason: CIPS is the chartered professional body for procurement and supply, and this segment directly covers
      stock classification, reorder methods, inventory holding tradeoffs, and replenishment controls relevant to store-level
      replenishment recommendations.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: cips-effective-expediting
    title: Segment 7.2 Effective Expediting in Procurement and Supply
    publisher: Chartered Institute of Procurement & Supply
    source_type: professional-supply-execution-standard
    location: https://globalstandard.cips.org/segments/segment-7.2-effective-expediting-in-procurement-and-supply/
    authority_reason: CIPS expediting guidance is directly relevant to late supply, milestone tracking, shortage response,
      and the boundary between replenishment coordination and procurement or supplier-management ownership.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nist-sp-1181-unit-pricing-2025
    title: NIST SP 1181 - Unit Pricing Guide - A Best Practice Approach to Unit Pricing (2025 Ed.)
    publisher: National Institute of Standards and Technology
    source_type: public-retail-pricing-operating-reference
    location: https://www.nist.gov/publications/nist-sp-1181-unit-pricing-guide-best-practice-approach-unit-pricing-2025-ed
    authority_reason: NIST Office of Weights and Measures publishes authoritative public unit-pricing and weights-and-measures
      guidance for retail store formats and e-commerce; it constrains replenishment when shelf, unit price, package size,
      electronic shelf label, or advertised availability affects customer-facing sale readiness.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-mail-internet-telephone-order-rule
    title: Mail, Internet, or Telephone Order Merchandise Rule
    publisher: Federal Trade Commission
    source_type: consumer-protection-order-guidance
    location: https://www.ftc.gov/business-guidance/resources/selling-internet-prompt-delivery-rules
    authority_reason: FTC guidance is authoritative for online and phone order timing, delay notices, cancellation, and prompt
      refund expectations, directly constraining grocery pickup or delivery shortages, substitutions, and customer-impact
      replenishment cases.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: fda-food-code-2022
    title: Food Code 2022
    publisher: U.S. Food and Drug Administration
    source_type: retail-food-safety-operating-reference
    location: https://www.fda.gov/food/fda-food-code/food-code-2022
    authority_reason: FDA Food Code is the public model retail food safety reference used by many jurisdictions. It is authoritative
      for recognizing when replenishment, shelf fill, backroom movement, or customer substitution must defer to food-safety
      hold and disposition authority.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: fda-food-traceability-faq
    title: 'Frequently Asked Questions: FSMA Food Traceability Rule'
    publisher: U.S. Food and Drug Administration
    source_type: official-traceability-workflow-guidance
    location: https://www.fda.gov/food/food-safety-modernization-act-fsma/frequently-asked-questions-fsma-food-traceability-rule
    authority_reason: FDA's official traceability FAQ is authoritative public guidance for lot-code, receiving, shipping,
      and record-retrieval expectations for covered foods, directly informing replenishment traceability, recall pull, and
      supplier evidence requirements.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: fda-recalls-market-withdrawals
    title: Recalls, Market Withdrawals, & Safety Alerts
    publisher: U.S. Food and Drug Administration
    source_type: food-safety-recall-reference
    location: https://www.fda.gov/safety/recalls-market-withdrawals-safety-alerts
    authority_reason: FDA publishes public recall, withdrawal, and safety alert records for FDA-regulated products, including
      foods. These records are authoritative stop conditions for replenishment, substitutions, shelf fill, and customer availability.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 30
    decay_policy: review_required_after_interval
    status: active
  - source_id: fsis-recalls
    title: Recalls and Public Health Alerts
    publisher: USDA Food Safety and Inspection Service
    source_type: meat-poultry-egg-recall-reference
    location: https://www.fsis.usda.gov/recalls
    authority_reason: USDA FSIS is the federal public health authority for meat, poultry, and certain egg product recalls.
      Its recall and public health alert records are authoritative for replenishment and substitution decisions involving
      FSIS-regulated grocery products.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 30
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-general-specifications
    title: GS1 General Specifications Standard
    publisher: GS1
    source_type: industry-standard
    location: https://ref.gs1.org/standards/genspecs/24.0.0/
    authority_reason: GS1 is the recognized global standards body for product identifiers and barcodes. Its specifications
      are authoritative for UPC, GTIN, barcode, lot, and data-carrier terminology that links replenishment records across
      item master, POS, inventory, ordering, and recall workflows.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gao-green-book-2025
    title: Standards for Internal Control in the Federal Government
    publisher: U.S. Government Accountability Office
    source_type: official-control-standard
    location: https://www.gao.gov/products/gao-25-107721
    authority_reason: GAO's Green Book is an authoritative public internal-control framework for documentation quality, approvals,
      segregation of duties, monitoring, and exception handling that supports auditable replenishment evidence and approval-boundary
      discipline.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: inventory-control-and-shortage-workflow
    retrieval_policy: Use CIPS inventory-control and expediting sources to structure stock status, replenishment recommendation,
      shortage, lead-time, cut-order, and vendor constraint handling.
    specialty_specific_exceptions:
    - Do not convert inventory or expediting guidance into authority to approve spend, supplier changes, or supplier-risk
      acceptance.
  - category: customer-facing-order-pricing-and-refund-boundaries
    retrieval_policy: Use FTC and NIST references when grocery availability affects online orders, substitutions, advertised
      availability, unit pricing, shelf labels, rain checks, refunds, or customer-facing commitments.
    specialty_specific_exceptions:
    - Escalate pricing, refund, rain-check, and policy exceptions to authorized customer-service, pricing, finance, or legal
      owners.
  - category: safety-recall-traceability-and-item-identity
    retrieval_policy: Use FDA, FSIS, and GS1 references when replenishment depends on traceability, item identity, recall
      status, stop-sale status, food safety holds, or product movement evidence.
    specialty_specific_exceptions:
    - Do not release held, recalled, unsafe, expired, or identity-ambiguous product into customer-facing availability.
  - category: control-and-evidence-governance
    retrieval_policy: Use GAO control guidance for documentation, approval, monitoring, exception, and segregation-of-duty
      discipline.
    specialty_specific_exceptions:
    - Use control guidance to support traceability and handoff quality, not to claim audit, legal, or executive signoff authority.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the CIPS, NIST, FTC, FDA, FSIS, GS1, and GAO baseline above as the public source set for grocery store replenishment
      handling.
    - Inject tenant min-max rules, planograms, store order calendars, DSD agreements, warehouse allocation rules, vendor scorecards,
      emergency-buy thresholds, item master mappings, recall procedures, pricing and refund policies, and jurisdiction-specific
      constraints only through orchestrator-controlled retrieval.
    - Escalate when store, banner, product category, vendor, customer order, tender, franchise, jurisdiction, or tenant authority
      context materially changes the safe recommendation.
  specialty_specific_exceptions:
  - Keep the lane on store replenishment evidence, availability, supply constraints, vendor or warehouse blockers, and escalation
    packages rather than supplier selection, category strategy, pricing, refunds, food-safety release, or loss-prevention
    investigations.
  - Treat missing SKU, UPC, GTIN, PLU, item-master, inventory, order, vendor, shelf, backroom, or recall evidence as a blocker
    rather than inferring item identity or saleability.
  - Do not treat customer demand, promotion urgency, or manager pressure as permission to bypass spend, supplier, quality,
    safety, pricing, refund, or fraud controls.
  source_baseline_version: '2026-04-13'
  next_review_due_at: '2026-07-12'
