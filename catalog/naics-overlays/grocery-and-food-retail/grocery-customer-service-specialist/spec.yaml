  tenant_required_facts:
  - Tenant-specific grocery return, refund, substitution, price-adjustment, rain-check, loyalty, digital coupon, service recovery,
    and missed delivery policies.
  - Jurisdiction, store, channel, business unit, product department, SNAP/WIC processor, and facility context that materially
    changes workflow rules.
  - Current POS, order-management, pricing, promotion, loyalty, CRM, service desk, payment, inventory, recall, quality, and
    loss-prevention system locations and retrieval hooks.
  - Customer type, order status, pickup or delivery state, item and lot information, tender type, promotion rule, receipt
    details, service history, and safety/security handling limits.
  - Refund, exception, price-adjustment, service recovery, food-safety, fraud, and security escalation thresholds.
  traceability_expectations:
  - Every resolution note must name the record set used and the unresolved record gaps.
  - Every customer communication summary must distinguish documented facts, tenant-policy application, and owner handoff.
  - Every escalation packet must include source records, customer-impact severity, requested exception, policy basis, and
    recommended next owner.
  - Every refusal must identify the missing authority, missing evidence, or unsafe boundary condition that prevents direct
    resolution.
