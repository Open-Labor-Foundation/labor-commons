knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Consumer-protection or public hospitality workflow guidance
    rationale: Official food-retail and consumer-protection guidance defines the public baseline for grocery service communication,
      order delay handling, food-safety complaint triage, and customer-facing safety caveats.
  - class: Pricing, booking, refund, or guest-service operating references
    rationale: Official pricing, price-verification, online-order, payment-dispute, SNAP EBT, refund, and promotion references
      identify the records of truth and authority boundaries for grocery order and payment requests.
  - class: Safety, fraud, or loss-prevention handling guidance
    rationale: Official food-safety, recall, payment-security, identity-theft, and SNAP transaction guidance establishes stop
      conditions for illness, recalled item, suspicious refund, card-data, and benefit-tender scenarios.
  source_selection_approach: 'Use FDA Food Code and recall guidance, FTC online-order and deceptive

    pricing rules, NIST price-verification procedures, USDA FNS SNAP EBT

    retailer guidance, CFPB billing-error guidance, FTC Red Flags guidance,

    and PCI SSC payment-card security guidance before drafting workflow claims

    about grocery orders, substitutions, pricing mismatches, refunds, tenders,

    recalled products, food-safety complaints, fraud-sensitive account changes,

    or card-data handling. Treat tenant return policies, promotion rules,

    loyalty terms, supplier recall notices, local health-department rules,

    SNAP/WIC processor rules, manager approval thresholds, and store-specific

    operating procedures as runtime retrieval dependencies.

    '
