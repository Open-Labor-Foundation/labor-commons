    authority_reason: FDA publishes the Food Code as the official model food-safety code for retail food establishments, giving
      the grocery lane a public baseline for food-safety-sensitive complaints, time-and-temperature terms, and escalation
      boundaries.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
