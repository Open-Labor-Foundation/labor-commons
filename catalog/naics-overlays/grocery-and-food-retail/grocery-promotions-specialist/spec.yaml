- pricing-revenue-specialist
- fraud-loss-prevention-specialist
- food-safety-specialist
- category-management-specialist
- operations-specialist
knowledge_baseline:
  authority_sources:
  - source_id: ftc-deceptive-pricing
    title: 16 CFR Part 233 - Guides Against Deceptive Pricing
    publisher: Federal Trade Commission via eCFR
    source_type: consumer-protection-rule
    location: https://www.ecfr.gov/current/title-16/chapter-I/subchapter-B/part-233
    authority_reason: FTC is the primary U.S. consumer-protection authority for unfair or deceptive commerce practices. Its
      deceptive-pricing rule is authoritative for comparison, former-price, and advertised-price claims that constrain grocery
      promotion and shelf-price execution.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-bait-advertising
    title: 16 CFR Part 238 - Guides Against Bait Advertising
    publisher: Federal Trade Commission via eCFR
    source_type: consumer-protection-rule
    location: https://www.ecfr.gov/current/title-16/chapter-I/subchapter-B/part-238
    authority_reason: FTC bait-advertising guides are authoritative for advertised grocery offers where availability, substitutions,
      rain checks, display execution, or customer steering could make a promotion misleading.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-free-offers
    title: 16 CFR Part 251 - Guide Concerning Use of the Word Free and Similar Representations
    publisher: Federal Trade Commission via eCFR
    source_type: consumer-protection-rule
    location: https://www.ecfr.gov/current/title-16/chapter-I/subchapter-B/part-251
    authority_reason: FTC free-offer guidance is directly authoritative for grocery BOGO, two-for-one, free-item, cents-off,
      and similar promotional claims that must not hide conditions or inflate the paid item.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-mail-internet-telephone-order-rule
    title: Mail, Internet, or Telephone Order Merchandise Rule
    publisher: Federal Trade Commission
    source_type: consumer-protection-guidance
    location: https://www.ftc.gov/business-guidance/resources/selling-internet-prompt-delivery-rules
    authority_reason: FTC guidance defines shipment timing, delay notice, cancellation, and prompt refund expectations for
      online and phone orders, including grocery e-commerce cases where price, substitution, delivery, or refund commitments
      affect customer handling.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: usda-fns-snap-retailer-training
    title: SNAP Retailer Training Materials
    publisher: USDA Food and Nutrition Service
    source_type: tender-and-fraud-operating-reference
    location: https://www.fns.usda.gov/snap/retailer/training
    authority_reason: USDA FNS administers SNAP retailer authorization and training. Its retailer training materials are authoritative
      for grocery promotion cases involving SNAP-eligible foods, sales tax, manufacturer coupons, POS equipment, and abuse
      reporting boundaries.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: nist-handbook-130-2026
    title: NIST Handbook 130 - Uniform Laws and Regulations in the Areas of Legal Metrology and Fuel Quality, Current Version
      2026
    publisher: National Institute of Standards and Technology
    source_type: public-operating-standard
    location: https://www.nist.gov/pml/owm/nist-handbook-130-current-edition
    authority_reason: NIST Office of Weights and Measures publishes the national public baseline used by weights-and-measures
      jurisdictions for price verification, unit pricing, method of sale, packaging and labeling, and e-commerce price controls.
      It is authoritative for grocery promotion evidence, weighed-item, unit-price, and POS-versus-shelf conflict handling.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: fda-food-code-2022
    title: Food Code 2022
    publisher: U.S. Food and Drug Administration
    source_type: retail-food-safety-operating-reference
    location: https://www.fda.gov/food/fda-food-code/food-code-2022
    authority_reason: FDA Food Code is the public model used by many retail food regulators for food establishment safety
      controls. It is authoritative for identifying when promotion or sale work must stop because food safety conditions,
      temperature control, contamination, or disposition authority are outside this lane.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: fda-recalls-market-withdrawals
    title: Recalls, Market Withdrawals, & Safety Alerts
    publisher: U.S. Food and Drug Administration
    source_type: food-safety-recall-reference
    location: https://www.fda.gov/safety/recalls-market-withdrawals-safety-alerts
    authority_reason: FDA publishes public recall, market withdrawal, and safety alert information for FDA-regulated products,
      including food and beverages. It is authoritative for stop-sale and recall evidence that constrains grocery promotions,
      substitutions, and customer-impact handling.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 30
    decay_policy: review_required_after_interval
    status: active
  - source_id: fsis-recalls
    title: Recalls and Public Health Alerts
    publisher: USDA Food Safety and Inspection Service
    source_type: meat-poultry-egg-recall-reference
    location: https://www.fsis.usda.gov/recalls
    authority_reason: USDA FSIS is the federal public health authority for meat, poultry, and certain egg product recalls.
      Its recall and public health alert records are authoritative for grocery promotion work involving FSIS-regulated foods.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 30
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-general-specifications
    title: GS1 General Specifications Standard
    publisher: GS1
    source_type: industry-standard
    location: https://ref.gs1.org/standards/genspecs/24.0.0/
    authority_reason: GS1 is the recognized global standards body for product identifiers and barcodes. Its specifications
      are authoritative for UPC, GTIN, barcode, and data-carrier practices needed to keep grocery shelf, POS, scale, order,
      and inventory records tied to the right items.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: promotion-claim-price-and-refund-commitments
    retrieval_policy: Use FTC, NIST, and USDA FNS sources first for public ad, free-offer, BOGO, coupon, loyalty, price, unit-price,
      e-commerce, SNAP/EBT, order, and refund-baseline handling.
    specialty_specific_exceptions:
    - Escalate when state or local weights-and-measures, unit-pricing, bottle-deposit, SNAP/EBT, refund, or advertised-price
      rules materially narrow the public baseline.
  - category: food-safety-stop-sale-and-recall
    retrieval_policy: Use FDA, FSIS, and tenant recall or food-safety records first whenever recalled, withdrawn, contaminated,
      temperature-abused, or otherwise unsafe food affects promotion execution.
    specialty_specific_exceptions:
    - Do not convert public recall or Food Code guidance into independent safety, legal, or product disposition authority
      for the lane.
  - category: item-identity-and-record-linkage
    retrieval_policy: Use GS1 standards and tenant item-master records for UPC, GTIN, PLU, random-weight, scale, and barcode
      integrity across shelf, POS, OMS, and inventory records.
    specialty_specific_exceptions:
    - Treat missing SKU, UPC, GTIN, PLU, scale, or package-size linkage as a blocker rather than inferring identity from partial
      records.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the FTC, NIST, FDA, FSIS, USDA FNS, and GS1 baseline above for public workflow, promotion, pricing, tender, safety,
      and evidence handling.
    - Inject tenant pricing limits, promotion hierarchy, coupon and loyalty rules, refund authorities, franchise playbooks,
      food-safety procedures, loss-prevention controls, and jurisdiction-specific rules only through orchestrator-controlled
      retrieval.
    - Escalate when product category, jurisdiction, tender type, customer class, franchise model, or tenant policy materially
      changes the safe answer.
  specialty_specific_exceptions:
  - Keep the lane on grocery promotion execution, evidence sufficiency, and escalation rather than on independent category
    pricing, refund, fraud, food-safety, or legal decisions.
  - Do not treat a shelf tag, circular, coupon screenshot, or customer screenshot as permission to override the system-of-record
    promotion or price without tenant-approved exception authority.
  - Do not infer that an online order promotion exception or refund can close just because a customer communication exists;
    closure still requires authoritative POS, OMS, loyalty, coupon, refund, or service-desk evidence.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-07-12'
