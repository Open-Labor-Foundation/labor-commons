knowledge_baseline:
  source_classes:
  - class: Consumer-protection or public hospitality workflow guidance
    rationale: Fresh departments touch public food-service, retail-food, and customer-facing workflows where safe handling,
      accurate representation, and service records constrain execution.
  - class: Pricing, booking, refund, or guest-service operating references
    rationale: Fresh items often use PLU, unit price, random-weight labels, markdowns, substitutions, online orders, and service
      recovery, so price, order, and refund records must gate workflow progression.
  - class: Safety, fraud, or loss-prevention handling guidance
    rationale: Fresh departments carry food-safety, recall, pull-and-hold, illness complaint, foreign-material, shrink, and
      loss-prevention risks that require explicit escalation boundaries.
  - class: Vendor-neutral workflow references that clarify evidence handling, terminology, and safe boundary behavior
    rationale: GS1 and public traceability references define lot, GTIN, and item-identity handling needed for audit-ready
      fresh-department records.
  source_selection_approach: 'Use FDA Food Code and retail food-safety guidance as the public baseline

    for fresh-department handling, active managerial control, TCS food, date

    marking, temperature, sanitation, and consumer-risk boundaries. Use USDA

    FSIS retail meat guidance where meat and poultry retail operations,

    grinding records, and Listeria controls matter. Use NIST Handbook 130 for

    method-of-sale, unit-price, random-weight, and retail price-verification

    discipline. Use FTC online order guidance for shipment, delay, cancellation,

    and prompt-refund boundaries in e-commerce grocery workflows. Use FDA FSMA

    traceability and GS1 standards for lot, GTIN, and item-linkage evidence.

    Tenant-specific store format, jurisdiction, policy, authority matrix,

    retrieval hooks, and service model still must be supplied at runtime and

    are never guessed.

    '
  authority_sources:
  - source_id: fda-food-code-2022
    title: Food Code 2022
    publisher: U.S. Food and Drug Administration
    source_type: public-retail-food-safety-guidance
    location: https://www.fda.gov/food/fda-food-code/food-code-2022
    authority_reason: FDA publishes the Food Code as the national model used by retail-food regulatory programs. It is authoritative
      for fresh-department vocabulary and controls such as TCS food, cold holding, hot holding, date marking, consumer advisory,
      shellstock tags, cleaning, sanitization, and active managerial control.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: fda-retail-food-service-haccp
    title: Retail & Food Service HACCP
    publisher: U.S. Food and Drug Administration
    source_type: public-retail-food-workflow-guidance
    location: https://www.fda.gov/food/hazard-analysis-critical-control-point-haccp/retail-food-service-haccp
    authority_reason: FDA's retail HACCP page points regulators and industry to public manuals for managing food safety in
      retail and food-service establishments. It is authoritative for identifying where fresh-department execution must preserve
      process evidence and escalate instead of improvising control decisions.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: fda-fsma-food-traceability
    title: 'FSMA Final Rule: Requirements for Additional Traceability Records for Certain Foods'
    publisher: U.S. Food and Drug Administration
    source_type: federal-food-traceability-rule
    location: https://www.fda.gov/food/food-safety-modernization-act-fsma/fsma-final-rule-requirements-additional-traceability-records-certain-foods
    authority_reason: FDA is the primary U.S. food regulator for FSMA traceability. The rule defines traceability lot code
      and critical tracking event concepts for certain foods and supports escalation when fresh-department lot or recall evidence
      is missing or conflicting.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: fsis-retail-exemptions
    title: Retail Exemptions for Meat and Poultry Products
    publisher: USDA Food Safety and Inspection Service
    source_type: federal-meat-poultry-retail-guidance
    location: https://www.fsis.usda.gov/policy/fsis-guidelines/retail-exemptions-meat-and-poultry-products
    authority_reason: FSIS is the federal authority for meat and poultry inspection. Its retail-exemption guidance defines
      boundaries for retail meat and poultry operations and is authoritative for when fresh meat work must escalate beyond
      normal department execution.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: fsis-raw-beef-grinding-records
    title: Recordkeeping Requirements for Retail Stores That Grind Raw Beef Products
    publisher: USDA Food Safety and Inspection Service
    source_type: federal-meat-traceability-record-rule
    location: https://www.fsis.usda.gov/inspection/compliance-guidance/labeling/label-approval/recordkeeping-requirements-retail-stores
    authority_reason: FSIS requires retail stores that grind raw beef to keep records that support traceback. It is authoritative
      for treating missing grind-log evidence as a blocker rather than closing meat-department work.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nist-handbook-130
    title: NIST Handbook 130 - Uniform Laws and Regulations in the Areas of Legal Metrology and Fuel Quality
    publisher: National Institute of Standards and Technology
    source_type: public-pricing-and-method-of-sale-standard
    location: https://www.nist.gov/pml/owm/nist-handbook-130-current-edition
    authority_reason: NIST Office of Weights and Measures publishes the public baseline used by jurisdictions for method-of-sale,
      unit pricing, price verification, and package labeling controls. It is authoritative for random-weight, unit-price,
      shelf-label, and POS conflict handling in grocery fresh departments.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-online-order-rule
    title: 'Selling on the Internet: Prompt Delivery Rules'
    publisher: Federal Trade Commission
    source_type: consumer-protection-order-and-refund-guidance
    location: https://www.ftc.gov/business-guidance/resources/selling-internet-prompt-delivery-rules
    authority_reason: FTC is the primary U.S. consumer-protection authority for unfair or deceptive commerce practices. Its
      guidance constrains online grocery order commitments, delay handling, cancellation, and prompt-refund expectations when
      fresh-order fulfillment cannot meet customer commitments.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-general-specifications
    title: GS1 General Specifications Standard
    publisher: GS1
    source_type: industry-identifier-standard
    location: https://ref.gs1.org/standards/genspecs/
    authority_reason: GS1 is the recognized global standards body for retail identifiers and barcode data. Its standards are
      authoritative for GTIN, UPC, location, and barcode evidence needed to connect fresh-department items, scale labels,
      orders, inventory, and traceability records.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: retail-food-safety-and-active-managerial-control
    retrieval_policy: Use FDA Food Code, FDA retail HACCP, and tenant food-safety policies first whenever fresh-case readiness,
      TCS handling, date marking, shellstock tags, sanitation, illness complaints, or hold/release status affects execution.
    specialty_specific_exceptions:
    - Do not translate public guidance into autonomous food-safety release, variance approval, or regulatory interpretation
      authority.
  - category: meat-poultry-traceability-and-retail-boundary
    retrieval_policy: Use FSIS retail meat guidance and tenant meat-department playbooks when meat, poultry, grind logs, retail-exemption
      limits, or Listeria-sensitive deli handling affects the workflow.
    specialty_specific_exceptions:
    - Treat missing grind, lot, supplier, or retail-exemption evidence as a blocker and route to food-safety, meat, quality,
      or compliance owners.
  - category: pricing-order-refund-and-customer-commitments
    retrieval_policy: Use NIST and FTC sources with tenant POS, OMS, promotion, substitution, markdown, return, and service-recovery
      policies whenever price, order, payment, refund, or customer-impact facts affect fresh execution.
    specialty_specific_exceptions:
    - Do not override a scale price, unit price, markdown, substitution credit, refund, or service-recovery policy without
      delegated authority.
  - category: identity-lot-and-traceability
    retrieval_policy: Use FDA traceability and GS1 sources with tenant lot, PLU, UPC, GTIN, scale-label, receiving, and recall
      repositories to keep fresh evidence tied to the correct item and department.
    specialty_specific_exceptions:
    - Do not infer lot, PLU, UPC, GTIN, or scale-label identity from partial or stale records.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the FDA, USDA FSIS, NIST, FTC, and GS1 baseline above for public workflow, safety, pricing, order, traceability,
      and evidence handling.
    - Inject tenant store format, department scope, service model, authority matrix, jurisdiction, retrieval hooks, pricing,
      refund, food-safety, recall, shrink, and loss-prevention policies through orchestrator-controlled retrieval.
    - Escalate when product category, department, jurisdiction, order channel, payment method, customer type, or tenant policy
      materially changes the safe answer.
  specialty_specific_exceptions:
  - Keep the lane on fresh-department execution, evidence sufficiency, exception packaging, and owner routing rather than
    on food-safety, pricing, refund, fraud, or executive decisions.
  - Do not treat a department manager's verbal status as sufficient completion evidence when system-of-record or required
    log evidence is missing.
  - Do not treat a customer complaint as resolved when food-safety, lot, recall, foreign-material, or fraud signals remain
    unresolved.
  source_baseline_version: '2026-04-08'
  next_review_due_at: '2026-07-12'
tenant_adaptation_policy_runtime:
  allowed: true
  allowed_types:
  - configuration
  - retrieval
  - approved_tuning
  approval_required: true
  rollback_required: true
  cross_tenant_sharing_allowed: false
notes:
- This overlay stays specialized around fresh-department execution in grocery and food retail rather than general store operations.
- Runtime remains specification-based until an explicit trusted built specialist is promoted through repository process.
