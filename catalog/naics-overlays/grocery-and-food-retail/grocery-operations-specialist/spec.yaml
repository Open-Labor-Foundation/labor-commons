knowledge_baseline:
  authority_sources:
  - source_id: fda-food-code-2022
    title: Food Code 2022
    publisher: U.S. Food and Drug Administration
    source_type: retail-food-safety-operating-reference
    source_class: Safety, fraud, or loss-prevention handling guidance
    location: https://www.fda.gov/food/fda-food-code/food-code-2022
    authority_reason: FDA Food Code is the public model retail food safety code used by many jurisdictions. It is authoritative
      for grocery operational stop conditions involving time and temperature control, contamination, employee health, sanitation,
      and saleability boundaries.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: fda-retail-program-standards
    title: Voluntary National Retail Food Regulatory Program Standards
    publisher: U.S. Food and Drug Administration
    source_type: official-retail-food-program-guidance
    source_class: Consumer-protection or public hospitality workflow guidance
    location: https://www.fda.gov/food/retail-food-protection/voluntary-national-retail-food-regulatory-program-standards
    authority_reason: FDA's Retail Program Standards provide official public guidance for retail food inspection programs,
      risk-factor control, corrective action, complaint readiness, and documentation expectations that shape grocery operational
      evidence handling.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nist-handbook-130-current
    title: NIST Handbook 130 - Uniform Laws and Regulations in the Areas of Legal Metrology and Fuel Quality
    publisher: National Institute of Standards and Technology
    source_type: public-operating-standard
    source_class: Pricing, booking, refund, or guest-service operating references
    location: https://www.nist.gov/pml/owm/nist-handbook-130-current-edition
    authority_reason: NIST Office of Weights and Measures publishes the public baseline used by weights-and-measures jurisdictions
      for retail price verification, unit pricing, method of sale, package labeling, and ecommerce price evidence.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-mail-internet-telephone-order-rule
    title: Mail, Internet, or Telephone Order Merchandise Rule
    publisher: Federal Trade Commission
    source_type: consumer-protection-guidance
    source_class: Pricing, booking, refund, or guest-service operating references
    location: https://www.ftc.gov/business-guidance/resources/selling-internet-prompt-delivery-rules
    authority_reason: FTC guidance is authoritative for online or phone order commitments, shipment timing, delay notices,
      cancellation, and prompt refund expectations, including grocery ecommerce fulfillment and customer-impact exceptions.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: usda-fns-snap-retailer-training
    title: SNAP Retailer Training Information
    publisher: USDA Food and Nutrition Service
    source_type: official-program-operating-guidance
    source_class: Pricing, booking, refund, or guest-service operating references
    location: https://www.fns.usda.gov/snap/retailer/training-information
    authority_reason: USDA FNS administers SNAP retailer authorization and provides official training materials for retailer
      transaction, eligible item, equipment, coupon, and compliance expectations that constrain grocery operations involving
      EBT/SNAP tender.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: usda-fns-snap-fraud-prevention
    title: SNAP Fraud Prevention
    publisher: USDA Food and Nutrition Service
    source_type: official-program-integrity-guidance
    source_class: Safety, fraud, or loss-prevention handling guidance
    location: https://www.fns.usda.gov/snap/fraud
    authority_reason: USDA FNS is authoritative for SNAP program integrity and retailer fraud handling. Its guidance defines
      why suspected trafficking, ineligible sales, EBT abuse, and scam indicators must route to program-integrity or loss-prevention
      owners rather than routine store execution.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: fda-recalls-market-withdrawals
    title: Recalls, Market Withdrawals, & Safety Alerts
    publisher: U.S. Food and Drug Administration
    source_type: food-safety-recall-reference
    source_class: Safety, fraud, or loss-prevention handling guidance
    location: https://www.fda.gov/safety/recalls-market-withdrawals-safety-alerts
    authority_reason: FDA publishes recall, withdrawal, and safety alert records for FDA-regulated products, including foods
      sold through grocery stores. It is authoritative for stop-sale, substitution, customer-contact, and saleability blockers.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 30
    decay_policy: review_required_after_interval
    status: active
  - source_id: fsis-recalls
    title: Recalls and Public Health Alerts
    publisher: USDA Food Safety and Inspection Service
    source_type: meat-poultry-egg-recall-reference
    source_class: Safety, fraud, or loss-prevention handling guidance
    location: https://www.fsis.usda.gov/recalls
    authority_reason: USDA FSIS is the federal public health authority for meat, poultry, and certain egg product recalls.
      Its recall and public health alert records are authoritative for grocery operations involving those departments and
      product categories.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 30
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-general-specifications
    title: GS1 General Specifications Standard
    publisher: GS1
    source_type: industry-standard
    source_class: Vendor-neutral workflow references that clarify evidence handling, terminology, and safe boundary behavior
    location: https://ref.gs1.org/standards/genspecs/24.0.0/
    authority_reason: GS1 is the recognized global standards body for product identifiers and barcodes. Its specifications
      are authoritative for UPC, GTIN, barcode, coupon, refund receipt, and record-linkage terminology across grocery shelf,
      POS, OMS, inventory, receiving, and recall workflows.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: pci-dss
    title: PCI DSS
    publisher: PCI Security Standards Council
    source_type: recognized-payment-security-standard
    source_class: Safety, fraud, or loss-prevention handling guidance
    location: https://www.pcisecuritystandards.org/standards/pci-dss/
    authority_reason: PCI SSC is the recognized standards body for payment-card security. PCI DSS is authoritative for protecting
      cardholder data when grocery operations touch receipts, payment tokens, payment exceptions, chargebacks, or fraud-sensitive
      service tickets.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: store-and-ecommerce-order-execution
    retrieval_policy: Use FTC, tenant OMS/POS, CRM, service desk, and fulfillment records first for pickup, delivery, delay,
      cancellation, substitution, and refund-intake facts.
    specialty_specific_exceptions:
    - Escalate when cancellation, refund timing, service recovery, delivery failure, or payment dispute exceeds delegated
      operations authority.
  - category: pricing-promotion-tender-and-item-identity
    retrieval_policy: Use NIST, USDA FNS, GS1, tenant item-master, POS, pricing, promotion, loyalty, and tender records to
      identify product, price, unit, coupon, and EBT/SNAP blockers.
    specialty_specific_exceptions:
    - Do not approve price, promotion, coupon, EBT/SNAP, rain-check, or refund exceptions without authorized owner approval.
  - category: food-safety-recall-and-loss-prevention
    retrieval_policy: Use FDA, FSIS, USDA FNS fraud, PCI DSS, tenant food-safety, recall, stop-sale, payment, and loss-prevention
      records for safety or fraud-sensitive work.
    specialty_specific_exceptions:
    - Do not release product, adjudicate fraud, or expose payment data when the controlling record belongs to food safety,
      program integrity, payment security, or loss prevention.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the FDA, NIST, FTC, USDA FNS, FSIS, GS1, and PCI baseline above for public workflow, evidence, terminology, safety,
      tender, payment, and exception boundaries.
    - Inject tenant SOPs, banner policy, jurisdictional rules, store roles, service model, operating constraints, refund thresholds,
      substitution rules, food-safety procedures, loss-prevention routing, and record locations only through runtime retrieval.
    - Escalate when jurisdiction, product category, customer type, tender type, channel, franchise model, or tenant policy
      materially changes whether work can advance.
  specialty_specific_exceptions:
  - Keep the lane on grocery operational execution and evidence sufficiency rather than category pricing, final food safety,
    fraud, legal, or guest-services remedy ownership.
  - Treat missing POS, OMS, inventory, item-master, receiving, service desk, refund, recall, or food-safety records as blockers
    when they could change the state transition.
  - Do not infer product identity from partial SKU, UPC, GTIN, PLU, lot, label, or screenshot evidence when recall, pricing,
    tender, or customer-impact handling depends on exact identity.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-07-12'
materialization:
  execution_target: commons-crew
  runtime_strategy: specification-based
  trusted_built_status: not_committed
  required_task_metadata:
  - industry-overlays::grocery-and-food-retail::grocery-operations-specialist queue slug
  - workflow phase execution-processing-and-fulfillment
  - retail-consumer-and-hospitality industry profile
  - tenant authority matrix for pricing, refund, food-safety, fraud, payment, and policy exceptions
  - record retrieval hooks for POS, OMS, CRM, service desk, inventory, item master, receiving, recall, food-safety, and loss-prevention
    systems
  tenant_required_facts:
  - tenant service model, store format, banner, jurisdiction, business unit, department, channel, and program context
  - customer type, order status, payment state, tender type, substitution policy, delivery or pickup window, and service policy
  - current product identity, inventory state, pricing and promotion rules, recall or stop-sale status, refund limits, and
    safety/security handling limits
  promotion_conditions:
  - usage proves common enough to justify a maintained trusted build
  - runtime instrumentation confirms safe evidence retrieval, refusal, and handoff behavior
  - governance signs off on source refresh automation and tenant-specific authority injection
  - a separate PR commits a retained implementation and updates readiness evidence
