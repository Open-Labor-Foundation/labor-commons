knowledge_baseline:
  source_baseline_version: '2026-04-13'
  source_classes:
  - class: Agriculture, environmental, or natural-resource guidance
    rationale: USDA FSA, USDA RMA, USDA NASS, USDA NRCS, USDA AMS, EPA, and FDA public sources define agricultural records,
      program and environmental reporting expectations, production-cycle terminology, and evidence constraints.
  - class: Production-cycle, traceability, or food-safety workflow references
    rationale: FDA FSMA traceability and produce-safety rules, RMA crop-insurance handbooks, FSA acreage reporting guidance,
      and AMS organic rules define production-cycle records, lot or traceability concepts, and food-safety or certification
      evidence boundaries.
  - class: Seasonal, land, or livestock operating standards
    rationale: FSA acreage reporting, RMA crop insurance, NRCS conservation standards, EPA CAFO/NPDES guidance, and organic
      crop and livestock rules define how crop year, season, land, conservation, and livestock context change the reporting
      workflow.
  source_selection_approach: 'Use primary agency rules, manuals, and official guidance first for

    jurisdiction, program, submission, and recordkeeping claims. Use recognized

    public standards such as the GHG Protocol only for metric-definition and

    disclosure framing when the tenant has confirmed that standard applies.

    Tenant systems and current source records remain required before preparing

    operation-specific outputs or any submission-ready package.

    '
