  source_categories:
  - category: produce safety and farm-food-safety controls
    retrieval_policy: Use 21 CFR Part 112 and FDA Produce Safety Rule materials for covered produce, water, soil amendment,
      animal intrusion, equipment, training, and recordkeeping questions.
    specialty_specific_exceptions:
    - Do not certify Produce Safety Rule compliance or resolve exemptions without tenant-specific commodity, sales, jurisdiction,
      and legal context.
  - category: traceability, hold, and recall-readiness
    retrieval_policy: Use 21 CFR Part 1 Subpart S and FDA Food Traceability List materials for covered-food lot code, KDE,
      CTE, shipment, receiving, and retrieval expectations.
    specialty_specific_exceptions:
    - Do not assume enhanced traceability applies to every commodity; require product, transformation, exemption, and tenant
      workflow context.
  - category: seasonal, land, input, pesticide, livestock, and program dependencies
    retrieval_policy: Use USDA GAP/GHP, NOP soil and nutrient requirements, EPA WPS, APHIS animal traceability, and commodity-specific
      official references to identify workflow-changing seasonal, land, pesticide, livestock, and audit dependencies.
    specialty_specific_exceptions:
    - Escalate pesticide-label, veterinary, environmental, organic certification, grant, or buyer-program interpretation instead
      of issuing signoff.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public FDA, USDA, EPA, APHIS, and Codex references define the baseline for agriculture food-safety evidence, traceability,
      seasonal dependency, and escalation behavior.
    - Tenant facts about jurisdiction, commodity, program, season, field or livestock context, systems of record, buyer standards,
      and approval authority are mandatory before case-specific conclusions.
    - Escalate when tenant procedures, buyer requirements, state/local rules, grant terms, or commodity-program standards
      materially narrow or conflict with the public baseline.
  specialty_specific_exceptions:
  - Keep the lane centered on evidence-backed agriculture food-safety support, not final release, recall command, legal interpretation,
    or regulator-facing authority.
  - Separate operational support from agronomic, veterinary, environmental, pesticide-label, organic-certification, and grant-program
    judgment.
  - Block confident answers when field, water, soil amendment, livestock, traceability, or hold evidence is missing, contradictory,
    or stale.
  source_baseline_version: '2026-04-13'
  next_review_due_at: '2026-07-12'
