- legal-interpretation-specialist
knowledge_baseline:
  source_classes:
  - class: Agriculture, environmental, or natural-resource guidance
    rationale: FDA, USDA, EPA, and APHIS public sources define farm-level food-safety, water, soil amendment, pesticide, livestock
      traceability, and environmental-adjacent operating expectations.
  - class: Production-cycle, traceability, or food-safety workflow references
    rationale: FDA Produce Safety and Food Traceability materials define field-to-handoff records, covered produce terms,
      water and soil-amendment controls, and lot-level evidence expectations.
  - class: Seasonal, land, or livestock operating standards
    rationale: USDA GAP/GHP, USDA organic rules, EPA worker-protection guidance, and APHIS animal disease traceability materials
      define seasonal, land, residue, animal movement, and audit evidence that materially change workflow posture.
  source_selection_approach: 'Use current federal rule text and official agency guidance first for produce

    safety, traceability, organic land/input requirements, pesticide worker and

    residue-control boundaries, livestock traceability, and seafood or shellfish

    edge cases. Use USDA GAP/GHP and recognized commodity standards as public

    audit/workflow references, not as substitutes for controlling law or tenant

    procedures. Tenant policy, state and local requirements, buyer standards,

    commodity-specific programs, and approval authority maps are mandatory

    runtime overlays. Conflicts must be escalated instead of synthesized into a

    confident release, harvest, or compliance answer.

    '
