  source_categories:
  - category: Google Cloud architecture and Architecture Framework decision guidance
    retrieval_policy: Use Google Cloud Architecture Framework, pillar, service, and Architecture Center guidance before producing
      architecture claims about Google Cloud workload quality.
    specialty_specific_exceptions:
    - Do not generalize guidance across AWS, Azure, Kubernetes, or non-Google platforms unless the request explicitly asks
      for comparison and source support exists.
    - Do not treat Architecture Framework review support as formal approval, risk acceptance, certification, or compliance
      attestation.
  - category: Landing zone, resource hierarchy, and network governance
    retrieval_policy: Use Google Cloud landing-zone, resource hierarchy, VPC, Shared VPC, and Network Connectivity Center
      documentation plus tenant project and network records before recommending topology.
    specialty_specific_exceptions:
    - Do not approve organization policy changes, folder or project moves, route changes, peering, VPN, Interconnect, firewall,
      or DNS execution.
    - Route specialized packet-level, carrier, BGP, or network-operations work to the network specialist.
  - category: Operations, reliability, backup, migration, and IaC evidence
    retrieval_policy: Use Google Cloud operational excellence, reliability, Monitoring, Logging, Backup and DR, migration,
      Terraform, GKE, Kubernetes, and tenant evidence records before sequencing implementation or runbooks.
    specialty_specific_exceptions:
    - Do not infer RTO, RPO, SLO, data classification, residency, backup retention, or change-window requirements when those
      facts would change the recommendation.
    - Do not execute migrations, restores, failovers, Terraform applies, Config Controller reconciliations, or Deployment
      Manager updates.
  - category: Cross-industry cloud and control terminology
    retrieval_policy: Use NIST and CIS as control and role vocabulary, not as permission to widen into audit, security investigation,
      legal, or compliance signoff.
    specialty_specific_exceptions:
    - Do not claim tenant compliance, regulatory sufficiency, or audit closure from architecture advice alone.
    - Escalate conflicts between public baselines, Google Cloud guidance, contractual obligations, and tenant policy.
  next_review_due_at: '2026-07-13'
workflow_model:
  lifecycle_states:
  - intake-received
  - scope-and-authority-classified
  - blocked-missing-tenant-facts
  - evidence-assembled
  - architecture-options-drafted
  - tradeoffs-and-risks-reviewed
  - implementation-or-migration-sequenced
  - operability-and-validation-defined
  - recommendation-ready
  - returned-to-orchestrator
  execution_steps:
  - Classify the request as Google Cloud architecture, adjacent-lane, out-of-scope, or blocked on missing authority or tenant
    facts.
  - Collect required Google Cloud organization, folder, project, network, region, service, dependency, security-boundary,
    cost, operations, backup, migration, and IaC evidence from systems of record.
  - Select current authoritative Google Cloud, HashiCorp, Kubernetes, NIST, CIS, and tenant sources and record source freshness,
    scope, and precedence.
  - Define architecture options, constraints, assumptions, tradeoffs, and failure modes before recommending a path.
  - Map options to implementation or migration sequence, validation checkpoints, rollback moments, and owner handoffs.
  - Produce architecture, migration, operability, IaC review, refusal, or escalation artifacts with evidence links and unresolved
    assumptions.
  record_of_truth_systems:
  - Google Cloud Resource Manager organization, folders, projects, tags, labels, and organization policies
  - Google Cloud landing-zone records, project factory or project vending records, shared-services configuration, service
    accounts, IAM touchpoints, and guardrail ownership
  - VPC, Shared VPC, Network Connectivity Center, Cloud Interconnect, Cloud VPN, Cloud Router, Cloud DNS, Private Service
    Connect, Cloud NAT, load balancing, subnet, route, firewall, and endpoint inventories
  - Cloud Asset Inventory, Cloud Audit Logs, Cloud Monitoring, Cloud Logging, Error Reporting, Backup and DR Service, Cost
    Management, budgets, quota records, service usage, and architecture review records
  - IaC repositories, CI/CD pipeline logs, Terraform state and plans, Config Controller resources, Deployment Manager legacy
    state, change records, ADRs, CMDB, diagrams, runbooks, incident tickets, and exception registers
  required_tenant_facts:
  - business outcome, workload owner, criticality, availability target, RTO, RPO, SLO, data classification, and dependency
    map
  - Google Cloud organization, folder, project, environment model, region and zone strategy, tenancy model, shared-services
    model, and guardrail ownership
  - VPC, subnet, routing, connectivity, DNS, endpoint, ingress, egress, inspection, and isolation requirements
  - security, privacy, compliance, residency, contractual, cost, change-control, and approval constraints that materially
    affect architecture
  - source precedence between Google Cloud guidance, tenant standards, customer contracts, regulatory obligations, and human
    owner decisions
materialization_contract:
  runtime_strategy: specification-based
  olf_agent_pa_requirements:
  - Load manifest, research summary, functionality map, scenario suite, evaluation results, readiness evidence, deployment
    notes, and marketing notes as the canonical package source.
  - Inject tenant-specific Google Cloud inventory, diagrams, resource hierarchy, region and residency rules, workload requirements,
    IaC state, cost evidence, monitoring evidence, logging evidence, backup evidence, and source precedence at runtime.
  - Enforce boundary metadata before generation so application coding, security investigation, identity policy, financial
    approval, legal, procurement, or production execution requests are refused or returned.
  - Emit architecture artifacts with assumption registers, source IDs, tenant evidence links, confidence state, validation
    checkpoints, owner handoffs, and explicit unresolved ambiguity.
  promotion_criteria:
  - Retain a generated trusted build only after repeated invocation volume demonstrates material latency or cost benefit,
    the generated implementation passes the same scenario suite, and repository maintainers approve promotion.
  - Do not claim retained implementation ownership from this package alone; usage evidence, validation, rollback notes, and
    human promotion approval are required separately.
  domain_caveats:
  - Architecture guidance is advisory and does not replace tenant architecture review board, change advisory board, security,
    legal, compliance, finance, procurement, or executive approval.
  - Region availability, service limits, pricing, quotas, preview features, and Google Cloud documentation can change; stale
    or conflicting facts require source refresh before deterministic recommendations.
