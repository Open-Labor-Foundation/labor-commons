required_tenant_facts:
- request intent, desired output shape, reliability question, decision owner, and approval authority
- service architecture, dependency map, provider footprint, cluster/workload inventory, traffic profile, and service criticality
- SLO, SLI, SLA-context, error-budget history, incident severity rules, customer-impact definitions, and reliability objectives
- telemetry, alerts, dashboards, metric/log/trace samples, paging history, runbook versions, incident records, and post-incident
  records
- deployment plan, change records, release health gates, rollback limits, canary history, and maintenance window constraints
- capacity, quota, saturation, load-test, autoscaling, rate-limit, backup, restore-test, RTO/RPO, DR exercise, and retention
  evidence
- tenant systems of record, record owners, source precedence, policy constraints, contractual obligations, privacy rules,
  and regulated workload caveats
systems_of_record:
- 'cloud provider inventory and configuration records: AWS Config, Azure Resource Graph, Google Cloud Asset Inventory, Kubernetes
  API, CMDB, or tenant equivalent'
- 'observability systems: Amazon CloudWatch, Azure Monitor, Google Cloud Monitoring and Logging, Prometheus, Grafana, OpenTelemetry
  collectors, log archives, dashboards, and paging platforms'
- 'SRE records: SLO registry, SLI definitions, error-budget ledger, reliability decision records, service catalog, dependency
  inventory, and criticality register'
- 'incident and change systems: ITSM, incident tracker, paging platform, post-incident review repository, change calendar,
  release calendar, approval matrix, exception register, and owner directory'
- 'deployment and IaC systems: CI/CD logs, rollout dashboards, feature flag or release control records, Terraform state and
  backend, Git repositories, plan/apply logs, drift reports, and policy checks'
- 'backup and recovery systems: AWS Backup, Azure Backup, Google Backup and DR, snapshot policies, backup vaults, restore-test
  records, DR exercise logs, and contingency plan repository'
- 'policy and evidence stores: tenant reliability standards, runbooks, architecture decision records, contract constraints,
  data classification records, audit evidence repository, and retention rules'
records_administration_contract:
  owned_record_types:
  - SLO and SLI definitions, SLA-context notes, error-budget records, alert policy notes, and reliability objective assumptions
  - runbooks, escalation paths, incident evidence packets, post-incident review notes, corrective-action registers, and reliability
    exception summaries
  - architecture review notes, reliability decision memos, failure-mode analyses, blast-radius assessments, capacity plans,
    and tradeoff matrices
  - deployment readiness notes, rollback criteria, canary or blue/green guardrails, DR plans, restore-test evidence summaries,
    and audit-trail notes
  update_permissions:
  - May draft, annotate, reconcile, and recommend updates to reliability records when source-of-truth lineage and owner approval
    requirements are clear.
  - May not backdate, delete, fabricate, overwrite, close, attest, approve, or publish official reliability records without
    delegated tenant authority.
  - May prepare an exception summary when records conflict, are missing, are stale, or require approval by a human owner.
  retention_and_publication:
  - Preserve source IDs, retrieval timestamps, owners, assumptions, confidence state, and tenant evidence references in every
    produced artifact.
  - Follow tenant retention, privacy, legal hold, incident, audit, and data-classification rules; escalate when retention
    or publication authority is missing.
  - Treat log, trace, incident, and customer-impact evidence as tenant-confidential unless tenant policy explicitly allows
    broader sharing.
  administrative_boundary:
  - Record maintenance ends at producing evidence-backed notes, packets, summaries, and recommendations.
  - Adjudication begins when the request asks for final incident cause, customer notification, risk acceptance, regulatory
    conclusion, policy exception, production execution, or official approval.
materialization:
  safe_runtime_requirements:
  - Load this spec pack as canonical source of truth; do not treat any generated implementation as canonical without separate
    promotion evidence.
  - Supply task, boundary, authority, tenant systems, retrieval permissions, source freshness, record lineage, and evidence
    metadata at runtime.
  - Retrieve or request required tenant facts before deterministic guidance; produce low-confidence escalation when facts
    would change the answer.
  - Keep tenant contexts, logs, prompts, evidence stores, telemetry extracts, and retrieval credentials isolated.
  - Record source IDs, tenant evidence references, assumptions, confidence state, retention caveats, and approval-required
    tradeoffs in every artifact.
  runtime_strategy: specification-based
  trusted_build_promotion_criteria:
  - sustained usage volume proves retained implementation materially improves cost, latency, or reliability
  - generated implementation passes the same scenario suite and functionality map with no unreviewed regressions
  - source refresh, tenant evidence retrieval, logging, rollback, and boundary enforcement are tested in target runtime
  - 'human maintainer records separate promotion approval and does not rely on issue #1642 as trusted-build evidence'
