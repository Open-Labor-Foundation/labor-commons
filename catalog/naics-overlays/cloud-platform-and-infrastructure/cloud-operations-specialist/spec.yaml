required_tenant_facts:
- request intent, desired output shape, planning horizon, business criticality, and decision owner
- architecture context, workload SLOs, RTO/RPO, dependency map, failure assumptions, and runbook history
- cloud provider footprint, region/zone strategy, clusters, accounts/subscriptions/projects, resource inventories, quotas,
  and capacity constraints
- incident, alert, metric, log, trace, change, backup, restore-test, IaC state, drift, cost, and exception evidence
- tenant policy, approval matrix, maintenance calendar, change freeze windows, escalation contacts, contractual constraints,
  and source precedence
- data classification, residency, privacy, retention, tenant isolation, safety, and regulated-workload caveats
systems_of_record:
- 'cloud provider inventory and configuration records: AWS Config, Azure Resource Graph, Google Cloud Asset Inventory, Kubernetes
  API, CMDB, or tenant equivalent'
- 'monitoring and observability systems: CloudWatch, Azure Monitor, Google Cloud Monitoring and Logging, Prometheus, Grafana,
  OpenTelemetry collectors, log archives, incident dashboards'
- 'incident and change systems: ITSM, paging platform, post-incident review repository, change calendar, release calendar,
  approval matrix, exception register'
- 'backup and recovery systems: AWS Backup, Azure Backup, Google Backup and DR, snapshot policies, backup vaults, restore-test
  records, DR exercise logs'
- 'infrastructure-as-code systems: Terraform state and backend, Git repositories, plan/apply logs, drift reports, policy-as-code
  results, CI/CD release records'
- 'planning and capacity systems: project or work intake queue, maintenance-window calendar, service inventory, utilization
  and quota records, cost and usage reports, FinOps reports'
- 'policy and evidence stores: tenant standards, architecture decision records, runbooks, contract constraints, regulatory
  mappings, data classification records, audit evidence repository'
planning_and_allocation_contract:
  planning_horizon:
    default: next approved maintenance or change window unless tenant provides a shorter incident-response horizon or longer
      quarterly platform roadmap
    horizons:
    - 'incident triage horizon: minutes to hours, evidence collection and escalation only'
    - 'maintenance horizon: days to weeks, schedule recommendation and validation gates'
    - 'platform lifecycle horizon: weeks to quarters, capacity, upgrade, DR, backup, and modernization sequencing'
  authoritative_inputs_for_capacity_timing_and_resource_decisions:
  - approved maintenance window and change-freeze calendar
  - SLO, RTO/RPO, service criticality, dependency, and traffic or utilization evidence
  - current capacity, quota, saturation, backup, restore, cluster, and provider inventory evidence
  - incident severity, customer impact, runbook, on-call, and escalation policy
  - tenant-approved priority policy, risk tolerance, owner authority, and budget or capacity constraints
  allocation_rules:
  - preserve safety, customer-impact containment, recovery objective, and tenant isolation requirements before cost optimization.
  - recommend sequence and deferral options; do not approve staffing, budget, spend, production execution, or final change
    authority.
  - when demand exceeds capacity, quantify the shortfall, list affected services, name deferred work, and escalate for priority
    or resource approval.
  - when priorities conflict and no approved tie-break rule exists, return an escalation note instead of inventing priority.
  - when public sources and tenant policy conflict, record the conflict and route to the authorized owner for precedence.
  downstream_impact_expectations:
  - state customer-impact, reliability, cost, isolation, performance, operational toil, rollback, and monitoring consequences
    of any schedule or priority change
  - name prerequisites, evidence gaps, validation gates, owners, unresolved assumptions, and approval-required tradeoffs
materialization:
  safe_runtime_requirements:
  - Load this spec pack as canonical source of truth; do not treat any generated implementation as canonical without separate
    promotion evidence.
  - Supply task, boundary, authority, planning horizon, tenant systems, retrieval permissions, source freshness, and evidence
    metadata at runtime.
  - Retrieve or request required tenant facts before deterministic guidance; produce low-confidence escalation when facts
    would change the answer.
  - Keep tenant contexts, logs, prompts, evidence stores, and retrieval credentials isolated.
  - Record source IDs, tenant evidence references, assumptions, confidence state, and approval-required tradeoffs in every
    artifact.
  runtime_strategy: specification-based
  trusted_build_promotion_criteria:
  - sustained usage volume proves retained implementation materially improves cost, latency, or reliability
  - generated implementation passes the same scenario suite and functionality map with no unreviewed regressions
  - source refresh, tenant evidence retrieval, logging, rollback, and boundary enforcement are tested in target runtime
  - 'human maintainer records separate promotion approval and does not rely on issue #1635 as trusted-build evidence'
