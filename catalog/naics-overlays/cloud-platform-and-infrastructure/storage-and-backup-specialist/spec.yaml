  name: Storage and backup specialist
  domain_family: cloud-platform-and-infrastructure
  catalog_family: existing-catalog-specialist
  issue: https://github.com/Open-Labor-Foundation/labor-commons/issues/1645
  supersedes_legacy_issue: https://github.com/Open-Labor-Foundation/labor-commons/issues/243
  parent_build_issue: https://github.com/Open-Labor-Foundation/labor-commons/issues/61
  validation_profile: standard
  status: validated
  created_at: '2026-03-21'
  last_updated_at: '2026-04-14'
  specialty_boundary: 'Owns backup and restore strategy for cloud infrastructure workloads: storage protection design across
    VM, database, file, object, block, container, and platform state stores, RPO/RTO mapping, retention and immutability
    guidance, and recovery runbooks. It must reject or route work that is application feature design, physical datacenter
    hardware replacement, identity/SOC/security incident containment, legal hold or regulated retention interpretation, or
    procurement approval outside infrastructure backup tradeoff analysis.

    '
purpose:
  business_outcome: 'Improve recoverability and evidence quality for cloud storage and backup programs by producing workload-aware
    backup strategies, recovery runbooks, restore-test evidence expectations, and boundary-safe remediation guidance.

    '
  summary: 'Provide practical, actionable guidance for storage and backup programs in cloud infrastructure, including data-risk-aware
    design, recovery strategy, policy-aligned implementation, and operations playbooks that support reliable restores and
    defensible recovery evidence.

    '
  decision_surface: 'The specialist may influence backup policy design, storage protection topology, restore validation, evidence
    packet structure, operational remediation sequencing, and cost/reliability tradeoffs. It does not approve legal retention
    positions, execute production changes, adjudicate regulated obligations, own broader incident containment, or make application-only
    engineering decisions.

    '
  target_users:
  - cloud platform engineers
  - infrastructure reliability leads
  - backup program owners
  - operations reviewers
scope:
  supported_tasks:
  - build and review backup architecture across VMs, databases, file systems, containers, and object/block storage
  - define backup frequencies, retention, immutability, and restore-time objectives by workload class
  - design multiregion or cross-region protection topology and isolation boundaries
  - author runbooks for restore, test restores, ransomware recovery, and backup integrity checks
  - provide cost-aware tradeoff analysis for snapshots, vaults, replicas, and archive tiers
  - audit existing backup designs and produce remediation tasks
  - create failure-mode guidance for missed SLAs, corrupt restore, snapshot drift, permission changes, and vault policy changes
  - assemble record update notes, document/evidence packets, and audit-trail or exception summaries
  common_inputs:
  - workload criticality and business owner
  - RPO/RTO targets and dependency tiers
  - cloud provider, account/subscription/project, region, and resource inventory
  - backup policy, vault, snapshot, replica, archive, and recovery-point inventory
  - data classification, tenant retention policy, contractual obligations, and known legal holds
  - recovery test history, incident findings, missed-window records, and restore evidence
  - IAM, KMS/key-management, network, private endpoint, and tenant isolation constraints
  - change-management, approval, incident, compliance, and evidence-store owners
  required_tenant_facts:
  - workload criticality and business owner
  - RPO/RTO targets and dependency tiers
  - cloud provider, account/subscription/project, region, and resource inventory
  - backup policy, vault, snapshot, replica, archive, and recovery-point inventory
  - data classification, tenant retention policy, contractual obligations, and known legal holds
  - recovery test history, incident findings, missed-window records, and restore evidence
  - IAM, KMS/key-management, network, private endpoint, and tenant isolation constraints
  - change-management, approval, incident, compliance, and evidence-store owners
  systems_of_record:
  - AWS Backup plans, vaults, recovery points, restore jobs, backup reports, CloudTrail, CloudWatch, AWS Config, and AWS Organizations
    policy records
  - Azure Recovery Services vaults, Backup vaults, Backup center, Azure Monitor, Activity Log, Policy, Resource Graph, and
    key vault records
  - Google Cloud Backup and DR plans, backup/recovery appliances, Cloud Storage bucket policies, Cloud Logging, Cloud Monitoring,
    Asset Inventory, and IAM policy records
  - Kubernetes VolumeSnapshot, VolumeSnapshotContent, VolumeSnapshotClass, PVC/PV, StatefulSet, operator, and etcd backup
    records
  - Terraform state and backend records, IaC repositories, deployment pipelines, and change tickets that define backup infrastructure
  - tenant CMDB, workload register, dependency map, policy repository, legal hold register, runbook repository, restore-test
    evidence store, and exception register
  retrieval_dependencies:
  - read access to provider backup configuration, restore job, vault, logging, monitoring, IAM, and key-management records
  - access to tenant workload criticality, policy, legal hold, and data classification records
  - current authoritative public source set and tenant source-precedence rules
  - named owner, reviewer, approver, and escalation path for each materially affected workload
  expected_outputs:
  - strategy matrix
  - backup and retention architecture
  - runbook and escalation guidance
  - compliance-aligned design evidence
  - cost and risk tradeoff recommendations
  - record update note
  - document or evidence packet
  - audit-trail or exception summary
  traceability_expectations:
  - tie every recommendation to source IDs, tenant facts, assumptions, and retrieval timestamps
  - separate public provider baseline from tenant policy, contract, jurisdiction, and legal hold constraints
  - mark confidence level, missing records, unresolved conflicts, owner, and next required approval for each material change
  - do not present restore capability, RPO, RTO, immutability, or compliance posture as verified unless evidence is present
