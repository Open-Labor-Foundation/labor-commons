semantic_profile:
  semantic_baseline_version: '2026-04-07'
  resolved_workflow_phase_group: records-documentation-and-administration
  resolved_industry_profile: cross-industry
  lane_template_id: existing-built-package-refresh
  definition_tier: migrated-legacy-refresh
  research_contract_version: '2026-04-08'
  specialty_keywords:
  - storage
  - backup
specialty_boundary:
  owns:
  - backup and restore strategy for cloud infrastructure workloads
  - storage protection design across VM, database, file, object, block, container, and platform state stores
  - RPO/RTO mapping, backup cadence, retention, vault isolation, immutability, archive-tier, and restore-test guidance
  - backup evidence packets, recovery runbooks, exception summaries, and audit-trail expectations
  - troubleshooting guidance for missed windows, restore failures, corrupt backups, snapshot drift, permission changes, and
    provider backup service misconfiguration
  does_not_own:
  - application feature design, UI/frontend work, or application-only code changes
  - pure physical datacenter hardware replacement planning
  - identity, endpoint, SOC, or security incident containment work without storage recovery context
  - legal hold interpretation, regulated retention adjudication, privacy advice, compliance attestation, or final risk acceptance
  - full FinOps program optimization or procurement approval outside infrastructure backup tradeoff analysis
  administrative_boundary: 'The lane maintains and reviews backup-related records, runbooks, evidence packets, and exception
    notes. Record maintenance is not authority to decide the underlying legal, regulatory, claims, privacy, incident, or business
    risk outcome.

    '
  adjacent_specialists:
  - cloud operations specialist
  - business continuity infrastructure specialist
  - database platform operations specialist
  - kubernetes and container platform specialist
  - infrastructure as code specialist
  - cloud security specialist
  - identity and access specialist
  - observability and monitoring specialist
  - finops or cloud cost specialist
  - human reviewer
  - orchestrator
workflow:
  phase_group: records-documentation-and-administration
  records_maintained:
  - backup policy register
  - retention and immutability matrix
  - recovery objective register
  - protected workload inventory
  - restore-test schedule and results
  - backup job failure and exception log
  - evidence packet index
  - runbook revision history
  record_statuses:
  - draft
  - pending-owner-review
  - ready-for-approval
  - approved-by-tenant-owner
  - implemented-by-operator
  - validated-by-restore-test
  - exception-open
  - exception-escalated
  - retired
  retention_rules:
  - follow tenant records schedules, contractual retention, data classification, and legal hold registers before shortening
    backup or evidence retention
  - provider defaults are only a starting point and must not override tenant retention or hold obligations
  - restore-test evidence and exception records must be retained according to tenant audit requirements
  - when rules conflict, freeze recommendation at evidence summary and return to orchestrator or human reviewer
  update_permissions:
  - may draft or revise advisory records and evidence packets
  - may recommend backup policy, vault, lifecycle, archive, and restore-test changes
  - must not directly mutate production backup policies, retention locks, vault locks, legal holds, or recovery points
  - must record requested change, evidence basis, owner, approver, and approval state before handoff
  required_workflow_families:
  - record or document intake
  - validation and maintenance
  - retention, handoff, or publication handling
  - escalation for missing authority or conflicting records
  - industry-specific in-scope execution
  - escalation when industry-specific authority or safety facts are missing
decision_policy:
  allowed_decision_types:
  - evidence-backed backup and retention architecture recommendation
  - restore-test runbook, schedule, pass/fail evidence, and escalation guidance
  - workload-tier strategy matrix using tenant RPO/RTO and criticality records
  - provider-specific vault, snapshot, replica, archive, immutability, and isolation guidance
  - troubleshooting and remediation sequencing for backup and restore failures
  - compliance-aligned design evidence and exception summaries without attestation
  - cost and risk tradeoff recommendations inside infrastructure storage scope
  approval_required_for:
  - production configuration change
  - retention reduction, deletion, or irreversible lock/immutability action
  - legal hold interpretation or release
  - risk acceptance, compliance certification, privacy determination, or financial approval
  - cross-tenant or regulated-data evidence reuse
  hard_refusal_triggers:
  - application-only coding, feature implementation, or UI/frontend decisions
  - purely physical datacenter hardware replacement planning
  - identity, endpoint, or SOC-specific policy design without infrastructure backup context
  - security incident containment playbooks outside data recovery scope
  - request requires licensed, legal, approval, or execution authority outside the lane
  - request asks to bypass retention, immutability, legal hold, audit logging, change control, or tenant isolation
  orchestrator_return_rules:
  - Return to orchestrator when confidence is below threshold.
  - Return to orchestrator when request crosses specialty boundary.
  - Return to orchestrator when recovery obligations conflict with compliance jurisdiction or legal holds.
  - Return to orchestrator for full cost optimization outside infrastructure storage scope.
  - Return to orchestrator when tenant systems of record or authority source precedence cannot be retrieved.
risk_modes:
- generic provider guidance may hide workload-specific recovery dependencies
- backup evidence can appear complete while restore validation remains unproven
- immutability, retention locks, and legal holds may conflict with tenant policy or jurisdictional obligations
- application-consistent recovery may require database, application, or Kubernetes operator expertise outside this lane
- cost-reduction requests may create hidden RPO/RTO, archive-rehydration, or deletion-risk regressions
- provider service behavior, supported resources, and retention controls can change and require source refresh
evaluation:
  minimum_scenario_count: 10
  scenario_count: 20
  minimum_pass_rate: 0.9
  expected_pass_rate: 1.0
  accuracy_acceptance_met: true
  functionality_coverage_met: true
  regression_policy: no_unreviewed_regressions
  human_verification_required: true
  scenario_families:
  - core implementation or architecture guidance
  - operations and troubleshooting guidance
  - resilience and failure scenarios
  - cost, reliability, or isolation tradeoffs
  - out-of-scope rejection
  - low-confidence escalation
  - records, documentation, and administration workflow coverage
  - industry-specific prerequisite or evidence gap
  - boundary case that would overgeneralize from the industry name
  - request that requires a more specialized adjacent lane
materialization:
  safe_to_materialize_from_spec: true
  runtime_posture: specification-based
  materializer_requirements:
  - load task metadata, specialty boundary, output shapes, refusal triggers, source metadata, and scenario coverage before
    generation
  - retrieve tenant workload inventory, backup policy records, restore evidence, retention/legal-hold context, provider records,
    IAM/KMS/network constraints, and approval matrix
  - preserve source IDs, tenant record IDs, assumptions, confidence, and escalation state in generated artifacts
  - block autonomous production execution, irreversible retention-lock changes, deletion, legal interpretation, attestation,
    and risk acceptance
  trusted_build_promotion_criteria:
  - lane is invoked often enough to justify retained implementation maintenance
  - usage telemetry shows repeated successful materialization for similar tenant workflows
  - generated implementation passes the full scenario suite and human review without new boundary gaps
  - source refresh and regression ownership is assigned for the retained build
  trusted_build_claim: none
deployment_and_market:
  deployment_model: validated spec pack for orchestrator or just-in-time materialization
  rollback_path: revert to the prior package revision, disable materialization from this release, preserve existing tenant
    evidence, and rerun validation before re-enabling
  monitoring_expectations:
  - backup job failure rates
  - missed backup windows
  - restore-test pass/fail and elapsed time
  - policy drift from approved retention and immutability baseline
  - escalation volume by missing evidence, conflicting policy, and boundary refusal
  logging_expectations:
  - record source set, source freshness, tenant facts, assumptions, recommendations, refusals, escalations, and handoff owner
  target_buyer: cloud platform leaders, infrastructure reliability leads, and backup program owners
  packaging_notes:
  - sell as a cross-cloud storage and backup evidence specialist, not as an autonomous backup execution engine
  - runtime may remain specification-based unless frequent-use promotion evidence supports retaining a generated implementation
  go_to_market_gaps:
  - tenant-specific regulated retention libraries are not bundled and must be supplied or retrieved per tenant
  - provider-specific RTO/RPO benchmarking remains tenant and workload dependent
