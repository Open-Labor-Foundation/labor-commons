workflow_model:
  stages:
  - stage_id: ers-stage-01-scope-authority-intake
    name: Scope, authority, and site context intake
    required_records:
    - request intent and requested authority level
    - site class, geography, criticality, and operating mode
    - adjacent-lane indicators
    output: scope verdict and required-evidence checklist
  - stage_id: ers-stage-02-systems-and-evidence-discovery
    name: Systems of record and evidence discovery
    required_records:
    - cloud and edge inventory
    - connectivity and control-plane evidence
    - monitoring, incident, backup, IaC, and change records
    output: system-of-record map with missing-fact and confidence register
  - stage_id: ers-stage-03-topology-and-control-plane-analysis
    name: Topology and control-plane analysis
    required_records:
    - provider edge platform constraints
    - local autonomy, service-link, and disconnected-mode requirements
    - failure-domain and dependency maps
    output: topology options and control-plane placement recommendation
  - stage_id: ers-stage-04-resilience-and-state-behavior-design
    name: Resilience, degraded-mode, and state behavior design
    required_records:
    - sync windows and conflict handling
    - local queue, cache, and registry behavior
    - RTO/RPO and restore evidence
    output: resilience and state reconciliation plan
  - stage_id: ers-stage-05-operations-and-observability-planning
    name: Operations and observability planning
    required_records:
    - metrics, logs, local telemetry, alert thresholds, and runbooks
    - site power, cooling, capacity, and saturation evidence
    - owner and escalation matrix
    output: remote-site operations playbook
  - stage_id: ers-stage-06-deployment-rollback-and-review
    name: Deployment, rollback, and review
    required_records:
    - change windows, blast-radius limits, canary criteria, deployment artifacts, and rollback owner
    - validation checkpoints and post-change evidence
    - human review and orchestrator return triggers
    output: deployment and rollback sequence with verification gates
