required_tenant_facts:
- request intent, desired output shape, migration phase, planning horizon, business criticality, decision owner, and approval
  matrix
- workload inventory, dependency map, owner map, service criticality, traffic profile, current topology, data stores, integrations,
  and shared services
- source platform records, target cloud footprint, landing-zone readiness, account/subscription/project topology, network
  connectivity, DNS, identity dependency, and environment isolation
- SLO, SLA, RTO/RPO, backup policy, restore-test evidence, DR plan, recovery owner, replication status, cutover window, maintenance
  calendar, change freezes, and blackout periods
- migration backlog, wave plan, resource capacity, migration tooling status, test evidence, issue log, rollback plan, health
  checks, monitoring coverage, and operational handoff requirements
- cost, quota, capacity, licensing, contractual, privacy, regulatory, data residency, tenant isolation, risk tolerance, and
  source precedence constraints
systems_of_record:
- 'migration inventory and assessment systems: AWS Migration Hub, AWS Application Migration Service, Azure Migrate, Google
  Cloud Migration Center, CMDB, discovery tooling, dependency maps, or tenant equivalent'
- 'cloud provider inventory and configuration records: AWS Config, Azure Resource Graph, Google Cloud Asset Inventory, Kubernetes
  API, Terraform state, Git repositories, or tenant equivalent'
- 'network, identity, and access records: DNS, IPAM, firewall rules, route tables, VPN or interconnect records, identity tenant
  records, role assignments, service accounts, and privileged access logs'
- 'observability and validation systems: CloudWatch, Azure Monitor, Google Cloud Monitoring and Logging, Prometheus, Grafana,
  OpenTelemetry, health-check dashboards, synthetic tests, and test evidence stores'
- 'backup and recovery systems: AWS Backup, Azure Backup, Google Backup and DR, snapshots, replication tools, backup vaults,
  restore-test records, DR exercise logs, and contingency plan repositories'
- 'planning and change systems: migration backlog, work intake queue, wave board, cutover runbook repository, ITSM, change
  calendar, release calendar, maintenance-window calendar, approval matrix, and exception register'
- 'policy and evidence stores: architecture decision records, tenant standards, contract constraints, data classification
  records, residency rules, audit evidence repository, risk register, and commercial packaging repository'
planning_and_allocation_contract:
  planning_horizon:
    default: next approved migration wave or cutover window unless tenant supplies a shorter incident-remediation horizon
      or longer migration program roadmap
    horizons:
    - 'readiness horizon: days to weeks, inventory, dependency, landing-zone, backup, monitoring, capacity, and test-evidence
      preparation'
    - 'wave planning horizon: weeks to months, sequencing, staffing envelope, migration factory capacity, dependencies, blackout
      periods, and downstream impacts'
    - 'cutover horizon: hours to days, freeze window, replication finalization, health validation, rollback decision points,
      and owner escalation'
    - 'post-cutover horizon: days to weeks, monitoring, issue burn-down, backup validation, operational handoff, and decommission
      readiness'
  authoritative_inputs_for_capacity_timing_and_resource_decisions:
  - approved migration backlog, wave plan, maintenance windows, blackout periods, change freezes, and cutover windows
  - dependency map, service criticality, business impact, SLO/SLA, RTO/RPO, replication lag, health-check, backup, restore,
    and test evidence
  - migration team capacity, platform owner availability, SRE or operations coverage, change approver availability, and rollback
    owner availability
  - landing-zone readiness, quotas, network capacity, region or zone availability, licensing constraints, cost limits, and
    target architecture decisions
  - tenant-approved priority policy, risk tolerance, owner authority, source precedence, contractual constraints, and data
    isolation requirements
  allocation_rules:
  - preserve safety, recovery objectives, data consistency, dependency order, tenant isolation, and customer-impact containment
    before cost optimization or schedule acceleration.
  - recommend sequence and deferral options; do not approve staffing, budget, procurement, final cutover, rollback execution,
    risk acceptance, or production changes.
  - when demand exceeds migration capacity, quantify the shortfall, list affected workloads, name deferred waves, state downstream
    impact, and escalate for priority or resource approval.
  - when priorities conflict and no approved tie-break rule exists, return an escalation note instead of inventing priority.
  - when public sources and tenant policy conflict, record the conflict and route to the authorized owner for precedence.
  downstream_impact_expectations:
  - state customer-impact, reliability, cost, isolation, performance, operational toil, rollback, monitoring, backup, and
    decommissioning consequences of schedule or priority changes
  - name prerequisites, evidence gaps, validation gates, owners, unresolved assumptions, and approval-required tradeoffs
materialization:
  safe_runtime_requirements:
  - Load this spec pack as canonical source of truth; do not treat any generated implementation as canonical without separate
    promotion evidence.
  - Supply task, boundary, authority, planning horizon, tenant systems, retrieval permissions, source freshness, and evidence
    metadata at runtime.
  - Retrieve or request required tenant facts before deterministic migration guidance; produce low-confidence escalation when
    facts would change the answer.
  - Keep tenant contexts, logs, prompts, evidence stores, migration data, diagrams, credentials, and retrieval results isolated.
  - Record source IDs, tenant evidence references, assumptions, confidence state, approval-required tradeoffs, and boundary
    decisions in every artifact.
  runtime_strategy: specification-based
  trusted_build_promotion_criteria:
  - sustained usage volume proves retained implementation materially improves cost, latency, or reliability
  - generated implementation passes the same scenario suite and functionality map with no unreviewed regressions
  - source refresh, tenant evidence retrieval, logging, rollback, tenant isolation, and boundary enforcement are tested in
    target runtime
  - 'human maintainer records separate promotion approval and does not rely on issue #1640 as trusted-build evidence'
