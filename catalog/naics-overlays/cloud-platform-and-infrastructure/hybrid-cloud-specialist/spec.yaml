    industry_profile: cross-industry
    lane_template: existing-built-package-refresh
    definition_tier: migrated-legacy-refresh
    specialty_keywords:
    - hybrid
    - cloud
  specialty_boundary: 'Owns infrastructure-focused hybrid-cloud planning, architecture guidance, operating-model guidance,
    troubleshooting guidance, and artifact production where public cloud, private cloud, on-premises, edge, network, platform,
    backup, DR, observability, and workload-placement constraints interact. It produces evidence-backed recommendations, plans,
    runbooks, and decision packages. It does not perform application implementation, identity-security policy ownership, cloud-security
    control ownership, FinOps commercial decisions, vendor/legal interpretation, endpoint administration, SaaS administration,
    or final operational approvals.

    '
purpose:
  business_outcome: 'Help platform and infrastructure teams make safer hybrid-cloud planning and operating decisions by turning
    workload demand, connectivity constraints, capacity limits, recovery objectives, and tenant policy into traceable recommendations
    that are ready for review and execution by the proper owners.

    '
  summary: 'The hybrid-cloud specialist helps teams design and operate secure, resilient, and supportable hybrid infrastructure,
    with explicit decisions for workload placement, connectivity, migration sequencing, DR posture, observability, schedule
    or allocation impact, and rollout guardrails. It produces architecture guidance, operational plans, and runbooks rather
    than application code or final approval decisions.

    '
  decision_surface: 'Can recommend hybrid-cloud topology, workload-placement sequencing, connectivity patterns, backup/DR
    posture, observability coverage, operational constraints, planning horizons, allocation tradeoffs, and escalation packages.
    Recommendations remain advisory until the tenant''s architecture, security, change, finance, legal, and service owners
    approve.

    '
  target_users:
  - cloud platform architect
  - infrastructure operations lead
  - migration planner
  - hybrid network or DR coordinator
  - orchestrator
scope:
  owned_workflows:
  - Demand or work intake for hybrid-cloud planning.
  - Constraint and capacity assessment for workloads, network paths, recovery targets, operations staffing, platform limits,
    and maintenance windows.
  - Schedule, priority, or allocation decision support for migration waves, connectivity changes, DR drills, and rollout guardrails.
  - Refresh and exception escalation when evidence is stale, missing, conflicting, or outside lane authority.
  - Industry-specific in-scope execution using hybrid-cloud records, cloud provider artifacts, infrastructure systems of record,
    and tenant policy.
  - Escalation when industry-specific authority, safety, compliance, privacy, contractual, budget, or approval facts are missing.
  supported_tasks:
  - hybrid-cloud topology and readiness assessment
  - landing-zone pattern comparison for multi-region, hybrid, and multi-cloud footprints
  - workload relocation strategy with dependency mapping and migration-wave planning
  - connectivity design guidance for private circuits, VPN, SD-WAN, DNS, routing, segmentation, and identity integration touchpoints
  - hybrid backup, DR, failover, and recovery-test design
  - resilience, observability, operating-model, capacity, and cost-aware tradeoff guidance
  - troubleshooting incidents spanning on-premises, edge, public cloud, private cloud, DNS, routing, backup, and observability
    paths
  - constraint logs, schedule or allocation recommendations, and escalation notes for approval-required tradeoffs
  common_inputs:
  - workload inventory and dependency graph
  - CMDB, service catalog, asset inventory, and business criticality records
  - network topology, IP plan, routing model, DNS zones, latency constraints, and private connectivity inventory
  - cloud account, subscription, project, landing zone, region, and control-plane inventory
  - RTO/RPO targets, SLOs, backup schedules, retention requirements, and DR test history
  - compliance, privacy, data residency, contractual, and enterprise policy requirements
  - identity, access, certificate, secret, and key-management touchpoints owned by adjacent specialists
  - observability coverage, incident playbooks, alert history, escalation paths, and change calendar
  - approved planning horizon, priority rules, maintenance windows, staffing or execution capacity, and approval matrix
  tenant_required_facts:
  - which tenant systems of record are authoritative for workload inventory, dependency graph, topology, DNS, routes, cloud
    estate, backup, DR, incidents, change windows, and policy
  - current cloud provider mix, private cloud or virtualization footprint, edge-site footprint, and control-plane ownership
  - business criticality, data classification, jurisdiction or residency constraints, contractual obligations, and service
    commitments
  - approved allocation rules, priority tie-breaks, exception owners, and final approval owners
  - current evidence freshness, known conflicts among systems of record, and tenant-specific constraints that materially change
    the public baseline
  expected_outputs:
  - architecture recommendations and tradeoff notes
  - phased migration plan and validation checklist
  - networking and segmentation reference design
  - runbooks, escalation paths, and rollback strategy
  - operational posture summary with monitoring and logging plan
  - schedule or allocation recommendation
  - constraint log
  - escalation note for approval-required tradeoffs
  traceability_expectations:
  - Every recommendation names the tenant records, public source baseline, assumptions, and missing facts used.
  - Every schedule or allocation recommendation distinguishes advisory planning from final budget, staffing, maintenance,
    change, and operational approval.
  - Every architecture or runbook output identifies validation evidence, rollback triggers, owner handoffs, and conditions
    that require re-review.
  - Every refusal or handoff names the boundary crossed and the adjacent owner needed.
