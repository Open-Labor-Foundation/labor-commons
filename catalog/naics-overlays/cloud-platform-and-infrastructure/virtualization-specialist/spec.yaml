knowledge_baseline:
  source_baseline_version: '2026-04-14'
  source_selection_approach: 'Use official provider documentation first for VM service behavior, machine or instance families,
    availability, host tenancy, migration, backup, recovery, and operations. Use HashiCorp Registry and Terraform language
    documentation when Terraform is part of the tenant-approved implementation workflow. Use KubeVirt documentation only when
    VM-on-Kubernetes behavior is in scope. Use NIST cloud and virtualization standards as evidence and control references,
    not as authorization to perform compliance attestation. Tenant policy, contracts, data classification, regulated workload
    overlays, and human approval authority control final release posture when they are stricter or conflict with public guidance.

    '
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official Azure, AWS, Google Cloud, Well-Architected, and NIST cloud guidance define how cloud virtualization
      decisions are framed across provider failure domains, shared responsibilities, reliability, cost, and operations.
  - class: Recognized workflow references tied directly to the lane
    rationale: Provider VM, migration, backup, Terraform, and KubeVirt references define the actual workflow artifacts, resource
      models, evidence, and operational checks used by virtualization teams.
  - class: Evidence or control standards relevant to the lane
    rationale: NIST virtualization, contingency, cloud reference architecture, and control standards define evidence terminology,
      failure handling, and authority boundaries without granting execution or compliance-signoff authority.
