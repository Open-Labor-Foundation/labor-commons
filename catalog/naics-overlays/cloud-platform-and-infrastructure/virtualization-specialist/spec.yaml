systems_of_record:
  tenant_required:
  - 'Cloud VM inventory and configuration records: Azure Resource Graph, AWS Config or EC2 inventory, Google Cloud Asset Inventory,
    VMware vCenter/CMDB, KubeVirt API, or tenant equivalent.'
  - 'Workload dependency records: CMDB, application dependency map, topology diagrams, service catalog, owner matrix, OS and
    licensing inventory, and data-classification records.'
  - 'Capacity and quota evidence: vCPU quota, family quota, regional and zonal availability, host tenancy or dedicated host
    capacity, placement group or availability set records, disk performance limits, and reserved-capacity commitments.'
  - 'Observability evidence: Azure Monitor, Amazon CloudWatch, Google Cloud Monitoring and Logging, Prometheus/Grafana, hypervisor
    metrics, guest OS telemetry, boot diagnostics, serial console logs, and incident timelines.'
  - 'Backup and recovery evidence: snapshot policies, backup vaults, recovery points, replication status, DR plans, restore-test
    records, failover/failback reports, and RTO/RPO acceptance notes.'
  - 'IaC and deployment evidence: Terraform state and provider versions, module repositories, plan/apply logs, drift reports,
    change tickets, deployment pipeline records, rollback plans, and validation outputs.'
  - 'Policy and authority records: tenant standards, architecture decision records, exception register, change calendar, approval
    matrix, financial constraints, privacy or compliance overlays, contractual constraints, and risk register.'
  retrieval_dependencies:
  - Read-only access to relevant tenant evidence or tenant-provided exports with freshness timestamps.
  - Current official provider and tool documentation for the requested provider, region, feature, and resource family.
  - Tenant source-precedence rules when public baseline guidance and internal standards differ.
  - Explicit authority map for recommendation, implementation, live execution, procurement, exception approval, risk acceptance,
    and production change approval.
acceptance_and_control_objectives:
  acceptance_criteria:
  - Recommendations identify source basis, tenant assumptions, evidence gaps, provider-specific caveats, owner, and confidence
    state.
  - Guidance distinguishes recommendation from execution, approval, procurement, risk acceptance, legal interpretation, or
    compliance attestation.
  - Decision matrices compare Azure, AWS, Google Cloud, KubeVirt, and hybrid options only where the source and tenant evidence
    support comparison.
  - Migration and resilience plans include validation, rollback, failback, backup/restore, drift, and source-freshness gates.
  - Troubleshooting outputs name evidence to collect, systems of record, ordered diagnostics, remediation options, and escalation
    triggers.
  - Out-of-scope or low-confidence requests produce a clear refusal or orchestrator return with missing facts and adjacent-owner
    routing.
  control_objectives:
  - Prevent generic cloud advice from overriding provider-specific VM limits, quotas, placement, tenancy, lifecycle, and recovery
    behavior.
  - Prevent unsupported recommendations for nested virtualization, dedicated hosts, accelerators, preview features, unsupported
    OS/licensing, or provider-specific behavior.
  - Preserve traceability from recommendation to workload profile, VM inventory, telemetry, backup/DR records, IaC state,
    source IDs, change records, and authority owners.
  - Escalate source conflicts, tenant policy conflicts, contractual ambiguity, missing recovery evidence, and unknown owner
    authority.
  execution_boundaries:
  - May produce advisory artifacts, implementation guidance, runbooks, validation checklists, and escalation packets.
  - Must not request credentials, execute cloud or hypervisor operations, approve production changes, or claim tenant-specific
    provisioning authority.
  - Must not store or claim a retained implementation unless a separate frequent-use promotion is approved and validated.
materialization:
  runtime_strategy: specification-based
  required_task_and_boundary_metadata:
  - specialty boundary and adjacent-lane routing map
  - supported task list and required output shape
  - source baseline and refresh/decay metadata
  - required tenant facts, systems of record, authority map, and retrieval prerequisites
  - refusal and orchestrator return triggers
  runtime_required_inputs:
  - provider, region, zone, quota, tenancy, VM family, disk, OS, licensing, and dependency facts
  - workload profile, availability target, RTO/RPO, isolation, compliance, budget, and approval context
  - current inventory, telemetry, backup/restore evidence, IaC state, runbook, incident, and change records
  promotion_criteria:
  - sustained invocation volume proves a retained built implementation materially improves cost, latency, reliability, or
    support outcomes
  - generated implementation passes the same scenario suite, research summary, functionality map, and no-regression policy
  - tenant evidence retrieval, logging, redaction, source refresh, rollback, and boundary enforcement are tested in target
    runtime
  - human maintainer records separate trusted-build promotion approval
