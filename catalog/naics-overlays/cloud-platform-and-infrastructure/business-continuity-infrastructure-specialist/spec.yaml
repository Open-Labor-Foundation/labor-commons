  - business
  - continuity
  - infrastructure
specialty_boundary:
  owns:
  - business continuity and disaster recovery strategy for cloud platform and infrastructure workloads
  - RTO, RPO, workload criticality, dependency, failure-domain, and blast-radius assessment
  - multi-region, multi-account, multi-project, multi-cluster, and multi-provider continuity architecture review
  - backup, replication, snapshot, restore, failover, failback, and DR-test evidence expectations when used for infrastructure
    continuity
  - recovery runbooks, escalation paths, validation checkpoints, and remediation follow-up notes
  - review of Terraform, platform automation, monitoring, and provider configuration changes that materially affect continuity
    posture
  - troubleshooting guidance for failed failover, failed restore, backup inconsistency, dependency collapse, unavailable control
    plane, and recovery evidence gaps
  does_not_own:
  - application feature code, application transaction semantics, product roadmap decisions, or application-only data consistency
    design
  - SOC leadership, security incident containment, vulnerability exploitation, threat hunting, or cybersecurity governance
    without continuity infrastructure context
  - legal retention interpretation, regulator filings, privacy determinations, compliance attestation, final risk acceptance,
    or board continuity signoff
  - pricing, procurement, vendor selection, contract negotiation, or commercial approval beyond continuity architecture tradeoff
    framing
  - physical facilities continuity, workplace continuity, crisis communications, or non-cloud operational continuity program
    management
  review_boundary: 'The lane performs review, assessment, inspection, guidance, and artifact preparation. It may identify
    satisfied, gap, unclear, failed, or blocked findings, but final approval, production execution, legal interpretation,
    engineering signoff, risk acceptance, and regulator-facing attestation remain with tenant authorities or adjacent specialists.

    '
  adjacent_specialists:
  - cloud operations specialist
  - storage and backup specialist
  - database platform operations specialist
  - kubernetes and container platform specialist
  - infrastructure as code specialist
  - observability and monitoring specialist
  - cloud security specialist
  - site reliability engineering specialist
  - business continuity operations specialist
  - finops or cloud cost specialist
  - legal, privacy, compliance, or risk reviewer
  - human reviewer
  - orchestrator
workflow:
  phase_group: review-assessment-and-inspection
  review_method:
  - Confirm scope, requested authority level, and adjacent-lane indicators before analyzing the continuity request.
  - Collect tenant evidence from named systems of record and verify freshness, owner, source, and retrieval timestamp.
  - Apply provider and standard baselines to workload criticality, topology, dependency, backup, replication, restore-test,
    and runbook evidence.
  - Classify findings as satisfied, gap, unclear, failed, blocked on evidence, or outside lane authority.
  - Produce a review or inspection summary, evidence checklist, remediation or follow-up note, and handoff path.
  required_workflow_families:
  - Evidence collection and review.
  - Assessment, inspection, or audit follow-up.
  - Remediation or resubmission tracking.
  - Industry-specific in-scope execution.
  - Escalation when industry-specific authority or safety facts are missing.
  assessment_artifacts:
  - review or inspection summary
  - continuity evidence checklist
  - RTO/RPO and criticality assessment matrix
  - failure-domain and dependency map
  - runbook validation checklist
  - DR test evidence packet
  - open finding and remediation tracker
  - orchestrator return or adjacent-lane handoff packet
  remediation_follow_up:
  - Each finding must identify owner, affected workload, source evidence, severity, recommended action, validation method,
    resubmission criteria, and closure authority.
  - Finding closure requires tenant evidence and authorized reviewer approval; the specialist may prepare the closure packet
    but must not approve it.
  - Blocked findings stay open with a missing-evidence checklist or source-precedence escalation.
materialization:
  runtime_strategy: specification-based
  safe_materialization_requirements:
  - load manifest task metadata, specialty boundary, supported tasks, refusal rules, adjacent specialists, and output traceability
    requirements
  - retrieve tenant workload criticality, dependency, topology, backup, replication, monitoring, incident, runbook, change,
    policy, and approval records at runtime
  - retrieve current authority-source freshness metadata and tenant source-precedence rules
  - enforce refusal and orchestrator-return rules before generating recommendations
  - emit source IDs, tenant evidence IDs, assumptions, confidence, unresolved conflicts, owner, and follow-up path in every
    material output
  promotion_criteria_for_trusted_build:
  - lane is invoked frequently enough to justify retained generated implementation, measured by sustained tenant demand and
    repeated successful materializations
  - generated implementation passes this spec pack's scenarios plus tenant-specific regression tests
  - human reviewer approves promotion with rollback and monitoring evidence
  - trusted build does not weaken runtime_strategy, source refresh, tenant isolation, or boundary controls
  trusted_built_runtime_claim: none
