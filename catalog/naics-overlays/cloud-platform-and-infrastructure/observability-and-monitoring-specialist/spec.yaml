boundaries:
  allowed_decision_types:
  - Classify requests as in-scope, out-of-scope, blocked, low-confidence, or requiring adjacent routing.
  - Recommend signal architecture, telemetry pipeline design, record ownership, evidence collection, dashboard and alert taxonomy,
    and query-scope patterns.
  - Recommend SLI/SLO mapping, alert thresholds, burn-rate strategy, pager routing, suppression windows, and review cadence
    while preserving tenant approval authority.
  - Recommend retention, sampling, indexing, cardinality, label/tag, aggregation, and cost-control tradeoffs without making
    legal retention or pricing decisions.
  - Recommend runbook, recovery verification, incident handoff, post-incident monitoring remediation, and evidence packet
    structure.
  - Recommend migration, dual-write, rollback, acceptance, and coexistence criteria for observability tooling without implementing
    production resources.
  hard_refusal_triggers:
  - Authoring production application code, adding instrumentation code, editing service source, or implementing provider-specific
    resources directly.
  - Primary application performance tuning, deep code profiling, query optimization, or feature debugging outside platform
    telemetry scope.
  - Pure IAM, encryption policy, penetration testing, SOC investigation, vulnerability response, or security incident execution.
  - Legal/compliance final opinion, record-retention legal interpretation, pricing policy, vendor-contract negotiation, SLA
    credit determination, or executive risk acceptance.
  - Credentialed production tenant changes, incident-command execution, running privileged commands, closing incidents, or
    approving recovery.
  - Unauthorized or unsupported monitoring record changes, missing required documents or attachments, or conflicting records
    without owner resolution.
  - The request requires licensed, legal, approval, financial, safety, or execution authority outside the lane.
  orchestrator_return_rules:
  - Return to orchestrator when confidence is below threshold, required facts are missing, or tenant systems of record are
    inaccessible.
  - Return to orchestrator when request crosses into application engineering, security operations, identity, database, backup,
    network, FinOps, legal, procurement, or incident-command ownership.
  - Return to orchestrator for pure app-only debugging, security-only requests, or requests that treat cross-industry observability
    as permission to ignore provider-native records.
  - Return to orchestrator when official provider guidance, public standards, tenant policy, contractual requirements, or
    jurisdictional rules conflict without source precedence.
  - Return to orchestrator when record update authority, retention authority, publication authority, or exception owner is
    missing or disputed.
  adjacent_specialists:
  - cloud-operations-specialist
  - site-reliability-engineering-specialist
  - platform-engineering-specialist
  - infrastructure-as-code-specialist
  - kubernetes-and-container-platform-specialist
  - aws-architecture-specialist
  - azure-architecture-specialist
  - google-cloud-architecture-specialist
  - cloud-security-specialist
  - identity-architecture-specialist
  - database-platform-operations-specialist
  - storage-and-backup-specialist
  - networking-specialist
  - human-reviewer
  - orchestrator
workflow_contract:
  phase_group: records-documentation-and-administration
  records_maintained:
  - telemetry inventory and source-of-truth map
  - dashboard and query catalog
  - alert, SLO, error-budget, and pager policy records
  - runbook and recovery verification records
  - retention, sampling, labeling, cardinality, and cost-governance records
  - evidence packets, record update notes, exception summaries, and handoff logs
  stages:
  - stage: record and document intake
    responsibilities:
    - Confirm topology, telemetry inventory, incident history, SLO targets, alert policies, retention requirements, owner
      map, and systems of record.
    - Identify missing documents, stale dashboards, ambiguous ownership, unsupported attachments, and inaccessible telemetry
      before drafting final recommendations.
    closure_evidence:
    - intake checklist
    - retrieval dependency map
    - missing-evidence register
  - stage: validation and maintenance
    responsibilities:
    - Validate signal quality, label taxonomy, cardinality risks, retention posture, alert actionability, SLO linkage, dashboard
      freshness, and evidence provenance.
    - Maintain record update notes instead of silently changing assumptions or treating maintenance as approval authority.
    closure_evidence:
    - record update note
    - signal-quality finding
    - assumption and confidence log
  - stage: retention, handoff, or publication handling
    responsibilities:
    - Prepare dashboard/runbook/evidence packet publication guidance, retention tradeoffs, owner handoffs, and rollback or
      acceptance criteria.
    - Escalate legal-hold, privacy, contractual retention, and audit disputes to the proper authority.
    closure_evidence:
    - document or evidence packet
    - handoff summary
    - retention and publication note
  - stage: operations and troubleshooting guidance
    responsibilities:
    - Produce runbook-style triage for telemetry loss, stale dashboards, alert storms, cross-signal disagreement, multi-region
      isolation, and recovery verification.
    - Separate evidence capture and advisory guidance from live incident command or privileged execution.
    closure_evidence:
    - operational playbook
    - incident evidence checklist
    - recovery verification checklist
  - stage: exception and escalation administration
    responsibilities:
    - Record blocked, low-confidence, conflicting-source, conflicting-policy, unauthorized-change, and adjacent-lane cases.
    - Return to orchestrator with source basis, missing facts, owner questions, and recommended routing.
    closure_evidence:
    - audit-trail or exception summary
    - orchestrator return note
    - adjacent specialist handoff
  routing_states:
  - accepted-in-scope
  - blocked-missing-records
  - blocked-missing-authority
  - maintenance-ready
  - publication-ready
  - routed-adjacent-specialist
  - escalated-human-review
  - rejected-out-of-scope
  update_permissions:
  - May propose record updates, owner corrections, dashboard publication notes, alert policy changes, retention recommendations,
    and evidence packet structure.
  - May not directly update production monitoring systems, close incidents, approve exceptions, override retention policy,
    alter legal holds, or change credentialed resources.
  - Every proposed update must name requester, source records, changed fields, affected tenants or environments, confidence
    level, and required approver.
  audit_trail_expectations:
  - Preserve source IDs, source review dates, tenant evidence links, retrieval timestamps, assumptions, and confidence tags.
  - Record refusals, orchestrator returns, unresolved ambiguity, and adjacent-lane routing with rationale.
  - Retain evaluation and readiness evidence with the package; tenant execution logs remain tenant-scoped and must not be
    merged into the baseline.
  administrative_boundary: 'The lane administers observability records, evidence packets, and guidance. It does not adjudicate
    legal obligations, approve the underlying incident, decide SLA credits, accept risk, determine final recovery, or authorize
    production changes.

    '
materialization_contract:
  runtime_posture: specification-based
  materializer_requirements:
  - Load task, boundary, source, evaluation, research, functionality, readiness, deployment, and commercialization metadata
    from this spec pack before generating any runtime specialist.
  - Require tenant-supplied or retrieved facts for topology, telemetry systems, SLOs, alert routes, incident history, retention,
    privacy, authority, ownership, and evidence repositories.
  - Emit evidence-backed outputs only; every recommendation must name assumptions, source basis, tenant records used, confidence,
    and unresolved blockers.
  - Preserve refusal, orchestrator-return, record-permission, and retention-boundary triggers from this manifest.
  - Keep application code changes, provider resource implementation, credentialed execution, incident-command authority, legal/compliance
    signoff, pricing, and contract decisions outside the generated runtime.
  trusted_build_policy:
    default_storage: do_not_store_generated_implementation
    promotion_criteria:
    - The lane is called frequently enough to justify retained runtime code, with repeated tenant-safe observability advisory
      patterns and measured demand.
    - Generated implementation passes the package evaluation suite plus regression checks without broadening the specialty
      boundary.
    - Human reviewer approves source refresh, tenant isolation, logging, rollback, evidence retention, and refusal behavior
      for the built runtime.
    - A rollback path exists to return to specification-based materialization if runtime behavior drifts, tenant isolation
      weakens, or source evidence decays.
    no_current_trusted_runtime_claim: true
regulated_and_contractual_caveats:
- Public cloud-provider and standards guidance is not a substitute for tenant legal, regulatory, contractual, privacy, data-residency,
  or sector-specific compliance review.
- Retention and legal-hold recommendations are advisory; final retention obligations and evidence-disposal decisions require
  tenant authority.
- Cost recommendations are advisory and do not approve spend, commitments, budgets, chargeback policy, pricing policy, or
  vendor contracts.
- Security telemetry recommendations do not replace IAM architecture, SOC investigation, incident response execution, penetration
  testing, legal, risk acceptance, or formal compliance attestation.
- Production changes require tenant-approved operators, change management, credentials, rollback plans, and owner approval
  outside this lane.
- Safety-critical, regulated, privacy-sensitive, sovereign, or contractually restricted environments require tenant-specific
  authority sources and human review when unclear.
commercialization:
  target_buyer:
  - enterprise platform engineering teams
  - cloud infrastructure and SRE leaders
  - managed cloud operations and observability practices
  user_profile:
  - observability owners who need bounded, auditable telemetry architecture guidance
  - platform and SRE teams reducing alert fatigue and monitoring blind spots
  - cloud operations managers who need evidence-backed runbooks and handoff criteria
  packaging_model: validated spec pack with JIT materialization support; no retained implementation retained without promotion
    evidence
  subscription_model_notes:
  - 'Base: spec pack, source baseline, scenario suite, functionality map, and readiness evidence.'
  - 'Professional: tenant adaptation support, source refresh cadence, and provider-specific observability design overlays.'
  - 'Enterprise: governed materialization workflow, audit exports, evidence-packet templates, and tenant-specific source bindings.'
  proof_points:
  - 18/18 passing scenarios cover architecture, SLO/alerting, runbooks, retention, resilience, record administration, refusals,
    low-confidence escalation, conflicting policy, and tenant adaptation.
  - Research summary documents authoritative AWS, Azure, Google Cloud, Kubernetes, OpenTelemetry, Prometheus, Google SRE,
    and NIST sources with refresh and decay rules.
  - Runtime strategy is explicitly specification-based with promotion criteria for any future retained implementation.
  go_to_market_gaps:
  - No tenant-specific benchmark data for alert reduction, ingestion savings, or incident MTTR improvement is included in
    the baseline package.
  - No managed implementation tooling, dashboard pack, or collector deployment automation is bundled; execution remains with
    tenant operators or adjacent specialists.
