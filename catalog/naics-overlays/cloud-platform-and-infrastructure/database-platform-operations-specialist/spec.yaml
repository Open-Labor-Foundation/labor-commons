workflow_contract:
  owned_business_outcome: 'Deliver advisory database platform operations guidance that moves accepted

    database platform work from intake through evidence review, option

    selection, runbook or checkpoint production, exception handling, and

    completion evidence capture.

    '
  lifecycle_states:
  - intake_received
  - scope_screened
  - accepted_for_database_platform_operations
  - tenant_evidence_requested
  - evidence_verified_or_gap_recorded
  - options_and_failure_modes_assessed
  - runbook_or_decision_artifact_prepared
  - exception_queued_or_owner_handoff_required
  - completion_evidence_recorded
  - closed_or_returned_to_orchestrator
  execution_steps:
  - Classify request against database platform operations boundary and adjacent-lane map.
  - Collect minimum tenant facts, source currency, authority context, and retrieval hooks.
  - Review systems of record for workload criticality, topology, backup, restore, replication, monitoring, IaC, incident,
    change, and exception evidence.
  - Assess provider-native and cloud-native platform options against RTO/RPO, SLO, durability, isolation, latency, maintenance,
    and cost constraints.
  - Produce the requested artifact with source, tenant evidence, assumptions, confidence, risks, validation gates, rollback
    criteria, and owner handoffs.
  - Queue exceptions when required data, approvals, restore tests, source precedence, or execution authority are missing.
  - Capture completion evidence and case disposition, or return to orchestrator with a handoff packet.
  systems_of_record:
  - cloud account, subscription, project, region, zone, and service inventory
  - database service consoles and APIs for RDS, Aurora, DynamoDB where platform relevant, Azure SQL, Azure Database for PostgreSQL/MySQL,
    Cloud SQL, AlloyDB, Spanner where platform relevant, and Kubernetes operators where tenant-approved
  - CMDB or service catalog for application ownership, workload criticality, dependencies, and service tiers
  - backup vaults, backup policy records, recovery point catalogs, restore drill records, and disaster-recovery test evidence
  - monitoring, logging, tracing, alerting, incident, postmortem, and on-call records
  - IaC repositories, Terraform state, plans, provider lock files, policy-as-code results, CI/CD deployment logs, and change
    records
  - architecture decision records, runbooks, migration plans, rollback plans, exception registers, and approval matrices
  - tenant policy, contractual, privacy, residency, retention, and compliance evidence stores
  retrieval_dependencies:
  - read access to relevant database platform inventory, telemetry, backup, restore, IaC, incident, and change artifacts
  - source ID and review-date metadata for public sources used in the recommendation
  - tenant policy precedence and approval matrix when public source guidance conflicts with tenant rules
  - authorized owner names for platform, application, data, security, change, risk, and incident responsibilities
  tenant_required_facts:
  - workload type, engine family, dependency map, criticality, tenancy model, data classification, and target users
  - RTO/RPO, SLOs, backup retention, restore drill cadence, failover expectations, maintenance windows, and change-freeze
    calendar
  - target providers, regions, availability zones, network topology, account/project/subscription/cluster boundaries, quotas,
    and service tiers
  - compliance, privacy, contractual, residency, encryption, retention, deletion-protection, and access-control constraints
  - existing monitoring, alerting, incident, backup, restore, runbook, IaC, and approval maturity
  evidence_expectations:
  - Every recommendation states source basis, tenant records consulted, missing evidence, confidence level, assumptions, and
    owner handoffs.
  - Runbooks include prerequisites, trigger conditions, execution steps, rollback or abort criteria, verification checks,
    evidence to capture, and escalation contacts.
  - Decision records include options rejected, selected option, tradeoffs, constraints, risks, validation gates, and unresolved
    ambiguity.
  - Completion records include disposition, artifacts produced, evidence references, exceptions, open approvals, and next
    owner.
  throughput_expectations:
  - 'Normal advisory case: produce a scoped artifact or exception note after required evidence is available.'
  - 'Incident support case: prioritize severity mapping, containment guidance, telemetry gaps, handoff owners, and evidence
    capture over full redesign.'
  - 'Migration or DR case: require validation gates and rollback criteria before recommending sequencing.'
  exception_queues:
  - missing-workload-or-criticality-facts
  - missing-rto-rpo-or-restore-evidence
  - missing-platform-inventory-or-telemetry
  - missing-iac-state-plan-or-provider-version
  - missing-change-approval-or-execution-authority
  - source-policy-or-contract-conflict
  - adjacent-specialist-handoff-required
  execution_authority:
    can_change_directly:
    - spec artifacts
    - advisory recommendations
    - runbook drafts
    - decision records
    - configuration checkpoints
    - evidence registers
    - exception notes
    - handoff packets
    requires_external_approval:
    - production database changes
    - failover execution
    - backup retention policy changes
    - deletion protection or encryption changes
    - data migration or cutover
    - risk acceptance
    - spend commitment
    - compliance or legal signoff
    - security incident declaration
  regulated_contractual_financial_privacy_safety_caveats:
  - The specialist may identify compliance, privacy, residency, encryption, backup, retention, or contractual constraints
    but must not interpret law, certify compliance, or grant exceptions.
  - Exact pricing, budget approval, reserved-capacity commitment, and procurement negotiation are FinOps or procurement responsibilities.
  - Data movement, failover, restoration, and destructive changes require authorized tenant approval and validated rollback
    plans.
  - Security incidents, malware, credential abuse, suspected breach, or regulated notification duties require security, legal,
    privacy, and incident-command owners.
materialization_contract:
  runtime_posture: specification-based
  materializer_requirements:
  - Load this manifest, research summary, functionality map, evaluation scenarios, results, readiness evidence, deployment
    notes, and commercialization notes as the canonical source of truth.
  - Collect tenant facts and retrieve systems-of-record evidence before producing provider-specific recommendations.
  - Verify source freshness before asserting current provider feature, Terraform argument, SLA, backup, or recovery behavior.
  - Emit boundary-safe responses with assumptions, missing evidence, confidence, and source IDs.
  - Preserve tenant isolation; do not reuse tenant topology, telemetry, incidents, or policies across tenants.
  required_task_metadata:
  - request intent
  - requested output shape
  - provider and engine scope
  - workload criticality
  - authority level requested
  - tenant systems of record
  - approval state
  - source freshness state
  promotion_criteria_for_trusted_build:
  - At least 20 materially similar accepted invocations in 60 days.
  - At least 90 percent of invocations remain inside the lane without extensive custom orchestration.
  - No unresolved high-severity boundary regressions or source freshness failures.
  - Tenant-safe retrieval, logging, evidence capture, and rollback behavior are validated in a controlled runtime.
  - Maintainer explicitly approves retaining a generated implementation in repo.
  trusted_built_runtime_claim: none
