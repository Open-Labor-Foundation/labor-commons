    rationale: Official Azure Cloud Adoption Framework, Well-Architected Framework, and Architecture Center guidance define
      how Azure architecture work is named, staged, reviewed, and evidenced.
  - class: Recognized workflow references tied directly to the lane
    rationale: Azure Policy, RBAC, management groups, Azure Monitor, Backup, Site Recovery, Bicep, and Terraform references
      define the actual workflow artifacts and systems used to govern the lane.
