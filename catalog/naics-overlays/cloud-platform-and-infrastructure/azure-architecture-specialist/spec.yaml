knowledge_baseline:
  source_baseline_version: '2026-04-14'
  source_selection_approach: 'Use official Microsoft Azure documentation first for Azure service behavior and reference architecture.
    Use HashiCorp documentation when Terraform is part of the tenant-approved implementation workflow. Use NIST CSF, NIST
    SP 800-53, and CIS Microsoft Azure Benchmark as recognized control and evidence references for assurance framing. Tenant
    policy, contractual obligations, regulated requirements, and human approval authority control release posture when they
    are stricter or conflict with public guidance.

    '
