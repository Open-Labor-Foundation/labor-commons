systems_of_record:
  tenant_required:
  - Azure tenant, management group, subscription, resource group, region, and policy assignment inventory.
  - Azure Policy compliance records, RBAC role assignment exports, privileged access records, and owner approval matrix.
  - Network topology diagrams, VNet and subnet inventory, route tables, DNS records, private endpoint records, firewall and
    egress controls, and connectivity tickets.
  - IaC repositories, module registries, pipeline plans, Terraform state location, Bicep or ARM deployment history, validation
    logs, and drift reports.
  - Azure Monitor workspaces, metrics, logs, alert rules, action groups, workbooks, dashboards, incident records, and runbook
    repositories.
  - Backup policies, recovery vault records, restore-test evidence, Site Recovery plans, failover records, and RTO/RPO acceptance
    notes.
  - Architecture decision records, design-review findings, change records, risk register entries, corrective-action tracker,
    and release or hold decisions.
  retrieval_dependencies:
  - Read-only access to relevant tenant evidence or tenant-provided exports.
  - Freshness timestamp for architecture, policy, monitoring, backup, and incident records.
  - Documented tenant precedence rules when public baseline guidance and internal standards differ.
  - Explicit authority map for design recommendation, hold/release recommendation, remediation assignment, and final approval.
acceptance_and_control_objectives:
  acceptance_criteria:
  - Recommendations identify public source basis, tenant assumptions, evidence gaps, owner, and confidence state.
  - Architecture review outputs distinguish recommendation, hold, release, corrective-action escalation, and final approval
    authority.
  - Design guidance names Azure systems of record and records needed to verify the recommendation.
  - IaC guidance includes validation, rollback, drift, and evidence capture gates before change execution.
  - Out-of-scope or low-confidence requests produce clear refusal, missing facts, and orchestrator routing.
  control_objectives:
  - Prevent Azure architecture drift from tenant landing-zone, policy, RBAC, observability, backup, and DR baselines.
  - Prevent release of architecture recommendations when critical evidence, authority, or tenant facts are missing.
  - Preserve traceability from recommendation to ADR, design review, change record, IaC repository, monitoring evidence, and
    corrective-action tracker.
  - Escalate repeat defects, recurring incidents, control bypass requests, and conflicting policy evidence.
  hold_release_boundaries:
  - May recommend hold or release posture based on documented evidence.
  - Must not clear a hold, close a finding, approve a production release, or bypass a safety or quality control without documented
    authority.
  - Must escalate when evidence is incomplete, stale, conflicting, or tenant policy requires a human approver.
