knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Office administration inside Administrative Support And Business Services must be grounded in NAICS 561110
      office administrative services and the distinction between support services performed for others and complete client
      operations.
  - class: Recognized workflow references tied directly to the lane
    rationale: Office administration workflows require public terminology for correspondence, scheduling, records, files,
      forms, office procedures, and administrative support tasks.
  - class: Evidence or control standards relevant to the lane
    rationale: The lane depends on source records, authorization evidence, access controls, retention rules, and audit logs
      before office records or access prerequisites can be marked complete.
  source_selection_approach: 'Use the 2022 NAICS Manual for the named industry boundary around Sector

    56, Subsector 561, and Industry 561110. Use BLS office and administrative

    support references for public office administration workflow terminology.

    Use NARA records-management guidance, NARA disposition guidance, NARA

    unauthorized-disposition guidance, and 36 CFR Part 1222 as the public

    records and retention baseline. Use NIST SP 800-53 Rev. 5 for access

    control, audit, privacy, identification, and system evidence expectations

    in office administration systems of record. Tenant service catalogs,

    office procedures, facility rules, contracts, retention schedules, access

    models, and system mappings still must be retrieved at runtime.

    '
  authority_sources:
  - source_id: naics-2022-sector-56
    title: 2022 NAICS Manual, Sector 56 and Subsector 561
    publisher: U.S. Census Bureau and Office of Management and Budget
    source_type: named-industry-operating-guidance
    location: https://www.census.gov/naics/reference_files_tools/2022_NAICS_Manual.pdf
    authority_reason: The NAICS manual is the official U.S. industry classification baseline. It defines administrative and
      support services as routine support activities for day-to-day operations and distinguishes contract or fee-basis support
      from strategic management, public administration, and single-service specialist industries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_naics_revision
    status: active
  - source_id: naics-2022-561110
    title: 2022 NAICS Manual, 561110 Office Administrative Services
    publisher: U.S. Census Bureau and Office of Management and Budget
    source_type: named-industry-operating-guidance
    location: https://www.census.gov/naics/reference_files_tools/2022_NAICS_Manual.pdf
    authority_reason: 'NAICS 561110 is authoritative for the lane''s named industry context: day-to-day office administrative
      services such as billing and recordkeeping, personnel, and logistics for others on a contract or fee basis, without
      providing staff for complete business operations.'
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_naics_revision
    status: active
