    publisher: U.S. Bureau of Labor Statistics
    source_type: recognized-office-administration-workflow-reference
    location: https://www.bls.gov/ooh/office-and-administrative-support/secretaries-and-administrative-assistants.htm
    authority_reason: BLS is a federal labor-statistics authority. Its occupational guidance is authoritative for public terminology
      around office administration tasks such as correspondence, appointment scheduling, file maintenance, records, document
      preparation, and office information handling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: bls-admin-services-managers
    title: Administrative Services and Facilities Managers
    publisher: U.S. Bureau of Labor Statistics
    source_type: recognized-administrative-workflow-reference
    location: https://www.bls.gov/ooh/management/administrative-services-managers.htm
    authority_reason: BLS is authoritative for public terminology around administrative services, office procedures, records,
      supplies, mail, facilities coordination, and support-service oversight. It helps separate office administration records
      work from facilities or management approval authority.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
