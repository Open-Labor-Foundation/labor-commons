knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Administrative support and business services scheduling must be grounded in NAICS 561 non-core support services,
      contract or fee-basis service boundaries, office administrative services, business support services, and client service
      records.
  - class: Recognized workflow references tied directly to the lane
    rationale: Scheduling coordination requires public occupational and schedule-assessment references for appointment, work
      order, staffing table, schedule update, delay, and cross-department coordination terminology.
  - class: Evidence or control standards relevant to the lane
    rationale: The lane depends on audit-ready queue records, source schedules, labor-hour recordkeeping boundaries, service-contract
      evidence, access controls, and records-management traceability.
  source_selection_approach: 'Use NAICS, BLS, and Census NAPCS sources to define the named industry as

    non-core administrative and business support services delivered on a

    contract or fee basis. Use O*NET administrative and planning clerk task

    references plus the GAO Schedule Assessment Guide to ground scheduling,

    staffing-table, work-order, delay, and schedule-update workflows. Use FAR

    service contracting and quality assurance as public service-level,

    surveillance, and acceptance-boundary references. Use DOL wage-and-hour

    recordkeeping and overtime guidance to constrain staff scheduling claims,

    and NARA/NIST sources for source-record, access-control, audit, and

    retention evidence expectations. Tenant service catalogs, SOWs, labor

    rules, calendars, approval matrices, privacy rules, and system mappings

    remain mandatory runtime inputs.

    '
