    authority_reason: SEC KPI guidance is an authoritative public baseline for metric definition, calculation, usefulness,
      management use, assumptions, methodology changes, and disclosure controls when service metrics may be published or relied
      on externally.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_sec_update
    status: active
  - source_id: nara-universal-erm-requirements
    title: Universal Electronic Records Management Requirements
    publisher: U.S. National Archives and Records Administration
    source_type: records-management-workflow-reference
    location: https://www.archives.gov/records-mgmt/policy/universalermrequirements
    authority_reason: NARA is the U.S. federal records authority; its ERM requirements define capture, metadata, retention,
      disposition, access, and auditability expectations for systems that hold administrative service evidence.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nara-unauthorized-dispositions
    title: Unauthorized Dispositions
    publisher: U.S. National Archives and Records Administration
    source_type: recordkeeping-failure-handling
    location: https://www.archives.gov/records-mgmt/resources/unauthorized-dispositions
    authority_reason: NARA's unauthorized disposition guidance is authoritative for escalation when records are unlawfully
