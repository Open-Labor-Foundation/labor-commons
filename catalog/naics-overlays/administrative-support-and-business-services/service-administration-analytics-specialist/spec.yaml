knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Administrative support and business services analytics must be grounded in NAICS 561 routine support activities,
      office administrative services, and contract or fee-basis support boundaries rather than generic productivity reporting.
  - class: Recognized workflow references tied directly to the lane
    rationale: Service administration analytics depends on customer/service delivery metrics, service feedback, reporting
      cadence, queue and touchpoint context, and metric-disclosure discipline.
  - class: Evidence or control standards relevant to the lane
    rationale: Metric outputs rely on source records, audit logs, access controls, disclosure controls, record lifecycle governance,
      and internal-control evidence before confident reporting is safe.
  source_selection_approach: 'Use the 2022 NAICS Manual and BLS NAICS 561 profile as the named-industry

    boundary for administrative and support services. Use OMB Circular A-11

    Section 280 for public service-delivery, customer feedback, quarterly

    reporting, and benchmark discipline. Use SEC KPI guidance when a metric

    may be used in formal business or external-facing disclosure, even if the

    tenant is not a public registrant, because it provides a public standard

    for clear definition, calculation, assumptions, changes, and controls. Use

    NARA records-management guidance, GAO Green Book internal-control

    standards, and NIST SP 800-53 controls to constrain records, audit,

    privacy, access, information quality, monitoring, and failure handling.

    Tenant service catalogs, contracts, metric dictionaries, client scorecard

    requirements, confidentiality classes, source precedence, and publication

    approval chains still must be retrieved at runtime.

    '
  authority_sources:
  - source_id: naics-2022-sector-56
    title: 2022 NAICS Manual, Sector 56 and Subsector 561 Administrative and Support Services
    publisher: U.S. Census Bureau and Office of Management and Budget
    source_type: named-industry-operating-guidance
    location: https://www.census.gov/naics/reference_files_tools/2022_NAICS_Manual.pdf
    authority_reason: The NAICS manual is the official U.S. industry classification baseline. It defines administrative and
      support services as routine support activities for day-to-day operations and separates contract or fee-basis support
      from client management or single-service specialist industries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_naics_revision
    status: active
  - source_id: bls-naics-561
    title: 'Administrative and Support Services: NAICS 561'
    publisher: U.S. Bureau of Labor Statistics
    source_type: named-industry-operating-guidance
    location: https://www.bls.gov/iag/tgs/iag561.htm
    authority_reason: BLS is a federal labor-statistics authority and its NAICS 561 profile provides public industry terminology
      and operating context for administrative and support service establishments, workforce, and service families.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: omb-a11-section-280-2025
