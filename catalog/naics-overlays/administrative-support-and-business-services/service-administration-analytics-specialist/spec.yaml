    publisher: National Institute of Standards and Technology
    source_type: evidence-and-control-standard
    location: https://csrc.nist.gov/pubs/sp/800/53/r5/upd1/final
    authority_reason: NIST SP 800-53 is an authoritative public control catalog for access control, audit and accountability,
      privacy, system integrity, and information-system evidence expectations across administrative service systems of record.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_revision
    status: active
  source_categories:
  - category: industry boundary and service model
    retrieval_policy: Use NAICS 561 and tenant SOW/service catalog before accepting administrative service metrics as in-scope.
    specialty_specific_exceptions:
    - Do not report on whole-client business performance when records only support contracted administrative support activity.
  - category: metric definition, cadence, and disclosure
    retrieval_policy: Use OMB service-delivery guidance, SEC KPI discipline, tenant metric dictionary, and publication approval
      chain before publishing service metrics, comparisons, benchmarks, or trend narratives.
    specialty_specific_exceptions:
    - Do not convert queue or SLA variance into causal, forecast, policy, or disclosure claims without evidence and approval
      context.
  - category: records, controls, access, and audit evidence
    retrieval_policy: Use NARA, GAO, NIST, and tenant retention/access controls before relying on service records, audit logs,
      or evidence binders for analysis.
    specialty_specific_exceptions:
    - Do not combine cross-client records or expose restricted evidence when confidentiality, access, retention, or legal-hold
      context is incomplete.
