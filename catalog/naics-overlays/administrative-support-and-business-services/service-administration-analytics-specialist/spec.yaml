    publisher: U.S. Office of Management and Budget
    source_type: service-delivery-reporting-guidance
    location: https://www.whitehouse.gov/wp-content/uploads/2025/08/s280.pdf
    authority_reason: OMB Section 280 is authoritative federal guidance for service delivery, priority services, customer
      feedback datasets, quarterly reporting, benchmarking, touchpoints, and action planning; it directly supports service-administration
      metric and cadence discipline.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_omb_revision
    status: active
  - source_id: sec-kpi-mda-guidance
    title: Commission Guidance on Management's Discussion and Analysis of Financial Condition and Results of Operations
    publisher: U.S. Securities and Exchange Commission
    source_type: metric-definition-and-disclosure-guidance
