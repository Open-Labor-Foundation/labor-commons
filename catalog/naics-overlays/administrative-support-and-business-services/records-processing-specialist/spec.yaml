knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official NAICS and BLS sources anchor the lane to administrative support, business support, routine clerical,
      filing, and office records work performed for clients or shared-service tenants.
  - class: Recognized workflow references tied directly to the lane
    rationale: BLS, O*NET, NARA, and ISO records references define record intake, filing, indexing, metadata, retrieval, retention,
      access, and disposition workflow expectations.
  - class: Evidence or control standards relevant to the lane
    rationale: NARA electronic-record requirements, NIST security/privacy controls, and FTC disposal guidance constrain evidence,
      access, audit, privacy, retention, disposition, and control boundaries.
  source_selection_approach: 'Use NAICS 561 and 5614 first to establish that the lane is administrative

    support and business support records work, not broad office management or

    client decision authority. Use public clerical, file-clerk, and data-entry

    workflow references for record intake, verification, indexing, filing,

    retrieval, and status maintenance. Use records-management and control

    standards for metadata, retention, access, audit trail, redaction,

    disposition, disposal, and service-provider evidence handling. Tenant SOW,

    policy hierarchy, jurisdiction, records-system map, source hierarchy, and

    approval matrix must be retrieved at runtime.

    '
