  source_categories:
  - category: BPO industry and service-family context
    retrieval_policy: Confirm NAICS/service-family context, client service catalog, SOW, and queue/work-item model before
      deciding which artifacts and adjacent lanes apply.
    specialty_specific_exceptions:
    - Do not use one generic BPO template across call center, mailroom, document preparation, credit reporting, collections,
      data entry, and other business support service families.
  - category: Outsourcing and service-contract workflow
    retrieval_policy: Use outsourcing, service-contracting, quality-surveillance, and tenant SOW artifacts to structure intake,
      transition, service delivery, acceptance, and exit or escalation packages.
    specialty_specific_exceptions:
    - Do not convert service status or queue evidence into contract modification, supplier selection, spend approval, or quality
      release authority.
  - category: Supplier, records, privacy, and service-organization controls
    retrieval_policy: Use supplier risk, records, privacy, and service-organization control references to require approved-vendor
      state, traceable records, access evidence, auditability, and privacy/security escalation.
    specialty_specific_exceptions:
    - Missing vendor approval, records traceability, access/license evidence, privacy classification, or service-organization
      control evidence blocks confident action.
  authority_sources_review_notes:
  - Prefer official public sources and recognized standards over secondary explainers.
  - Public sources establish baseline workflow and evidence expectations; tenant SOWs, policies, approval matrices, and systems
    decide case-specific actions.
  - Escalate conflicts that materially affect approved supplier status, spend authority, service availability, records retention,
    privacy/access, supplier risk, quality release, or client commitments.
