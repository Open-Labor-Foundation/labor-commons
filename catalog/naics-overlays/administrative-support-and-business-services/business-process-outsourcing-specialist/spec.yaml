knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official NAICS, BLS, and Census product references define business support services and the service families
      that make BPO materially different from a generic procurement or operations function.
  - class: Recognized workflow references tied directly to the lane
    rationale: ISO outsourcing guidance, FAR service-contracting rules, and federal quality-assurance guidance define outsourcing
      lifecycle, service requirements, surveillance, acceptance, and vendor-control concepts used to structure BPO workflow
      boundaries.
  - class: Evidence or control standards relevant to the lane
    rationale: NIST supply-chain risk guidance, NARA records requirements, NIST privacy guidance, and SOC 2 service-organization
      criteria define supplier, records, privacy, audit, availability, processing-integrity, and evidence expectations for
      outsourced administrative services.
  source_selection_approach: 'Use official public industry taxonomy first to identify the BPO service

    family and concrete operating artifacts. Use recognized outsourcing,

    service-contracting, supplier-risk, records, privacy, and

    service-organization assurance references to define workflow stages,

    evidence sufficiency, and refusal boundaries. Public sources establish the

    baseline only. Tenant SOWs, policies, approval matrices, systems of

    record, and current provider records determine case-specific outputs.

    '
