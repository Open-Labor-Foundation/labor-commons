knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official NAICS and occupational sources define administrative support and business support services as routine,
      contract or fee-based office, document, recordkeeping, and clerical processing rather than client core decision authority.
  - class: Recognized workflow references tied directly to the lane
    rationale: Public records-management and clerical workflow references define record lifecycle, source documents, data
      entry, filing, retrieval, and disposition concepts used to move back-office work safely through a queue.
  - class: Evidence or control standards relevant to the lane
    rationale: Privacy, security, payment-data, consumer-report disposal, and audit-control sources define evidence, access,
      retention, and refusal constraints for high-volume administrative processing.
  source_selection_approach: 'Use U.S. Census NAICS Sector 56 and NAICS 5611/5614 definitions first to

    anchor the industry boundary to contract or shared-service routine support

    work. Use BLS and O*NET task references to constrain document preparation,

    data entry, filing, record updating, and clerical processing claims. Use

    NARA records-management guidance, NIST security and privacy controls, FTC

    Safeguards and Disposal Rule guidance, and PCI SSC materials to constrain

    evidence, access, retention, disposal, and payment-data boundary behavior.

    Tenant service model, client SOW, jurisdiction, data category, system map,

    and approval matrix remain mandatory runtime inputs and are never guessed.

    '
  authority_sources:
  - source_id: census-naics-2022-sector-56
    title: '2022 NAICS Manual: Sector 56 Administrative and Support and Waste Management and Remediation Services'
    publisher: U.S. Census Bureau
    source_type: official-industry-classification
    location: https://www.census.gov/naics/reference_files_tools/2022_NAICS_Manual.pdf
    authority_reason: The U.S. Census Bureau publishes NAICS and defines Sector 56, NAICS 561110, and NAICS 5614 as routine
      day-to-day support, office administrative, document preparation, and business support services performed for clients
      or the same enterprise.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: bls-general-office-clerks
    title: 'Occupational Outlook Handbook: General Office Clerks'
    publisher: U.S. Bureau of Labor Statistics
    source_type: public-clerical-workflow-reference
    location: https://www.bls.gov/ooh/office-and-administrative-support/general-office-clerks.htm
    authority_reason: BLS is a U.S. Department of Labor statistical agency, and its occupational profile directly describes
      clerical duties such as copying, filing, updating paper and electronic documents, preparing and processing bills, collecting
      information, and performing data entry.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: onet-data-entry-keyers
    title: 43-9021.00 - Data Entry Keyers
    publisher: O*NET OnLine, sponsored by the U.S. Department of Labor
    source_type: public-data-entry-workflow-reference
    location: https://www.onetonline.org/link/summary/43-9021.00
    authority_reason: O*NET is sponsored by the U.S. Department of Labor and provides task-level workflow detail for data-entry
      roles, including verifying data accuracy, compiling and sorting information, maintaining logs, and storing completed
      documents.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nara-records-management-faq
    title: Frequently Asked Questions about Records Management in General
    publisher: National Archives and Records Administration
    source_type: official-records-lifecycle-guidance
    location: https://www.archives.gov/records-mgmt/faqs/general.html
    authority_reason: NARA is the U.S. federal authority for records management and its FAQ defines records lifecycle stages,
      file plans, indexes, taxonomies, data dictionaries, access procedures, security procedures, and records schedules that
      constrain evidence and disposition behavior.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nist-sp-800-53-r5
    title: SP 800-53 Rev. 5, Security and Privacy Controls for Information Systems and Organizations
    publisher: National Institute of Standards and Technology
    source_type: recognized-security-and-privacy-control-standard
    location: https://csrc.nist.gov/pubs/sp/800/53/r5/upd1/final
    authority_reason: NIST SP 800-53 is a recognized public control catalog covering access control, audit and accountability,
      identification and authentication, media protection, PII processing and transparency, and system integrity controls
      relevant to back-office processing systems.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-safeguards-rule-guide
    title: 'FTC Safeguards Rule: What Your Business Needs to Know'
    publisher: Federal Trade Commission
    source_type: consumer-information-security-guidance
    location: https://www.ftc.gov/business-guidance/resources/ftc-safeguards-rule-what-your-business-needs-know
    authority_reason: FTC is the primary U.S. consumer-protection regulator for entities under its GLBA Safeguards Rule jurisdiction,
      and this guidance defines service-provider, customer-information, access-control, inventory, logging, disposal, and
      incident-response expectations relevant to outsourced processing of customer information.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-disposal-rule
    title: Disposal of Consumer Report Information and Records
    publisher: Federal Trade Commission
    source_type: consumer-report-disposal-rule
    location: https://www.ftc.gov/legal-library/browse/rules/disposal-consumer-report-information-records
    authority_reason: FTC's Disposal Rule page summarizes 16 CFR Part 682, which requires businesses possessing consumer reports
      or related records for a business purpose to take appropriate measures when disposing of sensitive information.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: pci-dss-standards
    title: Payment Card Industry Data Security Standard
    publisher: PCI Security Standards Council
    source_type: recognized-payment-data-security-standard
    location: https://www.pcisecuritystandards.org/standards/pci-dss/
    authority_reason: PCI SSC is the recognized payment-card security standards body, and PCI DSS constrains back-office workflows
      that view, process, transmit, store, or route payment-card data during administrative fulfillment.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: Industry boundary and routine support-work baseline
    retrieval_policy: Use NAICS Sector 56 and NAICS 5611/5614 definitions before deciding whether a request is administrative
      support, business support, document preparation, or a more specialized adjacent service.
    specialty_specific_exceptions:
    - Do not treat contract support wording as authority to operate the client's core business or make strategic, legal, HR,
      financial, or credit decisions.
  - category: Clerical processing, document preparation, and data-entry workflow
    retrieval_policy: Use BLS and O*NET workflow descriptions for source-document review, copying, filing, updating records,
      processing office documents, data entry, accuracy verification, logging, and completed-document storage.
    specialty_specific_exceptions:
    - Do not mark a work item complete merely because data was keyed; completion requires source-record, QA, and audit evidence
      in the authoritative workflow.
  - category: Records lifecycle, privacy, security, disposal, and payment-data controls
    retrieval_policy: Use NARA, NIST, FTC, and PCI SSC sources whenever the case involves records lifecycle, retention, secure
      disposal, access control, audit logs, customer information, consumer reports, or payment-card data.
    specialty_specific_exceptions:
    - Escalate when tenant retention schedule, legal hold, privacy rule, card-data control, or consumer-report disposal requirement
      is missing or conflicts with the requested action.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline for administrative support, clerical processing, records lifecycle, privacy/security
      controls, and sensitive-data handling.
    - Tenant policies, client SOWs, service catalogs, data-processing terms, jurisdiction, system names, source hierarchy,
      QA rules, and approval thresholds must be retrieved at runtime.
    - Every processing, exception, and completion claim must cite named source records, systems of record, and evidence artifacts.
  specialty_specific_exceptions:
  - Back-office processing is execution and evidence control; it must not drift into broad administrative management, consulting,
    legal, HR, finance, collections, or IT ownership.
  - Conflicting client scope, source documents, system records, retention requirements, or QA outcomes require exception handling
    rather than narrative reconciliation.
  - Completion requires an audit-ready fulfillment record, not an analyst note, inbox message, or local spreadsheet row.
  source_baseline_version: '2026-04-10'
  next_review_due_at: '2026-08-08'
