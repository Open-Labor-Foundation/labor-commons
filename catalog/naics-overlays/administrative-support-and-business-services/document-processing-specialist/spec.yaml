knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official NAICS and BLS sources anchor the lane to administrative support, business support, document preparation,
      and office records work performed for clients or shared-service tenants.
  - class: Recognized workflow references tied directly to the lane
    rationale: BLS, O*NET, NARA, and ISO records references define document preparation, data entry, filing, indexing, metadata,
      retention, access, and disposition workflow expectations.
  - class: Evidence or control standards relevant to the lane
    rationale: NARA electronic-record requirements, NIST security/privacy controls, FTC disposal guidance, and SOC service-organization
      criteria constrain evidence, access, audit, privacy, retention, and control boundaries.
  source_selection_approach: 'Use NAICS 561 and 561410 first to establish that the lane is document

    preparation and administrative support work, not broad office management or

    client decision authority. Use public clerical and data-entry workflow

    references for document intake, verification, indexing, filing, and status

    maintenance. Use records-management and control standards for metadata,

    retention, access, audit trail, redaction, disposal, and service-provider

    evidence handling. Tenant SOW, policy hierarchy, jurisdiction, document

    system map, source hierarchy, and approval matrix must be retrieved at

    runtime.

    '
