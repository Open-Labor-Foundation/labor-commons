knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Administrative support and business services must be grounded in NAICS 561 routine support activities, office
      administrative services, business support services, and the contract or fee-basis boundary between support work and
      client management.
  - class: Recognized workflow references tied directly to the lane
    rationale: Shared-service work requires service catalog, provider, governance, marketplace, migration, SLA, customer-agency,
      and operational handoff references rather than generic service-desk assumptions.
  - class: Evidence or control standards relevant to the lane
    rationale: The lane depends on source records, audit logs, access permissions, performance evidence, records controls,
      confidentiality constraints, and failure escalation before it can resolve or communicate service outcomes.
  source_selection_approach: 'Use the 2022 NAICS Manual as the named-industry boundary for Sector 56,

    Subsector 561, and office and business support services. Use OMB M-19-16,

    GSA USSM, the M3 modernization playbook, and the Shared Services Governance

    Board charter as the public baseline for shared-service service delivery,

    governance, provider marketplace, performance, and customer-agency

    operating expectations. Use NARA records-management guidance, eCFR/NARA

    record-creation and maintenance rules, NIST SP 800-53 Rev. 5, ISO/IEC

    20000-1 implementation guidance, and GAO shared-services findings for

    evidence, control, knowledge, audit, and failure-handling expectations.

    Tenant service catalogs, contracts, SLAs, runbooks, entitlement rules,

    confidentiality requirements, owner matrices, and system mappings still

    must be retrieved at runtime.

    '
  authority_sources:
