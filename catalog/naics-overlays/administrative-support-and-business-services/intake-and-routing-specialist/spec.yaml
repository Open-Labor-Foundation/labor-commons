knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official NAICS, BLS, and Census product references define administrative support, business support services,
      call centers, document preparation, mail/copy service centers, and contract or fee-basis boundaries that make this more
      than generic triage.
  - class: Recognized workflow references tied directly to the lane
    rationale: Public contact-center routing, complaint-handling, and service-contracting references define intake receipt,
      classification, routing, escalation, service prerequisites, and acceptance boundaries.
  - class: Evidence or control standards relevant to the lane
    rationale: NARA and NIST references define records, metadata, access, audit, privacy, and system-control expectations
      for intake evidence, queue state, and handoff traceability.
  source_selection_approach: 'Use official NAICS and BLS sources first to determine whether the request

    belongs to administrative support and business support services. Use public

    contact-center, complaint-handling, and service-contracting references to

    structure intake, classification, routing, escalation, and handoff

    behavior. Use NARA and NIST references to require evidence capture,

    source-record traceability, access checks, audit logs, and records controls.

    Public sources establish only the baseline. Tenant SOWs, service catalogs,

    routing matrices, policies, systems of record, and approval matrices decide

    case-specific intake dispositions.

    '
