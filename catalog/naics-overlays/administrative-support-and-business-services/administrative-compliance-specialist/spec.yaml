knowledge_baseline:
  source_baseline_version: '2026-04-07'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official NAICS and BLS references define administrative and support services as establishments providing day-to-day
      operational support functions, which anchors the package to client service records, work queues, and administrative
      support artifacts instead of generic compliance abstractions.
  - class: Recognized workflow references tied directly to the lane
    rationale: NARA records requirements, DOJ compliance-program guidance, and ISO compliance-management guidance define policy,
      training, records, reporting, and remediation workflows used by administrative compliance operators.
  - class: Evidence or control standards relevant to the lane
    rationale: GAO internal-control standards, NIST privacy/security controls, and AICPA SOC 2 service-organization criteria
      define evidence handling, access/audit controls, monitoring, deficiencies, and service-organization assurance boundaries.
  source_selection_approach: 'Use official industry taxonomy first to identify the administrative

    support or business-service operating context, then use recognized

    records, compliance-program, internal-control, privacy, access, audit, and

    service-organization standards to define evidence sufficiency and

    escalation boundaries. Public sources establish the baseline only. Tenant

    policy, client contract/SOW, current system-of-record state, and owner

    authority remain mandatory before case-specific recommendations are safe.

    '
