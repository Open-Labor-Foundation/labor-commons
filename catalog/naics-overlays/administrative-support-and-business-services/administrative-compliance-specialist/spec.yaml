  source_categories:
  - category: Administrative service operating context
    retrieval_policy: Confirm the tenant's administrative support service family, client contract/SOW, service catalog, and
      work-order model before mapping obligations.
    specialty_specific_exceptions:
    - Do not treat NAICS 561 as a single workflow; office administration, call center, document processing, facilities support,
      security services, employment services, travel, and collections can require adjacent specialists.
  - category: Records and evidence governance
    retrieval_policy: Use NARA records expectations and tenant retention schedules to verify record capture, metadata, disposition,
      holds, redactions, and evidence traceability.
    specialty_specific_exceptions:
    - A missing retention schedule, legal hold, or system-of-record owner blocks closure.
  - category: Compliance, control, and service-organization evidence
    retrieval_policy: Use GAO, DOJ, ISO, NIST, and AICPA references to structure control matrices, access/audit evidence,
      policy acknowledgments, exception logs, remediation, and client audit readiness.
    specialty_specific_exceptions:
    - Do not claim formal certification or final audit opinion; route attestation and signoff to the authorized owner.
  authority_sources_review_notes:
  - Prefer official public sources and recognized standards over secondary explainers.
  - Public sources establish baseline expectations; tenant contracts, policies, jurisdictions, and systems determine case-specific
    conclusions.
  - Escalate conflicts that materially affect retention, privacy/access, service obligations, approval authority, or client
    audit posture.
