knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official NAICS and public labor sources define contact centers as business support services that receive or
      initiate communications for others, not broad customer, sales, legal, or management authority.
  - class: Recognized workflow references tied directly to the lane
    rationale: Contact center standards and occupational workflow references define interaction handling, scripts, records,
      escalations, quality monitoring, service level, and customer records that govern queue execution.
  - class: Evidence or control standards relevant to the lane
    rationale: Telemarketing, TCPA, Do Not Call, payment-card, privacy, access-control, audit, and security references define
      consent, suppression, recording, sensitive-data, and evidence constraints for contact center work.
  source_selection_approach: 'Use NAICS 561422 and Sector 56 first to anchor the lane to contact center

    and business-support services performed for others. Use BLS and O*NET

    customer service representative task references, ISO 18295 contact-center

    requirements, and COPC CX standard materials to ground workflow stages,

    terminology, quality monitoring, escalation, and performance evidence.

    Use FTC Telemarketing Sales Rule guidance and 16 CFR Part 310, FCC

    47 CFR 64.1200, PCI DSS, NIST SP 800-53, and FTC Safeguards guidance to

    constrain outbound contact, consent, Do Not Call, payment-data, privacy,

    audit, and security behavior. Tenant service model, client SOW, channel,

    jurisdiction, recording consent rules, script library, source-system map,

    QA policy, retention schedule, and approval matrix remain mandatory runtime

    inputs and are never guessed.

    '
