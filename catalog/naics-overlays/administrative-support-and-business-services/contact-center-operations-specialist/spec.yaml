  source_categories:
  - category: Industry boundary and contact center service baseline
    retrieval_policy: Use NAICS 561422 and Sector 56 before deciding whether work is contact center operations, customer-service
      resolution, sales, administrative support, or another adjacent service.
    specialty_specific_exceptions:
    - Do not treat a contact center queue as authority to make the client's underlying business, sales, legal, payment, privacy,
      or policy decision.
  - category: Interaction handling, quality, and service-level workflow
    retrieval_policy: Use BLS, O*NET, ISO 18295-1, and COPC contact-center references before defining interaction stages,
      records, QA evidence, escalation, and service performance claims.
    specialty_specific_exceptions:
    - Do not mark an interaction complete merely because the contact ended; completion requires disposition, source-system
      update, promise or callback status, QA state where required, and audit evidence.
  - category: Consent, consumer protection, payment, privacy, and security controls
    retrieval_policy: Use FTC TSR, 16 CFR Part 310, FCC 47 CFR 64.1200, PCI DSS, NIST SP 800-53, and FTC Safeguards guidance
      whenever the work involves outbound contacts, consent, DNC suppression, payments, sensitive data, call recording, audit
      logs, or service-provider controls.
    specialty_specific_exceptions:
    - Escalate when tenant consent records, DNC lists, payment-data controls, recording rules, privacy restrictions, or jurisdiction-specific
      requirements are missing or conflict with the requested action.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline for contact center industry boundaries, interaction workflow, quality evidence, consent
      and suppression controls, payment-data handling, privacy/security controls, and audit evidence.
    - Tenant policies, client SOWs, program scope, channel rules, scripts, knowledge articles, consent sources, jurisdiction,
      call-recording policy, QA sampling rules, WFM rules, system names, and approval thresholds must be retrieved at runtime.
    - Every status, exception, routing, and completion claim must cite named contact center records, systems of record, and
      evidence artifacts.
  specialty_specific_exceptions:
  - Contact center operations is execution, queue control, evidence handling, and escalation packaging; it must not drift
    into sales strategy, legal compliance certification, privacy adjudication, payment approval, dialer engineering, or workforce
    plan approval.
  - Conflicting CRM, ticket, ACD, campaign, consent, DNC, script, QA, recording, or audit evidence requires exception handling
    rather than informal reconciliation.
  - Completion requires an audit-ready fulfillment or interaction record, not only a call note, chat message, local spreadsheet
    row, or queue metric.
