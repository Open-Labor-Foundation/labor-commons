knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Administrative support and business services must be grounded in NAICS 561 routine support activities, office
      administrative services, and the contract or fee-basis boundary between support work and client management.
  - class: Recognized workflow references tied directly to the lane
    rationale: Records, documents, retention, access, and administrative-service workflows require recognized recordkeeping
      and administrative-services references, not generic office productivity assumptions.
  - class: Evidence or control standards relevant to the lane
    rationale: The lane depends on source records, audit logs, access permissions, retention controls, and evidence traceability
      before it can update or summarize records safely.
  source_selection_approach: 'Use the 2022 NAICS Manual as the named-industry boundary for Sector 56,

    Subsector 561, and Industry 561110. Use BLS administrative services

    manager guidance for public terminology around administrative services,

    records, supplies, facilities, and procedure oversight. Use NARA records

    management and disposition guidance for record lifecycle, schedules,

    retention, unauthorized disposition, and official-record escalation. Use

    NIST SP 800-53 Rev. 5 for access control, audit and accountability,

    configuration, privacy, and security evidence expectations in systems of

    record. Use NARA/eCFR record-creation and maintenance rules for official

    recordkeeping controls, required documentation, and system-maintenance

    expectations. Tenant service catalogs, contracts, retention schedules,

    privacy notices, access models, and system mappings still must be retrieved

    at runtime.

    '
  authority_sources:
  - source_id: naics-2022-sector-56
    title: 2022 NAICS Manual, Sector 56 and Subsector 561
    publisher: U.S. Census Bureau and Office of Management and Budget
    source_type: named-industry-operating-guidance
    location: https://www.census.gov/naics/reference_files_tools/2022_NAICS_Manual.pdf
    authority_reason: The NAICS manual is the official U.S. industry classification baseline. It defines administrative and
      support services as routine support activities for day-to-day operations and distinguishes contract or fee-basis support
      from strategic management, public administration, and single-service specialist industries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_naics_revision
    status: active
  - source_id: naics-2022-561110
    title: 2022 NAICS Manual, 561110 Office Administrative Services
    publisher: U.S. Census Bureau and Office of Management and Budget
    source_type: named-industry-operating-guidance
    location: https://www.census.gov/naics/reference_files_tools/2022_NAICS_Manual.pdf
    authority_reason: 'NAICS 561110 is authoritative for the lane''s named industry context: day-to-day office administrative
      services such as billing and recordkeeping, personnel, and logistics for others on a contract or fee basis, without
      providing staff for complete business operations.'
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_naics_revision
    status: active
  - source_id: bls-admin-services-managers
    title: Administrative Services and Facilities Managers
    publisher: U.S. Bureau of Labor Statistics
    source_type: recognized-administrative-workflow-reference
    location: https://www.bls.gov/ooh/management/administrative-services-managers.htm
    authority_reason: BLS is a federal labor-statistics authority. Its occupational guidance is authoritative for public terminology
      around administrative services work, office procedures, recordkeeping, mail or supplies, and administrative support
      coordination.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nara-federal-records-management
    title: Federal Records Management
    publisher: National Archives and Records Administration
    source_type: public-recordkeeping-guidance
    location: https://www.archives.gov/records-mgmt
    authority_reason: NARA is the U.S. federal records authority. Its public records-management guidance is authoritative
      for records officers, records policy, recordkeeping topics, and lifecycle governance used as the public baseline for
      records discipline.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: nara-disposition-federal-records
    title: 'Disposition of Federal Records: A Records Management Handbook'
    publisher: National Archives and Records Administration
    source_type: public-retention-and-disposition-guidance
    location: https://www.archives.gov/files/records-mgmt/pdf/dfr-2000.pdf
    authority_reason: NARA's disposition handbook is authoritative for record lifecycle, records schedules, retention, transfer,
      destruction, and the need to use approved disposition authority rather than ad hoc administrative judgment.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: nara-unauthorized-dispositions
    title: Unauthorized Dispositions
    publisher: National Archives and Records Administration
    source_type: public-recordkeeping-failure-handling
    location: https://www.archives.gov/records-mgmt/resources/unauthorized-dispositions
    authority_reason: NARA's unauthorized disposition guidance is authoritative for escalation when records are unlawfully
      removed, altered, deleted, destroyed, or otherwise corrupted, which is a key refusal trigger for this lane.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nist-sp-800-53-rev5
    title: Security and Privacy Controls for Information Systems and Organizations, SP 800-53 Rev. 5
    publisher: National Institute of Standards and Technology
    source_type: evidence-and-control-standard
    location: https://csrc.nist.gov/pubs/sp/800/53/r5/upd1/final
    authority_reason: NIST SP 800-53 is an authoritative public control catalog for information systems and organizations.
      It supports access control, audit and accountability, privacy, identification, and system integrity expectations for
      administrative systems of record.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_revision
    status: active
  - source_id: ecfr-records-creation-maintenance
    title: 36 CFR Part 1222, Creation and Maintenance of Federal Records
    publisher: Electronic Code of Federal Regulations and National Archives and Records Administration
    source_type: recordkeeping-control-regulation
    location: https://www.ecfr.gov/current/title-36/chapter-XII/subchapter-B/part-1222
    authority_reason: The eCFR publishes current federal regulations, and NARA regulations are authoritative for federal record
      creation and maintenance. The part supports official-record controls, documentation, and maintenance expectations that
      constrain administrative record updates.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
