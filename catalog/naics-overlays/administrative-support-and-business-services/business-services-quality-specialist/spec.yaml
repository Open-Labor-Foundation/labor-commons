  source_categories:
  - category: Administrative support and business-services operating context
    retrieval_policy: Confirm the tenant service family, client SOW, service catalog, work-order model, queue owner, and acceptance
      criteria before reviewing quality evidence.
    specialty_specific_exceptions:
    - Do not treat NAICS 561 as one workflow; document processing, contact center, employment services, facilities support,
      security services, collections, travel, and office administration may require adjacent specialists.
  - category: Quality, service management, audit, and complaint workflow
    retrieval_policy: Use ISO quality, service, audit, and complaint references to structure review criteria, sampled work,
      nonconformity, complaints, corrective action, effectiveness checks, and audit-ready evidence.
    specialty_specific_exceptions:
    - Do not imply ISO certification, external audit opinion, or final QA signoff unless tenant authority explicitly grants
      it.
  - category: Evidence, records, controls, privacy, and safety escalation
    retrieval_policy: Use GAO, NARA, AICPA, NIST, and OSHA baselines to preserve control evidence, auditability, service-organization
      boundaries, privacy/access controls, and safety incident escalation.
    specialty_specific_exceptions:
    - A missing record owner, retention rule, access authority, incident owner, or control-evidence trail blocks release or
      closure.
  retrieval_policy:
    mode: local_reviewed_baseline_plus_tenant_retrieval
    notes:
    - Public sources define the shared baseline only.
    - Tenant SOWs, quality plans, SOPs, service catalogs, acceptance criteria, approval matrices, systems-of-record maps,
      and current evidence must be retrieved at runtime.
    - Escalate whenever tenant policy, client contract, public guidance, safety rule, privacy/access restriction, or operational
      practice materially conflicts.
  specialty_specific_exceptions:
  - Keep the lane centered on evidence-backed business-services quality handling, not complete operation of the client business.
  - Separate quality assurance recommendations from formal audit, certification, legal, safety, HR, finance, and executive
    approval authority.
  - Do not close quality work without review support, evidence traceability, and documented owner authority.
  next_review_due_at: '2026-10-07'
