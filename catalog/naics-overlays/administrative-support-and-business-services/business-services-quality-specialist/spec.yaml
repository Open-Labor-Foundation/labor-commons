knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official NAICS and BLS references define administrative and support services as routine support activities
      provided to other organizations, which anchors the package to service catalogs, client work queues, service tickets,
      and contract or fee-basis support boundaries.
  - class: Recognized workflow references tied directly to the lane
    rationale: ISO 9001, ISO 10002, ISO/IEC 20000-1, and ISO 19011 provide recognized public quality, complaints, service-management,
      and audit workflow references for quality review, monitoring, nonconformance, corrective action, service quality, and
      audit evidence.
  - class: Evidence or control standards relevant to the lane
    rationale: GAO internal control, NARA records requirements, AICPA SOC 2 service-organization assurance, NIST control guidance,
      and OSHA recordkeeping provide public baselines for evidence integrity, control monitoring, auditability, privacy/access,
      service-organization control boundaries, and safety-incident escalation.
  source_selection_approach: 'Use NAICS and BLS first to confirm that the work is administrative support

    or business-service quality work rather than complete client operations,

    single-service specialist work, or management consulting. Use ISO quality,

    complaints, service-management, and audit references to structure review,

    evidence, nonconformance, corrective action, and service-quality workflow.

    Use GAO, NARA, AICPA, NIST, and OSHA public controls to constrain evidence,

    audit, recordkeeping, privacy/access, service-organization, and safety

    escalation behavior. Tenant SOWs, service catalogs, SOPs, quality plans,

    approval matrices, and systems of record remain mandatory before case-

    specific release, hold, or closure recommendations are safe.

    '
