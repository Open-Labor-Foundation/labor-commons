knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official NAICS, BLS, and Census references define administrative support services and employment services,
      including employment placement, temporary help, and employee leasing contexts that make this workforce coordination
      lane materially different from generic project coordination.
  - class: Recognized workflow references tied directly to the lane
    rationale: Public O*NET occupational references and FAR service-contracting references provide workforce, staffing table,
      work-order, schedule, service requirement, and handoff terminology directly relevant to coordination and routing.
  - class: Evidence or control standards relevant to the lane
    rationale: OSHA, EEOC, DOL WHD, NARA, NIST, and FAR quality references constrain safety readiness, contingent-worker boundaries,
      wage-hour record handling, access, audit, records, and acceptance evidence.
  source_selection_approach: 'Use NAICS and BLS first to establish that the lane belongs to NAICS 561

    administrative support and employment-service workflows rather than generic

    HR or project management. Use O*NET task references for staffing-table,

    personnel-record, work-order, schedule, delay, and cross-department

    coordination vocabulary. Use OSHA and EEOC official contingent-worker

    guidance to preserve staffing-agency, host-employer, safety, and EEO

    escalation boundaries. Use DOL wage-and-hour guidance to constrain

    timekeeping, overtime, and compensable-time claims. Use FAR service

    contracting and quality assurance as vendor-neutral public references for

    SOW, service-level, surveillance, and acceptance boundaries. Use NARA and

    NIST for source-record, access-control, audit, retention, and privacy

    evidence expectations. Tenant service catalogs, job-order rules, SOWs,

    labor policies, safety procedures, owner matrices, and system mappings

    remain mandatory runtime inputs.

    '
