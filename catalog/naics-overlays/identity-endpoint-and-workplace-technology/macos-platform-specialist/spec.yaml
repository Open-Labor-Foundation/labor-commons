shared_meta_agent_contracts:
  shared_corpus_delegates:
  - issue: 225
    slug: best-practices-curation-specialist
    purpose: authoritative best-practice baseline updates
    request_contract:
      inputs:
      - query intent
      - platform scope
      - severity
      - source freshness requirements
    response_contract:
      must_return:
      - prioritized controls
      - risk rationale
      - confidence signal
  - issue: 302
    slug: evaluation-design-specialist
    purpose: scenario calibration and edge-case design
    request_contract:
      inputs:
      - specialty boundary definition
      - required scenario categories
      response_contract:
      - evaluation set with normal, edge, out-of-scope, and escalation cases
      - pass/fail grading rubric
  - issue: 303
    slug: readiness-and-evidence-specialist
    purpose: readiness evidence validation
    request_contract:
      inputs:
      - validation artifacts
      - commercialization claims
      response_contract:
      - readiness evidence checklist
      - readiness risk flags
  - issue: 304
    slug: deployment-package-specialist
    purpose: deployment operations and rollback conventions
    request_contract:
      inputs:
      - runtime model
      - tenant isolation expectations
      response_contract:
      - deployment readiness checklist
      - rollback and monitoring expectations
  - issue: 305
    slug: commercialization-and-packaging-specialist
    purpose: market-readiness packaging and proof points
    request_contract:
      inputs:
      - positioning intent
      - target buyers
      response_contract:
      - positioning and proof-point draft
      - go-to-market gaps
  - issue: 306
    slug: authority-source-policy-specialist
    purpose: source governance and freshness policy
    request_contract:
      inputs:
      - source list
      - refresh policy requirements
      response_contract:
      - decay and refresh recommendations
      - invalid-source flags
  - issue: 307
    slug: specialty-boundary-and-routing-specialist
    purpose: boundary and routing policy consistency
    request_contract:
      inputs:
      - proposed support boundary
      - adjacent specialties
      response_contract:
      - boundary assertions
      - handoff language
  - issue: 308
    slug: agent-package-scaffolding-specialist
    purpose: package fields and schema consistency
    request_contract:
      inputs:
      - manifest/evidence/readiness targets
      response_contract:
      - artifact completeness checklist
  meta_agent_degradation_rules:
    on_unavailable:
      action: Run specialist-owned fallback path and mark confidence low for impacted recommendations.
      escalation: Return to orchestrator on unresolved evidence uncertainty.
    on_stale:
      action: Use last-reviewed baseline only where recency is explicitly unchanged.
      escalation: Require revalidation before market-facing claims.
    on_low_confidence:
      action: Reject guessing, request missing artifacts, and include explicit escalation decision.
