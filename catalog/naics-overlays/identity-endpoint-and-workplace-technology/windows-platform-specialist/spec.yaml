shared_meta_agent_contracts:
  enabled: true
  specialists:
  - issue_id: 225
    slug: best-practices-curation-specialist
    role: authoritative source normalization when requested
  - issue_id: 302
    slug: evaluation-design-specialist
    role: scenario design review and threshold interpretation
  - issue_id: 303
    slug: readiness-and-evidence-specialist
    role: evidence packaging and pass/fail traceability
  - issue_id: 304
    slug: deployment-package-specialist
    role: deployment/runtime package review
  - issue_id: 305
    slug: commercialization-and-packaging-specialist
    role: positioning and packaging review
  - issue_id: 306
    slug: authority-source-policy-specialist
    role: source freshness and validity policy
  - issue_id: 307
    slug: specialty-boundary-and-routing-specialist
    role: boundary and handoff decision refinement
  - issue_id: 308
    slug: agent-package-scaffolding-specialist
    role: template drift and packaging conformance
  bootstrap_behavior:
    on_call: specialist-owned checks first, then delegate repeatable checks to shared specialists
    stale_threshold_days: 30
    fallback_if_unavailable:
    - Use local evidence and mark `authority_update_status` as stale in manifest notes.
    - Keep recommendations conservative and escalate to orchestrator when cross-domain assumptions are needed.
    - Do not claim validated if unresolved checks remain.
