shared_meta_agent_contracts:
  policy:
    request_mode: deferred
    fallback_mode: specialist_owned_defaults
    failure_mode: escalate_low_confidence
  contracts:
  - meta_agent_id: 225
    name: best-practices-curation-specialist
    purpose: refresh authoritative policy baselines and best-practice bundles
    trigger: baseline_update_needed
    request_fields:
    - agent_slug
    - request_type
    - platforms
    - constraints
    response_fields:
    - best_practices
    - applicability
    - staleness_risk
    - last_updated
    fallback: keep current source set and flag confidence as reduced
  - meta_agent_id: 302
    name: evaluation-design-specialist
    purpose: generate/validate edge-case and regression evaluation vectors
    trigger: new_scenario_request_or_expansion
    request_fields:
    - scenario_domain
    - risk_profile
    - confidence_targets
    response_fields:
    - scenario_set
    - coverage_gaps
    - pass_criteria
    fallback: reuse internal 12-scenario matrix and annotate unknowns
  - meta_agent_id: 303
    name: readiness-and-evidence-specialist
    purpose: review evidence artifact completeness and gate mapping
    trigger: package_release_review
    request_fields:
    - delivery_target
    - validation_profile
    - artifacts
    response_fields:
    - readiness_matrix
    - gaps
    - required_remediations
    fallback: keep package in provisional review mode and require explicit human verification
  - meta_agent_id: 304
    name: deployment-package-specialist
    purpose: derive deployment/runtime/monitoring requirements for the specialist package
    trigger: deployment_documentation_request
    request_fields:
    - runtime_model
    - tenant_modes
    - operational_constraints
    response_fields:
    - deployment_profile
    - rollback
    - monitoring
    fallback: use minimal orchestrator runtime and tenant-bounded rollout model
  - meta_agent_id: 305
    name: commercialization-and-packaging-specialist
    purpose: validate packaging, pricing, and commercialization assumptions
    trigger: market-ready_evidence_build
    request_fields:
    - target_buyer
    - value_proposition
    - evidence_points
    response_fields:
    - positioning
    - pricing_models
    - proof_points
    fallback: retain baseline subscription model and label adoption gaps
  - meta_agent_id: 306
    name: authority-source-policy-specialist
    purpose: normalize source provenance and review intervals
    trigger: authority_source_update
    request_fields:
    - source_urls
    - policy_types
    - decay_expectation
    response_fields:
    - source_risk_profile
    - refresh_schedule
    - replacement_candidates
    fallback: preserve explicit source list and schedule manual review
  - meta_agent_id: 307
    name: specialty-boundary-and-routing-specialist
    purpose: polish explicit boundary and adjacent-specialist routing
    trigger: boundary_dispute_or_feedback
    request_fields:
    - candidate_request
    - adjacent_specialties
    - handoff_rules
    response_fields:
    - routing_guidance
    - rejection_template
    - escalation_owner
    fallback: return explicit out-of-scope refusal and route to orchestrator
  - meta_agent_id: 308
    name: agent-package-scaffolding-specialist
    purpose: validate package shape and manifest/evidence artifact consistency
    trigger: scaffold_or_release_request
    request_fields:
    - artifact_list
    - contract_fields
    - validation_gate
    response_fields:
    - package_checks
    - schema_compliance
    - delivery_readiness
    fallback: reuse repository standard template structure and manual lint verification
