shared_meta_agent_contracts:
  bootstrap:
    initialize_with_deferred_meta_agents: true
    stale_meta_agent_tolerance: soft-stop
    stale_threshold_days: 90
    fallback_mode: specialty-owned-minimum-outputs-without-assertive-rules
  delegated_agents:
  - issue_id: 225
    slug: best-practices-curation-specialist
    request_contract:
      required_inputs:
      - domain_family
      - candidate_sources
      - change_context
      expected_outputs:
      - curated_source_set
      - evidence_weighting
      - review_priority
    fallback_if_unavailable: Return concise source candidates with manual confidence tags and cite in manifest
  - issue_id: 306
    slug: authority-source-policy-specialist
    request_contract:
      required_inputs:
      - publisher_set
      - review_horizon
      - decay_policy
      expected_outputs:
      - policy-alignment
      - refresh_plan
    fallback_if_unavailable: Use conservative source review windows and explicit review reminders
  - issue_id: 302
    slug: evaluation-design-specialist
    request_contract:
      required_inputs:
      - specialty_boundary
      - risk_categories
      - minimum_thresholds
      expected_outputs:
      - scenario_matrix
      - threshold_mapping
    fallback_if_unavailable: Use local strict baseline scenario matrix with documented assumptions
  - issue_id: 307
    slug: specialty-boundary-and-routing-specialist
    request_contract:
      required_inputs:
      - candidate_out_of_scope
      - adjacent_specialties
      expected_outputs:
      - handoff_rules
      - rejection_templates
    fallback_if_unavailable: Apply conservative boundary rules in first-party contract and explicit rejection
