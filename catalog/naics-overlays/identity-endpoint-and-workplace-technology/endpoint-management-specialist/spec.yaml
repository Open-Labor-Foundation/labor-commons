shared_meta_agent_contracts:
  specialist_owned_scope:
  - Scenario design and scenario-driven boundary enforcement
  - Access-control correctness checks tied to endpoint trust and CA condition logic
  - Out-of-scope rejection logic and escalation policies
  - Tenant isolation constraints and rollback expectations
  delegated_scope:
  - Best-practice corpus normalization
  - Reusable readiness/evidence report templating
  - Deployment packaging copy and commercialization framing
  - External source-refresh orchestration and decay policy execution
  - Routing recommendations to adjacent specialties
  contracts:
  - id: '#225'
    name: best-practices-curation-specialist
    purpose: Provide continuously updated best-practice catalog for endpoint security posture
    fallback: Continue with static issue baseline and lower confidence where references are missing.
  - id: '#302'
    name: evaluation-design-specialist
    purpose: Suggest high-quality adversarial and edge-case scenario variants
    fallback: Keep existing 12 scenario set and require explicit human approval before adding new tests.
  - id: '#303'
    name: readiness-and-evidence-specialist
    purpose: Validate evidence format and human-verification integrity
    fallback: Re-run local manifest + JSON checks and mark verification blocks as owner-reviewed if external check unavailable.
  - id: '#304'
    name: deployment-package-specialist
    purpose: Standardize runtime and rollback playbooks
    fallback: Use package notes in this manifest and deployment/package.md as authoritative for now.
  - id: '#305'
    name: commercialization-and-packaging-specialist
    purpose: Define proof points and buyer-facing packaging model
    fallback: Use conservative starter commercial assumptions from this package until updated.
