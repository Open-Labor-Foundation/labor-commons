meta_agent_contracts:
  delegations:
  - best-practices-curation-specialist
  - evaluation-design-specialist
  - readiness-and-evidence-specialist
  - deployment-package-specialist
  - commercialization-and-packaging-specialist
  - authority-source-policy-specialist
  - specialty-boundary-and-routing-specialist
  - agent-package-scaffolding-specialist
  fallback_behavior:
    unavailable_or_stale: Use conservative prior-validated defaults from authoritative vendor guidance and explicitly mark
      assumptions+uncertainty, then request re-sync of delegated outputs from orchestrator.
    low_confidence: Return with explicit escalation decision, evidence gaps, and next-best safe recommendations.
