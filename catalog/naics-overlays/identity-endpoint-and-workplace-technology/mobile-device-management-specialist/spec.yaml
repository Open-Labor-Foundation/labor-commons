shared_meta_agents:
  initialization_mode: deferred
  fallback_policy:
    when_meta_agent_unavailable: return scope deferral and request refreshed orchestration assignment
    when_meta_agent_stale: return_low_confidence_with_source_review_note
    when_meta_agent_low_confidence: escalate_to_orchestrator_with_uncertainty
  delegated_agents:
  - specialist_slug: best-practices-curation-specialist
    issue_ref: '#225'
    trigger: Need curated MDM best-practice corpus
    input_contract:
      required_inputs:
      - platform_set
      - control_objective
      - constraints
    output_contract: Prioritized best-practice corpus with recency metadata
  - specialist_slug: evaluation-design-specialist
    issue_ref: '#302'
    trigger: Need scenario set expansion or grading rubric
    input_contract:
    - risk_profile
    - target_depth
    - confidence_threshold
    output_contract: Scenario suite, expected behavior, and pass criteria
  - specialist_slug: readiness-and-evidence-specialist
    issue_ref: '#303'
    trigger: Need readiness review wording and evidence structure
    input_contract:
    - delivery_status
    - artifacts
    - verification_state
    output_contract: Readiness check summary and gate mapping
  - specialist_slug: deployment-package-specialist
    issue_ref: '#304'
    trigger: Need deployment/rollback and operations elaboration
    input_contract:
    - runtime
    - support_model
    - rollback_needs
    output_contract: Deployment operations and rollback package
  - specialist_slug: commercialization-and-packaging-specialist
    issue_ref: '#305'
    trigger: Need commercialization framing
    input_contract:
    - buyer_profile
    - positioning
    - proof_points
    output_contract: Commercialization notes with proof points and gaps
  - specialist_slug: authority-source-policy-specialist
    issue_ref: '#306'
    trigger: Need source policy review
    input_contract:
    - candidate_sources
    - publisher_list
    - refresh_policy
    output_contract: Source authority annotations and decay rules
  - specialist_slug: specialty-boundary-and-routing-specialist
    issue_ref: '#307'
    trigger: Need boundary precision or routing policy
    input_contract:
    - request_scope
    - adjacent_specialties
    output_contract: Boundary map and orchestrator routing
  - specialist_slug: agent-package-scaffolding-specialist
    issue_ref: '#308'
    trigger: Need package scaffolding cleanup
    input_contract:
    - target_path
    - required_artifacts
    - template_deltas
    output_contract: Package normalization and artifact consistency notes
