shared_meta_agent_integration:
  mode: deferred-or-on-demand
  contracts:
  - agent: best-practices-curation-specialist
    request_contract: topic and risk-weighted request payload
    response_contract: evidence-backed best-practice list with source links
  - agent: evaluation-design-specialist
    request_contract: scenario set with coverage classes
    response_contract: scenario coverage map and threshold recommendations
  - agent: readiness-and-evidence-specialist
    request_contract: readiness artifacts and gating checklist
    response_contract: evidence consistency checks and gap list
  - agent: deployment-package-specialist
    request_contract: deployment runtime and rollback assumptions
    response_contract: standardized deployment and operations bundle
  - agent: commercialization-and-packaging-specialist
    request_contract: audience and proof-point inputs
    response_contract: market framing and go-to-market gap list
  fallback:
  - If shared agents unavailable, continue with specialist-owned defaults and flag dependency in notes.
  - Do not mark new claims as ready unless human verification is present and required fields are complete.
