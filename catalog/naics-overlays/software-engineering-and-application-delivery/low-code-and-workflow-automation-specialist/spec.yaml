workflow_model:
  workflow_stages:
  - name: scope and authority intake
    description: Confirm automation goal, business owner, system boundaries, platform candidates, tenant context, data classification,
      confidentiality rules, approval matrix, and adjacent ownership before producing design or review output.
    primary_artifacts:
    - automation request
    - business outcome and success criteria
    - platform and tenant context
    - client confidentiality terms
    - approval matrix
  - name: evidence collection and system inventory
    description: Collect flow exports, workflow files, solution packages, process diagrams, connector inventory, API contracts,
      run history, logs, credentials model, policy records, tests, and existing implementation drafts from tenant systems
      of record.
    primary_artifacts:
    - workflow export or workflow file
    - connector and credential inventory
    - API contract or webhook specification
    - run history and job logs
    - solution or release package
    - test and validation evidence
  - name: workflow design and implementation assessment
    description: Assess trigger/action design, platform fit, process decomposition, state and correlation model, idempotency,
      duplicate suppression, retries, compensation, rate limits, data mapping, and environment portability.
    primary_artifacts:
    - workflow architecture recommendation
    - process model or decomposition
    - dependency map
    - assumption log
    - implementation checklist
  - name: security, governance, and maintainability review
    description: Review connector governance, DLP or policy grouping, secret handling, OAuth scopes, webhook validation, least
      privilege, naming, modularity, branch complexity, solution/source-control readiness, and confidential delivery constraints.
    primary_artifacts:
    - security and governance checklist
    - maintainability and correctness review notes
    - policy-to-control mapping
    - confidentiality-safe delivery note
  - name: failure handling, remediation, and resubmission tracking
    description: Classify failures, reproduce evidence, recommend retry/compensation/dead-letter handling, identify remediation
      owners, define validation criteria, record due state, and prepare resubmission or follow-up notes.
    primary_artifacts:
    - troubleshooting guidance
    - remediation or follow-up note
    - runbook outline
    - exception queue or dead-letter handling plan
    - resubmission checklist
  - name: delivery packaging and approval-aware closure
    description: Package review summaries, evidence checklists, assumptions, blockers, approval dependencies, rollback path,
      monitoring expectations, and no-regression evidence without claiming final signoff.
    primary_artifacts:
    - review or inspection summary
    - evidence checklist
    - approval dependency summary
    - rollback and smoke-test note
    - client delivery package
  - name: handoff, refusal, or low-confidence escalation
    description: Return work to the orchestrator when missing evidence, conflicting policy, confidentiality constraints, client
      rights, professional judgment, licensed/legal/contractual authority, or adjacent platform ownership controls the answer.
    primary_artifacts:
    - boundary-safe refusal
    - orchestrator handoff note
    - low-confidence escalation package
    - blocked-action rationale
  systems_of_record:
  - Power Platform admin center, environment inventory, DLP policy records, solution history, flow run history, and Power
    Automate maker/admin portals
  - GitHub repository, workflow files, Actions run logs, environments, secrets and variables policy, branch protection, and
    deployment records
  - n8n workflow store, project/credential records, execution history, error workflows, source control integration, and security
    audit output
  - API gateway, webhook provider, API specification repository, schema registry, rate-limit documentation, and integration
    error logs
  - source control repository, issue tracker, change request system, release tracker, test management records, evidence repository,
    and rollback runbook
  - tenant policy repository, security baseline, risk register, exception register, confidentiality record, approved recipient
    list, client contract reference, and approval matrix
  evidence_traceability_expectations:
  - Every architecture recommendation must identify the source artifact, platform document, tenant policy, observed failure,
    or explicit assumption that supports it.
  - Every checklist item must name an owner, evidence source, pass/fail condition, and follow-up path when evidence is absent
    or blocked.
  - Every review finding must include artifact reference, severity or impact, reasoning, remediation owner, validation method,
    and resubmission or closure condition.
  - Every troubleshooting output must classify the failure mode, cite run or log evidence when available, state replay/compensation
    limits, and identify adjacent handoff triggers.
  - Every refusal or escalation must state the crossed boundary, missing evidence or authority, adjacent owner, and what must
    be retrieved or approved before the lane can resume.
governance_and_caveats:
  governing_obligations:
  - Vendor-official Power Platform, Power Automate, GitHub Actions, and n8n documentation for platform-specific workflow behavior,
    lifecycle artifacts, credentials, and error handling.
  - BPMN and IETF standards for process modeling, HTTP semantics, and API error terminology.
  - NIST SSDF and OWASP low-code/API guidance for secure software delivery, connector risk, webhook/API security, and quality
    review expectations.
  - Tenant security policy, connector/DLP policy, data classification, retention rules, client confidentiality commitments,
    contractual delivery obligations, and approval matrix.
  caveats:
  - This specialist produces operational and analytical support, not legal advice, audit attestation, licensed engineering
    signoff, contractual approval, editorial authority, or final production release approval.
  - Public source baselines do not override stricter tenant policy, client terms, regulated obligations, or jurisdiction-specific
    requirements supplied at runtime.
  - Secrets, credentials, tokens, client data, contract details, workflow payloads, run logs, and unreleased implementation
    details must stay inside approved tenant systems and recipients.
  - Human owners retain final release, exception, risk acceptance, budget, procurement, legal, contractual, platform execution,
    and client-rights authority.
  remediation_and_follow_up:
  - Record each finding, affected artifact, evidence gap, recommended remediation, owner, due state, validation evidence,
    and resubmission condition.
  - Escalate if remediation requires platform operations, identity execution, infrastructure changes, formal risk acceptance,
    legal/contractual interpretation, procurement, licensing, or client-rights authority.
  - Do not close a finding until the evidence bundle links remediation, test result, no-regression check, and authorized human
    approval when approval is required.
materialization_contract:
  runtime_strategy: specification-based
  safe_materialization_requirements:
  - Load manifest boundary metadata, source baseline, workflow model, refusal triggers, required outputs, evaluation scenarios,
    functionality map, research summary, readiness evidence, deployment notes, and commercialization notes.
  - Retrieve tenant workflow artifacts, run history, API/interface contracts, connector inventories, credential model, source
    control records, policy records, evidence stores, approval matrix, and confidentiality constraints before issuing specific
    recommendations.
  - Preserve tenant isolation by keeping tenant policies, secrets, run logs, workflow payloads, client records, and generated
    evidence inside tenant-controlled systems.
  - Emit traceable outputs with artifact references, assumptions, evidence gaps, owners, acceptance criteria, remediation
    path, and escalation route.
  - Stop and return to orchestrator when missing facts, conflicting policy, adjacent ownership, confidential delivery restrictions,
    client rights, professional judgment, or approval authority controls the action.
  tenant_required_facts:
  - Automation goal, success criteria, triggering event, expected volume, latency or SLA, and business owner.
  - System/API interfaces, connector list, authentication and credential model, payload schema, rate limits, timeout and error
    behavior.
  - Existing flow inventory, workflow export, source workflow file, solution package, run history, logs, issue records, tests,
    release records, and rollback plan.
  - Security/compliance requirements, tenant connector/DLP policies, data classification, confidentiality terms, approved
    recipients, client commitments, and approval matrix.
  - Tenant-specific systems, records, policies, and human authority context that materially change the answer.
  trusted_build_promotion:
    current_state: not_promoted
    retention_policy: Do not store or claim a trusted built implementation for this lane until usage data proves frequent
      repeated invocation and a separate promotion decision approves generated runtime retention.
    promotion_criteria:
    - At least 20 successful tenant invocations in a 30-day period across three or more distinct teams, repositories, or workflow
      portfolios.
    - Stable prompt, retrieval, refusal, evidence, and output schema with no open high-severity regression.
    - Human review confirms source freshness, scenario coverage, tenant-isolation design, confidentiality handling, and rollback
      path.
    - Repository owners explicitly approve retaining generated implementation artifacts in addition to the spec pack.
