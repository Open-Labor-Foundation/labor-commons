tenant_facts_and_retrieval:
  minimum_tenant_facts:
  - request type, support severity, desired outcome, and stakeholder or client commitment affected
  - current repository, component ownership, framework/runtime versions, branch or pull request, and affected deployment environment
  - requirements, acceptance criteria, API contract, data-flow notes, and known architectural constraints
  - test evidence, CI status, security or static-analysis findings, release checklist, and rollback mechanism
  - tenant confidentiality rules, approval workflow, change-management constraints, contractual limits, and systems of record
  - adjacent owners and human approvers for platform, security, legal, compliance, product, and production-release decisions
  systems_of_record:
  - source repository, pull request system, code review threads, and CODEOWNERS or ownership records
  - issue tracker, project board, support ticketing system, and service request queue
  - architecture decision record repository, design review system, API catalog, and schema registry
  - CI/CD system, test-management system, static-analysis or security-scanning system, artifact registry, and release tracker
  - observability system, logging system, error-tracking system, incident or defect history, and rollback evidence store
  - tenant policy repository, confidentiality rules, client engagement or statement-of-work records, approval logs, and contractual
    commitment register
  retrieval_dependencies:
  - retrieve repository and PR evidence before making code-level review findings
  - retrieve tenant runtime, framework, and version facts before applying official docs to implementation specifics
  - retrieve issue, acceptance, API, test, and release records before declaring resolution or release readiness
  - retrieve confidentiality and approval constraints before producing stakeholder or client-facing summaries
runtime_materialization:
  materializer: commons-crew or future runtime materializer
  default_posture: specification-based
  required_metadata:
  - agent slug, domain family, workflow phase group, industry profile, delivery status, runtime strategy, and release version
  - specialty boundary, supported tasks, output shapes, refusal rules, orchestrator return rules, adjacent specialists, and
    resolution definition
  - authority source baseline with publisher, authority rationale, refresh interval, decay policy, and review date
  - required tenant facts, systems of record, retrieval dependencies, confidentiality rules, and approval constraints
  - evaluation scenario IDs, functionality coverage, research summary, readiness evidence, deployment notes, and commercialization
    notes
  refusal_or_return_conditions:
  - required repository, issue, test, API, release, tenant policy, or approval evidence is missing
  - requested work requires production execution, platform operations, legal or contractual signoff, editorial approval, commercial
    strategy, or formal attestation
  - public sources, tenant policy, or stakeholder authority conflict
  - tenant confidentiality rules block the requested disclosure
  trusted_build_promotion_criteria:
  - frequent tenant usage shows the lane is called often enough to justify retaining generated implementation artifacts in-repo
  - generated implementation passes the same scenario suite plus tenant-specific regression coverage across at least three
    sustained materializations
  - runtime telemetry shows stable boundary handling, low-confidence escalation, confidentiality handling, and no unreviewed
    regressions
  - human owner approves promotion with rollback path and clear source-to-runtime traceability
  trusted_build_storage_policy: Do not claim or retain retained implementation ownership without explicit promotion evidence.
commercialization:
  target_buyer_profile: Engineering leaders, product engineering managers, professional-services delivery leaders, and SaaS
    teams needing repeatable application delivery guidance with explicit evidence and approval boundaries.
  target_user_profile: Software engineers, technical leads, quality reviewers, release coordinators, and delivery managers
    handling full-stack feature, defect, and readiness requests.
  packaging_notes:
  - Package as a spec-first validated specialist that can be materialized on demand.
  - Sell as part of a software engineering delivery bundle with optional quality, release, and secure-development specialist
    add-ons.
  - Keep runtime specification-based unless promotion criteria justify trusted built retention.
  proof_points:
  - 18 passing evaluation scenarios cover implementation planning, review, test, release, confidentiality, escalation, refusal,
    tenant adaptation, and materialization.
  - Functionality map covers all shared, service-support-and-resolution, and professional-and-information-services abilities.
  - Research summary satisfies the professional-and-information-services source classes and scenario families with no blocking
    unresolved ambiguity.
  go_to_market_gaps:
  - Live customer ROI, defect-reduction, and cycle-time telemetry are not attached.
  - retained implementation retention is intentionally deferred until frequent-use promotion evidence exists.
