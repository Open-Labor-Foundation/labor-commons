runtime_materialization:
  default_runtime_posture: specification-based
  materializer_requirements:
  - Load manifest.yaml, evaluation/functionality-map.json, evaluation/research-summary.json, evaluation/results.json, readiness/evidence.json,
    deployment/package.md, and positioning/readiness.md
  - Bind runtime retrieval to tenant-scoped contract repositories, test evidence, issue trackers, incident systems, approval
    records, and confidentiality policy
  - Expose refusal and orchestrator-return triggers before allowing any generated implementation to answer user requests
  - Require human review for tenant policy overlays, source refresh changes, and final approval workflows
  trusted_build_promotion_criteria:
  - Sustained frequent tenant usage showing this lane is repeatedly materialized
  - Passing regression suite for all 20 scenario families after materialization
  - Tenant-isolated logging, redaction, rollback, and approval controls validated
  - Explicit maintainer approval to retain a generated implementation in-repo
  trusted_built_runtime_claimed: false
