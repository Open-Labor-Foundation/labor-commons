workflow_model:
  stages:
  - name: engagement and evidence intake
    description: Confirm tenant scope, systems, owners, client or delivery constraints, confidentiality rules, current contracts,
      incidents, and review criteria.
    primary_outputs:
    - intake assumptions
    - retrieval prerequisite map
    - evidence checklist
  - name: contract and interface assessment
    description: Evaluate HTTP, event, message, webhook, or file contracts against source-backed semantics, tenant policies,
      compatibility commitments, and examples.
    primary_outputs:
    - review or inspection summary
    - contract-first implementation guidance
    - interface findings
  - name: failure-mode and quality review
    description: Assess idempotency, pagination, retries, timeout handling, replay, error payloads, data minimization, contract
      tests, and operational assumptions.
    primary_outputs:
    - risk-aware edge-case decisions
    - quality-gate checklist
    - deployment and operations assumptions
  - name: findings and remediation tracking
    description: Record gaps, owners, required evidence, resubmission steps, and closure blockers without claiming final approval.
    primary_outputs:
    - remediation note
    - finding tracker entry
    - resubmission checklist
  - name: approval, confidentiality, and handoff gate
    description: Check approved recipients, client commitments, contractual authority, adjacent-lane ownership, and required
      human signoff before delivery or closure.
    primary_outputs:
    - handoff package
    - refusal or escalation note
    - approval dependency summary
semantic_definition:
  semantic_baseline_version: '2026-04-07'
  research_contract_version: '2026-04-08'
  workflow_phase_group: review-assessment-and-inspection
  industry_profile: professional-and-information-services
  lane_template: existing-built-package-refresh
  definition_tier: migrated-legacy-refresh
  specialty_keywords:
  - integration
  - engineering
tenant_requirements:
  minimum_tenant_facts:
  - Business purpose, consuming and producing systems, owners, and change window
  - Current contracts, schemas, examples, version history, compatibility commitments, and deprecation policy
  - Authentication and authorization assumptions already approved by the tenant owner
  - Data classification, privacy constraints, confidentiality terms, approved recipients, and retention rules
  - Incident, defect, SLO, SLA, retry, timeout, replay, and idempotency policies
  - Delivery approval matrix, release gates, review owners, and resubmission path
  systems_of_record:
  - source code repositories and pull requests
  - API catalog, OpenAPI repository, AsyncAPI repository, event catalog, and schema registry
  - contract-test, integration-test, CI, release, deployment, and rollback evidence stores
  - issue tracker, incident system, support case records, and findings log
  - architecture decision record repository and technical-design document system
  - client engagement records, delivery approvals, document repository, and confidentiality controls
  retrieval_dependencies:
  - Read access to relevant contract versions, example payloads, test results, and review findings
  - Read access to tenant policies that alter baseline security, privacy, confidentiality, approval, or retention handling
  - Named owners for unresolved findings, approval-required decisions, and adjacent-lane handoffs
  tenant_adaptation_policy:
    allowed: true
    allowed_types:
    - configuration
    - retrieval
    - approved_tenant_policy_overlay
    approval_required: true
    rollback_required: true
    cross_tenant_sharing_allowed: false
    constraints:
    - Tenant overlays may tighten public-source baselines but must not erase source rationale, boundary rules, or refusal
      triggers
    - Tenant-specific examples must be redacted or tenant-scoped before storage in evidence bundles
