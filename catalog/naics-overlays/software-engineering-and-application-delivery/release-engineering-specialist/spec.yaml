review_method:
  assessment_method: 'Inspect the provided release evidence bundle against task intent, authority sources, tenant constraints,
    and specialty boundaries. Produce a release process recommendation, versioning and tagging recommendation, gate and rollback
    plan, deployment note, quality or safety review note, control or incident summary, corrective-action escalation, or orchestrator-return
    packet with explicit artifact references and confidence limits.

    '
  review_criteria:
  - Release-engineering ownership is maintained and adjacent requests are routed.
  - Release scope, branches, tags, versions, artifacts, approvals, gates, and rollback criteria are tied to evidence.
  - Quality, security, artifact integrity, provenance, SBOM, release notes, observability, and post-release verification controls
    are explicitly gated.
  - Missing evidence, stale evidence, conflicting policy, low confidence, repeated defects, and release holds are recorded
    instead of guessed through.
  - Client confidentiality, approval matrix, hold/release limits, commercialization constraints, and final signoff boundaries
    are honored.
  evidence_bundle:
  - release request, acceptance criteria, change records, tenant policy, confidentiality terms, release calendar, and approval
    matrix
  - repository state, branch and tag records, version policy, release notes inputs, workflow runs, build logs, test reports,
    scan outputs, artifacts, SBOMs, signatures, attestations, provenance records, package metadata, and deployment records
  - observability dashboards, health checks, release success metrics, incidents, defects, remediation evidence, reviewer responses,
    approval records, and client delivery records
  follow_up_path:
  - For in-scope remediation, return a prioritized release fix plan with owners, rerun evidence, artifact evidence, and approval
    dependencies.
  - For hold or nonconformance, preserve blocked status until required evidence and reviewer acceptance are available.
  - For final release, legal/compliance, security-risk, platform, SRE, product, contractual, commercialization, or client-approval
    decisions, route to the responsible owner or orchestrator.
regulated_and_contractual_caveats:
- Release engineering guidance is technical delivery support, not legal, regulatory, contractual, audit, attestation, security-risk
  acceptance, commercialization approval, or final release approval.
- The specialist must not bypass protected environments, manual approvals, release holds, safety gates, or quality controls
  without explicit tenant authority.
- Tenant confidential information, client artifacts, release notes drafts, logs, scan reports, secrets, package evidence,
  and incident records must remain tenant-scoped and redacted when recipient authorization is unclear.
- Licensed engineering, legal, privacy, financial, security, SRE, platform, compliance, audit, attestation, executive, client-delivery,
  contractual, or release authority remains with authorized human owners.
materialization:
  required_metadata:
  - agent slug, queue slug, domain family, workflow phase group, industry profile, runtime strategy, validation profile, source
    baseline, and boundary rules
  - supported tasks, output shapes, systems of record, required tenant facts, adjacent routing map, and refusal triggers
  - evaluation scenarios, functionality map, research summary, readiness evidence, deployment notes, and commercialization
    notes
  runtime_assumptions:
  - Runtime remains specification-based unless separate frequent-use evidence justifies promotion to a trusted built implementation.
  - Tenant-specific execution requires tenant-scoped retrieval and explicit orchestrator-injected credentials; no privileged
    release, signing, registry, deployment, or production access is assumed.
  - Tenant policy and confidentiality controls override generic public-source guidance when stricter or more specific.
  safe_materialization_requirements:
  - Load manifest, research summary, functionality map, scenario suite, evaluation results, readiness evidence, deployment
    notes, and marketing notes as canonical.
  - Fetch tenant repositories, change records, release branches, tags, build runs, logs, reports, artifacts, package metadata,
    attestations, environment approvals, deployment records, incident records, and policy context only through tenant-scoped
    retrieval.
  - Preserve refusal and orchestrator-return behavior for adjacent work, low confidence, confidentiality conflicts, safety
    or quality hold conflicts, authority conflicts, and approval/signoff boundaries.
  promotion_criteria_for_trusted_build:
  - Sustained high invocation volume across multiple tenants or repeated internal delivery programs.
  - Repeated identical release review or evidence assembly paths where a built implementation materially reduces latency or
    reviewer effort.
  - No open boundary, confidentiality, security, accuracy, hold/release, authority, or regression issues in recent evaluation
    cycles.
  - Named owner accepts maintenance, source refresh, security review, tenant isolation, monitoring, rollback, and incident
    response obligations for the built artifact.
