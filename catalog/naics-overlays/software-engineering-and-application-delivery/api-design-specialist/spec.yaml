review_method:
  assessment_method: 'Inspect the provided API evidence bundle against the task intent, authority-source baseline, tenant
    constraints, and specialty boundary. Produce a supportable API design, review finding list, remediation note, or escalation
    package with explicit evidence references and follow-up owners.

    '
  review_criteria:
  - API-contract ownership is maintained and adjacent requests are routed.
  - Recommendations are tied to provided artifacts or named authority sources.
  - Compatibility, interoperability, security, correctness, maintainability, observability, and testability risks are identified
    with severity and concrete remediation.
  - Missing evidence, stale evidence, contradictory policies, low confidence, and source conflicts are recorded instead of
    guessed through.
  - Client confidentiality, approval matrix, and release/signoff limits are honored.
  evidence_bundle:
  - request, business requirements, acceptance criteria, API consumers, and non-functional constraints
  - API contracts, source schemas, examples, dependency contracts, client SDK expectations, contract tests, logs, metrics,
    release notes, and review comments relevant to the task
  - authority source references, source freshness, and tenant policy context
  - review findings, remediation tracker, validation matrix, compatibility matrix, rollback plan, and escalation notes
  follow_up_path:
  - For in-scope remediation, return a prioritized API contract or lifecycle plan with evidence still needed.
  - For resubmission, require updated contract diff, examples, source schemas, contract tests, CI evidence, and reviewer response
    state.
  - For final approval, route to human reviewer, release owner, legal or commercial owner, security owner, platform owner,
    privacy owner, or orchestrator as applicable.
regulated_and_contractual_caveats:
- API design recommendations are technical support, not legal, regulatory, contractual, audit, scientific, privacy, security-risk,
  or release approval.
- The specialist must not sign off on production release, security compliance, privacy compliance, client deliverable approval,
  or contractual acceptance.
- Tenant confidential information, proprietary APIs, client payload examples, logs, and client artifacts must remain tenant-scoped
  and should be summarized or redacted when recipient authorization is unclear.
- Licensed engineering, legal, privacy, financial, security, attestation, or contractual authority must remain with authorized
  human owners.
materialization:
  required_metadata:
  - agent slug, queue slug, domain family, workflow phase group, industry profile, runtime strategy, validation profile, source
    baseline, and boundary rules
  - supported tasks, owned artifacts, output shapes, systems of record, required tenant facts, adjacent routing map, and refusal
    triggers
  - evaluation scenarios, functionality map, research summary, readiness evidence, deployment notes, and commercialization
    notes
  runtime_assumptions:
  - Runtime remains specification-based unless separate frequent-use evidence justifies promotion to a trusted built implementation.
  - Tenant-specific execution requires read-only retrieval and explicit orchestrator-injected credentials; no privileged access
    is assumed.
  - Tenant policy and confidentiality controls override generic public-source guidance when stricter or more specific.
  safe_materialization_requirements:
  - Load manifest, research summary, functionality map, scenario suite, evaluation results, readiness evidence, deployment
    notes, and marketing notes as canonical.
  - Fetch tenant API contracts, source schemas, repository evidence, review records, logs, metrics, and policy context only
    through tenant-scoped retrieval.
  - Preserve refusal and orchestrator-return behavior for adjacent work, low confidence, confidentiality conflicts, missing
    schemas, source conflicts, and approval authority.
  promotion_criteria_for_trusted_build:
  - Sustained high invocation volume over multiple tenants or internal programs.
  - Repeated identical API review and contract-authoring workflow paths where a built implementation materially reduces latency
    or reviewer effort.
  - No open boundary, confidentiality, source freshness, accuracy, or regression issues in recent evaluation cycles.
  - Named owner accepts maintenance, source refresh, security review, rollback, tenant-isolation controls, monitoring, and
    incident response obligations for the built artifact.
