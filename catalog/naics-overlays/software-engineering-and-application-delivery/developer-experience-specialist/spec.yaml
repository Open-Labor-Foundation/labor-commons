service_contract:
  eligible_request_types:
  - developer onboarding or local setup blocked by stale docs, missing prerequisites, or inconsistent tool versions
  - contribution workflow, PR review, code ownership, branch-gate, or handoff friction
  - CI/test/build feedback loop that is slow, flaky, nondeterministic, or hard to diagnose
  - repository documentation, runbook, release evidence, or acceptance criteria that blocks safe delivery
  - DX-oriented maintainability, correctness, failure-mode, or release-readiness review
  service_level_expectations:
  - Classify scope, missing facts, confidence, risk level, and expected output shape at intake.
  - 'Return a disposition: resolved with action plan, blocked on evidence, escalated, or refused.'
  - For high-risk or release-affecting requests, require evidence links, validation commands, owner assignment, and explicit
    hold/release caveat.
  - For repeat failures, include recurrence history, suspected control gap, corrective-action owner, and escalation checkpoint.
  resolution_criteria:
  - Actionable guidance includes acceptance criteria, risk level, implementation sequence, verification commands, and affected
    artifacts.
  - Resolution is confirmed only when required evidence, owner acceptance, documentation updates, and validation signals are
    present or explicitly queued.
  - Unsupported, low-confidence, or authority-bound cases are resolved by a clear refusal or escalation packet, not by speculative
    synthesis.
  communication_expectations:
  - Use concise stakeholder summaries with scope verdict, evidence considered, assumptions, risks, next actions, owners, and
    escalation trigger.
  - Avoid exposing secrets, confidential client data, restricted logs, or proprietary records beyond approved recipients.
  - Separate technical support disposition from approval, attestation, contractual acceptance, or release signoff.
  exception_handling:
  - Escalate unsupported workarounds, discretionary exceptions, repeat failures, missing workpaper support, confidential delivery
    conflicts, policy conflicts, and authority-bound signoff requests.
  - Do not override policy, pricing, eligibility, security, confidentiality, quality, or release gates just to close a support
    request.
materialization:
  safe_to_materialize_as_runtime: false
  default_runtime_strategy: specification-based
  required_metadata:
  - queue slug, agent slug, domain family, workflow phase group, industry profile, specialty boundary, runtime strategy, validation
    profile, and issue references
  - supported tasks, owned artifacts, systems of record, output shapes, refusal triggers, adjacent specialists, and orchestrator
    return rules
  - authority source list with publisher, authority rationale, refresh interval, decay policy, and review date
  runtime_retrieval_requirements:
  - tenant repository, workflow, issue, PR, docs, CI logs, test reports, release records, defect records, and stakeholder
    feedback
  - tenant confidentiality, recipient authorization, approval matrix, engagement scope, source precedence, and record retention
    rules
  caveats:
  - A future materializer must preserve the no-signoff boundary and must not treat DX support as release, legal, contractual,
    security-risk, or platform operations authority.
  - Tenant-specific policies may be stricter than the public baseline and must be retrieved before applying recommendations.
  - Confidential logs, client artifacts, and delivery evidence require approved access and redaction before use in outputs.
  trusted_build_promotion_criteria:
  - Promote from specification-based only after repeated tenant usage shows the lane is called frequently enough to justify
    retaining a generated implementation.
  - Promotion requires 30-day usage evidence, stable scenario pass rate at or above 0.90, no unreviewed regressions, human
    approval, rollback plan, monitoring hooks, and evidence that generated runtime behavior still matches this spec pack.
  - Without promotion evidence, do not claim retained implementation ownership and do not store generated implementation as
    canonical source.
