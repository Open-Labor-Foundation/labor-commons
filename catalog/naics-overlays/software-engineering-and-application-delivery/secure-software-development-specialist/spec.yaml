knowledge_baseline:
  source_baseline_version: '2026-04-14'
  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: NIST SSDF, NIST CSF, CISA Secure by Design, OWASP SAMM, OWASP ASVS, CWE, SLSA, OpenSSF Scorecard, and NIST
      controls provide secure SDLC, software assurance, vulnerability taxonomy, supply-chain, and evidence terminology.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: NARA records guidance, GitHub pull request and code security documentation, npm audit documentation, Node.js
      runtime security guidance, RFCs, SBOM references, and tenant source-of-record expectations define review, delivery,
      record, and evidence artifacts.
  - class: Quality-review or confidentiality handling references
    rationale: Secret handling, vulnerability disclosure, dependency triage, client confidentiality, approval records, and
      retention references constrain what can be changed, disclosed, approved, or treated as evidence.
  source_selection_approach: 'Use NIST and CISA sources first for public secure software development and

    secure-by-design expectations; OWASP, CWE, SLSA, OpenSSF, RFC, and runtime

    sources for technical verification, vulnerability, API, dependency, and

    supply-chain terminology; vendor-official documentation for platform-specific

    review artifacts; and NARA records guidance for evidence packet, retention,

    audit-trail, and record update discipline. Tenant policy, source hierarchy,

    client commitments, and legal or regulated obligations must be retrieved at

    runtime and may impose stricter constraints, but this lane must not interpret

    them as legal, audit, or contractual authority.

    '
