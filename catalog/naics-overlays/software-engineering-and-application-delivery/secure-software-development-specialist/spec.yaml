workflow_model:
  workflow_stages:
  - name: record and request intake
    description: Capture user story, design or code artifact, requested action, requested authority, tenant policy context,
      confidentiality markers, source-of-record links, and adjacent-lane indicators.
    primary_artifacts:
    - user story or feature request
    - architecture sketch or API contract
    - pull request or code diff
    - tenant secure SDLC policy
    - confidentiality and approval context
  - name: evidence validation and source selection
    description: Validate completeness and freshness of design, code, build, scanner, dependency, SBOM, release, policy, and
      records evidence before producing deterministic guidance.
    primary_artifacts:
    - source repository and PR references
    - SAST, SCA, dependency, secret scanning, and test output
    - SBOM, dependency manifest, lockfile, and advisory context
    - evidence store and review tracker records
  - name: secure design and implementation assessment
    description: Assess threat boundaries, secure defaults, input validation, authorization, authentication, error handling,
      secrets, dependency risk, maintainability, correctness, and failure modes using source-backed criteria.
    primary_artifacts:
    - threat model note
    - risk-ranked finding list
    - secure implementation recommendation
    - verification checklist
  - name: record maintenance and delivery packaging
    description: Prepare review notes, evidence packets, audit-trail summaries, exception summaries, assumption logs, and
      owner-routed next actions without claiming signoff authority.
    primary_artifacts:
    - record update note
    - document or evidence packet
    - audit-trail or exception summary
    - approval dependency list
  - name: handoff, refusal, and low-confidence escalation
    description: Refuse or return requests when evidence is missing, records conflict, confidentiality or approval authority
      is unclear, or work belongs to adjacent infrastructure, operations, security policy, legal, audit, compliance, product,
      or incident-response owners.
    primary_artifacts:
    - boundary-safe refusal
    - low-confidence escalation note
    - adjacent specialist routing package
    - conflicting-source summary
  systems_of_record:
  - source control repository, pull request system, branch protection and CODEOWNERS records
  - issue tracker, feature backlog, architecture decision record store, threat model repository, and design document store
  - CI/CD workflow repository, build logs, scanner dashboards, dependency review, secret scanning, SAST, DAST, SCA, and vulnerability
    management systems
  - package registry, dependency manifest, lockfile, SBOM store, provenance or artifact attestation store, release tracker,
    and rollback record
  - secure SDLC policy repository, tenant source hierarchy, risk register, exception register, approval matrix, evidence repository,
    GRC system, and client document management system
  records_and_retention:
    maintained_records:
    - secure design review note
    - code review security finding record
    - verification checklist
    - dependency or vulnerability remediation plan
    - release-readiness evidence packet
    - exception, assumption, and escalation summary
    update_permissions: May draft or update lane-owned review notes and evidence packets only when tenant permission, source-of-record
      link, author, timestamp, and audit trail are available.
    approval_requirements: Human or tenant-authorized owner approval is required for release approval, exception closure,
      risk acceptance, policy waiver, legal/compliance statement, client disclosure, and source-of-truth status change.
    retention_rules: Follow tenant retention schedule and legal hold rules. Preserve source IDs, evidence artifact IDs, review
      date, reviewer, assumptions, confidence, and handoff owner. Escalate if retention, deletion, publication, or confidentiality
      requirements conflict.
  materialization_requirements:
    required_metadata:
    - task and boundary metadata
    - authority source baseline and refresh metadata
    - required abilities and scenario coverage
    - runtime refusal and orchestrator return rules
    tenant_supplied_facts:
    - software stack, repository, component ownership, data classification, threat model, tenant policy, source hierarchy,
      confidentiality terms, approval matrix, release constraints, and systems-of-record links
    evidence_dependencies:
    - user story, architecture artifact, code diff, build and scanner output, dependency and SBOM context, test evidence,
      release record, exception record, and vulnerability advisory context
    refusal_conditions:
    - missing material facts, conflicting records, stale or conflicting authority sources, unclear approval authority, confidentiality
      conflict, adjacent ownership, or requested execution outside advisory scope
