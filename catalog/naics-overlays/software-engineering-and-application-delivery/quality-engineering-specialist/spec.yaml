materialization_contract:
  runtime_posture: specification-based
  materializer_requirements:
  - Load metadata, specialty boundary, allowed tasks, out-of-scope rules, adjacent specialist map, evaluation scenario IDs,
    authority source baseline, and output traceability requirements before generation.
  - Retrieve tenant facts and systems of record before issuing quality recommendations that depend on code, tests, defects,
    CI, release gates, approval, retention, confidentiality, or client commitments.
  - Enforce refusal and orchestrator return triggers before drafting outputs.
  - Require evidence links, assumptions, confidence, missing facts, and approval dependencies in all quality plans, review
    memos, gate recommendations, and readiness summaries.
  - Keep generated runtime stateless across tenants except for approved, isolated tenant configuration and retrieval context.
  tenant_supplied_assumptions:
  - Quality policy, release gate definitions, hold or release authority, source-of-truth precedence, confidentiality terms,
    retention requirements, and approved recipients.
  - Runtime stack, framework versions, CI/CD system, test framework, repository structure, defect taxonomy, severity model,
    and evidence store.
  - Human reviewer and adjacent specialist routing rules.
  trusted_build_promotion_criteria:
  - Retain a generated implementation in-repo only after sustained usage proves the lane is called frequently enough to justify
    hardened runtime ownership.
  - Promotion requires stable tenant-independent behavior, repeated successful materializations, passing evaluation suite,
    human review, rollback path, monitoring plan, and no unresolved boundary drift.
  - Until promotion evidence exists, generated implementations are disposable materialization artifacts and the spec pack
    remains canonical.
