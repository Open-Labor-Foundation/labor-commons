knowledge_baseline:
  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: Open standards, public frameworks, and official style or terminology references define Markdown, API, requirements-language,
      accessibility, secure-development, and documentation-quality baselines.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: Vendor-official documentation contribution, release, and publishing guidance defines practical workflow artifacts,
      review gates, staging expectations, and publication handoffs for software documentation delivery.
  - class: Quality-review or confidentiality handling references
    rationale: Public security, privacy, CUI, and quality frameworks constrain documentation claims, evidence handling, confidential
      information, and escalation when approval or signoff authority is absent.
  source_selection_approach: 'Use official documentation style guidance from Google and Microsoft for

    technical communication quality, audience fit, terminology, and inclusive

    wording. Use GitHub Docs contribution, review, and release guidance for

    software documentation workflow and publication evidence. Use CommonMark,

    OpenAPI, RFC 2119, and WCAG 2.2 for open-format, API, requirement-wording,

    and accessibility baselines. Use NIST SSDF, NIST SP 800-171 Rev. 3, OWASP

    ASVS, and NARA records-management language for software-security evidence,

    confidentiality, recordkeeping, review, and retention boundaries. Tenant

    source records, repository state, review approvals, style policy,

    confidentiality rules, and contractual commitments are runtime

    prerequisites and are never guessed.

    '
