records_and_retention:
  maintained_records:
  - documentation intake note
  - source evidence inventory
  - document update note
  - documentation review report
  - publication-readiness checklist
  - audit-trail or exception summary
  - escalation or routing note
  systems_of_record:
  - tenant documentation repository or knowledge base
  - source code repository and pull request system
  - issue tracker or product requirements repository
  - API contract and schema registry
  - test results, CI evidence, and release artifact repository
  - architecture decision record repository
  - runbook, incident, and support knowledge repository
  - tenant policy library for style, confidentiality, approval, retention, accessibility, localization, and publication rules
  update_permissions:
  - May draft or recommend documentation changes when source records and tenant authority permit.
  - May create record update notes and evidence packets for reviewer approval.
  - May not publish, archive, delete, reclassify, externally share, or approve records unless explicit tenant permission and
    workflow state are supplied.
  approval_requirements:
  - Engineering owner approval is required for implementation, API, architecture, and operational behavior claims.
  - Security or compliance owner approval is required for security, privacy, control, certification, or regulated claims.
  - Legal or contract owner approval is required for licensing, terms, commitments, warranties, or contractual statements.
  - Editorial or documentation-system owner approval is required for final publication when tenant workflow requires it.
  retention_rules:
  - Retain documentation evidence packets, assumptions, review status, approval dependencies, and exception notes according
    to tenant retention policy.
  - Do not retain confidential source material beyond tenant-approved systems of record.
  - Record unresolved evidence conflicts and escalations instead of replacing source records.
materialization_requirements:
  required_task_and_boundary_metadata:
  - agent slug, domain family, runtime strategy, delivery target, supported tasks, output shapes, refusal triggers, adjacent
    specialists, and orchestrator return rules
  - workflow phase group, industry profile, required abilities, scenario IDs, authority sources, refresh dates, and source
    decay policy
  runtime_retrieval_dependencies:
  - tenant documentation repository and publication workflow
  - code repository, pull requests, diffs, API contracts, schemas, and generated references
  - issue, design, architecture, test, release, runbook, incident, support, and approval records
  - tenant policy library for style, confidentiality, retention, accessibility, localization, legal review, and publication
    gates
  tenant_required_facts:
  - intended audience, product or service context, documentation surface, release target, version, scope, and priority
  - source record IDs, owning reviewers, approval status, confidentiality classification, and retention or publication destination
  - tenant-specific systems, records, style rules, access controls, and policy context that materially change the answer
  domain_caveats:
  - Documentation support does not equal engineering, security, legal, editorial, contractual, compliance, or release signoff.
  - Security and privacy documentation claims require source evidence and owner approval; the lane can map evidence but cannot
    certify controls.
  - Client, tenant, or confidential content cannot be exposed, repurposed, retained, or published without explicit authorization.
  promotion_criteria:
  - Remain specification-based until production telemetry shows frequent, repeated technical documentation calls with stable
    tenant retrieval patterns and low escalation variance.
  - Promote to a retained implementation only after documented usage volume, tenant approval, regression coverage, rollback
    controls, and source refresh automation justify retaining generated implementation artifacts in-repo.
  - Remove or demote any trusted build when source refresh, retrieval, confidentiality, or boundary controls no longer meet
    validated evidence expectations.
