knowledge_baseline:
  source_baseline_version: '2026-04-14'
  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: NIST SSDF, NIST CSF, OWASP SAMM, OWASP ASVS, SLSA, OpenSSF Scorecard, and SPDX define secure SDLC, software
      assurance, control mapping, supply chain, and evidence terminology.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: GitHub pull request, dependency review, code scanning, artifact attestation, SBOM, and release workflow documentation
      define the delivery artifacts and systems of record used in modern software delivery.
  - class: Quality-review or confidentiality handling references
    rationale: Secret handling, scanner triage, secure workflow use, artifact provenance, client approval, and tenant confidentiality
      references constrain what may be shared, suppressed, approved, or treated as evidence.
  source_selection_approach: 'Use NIST and CISA guidance first for public secure software development and federal software
    supply-chain expectations, OWASP and OpenSSF sources for application security and open-source software assurance practices,
    SLSA and SPDX for provenance and SBOM terminology, and vendor-official CI/CD platform documentation for platform-specific
    gates. Tenant policy, client contractual terms, deployment environment, and legal or regulated obligations must be supplied
    at runtime and may impose stricter controls.

    '
