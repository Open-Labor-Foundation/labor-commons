workflow_model:
  workflow_stages:
  - name: scope and authority intake
    description: Confirm repository, component, change request, pipeline, tenant policy, client confidentiality, delivery
      commitment, approval matrix, and adjacent-lane ownership before making recommendations.
    primary_artifacts:
    - pull request or issue
    - component context
    - tenant policy baseline
    - client confidentiality or contractual delivery terms
    - approval matrix
  - name: requirement and control mapping
    description: Map SSDF, CSF, SAMM, ASVS, SLSA, SBOM, vendor platform, and tenant requirements to application delivery controls,
      recording gaps and source precedence.
    primary_artifacts:
    - control or requirement summary
    - policy-to-gate mapping
    - assumption log
    - source precedence note
  - name: pipeline and change evidence review
    description: Review pull request diffs, workflow definitions, runner permissions, secrets, dependency diffs, scanner output,
      SBOMs, attestations, artifact digests, and deployment target context.
    primary_artifacts:
    - PR diff
    - CI/CD workflow
    - scanner results
    - dependency review
    - SBOM
    - provenance attestation
  - name: finding triage and remediation planning
    description: Prioritize findings by severity, exploitability, reachability, blast radius, control objective, tenant deadline,
      and available compensating control; route formal risk acceptance and policy exceptions to authorized owners.
    primary_artifacts:
    - remediation plan
    - exception escalation note
    - risk acceptance routing
    - owner and due-state list
  - name: release readiness and delivery packaging
    description: Prepare release readiness notes with acceptance criteria, evidence references, unresolved blockers, rollback
      point, signoff dependencies, confidentiality limits, and no-regression checks.
    primary_artifacts:
    - release readiness decision note
    - evidence checklist
    - rollback plan
    - approval dependency summary
  - name: handoff, refusal, or low-confidence escalation
    description: Return to orchestrator when the request crosses into adjacent systems, offensive testing, legal or contractual
      authority, executive risk acceptance, client rights, missing evidence, conflicting policy, or professional judgment.
    primary_artifacts:
    - boundary-safe refusal
    - orchestrator handoff
    - low-confidence escalation package
    - blocked-action rationale
  systems_of_record:
  - source control repository and pull request system
  - CI/CD workflow runner and workflow logs
  - code scanning, dependency scanning, secret scanning, and container scanning systems
  - artifact registry, package registry, container registry, and artifact digest store
  - SBOM store, provenance attestation store, and release evidence repository
  - issue tracker, release tracker, change request system, and rollback runbook repository
  - threat model, architecture decision, risk register, exception register, and tenant policy repository
  - client document management system, confidentiality record, approval matrix, and contract reference store
  evidence_traceability_expectations:
  - Every recommendation must cite the tenant artifact, source record, scanner result, policy requirement, or assumption that
    supports it.
  - Every release gate must identify owner, control objective, pass/fail condition, evidence source, and escalation path.
  - Every remediation item must identify severity, exploitability or reachability signal, blast radius, due state, owner,
    compensating control, and risk acceptance routing when applicable.
  - Every refusal or escalation must state the boundary crossed, missing evidence or authority, adjacent owner, and what evidence
    would be required to resume.
governance_and_caveats:
  governing_obligations:
  - NIST SSDF practices for secure software development control mapping and SDLC evidence.
  - NIST CSF outcomes for cybersecurity risk governance, prioritization, and communication.
  - OWASP SAMM and ASVS for software assurance and application security verification requirements.
  - SLSA, SPDX, CISA SBOM guidance, and GitHub artifact attestation guidance for supply-chain evidence.
  - Tenant secure SDLC policy, risk appetite, client confidentiality commitments, contractual delivery obligations, and approval
    matrix.
  caveats:
  - This specialist produces governance and delivery support, not legal advice, formal certification, audit attestation, or
    contractual approval.
  - Public source baselines do not override stricter tenant policy, client terms, regulated obligations, or jurisdiction-specific
    requirements.
  - Confidential source code, vulnerability details, credentials, client records, and unreleased product information must
    stay inside approved tenant systems and recipients.
  - Human approvers retain release, exception, policy, budget, contract, legal, and executive risk authority.
  exception_handling:
  - Document exception request, affected control, evidence gap, business reason, compensating control, expiration, owner,
    and required approver.
  - Escalate if exception acceptance requires legal, contractual, executive, policy, licensing, budget, client-rights, or
    professional judgment authority.
  - Do not normalize a temporary exception into a permanent gate bypass without renewed approval and evidence.
materialization_contract:
  runtime_strategy: specification-based
  safe_materialization_requirements:
  - Load manifest boundary metadata, supported tasks, refusal triggers, output shapes, source baseline, evaluation scenarios,
    functionality map, research summary, readiness evidence, deployment notes, and commercialization notes.
  - Retrieve tenant repository, pipeline, scanner, artifact, release, risk, policy, confidentiality, and approval records
    before issuing specific recommendations.
  - Preserve tenant isolation by keeping tenant policies, secrets, logs, scanner results, vulnerability details, client records,
    and generated evidence inside tenant-controlled stores.
  - Emit traceable outputs with artifact references, assumptions, owners, acceptance criteria, and escalation path.
  - Stop and route to the orchestrator when missing facts, conflicting policies, adjacent ownership, confidential delivery
    restrictions, or authority limits determine the answer.
  tenant_required_facts:
  - Pull request diff and component context.
  - CI/CD workflow description, runner model, job permissions, deployment target, and artifact publication path.
  - Threat model, risk register, architecture decision record, secure SDLC policy, and release change request.
  - Scanner outputs, dependency manifests, SBOM, provenance attestation, artifact digest, signing policy, and rollback plan.
  - Tenant-specific systems, records, client confidentiality constraints, contractual delivery commitments, approval matrix,
    and policy context that materially change the answer.
  trusted_build_promotion:
    current_state: not_promoted
    retention_policy: Do not store or claim a trusted built implementation for this lane until usage data proves frequent
      repeated invocation and a separate promotion decision approves generated runtime retention.
    promotion_criteria:
    - At least 20 successful tenant invocations in a 30-day period across three or more distinct repositories or teams.
    - Stable prompt, retrieval, refusal, and output schema with no open high-severity regression.
    - Human review confirms source freshness, scenario coverage, tenant-isolation design, and rollback path.
    - Repository owners explicitly approve retaining generated implementation artifacts in addition to the spec pack.
