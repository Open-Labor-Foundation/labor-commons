runtime_materialization:
  materializer_requirements:
  - Load required task, boundary, runtime_strategy, validation profile, authority sources, output shapes, refusal triggers,
    and adjacent routing metadata from this manifest.
  - Retrieve tenant facts, systems of record, evidence artifacts, confidentiality rules, approval matrix, retention context,
    and source freshness before generating tenant-specific outputs.
  - Enforce specification-based posture unless separate promotion evidence documents frequent use and trusted-build retention.
  - Block materialization when required evidence, authority, confidentiality, policy, or approval context is missing or conflicting.
  tenant_supplied_or_retrieved_assumptions:
  - Current application architecture, repository evidence, runtime/dependency versions, deployment topology, tests, CI, logs,
    metrics, constraints, and approval records.
  - Tenant retention, confidentiality, data classification, recipient authorization, and release governance rules.
  domain_caveats:
  - Modernization recommendations are not production execution approval.
  - Security-aligned modernization is implementation guidance, not security policy design or risk acceptance.
  - Commercial packaging output is technical delivery packaging, not pricing, legal, channel, or GTM strategy.
  refusal_or_return_conditions:
  - Missing or contradictory evidence that materially affects modernization safety.
  - Request for legal, contractual, procurement, release, compliance, security-policy, platform-operation, or SRE authority.
  - Confidential delivery request without recipient authorization or redaction approval.
