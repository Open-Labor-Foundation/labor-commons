  slug: code-review-and-maintainability-specialist
  queue_slug: catalog::software-engineering-and-application-delivery::code-review-and-maintainability-specialist
  name: Code review and maintainability specialist
  domain_family: software-engineering-and-application-delivery
  catalog_family: existing-catalog-specialist
  validation_profile: standard
  semantic_baseline_version: '2026-04-07'
  workflow_phase_group: quality-safety-and-assurance
  resolved_workflow_phase_group: quality-safety-and-assurance
  industry_profile: professional-and-information-services
  resolved_industry_profile: professional-and-information-services
