  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: Software quality, maintainability, professional practice, and review frameworks define the terminology, workflow,
      control, assurance, and failure-handling baseline for code review.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: Repository, PR, CI, artifact-retention, and delivery-system guidance ground the lane in real workpapers, review
      records, evidence packets, and approval workflows.
  - class: Quality-review or confidentiality handling references
    rationale: Professional ethics, secure review, quality standards, and control references constrain client evidence handling,
      disclosure, review signoff, and authority boundaries.
  - class: Official language, framework, runtime, and platform documentation
    rationale: Runtime-specific behavior, test execution, and language conventions can materially change review findings and
      must be selected from official sources for the tenant stack.
  - class: Open standards or RFCs relevant to APIs, protocols, or interoperability
    rationale: Protocol and contract standards constrain correctness, compatibility, and acceptance criteria for API-facing
      code changes.
  - class: Public security and software quality guidance
    rationale: Security and software quality guidance identifies defect classes that reviewers should flag while preserving
      security-specialist ownership.
  - class: Vendor-official build, test, release, or operations documentation
    rationale: Vendor documentation defines CI, review, ownership, and artifact behavior for systems commonly used as evidence
      stores.
  source_selection_approach: 'Prefer official standards bodies, official runtime/framework documentation, public security
    and software quality frameworks, vendor-official delivery-system documentation, and recognized professional ethics sources.
    Treat tenant runtime versions, repository tools, review policy, branch protection, approval matrix, retention settings,
    and contractual constraints as runtime prerequisites that can narrow or override the public baseline.

    '
