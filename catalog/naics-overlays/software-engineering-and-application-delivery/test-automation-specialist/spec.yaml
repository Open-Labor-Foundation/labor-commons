materialization_requirements:
  required_metadata:
  - queue slug, specialty boundary, runtime_strategy=specification-based, delivery level, validation profile, source baseline,
    and adjacent routing map
  - owned task list, owned artifact list, refusal triggers, output shapes, systems of record, and approval boundaries
  tenant_supplied_or_retrieved_assumptions:
  - framework/runtime/browser matrix, CI system, artifact retention settings, source repository access, and test report store
    access
  - acceptance criteria, API contracts, schema docs, test inventory, logs, defect history, coverage data, and approval matrix
  - confidentiality, data classification, client-delivery, legal/compliance, and retention policies
  caveats_and_evidence_dependencies:
  - Stack-specific advice requires current tenant framework versions and official source freshness checks.
  - Readiness claims require linked CI run IDs, artifacts, reports, defects, and reviewer evidence.
  - Security testing guidance remains verification support and does not become security risk acceptance.
  refusal_or_return_conditions:
  - missing or contradictory records, low confidence, stale sources, unapproved recipient, or unresolved retention conflict
  - request crosses into production execution, platform operations, release approval, legal/compliance decision, product strategy,
    staffing, or contractual signoff
