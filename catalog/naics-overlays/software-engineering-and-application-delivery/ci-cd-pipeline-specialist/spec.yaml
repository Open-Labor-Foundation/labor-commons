metadata:
  agent_id: ci-cd-pipeline-specialist
  slug: ci-cd-pipeline-specialist
  queue_slug: catalog::software-engineering-and-application-delivery::ci-cd-pipeline-specialist
  name: CI/CD pipeline specialist
  domain_family: software-engineering-and-application-delivery
  catalog_family: existing-catalog-specialist
  validation_profile: standard
  semantic_baseline_version: '2026-04-07'
  workflow_phase_group: quality-safety-and-assurance
  industry_profile: professional-and-information-services
