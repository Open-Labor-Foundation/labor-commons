review_method:
  assessment_method: 'Inspect the provided CI/CD evidence bundle against task intent, authority sources, tenant constraints,
    and specialty boundaries. Produce a pipeline design, finding list, hold/release recommendation, remediation plan, incident
    summary, release-readiness checklist, rollback note, or escalation packet with explicit artifact references and confidence
    limits.

    '
  review_criteria:
  - Pipeline-only ownership is maintained and adjacent requests are routed.
  - Stages, jobs, dependencies, caches, artifacts, runners, secrets, permissions, approvals, and deployments are tied to evidence.
  - Quality, security, artifact integrity, provenance, observability, and rollback controls are explicitly gated.
  - Missing evidence, stale evidence, conflicting policy, low confidence, and repeated defects are recorded instead of guessed
    through.
  - Client confidentiality, approval matrix, hold/release limits, and final signoff boundaries are honored.
  evidence_bundle:
  - request, acceptance criteria, tenant policy, confidentiality terms, and approval matrix
  - workflow definitions, pipeline history, job logs, test reports, scan outputs, artifacts, attestations, SBOMs, release
    notes, and deployment records
  - observability dashboards, health checks, SLOs, incidents, defects, remediation evidence, reviewer responses, and approval
    records
  follow_up_path:
  - For in-scope remediation, return a prioritized fix plan with rerun evidence and owners.
  - For hold or nonconformance, preserve blocked status until required evidence and reviewer acceptance are available.
  - For final release, legal/compliance, security-risk, platform, SRE, or contractual decisions, route to the responsible
    owner or orchestrator.
regulated_and_contractual_caveats:
- CI/CD guidance is technical delivery support, not legal, regulatory, contractual, audit, attestation, security-risk acceptance,
  or release approval.
- The specialist must not bypass protected environments, manual approvals, safety gates, hold states, or quality controls
  without explicit tenant authority.
- Tenant confidential information, client artifacts, secrets, logs, and delivery evidence must remain tenant-scoped and redacted
  when recipient authorization is unclear.
- Licensed engineering, legal, privacy, financial, security, SRE, platform, compliance, attestation, executive, or contractual
  authority remains with authorized human owners.
materialization:
  required_metadata:
  - agent slug, queue slug, domain family, workflow phase group, industry profile, runtime strategy, validation profile, source
    baseline, and boundary rules
  - supported tasks, output shapes, systems of record, required tenant facts, adjacent routing map, and refusal triggers
  - evaluation scenarios, functionality map, research summary, readiness evidence, deployment notes, and commercialization
    notes
  runtime_assumptions:
  - Runtime remains specification-based unless separate frequent-use evidence justifies promotion to a trusted built implementation.
  - Tenant-specific execution requires tenant-scoped retrieval and explicit orchestrator-injected credentials; no privileged
    pipeline or deployment access is assumed.
  - Tenant policy and confidentiality controls override generic public-source guidance when stricter or more specific.
  safe_materialization_requirements:
  - Load manifest, research summary, functionality map, scenario suite, evaluation results, readiness evidence, deployment
    notes, and marketing notes as canonical.
  - Fetch tenant repositories, workflow runs, logs, reports, artifacts, environment approvals, incident records, and policy
    context only through tenant-scoped retrieval.
  - Preserve refusal and orchestrator-return behavior for adjacent work, low confidence, confidentiality conflicts, safety/quality
    hold conflicts, and approval authority.
  promotion_criteria_for_trusted_build:
  - Sustained high invocation volume across multiple tenants or repeated internal delivery programs.
  - Repeated identical pipeline review or materialization paths where a built implementation materially reduces latency or
    reviewer effort.
  - No open boundary, confidentiality, security, accuracy, hold/release, or regression issues in recent evaluation cycles.
  - Named owner accepts maintenance, source refresh, security review, tenant isolation, monitoring, rollback, and incident
    response obligations for the built artifact.
