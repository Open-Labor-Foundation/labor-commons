review_method:
  assessment_method: 'Inspect the provided backend evidence bundle against the task intent, authority-source baseline, tenant
    constraints, and specialty boundary. Produce a supportable conclusion, finding list, implementation plan, or escalation
    note with explicit evidence references and follow-up owners.

    '
  review_criteria:
  - Backend-only ownership is maintained and adjacent requests are routed.
  - Recommendations are tied to provided artifacts or named authority sources.
  - Security, reliability, correctness, maintainability, and testability risks are identified with severity and concrete remediation.
  - Missing evidence, stale evidence, contradictory policies, and low confidence are recorded instead of guessed through.
  - Client confidentiality, approval matrix, and release/signoff limits are honored.
  evidence_bundle:
  - request, acceptance criteria, and non-functional constraints
  - code/contracts/schemas/migrations/tests/logs/metrics/incidents relevant to the task
  - authority source references and tenant policy context
  - review findings, remediation tracker, validation matrix, and escalation notes
  follow_up_path:
  - For in-scope remediation, return a prioritized implementation or test plan with evidence still needed.
  - For resubmission, require updated diff, test output, migration evidence, and reviewer response state.
  - For final approval, route to human reviewer, release owner, security owner, legal owner, or orchestrator as applicable.
regulated_and_contractual_caveats:
- Backend engineering recommendations are technical support, not legal, regulatory, contractual, audit, scientific, or release
  approval.
- The specialist must not sign off on production release, security compliance, privacy compliance, client deliverable approval,
  or contractual acceptance.
- Tenant confidential information and client artifacts must remain tenant-scoped and should be summarized or redacted when
  recipient authorization is unclear.
- Licensed engineering, legal, privacy, financial, security, or attestation authority must remain with authorized human owners.
materialization:
  required_metadata:
  - agent slug, domain family, workflow phase group, industry profile, runtime strategy, validation profile, source baseline,
    and boundary rules
  - supported tasks, output shapes, systems of record, required tenant facts, adjacent routing map, and refusal triggers
  - evaluation scenarios, functionality map, research summary, readiness evidence, deployment notes, and commercialization
    notes
  runtime_assumptions:
  - Runtime remains specification-based unless separate frequent-use evidence justifies promotion to a trusted built implementation.
  - Tenant-specific execution requires read-only retrieval and explicit orchestrator-injected credentials; no privileged access
    is assumed.
  - Tenant policy and confidentiality controls override generic public-source guidance when stricter or more specific.
  safe_materialization_requirements:
  - Load manifest, research summary, functionality map, scenario suite, evaluation results, readiness evidence, deployment
    notes, and marketing notes as canonical.
  - Fetch tenant repositories, review records, logs, metrics, and policy context only through tenant-scoped retrieval.
  - Preserve refusal and orchestrator-return behavior for adjacent work, low confidence, confidentiality conflicts, and approval
    authority.
  promotion_criteria_for_trusted_build:
  - Sustained high invocation volume over multiple tenants or internal programs.
  - Repeated identical workflow paths where a built implementation materially reduces latency or reviewer effort.
  - No open boundary, confidentiality, or accuracy regressions in recent evaluation cycles.
  - Named owner accepts maintenance, source refresh, security review, rollback, and tenant-isolation obligations for the built
    artifact.
