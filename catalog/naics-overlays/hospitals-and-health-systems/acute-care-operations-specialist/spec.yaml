knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Hospital acute care operations are constrained by CMS Conditions of Participation, medical record, utilization
      review, discharge planning, interpretive guidance, and HHS OCR HIPAA privacy rules.
  - class: Public payer or provider operating guidance
    rationale: Acute care execution is blocked by inpatient benefit rules, prior authorization workflow, billing and claim
      requirements, and payer/provider operating records that must be handled without becoming payer interpretation.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Discharge transition, handoff, encounter, order, note, claim, and data element terminology require recognized
      healthcare workflow and interoperability references rather than generic operations terms.
  authority_sources:
  - source_id: ecfr-42-cfr-482-24-medical-record-services
    title: '42 CFR 482.24 - Condition of participation: Medical record services'
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.24
    authority_reason: Primary federal hospital medical-record regulation. It anchors EHR or medical record evidence, encounter
      documentation, authentication, and completion traceability.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: ecfr-42-cfr-482-30-utilization-review
    title: '42 CFR 482.30 - Condition of participation: Utilization review'
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.30
    authority_reason: Primary federal hospital utilization-review regulation. It grounds escalation when admission, continued
      stay, professional services, or medical necessity review authority is implicated.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: ecfr-42-cfr-482-43-discharge-planning
    title: '42 CFR 482.43 - Condition of participation: Discharge planning'
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.43
    authority_reason: Primary federal hospital discharge-planning regulation. It constrains discharge and care-transition
      workflow support and reinforces escalation for discharge readiness or patient-specific planning decisions.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: cms-som-appendix-a-hospitals
    title: Revisions to Hospital - Appendix A of the State Operations Manual
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.cms.gov/medicare/health-safety-standards/quality-safety-oversight-general-information/policy-memos/policy-memos-states-cms-locations/revisions-hospital-appendix-state-operations-manual
    authority_reason: Official CMS hospital survey and interpretive guidance for Conditions of Participation. It supports
      regulatory boundary handling for hospital operational evidence and escalation.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: hhs-hipaa-tpo-care-operations
    title: HIPAA Privacy Rule and Care Coordination
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/special-topics/disclosures-treatment-payment-health-care-operations/index.html
    authority_reason: HHS OCR is the HIPAA privacy regulator. Its guidance constrains use and disclosure of PHI for treatment,
      payment, and health care operations.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: hhs-hipaa-minimum-necessary
    title: HIPAA Minimum Necessary Standard
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR minimum-necessary guidance determines when acute care operational outputs involving PHI require
      role-limited disclosure, privacy review, and audit controls.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: cms-benefit-policy-ch1-inpatient-hospital-services
    title: Medicare Benefit Policy Manual, Chapter 1 - Inpatient Hospital Services Covered Under Part A
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/bp102c01.pdf
    authority_reason: Official CMS Medicare benefit manual for inpatient hospital services. It grounds inpatient service,
      admission, covered/noncovered service, and payer boundary terminology without granting this lane coverage authority.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_manual_revision
    status: active
  - source_id: cms-claims-processing-ch3-inpatient-billing
    title: Medicare Claims Processing Manual, Chapter 3 - Inpatient Hospital Billing
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/clm104c03.pdf
    authority_reason: Official CMS claims-processing manual for inpatient hospital billing. It grounds charge, claim, adjustment,
      transfer, denial, and remittance evidence expectations while preserving revenue-cycle authority boundaries.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_manual_revision
    status: active
  - source_id: cms-prior-authorization-final-rule
    title: CMS Interoperability and Prior Authorization Final Rule
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/priorities/burden-reduction/overview/interoperability/policies-regulations/cms-interoperability-prior-authorization-final-rule-cms-0057-f
    authority_reason: CMS final-rule guidance is authoritative for payer/provider prior authorization workflow expectations
      and supports prerequisite handling without payer-policy interpretation.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: ahrq-red-toolkit
    title: Re-Engineered Discharge (RED) Toolkit
    publisher: Agency for Healthcare Research and Quality
    source_type: recognized-healthcare-workflow-guidance
    location: https://www.ahrq.gov/patient-safety/settings/hospital/red/toolkit/index.html
    authority_reason: AHRQ is a federal healthcare quality and patient-safety agency. The RED toolkit grounds discharge and
      transition workflow terminology, evidence packaging, and handoff sensitivity.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_ahrq_revision
    status: active
  - source_id: onc-uscdi-v6
    title: United States Core Data for Interoperability Version 6
    publisher: Assistant Secretary for Technology Policy / Office of the National Coordinator for Health IT
    source_type: recognized-healthcare-standard
    location: https://www.healthit.gov/isa/united-states-core-data-interoperability-uscdi
    authority_reason: ASTP/ONC USCDI is the federal interoperability data baseline. It grounds patient, encounter, order,
      procedure, clinical note, care team, and claim-adjacent terminology used by EHR and operational systems.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_uscdi_revision
    status: active
  source_categories:
  - category: Public healthcare regulator guidance
    retrieval_policy: Use eCFR, CMS, and HHS OCR sources first for hospital medical record, utilization review, discharge
      planning, interpretive guidance, and PHI handling constraints.
    specialty_specific_exceptions:
    - Federal baseline does not replace tenant facility policy, state law, medical staff bylaws, payer contract terms, or
      licensed clinical instructions.
  - category: Public payer or provider operating guidance
    retrieval_policy: Use CMS manuals and prior authorization guidance for inpatient benefit, billing, authorization, claim,
      and denial workflow terminology, then require tenant payer, plan, provider, and service-setting facts.
    specialty_specific_exceptions:
    - Do not infer coverage, authorization approval, medical necessity, claim disposition, coding, or appeal strategy from
      public guidance.
  - category: Recognized healthcare workflow or measure guidance
    retrieval_policy: Use AHRQ and ONC/ASTP references to define discharge, transition, handoff, encounter, order, note, and
      data-element expectations.
    specialty_specific_exceptions:
    - Workflow or interoperability guidance does not authorize clinical judgment, privacy approval, payer interpretation,
      or record amendment.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public sources as baseline constraints; tenant policy and source-of-truth hierarchy are mandatory for operational
      action.
    - Require tenant, facility, care setting, payer, plan, service date, source hierarchy, RACI, authorization/referral/eligibility
      retrieval, privacy posture, and adjacent owner map before final disposition.
    - Escalate when public guidance, tenant policy, payer rules, clinical instructions, facility procedure, or patient/member
      records conflict.
  specialty_specific_exceptions:
  - Do not infer clinical readiness, discharge appropriateness, level of care, medical necessity, authorization validity,
    referral completeness, coding correctness, or privacy permission from incomplete records.
  - Do not transform acute care operational progression into clinical review, utilization management, patient access, medical
    coding, revenue cycle, privacy approval, legal, or payer operations authority.
  - Do not claim completion until source record, owner acceptance, residual blockers, downstream handoff, and audit-ready
    evidence are recorded.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-12'
