    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/priorities/burden-reduction/overview/interoperability/frequently-asked-questions/admission-discharge-transfer-patient-event-notification-conditions-participation-cop-42-cfr-482-24d
    authority_reason: CMS public FAQ directly interprets hospital ADT notification Conditions of Participation, clarifying
      patient status events, notification timing, recipient limits, privacy preferences, and EHR or administrative system
      expectations.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: ecfr-42-cfr-482-43-discharge-planning
    title: '42 CFR 482.43 - Condition of participation: Discharge planning'
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.43
    authority_reason: Primary federal hospital discharge-planning regulation. It constrains capacity release, downstream transitions,
      and post-acute dependencies while keeping discharge-readiness judgment outside hospital patient throughput.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: ecfr-42-cfr-482-30-utilization-review
    title: '42 CFR 482.30 - Condition of participation: Utilization review'
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.30
    authority_reason: Primary federal hospital utilization-review regulation. It grounds refusal to let hospital patient throughput
