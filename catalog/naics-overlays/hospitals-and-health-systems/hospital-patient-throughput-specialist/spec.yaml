    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.23
    authority_reason: Primary federal hospital nursing-services regulation. It supports escalation when staffed-bed and care-team,
      licensed nursing, or patient-care assignment adequacy affects throughput availability.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
