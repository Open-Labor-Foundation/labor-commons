knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Hospital throughput work is constrained by CMS hospital Conditions of Participation, medical-record rules,
      discharge-planning duties, utilization-review boundaries, EMTALA emergency transfer capacity rules, and HHS OCR PHI
      handling rules.
  - class: Public payer or provider operating guidance
    rationale: Patient-flow placement depends on public CMS operating guidance for ADT event notifications, prior authorization
      and payer-provider exchange boundaries, and provider workflows that define when status, transfer, and discharge evidence
      must be current.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Hospital patient-flow, infection-control patient placement, and HL7 encounter/location terminology ground throughput-board
      workflow, readiness evidence, systems of record, and failure handling beyond generic scheduling.
  source_selection_approach: 'Use CMS/eCFR, CMS ADT, HHS OCR, CDC, AHRQ, and HL7 as the public baseline

    for medical-record truth, bed and patient status, discharge and transfer

    prerequisites, utilization-review and payer boundaries, PHI controls,

    patient placement risk controls, patient-flow terminology, and interoperable

    encounter or location modeling. Tenant policy remains controlling for unit

    taxonomy, bed class or treatment-space type, source hierarchy, priority matrices, transfer-center

    process, surge posture, staffing escalation, infection-prevention signoff,

    payer contracts, jurisdiction-specific privacy rules, and final approval

    authority.

    '
  authority_sources:
  - source_id: ecfr-42-cfr-482-24-medical-record-services
    title: '42 CFR 482.24 - Condition of participation: Medical record services'
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.24
    authority_reason: Primary federal hospital medical-record regulation for Medicare and Medicaid participating hospitals.
      It anchors the EHR, encounter, ADT, and medical-record evidence that throughput recommendations must trace to.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
