knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Hospital perioperative coordination is constrained by CMS hospital Conditions of Participation for surgical
      services, anesthesia services, medical records, discharge planning, utilization review, and HHS OCR HIPAA privacy rules.
  - class: Public payer or provider operating guidance
    rationale: Perioperative cases may be gated by public CMS prior authorization and payer-provider exchange expectations,
      especially for hospital outpatient department services and authorization-dependent procedures.
  - class: Recognized healthcare workflow or measure guidance
    rationale: The Joint Commission Universal Protocol, WHO Surgical Safety Checklist, CDC infection-control guidance, and
      HL7 FHIR resources define workflow, safety, handoff, and terminology expectations beyond generic coordination.
  source_selection_approach: 'Use primary federal regulations and regulator guidance for hospital records,

    surgical and anesthesia service constraints, utilization review, discharge,

    payer authorization, and privacy. Use Joint Commission, WHO, CDC, and HL7

    as recognized public workflow, patient-safety, infection-control, and

    terminology baselines. Tenant policy remains controlling for exact RACI,

    scheduling rules, block time, readiness checklist, source hierarchy,

    destination-owner acceptance, privacy access controls, payer contracts,

    jurisdiction-specific rules, and final approval authority.

    '
