knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Hospital case management is constrained by CMS Conditions of Participation for medical records, utilization
      review, discharge planning, and HHS OCR HIPAA privacy rules.
  - class: Public payer or provider operating guidance
    rationale: Hospital case management planning is blocked by inpatient benefit, authorization, eligibility, referral, claim,
      denial, and payer-provider operating records that must be handled without becoming payer interpretation.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Case management, discharge transition, care coordination, encounter, order, note, claim, and data-element terminology
      require recognized healthcare workflow, professional, quality, and interoperability references.
  authority_sources:
