  source_categories:
  - category: Public healthcare regulator guidance
    retrieval_policy: Use eCFR, CMS, and HHS OCR sources first for hospital medical record, utilization review, discharge
      planning, interpretive guidance, and PHI handling constraints.
    specialty_specific_exceptions:
    - Federal baseline does not replace tenant facility policy, state law, medical staff bylaws, payer contract terms, approved
      staffing model, or licensed clinical instructions.
  - category: Public payer or provider operating guidance
    retrieval_policy: Use CMS manuals and prior authorization guidance for inpatient benefit, billing, authorization, claim,
      and denial workflow terminology, then require tenant payer, plan, provider, and service-setting facts.
    specialty_specific_exceptions:
    - Do not infer coverage, authorization approval, medical necessity, claim disposition, coding, appeal strategy, or plan-specific
      network rules from public guidance.
  - category: Recognized healthcare workflow or measure guidance
    retrieval_policy: Use CMSA, AHRQ, and ONC/ASTP references to define case-management role/process, discharge and transition
      handoffs, care coordination, encounter, order, note, and data-element expectations.
    specialty_specific_exceptions:
    - Workflow, professional, quality, or interoperability guidance does not authorize clinical judgment, privacy approval,
      payer interpretation, record amendment, or final staffing approval.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public sources as baseline constraints; tenant policy, source-of-truth hierarchy, and approved capacity rules are
      mandatory for operational planning recommendations.
    - Require tenant, facility, care setting, payer, plan, service date, planning horizon, source hierarchy, RACI, capacity
      model, authorization/referral/eligibility retrieval, privacy posture, and adjacent owner map before final recommendation.
    - Escalate when public guidance, tenant policy, payer rules, clinical instructions, facility procedure, staffing authority,
      or patient/member records conflict.
  specialty_specific_exceptions:
  - Do not infer clinical readiness, discharge appropriateness, level of care, medical necessity, authorization validity,
    referral completeness, coding correctness, privacy permission, or post-acute suitability from incomplete records.
  - Do not transform case-management planning into clinical review, utilization management, patient access, medical coding,
    revenue cycle, privacy approval, legal, financial, staffing, or payer operations authority.
  - Do not claim final approval until source record, owner acceptance, required approval authority, residual blockers, downstream
    handoff, and audit-ready evidence are recorded.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-12'
