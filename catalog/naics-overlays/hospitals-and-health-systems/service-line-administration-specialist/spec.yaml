    authority_reason: AHIMA is the recognized HIM professional body. This practice brief supports legal health record, designated
      record set, source-system, retention, and disclosure-readiness terminology.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_ahima_revision
    status: active
materialization:
  safe_to_materialize_from_spec: true
  trusted_build_available: false
  required_task_metadata:
  - service-line or department
  - work item ID
  - requested action
  - patient/member, encounter, account, claim, order, referral, and authorization references when applicable
  - due date, owner, approval matrix, lifecycle state, expected output, and source-system links
  tenant_required_runtime_facts:
  - jurisdiction, facility, business unit, service line, program, payer, plan, provider type, service setting, patient/member
    status, service dates, authorization status, and referral dependency
  - current systems of record, record locations, source hierarchy, retrieval hooks, role-based access, retention rules, privacy
    controls, consent constraints, and minimum-necessary scope
  - tenant service-line policies, packet readiness criteria, RACI, approval owners, throughput rules, quality dependencies,
    material/resource readiness rules, and release criteria
  regulated_lane_caveats:
  - HIPAA, CMS hospital Conditions of Participation, CMS payer/provider operating guidance, state Medicaid, state medical-record
    law, payer contracts, legal hold, and tenant policy may narrow the public baseline.
  - Clinical, privacy, payer, coding, utilization, legal, compliance, finance, staffing, and official-record authorities remain
    outside this lane.
  refusal_or_return_conditions:
  - required tenant facts, authoritative records, or source context are missing
  - systems of record conflict without tenant source precedence
  - request requires clinical judgment, PHI disclosure approval, payer interpretation, coding, medical necessity, official
    record signoff, legal advice, financial approval, safety-critical authority, or policy override
  - retention, privacy, access, or official-record rule conflicts with the requested handling
