      and clinical workflow mapping, constraint identification, and handoff design.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_ahrq_revision
    status: active
  - source_id: hl7-fhir-servicerequest
