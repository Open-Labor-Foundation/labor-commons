knowledge_baseline:
  source_baseline_version: '2026-04-14'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: CMS hospital Conditions of Participation and HHS OCR HIPAA rules define hospital medical record, QAPI, utilization
      review, discharge planning, PHI, authorization, amendment, access, and minimum-necessary boundaries.
  - class: Public payer or provider operating guidance
    rationale: CMS provider and payer operating guidance defines medical record maintenance, documentation sufficiency, prior
      authorization, claims, and payment-review evidence dependencies that service-line administration must track without
      deciding.
  - class: Recognized healthcare workflow or measure guidance
    rationale: AHRQ, CAQH CORE, HL7, and AHIMA provide vendor-neutral workflow, administrative transaction, order/referral,
      task, record-set, terminology, and source-system references.
  source_selection_approach: 'Use eCFR, CMS, and HHS OCR sources first for regulated hospital,

    documentation, payer, and privacy boundaries. Use CMS manuals and MLN

    tools for payer/provider evidence expectations. Use AHRQ, CAQH CORE, HL7,

    and AHIMA to ground workflow, transaction, order/referral, task, and

    record-set terminology. Tenant policy, jurisdictional law, state Medicaid,

    payer contract, facility bylaws, source-system precedence, and role-based

    access rules are required runtime facts that narrow the public baseline.

    '
  authority_sources:
  - source_id: ecfr-42-cfr-482-21-qapi
    title: '42 CFR 482.21 - Condition of participation: Quality assessment and performance improvement program'
    publisher: Electronic Code of Federal Regulations
    source_type: Public healthcare regulator guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.21
    authority_reason: Primary federal hospital regulation for organized quality assessment and performance improvement. It
      anchors service-line quality dependency tracking while reserving formal quality authority.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: ecfr-42-cfr-482-24-medical-record-services
    title: '42 CFR 482.24 - Condition of participation: Medical record services'
    publisher: Electronic Code of Federal Regulations
    source_type: Public healthcare regulator guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.24
    authority_reason: Primary federal hospital medical record rule for prompt completion, authentication, retention, and record
      content. It anchors record readiness, completion, and official-record boundaries.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: ecfr-42-cfr-482-30-utilization-review
    title: '42 CFR 482.30 - Condition of participation: Utilization review'
    publisher: Electronic Code of Federal Regulations
    source_type: Public healthcare regulator guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.30
    authority_reason: Primary federal hospital utilization-review rule. It supports escalation when administrative work would
      decide admission, continued stay, professional service necessity, or medical necessity.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: hhs-ocr-tpo
    title: Uses and Disclosures for Treatment, Payment, and Health Care Operations
    publisher: U.S. Department of Health and Human Services, Office for Civil Rights
    source_type: Public healthcare regulator guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/disclosures-treatment-payment-health-care-operations/index.html
    authority_reason: HHS OCR is the HIPAA privacy regulator. This guidance constrains PHI use and disclosure for treatment,
      payment, and health care operations.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: hhs-ocr-minimum-necessary
