  source_categories:
  - category: quality measure definition and public reporting
    retrieval_policy: Use CMS Hospital IQR/OQR, CMS Provider Data Catalog/Care Compare, eCQI resources, AHRQ Quality Indicators,
      CDC NHSN, and HCAHPS sources before accepting a hospital numerator, denominator, exclusion, benchmark, peer comparison,
      or public-facing statement.
    specialty_specific_exceptions:
    - Do not substitute a tenant dashboard label for formal measure logic when the output will be treated as quality, patient-safety,
      benchmark, accreditation, public-reporting, or disclosure evidence.
  - category: patient, member, encounter, claim, and payer truth sets
    retrieval_policy: Use tenant systems of record constrained by CMS claims-processing and payer/provider operating guidance
      before deciding whether ADT, order, encounter, discharge, charge, claim, remittance, denial, appeal, authorization,
      or referral records establish the metric.
    specialty_specific_exceptions:
    - Do not collapse ADT, encounter, discharge, charge, and claim records into one outcome when observation status, transfer
      status, adjudication lag, denial status, payer product, or authorization dependency changes the answer.
  - category: interoperability and clinical-operational terminology
    retrieval_policy: Use ONC USCDI, eCQI, and HL7 US Core as terminology and standards references for patient, encounter,
      condition, procedure, observation, and quality-evidence lineage.
    specialty_specific_exceptions:
    - Do not use clinical terminology normalization as licensed clinical interpretation.
  - category: privacy, PHI, and disclosure control
    retrieval_policy: Use HHS minimum-necessary guidance and tenant privacy policy before including PHI, low-volume cohorts,
      examples, identifiable member or patient data, or clinician-level disclosure.
    specialty_specific_exceptions:
    - Do not publish or share privacy-sensitive analysis until audience, purpose, minimum-necessary basis, and approval owner
      are confirmed.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the hospital baseline, but tenant retrieval must provide system locations, source-precedence rules,
      metric dictionaries, facility and service-line definitions, payer or plan context, setting of care, and approval owners.
    - Record source freshness, cohort logic, denominator rules, facility and service-line attribution, patient/member status,
      service dates, admission status, authorization and referral dependencies, payer or product context, disclosure audience,
      and signoff posture in every output.
    - Preserve ADT, encounter, order, discharge, claim, charge, remittance, denial, appeal, authorization, referral, and quality-measure
      disagreements explicitly instead of silently normalizing them.
    - Escalate whenever tenant policy, payer contract, public guidance, privacy posture, patient-safety risk, clinical safety,
      or licensed review authority materially changes the answer.
  specialty_specific_exceptions:
  - Health system analytics often mixes administrative, financial, clinical-operational, capacity, patient-experience, quality-measure,
    and patient-safety records with different lags, owners, and authority levels.
  - Access, throughput, occupancy, length-of-stay, readmission, utilization, denial, quality, patient-experience, and operational
    KPIs are only safe when facility context, service setting, patient/member context, payer, denominator logic, exclusions,
    source hierarchy, refresh window, and intended audience are explicit.
  - PHI handling, low-volume denominators, public reporting, payer interpretation, medical necessity, diagnosis, treatment
    planning, staffing decisions, bed-management decisions, and clinical safety all require escalation outside this lane.
  next_review_due_at: '2026-08-11'
