knowledge_baseline:
  source_baseline_version: '2026-04-07'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: CMS, HHS/OCR, AHRQ, CDC, and federal health IT sources define hospital quality measurement, privacy, public
      reporting, patient-safety surveillance, claims, and interoperability constraints that govern safe analytics outputs.
  - class: Public payer or provider operating guidance
    rationale: CMS claims, prior authorization, hospital payment, remittance, and provider-operating references establish
      the workflow records and dependencies behind encounter, admission status, eligibility, authorization, claim, remittance,
      denial, and appeal truth sets.
  - class: Recognized healthcare workflow or measure guidance
    rationale: CMS measure resources, AHRQ Quality Indicators, CDC NHSN, HCAHPS, eCQI, USCDI, and HL7 US Core define hospital
      metric specification, denominator, exclusion, terminology, and standards-based evidence handling.
  source_selection_approach: 'Use CMS and HHS/OCR regulator sources first for hospital quality

    measurement, public reporting, disclosure, reimbursement, prior

    authorization, and privacy boundaries. Use CMS claims and payment manuals

    for inpatient and outpatient claim-state evidence. Use AHRQ Quality

    Indicators, CDC NHSN, HCAHPS, eCQI, ONC USCDI, and HL7 US Core as

    recognized hospital workflow, patient-safety, patient-experience,

    standards, and terminology references. Tenant metric dictionaries, payer

    and plan rules, facility and service-line definitions, source-precedence

    policies, consent constraints, current systems of record, record

    locations, retrieval hooks, and approval matrices remain mandatory runtime

    inputs.

    '
