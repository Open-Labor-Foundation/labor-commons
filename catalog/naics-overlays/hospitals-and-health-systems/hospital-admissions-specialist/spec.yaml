knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Hospital admissions are constrained by federal hospital Conditions of Participation, HIPAA privacy requirements,
      utilization review obligations, prior authorization policy, and discharge or transfer requirements.
  - class: Public payer or provider operating guidance
    rationale: Admission readiness depends on CMS Medicare inpatient admission order rules, HETS eligibility evidence, authorization
      status, and payer-facing records before downstream admission or placement work can proceed.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Vendor-neutral encounter, ADT, and patient-identification standards ground hospital admissions terminology,
      systems of record, and safe failure handling.
  source_selection_approach: 'Use CMS, HHS OCR, and eCFR sources first for admissions, hospital records,

    utilization review, eligibility, prior authorization, privacy, and discharge

    or transfer baselines. Use HL7 and Joint Commission references to ground

    encounter/ADT terminology and patient-identification safety. Tenant policy

    remains controlling for facility procedures, payer contracts, bed-management

    rules, service-line routing, source hierarchy, queue ownership, retrieval

    hooks, escalation SLAs, and jurisdiction-specific constraints.

    '
  authority_sources:
  - source_id: cms-medicare-benefit-policy-manual-ch1
    title: Medicare Benefit Policy Manual, Chapter 1 - Inpatient Hospital Services Covered Under Part A
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/Regulations-and-Guidance/Guidance/Manuals/downloads/bp102c01.pdf
    authority_reason: CMS Medicare inpatient hospital policy defines admission-order evidence, timing, ordering-practitioner
      expectations, and ambiguity handling that directly constrain inpatient admissions intake.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_manual_revision
    status: active
  - source_id: ecfr-42-cfr-482-24
    title: '42 CFR 482.24 - Condition of participation: Medical record services'
    publisher: Electronic Code of Federal Regulations / Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.24
    authority_reason: Hospital Conditions of Participation establish medical-record expectations for admission, orders, documentation,
      and patient-record evidence used by admissions workflows.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cfr_revision
    status: active
  - source_id: ecfr-42-cfr-482-30
    title: '42 CFR 482.30 - Condition of participation: Utilization review'
    publisher: Electronic Code of Federal Regulations / Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.30
    authority_reason: Hospital Conditions of Participation define utilization-review governance for admissions and continued
      stays, making clear when admission intake must route to utilization review rather than decide medical necessity.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cfr_revision
    status: active
  - source_id: ecfr-42-cfr-482-43
    title: '42 CFR 482.43 - Condition of participation: Discharge planning'
    publisher: Electronic Code of Federal Regulations / Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.43
    authority_reason: Hospital discharge planning and transfer requirements constrain admissions handoffs that depend on transition
      records, post-acute routing, or transfer protocols without making this lane the discharge-planning owner.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cfr_revision
    status: active
  - source_id: cms-hets-270-271
    title: HIPAA Eligibility Transaction System (HETS) 270/271
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/research-statistics-data-and-systems/cms-information-technology/hetshelp
    authority_reason: CMS operates Medicare eligibility transaction infrastructure. HETS anchors eligibility evidence expectations
      for admissions intake while preserving the distinction between active coverage and admission or authorization clearance.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_transaction_revision
    status: active
  - source_id: cms-prior-authorization-final-rule
    title: CMS Interoperability and Prior Authorization Final Rule (CMS-0057-F)
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.cms.gov/priorities/burden-reduction/overview/interoperability/policies-regulations/cms-interoperability-prior-authorization-final-rule-cms-0057-f
    authority_reason: CMS-0057-F is federal public policy for impacted payer prior authorization processes and status transparency.
      It supports authorization-status workflow handling without granting payer-decision authority.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: hhs-hipaa-minimum-necessary
    title: HIPAA Minimum Necessary Standard
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR is the HIPAA privacy regulator. Minimum-necessary guidance constrains admissions evidence requests,
      patient-location or admission-status requests, and escalation packets containing PHI.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: hl7-fhir-encounter-r4
    title: HL7 FHIR R4 Encounter Resource
    publisher: HL7 International
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://hl7.org/fhir/R4/encounter.html
    authority_reason: HL7 FHIR Encounter is a recognized vendor-neutral healthcare interoperability reference for encounter
      status, class, hospitalization, admit source, discharge disposition, and ADT-related terminology.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hl7_revision
    status: active
  - source_id: joint-commission-patient-identification
    title: National Patient Safety Goals
    publisher: The Joint Commission
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.jointcommission.org/resources/patient-safety-topics/patient-safety/national-patient-safety-goals/
    authority_reason: The Joint Commission is a recognized healthcare accrediting body. Its patient-identification safety
      expectations support treating MRN, MPI, demographic, and encounter conflicts as admissions blockers.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_joint_commission_revision
    status: active
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-12'
