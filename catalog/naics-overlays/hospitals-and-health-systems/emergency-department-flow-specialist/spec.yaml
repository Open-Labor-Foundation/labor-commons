knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: CMS EMTALA and hospital Conditions of Participation define emergency screening, stabilization, transfer, emergency-services
      organization, medical-record evidence, and nursing-service boundaries that ED flow recommendations must not override.
  - class: Public payer or provider operating guidance
    rationale: AHRQ ED patient-flow guidance and CMS prior authorization rules define provider workflow, demand/capacity tactics,
      and payer dependency visibility while preserving the boundary that authorization cannot substitute for emergency care
      duties.
  - class: Recognized healthcare workflow or measure guidance
    rationale: CMS ED CAHPS, CMS ED throughput quality measures, IHI patient-flow guidance, and ENA ESI references provide
      recognized terminology, flow measures, acuity labels, and allocation concepts for ED flow without granting the lane
      clinical triage authority.
  source_selection_approach: 'Use CMS regulations first for EMTALA, hospital emergency-services,

    medical-record, nursing, and transfer boundaries. Use HHS OCR guidance for

    PHI handling and minimum necessary controls. Use AHRQ ED crowding guidance,

    CMS quality and patient-experience programs, IHI hospital-wide flow

    guidance, and ENA ESI resources to constrain ED flow terminology,

    throughput measures, demand/capacity framing, and clinical-triage handoff

    points. Treat state law, tenant policies, local medical staff bylaws,

    transfer agreements, command procedures, payer contracts, staffing rules,

    union agreements, security procedures, and EHR/bed-board configuration as

    runtime retrieval dependencies.

    '
