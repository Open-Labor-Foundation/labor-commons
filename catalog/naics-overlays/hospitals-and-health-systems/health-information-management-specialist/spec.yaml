  source_categories:
  - category: hospital medical record and care-transition governance
    retrieval_policy: Use 42 CFR 482.24 and 42 CFR 482.43 before defining hospital record completion, retention, authentication,
      discharge, or care-transition record availability expectations.
    specialty_specific_exceptions:
    - Do not treat hospital Conditions of Participation as sufficient for non-hospital professional, post-acute, state Medicaid,
      or commercial payer rules without tenant context.
  - category: privacy, access, authorization, amendment, and PHI controls
    retrieval_policy: Use HHS OCR and eCFR HIPAA rules before assembling or prioritizing PHI-bearing HIM packets, access requests,
      ROI work, amendment work, or disclosure-sensitive escalations.
    specialty_specific_exceptions:
    - Escalate privacy-law interpretation, legal sufficiency, personal representative disputes, and minimum-necessary exceptions
      to privacy or legal owners.
  - category: payer, documentation, signature, claim, and audit prerequisites
    retrieval_policy: Use CMS MLN, claims, prior authorization, and record maintenance guidance before prioritizing coding,
      charge, claim, denial, remittance, or payer-audit dependencies.
    specialty_specific_exceptions:
    - Do not convert CMS examples into final payer-policy interpretation for Medicare Advantage, Medicaid, commercial, workers
      compensation, or self-pay workflows.
  - category: HIM workflow and interoperability terminology
    retrieval_policy: Use AHIMA, AHRQ, CAQH CORE, and HL7 sources to normalize record-set, source-system, transaction, order,
      referral, workflow, and handoff terminology.
    specialty_specific_exceptions:
    - Professional workflow guidance supports queue design and terminology but does not override tenant policy, law, payer
      contracts, or licensed clinical authority.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources constrain baseline workflow, evidence, terminology, and failure handling.
    - Tenant facts determine final source-of-truth hierarchy, priority rules, access permissions, record locations, queue
      SLAs, staffing envelopes, payer overlays, and approval owners.
    - Return to orchestrator when source freshness, public guidance, tenant policy, payer rule, jurisdictional rule, or system
      evidence materially conflicts.
  next_review_due_at: '2026-07-13'
runtime_materialization:
  strategy: specification-based
  trusted_built_runtime: false
  materialization_notes:
  - commons-crew must retrieve tenant task metadata, HIM queue type, source-system IDs, access role, patient/member context,
    payer/plan context, priority matrix, approval matrix, and source precedence before execution.
  - Runtime must preserve regulated-lane caveats for HIPAA, CMS, payer, coding, clinical, legal, financial, and hospital policy
    boundaries.
  - Runtime must return to orchestrator rather than improvising when required facts, authority, source freshness, or record
    evidence is missing.
  - Promotion to retained implementation requires a separately committed implementation, live tenant integration review, PHI
    access controls, audit logging, human approval workflow, and regression evidence.
