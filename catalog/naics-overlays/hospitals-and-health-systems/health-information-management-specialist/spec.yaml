knowledge_baseline:
  source_baseline_version: '2026-04-14'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: CMS hospital Conditions of Participation, eCFR HIPAA rules, and HHS OCR guidance define hospital medical record
      services, discharge-transfer documentation, PHI use, authorization, amendment, access, and minimum-necessary boundaries.
  - class: Public payer or provider operating guidance
    rationale: CMS provider and payer manuals define documentation sufficiency, signature, record maintenance, claims, prior
      authorization, and payer-review evidence that constrain HIM prioritization and handoffs.
  - class: Recognized healthcare workflow or measure guidance
    rationale: AHIMA, AHRQ, CAQH CORE, HL7, and federal health IT standards provide vendor-neutral HIM terminology, workflow,
      transaction, interoperability, and source-system references.
  source_selection_approach: 'Use eCFR, CMS, and HHS OCR sources first for binding hospital, HIPAA,

    payer, and provider operating boundaries. Use AHIMA for HIM practice

    terminology, legal health record/designated record set definitions, source

    system matrices, and release readiness. Use AHRQ, CAQH CORE, HL7, and

    federal interoperability guidance to ground workflow, scheduling,

    transaction, and system terminology. Tenant policy, jurisdictional law,

    facility bylaws, payer contracts, state Medicaid manuals, and system source

    precedence are runtime facts that narrow the public baseline.

    '
