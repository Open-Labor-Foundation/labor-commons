knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Hospital finance operations are constrained by federal hospital record requirements, utilization review boundaries,
      HIPAA payment and operations use, minimum-necessary handling, and patient billing protections.
  - class: Public payer or provider operating guidance
    rationale: Institutional billing, CMS-1450/837I claim completion, remittance, appeals, authorization prerequisites, and
      Medicare billing manuals define public payer/provider operating expectations for hospital financial workflows.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Eligibility, claim, remittance, and adjustment code handling require recognized operating rules and transaction
      terminology rather than generic reconciliation terms.
  authority_sources:
  - source_id: ecfr-42-cfr-482-24-medical-record-services
    title: '42 CFR 482.24 - Condition of participation: Medical record services'
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.24
    authority_reason: Primary federal hospital medical-record regulation. It anchors encounter, documentation, authentication,
      and record support for charges and claims.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: ecfr-42-cfr-482-30-utilization-review
