  source_categories:
  - category: Public healthcare regulator guidance
    retrieval_policy: Use eCFR, HHS OCR, and CMS/HHS patient billing guidance first for hospital record support, utilization
      boundaries, PHI handling, and patient billing protection constraints.
    specialty_specific_exceptions:
    - Federal baseline does not replace tenant policy, state law, payer contracts, medical staff bylaws, accounting policy,
      tax advice, or legal review.
  - category: Public payer or provider operating guidance
    retrieval_policy: Use CMS manuals and prior authorization guidance for institutional billing, claim, remittance, denial,
      appeal, and authorization workflow terminology, then require tenant payer, plan, service setting, contract, and approval
      facts.
    specialty_specific_exceptions:
    - Do not infer coverage, payment, authorization approval, appeal strategy, code correctness, or contract variance treatment
      from public guidance.
  - category: Recognized healthcare workflow or measure guidance
    retrieval_policy: Use CAQH CORE and transaction operating rules to normalize eligibility, claim, remittance, and adjustment
      code terminology and evidence workflow.
    specialty_specific_exceptions:
    - Operating rules do not authorize payment overrides, payer interpretation, privacy approval, coding decisions, or accounting
      treatment.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public sources as baseline constraints; tenant policies, payer contracts, source hierarchy, and financial approval
      matrix are mandatory for operational action.
    - Require facility, service setting, payer, plan, claim/account identifier, service dates, source records, approval threshold,
      privacy posture, and adjacent owner map before final disposition.
    - Escalate when public guidance, tenant policy, payer rules, contract terms, clinical instructions, accounting policy,
      or patient/member records conflict.
  specialty_specific_exceptions:
  - Do not infer charge support, claim readiness, payment posting, contractual adjustment, write-off, refund, recoupment,
    patient responsibility, or denial appeal handling from incomplete records.
  - Do not transform hospital financial operations into medical coding, utilization management, payer operations, privacy
    approval, formal accounting, tax, legal, or clinical authority.
  - Do not claim reconciliation closeout until source records, matched items, unresolved variances, owner acceptance, and
    audit-ready evidence are recorded.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-12'
