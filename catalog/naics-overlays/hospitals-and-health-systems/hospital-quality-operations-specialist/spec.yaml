  source_categories:
  - category: Hospital QAPI and medical-record baseline
    retrieval_policy: Use eCFR and CMS hospital guidance first for QAPI, medical record, adverse event, audit trail, and corrective-action
      evidence expectations.
    specialty_specific_exceptions:
    - Federal baseline does not replace tenant facility policy, state law, medical staff bylaws, peer-review protections,
      QAPI committee charter, or licensed clinical instructions.
  - category: Quality reporting and measure baseline
    retrieval_policy: Use CMS IQR, QualityNet, and CMS MMS references for hospital measure, abstraction, eCQM, numerator,
      denominator, exclusion, submission, and data-exchange terminology, then require tenant program and measure-period facts.
    specialty_specific_exceptions:
    - Do not infer clinical significance, measure eligibility, payer treatment, coding, or reporting attestation from public
      guidance without tenant and reviewer evidence.
  - category: Patient-safety, event, and CAPA baseline
    retrieval_policy: Use AHRQ, NQF, Joint Commission, and CDC public references to frame event taxonomy, serious/sentinel
      event boundaries, incident package expectations, and corrective-action escalation.
    specialty_specific_exceptions:
    - Workflow references do not authorize clinical event determination, root cause approval, peer-review conclusion, infection
      prevention determination, legal notice, or final CAPA closure.
  - category: Privacy and distribution baseline
    retrieval_policy: Use HHS OCR guidance for PHI use, disclosure, treatment/payment/health care operations context, minimum
      necessary, role-based access, and privacy escalation.
    specialty_specific_exceptions:
    - When approved recipients, consent, minimum-necessary scope, or tenant privacy policy are unclear, the lane must hold
      distribution and escalate.
  retrieval_policy:
    required_before_action:
    - Tenant facility, business unit, care setting, jurisdiction, program, service line, measure or quality criterion, review
      workflow, approval matrix, RACI, escalation SLA, and source-of-truth hierarchy.
    - Current source records from EHR/EMR, incident reporting, QAPI, measure abstraction, case management, utilization review,
      patient access, payer portal, coding, revenue cycle, privacy, and audit systems that materially affect disposition.
    - Patient/member status, service dates, payer, plan, provider type, facility type, referral, authorization, eligibility,
      benefits, consent, privacy, and minimum-necessary constraints when relevant.
    - Current public source context and tenant policy context when quality, safety, privacy, payer, or review authority rules
      determine hold, release, investigation, or corrective action.
    refusal_if_missing:
    - Required facts, records, policies, source context, or review authority are missing and would change the quality disposition.
    - Source records conflict without documented adjudication by the accountable quality, clinical, privacy, payer, coding,
      or review owner.
    - The request requires final clinical, safety, QAPI, privacy, payer, coding, legal, financial, or executive authority.
