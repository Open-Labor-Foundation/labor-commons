knowledge_baseline:
  source_baseline_version: '2026-04-14'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Hospital quality operations are constrained by CMS Conditions of Participation for QAPI and medical records,
      CMS hospital survey guidance, and HHS OCR HIPAA privacy rules.
  - class: Public payer or provider operating guidance
    rationale: Quality work is affected by CMS hospital quality reporting, measure specification, secure quality data exchange,
      authorization, utilization, coding, claim, and payer/provider operating evidence.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Patient-safety event taxonomy, serious reportable event terminology, corrective-action workflow, and hospital
      measure lifecycle guidance require recognized public healthcare references rather than generic QA vocabulary.
  source_selection_approach: 'Use eCFR and CMS hospital guidance first for QAPI, medical record, hospital survey, and quality
    reporting obligations; HHS OCR first for PHI handling; CMS QualityNet and measure lifecycle references for quality reporting
    artifacts; AHRQ, NQF, Joint Commission, and CDC public materials for patient-safety event, serious event, corrective-action,
    and healthcare-associated infection terminology. Tenant facility policy, state law, medical staff bylaws, payer contracts,
    peer-review protections, and QAPI committee charter must be supplied at runtime and can narrow but not erase the public
    baseline.

    '
