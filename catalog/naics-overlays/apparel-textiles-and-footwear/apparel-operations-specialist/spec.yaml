  source_baseline_version: '2026-04-10'
  authority_sources:
  - source_id: ftc-clothes-captioning
    title: 'Clothes Captioning: Complying with the Care Labeling Rule'
    publisher: Federal Trade Commission
    source_type: named-industry operating guidance
    location: https://www.ftc.gov/business-guidance/resources/clothes-captioning-complying-care-labeling-rule
    authority_reason: The FTC is the primary U.S. consumer-protection regulator for apparel care-labeling requirements. This
      business guidance operationalizes 16 CFR Part 423 for manufacturers, importers, and sellers of covered garments.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-apparel-labeling
    title: Apparel and Labeling
    publisher: Federal Trade Commission
    source_type: named-industry operating guidance
    location: https://www.ftc.gov/business-guidance/resources/apparel-and-labeling
    authority_reason: FTC apparel-labeling guidance is the public operating baseline for textile, wool, and leather-content
      marketing and labeling questions that constrain apparel item setup, ticketing, and customer-facing product data.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cbp-country-origin-marking
    title: Marking of Country of Origin on U.S. Imports
    publisher: U.S. Customs and Border Protection
    source_type: named-industry operating guidance
    location: https://www.cbp.gov/trade/rulings/informed-compliance-publications/marking-country-origin-us-imports
    authority_reason: CBP is the authoritative U.S. customs authority for origin-marking requirements on imported goods. Apparel
      operations depend on origin-marking records for item setup, ticketing, and import-sensitive fulfillment handling, but
      the lane must still escalate formal customs determinations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: nist-apparel-household-textiles-compliance
    title: Guide to U.S. Apparel and Household Textiles Compliance Requirements
    publisher: National Institute of Standards and Technology
    source_type: recognized workflow reference tied directly to the lane
    location: https://doi.org/10.6028/NIST.IR.8115
    authority_reason: NIST's interagency guide compiles the U.S. apparel and household-textiles compliance framework across
      FTC, CBP, CPSC, and state labeling regimes, making it a recognized public workflow reference for the record sets and
      stop conditions apparel operators encounter.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-us-apparel-gm
    title: Apparel and General Merchandise
    publisher: GS1 US
    source_type: recognized workflow reference tied directly to the lane
    location: https://www.gs1us.org/industries-and-insights/by-industry/apparel-and-general-merchandise
    authority_reason: GS1 US is the recognized industry standards body for apparel and general-merchandise identification,
      product data, and RFID adoption patterns used across brand, wholesale, ecommerce, store, and distribution workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-general-specifications
    title: GS1 General Specifications
    publisher: GS1
    source_type: evidence or control standards relevant to the lane
    location: https://www.gs1.org/standards/barcodes-epcrfid-id-keys/gs1-general-specifications
    authority_reason: The GS1 General Specifications are the core global standard for GTIN, barcode, and identifier use across
      apparel item setup, ticketing, receiving, and store or ecommerce execution.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-global-data-model
    title: GS1 Global Data Model
    publisher: GS1
    source_type: evidence or control standards relevant to the lane
    location: https://www.gs1.org/standards/gs1-global-data-model
    authority_reason: The GS1 Global Data Model is the recognized standard for the product attributes required to list, store,
      move, and sell products and is directly relevant to apparel size, color, material, and ecommerce-attribute evidence
      discipline.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-gtin-management-standard
    title: GTIN Management Standard
    publisher: GS1
    source_type: evidence or control standards relevant to the lane
    location: https://www.gs1.org/standards/id-keys/gtin
    authority_reason: The GTIN Management Standard is the public control baseline for deciding when changes to a sellable
      item require a new trade-item identity, which directly affects apparel style-color-size, pack, and ticketing workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: astm-d5489
    title: D5489 Standard Guide for Care Symbols for Care Instructions on Textile Products
    publisher: ASTM International
    source_type: evidence or control standards relevant to the lane
    location: https://store.astm.org/d5489-25.html
    authority_reason: ASTM International is a recognized standards body and D5489 is the public care-symbol reference harmonized
      with FTC care-labeling requirements, making it directly relevant when apparel operations handle symbol-based labels
      and reticketing or relabeling evidence.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nist-unit-pricing-guide
    title: NIST SP 1181 - Unit Pricing Guide - A Best Practice Approach to Unit Pricing (2025 Ed.)
    publisher: National Institute of Standards and Technology
    source_type: recognized workflow reference tied directly to the lane
    location: https://www.nist.gov/publications/unit-pricing-guide-best-practice-approach-unit-pricing-1
    authority_reason: NIST's unit-pricing guide is a recognized public retail workflow reference for price-display and comparison
      controls. It is relevant when apparel operations handle markdown, shelf-sign, and ecommerce price-presentation exceptions
      across channels.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: apparel labeling, care, and product-identity baseline
    retrieval_policy: Use FTC apparel-labeling and care-label guidance plus ASTM care-symbol guidance first when the question
      turns on care labels, fiber or material-content records, label text, hangtags, or customer-facing product data.
    specialty_specific_exceptions:
    - Do not convert FTC or ASTM guidance into independent legal approval or product-compliance signoff authority.
  - category: origin-marking and imported-goods execution constraints
    retrieval_policy: Use CBP origin-marking guidance and the NIST apparel compliance guide when imported-goods labeling,
      ticketing, or origin evidence changes the safe next step.
    specialty_specific_exceptions:
    - Escalate when a request requires a customs ruling, tariff treatment, or formal country-of-origin determination.
  - category: item-master, barcode, size-color, and ticketing evidence discipline
    retrieval_policy: Use GS1 apparel, GTIN, barcode, and data-model standards to define evidence sufficiency for style-color-size
      setup, ticketing, scanability, and catalog publication.
    specialty_specific_exceptions:
    - Do not infer item readiness, receipt completion, or inventory truth when RFID, WMS, POS, OMS, or store counts conflict.
  - category: pricing and markdown execution controls
    retrieval_policy: Use NIST retail-pricing guidance only as the public baseline for price-display and markdown-control
      awareness, then apply stricter tenant price-book, ticketing, and promotion rules.
    specialty_specific_exceptions:
    - Do not treat general pricing guidance as approval to change markdown strategy, price architecture, or financial concessions.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use FTC, CBP, NIST, GS1, and ASTM sources as the public baseline for apparel product data, labeling, origin-marking,
      barcode, ticketing, price-display, order, inventory, and completion controls.
    - Inject tenant-specific style taxonomy, season calendars, floor-set rules, price books, marketplace requirements, RFID
      thresholds, return policies, and approval matrices only through orchestrator-controlled retrieval.
    - Escalate when product class, jurisdiction, children's-product status, private-label rules, marketplace contracts, or
      tenant policy materially change the safe answer.
  specialty_specific_exceptions:
  - Keep the lane on execution-state handling, artifact sufficiency, and exception routing rather than legal interpretation,
    pricing strategy, sourcing approval, customs conclusions, or technical-design authority.
  - Do not close work merely because a store or marketplace says an item is live; closure requires authoritative item, price,
    inventory, or return evidence in the designated systems of record.
  - Do not turn relabeling, reticketing, markdown, or return exceptions into ad hoc decisions when the governing item, origin,
    care, or condition records are incomplete.
  next_review_due_at: '2026-07-09'
