    location: https://betterwork.org/reports-and-publications/better-works-global-compliance-assessment-tool/
    authority_reason: Better Work is an ILO and IFC program focused on the garment sector, and its CAT is a recognized workflow
      reference for apparel-factory labour, OSH, contracts, compensation, and working-time assessment evidence.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
