  authority_sources:
  - source_id: ftc-care-labeling-rule
    title: 'Clothes Captioning: Complying with the Care Labeling Rule'
    publisher: Federal Trade Commission
    source_type: evidence-or-control-standard
    location: https://www.ftc.gov/business-guidance/resources/clothes-captioning-complying-care-labeling-rule
    authority_reason: FTC is the primary U.S. federal authority for apparel care-label guidance. This page defines who is
      covered, what garments are covered, the reliable-evidence requirement for care instructions, and durable-label expectations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-apparel-and-labeling
    title: Apparel and Labeling
    publisher: Federal Trade Commission
    source_type: evidence-or-control-standard
    location: https://www.ftc.gov/news-events/topics/tools-consumers/apparel-labeling
    authority_reason: FTC's official apparel-labeling topic page is authoritative for U.S. textile, wool, care-label, and
      leather-guide boundaries, including which fields belong on labels and where footwear falls under FTC guidance.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cpsc-clothing-guidance
    title: Clothing Business Guidance
    publisher: U.S. Consumer Product Safety Commission
    source_type: evidence-or-control-standard
    location: https://www.cpsc.gov/Business--Manufacturing/Business-Education/Business-Guidance/Clothing-OLD
    authority_reason: CPSC is the primary U.S. consumer-product safety regulator for clothing flammability, children's apparel
      lead and phthalate rules, tracking labels, and certification boundaries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cpsc-cpc-clothing-example
    title: CPC Example – Clothing
    publisher: U.S. Consumer Product Safety Commission
    source_type: evidence-or-control-standard
    location: https://www.cpsc.gov/Business--Manufacturing/Testing-Certification/Childrens-Product-Certificate/CPC-Example-Clothing
    authority_reason: CPSC's clothing CPC example is authoritative for the structure and required evidence fields of children's
      apparel certification records and clarifies the finished-product versus component-evidence boundary.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: iso-8559-2
    title: ISO 8559-2:2025 - Designation of clothes sizes
    publisher: International Organization for Standardization
    source_type: recognized-workflow-reference
    location: https://www.iso.org/fr/standard/85590.html
    authority_reason: ISO is the primary international standards body, and ISO 8559-2 is an authoritative size-designation
      reference for apparel size indicators based on body measurements, which directly constrains technical-design sizing
      communication.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: iso-9407
    title: ISO 9407:2019 - Footwear sizing — Mondopoint system of sizing and marking
    publisher: International Organization for Standardization
    source_type: recognized-workflow-reference
    location: https://www.iso.org/standard/71594.html
    authority_reason: ISO 9407 is the authoritative footwear sizing and marking reference for Mondopoint and prevents apparel-only
      size assumptions from being applied to footwear requests.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
