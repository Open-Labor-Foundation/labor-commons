    publisher: ZDHC Foundation
    source_type: evidence-or-control-standard
    location: https://www.zdhc.org/mrsl
    authority_reason: ZDHC is the globally recognized apparel and footwear chemical-management framework. Its MRSL is authoritative
      for upstream chemical-control expectations and is widely embedded in textile and footwear supply-chain approval gates.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: oeko-tex-standard-100
    title: OEKO-TEX STANDARD 100
    publisher: OEKO-TEX Service GmbH
    source_type: evidence-or-control-standard
    location: https://www.oeko-tex.com/en/our-standards/oeko-tex-standard-100
    authority_reason: OEKO-TEX STANDARD 100 is a widely recognized textile and leather evidence-control benchmark for harmful-substance
      testing from yarn to finished product, including component-level coverage and annual limit-value review.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: apparel-labeling-and-care-evidence
    retrieval_policy: Use FTC and CPSC sources first for U.S. care-label, product-safety, certification, and tracking-label
      obligations.
    specialty_specific_exceptions:
    - Do not generalize U.S. guidance into non-U.S. market approval without tenant retrieval for the destination market.
  - category: size-designation-and-variant-control
    retrieval_policy: Use ISO and GS1 sources for apparel and footwear size designations, SKU-variant handling, and record-of-truth
      expectations.
    specialty_specific_exceptions:
    - Escalate when brand, retailer, or tenant size architecture overrides the public baseline.
  - category: named-industry-approval-and-sample-workflow
    retrieval_policy: Use named-industry brand and retailer workflow guidance to anchor real sample, label, testing, and production-readiness
      artifact expectations.
    specialty_specific_exceptions:
    - Do not convert a named retailer or brand procedure into a universal industry rule without noting it as a tenant-specific
      override.
  - category: chemical-and-finished-product-control
    retrieval_policy: Use ZDHC and OEKO-TEX to frame chemical-control evidence, component coverage, and escalation when test
      or certification evidence is incomplete.
    specialty_specific_exceptions:
    - Do not treat recognized chemical-control frameworks as a substitute for regulator-specific legal advice or market-entry
      signoff.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Start from the reviewed public baseline above for care labeling, apparel flammability, children's-product certification,
      size designation, variant control, and chemical-evidence handling.
    - Require tenant retrieval for market-specific destination labeling rules, retailer manuals, brand size architecture,
      PLM field names, sample calendars, approval matrices, and live system-of-record locations.
    - Escalate when tenant or buyer guidance materially narrows or overrides the public baseline on label format, test scope,
      or approval gates.
  specialty_specific_exceptions:
  - Keep the lane centered on technical-design support, evidence completeness, and bounded issue handling.
  - Do not let apparel technical familiarity drift into final design authorship, pattern engineering, or commercial approvals.
  - Treat final compliance signoff, legal interpretation, sourcing approval, and shipment-release decisions as adjacent authority.
  next_review_due_at: '2026-07-09'
