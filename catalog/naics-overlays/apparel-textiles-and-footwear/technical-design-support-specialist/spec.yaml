      label validation, and recall handling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-identification-key-article
    title: What kind of information is linked to the GS1 Identification Key?
    publisher: GS1
    source_type: recognized-workflow-reference
    location: https://support.gs1.org/support/solutions/articles/43000734469-what-kind-of-information-is-linked-to-the-gs1-identification-key-
    authority_reason: GS1 is the recognized global standards body for trade-item identification. This article is authoritative
