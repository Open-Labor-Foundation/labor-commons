  source_categories:
  - category: apparel product-safety and shipment-hold baseline
    retrieval_policy: Prefer CPSC apparel and flammability guidance for product-safety questions, shipment holds tied to flammability
      or drawstring hazards, and certification dependencies.
    specialty_specific_exceptions:
    - Do not assume every product is subject to the same flammability rule; exact product category, material, and age grade
      must be confirmed.
  - category: textile labeling and care-instruction evidence
    retrieval_policy: Use FTC textile and care-labeling guidance for fiber-content, country-of-origin, dealer identity, and
      care-label support questions.
    specialty_specific_exceptions:
    - Escalate when Customs, retailer manuals, or jurisdiction-specific label rules materially narrow or override the FTC
      baseline.
  - category: inspection sampling and acceptance control
    retrieval_policy: Use ISO 2859-1 to structure AQL inspection posture, sample-size framing, and acceptance or rejection
      logic when tenant procedures rely on recognized lot inspection discipline.
    specialty_specific_exceptions:
    - Do not invent AQL levels or switching rules when the tenant quality manual or customer manual is the controlling source.
  - category: textile and footwear performance evidence
    retrieval_policy: Use AATCC textile test methods and ISO footwear test methods to interpret what the lab evidence means,
      what defect mode it supports, and whether corrective-action escalation is warranted.
    specialty_specific_exceptions:
    - Do not convert a recognized test method into final compliance approval when the governing customer, legal, or product-safety
      owner has not signed off.
  - category: terminology and record normalization
    retrieval_policy: Use ASTM textile terminology to keep findings, evidence references, and handoffs consistent across quality,
      technical design, sourcing, and vendor teams.
    specialty_specific_exceptions:
    - Do not let terminology cleanup hide substantive evidence gaps or change-control decisions.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public CPSC and FTC references define the baseline for apparel and textile safety, labeling, and care-instruction evidence.
    - Public ISO, AATCC, and ASTM references define accepted inspection, testing, and terminology baselines for apparel, textiles,
      and footwear QA work.
    - Tenant facts about product category, age grade, jurisdiction, retailer or customer manuals, restricted-substance rules,
      shipment authority, and systems-of-record locations are mandatory for case-specific conclusions.
    - Escalate when customer manuals, brand quality manuals, or jurisdiction-specific chemical or safety obligations materially
      narrow or override the public baseline.
  specialty_specific_exceptions:
  - Keep the lane centered on evidence-backed apparel, textile, and footwear quality review, not final compliance signoff
    or final business approval.
  - Separate technical-design and fit ownership from QA evidence review even when defects involve measurement tolerance, grade
    rules, or construction details.
  - Do not certify legal compliance, issue final certification documents, or authorize shipment release from public references
    alone.
  source_baseline_version: '2026-04-10'
  next_review_due_at: '2026-07-09'
