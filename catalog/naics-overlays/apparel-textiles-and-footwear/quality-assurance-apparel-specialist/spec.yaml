    publisher: U.S. Consumer Product Safety Commission
    source_type: official-product-safety-guidance
    location: https://www.cpsc.gov/Business--Manufacturing/Business-Education/Business-Guidance/Flammable-Fabrics-Act
    authority_reason: CPSC's FFA guidance is the authoritative public source for mandatory flammability standards affecting
      clothing textiles, vinyl plastic film, carpets, rugs, and children's sleepwear.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
