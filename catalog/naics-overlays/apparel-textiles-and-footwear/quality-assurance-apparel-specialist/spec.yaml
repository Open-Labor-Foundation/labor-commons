knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: CPSC and FTC apparel and textile guidance define the public baseline for flammability, drawstring hazards,
      textile labeling, and care-label evidence that materially changes apparel QA work.
  - class: Recognized workflow references tied directly to the lane
    rationale: ISO sampling and footwear test standards plus AATCC textile methods define how apparel and footwear quality
      teams structure inspection plans and review lab evidence.
  - class: Evidence or control standards relevant to the lane
    rationale: ASTM textile terminology and apparel-care terminology help normalize the record language used in inspection
      findings, care-label support, and product-quality summaries.
  source_selection_approach: 'Use current CPSC and FTC apparel-textile guidance first for mandatory

    flammability, drawstring, textile-labeling, and care-label questions. Use

    ISO, AATCC, and ASTM materials to structure acceptance-sampling posture,

    textile and footwear test evidence, and industry terminology without

    treating those standards as substitutes for controlling law. Tenant-specific

    product category, age grade, jurisdiction, customer manuals, restricted

    substance lists, shipment authority, and retailer acceptance rules must be

    supplied at runtime instead of guessed from the public baseline.

    '
  authority_sources:
