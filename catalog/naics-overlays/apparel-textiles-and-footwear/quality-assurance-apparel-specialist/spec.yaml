    publisher: U.S. Consumer Product Safety Commission
    source_type: official-industry-guidance
    location: https://www.cpsc.gov/s3fs-public/Session%204%20Textiles%20En.pdf
    authority_reason: CPSC's apparel and textiles overview is official named-industry guidance summarizing the federal product-safety
      requirements, testing, certification, and record expectations that govern apparel QA work.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cpsc-flammable-fabrics-act
