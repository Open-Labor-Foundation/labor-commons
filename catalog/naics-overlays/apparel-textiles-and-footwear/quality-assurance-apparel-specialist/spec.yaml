    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: iso-24266
    title: ISO 24266:2020 - Footwear — Test methods for whole shoe — Flexing durability
    publisher: International Organization for Standardization
    source_type: recognized-footwear-test-method
    location: https://www.iso.org/standard/78251.html
    authority_reason: ISO's official whole-shoe flexing method is a recognized footwear-quality evidence standard for durability
