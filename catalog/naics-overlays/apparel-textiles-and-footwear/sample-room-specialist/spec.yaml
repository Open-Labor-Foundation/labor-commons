    publisher: GS1 US
    source_type: recognized-guideline
    location: https://www.gs1us.org/industries-and-insights/by-industry/apparel-and-general-merchandise/implementation-resources-for-standards/raw-materials-attributes-guideline
    authority_reason: GS1 US raw-material guidance is a recognized apparel-industry reference for standardized material attributes
      and like-kind material identification, which helps define when a sample-room request crosses into unsupported substitution
