    publisher: GS1 US
    source_type: recognized-guideline
    location: https://www.gs1us.org/content/dam/gs1us/documents/industries-insights/guideline-for-floor-ready-merchandise.pdf
    authority_reason: GS1 US floor-ready merchandise guidance is an apparel and general merchandise operating reference for
