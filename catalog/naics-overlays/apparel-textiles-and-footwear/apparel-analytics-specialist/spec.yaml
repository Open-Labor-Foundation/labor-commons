knowledge_baseline:
  source_baseline_version: '2026-04-10'
  authority_sources:
  - source_id: macys-edi-852-product-activity
    title: EDI v5010 852 INBOUND Product Activity
    publisher: Macy's, Inc.
    source_type: named-industry-operating-guidance
    location: https://macysnet.com/mdocweb/documents.aspx?document=EDI+v5010+852+INBOUND+Product+Activity
    authority_reason: Macy's official vendor EDI specification is named-industry operating guidance for the product-activity
      records retailers actually exchange with vendors, including sold, returned, on-hand, and on-order data tied to item
      identifiers used in apparel analytics.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: target-product-safety
    title: Product Safety and Quality Assurance Tools and Processes
    publisher: Target Corporation
    source_type: named-industry-operating-guidance
    location: https://corporate.target.com/sustainability-governance/operating-ethically/product-safety-quality-assurance/product-safety
    authority_reason: Target's official retailer guidance is named-industry operating guidance showing how apparel and general-merchandise
      workflows rely on approval samples, third-party testing, label validation, record keeping, and recall handling before
      stronger product claims are made.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-us-ecommerce-fulfillment-guideline
    title: Apparel and General Merchandise E-Commerce Fulfillment Guideline
    publisher: GS1 US
    source_type: recognized-workflow-reference
    location: https://www.gs1us.org/resources/downloads/apparel-general-merchandise
    authority_reason: GS1 US is a recognized standards body for apparel and general merchandise trade-item identification
      and fulfillment workflows. This guideline ties GTIN, color, and size identifiers to inventory visibility, selling trends,
      and fulfillment accuracy.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-us-color-and-size-codes
    title: Color and Size Codes
    publisher: GS1 US
    source_type: recognized-workflow-reference
    location: https://www.gs1us.org/resources/data-hub-help-center/color-and-size-codes
    authority_reason: GS1 US color and size code guidance is a recognized workflow reference for normalizing apparel and footwear
      size and color attributes so analytics preserves the right variant grain.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-care-labeling-rule
    title: 'Clothes Captioning: Complying with the Care Labeling Rule'
    publisher: Federal Trade Commission
    source_type: evidence-and-control-standard
    location: https://www.ftc.gov/business-guidance/resources/clothes-captioning-complying-care-labeling-rule
    authority_reason: FTC guidance is the primary U.S. evidence standard for care labels. It defines durable-label expectations
      and the requirement for a reliable basis behind care instructions, which limits analytics claims about quality or compliance.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-clothing-and-textiles
    title: Clothing and Textiles
    publisher: Federal Trade Commission
    source_type: evidence-and-control-standard
    location: https://www.ftc.gov/business-guidance/selected-industries/clothing-textiles
    authority_reason: FTC's clothing and textiles business guidance is the public baseline for textile, wool, and apparel
      label fields such as identity, fiber content, and country of origin that affect product-claim and disclosure boundaries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cpsc-clothing-business-guidance
    title: Clothing Business Guidance
    publisher: U.S. Consumer Product Safety Commission
    source_type: evidence-and-control-standard
    location: https://www.cpsc.gov/Business--Manufacturing/Business-Education/Business-Guidance/Clothing-OLD
    authority_reason: CPSC is the primary U.S. product-safety regulator for clothing. Its clothing guidance defines flammability,
      children's-product, testing, certification, and tracking-label expectations that can materially change apparel analytics
      conclusions and disclosures.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cpsc-tracking-label-faq
    title: Tracking Labels
    publisher: U.S. Consumer Product Safety Commission
    source_type: evidence-and-control-standard
    location: https://www.cpsc.gov/FAQ/Tracking-Label
    authority_reason: CPSC's tracking-label FAQ is authoritative public guidance for required traceability fields on children's
      products, which affects evidence sufficiency for kid's apparel and footwear requests.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ifrs-s2-apparel-accessories-footwear
    title: IFRS S2 Climate-related Disclosures - Industry-based Guidance, Consumer Goods Appendix B8 Apparel, Accessories
      & Footwear
    publisher: IFRS Foundation
    source_type: recognized-workflow-reference
    location: https://www.ifrs.org/content/dam/ifrs/publications/pdf-standards-issb/english/2023/issued/part-b/ifrs-s2-ibg-volume-1-apparel-accessories-and-footwear-part-b.pdf
    authority_reason: The IFRS Foundation is the official publisher of ISSB standards. Appendix B8 provides apparel, accessories,
      and footwear-specific disclosure topics and metric categories such as raw-material sourcing, supplier tiers, and manufacturing
      emissions.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: sec-md-and-a-final-rule
    title: Management's Discussion and Analysis, Selected Financial Data, and Supplementary Financial Information
    publisher: U.S. Securities and Exchange Commission
    source_type: recognized-workflow-reference
    location: https://www.sec.gov/files/rules/final/2020/33-10890.pdf
    authority_reason: The SEC MD&A final rule is the authoritative public baseline for KPI contextualization, metric-definition
      transparency, and trend explanation when apparel analytics feeds board, lender, or investor-style reporting.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: style-color-size and item-master control
    retrieval_policy: Use GS1 US references and tenant item-master policy before reconciling style, color, size, GTIN, UPC,
      and footwear-size-system metrics.
    specialty_specific_exceptions:
    - Do not collapse footwear, apparel, and kids-size semantics into a single generic SKU grain.
  - category: retailer and channel product-activity records
    retrieval_policy: Use Macy's or comparable retailer product-activity guidance plus tenant POS, OMS, ERP, and WMS precedence
      before reporting sold, returned, on-hand, or on-order metrics.
    specialty_specific_exceptions:
    - Do not let a downstream dashboard replace the named retailer, ERP, or channel source of truth.
  - category: labeling, safety, and evidence controls
    retrieval_policy: Use FTC and CPSC sources whenever analytics language depends on care-label, textile-label, product-safety,
      children's-product, or tracking-label evidence.
    specialty_specific_exceptions:
    - Do not imply compliance or launch readiness when required evidence is absent or unresolved.
  - category: executive, sustainability, and external disclosure discipline
    retrieval_policy: Use IFRS and SEC guidance before presenting certified-material, supplier-tier, emissions, or KPI narratives
      to executive, lender, investor, or customer audiences.
    specialty_specific_exceptions:
    - Do not turn internal trend work into disclosure-safe sustainability or financial narratives without explicit methodology
      and approval context.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to the reviewed public baseline above for retailer product-activity files, item-master and variant semantics,
      labeling and safety evidence, and disclosure-safe KPI posture before using tenant slideware or dashboard screenshots.
    - Tenant retrieval must provide brand or retailer program, channel mix, market, age grade, metric dictionary, source-precedence
      policy, and exact record locations for PLM, PIM, ERP, POS, OMS, WMS, returns, and sustainability inputs.
    - Record source freshness, channel scope, style-color-size grain, size-system logic, and whether compliance or sustainability
      evidence materially narrows comparability.
    - Escalate pricing, assortment, sourcing, product-compliance, legal, finance-signoff, and external-disclosure requests
      instead of synthesizing a definitive answer.
  specialty_specific_exceptions:
  - This lane prepares evidence-backed apparel analytics outputs; it does not become the merchant, planner, technical designer,
    compliance owner, or disclosure approver.
  - Apparel analytics outputs must remain tied to the exact style-color-size, retailer, channel, market, age-grade, and reporting-window
    context supplied for the tenant.
  - When evidence gaps affect sell-through, returns, inventory availability, markdown posture, compliance state, or sustainability
    metrics, the lane must surface the blocker and route to the correct owner.
  next_review_due_at: '2026-07-09'
