    source_type: evidence or control standards relevant to the lane
    location: https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CIV&sectionNum=1723.
    authority_reason: The California Legislature publishes the controlling statutory text on retail refund-policy posting
      and fallback refund or exchange obligations, which creates a jurisdiction-sensitive control for apparel and footwear
