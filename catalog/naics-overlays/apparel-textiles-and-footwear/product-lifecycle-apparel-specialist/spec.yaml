    publisher: Federal Trade Commission
    source_type: official-apparel-care-guidance
    location: https://www.ftc.gov/business-guidance/resources/clothes-captioning-complying-care-labeling-rule
    authority_reason: FTC publishes the official federal business guidance for apparel care labeling, including who is covered,
      what permanent care instructions are required, and where exemptions or special handling apply.
