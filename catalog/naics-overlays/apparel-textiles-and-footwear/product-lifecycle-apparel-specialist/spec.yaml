    publisher: Federal Trade Commission
    source_type: official-apparel-labeling-guidance
    location: https://www.ftc.gov/business-guidance/resources/threading-your-way-through-labeling-requirements-under-textile-wool-acts
    authority_reason: FTC is the primary U.S. federal authority for Textile and Wool Act labeling rules; this guide defines
      the required fiber-content, country-of-origin, and manufacturer or RN disclosures that govern apparel labeling evidence.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
