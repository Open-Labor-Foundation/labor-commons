    authority_reason: CPSC is the primary U.S. consumer-product safety regulator for apparel flammability and children's-product
      requirements; this official business-education guide ties apparel workflows to applicable safety and certificate controls.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
