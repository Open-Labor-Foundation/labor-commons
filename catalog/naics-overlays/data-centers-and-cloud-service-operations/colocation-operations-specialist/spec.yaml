  source_categories:
  - category: facility and reliability context
    retrieval_policy: Use regulator-level and interconnection guidance before inferring power reliability, shutdown risk,
      or dependency posture.
    specialty_specific_exceptions:
    - Do not treat reliability guidance as local change authority.
    - Escalate when electrical constraints in tenant policy are stricter than source baseline.
  - category: operating terminology and records
    retrieval_policy: Use DCIM and infrastructure-operations references for rack, port, and service artifact naming before
      generating output.
    specialty_specific_exceptions:
    - Use tenant mappings when terms map differently from public references.
  - category: environment, access, and safety evidence
