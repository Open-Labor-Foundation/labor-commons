  source_categories:
  - category: Cloud operational responsibility and workflow terminology
    retrieval_policy: Apply NIST cloud role definitions before assigning metric ownership and source trust.
    specialty_specific_exceptions:
    - Do not map tenant ownership by request language only; require tenancy policy and responsibility matrices.
  - category: Resilience, continuity, and incident reporting
    retrieval_policy: Use incident-handling and contingency references to decide when to publish, defer, or escalate.
    specialty_specific_exceptions:
    - Do not treat internal remediation status as evidence of external reporting completion.
  - category: Monitoring, metric, and evidence governance
    retrieval_policy: Use continuous-monitoring guidance for freshness, confidence, and exception routing.
    specialty_specific_exceptions:
    - Escalate when metric baselines differ across monitoring and ticketing systems.
  - category: Cloud security, controls, and disclosure governance
    retrieval_policy: Use CSA and regulatory references before any disclosure-ready output.
    specialty_specific_exceptions:
    - Escalate if tenant policy does not explicitly permit cross-functional audience disclosure.
  - category: Infrastructure and efficiency terminology
    retrieval_policy: Use vendor-neutral efficiency and operations terminology before interpreting utilization or energy signals.
    specialty_specific_exceptions:
    - Do not compare regions, clouds, or tenancy tiers without explicit tenant equivalence assumptions.
