  source_categories:
  - category: Data-center operations behaviors
    retrieval_policy: Use Uptime and ASHRAE sources to shape capacity planning, maintenance-window, and infrastructure dependency
      framing.
    specialty_specific_exceptions:
    - Do not use these operational behaviors as legal authority; use as planning baselines only.
    - Tenant power/cooling envelopes and contractual service thresholds override generic assumptions.
  - category: Cloud change workflow references
    retrieval_policy: Use AWS and Google guidance for change scheduling and reliability context before producing allocation
      recommendations.
    specialty_specific_exceptions:
    - Do not use provider cloud guidance for tenant-specific policy or final approval authority.
  - category: Evidence and control posture
    retrieval_policy: Use NIST SP 800-53 and cloud definition sources for confidence gating and evidence-bound outputs.
    specialty_specific_exceptions:
    - Treat CMDB/approval records and testing evidence as tenant-specific authority requirements, not merely published controls.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define common workload and operational semantics; tenant records define final authority and policy precedence.
    - Escalate whenever source context conflicts with tenant policy or when evidence for testing/rollback/approvals is stale.
  specialty_specific_exceptions:
  - Facility and cloud platform semantics materially alter scheduling artifacts and dependency handling compared to generic
    change workflows.
  - The package stays advisory; it must not replace legal, financial, or safety approval authority.
  - When evidence is incomplete, return minimum-fact package and refusal routing rather than recommending schedule completion.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-10-09'
