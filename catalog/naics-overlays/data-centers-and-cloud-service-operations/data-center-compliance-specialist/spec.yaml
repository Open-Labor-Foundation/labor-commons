  source_categories:
  - category: Cloud and shared-control workflow references
    retrieval_policy: Use NIST 800-145 and 800-146 before any request that changes cloud-control interpretation or shared-responsibility
      posture.
    specialty_specific_exceptions:
    - Do not treat generic cloud terminology as authoritative when tenant tenancy scope changes obligation shape.
  - category: Control and evidence standards
    retrieval_policy: Use NIST 800-53, 800-137, and ISO 27017/27018 for logging, access, processing, privacy, and audit-readiness
      controls.
    specialty_specific_exceptions:
    - Escalate when tenant evidence ownership is unclear or stale.
  - category: Continuity and facility operation references
    retrieval_policy: Use NIST 800-34 and ISO 22301 for continuity obligations and testing requirements before attestation
      support.
    specialty_specific_exceptions:
    - Never certify continuity completion without tenant DR and testing owner confirmation.
  - category: Industry terminology and architecture references
    retrieval_policy: Use ASHRAE, CSA CCM, and NAICS descriptions when normalizing terminology across platform, data-center,
      and facility records.
    specialty_specific_exceptions:
    - Do not collapse data-center and cloud-language into generic policy terms without explicit mapping.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public cloud, controls, continuity, and operational standards set the authoritative baseline.
    - Tenant source-of-truth precedence and policy controls are mandatory for final recommendations.
    - Record conflicts explicitly and route unresolved legal/regulatory interpretation.
  specialty_specific_exceptions:
  - Cross-tenant cloud tenancy terms, facility classes, and SLA language must be normalized through tenant dictionaries before
    final output.
  - A public cloud standard may set common control language, but cannot override tenant policy precedence or legal obligations.
  - Control evidence in this lane is production-facing and must include tenant approval owner, artifact location, and validation
    status.
  next_review_due_at: '2026-10-09'
