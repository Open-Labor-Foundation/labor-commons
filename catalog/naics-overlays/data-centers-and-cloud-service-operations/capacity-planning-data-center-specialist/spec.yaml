  source_categories:
  - category: Named-industry and facility constraints
    retrieval_policy: Use NAICS, ASHRAE, and Uptime guidance to constrain capacity framing before planning recommendations.
    specialty_specific_exceptions:
    - Do not infer resilience class or legal authority without tenant records.
  - category: Workflow and capacity references
    retrieval_policy: Use cloud-operating and contingency references to validate sequencing and fallback assumptions.
    specialty_specific_exceptions:
    - Do not convert public runbook patterns into execution authority.
  - category: Evidence and control handling
    retrieval_policy: Use incident, telemetry, and capacity-control standards for evidence sufficiency and escalation gating.
    specialty_specific_exceptions:
    - When tenant source-of-truth conflicts with public baselines, escalate instead of guessing.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define baseline rules. Tenant SORs and policy overlays decide final allocation authority and tie-breaks.
    - Refuse deterministic recommendation when required source-of-truth data are missing or stale.
    - Do not output financial/legal decisions or execution directives.
  next_review_due_at: '2026-10-09'
