  source_categories:
  - category: incident-handling and operational continuity
    retrieval_policy: Use NIST incident and contingency sources to anchor severity, containment, rollback, and recovery obligations
      before recommending state advancement.
    specialty_specific_exceptions:
    - Never infer legal authority; escalate policy-sensitive incidents instead of adjudicating outside authority.
  - category: cloud operations model and dependency boundaries
    retrieval_policy: Use cloud role and responsibility references to separate tenant-owned security/operations artifacts
      from platform-owner obligations.
    specialty_specific_exceptions:
    - If tenant contract variants contradict source defaults, escalate for tenant confirmation before progressing.
  - category: facility resilience and architecture terminology
    retrieval_policy: Use industry terminology sources only for artifact naming and dependency framing; do not convert terms
      into authorization.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use NIST incident/contingency references and cloud role references as baseline for source hierarchy.
    - Resolve tenant evidence context (critical workloads, change windows, authority matrix, rollback plan) only from tenant
      systems at request time.
    - Escalate when tenant policy, jurisdictional obligations, or contractual constraints alter source assumptions.
  specialty_specific_exceptions:
  - Completion states are execution-oriented and cannot be claimed as legal, financial, or engineering release authority.
  - Evidence must come from tenant systems, not implied from standards alone.
  - If dependency signals across tenant systems conflict, move work to exception queue and require reconciliation before closure.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-10-09'
