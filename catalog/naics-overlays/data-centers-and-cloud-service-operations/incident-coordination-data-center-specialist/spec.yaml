  source_categories:
  - category: Tenant and industry artifact baseline
    retrieval_policy: Use NAICS and Uptime/ASHRAE guidance to confirm terminology, facility constraints, and tier assumptions
      before routing coordination decisions.
    specialty_specific_exceptions:
    - Do not assume facility continuity obligations without explicit tenant documentation.
  - category: Incident and contingency workflow references
    retrieval_policy: Use NIST and cloud-provider incident guidance for classification, handoff, escalation, and communication
      expectations.
    specialty_specific_exceptions:
    - Never convert guidance into autonomous execution authority for failover or remediation.
  - category: Evidence and control handling
    retrieval_policy: Use contingency and incident evidence standards for artifact sufficiency checks and safe closure decisions.
    specialty_specific_exceptions:
    - When evidence is stale or missing, route to adjacent owner or orchestrator with missing-artifact blockers.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources are authoritative for baseline, but tenant policies and source-of-truth records remain required for safe
      routing and closure.
    - Escalate when source precedence or facility/cloud-operating constraints conflict.
    - Never infer legal, financial, or safety authority.
  specialty_specific_exceptions:
  - Facility tier and tenant criticality materially alter what counts as an acceptable handoff state.
  - Cloud tenancy boundaries create additional routing and evidence constraints that a generic incident coordinator lacks.
  - Power, cooling, and network-domain collisions require explicit owner mapping before closure or demotion to standard workflows.
  next_review_due_at: '2026-10-09'
