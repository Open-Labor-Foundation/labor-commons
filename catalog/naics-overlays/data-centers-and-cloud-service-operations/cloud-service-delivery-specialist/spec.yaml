  source_categories:
  - category: Cloud and data-center terminology
    retrieval_policy: Use NAICS 518210 and NIST cloud definitions first to normalize tenant language and avoid generic support
      mistakes.
    specialty_specific_exceptions:
    - When tenant naming diverges (for example, site, region, availability zone), require tenant mapping before routing.
  - category: Cloud service workflow and support
    retrieval_policy: Use NIST 800-146 and incident guidance for triage and change-readiness interpretation.
    specialty_specific_exceptions:
    - Do not skip service-readiness checks for maintenance windows, failover readiness, or tenant blast radius.
  - category: Evidence and control governance
    retrieval_policy: Use NIST 800-53, CSA CCM, and ISO/IEC 20000 for evidence sufficiency and handoff readiness.
    specialty_specific_exceptions:
    - Do not assert completion if test, rollback, access, or approval evidence cannot be mapped to the target output.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public cloud and control standards provide baseline terms and control expectations; tenant policies and source-of-truth
      mapping are required inputs.
    - Escalate when tenant policy or authority ownership materially changes service disposition.
