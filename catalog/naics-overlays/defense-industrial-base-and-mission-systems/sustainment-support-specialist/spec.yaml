  source_categories:
  - category: maintenance-state and readiness governance
    retrieval_policy: Use DoDI 5000.91, DoDI 3110.05, and tenant readiness matrices before classifying mission-capable transitions.
    specialty_specific_exceptions:
    - Do not treat public readiness semantics as sufficient authority without tenant mission dictionaries and release rules.
  - category: parts and materiel dependency governance
    retrieval_policy: Use DoDI 4140.01 and logistics policy baselines to determine whether spares or DMSMS conditions should
      defer return-to-service recommendations.
    specialty_specific_exceptions:
    - Do not close maintenance readiness while critical part or supply blockers remain unresolved.
  - category: evidence and boundary control
    retrieval_policy: Use ISO 55000-style lifecycle structure and DoD lifecycle policy to enforce evidence completeness and
      traceability requirements.
    specialty_specific_exceptions:
    - Never infer engineering or safety signoff when closure evidence is missing.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public defense directives and logistics policy baselines as the default policy skeleton.
    - Tenant maintenance handbooks, safety authorities, and release policy are mandatory before confident return-to-service
      decisions.
    - Escalate when public and tenant policy diverge or materially change required evidence.
  specialty_specific_exceptions:
  - Preventive and corrective maintenance evidence is not equivalent; both require separate completion criteria and approver
    conditions.
  - Do not imply approval authority for safety engineering, warranty release, or mission command readiness by reference to
    public guidance alone.
  - Do not infer mission-critical readiness thresholds without tenant-defined doctrine or mission-specific policy.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-10-09'
