  source_categories:
  - category: Defense acquisition and program-control governance
    retrieval_policy: Use DoDI 5000.02 and DFARS workflow references first for authority sequencing, approval boundaries,
      and control ownership.
    specialty_specific_exceptions:
    - Route all final approval or policy-change questions to contract, legal, program management, and safety owners.
  - category: Evidence and control handling
    retrieval_policy: Use DFARS 252.204-7012 and NIST controls before recommending evidence movement, incident escalation,
      or control release.
    specialty_specific_exceptions:
    - Escalate when protective-control scope is unclear or inconsistent with tenant metadata.
  - category: Safety and incident escalation posture
    retrieval_policy: Use NIST incident and defense safety references for severity and escalation boundaries.
    specialty_specific_exceptions:
    - Do not close incidents when authoritative severity or recurrence evidence is missing.
  - category: Industry terminology and artifact normalization
    retrieval_policy: Use NAICS sector guidance and tenant defense controls dictionaries when mapping mission-readiness and
      controls language.
    specialty_specific_exceptions:
    - Do not normalize mission-readiness without tenant-validated terminology dictionaries.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public defense and control sources define the baseline. Tenant-specific program plans and authority matrices are required
      before confident recommendation.
    - Escalate immediately when source precedence conflicts with tenant policy.
    - Do not claim external authority for legal, policy override, or engineering signoff.
  specialty_specific_exceptions:
  - Mission readiness terms, operational hold definitions, and release authority are defense-operational controls that materially
    alter generic workflow outputs.
  - Repeat incidents and recurring defects are treated as control-boundary escalations, not silent recoveries.
