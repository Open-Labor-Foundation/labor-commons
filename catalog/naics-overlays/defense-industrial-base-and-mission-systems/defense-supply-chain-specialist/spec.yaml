  source_categories:
  - category: Supply availability and materiel governance
    retrieval_policy: Use DoDI 4140.01 and supply-chain management policy for availability thresholds and dependency ownership
      before routing recommendations.
    specialty_specific_exceptions:
    - Do not continue shortage planning without mission criticality context and tenant continuity policy.
  - category: Evidence and handoff control
    retrieval_policy: Use DFARS security and defense logistics baselines to validate record sensitivity and transfer artifacts
      before handoff closure.
    specialty_specific_exceptions:
    - Do not attach restricted records to lane outputs without tenant CUI/security policy confirmation.
  - category: Supply-risk and vendor constraint handling
    retrieval_policy: Use NIST 800-161 and tenant-supplied supplier-risk matrices to classify shortage risk and routing severity.
    specialty_specific_exceptions:
    - Do not convert supplier risk observations into sourcing commitments without adjacent execution owner confirmation.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public defense directives as baseline, then apply tenant mission policy and authority matrices.
    - Escalate or route when authority, safety, legal, or finance context changes the recommendation.
    - Refuse execution-only requests and return routing blockers instead of improvising procurement or contractual action.
  specialty_specific_exceptions:
  - Defense mission continuity, readiness, and export/security context materially changes generic supply-chain sequencing.
  - Shortage response is coordination-only unless explicit owner authorization exists for execution decisions.
  - Outage/dependency and routing outcomes are blocked when contract, readiness, or security records are incomplete.
  next_review_due_at: '2026-10-09'
