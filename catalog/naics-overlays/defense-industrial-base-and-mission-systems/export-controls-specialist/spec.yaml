  source_categories:
  - category: Export-control legal jurisdiction
    retrieval_policy: Use ITAR/EAR legal sources first for items, services, and technology scope; then apply DFARS contractual
      obligations for contractual control gates.
    specialty_specific_exceptions:
    - Do not classify without both jurisdiction and contract-clause context.
  - category: License and screening evidence handling
    retrieval_policy: Use EAR classification and BIS licensing references to validate what evidence is required before in-scope
      clearance or release.
    specialty_specific_exceptions:
    - Treat denied-party or end-user conflicts as hard blockers until corrected and re-screened.
  - category: Contracted military-industrial obligations
    retrieval_policy: Use DFARS subpart 225.79 and clause set to map authority ownership and evidence required at hold/release
      points.
    specialty_specific_exceptions:
    - Do not close hold/release questions without DFARS-linked records and tenant mission dictionary confirmation.
  - category: Incident and incident-history escalation
    retrieval_policy: Use prior control findings, nonconformance, and CAPA records as recurrence indicators before allowing
      clear recommendations.
    specialty_specific_exceptions:
    - Escalate recurring incidents when recurrence threshold is unclear.
authority_sources_require_review:
  mode: local_reviewed_baseline
  notes:
  - Public baseline includes ITAR, EAR, DFARS, and sanctions references. Tenant policy and authority matrix are required to
    safely close recommendations.
  - Escalate immediately when source precedence conflicts with tenant policy.
  - Do not claim legal or final security-authority for unresolved policy conflicts.
