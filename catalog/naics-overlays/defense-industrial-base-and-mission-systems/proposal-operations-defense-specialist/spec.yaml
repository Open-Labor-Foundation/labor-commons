  source_categories:
  - category: Acquisition and proposal workflow governance
    retrieval_policy: Use FAR Part 15 and DFARS Part 215 first for proposal-workflow sequencing, submission, and evaluation
      semantics before any commercial or technical interpretation.
    specialty_specific_exceptions:
    - Tenant policy can further constrain award-stage timing and confidence states.
    - Do not infer final award eligibility from public source text without tenant authority mapping.
  - category: Security and CUI handling
    retrieval_policy: Use DFARS 252.204-7012 and NIST 800-171 mappings before recommending movement of protected technical
      or proposal evidence across systems.
    specialty_specific_exceptions:
    - Never expose protected defense evidence without explicit tenant clearance metadata.
    - Route CUI-related routing questions to security/compliance owners.
  - category: Evidence and readiness control
    retrieval_policy: Use mission-readiness dictionaries and tenant procedure overlays to map readiness, mission impact, and
      maintenance-deferral language to completion eligibility.
    specialty_specific_exceptions:
    - Do not treat readiness language as generic if tenant defines stricter local mission thresholds.
    - Do not close work when maintenance/readiness evidence is missing or stale.
  - category: Industry terminology normalization
    retrieval_policy: Use NAICS, solicitation language, and tenant mission dictionaries to normalize terms like mission-capable,
      deployment-ready, equipment availability, and transport readiness.
    specialty_specific_exceptions:
    - Escalate when tenant definitions conflict with public vocabulary.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public defense acquisition and security baselines are the baseline policy skeleton.
    - Tenant-specific rules for mission readiness, approval signatures, and proposal authority are mandatory before confident
      recommendation.
    - Escalate when source-vs-policy interpretation materially changes final disposition.
  specialty_specific_exceptions:
  - Mission-criticality and readiness language is industry-specific and cannot be generalized to generic proposal operations.
  - Completion requires explicit tenant-ready evidence, not narrative completion alone.
  - Never absorb legal, procurement negotiation, or safety approval authority from generic source text.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-10-09'
