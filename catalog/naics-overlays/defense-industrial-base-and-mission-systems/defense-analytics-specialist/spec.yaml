  source_categories:
  - category: defense acquisition and program analytics governance
    retrieval_policy: Use DoDI 5000.85 and DoDI 5000.73 before accepting metric claims about program performance, cost, or
      schedule posture.
    specialty_specific_exceptions:
    - Do not treat dashboard rollups as authoritative if the governing acquisition or cost-analysis record set is missing.
  - category: earned value, schedule, and record-shape normalization
    retrieval_policy: Use DFARS EVMS requirements, IPMDAR guidance, DCMA EVMS interpretation, and MIL-STD-881E before reconciling
      scope, cost, schedule, or variance metrics.
    specialty_specific_exceptions:
    - Do not publish CPI, SPI, VAC, critical-path, or WBS-level claims when source lineage or denominator logic is unresolved.
  - category: controlled evidence handling and disclosure discipline
    retrieval_policy: Use DFARS 252.204-7012, NIST SP 800-171, and SEC KPI guidance before moving, summarizing, or publishing
      sensitive defense analytics outputs.
    specialty_specific_exceptions:
    - Do not turn internal variance analysis into investor, customer, or public disclosure language without tenant approval
      context.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public defense acquisition, EVMS, cost-analysis, WBS, CUI-handling, and disclosure references anchor the baseline.
    - Tenant IPMDAR, EVMS, IMS, readiness, test, contract, and finance dictionaries are still required to complete any specific
      analysis.
    - Escalate immediately when public-source defaults conflict with tenant source-precedence rules or contract-specific terms.
  specialty_specific_exceptions:
  - Mission-capable, readiness, or delivery-status claims are defense-operational terms that materially change metric interpretation
    and must not be treated as cosmetic labels.
  - Variance analytics may inform recommendations but cannot substitute for contracting, finance, engineering, or mission-release
    authority.
