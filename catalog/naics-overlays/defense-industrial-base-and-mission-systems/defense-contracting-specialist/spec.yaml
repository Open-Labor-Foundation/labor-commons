  source_categories:
  - category: Contracting modification and execution workflow
    retrieval_policy: Use FAR Part 43, FAR Part 42, FAR Part 49, and DFARS Part 243 for artifact, modification, and completion
      progression checks before any closure recommendation.
    specialty_specific_exceptions:
    - Do not classify transition readiness without tenant modifier and approver context.
  - category: Acceptance and closeout evidence
    retrieval_policy: Use FAR Part 42 and DFARS 252.246-4 to validate acceptance criteria, inspection evidence, and closeout
      blockers.
    specialty_specific_exceptions:
    - Do not complete if mission-readiness or tenant-specific acceptance definitions are absent.
  - category: Security and controls handling
    retrieval_policy: Use DFARS 252.204-7012 to validate what records may be routed or summarized for execution updates and
      handoff artifacts.
    specialty_specific_exceptions:
    - Escalate when tenant security handling class is missing or contradictory.
  - category: Industry terminology and artifact normalization
    retrieval_policy: Use NAICS guidance and tenant mission dictionaries when mapping mission-capable and transport-readiness
      terms to artifact names and state transitions.
    specialty_specific_exceptions:
    - Do not collapse defense-specific terms into generic procurement language.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the workflow baseline, while tenant policies define threshold and authority deltas.
    - If public-source and tenant policy conflict materially, escalate and do not infer closure.
    - Always require source freshness checks before high-impact state transitions.
  specialty_specific_exceptions:
  - Contracting completion requires explicit mission-readiness and evidence linkage, not just narrative completion.
  - Do not assume financial, legal, or clinical/safety authority from public public procurement language.
  - Recurring blockers must produce explicit exception routing unless all evidence and owners are aligned.
  next_review_due_at: '2026-10-09'
