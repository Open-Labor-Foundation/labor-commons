  source_categories:
  - category: CMMC operations and scope
    retrieval_policy: Use CMMC model and scoping guide before mapping artifact or readiness claims in this lane.
    specialty_specific_exceptions:
    - Tenant policy can narrow scope beyond public CMMC and DFARS requirements.
    - Do not treat NAICS labels as sufficient evidence without facility-level records.
  - category: Security and evidence handling
    retrieval_policy: 'Use DFARS and NIST controls to determine whether evidence and transfer actions are safely executable. '
    specialty_specific_exceptions:
    - When CUI scope is unclear, escalate instead of completing evidence claims.
    - Do not route legal/commercial exceptions without explicit authority context.
  - category: Defense lifecycle boundaries
    retrieval_policy: Use DoDI boundaries to identify where operations authority ends and adjacent legal/safety/finance lanes
      begin.
    specialty_specific_exceptions:
    - Reject final-award, policy-overwrite, and safety-clearance claims as out-of-scope.
  - category: Mission-ready artifact normalization
    retrieval_policy: Use facility, mission, and plant terminology from tenant dictionaries plus NAICS context before recommending
      state transitions.
    specialty_specific_exceptions:
    - If tenant defines mission-essential readiness differently, record assumptions and escalate.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public CMMC, DFARS, and NIST sources provide baseline; tenant controls and procedures override for decision certainty.
    - 'Escalate all conflicts between public sources and tenant policy until ownership resolves materially affecting action. '
  specialty_specific_exceptions:
  - Plant-readiness and mission-essential terms are industry-specific and materially affect completion criteria.
  - Evidence cannot be inferred from source names or policy intent alone.
  - Do not provide final safety or legal compliance decisions.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-10-09'
