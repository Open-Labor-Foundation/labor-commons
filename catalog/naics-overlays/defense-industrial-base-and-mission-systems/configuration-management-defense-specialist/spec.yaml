  source_categories:
  - category: Defense lifecycle and planning governance
    retrieval_policy: Use DoDI 5000.02 and DoDI 5000.91 first to identify valid phase boundaries, authority transfer points,
      and planning prerequisites.
    specialty_specific_exceptions:
    - Do not generate release-authorization recommendations without explicit tenant mission-release conditions.
  - category: Evidence and control handling
    retrieval_policy: Use DFARS 252.204-7012 and NIST 800-128 for record-protection and state/authoritative evidence expectations
      before sequencing critical configuration work.
    specialty_specific_exceptions:
    - Escalate if protected-information handling cannot be satisfied.
  - category: Terminology and artifact normalization
    retrieval_policy: Use ISO 10007 and NAICS sector context to normalize configuration terminology before output mapping.
    specialty_specific_exceptions:
    - Do not map tenant terms to generic equivalents without explicit dictionary assumptions.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources provide governance and configuration discipline; tenant-specific mission priority, readiness, and approval
      context is mandatory before recommendations.
    - Conflicting public and tenant instructions escalate to orchestrator return instead of deterministic scheduling conclusions.
    - Missing evidence in CMDB, PLM, or readiness queues invalidates sequence recommendations.
  specialty_specific_exceptions:
  - Mission-ready and maintainability constraints are not equivalent to generic production capacity assumptions.
  - Do not claim authority over safety, legal, financial, contracting, or engineering release decisions.
  - Do not treat commercial backlog terminology as interchangeable with mission readiness states without explicit tenant mapping.
