  source_categories:
  - category: mission support and lifecycle governance
    retrieval_policy: Use DoDI 5000.02 and DoDI 5000.91 to enforce lifecycle boundaries before support progression.
    specialty_specific_exceptions:
    - Do not infer safety/engineering authority from defense support context alone.
  - category: availability, interface, and rollout dependency governance
    retrieval_policy: Use DoDI 4140.01 and tenant dependency maps for readiness, dependency, and staging constraints.
    specialty_specific_exceptions:
    - Do not progress change-readiness claims without tenant-tested rollback and approver evidence.
  - category: incident and control handoff
    retrieval_policy: Use NIST guidance and ISO service-management baselines for incident/state handling, evidence handoff,
      and closure criteria.
    specialty_specific_exceptions:
    - 'Do not close incidents while legal/safety/evidence gates remain unresolved. '
  - category: industry terminology and scope control
    retrieval_policy: Use NAICS context and tenant mission dictionaries to normalize terms before any domain claim.
    specialty_specific_exceptions:
    - When terms map differently by tenant, route for context confirmation rather than assumption.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public defense lifecycle and service-control sources as the baseline and tenant policies as mandatory overrides.
    - Escalate when source conflict changes required action or when tenant interpretation materially changes response posture.
  specialty_specific_exceptions:
  - Mission-system readiness, access, and rollback requirements are not equivalent to generic support workflows.
  - Do not close service cases without explicit change-readiness and interface-dependency evidence.
  - 'Do not grant security or legal exceptions outside tenant authority evidence. '
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-10-09'
