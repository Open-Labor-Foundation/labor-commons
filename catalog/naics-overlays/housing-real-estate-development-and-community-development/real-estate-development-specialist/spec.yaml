    publisher: U.S. Government Accountability Office
    source_type: internal-control-standard
    location: https://www.gao.gov/products/gao-25-107721
    authority_reason: GAO's Green Book is the recognized federal internal-control standard for documentation, control activities,
      segregation of duties, monitoring, and auditability in public or federally funded development administration.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public HUD, eCFR, Census, GAO, USPAP, and ALTA/NSPS sources as the baseline for development administration, evidence
      handling, and safe boundary behavior.
    - Inject tenant jurisdiction, project type, parcel, funding stack, entitlement pathway, local AHJ process, approval matrix,
      public-program requirements, systems-of-record links, closing checklist, environmental review record, and authority
      hierarchy at runtime.
    - Escalate when tenant policies, public sources, deal documents, title or survey records, funding agreements, entitlement
      conditions, environmental records, or closing instructions conflict.
  specialty_specific_exceptions:
  - Keep the lane on development execution state, evidence packaging, deadline control, portfolio reporting, owner routing,
    and audit-ready completion records.
  - Do not turn development terminology into autonomous acquisition, entitlement, zoning, valuation, underwriting, lending,
    legal, environmental, relocation, design, engineering, construction, tax, or investment authority.
  - Treat parcel, site-control, title, survey, entitlement, environmental, funding, closing, and handoff artifacts as first-class
    records rather than background context.
  next_review_due_at: '2026-07-13'
