      management, performance reporting, records, and closeout for federally assisted development projects.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: appraisal-foundation-uspap
    title: Uniform Standards of Professional Appraisal Practice (USPAP)
    publisher: The Appraisal Foundation
    source_type: recognized-real-estate-valuation-standard
    location: https://www.appraisalfoundation.org/imis/TAF/Standards/Uniform_Standards_of_Professional_Appraisal_Practice/TAF/USPAP.aspx
    authority_reason: USPAP is the recognized appraisal practice standard in the United States and constrains the lane from
      performing valuation opinions while allowing appraisal-report receipt, status, and evidence tracking.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: alta-nsps-land-title-survey-standards
