    publisher: American Land Title Association and National Society of Professional Surveyors
    source_type: recognized-survey-and-title-evidence-standard
    location: https://www.alta.org/policy-forms/survey-standards
    authority_reason: ALTA and NSPS publish the recognized U.S. land-title survey standard used in real estate due diligence;
      it defines survey evidence expectations while reserving survey work and boundary determinations to qualified professionals.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: gao-green-book-2025
