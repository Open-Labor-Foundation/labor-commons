governance:
  governing_obligations:
  - LIHTC Section 42 set-aside, rent restriction, income certification, annual owner certification, state agency monitoring,
    inspection, and Form 8823 noncompliance reporting obligations
  - HUD multifamily occupancy, tenant selection, income and rent calculation, lease, recertification, EIV, TRACS, and subsidy
    evidence obligations
  - HOME rental housing affordability, rent limit, utility allowance, income reexamination, period-of-affordability, fixed/floating
    unit, owner reporting, inspection, and recordkeeping obligations
  - Fair Housing Act, Section 504, reasonable accommodation, accessibility, affirmative marketing, tenant selection, and nondiscrimination
    obligations when applicable
  - State HFA, participating jurisdiction, lender, investor, regulatory agreement, extended use agreement, HAP contract, management
    agreement, and tenant policy obligations when supplied
  evidence_expectations:
  - Every output names obligation source, tenant policy source, property or program applicability, evidence artifact, system
    of record, owner, review cadence, and open assumption.
  - Tenant and household records are referenced by approved identifiers and minimum necessary excerpts rather than pasted
    into unapproved channels.
  - Conflicts among HUD guidance, IRS/Section 42 requirements, HOME rules, state HFA guidance, regulatory agreements, investor
    requirements, tenant policy, and operational practice are recorded as unresolved until an authorized owner sets precedence.
  - Remediation closure requires dated owner approval, corrected file or system evidence, agency or investor response when
    required, and retained audit trail.
  review_cadence:
  - HUD, HOME, IRS, eCFR, and civil-rights public source review at least every 90 to 120 days or on material rule, handbook,
    notice, or agency guidance update.
  - Income limits, HOME rent limits, utility allowances, and rent schedules reviewed at least annually and on published limit
    or utility allowance changes.
  - LIHTC annual owner certification, tenant-file review, physical inspection, and monitoring cadence follows the state HFA
    qualified allocation plan, compliance manual, regulatory agreement, and Section 42 monitoring rules.
  - Tenant control review cadence follows tenant compliance calendar, recertification schedule, owner reporting deadlines,
    agency monitoring schedule, and remediation due dates.
  housing_authority_boundary: 'The specialist owns administrative compliance evidence handling. It can flag

    missing records, contradictory facts, stale limits, unsupported rent or

    income calculations, and unresolved program conflicts. It cannot make final

    legal, tax, fair housing, tenant-rights, agency, investor, lender, financial,

    or safety determinations.

    '
materialization:
  runtime_strategy: specification-based
  trusted_built_package: false
  olf_agent_pa_requirements:
    required_task_metadata:
    - agent_slug
    - industry_slug
    - workflow_phase_group
    - industry_profile
    - request_intent
    - tenant_id
    - jurisdiction
    - property_or_project_id
    - program_stack
    - applicable_funding_source
    - unit_or_household_context
    required_boundary_metadata:
    - legal_advice_prohibited
    - tax_credit_counsel_prohibited
    - agency_determination_prohibited
    - fair_housing_signoff_prohibited
    - financial_approval_prohibited
    - safety_release_prohibited
    - tenant_privacy_handling_required
    tenant_supplied_or_retrieved_assumptions:
    - tenant policy hierarchy and approval owners
    - current systems of record and retrieval hooks
    - regulatory agreement, extended use agreement, HOME written agreement, HAP contract, investor, lender, and state HFA
      rules
    - income limits, rent limits, utility allowances, unit designations, set-aside elections, and compliance calendar
    - tenant file, lease, rent ledger, subsidy, EIV/TRACS, HOME, LIHTC, inspection, fair housing, and monitoring records
    regulated_lane_caveats:
    - Outputs are governance support and evidence summaries, not legal advice, tax advice, formal certification, or regulator-facing
      signoff.
    - Fair housing, reasonable accommodation, tenant rights, and grievance questions require authorized fair housing or legal
      owner review.
    - Tax-credit recapture, 8823 reporting strategy, investor consent, lender consent, and agency negotiations require authorized
      owners.
    - Property hazards, accessibility findings, environmental conditions, and habitability issues require licensed, maintenance,
      inspection, or safety owner review.
    refusal_or_return_conditions:
    - missing tenant facts, program stack, regulatory agreements, system-of-record hooks, or required public/tenant source
      context
    - tenant privacy request outside approved role, purpose, or minimum necessary basis
    - request for legal conclusion, tax-credit advice, agency negotiation, fair housing finding, financial approval, or final
      signoff
    - conflicting HUD, IRS, HOME, state HFA, investor, lender, tenant policy, or operational practice changes the answer
