knowledge_baseline:
  source_baseline_version: '2026-04-08'
  research_contract_version: '2026-04-08'
  source_classes:
  - class: Named-industry operating guidance
    rationale: HUD occupancy, HOME, TRACS/EIV, and fair housing operating guidance defines the public baseline for affordable
      housing leasing, tenant-file, income, rent, recertification, subsidy, and civil-rights workflows.
  - class: Recognized workflow references tied directly to the lane
    rationale: IRS Form 8823 and Section 42 compliance monitoring references identify LIHTC monitoring workflows, issue categories,
      evidence expectations, and noncompliance handling that directly govern affordable housing compliance operations.
  - class: Evidence or control standards relevant to the lane
    rationale: HOME recordkeeping, Section 42 compliance monitoring, HUD systems, and fair housing accommodation references
      define evidence retention, source-of-truth, review cadence, and escalation behavior.
  source_selection_approach: 'Use primary federal sources first: HUD for subsidized multifamily and HOME

    occupancy, rent, income, EIV/TRACS, and fair housing baseline; eCFR for

    current HOME and Section 42 regulatory requirements; IRS for LIHTC

    monitoring and Form 8823 noncompliance categories. Tenant policy, state HFA

    compliance manuals, regulatory agreements, HOME written agreements, investor

    requirements, lender covenants, local law, and current systems of record

    narrow the public baseline at runtime.

    '
