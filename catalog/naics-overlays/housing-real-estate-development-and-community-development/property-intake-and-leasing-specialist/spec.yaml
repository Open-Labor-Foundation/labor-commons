    location: https://www.hud.gov/program_offices/administration/hudclips/handbooks/hsgh/4350.3
    authority_reason: HUD's multifamily occupancy handbook directly governs subsidized multifamily application processing,
      tenant selection plans, eligibility evidence, income verification, certifications, leasing, and occupancy files.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ecfr-24-cfr-5
