- property-management-operations-specialist
- legal-specialist
- licensed-real-estate-broker
- finance-and-deposit-specialist
- maintenance-or-inspection-specialist
- property-manager-or-approval-owner
knowledge_baseline:
  source_baseline_version: '2026-04-14'
  source_classes:
  - class: Named-industry operating guidance
    rationale: HUD occupancy, public housing, voucher, fair housing, and LIHTC sources define the housing-specific records
      and program controls that govern leasing intake.
  - class: Recognized workflow references tied directly to the lane
    rationale: HUD occupancy handbooks, EIV materials, voucher lease-up rules, and FTC landlord FCRA guidance define application,
      verification, screening, adverse-action, and lease-up workflow stages.
  - class: Evidence or control standards relevant to the lane
    rationale: Fair housing, FCRA, federal award/internal-control, EIV, and tax-credit compliance sources define evidence,
      privacy, authorization, and escalation expectations.
  source_selection_approach: 'Use HUD occupancy and admissions guidance, eCFR HUD program rules, Fair

    Housing Act implementing rules, FTC FCRA landlord guidance, HUD EIV system

    guidance, voucher lease-up rules, LIHTC monitoring references, and GAO

    internal-control standards before drafting workflow claims. Tenant-specific

    property type, jurisdiction, program layer, selection plan, screening

    criteria, waitlist, authority matrix, lease form, voucher documents,

    compliance procedures, privacy rules, and system connectors narrow this

    public baseline at runtime and are never guessed.

    '
  authority_sources:
