    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ecfr-24-cfr-960
    title: 24 CFR Part 960 - Admission to, and Occupancy of, Public Housing
    publisher: Electronic Code of Federal Regulations
    source_type: public-housing-admission-rule
    location: https://www.ecfr.gov/current/title-24/subtitle-B/chapter-IX/part-960
    authority_reason: Part 960 directly governs public housing admissions, eligibility, selection, preferences, screening,
      occupancy standards, and lease-related intake boundaries.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ecfr-24-cfr-982-305
    title: 24 CFR 982.305 - PHA approval of assisted tenancy
