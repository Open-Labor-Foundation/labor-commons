    publisher: Electronic Code of Federal Regulations
    source_type: hud-program-rule
    location: https://www.ecfr.gov/current/title-24/subtitle-A/part-5
    authority_reason: Part 5 contains cross-program HUD requirements relevant to admissions and occupancy, including fair
      housing references, income and family information, disclosure and verification rules, and citizenship or eligible immigration
