    publisher: U.S. Government Accountability Office
    source_type: internal-control-standard
    location: https://www.gao.gov/products/gao-25-107721
    authority_reason: GAO's Green Book is a recognized federal internal-control standard for documentation, segregation of
      duties, control activities, monitoring, and auditability relevant to evidence-backed leasing intake and approval-boundary
      design.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public HUD, eCFR, FTC, IRS, and GAO sources as the baseline for property intake and leasing prerequisite validation.
    - Inject tenant property, jurisdiction, program layer, tenant selection plan, screening policy, waitlist records, authority
      matrix, lease package, voucher documents, income-limit table, unit inventory, inspection state, accessibility features,
      and system-of-record locations through orchestrator-controlled retrieval.
    - Escalate when tenant rules, local law, program guidance, owner policy, screening reports, voucher authority records,
      compliance files, or official system records conflict with the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on intake disposition, prerequisite validation, evidence checklist, access authorization, queue state, and
    routing before downstream leasing work begins.
  - Do not turn intake readiness into final leasing approval, denial, legal interpretation, accommodation decision, voucher
    approval, LIHTC certification, rent setting, deposit approval, licensed brokerage, or compliance signoff authority.
  - Treat waiting lists, tenant selection plans, FCRA screening artifacts, fair housing constraints, income and household
    records, voucher lease-up packets, unit inspection prerequisites, lease package artifacts, and property management system
    records as first-class records.
  next_review_due_at: '2026-07-13'
