  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public HUD, eCFR, IRS, and GAO sources as the baseline for housing operations execution administration.
    - Inject tenant jurisdiction, program type, administrative plan, ACOP, tenant selection plan, lease, regulatory agreement,
      state housing agency LIHTC rules, property policy, household file, system-of-record links, local notices, authority
      matrix, inspection rules, and finance controls through orchestrator-controlled retrieval.
    - Escalate when tenant rules, local law, funding agreements, owner policies, HUD field guidance, state housing agency
      requirements, or system records narrow or conflict with the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on execution state, evidence packaging, status, deadline control, owner routing, and audit-ready completion
    records.
  - Do not turn housing operations terminology into eligibility, legal, subsidy, fair housing, VAWA, inspection, safety, rent,
    finance, fraud, or executive signoff authority.
  - Treat waitlists, household files, certifications, EIV, Form 50058, Form 50059, RFTA, HAP, inspections, leases, resident
    notices, reasonable-accommodation, VAWA, work-order, and case-management artifacts as first-class records.
  next_review_due_at: '2026-07-13'
