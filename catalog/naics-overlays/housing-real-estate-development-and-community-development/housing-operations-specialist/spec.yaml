knowledge_baseline:
  source_baseline_version: '2026-04-14'
  source_classes:
  - class: Named-industry operating guidance
    rationale: HUD occupancy handbooks, HCV guidebook chapters, HUD reporting forms, HUD EIV guidance, and IRS LIHTC operating
      references define the public housing, assisted housing, voucher, and affordable housing records that govern this lane.
  - class: Recognized workflow references tied directly to the lane
    rationale: HUD HCV guidebook, HUD Form 50058, HUD-50059, EIV, TRACS, IMS/PIC, NSPIRE, and lease or grievance rules define
      the workflow stages, system records, reporting artifacts, and exception handling used by housing operators.
  - class: Evidence or control standards relevant to the lane
    rationale: HUD program regulations, fair housing guidance, VAWA protections, NSPIRE physical-condition rules, GAO internal-control
      standards, and LIHTC compliance references define what evidence must exist before housing operations state or completion
      claims are supportable.
  source_selection_approach: 'Use HUD and eCFR sources before drafting workflow claims for admissions,

    occupancy, reexaminations, household verification, EIV, lease and grievance

    handling, HCV leasing, HAP and RFTA routing, resident protections, physical

    inspections, and assisted-housing reporting. Treat tenant administrative

    plans, admissions and continued occupancy policies, tenant selection plans,

    regulatory agreements, owner policies, state housing agency LIHTC rules,

    local law, system records, and authority matrices as runtime retrieval

    dependencies that narrow the public baseline and are never guessed.

    '
