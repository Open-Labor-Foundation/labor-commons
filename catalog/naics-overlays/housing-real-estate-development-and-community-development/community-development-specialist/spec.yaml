  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public HUD, eCFR, and GAO sources as the baseline for community development execution administration.
    - Inject tenant jurisdiction, program year, action plan, funding source, authority matrix, environmental review record,
      IDIS activity, beneficiary evidence, subrecipient agreement, procurement file, finance controls, Section 3 records,
      CAPER calendar, monitoring history, and closeout criteria through orchestrator-controlled retrieval.
    - Escalate when tenant rules, grant agreements, HUD monitoring instructions, or jurisdiction-specific requirements narrow
      or conflict with the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on execution state, evidence packaging, reporting support, deadline control, owner routing, and audit-ready
    completion records.
  - Do not turn community-development terminology into policy, legal, environmental, relocation, procurement, draw, or compliance
    signoff authority.
  - Treat IDIS, consolidated plan/action plan references, beneficiary evidence, environmental review, Section 3, URA, procurement,
    finance, monitoring, and CAPER artifacts as first-class records.
  next_review_due_at: '2026-07-13'
