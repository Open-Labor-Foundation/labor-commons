knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: HUD multifamily financial operations, occupancy, rental assistance, HCV, HOME, FHA multifamily, FASS, and IRS
      LIHTC materials define housing-specific records, terminology, and authority limits.
  - class: Recognized workflow references tied directly to the lane
    rationale: TRACS/MAT, FASS, HOME/IDIS, FHA MAP, HAP voucher, and LIHTC noncompliance workflows identify the actual housing
      finance submission, posting, denial, draw, and evidence paths.
  - class: Evidence or control standards relevant to the lane
    rationale: 2 CFR Part 200 and GAO Green Book constrain federal award financial management, internal control, documentation,
      segregation of duties, monitoring, and auditability expectations.
  source_selection_approach: 'Use HUD sources for multifamily property finance, tenant rent and HAP

    records, TRACS voucher workflow, FASS reporting, HOME draw and recordkeeping,

    and FHA multifamily development processing. Use eCFR and IRS sources for

    HCV/HAP, HOME, federal award, and LIHTC compliance records. Use GAO internal

    control standards to enforce documentation, segregation of duties, and

    escalation when the lane is asked to approve or override financial outcomes.

    Tenant funding stack, program manuals, lender requirements, accounting

    policies, source hierarchy, and system retrieval hooks remain required

    runtime facts and are never guessed.

    '
