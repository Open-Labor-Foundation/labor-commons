knowledge_baseline:
  source_baseline_version: '2026-04-14'
  research_contract_version: '2026-04-08'
  source_classes:
  - class: Named-industry operating guidance
    rationale: HUD multifamily occupancy, resident rights, and management-agent guidance defines resident communication, resident
      involvement, tenant-file, lease, complaint, and management relationship terminology for HUD-assisted housing operations.
  - class: Recognized workflow references tied directly to the lane
    rationale: Public housing grievance rules, tenant participation rules, HUD management-agent guidance, and service coordination
      references define resident-facing workflow stages, handoff points, and escalation behavior.
  - class: Evidence or control standards relevant to the lane
    rationale: Fair housing, VAWA, Privacy Act/EIV, NSPIRE inspection, and resident records rules define evidence handling,
      confidentiality, refusal triggers, and authority boundaries.
  source_selection_approach: 'Use HUD and eCFR sources first for federally assisted housing, public

    housing, tenant participation, fair housing, VAWA, privacy, and physical

    inspection constraints. Use HUD management-agent and resident rights

    materials to anchor resident relations workflow and terminology. Use tenant

    policies, leases, house rules, program agreements, local law, property

    systems, and owner or PHA authority matrices only through controlled

    retrieval at runtime; do not infer jurisdictional landlord-tenant or

    program-specific outcomes from public baseline sources alone.

    '
