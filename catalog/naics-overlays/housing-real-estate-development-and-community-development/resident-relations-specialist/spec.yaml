  source_categories:
  - category: Resident relations and management-agent baseline
    retrieval_policy: Use HUD 4350.3, HUD 4381.5, and HUD resident rights materials before drafting answers about resident
      communication, resident involvement, lease-aware process, or problem resolution in HUD-assisted properties.
    specialty_specific_exceptions:
    - Do not apply HUD-assisted requirements to purely market-rate housing without tenant-supplied policy or jurisdictional
      support.
  - category: Grievance, tenant participation, and resident association baseline
    retrieval_policy: Use 24 CFR Part 966 and 24 CFR Part 245 when a resident contact involves public housing grievance posture,
      tenant organization activity, meeting notices, or management response obligations.
    specialty_specific_exceptions:
    - Do not decide grievance outcomes, appeal rights, or retaliation claims.
  - category: Civil-rights, VAWA, privacy, and safety baseline
    retrieval_policy: Use HUD fair housing, VAWA, Privacy Act/EIV, and NSPIRE sources when cases involve protected-class indicators,
      disability or accommodation facts, domestic violence or stalking facts, resident identity or income data, health and
      safety issues, or inspection claims.
    specialty_specific_exceptions:
    - Do not approve accommodations, decide VAWA eligibility, disclose sensitive facts, or clear safety conditions.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the authority sources above as the public baseline for resident relations in housing and community development.
    - Inject tenant policy, lease terms, property context, local law, resident identity, system records, communication preferences,
      and approval limits only through orchestrator-controlled retrieval.
    - Escalate when program, jurisdiction, lease, tenant policy, resident file, or system record materially changes the answer.
  specialty_specific_exceptions:
  - Resident relations may explain documented status and process but may not decide rights, eligibility, safety, fair housing,
    VAWA, grievance, rent, or legal outcomes.
  - Resident-sensitive facts must be minimized, redacted, and routed through approved systems.
  - Repeat failures and safety-sensitive resident impacts must be escalated rather than handled as routine communications.
  next_review_due_at: '2026-07-13'
governance:
  governed_records:
  - resident profile, household, lease, occupancy, house-rule, tenant selection, notice, communication preference, and consent
    records
  - work-order, maintenance, emergency maintenance, inspection, safety, habitability, vendor, and completion evidence
  - resident complaint, CRM case, grievance, appeal, resident association, meeting, and tenant participation records
  - reasonable accommodation, fair housing, VAWA, language access, privacy, and resident service referral records
  caveats:
  - Local landlord-tenant law, lease terms, program rules, and tenant policy can materially change resident relations handling
    and must be retrieved before final resident-facing commitments.
  - Privacy-sensitive records must use minimum necessary identifiers, approved retrieval hooks, and authorized systems.
  - Safety, habitability, accessibility, accommodation, VAWA, grievance, eviction, rent, and legal determinations stay outside
    this lane.
materialization:
  required_task_metadata:
  - request_type
  - resident_identifier
  - property_id
  - unit_id
  - program_context
  - source_record_links
  - privacy_sensitivity
  - safety_indicator
  - authority_boundary
  - next_owner
  required_runtime_retrieval:
  - property management resident profile and lease records
  - CRM or resident portal case history
  - work-order and inspection records
  - tenant policy and authority matrix
  - complaint, grievance, accommodation, VAWA, fair housing, and resident service referral records when relevant
  regulated_lane_caveats:
  - specification-based runtime; no retained implementation is claimed
  - legal, fair housing, VAWA, accommodation, grievance, rent, subsidy, safety, inspection, and policy override authority
    require adjacent owner review
  - resident data must remain within approved retrieval and communication channels
  promotion_path: 'Promote to a retained implementation only after repeated tenant usage

    validates retrieval hooks, privacy redaction, authority matrices, resident

    communication templates, escalation routing, and regression tests across

    market-rate, affordable, HUD-assisted, and PHA contexts.

    '
