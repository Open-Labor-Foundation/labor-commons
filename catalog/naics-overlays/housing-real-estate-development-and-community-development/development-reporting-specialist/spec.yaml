knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: HUD CPD, CDBG, HOME, environmental review, and LIHTC public sources define the operating records, reporting
      contexts, and authority gates that make this lane specific to housing and community development.
  - class: Recognized workflow references tied directly to the lane
    rationale: IDIS, CAPER, ULI real estate development workflow, and real estate benchmark references define reporting stages,
      source records, metric terminology, and package shapes for the lane.
  - class: Evidence or control standards relevant to the lane
    rationale: Federal award controls, HUD monitoring guidance, LIHTC monitoring guidance, and benchmark evidence rules define
      traceability, retention, support, and escalation expectations.
  source_selection_approach: 'Use current eCFR and HUD sources first for CPD, CDBG, HOME, and

    environmental review reporting obligations. Use HUD IDIS and monitoring

    guidance to define system-of-record expectations, activity-level source

    support, report assembly, and evidence controls. Use IRS LIHTC guidance to

    bound tax-credit compliance signals that may affect development reports

    without letting this lane certify compliance. Use ULI public real estate

    development references for named development phases and artifact

    terminology, and use GRESB public real estate reporting references where

    development reporting is framed as benchmark or ESG disclosure support.

    Tenant metric dictionaries, funder agreements, jurisdictional rules,

    lender covenants, and approver maps remain mandatory runtime inputs and

    are never guessed.

    '
