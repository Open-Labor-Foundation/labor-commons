  source_categories:
  - category: homelessness and supportive housing records
    retrieval_policy: Use HMIS, HDX, PIT, HIC, APR, ESG CAPER, and CoC SPM records before accepting homelessness-system metrics
      as analytically safe.
    specialty_specific_exceptions:
    - Do not infer client eligibility, service need, housing outcome, or privacy authority from aggregate HMIS or HDX extracts.
  - category: community development grant and performance records
    retrieval_policy: Use IDIS, DRGR, eCon Planning Suite, Consolidated Plan, Annual Action Plan, CAPER, activity, beneficiary,
      accomplishment, draw, and national objective records before reporting CDBG, HOME, ESG, HOPWA, or CDBG-DR outcomes.
    specialty_specific_exceptions:
    - Do not certify CAPER, drawdown, national objective, or funder compliance posture in-lane.
  - category: affordability, need, and market benchmark records
    retrieval_policy: Use CHAS, ACS, Census, FHFA HPI, LIHTC, local parcel, rent, occupancy, and market records with explicit
      vintage, geography, margin-of-error, and comparability caveats.
    specialty_specific_exceptions:
    - Do not treat ACS estimates, FHFA index values, or market benchmarks as causal proof or as substitutes for local eligibility
      or feasibility determinations.
  - category: mortgage lending and access records
    retrieval_policy: Use FFIEC and CFPB HMDA records and public disclosure modifications before making mortgage access or
      lending pattern summaries.
    specialty_specific_exceptions:
    - Do not provide lending compliance, discrimination, underwriting, fair-lending, or legal conclusions from HMDA analytics
      alone.
  - category: evidence, control, and disclosure records
    retrieval_policy: Use HUD CPD monitoring, tenant evidence files, data-sharing agreements, suppression rules, approval
      matrices, and SEC KPI-style metric caveats before board, public, funder, or investor-style reporting.
    specialty_specific_exceptions:
    - Do not publish or imply certainty when source quality, signoff, privacy controls, or definitions are unresolved.
tenant_required_facts:
- Tenant-specific policies, service model, data-sharing agreements, suppression thresholds, publication approvals, and operating
  constraints.
- Jurisdiction, business unit, program, product, facility, property, project, funder, geography, program year, fiscal year,
  household segment, and reporting audience.
- Current systems of record, record locations, data dictionaries, source-precedence rules, retrieval hooks, refresh cadence,
  and owner map.
- Exact operating context that makes the named housing industry materially different from generic analytics, including whether
  the request concerns homelessness services, community development grant reporting, affordable housing compliance, real estate
  development, property operations, mortgage lending, or public market benchmarking.
- Metric definitions, numerator, denominator, inclusion, exclusion, geography crosswalk, vintage, confidence thresholds, caveat
  policy, and signoff requirements.
materialization:
  olf_agent_pa_requirements:
    required_task_metadata:
    - queue slug and package path
    - runtime strategy set to specification-based
    - target delivery level set to validated
    - analytics-reporting-and-disclosure workflow phase
    - cross-industry profile plus housing-specific artifact awareness
    - adjacent specialist routing map
    required_runtime_assumptions:
    - tenant can retrieve the relevant housing program, property, finance, market, geography, and disclosure records at runtime
    - tenant supplies jurisdiction, program, geography, source precedence, suppression policy, and approval posture when those
      facts change the output
    - public sources provide a baseline but never override tenant-specific policies, funder terms, jurisdictional instructions,
      or required signoffs
    regulated_lane_caveats:
    - Housing analytics may touch HMIS privacy, fair housing, HMDA disclosure, HUD grant compliance, LIHTC compliance, tenant
      rights, financing, securities-style disclosure, and public agency reporting controls.
    - The lane must remain descriptive and evidence-backed unless an authorized human owner signs off on regulated interpretation
      or publication.
    refusal_or_return_conditions:
    - missing source hierarchy, tenant facts, jurisdiction, program, geography, retrieval hooks, or publication approval
    - conflicting HMIS, HDX, IDIS, DRGR, property, pipeline, finance, HMDA, ACS, CHAS, LIHTC, or benchmark records
    - request for eligibility, legal, fair-housing, funding, underwriting, appraisal, program-compliance, certification, or
      public disclosure authority
quality_bar:
  validation_profile: standard
  acceptance_thresholds:
    minimum_pass_rate: 0.92
    functionality_coverage_required: true
    human_verification_required: true
  market_ready_requirements:
  - Authority sources document publisher, authority rationale, refresh interval, decay policy, and review date.
  - Evaluation scenarios cover normal in-scope execution, data conflicts, incomplete records, unsupported claims, industry
    terminology, tenant adaptation, adjacent handoff, and generic-overreach refusal.
  - Runtime strategy remains specification-based until a separately approved trusted build is committed.
