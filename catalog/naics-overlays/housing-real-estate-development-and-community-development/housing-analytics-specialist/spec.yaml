knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Named-industry operating guidance
    rationale: HUD operating guidance for HMIS, HIC, PIT, IDIS, Consolidated Plan, CAPER, CDBG, HOME, ESG, and CPD monitoring
      defines the housing program records, reporting artifacts, and audit posture that govern the lane.
  - class: Recognized workflow references tied directly to the lane
    rationale: HUD CoC system performance measures, CHAS, LIHTC public data, FFIEC and CFPB HMDA, Census ACS, and FHFA HPI
      references define housing-specific metric terms, geography, vintages, denominators, and benchmark limits.
  - class: Evidence or control standards relevant to the lane
    rationale: HUD CPD monitoring guidance, HMDA disclosure rules, privacy-modified public data, and SEC KPI guidance define
      traceability, retention, low-confidence handling, and disclosure controls for analytics outputs.
  - class: Public metric-definition, reporting, disclosure, or benchmark guidance
    rationale: Public housing data definitions and disclosure guidance constrain when descriptive housing metrics can support
      reporting, board, website, investor-style, or funder-facing claims.
  source_selection_approach: 'Use HUD program sources first when analysis concerns HUD-funded or HUD-

    reported housing workflows, including HMIS, HDX, SPM, IDIS, DRGR,

    Consolidated Plan, CAPER, CHAS, and LIHTC records. Use FFIEC and CFPB HMDA

    sources for mortgage-lending access and loan-level disclosure data. Use

    Census ACS and FHFA HPI only with explicit geography, vintage, margin-of-

    error, index, and comparability caveats. Use HUD CPD monitoring and SEC KPI

    guidance when outputs approach funder, board, public, investor-style, or

    attestation-sensitive disclosure. Require tenant overlays for program

    eligibility rules, local source precedence, suppression policy, data-

    sharing agreements, geography crosswalks, action thresholds, and approval

    owners.

    '
