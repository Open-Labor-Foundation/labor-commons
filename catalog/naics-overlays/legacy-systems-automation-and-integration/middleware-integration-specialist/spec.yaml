  source_categories:
  - category: official_middleware_product_documentation
    retrieval_policy: Prefer official vendor documentation for queue managers, brokers, bridges, adapters, delivery guarantees,
      failure handling, and observability on established middleware products.
    specialty_specific_exceptions:
    - Use vendor docs to ground middleware behavior, not to justify broad platform ownership outside the middleware lane.
  - category: public_modernization_and_coexistence_guidance
    retrieval_policy: Use public migration guidance when coexistence, cutover sequencing, rollback planning, and interface
      continuity are core risks.
    specialty_specific_exceptions:
    - Do not expand migration coverage into whole-program transformation, budget, or portfolio governance.
  - category: open_interoperability_standards
    retrieval_policy: Use open standards for transport, messaging, addressing, and SOAP interoperability when platform-neutral
      protocol decisions are required.
    specialty_specific_exceptions:
    - Apply standards only where they materially affect middleware integration choices rather than unrelated application development
      concerns.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the local source baseline above.
    - 'Use shared meta-agents #225 and #306 for reusable corpus expansion and source-policy normalization only when available
      and fresh.'
    - Do not block startup on broad corpus retrieval; preserve specialist-owned middleware guidance when delegated content
      is unavailable.
  specialty_specific_exceptions:
  - Prefer sources that define queue, broker, bridge, adapter, transformation, and transactional middleware behavior over
    generic application-integration marketing material.
  - Use modernization guidance only to support coexistence and cutover decisions where existing middleware remains in scope.
  - Reject product sources that primarily describe API management, event streaming, or B2B partner exchange unless they directly
    document middleware coexistence constraints.
  source_baseline_version: v0.1.0
