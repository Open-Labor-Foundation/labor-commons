  source_categories:
  - category: official_portfolio_discovery_and_assessment_guidance
    retrieval_policy: Prefer official vendor documentation for portfolio inventory normalization, dependency discovery, grouping,
      and readiness assessment.
    specialty_specific_exceptions:
    - Do not treat consultancy blogs, analyst commentary, or community forum heuristics as authoritative for portfolio grouping
      or readiness claims.
  - category: official_migration_wave_and_factory_operating_guidance
    retrieval_policy: Use official migration wave, stage-gate, and operating-model guidance from platform vendors for repeatable
      large-scale migration coordination.
    specialty_specific_exceptions:
    - Use vendor migration patterns to define factory governance and sequencing only, not to claim ownership of platform-specific
      implementation.
  - category: official_migration_automation_and_analysis_tooling_guidance
    retrieval_policy: Use official discovery and migration-tool documentation when recommending repeatable analysis or automation
      inputs to the factory.
    specialty_specific_exceptions:
    - Treat tooling sources as guidance for intake and evidence production, not as authority to build custom automation code
      or widen into RPA or middleware engineering.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the reviewed public source baseline above.
    - 'Use shared meta-agents #225 and #306 for broader corpus expansion and source-policy normalization only after local
      baseline validation succeeds.'
    - Do not block startup on shared-corpus retrieval; preserve the reviewed local migration-factory baseline if delegated
      outputs are unavailable or stale.
  specialty_specific_exceptions:
  - Prefer sources that describe portfolio discovery, grouping, wave planning, stage gates, and migration tooling inputs over
    platform-specific implementation runbooks.
  - Escalate when the request requires product-specific migration execution details better handled by cloud, mainframe, batch,
    scheduler, middleware, API, or application-modernization specialists.
  - Treat automation guidance as bounded support for repeatable factory evidence, not permission to design custom bots, scripts,
    or deep integration logic.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-06-20'
shared_meta_agent_integration:
  bootstrap_metadata:
    issue_id: 156
    local_baseline_required: true
    deferred_initialization_supported: true
    startup_sequence:
    - Load local manifest, evaluation artifacts, and readiness evidence first.
    - Optionally invoke shared meta-agents for normalization after local baseline validation succeeds.
    - Refuse any delegated output that broadens scope beyond the migration-factory boundary.
    request_context_fields:
    - agent_slug
    - domain_family
    - release_version
    - specialty_boundary
    - target_delivery_level
    - source_categories
    - fallback_mode
  specialist_owned_responsibilities:
  - Define the narrow migration-factory boundary, adjacent-specialty routing, and explicit refusal behavior.
  - Maintain the minimum authoritative source baseline, source categories, and specialty-specific exceptions required for
    safe startup.
  - Provide migration-factory-specific scenarios, stage-gate rules, dependency and rollback controls, low-confidence behavior,
    and evidence statements.
  - Define request and response contracts plus fallback behavior for delegated shared meta-agent calls.
  delegated_responsibilities:
  - Reusable best-practice corpus retrieval and normalization
  - Repeated evaluation-suite normalization and regression-coverage patterns
  - Readiness evidence consistency review and packaging normalization
  - Deployment package boilerplate normalization
  - Commercialization and packaging boilerplate normalization
  - Authority-source policy normalization
  - Boundary-routing phrasing normalization where centrally derivable
  - Package scaffolding consistency review
  delegated_contracts:
  - issue_id: 225
    slug: best-practices-curation-specialist
    purpose: Expand reusable migration best-practice coverage without rebuilding the shared corpus locally.
    request_contract:
      required_fields:
      - agent_slug
      - source_categories
      - specialty_boundary
      - retrieval_policy.mode
      optional_fields:
      - platform_family
      - specialty_specific_exceptions
    expected_response:
      required_outputs:
      - candidate public source additions
      - normalization notes
      - staleness timestamp
      rejection_condition: Reject if sources are not public, authoritative, or boundary-consistent.
    fallback_if_unavailable: Keep the local source baseline only and state that broader corpus normalization is deferred.
  - issue_id: 302
    slug: evaluation-design-specialist
    purpose: Normalize scenario taxonomy and coverage framing across repeated specialist packages.
    request_contract:
      required_fields:
      - minimum_scenario_count
      - acceptance_thresholds
      - required_coverage_classes
      - specialty_boundary
      optional_fields:
      - existing_scenarios
    expected_response:
      required_outputs:
      - coverage review
      - gap list
      - normalization recommendations
      rejection_condition: Reject if proposed scenarios dilute migration-factory specificity or remove out-of-scope and low-confidence
        coverage.
    fallback_if_unavailable: Use the local 12-scenario matrix and record pass or fail rationale directly in repository artifacts.
  - issue_id: 303
    slug: readiness-and-evidence-specialist
    purpose: Review consistency across manifest, evaluation results, readiness evidence, and release notes.
    request_contract:
      required_fields:
      - delivery_status
      - evaluation_results_path
      - readiness_evidence_path
      - release_readiness_path
      optional_fields:
      - human_verification_notes
    expected_response:
      required_outputs:
      - consistency check result
      - missing evidence list
      - readiness normalization notes
      rejection_condition: Reject if the delegated review attempts to replace local human verification or specialist-owned
        evidence.
    fallback_if_unavailable: Rely on local readiness checklist, local evidence review, and repository validation scripts.
  - issue_id: 304
    slug: deployment-package-specialist
    purpose: Normalize deployment-package structure for runtime, isolation, rollback, and monitoring notes.
    request_contract:
      required_fields:
      - deployment_model
      - tenant_adaptation_policy
      - rollback_requirements
      - monitoring_expectations
      optional_fields:
      - shared_meta_agent_dependencies
    expected_response:
      required_outputs:
      - package structure review
      - missing deployment note list
      - normalization recommendations
      rejection_condition: Reject if deployment guidance assumes cross-tenant sharing or suppresses migration-factory escalations.
    fallback_if_unavailable: Use the local deployment package and verify readiness fields directly.
  - issue_id: 305
    slug: commercialization-and-packaging-specialist
    purpose: Normalize buyer, packaging, subscription, and proof-point framing for validated packages.
    request_contract:
      required_fields:
      - target_buyer
      - target_user
      - packaging_model
      - subscription_model
      optional_fields:
      - proof_points
      - gtm_gaps
    expected_response:
      required_outputs:
      - positioning review
      - proof-point review
      - gap summary
      rejection_condition: Reject if commercialization language overclaims execution ownership, cloud design, or custom engineering
        delivery.
    fallback_if_unavailable: Use the local marketing readiness notes and keep claims limited to repository-backed evidence.
  - issue_id: 306
    slug: authority-source-policy-specialist
    purpose: Normalize source categories, refresh intervals, and decay handling across shared baselines.
    request_contract:
      required_fields:
      - source_categories
      - refresh_intervals
      - decay_policy
      - specialty_specific_exceptions
      optional_fields:
      - current_source_list
    expected_response:
      required_outputs:
      - source policy review
      - staleness findings
      - normalization recommendations
      rejection_condition: Reject if recommended source substitutions are not public, authoritative, or appropriate for migration-factory
        work.
    fallback_if_unavailable: Use local review dates and interval rules recorded in the manifest.
  - issue_id: 307
    slug: specialty-boundary-and-routing-specialist
    purpose: Review adjacency phrasing and orchestrator handoff logic for specialty-safe routing.
    request_contract:
      required_fields:
      - specialty_boundary
      - out_of_scope_rules
      - adjacent_specialties
      - orchestrator_return_rules
      optional_fields:
      - recent_boundary_conflicts
    expected_response:
      required_outputs:
      - boundary conflict review
      - routing recommendations
      - phrasing notes
      rejection_condition: Reject if routing recommendations widen the boundary into cloud design, implementation engineering,
        or deep legacy-platform ownership.
    fallback_if_unavailable: Retain the local adjacency map and route ambiguous requests conservatively.
  - issue_id: 308
    slug: agent-package-scaffolding-specialist
    purpose: Verify repository file layout, required artifacts, and scaffold consistency.
    request_contract:
      required_fields:
      - file_layout
      - required_artifacts
      - template_compliance
      optional_fields:
      - readiness_state
    expected_response:
      required_outputs:
      - package completion checklist
      - template variance notes
      - missing artifact list
      rejection_condition: Reject if the scaffold review recommends deleting required validated artifacts.
    fallback_if_unavailable: Use repository validation scripts and local artifact review as the authoritative completion check.
  fallback:
    triggers:
    - shared meta-agent is unavailable
    - shared meta-agent result is stale
    - shared meta-agent output is low-confidence
    - shared meta-agent output conflicts with the migration-factory boundary
    required_behavior:
    - Continue using the local specialist baseline without claiming delegated normalization was completed.
    - Record the fallback event in deployment logs or release-review notes.
    - Escalate to the orchestrator if the missing delegated output blocks a safe migration-factory recommendation.
    - Prefer conservative refusal or clarification over speculative migration planning.
