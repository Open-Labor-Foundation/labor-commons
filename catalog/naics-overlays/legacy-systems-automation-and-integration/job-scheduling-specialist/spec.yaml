meta_agent_contracts:
  best_practices_curation:
    issue_reference: '#225'
    bootstrap_metadata:
      specialty: job scheduling
      domain: legacy-systems-automation-and-integration
      specialist_owned_delta: scheduler calendars, dependency semantics, recovery controls, migration sequencing, and adjacent-scope
        routing
    request_contract:
      inputs:
      - scheduler family and deployment model
      - job dependency and calendar constraints
      - recovery, SLA, and operator workflow needs
      outputs:
      - normalized workload-automation best-practice summary
      - scheduler-specific risk flags
      - staleness metadata
    fallback:
      policy: Use the local authority baseline and specialty-specific controls only; escalate if a recommendation requires
        unsupported product behavior.
      confidence_trigger: shared guidance missing, stale, contradictory, or not scheduler-specific
  evaluation_design:
    issue_reference: '#302'
    bootstrap_metadata:
      specialty: job scheduling
      required_coverage: normal guidance, legacy constraints, scheduler failure modes, migration risk, out-of-scope rejection,
        and low-confidence escalation
    request_contract:
      inputs:
      - specialty boundary
      - minimum scenario count
      - target delivery level
      outputs:
      - scenario catalog
      - coverage gaps
      - threshold normalization notes
    fallback:
      policy: Use the local scenario suite in this package and require explicit review before release changes.
      confidence_trigger: coverage gap or no response
  readiness_and_evidence:
    issue_reference: '#303'
    bootstrap_metadata:
      specialty: job scheduling
      release_target: validated
    request_contract:
      inputs:
      - evaluation results
      - source baseline state
      - deployment and commercialization notes
      outputs:
      - readiness checklist
      - evidence consistency review
      - remaining release risks
    fallback:
      policy: Use local readiness evidence and keep release notes conservative, explicit, and auditable.
      confidence_trigger: evidence inconsistency or stale delegated review
  deployment_package:
    issue_reference: '#304'
    bootstrap_metadata:
      specialty: job scheduling
      runtime_profile: orchestrator-hosted advisory specialist with no direct job execution authority
    request_contract:
      inputs:
      - tenant adaptation policy
      - monitoring and logging requirements
      - rollback expectations
      outputs:
      - deployment notes delta
      - operational readiness checklist
    fallback:
      policy: Use repository deployment template plus scheduler-specific isolation, logging, and rollback notes.
      confidence_trigger: missing deployment boilerplate or stale delegated guidance
  commercialization_and_packaging:
    issue_reference: '#305'
    bootstrap_metadata:
      specialty: job scheduling
      buyer_motion: legacy operations modernization and workload automation governance
    request_contract:
      inputs:
      - target buyer and user profile
      - proof points
      - go-to-market assumptions
      outputs:
      - packaging notes
      - subscription model guidance
      - commercialization gaps
    fallback:
      policy: Keep claims limited to the validated specialist artifact bundle and documented proof points.
      confidence_trigger: unsupported market or packaging claim
  authority_source_policy:
    issue_reference: '#306'
    bootstrap_metadata:
      specialty: job scheduling
      source_policy: record categories, retrieval policy, and scheduler-specific exceptions without reproducing the full shared
        corpus
    request_contract:
      inputs:
      - required source categories
      - specialty exceptions
      - refresh expectations
      outputs:
      - source policy normalization
      - recency review guidance
      - deprecation risk flags
    fallback:
      policy: Use real authoritative sources listed in this manifest with explicit review cadence and decay policy.
      confidence_trigger: source freshness uncertain or normalization weakens specialty-specific exceptions
  specialty_boundary_and_routing:
    issue_reference: '#307'
    bootstrap_metadata:
      specialty: job scheduling
      adjacency_risks: batch operations, scripting and task automation, file transfer and EDI, middleware integration, platform
        operations
    request_contract:
      inputs:
      - candidate task
      - neighbor specialties
      - confidence level
      outputs:
      - route decision
      - boundary rationale
      - rejection phrasing
    fallback:
      policy: Prefer rejection and orchestrator handoff when ownership is ambiguous.
      confidence_trigger: cross-specialty ambiguity
  agent_package_scaffolding:
    issue_reference: '#308'
    bootstrap_metadata:
      specialty: job scheduling
