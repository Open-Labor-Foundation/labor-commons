  source_categories:
  - category: official_rpa_platform_documentation
    retrieval_policy: Prefer vendor-authored UiPath, Microsoft Power Automate, Automation Anywhere, and Blue Prism runtime,
      selector, queue, and credential guidance before using generalized commentary.
    specialty_specific_exceptions:
    - Do not widen the baseline into broad low-code workflow engineering or unrelated platform administration.
  - category: official_vendor_troubleshooting_guidance
    retrieval_policy: Use vendor troubleshooting pages when diagnosing common UI automation failures, runtime instability,
      or selector drift.
    specialty_specific_exceptions:
    - Troubleshooting guidance should not be treated as authorization for live production execution or tenant administration.
  - category: official_legacy_app_surface_guidance
    retrieval_policy: Use first-party legacy application guidance when a target surface such as SAP GUI introduces specific
      scripting, security, or supportability constraints.
    specialty_specific_exceptions:
    - Keep recommendations scoped to automation interaction with the legacy surface, not full application ownership or functional
      redesign.
  - category: shared_meta_agent_curated_expansion
    retrieval_policy: Allow shared meta-agents to expand and normalize the corpus after startup, but never block initialization
      on that delegated work.
    specialty_specific_exceptions:
    - Delegated corpus expansion may refine common packaging but must not override the narrow RPA boundary or specialist-owned
      refusal rules.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    startup_requirement: Load the specialist-owned source baseline first and preserve conservative RPA behavior if delegated
      normalization is absent.
    specialty_specific_exceptions:
    - Prefer UI automation and orchestration sources over general digital-transformation messaging.
    - Escalate when a vendor recommends API-first integration or app redesign instead of forcing an RPA answer.
    - Treat brittle screen scraping against unstable interfaces as a risk signal, not a default success path.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-09-18'
shared_meta_agent_integration:
  bootstrap:
    initialize_with_deferred_meta_agents: true
    stale_meta_agent_tolerance: soft-stop
    stale_threshold_days: 90
    fallback_mode: specialist-owned-minimum-baseline
  delegated_agents:
  - issue_id: 225
    slug: best-practices-curation-specialist
    request_contract:
      required_inputs:
      - domain_family
      - candidate_authority_sources
      - specialty_specific_exceptions
      expected_outputs:
      - curated_best_practice_deltas
      - review_priority
      - confidence_statement
    fallback_if_unavailable: Use only the reviewed local authority baseline and record deferred corpus expansion.
  - issue_id: 302
    slug: evaluation-design-specialist
    request_contract:
      required_inputs:
      - specialty_boundary
      - risk_categories
      - minimum_thresholds
      expected_outputs:
      - normalized_scenario_matrix
      - coverage_gap_notes
    fallback_if_unavailable: Use the local RPA scenario suite and keep thresholds conservative.
  - issue_id: 303
    slug: readiness-and-evidence-specialist
    request_contract:
      required_inputs:
      - readiness_state
      - evidence_artifacts
      - delivery_claim
      expected_outputs:
      - consistency_review
      - evidence_gap_flags
    fallback_if_unavailable: Preserve specialist-owned readiness evidence and require human review before release.
  - issue_id: 304
    slug: deployment-package-specialist
    request_contract:
      required_inputs:
      - runtime_model
      - tenant_isolation_constraints
      - rollback_requirements
      expected_outputs:
      - deployment_normalization_notes
      - operations_checklist
    fallback_if_unavailable: Keep the local deployment package and do not claim broader operational coverage.
  - issue_id: 305
    slug: commercialization-and-packaging-specialist
    request_contract:
      required_inputs:
      - target_buyer_profile
      - subscription_model
      - proof_points
      expected_outputs:
      - packaging_review
      - gtm_gap_notes
    fallback_if_unavailable: Use the specialist-owned marketing readiness note without expanding commercialization claims.
  - issue_id: 306
    slug: authority-source-policy-specialist
    request_contract:
      required_inputs:
      - publisher_set
      - refresh_horizon
      - decay_policy
      expected_outputs:
      - source_policy_alignment
      - refresh_recommendations
    fallback_if_unavailable: Retain current review intervals and add explicit refresh reminders.
  - issue_id: 307
    slug: specialty-boundary-and-routing-specialist
    request_contract:
      required_inputs:
      - adjacent_specialties
      - candidate_out_of_scope_requests
      expected_outputs:
      - boundary_review
      - routing_templates
    fallback_if_unavailable: Apply the local conservative refusal rules and return ambiguous requests to the orchestrator.
  - issue_id: 308
    slug: agent-package-scaffolding-specialist
    request_contract:
      required_inputs:
      - package_path
      - artifact_inventory
      - template_version
      expected_outputs:
      - scaffold_consistency_check
      - missing_artifact_flags
    fallback_if_unavailable: Validate the package locally with repository scripts and human review.
  fallback_behavior:
    triggers:
    - shared meta-agent is unavailable
    - shared meta-agent result is stale
    - shared meta-agent output is low-confidence
    - shared meta-agent output conflicts with the RPA specialty boundary
    actions:
    - Proceed with the specialist-owned baseline only.
    - Record deferred delegated work in readiness evidence or release notes.
    - Avoid claims that depend on unreviewed delegated normalization.
    - Return unresolved ambiguity to the orchestrator.
