  - official cloud and platform modernization planning guidance
  - official migration assessment and inventory tooling documentation
  - official middleware and coexistence planning documentation
  - public interoperability standards used for modernization transition design
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the issue-local source baseline above.
    - 'Use shared meta-agents #225 and #306 only for corpus expansion and source-policy normalization.'
    - Do not block startup on collecting a full shared modernization corpus unless a specialty-specific exception requires
      it.
  specialty_specific_exceptions:
  - Prefer sources that improve planning, dependency discovery, wave design, and coexistence choices over implementation runbooks.
  - Use scheduler, middleware, and batch documentation only when those dependencies materially affect modernization sequencing
    or rollback planning.
  - Use interoperability standards only when API enablement or contract-based strangler patterns are part of the recommended
    pathway.
  - Do not widen the specialist into implementation ownership based on tool-specific migration accelerators.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-07-20'
shared_meta_agent_contracts:
  bootstrap_behavior:
    invocation_model: on-demand
    stale_policy: safe_degraded
    low_confidence_policy: escalate_to_orchestrator
  specialist_owned_responsibilities:
  - Define the narrow legacy modernization planning specialty boundary and adjacent-specialty rejections.
  - Define planning-specific deltas for legacy assessment, dependency mapping, migration wave design, and modernization pathway
    selection.
  - 'Define bootstrap metadata and request or response contracts for the delegated shared meta-agents named in issue #147.'
  - Define fallback behavior when delegated outputs are unavailable, stale, conflicting, or low confidence.
  - Provide specialty-specific examples, constraints, and escalation rules that cannot be normalized centrally.
  delegated_responsibilities:
  - Full best-practice corpus retrieval and normalization.
  - Repeated evaluation-suite scaffolding and threshold normalization.
  - Repeated readiness and evidence packaging.
  - Repeated deployment package boilerplate.
  - Repeated commercialization and packaging boilerplate.
  - Repeated authority-source policy normalization.
  - Repeated specialty-boundary normalization where centrally derivable.
  - Repeated package scaffolding boilerplate.
  contracts:
  - issue: '#225'
    agent: best-practices-curation-specialist
    owned_output:
    - legacy-modernization best-practice delta suggestions
    - source-expansion candidates tied to new platform families
    request_contract: Refresh reusable modernization-planning practices when new legacy platform families, coexistence patterns,
      or migration-wave heuristics appear.
    fallback: Use the issue-local authoritative baseline and flag any expanded best-practice request for human review.
  - issue: '#302'
    agent: evaluation-design-specialist
    owned_output:
    - scenario additions
    - rubric normalization
    request_contract: 'Extend planning-specific scenario coverage for new modernization failure modes while preserving the
      issue #147 minimum taxonomy.'
    fallback: Execute the local 12-scenario suite manually with documented pass or fail rationale.
  - issue: '#303'
    agent: readiness-and-evidence-specialist
    owned_output:
    - readiness gate consistency check
    - evidence packaging review
    request_contract: Validate that readiness artifacts support the validated claim and that human verification is recorded.
    fallback: Repository implementer performs manual contract review and signs readiness evidence.
  - issue: '#304'
    agent: deployment-package-specialist
    owned_output:
    - deployment operations addendum
    - rollback and monitoring refinements
    request_contract: Provide reusable deployment notes that fit a planning specialist package without widening scope into
      implementation operations.
    fallback: Use the local deployment package with conservative runtime, monitoring, and rollback defaults.
  - issue: '#305'
    agent: commercialization-and-packaging-specialist
    owned_output:
    - buyer and packaging normalization
    - proof-point wording
    request_contract: Validate target buyer, packaging, and subscription assumptions against the validated delivery contract.
    fallback: Keep commercialization assumptions explicit and require product review before public claims expand.
  - issue: '#306'
    agent: authority-source-policy-specialist
    owned_output:
    - refresh policy validation
    - decay policy normalization
    request_contract: Review source categories, refresh intervals, and specialty-specific exceptions for stale or cross-domain
      citations.
    fallback: Default to review_required_after_interval and reduce confidence when refresh windows are exceeded.
  - issue: '#307'
    agent: specialty-boundary-and-routing-specialist
    owned_output:
    - adjacent specialty routing rules
    - boundary language refinement
    request_contract: Refine rejection phrasing for implementation execution, scheduler operations, middleware operations,
      cloud platform design, and commercialization adjacency.
    fallback: Use the explicit local out-of-scope and orchestrator return rules.
  - issue: '#308'
    agent: agent-package-scaffolding-specialist
    owned_output:
    - template compliance check
    - artifact inventory verification
    request_contract: Verify required repository files and template alignment for this package.
    fallback: Use repository templates directly and rely on local validation scripts.
