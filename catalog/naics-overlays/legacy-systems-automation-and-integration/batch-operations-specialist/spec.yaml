meta_agent_contracts:
  best_practices_curation:
    issue_reference: '#225'
    bootstrap_metadata:
      specialty: batch operations
      domain: legacy-systems-automation-and-integration
      specialist_owned_delta: restart or rerun safety, return-code handling, checkpoint recovery, batch-window controls, and
        operator handoff notes for legacy batch estates
    request_contract:
      inputs:
      - batch runtime type and control artifact format
      - failure mode, return code, or operator objective
      - cutoff, dependency, and recovery constraints
      outputs:
      - normalized best-practice summary
      - batch-operations-specific risk flags
      - staleness metadata
    fallback:
      policy: Use the manifest authority baseline and specialist-owned notes only; escalate if guidance would otherwise rely
        on uncited vendor behavior.
      confidence_trigger: shared guidance missing, stale, or contradictory
  evaluation_design:
    issue_reference: '#302'
    bootstrap_metadata:
      specialty: batch operations
      required_coverage: normal run guidance, legacy constraint handling, failure and rerun modes, migration-risk prioritization,
        out-of-scope rejection, low-confidence escalation
    request_contract:
      inputs:
      - specialty boundary
      - minimum scenario count
      - target delivery level
      outputs:
      - scenario catalog
      - coverage gaps
      - threshold normalization notes
    fallback:
      policy: Use the local scenario suite in this package and require human review before release.
      confidence_trigger: scenario gaps or no response
  readiness_and_evidence:
    issue_reference: '#303'
    bootstrap_metadata:
      specialty: batch operations
      release_target: validated
    request_contract:
      inputs:
      - evaluation results
      - source baseline state
      - deployment and commercialization notes
      outputs:
      - readiness checklist
      - evidence consistency review
      - remaining release risks
    fallback:
      policy: Use local readiness evidence and keep approval notes conservative, auditable, and tied to recorded artifacts.
      confidence_trigger: inconsistent evidence or stale review
  deployment_package:
    issue_reference: '#304'
    bootstrap_metadata:
      specialty: batch operations
      runtime_profile: orchestrator-hosted guidance bundle for batch operators and modernization teams
    request_contract:
      inputs:
      - tenant adaptation policy
      - monitoring and logging requirements
      - rollback expectations
      outputs:
      - deployment notes delta
      - operational readiness checklist
    fallback:
      policy: Use the repository deployment template plus specialist-specific isolation, operator audit, and rollback notes.
      confidence_trigger: missing deployment boilerplate
  commercialization_and_packaging:
    issue_reference: '#305'
    bootstrap_metadata:
      specialty: batch operations
      buyer_motion: legacy operations stabilization and modernization enablement
    request_contract:
      inputs:
      - target buyer and user profile
      - proof points
      - go-to-market assumptions
      outputs:
      - packaging notes
      - subscription model guidance
      - commercialization gaps
    fallback:
      policy: Keep claims narrow to the validated artifact bundle, source-backed run guidance, and recorded readiness evidence.
      confidence_trigger: unsupported market claims
  authority_source_policy:
    issue_reference: '#306'
    bootstrap_metadata:
      specialty: batch operations
      source_policy: record categories, retrieval policy, and specialty exceptions without reproducing the full shared corpus
    request_contract:
      inputs:
      - required source categories
      - specialty exceptions
      - refresh expectations
      outputs:
      - source policy normalization
      - recency review guidance
      - deprecation risk flags
    fallback:
      policy: Use real authoritative sources listed in this manifest with explicit review cadence, decay policy, and recency
        notes.
      confidence_trigger: source freshness uncertain
  specialty_boundary_and_routing:
    issue_reference: '#307'
    bootstrap_metadata:
      specialty: batch operations
      adjacency_risks: scheduler ownership, COBOL internals, file transfer, middleware, API integration, RPA, modernization
        program ownership
    request_contract:
      inputs:
      - candidate task
      - neighbor specialties
      - confidence level
      outputs:
      - route decision
      - boundary rationale
      - rejection phrasing
    fallback:
      policy: Prefer rejection and orchestrator handoff when ownership is ambiguous.
      confidence_trigger: cross-specialty ambiguity
  agent_package_scaffolding:
    issue_reference: '#308'
    bootstrap_metadata:
      specialty: batch operations
      package_root: catalog/legacy-systems-automation-and-integration/batch-operations-specialist/
    request_contract:
      inputs:
      - template paths
      - required artifact list
      - target delivery level
      outputs:
      - scaffold completion checklist
      - required file map
      - template drift warnings
    fallback:
      policy: Use repository templates and fill the package locally.
      confidence_trigger: template drift or missing scaffold
