  source_categories:
  - category: official_cobol_compiler_and_upgrade_guidance
    retrieval_policy: Prefer IBM-authored COBOL compiler, migration, and upgrade guidance for language behavior, compile compatibility,
      runtime constraints, and modernization sequencing.
    specialty_specific_exceptions:
    - Do not widen compiler or upgrade guidance into broad portfolio rationalization, language migration business cases, or
      enterprise architecture strategy.
  - category: official_mainframe_runtime_and_subsystem_documentation
    retrieval_policy: Use official IBM documentation for z/OS, CICS, IMS, and Db2 only when those runtime dependencies materially
      change COBOL guidance, risk, or troubleshooting.
    specialty_specific_exceptions:
    - Route pure subsystem administration, tuning, or platform-operations ownership to the relevant adjacent specialist instead
      of absorbing it into this lane.
  - category: official_modernization_and_api_enablement_guidance
    retrieval_policy: Use official IBM modernization and API-enablement guidance for bounded service exposure, transformation
      planning, and evidence-backed upgrade recommendations around COBOL assets.
    specialty_specific_exceptions:
    - Do not turn API-enablement or modernization sources into ownership of enterprise middleware, integration platforms,
      or greenfield service engineering.
  - category: official_public_mainframe_automation_tooling
    retrieval_policy: Use official Zowe project guidance only for artifact inspection, developer workflow support, and safe
      automation patterns directly tied to COBOL and mainframe tasks.
    specialty_specific_exceptions:
    - Do not broaden into dedicated batch-operations, scheduler, platform-automation, or ChatOps ownership.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the specialist-owned IBM and Zowe source baseline above.
    - 'Use shared meta-agents #225 and #306 for broader corpus expansion and source-policy normalization only after the local
      baseline is loaded and validated.'
    - Do not block startup on delegated retrieval; preserve the reviewed local COBOL and mainframe baseline when shared outputs
      are unavailable, stale, or low-confidence.
  specialty_specific_exceptions:
  - Prefer IBM-authored compiler, subsystem, and modernization guidance over consultancy content or community summaries.
  - Use optional MQ or automation sources only when a COBOL application decision directly depends on them; otherwise route
    middleware, automation, and scheduling work outward.
  - Escalate when a requested recommendation depends on missing listings, dump evidence, package metadata, transaction definitions,
    or code-page details instead of guessing.
  - Treat AI-assisted modernization guidance as human-reviewed augmentation only and do not claim autonomous transformation
    quality.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-06-20'
shared_meta_agent_integration:
  bootstrap_metadata:
    issue_id: 149
    local_baseline_required: true
    deferred_initialization_supported: true
    startup_sequence:
    - Load local manifest, evaluation artifacts, and readiness evidence first.
    - Optionally invoke shared meta-agents for normalization after local baseline validation succeeds.
    - Reject delegated output that broadens the scope into platform operations, batch scheduling, middleware ownership, or
      full portfolio modernization.
    request_context_fields:
    - agent_slug
    - domain_family
    - release_version
    - specialty_boundary
    - target_delivery_level
    - source_categories
    - fallback_mode
  specialist_owned_responsibilities:
  - Define the narrow COBOL and mainframe specialty boundary, adjacent-specialty routing, and explicit refusal behavior.
  - Maintain the minimum authoritative source baseline, source categories, retrieval policy, and specialty-specific exceptions
    required for safe startup.
  - Provide COBOL and mainframe-specific scenarios, escalation rules, interoperability constraints, and low-confidence handling.
  - Define bootstrap metadata plus request and response contracts for delegated shared meta-agent calls.
  delegated_responsibilities:
  - Reusable best-practice corpus retrieval and normalization
  - Repeated evaluation-suite normalization and regression-coverage patterns
  - Readiness evidence consistency review and packaging normalization
  - Deployment package boilerplate normalization
  - Commercialization and packaging boilerplate normalization
  - Authority-source policy normalization
  - Boundary-routing phrasing normalization where centrally derivable
  - Package scaffolding consistency review
  delegated_contracts:
  - issue_id: 225
    slug: best-practices-curation-specialist
    purpose: Expand reusable COBOL and mainframe best-practice coverage without rebuilding the full shared corpus locally.
    request_contract:
      required_fields:
      - agent_slug
      - source_categories
      - specialty_boundary
      - retrieval_policy.mode
      optional_fields:
      - specialty_specific_exceptions
      - tenant_context_excluded_confirmation
    expected_response:
      required_outputs:
      - candidate public source additions
      - normalization notes
      - staleness timestamp
      rejection_condition: Reject if sources are not public, authoritative, or consistent with the narrow COBOL and mainframe
        boundary.
    fallback_if_unavailable: Keep the local source baseline only and state that broader corpus normalization is deferred.
  - issue_id: 302
    slug: evaluation-design-specialist
    purpose: Normalize scenario taxonomy and coverage framing across repeated specialist packages.
    request_contract:
      required_fields:
      - minimum_scenario_count
      - acceptance_thresholds
      - required_coverage_classes
      - specialty_boundary
      optional_fields:
      - existing_scenarios
    expected_response:
      required_outputs:
      - coverage review
      - gap list
      - normalization recommendations
      rejection_condition: Reject if proposed scenarios dilute COBOL and subsystem specificity or remove out-of-scope and
        low-confidence coverage.
    fallback_if_unavailable: Use the local 12-scenario matrix and record pass or fail rationale directly in repository artifacts.
  - issue_id: 303
    slug: readiness-and-evidence-specialist
    purpose: Review consistency across manifest, evaluation results, readiness evidence, and release notes.
    request_contract:
      required_fields:
      - delivery_status
      - evaluation_results_path
      - readiness_evidence_path
      - release_readiness_path
      optional_fields:
      - human_verification_notes
    expected_response:
      required_outputs:
      - consistency check result
      - missing evidence list
      - readiness normalization notes
      rejection_condition: Reject if the delegated review attempts to replace local human verification or specialist-owned
        evidence.
    fallback_if_unavailable: Rely on local readiness checklist, local evidence review, and repository validation scripts.
  - issue_id: 304
    slug: deployment-package-specialist
    purpose: Normalize deployment-package structure for runtime, isolation, rollback, and monitoring notes.
    request_contract:
      required_fields:
      - deployment_model
      - tenant_adaptation_policy
      - rollback_requirements
      - monitoring_expectations
      optional_fields:
      - shared_meta_agent_dependencies
    expected_response:
      required_outputs:
      - package structure review
      - missing deployment note list
      - normalization recommendations
      rejection_condition: Reject if the response changes runtime constraints or weakens rollback requirements.
    fallback_if_unavailable: Ship the local deployment package with conservative isolation, monitoring, and rollback requirements.
  - issue_id: 305
    slug: commercialization-and-packaging-specialist
    purpose: Normalize buyer profile, subscription framing, and proof-point wording.
    request_contract:
      required_fields:
      - target_buyer_profile
      - target_user_profile
      - proof_points
      - go_to_market_gaps
      optional_fields:
      - subscription_model
    expected_response:
      required_outputs:
      - positioning review
      - commercial wording notes
      - risk flags
      rejection_condition: Reject if the response broadens scope into adjacent specialties or promises unsupported customer
        outcomes.
    fallback_if_unavailable: Use local marketing notes and keep commercialization claims limited to evidence-backed readiness.
  - issue_id: 306
    slug: authority-source-policy-specialist
    purpose: Normalize refresh intervals, decay policy, and source-governance consistency.
    request_contract:
      required_fields:
      - authority_sources
      - source_categories
      - next_review_due_at
      optional_fields:
      - specialty_specific_exceptions
    expected_response:
      required_outputs:
      - source policy review
      - refresh or decay adjustments
      - staleness flags
      rejection_condition: Reject if the response removes the minimum local baseline required for safe startup.
    fallback_if_unavailable: Retain the current source set and require manual refresh review on the next release cycle.
  - issue_id: 307
    slug: specialty-boundary-and-routing-specialist
    purpose: Check adjacent-specialty routing and refusal phrasing for consistency.
    request_contract:
      required_fields:
      - specialty_boundary
      - out_of_scope_rules
      - orchestrator_return_rules
      - adjacent_specialties
      optional_fields:
      - example_refusals
    expected_response:
      required_outputs:
      - routing review
      - boundary conflict list
      - rejection-language recommendations
      rejection_condition: Reject if the delegated output broadens the COBOL and mainframe lane or collapses distinct adjacent
        specialties.
    fallback_if_unavailable: Apply the local boundary and routing rules unchanged.
  - issue_id: 308
    slug: agent-package-scaffolding-specialist
    purpose: Verify package completeness and scaffold alignment with repository standards.
    request_contract:
      required_fields:
      - package_path
      - required_files
      - delivery_contract
      optional_fields:
      - validation_commands
    expected_response:
      required_outputs:
      - file coverage review
      - scaffold consistency notes
      - missing artifact list
      rejection_condition: Reject if the response substitutes missing artifacts with synthetic placeholders instead of requiring
        concrete files.
    fallback_if_unavailable: Rely on repository validation scripts and local completeness review.
  shared_fallback_contract:
    trigger_conditions:
    - shared meta-agent is unavailable
    - shared meta-agent result is stale
    - shared meta-agent output is low-confidence
    - shared meta-agent output conflicts with the COBOL-and-mainframe boundary
    behavior:
    - Proceed with the local specialist-owned baseline only.
    - State confidence and freshness limits explicitly.
    - Escalate unresolved ambiguity to the orchestrator instead of guessing.
