meta_agent_contracts:
  best_practices_curation:
    issue_reference: '#225'
    bootstrap_metadata:
      specialty: file transfer and EDI
      domain: legacy-systems-automation-and-integration
      specialist_owned_delta: trading-partner transport, acknowledgments, nonrepudiation, replay, and legacy modernization
        controls
    request_contract:
      inputs:
      - protocol in scope such as AS2, SFTP, FTPS, FTP, or Connect:Direct
      - message standard in scope such as X12 or EDIFACT
      - platform context such as BizTalk, Sterling, File Gateway, Connect:Direct, or cloud MFT
      outputs:
      - normalized best-practice summary
      - protocol-specific risk flags
      - freshness and staleness metadata
    fallback:
      policy: Use the local authority baseline and specialty-specific notes only; escalate if a recommendation would depend
        on uncited partner, vendor, or standards guidance.
      confidence_trigger: shared guidance missing, stale, contradictory, or too generic for the transport or EDI scenario
  evaluation_design:
    issue_reference: '#302'
    bootstrap_metadata:
      specialty: file transfer and EDI
      required_coverage: normal guidance, legacy constraints, interoperability failures, migration risk, out-of-scope rejection,
        and low-confidence escalation
    request_contract:
      inputs:
      - specialty boundary
      - minimum scenario count
      - target delivery level
      outputs:
      - scenario catalog
      - coverage gap report
      - threshold normalization notes
    fallback:
      policy: Use the local scenario suite in this package and require human review before release.
      confidence_trigger: scenario gaps, stale templates, or no response
  readiness_and_evidence:
    issue_reference: '#303'
    bootstrap_metadata:
      specialty: file transfer and EDI
      release_target: validated
    request_contract:
      inputs:
      - evaluation results
      - source baseline state
      - deployment and commercialization notes
      outputs:
      - readiness checklist
      - evidence consistency review
      - remaining release risks
    fallback:
      policy: Use local readiness evidence and keep approval language conservative and auditable.
      confidence_trigger: inconsistent evidence, stale review, or unsupported validated claims
  deployment_package:
    issue_reference: '#304'
    bootstrap_metadata:
      specialty: file transfer and EDI
      runtime_profile: orchestrator-hosted specialist bundle
    request_contract:
      inputs:
      - tenant adaptation policy
      - monitoring and logging requirements
      - rollback expectations
      outputs:
      - deployment notes delta
      - operational readiness checklist
    fallback:
      policy: Use repository deployment template plus specialist-specific tenant, transport-security, and replay-recovery
        notes.
      confidence_trigger: missing deployment normalization or unresolved isolation questions
  commercialization_and_packaging:
    issue_reference: '#305'
    bootstrap_metadata:
      specialty: file transfer and EDI
      buyer_motion: B2B integration modernization and managed partner exchange operations
    request_contract:
      inputs:
      - target buyer and user profile
      - proof points
      - go-to-market assumptions
      outputs:
      - packaging notes
      - subscription model guidance
      - commercialization gaps
    fallback:
      policy: Keep market claims narrow to the validated artifact bundle, recorded evidence, and clearly stated assumptions.
      confidence_trigger: unsupported claims, missing proof points, or unclear buyer fit
  authority_source_policy:
    issue_reference: '#306'
    bootstrap_metadata:
      specialty: file transfer and EDI
      source_policy: record source categories, retrieval policy, and specialty exceptions without reproducing the full shared
        corpus
    request_contract:
      inputs:
      - required source categories
      - specialty exceptions
      - refresh expectations
      outputs:
      - source policy normalization
      - recency review guidance
      - deprecation risk flags
    fallback:
      policy: Use real public sources in this manifest with explicit review cadence and decay policy.
      confidence_trigger: source freshness uncertain, access blocked, or standards-version ambiguity
  specialty_boundary_and_routing:
    issue_reference: '#307'
    bootstrap_metadata:
      specialty: file transfer and EDI
      adjacency_risks: middleware integration, API/event integration, batch operations, job scheduling, mainframe modernization,
        and security operations
    request_contract:
      inputs:
      - candidate task
      - neighbor specialties
      - confidence level
      outputs:
      - route decision
      - boundary rationale
      - rejection phrasing
    fallback:
      policy: Prefer rejection and orchestrator handoff when ownership is ambiguous.
      confidence_trigger: cross-specialty ambiguity or missing transport or EDI context
  agent_package_scaffolding:
    issue_reference: '#308'
    bootstrap_metadata:
      specialty: file transfer and EDI
      package_root: catalog/legacy-systems-automation-and-integration/file-transfer-and-edi-specialist/
    request_contract:
      inputs:
      - template paths
      - required artifact list
      - target delivery level
      outputs:
      - scaffold completion checklist
      - required file map
      - template drift warnings
    fallback:
      policy: Use repository scaffolding command and fill the package locally.
      confidence_trigger: template drift, missing scaffold, or incomplete artifact map
