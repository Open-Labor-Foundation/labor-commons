  source_categories:
  - category: attendance and funded-enrollment controls
    retrieval_policy: Use Head Start attendance, enrollment, and chronic-absenteeism guidance first when Head Start or Early
      Head Start funding is in scope.
    specialty_specific_exceptions:
    - Do not treat attendance presence alone as permission to bill when fee or authorization limits still apply.
  - category: subsidy payment, family-fee, and co-payment guidance
    retrieval_policy: Use CCDF and Office of Child Care public guidance first for subsidy-funded care, then retrieve the tenant's
      jurisdiction-specific provider manual and absent-day rules.
    specialty_specific_exceptions:
    - Escalate whenever the state or local subsidy manual changes the billing result and is not present in the retrieved context.
  - category: billing evidence and improper-payment controls
    retrieval_policy: Use Office of Child Care error-rate and control resources before approving adjustments, reposting, or
      denials handling.
    specialty_specific_exceptions:
    - Do not recommend correction of a posting difference unless matched attendance, authorization, and remittance records
      are all present.
  - category: state licensing and attendance-record dependencies
    retrieval_policy: Use the licensing database to identify attendance-record retention and provider-operation rules that
      materially affect evidence sufficiency.
    specialty_specific_exceptions:
    - Record unresolved ambiguity rather than guessing when jurisdiction-specific attendance-record rules are unavailable.
