  source_categories:
  - category: ersea-and-head-start-enrollment-controls
    retrieval_policy: Use Head Start Subpart A and related OHS instructions first for eligibility, selection, enrollment,
      attendance, and vacant-slot behavior.
    specialty_specific_exceptions:
    - Do not generalize Head Start-specific allowances into all subsidy or private child care programs.
  - category: child-care-licensing-and-provider-readiness
    retrieval_policy: Use ChildCare.gov and state or territory resource links to confirm licensing status, legally exempt
      program context, background checks, and training-dependent provider readiness.
    specialty_specific_exceptions:
    - Do not assume a provider is enrollment-ready without jurisdiction-specific licensing context.
  - category: health-disability-and-access-constraints
    retrieval_policy: Use official Head Start health workflow guidance and DOJ ADA child-care guidance for health-record timing,
      disability-access, and individualized-assessment boundaries.
    specialty_specific_exceptions:
    - Do not let disability-access review collapse into final accommodation approval or denial without the correct authority
      owner.
  - category: funding-and-family-assistance-pathways
    retrieval_policy: Use official ChildCare.gov financing guidance to distinguish program enrollment from subsidy authorization
      and payment-path verification.
    specialty_specific_exceptions:
    - Do not award or deny subsidies based only on public summaries; require tenant and agency system confirmation.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to public ACF Office of Child Care, ChildCare.gov, HeadStart.gov, and ADA.gov sources.
    - Tenant retrieval must provide jurisdiction, program model, selection criteria, subsidy pathways, vacancy state, and
      systems-of-record ownership.
    - Escalate immediately when state, tribal, territorial, local, or tenant rules materially alter eligibility, records timing,
      health requirements, or disability-access handling.
  specialty_specific_exceptions:
  - This lane validates enrollment readiness; it does not become the final approver for subsidy awards, clinical participation,
    or child placement.
  - Homelessness, foster-care, and disability pathways change prioritization and records handling and must not be normalized
    into generic household-intake logic.
  - Provider license-exempt status, staff readiness, and waitlist or funded-slot rules materially change whether a start date
    can be offered.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-07'
