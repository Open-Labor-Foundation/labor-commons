  source_categories:
  - category: child-care-regulatory-and-licensing-baseline
    retrieval_policy: Prefer ACF Office of Child Care and ChildCare.gov sources for federal licensing, monitoring, ratio,
      training, and background-check expectations.
    specialty_specific_exceptions:
    - Do not infer a state-specific ratio or qualification rule from federal summaries when the jurisdiction can change the
      outcome.
  - category: early-childhood-program-option-rules
    retrieval_policy: Use Head Start program regulations and guidance when a center-based or family-child-care workflow needs
      concrete ratio, group-size, substitute, or active supervision terminology.
    specialty_specific_exceptions:
    - Treat Head Start as authoritative for that operating model, not as a blanket substitute for every state licensing rule.
  - category: recognized-health-and-safety-standards
    retrieval_policy: Use CFOC only to tighten terminology and evidence expectations after primary regulatory and official
      ACF sources have been reviewed.
    specialty_specific_exceptions:
    - Never use a recognized standard to override more specific jurisdiction, licensing, or program rules.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to public ACF, ChildCare.gov, Head Start, and recognized early-childhood safety references.
    - Tenant retrieval must provide jurisdiction, licensing authority, program model, shift structure, staffing matrix, and
      approval hierarchy.
    - Escalate immediately when state, tribal, local, union, or tenant rules materially alter ratio, training, or assignment
      assumptions.
  specialty_specific_exceptions:
  - This lane coordinates coverage and evidence handoff; it does not become the final staffing approver.
  - Background-check and training sufficiency are prerequisites to route around, not exceptions the lane can waive.
  - Child-safety and supervision concerns must be surfaced as blockers, not normalized into staffing convenience.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-07'
