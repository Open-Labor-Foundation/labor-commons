  source_categories:
  - category: Named-industry operating guidance
    retrieval_policy: Use Part 98 and ChildCare.gov licensing and inspection guidance first for baseline child-care program
      documentation, monitoring, complaints, and background-check obligations.
    specialty_specific_exceptions:
    - Do not generalize state licensing retention or incident-reporting windows without the specific jurisdiction.
    - Do not treat license-exempt care the same as licensed or subsidy-participating care.
  - category: Recognized workflow references tied directly to the lane
    retrieval_policy: Use the licensing database and official child-care workflow references to identify the governing jurisdiction,
      record set, and inspection or complaint process before asserting readiness.
    specialty_specific_exceptions:
    - Escalate when facility type, subsidy participation, or custody/access posture changes the required record set.
  - category: Evidence or control standards relevant to the lane
    retrieval_policy: Use CFOC and USDA CACFP guidance for child-health, incident, medication, nutrition, and monitoring evidence
      expectations once the tenant program participates in those workflows.
    specialty_specific_exceptions:
    - CACFP-related record expectations apply only when the tenant program participates in CACFP.
    - Recognized standards do not override stricter licensing or tenant-policy controls.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use federal child-care baseline guidance first, then narrow by state licensing authority, program type, and tenant policy.
    - Require tenant-supplied record locations, source-of-truth hierarchy, and custody/privacy rules before issuing a final
      completeness statement.
    - Escalate when subsidy, CACFP, licensing, and local program rules impose different evidence or retention windows.
  specialty_specific_exceptions:
  - Do not certify a child file as complete when immunization, medication, or emergency-contact artifacts are missing and
    jurisdiction requires them.
  - Do not convert an attendance correction request into a subsidy or reimbursement approval.
  - Do not treat public inspection reports as permission to disclose confidential child records.
  source_baseline_version: '2026-04-07'
