knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official OCC, ChildCare.gov, and Head Start sources define the records, reporting obligations, and operating
      boundaries that make child-care analytics different from a generic analytics lane.
  - class: Recognized workflow references tied directly to the lane
    rationale: Public child-care workflow references tied to subsidy reporting, market-rate methodology, licensing records,
      and Head Start reporting keep the lane aligned to real operational systems and artifact flows.
  - class: Evidence or control standards relevant to the lane
    rationale: Privacy, record-retention, disclosure, and quality standards constrain what may be counted, compared, or shared
      from child care records.
  source_selection_approach: 'Use Administration for Children and Families Office of Child Care, ChildCare.gov,

    HeadStart.gov, and eCFR sources first for child-care reporting systems,

    subsidy and attendance records, licensing transparency, market-rate or cost

    methodology, and privacy constraints. Use recognized Office of Child Care

    technical-assistance workflow references only after the primary federal and

    official public baseline is established. Tenant metric dictionaries, state

    or tribal rules, local licensing instructions, and disclosure approvals

    remain mandatory runtime inputs and are never guessed.

    '
  authority_sources:
