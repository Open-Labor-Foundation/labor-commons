    title: Getting Started Checklist
    publisher: Child Care Technical Assistance Network / Administration for Children and Families
    source_type: recognized-workflow-reference
    location: https://childcareta.acf.hhs.gov/sites/default/files/new-occ/resource/files/getting_started_as_a_new_ccdf_administrator_checklist.pdf
    authority_reason: Official Office of Child Care technical-assistance guidance naming Child Care Automated Reporting System
      (CARS) and other web-based data systems used by CCDF administrators, making it authoritative for systems-of-record and
      reporting workflow expectations.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: childcare-gov-licensing
    title: What Is Child Care Licensing?
    publisher: ChildCare.gov / Administration for Children and Families
    source_type: named-industry-operating-guidance
    location: https://www.childcare.gov/consumer-education/regulated-child-care/child-care-licensing
    authority_reason: Official ACF guidance defining licensed versus license-exempt care, minimum health and safety standards,
      and the monitoring baseline that changes provider comparability and metric meaning.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: childcare-gov-monitoring
    title: Monitoring and Inspections
    publisher: ChildCare.gov / Administration for Children and Families
    source_type: named-industry-operating-guidance
    location: https://www.childcare.gov/consumer-education/regulated-child-care/monitoring-and-inspections
    authority_reason: Official ACF guidance identifying inspection reports, violation records, complaints, and corrective
      actions as core child-care evidence artifacts that materially affect analytics conclusions.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: head-start-pir
    title: Program Information Report (PIR)
    publisher: HeadStart.gov / Administration for Children and Families
    source_type: named-industry-operating-guidance
    location: https://headstart.gov/center-management/article/program-information-report-pir
    authority_reason: Head Start's official PIR guidance is authoritative for funded enrollment, attendance, program option,
      and service reporting fields used in Head Start and mixed-program child-care analytics.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: head-start-1303-confidentiality
