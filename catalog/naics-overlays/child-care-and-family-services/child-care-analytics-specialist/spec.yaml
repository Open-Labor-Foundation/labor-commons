      state and territory licensing requirements that materially change provider-capacity, staffing, and compliance-related
      metrics.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nrckids-cfoc
    title: Caring for Our Children
    publisher: National Resource Center for Health and Safety in Child Care and Early Education
    source_type: evidence-and-control-standard
    location: https://nrckids.org/
    authority_reason: CFOC is a recognized national child-care health and safety standard set used to tighten terminology,
      incident framing, and evidence expectations after primary ACF sources are reviewed.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: child care reporting systems and subsidy records
    retrieval_policy: Use OCC and Head Start reporting guidance first for CCDF, PIR, attendance, funded-slot, and provider-payment
      reporting records.
    specialty_specific_exceptions:
    - Do not infer final subsidy authorization, payment release, or funding eligibility from analytical summaries alone.
  - category: provider licensing, monitoring, and operating status
    retrieval_policy: Use ChildCare.gov licensing and monitoring guidance plus the ACF licensing regulations database before
      treating provider capacity, provider quality, or provider comparability as stable.
    specialty_specific_exceptions:
    - Do not compare licensed, provisional, restricted, and license-exempt settings as if they shared the same operating baseline.
  - category: rate-setting, market-rate, and benchmark methodology
    retrieval_policy: Use OCC market-rate and cost-of-care guidance before preparing rate comparisons, affordability claims,
      or payment adequacy narratives.
    specialty_specific_exceptions:
    - Do not turn market-rate survey or cost-methodology references into unsupported best-in-class or underpayment conclusions
      without tenant and jurisdiction context.
  - category: child record privacy and safety-sensitive evidence
    retrieval_policy: Use Head Start confidentiality rules and CFOC terminology before preparing child-level, small-cell,
      safety-sensitive, or incident-related outputs.
    specialty_specific_exceptions:
    - Do not publish child-identifying or small-cell outputs without explicit tenant disclosure approval and role context.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline workflow, but tenant systems, state or tribal rules, provider-type context, and disclosure
      approvals remain required for safe execution.
    - Tenant retrieval must provide program model, provider type, jurisdiction, funding mix, metric dictionary, source-precedence
      policy, and system-of-record ownership.
    - Escalate whenever state or tribal rules, local licensing instructions, or tenant policy materially change metric definition,
      reporting posture, or disclosure posture.
  specialty_specific_exceptions:
  - Child care analytics often mix Head Start, CCDF, QRIS, licensing, and private-pay records that use different denominators
    and reporting cadence.
  - Attendance, utilization, capacity, ratio, and provider-payment metrics are only safe when funding stream, provider status,
    classroom context, and denominator logic are explicit.
  - Requests for public claims, safety claims, provider quality claims, or child-level disclosures must stay caveated and
    route to the proper authority when evidence or approval is incomplete.
  next_review_due_at: '2026-10-06'
