      for child-record disclosure, consent, and data-sharing limits within Head Start-connected analytics workflows.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: occ-market-rate-surveys
    title: Planning your Market Rate Survey
    publisher: Child Care Technical Assistance Network / Administration for Children and Families
    source_type: recognized-workflow-reference
    location: https://childcareta.acf.hhs.gov/sites/default/files/new-occ/resource/files/planning_market_rate_surveys_brief_1_1.pdf
    authority_reason: Office of Child Care technical-assistance guidance directly tied to CCDF rate-setting workflow and data
      collection, making it authoritative for market-rate, provider payment, and benchmark methodology boundaries.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: occ-rate-and-cost-guidance
    title: Increasing Subsidy Payments and Setting Rates
