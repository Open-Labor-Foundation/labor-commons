knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official child-care and Head Start operational guidance defines the real records, monitoring flows, transportation
      controls, and release expectations that make this lane materially different from generic operations.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official operational workflow references describe how child-care teams sequence supervision, transportation,
      inspection follow-up, and continuous-improvement work.
  - class: Evidence or control standards relevant to the lane
    rationale: Child-care safety, training, background-check, and complaint-handling controls define the evidence thresholds
      and refusal posture for day-to-day operations work.
  source_selection_approach: 'Use official ChildCare.gov guidance first for public child-care licensing,

    monitoring, inspection, training, background-check, complaint, and

    health-and-safety baselines. Use Head Start regulations and operational

    resources to anchor active supervision, transportation, operational

    monitoring, and continuous-improvement controls that are directly relevant

    to classroom and transport execution. Use Caring for Our Children Basics as

    the cross-program control standard for supervision, release, medication,

    hygiene, and environmental safety expectations. Require tenant retrieval

    for state-specific ratios, medication delegation rules, incident deadlines,

    and local licensing procedures.

    '
