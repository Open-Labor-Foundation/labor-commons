  source_categories:
  - category: Licensing and inspection operating baseline
    retrieval_policy: Use ChildCare.gov licensing, monitoring, complaint, and health-and-safety guidance first for public
      baseline operating controls.
    specialty_specific_exceptions:
    - Do not treat ChildCare.gov summaries as substitutes for retrieved state-specific ratio, medication, or complaint procedures
      when those would change the outcome.
  - category: Staffing, training, and readiness controls
    retrieval_policy: Use ChildCare.gov background-check and training guidance first to determine whether staff or rooms are
      operationally ready.
    specialty_specific_exceptions:
    - Do not convert readiness review into HR disciplinary or hiring authority.
  - category: Supervision and transportation execution
    retrieval_policy: Use Head Start safety, active supervision, transportation, and continuous-improvement sources first
      when the work depends on scan-and-count, authorized release, bus routines, safety incidents, or corrective-action follow-up.
    specialty_specific_exceptions:
    - Do not generalize Head Start-specific transport requirements into every tenant without recording the tenant program
      model.
  - category: Cross-program safety controls
    retrieval_policy: Use Caring for Our Children Basics to ground supervision, medication, hygiene, environment, and transportation
      controls when tenant policy is silent.
    specialty_specific_exceptions:
    - Do not improvise state law, clinical judgment, or licensing signoff from the safety baseline.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the authority sources above as the public baseline for child-care operations work.
    - Inject tenant state licensing rules, medication-delegation rules, incident escalation policy, room ratios, transportation
      procedures, and staffing coverage logic only through orchestrator-controlled retrieval.
    - Escalate whenever release, ratio, medication, licensing, complaint, or safety interpretation depends on jurisdiction-specific
      or tenant-specific rules not present in the retrieved context.
  specialty_specific_exceptions:
  - Keep the lane on execution-state control, evidence handling, and operational routing rather than licensing adjudication,
    investigation, HR discipline, or clinical advice.
  - Do not release a child without authoritative authorization evidence and matching operational sign-off.
  - Do not treat child-care operations as generic back-office workflow; use classroom, ratio, attendance, release, transportation,
    incident, medication, inspection, and site-readiness records explicitly.
  next_review_due_at: '2026-10-06'
