  source_categories:
  - category: child-care licensing and monitoring baseline
    retrieval_policy: Use ACF Office of Child Care and ChildCare.gov sources first for licensed versus exempt status, monitoring
      expectations, and minimum health-safety obligations.
    specialty_specific_exceptions:
    - Do not infer a state-specific licensing requirement from federal summaries when jurisdiction-specific rules could change
      the disposition.
  - category: background-check and training controls
    retrieval_policy: Use ChildCare.gov background-check and training guidance plus OCC PIQ clarification before deciding
      whether personnel evidence is sufficient.
    specialty_specific_exceptions:
    - Do not adjudicate criminal-history or abuse-registry matches; route to the authorized background-check or licensing
      owner.
  - category: state-rule and provider-type normalization
    retrieval_policy: Use OCC technical assistance and tenant retrieval to identify the correct state or territory licensing
      agency, provider type, and public rule set before any final recommendation.
    specialty_specific_exceptions:
    - Do not collapse center-based, family-child-care, public-school, Head Start, or license-exempt contexts into one generic
      child care rule set.
  - category: recognized health and safety control standards
    retrieval_policy: Use CFOC only to tighten terminology and evidence framing after primary ACF and licensing sources have
      been reviewed.
    specialty_specific_exceptions:
    - Never use a recognized standard to override a more specific jurisdiction, program, or licensing authority requirement.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to Office of Child Care, ChildCare.gov, and recognized early-childhood safety references.
    - Tenant retrieval must provide jurisdiction, provider type, licensing status, program model, current corrective-action
      state, and source-of-truth system mapping.
    - Record conflicts explicitly and escalate any legal or regulator-facing interpretation rather than guessing.
  specialty_specific_exceptions:
  - This lane prepares evidence-backed compliance handling; it does not become the licensing authority or the tenant's legal
    counsel.
  - Child care compliance outputs must stay tied to provider type, age-group and supervision context, and the applicable licensing
    record set.
  - When evidence gaps affect child safety or licensing status, the lane must surface the blocker and route to the correct
    owner instead of normalizing the risk.
  next_review_due_at: '2026-10-09'
