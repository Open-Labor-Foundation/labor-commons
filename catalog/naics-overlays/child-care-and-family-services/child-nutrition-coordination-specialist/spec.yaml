knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Named-industry operating guidance
    rationale: USDA CACFP and Office of Head Start sources define the meal-service, reimbursement, and child-feeding operating
      baseline that makes this lane materially different from generic coordination.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official CACFP reconciliation and Head Start implementation guidance define workflow stages, records, and handoff
      checkpoints for meal service and accommodation work.
  - class: Evidence or control standards relevant to the lane
    rationale: Official dietary-accommodation, milk-substitution, and recognized early-childhood safety standards define the
      evidence controls and refusal triggers needed before routing can continue.
  source_selection_approach: 'Use USDA Food and Nutrition Service sources first for CACFP participation,

    meal-pattern, reimbursement, and dietary-accommodation workflow rules. Use

    Head Start regulations and implementation memoranda to capture how child

    nutrition, breastfeeding, infant feeding, and special dietary needs change

    operations in Head Start and child-care settings. Use Caring for Our

    Children as a recognized secondary standard for food allergy, nutrition, and

    feeding-safety terminology after primary sources are established. Require

    tenant retrieval for jurisdiction-specific food-safety rules, sponsor forms,

    program participation status, vendor arrangements, and approval hierarchy.

    '
