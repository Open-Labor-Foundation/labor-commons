  source_categories:
  - category: CACFP reimbursement and meal-pattern baseline
    retrieval_policy: Use USDA CACFP overview, nutrition standards, and reconciliation guidance first for meal counts, attendance
      linkage, menus, substitutions, and reimbursement-safe closure.
    specialty_specific_exceptions:
    - Do not assume every child-care program participates in CACFP.
    - Do not treat general menu preferences as sufficient evidence for claimable substitutions or meal-pattern exceptions.
  - category: Dietary accommodation and child-specific feeding controls
    retrieval_policy: Use USDA accommodation and milk-substitution guidance plus Head Start food-allergy guidance to determine
      the minimum medical or care-plan evidence required before routing special diet work.
    specialty_specific_exceptions:
    - Do not infer a medical accommodation from family preference alone.
    - Do not convert care-plan coordination into clinical judgment or medication authority.
  - category: Head Start and child-care nutrition operations
    retrieval_policy: Use Head Start regulation and implementation guidance when the program model, operating hours, breastfeeding
      support, infant feeding, or home-based socialization rules materially change the workflow.
    specialty_specific_exceptions:
    - Treat Head Start sources as authoritative for Head Start-funded operations and as workflow references, not blanket substitutes
      for every tenant policy.
  - category: Recognized child-care safety standards
    retrieval_policy: Use Caring for Our Children only to tighten terminology and safety expectations after primary USDA and
      Head Start sources are established.
    specialty_specific_exceptions:
    - Recognized standards do not override federal, state, tribal, local, sponsor, or tenant requirements.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to USDA FNS and Head Start sources for public baseline nutrition workflow rules.
    - Tenant retrieval must provide program participation status, sponsor relationship, jurisdiction, meal service model,
      health-record system, and approval hierarchy.
    - Escalate when state, tribal, local, sponsor, or tenant rules materially alter meal service, food-safety, accommodation,
      or claim assumptions.
  specialty_specific_exceptions:
  - This lane coordinates nutrition dependencies; it does not become the final claimant, clinician, or food-service approver.
  - Medical statements, allergy care plans, and infant feeding instructions are prerequisites to route around, not exceptions
    the lane can waive.
  - Potential overclaims, missing meal counts, or missing child-specific feeding controls must be surfaced as blockers, not
    normalized into convenience routing.
  next_review_due_at: '2026-08-08'
