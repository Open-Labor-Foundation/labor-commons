knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official child-care and Head Start program rules define parent communication, family partnership, health and
      safety, and complaint-facing obligations that materially change this lane.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official family-engagement frameworks and Office of Child Care guidance define how child-care family-engagement
      work is sequenced, documented, and handed off.
  - class: Evidence or control standards relevant to the lane
    rationale: Child-care health, safety, and recordkeeping standards define what evidence must exist before family-engagement
      work can be closed or information can be shared.
  source_selection_approach: 'Use federal child-care and Head Start program rules first to anchor the

    public baseline for family engagement, parent communication, family

    partnership services, consumer education, and disclosure-sensitive work.

    Use Office of Child Care and Office of Head Start family-engagement

    resources for operational workflow language and handoff expectations. Use

    child-care health and safety standards to constrain records, incident, and

    communication evidence handling. Require tenant retrieval for state

    licensing, subsidy, custody, and local mandated-reporting specifics.

    '
