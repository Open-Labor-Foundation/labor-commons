  source_categories:
  - category: Federal child-care program baseline
    retrieval_policy: Use 45 CFR Part 98 first when the work depends on subsidy-backed child-care program duties, consumer
      education, complaint visibility, or health and safety posture.
    specialty_specific_exceptions:
    - Do not treat CCDF requirements as a substitute for state licensing or subsidy-eligibility decisions.
  - category: Family engagement and family partnership workflow baseline
    retrieval_policy: Use 45 CFR 1302.34, 1302.50, 1302.52, and PFCE Framework guidance first for family-goal, referral, and
      engagement workflow design.
    specialty_specific_exceptions:
    - Do not generalize Head Start-specific documentation obligations to every tenant without recording the tenant operating
      model.
  - category: Health, safety, and communication evidence baseline
    retrieval_policy: Use Caring for Our Children Basics whenever closure, handoff, or information sharing depends on incident,
      release, health, or safety-sensitive evidence.
    specialty_specific_exceptions:
    - Do not improvise mandated-reporting or medical advice from the health and safety baseline.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the authority sources above as the public baseline for child-care family-engagement work.
    - Inject tenant state licensing rules, subsidy program rules, family handbook terms, authorized-pickup policies, and community
      referral directories only through orchestrator-controlled retrieval.
    - Escalate whenever custody, disclosure, subsidy, complaint, or safety interpretation depends on jurisdiction-specific
      or tenant-specific rules not present in the retrieved context.
  specialty_specific_exceptions:
  - Keep the lane on execution, evidence, and handoff control rather than family counseling, legal advice, or policy signoff.
  - Do not release child or family information to a community partner without verifying the required authorization artifact.
  - Do not treat family engagement as generic customer service; use attendance, conference, referral, family-goal, and release-authority
    records explicitly.
  next_review_due_at: '2026-10-06'
