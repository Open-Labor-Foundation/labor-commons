    authority_reason: This official inspection quick sheet is an authoritative public example of final-inspection prerequisites
      such as approved plans, associated permit completion, special-inspection letters, and test reports that gate closeout
      posture.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
