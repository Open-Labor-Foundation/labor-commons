    publisher: New York City Department of Buildings
    source_type: official-permitting-guidance
    location: https://www.nyc.gov/assets/buildings/pdf/work-permits-guide.pdf
    authority_reason: NYC DOB is an authority having jurisdiction and its permit guide explains when permits are required,
      who may pull them, and how permit signoff remains with the permit holder and DOB process rather than this lane.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
