  source_categories:
  - category: Permit and inspection baseline
    retrieval_policy: Use AHJ or public-owner permit guidance to confirm permit status, posted-plan requirements, inspection
      sequence, objections, supporting documents, and occupancy or completion signoff gates before routing commissioning work.
    specialty_specific_exceptions:
    - Never infer permit approval, occupancy approval, or local code interpretation from generic baseline guidance.
  - category: Commissioning workflow and documentation baseline
    retrieval_policy: Use WBDG commissioning references to normalize commissioning stages, owner and contractor roles, issues-log
      handling, systems-manual requirements, training, and final-report artifact expectations.
    specialty_specific_exceptions:
    - Never convert public commissioning workflow guidance into autonomous approval of functional testing, owner acceptance,
      or design intent.
  - category: Construction administration and safety baseline
    retrieval_policy: Use OSHA and USACE sources to determine when safety controls, preconstruction coordination, submittal
      status, testing tracking, or deficiency management block work progression.
    specialty_specific_exceptions:
    - Never convert OSHA or USACE baseline into autonomous safety signoff, means-and-methods direction, or contractor execution
      authority.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline workflow, but tenant systems, contract terms, jurisdiction, BAS access, and project-specific
      acceptance regimes remain required for safe routing.
    - Escalate when jurisdictional guidance or tenant policy materially changes permit, inspection, safety, testing, turnover,
      or occupancy posture.
    - Never infer licensed trade, engineer-of-record, owner-acceptance, or code-official authority.
  specialty_specific_exceptions:
  - Permit, inspection, and occupancy obligations vary materially by jurisdiction, project type, and tenant delivery model.
  - Commissioning provider scope, TAB responsibility, controls-vendor scope, and owner-acceptance rules may materially alter
    the next owner.
  - Functional test acceptance, seasonal testing, and final turnover completion require tenant-defined acceptance proof even
    when public baseline sources describe common commissioning artifacts.
  next_review_due_at: '2026-10-06'
