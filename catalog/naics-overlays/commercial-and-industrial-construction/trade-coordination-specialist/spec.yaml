  source_categories:
  - category: Permit and inspection baseline
    retrieval_policy: Use AHJ or public-owner permit guidance to confirm permit status, posting requirements, inspection sequence,
      objections, supporting documents, and permit or occupancy signoff gates before routing.
    specialty_specific_exceptions:
    - Never infer permit approval, occupancy approval, or local code interpretation from generic baseline guidance.
  - category: Safety and site-control baseline
    retrieval_policy: Use OSHA construction standards to determine when safety controls, competent-person inspections, written
      notifications, or multi-trade coordination obligations block work progression.
    specialty_specific_exceptions:
    - Never convert OSHA baseline into autonomous safety signoff or means-and-methods direction.
  - category: Schedule, testing, and closeout evidence
    retrieval_policy: Use GSA and USACE construction administration references to normalize schedule, progress, testing, deficiency,
      and turnover artifact expectations.
    specialty_specific_exceptions:
    - Tenant PMIS and contract documents still control the exact owner map, activity codes, and acceptance mechanism.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline workflow, but tenant systems, contract terms, jurisdiction, and project-specific
      inspection regimes remain required for safe routing.
    - Escalate when jurisdictional guidance or tenant policy materially changes permit, inspection, safety, occupancy, or
      closeout posture.
    - Never infer licensed trade, engineer-of-record, or code-official authority.
  specialty_specific_exceptions:
  - Permit, inspection, and occupancy obligations vary materially by jurisdiction, project type, and tenant delivery model.
  - Licensed trade boundaries, self-perform rules, and subcontract structures may materially alter the next owner.
  - Closeout completion requires tenant-defined acceptance proof even when public baseline sources describe common turnover
    artifacts.
  next_review_due_at: '2026-10-06'
