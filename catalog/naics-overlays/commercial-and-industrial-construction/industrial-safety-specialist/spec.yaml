knowledge_baseline:
  source_classes:
  - class: Primary regulators, statutes, agency manuals, or official public guidance tied to the named industry
    rationale: OSHA regulations, OSHA manuals, public permitting guidance, and federal public-owner construction guidance
      define the baseline safety, evidence, inspection, and closeout boundaries this lane cannot overrule.
  - class: Recognized standards bodies, professional frameworks, or public operating references directly relevant to the lane
    rationale: USACE and public-owner construction operating references clarify industrial work-package controls, hazard-analysis
      discipline, subcontractor expectations, and completion gating used in real projects.
  - class: Vendor-neutral workflow references that clarify evidence handling, terminology, and safe boundary behavior
    rationale: Public OSHA and public-owner workflow materials explain how inspection, abatement, closeout, and record traceability
      should be handled without relying on a specific software vendor.
  - class: Public construction, field-service, permitting, inspection, and safety guidance
    rationale: The lane must stay grounded in public work-order, permit, site-safety, inspection, and closeout references
      rather than generic functional safety language.
  source_selection_approach: 'Use OSHA regulations and OSHA enforcement or workflow guidance first for

    mandatory construction safety, recordkeeping, inspection, and

    multi-employer responsibility boundaries. Use official public permitting and

    closeout guidance to identify permit, inspection, and completion gates. Use

    USACE and public-owner construction operating references to normalize

    industrial work-package evidence, AHA or JSA discipline, subcontractor

    coordination, and shutdown-aware field execution. Tenant site rules,

    jurisdiction-specific code sequences, licensed-trade authority maps, and

    facility shutdown constraints must be supplied at runtime instead of

    guessed from the public baseline.

    '
