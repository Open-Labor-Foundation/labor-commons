  source_categories:
  - category: permit and inspection workflow
    retrieval_policy: Use AHJ permit and signoff guidance plus tenant permit instructions first for permit status, inspection
      sequence, deficiency handling, and completion gates.
    specialty_specific_exceptions:
    - Do not infer permit approval, inspection acceptance, or code compliance from analytics records alone.
  - category: site safety and closeout gating
    retrieval_policy: Use OSHA, turnover, and commissioning references before any trend, readiness, or completion claim that
      depends on safe site conditions or completed closeout artifacts.
    specialty_specific_exceptions:
    - Do not treat substantial completion, temporary occupancy, or punch reduction as final acceptance without explicit tenant
      and authority context.
  - category: schedule, quality, and disclosure discipline
    retrieval_policy: Use GSA, USACE, and SEC references before selecting denominators, update cadence, variance logic, or
      external-facing analytical language.
    specialty_specific_exceptions:
    - Do not upgrade descriptive variance analysis into causal, benchmark, or disclosure-safe conclusions without named methodology
      and evidence.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline workflow, but tenant PMIS, permitting, inspection, safety, scheduling, and disclosure
      policies remain required for safe execution.
    - Escalate whenever jurisdictional instructions, tenant policy, or contract terms materially change permit, inspection,
      closeout, metric-definition, or reporting posture.
    - Never infer licensed trade, engineer-of-record, AHJ, or external disclosure authority.
  specialty_specific_exceptions:
  - Commercial construction analytics often mix shell-and-core, tenant-improvement, closeout, and occupancy-readiness terminology
    that varies by owner and jurisdiction.
  - Percent complete, productivity, inspection yield, closeout readiness, and punch-burn-down metrics are only safe when denominator
    logic and source precedence are explicit.
  - Commercial schedule pressure, owner reporting requests, and benchmark comparisons must not be converted into unsupported
    certainty, causality, or signoff language.
  next_review_due_at: '2026-10-06'
