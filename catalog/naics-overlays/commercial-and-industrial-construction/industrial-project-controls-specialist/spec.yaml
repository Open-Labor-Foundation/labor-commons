    publisher: U.S. General Services Administration
    source_type: official-closeout-guidance
    location: https://origin-www.gsa.gov/real-estate/design-and-construction/engineering
    authority_reason: GSA's engineering and project-planning guidance is an official public-owner source for evaluating and
      implementing facilities projects, including turnover-document expectations that constrain completion and closeout posture.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: Permit and inspection workflow
    retrieval_policy: Use AHJ guidance and tenant permit instructions first for permit status, special-inspection duties,
      correction handling, and final signoff gates.
    specialty_specific_exceptions:
    - Escalate if local AHJ, owner, or insurer requirements differ materially from the public baseline.
  - category: Site safety and environmental controls
    retrieval_policy: Use OSHA and EPA guidance before any release or control posture that depends on safe site conditions,
      qualified inspections, or corrective-action reporting.
    specialty_specific_exceptions:
    - Do not convert safety or environmental guidance into autonomous signoff authority.
  - category: Schedule, quality, and turnover evidence
    retrieval_policy: Use GSA and USACE references to normalize baseline schedule, quality-control, submittal, turnover, and
      evidence expectations for industrial construction controls.
    specialty_specific_exceptions:
    - Do not treat schedule analysis or turnover readiness as approval to energize, occupy, or accept the work.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline workflow, but tenant PMIS, quality, safety, turnover, and contract rules remain required
      for safe execution.
    - Escalate whenever jurisdictional instructions, tenant policy, or contract terms materially change permit, inspection,
      safety, closeout, or release posture.
    - Never infer licensed trade, engineer-of-record, commissioning signoff, or regulator authority.
  specialty_specific_exceptions:
  - Industrial construction work often includes outage windows, turnover systems, energization boundaries, and owner-operator
    acceptance requirements that vary materially by facility.
  - A hold, failed inspection, hazardous condition, or incomplete turnover dossier remains a hard control boundary until the
    named authority resolves it.
  - Field coordination may reference ITPs, loop checks, test packs, redlines, and turnover packages, but final acceptance
    still belongs to qualified project, safety, inspection, commissioning, or trade owners.
  next_review_due_at: '2026-10-06'
