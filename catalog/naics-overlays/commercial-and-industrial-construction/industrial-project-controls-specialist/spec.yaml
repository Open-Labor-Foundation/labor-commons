knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Public permitting, inspection, or field-service guidance
    rationale: Official permitting and inspection guidance defines permit-holder duties, required inspection records, correction
      workflows, and signoff or closeout gates that constrain this lane.
  - class: Site-safety or closeout workflow references
    rationale: Primary safety and project-signoff guidance establishes when unsafe conditions, unresolved objections, incomplete
      inspections, or closeout gaps block work progression or completion.
  - class: Scheduling, subcontractor, or work-order operating standards
    rationale: Official construction schedule and quality-management references define baseline schedule control, daily quality
      reporting, preparatory or initial phases, and evidence expectations for industrial controls.
  source_selection_approach: 'Use OSHA and EPA sources for safety, environmental inspection, and field

    evidence boundaries; official AHJ guidance for permit, special-inspection,

    signoff, and closeout gating; and GSA and USACE references for schedule,

    progress, quality-management, turnover, and change-control evidence. Treat

    tenant PMIS, field-service, quality, safety, turnover, and document-control

    systems as the operational truth set only after the tenant names them

    explicitly. Never infer permit approval, code interpretation, or trade

    signoff from the public baseline alone.

    '
  authority_sources:
  - source_id: osha-29-cfr-1926-20
    title: 29 CFR 1926.20 - General safety and health provisions
    publisher: Occupational Safety and Health Administration
    source_type: regulatory-standard
    location: https://www.osha.gov/laws-regs/regulations/standardnumber/1926/1926.20
    authority_reason: OSHA is the primary U.S. federal construction safety regulator. This standard makes contractors responsible
      for accident-prevention programs and inspections, so it is authoritative for stop-work and control-boundary posture.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: epa-2022-cgp
    title: 2022 Construction General Permit (CGP)
    publisher: U.S. Environmental Protection Agency
    source_type: regulatory-permit-guidance
    location: https://www.epa.gov/npdes/2022-construction-general-permit-cgp
    authority_reason: EPA is the primary federal regulator for construction stormwater permitting in covered jurisdictions.
      The CGP establishes inspection cadence, qualified-inspector expectations, corrective-action reporting, and permit-record
      retention relevant to industrial site controls.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: nyc-dob-project-signoff
    title: 'Project Requirements: Project Sign-Off and Completion'
    publisher: New York City Department of Buildings
    source_type: official-ahj-guidance
    location: https://www.nyc.gov/site/buildings/dob/project-requirements-project-sign-off-and-completion.page
    authority_reason: NYC DOB is an authority having jurisdiction. Its official sign-off guidance names required special inspections,
      DOB inspections, objection resolution, self-certification handling, final sign-off, and as-built submission obligations
      that gate completion.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nyc-dob-manufacturing-work-inspections
    title: 'Project Requirements: Manufacturing Buildings: Work & Inspections'
    publisher: New York City Department of Buildings
    source_type: official-ahj-guidance
    location: https://www.nyc.gov/site/buildings/industry/project-requirements-registrant-manufacturing-n-insp.page
    authority_reason: NYC DOB publishes manufacturing-building inspection requirements including special and progress inspections,
      hazardous-condition reporting, SIA obligations, and signoff boundaries, making it directly authoritative for industrial
      construction workflow constraints.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gsa-p120
