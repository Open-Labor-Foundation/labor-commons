    authority_reason: GSA publishes the governing federal cost and schedule management policy defining baseline schedule control,
      interfaces across scope, cost, and schedule, construction-phase requirements, and submittal expectations relevant to
      project controls.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gsa-small-project-schedule
    title: Use our project schedule management for small projects
    publisher: U.S. General Services Administration
    source_type: official-construction-workflow-guidance
    location: https://origin-www.gsa.gov/tools-overview/buildings-and-real-estate-tools/inventory-of-gsa-owned-and-leased-properties/use-our-schedule-management-for-small-projects
    authority_reason: GSA's public workflow guidance defines baseline schedule timing, stakeholder communication cadence,
      and schedule issue categories that clarify how schedule evidence should constrain project-controls outputs.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: usace-cqm
