knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Architecture and engineering change management depends on named project-delivery records and owner-side workflows
      such as PMPs, RFIs, revised SCEs, permit trackers, milestone baselines, and closeout packages rather than generic change
      language.
  - class: Recognized workflow references tied directly to the lane
    rationale: The lane must stay grounded in public project-controls, change-order, and scheduling references that explicitly
      describe how scope, cost, and time changes are processed in capital-project delivery.
  - class: Evidence or control standards relevant to the lane
    rationale: Inspection, sign-off, project-history, and closeout requirements materially determine whether a change can
      be sequenced, priced, or treated as ready for downstream approval.
  source_selection_approach: 'Use GSA PMIS and RWA guidance as the public owner-side baseline for project

    management plans, RFIs, schedule management, estimate updates, and funding

    amendments in architecture and engineering delivery. Use Caltrans and FHWA

    construction administration guidance for change-order records, time-impact

    reasoning, project-history evidence, and project-controls workflow. Use NYC

    DOB sign-off guidance to anchor permit, inspection, and closeout boundaries

    that the lane must not overstep. Tenant PMIS configuration, contract form,

    approval thresholds, jurisdiction, and system-of-record precedence remain

    mandatory runtime inputs and are never guessed.

    '
