knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Public GSA, USACE, and FAR architect-engineer materials define the design phases, submittals, quality plans,
      review systems, and licensed-professional boundaries that materially distinguish this lane from generic quality work.
  - class: Recognized workflow references tied directly to the lane
    rationale: USACE and WBDG design-review, constructability, and quality-risk references define how review comments, interdisciplinary
      coordination defects, milestone backchecks, and risk indicators are handled in real A/E workflows.
  - class: Evidence or control standards relevant to the lane
    rationale: Recognized BIM and commissioning references define the evidence artifacts, common-data-environment controls,
      quality plans, verification checks, and release prerequisites needed for reliable design-quality handling.
  source_selection_approach: 'Use GSA P100 and related GSA commissioning materials first for public owner

    design criteria, milestone submittals, owner-project-requirements and

    basis-of-design handling, and commissioning-linked review expectations.

    Use USACE architect-engineer guidance, DrChecks policy, and quality-risk

    indicator guidance for explicit QCP, BIM execution, review-comment,

    backcheck, and issue-repository discipline. Use WBDG constructability

    guidance and NIBS BIM requirements as recognized public workflow and

    control references for coordination checks, interference management, CDE

    expectations, and BIM quality evidence. Use FAR Subpart 36.6 as the public

    contractual and licensed-authority boundary for architect-engineer

    services. Tenant-specific governing codes, contract forms, project

    delivery method, review stages, approval matrix, systems-of-record

    locations, and final licensed approvers must be supplied at runtime rather

    than guessed from the public baseline.

    '
  authority_sources:
  - source_id: gsa-p100-portal-2024
    title: Facilities Standards for the Public Buildings Service
    publisher: U.S. General Services Administration
    source_type: official-owner-design-standards-portal
    location: https://www.gsa.gov/real-estate/facilities-standards-for-the-public-buildings-service
    authority_reason: GSA states that P100 establishes mandatory design standards and performance criteria for GSA-owned buildings
      and publishes the current core standards and submittal matrix used to govern A/E design submissions.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: gsa-p100-submittal-matrix-2024
    title: 2024 P100 Submittal Matrix
    publisher: U.S. General Services Administration
    source_type: official-design-submittal-requirements
    location: https://origin-www.gsa.gov/system/files/2024%20P100%20Submittal%20Matrix.pdf
    authority_reason: The official GSA matrix documents baseline A/E submittal requirements and milestone evidence such as
      basis of design, calculations, specifications, and discipline deliverables across delivery methods while preserving
      the standard of care for a fully constructible document set.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: gsa-commissioning-guide-2020
    title: GSA Commissioning Guide
    publisher: U.S. General Services Administration
    source_type: official-design-review-and-commissioning-guidance
    location: https://www.wbdg.org/FFC/GSA/gsa_commissioning_guide_2020.pdf
    authority_reason: This official GSA guide defines owner project requirements, basis-of-design review, concept/DD/CD design
      reviews, issues logs, commissioning plans, test procedures, and outstanding-comment closure expectations for facility
      design quality.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: usace-ae-guide-general-requirements-2024
    title: Architect-Engineer Guide General Requirements
    publisher: U.S. Army Corps of Engineers, Sacramento District
    source_type: official-ae-delivery-guidance
    location: https://www.spk.usace.army.mil/Portals/12/documents/a-e-services/AE-Guide-General-Requirements-v2.pdf
    authority_reason: USACE's public architect-engineer guide defines QCP content, BIM project execution planning, deliverable
      handling, design-review response expectations, scope-deviation control, and the correction-of-errors posture for A/E
      services.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: usace-drchecks-er-1110-1-8159
    title: ER 1110-1-8159 - DRCHECKS
    publisher: U.S. Army Corps of Engineers
    source_type: official-review-comment-system-policy
    location: https://www.publications.usace.army.mil/Portals/76/Publications/EngineerRegulations/ER_1110_1_8159.pdf
    authority_reason: USACE's regulation makes DrChecks the required repository for collating and transmitting project review
      comments and describes the design-review and checking workflow that governs comment tracking and status visibility.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: usace-ecb-2025-3-eqri
    title: USACE ECB 2025-3 Implementation of Quality Risk Indicators
    publisher: U.S. Army Corps of Engineers
    source_type: official-design-quality-risk-guidance
    location: https://www.wbdg.org/dod/ecb/usace-ecb-2025-3
    authority_reason: This active USACE bulletin provides direct guidance on evaluating and reporting Engineering Quality
      Risk Indicators throughout the design phase, making it authoritative for design-quality risk escalation and reporting
      posture.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: wbdg-constructability-reviews
    title: Constructability Reviews
    publisher: Whole Building Design Guide
    source_type: recognized-design-review-workflow-reference
    location: https://www.wbdg.org/resources/constructability-reviews
    authority_reason: WBDG is a recognized public building guidance platform. This reference defines how constructability
      reviews at major design stages should focus on cost, time, quality, and interdisciplinary coordination rather than cosmetic
      comments.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nibs-project-bim-requirements-2024
    title: Template and Example Language for Project BIM Requirements
    publisher: National Institute of Building Sciences
    source_type: recognized-bim-control-framework
    location: https://nibs.org/wp-content/uploads/2025/04/V4-PBR-Template-and-Example-Language_062424.pdf
    authority_reason: NIBS NBIMS-US V4 workgroup guidance is a recognized vendor-neutral BIM control reference covering BIM
      quality plans, BIM execution plans, common-data-environment participation, quality-control reports, and constructability,
      interference, model-integrity, and federated-model checks.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: far-subpart-36-6
    title: Subpart 36.6 - Architect-Engineer Services
    publisher: Acquisition.gov
    source_type: official-contractual-and-licensed-boundary-reference
    location: https://www.acquisition.gov/node/31053/printable/pdf
    authority_reason: The FAR subpart is the official federal policy source for architect-engineer services and explicitly
      distinguishes services requiring a registered or licensed architect or engineer from services that do not, which constrains
      this lane's licensed-authority boundary.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: design criteria, milestone submissions, and owner review baseline
    retrieval_policy: Use GSA P100, the P100 submittal matrix, the GSA Commissioning Guide, and USACE A-E guidance first for
      milestone deliverables, basis-of-design expectations, issue-resolution posture, and release blockers.
    specialty_specific_exceptions:
    - Do not treat owner guidance as a substitute for tenant contract terms, project-specific criteria, or local jurisdictional
      code.
  - category: review-comment, risk, and corrective-action workflow discipline
    retrieval_policy: Use USACE DRCHECKS policy, USACE quality-risk-indicator guidance, and WBDG constructability guidance
      for comment tracking, risk escalation, interdisciplinary coordination, and repeat-defect handling.
    specialty_specific_exceptions:
    - Do not turn review workflow references into final code interpretation, permit approval, or licensed design authority.
  - category: digital delivery, CDE, and evidence-control expectations
    retrieval_policy: Use NIBS BIM requirements and GSA or USACE BIM planning expectations for BIM quality plans, BIM execution
      plans, common-data-environment controls, and model-check evidence.
    specialty_specific_exceptions:
    - Do not infer that a model is acceptable for release without approved provenance, issue status, and project-specific
      owner or tenant validation rules.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public GSA, USACE, WBDG, NIBS, and FAR sources define the baseline for design-quality evidence handling, comment control,
      BIM quality posture, and licensed-authority boundaries in architecture and engineering services.
    - Tenant facts about project type, jurisdiction, governing codes, contract form, review milestones, final release owners,
      and exact systems-of-record locations are mandatory for case-specific conclusions.
    - Escalate when owner criteria, AHJ direction, contract language, or tenant QA procedures materially narrow or override
      the public baseline.
  specialty_specific_exceptions:
  - Keep the lane centered on design-quality evidence review and escalation, not final design approval or code authority.
  - Separate design-quality support from architect-of-record, engineer-of-record, permitting, BIM authoring, and contractual-approval
    ownership.
  - Do not certify compliance, code sufficiency, or permit readiness from public references alone.
  source_baseline_version: '2026-04-10'
  next_review_due_at: '2026-07-09'
