    title: Special Conditions for Architect/Engineer Services (AE110)
    publisher: Smithsonian Institution
    source_type: official-ae-services-guidance
    location: https://www.wbdg.org/FFC/SI/special_cond_ae_services_2020.pdf
    authority_reason: The Smithsonian is a public owner with formal A/E service conditions. This document is authoritative
      for A/E scope, design submissions, site visits, cost-estimate coordination, governmental-agency coordination, and licensed
      design responsibility in a real project-delivery setting.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: va-major-design-review-procedure
    title: 'Design Submission Instructions: Major Construction Design Review Procedure'
    publisher: U.S. Department of Veterans Affairs via WBDG
    source_type: official-design-review-guidance
    location: https://www.wbdg.org/FFC/VA/VAAEINFO/mc_drp.pdf
    authority_reason: VA major-construction design review guidance is authoritative for formal design-review checkpoints,
      reviewer roles, and project-submission expectations that directly shape engineering project delivery support and escalation
      handling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: gsa-pmp-full-or-condensed
    title: Project management plan - full or condensed version
    publisher: U.S. General Services Administration
    source_type: official-project-management-workflow-guidance
    location: https://www.gsa.gov/real-estate/project-management-information-system/training-project-management-tool/project-management-plan-full-or-condensed-version
    authority_reason: GSA's official PMIS training is authoritative for how a federal owner expects project-management-plan
      details, review cadence, project strategy, and role-controlled updates to be maintained in the system of record.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gsa-client-enrichment-series
    title: Client Enrichment Series
    publisher: U.S. General Services Administration
    source_type: official-pmis-systems-guidance
    location: https://www.gsa.gov/system/files/2024%2006%2025%20508%20CES%20Kahua.pdf
    authority_reason: This official GSA PMIS guide is authoritative for project-system access and identifies Projects, Packaged
      Submittals, Punch Lists, RFIs, Media Manager, Meetings, Tasks, and File Manager as the live collaboration and evidence
      surfaces for project delivery.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gsa-p120-cost-schedule-management
    title: P120 Project Cost and Schedule Management Requirements for the Public Buildings Service
    publisher: U.S. General Services Administration
    source_type: official-cost-and-schedule-control-policy
    location: https://www.gsa.gov/directives/files/?file=2023-06%2FFinal+Directive_PBS+Cost+and+Schedul+Management.pdf
    authority_reason: GSA P120 is an official cost and schedule control directive. It is authoritative for baseline, update,
      milestone, and estimate governance that materially constrains project-delivery summaries and exception handling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gsa-commissioning-guide
    title: GSA Commissioning Guide
    publisher: U.S. General Services Administration via WBDG
    source_type: official-commissioning-control-guidance
    location: https://www.wbdg.org/FFC/GSA/gsa_commissioning_guide_2020.pdf
    authority_reason: GSA commissioning guidance is authoritative for owner project requirements, basis of design alignment,
      submittal review, issue logs, test procedures, record documents, and construction closeout controls that bound project
      delivery claims.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: seattle-final-inspection-quick-sheet
    title: Residential Building Final Inspection Quick Sheet
    publisher: Seattle Department of Construction and Inspections
    source_type: official-inspection-closeout-guidance
    location: https://www.seattle.gov/documents/Departments/SDCI/Inspections/ResidentialFinalInspectionQuickSheet.pdf
    authority_reason: 'This AHJ inspection quick sheet is authoritative for a concrete closeout baseline: approved plans on
      site, associated permits complete, special inspection letters approved, and final inspection prerequisites before a
      project can be represented as complete.'
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: A/E contract, scope, and design-review baseline
    retrieval_policy: Use Smithsonian and VA A/E guidance first when the request turns on scope, design-phase submissions,
      review comments, estimate preparation, coordination obligations, or licensed delivery boundaries.
    specialty_specific_exceptions:
    - Do not treat a public-owner design-review sequence as interchangeable with a tenant's contract form or delegated authority
      map.
  - category: Project-management system and workflow baseline
    retrieval_policy: Use GSA PMIS guidance first when the request depends on where project records live, which workflow app
      governs the artifact, or how the project-delivery package should be assembled.
    specialty_specific_exceptions:
    - Do not assume the tenant uses Kahua specifically; translate the workflow pattern into the tenant system map only after
      retrieval confirms it.
  - category: Cost, schedule, commissioning, inspection, and closeout control baseline
    retrieval_policy: Use GSA P120, GSA commissioning guidance, and AHJ inspection-closeout guidance before describing readiness,
      approval posture, or completion state.
    specialty_specific_exceptions:
    - Do not convert control guidance into authority to approve a milestone, certify completion, or release work.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the authority sources above as the public baseline for architecture-and-engineering project delivery support and
      resolution.
    - Tenant retrieval must provide contract form, jurisdiction, approval thresholds, commercial controls, licensed-review
      boundaries, and exact systems-of-record precedence before a confident disposition is produced.
    - Escalate whenever jurisdictional permit rules, contract obligations, or tenant policy materially change what can be
      said about design progress, site readiness, estimate posture, or closeout completeness.
  specialty_specific_exceptions:
  - Keep the lane on project delivery support and evidence-backed synthesis, not licensed design judgment or formal approvals.
  - Do not claim that an engineering package is ready to issue, ready to build, or ready to close unless the controlling review,
    permit, commissioning, and closeout artifacts support that posture.
  - Do not treat architecture and engineering services as a cosmetic wrapper around generic PM support; design-submission
    packages, review comments, bases of design, controlled estimates, and licensed-boundary signals must materially change
    the answer.
  next_review_due_at: '2026-10-07'
