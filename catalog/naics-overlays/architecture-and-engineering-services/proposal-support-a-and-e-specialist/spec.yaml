knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Architecture and engineering proposal support is materially shaped by official A and E procurement rules, industry
      classification, and federal public-procurement workflows that do not apply to generic sales support.
  - class: Recognized workflow references tied directly to the lane
    rationale: A and E proposal work depends on recognized qualification-form, shortlist, interview, and submission workflow
      references that define artifact shape and readiness expectations.
  - class: Evidence or control standards relevant to the lane
    rationale: Licensure, responsible-control, and professional conduct standards define what proposal support may summarize
      versus what must be escalated to a licensed or approving authority.
  source_selection_approach: 'Use official A and E procurement sources first to anchor public-notice,

    qualification-based selection, SF 330, fee-timing, and negotiation

    boundaries. Use recognized public workflow references to translate those

    rules into named proposal artifacts and readiness gates. Use NCARB and

    NCEES model standards to enforce licensure, responsible-control, and

    misrepresentation boundaries so the lane does not imply licensed judgment

    or unsupported qualifications.

    '
  authority_sources:
