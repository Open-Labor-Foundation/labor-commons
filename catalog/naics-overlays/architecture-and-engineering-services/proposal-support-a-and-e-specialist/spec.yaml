  source_categories:
  - category: A and E procurement and qualifications workflow
    retrieval_policy: Use 40 U.S.C. Chapter 11, FAR Subpart 36.6, GSA SF 330 guidance, and owner instructions first to establish
      whether the pursuit is qualifications-based, what artifacts are required, and when fee discussions are allowed.
    specialty_specific_exceptions:
    - Private-owner pursuits may not use SF 330 or Brooks Act sequencing; tenant procurement model must be supplied before
      case-specific advice.
    - Do not treat a generic proposal template as sufficient when a qualifications form, interview package, or addendum-controlled
      response governs the work.
  - category: Submission evidence and document control
    retrieval_policy: Use the solicitation, addenda, owner instructions, WBDG SF 330 guidance, and tenant document-control
      rules before confirming readiness, completeness, or submission eligibility.
    specialty_specific_exceptions:
    - When the portal instructions, addenda log, and document-control workspace disagree, escalate rather than choosing a
      version informally.
  - category: Licensure and professional-boundary control
    retrieval_policy: Use NCARB and NCEES model standards plus tenant jurisdiction maps before representing credentials, discipline-lead
      authority, or licensed-review sufficiency.
    specialty_specific_exceptions:
    - Model standards do not replace state board rules; jurisdiction-specific overrides must win when they materially change
      the answer.
    - The lane may summarize credential evidence but may not decide seal, responsible-control, or technical-adequacy questions.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public A and E procurement and licensure sources provide the baseline, but tenant procurement model, client instructions,
      and jurisdiction-specific credential rules remain required before case-specific guidance.
    - Escalate whenever the pursuit crosses from proposal support into pricing approval, contract interpretation, or licensed
      design judgment.
    - Do not infer fee-release timing, credential sufficiency, or submission eligibility when addenda, portal state, or owner
      instructions are missing.
  specialty_specific_exceptions:
  - A and E proposal workflows differ materially from generic proposal support because qualifications, licensure, key personnel,
    and subconsultant evidence often govern before price discussions.
  - Public-sector QBS and private-sector negotiated pursuits can use different artifact shapes and fee timing; tenant procurement
    model is a must-have fact.
  - Proposal support may prepare readiness and communication outputs, but it must stop short of final commercial approval,
    legal interpretation, and licensed professional signoff.
  next_review_due_at: '2026-10-10'
