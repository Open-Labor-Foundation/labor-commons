    source_type: named-industry-operating-guidance
    location: https://origin-www.gsa.gov/real-estate/design-and-construction/design-and-construction-delivery-process
    authority_reason: GSA is a primary U.S. public owner for A/E services and publishes the end-to-end delivery workflow,
