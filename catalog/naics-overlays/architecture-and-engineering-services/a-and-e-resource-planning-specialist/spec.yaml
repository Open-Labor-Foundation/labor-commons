    title: NAICS 5413 Architectural, Engineering, and Related Services
    publisher: U.S. Census Bureau
    source_type: industry-classification-reference
    location: https://www.census.gov/naics/resources/archives/sect54.html
    authority_reason: The U.S. Census Bureau is the authoritative NAICS publisher. Its 5413 definitions establish that architectural
      and engineering services are knowledge-intensive service lines delivered by named professional disciplines through feasibility
      studies, plans, designs, technical services, and related project work.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 730
    decay_policy: review_required_after_interval
    status: active
