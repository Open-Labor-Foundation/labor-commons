    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: owner-driven-ae-deliverable-and-submittal-standards
    retrieval_policy: Use GSA and USACE owner standards first for drawing, model, specification, and submittal deliverable
      expectations.
    specialty_specific_exceptions:
    - Do not generalize a federal-owner requirement into a client-specific release approval without tenant retrieval.
  - category: cad-bim-information-container-controls
    retrieval_policy: Use NCS and ISO 19650 guidance for naming, metadata, classification, revision, and common-data-environment
      control expectations.
    specialty_specific_exceptions:
    - Escalate when project-specific naming or metadata rules override the public baseline.
  - category: quality-and-specification-control-evidence
    retrieval_policy: Use ISO 9001 and SpecsIntact/UFGS QA workflow references for documented-information discipline, verification
      reporting, and corrective-action framing.
    specialty_specific_exceptions:
    - Do not convert quality-control references into licensed design approval or contract interpretation.
  - category: licensed-design-and-security-boundaries
    retrieval_policy: Use NCARB, NCEES, and ISO 19650-5 when sign/seal authority, responsible control, or sensitive information
      handling changes the safe outcome.
    specialty_specific_exceptions:
    - Always escalate final sign/seal, code, safety, or security-sensitive decisions to the licensed or authorized owner.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Start from the reviewed public baseline above for A/E CAD, BIM, specification, and document-control handling.
    - Require tenant retrieval for project-specific BIM execution plans, owner standards, client naming/status rules, jurisdictional
      sign/seal requirements, and live system-of-record locations.
    - Escalate when owner/client procedures or jurisdictional rules materially narrow or override the public baseline.
  specialty_specific_exceptions:
  - Keep the lane centered on controlled A/E records, issue states, and evidence-backed release/hold support.
  - Do not let CAD/BIM familiarity drift into design authorship, clash-resolution engineering, or code interpretation.
  - Treat sign/seal, responsible-control, security-sensitive information, and final permit or construction authorization as
    adjacent authority.
  next_review_due_at: '2026-07-09'
