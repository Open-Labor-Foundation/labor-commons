  source_classes:
  - class: Named-industry operating guidance
    rationale: Official architecture-and-engineering operating guidance and AHJ filing guidance define the real permit artifacts,
      applicant roles, submittal checkpoints, correction cycles, and sign-off stages used in this lane.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official permit portal guidance and federal design-document procedures show how permit records, review comments,
      revisions, and portal states are controlled in practice.
  - class: Evidence or control standards relevant to the lane
    rationale: Recognized BIM and information-management standards define common-data-environment, metadata, version-control,
      and information-exchange expectations that keep permit sets auditable.
  source_selection_approach: 'Use official A&E operating guidance and AHJ filing guidance first to define

    permit workflow stages, applicant boundaries, review comments, submission

    artifacts, and sign-off gates. Use EPA and USACE sources to define

    environmental and site-permit dependencies that commonly change the

    permitting path for civil and site work. Use recognized BIM and

    information-management standards only to normalize document-control,

    revision, and traceability expectations. Public sources establish the

    baseline only. Tenant project-management, CDE, permit-tracking, and policy

    systems remain required before case-specific recommendations are safe.

    '
