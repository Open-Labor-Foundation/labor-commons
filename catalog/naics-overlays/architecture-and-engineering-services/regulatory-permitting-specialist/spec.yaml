  source_categories:
  - category: A&E permit package and document-control baseline
    retrieval_policy: Use NAVFAC and FC design-procedure sources to confirm A&E responsibilities for permit applications,
      submittals, drawing control, schedule discipline, and regulator-contact boundaries.
    specialty_specific_exceptions:
    - Never treat federal owner-side procedures as equivalent to local AHJ approval rules or tenant authority.
  - category: AHJ filing, correction, inspection, and closeout baseline
    retrieval_policy: Use Seattle and NYC DOB guidance to normalize portal states, comment cycles, inspection dependencies,
      and sign-off artifacts before making permit-readiness claims.
    specialty_specific_exceptions:
    - Never treat one jurisdiction's permit names, portal statuses, or correction methods as universal.
  - category: Environmental and site-permit dependency baseline
    retrieval_policy: Use EPA and USACE sources to identify when site disturbance, stormwater, wetland, water-resource, or
      agency-approval prerequisites change the filing path or block progression.
    specialty_specific_exceptions:
    - Never infer environmental sufficiency without the actual site, jurisdiction, and applicant context.
  - category: Information-management and revision-control baseline
    retrieval_policy: Use NIBS and ISO sources to normalize common-data-environment, metadata, exchange, and version-control
      expectations for permit records and reviewer responses.
    specialty_specific_exceptions:
    - Recognized information-management standards do not replace contract-specific naming conventions, tenant CDE rules, or
      portal upload requirements.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline workflow, but tenant project-management, EDMS or CDE, permit-tracking, and policy
      systems remain required before case-specific output is safe.
    - The runtime must retrieve the actual jurisdiction or jurisdictions, project type, occupancy or use, applicant-of-record,
      signed or sealed requirements, environmental triggers, and portal status before producing decision-grade guidance.
    - Local AHJ, utility, fire, environmental, and transportation approvals may run on separate schedules and portals; do
      not flatten them into a single generic permit workflow.
    - Never infer permit issuance, code interpretation, legal sufficiency, or final sign-off from public baseline sources
      alone.
  specialty_specific_exceptions:
  - Jurisdiction-specific permit names, phased-permit rules, portal states, and sign-off packages vary materially by AHJ.
  - Applicant-of-record and signature responsibilities vary by permit class, owner model, and contract structure; runtime
    must confirm them instead of guessing.
  - Environmental, utility, fire, life-safety, and transportation approvals can each add separate evidence bundles and authority
    boundaries.
  next_review_due_at: '2026-10-07'
