- commissioning-and-closeout-specialist
knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Architecture-industry operating guidance defines the phase structure, architect responsibilities, consultant
      coordination, and construction-administration boundaries that materially change this lane.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official owner and authority workflow references define required submission packages, estimate maturity, permit
      gating, sign-off steps, and closeout expectations for architecture projects.
  - class: Evidence or control standards relevant to the lane
    rationale: Control standards define the systems of record, digital handover artifacts, mandatory design criteria, and
      audit evidence needed before work can advance or close.
  source_selection_approach: 'Use GSA, VA, NYC Buildings, AIA, NCARB, and NIBS public sources first to

    anchor architecture project phases, submissions, estimates, approvals,

    permit closeout, construction administration, and turnover evidence. Treat

    tenant PMIS, common data environment, BIM execution rules, approval matrix,

    contract form, consultant roster, and local AHJ requirements as runtime

    retrieval dependencies that narrow but do not replace the public baseline.

    '
  authority_sources:
  - source_id: gsa-design-delivery-process
    title: Design and Construction Delivery Process
    publisher: U.S. General Services Administration
    source_type: named-industry-operating-guidance
    location: https://www.gsa.gov/real-estate/design-construction/design-construction-delivery
    authority_reason: GSA is an official federal public owner. Its design and construction delivery process defines site acquisition,
      feasibility, architect-engineer onboarding, cost estimating, and project management sequencing used in architecture
      project execution.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: aia-basic-services
    title: Defining the Architect's Basic Services
    publisher: American Institute of Architects
    source_type: named-industry-operating-guidance
    location: https://www.aia.org/resource-center/defining-the-architects-basic-services
    authority_reason: AIA is the primary U.S. professional body for architects. Its basic-services guidance is a recognized
      architecture workflow reference for schematic design, design development, construction documents, bidding, and construction
      phase responsibilities.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ncarb-construction-evaluation
    title: Construction & Evaluation
    publisher: National Council of Architectural Registration Boards
    source_type: named-industry-operating-guidance
    location: https://www.ncarb.org/pass-the-are/prepare/construction-evaluation
    authority_reason: NCARB is the U.S. licensure coordination body for architects. Its construction and evaluation guidance
      is authoritative for architect construction-administration duties and the boundary between project support and licensed
      design judgment.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: va-ae-design-submission
    title: Architect/Engineer Information and A/E Design Submission Requirements (PG-18-15)
    publisher: U.S. Department of Veterans Affairs via Whole Building Design Guide
    source_type: recognized-workflow-reference
    location: https://www.wbdg.org/va/architectengineer-information-and-ae-design-submission-requirements-pg-18-15
    authority_reason: VA is an official public owner and PG-18-15 is an official A/E submission manual defining required site,
      schematic, design-development, construction-document, and project-book deliverables for architecture work.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: va-cost-estimating-requirements
    title: A/E Cost Estimating Requirements
    publisher: U.S. Department of Veterans Affairs via Whole Building Design Guide
    source_type: recognized-workflow-reference
    location: https://www.wbdg.org/FFC/VA/VAAEINFO/cost_est_man_2022.pdf
    authority_reason: VA's cost estimating manual is an official public-owner reference for estimate classifications, design-phase
      estimate maturity, and estimate deliverables that govern architecture project stage progression.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nyc-dob-project-signoff
    title: 'Project Requirements: Project Sign-Off and Completion'
    publisher: New York City Department of Buildings
    source_type: recognized-workflow-reference
    location: https://www.nyc.gov/site/buildings/dob/project-requirements-project-sign-off-and-completion.page
    authority_reason: NYC DOB is an authority having jurisdiction. Its project sign-off guidance defines inspection, objection-resolution,
      as-built, and final sign-off gates that constrain architecture project completion.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: gsa-p100
    title: Facilities Standards for the Public Buildings Service (P100)
    publisher: U.S. General Services Administration
    source_type: evidence-or-control-standard
    location: https://www.gsa.gov/real-estate/facilities-standards-for-the-public-buildings-service
    authority_reason: GSA P100 is an official federal design standard that establishes mandatory performance criteria, submission
      expectations, and review controls for public-building architecture projects.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gsa-pmis
    title: Project Management Information System
    publisher: U.S. General Services Administration
    source_type: evidence-or-control-standard
    location: https://www.gsa.gov/real-estate/design-construction/project-management-information-system
    authority_reason: GSA's PMIS guidance is an official public-owner reference for the authoritative project record, milestone
      tracking, budget status, and document access controls used during architecture project execution.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nibs-cobie
    title: COBie
    publisher: National Institute of Building Sciences
    source_type: evidence-or-control-standard
    location: https://nibs.org/nbims/v3/cobie/
    authority_reason: NIBS publishes recognized building-information standards. COBie is the public handover-data standard
      for facility information exchanges that materially affects architecture closeout and turnover evidence.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: project grounding and design-phase execution
    retrieval_policy: Use GSA delivery-process guidance, AIA phase guidance, and VA PG-18-15 first when the request depends
      on project definition, site studies, phase deliverables, or consultant-coordination expectations.
    specialty_specific_exceptions:
    - Do not advance a design phase when owner program, site basis, discipline coordination, or required submission artifacts
      are unresolved.
  - category: estimate, approval, and permit handling
    retrieval_policy: Use VA cost-estimating guidance and AHJ sign-off guidance first when the request depends on estimate
      maturity, permit comments, agency objections, final sign-off, or issue-for-permit readiness.
    specialty_specific_exceptions:
    - Do not treat estimate alignment or permit comment response as permit approval or licensed design signoff.
  - category: construction administration and closeout evidence
    retrieval_policy: Use NCARB, NYC DOB, GSA PMIS, GSA P100, and NIBS COBie first when the request depends on RFIs, submittals,
      architect instructions, record documents, turnover data, or project closeout.
    specialty_specific_exceptions:
    - Do not treat a field note or coordinator update as sufficient closure when the governing project record, inspection,
      punch, or handover data remains incomplete.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant-approved PMIS, CDE, BIM repository, permit portal, estimating system, approval matrix, and contract-form
      rules only through orchestrator-controlled retrieval.
    - Require project id, jurisdiction, delivery method, current phase, responsible design authority, and the controlling
      site, estimate, permit, or closeout context before applying the public baseline to a specific request.
    - Record unresolved ambiguity instead of guessing when jurisdictional, contractual, consultant, or authority rules materially
      change the next action.
  specialty_specific_exceptions:
  - Keep the lane focused on architecture project execution, evidence-backed state changes, and escalation packaging rather
    than generic project management or design authorship.
  - Separate architecture project support from architect-of-record, licensed engineering, code interpretation, permit approval,
    and financial approval authority.
  - Do not imply completion solely because one participant says the work is done if the design set, estimate, approval log,
    permit status, submittal log, punch list, or turnover record materially conflicts.
  next_review_due_at: '2026-08-08'
