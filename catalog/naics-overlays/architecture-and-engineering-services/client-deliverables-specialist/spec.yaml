    title: GSA P100 Submittal Matrix (2024) - Version 2.0
    publisher: U.S. General Services Administration
    source_type: official-design-submittal-guidance
    location: https://origin-www.gsa.gov/system/files/2024%20P100%20Submittal%20Matrix.pdf
    authority_reason: GSA is a federal public owner and its submittal matrix is authoritative for architecture-and-engineering
      phase deliverables, including narratives, calculations, specifications, drawings, models, and supporting documents expected
      at each design stage.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gsa-bim-guide-series-07
    title: GSA BIM Guide Series 07 - Building Elements
    publisher: U.S. General Services Administration
    source_type: official-bim-guidance
    location: https://www.gsa.gov/cdnstatic/BIM_Guide_07_v_1.pdf
    authority_reason: GSA's BIM guide is an official public-owner reference describing required model content, deliverable
      expectations, and owner-facing model submission discipline relevant to client-ready digital packages.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: usace-sacramento-ae-guide
