  source_categories:
  - category: Public-owner A/E deliverable baseline
    retrieval_policy: Use GSA, USACE, and NAVFAC sources first when the request concerns design phase packages, transmittals,
      review comments, electronic design deliverables, record drawings, or handover folders.
    specialty_specific_exceptions:
    - Do not assume one public-owner phase naming convention applies to every tenant contract; map tenant stage labels back
      to the public baseline.
  - category: Digital information and BIM exchange baseline
    retrieval_policy: Use NIBS BIM standards to normalize owner project requirements, BIM execution planning, common data
      environment expectations, and COBie or asset-information exchanges.
    specialty_specific_exceptions:
    - Do not treat BIM standards as authorization to alter models, accept clashes, or approve design content.
  - category: Seal and responsible-control baseline
    retrieval_policy: Use NCARB and BPELSG sources before communicating whether a package may be represented as final, signed,
      sealed, or permit-ready.
    specialty_specific_exceptions:
    - Do not generalize one jurisdiction's seal mechanics across all jurisdictions; require tenant and jurisdiction context
      whenever seal status affects the answer.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the authority sources above as the public baseline for architecture-and-engineering client deliverable handling.
    - Inject tenant contracts, issue-purpose codes, client naming standards, security markings, and system connectors only
      through orchestrator-controlled retrieval.
    - Escalate whenever jurisdiction, contract terms, or tenant policy materially changes release posture, seal handling,
      or turnover expectations.
  specialty_specific_exceptions:
  - Design phase names and required artifacts vary materially across tenants even when they map to similar public-owner stages.
  - Seal, signature, and permit-submission rules vary by jurisdiction and by whether the package is interim, final, record,
    or regulatory.
  - Security, export-control, or confidential-project rules may materially change what can be transmitted to the client and
    from which system of record.
  next_review_due_at: '2026-10-07'
