knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official public-owner architecture and engineering delivery guidance defines actual submittal stages, mandatory
      artifact sets, revision conventions, and record-package expectations.
  - class: Recognized workflow references tied directly to the lane
    rationale: Recognized BIM and information-delivery standards define owner project requirements, BIM execution planning,
      and digital handover structures used in architecture and engineering client deliverables.
  - class: Evidence or control standards relevant to the lane
    rationale: Professional seal and responsible-control rules define when documents may be represented as final, signed,
      or sealed and therefore bound what this lane may communicate.
  source_selection_approach: 'Use official public-owner architecture and engineering design-submittal

    requirements first to anchor stage names, transmittal expectations,

    deliverable composition, review-comment closure, and record-package

    structure. Use recognized BIM and handover standards to anchor CDE, BIM,

    COBie, and asset-information terminology. Use professional licensure

    guidance to keep seal, responsible-control, and final-issue decisions

    outside this lane. Treat tenant contracts, naming conventions, security

    rules, and system connectors as required overlays rather than inferred

    defaults.

    '
  authority_sources:
