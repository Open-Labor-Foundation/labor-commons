  source_categories:
  - category: phase deliverables and owner review gates
    retrieval_policy: Use GSA phase and submittal guidance before treating a package as complete, review-ready, permit-ready,
      or phase-comparable.
    specialty_specific_exceptions:
    - Do not equate internal design progress with owner review acceptance or agency submission readiness.
  - category: BIM planning, model maturity, and information exchange
    retrieval_policy: Use GSA BIM and NBIMS-US guidance before comparing model completeness, LOD maturity, clash closure,
      BEP compliance, or CDE workflow status.
    specialty_specific_exceptions:
    - Do not treat federated-model presence, clash count reduction, or LOD labels as proof of design completeness without
      mapped phase and discipline context.
  - category: CAD, document control, and handover evidence
    retrieval_policy: Use USACE CAD and COBie guidance before treating drawings, files, revision logs, or handover data as
      standardized, complete, or operations-ready.
    specialty_specific_exceptions:
    - Do not assume file issue state, layer naming, or handover spreadsheets are comparable across projects without the controlling
      standard and tenant override map.
  - category: licensure, public statements, and disclosure controls
    retrieval_policy: Use NCEES, NCARB, and SEC guidance before any claim that touches responsible control, seal-and-signature
      posture, code-sensitive judgment, or externally consumable metrics.
    specialty_specific_exceptions:
    - Do not upgrade descriptive analytics into signoff, compliance, or disclosure-safe claims when licensure, methodology,
      or approval posture is unresolved.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline workflow, but tenant PSA or ERP, timekeeping, CDE, BIM, CAD, QA or QC, permit, and
      disclosure policies remain required for safe execution.
    - Tenant retrieval must provide project type, delivery method, phase-gate map, metric dictionary, fee and utilization
      rules, contract deliverables, jurisdiction, and adjacent-owner mapping.
    - Escalate whenever public standards, client contracts, tenant policy, or jurisdictional seal or permit rules materially
      change metric definition, evidence sufficiency, or disclosure posture.
  specialty_specific_exceptions:
  - Architecture and engineering metrics often mix commercial, design-production, model-quality, permit, and handover records
    that refresh on different cadences and sit under different authority owners.
  - Fee burn, utilization, earned hours, on-time phase delivery, LOD maturity, clash closure, permit readiness, and handover
    completeness are not interchangeable without explicit tenant definitions and source precedence.
  - Open design-review comments, unresolved model issues, incomplete permit evidence, or missing seals can materially change
    the reporting posture even when a dashboard trend looks favorable.
  next_review_due_at: '2026-08-08'
