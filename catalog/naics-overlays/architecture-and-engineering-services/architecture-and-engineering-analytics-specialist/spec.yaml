knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official owner-side architecture and engineering deliverable guidance defines what records, milestones, submittals,
      and review gates make the lane materially different from generic analytics.
  - class: Recognized workflow references tied directly to the lane
    rationale: Recognized BIM and information-management standards define the planning, exchange, federation, and handover
      artifacts that govern architecture and engineering analytics.
  - class: Evidence or control standards relevant to the lane
    rationale: Public licensure and disclosure-control references define when analysis must stop short of signoff, code judgment,
      or unsupported publication claims.
  source_selection_approach: 'Use GSA and USACE sources first for owner-required design submittals, BIM

    and CAD deliverables, naming conventions, phase evidence, and model-quality

    controls. Use NIBS NBIMS-US modules for project BIM requirements, BIM

    execution planning, CDE and information-exchange concepts, and COBie

    handover evidence. Use NCARB and NCEES model rules before any sign-and-seal,

    responsible-control, competence, code, or licensure-adjacent claim. Use SEC

    KPI disclosure guidance whenever the output is being prepared for board,

    investor-like, or other external-facing reporting audiences. Tenant phase

    gates, metric dictionaries, fee and utilization rules, contract deliverable

    requirements, source precedence, disclosure approvals, and jurisdiction-

    specific seal rules remain mandatory runtime inputs and are never guessed.

    '
