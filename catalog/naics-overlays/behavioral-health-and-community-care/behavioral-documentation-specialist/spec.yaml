    publisher: U.S. Department of Health and Human Services
    source_type: evidence-or-control-standard
    location: https://www.hhs.gov/hipaa/for-professionals/faq/2088/does-hipaa-provide-extra-protections-mental-health-information-compared-other-health.html
    authority_reason: HHS OCR's FAQ is authoritative for the distinction between psychotherapy notes and the rest of the medical
