    authority_reason: SAMHSA's CCBHC criteria are an authoritative named-industry operating reference for behavioral health
      and community care documentation, care coordination records, treatment-plan review cadence, health information systems,
      and quality reporting expectations.
    last_reviewed_at: '2026-04-10'
