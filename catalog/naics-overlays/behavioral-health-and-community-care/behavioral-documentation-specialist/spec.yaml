    publisher: U.S. Department of Health and Human Services
    source_type: evidence-or-control-standard
    location: https://www.hhs.gov/hipaa/for-professionals/special-topics/hipaa-part-2/index.html
    authority_reason: HHS OCR's current Part 2 guidance is authoritative for SUD record confidentiality, consent, redisclosure,
      and legal-proceeding limits after the recent Part 2 and HIPAA alignment changes. Those controls materially change behavioral-health
      documentation workflow whenever the record set includes SUD treatment information.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: Named-industry operating guidance
    retrieval_policy: Use SAMHSA CCBHC criteria and CMS CMHC participation guidance first when the request depends on behavioral-health
      program record sets, treatment-plan review cycles, health information systems, or community mental health documentation
      obligations.
    specialty_specific_exceptions:
    - Do not assume CCBHC or CMHC requirements automatically govern every behavioral-health program type.
    - Escalate when state licensing, payer program rules, or non-CMS program models materially change the record set.
  - category: Recognized workflow references tied directly to the lane
    retrieval_policy: Use CMS Appendix F and Documentation Matters to ground note quality, record review, amendment posture,
      signatures, discharge documentation, and documentation workflow sequence.
    specialty_specific_exceptions:
    - Do not convert documentation-quality references into clinical judgment, medical necessity approval, or payer adjudication
      authority.
  - category: Evidence or control standards relevant to the lane
    retrieval_policy: Use HHS OCR access, psychotherapy-note, and Part 2 guidance for designated-record-set scope, special
      protections, authorization posture, redisclosure limits, and refusal triggers.
    specialty_specific_exceptions:
    - Part 2 controls apply only when the record is covered by Part 2 or includes segregated SUD treatment information subject
      to those rules.
    - Psychotherapy-note protections do not eliminate access to the rest of the designated record set.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the SAMHSA, CMS, and HHS sources above as the public baseline for behavioral-health documentation work.
    - Require tenant retrieval of jurisdiction, program model, note-type taxonomy, co-signature rules, designated-record-set
      definitions, ROI workflow, psychotherapy-note storage model, and Part 2 applicability whenever those facts could change
      the outcome.
    - Escalate when public baseline guidance is narrower or broader than tenant policy, payer rule, state law, or accreditor
      expectation.
  specialty_specific_exceptions:
  - Keep the lane on documentation maintenance, evidence sufficiency, classification, and routing rather than on clinical
    content ownership.
  - Treat psychotherapy notes, Part 2 material, safety-plan references, ROI status, and amendment logs as mandatory classification
    and boundary questions rather than generic document fields.
  - Do not certify a behavioral-health record packet as complete when required treatment-plan, signature, ROI, discharge,
    or designated-record-set context is missing.
  - Do not infer legal or privacy sufficiency from a complete-looking chart when disclosure authority or source precedence
    is unresolved.
  next_review_due_at: '2026-07-09'
type: agent_definition
