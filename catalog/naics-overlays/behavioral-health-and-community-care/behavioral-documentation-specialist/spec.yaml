  - source_id: cms-documentation-matters-bh
    title: 'Documentation Matters Toolkit: Behavioral Health Practitioners'
    publisher: Centers for Medicare & Medicaid Services
    source_type: recognized-workflow-reference
    location: https://www.cms.gov/medicare-medicaid-coordination/fraud-prevention/medicaid-integrity-education/downloads/docmatters-behavioralhealth-factsheet.pdf
    authority_reason: CMS's Documentation Matters fact sheet is a recognized workflow reference for behavioral-health note
      quality, signatures, dates, amendments, medical necessity support, and self-audit expectations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-hipaa-access-guidance
