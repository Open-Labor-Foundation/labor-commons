knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: SAMHSA and CMS behavioral-health operating criteria define first-contact triage, admission appropriateness,
      documentation expectations, and access obligations that make this lane materially different from generic intake.
  - class: Recognized workflow references tied directly to the lane
    rationale: SAMHSA workflow references define behavioral-health-specific screening, referral, crisis, and warm-handoff
      expectations that shape safe intake and triage sequencing.
  - class: Evidence or control standards relevant to the lane
    rationale: HIPAA, Part 2, and prior-authorization interoperability controls define what information may be used, disclosed,
      or treated as sufficient before routing work forward.
  source_selection_approach: 'Use official SAMHSA and CMS behavioral-health guidance first to anchor

    first-contact triage, admission appropriateness, referral flow, same-day or

    timely access, and immediate-risk escalation. Use HHS OCR HIPAA mental

    health guidance and 42 CFR Part 2 as the governing public privacy baseline

    for behavioral health and substance use disorder records. Require tenant

    retrieval for state licensure rules, local crisis protocols, payer prior

    authorization logic, program-capacity rules, minor-consent law overlays,

    and tenant-specific system-of-record ownership.

    '
  authority_sources:
  - source_id: samhsa-ccbhc-criteria-2023
    title: Certified Community Behavioral Health Clinic Certification Criteria
    publisher: Substance Abuse and Mental Health Services Administration
    source_type: official-program-criteria
    location: https://www.samhsa.gov/sites/default/files/ccbhc-criteria-2023.pdf
    authority_reason: SAMHSA's CCBHC criteria are an authoritative public operating baseline for behavioral health access,
      first-contact triage, timely evaluation, risk assessment, and referral handling in community behavioral health settings.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-community-mental-health-centers
    title: Community Mental Health Centers
    publisher: Centers for Medicare & Medicaid Services
    source_type: official-provider-guidance
    location: https://www.cms.gov/medicare/health-safety-standards/certification-compliance/community-mental-health-centers
    authority_reason: CMS Conditions of Participation guidance is authoritative for community mental health center admission
      appropriateness, client rights, personnel qualifications, and handoff boundaries to the interdisciplinary treatment
      team.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: samhsa-sbirt
    title: Screening, Brief Intervention, and Referral to Treatment (SBIRT)
    publisher: Substance Abuse and Mental Health Services Administration
    source_type: official-workflow-guidance
    location: https://www.samhsa.gov/substance-use/treatment/sbirt
    authority_reason: SAMHSA's SBIRT guidance is a recognized public workflow reference for early substance-use screening,
      referral, and warm-handoff expectations that directly affect behavioral health triage inputs and routing.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: samhsa-national-crisis-guidance-2025
    title: National Behavioral Health Crisis Care Guidance
    publisher: Substance Abuse and Mental Health Services Administration
    source_type: official-workflow-guidance
    location: https://www.samhsa.gov/mental-health/national-behavioral-health-crisis-care
    authority_reason: SAMHSA's national crisis guidance is the public workflow reference for distinguishing routine intake
      from crisis pathways and for routing to 988, mobile crisis, and stabilization resources when safety facts change the
      intake posture.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-hipaa-mental-health
    title: Information Related to Mental and Behavioral Health, including Opioid Overdose
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: privacy-regulatory-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/special-topics/mental-health/index.html
    authority_reason: HHS OCR guidance is authoritative for HIPAA treatment, family-sharing, minor/personal-representative,
      and health-and-safety disclosure rules as applied to behavioral health records.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ecfr-42-cfr-part-2
    title: 42 CFR Part 2 -- Confidentiality of Substance Use Disorder Patient Records
    publisher: Electronic Code of Federal Regulations / U.S. Department of Health & Human Services
    source_type: federal-privacy-regulation
    location: https://www.ecfr.gov/current/title-42/chapter-I/subchapter-A/part-2
    authority_reason: 42 CFR Part 2 is the controlling federal confidentiality rule for covered substance use disorder diagnosis,
      treatment, and referral records and materially changes disclosure, consent, and routing behavior in intake.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 60
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-prior-auth-final-rule
    title: CMS Interoperability and Prior Authorization Final Rule (CMS-0057-F)
    publisher: Centers for Medicare & Medicaid Services
    source_type: official-control-guidance
    location: https://www.cms.gov/priorities/burden-reduction/overview/interoperability/policies-regulations/cms-interoperability-prior-authorization-final-rule-cms-0057-f
    authority_reason: CMS prior-authorization interoperability guidance is an authoritative public control reference for how
      payer authorization data should be exchanged, surfaced, and treated as a dependency in access workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: behavioral-health-access-and-triage
    retrieval_policy: Use SAMHSA CCBHC criteria and CMS community mental health center guidance first for first-contact triage,
      admission appropriateness, client-rights posture, and evaluation prerequisites.
    specialty_specific_exceptions:
    - Do not generalize CCBHC or CMHC program rules into final admission or payer decisions without tenant and jurisdiction
      context.
  - category: substance-use-screening-and-referral
    retrieval_policy: Use SAMHSA SBIRT guidance for screening-to-referral workflow expectations and warm-handoff terminology
      when substance-use facts are present.
    specialty_specific_exceptions:
    - Do not convert SBIRT workflow references into clinical diagnosis or treatment recommendations.
  - category: crisis-and-immediate-safety-routing
    retrieval_policy: Use SAMHSA national crisis guidance to identify when routine intake must stop and route to crisis-specific
      response assets.
    specialty_specific_exceptions:
    - The lane flags and routes crisis indicators; it does not own crisis counseling or emergency disposition.
  - category: privacy-consent-and-authorization-controls
    retrieval_policy: Use HHS OCR HIPAA guidance, 42 CFR Part 2, and CMS prior-authorization controls for disclosure limits,
      consent conditions, and authorization retrieval dependencies.
    specialty_specific_exceptions:
    - Do not infer disclosure authority or prior authorization sufficiency without tenant policy, payer, and system confirmation.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to SAMHSA, CMS, HHS OCR, and eCFR sources for the public baseline.
    - Tenant retrieval must provide jurisdiction, program model, payer contracts, local crisis-routing rules, catchment requirements,
      and systems-of-record ownership.
    - Escalate immediately when state minor-consent law, involuntary-treatment rules, or payer prior-authorization policy
      materially alter the disposition.
  specialty_specific_exceptions:
  - This lane validates intake readiness; it does not become the final approver for treatment, admission, involuntary hold,
    or payer medical necessity.
  - Behavioral health and community care require explicit treatment of acute safety flags, Part 2 coverage, and personal-representative
    ambiguity; those facts must not be normalized into generic scheduling logic.
  - Program-capacity, catchment, and reservation rules materially change whether a case can be accepted and must be retrieved
    from tenant systems rather than guessed from public sources.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-08'
