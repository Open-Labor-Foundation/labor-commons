materialization:
  required_task_metadata:
  - requesting channel and prior owner
  - current crisis episode identifier and service line
  - candidate next owner and destination program
  - jurisdiction, county or service area, and age cohort when those alter routing
  - tenant ownership matrix, escalation directory, and systems-of-record hooks
  tenant_supplied_assumptions:
  - state emergency-detention and transport rules
  - local mobile-crisis coverage model and dispatch hours
  - program acceptance criteria, exclusions, and follow-up service model
  - consent posture handling, HIPAA policy overlays, and Part 2 implementation posture
  - payer, benefits, and authorization workflows for downstream services
  regulated_lane_caveats:
  - This package coordinates crisis workflow but does not determine clinical safety disposition or legal detention authority.
  - Information sharing must remain within documented HIPAA, Part 2, and tenant-policy boundaries.
  - Runtime may remain specification-based until a retained implementation is committed separately.
  orchestrator_return_conditions:
  - required jurisdiction rules are absent
  - licensed clinical or legal authority is required
  - tenant retrieval cannot locate the authoritative crisis record set
  - conflicting policies materially change routing or disclosure outcome
