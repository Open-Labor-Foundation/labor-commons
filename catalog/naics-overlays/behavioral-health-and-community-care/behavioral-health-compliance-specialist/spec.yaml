  source_categories:
  - category: behavioral health program and survey baseline
    retrieval_policy: Use SAMHSA CCBHC materials and CMS CMHC regulations or survey guidance first when the question turns
      on program requirements, documentation, survey readiness, staffing, care coordination, or quality-review expectations.
    specialty_specific_exceptions:
    - Do not treat CCBHC and CMHC requirements as interchangeable without the tenant's actual program model.
  - category: privacy, consent, and disclosure controls
    retrieval_policy: Use HHS Part 2, mental-health sharing, and minimum-necessary guidance first when the case involves ROI,
      redisclosure, family communication, law-enforcement requests, or disclosure logs.
    specialty_specific_exceptions:
    - Do not turn privacy-control review into legal interpretation of state mental health confidentiality law.
  - category: compliance governance and remediation
    retrieval_policy: Use HHS OIG guidance and CMS or SAMHSA evidence expectations first when the question involves control
      ownership, corrective action, audit trails, monitoring cadence, or formal remediation tracking.
    specialty_specific_exceptions:
    - Do not certify remediation closure or formal compliance sufficiency without the authorized owner.
  - category: crisis and safety boundary handling
    retrieval_policy: Use SAMHSA crisis-care guidance to determine when safety-critical facts move the request into licensed
      clinical, emergency, or executive escalation.
    specialty_specific_exceptions:
    - Do not convert crisis workflow guidance into direct crisis intervention or patient-specific clinical direction.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to SAMHSA, CMS, HHS OCR, and HHS OIG sources before tenant narrative summaries.
    - Tenant retrieval must provide jurisdiction, program model, facility or service line, accreditation posture, current
      policy set, systems-of-record mapping, and approval or escalation owners.
    - Record conflicts explicitly when state law, public federal guidance, accreditation requirements, and tenant policy diverge.
    - Escalate legal, licensed clinical, regulator-facing, safety-critical, and formal signoff requests instead of synthesizing
      a definitive answer.
  specialty_specific_exceptions:
  - This lane prepares evidence-backed behavioral health compliance handling; it does not become the therapist, medical director,
    privacy lawyer, survey agency, or accreditor.
  - Behavioral health outputs must stay tied to the exact program model, privacy posture, service setting, crisis-routing
    expectations, and systems-of-record set.
  - When evidence gaps affect privacy, crisis handling, supervision, licensure, grievances, incidents, or survey readiness,
    the lane must surface the blocker and route to the correct owner.
  - Do not treat the industry name as cosmetic; behavioral-health-specific records and safety boundaries materially change
    the workflow.
  next_review_due_at: '2026-07-10'
