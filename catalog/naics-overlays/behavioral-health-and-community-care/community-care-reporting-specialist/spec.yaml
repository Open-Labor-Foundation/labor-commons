    source_type: privacy-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR's minimum-necessary guidance is the official public control standard governing what protected
      health information may be used or disclosed in reporting and disclosure outputs.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-part-2-model-notice
    title: Model Part 2 Patient Notice
    publisher: U.S. Department of Health and Human Services
    source_type: protected-record-control-standard
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/privacy-practices-part-2/index.html
    authority_reason: HHS OCR's Part 2 notice guidance is the official control reference for patient notice and redisclosure
      warnings that materially constrain behavioral health and SUD reporting outputs in community care.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: behavioral-health reporting programs and measure specifications
    retrieval_policy: Use SAMHSA URS, MH-CLD, CCBHC criteria, and CCBHC quality-measure references first when the case turns
      on behavioral-health reporting periods, clinic-versus-state responsibilities, encounter or outcome data, survey scoring,
      or denominator thresholds.
    specialty_specific_exceptions:
    - Do not convert reporting specifications into clinical outcome claims or grant-attestation authority.
  - category: community-care quality, surveys, and public-reporting obligations
    retrieval_policy: Use Medicaid HCBS and Health Home reporting sources first when the case involves person-centered service
      contexts, HCBS quality measures, QMR reporting, HCBS CAHPS, incident-management reporting, public transparency, or stratification
      rules.
    specialty_specific_exceptions:
    - Do not imply that provider-level evidence automatically satisfies state-level aggregation, sampling, or publication
      requirements.
  - category: privacy, consent, and disclosure controls
    retrieval_policy: Use HHS minimum-necessary and Part 2 notice guidance first when the case involves recipient selection,
      redisclosure warnings, consent artifacts, small-cell sensitivity, or protected-record boundaries.
    specialty_specific_exceptions:
    - Do not answer final legal or privacy-interpretation questions without the designated privacy, compliance, or legal owner.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the SAMHSA, CMS, Medicaid.gov, and HHS sources above as the public baseline for community-care reporting work.
    - Require tenant-supplied program authority, jurisdiction, reporting audience, publication channel, metric dictionary,
      and source-precedence rules whenever those facts could change the answer.
    - Inject tenant-specific state templates, managed-care contracts, survey-vendor rules, QMR or grant submission windows,
      and small-cell suppression rules only through orchestrator-controlled retrieval.
    - Escalate when public baseline guidance is narrower or broader than tenant policy, state requirements, managed-care contract
      terms, or grant conditions.
  specialty_specific_exceptions:
  - Keep the lane on metric-definition handling, reporting assembly, traceability, caveats, and escalation rather than on
    clinical interpretation or quality-improvement policy judgment.
  - Treat person-centered service plans, encounters, authorizations, claims lags, incident logs, survey method notes, consent
    posture, and public-reporting thresholds as mandatory records rather than generic data points.
  - Do not collapse community care into generic analytics; community mental health, HCBS, Health Home, and CCBHC workflows
    materially change the evidence set.
  - Do not assume one reporting regime governs all programs. Runtime must retrieve whether the work is URS or MH-CLD, CCBHC,
    Health Home, HCBS, managed-care, or other community-care reporting before final guidance is given.
  source_baseline_version: '2026-04-07'
  next_review_due_at: '2026-08-08'
