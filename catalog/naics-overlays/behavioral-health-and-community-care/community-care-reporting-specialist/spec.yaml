    location: https://www.medicaid.gov/medicaid/quality-of-care/downloads/2026-1945-health-home-core-set.pdf
    authority_reason: CMS's 2026 Health Home Core Set is the official public reference for behavioral-health-relevant community-care
      measures, allowed data-collection methods, and system types such as claims, encounters, EHRs, registries, lab reports,
      pharmacy systems, and case-management registries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-minimum-necessary
