    source_type: official-metric-specification
    location: https://www.samhsa.gov/sites/default/files/ccbhc-quality-measures-technical-specifications-manual.pdf
    authority_reason: SAMHSA's technical manual is the official metric-definition and reporting reference for behavioral health
      clinics, specifying allowable data sources, clinic-versus-state reporting responsibilities, denominator thresholds,
      and data-reporting template behavior.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
