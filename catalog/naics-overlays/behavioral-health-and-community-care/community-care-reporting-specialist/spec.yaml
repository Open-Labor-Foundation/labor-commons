- grant-compliance-and-reporting-specialist
knowledge_baseline:
  source_classes:
  - class: Behavioral-health program reporting guidance
    rationale: Official SAMHSA and CMS behavioral-health reporting sources define required records, reporting cadence, measure
      submission mechanics, and community-care terminology that materially change this lane.
  - class: Community-care quality, survey, and program reporting references
    rationale: Official Medicaid community-care and quality sources define experience-of-care surveys, person-centered service
      contexts, incident-management expectations, and public-reporting obligations tied directly to community care.
  - class: Privacy, disclosure, and protected-record control standards
    rationale: HHS privacy and Part 2 sources define minimum-necessary, consent, redisclosure, and protected-record boundaries
      that constrain reporting outputs.
  source_selection_approach: 'Use primary SAMHSA, CMS, Medicaid.gov, and HHS OCR sources first for

    community mental health, community-care quality, survey, and disclosure

    workflows. Treat those public sources as the baseline for reportable

    artifacts, cadence, data-source expectations, and refusal triggers. Apply

    tenant, state, plan, grant, or program-specific rules only when they are

    explicitly retrieved and shown to narrow or override the public baseline.

    '
  authority_sources:
  - source_id: samhsa-urs-table-instructions
    title: 2023 Uniform Reporting System Table Instructions
    publisher: Substance Abuse and Mental Health Services Administration
    source_type: official-reporting-instructions
    location: https://www.samhsa.gov/data/sites/default/files/URSTables2023/2023-URS-Table-Instructions.pdf
    authority_reason: SAMHSA's URS instructions are the official public reporting instructions for state community mental
      health reporting artifacts, reporting periods, survey scoring, data comments, and public-table preparation used in the
      community behavioral health ecosystem.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: samhsa-mh-cld-submission-deadlines
    title: What is the due date for MH-CLD data submission to use MH-CLD data to populate the URS tables?
    publisher: Substance Abuse and Mental Health Services Administration
    source_type: official-reporting-workflow-guidance
    location: https://www.samhsa.gov/data/faq/mh-cld-and-community-mental-health-services-block-grant-mhbg/what-due-date-mh-cld-data
    authority_reason: SAMHSA's MH-CLD submission FAQ is the official workflow guidance for due dates, reporting periods, processing
      deadlines, and fallback responsibility when MH-CLD data is used to populate URS tables.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: samhsa-ccbhc-criteria
