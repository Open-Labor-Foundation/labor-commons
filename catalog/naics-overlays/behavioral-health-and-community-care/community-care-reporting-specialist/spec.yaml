    publisher: Substance Abuse and Mental Health Services Administration
    source_type: official-program-guidance
    location: https://www.samhsa.gov/sites/default/files/ccbhc-criteria-2023.pdf
    authority_reason: SAMHSA's CCBHC criteria are the official program requirements for behavioral-health community clinics,
      including required capacity to collect, report, and track encounter, outcome, and quality data and to capture information
      electronically where feasible.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
