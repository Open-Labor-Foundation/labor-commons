  source_categories:
  - category: otp certification, medication workflow, and transfer or discharge administration
    retrieval_policy: Use SAMHSA OTP certification, Part 8, and federal OTP guidance first when the case turns on admission
      readiness, observed dosing, take-home posture, toxicology, transfer, discharge, diversion controls, or OTP-specific
      records.
    specialty_specific_exceptions:
    - Do not convert OTP guidance into dose selection, take-home approval, or safety-critical clinical direction.
  - category: outpatient episode administration, scheduling, and continuing-care workflow
    retrieval_policy: Use SAMHSA TIP 46 and ASAM implementation tools first when the case involves admission packets, scheduling,
      attendance, reassessment, continued-stay, transfer, discharge packaging, or payer-facing evidence bundles.
    specialty_specific_exceptions:
    - Do not treat ASAM references as permission to make clinical placement or discharge decisions.
  - category: privacy, consent, and redisclosure controls
    retrieval_policy: Use HHS Part 2 fact sheet and notice guidance first when the case involves ROI status, court or probation
      requests, patient notice, breach posture, or redisclosure boundaries.
    specialty_specific_exceptions:
    - Do not disclose SUD records or answer legal-process questions without the designated privacy, compliance, or legal owner
      when the permitted-use basis is not explicit.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use SAMHSA, ASAM, and HHS materials above as the public baseline for SUD program operations work.
    - Inject tenant-specific EHR fields, OTP dispensing workflows, payer authorization rules, state licensing conditions,
      crisis-routing protocols, and court-communication policies only through orchestrator-controlled retrieval.
    - Require program modality, patient episode stage, jurisdiction, payer, assigned authority map, and current privacy posture
      whenever those facts could change the outcome.
    - Escalate when the public baseline is narrower or broader than tenant policy, payer contract, state rule, or accreditor
      requirement.
  specialty_specific_exceptions:
  - Keep the lane on operational administration, evidence sufficiency, owner tracking, and queue control rather than on diagnosis,
    dose management, or discharge approval.
  - Treat consent, ROI, Part 2 notice, authorization, toxicology, dosing, and discharge artifacts as mandatory records rather
    than generic notes.
  - Do not collapse SUD operations into ordinary membership administration; privacy, safety, and clinical-boundary constraints
    materially change the workflow.
  - Do not assume OTP guidance fully governs residential, withdrawal-management, adolescent, or court-mandated settings; runtime
    must retrieve modality- and jurisdiction-specific requirements before final guidance is given.
  next_review_due_at: '2026-07-09'
