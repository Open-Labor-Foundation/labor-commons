    publisher: Substance Abuse and Mental Health Services Administration
    source_type: recognized-workflow-reference
    location: https://library.samhsa.gov/sites/default/files/national-guidelines-crisis-care-pep24-01-037.pdf
    authority_reason: SAMHSA's national crisis-care guideline is a recognized public workflow reference for crisis-line, mobile-crisis,
      stabilization, follow-up, care-coordination, and handoff expectations across the behavioral-health system.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: samhsa-bhc-quality-manual-2024
    title: 'Quality Measures for Behavioral Health Clinics: Technical Specifications and Resource Manual'
    publisher: Substance Abuse and Mental Health Services Administration
    source_type: recognized-workflow-reference
    location: https://www.samhsa.gov/sites/default/files/ccbhc-quality-measures-technical-specifications-manual.pdf
    authority_reason: SAMHSA's 2024 behavioral-health clinic quality-measures manual is a recognized workflow reference for
      the evidence fields, record sources, measure windows, and reporting terminology that operations teams must track for
      behavioral-health follow-up and service-completion workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-hipaa-mental-health-guidance
    title: HIPAA Privacy Rule and Sharing Information Related to Mental Health
    publisher: U.S. Department of Health and Human Services
    source_type: evidence-or-control-standard
    location: https://www.hhs.gov/sites/default/files/hipaa-privacy-rule-and-sharing-info-related-to-mental-health.pdf
    authority_reason: HHS OCR is authoritative for HIPAA Privacy Rule interpretation. This guidance is the public control
      baseline for when mental-health information may be shared, when professional judgment matters, and when disclosures
      tied to serious and imminent threat or family involvement are constrained.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-part-2-final-rule-fact-sheet
    title: Fact Sheet 42 CFR Part 2 Final Rule
    publisher: U.S. Department of Health and Human Services
    source_type: evidence-or-control-standard
    location: https://www.hhs.gov/hipaa/for-professionals/regulatory-initiatives/fact-sheet-42-cfr-part-2-final-rule/index.html
    authority_reason: HHS is authoritative for the current Part 2 baseline. The fact sheet is the public control reference
      for when behavioral-health records include SUD treatment information that carries stricter consent, redisclosure, and
      breach-handling requirements.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: behavioral-health clinic intake, treatment-plan, coordination, and discharge administration
    retrieval_policy: Use SAMHSA CCBHC criteria and CMS CMHC Appendix F first when the case turns on intake readiness, assessment
      and treatment-plan completeness, interdisciplinary coordination, documentation cadence, transfer, discharge, or QAPI-sensitive
      recordkeeping.
    specialty_specific_exceptions:
    - Do not convert clinic operating guidance into diagnosis, crisis-disposition, or medical-necessity decisions.
  - category: crisis-continuum routing and transition workflow
    retrieval_policy: Use SAMHSA crisis-care guidelines and the SAMHSA behavioral-health quality-measures manual first when
      the case involves mobile crisis, stabilization follow-up, emergency or inpatient discharge transitions, care-coordination
      handoffs, or follow-up measure windows.
    specialty_specific_exceptions:
    - Do not treat crisis workflow references as permission to make risk determinations or involuntary-treatment decisions.
  - category: privacy, confidentiality, and controlled disclosure handling
    retrieval_policy: Use HHS HIPAA mental-health guidance first for mental-health information sharing questions and HHS Part
      2 guidance when the record includes SUD treatment information or redisclosure controls that materially change the answer.
    specialty_specific_exceptions:
    - Do not disclose protected information or answer legal-process questions without the designated privacy, compliance,
      or legal owner when the permitted-use basis is not explicit.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use SAMHSA, CMS, and HHS materials above as the public baseline for behavioral-health operations work.
    - Inject tenant-specific EHR fields, county or state program rules, payer authorization rules, crisis-vendor workflows,
      and disclosure policies only through orchestrator-controlled retrieval.
    - Require program model, jurisdiction, patient or episode stage, payer or funding source, crisis posture, and current
      privacy posture whenever those facts could change the outcome.
    - Escalate when the public baseline is narrower or broader than tenant policy, state rule, county contract, payer policy,
      or accreditor expectation.
  specialty_specific_exceptions:
  - Keep the lane on behavioral-health operations administration, evidence sufficiency, owner tracking, and queue control
    rather than on clinical or licensed care decisions.
  - Treat referrals, assessments, treatment plans, crisis or safety plan references, ROI and consent records, care-coordination
    notes, authorization packets, discharge summaries, and incident or grievance artifacts as mandatory named records rather
    than generic notes.
  - Do not collapse behavioral-health operations into ordinary scheduling or CRM administration; privacy, crisis, and care-plan
    constraints materially change the workflow.
  - Do not assume CCBHC or CMHC guidance fully resolves every school-based, ACT, residential, peer-support, or county-contracted
    behavioral-health workflow; runtime must retrieve tenant program model and jurisdiction before final guidance is given.
  next_review_due_at: '2026-08-08'
type: agent_definition
