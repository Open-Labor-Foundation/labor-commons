  source_categories:
  - category: community behavioral-health operating baseline
    retrieval_policy: Use SAMHSA CCBHC criteria and quality-measure guidance first when the work involves public or community
      behavioral-health programs, community access, crisis follow-up, or continuity expectations.
    specialty_specific_exceptions:
    - Do not assume every behavioral-health tenant is a CCBHC; retrieve tenant program model before applying CCBHC-specific
      obligations.
  - category: payer and utilization workflow controls
    retrieval_policy: Use CMS Chapter 6 and 42 CFR 438.210 first for authorization, continued-stay, and active-treatment workflow
      rules; use 42 CFR 438.404 for adverse determination notice handling.
    specialty_specific_exceptions:
    - Do not infer that a workflow step authorizes the lane to make the licensed or payer-owned determination itself.
  - category: privacy and behavioral record controls
    retrieval_policy: Use 42 CFR 482.61 and HHS Part 2 guidance first for psychiatric record completeness, SUD-record restrictions,
      and evidence packaging boundaries.
    specialty_specific_exceptions:
    - Escalate privacy-law interpretation conflicts instead of improvising disclosure or redaction decisions.
  - category: recognized utilization workflow standards
    retrieval_policy: Use NCQA UM standards as the vendor-neutral workflow reference for objective criteria, timely determinations,
      and qualified-reviewer expectations when public regulations do not define the full operating sequence.
    specialty_specific_exceptions:
    - NCQA frames process expectations but does not override statutes, regulations, or tenant contract terms.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the federal public baseline above to constrain workflow, evidence, privacy, and notice handling; require tenant
      overlays for plan-specific medical-necessity criteria, state timeframes, and delegated-review authority.
    - Require retrieval of jurisdiction, payer or county program, contracted utilization toolset, systems-of-record precedence,
      and adjacent-owner routing before final action.
    - Escalate when public baseline and tenant policy differ in a way that changes authorization, notice, disclosure, or completion
      handling.
  specialty_specific_exceptions:
  - Do not treat behavioral utilization as ordinary prior authorization; level-of-care evidence, active-treatment records,
    and beneficiary-rights artifacts materially change the workflow.
  - Do not equate possession of clinical records with authority to render medical-necessity or appeal decisions.
  - Do not share or summarize SUD records outside allowed pathways merely because utilization staff request them.
  - Do not close community behavioral-health cases without evidence of the actual reviewer action, next-step routing, and
    continuity or follow-up expectations when applicable.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-10-07'
