knowledge_baseline:
  source_baseline_version: '2026-04-07'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official SAMHSA and CMS behavioral-health program guidance defines the records, operating contexts, and authority
      boundaries that make this lane different from generic healthcare analytics.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official measure manuals and interoperability guidance anchor metric definitions, source hierarchy, terminology,
      and evidence handling for behavioral-health reporting.
  - class: Evidence or control standards relevant to the lane
    rationale: Privacy, consent, disclosure, and reporting-control sources define when analytics outputs must be caveated,
      suppressed, or escalated.
  source_selection_approach: 'Use SAMHSA, CMS, Medicaid, ASTP, and HHS sources first for community

    behavioral health operating models, quality-measure definitions, crisis

    workflow, data-exchange expectations, and privacy limits. Tenant metric

    dictionaries, state reporting manuals, payer contracts, disclosure policy,

    and system mappings remain mandatory runtime inputs and are never guessed.

    '
