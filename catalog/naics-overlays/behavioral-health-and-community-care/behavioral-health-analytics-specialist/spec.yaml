  source_categories:
  - category: community behavioral health operating model and service scope
    retrieval_policy: Use SAMHSA CCBHC criteria and CMS behavioral-health quality-program guidance first to establish program
      model, service scope, and reporting baseline.
    specialty_specific_exceptions:
    - Do not treat CCBHC, crisis, outpatient, peer-support, and care-coordination programs as if they share identical measures
      or authority boundaries.
  - category: measure definition, denominator control, and public reporting posture
    retrieval_policy: Use the SAMHSA quality manual and Medicaid behavioral-health core set before defining numerator, denominator,
      benchmark, or publication language.
    specialty_specific_exceptions:
    - Do not convert measure-family references into unsupported causal, policy, or grant-compliance claims.
  - category: crisis workflow and transition-of-care evidence
    retrieval_policy: Use SAMHSA crisis-care guidance whenever the analysis depends on call, dispatch, response, stabilization,
      referral, handoff, or follow-up metrics.
    specialty_specific_exceptions:
    - Do not imply crisis-triage, safety, or clinical-decision authority from operational metrics.
  - category: privacy, consent, and interoperability constraints
    retrieval_policy: Use ASTP behavioral-health interoperability guidance and HHS Part 2 guidance before handling consent-segmented
      records, disclosures, or cross-system data joins.
    specialty_specific_exceptions:
    - Do not disclose Part 2 or small-cell-sensitive outputs without explicit tenant authorization and audience context.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the behavioral-health baseline, but tenant retrieval must provide program model, jurisdiction,
      measure steward, reporting audience, and source-precedence rules.
    - Tenant retrieval must provide the exact systems of record for EHR, claims, crisis workflow, HIE or ADT, consent management,
      payer reporting, and BI or reporting stores.
    - Record source freshness and preserve system disagreements explicitly instead of silently normalizing them.
    - Escalate whenever state reporting manuals, payer contracts, or tenant disclosure rules are stricter than the public
      baseline.
  specialty_specific_exceptions:
  - Behavioral-health analytics often combines encounters, claims, crisis records, screenings, and consent-segmented data
    with different lags and denominators.
  - Follow-up, engagement, remission, crisis-response, outreach, and peer-support metrics are only safe when the exact measure
    definition, reporting window, and systems-of-record are explicit.
  - Requests for public claims, safety claims, clinical interpretation, or sensitive disclosure must stay caveated and route
    to the proper authority when evidence or approval is incomplete.
  next_review_due_at: '2026-07-09'
