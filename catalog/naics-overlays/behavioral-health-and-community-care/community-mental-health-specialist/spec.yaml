    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-hipaa-access-right
    title: Individuals' Right under HIPAA to Access their Health Information
    publisher: U.S. Department of Health and Human Services, Office for Civil Rights
    source_type: evidence-or-control-standard
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/access/index.html
    authority_reason: The HIPAA access guidance defines what belongs to the designated record set, timeliness expectations,
      and record-access boundaries that constrain completion and disclosure workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-part-2-overview
    title: Understanding Confidentiality of Substance Use Disorder (SUD) Patient Records or Part 2
    publisher: U.S. Department of Health and Human Services
    source_type: evidence-or-control-standard
    location: https://www.hhs.gov/hipaa/part-2/index.html
    authority_reason: HHS states the current Part 2 privacy baseline, CARES Act changes, compliance date, and legal-proceeding
