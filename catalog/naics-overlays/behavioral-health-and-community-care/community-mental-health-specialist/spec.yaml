    location: https://www.samhsa.gov/communities/certified-community-behavioral-health-clinics
    authority_reason: SAMHSA defines the federal CCBHC model, required service set, care coordination expectations, and the
      community behavioral health terminology that materially shapes this lane.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-cmhc-som-qso20-05
