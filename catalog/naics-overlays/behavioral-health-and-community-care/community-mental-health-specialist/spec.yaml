    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: samhsa-ccbhc-quality-measures
    title: CCBHC Quality Measures Guidance and Webinars
    publisher: Substance Abuse and Mental Health Services Administration
    source_type: recognized-workflow-reference
    location: https://www.samhsa.gov/communities/certified-community-behavioral-health-clinics/quality-measures
    authority_reason: SAMHSA ties community behavioral health execution to concrete follow-up, access, and quality-measure
      evidence expectations rather than generic case completion.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: community mental health operating guidance
    retrieval_policy: Use SAMHSA and CMS public guidance to anchor the default service model, required records, and execution
      stages before applying tenant-specific program overlays.
    specialty_specific_exceptions:
    - Do not assume every tenant is a CCBHC or CMS-certified CMHC; retrieve the local program model before treating an artifact
      as mandatory.
  - category: privacy and disclosure controls
    retrieval_policy: Use HHS OCR HIPAA and Part 2 guidance as the minimum public baseline, then apply stricter state or tenant
      privacy rules through runtime retrieval.
    specialty_specific_exceptions:
    - When mental health and SUD records are combined, Part 2 and state law may narrow what can be shared beyond generic HIPAA
      assumptions.
  - category: crisis routing and follow-up
    retrieval_policy: Use SAMHSA crisis-care guidance to define escalation boundaries, then require tenant crisis-call, mobile
      crisis, or emergency handoff contacts before action.
    specialty_specific_exceptions:
    - Do not rely on routine follow-up workflows when available facts indicate an active crisis or safety threat.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline only; tenant program, jurisdiction, payer, and licensure overlays must be retrieved
      before final execution decisions.
    - Escalate when community mental health records span multiple systems and no designated source of truth is available.
    - Preserve the public baseline when tenant language differs, and record the tenant-specific mapping explicitly.
  specialty_specific_exceptions:
  - This lane handles operational progression, not licensed psychotherapy, psychiatry, diagnosis, or commitment decisions.
  - A generic CRM ticket or customer-service closeout cannot substitute for the designated behavioral health record.
  - When crisis indicators or privacy conflicts appear, the lane must stop routine execution and route immediately.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-10-10'
notes:
- Runtime remains specification-based until an explicit trusted built specialist is promoted separately.
- The lane is intentionally distinct from generic care coordination or service operations because community mental health
  records, crisis routing, and privacy controls materially change what it can do.
