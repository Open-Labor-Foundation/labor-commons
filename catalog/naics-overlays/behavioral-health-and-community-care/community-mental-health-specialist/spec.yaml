    publisher: Centers for Medicare & Medicaid Services
    source_type: recognized-workflow-reference
    location: https://www.cms.gov/files/document/qso-20-05-cmhc.pdf
    authority_reason: CMS sets authoritative operating, documentation, assessment, treatment-plan, discharge, and quality
      expectations for federally governed community mental health center workflows.
