    title: 2025 National Guidelines for a Behavioral Health Coordinated System of Crisis Care
    publisher: Substance Abuse and Mental Health Services Administration
    source_type: recognized-workflow-reference
    location: https://library.samhsa.gov/sites/default/files/national-guidelines-crisis-care-pep24-01-037.pdf
    authority_reason: SAMHSA's national crisis-care guidance defines when routine community mental health execution must stop
      and convert into crisis routing, safety planning, warm handoff, and follow-up obligations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-mental-health-hipaa
