  source_categories:
  - category: bank and depository regulatory-reporting workflow
    retrieval_policy: Use OCC regulatory-reporting guidance and FFIEC Call Report instructions first for governance, reporting
      process, line support, amendments, and edit-resolution posture.
    specialty_specific_exceptions:
    - Do not use public Call Report rules to invent tenant-specific chart-of-accounts mappings, top-side entries, or delegated
      signoff authority.
  - category: holding-company reporting workflow
    retrieval_policy: Use the Federal Reserve FR Y-9C reporting page and instructions first when the tenant is a holding company
      or consolidated reporting entity.
    specialty_specific_exceptions:
    - Escalate when consolidation scope, reportability, or legal-entity perimeter is unclear and would change the reported
      outcome.
  - category: insurance filing and financial-reporting controls
    retrieval_policy: Use NAIC filing guidance and Model 205 for insurer filing mechanics, control expectations, retention
      posture, and management-report dependencies.
    specialty_specific_exceptions:
    - State-specific supplements, domestic-state requirements, and insurer filing software rules must be retrieved from tenant
      or jurisdiction context rather than guessed.
  - category: risk data aggregation and reconciliation control standards
    retrieval_policy: Use BCBS 239 to constrain assertions about data lineage, reconciliation quality, timeliness, and reporting-control
      effectiveness.
    specialty_specific_exceptions:
    - Do not treat control standards as permission to override line instructions, accounting policy, or attestation requirements.
  authority_sources_review_notes:
  - Prioritize primary regulators and official instructions before recognized standards or cross-industry control frameworks.
  - Record source freshness, review date, and decay posture for every source.
  - Escalate when public-source and tenant-policy interpretation materially change reportability, adjustment treatment, or
    filing readiness.
