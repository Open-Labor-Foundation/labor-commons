- customer-complaints-and-regulatory-response-specialist
- accounting-and-financial-close-specialist
knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Financial regulator or consumer-protection guidance
    rationale: Primary banking and consumer-finance regulators define error-resolution, funds-availability, recordkeeping,
      suspicious-activity, and disclosure boundaries that banking operations must respect.
  - class: Public servicing, payments, or policy workflow rules
    rationale: Federal Reserve operating rules and official workflow guides define check, ACH, returned-item, and servicing-stage
      expectations that govern banking-operations execution.
  - class: Risk-control or reconciliation standards
    rationale: FDIC examination policy and recognized financial-services standards constrain segregation of duties, reconcilement
      discipline, and unsupported completion behavior.
  source_selection_approach: 'Use Federal Reserve, CFPB, FFIEC, FinCEN, FDIC, and recognized standards

    sources before drafting workflow claims. Treat tenant product mappings,

    approval matrices, cutoff rules, state-specific notice requirements,

    account-agreement terms, and system-of-record precedence as runtime

    retrieval dependencies that narrow but do not replace the public baseline.

    '
  authority_sources:
  - source_id: fed-reg-cc-guide
    title: A Guide to Regulation CC Compliance
    publisher: Board of Governors of the Federal Reserve System
    source_type: public-servicing-workflow-reference
    location: https://www.federalreserve.gov/Pubs/regcc/regcc.htm
    authority_reason: The Federal Reserve publishes this official guide to the funds-availability and check-collection rule,
      making it authoritative for hold notices, returned-check handling, and deposit-operations workflow boundaries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cfpb-reg-e-1005-11
    title: 12 CFR 1005.11 Procedures for Resolving Errors
    publisher: Consumer Financial Protection Bureau
    source_type: financial-regulator-guidance
    location: https://www.consumerfinance.gov/rules-policy/regulations/1005/11/
    authority_reason: CFPB is authoritative for Regulation E implementation, and the rule text directly governs evidence,
      timing, provisional-credit, and customer-notice boundaries for electronic transaction error handling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: frbservices-oc3
    title: 'Operating Circular 3: Collection of Cash Items and Returned Checks'
    publisher: Federal Reserve Banks / Federal Reserve Financial Services
    source_type: public-banking-workflow-rule
    location: https://www.frbservices.org/binaries/content/assets/crsocms/resources/rules-regulations/010526-operating-circular-3.pdf
    authority_reason: Operating Circular 3 is the Federal Reserve Banks' public operating rule for collection of cash items
      and returned checks, making it authoritative for check-operations workflow, returns, and adjustment boundaries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: frbservices-oc4
    title: 'Operating Circular 4: Automated Clearing House Items'
    publisher: Federal Reserve Banks / Federal Reserve Financial Services
    source_type: public-banking-workflow-rule
    location: https://www.frbservices.org/binaries/content/assets/crsocms/resources/rules-regulations/010526-operating-circular-4.pdf
    authority_reason: Operating Circular 4 is the Federal Reserve Banks' public operating rule for ACH credit and debit items,
      making it authoritative for ACH posting, return, and exception-handling boundaries in banking operations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ffiec-funds-transfer-recordkeeping
    title: FFIEC BSA/AML Manual - Funds Transfers Recordkeeping
    publisher: Federal Financial Institutions Examination Council
    source_type: financial-regulator-guidance
    location: https://bsaaml.ffiec.gov/manual/AssessingComplianceWithBSARegulatoryRequirements/09
    authority_reason: The FFIEC BSA/AML Manual is official interagency examination guidance used by U.S. banking regulators,
      making it authoritative for required transfer records, Travel Rule handling, and evidence sufficiency.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ffiec-suspicious-activity-reporting
    title: FFIEC BSA/AML Manual - Suspicious Activity Reporting
    publisher: Federal Financial Institutions Examination Council
    source_type: financial-regulator-guidance
    location: https://bsaaml.ffiec.gov/manual/AssessingComplianceWithBSARegulatoryRequirements/04
    authority_reason: The FFIEC SAR section is authoritative interagency guidance for suspicious-activity escalation, confidentiality
      posture, and refusal of unsupported fraud or AML conclusions.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: fincen-sar-supporting-documentation
    title: Suspicious Activity Report Supporting Documentation
    publisher: Financial Crimes Enforcement Network
    source_type: financial-regulator-guidance
    location: https://www.fincen.gov/resources/statutes-regulations/guidance/suspicious-activity-report-supporting-documentation
    authority_reason: FinCEN is the primary U.S. authority for BSA administration and this guidance is authoritative for SAR-supporting-document
      retention and disclosure boundaries that banking operations cannot bypass.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: fdic-internal-routine-controls
    title: Risk Management Manual of Examination Policies Section 4.2 Internal Routine and Controls
    publisher: Federal Deposit Insurance Corporation
    source_type: risk-control-or-reconciliation-standard
    location: https://www.fdic.gov/resources/supervision-and-examinations/examination-policies-manual/section4-2.pdf
    authority_reason: FDIC examination policy is authoritative for internal controls, segregation of duties, reconcilements,
      transaction processing, and audit expectations in insured depository institutions.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: iso-20022
    title: ISO 20022 Financial Services Messaging
    publisher: International Organization for Standardization
    source_type: recognized-standard-organization
    location: https://www.iso20022.org/
    authority_reason: ISO 20022 is the recognized public standard for normalized financial-services messaging vocabulary used
      across banking payment, account, and reconciliation records.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 730
    decay_policy: review_required_after_interval
    status: active
  - source_id: bis-pfmi
    title: Principles for Financial Market Infrastructures
    publisher: Committee on Payments and Market Infrastructures and IOSCO / Bank for International Settlements
    source_type: risk-control-or-reconciliation-standard
    location: https://www.bis.org/cpmi/publ/d101.htm
    authority_reason: CPMI-IOSCO PFMI is the recognized public control standard for operational risk, settlement discipline,
      and reconciliation-sensitive financial processing.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: deposit and check workflow handling
    retrieval_policy: Use Federal Reserve Regulation CC and Operating Circular 3 sources first when the workflow touches holds,
      collected funds, check adjustments, or returned-item handling.
    specialty_specific_exceptions:
    - Do not state funds are available or a returned-check issue is resolved unless the core, hold record, and tenant policy
      agree.
  - category: electronic transaction and ACH handling
    retrieval_policy: Use CFPB Regulation E and Operating Circular 4 sources first when the workflow touches electronic error
      resolution, ACH posting, ACH returns, or notice-sensitive transaction handling.
    specialty_specific_exceptions:
    - Do not convert provisional-credit or ACH exception rules into a final customer or fraud outcome without tenant and product
      context.
  - category: recordkeeping, suspicious activity, and retention controls
    retrieval_policy: Use FFIEC and FinCEN sources before responding to suspicious activity, transfer-record gaps, SAR-sensitive
      evidence, or record-retention questions.
    specialty_specific_exceptions:
    - Do not disclose SAR posture, investigative details, or fraud clearance status.
  - category: operational controls and reconciliation
    retrieval_policy: Use FDIC control guidance, ISO 20022 vocabulary, and CPMI-IOSCO PFMI before recommending reconcilement
      closure, unsupported corrections, or terminology normalization across systems.
    specialty_specific_exceptions:
    - Do not mark work complete when core-banking, item-processing, payment, and general-ledger records do not materially
      agree.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant product maps, state-specific notice rules, approval thresholds, adjustment authority, and system-of-record
      precedence only through orchestrator-controlled retrieval.
    - Require product, jurisdiction, customer segment, account type, and current systems-of-record context before applying
      a banking outcome to a tenant case.
    - Record unresolved ambiguity instead of guessing when deposit, payments, fraud, or jurisdiction-specific rules materially
      change the answer.
  specialty_specific_exceptions:
  - Keep the lane focused on banking operations execution, evidence review, exception handling, and completion records rather
    than customer-support scripting or credit decisions.
  - Separate operational handling from legal interpretation, regulated advice, fraud disposition, AML disposition, underwriting,
    and formal accounting ownership.
  - Do not imply that a banking workflow is complete solely because one queue or tracker shows done while authoritative records
    conflict.
  next_review_due_at: '2026-08-08'
