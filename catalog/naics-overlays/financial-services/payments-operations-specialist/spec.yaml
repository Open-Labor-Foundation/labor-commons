knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Financial regulator or consumer-protection guidance
    rationale: Primary banking and consumer-finance regulators define the error-resolution, remittance, disclosure, suspicious-activity,
      and recordkeeping boundaries that payment operations must respect.
  - class: Public servicing, payments, or policy workflow rules
    rationale: Official payment-rail operating rules define ACH and wire workflow stages, timing, participant responsibilities,
      and records that establish transaction truth.
  - class: Risk-control or reconciliation standards
    rationale: Recognized banking-control and payment-risk standards constrain reconciliation, exception handling, segregation
      of duties, and unsupported correction behavior.
  source_selection_approach: 'Use Federal Reserve, Federal Reserve Financial Services, CFPB, FFIEC, FDIC,

    and BIS sources before drafting workflow claims. Treat tenant approval

    matrices, product mappings, jurisdiction-specific notice rules, accounting

    policies, insurer disbursement procedures, and network-specific exception

    playbooks as runtime retrieval dependencies that narrow but do not replace

    the public baseline.

    '
  authority_sources:
  - source_id: frb-fedach
    title: Automated Clearinghouse Services
    publisher: Board of Governors of the Federal Reserve System
    source_type: public-payments-workflow-reference
    location: https://www.federalreserve.gov/paymentsystems/fedach_about.htm
    authority_reason: The Federal Reserve is an operator of ACH services and this official source is authoritative for ACH
      service structure, settlement posture, and terminology used in payment operations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: frbservices-oc4
    title: 'Operating Circular 4: Automated Clearing House Items'
    publisher: Federal Reserve Banks / Federal Reserve Financial Services
    source_type: public-payments-workflow-rule
    location: https://www.frbservices.org/resources/rules-regulations/operating-circulars.html
    authority_reason: Operating Circular 4 is the Federal Reserve Banks' public operating rule for clearing and settlement
      of commercial ACH credit and debit items, making it authoritative for ACH payment-operations workflow boundaries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: frb-fedwire-funds
    title: Fedwire Funds Service
    publisher: Board of Governors of the Federal Reserve System
    source_type: public-payments-workflow-reference
    location: https://www.federalreserve.gov/paymentsystems/fedfunds_about.htm
    authority_reason: The Federal Reserve operates the Fedwire Funds Service and is the authoritative public source for transfer
      finality posture, participant roles, and wire-processing terminology.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: frbservices-oc6
    title: 'Operating Circular 6: Funds Transfers Through the Fedwire Funds Service'
    publisher: Federal Reserve Banks / Federal Reserve Financial Services
    source_type: public-payments-workflow-rule
    location: https://www.frbservices.org/resources/rules-regulations/operating-circulars.html
    authority_reason: Operating Circular 6, together with Regulation J, defines the public duties, timing, and handling obligations
      for Fedwire funds transfers and is authoritative for wire exception boundaries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cfpb-reg-e-1005-11
    title: 12 CFR 1005.11 Procedures for Resolving Errors
    publisher: Consumer Financial Protection Bureau
    source_type: financial-regulator-guidance
    location: https://www.consumerfinance.gov/rules-policy/regulations/1005/11/
    authority_reason: CFPB is authoritative for Regulation E implementation, and the rule text is directly relevant to error-resolution
      timing, evidence, and communication boundaries for disputed electronic payments.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cfpb-reg-e-1005-33
    title: 12 CFR 1005.33 Procedures for Resolving Errors
    publisher: Consumer Financial Protection Bureau
    source_type: consumer-protection-regulation
    location: https://www.consumerfinance.gov/rules-policy/regulations/1005/33/
    authority_reason: CFPB's remittance-transfer error-resolution rule is authoritative for disclosure-sensitive consumer
      payment cases where cancellation, refund, or investigation handling materially changes the workflow.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ffiec-funds-transfer-recordkeeping
    title: Funds Transfers Recordkeeping
    publisher: Federal Financial Institutions Examination Council BSA/AML InfoBase
    source_type: financial-regulator-guidance
    location: https://bsaaml.ffiec.gov/manual/AssessingComplianceWithBSARegulatoryRequirements/09
    authority_reason: FFIEC provides official interagency examination guidance used by U.S. banking regulators, making this
      source authoritative for required transfer records and low-confidence triggers when payment evidence is incomplete.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ffiec-sar
    title: Suspicious Activity Reporting
    publisher: Federal Financial Institutions Examination Council BSA/AML InfoBase
    source_type: financial-regulator-guidance
    location: https://bsaaml.ffiec.gov/manual/AssessingComplianceWithBSARegulatoryRequirements/04
    authority_reason: FFIEC's official suspicious-activity reporting guidance is authoritative for escalation boundaries,
      confidentiality posture, and refusal of unsupported fraud or AML conclusions.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: fdic-internal-routine-controls
    title: RMS Manual of Examination Policies Section 4.2 Internal Routine and Controls
    publisher: Federal Deposit Insurance Corporation
    source_type: risk-control-or-reconciliation-standard
    location: https://www.fdic.gov/system/files/2024-06/section4-2_0.pdf
    authority_reason: FDIC examination policy is authoritative for internal-control, segregation-of-duties, transaction-recording,
      and audit expectations in insured depository institutions, directly constraining payment posting and reconciliation
      handling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: bis-pfmi
    title: Principles for Financial Market Infrastructures
    publisher: Committee on Payments and Market Infrastructures and IOSCO / Bank for International Settlements
    source_type: risk-control-or-reconciliation-standard
    location: https://www.bis.org/cpmi/publ/d101.htm
    authority_reason: CPMI-IOSCO PFMI is the recognized global control standard for systemically important payment, clearing,
      and settlement systems and is directly relevant to reconciliation, operational-risk, and finality-aware payment operations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: ach and wire payment workflow handling
    retrieval_policy: Use Federal Reserve and FRBservices ACH and Fedwire sources first for intake, participant responsibilities,
      settlement posture, timing, and payment-exception handling.
    specialty_specific_exceptions:
    - Do not use public rail rules to invent tenant-specific cutoff overrides, release authority, or repair procedures.
  - category: consumer-impact payment error resolution
    retrieval_policy: Use CFPB Regulation E sources when disputed transfers, remittance disclosures, refunds, or error-resolution
      duties may change the outcome.
    specialty_specific_exceptions:
    - Escalate whenever customer status, product type, or disclosure obligations are unclear and would change the handling
      path.
  - category: funds-transfer evidence and suspicious-activity boundaries
    retrieval_policy: Use FFIEC guidance first for transfer recordkeeping, suspicious-activity escalation, and confidentiality
      boundaries, then retrieve tenant procedures for execution details.
    specialty_specific_exceptions:
    - Do not convert alert handling into a final fraud, AML, or SAR determination.
  - category: posting, reconciliation, and control discipline
    retrieval_policy: Use FDIC internal-control guidance and CPMI-IOSCO PFMI to constrain reconciliation claims, segregation
      of duties, unsupported corrections, and finality-sensitive control assertions.
    specialty_specific_exceptions:
    - Do not recommend final correction when the payment system, account or policy system, and general ledger do not materially
      agree.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant approval thresholds, business-unit rules, product mappings, accounting policies, jurisdiction-specific
      notices, and system-of-record precedence only through orchestrator-controlled retrieval.
    - Require product, account or policy context, customer segment, jurisdiction, and escalation ownership before applying
      payment outcomes to a specific tenant case.
    - Record unresolved ambiguity instead of guessing when bank, insurer, payments, or jurisdiction-specific rules materially
      change the answer.
  specialty_specific_exceptions:
  - Keep the lane focused on payment operations evidence handling, posting readiness, reconciliation, and escalation packaging
    rather than generic finance support.
  - Separate operational payment handling from accounting signoff, legal interpretation, underwriting, claims decisions, and
    formal fraud or AML disposition.
  - Do not imply a payment is final solely because one queue or settlement feed shows completion while authoritative records
    conflict.
  next_review_due_at: '2026-08-08'
