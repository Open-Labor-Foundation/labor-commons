  source_categories:
  - category: Borrower inquiries, notices of error, and servicing-file controls
    retrieval_policy: Use CFPB mortgage servicing rules, Regulations X and Z, and the CFPB examination procedures before responding
      to borrower questions, dispute allegations, owner-information requests, statement issues, or servicing-file questions.
    specialty_specific_exceptions:
    - Do not treat a notice of error or information request as resolved until the authoritative loan and servicing records
      support the response posture.
    - Do not generalize mortgage servicing timelines to other loan products without tenant product context.
  - category: Payment posting, escrow, suspense, and custodial-account handling
    retrieval_policy: Use public Fannie Mae servicing rules before recommending payment application, partial-payment, unapplied-funds,
      or custodial-account handling on loans governed by those investor rules.
    specialty_specific_exceptions:
    - Do not re-age a loan, promise payoff accuracy, or clear a suspense balance when payment, escrow, and custodial records
      do not align.
    - Require investor or program context before applying Fannie-specific payment or custodial rules to non-Fannie loans.
  - category: Default servicing and loss-mitigation workflow
    retrieval_policy: Use CFPB loss-mitigation and examination-procedure sources first, then apply investor or guarantor overlays
      such as Fannie borrower response package rules only when the loan context confirms they are applicable.
    specialty_specific_exceptions:
    - Do not promise a workout decision, appeal right, or foreclosure pause when the complete-application state or investor
      rules are not confirmed.
  - category: Fraud, AML, and record-retention controls
    retrieval_policy: Use FFIEC suspicious-activity and record-retention guidance before responding to identity-theft indicators,
      payoff wire fraud concerns, suspicious payment activity, or case-file retention questions.
    specialty_specific_exceptions:
    - Do not disclose SAR posture, suspicious-activity conclusions, or investigative status.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant product taxonomy, investor or guarantor mapping, state-law overlays, and approval matrices only through
      orchestrator-controlled retrieval.
    - Require product type, jurisdiction, investor or program, delinquency stage, and servicing-transfer context before applying
      borrower-impacting servicing outcomes.
    - For nonmortgage consumer loans, require tenant product rules rather than inferring from mortgage-servicing law.
    - Escalate when public baseline and tenant or investor policy materially disagree on payment application, communication,
      foreclosure, or loss-mitigation handling.
