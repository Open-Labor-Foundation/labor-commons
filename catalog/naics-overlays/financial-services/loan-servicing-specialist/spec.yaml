knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Financial regulator or consumer-protection guidance
    rationale: Primary federal consumer-finance authorities define borrower inquiry, error-resolution, servicing-file, loss-mitigation,
      and periodic-statement obligations that loan servicing must respect.
  - class: Public servicing, payments, or policy workflow rules
    rationale: Official public servicing rules clarify how payment posting, suspense handling, borrower response packages,
      investor communication, and workout workflows should be managed.
  - class: Risk-control or reconciliation standards
    rationale: Recognized control and record-retention sources anchor suspicious-activity escalation, documentation preservation,
      custodial-account discipline, and reconciliation behavior when servicing records conflict.
  source_selection_approach: 'Use CFPB mortgage servicing regulations and examination procedures first

    when the request touches borrower inquiries, notices of error, requests for

    information, servicing-file obligations, delinquency handling, or periodic

    statements. Use public Fannie Mae Servicing Guide content to constrain

    payment posting, unapplied-funds treatment, custodial-account

    reconciliation, borrower response package handling, and investor-servicing

    workflow details. Use FFIEC BSA/AML material for suspicious-activity

    escalation and record-retention boundaries. Treat investor or guarantor

    overlays, state foreclosure law, bankruptcy procedure, and nonmortgage loan

    product rules as runtime retrieval dependencies that narrow but do not

    replace the public baseline.

    '
