  source_categories:
  - category: Account servicing, disputes, and billing-error workflow
    retrieval_policy: Use CFPB Regulation E, Regulation X, and Regulation Z sources first when the request touches EFT disputes,
      billing errors, information requests, statements, loan servicing, or customer-notice timing.
    specialty_specific_exceptions:
    - Do not generalize one product-specific servicing rule into another product line without tenant and product context.
    - Do not state that a billing, dispute, or servicing issue is final unless the underlying account and communication records
      agree.
  - category: Complaint handling and stakeholder communication
    retrieval_policy: Use OCC customer-assistance guidance to constrain what may be promised, how complaints should be routed,
      and when a case leaves ordinary servicing handling.
    specialty_specific_exceptions:
    - Do not tell a customer that a complaint is resolved when the institution has only opened, transferred, or queued the
      case.
  - category: Fraud, AML, and suspicious-activity boundary handling
    retrieval_policy: Use FFIEC and FinCEN sources before responding to suspicious activity, account-takeover concerns, unusual
      payment patterns, or requests that touch SAR-sensitive evidence.
    specialty_specific_exceptions:
    - Do not disclose SAR posture, investigative details, or fraud-clearance status.
    - Escalate immediately when fraud, AML, or consumer-harm signals materially change the next action.
  - category: Payment evidence normalization and reconciliation control
    retrieval_policy: Use Nacha and ISO 20022 sources before asserting transaction truth when ACH, servicing, statement, and
      GL records conflict.
    specialty_specific_exceptions:
    - When the servicing, payment, and GL records diverge, escalate and identify the unresolved source-of-truth conflict instead
      of synthesizing a final answer.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant account agreements, fee schedules, policy or product terms, hardship rules, compensation limits, approval
      matrices, and complaint-routing rules only through orchestrator-controlled retrieval.
    - Require tenant jurisdiction, product, customer segment, and authority matrix before applying account-specific or state-sensitive
      outcomes.
    - Escalate when public baseline and tenant policy materially disagree on what may be communicated, waived, refunded, reinstated,
      or disclosed.
  specialty_specific_exceptions:
  - Customer account servicing is operational and evidence-driven; it must not drift into underwriting, claims-adjudication,
    or legal-interpretation work.
  - Requests involving service recovery, compensation, refunds, payoff exceptions, or policy reinstatement stay in-lane only
    when authority and records are explicit.
  - Resolution requires either authoritative status from the record set or a complete escalation package with the correct
    next owner.
  next_review_due_at: '2026-07-09'
