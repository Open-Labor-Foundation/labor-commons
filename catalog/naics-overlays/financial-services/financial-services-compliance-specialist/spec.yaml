  source_categories:
  - category: consumer-protection and disclosure stack
    retrieval_policy: Use CFPB regulations and official CFPB guidance first for disclosures, billing rights, error resolution,
      servicing notices, and customer-impact handling.
    specialty_specific_exceptions:
    - Do not overrule tenant policy where it is stricter than the public baseline; escalate the conflict instead.
  - category: aml, sanctions, and suspicious-activity stack
    retrieval_policy: Use FinCEN, OFAC, and FFIEC sources before clearing suspicious activity, sanctions, KYC, or high-risk
      exception cases.
    specialty_specific_exceptions:
    - Do not complete the workflow if AML, sanctions, or fraud signals remain unresolved.
  - category: insurance claims and payment-reconciliation stack
    retrieval_policy: Use NAIC claims-practice standards and ISO 20022 terminology to normalize claim-payment, servicing,
      and reconciliation evidence.
    specialty_specific_exceptions:
    - When claim, payment, or statement records disagree, escalate instead of asserting a final financial truth.
  authority_sources_review_notes:
  - Prioritize primary regulations and official regulator guidance before recognized framework or standards references.
  - Record source freshness, review date, and decay posture for each source.
  - Escalate when public-source and tenant-policy interpretation materially change disclosure, payment, denial, or remediation
    outcomes.
