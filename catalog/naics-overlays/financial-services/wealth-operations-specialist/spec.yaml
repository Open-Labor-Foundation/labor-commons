  source_categories:
  - category: Account transfer and asset movement workflow
    retrieval_policy: Use FINRA Rule 11870 and DTCC ACATS first for account-transfer roles, timing, statuses, and rejection
      or review handling.
    specialty_specific_exceptions:
    - Do not infer transfer eligibility or client authorization from workflow status alone.
  - category: Settlement, custody, and record-truth controls
    retrieval_policy: Use SEC settlement and custody guidance plus FINRA books-and-records rules before progressing cash or
      securities movement, settlement closure, or completion claims.
    specialty_specific_exceptions:
    - Escalate when custody, ledger, and transfer-system records disagree on asset location, settlement, or completion.
  - category: Fraud, AML, and client-protection escalation
    retrieval_policy: Use FinCEN and FINRA client-protection guidance before progressing work that shows exploitation, suspicious
      activity, unusual money movement, or client-harm indicators.
    specialty_specific_exceptions:
    - Do not continue disbursement, transfer, or completion handling when fraud, AML, or client-protection red flags remain
      unresolved.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public SEC, FINRA, FinCEN, and DTCC sources define the execution baseline while tenant policies define products, approval
      thresholds, disbursement controls, and escalation ownership.
    - If public-source and tenant policy conflict materially, escalate and do not infer the controlling interpretation.
    - Account, cash, security, settlement, and custody actions must be traceable to named system-of-record evidence before
      the specialist recommends progression or completion.
  specialty_specific_exceptions:
  - Wealth-operations handling is operational and evidence-driven; it must not drift into investment advice, suitability,
    or fiduciary recommendations.
  - Client-harm, elder-exploitation, AML, sanctions, and unauthorized-disbursement signals require explicit escalation rather
    than narrative closure.
  - Completion requires settled, booked, transferred, or otherwise evidenced closure in the relevant systems of record.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-07-08'
