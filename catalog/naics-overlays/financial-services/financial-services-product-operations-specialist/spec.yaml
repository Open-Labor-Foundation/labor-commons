    source_type: financial-regulator-guidance
    location: https://www.consumerfinance.gov/compliance/compliance-resources/mortgage-resources/mortserv/
    authority_reason: CFPB is the primary U.S. consumer-financial regulator for mortgage servicing rules. This official resource
      identifies the governing Regulation X and Regulation Z servicing, error-resolution, information-request, payment-processing,
      and periodic-statement requirements that constrain servicing operations.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cfpb-reg-e-error-resolution
    title: Electronic Fund Transfers FAQ and error-resolution guidance
    publisher: Consumer Financial Protection Bureau
    source_type: financial-regulator-guidance
    location: https://www.consumerfinance.gov/compliance/compliance-resources/deposit-operations-resources/electronic-fund-transfers/electronic-fund-transfers-faqs/
    authority_reason: CFPB is authoritative for Regulation E implementation and public compliance guidance affecting disputed
      electronic transfers, investigations, provisional credit handling, and consumer-notice timing in deposit and payment
      operations.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ffiec-sar
    title: Assessing Compliance with BSA Regulatory Requirements - Suspicious Activity Reporting
    publisher: FFIEC BSA/AML InfoBase
    source_type: risk-control-standard
    location: https://bsaaml.ffiec.gov/manual/AssessingComplianceWithBSARegulatoryRequirements/04
    authority_reason: The FFIEC BSA/AML InfoBase is an official interagency examination manual used by U.S. banking regulators.
      It is authoritative for suspicious-activity escalation boundaries, SAR confidentiality, and when product operations
      must stop and hand off to AML or fraud owners.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ffiec-bsa-record-retention
    title: FFIEC BSA/AML Appendices - Appendix P – BSA Record Retention Requirements
    publisher: FFIEC BSA/AML InfoBase
    source_type: risk-control-standard
    location: https://bsaaml.ffiec.gov/manual/Appendices/17
    authority_reason: This official FFIEC appendix defines record-retention expectations, including SAR-supporting documentation
      retention, which directly constrains evidence handling and refusal behavior in suspicious-activity-related operations.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: fdic-operations-controls
    title: Risk Management Manual of Examination Policies - Section 2.1 Operations - Internal Routine and Controls
    publisher: Federal Deposit Insurance Corporation
    source_type: risk-control-standard
    location: https://www.fdic.gov/resources/supervision-and-examinations/risk-management-manual/section2-1.pdf
    authority_reason: FDIC examination policy is authoritative for operational-control expectations in insured depository
      institutions, including segregation, reconciliations, exception processing, proofing, and evidence requirements used
      in payment and account operations.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nacha-ach-risk-management
    title: ACH Quality and Risk Management Topics
    publisher: Nacha
    source_type: public-payments-workflow-rule
    location: https://www.nacha.org/system/files/resources/ACH-Quality-and-Risk-Management-Topics-Request-for-Comment-%20May%202018.pdf
    authority_reason: Nacha governs the ACH Network rules used across U.S. payment operations. This public rules reference
      is authoritative for ACH return-risk terminology, unauthorized-return treatment, and exception classes that shape posting
      and reconciliation handling.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: naic-unfair-claims-settlement
    title: Unfair Claims Settlement Practices Act
    publisher: National Association of Insurance Commissioners
    source_type: insurance-operating-framework
