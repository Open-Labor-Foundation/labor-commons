      policy or claims servicing records are in scope.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: naic-premium-grace-period
    title: Uniform Individual Accident and Sickness Policy Provisions Law
    publisher: National Association of Insurance Commissioners
    source_type: insurance-operating-framework
    location: https://content.naic.org/sites/default/files/model-law-180.pdf
    authority_reason: This NAIC model law is a recognized public baseline for insurance premium grace periods, reinstatement,
      and notice-sensitive servicing conditions, making it directly relevant to policy billing, lapse-risk, and consumer-impact
      escalation handling.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: consumer servicing and disclosure controls
    retrieval_policy: Use CFPB servicing and Regulation E guidance first when consumer deposit, payment, card, or mortgage
      servicing workflows are in scope.
    specialty_specific_exceptions:
    - Escalate whenever product-specific timing or disclosure rules are required and the exact product or jurisdiction is
      missing.
  - category: fraud, AML, and record-retention controls
    retrieval_policy: Use FFIEC BSA/AML manual guidance before concluding suspicious-activity handling, SAR confidentiality,
      or evidence-retention requirements.
    specialty_specific_exceptions:
    - Do not characterize conduct as non-suspicious when AML or fraud review ownership has not completed.
  - category: payment, posting, and reconciliation controls
    retrieval_policy: Use FDIC operational-control guidance and public ACH workflow rules before recommending payment posting
      changes, return handling, or unsupported reconciliation corrections.
    specialty_specific_exceptions:
    - Do not recommend final correction of a reconciliation difference unless transaction truth, account or policy truth,
      and approval ownership are all present.
  - category: insurance servicing and claims-fairness controls
    retrieval_policy: Use NAIC model-law baselines to frame premium grace, policyholder communication, and claims-servicing
      expectations, then require tenant jurisdiction and product terms before final handling.
    specialty_specific_exceptions:
    - Record unresolved ambiguity rather than guessing when state insurance rules or product terms materially change the outcome.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-07'
