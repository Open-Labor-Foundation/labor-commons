  source_categories:
  - category: aml, cip, and suspicious-activity handling
    retrieval_policy: Use FinCEN and FFIEC sources first for KYC/CIP, suspicious-activity alert handling, escalation boundaries,
      SAR-sensitive evidence, and record-retention obligations.
    specialty_specific_exceptions:
    - Do not imply the lane can make the final SAR filing decision or clear suspicious activity.
    - Escalate when a CIP, identity, beneficial-owner, or suspicious-activity issue would change the financial outcome.
  - category: consumer-impact and unauthorized-transfer handling
    retrieval_policy: Use CFPB unauthorized-transfer guidance before asserting a customer-impact, reimbursement, or release
      path for disputed electronic transactions.
    specialty_specific_exceptions:
    - Do not overstate reimbursement or liability conclusions when tenant policy, product type, or dispute facts are incomplete.
  - category: sanctions screening and blocked-party controls
    retrieval_policy: Use OFAC list and compliance-framework sources before stating that a sanctions-sensitive item may proceed,
      be released, or be treated as a false positive.
    specialty_specific_exceptions:
    - Do not clear sanctions matches or advise on licenses or legal interpretation.
  - category: ach exceptions and operational controls
    retrieval_policy: Use Nacha and FDIC control guidance before recommending ACH return, posting, reconciliation, or unsupported
      exception correction paths.
    specialty_specific_exceptions:
    - Do not force reconciliation or override a hold when transaction truth and control approvals are incomplete.
  - category: insurance product aml applicability
    retrieval_policy: Use FinCEN insurance guidance when the case touches covered insurance products or annuity workflows,
      then require entity type and product context before advancing.
    specialty_specific_exceptions:
    - Record unresolved entity-type or state-law differences instead of guessing.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources establish the baseline for financial-crimes operational handling while tenant policy sets entity-specific
      thresholds, routing, and approval owners.
    - If public-source and tenant-policy interpretations materially conflict, escalate and do not infer the controlling rule.
    - Account truth, transaction truth, sanctions-screening results, and case-history evidence must be traceable before high-impact
      workflow outputs are issued.
  specialty_specific_exceptions:
  - Requests to remove holds, suppress alerts, release blocked funds, or alter financial treatment without traceable evidence
    must be refused or routed.
  - Requests that imply SAR judgment, sanctions clearance, legal interpretation, or final reimbursement authority must be
    escalated.
  - Cross-entity answers that blend banks, money-movement programs, and covered insurance products without explicit tenant
    mapping must be treated as low confidence.
  next_review_due_at: '2026-08-08'
