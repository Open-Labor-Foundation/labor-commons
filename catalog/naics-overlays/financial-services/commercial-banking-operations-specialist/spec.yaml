knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Financial regulator or consumer-protection guidance
    rationale: Primary banking regulators and FinCEN define legal-entity authority, access-control, suspicious-activity, and
      customer-impact boundaries that commercial banking operations must respect.
  - class: Public servicing, payments, or policy workflow rules
    rationale: Official payment-system and recordkeeping rules identify lifecycle stages, control points, and records of truth
      for commercial ACH, wire, and service-fulfillment work.
  - class: Risk-control or reconciliation standards
    rationale: Recognized financial-message and reconciliation standards normalize artifacts across core-banking, treasury,
      payment, and general-ledger systems when evidence is compared.
  source_selection_approach: 'Use OCC payment-systems guidance, FFIEC authentication and BSA/AML manual

    content, FRBservices operating circulars, FinCEN CDD updates, and ISO

    20022 terminology before drafting workflow or refusal claims. Treat tenant

    authority matrices, signer policy, callback rules, payment-rail usage,

    product mix, account agreements, and jurisdiction-specific procedures as

    runtime retrieval dependencies that narrow but do not replace the public

    baseline.

    '
  authority_sources:
  - source_id: occ-payment-systems
    title: 'Comptroller''s Handbook: Payment Systems'
    publisher: Office of the Comptroller of the Currency
    source_type: financial-regulator-guidance
    location: https://www.occ.treas.gov/publications-and-resources/publications/comptrollers-handbook/files/payment-sys-funds-transfer-activities/pub-ch-payment-systems.pdf
    authority_reason: Official OCC supervisory handbook content that defines payment workflow stages, payment types, risk
      categories, and risk-management expectations for supervised banks, including wholesale and business payment activity
      relevant to commercial banking operations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ffiec-authentication-access
    title: Authentication and Access to Financial Institution Services and Systems
    publisher: Federal Financial Institutions Examination Council
    source_type: financial-regulator-guidance
    location: https://www.ffiec.gov/guidance/Authentication-and-Access-to-Financial-Institution-Services-and-Systems.pdf
    authority_reason: Official interagency FFIEC guidance describing effective authentication and access risk-management practices
      for customers, employees, and third parties accessing digital banking services and information systems, which directly
      constrains commercial-banking entitlements and layered-control handling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: frbservices-operating-circulars
    title: Operating Circulars
    publisher: Federal Reserve Financial Services
    source_type: public-servicing-workflow-rule
    location: https://www.frbservices.org/resources/rules-regulations/operating-circulars.html
    authority_reason: Federal Reserve Financial Services publishes the public operating rules governing Reserve Bank financial
      services, including Operating Circular 4 for commercial ACH items and Operating Circular 6 for Fedwire funds transfers
      that shape commercial banking workflow and cutoff handling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ffiec-funds-transfers-recordkeeping
    title: FFIEC BSA/AML Manual - Funds Transfers Recordkeeping
    publisher: Federal Financial Institutions Examination Council
    source_type: public-servicing-workflow-rule
    location: https://bsaaml.ffiec.gov/manual/AssessingComplianceWithBSARegulatoryRequirements/09
    authority_reason: Official interagency examination-manual content used by U.S. banking regulators to assess wire-transfer
      and funds-transfer recordkeeping, Travel Rule handling, and required evidentiary records for banking operations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ffiec-suspicious-activity-reporting
    title: FFIEC BSA/AML Manual - Suspicious Activity Reporting
    publisher: Federal Financial Institutions Examination Council
    source_type: financial-regulator-guidance
    location: https://bsaaml.ffiec.gov/manual/AssessingComplianceWithBSARegulatoryRequirements/04
    authority_reason: Official interagency suspicious-activity-reporting guidance that constrains how commercial banking operations
      must escalate potentially suspicious activity and avoid disclosing investigative posture or SAR decisions.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ffiec-customer-due-diligence
    title: FFIEC BSA/AML Manual - Customer Due Diligence
    publisher: Federal Financial Institutions Examination Council
    source_type: financial-regulator-guidance
    location: https://bsaaml.ffiec.gov/manual/AssessingComplianceWithBSARegulatoryRequirements/02_ep
    authority_reason: Official FFIEC examination procedures defining how banks should collect information sufficient to understand
      the nature and purpose of customer relationships and incorporate beneficial-ownership information for legal-entity customers
      into customer risk profiles.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: fincen-cdd-final-rule
    title: Information on Complying with the Customer Due Diligence (CDD) Final Rule
    publisher: Financial Crimes Enforcement Network
    source_type: financial-regulator-guidance
    location: https://www.fincen.gov/resources/statutes-and-regulations/cdd-final-rule
    authority_reason: Official FinCEN source for current CDD rule posture, including the February 13, 2026 alert and exceptive
      relief regarding identification and verification of beneficial owners at each account opening, which materially affects
      commercial legal-entity servicing assumptions.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 30
    decay_policy: review_required_after_interval
    status: active
  - source_id: iso-20022
    title: ISO 20022 Financial Services Messaging Framework
    publisher: International Organization for Standardization
    source_type: risk-control-or-reconciliation-standard
    location: https://www.iso20022.org/
    authority_reason: Recognized international financial-message standard used to normalize payment, account, and reconciliation
      artifacts across treasury, payment, and core-banking systems, supporting commercial-banking evidence traceability.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 730
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: commercial payment workflow and settlement-stage handling
    retrieval_policy: Use OCC payment-systems guidance and FRBservices operating circulars first for lifecycle stages, payment-rail
      roles, cutoff handling, and commercial ACH or wire execution boundaries.
    specialty_specific_exceptions:
    - Do not use payment-system workflow guidance to invent tenant-specific release authority or callback procedures.
    - Escalate when the tenant uses CHIPS, SWIFT, correspondent-bank, or vendor-managed flows that materially change the records
      of truth.
  - category: legal-entity authority, access, and documentary controls
    retrieval_policy: Use FFIEC authentication guidance, FFIEC customer-due-diligence procedures, and FinCEN CDD updates before
      handling signer, entitlement, or legal-entity authority requests.
    specialty_specific_exceptions:
    - Do not interpret legal documents or assume a signer is authorized without tenant-approved documentary evidence.
    - When FinCEN relief, FFIEC guidance, and tenant policy differ on beneficial-owner refresh requirements, record the conflict
      and escalate.
  - category: suspicious activity and recordkeeping boundaries
    retrieval_policy: Use FFIEC suspicious-activity-reporting and funds-transfer-recordkeeping guidance before advancing work
      that touches unusual payment behavior, sensitive evidence, or travel-rule records.
    specialty_specific_exceptions:
    - Do not disclose SAR posture, fraud-clearance status, or investigative conclusions.
    - Do not proceed when payment, documentary, and monitoring records create a suspicious-activity concern that changes the
      safe answer.
  - category: artifact normalization and reconciliation discipline
    retrieval_policy: Use ISO 20022 terminology to normalize artifact naming and reconciliation language across core-banking,
      treasury, payment, and ledger systems.
    specialty_specific_exceptions:
    - Do not treat terminology normalization as proof that conflicting records reconcile.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant authority matrices, callback procedures, service-entitlement rules, product mappings, jurisdiction notes,
      and approval thresholds only through orchestrator-controlled retrieval.
    - Require tenant product, legal-entity, channel, and payment-rail context before applying account-specific or document-specific
      handling.
    - Record unresolved ambiguity instead of guessing when FinCEN updates, FFIEC procedures, and tenant policy materially
      differ.
