  source_categories:
  - category: kyc, cip, cdd, and beneficial-ownership workflow
    retrieval_policy: Use FFIEC CIP and CDD guidance plus FinCEN CDD guidance first when the request turns on identity proof,
      beneficial-ownership, documentary evidence, or customer risk understanding.
    specialty_specific_exceptions:
    - Do not treat beneficial-ownership or control-person collection as universally complete without product, legal-entity,
      and tenant-policy context.
    - Do not interpret the 2026 FinCEN relief update as permission to bypass stricter tenant controls or adjacent compliance
      review.
  - category: sanctions, fraud, and suspicious-activity stop conditions
    retrieval_policy: Use OFAC and FinCEN sources before clearing sanctions, suspicious-activity, or insurance AML issues
      encountered during onboarding.
    specialty_specific_exceptions:
    - Do not disclose SAR posture or claim that a sanctions or AML matter is cleared without the required owner.
  - category: payments and onboarding control normalization
    retrieval_policy: Use Nacha, NIST, and ISO 20022 references when account-validation, identity-proofing, permissions, or
      cross-system artifact normalization materially affect onboarding readiness.
    specialty_specific_exceptions:
    - Do not assume payment account validation is a substitute for CIP, CDD, or sanctions controls.
    - When onboarding and payment-system records diverge, escalate rather than asserting a final source of truth.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use FFIEC, FinCEN, OFAC, Nacha, NIST, and ISO 20022 sources as the public baseline before drafting onboarding or KYC
      claims.
    - Inject tenant-specific product rules, jurisdiction overlays, risk tiers, disclosures, approval thresholds, and owner-routing
      rules only through orchestrator-controlled retrieval.
    - Escalate whenever public-source and tenant-policy differences materially change identity, beneficial-ownership, sanctions,
      disclosure, or activation handling.
  specialty_specific_exceptions:
  - Keep the lane on readiness validation, evidence discipline, and handoff packaging rather than underwriting, legal interpretation,
    or final account-opening approval.
  - Do not mark onboarding complete merely because identity was partially verified if access, disclosure, sanctions, beneficial-ownership,
    or setup dependencies remain open.
  - Do not promise that a customer, merchant, or policy owner is safe to activate without the designated fraud, AML, underwriting,
    or compliance owner where required.
  next_review_due_at: '2026-07-09'
