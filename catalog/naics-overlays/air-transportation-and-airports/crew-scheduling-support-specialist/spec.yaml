- crew-tracking-specialist
- labor-relations-specialist
knowledge_baseline:
  source_classes:
  - class: Transportation, customs, or safety regulator guidance
    rationale: FAA, eCFR, and CBP sources define flightcrew duty and rest, flight attendant staffing and rest, dispatch release
      authority, aviation record retention, and APIS or customs manifest constraints.
  - class: Chain-of-custody, dispatch, or movement workflow references
    rationale: FAA dispatch, flight release, load manifest, flight plan, and dispatcher-role references define records and
      owners that establish movement, custody, route, and operational-control status.
  - class: Equipment, route, or service-level operating standards
    rationale: Part 121 dispatch rules and crewmember requirements define aircraft, route, weather, communication, navigation,
      airport, and minimum crewing constraints that schedule recommendations must preserve.
  source_selection_approach: 'Use eCFR and FAA sources first for U.S. Part 121 crew legality, dispatch

    and flight release, aircraft, route, weather, minimum crewing, and records

    boundaries. Use FAA dispatcher guidance to separate crew scheduling

    support from certificated aircraft dispatcher operational-control

    authority. Use CBP APIS guidance when international crew movement,

    crewmember data, manifests, or customs documentation affects scheduling or

    handoff readiness. Tenant rules for collective bargaining agreements,

    jurisdictions, bases, fleet assignments, fatigue review, station routing,

    movement approval, and execution permissions must be provided at runtime

    and are never guessed.

    '
