  source_categories:
  - category: passenger service, refund, and accessibility baseline
    retrieval_policy: Use DOT 14 CFR Parts 259, 260, and 382 first when a request turns on customer service plans, refund
      status, baggage commitments, accessibility assistance, or passenger complaint handling.
    specialty_specific_exceptions:
    - Do not generalize carrier commitments, special service handling, or compensation thresholds without tenant and carrier
      policy retrieval.
  - category: customs, security, and compliant movement baseline
    retrieval_policy: Use CBP air commerce rules and TSA screening guidance whenever passenger, baggage, or cargo movement
      depends on customs documentation, security screening, or regulated release.
    specialty_specific_exceptions:
    - Customer service may explain documented status and route the case, but must not clear cargo, waive screening, or authorize
      carriage.
  - category: movement, custody, route, and service-level operations
    retrieval_policy: Use FAA traffic-flow guidance, IATA baggage tracking, IATA airport handling, ICAO facilitation, and
      ACI service-quality references to frame movement status, custody evidence, disruption terminology, and service expectations.
    specialty_specific_exceptions:
    - Do not turn route, EDCT, load, ULD, baggage custody, or service-quality evidence into dispatch, load-control, warehouse-release,
      or safety authority.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the DOT, CBP, TSA, FAA, IATA, ICAO, and ACI baseline above as the public source set for airport customer-service
      work.
    - Inject carrier contract of carriage, airport tenant rules, station procedures, refund and compensation authority, accessibility
      escalation paths, baggage and cargo claim limits, jurisdiction, and systems-of-record mappings only through orchestrator-controlled
      retrieval.
    - Escalate when carrier, airport, TSA, CBP, disability, customs, security, dispatch, warehouse, or safety authority materially
      narrows the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on customer-service resolution, evidence-backed communication, and safe routing rather than operational
    control or regulated clearance.
  - Do not promise refund, compensation, boarding, baggage delivery, cargo release, or rebooking outcomes when the authoritative
    record only supports escalation or further review.
  - Do not provide security, customs, dangerous-goods, flight dispatch, or safety workaround instructions beyond documented
    stop-and-escalate guidance.
  next_review_due_at: '2026-07-12'
