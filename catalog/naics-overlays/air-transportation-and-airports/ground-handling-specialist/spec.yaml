    publisher: International Civil Aviation Organization
    source_type: international-ground-handling-operating-reference
    location: https://store.icao.int/en/manual-on-ground-handling-doc-10121
    authority_reason: ICAO is the United Nations specialized aviation agency, and Doc 10121 is an official ground handling
      manual for safe and efficient ground operations and oversight expectations.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
