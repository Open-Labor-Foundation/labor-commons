- airport-customer-services-specialist
- aviation-compliance-specialist
- customer-operations-specialist
knowledge_baseline:
  source_classes:
  - class: Transportation, customs, or safety regulator guidance
    rationale: FAA airport ground vehicle rules, airport certification requirements, TSA airport security rules, and CBP air
      cargo requirements define regulated movement, safety, security, and customs boundaries that ground handling must escalate.
  - class: Chain-of-custody, dispatch, or movement workflow references
    rationale: IATA baggage tracking, CBP air cargo documentation, and IATA ground operations references define baggage, cargo,
      ULD, load, and service handoff records that establish custody and turn status.
  - class: Equipment, route, or service-level operating standards
    rationale: IATA Ground Operations Manual, Airport Handling Manual, ICAO ground handling guidance, and FAA ground vehicle
      guidance define ramp, GSE, aircraft servicing, turnaround, and service-level terminology and evidence expectations.
  source_selection_approach: 'Use FAA and eCFR airport ground vehicle and airport certification sources

    as the public U.S. airport safety baseline; TSA and CBP sources for

    security and customs boundaries; IATA Ground Operations Manual, Airport

    Handling Manual, baggage tracking, and ICAO ground handling materials for

    recognized ground handling workflow, terminology, custody, service, and

    turnaround standards. Tenant airport rules, airline ground operations

    manuals, station SOPs, SGHA or SLA terms, load-control procedures, customs

    procedures, security program details, labor rules, and owner maps must

    still be retrieved at runtime and are never guessed.

    '
  authority_sources:
  - source_id: iata-ground-operations-manual
    title: IATA Ground Operations Manual
    publisher: International Air Transport Association
    source_type: ground-operations-and-turnaround-standard
    location: https://www.iata.org/en/publications/manuals/ground-operations/
    authority_reason: IATA ground operations manuals are recognized airline and ground-handler operating references for aircraft
      turnaround, load-control interfaces, ramp safety, aircraft servicing, GSE, and ground handling terminology.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: iata-airport-handling-manual
    title: IATA Airport Handling Manual
    publisher: International Air Transport Association
    source_type: airport-handling-and-sgha-standard
    location: https://www.iata.org/en/publications/manuals/airport-handling-manual/
    authority_reason: The IATA Airport Handling Manual and its Standard Ground Handling Agreement framework are recognized
      industry references for handler-airline service scope, operational handoffs, SLA expectations, and ground handling boundary
      language.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: icao-doc-10121
