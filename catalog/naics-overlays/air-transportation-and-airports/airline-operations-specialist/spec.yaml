knowledge_baseline:
  source_classes:
  - class: Transportation, customs, or safety regulator guidance
    rationale: FAA, PHMSA, TSA, CBP, and eCFR sources define operational-control, records, hazardous-materials, security,
      customs, and safety boundaries for U.S. airline operations.
  - class: Chain-of-custody, dispatch, or movement workflow references
    rationale: FAA Part 121 dispatch and record rules, air waybill guidance, NOTAM references, and baggage or cargo custody
      records define the movement evidence this lane must preserve.
  - class: Equipment, route, or service-level operating standards
    rationale: FAA flight operations, records, NOTAM, and IATA ground or cargo standards define route, aircraft, load, and
      station readiness terminology without giving the specialist operating authority.
  source_selection_approach: 'Use FAA and eCFR sources first for U.S. Part 121 operational control,

    dispatch release, flight release, load manifest, communications, aircraft

    maintenance record, airworthiness release, and safety management framing.

    Use PHMSA hazardous-materials-by-air rules, TSA aircraft-operator

    security rules, and CBP air-commerce rules when cargo, dangerous goods,

    security, customs, or manifest documentation gates movement. Use FAA

    NOTAM sources for official aeronautical constraint retrieval. Use IATA

    ground and cargo standards as recognized industry operating references

    for turnaround, ground handling, air waybill, and chain-of-custody

    terminology. Tenant station manuals, airline GOM, OpSpecs, security

    programs, route books, crew rules, customs procedures, and system hooks

    must still be supplied at runtime.

    '
