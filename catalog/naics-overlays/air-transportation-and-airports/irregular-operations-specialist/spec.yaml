knowledge_baseline:
  source_classes:
  - class: Transportation, customs, or safety regulator guidance
    rationale: FAA airport safety rules, DOT passenger protection and tarmac-delay requirements, TSA airport security rules,
      CBP air cargo requirements, and Part 121 dispatch rules define regulated irregular-operations boundaries.
  - class: Chain-of-custody, dispatch, or movement workflow references
    rationale: IATA baggage tracking, FAA NOTAM references, dispatch or flight-release regulations, and cargo documentation
      rules define movement, custody, route-status, and recovery artifacts.
  - class: Equipment, route, or service-level operating standards
    rationale: FAA field-condition and ground movement guidance, IATA ground operations standards, and DOT tarmac-delay plan
      expectations define equipment, route, turnaround, passenger-impact, and service-level controls.
  source_selection_approach: 'Use FAA, eCFR, DOT, TSA, CBP, and IATA sources as the public baseline for

    irregular-operations workflow, terminology, evidence, and boundary claims.

    Tenant irregular-operations playbooks, station rules, airline customer

    service plans, carrier tarmac-delay contingency plans, local airport rules,

    security program details, customs workflows, crew and dispatch systems,

    and compensation policies must still be retrieved at runtime and are never

    guessed.

    '
