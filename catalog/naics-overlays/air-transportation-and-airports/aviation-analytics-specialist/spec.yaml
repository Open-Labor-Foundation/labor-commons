  source_categories:
  - category: Service-quality metrics and public reporting
    retrieval_policy: Use 14 CFR Part 234, DOT Air Travel Consumer Reports, and BTS TranStats before publishing or benchmarking
      on-time, cancellation, diversion, baggage, oversales, complaint, or service-quality metrics.
    specialty_specific_exceptions:
    - Do not publish metric claims when denominator, event anchor, carrier scope, station scope, or cadence differs across
      sources.
  - category: NAS, route, equipment, and movement signals
    retrieval_policy: Use FAA performance databases, SWIM, dispatch records, NOTAM context, equipment status, and tenant source
      precedence before drawing route, delay, throughput, or service-level conclusions.
    specialty_specific_exceptions:
    - Do not convert analytics into dispatch, route clearance, ATC, aircraft release, maintenance return-to-service, or safety
      signoff.
  - category: Cargo, customs, security, and chain-of-custody evidence
    retrieval_policy: Use 19 CFR Part 122, 49 CFR Part 1548, air waybill, cargo manifest, ACAS, screening, ULD, WMS/TMS, and
      handoff records before reporting cargo movement or custody metrics.
    specialty_specific_exceptions:
    - Escalate when cargo screening, customs release, manifest correction, or custody gap materially affects movement status
      or publication.
  authority_sources_review_notes:
  - Prefer DOT, FAA, CBP, TSA, and official public reporting references before tenant heuristics.
  - Use IATA terminology and handling references to normalize ground operations terms, not to grant approval authority.
  - Record unresolved denominator, event-anchor, jurisdiction, source-precedence, or signoff ambiguity instead of guessing.
  next_review_due_at: '2026-07-12'
