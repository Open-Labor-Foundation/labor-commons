knowledge_baseline:
  source_baseline_version: '2026-04-13'
  research_contract_version: '2026-04-08'
  source_classes:
  - class: Transportation, customs, or safety regulator guidance
    rationale: FAA, TSA, CBP, and PHMSA/DOT rules define air-carrier, airport, safety, security, customs, dangerous-goods,
      manifest, and records boundaries.
  - class: Chain-of-custody, dispatch, or movement workflow references
    rationale: FAA dispatch and load-manifest rules, FAA electronic-record guidance, CBP air-cargo manifest rules, and IATA
      cargo documentation references define movement truth, custody evidence, and handoff terminology.
  - class: Equipment, route, or service-level operating standards
    rationale: FAA airport-certification, SMS, maintenance-record, and electronic-record guidance plus IATA cargo handling
      and ULD references define equipment, route, serviceability, operational disruption, and service-level evidence expectations.
  source_selection_approach: 'Use public regulators and recognized aviation standards before tenant

    summaries: FAA 14 CFR Parts 121, 139, 43, and 5 for air-carrier, airport,

    maintenance, dispatch, load-manifest, SMS, and airport-operating baselines;

    TSA 49 CFR Part 1544 for aircraft operator security and cargo screening

    boundaries; CBP 19 CFR Part 122 for air-cargo and passenger manifest

    documentation; PHMSA/DOT 49 CFR Part 175 for hazardous materials carried by

    aircraft; FAA AC 120-78B for electronic records and manual traceability; and

    IATA cargo operations references for air waybill, cargo handling, and ULD

    terminology. Tenant policies, security programs, customs broker rules,

    airport procedures, service-level commitments, and current systems of record

    narrow this baseline at runtime and must be retrieved before case-specific

    conclusions.

    '
  authority_sources:
