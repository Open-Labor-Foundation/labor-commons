  source_categories:
  - category: air carrier dispatch, load, movement, and electronic records
    retrieval_policy: Use FAA Part 121 and AC 120-78B before producing dispatch-release, flight-release, load-manifest, electronic-record,
      or operational-control evidence summaries.
    specialty_specific_exceptions:
    - Do not release a flight, alter dispatch authority, or treat electronic records as valid without tenant authorization,
      record integrity, and owner confirmation.
  - category: airport, route, equipment, maintenance, and safety controls
    retrieval_policy: Use FAA Parts 139, 43, and 5 plus tenant airport, maintenance, fleet, ULD, and SMS systems when airport
      condition, route disruption, equipment status, maintenance status, or safety evidence changes the answer.
    specialty_specific_exceptions:
    - Do not issue safety clearance, airport operational command, maintenance return-to-service approval, or airworthiness
      release.
  - category: security, customs, dangerous goods, and cargo custody
    retrieval_policy: Use TSA Part 1544, CBP Part 122, PHMSA Part 175, and IATA cargo references when cargo screening, customs
      documentation, dangerous-goods records, air waybills, ULDs, station handoffs, or chain-of-custody evidence matters.
    specialty_specific_exceptions:
    - Do not clear customs, certify cargo screening, accept dangerous goods, override holds, or approve shipment movement
      when required documentation or authority is absent.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the public source baseline for lane design and require tenant retrieval for jurisdiction, airport, station, route,
      flight, shipment, asset, policy, security-program, system, record-location, service-level, and approval context.
    - Record conflicts among public guidance, tenant policy, airline procedure, airport procedure, customs broker instruction,
      security program, service-level commitment, and jurisdiction-specific rule instead of guessing.
    - Escalate dispatch, customs, security, safety, dangerous-goods, maintenance release, airport-command, legal, regulator-facing,
      financial, and executive policy issues to designated owners.
  specialty_specific_exceptions:
  - The lane produces governance support, evidence summaries, movement documentation checklists, and remediation routing;
    it is not a dispatcher, customs broker, TSA official, dangerous-goods acceptance authority, aviation safety official,
    maintenance release authority, airport operations commander, legal counsel, or regulator.
  - Aviation compliance outputs must include route, flight or shipment, custody, system-of-record, evidence-owner, review-cadence,
    exception-owner, and authority-boundary context.
  - Movement or handoff support must preserve chain-of-custody, cargo screening, customs, equipment status, maintenance status,
    route status, and service-level facts instead of treating work as generic logistics coordination.
  next_review_due_at: '2026-07-12'
