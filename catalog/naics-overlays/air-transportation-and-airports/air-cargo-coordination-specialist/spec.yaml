knowledge_baseline:
  source_classes:
  - class: Transportation, customs, or safety regulator guidance
    rationale: CBP, eCFR, TSA, and PHMSA sources define air cargo customs data, air commerce, security screening, dangerous-goods,
      and safety boundaries that this coordination lane must not overrule.
  - class: Chain-of-custody, dispatch, or movement workflow references
    rationale: IATA e-AWB, ONE Record, Cargo iQ, CBP air cargo filing, TSA cargo screening, and PHMSA shipping-paper or NOTOC
      references define the records and events used to establish cargo custody, movement, route, and handoff status.
  - class: Equipment, route, or service-level operating standards
    rationale: IATA cargo handling, ULD, and Cargo iQ operating references define recognized equipment, station, service-level,
      milestone, and route exception terminology for air cargo coordination.
  source_selection_approach: 'Use CBP and eCFR sources first for U.S. air cargo customs, manifest,

    advance electronic data, and air commerce boundaries. Use TSA and eCFR

    sources for cargo security and certified cargo screening boundaries. Use

    PHMSA/eCFR hazardous-materials-by-air rules for dangerous-goods acceptance,

    shipping-paper, pilot-in-command notification, and retention boundaries.

    Use IATA e-AWB, ONE Record, Cargo Handling Manual, and ULD references as

    recognized air cargo operating and terminology standards. Use Cargo iQ as a

    recognized air cargo shipment milestone and quality-management reference.

    Tenant station manuals, carrier rules, forwarder SOPs, service contracts,

    customs broker procedures, security programs, dangerous-goods manuals, and

    system hooks must still be supplied at runtime.

    '
