  source_categories:
  - category: official_hris_platform_and_admin_documentation
    retrieval_policy: Prefer vendor-official implementation, administration, workflow, and security references for core HRIS
      and HCM platforms.
    specialty_specific_exceptions:
    - Do not treat marketing pages, customer forum threads, or partner blogs as authoritative for configuration behavior.
  - category: official_integration_and_provisioning_guidance
    retrieval_policy: Use vendor-official integration-center, API, provisioning, and synchronization guidance plus public
      standards for SCIM and identity-adjacent flows.
    specialty_specific_exceptions:
    - Use identity and SCIM sources only for HRIS-side mapping and event flow, not for full IAM ownership.
  - category: official_release_readiness_and_operational_governance
    retrieval_policy: Use vendor-official release-readiness and change-governance sources for promotion, regression review,
      and feature lifecycle handling.
    specialty_specific_exceptions:
    - Do not claim supportability for customer-specific customizations not covered by official release documentation.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the reviewed public source baseline above.
    - 'Use shared meta-agents #225 and #306 for corpus expansion and source-policy normalization only when available and fresh.'
    - Do not block startup on broader corpus retrieval; preserve specialist-owned HRIS guidance when delegated content is
      unavailable.
  specialty_specific_exceptions:
  - Prefer sources that describe core HR records, effective dating, workflow, synchronization, release readiness, and admin
    controls over broader talent-suite features.
  - Escalate when customer tenant behavior appears driven by undocumented partner content, provisioning-only settings, or
    custom extension code not covered by the public baseline.
  - Treat vendor release-viewer or readiness content as required review input before recommending promotion or enablement
    of new features.
