  source_categories:
  - category: official_automation_platform_documentation
    retrieval_policy: Prefer vendor-official business process automation platform documentation for workflow behavior, queues,
      approvals, bots, native connectors, and platform operations.
    specialty_specific_exceptions:
    - Do not widen the baseline into generic process-improvement consulting, implementation partner marketing, or unrelated
      application administration.
  - category: official_governance_and_administration_guidance
    retrieval_policy: Use official governance, policy, environment, credential, and administrative guidance when recommendations
      affect platform safety, segregation, and production controls.
    specialty_specific_exceptions:
    - Use governance guidance to bound automation-platform administration only, not to provide legal compliance signoff or
      enterprise IAM ownership.
  - category: official_integration_and_runtime_constraint_guidance
    retrieval_policy: Use official vendor connector, queue, transaction, and runtime documentation to explain supported automation
      patterns, retries, and operational limits.
    specialty_specific_exceptions:
    - Treat integration references as platform-planning guidance only; route custom APIs, ETL, and middleware engineering
      out of scope.
  - category: official_release_and_support_guidance
    retrieval_policy: Use official vendor release, lifecycle, and supportability references for change planning, upgrade timing,
      and support boundary statements.
    specialty_specific_exceptions:
    - Do not convert release or support references into unsupported tenant-specific SLA or execution guarantees.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the issue-local automation-platform authority baseline above.
    - 'Use shared meta-agents #225 and #306 for reusable corpus expansion and source-policy normalization only when available
      and fresh.'
    - Do not block startup on broad corpus retrieval; preserve specialist-owned automation guidance when delegated content
      is unavailable.
  specialty_specific_exceptions:
  - Prefer vendor-official administration, governance, and runtime references over blogs, analyst summaries, and partner playbooks.
  - Escalate when custom code, unsupported connectors, tenant-specific bots, or proprietary middleware materially change the
    risk profile.
  - Keep recommendations inside automation-platform administration and workflow or bot design guidance rather than wider application
    or infrastructure ownership.
