  source_categories:
  - category: official_vendor_platform_documentation
    retrieval_policy: Prefer vendor-official commerce-platform administration and configuration documentation for channels,
      catalogs, markets, checkout behavior, order flows, and store operations.
    specialty_specific_exceptions:
    - Do not widen the baseline into digital marketing playbooks, generic merchandising advice, or unrelated SaaS administration.
  - category: official_integration_and_configuration_guidance
    retrieval_policy: Use vendor-official API, event, connector, and rate-limit guidance for supported integration planning
      and operational constraints.
    specialty_specific_exceptions:
    - Treat API and connector sources as planning and review guidance only; route custom implementation, middleware coding,
      and storefront engineering out of scope.
  - category: official_release_servicing_and_lifecycle_guidance
    retrieval_policy: Use vendor-official changelogs and release notes for cutover planning, deprecation awareness, supportability
      review, and release-readiness recommendations.
    specialty_specific_exceptions:
    - Do not convert release notes into unsupported promises about custom code compatibility, vendor SLAs, or tenant-specific
      support commitments.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the issue-local commerce-platform baseline above.
    - 'Use shared meta-agents #225 and #306 for broader best-practice curation and source-policy normalization only after
      local baseline validation succeeds.'
    - Do not block startup on shared-corpus retrieval; preserve the reviewed local commerce baseline if delegated outputs
      are unavailable or stale.
  specialty_specific_exceptions:
  - Favor cross-vendor commerce-platform documentation over partner blogs, implementation playbooks, or community posts.
  - Prefer sources that address platform administration, channel and market setup, catalog behavior, checkout and order flow,
    integration surface, and release mechanics.
  - Escalate when the tenant depends on custom storefront code, private apps, unsupported payment extensions, or bespoke middleware
    not covered by public vendor documentation.
