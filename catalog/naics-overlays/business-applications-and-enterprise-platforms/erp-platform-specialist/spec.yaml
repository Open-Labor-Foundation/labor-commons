  source_categories:
  - category: official_vendor_platform_documentation
    retrieval_policy: Prefer vendor-official ERP product documentation for module behavior, administration, environment operations,
      and supported platform capabilities.
    specialty_specific_exceptions:
    - Do not widen the source baseline into CRM, HCM, analytics, or unrelated enterprise-application suites unless the content
      is directly required to explain an ERP platform dependency.
  - category: official_integration_and_configuration_guidance
    retrieval_policy: Use vendor-official integration, workflow, API, and configuration guidance for ERP-safe implementation
      recommendations.
    specialty_specific_exceptions:
    - Treat API and integration sources as planning and review guidance only; route integration-code implementation and middleware
      engineering out of scope.
  - category: official_release_servicing_and_lifecycle_guidance
    retrieval_policy: Use vendor-official release, servicing, support, and lifecycle references for cutover planning, upgrade
      timing, and supportability statements.
    specialty_specific_exceptions:
    - Do not convert vendor release notes into unsupported promises about custom extensions, tenant-specific SLAs, or non-vendor
      support commitments.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the issue-local ERP source baseline above.
    - 'Use shared meta-agents #225 and #306 for broader best-practice curation and source-policy normalization only after
      local baseline validation succeeds.'
    - Do not block startup on shared-corpus retrieval; preserve the reviewed local ERP baseline if delegated outputs are unavailable
      or stale.
  specialty_specific_exceptions:
  - Favor cross-vendor ERP platform documentation over consultancy content, blogs, or community posts.
  - Prefer sources that address platform administration, workflow, environment operations, integration surface, and release
    behavior rather than pure functional process training.
  - Route tenant-specific accounting policy, tax interpretation, or regulated localization decisions to human approvers even
    when vendor docs describe technical configuration options.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-06-20'
shared_meta_agent_integration:
  bootstrap_metadata:
    issue_id: 135
    local_baseline_required: true
    deferred_initialization_supported: true
    startup_sequence:
    - Load local manifest, evaluation artifacts, readiness evidence, deployment notes, and marketing notes first.
    - Optionally invoke shared meta-agents after local baseline validation succeeds.
    - Reject delegated outputs that expand the ERP platform boundary or conflict with authoritative vendor guidance.
    request_context_fields:
    - agent_slug
    - domain_family
    - release_version
    - specialty_boundary
    - target_delivery_level
    - source_categories
    - fallback_mode
  specialist_owned_responsibilities:
  - Define the narrow ERP platform specialty boundary, adjacent-specialty routing, and refusal behavior.
  - Maintain the minimum authoritative vendor baseline, source categories, and specialty-specific exceptions required for
    safe startup.
  - Provide ERP-specific scenarios, evidence, low-confidence rules, and validated package artifacts.
  - Define request and response contracts plus fallback behavior for delegated shared meta-agent calls.
  delegated_responsibilities:
  - Reusable best-practice corpus retrieval and normalization
  - Repeated evaluation-suite normalization and regression-coverage patterns
  - Readiness evidence consistency review and packaging normalization
  - Deployment package boilerplate normalization
  - Commercialization and packaging boilerplate normalization
  - Authority-source policy normalization
  - Boundary-routing phrasing normalization where centrally derivable
  - Package scaffolding consistency review
  delegated_contracts:
  - issue_id: 225
    slug: best-practices-curation-specialist
    purpose: Expand reusable ERP platform best-practice coverage without rebuilding the shared corpus locally.
    request_contract:
      required_fields:
      - agent_slug
      - source_categories
      - specialty_boundary
      - retrieval_policy.mode
      optional_fields:
      - specialty_specific_exceptions
      - tenant_context_excluded_confirmation
    expected_response:
      required_outputs:
      - candidate public source additions
      - normalization notes
      - staleness timestamp
      rejection_condition: Reject if sources are not public, authoritative, ERP-platform relevant, or boundary-consistent.
    fallback_if_unavailable: Keep the local ERP source baseline only and state that broader corpus normalization is deferred.
  - issue_id: 302
    slug: evaluation-design-specialist
    purpose: Normalize scenario taxonomy and coverage framing across repeated specialist packages.
    request_contract:
      required_fields:
      - minimum_scenario_count
      - acceptance_thresholds
      - required_coverage_classes
      - specialty_boundary
      optional_fields:
      - existing_scenarios
    expected_response:
      required_outputs:
      - coverage review
      - gap list
      - normalization recommendations
      rejection_condition: Reject if proposed scenarios dilute ERP specificity or remove out-of-scope, low-confidence, or
        edge-constraint coverage.
    fallback_if_unavailable: Use the local 12-scenario matrix and record pass or fail rationale directly in repository artifacts.
  - issue_id: 303
    slug: readiness-and-evidence-specialist
    purpose: Review consistency across manifest, evaluation results, readiness evidence, and release notes.
    request_contract:
      required_fields:
      - delivery_status
      - evaluation_results_path
      - readiness_evidence_path
      - release_readiness_path
      optional_fields:
      - human_verification_notes
    expected_response:
      required_outputs:
      - consistency check result
      - missing evidence list
      - readiness normalization notes
      rejection_condition: Reject if the delegated review attempts to replace local human verification or specialist-owned
        evidence.
    fallback_if_unavailable: Rely on the local readiness checklist, local evidence review, and repository validation scripts.
  - issue_id: 304
    slug: deployment-package-specialist
    purpose: Normalize deployment-package structure for runtime, isolation, rollback, monitoring, and logging notes.
    request_contract:
      required_fields:
      - deployment_model
      - tenant_adaptation_policy
      - rollback_requirements
      - monitoring_expectations
      optional_fields:
      - shared_meta_agent_dependencies
    expected_response:
      required_outputs:
      - package structure review
      - missing deployment note list
      - normalization recommendations
      rejection_condition: Reject if the response weakens ERP tenant isolation, rollback requirements, or boundary-safe runtime
        assumptions.
    fallback_if_unavailable: Ship the local deployment package with conservative isolation, monitoring, and rollback requirements.
  - issue_id: 305
    slug: commercialization-and-packaging-specialist
    purpose: Normalize buyer profile, subscription framing, and proof-point wording.
    request_contract:
      required_fields:
      - target_buyer_profile
      - target_user_profile
      - proof_points
      - go_to_market_gaps
      optional_fields:
      - subscription_model
    expected_response:
      required_outputs:
      - positioning review
      - packaging normalization notes
      - commercial proof-point check
      rejection_condition: Reject if the response broadens the ERP specialist into a general digital transformation or systems-integrator
        replacement.
    fallback_if_unavailable: Use the local marketing readiness notes and keep commercial claims limited to evidence already
      in the repository.
  - issue_id: 306
    slug: authority-source-policy-specialist
    purpose: Normalize source-policy wording, refresh policy, and decay handling.
    request_contract:
      required_fields:
      - authority_sources
      - source_categories
      - refresh_rules
      - specialty_specific_exceptions
      optional_fields:
      - vendor_release_cadence_notes
    expected_response:
      required_outputs:
      - source-policy review
      - refresh and decay normalization notes
      - staleness exceptions
      rejection_condition: Reject if normalization drops required publisher, authority, refresh, decay, or review-date fields.
    fallback_if_unavailable: Retain the local source-policy baseline and trigger manual review at the next review_due date.
  - issue_id: 307
    slug: specialty-boundary-and-routing-specialist
    purpose: Normalize adjacent-specialty routing language where centrally derivable.
    request_contract:
      required_fields:
      - specialty_boundary
      - out_of_scope_rules
      - orchestrator_return_rules
      - adjacent_specialty_examples
      optional_fields:
      - partial_handoff_patterns
    expected_response:
      required_outputs:
      - boundary clarity review
      - routing overlap list
      - normalization recommendations
      rejection_condition: Reject if the routing suggestions expand scope into custom engineering, infrastructure ownership,
        or adjacent enterprise application lanes.
    fallback_if_unavailable: Use the local boundary language and record unresolved overlaps in readiness notes if any remain.
  - issue_id: 308
    slug: agent-package-scaffolding-specialist
    purpose: Review package completeness against repository scaffolding expectations.
    request_contract:
      required_fields:
      - manifest_path
      - evaluation_paths
      - readiness_paths
      - deployment_path
      - marketing_path
      optional_fields:
      - template_deltas
    expected_response:
      required_outputs:
      - package completeness review
      - template deviation list
      - scaffolding normalization notes
      rejection_condition: 'Reject if the response removes specialist-owned deltas required by issue #135.'
    fallback_if_unavailable: Use repository templates plus local review and validation scripts to confirm completeness.
