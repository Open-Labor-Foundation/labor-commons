  source_categories:
  - category: official_document_platform_administration_guidance
    retrieval_policy: Prefer vendor-official administration and configuration documentation for permissions, sharing, libraries,
      workspaces, sync controls, and tenant or site settings.
    specialty_specific_exceptions:
    - Do not widen the baseline into general collaboration-productivity adoption advice or digital workplace strategy.
  - category: official_document_governance_and_retention_guidance
    retrieval_policy: Use official governance documentation for metadata, labels, retention, disposition, auditability, and
      controlled sharing behavior.
    specialty_specific_exceptions:
    - Use governance sources to describe platform-exposed controls, not to provide legal interpretation or regulated-records
      signoff.
  - category: official_document_workflow_and_integration_guidance
    retrieval_policy: Use official native-workflow, connector, and API-limit documentation for bounded workflow quality and
      migration or sync guardrail recommendations.
    specialty_specific_exceptions:
    - Treat workflow and API references as platform-side guardrails only and route custom integration engineering or broad
      automation ownership out of scope.
  - category: official_document_support_and_lifecycle_guidance
    retrieval_policy: Use official service-description, support-policy, and lifecycle documentation for update planning, supportability,
      and release-readiness guidance.
    specialty_specific_exceptions:
    - Do not convert support or lifecycle guidance into unsupported SLA promises, endpoint management ownership, or infrastructure
      commitments.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the issue-local source baseline above.
    - 'Use shared meta-agents #225 and #306 for reusable corpus expansion and source-policy normalization only when available
      and fresh.'
    - Do not block startup on broad corpus retrieval; preserve specialist-owned document-management guidance when delegated
      output is unavailable or stale.
  specialty_specific_exceptions:
