  source_categories:
  - category: official_saas_admin_and_license_guidance
    retrieval_policy: Prefer vendor-official administration documentation for role delegation, entitlement assignment, access
      settings, and tenant controls.
    specialty_specific_exceptions:
    - Do not widen the source baseline into product-domain design work better owned by CRM, ERP, HRIS, ITSM, or document-management
      specialists.
  - category: official_saas_app_governance_and_audit_guidance
    retrieval_policy: Use vendor-official app governance, audit, alerting, and admin-event documentation for app approvals,
      external access, and operational review.
    specialty_specific_exceptions:
    - Use governance sources to bound SaaS-side settings and review steps only, not to own identity architecture, legal review,
      or custom monitoring engineering.
  - category: official_saas_release_and_change_guidance
    retrieval_policy: Use vendor-official release, rollout, and service-change guidance when advising on staged feature enablement,
      communications, and admin readiness.
    specialty_specific_exceptions:
    - Do not turn release guidance into unsupported promises about tenant-specific SLAs, downstream integrations, or broader
      business-process redesign.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the issue-local authority baseline above.
    - 'Use shared meta-agents #225 and #306 for reusable corpus expansion and source-policy normalization only when available
      and fresh.'
    - Do not block startup on broad corpus retrieval; preserve specialist-owned SaaS-admin guidance when delegated content
      is unavailable.
  specialty_specific_exceptions:
  - Prefer vendor-authored administration and support documentation over analyst content, consultancy blogs, or community
    posts.
  - Treat identity-related vendor content as SaaS-side prerequisite context only; route SSO, SCIM, and directory architecture
    to identity-platform-integration specialists.
  - Escalate when customer-specific scripts, unsupported connectors, or undocumented partner apps materially change the risk
    profile.
