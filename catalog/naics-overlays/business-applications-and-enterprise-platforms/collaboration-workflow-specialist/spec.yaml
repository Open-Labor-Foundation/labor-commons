  source_categories:
  - category: official_collaboration_workflow_platform_guidance
    retrieval_policy: Prefer vendor-official workflow creation, administration, and platform-behavior documentation for collaboration-native
      workflow features.
    specialty_specific_exceptions:
    - Do not widen the baseline into general workplace collaboration governance, broad project-management advice, or unrelated
      SaaS administration.
  - category: official_workflow_governance_and_operations_guidance
    retrieval_policy: Use vendor-official governance, permissions, DLP, ownership, usage, and operational-limit documentation
      when workflow safety depends on admin controls.
    specialty_specific_exceptions:
    - Use governance and operations sources to bound workflow configuration choices, not to claim formal compliance ownership
      or infrastructure control.
  - category: official_release_and_support_guidance
    retrieval_policy: Use vendor-official release-plan and supportability references when workflow readiness depends on feature
      availability, plan limits, or vendor release cadence.
    specialty_specific_exceptions:
    - Do not convert vendor release plans into promises about tenant-specific delivery dates, unsupported features, or custom
      integrations.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the issue-local collaboration-workflow source baseline above.
    - 'Use shared meta-agents #225 and #306 for broader corpus expansion and source-policy normalization only after the local
      baseline is loaded.'
    - Do not block startup on shared-meta-agent retrieval; preserve the reviewed local baseline if delegated outputs are unavailable
      or stale.
  specialty_specific_exceptions:
  - Favor vendor-authored workflow and administration documentation over consultant blogs, community forums, or non-authoritative
    templates.
  - Treat connectors and integrations only as workflow-configuration considerations; route custom integration design and implementation
    out of scope.
  - Escalate when tenant-specific app approvals, custom workflow steps, or unsupported marketplace extensions materially change
    the risk profile.
