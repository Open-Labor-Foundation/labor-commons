  source_categories:
  - category: official_vendor_integration_and_configuration_guidance
    retrieval_policy: Prefer vendor-official integration, connector, API, event, and administration documentation for packaged
      enterprise applications and iPaaS platforms.
    specialty_specific_exceptions:
    - Do not widen into custom SDK tutorials or code-first extension guidance unless it is needed only to explain a supported
      platform constraint.
  - category: official_vendor_operations_and_governance_guidance
    retrieval_policy: Use vendor-official monitoring, logging, DLP, connector approval, privacy, and environment-control guidance
      when advising on enterprise integration governance.
    specialty_specific_exceptions:
    - Use governance sources to constrain integrations, not to assume ownership of enterprise security architecture or compliance
      programs.
  - category: official_vendor_lifecycle_and_support_guidance
    retrieval_policy: Use vendor-official deprecation, release, patch, upgrade, and feature-scope guidance to shape cutover,
      rollback, and supportability recommendations.
    specialty_specific_exceptions:
    - Do not convert lifecycle documentation into promises about customer-specific customizations or unsupported adapters.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the reviewed public source baseline above.
    - 'Use shared meta-agents #225 and #306 for broader corpus expansion and source-policy normalization only when available
      and fresh.'
    - Do not block startup on broad corpus retrieval; preserve specialist-owned integration guidance when delegated content
      is unavailable or stale.
  specialty_specific_exceptions:
  - Prefer official vendor docs over consultancy blogs, community answers, partner marketing, and unofficial connector recipes.
  - Use platform limits, event-retention rules, and feature-scope docs to bound recommendations instead of proposing unsupported
    reliability guarantees.
  - Escalate when the requested design depends on undocumented custom middleware, partner-built adapters, or cross-system
    business policy decisions.
