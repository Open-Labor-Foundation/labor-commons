  source_categories:
  - category: public_it_governance_frameworks_and_standards
    retrieval_policy: Prefer official governance standards and framework-owner publications that define governing-body accountability,
      oversight, evaluation, direction, and monitoring.
    specialty_specific_exceptions:
    - Do not widen the baseline into broad corporate law, internal audit methodology, or generic change-management commentary.
  - category: public_risk_and_control_governance_guidance
    retrieval_policy: Use official public guidance that connects policy, control ownership, evidence traceability, and enterprise-risk
      prioritization.
    specialty_specific_exceptions:
    - Use audit and control references to improve governance traceability, not to take over control testing or formal attestation.
  - category: official_cloud_governance_documentation
    retrieval_policy: Use provider-official hierarchy, policy, and governance guidance where operating-model guardrails or
      oversight structures matter.
    specialty_specific_exceptions:
    - Do not let cloud-platform governance sources pull the specialist into architecture design, platform administration,
      or direct implementation.
  - category: official_licensing_and_cost_governance_documentation
    retrieval_policy: Use official licensing, billing, and cost-governance documents only to answer oversight, review, and
      escalation questions.
    specialty_specific_exceptions:
    - Do not use these sources to replace software-licensing, asset-management, procurement, or FinOps specialists for detailed
      execution work.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the issue-local authority baseline above.
    - 'Use shared meta-agents #225 and #306 for reusable corpus expansion and source-policy normalization only when available
      and fresh.'
    - Do not block startup on broad corpus retrieval; preserve specialist-owned IT-governance guidance when delegated content
      is unavailable.
  specialty_specific_exceptions:
  - Prefer sources that define decision rights, policy and control accountability, exceptions, traceability, and governance
    operating models over broad digital-transformation strategy.
  - Use licensing and billing sources only to support governance oversight, review cadence, and escalation, not detailed entitlement
    math or spend-optimization execution.
  - Treat cloud governance hierarchy and policy sources as guardrail references, not authority to administer tenant platforms
    or design target architectures.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-09-17'
shared_meta_agent_integration:
  bootstrap_metadata:
    issue_id: 121
    local_baseline_required: true
    deferred_initialization_supported: true
    startup_sequence:
    - Load local manifest, evaluation artifacts, and readiness evidence first.
    - Optionally invoke shared meta-agents for normalization after local baseline validation succeeds.
    - Refuse any delegated output that broadens scope beyond the IT-governance boundary.
    request_context_fields:
    - agent_slug
    - domain_family
    - release_version
    - specialty_boundary
    - target_delivery_level
    - source_categories
    - fallback_mode
  specialist_owned_responsibilities:
  - Define the narrow IT-governance specialty boundary, adjacent-specialty routing, and explicit refusal behavior.
  - Maintain the minimum authoritative source baseline, source categories, and specialty-specific exceptions required for
    safe startup.
  - Provide IT-governance-specific scenarios, governance exceptions, commercial-oversight constraints, low-confidence handling,
    and evidence statements.
  - Define request and response contracts plus fallback behavior for delegated shared meta-agent calls.
  delegated_responsibilities:
  - Reusable best-practice corpus retrieval and normalization
  - Repeated evaluation-suite normalization and regression-coverage patterns
  - Readiness evidence consistency review and packaging normalization
  - Deployment package boilerplate normalization
  - Commercialization and packaging boilerplate normalization
  - Authority-source policy normalization
  - Boundary-routing phrasing normalization where centrally derivable
  - Package scaffolding consistency review
  delegated_contracts:
  - issue_id: 225
    slug: best-practices-curation-specialist
    purpose: Expand reusable IT-governance best-practice coverage without rebuilding the shared corpus locally.
    request_contract:
      required_fields:
      - agent_slug
      - source_categories
      - specialty_boundary
      - retrieval_policy.mode
      optional_fields:
      - tenant_context_excluded_confirmation
      - specialty_specific_exceptions
    expected_response:
      required_outputs:
      - candidate public source additions
      - normalization notes
      - staleness timestamp
      rejection_condition: Reject if sources are not public, authoritative, or boundary-consistent.
    fallback_if_unavailable: Keep the local source baseline only and state that broader corpus normalization is deferred.
  - issue_id: 302
    slug: evaluation-design-specialist
    purpose: Normalize scenario taxonomy and coverage framing across repeated specialist packages.
    request_contract:
      required_fields:
      - minimum_scenario_count
      - acceptance_thresholds
      - required_coverage_classes
      - specialty_boundary
      optional_fields:
      - existing_scenarios
    expected_response:
      required_outputs:
      - coverage review
      - gap list
      - normalization recommendations
      rejection_condition: Reject if proposed scenarios dilute IT-governance specificity or remove out-of-scope and low-confidence
        coverage.
    fallback_if_unavailable: Use the local 12-scenario matrix and record pass or fail rationale directly in repository artifacts.
  - issue_id: 303
    slug: readiness-and-evidence-specialist
    purpose: Review consistency across manifest, evaluation results, readiness evidence, and release notes.
    request_contract:
      required_fields:
      - delivery_status
      - evaluation_results_path
      - readiness_evidence_path
      - release_readiness_path
      optional_fields:
      - human_verification_notes
    expected_response:
      required_outputs:
      - consistency check result
      - missing evidence list
      - readiness normalization notes
      rejection_condition: Reject if the delegated review attempts to replace local human verification or specialist-owned
        evidence.
    fallback_if_unavailable: Rely on local readiness checklist, local evidence review, and repository validation scripts.
  - issue_id: 304
    slug: deployment-package-specialist
    purpose: Normalize deployment-package structure for runtime, isolation, rollback, and monitoring notes.
    request_contract:
      required_fields:
      - deployment_model
      - tenant_adaptation_policy
      - rollback_requirements
      - monitoring_expectations
      optional_fields:
      - shared_meta_agent_dependencies
    expected_response:
      required_outputs:
      - package structure review
      - missing deployment note list
      - normalization recommendations
      rejection_condition: Reject if the response changes the IT-governance runtime constraints or weakens rollback requirements.
    fallback_if_unavailable: Ship the local deployment package with conservative isolation, monitoring, and rollback requirements.
  - issue_id: 305
    slug: commercialization-and-packaging-specialist
    purpose: Normalize buyer profile, subscription framing, and proof-point wording.
    request_contract:
      required_fields:
      - target_buyer_profile
      - target_user_profile
      - proof_points
      - go_to_market_gaps
      optional_fields:
      - subscription_model
    expected_response:
      required_outputs:
      - positioning review
      - commercial wording notes
      - risk flags
      rejection_condition: Reject if the response broadens scope into adjacent specialties or promises unsupported customer
        outcomes.
    fallback_if_unavailable: Use local marketing notes and keep commercialization claims limited to evidence-backed readiness.
  - issue_id: 306
    slug: authority-source-policy-specialist
    purpose: Normalize refresh intervals, decay policy, and source-governance consistency.
    request_contract:
      required_fields:
      - authority_sources
      - source_categories
      - next_review_due_at
      optional_fields:
      - specialty_specific_exceptions
    expected_response:
      required_outputs:
      - source policy review
      - refresh or decay adjustments
      - staleness flags
      rejection_condition: Reject if the response removes the minimum local baseline required for safe startup.
    fallback_if_unavailable: Retain the current source set and require manual refresh review on the next release cycle.
  - issue_id: 307
    slug: specialty-boundary-and-routing-specialist
    purpose: Check adjacent-specialty routing and refusal phrasing for consistency.
    request_contract:
      required_fields:
      - specialty_boundary
      - out_of_scope_rules
      - orchestrator_return_rules
      - adjacent_specialties
      optional_fields:
      - example_refusals
    expected_response:
      required_outputs:
      - routing review
      - boundary conflict list
      - rejection-language recommendations
      rejection_condition: Reject if the delegated output broadens the IT-governance lane or collapses distinct adjacent specialties.
    fallback_if_unavailable: Apply the local boundary and routing rules unchanged.
  - issue_id: 308
    slug: agent-package-scaffolding-specialist
    purpose: Verify package completeness and scaffold alignment with repository standards.
    request_contract:
      required_fields:
      - package_path
      - required_files
      - delivery_contract
      optional_fields:
      - validation_commands
    expected_response:
      required_outputs:
      - file coverage review
      - scaffold consistency notes
      - missing artifact list
      rejection_condition: Reject if the response substitutes missing artifacts with synthetic placeholders instead of requiring
        concrete files.
    fallback_if_unavailable: Rely on repository validation scripts and local completeness review.
  shared_fallback_contract:
    trigger_conditions:
    - shared meta-agent is unavailable
    - shared meta-agent result is stale
    - shared meta-agent output is low-confidence
    - shared meta-agent output conflicts with the IT-governance boundary
    behavior:
    - Proceed with the local specialist-owned baseline only.
    - State confidence and freshness limits explicitly.
    - Escalate unresolved ambiguity to the orchestrator instead of guessing.
