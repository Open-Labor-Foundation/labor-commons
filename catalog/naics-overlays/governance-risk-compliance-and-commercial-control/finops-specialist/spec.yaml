  source_policy:
    source_categories:
    - public FinOps framework and terminology guidance from the FinOps Foundation
    - open billing-data specification and normalization guidance
    - official provider billing, budget, allocation, export, and commitment documentation
    - public governance standards used only to anchor accountability and oversight expectations
    retrieval_policy:
    - Prefer current provider-official billing, budgeting, export, and commitment documentation over third-party summaries.
    - Treat tenant-provided billing exports, invoices, and configuration evidence as controlling for tenant-specific conclusions,
      with public sources framing the baseline.
    - Escalate when billing exports, commitment terms, allocation rules, or provider scope are missing or inconsistent.
    - Use shared meta-agents only for normalization and reusable expansion after the local reviewed baseline is loaded.
    specialty_exceptions:
    - Do not claim formal accounting, tax, or legal conclusions from FinOps framework or provider billing documentation.
    - Do not recreate the full shared best-practice corpus locally when delegated retrieval can safely augment the baseline
      on demand.
shared_meta_agent_integration:
  bootstrap_metadata:
    issue_id: 129
    local_baseline_required: true
    deferred_initialization_supported: true
    startup_sequence:
    - Load local manifest, evaluation artifacts, and readiness evidence first.
    - Optionally invoke shared meta-agents for normalization after local baseline validation succeeds.
    - Refuse any delegated output that broadens scope beyond the FinOps boundary.
    request_context_fields:
    - agent_slug
    - domain_family
    - release_version
    - specialty_boundary
    - target_delivery_level
    - source_categories
    - fallback_mode
  specialist_owned_responsibilities:
  - Define the narrow FinOps specialty boundary, adjacent-specialty routing, and explicit refusal behavior.
  - Maintain the minimum authoritative source baseline, source categories, and specialty-specific exceptions required for
    safe startup.
  - Provide FinOps-specific scenarios, allocation and commitment constraints, low-confidence handling, and evidence statements.
  - Define request and response contracts plus fallback behavior for delegated shared meta-agent calls.
  delegated_responsibilities:
  - Reusable best-practice corpus retrieval and normalization
  - Repeated evaluation-suite normalization and regression-coverage patterns
  - Readiness evidence consistency review and packaging normalization
  - Deployment package boilerplate normalization
  - Commercialization and packaging boilerplate normalization
  - Authority-source policy normalization
  - Boundary-routing phrasing normalization where centrally derivable
  - Package scaffolding consistency review
  delegated_contracts:
  - issue_id: 225
    slug: best-practices-curation-specialist
    purpose: Expand reusable FinOps best-practice coverage without rebuilding the shared corpus locally.
    request_contract:
      required_fields:
      - agent_slug
      - source_categories
      - specialty_boundary
      - retrieval_policy.mode
      optional_fields:
      - tenant_context_excluded_confirmation
      - specialty_specific_exceptions
    expected_response:
      required_outputs:
      - candidate public source additions
      - normalization notes
      - staleness timestamp
      rejection_condition: Reject if sources are not public, authoritative, or boundary-consistent.
    fallback_if_unavailable: Keep the local source baseline only and state that broader corpus normalization is deferred.
  - issue_id: 302
    slug: evaluation-design-specialist
    purpose: Normalize scenario taxonomy and coverage framing across repeated specialist packages.
    request_contract:
      required_fields:
      - minimum_scenario_count
      - acceptance_thresholds
      - required_coverage_classes
      - specialty_boundary
      optional_fields:
      - existing_scenarios
    expected_response:
      required_outputs:
      - coverage review
      - gap list
      - normalization recommendations
      rejection_condition: Reject if proposed scenarios dilute FinOps specificity or remove out-of-scope and low-confidence
        coverage.
    fallback_if_unavailable: Use the local 12-scenario matrix and record pass or fail rationale directly in repository artifacts.
  - issue_id: 303
    slug: readiness-and-evidence-specialist
    purpose: Review consistency across manifest, evaluation results, readiness evidence, and release notes.
    request_contract:
      required_fields:
      - delivery_status
      - evaluation_results_path
      - readiness_evidence_path
      - release_readiness_path
      optional_fields:
      - human_verification_notes
    expected_response:
      required_outputs:
      - consistency check result
      - missing evidence list
      - readiness normalization notes
      rejection_condition: Reject if the delegated review attempts to replace local human verification or specialist-owned
        evidence.
    fallback_if_unavailable: Use local artifact cross-checking and human review, then record that reusable readiness normalization
      is deferred.
  - issue_id: 304
    slug: deployment-package-specialist
    purpose: Normalize repeated deployment and rollback notes while preserving FinOps-specific runtime constraints locally.
    request_contract:
      required_fields:
      - runtime_profile
      - tenant_isolation_model
      - monitoring_expectations
      - rollback_path
      optional_fields:
      - support_owner
    expected_response:
      required_outputs:
      - deployment package notes
      - rollback checklist
      - monitoring and logging checklist
      rejection_condition: Reject if deployment guidance assumes cross-tenant data sharing or direct provider credentials
        are mandatory for baseline operation.
    fallback_if_unavailable: Retain the local deployment package and note that reusable deployment normalization was not retrieved.
  - issue_id: 305
    slug: commercialization-and-packaging-specialist
    purpose: Normalize buyer, packaging, and subscription framing for validated release claims.
    request_contract:
      required_fields:
      - target_buyer
      - problem_statement
      - subscription_model
      - proof_points
      optional_fields:
      - known_gtm_gaps
    expected_response:
      required_outputs:
      - positioning notes
      - subscription framing
      - go-to-market gap review
      rejection_condition: Reject if commercialization language claims realized savings or revenue proof not supported by
        repository evidence.
    fallback_if_unavailable: Use local marketing notes and keep claims limited to package readiness, evaluation performance,
      and source-backed scope.
  - issue_id: 306
    slug: authority-source-policy-specialist
    purpose: Normalize source categories, refresh policies, and decay handling across repeated packages.
    request_contract:
      required_fields:
      - source_categories
      - refresh_policy
      - decay_policy
      - stale_threshold
      optional_fields:
      - specialty_specific_exceptions
    expected_response:
      required_outputs:
      - normalized source-policy notes
      - refresh recommendations
      - staleness warnings
      rejection_condition: Reject if the source policy broadens the corpus beyond public authoritative FinOps and provider
        billing guidance.
    fallback_if_unavailable: Keep the local source policy and refresh intervals as the authoritative baseline.
  - issue_id: 307
    slug: specialty-boundary-and-routing-specialist
    purpose: Review boundary sharpness and routing language against adjacent specialists.
    request_contract:
      required_fields:
      - specialty_boundary
      - out_of_scope_rules
      - adjacent_specialties
      - orchestrator_return_rules
      optional_fields:
      - high_overlap_examples
    expected_response:
      required_outputs:
      - boundary conflict review
      - routing recommendations
      - rejection phrasing notes
      rejection_condition: Reject if routing suggestions expand the FinOps lane into procurement, accounting, legal, or engineering
        execution.
    fallback_if_unavailable: Use the locally defined adjacent-specialty map and retain conservative refusal behavior.
  - issue_id: 308
    slug: agent-package-scaffolding-specialist
    purpose: Validate package completeness against shared scaffolding expectations.
    request_contract:
      required_fields:
      - file_layout
      - required_artifacts
      - template_compliance
      optional_fields:
      - delivery_status_target
    expected_response:
      required_outputs:
      - package completion checklist
      - missing artifact report
      - template variance notes
      rejection_condition: Reject if scaffolding feedback conflicts with repository-required files or issue-specific delivery
        expectations.
    fallback_if_unavailable: Rely on the repository scaffold plus local validation scripts to confirm package completeness.
  fallback:
    stale_threshold_days: 30
    unresponsive_threshold_minutes: 15
    on_stale: Continue with the manifest baseline only, mark delegated evidence as stale, and avoid expanding claims beyond
      specialist-owned evidence.
    on_unresponsive: Proceed with specialist-owned baseline behavior, record the missing delegated artifact type, and return
      unresolved normalization needs to the orchestrator.
    on_low_confidence: State uncertainty, request additional billing, allocation, or commitment evidence, and prefer conservative
      escalation over speculative financial conclusions.
