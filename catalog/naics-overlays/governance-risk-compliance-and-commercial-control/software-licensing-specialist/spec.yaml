  source_policy:
    source_categories:
    - public standards and control frameworks for IT asset and licensing governance
    - official vendor licensing, product terms, and subscription program documentation
    - official public procurement or category-management guidance relevant to software licensing
    - 'specialty-specific exception: open-source license program standards used only for operational control guidance, not
      legal conclusions'
    retrieval_policy:
    - Prefer the publisher's current public licensing terms or program page over third-party summaries.
    - Treat customer-provided agreements and order forms as controlling for tenant-specific advice, with public sources used
      only to frame baseline reasoning.
    - Escalate when the governing document is gated, missing version context, or conflicts with public vendor guidance.
    specialty_exceptions:
    - Do not claim final legal interpretation of ambiguous clauses; route those cases to legal counsel.
    - Do not recreate a full vendor corpus locally when shared meta-agents can retrieve normalized additions on demand.
shared_meta_agent_contracts:
  bootstrap_metadata:
    package_slug: software-licensing-specialist
    domain_slug: governance-risk-compliance-and-commercial-control
    priority: high
    validation_profile: standard
    specialist_owned_responsibilities:
    - Define the narrow software-licensing boundary and explicit adjacent-specialty rejection map.
    - Provide software-licensing-specific deltas for entitlement reasoning, audit evidence, renewal-risk framing, and open-source
      compliance control escalation.
    - Specify bootstrap metadata plus request and response contracts for shared meta-agent calls.
    - Define fallback behavior when delegated outputs are unavailable, stale, low-confidence, or boundary-conflicting.
    delegated_responsibilities:
    - Best-practice corpus retrieval and normalization.
    - Evaluation-suite normalization and reusable rubric packaging.
    - Readiness evidence normalization and repeated release boilerplate.
    - Deployment package boilerplate and commercialization boilerplate.
    - Authority-source policy normalization and generic boundary-review normalization.
    delegated_contracts:
    - agent: best-practices-curation-specialist
      request_contract:
        request_type: authoritative_source_set
        required_fields:
        - source_category
        - vendor_or_standard
        - licensing_topic
        - refresh_expectation
        - specialty_exception
      response_contract:
        deliverable: source additions or refresh candidates for software licensing baseline
    - agent: evaluation-design-specialist
      request_contract:
        request_type: scenario_validation
        required_fields:
        - scenario_id
        - risk_level
        - failure_mode
        - expected_behavior
        - boundary_rule
      response_contract:
        deliverable: normalized software licensing scenario set with pass criteria and risk coverage checks
    - agent: readiness-and-evidence-specialist
      request_contract:
        request_type: evidence_packaging
        required_fields:
        - delivery_status
        - human_verification
        - deployment_readiness
        - commercialization_readiness
        - readiness_notes
      response_contract:
        deliverable: structured readiness evidence draft
    - agent: deployment-package-specialist
      request_contract:
        request_type: ops_runbook
        required_fields:
        - runtime_profile
        - tenant_isolation_model
        - monitoring_expectations
        - rollback_path
        - support_model
      response_contract:
        deliverable: deployment package and rollback notes
    - agent: commercialization-and-packaging-specialist
      request_contract:
        request_type: commercial_readiness
        required_fields:
        - target_buyer
        - core_problem
        - subscription_model
        - proof_points
        - gtm_gaps
      response_contract:
        deliverable: marketing readiness and packaging language
    - agent: authority-source-policy-specialist
      request_contract:
        request_type: source_policy
        required_fields:
        - source_categories
        - refresh_policy
        - decay_policy
        - stale_threshold
      response_contract:
        deliverable: source refresh and decay recommendations
    - agent: specialty-boundary-and-routing-specialist
      request_contract:
        request_type: boundary_review
        required_fields:
        - specialty_boundary
        - out_of_scope_rules
        - adjacent_specialists
        - handoff_targets
      response_contract:
        deliverable: boundary conflict review and routing suggestions
    - agent: agent-package-scaffolding-specialist
      request_contract:
        request_type: scaffold_validation
        required_fields:
        - file_layout
        - required_artifacts
        - template_compliance
      response_contract:
        deliverable: package completion checklist
  fallback:
    stale_threshold_days: 30
    unresponsive_threshold_minutes: 15
    on_stale: Continue with the manifest baseline only, mark delegated evidence as stale, and avoid expanding claims beyond
      specialist-owned evidence.
    on_unresponsive: Proceed with specialist-owned baseline behavior, record the missing delegated artifact type, and return
      unresolved normalization needs to the orchestrator.
    on_low_confidence: State uncertainty, request additional entitlement or contract evidence, and prefer conservative escalation
      over speculative licensing conclusions.
