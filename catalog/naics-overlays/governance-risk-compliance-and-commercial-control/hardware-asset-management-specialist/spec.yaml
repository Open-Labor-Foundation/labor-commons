  source_categories:
  - category: public_it_asset_management_standards_and_service_practices
    retrieval_policy: Prefer official IT asset management standards and formal practice-owner guidance that define lifecycle
      governance, inventory accountability, and evidence expectations.
    specialty_specific_exceptions:
    - Do not widen the baseline into broad software asset management or generic service-management commentary when the request
      is specifically about hardware asset lifecycle controls.
  - category: public_controls_and_governance_frameworks
    retrieval_policy: Use official public control and governance frameworks to ground accountability, preventive and detective
      controls, traceability, and risk-based prioritization.
    specialty_specific_exceptions:
    - Use control frameworks to strengthen lifecycle control design, not to take over formal audit attestation, legal interpretation,
      or accounting conclusions.
  - category: public_disposition_and_media_sanitization_guidance
    retrieval_policy: Use official government guidance for sanitization and disposition when hardware retirement, data-bearing
      media, or destruction evidence is in scope.
    specialty_specific_exceptions:
    - Do not transform sanitization guidance into hands-on security operations or incident response execution.
  - category: official_hardware_asset_platform_and_recovery_documentation
    retrieval_policy: Use official vendor HAM and recovery-service documentation only where lifecycle stages, contract checkpoints,
      inventory audit features, or end-of-life process expectations materially affect the recommendation.
    specialty_specific_exceptions:
    - Do not let platform or vendor documentation pull the specialist into tool implementation, procurement negotiation, or
      product endorsement.
  - category: public_property_and_procurement_governance_guidance
    retrieval_policy: Use official public property or procurement-governance guidance where receiving, custody, reutilization,
      return, or disposition controls need a public accountability baseline.
    specialty_specific_exceptions:
    - Do not use property or procurement references to replace sourcing, budget, or vendor-negotiation specialists.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the issue-local authority baseline above.
    - 'Use shared meta-agents #225 and #306 for reusable corpus expansion and source-policy normalization only when available
      and fresh.'
    - Do not block startup on broad corpus retrieval; preserve specialist-owned hardware asset management guidance when delegated
      content is unavailable.
  specialty_specific_exceptions:
  - Prefer sources that define lifecycle accountability, receiving and custody controls, stockroom governance, sanitization
    evidence, and disposition checkpoints over broad endpoint-management implementation guidance.
  - Use commercial or vendor sources only to explain hardware lifecycle obligations, warranties, lease-return checkpoints,
    and recovery services, not to recommend a vendor or negotiate terms.
  - Escalate when customer-specific lease, warranty, insurance, tax, or contractual obligations control the answer and are
    missing or ambiguous.
  - Do not recreate a full shared lifecycle corpus locally when shared meta-agents can retrieve normalized additions on demand.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-07-20'
shared_meta_agent_contracts:
  bootstrap_metadata:
    package_slug: hardware-asset-management-specialist
    domain_slug: governance-risk-compliance-and-commercial-control
    priority: medium
    validation_profile: standard
    specialist_owned_responsibilities:
    - Define the narrow hardware asset management boundary and explicit adjacent-specialty rejection map.
    - Provide hardware-specific deltas for custody controls, stockroom accountability, refresh and recovery checkpoints, and
      disposal evidence.
    - Specify bootstrap metadata plus request and response contracts for shared meta-agent calls.
    - Define fallback behavior when delegated outputs are unavailable, stale, low-confidence, or boundary-conflicting.
    delegated_responsibilities:
    - Best-practice corpus retrieval and normalization.
    - Evaluation-suite normalization and reusable rubric packaging.
    - Readiness evidence normalization and repeated release boilerplate.
    - Deployment package boilerplate and commercialization boilerplate.
    - Authority-source policy normalization and generic boundary-review normalization.
    delegated_contracts:
      agent: best-practices-curation-specialist
      request_contract:
        request_type: authoritative_source_set
        required_fields:
        - source_category
        - asset_lifecycle_phase
        - hardware_topic
        - refresh_expectation
        - specialty_exception
      response_contract:
        deliverable: source additions or refresh candidates for hardware asset management baseline
      agent: evaluation-design-specialist
      request_contract:
        request_type: scenario_validation
        required_fields:
        - scenario_id
        - risk_level
        - failure_mode
        - expected_behavior
        - boundary_rule
      response_contract:
        deliverable: normalized hardware asset management scenario set with pass criteria and risk coverage checks
      agent: readiness-and-evidence-specialist
      request_contract:
        request_type: evidence_packaging
        required_fields:
        - delivery_status
        - human_verification
        - deployment_readiness
        - commercialization_readiness
        - readiness_notes
      response_contract:
        deliverable: structured readiness evidence draft
      agent: deployment-package-specialist
      request_contract:
        request_type: ops_runbook
        required_fields:
        - runtime_profile
        - tenant_isolation_model
        - monitoring_expectations
        - rollback_path
        - support_model
      response_contract:
        deliverable: deployment package and rollback notes
      agent: commercialization-and-packaging-specialist
      request_contract:
        request_type: commercial_readiness
        required_fields:
        - target_buyer
        - core_problem
        - subscription_model
        - proof_points
        - gtm_gaps
      response_contract:
        deliverable: marketing readiness and packaging language
      agent: authority-source-policy-specialist
      request_contract:
        request_type: source_policy
        required_fields:
        - source_categories
        - refresh_policy
        - decay_policy
        - stale_threshold
      response_contract:
        deliverable: source refresh and decay recommendations
      agent: specialty-boundary-and-routing-specialist
      request_contract:
        request_type: boundary_review
        required_fields:
        - specialty_boundary
        - out_of_scope_rules
        - adjacent_specialists
        - handoff_targets
      response_contract:
        deliverable: boundary conflict review and routing suggestions
      agent: agent-package-scaffolding-specialist
      request_contract:
        request_type: scaffold_validation
        required_fields:
        - file_layout
        - required_artifacts
        - template_compliance
      response_contract:
        deliverable: package completion checklist
  fallback:
    stale_threshold_days: 30
    unresponsive_threshold_minutes: 15
    on_stale: Continue with the manifest baseline only, mark delegated evidence as stale, and avoid expanding claims beyond
      specialist-owned evidence.
    on_unresponsive: Proceed with specialist-owned baseline behavior, record the missing delegated artifact type, and return
      unresolved normalization needs to the orchestrator.
    on_low_confidence: State uncertainty, request additional lifecycle or contract evidence, and prefer conservative escalation
      over speculative hardware asset conclusions.
    on_boundary_conflict: Prefer this manifest's narrow specialty boundary and route the conflicting work back to the orchestrator.
