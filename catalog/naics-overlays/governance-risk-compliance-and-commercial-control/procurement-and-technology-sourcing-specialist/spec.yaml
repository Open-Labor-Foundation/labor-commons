  source_categories:
  - category: official_public_procurement_and_acquisition_planning_guidance
    retrieval_policy: Prefer official public procurement regulations, agency guidance, and standards-owner publications that
      define acquisition planning, market research, and sourcing governance checkpoints.
    specialty_specific_exceptions:
    - Do not widen the baseline into jurisdiction-specific legal opinions or procurement administration workflows that belong
      to implementation teams.
  - category: official_supply_chain_and_technology_acquisition_risk_guidance
    retrieval_policy: Use official public supply-chain and acquisition-risk guidance where supplier-selection controls and
      sourcing-stage risk treatment matter.
    specialty_specific_exceptions:
    - Use security-acquisition sources to shape sourcing controls and evidence requests only, not to perform security testing.
  - category: official_provider_pricing_and_billing_documentation
    retrieval_policy: Use current provider-operated pricing calculators, public billing guides, and official commercial model
      documentation for sourcing-stage comparison and total-cost assumptions.
    specialty_specific_exceptions:
    - Do not treat public calculator outputs as binding quotes or as substitutes for customer-specific order forms, reseller
      bids, or negotiated pricing.
  - category: official_public_negotiation_and_contract_structure_guidance
    retrieval_policy: Use official public acquisition regulations that define negotiated procurement structure, evaluation
      governance, and commercial arrangement types.
    specialty_specific_exceptions:
    - Do not let public acquisition framework language substitute for customer-specific legal approval or contract drafting.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the issue-local authority baseline above.
    - 'Use shared meta-agents #225 and #306 for reusable corpus expansion and source-policy normalization only when available
      and fresh.'
    - Do not block startup on broad corpus retrieval; preserve specialist-owned sourcing guidance when delegated content is
      unavailable.
  specialty_specific_exceptions:
  - Prefer sources that support acquisition planning, market research, pricing and commercial-model comparison, sourcing controls,
    and negotiation preparation over generic vendor marketing.
  - Use provider pricing sources to compare public commercial constructs and assumptions, not to make entitlement or legal
    commitments.
  - Escalate when customer-specific contracts, reseller quotes, or policy constraints conflict with public-source baseline
    assumptions.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-07-20'
shared_meta_agent_integration:
  bootstrap_metadata:
    issue_id: 130
    local_baseline_required: true
    deferred_initialization_supported: true
    startup_sequence:
    - Load local manifest, evaluation artifacts, and readiness evidence first.
    - Optionally invoke shared meta-agents for normalization after local baseline validation succeeds.
    - Refuse any delegated output that broadens scope beyond the procurement-and-technology-sourcing boundary.
    request_context_fields:
    - agent_slug
    - domain_family
    - release_version
    - specialty_boundary
    - target_delivery_level
    - source_categories
    - fallback_mode
  specialist_owned_responsibilities:
  - Define the narrow procurement-and-technology-sourcing boundary, adjacent-specialty routing, and explicit refusal behavior.
  - Maintain the minimum authoritative source baseline, source categories, and specialty-specific exceptions required for
    safe startup.
  - Provide sourcing-specific scenarios, escalation rules, low-confidence handling, pricing-assumption controls, and evidence
    statements.
  - Define request and response contracts plus fallback behavior for delegated shared meta-agent calls.
  delegated_responsibilities:
  - Reusable best-practice corpus retrieval and normalization
  - Repeated evaluation-suite normalization and regression-coverage patterns
  - Readiness evidence consistency review and packaging normalization
  - Deployment package boilerplate normalization
  - Commercialization and packaging boilerplate normalization
  - Authority-source policy normalization
  - Boundary-routing phrasing normalization where centrally derivable
  - Package scaffolding consistency review
  delegated_contracts:
  - issue_id: 225
    slug: best-practices-curation-specialist
    purpose: Expand reusable sourcing and procurement best-practice coverage without rebuilding the shared corpus locally.
    request_contract:
      required_fields:
      - agent_slug
      - source_categories
      - specialty_boundary
      - retrieval_policy.mode
      optional_fields:
      - commercial_model_family
      - specialty_specific_exceptions
    expected_response:
      required_outputs:
      - candidate public source additions
      - normalization notes
      - staleness timestamp
      rejection_condition: Reject if sources are not public, authoritative, or boundary-consistent.
    fallback_if_unavailable: Keep the local source baseline only and state that broader corpus normalization is deferred.
  - issue_id: 302
    slug: evaluation-design-specialist
    purpose: Normalize scenario taxonomy and coverage framing across repeated specialist packages.
    request_contract:
      required_fields:
      - minimum_scenario_count
      - acceptance_thresholds
      - required_coverage_classes
      - specialty_boundary
      optional_fields:
      - existing_scenarios
    expected_response:
      required_outputs:
      - coverage review
      - gap list
      - normalization recommendations
      rejection_condition: Reject if proposed scenarios dilute sourcing specificity or remove out-of-scope and low-confidence
        coverage.
    fallback_if_unavailable: Use the local 12-scenario matrix and record pass or fail rationale directly in repository artifacts.
  - issue_id: 303
    slug: readiness-and-evidence-specialist
    purpose: Review consistency across manifest, evaluation results, readiness evidence, and release notes.
    request_contract:
      required_fields:
      - delivery_status
      - evaluation_results_path
      - readiness_evidence_path
      - release_readiness_path
      optional_fields:
      - human_verification_notes
    expected_response:
      required_outputs:
      - consistency check result
      - missing evidence list
      - readiness normalization notes
      rejection_condition: Reject if the delegated review attempts to replace local human verification or specialist-owned
        evidence.
    fallback_if_unavailable: Rely on local readiness checklist, local evidence review, and repository validation scripts.
  - issue_id: 304
    slug: deployment-package-specialist
    purpose: Normalize deployment-package structure for runtime, isolation, rollback, and monitoring notes.
    request_contract:
      required_fields:
      - deployment_model
      - tenant_adaptation_policy
      - rollback_requirements
      - monitoring_expectations
      optional_fields:
      - shared_meta_agent_dependencies
    expected_response:
      required_outputs:
      - package structure review
      - missing deployment note list
      - normalization recommendations
      rejection_condition: Reject if deployment guidance assumes cross-tenant sharing or suppresses sourcing boundary escalations.
    fallback_if_unavailable: Use the local deployment package and verify readiness fields directly.
  - issue_id: 305
    slug: commercialization-and-packaging-specialist
    purpose: Normalize buyer, packaging, subscription, and proof-point framing for validated packages.
    request_contract:
      required_fields:
      - target_buyer
      - target_user
      - packaging_model
      - subscription_model
      optional_fields:
      - proof_points
      - gtm_gaps
    expected_response:
      required_outputs:
      - positioning review
      - proof-point review
      - gap summary
      rejection_condition: Reject if commercialization language overclaims implementation ownership, negotiated savings, or
        legal coverage.
    fallback_if_unavailable: Use the local marketing readiness notes and keep claims limited to repository-backed evidence.
  - issue_id: 306
    slug: authority-source-policy-specialist
    purpose: Normalize source categories, refresh intervals, and decay handling across shared baselines.
    request_contract:
      required_fields:
      - source_categories
      - refresh_intervals
      - decay_policy
      - specialty_specific_exceptions
      optional_fields:
      - current_source_list
    expected_response:
      required_outputs:
      - source policy review
      - staleness findings
      - normalization recommendations
      rejection_condition: Reject if recommended source substitutions are not public, authoritative, or appropriate for sourcing-stage
        work.
    fallback_if_unavailable: Use local review dates and interval rules recorded in the manifest.
  - issue_id: 307
    slug: specialty-boundary-and-routing-specialist
    purpose: Review adjacency phrasing and orchestrator handoff logic for specialty-safe routing.
    request_contract:
      required_fields:
      - specialty_boundary
      - out_of_scope_rules
      - adjacent_specialties
      - orchestrator_return_rules
      optional_fields:
      - recent_boundary_conflicts
    expected_response:
      required_outputs:
      - boundary conflict review
      - routing recommendations
      - phrasing notes
      rejection_condition: Reject if routing recommendations widen the sourcing boundary into legal, licensing, vendor management,
        or technical implementation.
    fallback_if_unavailable: Retain the local adjacency map and route ambiguous requests conservatively.
  - issue_id: 308
    slug: agent-package-scaffolding-specialist
    purpose: Verify repository file layout, required artifacts, and scaffold consistency.
    request_contract:
      required_fields:
      - file_layout
      - required_artifacts
      - template_compliance
      optional_fields:
      - readiness_state
    expected_response:
      required_outputs:
      - package completion checklist
      - template variance notes
      - missing artifact list
      rejection_condition: Reject if the scaffold review recommends deleting required validated artifacts.
    fallback_if_unavailable: Use repository validation scripts and local artifact review as the authoritative completion check.
  fallback:
    triggers:
    - shared meta-agent is unavailable
    - shared meta-agent result is stale
    - shared meta-agent output is low-confidence
    - shared meta-agent output conflicts with the procurement-and-technology-sourcing boundary
    required_behavior:
    - Continue using the local specialist baseline without claiming delegated normalization was completed.
    - Record the fallback event in deployment logs or release-review notes.
    - Escalate to the orchestrator if the missing delegated output blocks a safe sourcing recommendation.
    - Prefer conservative refusal or clarification over speculative commercial guidance.
