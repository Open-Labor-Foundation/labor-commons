    authority_reason: Official UK government appraisal guidance widely used to structure option analysis, value-for-money
      reasoning, and evidence-based investment decisions.
    last_reviewed_at: '2026-03-22'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: hm-treasury-business-case-guidance
    title: Business case guidance for projects and programmes
    publisher: HM Treasury
    source_type: business-case-guidance
    location: https://www.gov.uk/government/publications/business-case-guidance-for-projects-and-programmes
    authority_reason: Official supplementary business-case guidance aligned to the Five Case Model and used to structure strategic,
      economic, commercial, financial, and management-case content.
    last_reviewed_at: '2026-03-22'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: omb-capital-programming-guide
