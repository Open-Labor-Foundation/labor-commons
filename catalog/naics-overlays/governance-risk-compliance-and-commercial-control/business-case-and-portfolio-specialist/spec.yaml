    last_reviewed_at: '2026-03-22'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: azure-pricing-calculator
    title: Pricing Calculator
    publisher: Microsoft Azure
    source_type: pricing-documentation
    location: https://azure.microsoft.com/en-us/pricing/calculator/
