  source_categories:
  - category: public_enterprise_architecture_governance_frameworks
    retrieval_policy: Prefer official standards-owner and framework-owner publications that define enterprise architecture
      governance, architecture capability setup, decision rights, and review-board behavior.
    specialty_specific_exceptions:
    - Do not widen the baseline into broad digital-transformation strategy, solution-architecture implementation patterns,
      or generic corporate-governance commentary.
  - category: public_architecture_management_maturity_and_traceability_guidance
    retrieval_policy: Use official public sources that address enterprise architecture management maturity, decision traceability,
      artifact consistency, and architecture-review evidence quality.
    specialty_specific_exceptions:
    - Use modeling and maturity sources to improve architecture-governance evidence quality, not to mandate a specific modeling
      toolchain or produce detailed designs.
  - category: public_risk_and_control_governance_guidance
    retrieval_policy: Use official public guidance that links architecture decisions to risk management, accountability, and
      lifecycle review requirements.
    specialty_specific_exceptions:
    - Do not let risk and control guidance pull the specialist into controls testing, audit attestation, or broad IT-governance
      ownership.
  - category: official_provider_architecture_governance_examples
    retrieval_policy: Use provider-official governance and operating-model documentation only as bounded examples of architecture-governance
      implementation patterns.
    specialty_specific_exceptions:
    - Do not treat provider examples as universal standards or use them to take over cloud-architecture design, platform administration,
      procurement, or FinOps execution.
  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the issue-local authority baseline above.
    - 'Use shared meta-agents #225 and #306 for reusable corpus expansion and source-policy normalization only when available
      and fresh.'
    - Do not block startup on broad corpus retrieval; preserve specialist-owned enterprise-architecture-governance guidance
      when delegated content is unavailable.
  specialty_specific_exceptions:
  - Prefer sources that define architecture boards, principles, standards lifecycle, exceptions, conformance, and roadmap
    governance over generic enterprise-strategy literature.
  - Use commercial or provider-operating-model signals only to answer architecture-governance oversight questions, not sourcing,
    licensing, or spend-optimization execution.
  - Use provider cloud governance sources as bounded examples for governance-team design and guardrails, not as authority
    for detailed target-state architecture decisions.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-09-18'
shared_meta_agent_integration:
  bootstrap_metadata:
    issue_id: 132
    local_baseline_required: true
    deferred_initialization_supported: true
    startup_sequence:
    - Load local manifest, evaluation artifacts, and readiness evidence first.
    - Optionally invoke shared meta-agents for normalization after local baseline validation succeeds.
    - Refuse any delegated output that broadens scope beyond the enterprise-architecture-governance boundary.
    request_context_fields:
    - agent_slug
    - domain_family
    - release_version
    - specialty_boundary
    - target_delivery_level
    - source_categories
    - fallback_mode
  specialist_owned_responsibilities:
  - Define the narrow enterprise-architecture-governance specialty boundary, adjacent-specialty routing, and explicit refusal
    behavior.
  - Maintain the minimum authoritative source baseline, source categories, and specialty-specific exceptions required for
    safe startup.
  - Provide enterprise-architecture-governance-specific scenarios, standards and exception rules, commercial-oversight constraints,
    low-confidence handling, and evidence statements.
  - Define request and response contracts plus fallback behavior for delegated shared meta-agent calls.
  delegated_responsibilities:
  - Reusable best-practice corpus retrieval and normalization
  - Repeated evaluation-suite normalization and regression-coverage patterns
  - Readiness evidence consistency review and packaging normalization
  - Deployment package boilerplate normalization
  - Commercialization and packaging boilerplate normalization
  - Authority-source policy normalization
  - Boundary-routing phrasing normalization where centrally derivable
  - Package scaffolding consistency review
  delegated_contracts:
  - issue_id: 225
    slug: best-practices-curation-specialist
    purpose: Expand reusable enterprise-architecture-governance best-practice coverage without rebuilding the shared corpus
      locally.
    request_contract:
      required_fields:
      - agent_slug
      - source_categories
      - specialty_boundary
      - retrieval_policy.mode
      optional_fields:
      - tenant_context_excluded_confirmation
      - specialty_specific_exceptions
    expected_response:
      required_outputs:
      - candidate public source additions
      - normalization notes
      - staleness timestamp
      rejection_condition: Reject if sources are not public, authoritative, or boundary-consistent.
    fallback_if_unavailable: Keep the local source baseline only and state that broader corpus normalization is deferred.
  - issue_id: 302
    slug: evaluation-design-specialist
    purpose: Normalize scenario taxonomy and coverage framing across repeated specialist packages.
    request_contract:
      required_fields:
      - minimum_scenario_count
      - acceptance_thresholds
      - required_coverage_classes
      - specialty_boundary
      optional_fields:
      - existing_scenarios
    expected_response:
      required_outputs:
      - coverage review
      - gap list
      - normalization recommendations
      rejection_condition: Reject if proposed scenarios dilute enterprise-architecture-governance specificity or remove out-of-scope
        and low-confidence coverage.
    fallback_if_unavailable: Use the local 12-scenario matrix and record pass or fail rationale directly in repository artifacts.
  - issue_id: 303
    slug: readiness-and-evidence-specialist
    purpose: Review consistency across manifest, evaluation results, readiness evidence, and release notes.
    request_contract:
      required_fields:
      - delivery_status
      - evaluation_results_path
      - readiness_evidence_path
      - release_readiness_path
      optional_fields:
      - human_verification_notes
    expected_response:
      required_outputs:
      - consistency check result
      - missing evidence list
      - readiness normalization notes
      rejection_condition: Reject if the delegated review attempts to replace local human verification or specialist-owned
        evidence.
    fallback_if_unavailable: Rely on local readiness checklist, local evidence review, and repository validation scripts.
  - issue_id: 304
    slug: deployment-package-specialist
    purpose: Normalize deployment-package structure for runtime, isolation, rollback, and monitoring notes.
    request_contract:
      required_fields:
      - deployment_model
      - tenant_adaptation_policy
      - rollback_requirements
      - monitoring_expectations
      optional_fields:
      - shared_meta_agent_dependencies
    expected_response:
      required_outputs:
      - package structure review
      - missing deployment note list
      - normalization recommendations
      rejection_condition: Reject if deployment advice assumes cross-tenant state sharing or weakens boundary-safe routing.
    fallback_if_unavailable: Use the local deployment package and require repository validation before release.
  - issue_id: 305
    slug: commercialization-and-packaging-specialist
    purpose: Normalize marketing positioning, subscription framing, and proof-point packaging.
    request_contract:
      required_fields:
      - target_buyer
      - target_user
      - subscription_model
      - proof_points
      optional_fields:
      - go_to_market_gaps
    expected_response:
      required_outputs:
      - positioning review
      - commercialization gaps
      - packaging wording recommendations
      rejection_condition: Reject if commercialization claims exceed the evidence in repository artifacts.
    fallback_if_unavailable: Use conservative local marketing notes and avoid unsupported commercial claims.
  - issue_id: 306
    slug: authority-source-policy-specialist
    purpose: Normalize authority-source categories, refresh rules, and decay-policy handling.
    request_contract:
      required_fields:
      - authority_sources
      - source_categories
      - specialty_specific_exceptions
      - target_delivery_level
      optional_fields:
      - next_review_due_at
    expected_response:
      required_outputs:
      - source-policy review
      - refresh normalization notes
      - staleness concerns
      rejection_condition: Reject if normalization removes specialty-specific exceptions or introduces non-authoritative sources.
    fallback_if_unavailable: Preserve the reviewed local baseline and note any future source-policy normalization as deferred.
  - issue_id: 307
    slug: specialty-boundary-and-routing-specialist
    purpose: Normalize adjacent-specialty routing and refusal wording without broadening the lane.
    request_contract:
      required_fields:
      - specialty_boundary
      - adjacent_specialties
      - out_of_scope_rules
      - orchestrator_return_rules
      optional_fields:
      - representative_edge_cases
    expected_response:
      required_outputs:
      - boundary review
      - adjacent-specialty routing notes
      - edge-case observations
      rejection_condition: Reject if routing guidance broadens scope into solution design, procurement, licensing, or general
        governance ownership.
    fallback_if_unavailable: Use the local boundary and routing rules and require ambiguous requests to return to the orchestrator.
  - issue_id: 308
    slug: agent-package-scaffolding-specialist
    purpose: Review package scaffolding consistency against repository conventions.
    request_contract:
      required_fields:
      - package_path
      - required_artifacts
      - delivery_status
      optional_fields:
      - validation_commands
    expected_response:
      required_outputs:
      - scaffolding review
      - missing artifact list
      - repository-convention notes
      rejection_condition: Reject if scaffolding suggestions conflict with current repository templates or delivery contract.
    fallback_if_unavailable: Rely on repository templates, local comparisons to adjacent packages, and local validation scripts.
