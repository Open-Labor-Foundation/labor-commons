  source_categories:
  - category: Cemetery records and location truth set
    retrieval_policy: Use tenant cemetery management records, lot books, interment ledgers, plot maps, GIS, permits, body
      receipts, monument records, and audit logs before changing or completing a record.
    specialty_specific_exceptions:
    - Do not update grave, crypt, niche, section, block, row, tier, GPS, or plot location when ledger, map, GIS, or work-order
      records conflict.
    - Do not treat a family statement, obituary, genealogy site, or public memorial page as sufficient to change official
      cemetery records.
  - category: Disposition permits, body receipt, and authorization evidence
    retrieval_policy: Require jurisdiction-specific permit, receipt, authorized-agent, lot-right, and facility-policy evidence
      before accepting or completing interment administration.
    specialty_specific_exceptions:
    - Do not mark an interment, inurnment, entombment, disinterment, removal, or relocation workflow ready when required permits,
      receipt, or authorization evidence is missing.
    - Escalate legal right of disposition, next-of-kin disputes, heirship, lot ownership, and court-order questions.
  - category: Retention, access, disclosure, and privacy controls
    retrieval_policy: Use tenant retention schedule, access policy, public-record status, regulator guidance, and family-consent
      rules before releasing or destroying cemetery records.
    specialty_specific_exceptions:
    - Do not release recent death certificates, permit images, Social Security numbers, family contact data, or restricted
      next-of-kin records without confirmed authority.
    - Do not destroy or shorten retention for lot-owner, interment, exhumation, removal, maps, plot plans, surveys, or inscription
      records when public or tenant retention rules require preservation.
  - category: Memorialization and veteran-cemetery dependencies
    retrieval_policy: Use VA NCA, CFR, cemetery rules, and tenant memorial-production records before status changes for headstones,
      markers, medallions, inscriptions, emblems, or niche covers.
    specialty_specific_exceptions:
    - Do not decide veteran burial eligibility, military honors, VA benefits, or Government-furnished marker entitlement.
    - Do not alter inscription or memorial records without authorized requester, cemetery, and regulator or VA evidence where
      applicable.
  next_review_due_at: '2026-07-12'
workflow_model:
  lifecycle_states:
  - intake-received
  - blocked-missing-prerequisites
  - records-ready-for-administration
  - record-maintenance-in-progress
  - pending-authority-approval
  - pending-retention-or-access-review
  - conflicting-records-hold
  - ready-for-family-service-or-grounds-handoff
  - completed-with-audit-evidence
  - returned-to-orchestrator
  execution_steps:
  - Validate jurisdiction, cemetery type, tenant service model, access policy, retention schedule, authority matrix, and systems
    of record.
  - Confirm source records for disposition permit, body receipt, interment authorization, right of interment, lot owner, location,
    schedule, memorial, work order, and communication evidence.
  - Classify the request as in-scope, out-of-scope, or blocked on missing prerequisites.
  - Prepare or update administrative status fields only under tenant update permissions and with source-record references.
  - Hold and route requests with conflicting permit, lot, map, ledger, GIS, memorial, or family-authorization records.
  - Prepare completeness summaries, record update notes, evidence packets, retention or access escalations, and adjacent-lane
    handoffs.
  throughput_expectations:
  - Interment and memorial workflows must show owner, blocker, source record, due date, and next action because families,
    funeral homes, grounds crews, and cemetery operators are time-sensitive stakeholders.
  - Exception queues must preserve the exact cemetery artifact at issue, not generic task labels.
  - Completion records must remain reversible when later authorized evidence invalidates a permit, body receipt, location,
    ownership, or memorial record.
  record_of_truth_systems:
  - cemetery management system
  - interment ledger or burial register
  - lot-owner, deed, and right-of-interment register
  - plot map, plat, survey, GIS, and GPS location system
  - burial scheduling and public committal schedule system
  - electronic death registration or vital-record reference system
  - document repository and records-retention system
  - work-order and grounds operations queue
  - monument, marker, inscription, and memorial-production system
  - payment, contract, service-charge, and care-fund reference system
  - family communication and authorization log
  - audit log and compliance review system
