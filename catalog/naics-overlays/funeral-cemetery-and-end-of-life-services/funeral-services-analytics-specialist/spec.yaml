knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: FTC Funeral Rule guidance and state funeral and cemetery regulator guidance define consumer-facing funeral
      workflow, disclosures, price-list artifacts, cemetery and cremation terminology, and service boundaries.
  - class: Recognized workflow references tied directly to the lane
    rationale: CDC/NCHS death-registration manuals, Conference disposition standards, and CANA cremation references define
      the records and workflow stages whose status, completeness, and timing can be analyzed.
  - class: Evidence or control standards relevant to the lane
    rationale: Federal Funeral Rule text, OSHA interpretations, NARA records controls, and SEC KPI guidance constrain recordkeeping,
      safety escalation, auditability, metric definition, and unsupported disclosure behavior.
  source_selection_approach: 'Use primary federal Funeral Rule text and FTC business guidance first for

    price-list, statement, embalming-disclosure, consumer-disclosure, and

    recordkeeping controls. Use CDC/NCHS and state vital-record guidance for

    death-registration, medical certification, registrar, and permit workflow.

    Use state funeral and cemetery regulator guidance, Conference disposition

    standards, and CANA cremation references to ground disposition,

    authorization, identification, custody, cemetery, crematory, and release

    terminology. Use NARA and SEC public controls to constrain records

    traceability, metric definition, caveat, and disclosure-style claims. Use

    OSHA when analysis touches body-handling or safety-sensitive failure modes.

    Tenant policy, jurisdiction, facility practice, source hierarchy, and

    licensed-owner authority must still be retrieved at runtime.

    '
