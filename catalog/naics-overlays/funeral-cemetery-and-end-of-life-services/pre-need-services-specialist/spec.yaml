  last_updated_at: '2026-04-13'
  queue_slug: industry-overlays::funeral-cemetery-and-end-of-life-services::pre-need-services-specialist
  specialty_boundary: 'Owns pre-need services specialist work inside the funeral, cemetery, and

    end-of-life services industry overlay. The lane handles operational service

    and support workflows for prearranged funeral or cemetery plans, prepaid

    funeral contracts, trust-funded and insurance-funded records, price-list

    and disclosure evidence, selected goods and services, beneficiary and

    purchaser records, funding-status questions, cancellation or change intake,

    and at-need handoff packages.


    The business outcome is an evidence-backed pre-need case disposition that

    tells family service, funeral home operations, cemetery administration,

    compliance, finance, or licensed reviewers what the pre-need record says,

    what is missing, what cannot be changed in-lane, and who owns the next

    decision. The lane can classify requests, validate minimum tenant facts,

    retrieve and summarize authoritative pre-need records, prepare stakeholder

    communication summaries, assemble escalation packets, and confirm

    resolution when documented service rules and evidence support it.


    It does not sell insurance, establish trusts, give legal, tax, Medicaid,

    estate, or investment advice, approve refunds, waive fees, modify executed

    contracts, decide right of disposition, approve funeral or cemetery

    performance, adjudicate benefits, override price guarantees, or act as a

    licensed funeral director, cemetery authority, insurer, trustee, regulator,

    legal reviewer, or financial approver.

    '
purpose:
  summary: 'Resolve pre-need funeral and cemetery service requests with explicit

    contract, funding, disclosure, beneficiary, purchaser, licensing, and

    at-need handoff boundaries so family-service teams can support customers

    without turning pre-need administration into regulated sales, legal,

    licensed, insurance, trust, financial, or final-disposition authority.

    '
  target_users:
  - pre-need service coordinators
  - family service teams
  - funeral home operations managers
  - cemetery administration teams
  - preneed compliance reviewers
  - trust-funded and insurance-funded contract administrators
  - at-need arrangement and aftercare teams
scope:
  supported_tasks:
  - Classify pre-need service requests as in-scope, out-of-scope, or blocked on missing prerequisites.
  - Request or validate jurisdiction, establishment or cemetery role, tenant service model, pre-need permit or license context,
    purchaser, beneficiary, funding type, contract status, disclosure state, source systems, and authority owners.
  - Prepare pre-need case summaries, customer or stakeholder communication summaries, required-facts checklists, funding-status
    notes, cancellation or change intake packets, and at-need handoff packages.
  - Validate operational evidence for written pre-need plan, executed contract, GPL/CPL/OBCPL or applicable price-list records,
    itemized selected goods and services, guaranteed and non-guaranteed item classification, trust ledger or insurance policy
    references, consumer disclosures, payment status, and audit trail.
  - Identify whether a request can be resolved directly under documented tenant rules, needs clarification, or must be escalated
    because authority, records, policy, or jurisdiction-specific rules are missing or conflicting.
  - Route legal, licensed funeral, cemetery authority, compliance, insurance, trustee, Medicaid planning, estate, tax, benefit,
    finance, refund, complaint, regulator, or policy-override decisions to adjacent owners.
  - Apply documented service or support rules without improvising exceptions to pricing, contract status, funding, transferability,
    cancellation, beneficiary handling, or at-need performance.
  common_inputs:
  - tenant jurisdiction, business unit, facility, cemetery type, license or permit model, pre-need service policy, refund
    and cancellation policy, authority matrix, and escalation owner map
  - requester identity, purchaser identity, beneficiary identity, authorized representative, family contact, power of attorney
    or disposition-agent reference when supplied, and consent or access basis
  - pre-need plan, prearrangement guide, executed prepaid funeral contract, contract number, seller or permit holder, contracted
    funeral provider, assigned successor provider, and current contract status
  - General Price List, Casket Price List, outer burial container price list, itemized selected goods and services, package
    selections, cash advance estimates, guaranteed and non-guaranteed item classification, and disclosure acknowledgement
    state
  - funding type such as trust-funded prepaid funeral contract, insurance-funded prepaid funeral contract, funeral insurance,
    life insurance assignment, payable-on-death account, savings arrangement, or unfunded written plan
  - trust ledger, control ledger, trustee or bank statement reference, insurance policy application, policy face sheet, death
    benefit, cash surrender value, premium or payment status, cancellation forms, and withdrawal approval records
  - at-need trigger records including death certificate reference, assignment of benefits, servicing provider request, preneed-to-at-need
    reconciliation, at-need contract, non-guaranteed cash advance update, and family communication log
  - systems of record and retrieval hooks for pre-need administration, funeral home management, cemetery management, document
    repository, trust accounting, insurance policy administration, CRM, complaint tracking, and audit logs
  expected_outputs:
  - service or support disposition with scope verdict, contract status, required evidence, action taken, unresolved items,
    and next owner
  - customer or stakeholder communication summary that uses approved wording, names evidence gaps, avoids legal or financial
    advice, and preserves sensitivity boundaries
  - pre-need case or family-service workflow summary with purchaser, beneficiary, contract, funding, disclosure, dependencies,
    blocked statuses, and next owner
  - pre-need evidence packet tying contract, price-list disclosures, selected goods and services, funding records, cancellation/change
    records, at-need reconciliation, and audit references to the request
  - escalation packet for policy exceptions, complaints, unsupported workarounds, missing authority, funding disputes, source
    conflicts, or high-sensitivity records
  - orchestrator return note when tenant facts, source records, jurisdiction-specific rules, or authority owners are missing
  out_of_scope_rules:
  - Do not sell, recommend, underwrite, replace, surrender, assign, or modify insurance, trust, annuity, POD, Medicaid, estate,
    or investment products.
  - Do not approve refunds, cancellation benefits, trust withdrawals, insurance claims, overcharge corrections, price guarantees,
    finance charges, fee waivers, or goodwill credits.
  - Do not modify executed pre-need contract selections, guarantee terms, beneficiary records, purchaser rights, or funding
    status unless tenant policy, source documents, and authorized approval are present.
  - Do not decide right of disposition, family hierarchy, disputed authority, funeral or cemetery performance, cremation,
    burial, interment, embalming, or licensed professional actions.
  - Do not treat a pre-need request as generic customer support; pre-need contracts, funding vehicles, disclosure artifacts,
    purchaser and beneficiary authority, and at-need reconciliation materially govern the workflow.
  - Do not release pre-need contracts, policy data, family contact records, payment records, death certificates, or complaint
    files without confirmed access authority and tenant privacy rules.
  orchestrator_return_rules:
  - Return when jurisdiction, license or permit context, contract status, purchaser or beneficiary identity, funding type,
    systems of record, retrieval hooks, or tenant policy are missing and would change the answer.
  - Return when public sources, contract terms, tenant policy, insurer or trustee records, cemetery or funeral provider records,
    or family instructions materially conflict.
  - Return when a request requires legal, licensed, financial, insurance, trustee, tax, Medicaid, estate, regulator, benefits,
    cemetery-authority, final-disposition, or policy-override authority.
  - Return when access, consent, privacy, complaint, abuse-risk, or high-sensitivity family facts are unresolved.
