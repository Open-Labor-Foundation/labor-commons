knowledge_baseline:
  source_baseline_version: '2026-04-13'
  source_classes:
  - class: Named-industry operating guidance
    rationale: FTC funeral-provider guidance, California Cemetery and Funeral Bureau guidance, and Texas Department of Banking
      pre-need guidance directly govern pre-need funeral and cemetery service terminology, disclosures, license or permit
      context, and customer workflow boundaries.
  - class: Recognized workflow references tied directly to the lane
    rationale: BLS funeral-service occupational references and state pre-need operating guidance describe preplanning, family-service
      coordination, pre-need-to-at-need handoff, and adjacent funeral, cemetery, and benefits workflows.
  - class: Evidence or control standards relevant to the lane
    rationale: 16 CFR Part 453 and the Texas Department of Banking prepaid funeral contract examination manual define price-list,
      statement, contract, funding, ledger, reconciliation, cancellation, and examination evidence controls.
  source_selection_approach: 'Use 16 CFR Part 453 and official FTC Funeral Rule guidance first for

    federal price-list, itemized statement, embalming, casket, outer burial

    container, telephone price, and recordkeeping evidence. Use state regulator

    guidance for jurisdiction-specific pre-need plans, prepayment options,

    right-of-disposition caveats, seller permit context, funding types,

    cancellation, modification, trust or insurance recordkeeping, and at-need

    reconciliation. Use BLS only for public workflow terminology and adjacent

    funeral-service task boundaries. Tenant policy and contract terms remain

    required before the lane can make case-specific service dispositions.

    '
