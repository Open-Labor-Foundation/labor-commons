  source_categories:
  - category: Pre-need disclosure and selection evidence
    retrieval_policy: Use FTC Funeral Rule and tenant source records for GPL, CPL, OBCPL, itemized statement, selected goods
      and services, package, cash-advance, embalming, casket, and outer-burial-container evidence before producing a service
      disposition.
    specialty_specific_exceptions:
    - Do not mark a pre-need case complete when disclosure or selected-services evidence is missing.
    - Do not tell a customer a price, package, or item is guaranteed unless the contract and tenant policy explicitly support
      that status.
  - category: Contract, purchaser, beneficiary, and authority records
    retrieval_policy: Use executed contract, purchaser and beneficiary records, seller or permit holder, contracted provider,
      assigned successor, authorization, access, and tenant policy before summarizing rights or changes.
    specialty_specific_exceptions:
    - Do not change purchaser, beneficiary, provider, disposition, or selected goods and services without required source
      documents and authority approval.
    - Do not decide right of disposition or survivor authority from pre-need records alone.
  - category: Trust-funded and insurance-funded controls
    retrieval_policy: Use trust ledgers, control ledgers, trustee or bank statements, insurance policy applications, data
      face sheets, death benefit records, cash surrender values, premium status, and reconciliation reports before funding-status
      summaries.
    specialty_specific_exceptions:
    - Do not approve trust withdrawals, refunds, insurance claims, policy status changes, or cancellation benefits.
    - Escalate if trust, ledger, insurance policy, contract, or payment records do not reconcile.
  - category: At-need reconciliation and service handoff
    retrieval_policy: Use death certificate reference, assignment of benefits, servicing provider request, at-need contract,
      preneed-to-at-need reconciliation, non-guaranteed item estimates, potential overcharge flags, and family communication
      records before handoff.
    specialty_specific_exceptions:
    - Do not promise provider performance, contract honoring, or no additional cost when payment, policy, contract, or non-guaranteed
      items are unresolved.
    - Escalate repeat overcharge, reconciliation, or provider-performance failures.
  - category: Privacy, complaint, and high-sensitivity controls
    retrieval_policy: Use tenant privacy, access, complaint, retention, and regulator-routing policies before releasing contracts,
      policy data, payment records, death documents, or family communications.
    specialty_specific_exceptions:
    - Do not disclose pre-need records to a requester whose access basis is missing or disputed.
    - Escalate complaints alleging unlicensed sales, deceptive practices, missing trust funds, or elder exploitation.
  next_review_due_at: '2026-07-12'
workflow_model:
  lifecycle_states:
  - service-intake-received
  - blocked-missing-prerequisites
  - pre-need-records-under-review
  - pending-disclosure-or-selection-evidence
  - pending-funding-record-validation
  - pending-change-or-cancellation-authority
  - pending-at-need-reconciliation
  - pending-adjacent-authority-review
  - resolved-with-evidence
  - returned-to-orchestrator
  execution_steps:
  - Validate tenant jurisdiction, license or permit context, service model, authority matrix, access rules, source systems,
    and escalation owners.
  - Confirm purchaser, beneficiary, requester, contract, funding type, seller or permit holder, provider, disclosure, and
    selected-services records.
  - Classify the request as in-scope, out-of-scope, or blocked on missing prerequisites.
  - Prepare service disposition, communication summary, evidence packet, or pre-need case workflow summary with source-record
    references.
  - Escalate funding, cancellation, modification, policy exception, complaint, privacy, or at-need reconciliation issues when
    authority or evidence is missing or conflicting.
  - Confirm resolution only when documented tenant service rules, source records, and authority boundaries support the case
    status.
  throughput_expectations:
  - Customer-facing pre-need support must name the contract, funding type, purchaser or beneficiary, status, blocker, owner,
    and next step because families often rely on these records during urgent at-need transitions.
  - Exception queues must preserve the exact pre-need artifact at issue, such as GPL receipt, trust ledger, policy face sheet,
    model contract, cancellation notice, assignment of benefits, or preneed-to-at-need reconciliation.
  - Resolution notes must distinguish resolved support questions from unresolved legal, licensed, insurance, trust, regulator,
    or financial decisions.
  record_of_truth_systems:
  - pre-need administration system
  - funeral home case management system
  - cemetery management system
  - document repository and retention system
  - trust accounting ledger and trustee statement repository
  - insurance policy administration and carrier portal
  - contract management and e-signature system
  - CRM and family communication log
  - payment and refund workflow system
  - complaint and regulator correspondence system
  - at-need arrangement and reconciliation workflow
  - audit log and compliance review system
