- billing-and-payment-specialist
- veterans-benefits-specialist
- legal-review-specialist
- grief-support-specialist
- privacy-or-records-release-specialist
knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: State funeral and cemetery regulator guidance, VA burial guidance, and SSA survivor guidance define family-facing
      death-care terminology, complaint channels, survivor handoffs, and jurisdiction-sensitive authority boundaries.
  - class: Recognized workflow references tied directly to the lane
    rationale: FTC funeral-provider guidance and CDC/NCHS funeral director manuals describe the practical family communication,
      price-disclosure, death-registration, and records-dependency workflow that family care support must respect.
  - class: Evidence or control standards relevant to the lane
    rationale: Federal funeral consumer-protection rules and OSHA funeral-home safety interpretations establish required evidence,
      recordkeeping, disclosure, consent, and safety controls that prevent unsafe resolution or overreach.
  source_selection_approach: 'Use the Funeral Rule and official FTC guidance for price, disclosure,

    itemized statement, and consumer-protection boundaries; use CDC/NCHS death

    registration guidance for death-certificate and vital-record dependencies;

    use state funeral and cemetery regulator guidance for jurisdiction-sensitive

    family authority, cemetery, cremation, hydrolysis, complaint, and consumer

    expectations; use VA and SSA public guidance for family benefit and survivor

    handoffs without adjudicating eligibility; use OSHA interpretation for

    safety-critical body-handling boundaries. Tenant jurisdiction, facility

    policy, family authority records, consent artifacts, and owner maps must be

    retrieved at runtime.

    '
  authority_sources:
  - source_id: ecfr-16-cfr-part-453
    title: 16 CFR Part 453 - Funeral Industry Practices
    publisher: Electronic Code of Federal Regulations
    source_type: primary-federal-funeral-consumer-protection-regulation
    location: https://www.ecfr.gov/current/title-16/chapter-I/subchapter-D/part-453
    authority_reason: Primary federal Funeral Rule text governing funeral-provider disclosures, itemized statement records,
      embalming representations, and required-purchase boundaries that family care support must not override while resolving
      family questions.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-complying-funeral-rule
    title: Complying with the Funeral Rule
    publisher: Federal Trade Commission
    source_type: official-funeral-rule-business-guidance
    location: https://www.ftc.gov/business-guidance/resources/complying-funeral-rule
    authority_reason: FTC is the federal regulator responsible for the Funeral Rule, and this official business guidance translates
      the rule into practical GPL, telephone price, statement, embalming, and selected-goods workflows that family care communications
      must reference.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cdc-funeral-directors-handbook
    title: Funeral Directors' Handbook on Death Registration and Fetal Death Reporting
    publisher: Centers for Disease Control and Prevention, National Center for Health Statistics
    source_type: official-vital-records-workflow-manual
    location: https://www.cdc.gov/nchs/data/misc/hb_fun.pdf
    authority_reason: CDC/NCHS publishes the national vital-statistics manual for funeral directors, defining death-registration
      duties, demographic collection, certifier coordination, and filing dependencies behind family questions about death
      certificates and permits.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: california-cfb-consumer-guide
    title: Consumer Guide to Funeral and Cemetery Purchases
    publisher: California Department of Consumer Affairs Cemetery and Funeral Bureau
    source_type: state-funeral-and-cemetery-regulator-guidance
    location: https://www.cfb.ca.gov/consumer/consumer_guide.pdf
    authority_reason: California's funeral and cemetery regulator publishes practical guidance on right to control disposition,
      price-list expectations, embalming authorization, burial, cremation, hydrolysis, cemetery, complaints, and licensing
      boundaries. It is used as state-regulator evidence of jurisdictional variance, not as a universal state rule.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: va-national-cemetery-burial-benefits
    title: VA Burial Benefits
    publisher: U.S. Department of Veterans Affairs
    source_type: official-veterans-burial-operating-guidance
    location: https://www.va.gov/burials-memorials/
    authority_reason: The VA is the authoritative public source for veterans burial, memorial, and survivor benefit pathways.
      Family care support may package and route VA questions but must not adjudicate eligibility or promise benefits.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ssa-survivor-benefits
    title: Survivor benefits
    publisher: Social Security Administration
    source_type: official-survivor-benefits-guidance
    location: https://www.ssa.gov/survivor
    authority_reason: SSA is the authoritative public source for survivor benefit information and death-reporting expectations.
      It constrains family care handoffs when families ask about survivor payments or death reporting without allowing the
      lane to determine eligibility.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: osha-bloodborne-funeral-homes
    title: Application of provisions of the Bloodborne Pathogens standard to Funeral and Nursing Homes
    publisher: Occupational Safety and Health Administration
    source_type: official-occupational-safety-interpretation
    location: https://www.osha.gov/laws-regs/standardinterpretations/1992-06-01-0
    authority_reason: OSHA's official interpretation explains funeral-home exposure controls around human remains, supporting
      refusal or escalation when a family support request asks for body-handling, preparation, viewing, or safety-critical
      guidance outside this lane.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  source_baseline_version: '2026-04-08'
  next_review_due_at: '2026-07-12'
