  source_categories:
  - category: Funeral consumer-protection and arrangement documents
    retrieval_policy: Use FTC Funeral Rule guidance and 16 CFR Part 453 first for GPL, CPL, OBCPL, itemized statement, embalming
      authorization, direct cremation, immediate burial, cash-advance, and preneed disclosure evidence.
    specialty_specific_exceptions:
    - Do not treat a complete case file as Funeral Rule compliant when the price-list and itemized-statement artifacts are
      missing.
    - Do not assert cemetery, crematory, or legal requirements without source evidence from the governing jurisdiction or
      facility.
  - category: Vital-record and EDRS workflow
    retrieval_policy: Use NCHS and state EDRS/vital-record guidance to establish the death certificate, medical certification,
      registrar, permit, amendment, and disposition-status workflow before making readiness claims.
    specialty_specific_exceptions:
    - Do not amend death records or certify cause or manner of death.
    - Do not finalize a disposition packet when registration, medical certification, or permit status is unresolved.
  - category: Cremation, burial, and cemetery disposition documents
    retrieval_policy: Use recognized disposition and cremation workflow references plus tenant jurisdiction rules for authorizing-agent,
      chain-of-custody, identification, hazardous implant, certificate, release, and interment evidence.
    specialty_specific_exceptions:
    - Do not approve cremation, interment, or release of remains when authorizing-agent authority, identification, medical
      examiner release, or custody-chain facts are missing.
    - Do not infer cemetery lot ownership or right of interment from payment records alone.
  - category: Benefits and survivor-notification support
    retrieval_policy: Use SSA and VA official forms and guidance only to package evidence and status notes; route eligibility
      or payment questions to the benefits owner.
    specialty_specific_exceptions:
    - Do not represent SSA or VA eligibility, payment amount, or approval outcomes.
    - Do not submit benefit claims unless tenant authority and role assignment are explicitly present.
  - category: Records governance, retention, and access controls
    retrieval_policy: Use NARA ERM controls and tenant policy for record classification, metadata, retention, access, legal
      hold, privacy, and audit-trail decisions.
    specialty_specific_exceptions:
    - Escalate if state vital-record confidentiality, cemetery access rules, medical privacy, preneed contract retention,
      or tenant retention rules conflict.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use federal Funeral Rule and NCHS public baseline first, then narrow by jurisdiction, establishment role, disposition
      method, cemetery or crematory policy, and tenant source hierarchy.
    - Require tenant-supplied system locations, record owners, approval matrix, retention schedule, and access-control rules
      before issuing a final completeness statement.
    - Escalate when state vital-record rules, cemetery rules, crematory policy, preneed terms, or tenant SOP impose different
      evidence or retention expectations.
  specialty_specific_exceptions:
  - Do not certify a disposition packet as ready when EDRS registration, medical certification, burial-transit permit, authorizing-agent
    authority, or required release documents are missing.
  - Do not convert Funeral Rule document maintenance into approval of pricing, refund, or legal compliance outcomes.
  - Do not treat death certificate, cremation certificate, interment record, and benefit documents as interchangeable proof;
    preserve the source and purpose of each artifact.
  - Do not release cremated remains, personal effects, or confidential records when identity, requester authority, or access
    policy is unresolved.
  source_baseline_version: '2026-04-07'
  next_review_due_at: '2026-06-12'
