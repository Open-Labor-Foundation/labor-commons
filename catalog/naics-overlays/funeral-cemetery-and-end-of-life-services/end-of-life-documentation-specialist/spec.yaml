    authority_reason: Official FTC business guidance for funeral providers explaining required price lists, consumer disclosures,
      itemized statements, embalming permission, misrepresentation prohibitions, preneed handling, and recordkeeping.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 60
    decay_policy: review_required_after_interval
    status: active
  - source_id: ecfr-16-cfr-453
