knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: State funeral and cemetery regulator guidance, VA cemetery operating guidance, and OSHA funeral-home interpretations
      define practical funeral, cemetery, crematory, disposition, committal, consumer complaint, license, and remains-handling
      constraints.
  - class: Recognized workflow references tied directly to the lane
    rationale: FTC Funeral Rule business guidance and CDC/NCHS funeral director manuals describe the named workflow records,
      disclosures, vital-registration handoffs, and terminology used in funeral compliance review.
  - class: Evidence or control standards relevant to the lane
    rationale: Federal Funeral Rule text and OSHA standards define required disclosure, statement, retention, authorization,
      required-purchase, exposure-control, training, and evidence controls that compliance support must verify.
  source_selection_approach: 'Use primary federal Funeral Rule text first for disclosure, price-list,

    statement, required-purchase, embalming, direct-cremation, cash-advance,

    comprehension, and record-retention controls. Use FTC business guidance to

    translate those controls into funeral-provider workflow terms. Use

    CDC/NCHS death-registration manuals for vital-record dependencies. Use

    state funeral and cemetery regulator guidance to surface jurisdiction

    variance in right-to-control, cremation, hydrolysis, cemetery, licensing,

    and complaint handling without universalizing one state. Use VA National

    Cemetery Administration guidance for veterans cemetery committal

    boundaries. Use OSHA standards and funeral-home interpretations for

    exposure-control and safety-boundary evidence. Tenant policy, local

    jurisdiction, facility rules, and licensed-owner authority remain required

    before case-specific conclusions are safe.

    '
  authority_sources:
  - source_id: ecfr-16-cfr-part-453
    title: 16 CFR Part 453 - Funeral Industry Practices
    publisher: Electronic Code of Federal Regulations
    source_type: primary-federal-funeral-consumer-protection-regulation
    location: https://www.ecfr.gov/current/title-16/chapter-I/subchapter-D/part-453
    authority_reason: Primary federal Funeral Rule text governing funeral-provider price disclosures, itemized statements,
      required-purchase explanations, embalming fee limits, direct-cremation casket rules, cash-advance disclosures, disclosure
      clarity, and retention of price lists and statements.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-complying-funeral-rule
    title: Complying with the Funeral Rule
    publisher: Federal Trade Commission
    source_type: official-funeral-rule-business-guidance
    location: https://www.ftc.gov/business-guidance/resources/complying-funeral-rule
    authority_reason: FTC is the federal Funeral Rule regulator, and this official business guidance translates the rule into
      practical GPL, Casket Price List, outer burial container, telephone price, itemized statement, required disclosure,
      and compliance workflow expectations for funeral providers.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cdc-funeral-directors-handbook
    title: Funeral Directors' Handbook on Death Registration and Fetal Death Reporting
    publisher: Centers for Disease Control and Prevention, National Center for Health Statistics
    source_type: official-vital-records-workflow-manual
    location: https://www.cdc.gov/nchs/data/misc/hb_fun.pdf
    authority_reason: CDC/NCHS publishes the national vital-statistics manual for funeral directors, defining death-registration
      responsibilities, demographic data collection, medical-certifier coordination, filing dependencies, and evidence handoffs
      that materially affect funeral compliance readiness.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: california-cfb-consumer-guide
    title: Consumer Guide to Funeral and Cemetery Purchases
    publisher: California Department of Consumer Affairs Cemetery and Funeral Bureau
    source_type: state-funeral-and-cemetery-regulator-guidance
    location: https://www.cfb.ca.gov/consumer/consumer_guide.pdf
    authority_reason: California's funeral and cemetery regulator publishes practical official guidance on right to control
      disposition, funeral establishment and cemetery licensing, price lists, itemized statements, embalming authorization,
      cremation, hydrolysis, cemetery purchases, preneed issues, and complaint pathways. It is authoritative for California
      and used as a state-regulator variance baseline, not a universal state rule.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: va-national-cemetery-committal-service
    title: Committal Service
    publisher: U.S. Department of Veterans Affairs, National Cemetery Administration
    source_type: official-veterans-cemetery-operating-guidance
    location: https://www.cem.va.gov/burial_benefits/committal_service.asp
    authority_reason: VA National Cemetery Administration is the authoritative source for national cemetery committal service
      constraints, burial-document handling, committal shelter process, scheduling expectations, and service limitations that
      constrain funeral compliance reviews when veterans cemetery burial is involved.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: osha-29-cfr-1910-1030
    title: 29 CFR 1910.1030 - Bloodborne pathogens
    publisher: Occupational Safety and Health Administration
    source_type: primary-occupational-safety-standard
    location: https://www.osha.gov/laws-regs/regulations/standardnumber/1910/1910.1030
    authority_reason: OSHA publishes the controlling federal bloodborne-pathogens standard requiring exposure-control, training,
      PPE, sharps, housekeeping, medical, and recordkeeping controls where funeral-home work creates occupational exposure.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: osha-bloodborne-funeral-homes
    title: Application of provisions of the Bloodborne Pathogens standard to Funeral and Nursing Homes
    publisher: Occupational Safety and Health Administration
    source_type: official-occupational-safety-interpretation
    location: https://www.osha.gov/laws-regs/standardinterpretations/1992-06-01-0
    authority_reason: OSHA's official interpretation applies bloodborne-pathogen provisions to funeral homes and human remains,
      making it directly authoritative for funeral-specific safety-boundary evidence and refusal triggers around preparation
      or handling requests.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: Funeral Rule disclosure and retention baseline
    retrieval_policy: Use eCFR Part 453 and FTC guidance to verify GPL, CPL, OBCPL, statement, cash-advance, required-purchase,
      direct-cremation, embalming, and retention controls before making compliance-readiness claims.
    specialty_specific_exceptions:
    - Never infer formal compliance, legal interpretation, or regulator-facing acceptance from baseline Funeral Rule sources
      alone.
  - category: Vital-record and disposition dependency baseline
    retrieval_policy: Use CDC/NCHS funeral director guidance and jurisdictional systems to identify death-registration, certifier,
      coroner, registrar, and permit dependencies.
    specialty_specific_exceptions:
    - Never mark disposition workflow compliant when death-registration, permit, or authoritative destination evidence is
      missing or disputed.
  - category: State funeral, cemetery, crematory, hydrolysis, and preneed baseline
    retrieval_policy: Use state regulator guidance as jurisdiction-sensitive evidence for right-to-control, authorization,
      cemetery, crematory, hydrolysis, licensing, preneed, and complaint constraints.
    specialty_specific_exceptions:
    - Never universalize one state's right-to-control, cremation, hydrolysis, or cemetery rules across tenant jurisdictions.
  - category: Veterans cemetery and committal baseline
    retrieval_policy: Use VA NCA guidance when national cemetery committal, burial documents, military honors, or veterans
      cemetery service limits affect compliance posture.
    specialty_specific_exceptions:
    - Never adjudicate VA benefits eligibility or guarantee national cemetery scheduling.
  - category: Occupational exposure and safety baseline
    retrieval_policy: Use OSHA bloodborne-pathogen rules and funeral-home interpretations to identify exposure-control evidence,
      training, PPE, incident, and safety escalation requirements.
    specialty_specific_exceptions:
    - Never authorize body handling, preparation, or safety-critical release.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline, but tenant case management, eDRS, document repository, cemetery, crematory, preneed,
      safety, complaint, and audit systems remain required before case-specific output is safe.
    - State funeral, cemetery, crematory, hydrolysis, right-to-control, preneed, and disposition rules vary materially, so
      runtime must retrieve jurisdiction and facility context.
    - Tenant policy may be stricter than the public baseline. The lane records those controls and escalates conflicts instead
      of synthesizing informal authority.
  specialty_specific_exceptions:
  - State-specific right-to-control, cremation authorization, hydrolysis authorization, preneed funding, cemetery, and complaint
    rules can materially change the answer.
  - A funeral case may require licensed funeral director, embalmer, cemetery administrator, crematory operator, certifier,
    registrar, legal, benefits, safety, or financial owner action outside this lane.
  - Funeral Rule evidence, vital-record evidence, disposition authorization, destination confirmation, and exposure-control
    evidence are not interchangeable.
  source_baseline_version: '2026-04-08'
  next_review_due_at: '2026-07-12'
