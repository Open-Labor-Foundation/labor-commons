knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Healthcare coordination is constrained by federal discharge-planning requirements, HIPAA privacy rules, and
      CMS quality or program rules that determine when handoff, disclosure, and escalation behavior is safe.
  - class: Public payer or provider operating guidance
    rationale: The lane depends on provider discharge and follow-up workflows, transitional care management expectations,
      authorization and payer communication states, and documented handoff prerequisites.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Transition-of-care coordination requires public workflow and measure references for care-transition artifacts,
      closed-loop handoffs, discharge follow-up, patient-safety escalation, and readmission-risk handling.
  source_selection_approach: 'Use federal regulations and CMS/HHS sources first for discharge planning,

    privacy, payer/provider operating, and readmission-risk baselines. Use AHRQ,

    Joint Commission, ONC/ASTP, HL7, and NCQA public guidance to ground workflow

    terminology, transition artifacts, data classes, closed-loop handoff

    expectations, and measure-oriented failure modes. Tenant policy remains the

    operational source for routing matrices, patient communication constraints,

    specific payer rules, facility procedures, system-of-record hierarchy, and

    escalation SLAs.

    '
  authority_sources:
  - source_id: ecfr-42-cfr-482-43-discharge-planning
    title: '42 CFR 482.43 - Condition of participation: Discharge planning'
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.43
    authority_reason: Primary federal regulation for hospital discharge planning requirements. It anchors discharge-prerequisite,
      receiving-setting, and transition documentation expectations for this coordination lane.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: cms-qso-20-09-discharge-planning
    title: Revisions to Discharge Planning Requirements
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.cms.gov/Medicare/Provider-Enrollment-and-Certification/SurveyCertificationGenInfo/Downloads/QSO-20-09-Hospital.pdf
    authority_reason: CMS survey and certification guidance explains implementation of revised discharge-planning requirements,
      including patient goals, care preferences, and discharge planning process expectations.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cms-mln-transitional-care-management
    title: Transitional Care Management Services
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/files/document/mln908628-transitional-care-management-services.pdf
    authority_reason: CMS Medicare Learning Network guidance defines post-discharge transitional care management terms, timing,
      communication, face-to-face follow-up, and documentation concepts relevant to operational handoff readiness.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cms-prior-authorization-final-rule
    title: CMS Interoperability and Prior Authorization Final Rule
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/priorities/key-initiatives/burden-reduction/prior-authorization
    authority_reason: CMS prior authorization policy and interoperability guidance is authoritative for payer/provider authorization
      workflow expectations and supports escalation when coordination depends on authorization status or payer response.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: hhs-hipaa-tpo-disclosures
    title: HIPAA Privacy Rule and Care Coordination
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/special-topics/disclosures-treatment-payment-health-care-operations/index.html
    authority_reason: HHS OCR is the HIPAA privacy regulator. The guidance constrains PHI use and disclosure for treatment,
      payment, health care operations, and care coordination.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: hhs-hipaa-minimum-necessary
    title: HIPAA Minimum Necessary Standard
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR minimum-necessary guidance determines when coordination outputs involving PHI require controlled
      handling, limited disclosure, and privacy escalation.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: ahrq-red-toolkit
    title: Re-Engineered Discharge (RED) Toolkit
    publisher: Agency for Healthcare Research and Quality
    source_type: recognized-healthcare-workflow-guidance
    location: https://www.ahrq.gov/patient-safety/settings/hospital/red/toolkit/index.html
    authority_reason: AHRQ is a federal healthcare quality and patient-safety agency. The RED Toolkit is a public discharge
      workflow reference for after-hospital care plans, follow-up, patient education, and post-discharge coordination.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_ahrq_revision
    status: active
  - source_id: joint-commission-sea-58-handoff
    title: 'Sentinel Event Alert 58: Inadequate hand-off communication'
    publisher: The Joint Commission
    source_type: recognized-healthcare-workflow-guidance
    location: https://www.jointcommission.org/resources/sentinel-event/sentinel-event-alert-newsletters/sentinel-event-alert-58-inadequate-hand-off-communication/
    authority_reason: The Joint Commission is a recognized healthcare accrediting body. Its hand-off communication alert grounds
      closed-loop transfer, receiver, content, interruption, and patient-safety escalation expectations.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_joint_commission_revision
    status: active
  - source_id: onc-uscdi-v6
    title: United States Core Data for Interoperability Version 6
    publisher: Assistant Secretary for Technology Policy / Office of the National Coordinator for Health IT
    source_type: recognized-healthcare-standard
    location: https://isp.healthit.gov/sites/default/files/2025-07/USCDI-Version-6-July-2025.pdf
    authority_reason: ASTP/ONC USCDI is the federal interoperability data baseline. It grounds transition artifacts such as
      care plan, discharge summary note, reason for referral, problems, medications, and encounter data.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_uscdi_revision
    status: active
  - source_id: cms-hrrp-readmissions
    title: Hospital Readmissions Reduction Program
    publisher: Centers for Medicare & Medicaid Services
    source_type: recognized-healthcare-measure-guidance
    location: https://www.cms.gov/medicare/quality/value-based-programs/hospital-readmissions
    authority_reason: CMS HRRP is a federal quality and payment program that links readmission outcomes to communication and
      care-coordination improvements, supporting escalation of readmission-risk signals.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  source_categories:
  - category: Public healthcare regulator guidance
    retrieval_policy: Use eCFR, CMS, and HHS OCR sources first for discharge planning, privacy, regulatory, and patient-safety-sensitive
      boundaries.
    specialty_specific_exceptions:
    - Federal baseline does not replace tenant facility policy, payer contracts, state rules, or clinician instructions.
  - category: Public payer or provider operating guidance
    retrieval_policy: Use CMS transitional care, prior authorization, and payer/provider workflow references to frame prerequisites
      and escalation timing, then require tenant-specific payer and service-line facts.
    specialty_specific_exceptions:
    - Do not infer coverage approval, authorization approval, or medical necessity from generic CMS guidance.
  - category: Recognized healthcare workflow or measure guidance
    retrieval_policy: Use AHRQ, Joint Commission, ONC/ASTP, and CMS quality references to define artifact, handoff, readmission-risk,
      and closed-loop evidence expectations.
    specialty_specific_exceptions:
    - Do not treat measure or workflow guidance as permission to provide clinical judgment or bypass patient-specific records.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public sources as baseline constraints; tenant policy and source-of-truth hierarchy are mandatory for operational
      routing.
    - Require patient/member, care setting, payer, service line, discharge destination, follow-up timeframe, assigned owner,
      escalation SLA, and communication constraints before finalizing handoff recommendations.
    - Escalate when public guidance, tenant policy, payer rules, or retrieved patient records conflict.
  specialty_specific_exceptions:
  - Do not infer authorization, referral, eligibility, discharge readiness, or receiving-setting acceptance from incomplete
    records.
  - Do not transform care coordination into clinical triage, medication counseling, treatment planning, payer interpretation,
    privacy release approval, or social-work ownership.
  - Do not claim closed-loop transfer until receiving owner acceptance and required artifact receipt are documented.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-11'
