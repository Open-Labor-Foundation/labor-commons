knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Healthcare program administration is constrained by CMS, HHS OCR, and federal healthcare program rules for
      managed care monitoring, enrollment information, reporting evidence, PHI handling, and health information systems.
  - class: Public payer or provider operating guidance
    rationale: Program rosters, enrollment lists, reporting inputs, submission calendars, payer dependencies, and member or
      patient communication states depend on payer/provider operating manuals and CMS reporting guidance.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Quality, HEDIS, EQR, Core Set, and interoperability sources ground measure terminology, reporting artifacts,
      audit evidence, roster data, and failure modes without granting the lane measure interpretation or clinical authority.
  source_selection_approach: 'Use CMS/eCFR, HHS OCR, Medicaid.gov, ONC/ASTP, NCQA, and CMS quality

    reporting sources as the public baseline. Tenant policy remains mandatory

    for program type, payer, plan, jurisdiction, service setting, source-of-

    truth hierarchy, retrieval hooks, role access, retention windows, and

    submission owner authority. Escalate rather than synthesize when public

    guidance and tenant, payer, contract, grant, facility, or jurisdictional

    rules conflict.

    '
  authority_sources:
  - source_id: ecfr-42-cfr-438-66-state-monitoring
    title: 42 CFR 438.66 - State monitoring requirements
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-C/part-438/subpart-B/section-438.66
    authority_reason: Primary federal regulation for state monitoring of Medicaid managed care programs. It grounds program
      monitoring, reporting, network, grievance, appeal, quality, and enrollment oversight evidence that healthcare program
      administrators may track but not adjudicate.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: ecfr-42-cfr-438-242-health-information-systems
    title: 42 CFR 438.242 - Health information systems
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-C/part-438/subpart-D/section-438.242
    authority_reason: Primary federal regulation requiring managed care information systems to collect, analyze, integrate,
      and report data. It supports source-of-truth, encounter, enrollment, and reporting-system controls for program administration.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: cms-medicaid-managed-care-eqr
    title: Quality of Care External Quality Review
    publisher: Centers for Medicare & Medicaid Services
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.medicaid.gov/medicaid/quality-of-care/medicaid-managed-care-quality/quality-of-care-external-quality-review
    authority_reason: CMS Medicaid guidance describes annual EQR technical reports, mandatory EQR activities, performance-measure
      validation, posting, notification, and retention expectations. It anchors reporting calendars, evidence packets, and
      submission readiness.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cms-medicaid-chip-core-set-reporting
    title: Adult and Child Health Care Quality Measures
    publisher: Centers for Medicare & Medicaid Services
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.medicaid.gov/medicaid/quality-of-care/performance-measurement/adult-and-child-health-care-quality-measures
    authority_reason: CMS Medicaid quality measure guidance is authoritative for Core Set reporting context, measure stewardship,
      reporting periods, and submission evidence relevant to healthcare program reporting inputs.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cms-medicare-managed-care-manual-chapter-2
    title: Medicare Managed Care Manual, Chapter 2 - Medicare Advantage Enrollment and Disenrollment
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/mc86c02.pdf
    authority_reason: Official CMS manual for Medicare Advantage enrollment and disenrollment operations. It grounds member
      enrollment, effective date, plan communication, and roster dependency terminology while requiring payer-owner escalation
      for interpretation.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_cms_manual_revision
    status: active
  - source_id: hhs-hipaa-summary
    title: Summary of the HIPAA Privacy Rule
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/laws-regulations/index.html
    authority_reason: HHS OCR is the HIPAA privacy regulator. The summary defines role-based access, minimum necessary handling,
      designated record sets, amendment handling, and disclosure-accounting concepts that constrain program records and PHI
      workflows.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: hhs-hipaa-tpo-disclosures
    title: Uses and Disclosures for Treatment, Payment, and Health Care Operations
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/disclosures-treatment-payment-health-care-operations/index.html
    authority_reason: HHS OCR guidance constrains when PHI may be used or disclosed for treatment, payment, and health care
      operations. It supports privacy-sensitive program administration boundaries.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: onc-uscdi-v6
    title: United States Core Data for Interoperability Version 6
    publisher: Assistant Secretary for Technology Policy / Office of the National Coordinator for Health IT
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.healthit.gov/isp/united-states-core-data-interoperability-uscdi
    authority_reason: Federal interoperability baseline for healthcare data classes and elements. It grounds patient, encounter,
      coverage, care team, and clinical-document terminology used when program rosters and reporting inputs reference EHR
      or member-system records.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_uscdi_revision
    status: active
  - source_id: ncqa-hedis-measures
    title: HEDIS Measures and Technical Resources
    publisher: National Committee for Quality Assurance
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.ncqa.org/hedis/measures/
    authority_reason: NCQA is the recognized steward of HEDIS measure reporting used by health plans and care programs. The
      source grounds measure, member, denominator, numerator, data-source, audit, and submission terminology without authorizing
      this lane to interpret measure specifications.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_ncqa_update
    status: active
  - source_id: cms-hospital-iqr
    title: Hospital Inpatient Quality Reporting Program
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://qualitynet.cms.gov/inpatient/iqr
    authority_reason: Official CMS QualityNet program guidance for provider quality reporting timelines, data submission,
      measure resources, and reporting system operations. It supports submission-readiness and reporting-calendar controls
      for provider programs.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_qualitynet_revision
    status: active
  source_categories:
  - category: Named-industry operating guidance
    retrieval_policy: Use CMS Medicaid managed care, Medicare managed care enrollment, QualityNet, and Medicaid Core Set guidance
      when the request depends on program rosters, enrollment lists, reporting periods, submission deadlines, or payer/program
      operating states.
    specialty_specific_exceptions:
    - Do not infer member eligibility, coverage, authorization, or medical necessity from a complete-looking roster.
    - Escalate payer-rule interpretation, appeal, denial, coverage, authorization, or measure-specification questions to the
      accountable payer, utilization, quality, or compliance owner.
  - category: Recognized workflow references tied directly to the lane
    retrieval_policy: Use CMS EQR, Core Set, NCQA HEDIS, and QualityNet sources to ground reporting packet, validation, deadline,
      posting, retention, and audit-evidence language.
    specialty_specific_exceptions:
    - Do not convert reporting input collection into measure interpretation, quality-rate certification, audit finding, or
      corrective-action approval.
  - category: Evidence or control standards relevant to the lane
    retrieval_policy: Use HIPAA and ONC/USCDI references for PHI controls, designated record set awareness, role-based access,
      data-class terminology, and source-of-truth handling.
    specialty_specific_exceptions:
    - Tenant privacy policy, state law, business associate agreements, and stricter program controls override the public baseline
      when they are more restrictive.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public sources as the baseline for healthcare program administration terminology and boundaries.
    - Require tenant retrieval of program type, jurisdiction, payer or plan, source-of-truth hierarchy, systems, permissions,
      record locations, retention windows, deadline owner, and submission authority before asserting completion.
    - Escalate when public baseline, tenant policy, payer rule, contract, grant term, facility policy, or jurisdictional requirement
      conflicts.
  specialty_specific_exceptions:
  - Treat rosters, enrollment lists, reporting calendars, program policy packets, contract/grant files, and compliance-deadline
    trackers as healthcare program control artifacts, not generic project files.
  - Keep the lane on administrative readiness, evidence sufficiency, owner routing, and permitted tracker maintenance.
  - Do not certify clinical, payer, compliance, privacy, legal, financial, or program-policy decisions.
  - Do not route PHI or participant data outside role-based access and minimum-necessary controls.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-11'
materialization:
  olf_agent_pa_requirements:
    required_task_metadata:
    - program_administration_request_type
    - program_identifier
    - payer_plan_or_service_setting
    - reporting_period
    - requested_record_action
    - source_of_truth_hierarchy
    - privacy_minimum_necessary_profile
    - authority_matrix
    - deadline_and_owner_map
    boundary_metadata:
    - clinical_judgment_required
    - payer_policy_interpretation_required
    - privacy_disclosure_decision_required
    - coverage_authorization_or_medical_necessity_required
    - formal_approval_or_signoff_required
    - source_conflict_present
    runtime_assumptions:
    - Runtime remains specification-based until a retained implementation is committed separately.
    - Tenant systems must supply retrieval hooks and write permissions for any administrative status update.
    - PHI-bearing artifacts require role-based access, minimum-necessary controls, and audit logging before use.
    refusal_conditions:
    - Required tenant facts or authoritative records are missing and would change the outcome.
    - The request requires legal, licensed, safety-critical, clinical, payer, privacy, finance, compliance, or approval authority.
    - Conflicting policies or systems materially change the answer and need human resolution.
    - The request asks for unsupported official record alteration, backdating, deletion, concealment, or certification.
deployment:
  runtime_strategy: specification-based
  trusted_runtime_claim: false
  deployment_notes: Deploy as a validated spec pack only. Runtime must not claim a trusted built implementation until a separately
    reviewed build is promoted.
  rollback_notes: Rollback by removing this package from catalog exposure or pinning consumers to the prior catalog revision;
    no runtime migration is required for specification-based deployment.
  promotion_path: Promote to a retained implementation only after repeated tenant demand, implementation of retrieval and
    audit connectors, PHI-safe access controls, workflow tests, and human review of healthcare boundary behavior.
