    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/priorities/key-initiatives/e-health/records
    authority_reason: CMS provider-facing EHR reference defines EHRs as provider-maintained records that include administrative
      and clinical data and support care-related activities through interfaces.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cms-0057-f-interoperability-prior-auth
    title: CMS Interoperability and Prior Authorization Final Rule (CMS-0057-F)
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/priorities/burden-reduction/overview/interoperability/policies-regulations/cms-interoperability-prior-authorization-final-rule-cms-0057-f
    authority_reason: CMS final-rule guidance anchors payer/provider interoperability, FHIR API, provider access, payer-to-payer,
      and prior-authorization dependency handling without granting this lane payer interpretation authority.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: aspr-health-care-preparedness-capabilities
    title: Health Care Preparedness and Response Capabilities for Health Care Coalitions
    publisher: Administration for Strategic Preparedness and Response
    source_type: public-provider-operating-guidance
    location: https://aspr.hhs.gov/HealthCareReadiness/HPP/Documents/2017-2022-Health-Care-Preparedness-and-Response-Capabilities.pdf
    authority_reason: ASPR preparedness capabilities are federal guidance for health care continuity, response coordination,
      and recovery, including information technology dependencies such as EHR and patient billing systems.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_aspr_revision
    status: active
  - source_id: hl7-fhir-r4-resource-list
    title: FHIR Release 4 Resource Index
    publisher: HL7 International
    source_type: recognized-healthcare-standard
    location: https://hl7.org/fhir/R4/resourcelist.html
    authority_reason: HL7 is the standards body for FHIR. The resource index grounds healthcare interface terminology for
      patients, encounters, orders, observations, diagnostic reports, claims, charge items, coverage, provenance, and audit
      events.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_hl7_revision
    status: active
  - source_id: ahrq-health-it-hazard-manager
    title: Health Information Technology Hazard Manager
    publisher: Agency for Healthcare Research and Quality
    source_type: recognized-healthcare-workflow-guidance
    location: https://digital.ahrq.gov/ahrq-funded-projects/health-information-technology-hazard-manager
    authority_reason: AHRQ is a federal healthcare quality and safety agency. Its health IT hazard material supports patient-safety
      impact, hazard urgency, mitigation, and correction tracking for health IT failures.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_ahrq_revision
    status: active
  source_categories:
  - category: Public healthcare regulator guidance
    retrieval_policy: Use HHS OCR, eCFR, and ONC/ASTP sources first for HIPAA privacy/security, ePHI safeguards, information-blocking,
      and certified-health-IT access or exchange boundaries.
    specialty_specific_exceptions:
    - Do not infer tenant access approval, privacy release approval, or security exception authority from public guidance
      alone.
    - Do not treat privacy or security exceptions as support-desk discretion.
  - category: Public payer or provider operating guidance
    retrieval_policy: Use CMS EHR and interoperability references to frame EHR truth sets, provider workflows, API and prior-authorization
      dependencies, and payer/provider exchange impacts.
    specialty_specific_exceptions:
    - Do not decide coverage, authorization approval, claim denial, coding, or medical necessity.
    - Do not assume a payer API or EHR record proves business authorization without tenant records and accountable owner review.
  - category: Recognized healthcare workflow or measure guidance
    retrieval_policy: Use ONC SAFER, ASPR preparedness, HL7 FHIR, and AHRQ health IT safety sources for incident, interface,
      downtime, evidence, terminology, and patient-safety failure-mode expectations.
    specialty_specific_exceptions:
    - Do not convert workflow safety guidance into clinical judgment or release approval.
    - Do not close patient-safety-sensitive incidents without documented owner routing and residual-risk evidence.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public sources as baseline constraints; tenant application ownership, source-of-truth hierarchy, IAM policy, privacy/security
      controls, downtime procedures, and change policy are mandatory for operational disposition.
    - Require application owner, environment, integration points, access role, patient-safety impact, PHI posture, severity,
      requester, intended outcome, and evidence links before finalizing a support disposition.
    - Escalate when public guidance, tenant policy, payer rules, vendor instructions, facility downtime playbooks, or retrieved
      records conflict.
  specialty_specific_exceptions:
  - Do not infer access eligibility, role authorization, PHI disclosure permission, change approval, patient-safety readiness,
    or payer authorization from incomplete records.
  - Do not transform healthcare IT support into clinical informatics signoff, security exception approval, privacy determination,
    release approval, payer interpretation, or interface engineering ownership.
  - Do not claim resolution until the ticket state, owner, evidence, stakeholder communication, and residual patient-safety
    or operational risk are recorded.
  next_review_due_at: '2026-08-11'
