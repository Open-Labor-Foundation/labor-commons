knowledge_baseline:
  source_baseline_version: v0.1.0
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Healthcare IT support is constrained by HIPAA privacy and security requirements, ONC information-blocking and
      certified-health-IT policy, and federal continuity expectations for health care services.
  - class: Public payer or provider operating guidance
    rationale: CMS and provider-facing health IT references define EHR, interoperability, prior authorization, and continuity
      concepts that affect system-of-record, authorization, claim, and workflow dependencies.
  - class: Recognized healthcare workflow or measure guidance
    rationale: ONC SAFER Guides, HL7 FHIR, ASPR preparedness references, and AHRQ health IT safety materials ground interface,
      downtime, evidence, patient-safety, and workflow failure handling.
  source_selection_approach: 'Use ONC/ASTP, HHS OCR, CMS, eCFR, ASPR, HL7, and AHRQ sources before

    drafting claims about healthcare IT incidents, access, interface flow,

    change readiness, downtime, PHI handling, and patient-safety escalation.

    Treat tenant application ownership, role matrices, privacy/security policy,

    source-of-truth hierarchy, payer contracts, vendor procedures, and facility

    downtime playbooks as runtime retrieval dependencies that narrow but do not

    replace the public baseline.

    '
  authority_sources:
  - source_id: onc-safer-implementing-health-it
    title: Implementing Health IT
    publisher: Assistant Secretary for Technology Policy / Office of the National Coordinator for Health IT
    source_type: recognized-healthcare-workflow-guidance
    location: https://healthit.gov/clinical-quality-and-safety/safer-guides/implementing-health-it/
    authority_reason: ONC/ASTP is the federal health IT policy office. The SAFER implementing-health-IT material directly
      supports EHR configuration, validation, maintenance, APIs, integration issues, patient identification, and downtime
      contingency expectations.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_onc_revision
    status: active
  - source_id: onc-safer-using-health-it
    title: Using Health IT
    publisher: Assistant Secretary for Technology Policy / Office of the National Coordinator for Health IT
    source_type: recognized-healthcare-workflow-guidance
    location: https://healthit.gov/clinical-quality-and-safety/safer-guides/using-health-it/
    authority_reason: ONC/ASTP SAFER material addresses safe EHR use, order entry, test results reporting and follow-up, clinician
      communication, training, and workflow safety for health IT support scenarios.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_onc_revision
    status: active
  - source_id: hhs-hipaa-security-rule
    title: HIPAA Security Rule
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/security/laws-regulations/index.html
    authority_reason: HHS OCR administers HIPAA Security Rule guidance. It constrains electronic PHI safeguards, access controls,
      audit controls, contingency planning, and security exception escalation.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: ecfr-45-cfr-164-312-technical-safeguards
    title: 45 CFR 164.312 - Technical safeguards
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-45/subtitle-A/subchapter-C/part-164/subpart-C/section-164.312
    authority_reason: Primary federal regulation defining HIPAA technical safeguard standards such as access control, audit
      controls, integrity, authentication, and transmission security for ePHI systems.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: hhs-hipaa-minimum-necessary
    title: HIPAA Minimum Necessary Standard
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR minimum-necessary guidance constrains PHI handling and supports refusal or privacy escalation
      when support artifacts or communications include unnecessary patient data.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: onc-information-blocking
    title: Information Blocking
    publisher: Assistant Secretary for Technology Policy / Office of the National Coordinator for Health IT
    source_type: public-healthcare-regulator-guidance
    location: https://healthit.gov/information-blocking/
    authority_reason: ONC/ASTP information-blocking guidance is authoritative for EHI access, exchange, and use boundaries
      involving certified health IT, health information networks, exchanges, and providers.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_onc_revision
    status: active
  - source_id: cms-ehr-reference
