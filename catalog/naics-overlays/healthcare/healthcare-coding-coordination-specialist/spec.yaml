knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: CMS, CDC/NCHS, and HHS sources define official ICD coding, documentation support, payer edit, claims review,
      and privacy constraints that bound coding coordination.
  - class: Public payer or provider operating guidance
    rationale: CMS MLN and NCCI materials define Medicare documentation, claims review, and edit workflows that affect whether
      coding, billing, or denial work may proceed.
  - class: Recognized healthcare workflow or measure guidance
    rationale: AHIMA/ACDIS query guidance and HFMA denial metrics define accepted provider-query, CDI, denial, and revenue-cycle
      workflow expectations for routing and closure.
  source_selection_approach: 'Use CMS and CDC/NCHS official coding and Medicare documentation sources to

    identify the coding and documentation evidence baseline. Use CMS NCCI and

    MLN sources for payer edit and claim review dependencies. Use AHIMA/ACDIS

    for compliant provider-query and CDI handoff rules, HFMA for denial and

    revenue-risk metric terminology, and HHS HIPAA guidance for PHI and

    minimum-necessary handling. Tenant retrieval is still required for payer

    contracts, licensed code-set subscriptions, facility policies, authorization

    and referral rules, query escalation timing, system ownership, and local

    privacy constraints.

    '
  authority_sources:
  - source_id: cms-fy2026-icd10cm-guidelines
    title: FY 2026 ICD-10-CM Official Guidelines for Coding and Reporting
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.cms.gov/files/document/fy-2026-icd-10-cm-coding-guidelines.pdf
    authority_reason: CMS publishes the official ICD-10-CM coding guidelines used by HIPAA-covered healthcare entities; the
      source constrains documentation evidence, sequencing terminology, and final code-assignment boundaries.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-icd10-overview
    title: ICD-10
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.cms.gov/medicare/coverage/determination-process/basics/icd-10
    authority_reason: CMS is the federal source for Medicare ICD-10 implementation, coverage, and coding-billing references
      that constrain coding workflow assumptions across covered entities.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-ncci-policy-manual
    title: Medicare NCCI Policy Manual
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-operating-guidance
    location: https://www.cms.gov/medicare/coding-billing/national-correct-coding-initiative-ncci-edits/medicare-ncci-policy-manual
    authority_reason: CMS NCCI policy manual is the authoritative Medicare payer edit reference for procedure-to-procedure
      and medically unlikely edit rationale, making it directly relevant to claim-edit routing and refusal to override payer
      edits.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-mln909160-documentation
    title: MLN909160 - Complying With Medical Record Documentation Requirements
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-operating-guidance
    location: https://www.cms.gov/outreach-and-education/medicare-learning-network-mln/mlnproducts/mln-publications-items/icn909160
    authority_reason: CMS MLN documentation guidance is a public Medicare operating source for sufficient documentation, additional
      documentation requests, and insufficient documentation errors that gate coding, billing, and denial handling.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ahima-acdis-query-2022
    title: Guidelines for Achieving a Compliant Query Practice - 2022 Update
    publisher: Association of Clinical Documentation Integrity Specialists and American Health Information Management Association
    source_type: recognized-healthcare-workflow-guidance
    location: https://acdis.org/resources/guidelines-achieving-compliant-query-practice%E2%80%942022-update
    authority_reason: The AHIMA/ACDIS practice brief is the recognized industry standard for compliant provider queries, CDI
      escalation, query retention, and refusal of leading or reimbursement-driven documentation requests.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ahima-cdi-toolkit-2024
    title: Clinical Documentation Integrity Toolkit for New Leaders
    publisher: American Health Information Management Association
    source_type: recognized-healthcare-workflow-guidance
    location: https://www.ahima.org/media/qiapajfd/clinical-documentation-integrity-cdi-toolkit-for-new-leaders-final-aug-2024-9-19-24-_axs.pdf
    authority_reason: AHIMA's CDI toolkit provides public provider workflow examples for compliant query processes, clinical
      evidence references, and CDI program controls used to shape routing and escalation.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: hfma-denial-metrics
    title: Standardizing denial metrics for revenue cycle benchmarking and process improvement
    publisher: Healthcare Financial Management Association
    source_type: recognized-healthcare-measure-guidance
    location: https://www.hfma.org/guidance/standardizing-denial-metrics-revenue-cycle-benchmarking-process-improvement/
    authority_reason: HFMA is a recognized healthcare finance body; this report defines denial and claim-integrity metrics
      that support revenue-risk prioritization without granting payer interpretation authority.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-hipaa-minimum-necessary
    title: Minimum Necessary Requirement
    publisher: U.S. Department of Health and Human Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR guidance is the authoritative public HIPAA baseline for limiting PHI uses, disclosures, and
      requests to the minimum necessary during administrative healthcare operations.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public CMS, HHS, AHIMA/ACDIS, and HFMA sources as the baseline for workflow, evidence, terminology, payer edit,
      denial, and privacy expectations.
    - Tenant retrieval must provide payer, plan, contract, facility, provider type, service setting, code-set licensing, authorization/referral
      dependencies, query escalation timing, systems of record, and privacy or consent constraints.
    - Escalate when payer, clinical, privacy, or compliance rules materially change whether the item can be routed, held,
      queried, appealed, or billed.
  specialty_specific_exceptions:
  - This package coordinates coding workflow readiness and routing; it does not replace a certified coder, CDI specialist,
    provider, utilization reviewer, compliance officer, privacy officer, or billing release approver.
  - Licensed CPT and payer-specific code guidance must be supplied by the tenant or connected systems; the public baseline
    does not authorize code assignment.
  - Provider queries must cite health-record evidence and must not disclose reimbursement impact or pressure the provider
    toward a desired response.
  source_baseline_version: '2026-04-13'
  next_review_due_at: '2026-08-11'
