knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Healthcare operations are constrained by CMS hospital conditions of participation, emergency-preparedness requirements,
      medical-record requirements, and HHS OCR HIPAA rules.
  - class: Public payer or provider operating guidance
    rationale: Operational work is blocked by authorization, referral, eligibility, downtime, incident-command, and provider
      operating dependencies that must be routed without payer or clinical interpretation.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Patient-flow, huddle, handoff, throughput, capacity, and interoperability terminology require public workflow
      and measure references rather than generic operations vocabulary.
  authority_sources:
  - source_id: ecfr-42-cfr-482-15-emergency-preparedness
    title: '42 CFR 482.15 - Condition of participation: Emergency preparedness'
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.15
    authority_reason: Primary federal hospital emergency-preparedness regulation. It grounds downtime, continuity, communication,
      training, and escalation expectations for operational disruption handling.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: ecfr-42-cfr-482-23-nursing-services
    title: '42 CFR 482.23 - Condition of participation: Nursing services'
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.23
    authority_reason: Primary federal hospital nursing-services regulation. It supports escalation when staffing adequacy,
      licensed nurse availability, or patient-care assignment authority is implicated.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: ecfr-42-cfr-482-24-medical-record-services
    title: '42 CFR 482.24 - Condition of participation: Medical record services'
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.24
    authority_reason: Primary federal hospital medical-record regulation. It anchors the EHR and medical record as a required
      source for patient-specific truth and auditability.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: hhs-hipaa-tpo-care-operations
    title: HIPAA Privacy Rule and Care Coordination
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/special-topics/disclosures-treatment-payment-health-care-operations/index.html
    authority_reason: HHS OCR is the HIPAA privacy regulator. The guidance constrains PHI use and disclosure for treatment,
      payment, and health care operations.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: hhs-hipaa-minimum-necessary
    title: HIPAA Minimum Necessary Standard
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR minimum-necessary guidance determines when operational outputs containing PHI require limited
      disclosure, role controls, and privacy escalation.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: cms-prior-authorization-final-rule
    title: CMS Interoperability and Prior Authorization Final Rule
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/cms-interoperability-and-prior-authorization-final-rule-cms-0057-f
    authority_reason: CMS guidance is authoritative for payer/provider prior authorization workflow expectations. It supports
      escalation when scheduled work is blocked by authorization status without making the lane a payer interpreter.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cal-emsa-hics-guidebook
    title: Hospital Incident Command System
    publisher: California Emergency Medical Services Authority
    source_type: public-provider-operating-guidance
    location: https://emsa.ca.gov/disaster-medical-services-division-hospital-incident-command-system/
    authority_reason: Public state healthcare emergency-services authority guidance for hospital incident command. It grounds
      operational escalation roles, situation status, resource tracking, and downtime or surge command posture.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_public_authority_revision
    status: active
  - source_id: ahrq-teamstepps-huddles
    title: 'TeamSTEPPS Two-Day Training: Communication Tools'
    publisher: Agency for Healthcare Research and Quality
    source_type: recognized-healthcare-workflow-guidance
    location: https://www.ahrq.gov/teamstepps-program/curriculum/team/teach/two-day.html
    authority_reason: AHRQ is a federal healthcare quality and patient-safety agency. TeamSTEPPS huddle guidance grounds brief
      operational status exchange, plan adjustment, and escalation language.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_ahrq_revision
    status: active
  - source_id: cms-hospital-iqr-ed-throughput
    title: Hospital Inpatient Quality Reporting Program
    publisher: Centers for Medicare & Medicaid Services
    source_type: recognized-healthcare-measure-guidance
    location: https://www.cms.gov/medicare/quality/initiatives/hospital-quality-initiative/hospital-compare
    authority_reason: CMS hospital quality reporting is an authoritative public program for hospital throughput and quality-measure
      context, including ED throughput concepts used to frame operational delay and capacity scenarios.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_cms_measure_revision
    status: active
  - source_id: onc-uscdi-v6
    title: United States Core Data for Interoperability Version 6
    publisher: Assistant Secretary for Technology Policy / Office of the National Coordinator for Health IT
    source_type: recognized-healthcare-standard
    location: https://www.healthit.gov/isa/united-states-core-data-interoperability-uscdi
    authority_reason: ASTP/ONC USCDI is the federal interoperability data baseline. It grounds patient, encounter, order,
      procedure, care team, and clinical note terminology used by EHR and operational dashboards.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_uscdi_revision
    status: active
  source_categories:
  - category: Public healthcare regulator guidance
    retrieval_policy: Use eCFR, CMS, and HHS OCR sources first for hospital operations, staffing-boundary, medical-record,
      emergency-preparedness, and PHI handling constraints.
    specialty_specific_exceptions:
    - Federal baseline does not replace tenant facility policy, state licensure rules, union contracts, medical staff bylaws,
      or clinician instructions.
  - category: Public payer or provider operating guidance
    retrieval_policy: Use public payer/provider operating guidance for authorization, referral, downtime, incident-command,
      and escalation dependencies, then require tenant-specific policy and source hierarchy.
    specialty_specific_exceptions:
    - Do not infer coverage approval, authorization approval, clinical readiness, or final incident command decisions from
      public guidance.
  - category: Recognized healthcare workflow or measure guidance
    retrieval_policy: Use AHRQ, CMS quality, HICS, and ONC/ASTP references to define huddle, throughput, capacity, evidence,
      and system terminology.
    specialty_specific_exceptions:
    - Do not treat workflow or measure guidance as permission to provide clinical judgment or bypass patient-specific records.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public sources as baseline constraints; tenant policy and source-of-truth hierarchy are mandatory for operational
      action.
    - Require tenant, facility, service line, system-of-record map, RACI, escalation SLA, privacy posture, and prerequisite
      status before finalizing operational disposition.
    - Escalate when public guidance, tenant policy, payer rules, facility procedure, or patient records conflict.
  specialty_specific_exceptions:
  - Do not infer capacity release, staffing adequacy, clinical priority, authorization validity, referral completeness, or
    privacy permission from incomplete records.
  - Do not transform operational coordination into clinical leadership, patient access, healthcare IT ownership, revenue cycle,
    payer interpretation, privacy approval, or staffing-office authority.
  - Do not claim completion until source record, owner acceptance, residual blockers, and audit-ready evidence are recorded.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-11'
