knowledge_baseline:
  source_baseline_version: '2026-04-13'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Use CMS, eCFR, and HHS OCR guidance to anchor provider directory, network adequacy, provider selection, NPI,
      and PHI handling constraints.
  - class: Public payer or provider operating guidance
    rationale: Use CMS payer/provider operating references for provider-directory API, network data, provider identifiers,
      roster lifecycle, and access-impact dependencies.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Use recognized provider network management and credentialing references to ground terminology, lifecycle evidence,
      delegation, and exception handling.
  source_selection_approach: 'Use eCFR and CMS sources first for Medicare Advantage, Medicaid managed

    care, provider directory, NPI, network adequacy, and interoperability

    baselines. Use HHS OCR for PHI controls and NCQA public standards context

    for credentialing, recredentialing, delegation, and provider network

    management workflow. Treat state Medicaid manuals, state insurance rules,

    payer contracts, delegated entity agreements, provider contracts, and tenant

    systems-of-record precedence as runtime retrieval overlays that narrow the

    public baseline.

    '
  authority_sources:
  - source_id: ecfr-42-cfr-422-111-disclosure
    title: 42 CFR 422.111 - Disclosure requirements
    publisher: Electronic Code of Federal Regulations
    source_type: Public healthcare regulator guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-B/part-422/subpart-C/section-422.111
    authority_reason: Primary federal Medicare Advantage regulation for disclosure of plan information, including provider
      network and provider directory information relevant to directory publication readiness.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: ecfr-42-cfr-422-116-network-adequacy
    title: 42 CFR 422.116 - Network adequacy
    publisher: Electronic Code of Federal Regulations
    source_type: Public healthcare regulator guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-B/part-422/subpart-C/section-422.116
    authority_reason: Primary federal Medicare Advantage network adequacy regulation for provider and facility-specialty types,
      time and distance standards, HSD reference files, and evidence expectations for network submissions.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: ecfr-42-cfr-438-214-provider-selection
