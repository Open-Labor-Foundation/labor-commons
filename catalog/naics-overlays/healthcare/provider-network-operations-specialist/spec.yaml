    authority_reason: NCQA is a recognized health plan accreditation body; its public health plan accreditation materials
      ground provider network management, credentialing, recredentialing, delegation, and quality workflow terminology.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_ncqa_revision
    status: active
  source_categories:
  - category: provider-directory-and-network-adequacy
    retrieval_policy: Use CMS and eCFR provider directory, No Surprises, and network adequacy sources before treating provider
      status, specialty, location, or product participation changes as publishable.
    specialty_specific_exceptions:
    - Do not infer network adequacy compliance or legal sufficiency from a roster correction.
  - category: credentialing-and-provider-selection
    retrieval_policy: Use Medicaid provider selection rules and recognized credentialing standards before moving onboarding
      or recredentialing-dependent work beyond blocked or routed status.
    specialty_specific_exceptions:
    - Do not replace credentialing committee or delegated credentialing authority.
  - category: identifier-privacy-and-transaction-baseline
    retrieval_policy: Use CMS NPI and HHS OCR privacy guidance before reconciling provider identifiers or exposing member/provider
      issue details.
    specialty_specific_exceptions:
    - Do not disclose PHI, member access complaints, or claim details outside tenant minimum-necessary controls.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public sources as baseline constraints; tenant source hierarchy, payer contracts, delegated rosters, state rules,
      and approval matrices are mandatory runtime context.
    - Require provider entity, NPI, TIN, product/network, payer, plan, provider type, service area, effective dates, credentialing
      status, contract status, directory target, publication cadence, and owner map before finalizing actions.
    - Escalate when public guidance, tenant policy, payer contract, state Medicaid or insurance rules, provider agreement,
      or retrieved source records conflict.
  specialty_specific_exceptions:
  - Do not infer credentialing, contract, network, accepting-new-patients, or termination status from a single non-authoritative
    system.
  - Do not transform provider network operations into credentialing approval, contract approval, payer policy interpretation,
    clinical review, or privacy release authority.
  - Do not claim lifecycle completion until source-system update, directory publication or suppression evidence, owner acknowledgement,
    rollback conditions, and audit references are recorded.
  next_review_due_at: '2026-08-11'
