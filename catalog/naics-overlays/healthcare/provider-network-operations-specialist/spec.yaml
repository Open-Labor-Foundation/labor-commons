    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-C/part-438/subpart-D/section-438.214
    authority_reason: Primary Medicaid managed care regulation requiring written provider selection policies and credentialing
      or recredentialing standards for network providers.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: cms-provider-directory-api
    title: CMS Interoperability and Prior Authorization Final Rule - Provider Directory API
    publisher: Centers for Medicare & Medicaid Services
    source_type: Public payer or provider operating guidance
    location: https://www.cms.gov/priorities/key-initiatives/burden-reduction/interoperability
