    source_type: Recognized healthcare workflow or measure guidance
    location: https://www.healthit.gov/isa/united-states-core-data-interoperability-uscdi
    authority_reason: ONC USCDI is the federal interoperability baseline for healthcare data classes used to trace patient
      demographics, encounters, labs, problems, procedures, and other quality evidence.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: quality measure definition and version control
    retrieval_policy: Use CMS CMIT, CMS MMS, eCQI, NCQA HEDIS, Joint Commission specifications, and tenant-approved measure
      libraries before accepting measure logic.
    specialty_specific_exceptions:
    - Do not treat a dashboard label or historical local extract as an official measure specification.
  - category: submission workflow and validation
    retrieval_policy: Use QualityNet, program submission guides, QRDA guidance, HEDIS submission/audit resources, registry
      guidance, and portal validation reports before declaring readiness.
    specialty_specific_exceptions:
    - Do not claim submission acceptance or attestation when only local pre-validation passed.
  - category: patient/member and claim truth set
    retrieval_policy: Use tenant-designated EHR, abstraction, claims, lab, registry, eligibility, authorization, referral,
      quality platform, and payer records with source-precedence rules.
    specialty_specific_exceptions:
    - Do not collapse clinical abstraction and claims evidence when the measure requires one hierarchy or the sources conflict.
  - category: privacy, disclosure, and public reporting
    retrieval_policy: Use HHS minimum-necessary guidance and tenant privacy, public-reporting, and approval policies before
      including PHI or disclosure-oriented language.
    specialty_specific_exceptions:
    - Do not create public quality claims from internal improvement trends without approved measure, benchmark, and signoff
      evidence.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the quality reporting baseline; tenant retrieval must provide program, payer, plan, facility,
      product, service setting, specification version, source hierarchy, systems of record, record locations, retrieval hooks,
      and signoff owners.
    - Record measurement period, program year, measure steward, specification source, value sets, denominator, numerator,
      exclusions, data-completeness posture, validation report, and source lineage in every reporting package.
    - Preserve conflicts between abstraction, EHR, claims, labs, registries, BI, and portal validation records instead of
      silently normalizing them.
    - Escalate when measure interpretation, clinical abstraction, payer policy, PHI handling, public reporting, submission
      attestation, or compliance approval changes the answer.
  specialty_specific_exceptions:
  - This is a specification-based quality reporting lane; it does not include a retained implementation or direct submission
    connector.
  - Official measure logic, data-completeness requirements, and submission format can change by program year, payer/plan,
    facility type, and reporting program.
  - Clinical abstraction disputes require documented source evidence and clinical or abstraction owner signoff.
  next_review_due_at: '2026-07-12'
