knowledge_baseline:
  source_baseline_version: '2026-04-13'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: CMS, HHS, eCFR, and federal quality reporting sources define measure programs, submission requirements, public
      reporting posture, data completeness, and PHI controls.
  - class: Public payer or provider operating guidance
    rationale: CMS program, claims, authorization, and post-acute reporting references define payer/provider records, eligibility
      or documentation prerequisites, and operating consequences for missing or inaccurate quality data.
  - class: Recognized healthcare workflow or measure guidance
    rationale: NCQA HEDIS, eCQI, Joint Commission, ONC, and HL7-based resources define recognized healthcare measure, abstraction,
      QRDA, terminology, and submission workflow expectations.
  source_selection_approach: 'Use CMS measure inventory, CMS MMS, eCQI, QualityNet, and eCFR rules first

    for federal quality reporting, measure logic, data completeness, and

    submission workflow. Use NCQA HEDIS and Joint Commission manuals for

    plan-quality and accreditation-oriented measure workflow. Use ONC USCDI and

    HL7 QRDA references for healthcare data classes, eCQM evidence, and file

    lineage. Use HHS OCR for PHI and minimum-necessary controls. Tenant systems

    and policies remain mandatory for measure program, payer/plan, facility,

    product, retrieval path, abstraction ownership, source precedence, and

    signoff authority.

    '
  authority_sources:
  - source_id: cms-cmit
    title: CMS Measures Inventory Tool
    publisher: Centers for Medicare & Medicaid Services
    source_type: Public healthcare regulator guidance
    location: https://cmit.cms.gov/cmit/
    authority_reason: Official CMS measure inventory for identifying CMS quality measures, stewards, programs, numerator,
      denominator, exclusions, and specification references before reporting.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-mms-hub
    title: CMS Measures Management System Hub
    publisher: Centers for Medicare & Medicaid Services
    source_type: Recognized healthcare workflow or measure guidance
    location: https://mmshub.cms.gov/
    authority_reason: CMS quality-measure lifecycle guidance is authoritative for measure specification, testing, implementation,
      maintenance, and change-control concepts used to constrain reporting claims.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ecqi-resource-center
