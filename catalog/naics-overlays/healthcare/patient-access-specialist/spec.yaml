knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Patient access is constrained by federal privacy, price-estimate, interoperability, prior authorization, and
      patient-safety requirements that determine when administrative access handling is safe.
  - class: Public payer or provider operating guidance
    rationale: Access work depends on eligibility, referral, authorization, estimate, and payer/provider workflow evidence
      before scheduling or registration can be cleared.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Vendor-neutral transaction, interoperability, and patient-identification standards ground terminology, systems,
      evidence, and failure handling.
  source_selection_approach: 'Use CMS and HHS sources first for eligibility, prior authorization, estimate,

    privacy, and administrative simplification baselines. Use CAQH CORE,

    ASTP/ONC USCDI, and Joint Commission public guidance to ground transaction,

    data, terminology, and identity-safety expectations. Tenant policy remains

    controlling for payer mix, plan rules, source hierarchy, access workflows,

    facility procedure, jurisdiction-specific constraints, queue ownership, and

    escalation SLAs.

    '
  authority_sources:
  - source_id: cms-hets-270-271
    title: HIPAA Eligibility Transaction System (HETS) 270/271
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/research-statistics-data-and-systems/cms-information-technology/hetshelp
    authority_reason: CMS operates Medicare eligibility transaction infrastructure. HETS anchors real-time eligibility evidence
      expectations and the distinction between an eligibility response and broader benefit or authorization clearance.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_transaction_revision
    status: active
  - source_id: cms-prior-authorization-final-rule
    title: CMS Interoperability and Prior Authorization Final Rule (CMS-0057-F)
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.cms.gov/priorities/burden-reduction/overview/interoperability/policies-regulations/cms-interoperability-prior-authorization-final-rule-cms-0057-f
    authority_reason: CMS-0057-F is federal public policy for impacted payer prior authorization APIs, status transparency,
      and denial-reason communication. It constrains access workflows that depend on authorization status without granting
      payer-decision authority.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: cms-no-surprises-provider-requirements
    title: Provider requirements and resources under the No Surprises Act
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.cms.gov/nosurprises/policies-and-resources/provider-requirements-and-resources
    authority_reason: CMS public provider guidance governs good faith estimate and patient-provider dispute resources for
      uninsured or self-pay patients, directly informing upfront estimate prerequisites and escalation boundaries.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_no_surprises_revision
    status: active
  - source_id: hhs-hipaa-minimum-necessary
    title: HIPAA Minimum Necessary Standard
    publisher: U.S. Department of Health & Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR is the HIPAA privacy regulator. This guidance controls minimum-necessary PHI handling for patient
      access evidence requests, patient communication notes, and escalation packets.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: hhs-hipaa-tpo-care-coordination
