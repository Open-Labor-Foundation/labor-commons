    authority_reason: HHS OCR guidance is authoritative for treatment, payment, and health care operations disclosure boundaries.
      It constrains when access work involving PHI must route to privacy or responsible care-team owners.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
