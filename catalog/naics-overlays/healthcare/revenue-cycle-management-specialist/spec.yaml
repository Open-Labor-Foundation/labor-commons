knowledge_baseline:
  source_baseline_version: '2026-04-13'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: CMS, HHS OCR, and HHS OIG sources define claims, remittance, compliance, appeal, and PHI boundaries that constrain
      healthcare revenue cycle prioritization.
  - class: Public payer or provider operating guidance
    rationale: CMS payer and provider operating references define eligibility, authorization, claim, remittance, appeal, and
      reimbursement workflow prerequisites used to identify upstream blockers.
  - class: Recognized healthcare workflow or measure guidance
    rationale: HFMA and CAQH CORE public workflow references define revenue cycle metric, denial, eligibility, claim-status,
      and remittance terminology used to prioritize work queues.
  source_selection_approach: 'Use CMS and HHS sources first for claim, prior authorization, appeal,

    remittance, compliance, and privacy boundaries. Use CAQH CORE and HFMA

    public revenue-cycle metric guidance to normalize payer-provider

    transaction and denial-measure terminology. Treat tenant payer contracts,

    state Medicaid manuals, MAC articles, facility policies, service model,

    approval matrix, priority matrix, and systems-of-record precedence as

    runtime facts that narrow but do not replace the public baseline.

    '
  authority_sources:
  - source_id: cms-claims-processing-manual
    title: Medicare Claims Processing Manual
    publisher: Centers for Medicare & Medicaid Services
    source_type: Public healthcare regulator guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/internet-only-manuals-ioms-items/cms018912
    authority_reason: CMS administers Medicare, and this manual is the official public source for Medicare claim submission,
      processing, payment, remittance, correction, and reopening workflows that constrain RCM root-cause and queue-priority
      claims.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-prior-authorization-preclaim
    title: Prior Authorization and Pre-Claim Review Initiatives
    publisher: Centers for Medicare & Medicaid Services
    source_type: Public payer or provider operating guidance
    location: https://www.cms.gov/data-research/monitoring-programs/medicare-fee-service-compliance-programs/prior-authorization-and-pre-claim-review-initiatives
    authority_reason: CMS prior authorization and pre-claim review guidance is official payer operating guidance for authorization
      and documentation prerequisites that can block claim submission and shift priority to access or utilization owners.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-remittance-era-eft
    title: Health Care Payment and Remittance Advice and Electronic Funds Transfer
    publisher: Centers for Medicare & Medicaid Services
    source_type: Recognized healthcare workflow or measure guidance
    location: https://www.cms.gov/priorities/key-initiatives/burden-reduction/administrative-simplification/transactions/health-care-payment-remittance-advice-electronic-funds-transfer
    authority_reason: CMS administrative simplification guidance is authoritative for ERA, EFT, CARC, RARC, and remittance
      workflow terminology used to classify denial, posting, and reconciliation constraints.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-redetermination
    title: 'First Level of Appeal: Redetermination by a Medicare Contractor'
    publisher: Centers for Medicare & Medicaid Services
    source_type: Public payer or provider operating guidance
    location: https://www.cms.gov/medicare/appeals-grievances/fee-for-service/first-level-appeal-redetermination-medicare-contractor
    authority_reason: CMS redetermination guidance is official payer workflow authority for when denial work leaves routine
      RCM follow-up and requires formal appeal ownership, MAC handling, written request evidence, and timing controls.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: caqh-core-operating-rules
    title: Operating Rules
    publisher: CAQH CORE
    source_type: Recognized healthcare workflow or measure guidance
    location: https://www.caqh.org/core/operating-rules
    authority_reason: CAQH CORE operating rules are recognized national healthcare administrative workflow rules for eligibility,
      claim status, payment, and remittance transactions that support payer-provider RCM evidence expectations.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: hfma-denial-metrics
    title: Standardizing denial metrics for the revenue cycle
    publisher: Healthcare Financial Management Association
    source_type: Recognized healthcare workflow or measure guidance
    location: https://www.hfma.org/guidance/standardizing-denial-metrics-revenue-cycle-benchmarking-process-improvement/
    authority_reason: HFMA is a recognized healthcare finance professional association, and this public guidance defines revenue
      cycle denial metrics, denial categories, MAP KPI references, and standardization principles used to prioritize denial
      and root-cause work.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-ocr-tpo
    title: Uses and Disclosures for Treatment, Payment, and Health Care Operations
    publisher: U.S. Department of Health and Human Services, Office for Civil Rights
    source_type: Public healthcare regulator guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/disclosures-treatment-payment-health-care-operations/index.html
    authority_reason: HHS OCR is the HIPAA Privacy Rule authority; this guidance defines payment and healthcare operations
      uses and the privacy limits that govern RCM evidence handling and escalation packets.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-ocr-minimum-necessary
    title: Minimum Necessary Requirement
    publisher: U.S. Department of Health and Human Services, Office for Civil Rights
    source_type: Public healthcare regulator guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR minimum-necessary guidance is authoritative for limiting PHI access, use, disclosure, and escalation
      artifacts in payment and operations workflows.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-oig-provider-compliance-training
    title: HEAT Provider Compliance Training
    publisher: Office of Inspector General, U.S. Department of Health and Human Services
    source_type: Public healthcare regulator guidance
    location: https://oig.hhs.gov/compliance/provider-compliance-training/
    authority_reason: HHS OIG compliance training is public federal compliance guidance for provider billing controls, fraud
      and abuse awareness, documentation importance, and escalation when compliance issues arise.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: claim, remittance, denial, and appeal workflow
    retrieval_policy: Use CMS claim, remittance, and redetermination references before classifying claim-state, denial, posting,
      appeal-window, or payer-follow-up constraints.
    specialty_specific_exceptions:
    - Do not convert CMS appeal or claim workflow guidance into tenant-specific payer interpretation without retrieved contract,
      MAC, Medicaid, or commercial payer context.
  - category: authorization, referral, eligibility, and payer transaction prerequisites
    retrieval_policy: Use CMS prior authorization guidance and CAQH CORE operating rules before prioritizing queues blocked
      by eligibility, referral, authorization, claim status, or remittance transaction gaps.
    specialty_specific_exceptions:
    - Do not infer active coverage, valid authorization, referral sufficiency, or payer hierarchy when the service-date and
      plan-specific records are missing.
  - category: revenue cycle metrics and root-cause prioritization
    retrieval_policy: Use HFMA public denial metric guidance and tenant-approved KPI definitions before naming denial growth,
      leakage, AR, productivity, or root-cause priorities.
    specialty_specific_exceptions:
    - Do not treat an unvalidated dashboard label as a standard denial, AR, leakage, or productivity metric when owner routing
      or financial impact would change.
  - category: privacy and compliance boundaries
    retrieval_policy: Use HHS OCR and HHS OIG guidance before assembling PHI-bearing prioritization, denial, or escalation
      packets or acting on compliance-sensitive requests.
    specialty_specific_exceptions:
    - Do not use minimum-necessary payment or operations rationale to disclose full clinical records or resolve non-routine
      privacy questions.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources establish the baseline; tenant systems and policies determine final queue labels, source precedence,
      capacity limits, and approval owners.
    - Refresh public sources on their interval and return to the orchestrator if a decayed source would materially change
      the recommendation.
  next_review_due_at: '2026-07-12'
