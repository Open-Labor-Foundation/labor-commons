knowledge_baseline:
  source_baseline_version: '2026-04-13'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Use CMS and HHS regulator guidance to anchor claim processing, coding-adjacent edits, payment privacy, and
      compliance boundaries in official healthcare rules.
  - class: Public payer or provider operating guidance
    rationale: Use CMS payer and provider operating manuals and MLN materials to define claim forms, submission requirements,
      filing limits, authorization gates, COB, MSP, and appeal handoff boundaries.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Use recognized administrative transaction workflow references to define eligibility, claim status, remittance,
      denial, and posting terminology across payer workflows.
  source_selection_approach: 'Use CMS claims processing, professional and institutional billing, NCCI,

    prior authorization, remittance, COB or MSP, and appeal references plus

    HHS OCR privacy guidance and CAQH CORE operating rules before drafting

    workflow claims. Treat tenant payer contracts, state Medicaid manuals,

    MAC articles, commercial payer policies, provider enrollment records, fee

    schedules, approval matrices, and system-of-record precedence as runtime

    retrieval dependencies that narrow but do not replace the public baseline.

    '
  authority_sources:
  - source_id: cms-claims-processing-manual
    title: Medicare Claims Processing Manual
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/internet-only-manuals-ioms-items/cms018912
    authority_reason: CMS is the federal Medicare program administrator. The Medicare Claims Processing Manual is the official
      public source for Medicare claim submission, processing, payment, adjustment, remittance, and correction workflows that
      constrain healthcare billing operations.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-mln-1500-837p
    title: 'Medicare Billing: CMS-1500 and 837P'
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-provider-operating-guidance
    location: https://www.cms.gov/files/document/mln006976-medicare-billing-cms-1500-837p.pdf
    authority_reason: This CMS MLN booklet directly governs professional-claim form use, electronic 837P submission, provider
      and place-of-service facts, filing posture, and documentation dependencies for provider-side claim readiness.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-ncci-medicare
    title: National Correct Coding Initiative Edits
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.cms.gov/medicare/coding-billing/national-correct-coding-initiative-ncci-edits
    authority_reason: CMS maintains NCCI edit policy for Medicare and Medicaid claim integrity. It is authoritative for identifying
      coding-adjacent reimbursement edit dependencies while preserving the boundary that this lane cannot assign final codes.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-prior-authorization-preclaim
    title: Prior Authorization and Pre-Claim Review Initiatives
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-provider-operating-guidance
    location: https://www.cms.gov/data-research/monitoring-programs/medicare-fee-service-compliance-programs/prior-authorization-and-pre-claim-review-initiatives
    authority_reason: CMS prior authorization and pre-claim review guidance is an official payer operating reference for services
      where approval or review status gates claim submission and where missing documentation must block confident billing.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-remittance-era-eft
    title: Health Care Payment and Remittance Advice and Electronic Funds Transfer
    publisher: Centers for Medicare & Medicaid Services
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.cms.gov/priorities/key-initiatives/burden-reduction/administrative-simplification/transactions/health-care-payment-remittance-advice-electronic-funds-transfer
    authority_reason: CMS administrative simplification guidance is authoritative for ERA and EFT concepts, payment-to-remittance
      reassociation, CARC and RARC usage, and healthcare remittance handling in provider revenue workflows.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-msp-cob
    title: Medicare Secondary Payer and Coordination of Benefits
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-provider-operating-guidance
    location: https://www.cms.gov/medicare/coordination-benefits-recovery/overview
    authority_reason: CMS coordination of benefits and Medicare Secondary Payer guidance is the public payer baseline for
      determining when another payer may be primary and when claim, remittance, or patient-balance handling must stop for
      COB or MSP review.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-redetermination
    title: 'First Level of Appeal: Redetermination by a Medicare Contractor'
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-provider-operating-guidance
    location: https://www.cms.gov/medicare/appeals-grievances/fee-for-service/first-level-appeal-redetermination-medicare-contractor
    authority_reason: CMS redetermination guidance is an official payer workflow source for when an operational denial moves
      to formal appeal ownership, documentation expectations, MAC handling, and the boundary between minor correction and
      appeal.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: caqh-core-operating-rules
    title: Operating Rules
    publisher: CAQH CORE
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.caqh.org/core/operating-rules
    authority_reason: CAQH CORE operating rules are recognized national healthcare administrative workflow rules for eligibility,
      claim status, payment, and remittance transactions and are used to normalize payer-provider transaction expectations.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-ocr-hipaa-tpo
    title: Uses and Disclosures for Treatment, Payment, and Health Care Operations
    publisher: U.S. Department of Health and Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/disclosures-treatment-payment-health-care-operations/index.html
    authority_reason: HHS OCR is authoritative for HIPAA Privacy Rule guidance. This page constrains healthcare billing requests
      by distinguishing payment and operations uses from disclosures requiring privacy review.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-ocr-minimum-necessary
    title: Minimum Necessary Requirement
    publisher: U.S. Department of Health and Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR minimum-necessary guidance is authoritative for limiting PHI access, use, and disclosure in
      payment and operations workflows and directly constrains billing, posting, denial, and escalation packets.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: claim origination, filing, and correction baseline
    retrieval_policy: Use the CMS Claims Processing Manual and CMS-1500 or 837P guidance first when work involves charge support,
      claim form readiness, filing posture, or correction routing.
    specialty_specific_exceptions:
    - Do not use Medicare guidance to guess commercial, Medicaid, Medicare Advantage, workers compensation, or tenant-specific
      payer edits that have not been retrieved.
  - category: authorization, eligibility, referral, COB, and payer prerequisite handling
    retrieval_policy: Use CMS prior authorization and COB or MSP sources plus tenant eligibility, referral, payer-plan, and
      authorization records when prerequisites gate claim generation or posting.
    specialty_specific_exceptions:
    - Do not submit, post, or close a claim when authorization, eligibility, referral, or payer hierarchy evidence is missing
      and material.
  - category: coding-adjacent reimbursement edits
    retrieval_policy: Use CMS NCCI sources to recognize coding-adjacent edit categories and dependencies, then route code
      selection, modifier decisions, and medical-record changes to coding or clinical documentation owners.
    specialty_specific_exceptions:
    - Do not convert edit awareness into final code assignment, modifier selection, or medical necessity judgment.
  - category: remittance, denial, and reconciliation workflow
    retrieval_policy: Use CMS remittance/EFT guidance, CAQH CORE operating rules, and payer remittance records before drafting
      posting, CARC/RARC, denial, or variance-handling outputs.
    specialty_specific_exceptions:
    - Do not assume an ERA, EOB, portal note, or payer phone note authorizes an adjustment unless source evidence and tenant
      approvals are present.
  - category: appeal, privacy, compliance, and patient-safety boundaries
    retrieval_policy: Use CMS redetermination guidance for formal appeal handoff boundaries and HHS OCR HIPAA guidance for
      PHI handling in payment and operations work.
    specialty_specific_exceptions:
    - Do not disclose excess PHI, certify appeal arguments, decide medical necessity, or resolve privacy-sensitive questions
      without the correct owner.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject payer contracts, state Medicaid manuals, Medicare Advantage plan policies, commercial payer policies, MAC articles,
      provider enrollment files, fee schedules, and tenant approval matrices only through orchestrator-controlled retrieval.
    - Require payer, plan, place of service, authorization status, filing limit, denial inventory context, claim type, provider
      facts, and current system-of-record evidence whenever those facts could change the billing result.
    - Record unresolved ambiguity instead of guessing when CMS guidance, payer policy, clinical documentation, tenant policy,
      or system evidence materially conflicts.
    - Use minimum-necessary PHI handling for all payment, posting, denial, and escalation packets.
  specialty_specific_exceptions:
  - Keep the lane on healthcare billing evidence handling, claim readiness, posting, denial categorization, reconciliation,
    and escalation packaging rather than general accounts receivable, coding, payer-policy interpretation, clinical review,
    privacy approval, or accounting signoff.
  - Treat charge tickets, encounter documentation, coverage details, authorization records, claim forms, remittance advice,
    EOBs, payer correspondence, denial reasons, and adjustment logs as first-class artifacts rather than generic invoices.
  - Do not imply that a claim, denial outcome, patient balance, or adjustment is supportable solely because one system agrees
    if EHR, practice-management, billing, clearinghouse, payer portal, remittance, or approval records materially conflict.
  - Do not use the healthcare overlay cosmetically; payer, plan, coverage, authorization, referral, clinical documentation,
    PHI, place-of-service, COB, and coding-adjacent dependencies must change the workflow.
  next_review_due_at: '2026-07-12'
materialization:
  olf_agent_pa_requirements:
  - Task metadata for payer, plan, claim type, place of service, provider facts, patient or member identity, requested financial
    action, denial state, urgency, and patient-impact posture.
  - Boundary metadata naming coding, access, authorization, utilization management, clinical documentation, payer policy,
    privacy, compliance, appeals, accounting, collections, and legal owners.
  - Retrieval hooks for EHR charge capture, encounter documentation, practice-management ledgers, billing, clearinghouse,
    claim scrubber, payer portal, denial-management, remittance, document, approval, and audit systems.
  - Tenant policy inputs for timely filing, authorization requirements, referral workflow, payer hierarchy, COB or MSP handling,
    adjustment approval, small-balance handling, denial inventory ownership, and system precedence.
  regulated_lane_caveats:
  - The lane may support administrative billing decisions but cannot select coding, rewrite clinical records, determine medical
    necessity, approve privacy disclosure, certify appeals, or interpret reimbursement law.
  - PHI handling must stay within minimum-necessary payment or operations needs and tenant-approved channels.
  - Unsupported financial changes require delegated authority, documented evidence, and auditable approval.
  trusted_build_promotion:
  - Promote from specification-based to trusted built only after repeated production-like usage proves reliable retrieval
    of EHR, practice-management, billing, clearinghouse, payer, remittance, authorization, and approval records.
  - Promotion must include governed connector tests, privacy review, denial-routing precision review, unsupported-adjustment
    refusal metrics, and explicit repository approval for a retained implementation.
