    publisher: Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.cms.gov/priorities/key-initiatives/burden-reduction/administrative-simplification/transactions
    authority_reason: CMS administers HIPAA administrative simplification transaction standards. This source is authoritative
      for eligibility, claim status, claim or encounter, payment, and remittance transaction expectations used by payer operations.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cms-remittance-era-eft
    title: Health Care Payment and Remittance Advice and Electronic Funds Transfer
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.cms.gov/priorities/key-initiatives/burden-reduction/administrative-simplification/transactions/health-care-payment-remittance-advice-electronic-funds-transfer
    authority_reason: CMS administrative simplification guidance is authoritative for ERA, EFT, payment, remittance, CARC,
      RARC, and reassociation concepts that payer operations uses when responding to provider or member-impacting claim inquiries.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: hhs-ocr-tpo
    title: Uses and Disclosures for Treatment, Payment, and Health Care Operations
    publisher: U.S. Department of Health and Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/disclosures-treatment-payment-health-care-operations/index.html
    authority_reason: HHS OCR enforces HIPAA privacy rules. This guidance is authoritative for when payer operations may use
      or disclose PHI for payment and healthcare operations and when privacy review is required.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: hhs-ocr-minimum-necessary
    title: Minimum Necessary Requirement
    publisher: U.S. Department of Health and Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR minimum-necessary guidance constrains payer operations evidence packets, provider or member
      correspondence, and cross-queue escalation involving PHI.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: caqh-core-operating-rules
    title: Operating Rules
    publisher: CAQH CORE
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.caqh.org/core/operating-rules
    authority_reason: CAQH CORE operating rules are recognized national healthcare administrative operating rules for eligibility,
      claim status, prior authorization, payment, and remittance transactions used between providers and health plans.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_caqh_revision
    status: active
  - source_id: hl7-davinci-prior-authorization-support
    title: Da Vinci Prior Authorization Support Implementation Guide
    publisher: HL7 International
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://hl7.org/fhir/us/davinci-pas/
    authority_reason: HL7 is a recognized healthcare interoperability standards organization. The Da Vinci PAS implementation
      guide directly models payer-provider prior authorization request and response workflows and evidence exchange terms.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hl7_revision
    status: active
  - source_id: ncqa-utilization-management
    title: Utilization Management Accreditation
    publisher: National Committee for Quality Assurance
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://www.ncqa.org/programs/health-plans/utilization-management/
    authority_reason: NCQA is a recognized health plan accreditation body. Its utilization-management materials support the
      boundary that UM decision-making and clinical review require defined clinical review authority, separate from payer
      operations queue handling.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_ncqa_revision
    status: active
  source_categories:
  - category: Payer authorization and prerequisite handling
    retrieval_policy: Use CMS prior authorization, HL7 Da Vinci PAS, and tenant product policy when authorization, referral,
      provider evidence, clinical attachment, or payer-provider exchange state changes whether a queue item can progress.
    specialty_specific_exceptions:
    - Do not approve or deny medical necessity; route UM or clinical review decisions to authorized owners.
  - category: Claims, remittance, provider inquiry, and transaction evidence
    retrieval_policy: Use CMS claims processing, administrative simplification, remittance, CAQH CORE, and tenant claims-system
      records when claim status, pend, denial, payment, remittance, or provider inquiry evidence determines the operational
      disposition.
    specialty_specific_exceptions:
    - Do not force adjudication, invent claim status, or choose a financial result when claims, remittance, and provider inquiry
      systems disagree.
  - category: Member-impacting determinations, grievances, appeals, and privacy
    retrieval_policy: Use CMS managed care, eCFR Subpart M, HHS OCR, and tenant member-service or compliance policies when
      a work item affects member rights, adverse determinations, formal appeals, grievances, notices, or PHI handling.
    specialty_specific_exceptions:
    - Do not make final appeal, grievance, organization-determination, legal, privacy, or benefit-interpretation decisions
      from an operations queue.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define payer operations baseline, evidence classes, transaction vocabulary, PHI constraints, and authority
      boundaries.
    - Tenant-specific payer, plan, product, jurisdiction, service model, delegated entity, system, rule hierarchy, and routing
      facts must be retrieved at runtime.
    - Every disposition, pend, route, exception, escalation, or completion output must cite source records, queue state, evidence
      gaps, and next owner.
  specialty_specific_exceptions:
  - Payer operations owns queue progression and evidence packaging, not medical-necessity adjudication, benefit interpretation,
    final appeal disposition, legal advice, privacy approval, or finance signoff.
  - Conflicting payer product rules, CMS guidance, delegated entity policy, state rules, tenant policy, or source systems
    require escalation rather than confident synthesis.
  - Completion requires audit-ready case evidence, not a chat note, provider assurance, member statement, or local spreadsheet
    row.
  next_review_due_at: '2026-07-12'
