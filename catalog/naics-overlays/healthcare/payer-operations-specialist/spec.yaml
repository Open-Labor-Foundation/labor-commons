knowledge_baseline:
  source_baseline_version: '2026-04-13'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: CMS, HHS OCR, and eCFR sources constrain payer authorization, appeal, administrative transaction, PHI, and
      healthcare operations behavior.
  - class: Public payer or provider operating guidance
    rationale: CMS manuals and official payer/provider operating references define payer-side authorization, organization-determination,
      claims, appeal, and provider interaction workflows.
  - class: Recognized healthcare workflow or measure guidance
    rationale: CAQH CORE, HL7 Da Vinci, and NCQA sources normalize payer-provider administrative transactions, prior authorization
      workflow artifacts, and utilization-management decision boundaries.
  source_selection_approach: 'Use CMS and HHS regulator sources first for payer workflows, HIPAA

    administrative transactions, managed-care determinations and appeals,

    prior authorization, and PHI handling. Use CAQH CORE and HL7 Da Vinci

    sources to normalize eligibility, claim status, payment, remittance, and

    prior authorization workflow terms. Use NCQA utilization-management

    guidance to preserve the boundary that qualified clinical professionals,

    not this operations lane, make clinical UM decisions. Tenant policy,

    payer product, jurisdiction, delegated entity arrangements, contracts,

    source-system hierarchy, and queue SLAs must be retrieved at runtime.

    '
  authority_sources:
  - source_id: cms-interoperability-prior-authorization
    title: Interoperability and Prior Authorization
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-healthcare-regulator-guidance
    location: https://www.cms.gov/priorities/key-initiatives/burden-reduction/prior-authorization
    authority_reason: CMS is the federal regulator for covered Medicare Advantage, Medicaid, CHIP, and QHP issuer prior authorization
      interoperability requirements. This source constrains payer authorization workflow, authorization status evidence, and
      payer-provider exchange expectations.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cms-claims-processing-manual
    title: Medicare Claims Processing Manual
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/internet-only-manuals-ioms-items/cms018912
    authority_reason: CMS publishes the official Medicare claims processing manual, which is authoritative for claims processing,
      adjustment, remittance, correction, and evidence concepts that constrain payer operational disposition work.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cms-managed-care-manual-chapter-13
    title: Medicare Managed Care Manual, Chapter 13 - Medicare Managed Care Beneficiary Grievances, Organization Determinations,
      and Appeals
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/mc86c13.pdf
    authority_reason: CMS managed care appeal guidance defines organization determinations, grievances, appeals, timeframes,
      notices, and formal decision paths, making it authoritative for the boundary between payer operations support and appeal
      or determination authority.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: ecfr-42-cfr-422-subpart-m
    title: 42 CFR Part 422 Subpart M - Grievances, Organization Determinations and Appeals
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-B/part-422/subpart-M
    authority_reason: The eCFR is the continuously updated public codification of federal regulations. Subpart M is the regulatory
      baseline for Medicare Advantage grievance, organization-determination, and appeal processes.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: cms-administrative-simplification-transactions
