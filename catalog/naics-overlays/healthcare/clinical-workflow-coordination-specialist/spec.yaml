- healthcare-it-systems-specialist
- coding-and-reimbursement-specialist
knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: CMS Conditions of Participation, EMTALA responsibilities, and HHS OCR HIPAA guidance define medical-record,
      order, emergency-transfer, electronic-notification, confidentiality, and PHI disclosure boundaries that constrain clinical
      workflow routing and closure.
  - class: Public payer or provider operating guidance
    rationale: CMS prior authorization guidance and AHRQ office testing guidance define payer dependency visibility and provider-side
      result follow-up controls that gate safe coordination.
  - class: Recognized healthcare workflow or measure guidance
    rationale: ASTP or ONC SAFER Guides, AHRQ care coordination measures, and the CMS eCQM closing-the-referral-loop measure
      define recognized healthcare workflow, terminology, evidence, and loop-closure expectations.
  source_selection_approach: 'Use CMS and HHS sources first for regulated medical-record, electronic

    notification, emergency-transfer, authorization, and PHI boundaries. Use

    AHRQ provider workflow guidance and ONC SAFER guidance to define closed-loop

    result, order, and clinician communication practices. Use CMS eCQM referral

    loop and AHRQ care coordination measure guidance to define referral closure

    and handoff evidence. Tenant retrieval is still required for service-line

    policy, state-specific practice constraints, local queue owner maps,

    after-hours coverage, payer contract terms, authorization rules, consent

    posture, clinical escalation thresholds, and EHR system ownership.

    '
  authority_sources:
  - source_id: cms-42-cfr-482-24-medical-records
    title: '42 CFR 482.24 - Condition of participation: Medical record services'
    publisher: Centers for Medicare & Medicaid Services via eCFR
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.24
    authority_reason: CMS hospital Conditions of Participation define confidentiality, authenticated orders, electronic notifications,
      and medical-record contents such as consultative evaluations, orders, radiology and laboratory reports, and follow-up-care
      provisions that establish the patient truth set for workflow coordination.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-42-cfr-489-24-emtala
    title: 42 CFR 489.24 - Special responsibilities of Medicare hospitals in emergency cases
    publisher: Centers for Medicare & Medicaid Services via eCFR
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-489/subpart-B/section-489.24
    authority_reason: CMS EMTALA regulations establish emergency medical screening, stabilizing treatment, appropriate transfer,
      and transfer-record expectations, which require urgent or safety-sensitive workflow tasks to escalate to qualified clinical
      owners rather than remain in administrative coordination.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-ocr-hipaa-tpo
    title: Uses and Disclosures for Treatment, Payment, and Health Care Operations
    publisher: U.S. Department of Health & Human Services Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/disclosures-treatment-payment-health-care-operations/index.html
    authority_reason: HHS OCR is the federal privacy regulator for HIPAA covered entities. Its treatment, payment, and operations
      disclosure guidance is authoritative for PHI routing, minimum-necessary posture, and privacy escalation during clinical
      workflow handoffs.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
