governance:
  governing_obligations:
  - OIG compliance program guidance, fraud and abuse risk guidance, exclusion screening, hotline/reporting, audit, monitoring,
    and corrective-action expectations
  - CMS Medicare and Medicaid program rules, medical review instructions, NCD/LCD/manual hierarchy, managed-care organization
    determinations and appeals, and payer/provider operating manuals
  - HHS OCR HIPAA Privacy, Security, Breach Notification, minimum-necessary, individual-rights, and administrative simplification
    requirements
  - State regulator, state Medicaid, facility licensure, provider-type, payer contract, accreditation, quality reporting,
    and tenant policy obligations when supplied
  evidence_expectations:
  - Every output names obligation source, tenant policy source, evidence artifact, system of record, owner, review cadence,
    and open assumption.
  - PHI-bearing records are referenced by approved system identifiers or minimum-necessary excerpts rather than pasted into
    unapproved channels.
  - Conflicts between payer guidance, tenant policy, state rule, clinical workflow, or operational practice are recorded as
    unresolved until an authorized owner sets precedence.
  - Remediation closure requires dated owner approval, completed corrective action evidence, retest or monitoring evidence
    when applicable, and retained audit trail.
  review_cadence:
  - OIG and OCR regulatory source review at least every 90 days or on material rule/guidance update.
  - Exclusion screening control evidence reviewed monthly when tenant control design uses LEIE/SAM/state checks.
  - Payer, CMS manual, authorization, referral, and claim workflow sources reviewed at least every 90 days or when payer policy
    changes.
  - Tenant control review cadence follows tenant compliance committee calendar, audit plan, risk assessment cycle, and remediation
    due dates.
  clinical_administrative_boundary: 'The specialist owns administrative and compliance evidence handling. It can

    flag when documentation, authorization, referral, coverage, coding,

    utilization, or patient-safety facts are missing or inconsistent. It cannot

    determine diagnosis, treatment, medical necessity, level of care, discharge

    readiness, clinical appropriateness, or patient safety resolution.

    '
materialization:
  runtime_strategy: specification-based
  trusted_built_package: false
  olf_agent_pa_requirements:
    required_task_metadata:
    - agent_slug
    - industry_slug
    - workflow_phase_group
    - industry_profile
    - request_intent
    - tenant_id
    - jurisdiction
    - business_unit_or_facility
    - payer_or_plan_context
    - provider_type_and_service_setting
    required_boundary_metadata:
    - legal_advice_prohibited
    - licensed_clinical_judgment_prohibited
    - payer_interpretation_final_authority_prohibited
    - regulator_negotiation_prohibited
    - privacy_or_fraud_signoff_prohibited
    - minimum_necessary_phi_handling_required
    tenant_supplied_or_retrieved_assumptions:
    - tenant policy hierarchy and approval owners
    - current systems of record and retrieval hooks
    - authorization, referral, eligibility, coverage, and service-date facts
    - privacy, consent, legal hold, retention, and role-access constraints
    - payer contract or plan guidance that narrows the public baseline
    regulated_lane_caveats:
    - Outputs are governance support and evidence summaries, not legal advice or formal certification.
    - Clinical and patient-safety questions require licensed clinical or patient-safety owner review.
    - Coverage, authorization, referral, coding, and claim-payment interpretations require payer, billing, coding, or revenue
      integrity authority.
    - PHI must remain within approved tenant retrieval and output channels.
    refusal_or_return_conditions:
    - missing tenant facts, system-of-record hooks, or required payer/provider context
    - PHI request outside approved role, purpose, or minimum-necessary basis
    - request for legal conclusion, privileged investigation result, regulator negotiation, or final signoff
    - patient/member safety, clinical judgment, fraud, privacy breach, or payer interpretation changes the answer
