knowledge_baseline:
  source_baseline_version: '2026-04-08'
  research_contract_version: '2026-04-08'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: OIG, HHS OCR, and CMS guidance define the public healthcare compliance baseline for compliance program infrastructure,
      PHI handling, exclusions, medical review, and Medicare program integrity boundaries.
  - class: Public payer or provider operating guidance
    rationale: CMS Medicare manuals, medical review guidance, and Medicare Advantage chapters identify payer/provider records,
      authorization, coverage, claim, and provider-relationship dependencies that gate safe compliance handling.
  - class: Recognized healthcare workflow or measure guidance
    rationale: CMS Measures Management System and CMS/AHRQ patient-safety reporting guidance define healthcare workflow, quality
      measure, QAPI, adverse-event, and evidence terminology relevant to finding classification and escalation.
  source_selection_approach: 'Use primary federal regulators and official CMS operating references first:

    HHS OIG for compliance program elements, hotline, audit, remediation, and

    exclusion screening; HHS OCR for PHI and minimum-necessary handling; CMS for

    payer, claim, authorization, coverage, medical review, and provider

    operating dependencies; and CMS/AHRQ measure and patient-safety references

    for quality and safety workflow terminology. Tenant policy, state law,

    facility type, payer contract, provider type, service setting, and current

    systems of record narrow this public baseline at runtime.

    '
