knowledge_baseline:
  source_baseline_version: '2026-04-07'
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: CMS, HHS, and federal health IT sources define healthcare quality measurement, privacy, public reporting, claims,
      and interoperability constraints that govern safe analytics outputs.
  - class: Public payer or provider operating guidance
    rationale: CMS claims, prior authorization, managed care, remittance, and provider-operating references establish the
      workflow records and dependencies behind claim, eligibility, authorization, and denial truth sets.
  - class: Recognized healthcare workflow or measure guidance
    rationale: NCQA HEDIS, eCQI, US Core, and recognized measure resources define healthcare metric specification, denominator,
      exclusion, terminology, and standards-based evidence handling.
  source_selection_approach: 'Use CMS and HHS regulator sources first for quality measurement,

    disclosure, reimbursement, and privacy boundaries. Use CMS claims,

    remittance, prior authorization, and managed-care references for payer and

    provider operating dependencies. Use NCQA HEDIS, federal eCQI resources,

    ONC USCDI, and HL7 US Core only as workflow and standards references for

    measure and data-lineage handling. Tenant metric dictionaries, payer and

    plan rules, source-precedence policies, consent constraints, current

    systems of record, record locations, retrieval hooks, and approval matrices

    remain mandatory runtime inputs.

    '
  authority_sources:
  - source_id: cms-quality-measures-inventory
    title: CMS Measures Inventory Tool
    publisher: Centers for Medicare & Medicaid Services
    source_type: Public healthcare regulator guidance
    location: https://cmit.cms.gov/cmit/
    authority_reason: Official CMS inventory for CMS quality measures; authoritative for identifying measure steward, program,
      numerator, denominator, exclusion, and measure-specification references before analytical use.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-mms-blueprint
    title: CMS Measures Management System Blueprint
    publisher: Centers for Medicare & Medicaid Services
    source_type: Recognized healthcare workflow or measure guidance
    location: https://mmshub.cms.gov/blueprint
    authority_reason: CMS measure-development guidance is authoritative for measure lifecycle, specification, testing, implementation,
      and maintenance concepts used to constrain numerator, denominator, exclusion, and evidence expectations.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: hhs-minimum-necessary
    title: Minimum Necessary Requirement
    publisher: U.S. Department of Health and Human Services
    source_type: Public healthcare regulator guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: Official HHS HIPAA guidance is authoritative for limiting protected health information used or disclosed
      in analytical reports, examples, exception registers, and escalation packets.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-claims-processing-manual
    title: Medicare Claims Processing Manual
    publisher: Centers for Medicare & Medicaid Services
    source_type: Public payer or provider operating guidance
    location: https://www.cms.gov/regulations-and-guidance/guidance/manuals/internet-only-manuals-ioms-items/cms018912
    authority_reason: Official CMS claims-processing manuals are authoritative for Medicare claim workflow, provider billing
      records, claim adjudication context, and claim-state terminology used when reconciling encounters, charges, claims,
      remittances, and denials.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-prior-auth-interoperability
    title: CMS Interoperability and Prior Authorization Final Rule
    publisher: Centers for Medicare & Medicaid Services
    source_type: Public payer or provider operating guidance
    location: https://www.cms.gov/priorities/key-initiatives/burden-reduction/administrative-simplification/prior-authorization
    authority_reason: Official CMS prior-authorization guidance is authoritative for payer and provider prior-authorization
      process expectations, response-time context, documentation dependency, and patient access workflow boundaries that can
      gate analytics.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: onc-uscdi
    title: United States Core Data for Interoperability
    publisher: Office of the National Coordinator for Health Information Technology
    source_type: Recognized healthcare workflow or measure guidance
    location: https://www.healthit.gov/isa/united-states-core-data-interoperability-uscdi
    authority_reason: Official ONC interoperability baseline is authoritative for healthcare data classes and terminology
      used to trace patient demographics, encounters, problems, procedures, medications, labs, and other clinical-operational
      evidence in analytics.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ecqi-resource-center
    title: eCQI Resource Center
    publisher: Assistant Secretary for Technology Policy / eCQI Resource Center
    source_type: Recognized healthcare workflow or measure guidance
    location: https://ecqi.healthit.gov/
    authority_reason: Official federal eCQI resource is authoritative for eCQM specifications, QRDA implementation guidance,
      value sets, and standards-based quality-measure evidence handling.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ncqa-hedis
    title: HEDIS Measures and Technical Resources
    publisher: National Committee for Quality Assurance
    source_type: Recognized healthcare workflow or measure guidance
    location: https://www.ncqa.org/hedis/measures/
    authority_reason: NCQA is the steward of HEDIS; its public measure and technical-resource guidance is authoritative for
      plan-quality metric terminology, denominator, exclusion, and reporting workflow expectations used in healthcare analytics.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: cms-care-compare-provider-data
    title: Provider Data Catalog and Care Compare
    publisher: Centers for Medicare & Medicaid Services
    source_type: Public healthcare regulator guidance
    location: https://data.cms.gov/provider-data/
    authority_reason: Official CMS public provider-data platform is authoritative for public-reporting posture, display context,
      dataset lineage, and external disclosure caution when internal metrics are compared with public healthcare performance
      data.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: quality measure definition and public reporting
    retrieval_policy: Use CMS measure inventory, CMS MMS guidance, eCQI resources, NCQA HEDIS, and CMS provider-data sources
      before accepting a numerator, denominator, exclusion, benchmark, or public-facing statement.
    specialty_specific_exceptions:
    - Do not substitute a tenant dashboard label for formal measure logic when the output will be treated as quality, benchmark,
      or public-reporting evidence.
  - category: patient, member, encounter, claim, and payer truth sets
    retrieval_policy: Use tenant systems of record constrained by CMS claims-processing and payer/provider operating guidance
      before deciding whether schedule, encounter, charge, claim, remittance, denial, authorization, or referral records establish
      the metric.
    specialty_specific_exceptions:
    - Do not collapse encounter and claim records into one outcome when adjudication lag, denial status, payer product, or
      authorization dependency changes the answer.
  - category: interoperability and clinical-operational terminology
    retrieval_policy: Use ONC USCDI, eCQI, and HL7 US Core as terminology and standards references for patient, encounter,
      condition, procedure, observation, and quality-evidence lineage.
    specialty_specific_exceptions:
    - Do not use clinical terminology normalization as licensed clinical interpretation.
  - category: privacy, PHI, and disclosure control
    retrieval_policy: Use HHS minimum-necessary guidance and tenant privacy policy before including PHI, low-volume cohorts,
      examples, identifiable member or patient data, or clinician-level disclosure.
    specialty_specific_exceptions:
    - Do not publish or share privacy-sensitive analysis until audience, purpose, minimum-necessary basis, and approval owner
      are confirmed.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the healthcare analytics baseline, but tenant retrieval must provide system locations, source-precedence
      rules, metric dictionaries, payer or plan context, service setting, and approval owners.
    - Record source freshness, cohort logic, denominator rules, patient/member status, service dates, authorization and referral
      dependencies, payer or product context, and disclosure audience in every output.
    - Preserve encounter, claim, charge, remittance, denial, authorization, referral, and quality-measure disagreements explicitly
      instead of silently normalizing them.
    - Escalate whenever tenant policy, payer contract, public guidance, privacy posture, clinical safety, or licensed review
      authority materially changes the answer.
  specialty_specific_exceptions:
  - Healthcare analytics often mixes administrative, financial, clinical-operational, and quality-measure records with different
    lags, owners, and authority levels.
  - Access, utilization, denial, quality, and operational KPIs are only safe when patient/member context, payer, service setting,
    denominator logic, exclusions, source hierarchy, refresh window, and intended audience are explicit.
  - PHI handling, low-volume denominators, public reporting, payer interpretation, medical necessity, diagnosis, treatment
    planning, and clinical safety all require escalation outside this lane.
  next_review_due_at: '2026-08-11'
