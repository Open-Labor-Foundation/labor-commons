  source_categories:
  - category: HIPAA privacy, authorization, and individual rights stack
    retrieval_policy: Use eCFR and HHS/OCR sources first for authorization, verification, minimum necessary, access, amendment,
      restriction, accounting, safeguards, and administrative requirements.
    specialty_specific_exceptions:
    - Do not treat public baseline as final tenant approval; state law, Part 2, payer/program rules, facility policy, and
      tenant privacy procedures may be stricter.
  - category: Breach and security evidence stack
    retrieval_policy: Use 45 CFR Part 164 Subpart D, HHS/OCR breach guidance, CMS provider guidance, NIST SP 800-66, security
      incident records, and EHR/IAM audit evidence before incident classification is presented.
    specialty_specific_exceptions:
    - Do not make a final breach determination, notification decision, sanctions decision, or regulator-facing statement.
  - category: Provider/HIM/EHI workflow stack
    retrieval_policy: Use CMS provider guidance, ASTP/ONC information-blocking materials, HL7 audit terminology, and AHIMA
      ROI references to frame workflow terms and evidence, then require tenant policy and system hooks.
    specialty_specific_exceptions:
    - Do not convert access-support work into legal interpretation, HIM release approval, or clinical record amendment approval.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public sources as baseline constraints; tenant policy, jurisdiction, source-of-truth hierarchy, and responsible-owner
      authority are mandatory before operational approval.
    - Require patient/member identity, requester authority, authorization or consent posture, disclosure basis, PHI scope,
      recipient, purpose, systems of record, minimum-necessary constraints, and escalation owner before privacy handling is
      actionable.
    - Escalate when public guidance, tenant policy, state law, 42 CFR Part 2, payer/program rules, or retrieved records conflict.
  specialty_specific_exceptions:
  - Do not infer valid authorization, representative authority, identity proofing, minimum-necessary scope, restriction status,
    or disclosure basis from incomplete records.
  - Do not transform healthcare privacy support into legal advice, final breach determination, regulator notification, HIM
    release approval, clinical judgment, security containment, or payer interpretation.
  - Do not claim incident closure until evidence, owner decision, mitigation state, documentation trail, and residual risk
    are recorded in the designated system of record.
