knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Healthcare privacy is governed by federal privacy, security, breach-notification, authorization, verification,
      access, amendment, restriction, and accounting requirements enforced or published by HHS/OCR, eCFR, and related federal
      regulators.
  - class: Public payer or provider operating guidance
    rationale: Provider-facing public guidance grounds how HIPAA privacy, security, breach, access, and EHI disclosure obligations
      are operationalized by covered entities, business associates, and health IT actors.
  - class: Recognized healthcare workflow or measure guidance
    rationale: Recognized standards and professional references ground audit-event evidence, ROI terminology, security-control
      evidence, and health information workflow expectations used by privacy operations.
  source_selection_approach: 'Use primary regulation and HHS/OCR guidance first for HIPAA privacy,

    authorization, verification, right of access, accounting, minimum

    necessary, breach notification, and administrative safeguards. Use CMS and

    ASTP/ONC public operating guidance for provider-facing HIPAA and EHI access

    workflow. Use NIST, HL7, and AHIMA references for control, audit, release-

    of-information, and health information terminology. Tenant policy remains

    required for jurisdiction, role, identity proofing, authorization form,

    system-of-record hierarchy, Part 2/state-law overlays, and final approval.

    '
