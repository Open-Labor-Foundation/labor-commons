knowledge_baseline:
  source_classes:
  - class: Public healthcare regulator guidance
    rationale: Medical-record services, HIPAA privacy, right-of-access, amendment, authorization, minimum-necessary, and release
      boundaries are defined by federal healthcare regulations and regulator guidance.
  - class: Public payer or provider operating guidance
    rationale: CMS provider and payer-facing documentation guidance defines documentation sufficiency, signature, attestation,
      record maintenance, and payment-review evidence expectations that constrain coding, billing, and audit support.
  - class: Recognized healthcare workflow or measure guidance
    rationale: HIM and health IT standards explain legal health record, designated record set, document taxonomy, source systems,
      retention matrix, disclosure workflow, and EHR artifact terminology for safe documentation operations.
  source_selection_approach: 'Use eCFR, HHS OCR, and CMS sources first for binding or official federal

    healthcare documentation, privacy, access, amendment, and payment-review

    boundaries. Use AHIMA and ASTP/ONC sources to ground vendor-neutral HIM

    workflow terminology, legal-health-record/designated-record-set practice,

    EHR artifact categories, and source-system traceability. Tenant policy,

    jurisdictional rules, payer contracts, facility policy, legal-hold

    instructions, and record-owner approvals remain mandatory runtime facts.

    '
  authority_sources:
  - source_id: ecfr-42-cfr-482-24-medical-record-services
    title: '42 CFR 482.24 - Condition of participation: Medical record services'
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-42/chapter-IV/subchapter-G/part-482/subpart-C/section-482.24
    authority_reason: Primary federal hospital regulation for medical-record service organization, prompt completion, authentication,
      retention, and medical-record content expectations. It anchors record-completion and deficiency boundaries.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: ecfr-45-cfr-164-508-authorization
    title: 45 CFR 164.508 - Uses and disclosures for which an authorization is required
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-45/subtitle-A/subchapter-C/part-164/subpart-E/section-164.508
    authority_reason: Binding HIPAA authorization rule for uses and disclosures requiring authorization. It constrains ROI
      routing and refusal when release authority is absent or unsupported.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: hhs-ocr-right-of-access
    title: Individuals' Right under HIPAA to Access their Health Information
    publisher: U.S. Department of Health and Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/access/index.html
    authority_reason: HHS OCR is the HIPAA privacy regulator. This guidance defines designated-record-set access, exclusions,
      personal-representative issues, and denial boundaries for record-release workflows.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: hhs-ocr-minimum-necessary
    title: Minimum Necessary Requirement
    publisher: U.S. Department of Health and Human Services, Office for Civil Rights
    source_type: public-healthcare-regulator-guidance
    location: https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/minimum-necessary-requirement/index.html
    authority_reason: HHS OCR guidance constrains PHI handling and limits disclosure scope when documentation work touches
      privacy-sensitive requests or non-treatment uses.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_hhs_revision
    status: active
  - source_id: ecfr-45-cfr-164-526-amendment
    title: 45 CFR 164.526 - Amendment of protected health information
    publisher: Electronic Code of Federal Regulations
    source_type: public-healthcare-regulator-guidance
    location: https://www.ecfr.gov/current/title-45/subtitle-A/subchapter-C/part-164/subpart-E/section-164.526
    authority_reason: Binding HIPAA amendment rule for accepting, denying, appending, linking, and documenting amendment requests.
      It prevents administrative rewriting of clinical content.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_regulatory_revision
    status: active
  - source_id: cms-mln909160-medical-record-documentation
    title: Complying With Medical Record Documentation Requirements
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/outreach-and-education/medicare-learning-network-mln/mlnproducts/downloads/certmedrecdoc-factsheet-icn909160.pdf
    authority_reason: Official CMS MLN guidance for Medicare documentation sufficiency, CERT review, incomplete or illegible
      records, missing forms, missing signatures, orders, and evidence needed for payment review.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cms-signature-requirements
    title: Complying With Medicare Signature Requirements
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/files/document/complying-with-medicare-signature-requirements-educational-tool.pdf
    authority_reason: Official CMS guidance for signatures, attestations, signature logs, and authentication evidence that
      determine whether records can support Medicare review.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: cms-medical-record-maintenance-access
    title: Medical Record Maintenance & Access Requirements
    publisher: Centers for Medicare & Medicaid Services
    source_type: public-payer-or-provider-operating-guidance
    location: https://www.cms.gov/files/document/mln4840534-medical-record-maintenance-access-requirements.pdf
    authority_reason: Official CMS provider guidance for maintaining, retaining, furnishing, and granting access to medical
      records, supporting operational retrieval and audit-readiness expectations.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval_or_cms_revision
    status: active
  - source_id: ahima-legal-health-record-designated-record-set
    title: Fundamentals of the Legal Health Record and Designated Record Set
    publisher: American Health Information Management Association
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://journal.ahima.org/Portals/0/archives/AHIMA%20files/Fundamentals%20of%20the%20Legal%20Health%20Record%20and%20Designated%20Record%20Set.pdf
    authority_reason: AHIMA is the recognized HIM professional body. The practice brief provides vendor-neutral workflow guidance
      for defining legal health records, designated record sets, source systems, retention matrices, disclosure readiness,
      and external-record handling.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_ahima_revision
    status: active
  - source_id: astp-onc-uscdi-v6
    title: United States Core Data for Interoperability Version 6
    publisher: Assistant Secretary for Technology Policy / Office of the National Coordinator for Health IT
    source_type: recognized-healthcare-workflow-or-measure-guidance
    location: https://isp.healthit.gov/sites/default/files/2025-07/USCDI-Version-6-July-2025.pdf
    authority_reason: ASTP/ONC USCDI is the federal interoperability data baseline for health IT. It grounds terminology for
      clinical notes, encounter data, patient demographics, provenance, and document classes used by EHR documentation workflows.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_uscdi_revision
    status: active
  source_categories:
  - category: Public healthcare regulator guidance
    retrieval_policy: Use eCFR and HHS OCR sources first for medical-record service, HIPAA authorization, access, amendment,
      and minimum-necessary boundaries.
    specialty_specific_exceptions:
    - Federal baseline does not replace state law, legal-hold instruction, court order handling, tenant policy, or privacy-officer
      approval.
    - Safety-related denial of access, sensitive record segmentation, and information-blocking exceptions require authorized
      privacy, legal, or licensed clinical review.
  - category: Public payer or provider operating guidance
    retrieval_policy: Use CMS MLN and provider guidance for documentation sufficiency, signature, attestation, maintenance,
      retrieval, and audit-support expectations.
    specialty_specific_exceptions:
    - Do not infer coding, coverage, payment, medical necessity, or claim outcome from administrative completeness.
    - Do not treat CMS examples as complete payer policy for Medicaid, commercial, managed care, or tenant-specific contracts.
  - category: Recognized healthcare workflow or measure guidance
    retrieval_policy: Use AHIMA and ASTP/ONC sources to define legal-health-record and designated-record-set scope, source-system
      mapping, EHR artifact terminology, retention matrix needs, and disclosure-ready packet structure.
    specialty_specific_exceptions:
    - Legal health record, designated record set, and source precedence must be explicitly defined by the tenant before final
      packet certification.
    - Recognized practice guidance supports workflow design but does not grant legal, clinical, privacy, or payer interpretation
      authority.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public sources as the non-tenant baseline; tenant policy and source-of-truth hierarchy are mandatory before operational
      routing or release readiness.
    - Require jurisdiction, care setting, patient/member status, requester authority, record location, service dates, payer
      or plan, authorization or referral dependencies, consent posture, retention policy, and access constraints before finalizing
      outputs.
    - Escalate when clinical content, PHI disclosure, legal hold, payer interpretation, coding, billing, patient-safety risk,
      or licensed review changes the answer.
  specialty_specific_exceptions:
  - Do not mark a record complete when required notes, consents, attestations, signatures, addenda, amendment links, deficiency
    dispositions, or external attachments are missing.
  - Do not convert documentation integrity work into clinical documentation improvement authorship, clinician attestation,
    coding signoff, billing approval, release approval, or legal sufficiency authority.
  - Do not release or package PHI when authorization, legal basis, minimum-necessary support, requester authority, personal
    representative authority, or access constraint is unresolved.
  source_baseline_version: '2026-04-07'
  next_review_due_at: '2026-08-11'
