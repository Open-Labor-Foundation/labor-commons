    publisher: Electronic Code of Federal Regulations
    source_type: regulatory-standard
    location: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-B/part-117
    authority_reason: 21 CFR Part 117 is the primary public regulatory baseline for cGMP, warehousing, distribution, records,
      corrective actions, and supply-chain program requirements that bound CPG brand execution work.
    last_reviewed_at: '2026-04-09'
