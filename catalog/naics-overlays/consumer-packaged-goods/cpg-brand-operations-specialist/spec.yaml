    authority_reason: FDA's preventive-controls rule page is an authoritative public baseline for facilities that manufacture,
      process, pack, or hold food and it defines monitoring, corrective-action, supply-chain, and recall-plan expectations
      that brand operations must respect.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
