    authority_reason: APQC's public SCOR overview is a recognized supply-chain planning and source-make-deliver vocabulary
      reference for balancing demand and supply without drifting into execution authority.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
