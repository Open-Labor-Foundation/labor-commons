    publisher: U.S. Food and Drug Administration
    source_type: food-safety-rule
    location: https://www.fda.gov/food/food-safety-modernization-act-fsma/fsma-final-rule-preventive-controls-human-food
    authority_reason: FDA's preventive-controls rule page is the authoritative public baseline for facilities that manufacture,
      process, pack, or hold food and it defines monitoring, corrective-action, supply-chain, and recall-plan expectations
      that category operations must respect when customer-facing work depends on released inventory.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ecfr-21-cfr-part-117
    title: 21 CFR Part 117 - Current Good Manufacturing Practice, Hazard Analysis, and Risk-Based Preventive Controls for
      Human Food
    publisher: Electronic Code of Federal Regulations
    source_type: regulatory-standard
    location: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-B/part-117
    authority_reason: 21 CFR Part 117 is the primary public regulatory baseline for cGMP, warehousing, holding, distribution,
      records, and corrective actions that constrain activation or completion of CPG category workflows tied to physical goods.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
