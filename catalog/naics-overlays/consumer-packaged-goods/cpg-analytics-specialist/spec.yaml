    source_type: official-guidance
    location: https://www.fda.gov/regulatory-information/search-fda-guidance-documents/guidance-industry-food-labeling-guide
    authority_reason: FDA's Food Labeling Guide is the public guidance baseline for food-label requirements and helps define
      where analytics ends and formal labeling or claims review begins.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-global-traceability-standard
    title: GS1 Global Traceability Standard
    publisher: GS1
    source_type: recognized-standard
    location: https://www.gs1.org/standards/gs1-global-traceability-standard/current-standard
    authority_reason: GS1 is the recognized public standards body for cross-enterprise identifier and traceability exchange
      standards used by CPG manufacturers, distributors, and retailers.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-general-specifications
    title: GS1 General Specifications Standard
    publisher: GS1
    source_type: recognized-standard
    location: https://www.gs1.org/standards/barcodes-epcrfid-id-keys/gs1-general-specifications
    authority_reason: GS1 General Specifications are the core public standards reference for how identification keys and barcodes
      are applied across consumer, case, and higher packaging levels used in CPG analytics.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-logistic-label-guideline
    title: GS1 Logistic Label Guideline
    publisher: GS1
    source_type: recognized-guideline
    location: https://www.gs1.org/docs/tl/GS1_Logistic_Label_Guideline.pdf
    authority_reason: The GS1 Logistic Label Guideline is the recognized public operating reference for SSCC-based pallet
      and logistic-unit labeling, staging, and shipment matching that constrains lot-aware inventory and logistics metrics.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: sec-kpi-guidance
