    publisher: U.S. Securities and Exchange Commission
    source_type: official-disclosure-guidance
    location: https://www.sec.gov/rules/final/2020/33-10890.pdf
    authority_reason: SEC MD&A guidance is the authoritative public baseline for how key performance indicators and operational
      metrics should be defined, contextualized, and caveated when used in public-company style disclosure.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: manufacturing, quality, and release controls
    retrieval_policy: Use FDA preventive-controls and 21 CFR Part 117 sources before accepting production, hold, release,
      supplier-program, or corrective-action context as analytically safe.
    specialty_specific_exceptions:
    - Do not report held or quarantined product as available, shipped, or released without explicit tenant-approved logic.
  - category: traceability and inventory semantics
    retrieval_policy: Use GS1 traceability, barcode, and logistics-label standards before reconciling lot, case, pallet, and
      shipment metrics across systems.
    specialty_specific_exceptions:
    - Do not collapse cross-system lot conflicts into a single metric without preserving source lineage and conflict status.
  - category: metric and disclosure discipline
    retrieval_policy: Use SEC KPI guidance and tenant reporting policy before presenting trends, benchmarks, or externally
      consumable disclosures.
    specialty_specific_exceptions:
    - Do not upgrade descriptive operational analysis into causal, investor-facing, or customer-facing disclosure without
      explicit approval context.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-07'
