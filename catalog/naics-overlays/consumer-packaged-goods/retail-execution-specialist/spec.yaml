  source_categories:
  - category: food-traceability-and-recall-baseline
    retrieval_policy: Prefer FDA regulations and FDA guidance when the request touches food traceability, recall, hold, or
      release boundaries.
    specialty_specific_exceptions:
    - Do not convert FDA recall or traceability guidance into independent recall-classification or final release authority
      for the lane.
  - category: cpg-item-identity-and-data-synchronisation
    retrieval_policy: Use GS1 standards for GTIN, GLN, pack hierarchy, product master data, and trading-partner synchronisation
      expectations.
    specialty_specific_exceptions:
    - Escalate when a retailer or tenant imposes stricter item, pricing, or data-publication rules than the public GS1 baseline.
  - category: traceability-and-inventory-evidence-handling
    retrieval_policy: Use GS1 traceability standards and FDA recordkeeping requirements to define evidence sufficiency, not
      to resolve missing tenant records by inference.
    specialty_specific_exceptions:
    - Treat missing lot, shipment, or store-receipt evidence as a blocker rather than guessing based on partial system data.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the FDA and GS1 baseline above as the public source set for CPG retail execution handling.
    - Inject retailer-specific routing guides, customer scorecards, franchise policies, approved-item lists, pricing rules,
      and tenant recall or quality SOPs only through orchestrator-controlled retrieval.
    - Escalate when category-specific rules for cosmetics, OTC drugs, alcohol, chemicals, or retailer contracts materially
      narrow the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on execution-state, evidence, and escalation work rather than supplier approval, commercial negotiation,
    or final quality disposition.
  - Do not treat synchronized product master data as proof that inventory, quality release, or store execution is complete.
  - Do not infer compliance timing from older Food Traceability Rule dates; the current FDA public posture reviewed on 2026-04-09
    includes the March 20, 2025 FDA notice that it intended to extend the compliance date by 30 months.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-07-08'
