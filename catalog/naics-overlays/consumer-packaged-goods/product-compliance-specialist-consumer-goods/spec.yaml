  source_categories:
  - category: cpg-manufacturing-and-preventive-controls
    retrieval_policy: Use FDA CGMP and preventive-controls sources first for baseline process, record, corrective-action,
      and release-control expectations in packaged food operations.
    specialty_specific_exceptions:
    - Escalate when product-category-specific regimes such as dietary supplements, cosmetics, OTC drugs, or customer standards
      materially narrow the public baseline.
  - category: supplier-verification-and-traceability
    retrieval_policy: Use FDA supplier-program and food-traceability materials plus GS1 terminology to define supplier, lot,
      and inventory evidence expectations.
    specialty_specific_exceptions:
    - Do not convert supplier verification review into final supplier approval authority.
  - category: recall-and-release-boundaries
    retrieval_policy: Use FDA and CPSC recall references to define recall-readiness, hold, escalation, and public-notification
      boundaries.
    specialty_specific_exceptions:
    - Do not promise regulator-facing closure or market release from public guidance alone.
  authority_sources_review_notes:
  - Prioritize primary FDA rules and FDA guidance over secondary explainers.
  - Use GS1 to normalize terminology and traceability data handling, not to replace regulator-defined obligations.
  - Treat CPSC recall guidance as the non-food consumer-goods boundary reference, not as a substitute for FDA food controls.
