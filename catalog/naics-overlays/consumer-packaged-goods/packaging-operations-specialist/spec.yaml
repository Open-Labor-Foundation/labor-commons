    authority_reason: FDA's traceability-rule page is the authoritative public baseline for Critical Tracking Events and Key
      Data Elements that constrain lot-aware packaging, palletization, and downstream traceability handling for covered foods.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
