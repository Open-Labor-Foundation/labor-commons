knowledge_baseline:
  source_baseline_version: '2026-04-10'
  authority_sources:
  - source_id: 4as-code-of-conduct
    title: Code of Conduct
    publisher: American Association of Advertising Agencies (4A's)
    source_type: quality-review-or-confidentiality-handling-reference
    location: https://www.aaaa.org/about/code-of-conduct/
    authority_reason: 4A's is the U.S. advertising agency trade association; its public code defines agency conduct, confidentiality,
      proprietary-information handling, and high ethical standards that directly constrain agency operations outputs and disclosures.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: 4as-agency-search-agreements
    title: 'Best Practice Guidance: Agency Search Agreements (AKA New Business NDA''s)'
    publisher: American Association of Advertising Agencies (4A's)
    source_type: client-delivery-documentation-or-engagement-workflow-guidance
    location: https://www.aaaa.org/wp-content/uploads/2025/02/Best-Practice-Guidance-Agency-Search-Agreements_PP14_021318-FINAL-1.pdf
    authority_reason: 4A's guidance is directly aimed at agency-client search and NDA workflows and identifies confidentiality,
      third-party access, agency confidential information, and search best-practice constraints relevant to pitch and new-business
      operations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: 4as-ownership-agency-ideas
    title: '4A''s Best Practice Guidance: Ownership of Agency Ideas, Plans and Work Developed During the New Business Process'
    publisher: American Association of Advertising Agencies (4A's)
    source_type: quality-review-or-confidentiality-handling-reference
    location: https://www.aaaa.org/wp-content/uploads/2025/02/Best-Practice-Guidance-Ownership-of-Ideas_PP13_021318-FINAL-1.pdf
    authority_reason: The 4A's position paper is an agency-client public operating reference for pitch ideas, plans, work
      product, ownership, and usage rights, and it cites ANA/4A's agency search guidance, making it directly relevant to refusing
      unauthorized reuse, showcase, or transfer of agency work product.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: iab-4as-standard-terms-v3
    title: Standard Terms and Conditions for Internet Advertising for Media Buys One Year or Less, Version 3.0
    publisher: Interactive Advertising Bureau / 4A's
    source_type: client-delivery-documentation-or-engagement-workflow-guidance
    location: https://www.iab.com/wp-content/uploads/2015/06/IAB_4As-tsandcs-FINAL.pdf
    authority_reason: IAB and 4A's standard terms are widely used public contract workflow guidance for digital media buys
      and directly define insertion orders, ad materials, placement delivery, late creative, makegoods, billing, data use,
      and approval boundaries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: aicp-digital-national-guidelines
    title: AICP Digital National Guidelines
    publisher: Association of Independent Commercial Producers
    source_type: professional-standards-or-recognized-public-framework
    location: https://aicp.com/assets/editor/AICP_Digital_National_Guidelines_Digital_June2017.pdf
    authority_reason: AICP is a recognized production-industry body; its digital guidelines define SOW deliverables, schedules,
      client asset delivery, review and approval dates, authorized representatives, revisions, change orders, portfolio rights,
      and production grievance evidence.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-advertising-and-marketing-internet
    title: 'Advertising and Marketing on the Internet: Rules of the Road'
    publisher: Federal Trade Commission
    source_type: quality-review-or-confidentiality-handling-reference
    location: https://www.ftc.gov/system/files/documents/plain-language/bus28-advertising-and-marketing-internet-rules-road2018.pdf
    authority_reason: The FTC is the primary U.S. consumer-protection regulator for deceptive advertising; its public guidance
      constrains agency operations when claims, disclosures, endorsements, warranties, or regulated marketing content require
      legal or policy review.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: nai-self-regulatory-framework-2025
    title: Network Advertising Initiative Principles and Self-Regulatory Framework
    publisher: Network Advertising Initiative
    source_type: quality-review-or-confidentiality-handling-reference
    location: https://www.thenai.org/wp-content/uploads/2025/03/NAI-Framework_March-2025.pdf
    authority_reason: NAI is a recognized advertising self-regulatory body for network advertising; its framework defines
      privacy, choice, sensitive data, accountability, and data-governance expectations for ad delivery and measurement workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: Agency-client engagement, confidentiality, and pitch workflow
    retrieval_policy: Use 4A's conduct, agency-search, and ownership guidance first when work touches client confidentiality,
      pitch materials, third-party access, agency work product, portfolio use, or new-business evidence.
    specialty_specific_exceptions:
    - Operational tracking does not create authority to disclose, reuse, or transfer agency ideas, client files, pitch work,
      or confidential materials.
    - If NDA terms, engagement scope, tenant policy, and client instructions conflict, preserve the conflict and escalate.
  - category: Media-buy and campaign delivery workflow
    retrieval_policy: Use IAB/4A's terms and tenant SOW or IO rules first when work touches insertion orders, media plans,
      ad materials, placement delivery, discrepancies, billing, cancellation, makegoods, or data use.
    specialty_specific_exceptions:
    - Operational delivery tracking does not authorize makegoods, credits, budget changes, or contractual exceptions.
    - If SOW, IO, client instruction, publisher rule, or tenant policy conflicts, hold the workflow and escalate.
  - category: Production, review, revisions, and change handling
    retrieval_policy: Use AICP digital production guidelines and tenant production policies first when work touches SOW deliverables,
      schedules, asset delivery, review or approval dates, revisions, change orders, portfolio rights, or production partner
      exceptions.
    specialty_specific_exceptions:
    - The lane can package a change request or revision history but cannot approve a change order or production commitment
      without authority.
    - Missing authorized representative, approval date, or revision-period evidence blocks delivery or completion.
  - category: Regulated content, audience data, and professional boundaries
    retrieval_policy: Use FTC and NAI sources when requests touch claims, endorsements, disclosures, regulated content, audience
      data, sensitive data, consumer choice, privacy posture, or data-use accountability.
    specialty_specific_exceptions:
    - The lane can flag evidence gaps and route review, but cannot provide legal, privacy, or editorial interpretation.
    - Audience-data, regulated-content, or consumer-choice questions require legal, privacy, editorial, or policy-owner review
      when tenant facts are incomplete.
  next_review_due_at: '2026-08-08'
