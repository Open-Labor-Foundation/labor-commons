  source_categories:
  - category: Advertising claims, disclosures, endorsements, reviews, and email
    retrieval_policy: Use FTC and eCFR sources first when work touches claims, substantiation packets, digital disclosures,
      endorsements, testimonials, reviews, native advertising labels, commercial email, unsubscribe evidence, children's issues,
      or consumer-facing compliance gates.
    specialty_specific_exceptions:
    - Evidence packaging does not create authority to decide legal sufficiency, approve copy, approve disclosures, or negotiate
      regulator posture.
    - If source applicability, jurisdiction, product category, or campaign channel materially changes the answer, hold the
      control and escalate.
  - category: Agency-client workflow, IOs, delivery, and confidentiality
    retrieval_policy: Use IAB/4A's terms and 4A's professional guidance when work touches SOW or IO scope, campaign materials,
      client files, data use, review evidence, delivery commitments, confidentiality, pitch work, or client approval boundaries.
    specialty_specific_exceptions:
    - Compliance support cannot approve client commitments, makegoods, credits, change orders, contractual exceptions, or
      final acceptance.
    - Confidential materials, substantiation files, client data, audience data, and unreleased creative must remain inside
      approved engagement, recipient, channel, and tenant-security rules.
  - category: Audience data, behavioral advertising, and platform-policy controls
    retrieval_policy: Use NAI and tenant privacy or platform-policy sources when requests touch interest-based advertising,
      sensitive data, consumer choice, audience segments, retargeting, measurement, consent signals, or accountability.
    specialty_specific_exceptions:
    - The lane can flag audience-data and consent evidence gaps, but it cannot provide privacy-law interpretation or approve
      targeting posture.
    - Platform rules, tenant policy, and client commitments that conflict with public baselines require escalation rather
      than informal synthesis.
  next_review_due_at: '2026-08-08'
