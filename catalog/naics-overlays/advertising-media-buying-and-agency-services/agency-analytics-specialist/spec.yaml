knowledge_baseline:
  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: FTC advertising guidance, MRC measurement standards, IAB Tech Lab specifications, DAA principles, and NAI code
      references define the public baseline for advertising claims, media measurement, ad-tech terminology, disclosure discipline,
      and audience data handling.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: 4A's agency workflow and review references plus MRC and IAB measurement frameworks anchor agency-client scope,
      work product, media measurement artifacts, campaign delivery records, and review-ready reporting expectations.
  - class: Quality-review or confidentiality handling references
    rationale: FTC disclosure and substantiation guidance, MRC source-quality standards, DAA principles, NAI code references,
      and 4A's agency work-product guidance constrain review posture, confidentiality, client approval, and refusal triggers.
  source_selection_approach: 'Use FTC sources first for advertising claims, substantiation, and

    disclosure-safe reporting. Use MRC standards first for measured media

    metrics, viewability, audience measurement, invalid traffic, and source

    quality caveats. Use IAB Tech Lab specifications to normalize ad-tech

    terminology and supply-chain evidence without treating any vendor platform

    as authoritative by default. Use 4A''s references to frame agency-client

    scope, agency work product, participation agreements, and client-delivery

    boundaries. Use DAA and NAI references when audience data, cross-site

    advertising data, de-identification, opt-out, or sensitive segment handling

    affects reporting. Require tenant-specific overlays for client commitments,

    campaign objectives, metric dictionaries, approval paths, source

    precedence, confidentiality restrictions, privacy obligations, reporting

    cadence, and publication rules.

    '
  authority_sources:
  - source_id: ftc-advertising-marketing-basics
    title: Advertising and Marketing
    publisher: Federal Trade Commission
    source_type: official-regulatory-guidance
    location: https://www.ftc.gov/business-guidance/advertising-marketing
    authority_reason: The FTC is the primary U.S. consumer-protection regulator for advertising practices; its official business
      guidance anchors truthful advertising, claim support, endorsement, disclosure, and consumer-protection boundaries for
      agency analytics outputs.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-dot-com-disclosures
    title: '.com Disclosures: How to Make Effective Disclosures in Digital Advertising'
    publisher: Federal Trade Commission
    source_type: official-disclosure-guidance
    location: https://www.ftc.gov/system/files/documents/plain-language/bus41-dot-com-disclosures-information-about-online-advertising.pdf
    authority_reason: This official FTC guidance defines digital advertising disclosure expectations, making it authoritative
      for refusing or caveating unsupported client-facing metric narratives, advertising claims, and disclosure-sensitive
      reports.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-advertising-substantiation
    title: FTC Policy Statement Regarding Advertising Substantiation
    publisher: Federal Trade Commission
    source_type: official-policy-statement
    location: https://www.ftc.gov/legal-library/browse/ftc-policy-statement-regarding-advertising-substantiation
    authority_reason: The FTC policy statement is an official source for the principle that objective advertising claims require
      a reasonable basis; it constrains the analytics lane from turning performance data into unsupported claim-substantiation
      or causal assertions.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: mrc-standards
    title: MRC Standards
    publisher: Media Rating Council
    source_type: recognized-measurement-standards
    location: https://mediaratingcouncil.org/standards
    authority_reason: MRC is the recognized U.S. media measurement audit and accreditation body; its standards define measurement
      quality expectations for digital, audience, viewability, and invalid-traffic metrics used in agency reporting.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: mrc-digital-accreditation
    title: Digital Accreditation
    publisher: Media Rating Council
    source_type: recognized-measurement-operating-reference
    location: https://mediaratingcouncil.org/accreditation/digital
    authority_reason: MRC digital accreditation references are authoritative for determining whether platform, ad server,
      verification, or measurement vendor metrics can be treated as accredited, unaccredited, caveated, or requiring source-quality
      escalation.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: iab-tech-lab-openrtb
    title: OpenRTB
    publisher: IAB Tech Lab
    source_type: recognized-ad-tech-specification
    location: https://iabtechlab.com/standards/openrtb/
    authority_reason: IAB Tech Lab is the recognized technical standards body for digital advertising infrastructure; OpenRTB
      provides vendor-neutral terminology for bidstream, auction, inventory, placement, and supply-chain fields that shape
      source interpretation.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: iab-tech-lab-ads-txt
    title: Ads.txt / App-ads.txt
    publisher: IAB Tech Lab
    source_type: recognized-ad-tech-specification
    location: https://iabtechlab.com/standards/ads-txt/
    authority_reason: IAB Tech Lab ads.txt and app-ads.txt specifications provide public supply-chain evidence expectations
      for authorized digital sellers and inform fraud, inventory-quality, and source-lineage caveats in media analytics.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: 4as-agency-prospect-assessment
    title: 4A's Agency Prospect Assessment Guidance
    publisher: American Association of Advertising Agencies
    source_type: agency-client-workflow-guidance
    location: https://www.aaaa.org/resource/4as-agency-prospect-assessment-guidance/
    authority_reason: 4A's is a recognized U.S. advertising agency trade association; this guidance supports agency-client
      workflow framing around goals, success measures, decision authority, resources, and client fit before analytics outputs
      are treated as client commitments.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: 4as-agency-review-participation-agreement
    title: 4A's Agency Review Participation Agreement
    publisher: American Association of Advertising Agencies
    source_type: agency-client-workflow-guidance
    location: https://www.aaaa.org/resource/4as-agency-review-participation-agreement/
    authority_reason: The 4A's agreement is a public agency workflow reference for participation terms, ownership, confidentiality,
      and work-product expectations that constrain delivery, disclosure, and handoff behavior in agency analytics.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: daa-self-regulatory-principles
    title: DAA Self-Regulatory Principles
    publisher: Digital Advertising Alliance
    source_type: recognized-privacy-framework
    location: https://digitaladvertisingalliance.org/principles
    authority_reason: DAA principles are a recognized industry self-regulatory framework for interest-based and cross-app
      advertising data practices and constrain reporting that uses audience segments, behavioral data, opt-out status, or
      cross-context signals.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nai-code-of-conduct
    title: NAI Code of Conduct
    publisher: Network Advertising Initiative
    source_type: recognized-privacy-framework
    location: https://thenai.org/accountability/code-of-conduct/
    authority_reason: NAI is a recognized self-regulatory organization for third-party digital advertising companies; its
      code supports audience-data, sensitive-data, transparency, and opt-out boundaries for advertising analytics outputs.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: advertising claims and disclosure discipline
    retrieval_policy: Use FTC advertising, disclosure, and substantiation sources before turning analytics into client-facing
      advertising claims, performance guarantees, causal claims, or disclosure-ready statements.
    specialty_specific_exceptions:
    - Do not state that campaign performance proves a product claim, substantiates an ad claim, satisfies disclosure obligations,
      or caused business outcomes without legal, editorial, compliance, and methodology approval.
  - category: media measurement and source quality
    retrieval_policy: Use MRC standards and accreditation posture before treating impressions, viewability, reach, frequency,
      invalid traffic, audience quality, or verification metrics as comparable, publishable, or benchmark-safe.
    specialty_specific_exceptions:
    - Do not collapse ad server, platform, DSP, verification, attribution, or BI disagreements into one metric unless tenant
      source precedence and reconciliation ownership are documented.
  - category: ad-tech terminology and supply-chain evidence
    retrieval_policy: Use IAB Tech Lab specifications to normalize bidstream, seller, placement, inventory, app, ads.txt,
      app-ads.txt, and supply-chain terms without treating raw platform fields as complete evidence.
    specialty_specific_exceptions:
    - Do not claim authorized inventory, fraud resolution, or supply-chain safety when seller files, verification reports,
      and tenant media-buying records conflict or are missing.
  - category: agency-client workflow and work-product boundaries
    retrieval_policy: Use 4A's references plus tenant statements of work, approvals, client commitments, and review matrices
      before treating analytics outputs as client commitments or release-ready deliverables.
    specialty_specific_exceptions:
    - Do not approve client-facing narratives, makegoods, contractual positions, spend changes, or agency work-product reuse
      without explicit account, delivery, legal, or client approval.
  - category: audience data privacy and confidentiality
    retrieval_policy: Use DAA, NAI, FTC, tenant privacy policy, and client contract constraints before including audience
      segment, behavioral, cross-context, personal, sensitive, or restricted platform data in reports.
    specialty_specific_exceptions:
    - Do not expose confidential client strategy, campaign data, audience segment data, personal data, or cross-client benchmarks
      without authorization and approved de-identification rules.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-08'
