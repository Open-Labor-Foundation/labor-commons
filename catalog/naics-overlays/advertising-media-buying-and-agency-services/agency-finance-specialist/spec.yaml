  source_categories:
  - category: media buy, IO, PO, invoice, and proof-of-performance workflow
    retrieval_policy: Use IAB/4A's standard terms and IAB invoice specifications before drafting media invoice, posting, discrepancy,
      or document-support claims.
    specialty_specific_exceptions:
    - Do not treat an ad-server number, screenshot, or vendor statement as sufficient billing support unless the governing
      IO, PO, tenant rule, and proof-of-performance requirements are present.
    - Escalate delivery shortfalls, makegoods, invalid traffic, or measurement discrepancies instead of correcting invoices
      without authority.
  - category: agency-client media buying agreement administration
    retrieval_policy: Use 4A's guidance and tenant contracts to identify agent or principal status, sequential liability,
      rebate and incentive handling, non-transparent services, unbilled costs, data ownership, conflicts, and payment terms.
    specialty_specific_exceptions:
    - Do not allocate rebates, incentives, discounts, or vendor credits without contract-specific support and approver authority.
    - Escalate when U.S. and non-U.S. market practice, local law, or client contract terms materially change the answer.
  - category: advertising compliance, quality, measurement, and confidentiality
    retrieval_policy: Use FTC, MRC, IAB/4A's confidentiality, and tenant review rules when creative claims, disclosures, invalid
      traffic, data usage, or confidential campaign information affect billing or delivery.
    specialty_specific_exceptions:
    - Do not represent creative, claims, disclosures, client rights, or measurement validity as approved unless the correct
      editorial, legal, media, quality, or client owner has approved.
  - category: formal accounting, revenue recognition, tax, and advisory boundaries
    retrieval_policy: Use FASB and AICPA references to detect when accounting, revenue-recognition, tax, advisory, or management-judgment
      authority is required, then route with evidence.
    specialty_specific_exceptions:
    - The lane may prepare a source-backed package but must not determine GAAP revenue treatment, gross-versus-net presentation,
      taxability, write-off approval, or final accounting entries.
  next_review_due_at: '2026-08-08'
