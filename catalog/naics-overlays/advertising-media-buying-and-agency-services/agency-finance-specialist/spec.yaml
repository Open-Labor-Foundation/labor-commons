- delivery-management-specialist
- account-specialist
- media-operations-specialist
- formal-accounting-specialist
- tax-specialist
- client-approver
knowledge_baseline:
  source_baseline_version: '2026-04-10'
  naics_context:
  - 541810 Advertising Agencies
  - 541830 Media Buying Agencies
  - 541840 Media Representatives
  - 541850 Outdoor Advertising
  - 541860 Direct Mail Advertising
  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: FASB revenue-recognition updates, AICPA consulting standards, FTC advertising guidance, MRC measurement guidance,
      and IAB frameworks define public professional, financial, advertising, and measurement baselines that constrain agency-finance
      outputs.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: IAB/4A's media-buy terms, IAB invoice specifications, and 4A's media buying agreement guidance define IO, PO,
      invoice, proof-of-performance, rebate, payment, and delivery records that govern agency finance workflow.
  - class: Quality-review or confidentiality handling references
    rationale: IAB/4A's confidentiality/data provisions, FTC claim-substantiation expectations, MRC invalid-traffic and measurement
      guidance, and professional standards define review, privacy, and escalation conditions that limit autonomous billing
      behavior.
  source_selection_approach: 'Use advertising-specific operating references first for media buy, invoice,

    delivery, proof, discrepancy, rebate, and confidentiality questions. Use

    FTC and MRC references to identify when creative claims, invalid traffic,

    measurement quality, or disclosure issues change the risk posture. Use FASB

    and AICPA references only as boundary sources for formal accounting,

    revenue-recognition, consulting, confidentiality, and management-judgment

    limits; this lane packages evidence and escalates rather than issuing

    accounting, tax, legal, editorial, or attestation conclusions.

    '
