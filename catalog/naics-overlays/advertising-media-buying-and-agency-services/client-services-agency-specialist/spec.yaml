knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: FTC advertising rules and guidance, PRSA ethical standards, and ISO complaint-handling standards define the
      public professional baseline for accuracy, substantiation, disclosure, confidentiality, and complaint handling.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: IAB, 4A's, and ANA agency-client workflow references define insertion orders, client scope, agency engagement,
      delivery commitments, change handling, and approval-sensitive client-service artifacts.
  - class: Quality-review or confidentiality handling references
    rationale: PRSA confidentiality obligations, ISO complaints handling, FTC disclosure guidance, and IAB/4A's delivery terms
      constrain what can be said, shared, closed, or escalated in client-facing agency work.
  source_selection_approach: 'Use public agency and advertising sources first for the baseline:

    IAB and 4A''s terms for IO, ad materials, makegood, billing, data-use, and

    client commitment workflow; ANA and 4A''s relationship guidance for scope,

    procurement, and agency-client operating discipline; FTC sources for claims,

    endorsements, disclosures, and substantiation boundaries; PRSA standards for

    accuracy, disclosure, conflicts, and safeguarding confidences; and ISO

    10002 for complaint handling. Tenant MSA, SOW, approval matrix, client

    commitments, systems of record, and jurisdiction-specific policy remain

    required before case-specific resolution.

    '
  authority_sources:
