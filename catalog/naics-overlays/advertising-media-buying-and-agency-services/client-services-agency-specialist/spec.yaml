    authority_reason: ISO 10002 is the recognized international standard for complaints handling in organizations and is authoritative
      for complaint intake, acknowledgement, investigation, response, escalation, and records discipline in service workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: Agency-client engagement, scope, and delivery workflow
    retrieval_policy: Use IAB general terms, IAB/4A's standard terms, 4A's agency relationship guidance, ANA agency compensation
      guidance, tenant MSA, SOW, IO, project plan, and approval matrix first when the request touches scope, delivery, change,
      makegood, billing, or client commitment handling.
    specialty_specific_exceptions:
    - Client-service status communication does not create authority to approve scope expansions, change orders, makegoods,
      credits, refunds, or contractual exceptions.
    - When client instructions, tenant policy, SOW, IO, platform policy, or publisher policy conflict, preserve the conflict
      and escalate.
  - category: Advertising claims, disclosures, endorsements, and regulated content
    retrieval_policy: Use FTC sources first when the request touches claims, substantiation, endorsements, disclosures, reviews,
      testimonials, warranties, email, children, regulated categories, or consumer-facing content.
    specialty_specific_exceptions:
    - The lane can package facts and route review but cannot provide legal, editorial, privacy, or claim-substantiation approval.
    - Do not tell a client that a claim, disclosure, endorsement, or creative asset is compliant unless the authorized owner
      has approved it.
  - category: Client confidentiality, complaint handling, and quality review
    retrieval_policy: Use PRSA, ISO 10002, tenant confidentiality rules, approval records, and quality-review policies before
      communicating, closing, or escalating complaints, repeat failures, sensitive client records, or approval conflicts.
    specialty_specific_exceptions:
    - Do not disclose client files, agency work product, unreleased content, pricing, campaign performance, or audience data
      to unapproved recipients or channels.
    - Complaint resolution must preserve evidence, owner routing, and service recovery limits instead of substituting informal
      promises.
  next_review_due_at: '2026-08-08'
