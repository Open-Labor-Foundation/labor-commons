    location: https://www.iab.com/guidelines/iab-general-terms-for-digital-advertising-agreements/
    authority_reason: IAB is the leading U.S. digital advertising trade association, and its general terms provide public
      industry contract workflow language for digital advertising agreements, order-specific terms, delivery, data, measurement,
      and dispute-sensitive client commitments.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
