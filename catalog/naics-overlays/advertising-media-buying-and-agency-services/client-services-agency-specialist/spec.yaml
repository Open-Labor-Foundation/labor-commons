    location: https://www.iab.com/wp-content/uploads/2015/06/IAB_4As-tsandcs-FINAL.pdf
    authority_reason: The IAB/4A's standard terms are widely used public agency-client-publisher workflow guidance for insertion
      orders, ad materials, placement delivery, late creative, makegoods, billing, cancellation, and data-use boundaries.
    last_reviewed_at: '2026-04-10'
