knowledge_baseline:
  source_baseline_version: '2026-04-10'
  authority_sources:
  - source_id: iab-4as-standard-terms-v3
    title: Standard Terms and Conditions for Internet Advertising for Media Buys One Year or Less, Version 3.0
    publisher: Interactive Advertising Bureau / 4A's
    source_type: Client-delivery, documentation, or engagement workflow guidance
    location: https://www.iab.com/wp-content/uploads/2015/06/IAB_4As-tsandcs-FINAL.pdf
    authority_reason: IAB and 4A's standard terms are widely used public workflow and contract guidance for digital media
      buys and directly define insertion orders, ad materials, placement delivery, late creative, third-party serving, measurement,
      discrepancies, makegoods, billing, cancellation, and data-use boundaries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: iab-tech-lab-acif-v1
    title: Ad Creative ID Framework Version 1.0
    publisher: IAB Technology Laboratory
    source_type: Professional standards or recognized public frameworks
    location: https://iabtechlab.com/wp-content/uploads/2025/03/ACIF-v1_final.pdf
    authority_reason: IAB Tech Lab ACIF directly addresses ad creative identifiers used throughout the life of video and CTV
      campaigns, making it authoritative for creative-ID validation, UniversalAdID handling, registry references, and creative
      traceability in trafficking workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: iab-tech-lab-openrtb-26
    title: OpenRTB API Specification Version 2.6
    publisher: IAB Technology Laboratory
    source_type: Professional standards or recognized public frameworks
    location: https://iabtechlab.com/standards/openrtb/
    authority_reason: IAB Tech Lab maintains OpenRTB as a foundational programmatic advertising protocol for bid requests,
      impressions, media objects, creative attributes, and marketplace terminology used in campaign trafficking.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: iab-tech-lab-vast-43
    title: Video Ad Serving Template (VAST) 4.3
    publisher: IAB Technology Laboratory
    source_type: Professional standards or recognized public frameworks
    location: https://iabtechlab.com/wp-content/uploads/2022/09/VAST_4.3.pdf
    authority_reason: IAB Tech Lab VAST is the public industry specification for video ad serving responses, wrappers, media
      files, tracking events, verification resources, and video ad delivery artifacts.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: iab-tech-lab-ads-txt
    title: 'Authorized Digital Sellers: ads.txt / app-ads.txt'
    publisher: IAB Technology Laboratory
    source_type: Quality-review or confidentiality handling references
    location: https://iabtechlab.com/ads-txt/
    authority_reason: IAB Tech Lab ads.txt and app-ads.txt are public anti-fraud supply-chain standards that campaign trafficking
      can use to identify authorized sellers and route seller-ID or inventory-legitimacy conflicts.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: mrc-invalid-traffic-guidelines
    title: Invalid Traffic Detection and Filtration Guidelines
    publisher: Media Rating Council
    source_type: Quality-review or confidentiality handling references
    location: https://mediaratingcouncil.org/standards/invalid-traffic-detection-and-filtration-guidelines
    authority_reason: MRC is the recognized U.S. body for advertising measurement standards and accreditation; its IVT guidance
      supports evidence handling and escalation when traffic quality, measurement, or client-impact questions affect campaign
      delivery.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-advertising-marketing-basics
    title: Advertising and Marketing Basics
    publisher: Federal Trade Commission
    source_type: Quality-review or confidentiality handling references
    location: https://www.ftc.gov/business-guidance/advertising-marketing/advertising-marketing-basics
    authority_reason: The FTC is the primary U.S. consumer-protection regulator for deceptive advertising; its public guidance
      identifies claims, disclosures, endorsements, native advertising, and marketing practices that require legal, compliance,
      or policy review rather than trafficking approval.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: nai-self-regulatory-framework-2025
    title: Network Advertising Initiative Principles and Self-Regulatory Framework
    publisher: Network Advertising Initiative
    source_type: Quality-review or confidentiality handling references
    location: https://www.thenai.org/wp-content/uploads/2025/03/NAI-Framework_March-2025.pdf
    authority_reason: NAI is a recognized self-regulatory body for network advertising; its framework defines privacy, choice,
      sensitive data, accountability, and data-governance expectations for ad delivery, measurement, and interest-based advertising.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: Campaign trafficking workflow and client-delivery obligations
    retrieval_policy: Use IAB/4A's terms and tenant IO rules first when work touches insertion orders, ad materials, placements,
      flight dates, third-party serving, delivery obligations, discrepancies, makegoods, billing, cancellation, or client
      commitments.
    specialty_specific_exceptions:
    - Operational trafficking does not create authority to approve makegoods, credits, budget moves, or contract exceptions.
    - If IO terms, tenant policy, publisher policy, platform specs, and client instructions conflict, preserve the conflict
      and escalate.
  - category: Ad technology standards and trafficking artifacts
    retrieval_policy: Use IAB Tech Lab ACIF, OpenRTB, VAST, and ads.txt sources first for creative identifiers, tag artifacts,
      video ad serving, programmatic terminology, seller authorization, and supply-chain quality checks.
    specialty_specific_exceptions:
    - Technical setup alignment does not authorize launch when creative, approval, tracking, QA, or confidentiality gates
      are missing.
    - Publisher or platform rejection remains an exception state until the correct owner clears the blocker and retest evidence
      is captured.
  - category: Measurement, quality, privacy, and regulated-content boundaries
    retrieval_policy: Use MRC, FTC, and NAI sources first when requests touch invalid traffic, measurement evidence, claims,
      endorsements, disclosures, audience data, choice signals, sensitive data, accountability, or privacy-sensitive delivery.
    specialty_specific_exceptions:
    - The lane can flag evidence gaps and route review, but cannot provide legal, compliance, editorial, or privacy-law interpretation.
    - Audience-data, consumer-choice, sensitive-data, or regulated-content questions require legal, privacy, policy, or client-rights
      review when tenant facts are incomplete.
  next_review_due_at: '2026-08-08'
