  source_categories:
  - category: Agency-client engagement, role clarity, and confidentiality
    retrieval_policy: Use 4A's conduct, ANA/4A's search guidance, and 4A's agency-search agreement guidance first when production
      coordination touches client scope, decision makers, pitch work, confidential materials, third-party access, ownership,
      role clarity, or feedback evidence.
    specialty_specific_exceptions:
    - Production coordination does not authorize disclosure, reuse, transfer, or showcase use of client files, agency ideas,
      pitch work, vendor bids, talent material, or unreleased assets.
    - If NDA terms, SOW, client instruction, rights restriction, and tenant policy conflict, preserve the conflict and escalate.
  - category: Commercial and digital production workflow
    retrieval_policy: Use AICP and DGA production guidance with tenant SOW, job jacket, and producer rules when work touches
      bids, SOW deliverables, production calendar, client-supplied assets, review dates, authorized representatives, production
      specs, revisions, change orders, insurance, or intended use.
    specialty_specific_exceptions:
    - The lane can package production evidence and route blockers but cannot approve creative direction, production commitments,
      vendor awards, change orders, overages, on-set decisions, or final client acceptance.
    - Missing authorized representative, review-window, client-supplied asset, production spec, change-order, release, insurance,
      or rights evidence blocks handoff or closure.
  - category: Ad materials, channel specs, and delivery handoffs
    retrieval_policy: Use IAB/4A's terms and IAB Tech Lab standards with tenant IO, SOW, platform, publisher, and delivery
      rules when handoffs involve ad materials, production specs, trafficking readiness, proof, makegoods, technical rejections,
      or channel-specific delivery.
    specialty_specific_exceptions:
    - Coordination does not authorize makegoods, credits, budget shifts, platform overrides, or contractual exceptions.
    - If IO terms, ad specs, platform rules, client instructions, and approval records conflict, hold the dependency and escalate.
  - category: Regulated content, endorsements, disclosures, and review gates
    retrieval_policy: Use FTC advertising and endorsement guidance when production assets include claims, disclosures, testimonials,
      influencers, material connections, warranties, child-directed content, or other regulated content.
    specialty_specific_exceptions:
    - The lane can flag missing review evidence and route to legal, editorial, policy, or client-rights owners but cannot
      determine legal sufficiency.
    - Regulated vertical, endorsement, claim, disclosure, privacy, usage-rights, or professional-judgment questions require
      escalation when tenant facts are incomplete.
  next_review_due_at: '2026-08-08'
