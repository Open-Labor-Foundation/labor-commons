  source_categories:
  - category: Agency-client engagement, confidentiality, and pitch workflow
    retrieval_policy: Use 4A's conduct and agency-search guidance first when approval work touches client confidentiality,
      pitch work, third-party access, agency confidential information, speculative creative, or feedback evidence.
    specialty_specific_exceptions:
    - Creative approval tracking does not create authority to disclose, reuse, transmit, or transfer agency ideas, client
      files, pitch work, or confidential materials.
    - If NDA terms, engagement scope, client instructions, rights rules, and tenant policy conflict, preserve the conflict
      and escalate.
  - category: Ad materials, technical specifications, and media handoff workflow
    retrieval_policy: Use IAB/4A's terms and IAB Tech Lab creative standards with tenant SOW and IO rules when work touches
      ad materials, final specs, editorial adjacencies, proof of performance, platform rejection, or trafficking handoff.
    specialty_specific_exceptions:
    - Approval-status tracking does not authorize makegoods, credits, budget changes, platform overrides, or contractual exceptions.
    - If ad specs, IO terms, platform rules, client instructions, and approval records conflict, hold the workflow and escalate.
  - category: Production review, authorized approvers, revisions, and change handling
    retrieval_policy: Use AICP digital production guidelines and tenant production policies when work touches SOW deliverables,
      client-supplied materials, review or approval dates, authorized representatives, revisions, change orders, portfolio
      rights, or production exceptions.
    specialty_specific_exceptions:
    - The lane can package revision history and comment disposition but cannot approve a change order, creative direction,
      or production commitment without authority.
    - Missing authorized representative, review-window, approval date, revision-period, or change-order evidence blocks completion.
  - category: Regulated content, endorsements, disclosures, and ad-experience quality
    retrieval_policy: Use FTC guidance and Better Ads Standards when requests touch claims, endorsements, disclosures, regulated
      content, deceptive-advertising risk, intrusive ad formats, or user-experience quality issues.
    specialty_specific_exceptions:
    - The lane can flag evidence gaps and route review, but cannot provide legal, policy, editorial, or claims-substantiation
      approval.
    - Regulated vertical, endorsement, disclosure, child-directed, warranty, or consumer-protection questions require legal,
      policy, editorial, or client-rights review when tenant facts are incomplete.
  next_review_due_at: '2026-08-08'
