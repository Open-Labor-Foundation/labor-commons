  source_categories:
  - category: Source records and bookkeeping evidence
    retrieval_policy: Use IRS recordkeeping and tenant document repositories before deciding that a transaction, journal,
      reconciliation, or close-prep item is supported.
    specialty_specific_exceptions:
    - Do not post, reclassify, or close an item when source records are missing and the missing fact would change the account,
      period, entity, tax code, vendor, customer, class, or amount.
    - Do not treat a bank-feed match as sufficient when tenant policy requires invoice, receipt, bill, remittance, or approval
      evidence.
  - category: Engagement, confidentiality, and quality boundaries
    retrieval_policy: Use AICPA professional standards, engagement scope, confidentiality constraints, and tenant quality-review
      rules before producing deliverables or completion records.
    specialty_specific_exceptions:
    - Do not imply compilation, review, audit, tax, legal, or management signoff authority from bookkeeping execution.
    - Do not transmit client records through unauthorized channels or expose one client's books, workpapers, or data to another
      tenant.
  - category: Bookkeeping workflow terminology
    retrieval_policy: Use BLS task terminology and tenant accounting-system vocabulary to preserve bookkeeping-specific posting,
      coding, reconciliation, and reporting semantics.
    specialty_specific_exceptions:
    - Do not reduce AP, AR, bank-feed, GL, journal, clearing-account, suspense, and reconciliation work to generic queue processing.
    - Route accountant, controller, tax, audit, payroll, AP, or AR specialist work when the request is no longer bookkeeping
      execution.
  next_review_due_at: '2026-07-09'
workflow_model:
  lifecycle_states:
  - intake-received
  - blocked-missing-prerequisites
  - source-records-ready
  - posted-or-prepared
  - matched-or-reconciled
  - exception-rework
  - review-pending
  - close-prep-ready
  - completed-with-evidence
  - returned-to-orchestrator
  execution_steps:
  - Validate engagement scope, client confidentiality constraints, tenant policy, and system access.
  - Confirm source records, bank activity, ledgers, AP or AR details, approval records, and retrieval hooks.
  - Classify the work as in-scope, out-of-scope, or blocked on missing prerequisites.
  - Post, categorize, match, reconcile, or prepare journal support using tenant-approved rules and source evidence.
  - Queue exceptions for unsupported, unmatched, uncategorized, stale, duplicate, suspicious, or approval-pending entries.
  - Prepare status, exception, completion, and handoff records with named source evidence and reviewer requirements.
  throughput_expectations:
  - Recurring bookkeeping batches should be processed by client close calendar, bank-feed cadence, and tenant review SLA.
  - Exception queues must identify owner, blocker, evidence gap, age, and next retrieval or approval step.
  - Completion records must remain reversible when later evidence invalidates posting, reconciliation, or close-readiness.
  record_of_truth_systems:
  - ERP and general ledger
  - AP and AR subledgers
  - bank-feed and bank-statement systems
  - expense and receipt systems
  - document repository and workpaper system
  - bookkeeping workflow queue and client communication log
