- tax-operations-specialist
knowledge_baseline:
  source_baseline_version: v0.1.0
  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: Treasury Circular 230, IRS practice-before-the-IRS guidance, AICPA tax-service standards, and taxpayer rights
      references define professional boundaries, due-diligence expectations, representation limits, and advisory escalation
      triggers.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: IRS notices, collection process, appeals, payment plan, offer in compromise, and authorization guidance define
      the concrete workflow stages, artifacts, deadlines, and authority interaction points for tax resolution service delivery.
  - class: Quality-review or confidentiality handling references
    rationale: IRS Publication 4557, Form 2848 authorization guidance, AICPA standards, and tenant engagement controls constrain
      taxpayer-data handling, evidence support, review, signoff, and authorized communication.
  source_selection_approach: 'Use IRS notices and letters guidance first to classify notice type,

    deadline, response path, and required support. Use IRS collection,

    payment-plan, offer in compromise, appeals, taxpayer rights, Form 2848, and

    Publication 947 references to frame collection, protest, representation,

    and authority-interaction boundaries. Use Circular 230 and AICPA Statements

    on Standards for Tax Services to separate operational resolution support

    from tax advice, written tax advice, practice before the IRS, due

    diligence, and professional signoff. Use IRS Publication 4557 and tenant

    policies to constrain taxpayer-data handling. Require tenant-specific

    overlays for engagement scope, authorization, jurisdiction, record

    locations, client approval, confidentiality, communication templates, and

    escalation owners.

    '
