      quality management, and professional-boundary expectations.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: Audit documentation, audit evidence, supervision, attestation, sampling, and communication standards define
      the workpaper and delivery artifacts that govern review readiness.
  - class: Quality-review or confidentiality handling references
    rationale: Engagement quality review, quality management, confidentiality, inspection, and remediation guidance define
      approval, privacy, and quality-review constraints.
  source_selection_approach: 'Use current PCAOB standards first for issuer audit workflows, AICPA standards for nonissuer
    audit and attestation workflows, GAO Government Auditing Standards for public audit workflows, and IAASB/IESBA materials
