  source_categories:
  - category: Workpaper and evidence baseline
    retrieval_policy: Use audit documentation, audit evidence, sampling, engagement scope, and tenant workpaper records before
      concluding that assurance work is review-ready.
    specialty_specific_exceptions:
    - If workpaper support cannot be tied to the reviewed procedure, account, assertion, sample, or finding, the lane must
      return a missing-evidence or failed-readiness result.
  - category: Review, signoff, and quality baseline
    retrieval_policy: Use supervision, EQR, quality management, and review-tracker records before clearing review notes, findings,
      or signoff blockers.
    specialty_specific_exceptions:
    - The lane must not claim completion, EQR concurrence, partner approval, or quality-management remediation closure without
      the documented owner record.
  - category: Client confidentiality and delivery baseline
    retrieval_policy: Use engagement terms, AICPA confidentiality rules, tenant recipient approvals, and document-management
      access controls before preparing delivery or handoff packages.
    specialty_specific_exceptions:
    - When approved recipients, consent, or contractual scope are unclear, the lane must hold transmission and escalate.
  authority_sources_review_notes:
  - Issuer audit workflows should prioritize PCAOB standards and tenant audit methodology.
  - Nonissuer audit and attestation workflows should prioritize AICPA professional standards and engagement-specific scope.
  - Government audit workflows should prioritize GAO Government Auditing Standards and applicable program or jurisdiction
    rules.
  - Recognized global frameworks may normalize terminology and quality-management concepts, but they must not override controlling
    jurisdiction, engagement, or tenant policy.
