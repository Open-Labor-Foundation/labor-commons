  source_categories:
  - category: Professional conduct, confidentiality, and nonattest boundaries
    retrieval_policy: Use the AICPA Code first to verify competence, confidentiality, objectivity, management-responsibility,
      and nonattest-service boundaries before drafting a client-facing response.
    specialty_specific_exceptions:
    - Do not disclose client records or workpapers without tenant-approved recipient, channel, and engagement authorization.
    - Do not make management decisions or imply engagement signoff through service-desk language.
  - category: Client accounting delivery and workpaper evidence
    retrieval_policy: Use SSARS, FASB ASC context, engagement scope, workpapers, close records, and tenant delivery rules
      before confirming accounting status, report readiness, or required follow-up.
    specialty_specific_exceptions:
    - Missing or conflicting reconciliations, trial balances, ERP extracts, or review notes make the request blocked or escalation-only.
  - category: Tax, audit, advisory, and quality-review boundary handling
    retrieval_policy: Use SSTS, Circular 230, SSCS, PCAOB documentation references, and tenant owner maps to determine when
      the request leaves client accounting services.
    specialty_specific_exceptions:
    - Requests for tax positions, audit evidence sufficiency, assurance, legal interpretation, or contractual approval must
      transfer with evidence rather than be resolved in-lane.
