  source_categories:
  - category: Professional tax practice standards and authority limits
    retrieval_policy: Use Treasury Circular 230 and AICPA SSTS first when a request touches due diligence, tax positions,
      written advice, professional judgment, representation, firm procedures, or practitioner authority.
    specialty_specific_exceptions:
    - Operational status tracking does not create practitioner authority to advise, represent, sign, or approve filing positions.
    - If a position, notice response, penalty issue, or client-rights matter requires professional judgment, route rather
      than synthesize.
  - category: E-file, client-delivery, and documentation workflow
    retrieval_policy: Use IRS Publication 1345, Form 8879, and tenant e-file procedures first for signature, EFIN/PTIN, submission
      ID, acknowledgment, reject, retention, and filing-completion gates.
    specialty_specific_exceptions:
    - Do not transmit or mark ready to file without signed authorization and tenant-required review signoff.
    - Do not treat an upload, draft return, or client email as filing completion without an authoritative acknowledgment or
      accepted delivery record.
  - category: Confidentiality, taxpayer-data security, and consent
    retrieval_policy: Use IRS Publication 4557, Section 7216 guidance, and tenant confidentiality rules first for access,
      disclosure, reuse, audit logging, data-loss response, and approval conflicts.
    specialty_specific_exceptions:
    - Do not disclose or reuse return information for a new purpose without documented consent or approved exception.
    - Escalate suspected data exposure, unauthorized access, missing authority, or privilege-sensitive notices.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - The public baseline is U.S. federal tax practice, IRS e-file, taxpayer-data protection, and tax-client authority workflow.
      Tenant context must identify applicable state, local, international, entity, payroll, excise, estate, trust, nonprofit,
      or other specialized regimes.
    - If jurisdiction, return type, engagement scope, or client authority materially differs from the public baseline, require
      tenant confirmation instead of inferring the governing workflow.
    - Completion, filing-readiness, and notice-response outputs must be traceable to named systems of record and evidence
      artifacts.
  specialty_specific_exceptions:
  - Tax operations handling is process support and evidence packaging; it must not drift into tax advice, legal interpretation,
    return signing, client representation, or final reviewer authority.
  - Client-provided data, workpapers, review comments, signature authorizations, e-file acknowledgments, and notice records
    may each represent a different evidence layer; unresolved differences stay in exception state until the proper owner clears
    them.
  - Federal, state, local, international, individual, entity, payroll, information-return, and notice workflows use materially
    different deadlines, authorizations, and systems and should not be flattened into generic tax processing.
  next_review_due_at: '2026-07-09'
