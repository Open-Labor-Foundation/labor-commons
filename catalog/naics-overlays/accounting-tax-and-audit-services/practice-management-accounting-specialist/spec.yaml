    source_type: client-delivery-workflow-guidance
    location: https://www.aicpa-cima.com/professional-insights/article/say-i-do-to-engagement-letters
    authority_reason: AICPA practice-management guidance explains that engagement letters establish service scope, duration,
      boundaries, prices or rates, records management, confidentiality, billing and payment terms, and scope-change handling,
      making them authoritative client-delivery inputs for this lane.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: aicpa-ssars
