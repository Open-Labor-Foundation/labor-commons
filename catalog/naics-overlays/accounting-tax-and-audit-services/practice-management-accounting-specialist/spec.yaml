    source_type: engagement-documentation-standard
    location: https://www.aicpa-cima.com/resources/landing/statements-on-standards-for-accounting-and-review-services-ssarss
    authority_reason: AICPA SSARS are recognized standards for preparation, compilation, and review engagements. They establish
