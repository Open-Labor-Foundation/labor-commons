    publisher: U.S. Government Accountability Office
    source_type: vendor-neutral-schedule-assessment-framework
    location: https://www.gao.gov/products/gao-16-89g
    authority_reason: GAO is the U.S. congressional audit, evaluation, and investigative agency. Its Schedule Assessment Guide
      is a public, vendor-neutral framework for evaluating schedule logic, sequencing, dependencies, resource constraints,
      critical paths, and schedule risk, which constrains this lane's planning and allocation recommendations without granting
      final approval authority.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 730
    decay_policy: review_required_after_interval
    status: active
  - source_id: aicpa-engagement-letters
