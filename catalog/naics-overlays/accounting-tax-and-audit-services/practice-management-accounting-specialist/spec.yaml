knowledge_baseline:
  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: Recognized accounting, tax, audit, and quality-management standards define professional boundaries, documentation
      expectations, due care, engagement performance, and quality-review constraints that shape accounting-practice workload
      planning.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: Public engagement and practice-management references define the client-delivery artifacts that govern planning,
      including engagement letters, workpaper support, close calendars, service scopes, and document request workflows.
  - class: Quality-review or confidentiality handling references
    rationale: Confidentiality, professional conduct, audit-documentation, and quality-control sources define what evidence
      and approvals must exist before delivery priorities can be changed or released.
  - class: Vendor-neutral planning, scheduling, or resource-allocation references
    rationale: Public schedule-assessment frameworks define planning discipline for dependencies, sequencing, resource constraints,
      critical paths, and schedule risk without replacing accounting-practice standards or tenant approval rules.
  source_selection_approach: 'Use U.S. Census NAICS 5412 to anchor the industry boundary for

    accounting, tax preparation, bookkeeping, and payroll services. Use AICPA

    professional responsibility, engagement-letter, SSARS, and quality

    management sources for professional conduct, engagement scope, recurring

    client-delivery artifacts, documentation expectations, and quality-review

    boundaries. Use GAO schedule-assessment guidance for vendor-neutral

    dependency, sequencing, resource, critical-path, and schedule-risk

    discipline. Use IRS Circular 230 and PCAOB audit documentation and quality

    control references to constrain tax-practice and public-company audit

    authority boundaries when accounting-practice planning touches adjacent

    lanes. Tenant-specific service models, systems of record, close calendars,

    approval matrices, client commitments, confidentiality constraints, and

    jurisdictional rules are runtime prerequisites and are never guessed.

    '
  authority_sources:
  - source_id: naics-5412
    title: 2017 NAICS Manual, 5412 Accounting, Tax Preparation, Bookkeeping, and Payroll Services
    publisher: U.S. Census Bureau
    source_type: industry-classification-reference
    location: https://www.census.gov/naics/reference_files_tools/2017_NAICS_Manual.pdf
    authority_reason: The U.S. Census Bureau is the authoritative NAICS publisher. Its 5412 definition establishes the accounting,
      tax preparation, bookkeeping, payroll, auditing, financial statement preparation, budget, billing, and accounting-system
      service boundary for the industry overlay.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 730
    decay_policy: review_required_after_interval
    status: active
  - source_id: aicpa-professional-responsibilities
    title: Professional Responsibilities
    publisher: AICPA & CIMA
    source_type: professional-standards-reference
    location: https://www.aicpa-cima.com/resources/article/professional-responsibilities
    authority_reason: AICPA is the national professional body for CPAs and explains that members follow the Code of Professional
      Conduct, including integrity, objectivity, due care, competence, conflicts, client confidentiality, and public-interest
      duties that limit autonomous planning and delivery actions.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: aicpa-sqms-1
    title: AICPA Statement on Quality Management Standards No. 1
    publisher: AICPA & CIMA
    source_type: professional-quality-framework
    location: https://www.aicpa-cima.com/resources/download/aicpa-statement-on-quality-management-standards-no-1
    authority_reason: AICPA SQMS No. 1 is an official quality-management standard requiring firms to design, implement, and
      operate quality management, including resource, engagement-performance, information, communication, monitoring, and
      remediation considerations that constrain workload planning.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gao-schedule-assessment-guide
