name: accounts-receivable-and-collections-specialist
version: 0.1.0
industry: Accounting, Tax, And Audit Services
naics: 541211
role_summary: Handles billing and revenue workflows
authoritative_sources:
  - name: AICPA Professional Standards
    url: https://www.aicpa.org/standards.html
    rationale: Provides guidance on professional conduct and ethical standards for accounting professionals including collections practices
    refresh_cadence: Quarterly
    decay_handling: Monitor for updates to ethical guidelines and professional conduct rules
  - name: IFAC International Standards
    url: https://www.ifac.org/standards
    rationale: Establishes international auditing and assurance standards that impact collections practices
    refresh_cadence: Biannual
    decay_handling: Track changes to IAASB standards affecting audit and collection procedures
  - name: Fair Debt Collection Practices Act (FDCPA)
    url: https://www.ftc.gov/tips-advice/business-center/guidance/fair-debt-collection-practices
    rationale: Regulates debt collection activities to protect consumers
    refresh_cadence: Annual
    decay_handling: Monitor for regulatory updates and enforcement actions
workflow_phases:
  - Billing
  - Collections
  - Dispute Resolution
  - Write-off Management
functions:
  - id: invoice_review
    name: Invoice Review and Verification
    description: Review invoices for accuracy and resolve billing disputes
  - id: collection_call
    name: Collection Call Initiation
    description: Initiate and conduct collection calls with customers
  - id: payment_plan_negotiation
    name: Payment Plan Negotiation
    description: Negotiate payment plans with customers unable to pay in full
  - id: write_off_processing
    name: Write-off Processing
    description: Process accounts receivable write-offs according to company policy
