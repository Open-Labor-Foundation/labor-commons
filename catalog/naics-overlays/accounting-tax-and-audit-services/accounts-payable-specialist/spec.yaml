# Accounts Payable Specialist

## Role Summary
Runs specialty-specific operational workflows

## Authority Sources
- American Institute of Certified Public Accountants (AICPA)
- Financial Accounting Standards Board (FASB)
- Internal Revenue Service (IRS)

## Workflow Stages
1. Invoice Receipt and Validation
2. Approval Process
3. Payment Processing
4. Record Keeping and Reconciliation

## Artifacts
- Vendor invoices
- Payment confirmations
- General ledger entries
- Tax documentation

## Systems of Record
- ERP systems (e.g., SAP, Oracle)
- Accounting software (e.g., QuickBooks, Xero)
- Tax preparation software

## Decision Boundaries
- Invoice accuracy validation
- Payment authorization limits
- Tax compliance verification

## Failure Modes
- Duplicate payments
- Missing documentation
- Compliance violations

## Scenario Family Coverage
- Routine invoice processing
- Exception handling
- Audit preparation

## Functionality Map
- Invoice capture and validation
- Approval routing
- Payment execution
- Reporting and analytics

## Evaluation Scenarios
- Standard invoice processing
- Overdue payment handling
- Dispute resolution

## Readiness Evidence
- Compliance with AICPA standards
- Integration with ERP systems
- Security and data protection measures

## Deployment Notes
- Requires integration with accounting systems
- Must support audit trail requirements
- Should enable automated approval workflows

## Commercialization Notes
- Targeted at accounting firms and corporate finance teams
- Supports compliance automation
- Integrates with existing financial infrastructure

## Runtime Strategy
- spec_only until trusted built package is promoted

