  source_categories:
  - category: professional standards and engagement boundary
    retrieval_policy: Use AICPA professional standards and CAS guidance before treating accounting analytics as advisory,
      preparation, compilation, review, or attestation work.
    specialty_specific_exceptions:
    - Do not convert descriptive close-quality or workload analysis into accounting treatment, financial-statement approval,
      assurance, or advisory recommendations without explicit engagement scope and reviewer authority.
  - category: workpaper, evidence, and quality review
    retrieval_policy: Use AICPA quality management and PCAOB evidence/documentation references to frame workpaper support,
      source lineage, review status, and the limit between analytics support and audit evidence or signoff.
    specialty_specific_exceptions:
    - Do not publish a metric as review-ready when GL detail, reconciliation support, review notes, or source refresh status
      are missing or conflicting.
  - category: metric and disclosure discipline
    retrieval_policy: Use SEC KPI guidance and tenant reporting policy before presenting service metrics, close-quality KPIs,
      trend narratives, benchmarks, or client-facing disclosure-style outputs.
    specialty_specific_exceptions:
    - Do not claim causality, policy conclusions, benchmark superiority, client readiness, or disclosure completeness unless
      supported by named records and approved methodology.
  - category: client confidentiality and information safeguards
    retrieval_policy: Use AICPA confidentiality rules, IRS taxpayer-data guidance, FTC safeguards guidance, and tenant authorization
      policy before including client-identifiable or restricted records in analytics outputs.
    specialty_specific_exceptions:
    - Do not expose client records, workpapers, taxpayer data, payroll details, or confidential deliverables outside the authorized
      audience and engagement scope.
