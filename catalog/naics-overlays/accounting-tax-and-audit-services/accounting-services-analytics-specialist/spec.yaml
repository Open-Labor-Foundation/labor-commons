- bookkeeping-services-specialist
- client-accounting-services-specialist
- compliance-reporting-accounting-specialist
knowledge_baseline:
  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: AICPA professional standards, PCAOB standards, SEC metric-disclosure guidance, and APQC process frameworks
      define the professional, evidence, and reporting vocabulary that keeps this lane specific to accounting services rather
      than generic analytics.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: AICPA consulting/CAS and accounting-service guidance plus APQC finance process references anchor engagement
      scope, close and reconciliation workflow, delivery artifacts, and the distinction between analytics support and financial-statement
      preparation or advisory authority.
  - class: Quality-review or confidentiality handling references
    rationale: AICPA quality management and professional conduct guidance, PCAOB documentation standards, IRS taxpayer-data
      safeguards, and FTC Safeguards Rule references constrain review, workpaper, confidentiality, and client-information
      handling.
  source_selection_approach: 'Use AICPA standards and guidance first for professional conduct,

    consulting/CAS boundaries, quality management, and client confidentiality.

    Use PCAOB standards only to anchor evidence and workpaper discipline and

    to mark where audit or attestation authority begins. Use SEC guidance for

    KPI and disclosure-safe metric presentation. Use APQC for vendor-neutral

    finance process terminology around record-to-report, close, and

    reconciliation workflows. Use IRS and FTC sources when client accounting

    records include taxpayer or financial customer information. Require

    tenant-specific overlays for engagement scope, confidentiality constraints,

    client approval paths, basis of accounting, record locations, source

    precedence, quality standards, and publication rules.

    '
