knowledge_baseline:
  source_baseline_version: '2026-04-07'
  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: PCAOB, AICPA, IRS Circular 230, and SEC public standards define the professional evidence, documentation, diligence,
      independence, and reporting concepts that constrain accounting-service delivery.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: SEC filing manuals, financial-reporting manuals, SSARS preparation guidance, and professional reporting workflow
      references define how schedules, templates, workpapers, and delivery artifacts move through preparer and reviewer workflows.
  - class: Quality-review or confidentiality handling references
    rationale: AICPA confidentiality rules, quality-management standards, PCAOB documentation standards, and IRS taxpayer-data
      safeguards define controlled handling, review discipline, record retention, and signoff escalation expectations.
  source_selection_approach: 'Use primary regulator and professional-standard sources first: SEC rules and

    manuals for regulator-facing disclosure and non-GAAP reconciliation

    requirements; PCAOB standards for workpaper evidence and documentation

    expectations that inform audit-sensitive evidence handling; AICPA SSARS,

    Code of Professional Conduct, and quality-management materials for

    engagement, client-delivery, confidentiality, and review constraints; IRS

    Circular 230 and taxpayer-data safeguards for tax-adjacent reporting

    diligence and client-data controls. Tenant engagement scope and systems of

    record remain required before case-specific outputs are safe.

    '
  authority_sources:
  - source_id: sec-reg-sx
    title: 17 CFR Part 210 Regulation S-X
    publisher: Securities and Exchange Commission / eCFR
    source_type: primary-regulator-financial-statement-rule
    location: https://www.ecfr.gov/current/title-17/chapter-II/part-210
    authority_reason: SEC Regulation S-X is the primary public rule set for form, content, and schedules of financial statements
      filed with the SEC, making it directly authoritative for regulator-facing accounting schedules and disclosure-support
      artifacts.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: sec-reg-g
    title: 17 CFR Part 244 Regulation G
    publisher: Securities and Exchange Commission / eCFR
    source_type: primary-regulator-metric-disclosure-rule
    location: https://www.ecfr.gov/current/title-17/chapter-II/part-244
    authority_reason: SEC Regulation G directly governs public disclosure of non-GAAP financial measures, comparable GAAP
      presentation, reconciliation, and misleading-measure constraints that shape compliance reporting metric work.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: sec-cf-financial-reporting-manual
    title: Division of Corporation Finance Financial Reporting Manual
    publisher: Securities and Exchange Commission
    source_type: official-financial-reporting-workflow-guidance
    location: https://www.sec.gov/corpfin/cf-manual
    authority_reason: The SEC staff manual is official public staff guidance for financial-reporting questions, age-of-financial-statement
      analysis, pro forma handling, and reporting workflow considerations used by registrants and preparers.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: sec-edgar-filer-manual
    title: Current EDGAR Filer Manual
    publisher: Securities and Exchange Commission
    source_type: official-filing-workflow-reference
    location: https://www.sec.gov/edgar/filer-information/current-edgar-filer-manual
    authority_reason: The SEC EDGAR Filer Manual is the official operating reference for electronic filing structure, submission
      mechanics, and filing-system requirements, so it is authoritative for regulator-template and filing-readiness boundaries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: pcaob-as-1105
    title: AS 1105 Audit Evidence
    publisher: Public Company Accounting Oversight Board
    source_type: professional-evidence-standard
    location: https://pcaobus.org/oversight/standards/auditing-standards/details/AS1105
    authority_reason: PCAOB AS 1105 defines audit evidence quality, relevance, and reliability expectations. It is authoritative
      for audit-sensitive evidence terminology and prevents the lane from treating unsupported records as sufficient support.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: pcaob-as-1215
    title: AS 1215 Audit Documentation
    publisher: Public Company Accounting Oversight Board
    source_type: professional-documentation-standard
    location: https://pcaobus.org/oversight/standards/auditing-standards/details/AS1215
    authority_reason: PCAOB AS 1215 defines audit documentation and workpaper sufficiency expectations, making it authoritative
      for workpaper indexing, review notes, evidence retention, and handoff limits in audit-sensitive accounting reporting.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: aicpa-arc-70
    title: Preparation, Compilation, and Review Standards / AR-C Section 70 resources
    publisher: AICPA & CIMA
    source_type: professional-engagement-workflow-guidance
    location: https://www.aicpa-cima.com/resources/landing/preparation-compilation-and-review-standards
    authority_reason: AICPA preparation, compilation, and review standards define the engagement boundary between preparation
      support and assurance, including client discussion, no-assurance posture, and delivery artifacts for accounting-service
      work.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: aicpa-code
    title: AICPA Code of Professional Conduct
    publisher: AICPA & CIMA
    source_type: professional-confidentiality-and-conduct-standard
    location: https://pub.aicpa.org/codeofconduct/Ethics.aspx#/Content/et-codification.htm
    authority_reason: The AICPA Code of Professional Conduct is the recognized public professional conduct baseline for CPAs,
      including confidentiality, integrity, due care, and client-record handling constraints that govern accounting-service
      delivery.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: aicpa-sqms-1
    title: Statement on Quality Management Standards No. 1
    publisher: AICPA & CIMA
    source_type: quality-management-standard
    location: https://www.aicpa-cima.com/resources/download/statement-on-quality-management-standards-no-1-a-firms-system-of-quality-management
    authority_reason: AICPA SQMS No. 1 is the professional quality-management baseline for firm-level quality objectives,
      engagement performance, resources, information, monitoring, and remediation relevant to preparer and reviewer controls.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: irs-circular-230
    title: 31 CFR Part 10 Circular 230
    publisher: Internal Revenue Service / eCFR
    source_type: tax-practitioner-diligence-standard
    location: https://www.ecfr.gov/current/title-31/subtitle-A/part-10
    authority_reason: Circular 230 governs practice before the IRS and includes due-diligence, written-advice, return-document,
      and practice-of-law boundaries that constrain tax-adjacent compliance reporting and schedule support.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: irs-publication-4557
    title: Publication 4557 Safeguarding Taxpayer Data
    publisher: Internal Revenue Service
    source_type: client-data-confidentiality-reference
    location: https://www.irs.gov/pub/irs-pdf/p4557.pdf
    authority_reason: IRS Publication 4557 is official public guidance for tax professionals on safeguarding taxpayer data
      and FTC Safeguards Rule expectations, making it authoritative for confidentiality and data-handling constraints in tax-adjacent
      accounting services.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: Regulator-facing financial statement schedules and metric disclosures
    retrieval_policy: Use SEC Regulation S-X, Regulation G, SEC non-GAAP staff guidance, the Financial Reporting Manual, and
      EDGAR Filer Manual first when the request involves regulator templates, SEC schedules, XBRL or EDGAR filing readiness,
      non-GAAP measures, or disclosure package tie-outs.
    specialty_specific_exceptions:
    - Do not treat SEC staff guidance or filing mechanics as legal advice or filing approval.
    - Do not label a measure, schedule, or disclosure as final when comparable GAAP presentation, reconciliation, and reviewer
      signoff are unresolved.
  - category: Workpaper evidence and professional documentation
    retrieval_policy: Use PCAOB AS 1105 and AS 1215 to normalize evidence sufficiency, source reliability, workpaper indexing,
      review-note handling, and documentation limits in audit-sensitive reporting support.
    specialty_specific_exceptions:
    - Do not render audit, review, or attestation conclusions from evidence-packaging work.
    - Do not mark unsupported or stale workpapers as sufficient merely because a schedule balances mathematically.
  - category: Engagement, quality, confidentiality, and tax-adjacent boundaries
    retrieval_policy: Use AICPA professional standards, SQMS, Code of Professional Conduct, IRS Circular 230, and IRS data-safeguarding
      guidance to define engagement scope, client confidentiality, quality review, tax-practitioner diligence, and client-data
      handling.
    specialty_specific_exceptions:
    - Do not proceed when client authorization, engagement scope, confidentiality handling, or reviewer approval is unclear.
    - Do not provide tax advice, legal interpretation, practice-of-law activity, or final position approval.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - The public baseline is U.S.-oriented accounting, SEC reporting, PCAOB audit-sensitive evidence, AICPA professional standards,
      and IRS tax-practitioner diligence. Tenant jurisdiction and engagement scope may require additional sources.
    - Every package output must name the reporting period, audience, framework, source systems, source timestamps, calculation
      logic, caveats, missing support, and required review or signoff owner.
    - Client confidentiality, workpaper access, and document-release authority must be confirmed before producing or routing
      deliverables.
  specialty_specific_exceptions:
  - Compliance-reporting accounting support is operational and evidence-backed; it must not drift into legal advice, attestation,
    tax-position approval, editorial approval, or contractual signoff.
  - Disclosure schedules, non-GAAP metrics, and regulator-facing templates can be assembled only with explicit source lineage
    and review caveats.
  - Conflicting ERP, GL, subledger, consolidation, disclosure-management, workpaper, and client-provided records remain exceptions
    until the authoritative owner resolves them.
  next_review_due_at: '2026-07-09'
