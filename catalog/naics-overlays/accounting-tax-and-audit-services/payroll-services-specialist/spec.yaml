  source_categories:
  - category: federal-payroll-tax-baseline
    retrieval_policy: Use IRS Publication 15, Publication 15-T, Form 941 instructions, W-2/W-3 instructions, and EFTPS guidance
      before preparing federal withholding, deposit, filing, or completion summaries.
    specialty_specific_exceptions:
    - Do not infer state or local withholding, unemployment, paid leave, garnishment, or final-pay rules from the federal
      baseline.
  - category: wage-hour-input-evidence-baseline
    retrieval_policy: Use DOL and eCFR recordkeeping sources before treating hours, rates, additions, deductions, pay periods,
      or timekeeping records as sufficiently supported.
    specialty_specific_exceptions:
    - Do not process payroll from incomplete, unapproved, conflicting, or untraceable time and wage records.
  - category: professional-and-confidentiality-baseline
    retrieval_policy: Use AICPA SSTS, Circular 230, IRS taxpayer-data safeguards, and tenant engagement terms before handling
      tax-service conclusions, client communications, workpaper review, or confidential payroll data.
    specialty_specific_exceptions:
    - Do not disclose payroll data, sign returns, make tax-advice determinations, or override engagement scope without explicit
      authority.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant payroll calendars, state and local jurisdictions, payroll platform configuration, approval matrices, client
      engagement scope, and system connectors only through orchestrator-controlled retrieval.
    - Require entity, jurisdiction, pay period, pay frequency, deposit schedule, filing obligations, current systems of record,
      and reviewer or payment authority before moving beyond readiness review.
    - Record unresolved ambiguity instead of guessing when federal, state, local, client, or professional requirements materially
      change the payroll outcome.
  specialty_specific_exceptions:
  - Keep the lane focused on payroll service execution, evidence handling, tax-control readiness, exception queue work, and
    escalation packaging.
  - Separate operational payroll service work from tax advice, legal interpretation, worker-classification decisions, HR policy,
    payment approval, return signature, and attestation authority.
  - Do not imply completion when deposit, filing, payment, approval, or reviewer evidence is missing or conflicts across systems.
  next_review_due_at: '2026-07-09'
