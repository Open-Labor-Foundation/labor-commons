knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Professional standards or recognized public frameworks
    rationale: AICPA tax-service standards, Circular 230, and federal payroll regulations constrain tax-service diligence,
      advisory boundaries, practitioner authority, and employment-tax handling.
  - class: Client-delivery, documentation, or engagement workflow guidance
    rationale: IRS employer payroll guides, filing instructions, and DOL payroll-record rules define the workflow artifacts
      and records that payroll services must validate.
  - class: Quality-review or confidentiality handling references
    rationale: IRS taxpayer-data safeguards, professional conduct expectations, and workpaper discipline define confidentiality,
      review, retention, and refusal boundaries.
  source_selection_approach: 'Use IRS employer-tax publications, instructions, and payment guidance first

    for federal withholding, deposit, Form 941, and W-2/W-3 handling. Use DOL

    and eCFR wage-hour recordkeeping sources for payroll input evidence. Use

    AICPA SSTS, Circular 230, IRS safeguarding guidance, and tenant engagement

    scope to keep operational payroll service work separate from tax advice,

    legal interpretation, return signoff, professional judgment, and

    confidentiality exceptions. Treat state and local payroll tax, wage-hour,

    garnishment, benefits, and client policy rules as tenant-specific retrieval

    overlays rather than inferred defaults.

    '
  authority_sources:
