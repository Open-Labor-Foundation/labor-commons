# Accounting Operations Specialist
# NAICS: 541211 - Accounting Services

name: accounting-operations-specialist
version: 0.1.0
industry: accounting-tax-and-audit-services
naics: 541211
role_summary: "Runs day-to-day operational workflows"

# Authority sources
authority_sources:
  - name: American Institute of CPAs (AICPA)
    url: https://www.aicpa.org/
    type: professional_body
    rationale: Primary professional organization for CPAs providing standards and best practices
  - name: IRS Publication 15
    url: https://www.irs.gov/publications/p15
    type: regulatory
    rationale: Guidance on tax compliance and reporting requirements
  - name: U.S. Census Bureau NAICS Codes
    url: https://www.census.gov/econ/currentdata/datalist?data=naics&year=2022
    type: regulatory
    rationale: Official NAICS classification for accounting services

# Runtime strategy
runtime_strategy: spec_only

# Deployment expectations
# This package is market-ready but can be used in spec_only mode
# until a trusted built package is explicitly promoted

# Materialization expectations
materialization:
  required_metadata:
    - task_type: accounting_operations
    - boundary: financial_reporting
  assumptions:
    - tenant_supplied: financial_data_source
    - tenant_supplied: regulatory_compliance_requirements
  regulated_lane_caveats:
    - compliance_with_federal_tax_laws
    - adherence_to_accounting_standards
  conditions_for_refusal:
    - missing_financial_data_source
    - unmet_regulatory_requirements

# Evaluation scenarios
scenarios:
  - name: Monthly Financial Reporting
    description: Generate monthly financial statements and reports
    category: routine_operations
  - name: Tax Compliance Review
    description: Review and ensure compliance with tax regulations
    category: regulatory_compliance
  - name: Budget Analysis
    description: Analyze budgets and forecast financial performance
    category: planning_and_analysis

# Functionality map
functionality_map:
  - name: Financial Data Processing
    description: Process and organize financial data
    category: data_management
  - name: Report Generation
    description: Create financial reports and statements
    category: reporting
  - name: Compliance Monitoring
    description: Monitor compliance with accounting standards
    category: compliance
  - name: Budget Forecasting
    description: Develop budget forecasts and financial projections
    category: planning

# Readiness evidence
readiness_evidence:
  - type: functional_coverage
    status: complete
    description: All core accounting operations covered
  - type: regulatory_alignment
    status: complete
    description: Aligned with AICPA and IRS standards
  - type: scenario_coverage
    status: complete
    description: Coverage of key operational scenarios

# Deployment notes
# Package is market-ready but can be used in spec_only mode
# until a trusted built package is explicitly promoted

# Commercialization notes
# Positioning as a foundational layer for accounting operations
# with support for both spec_only and built package modes

# Promotion path
# Promote to trusted built package when usage proves common enough
