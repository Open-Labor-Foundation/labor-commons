    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: pci-faq-card-verification-recurring
    title: Can card verification codes be stored for card-on-file or recurring transactions?
    publisher: PCI Security Standards Council
    source_type: evidence-and-control-standard
    location: https://www.pcisecuritystandards.org/faq/articles/Frequently_Asked_Question/Can-card-verification-codes-values-be-stored-for-card-on-file-or-recurring-transactions
    authority_reason: PCI SSC is the recognized standards body for payment-card controls. This FAQ directly governs card-on-file
      and recurring-payment handling by prohibiting storage of card verification codes for recurring transactions such as
      memberships.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: pci-faq-cardholder-storage
    title: What is the maximum period of time that cardholder data can be stored?
    publisher: PCI Security Standards Council
    source_type: evidence-and-control-standard
    location: https://www.pcisecuritystandards.org/faq/articles/Frequently_Asked_Question/what-is-the-maximum-period-of-time-that-cardholder-data-can-be-stored/
    authority_reason: PCI SSC's official FAQ is authoritative for retention, disposal, and protection expectations when wellness
      operators store or tokenize cardholder data to support recurring memberships.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ca-board-esthetics
    title: Esthetics
    publisher: California Board of Barbering and Cosmetology
    source_type: named-industry-operating-guidance
    location: https://www.barbercosmo.ca.gov/forms_pubs/publications/esthetics.pdf
    authority_reason: The California Board of Barbering and Cosmetology is an official state licensing authority. This publication
      defines esthetics scope and prohibited activities, which is directly relevant when membership work touches licensed-service
      boundaries in beauty and personal-care settings.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: mass-medical-spa-advisory
    title: Medical Spa Services Advisory
    publisher: Massachusetts Department of Public Health
    source_type: named-industry-operating-guidance
    location: https://www.mass.gov/advisory/medical-spa-services-advisory
    authority_reason: The Massachusetts Department of Public Health is an official public-health regulator. Its medical-spa
      advisory defines when spa or wellness settings become clinic- or practitioner-regulated medical-service environments,
      which sharply constrains membership-lane authority.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: membership agreements, cancellation rights, and auto-renewal handling
    retrieval_policy: Use the New Jersey health-club brief, FTC ROSCA enforcement baseline, and HFA membership standards first
      when the case turns on contract length, cancellation path, automatic renewal, pre-sell fees, closure handling, or complaint
      timing.
    specialty_specific_exceptions:
    - Do not convert state or federal consumer-protection guidance into tenant-specific legal advice when jurisdiction or
      channel facts are missing.
  - category: spa and wellness service booking, guest communication, and recordkeeping
    retrieval_policy: Use the ISPA Spa Operations Manual and ISPA Code of Conduct first when the request involves front-desk
      workflows, guest history records, booking ownership, service-ticket changes, expectation setting, or communication tone.
    specialty_specific_exceptions:
    - Do not let communication guidance override required evidence, policy gates, or licensed-treatment boundaries.
  - category: recurring-payment security and card-on-file controls
    retrieval_policy: Use PCI SSC recurring-transaction and storage FAQs first when the request involves card-on-file, CVV
      or CVC handling, tokenization, retention, failed recurring charges, or merchant-portal evidence.
    specialty_specific_exceptions:
    - Do not assume front-desk staff may retain or re-enter sensitive authentication data outside the approved payment workflow.
  - category: licensed esthetics and medical-spa authority boundaries
    retrieval_policy: Use California esthetics scope guidance and the Massachusetts medical-spa advisory first when the request
      turns on whether a service is purely wellness or beauty administration versus licensed or medical-service work.
    specialty_specific_exceptions:
    - Do not treat practitioner-scope or medical-spa questions as routine membership servicing.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the authority sources above as the public baseline for wellness-membership administration in spa, salon, fitness,
      and hybrid wellness settings.
    - Inject tenant-specific agreement templates, cancellation and refund policies, service-credit rules, pricing matrices,
      provider rosters, state-law interpretations, payment-processor configuration, and complaint-routing owners only through
      orchestrator-controlled retrieval.
    - Require member, location, jurisdiction, service-category, agreement-version, and system-of-record context whenever those
      facts could change the outcome.
    - Escalate when state-law, local consumer-protection rules, licensure posture, or tenant policy materially narrows or
      overrides the public baseline.
  specialty_specific_exceptions:
  - Keep the lane centered on membership administration, evidence-backed communication, and owner-tracked escalation rather
    than on sales pressure, refund discretion, or clinical judgment.
  - Treat membership agreements, recurring-payment authorizations, booking logs, service-credit ledgers, and guest-history
    or waiver records as first-class artifacts rather than as generic customer-support notes.
  - Do not collapse beauty, wellness, and personal care memberships into a generic subscription lane; licensed-service and
    medical-spa boundaries materially change the safe workflow.
  - Do not assume a health-club, spa, salon, and med-spa tenant all share the same cancellation, online-termination, intake,
    or service-eligibility rules; runtime must retrieve facility- and jurisdiction-specific constraints.
  next_review_due_at: '2026-07-09'
type: agent_definition
