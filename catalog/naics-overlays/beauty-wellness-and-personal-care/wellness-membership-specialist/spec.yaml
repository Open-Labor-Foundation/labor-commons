    decay_policy: review_required_after_interval
    status: active
  - source_id: ispa-spa-operations-manual
    title: Spa Operations Manual
    publisher: International Spa Association
    source_type: recognized-workflow-reference
    location: https://experienceispa.com/wp-content/uploads/2014/12/SpaOperationsManual.pdf
    authority_reason: ISPA is the recognized public trade association for spa operations. Its manual is a vendor-neutral workflow
      reference for front-desk attendance, guest history records, booking discipline, service-ticket changes, receptionist
      scheduling ownership, and handoff behavior in spa and wellness operations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ispa-code-of-conduct
    title: Code of Conduct
    publisher: International Spa Association
    source_type: recognized-workflow-reference
    location: https://experienceispa.com/code-of-conduct/
    authority_reason: ISPA's public Code of Conduct is a recognized spa-industry communication framework for guest orientation,
