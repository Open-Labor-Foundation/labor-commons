- spa-analytics-specialist
knowledge_baseline:
  source_baseline_version: '2026-04-10'
  authority_sources:
  - source_id: tdlr-inspections-guide
    title: Barbering and Cosmetology Inspections Guide
    publisher: Texas Department of Licensing and Regulation
    source_type: named-industry operating guidance
    location: https://www.tdlr.texas.gov/barbering-and-cosmetology/inspections-guide/
    authority_reason: TDLR is a primary U.S. state regulator for cosmetology establishments. Its inspections guide is a direct
      operating reference for spa-like establishments, covering licenses, consumer notices, restroom and facility requirements,
      blood-exposure clean-up kits, whirlpool foot-spa cleaning rules, and required sanitation records.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: tdlr-establishment-forms
    title: Establishment Forms and Publications
    publisher: Texas Department of Licensing and Regulation
    source_type: evidence or control standards relevant to the lane
    location: https://www.tdlr.texas.gov/barbering-and-cosmetology/establishments/forms.htm
    authority_reason: TDLR's forms page publishes the regulator-approved health and safety materials and the Foot Spa Cleaning
      and Disinfecting Record, which makes it authoritative for spa sanitation evidence expectations rather than generic cleaning
      advice.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: tdlr-medical-spas
    title: Medical Spas
    publisher: Texas Department of Licensing and Regulation
    source_type: named-industry operating guidance
    location: https://www.tdlr.texas.gov/cosmet/medspas.htm
    authority_reason: TDLR's medical-spa guidance is a direct authority boundary source for when spa operations become medical-spa
      work that may require physician delegation, nursing oversight, or additional regulated controls.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: tdlr-who-regulates-what
    title: Who Regulates What?
    publisher: Texas Department of Licensing and Regulation
    source_type: named-industry operating guidance
    location: https://www.tdlr.texas.gov/cosmet/cosmet-whoregulates.htm
    authority_reason: TDLR's regulator map is an authoritative public reference for distinguishing services that fall under
      cosmetology, massage therapy, or other regulated programs, which is essential to keep the lane from improvising scope-of-practice
      answers.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: epa-foot-spa-cleaning
    title: Recommended Cleaning and Disinfection Procedures for Foot Spa Basins in Salons
    publisher: U.S. Environmental Protection Agency
    source_type: recognized workflow reference tied directly to the lane
    location: https://www.epa.gov/pesticides/recommended-cleaning-and-disinfection-procedures-foot-spa-basins-salons
    authority_reason: EPA is the federal regulator for antimicrobial pesticide products. This page is the public workflow
      reference for draining, cleaning, and disinfecting foot-spa basins using EPA-registered products and is directly tied
      to spa sanitation operations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: osha-nail-salons-overview
    title: Nail Salons
    publisher: Occupational Safety and Health Administration
    source_type: recognized workflow reference tied directly to the lane
    location: https://www.osha.gov/nail-salons
    authority_reason: OSHA's nail-salon page is a worker-safety operating reference for salons and spa-adjacent personal-service
      businesses, consolidating hazards, standards, posters, and worker-protection expectations relevant to daily spa operations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: osha-biological-hazards
    title: Nail Salons - Biological Hazards
    publisher: Occupational Safety and Health Administration
    source_type: evidence or control standards relevant to the lane
    location: https://www.osha.gov/nail-salons/biological-hazards
    authority_reason: OSHA's biological-hazards guidance is a direct public control reference for blood exposure, reusable-tool
      handling, and when contaminated materials must be treated carefully rather than handled as routine room-turn work.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: osha-hazard-communication
    title: 29 CFR 1910.1200 - Hazard Communication
    publisher: Occupational Safety and Health Administration
    source_type: evidence or control standards relevant to the lane
    location: https://www.osha.gov/laws-regs/regulations/standardnumber/1910/1910.1200
    authority_reason: Hazard Communication is OSHA's governing standard for labels, safety data sheets, and worker training
      around hazardous chemicals, which directly constrains spa disinfectant, cleaner, and treatment-product handling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: cdc-mahc
    title: Model Aquatic Health Code
    publisher: Centers for Disease Control and Prevention
    source_type: recognized workflow reference tied directly to the lane
    location: https://www.cdc.gov/mahc/index.html
    authority_reason: CDC's MAHC is the recognized public workflow reference for aquatic venues, including hot tubs and spas,
      making it relevant whenever a tenant's spa operation includes hydrotherapy, whirlpool, or shared wet-area services.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: spa establishment sanitation and facility controls
    retrieval_policy: Use TDLR inspection and establishment-form sources first when the question turns on sanitation evidence,
      foot-spa cleaning logs, room readiness, required notices, or establishment safety artifacts.
    specialty_specific_exceptions:
    - Do not generalize Texas-specific establishment details to every jurisdiction without tenant or jurisdiction retrieval.
  - category: worker safety, blood exposure, and chemical handling
    retrieval_policy: Use OSHA biological-hazards, nail-salon, and hazard-communication sources when the workflow touches
      reusable tools, blood exposure, disinfectants, SDS access, labels, or worker protection.
    specialty_specific_exceptions:
    - Escalate if the requested action would require formal safety signoff, clinical judgment, or a policy override.
  - category: wet-area and foot-spa operating controls
    retrieval_policy: Use EPA foot-spa cleaning guidance and CDC MAHC when a spa workflow depends on basin disinfection, hydrotherapy
      readiness, or shared wet-area operation.
    specialty_specific_exceptions:
    - Do not assume MAHC applies unless the tenant actually operates aquatic or hydrotherapy facilities.
  - category: scope-of-practice and med-spa boundaries
    retrieval_policy: Use TDLR medical-spa and regulator-boundary guidance when the request may cross from standard spa operations
      into massage-therapy, esthetics, nursing, or physician-supervised services.
    specialty_specific_exceptions:
    - Route medical or delegated-procedure questions out of lane rather than infer practitioner authority.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use TDLR, OSHA, EPA, and CDC sources as the public baseline for spa booking, sanitation, room-turn, worker-safety, and
      wet-area controls.
    - Inject tenant-specific service menus, contraindication workflow, late-arrival rules, gratuity policy, minors policy,
      room-turn SOPs, and med-spa routing only through orchestrator-controlled retrieval.
    - Escalate when jurisdiction, service mix, or facility design changes the safe answer.
  specialty_specific_exceptions:
  - Keep the lane on execution-state handling, evidence discipline, and exception routing rather than licensed clinical, medical-spa,
    or legal interpretation.
  - Do not close work because a guest or staff member says the service happened; closure requires booking, readiness, sanitation,
    and completion evidence from the designated systems of record.
  - Do not convert a safety, sanitation, or blood-exposure issue into a customer-service workaround when the governing records
    or approvals are incomplete.
  next_review_due_at: '2026-07-09'
