  source_categories:
  - category: beauty-service and salon-spa KPI definitions
    retrieval_policy: Use PBA KIM and ISPA Big Five sources before defining beauty and wellness metrics such as visits, service
      ticket, retail revenue, rebooking, productivity, and cross-location benchmark posture.
    specialty_specific_exceptions:
    - Do not generalize salon metrics to spa, med-spa, or wellness-club operations without service-line segmentation and tenant
      approval.
  - category: booking, service-ticket, retail, and guest-history workflow artifacts
    retrieval_policy: Use the ISPA Spa Operations Manual and tenant booking or POS source map before interpreting appointment,
      service, retail, package, return, or inventory records.
    specialty_specific_exceptions:
    - Do not let dashboard extracts replace the designated booking, POS, inventory, or accounting system of record.
  - category: licensure, inspection, and med-spa authority boundaries
    retrieval_policy: Use TDLR inspection guidance and the Massachusetts medical-spa advisory whenever analysis depends on
      licensed-service posture, establishment controls, clinic status, incidents, or safety-sensitive comparability.
    specialty_specific_exceptions:
    - Do not infer practitioner or clinic authority from revenue, visit, or review performance.
  - category: public claims, reviews, testimonials, and executive disclosure
    retrieval_policy: Use FTC health-products guidance, FTC reviews and testimonials guidance, and SEC MD&A before publishing
      benchmark, efficacy, testimonial, or investor-style narratives.
    specialty_specific_exceptions:
    - Do not turn internal beauty and wellness analytics into unsupported public claims, disguised endorsements, or disclosure-safe
      narratives without the required evidence and approvals.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to PBA and ISPA beauty-industry metric and workflow references, TDLR and DPH boundary guidance, and FTC and
      SEC claim or disclosure controls before using tenant narrative summaries.
    - Tenant retrieval must provide service-line map, jurisdiction, location scope, provider roster, metric dictionary, source-precedence
      policy, and the exact record locations for booking, POS, inventory, review, accounting, and licensure inputs.
    - Record source freshness, service-line segmentation, review-solicitation context, and med-spa or clinical boundaries
      explicitly instead of normalizing them into a single generic beauty answer.
    - Escalate medical-spa, practitioner-scope, pricing-approval, public-claims, legal, finance-signoff, and external-disclosure
      requests instead of synthesizing a definitive answer.
  specialty_specific_exceptions:
  - This lane prepares evidence-backed beauty and wellness analytics outputs; it does not become the marketer, clinician,
    medical-spa director, cosmetology regulator, or disclosure signoff owner.
  - Beauty and wellness analytics outputs must remain tied to the exact service lines, locations, provider mix, visit definitions,
    package or membership logic, and public-claim context supplied for the tenant.
  - When evidence gaps affect rebooking, retail attach, review authenticity, licensure posture, incident status, or med-spa
    boundaries, the lane must surface the blocker and route to the correct owner.
  next_review_due_at: '2026-08-08'
