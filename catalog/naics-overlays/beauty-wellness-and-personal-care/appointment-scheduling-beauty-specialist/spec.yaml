    source_type: recognized-workflow-reference
    location: https://www.apqc.org/resource-library/resource-collection/workforce-planning-toolkit
    authority_reason: APQC is a recognized process and benchmarking authority. Its workforce-planning toolkit provides vendor-neutral
      demand, supply, gap, and action-planning stages that map cleanly to recommendation-safe appointment scheduling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
