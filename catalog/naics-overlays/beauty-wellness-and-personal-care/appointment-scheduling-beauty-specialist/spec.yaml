    authority_reason: TDLR is a primary state regulator for cosmetology services. Its remote-service business guidance is
      directly relevant to appointment scheduling because it defines app-based booking context, pre-appointment information,
      and record and disclosure expectations for beauty services performed outside a fixed establishment.
