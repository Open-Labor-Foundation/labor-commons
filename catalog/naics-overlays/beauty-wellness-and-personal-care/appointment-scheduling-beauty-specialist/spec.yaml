    authority_reason: TDLR's inspections guide is a direct public operating reference for salon and spa establishments, covering
      required notices, facility readiness, blood-exposure kits, and sanitation controls that change whether a room or service
      station is schedule-ready.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
