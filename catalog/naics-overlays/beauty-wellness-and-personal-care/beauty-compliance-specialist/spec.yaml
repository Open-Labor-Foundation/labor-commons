  source_categories:
  - category: core cosmetics legal baseline and responsible-person duties
    retrieval_policy: Use FDA MoCRA, cosmetics labeling claims, and cosmetic-versus-drug boundary guidance first when deciding
      whether the request is still cosmetic, which obligations apply, and where the lane must stop.
    specialty_specific_exceptions:
    - Do not convert FDA boundary guidance into a final legal or regulatory classification opinion when intended use, channel,
      or jurisdiction facts are incomplete.
  - category: facility registration, product listing, and submission systems
    retrieval_policy: Use FDA registration and listing guidance first for Cosmetics Direct workflow, SPL submissions, renewal
      cadence, exemptions, and evidence expectations.
    specialty_specific_exceptions:
    - Do not treat internal spreadsheets or retailer forms as substitutes for the authoritative registration or listing record.
  - category: complaint, adverse-event, records-access, and recall handling
    retrieval_policy: Use FDA AEMS submissions, records-access, and mandatory-recall guidance first when the request turns
      on serious adverse events, complaint files, record retention, distribution traceability, or recall escalation.
    specialty_specific_exceptions:
    - Do not normalize missing complaint, batch, distribution, or safety-substantiation records during risk or recall analysis.
  - category: state and jurisdiction-specific ingredient reporting
    retrieval_policy: Use California Safe Cosmetics Program guidance first when California sale claims, reportable ingredient
      duties, fragrance and flavor disclosure, or state reporting-portal evidence changes the readiness decision.
    specialty_specific_exceptions:
    - Do not treat federal registration, listing, or label evidence as a substitute for California Safe Cosmetics reporting
      or fragrance and flavor disclosure records.
  - category: GMP, batch, supplier, and quality evidence
    retrieval_policy: Use FDA cosmetic GMP guidance and ISO 22716 first for manufacturing, sanitation, batch-history, complaint,
      storage, shipment, and CAPA evidence expectations.
    specialty_specific_exceptions:
    - Do not present GMP evidence review as formula approval, microbiological signoff, toxicology approval, or final product
      release.
  - category: claims substantiation, endorsements, and advertising controls
    retrieval_policy: Use FTC health-products guidance and endorsements guidance with FDA labeling and intended-use sources
      whenever beauty claims, before-and-after content, influencer material, or reviews affect compliance posture.
    specialty_specific_exceptions:
    - Do not approve marketing claims that imply treatment, structure-function, or health outcomes without the correct legal
      or regulatory owner.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to FDA and FTC sources plus ISO 22716 before relying on retailer questionnaires, consultant decks, or tenant
      narratives.
    - Tenant retrieval must provide product class, intended use, responsible person, facility map, distribution markets, claims
      strategy, California or other state market posture, and systems-of-record mapping.
    - Record conflicts explicitly when public-source guidance, retailer requirements, jurisdiction-specific rules, and tenant
      policy diverge.
    - Escalate legal, regulator-facing, toxicology, product-classification, and final signoff requests instead of synthesizing
      a definitive answer.
  specialty_specific_exceptions:
  - This lane prepares evidence-backed beauty compliance handling; it does not become the FDA, FTC, responsible person, toxicologist,
    or final release authority.
  - Beauty-compliance outputs must stay tied to the exact product class, intended use, channel, jurisdiction, responsible
    person, and system-of-record set.
  - Federal cosmetics registration and listing support does not replace California Safe Cosmetics reporting, fragrance and
    flavor disclosure, or other jurisdiction-specific evidence when those claims are in scope.
  - When evidence gaps affect listing status, claims support, serious-adverse-event handling, batch traceability, or recall
    readiness, the lane must surface the blocker and route to the correct owner.
  next_review_due_at: '2026-07-09'
