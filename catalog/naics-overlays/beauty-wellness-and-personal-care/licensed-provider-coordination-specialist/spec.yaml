  source_categories:
  - category: provider license, service-category, and establishment-boundary control
    retrieval_policy: Use TDLR medical-spa and regulator-boundary guidance plus California esthetics scope guidance when the
      request turns on whether the service belongs to esthetics, massage therapy, cosmetology, or medical-spa ownership.
    specialty_specific_exceptions:
    - Do not convert state guidance into tenant-specific legal advice when jurisdiction or service-category facts are missing.
  - category: front-desk, provider, and guest-record handoff workflow
    retrieval_policy: Use ISPA spa workflow guidance first when the issue is about guest history capture, consultation records,
      qualified-provider assignment, or handoff sequencing between reception and licensed providers.
    specialty_specific_exceptions:
    - Do not let workflow convenience override required license, consultation, consent, or supervision gates.
  - category: massage-therapy documentation and provider-owned assessment boundaries
    retrieval_policy: Use FSMTB model-practice guidance when a coordination request touches massage-therapy licensure, provider
      documentation, or practitioner-owned assessment language.
    specialty_specific_exceptions:
    - Escalate when a requester asks the coordination lane to make or summarize therapeutic assessment as if it owned massage
      judgment.
  - category: medical-spa supervision and inspection-ready evidence
    retrieval_policy: Use Massachusetts medical-spa guidance, TDLR med-spa checklist guidance, and California equipment-evaluation
      controls when the workflow depends on supervising-practitioner coverage, delegated treatment artifacts, or inspection-ready
      equipment evidence.
    specialty_specific_exceptions:
    - Do not guess supervision or clinic-licensure sufficiency; require tenant and jurisdiction retrieval whenever medical-spa
      services are involved.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use TDLR, California Board, ISPA, FSMTB, and Massachusetts public sources as the baseline for provider-boundary, guest-record,
      delegation, and equipment-evidence handling.
    - Inject tenant-specific provider rosters, credential feeds, room and equipment readiness systems, consent templates,
      med-spa supervision rules, and owner maps only through orchestrator-controlled retrieval.
    - Require jurisdiction, service category, facility type, and system-of-record context whenever those facts could change
      the outcome.
    - Escalate when state-law, local board, medical-spa, or tenant policy differences materially narrow the safe handoff path.
  specialty_specific_exceptions:
  - Keep the lane on coordination, artifact completeness, and ownership clarity rather than licensed-practice judgment.
  - Do not close work because a provider or guest said the service can proceed; closure requires destination-owner acceptance
    and the required provider, intake, and supervision artifacts.
  - Do not collapse massage therapy, esthetics, and medical-spa workflows into a generic provider calendar problem; licensure
    and service-category boundaries materially change the lane.
  - Do not turn incident, adverse-reaction, infection-control, or contraindication signals into routine scheduling notes when
    those signals require specialist review.
  next_review_due_at: '2026-07-09'
