- customer-recovery-and-returns-specialist
- licensed-esthetics-specialist
- inventory-and-replenishment-specialist
- e-commerce-operations-specialist
- otc-product-compliance-specialist
knowledge_baseline:
  source_baseline_version: '2026-04-10'
  authority_sources:
  - source_id: fda-cosmetics-labeling-guide
    title: Cosmetics Labeling Guide
    publisher: U.S. Food and Drug Administration
    source_type: named-industry operating guidance
    location: https://www.fda.gov/media/88234/download
    authority_reason: FDA is the primary U.S. regulator for cosmetics. The Cosmetics Labeling Guide is the direct operating
      reference for ingredient declarations, shade lines, display-unit leaflets, off-package labeling, and direct-mail labeling
      practices that materially shape beauty retail execution.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: fda-summary-labeling-requirements
    title: Summary of Cosmetics Labeling Requirements
    publisher: U.S. Food and Drug Administration
    source_type: evidence or control standards relevant to the lane
    location: https://www.fda.gov/cosmetics/cosmetics-labeling-regulations/summary-cosmetics-labeling-requirements
    authority_reason: FDA's summary page is the authoritative public baseline for cosmetic identity, net contents, firm identity,
      ingredient declaration, and misbranding posture, which directly governs beauty retail label-evidence handling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: fda-cosmetic-drug-both
    title: Is It a Cosmetic, a Drug, or Both? (Or Is It Soap?)
    publisher: U.S. Food and Drug Administration
    source_type: named-industry operating guidance
    location: https://www.fda.gov/cosmetics/cosmetics-laws-regulations/it-cosmetic-drug-or-both-or-it-soap
    authority_reason: FDA's classification guidance is the authoritative public source for when personal-care goods remain
      cosmetics, become OTC drugs, or fall outside cosmetic scope, which is essential for retail beauty boundary control.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: fda-expiration-dates-faq
    title: Do I need to label my cosmetics products with expiration dates?
    publisher: U.S. Food and Drug Administration
    source_type: evidence or control standards relevant to the lane
    location: https://www.fda.gov/industry/fda-basics-industry/do-i-need-label-my-cosmetics-products-expiration-dates
    authority_reason: FDA's FAQ is the authoritative public statement that U.S. law does not generally require cosmetic expiration
      dates, while product safety substantiation still matters. That changes how a retail beauty lane treats missing date
      evidence and prevents a generic overrequirement.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: fda-mandatory-cosmetics-recalls
    title: Questions and Answers Regarding Mandatory Cosmetics Recalls
    publisher: U.S. Food and Drug Administration
    source_type: named-industry operating guidance
    location: https://www.fda.gov/regulatory-information/search-fda-guidance-documents/questions-and-answers-regarding-mandatory-cosmetics-recalls-guidance-industry
    authority_reason: FDA's current cosmetics-recall guidance is the authoritative public source for recall authority, responsible-person
      posture, and safety-based escalation boundaries when a beauty product enters stop-sale or recall handling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-mail-order-rule
    title: Business Guide to the FTC's Mail, Internet, or Telephone Order Merchandise Rule
    publisher: Federal Trade Commission
    source_type: recognized workflow reference tied directly to the lane
    location: https://www.ftc.gov/business-guidance/resources/business-guide-ftcs-mail-internet-or-telephone-order-merchandise-rule
    authority_reason: FTC is the primary federal consumer-protection authority for retail order commitments. This business
      guide is the direct workflow reference for advertised ship timing, delay notices, cancellation handling, and prompt-refund
      posture in omnichannel beauty sales.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-advertising-faqs
    title: 'Advertising FAQ''s: A Guide for Small Business'
    publisher: Federal Trade Commission
    source_type: recognized workflow reference tied directly to the lane
    location: https://www.ftc.gov/business-guidance/resources/advertising-faqs-guide-small-business
    authority_reason: FTC's advertising FAQ is the official public operating reference that price comparisons, sale claims,
      and marketing claims must be truthful and substantiated, which directly constrains beauty retail promo and price-signage
      workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: nist-hb130-2025
    title: 'NIST HB 130-2025: Uniform Laws and Regulations in the Areas of Legal Metrology and Fuel Quality'
    publisher: National Institute of Standards and Technology
    source_type: recognized workflow reference tied directly to the lane
    location: https://nvlpubs.nist.gov/nistpubs/hb/2025/NIST.HB.130-2025.pdf
    authority_reason: NIST Office of Weights and Measures publishes the public U.S. baseline used by jurisdictions for retail
      price verification. Handbook 130 directly governs shelf, display, and point-of-sale price-comparison workflow expectations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-general-specifications
    title: GS1 General Specifications Standard
    publisher: GS1
    source_type: recognized workflow reference tied directly to the lane
    location: https://ref.gs1.org/standards/genspecs/24.0.0/
    authority_reason: GS1 is the recognized global standards body for retail identifiers and barcode data. The General Specifications
      define how GTIN, data carriers, and barcode practices should link beauty items across product master, shelf, POS, and
      order systems.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gs1-gdm-beauty-personal-care
    title: GS1 Global Data Model Attribute Implementation Guideline
    publisher: GS1
    source_type: recognized workflow reference tied directly to the lane
    location: https://ref.gs1.org/guidelines/gdm-implementation/
    authority_reason: GS1's Global Data Model guideline is the vendor-neutral workflow reference for beauty and personal care
      attributes, data pools, GTIN-linked product content, and SPF attribute handling, which helps keep beauty retail execution
      tied to named product artifacts instead of generic item records.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: beauty-product-labeling-and-display-controls
    retrieval_policy: Use FDA labeling sources first when the workflow turns on ingredient declarations, Drug Facts, warning
      text, shade-line packaging, display-unit leaflets, or off-package labeling evidence.
    specialty_specific_exceptions:
    - Do not convert public labeling rules into final legal signoff or relabeling authority for the lane.
  - category: beauty-assortment-classification-and-boundaries
    retrieval_policy: Use FDA cosmetic-versus-drug guidance when the request may cross from ordinary beauty retail into OTC-drug,
      therapeutic-claim, or non-cosmetic handling.
    specialty_specific_exceptions:
    - Escalate when a product class or claim changes the authority boundary.
  - category: pricing-promotion-and-omnichannel-commitments
    retrieval_policy: Use FTC order and advertising guidance plus NIST price-verification standards when the workflow touches
      advertised price, sale signage, promo claims, ship timing, pickup timing, or shelf-versus-POS conflicts.
    specialty_specific_exceptions:
    - Escalate when state or local pricing, raincheck, or return rules materially narrow the public federal or NIST baseline.
  - category: item-identity-and-product-master-linkage
    retrieval_policy: Use GS1 standards for GTIN, barcode, data-carrier, and beauty-attribute integrity across PIM, planogram,
      POS, OMS, and inventory records.
    specialty_specific_exceptions:
    - Treat missing shade, GTIN, or attribute linkage as a blocker rather than inferring identity from partial records.
  - category: recall-stop-sale-and-safety-boundary-handling
    retrieval_policy: Use FDA recall guidance first whenever a beauty product enters stop-sale, withdrawal, recall, or safety-escalation
      handling.
    specialty_specific_exceptions:
    - Do not convert recall guidance into independent recall-classification, product-safety, or public-health authority for
      the lane.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use FDA sources as the beauty-specific public baseline for product class, labeling, recall, and evidence handling.
    - Use FTC and NIST sources as the public baseline for advertised pricing, sale claims, online order timing, and shelf-to-POS
      price verification.
    - Use GS1 sources for GTIN, barcode, product master, data-pool, and beauty-attribute record linkage.
    - Inject tenant-specific tester hygiene, used-cosmetics returns, franchise exceptions, promo approvals, loyalty rules,
      and OTC assortment policies only through orchestrator-controlled retrieval.
    - Escalate when jurisdiction, product mix, or tenant policy materially changes the safe answer.
  specialty_specific_exceptions:
  - Keep the lane on retail execution state, evidence sufficiency, and routing rather than regulatory interpretation, diagnosis,
    or final product-safety decisions.
  - Do not require expiration dates on every cosmetic item as the default public baseline; require them only when product
    class, tenant policy, or jurisdiction makes them controlling.
  - Do not treat testers, display charts, ingredient leaflets, shade lines, or Drug Facts panels as interchangeable with generic
    shelf tags.
  - Do not infer completion from customer communication or floor appearance alone; closure still requires authoritative POS,
    OMS, display, or disposition evidence.
  next_review_due_at: '2026-07-09'
