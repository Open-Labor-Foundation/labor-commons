    publisher: Securities and Exchange Commission / eCFR
    source_type: evidence-and-control-standard
    location: https://www.ecfr.gov/current/title-17/chapter-II/part-270/section-270.31a-4
    authority_reason: This SEC rule is the authoritative public recordkeeping baseline for fair-value documentation and board-report
      support and therefore constrains how the lane handles price challenges, valuation designee evidence, and fair-value
      escalations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: dtcc-fundserv
