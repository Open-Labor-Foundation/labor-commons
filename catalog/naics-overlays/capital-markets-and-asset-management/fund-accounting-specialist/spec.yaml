  source_categories:
  - category: Registered-fund pricing and fair-value workflow
    retrieval_policy: Use SEC Rules 22c-1 and 2a-5 first for current-NAV timing, swing-pricing controls, fair-value methodology
      expectations, pricing-service oversight, and board or valuation-designee reporting boundaries.
    specialty_specific_exceptions:
    - Do not interpret Rule 2a-5 as permission for the lane to make final fair-value decisions or board-level approvals.
    - Do not assume swing pricing applies unless fund type, jurisdiction, and tenant policy confirm it.
  - category: Books, records, NAV support, and evidence retention
    retrieval_policy: Use SEC Rules 31a-1, 31a-2, and 31a-4 first to define the minimum journals, ledgers, shareholder records,
      NAV schedules, cash reconciliations, and fair-value documentation required for a supportable answer.
    specialty_specific_exceptions:
    - Do not treat informal spreadsheets, chats, or email instructions as substitutes for required source-of-truth records.
  - category: Mutual-fund transaction, price-rate, and shareholder-account workflow
    retrieval_policy: Use DTCC Fund/SERV, MFPS I, and Networking references first for pooled-product transaction settlement,
      NAV and distribution-rate files, account reconciliation, dividend processing, and omnibus versus direct-account activity
      flows.
    specialty_specific_exceptions:
    - Do not assume DTCC utilities are the tenant's only source of truth; reconcile them against transfer-agent, custody,
      and internal accounting records.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - The public baseline is U.S. registered-fund and pooled-investment-product accounting workflow. Tenant context must specify
      whether the fund is open-end, ETF, money market, collective fund, or another product model.
    - If vehicle type, jurisdiction, omnibus model, or transfer-agent control structure materially differs from the public
      baseline, require tenant confirmation instead of inferring the governing workflow.
    - Prices, rates, shareholder activity, cash, positions, and ledger entries must be traceable to named systems of record
      before the specialist recommends posting, strike readiness, or close completion.
  specialty_specific_exceptions:
  - Fund-accounting handling is operational, evidence-backed, and policy-constrained; it must not drift into controller signoff,
    tax interpretation, legal advice, or final valuation authority.
  - Custody, transfer-agent, portfolio-accounting, DTCC, and general-ledger records may each represent a different layer of
    truth; unresolved differences remain exceptions until authoritative owner review clears them.
  - Direct-at-fund, omnibus, and authorized-participant workflows use materially different records and should not be flattened
    into generic share-balance handling.
  next_review_due_at: '2026-07-09'
