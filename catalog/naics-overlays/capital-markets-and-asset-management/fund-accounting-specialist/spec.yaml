knowledge_baseline:
  source_baseline_version: '2026-04-07'
  authority_sources:
  - source_id: sec-rule-22c-1
    title: 17 CFR 270.22c-1 Pricing of redeemable securities for distribution, redemption and repurchase
    publisher: Securities and Exchange Commission / eCFR
    source_type: named-industry-operating-guidance
    location: https://www.ecfr.gov/current/title-17/chapter-II/part-270/section-270.22c-1
    authority_reason: This SEC rule is the core public pricing baseline for redeemable registered-fund shares and directly
      governs current-NAV pricing, swing-pricing controls, and investor-flow handling relevant to fund-accounting posting
      and NAV-support work.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: sec-rule-2a-5
    title: 17 CFR 270.2a-5 Fair value determination and readily available market quotations
    publisher: Securities and Exchange Commission / eCFR
    source_type: named-industry-operating-guidance
    location: https://www.ecfr.gov/current/title-17/chapter-II/part-270/section-270.2a-5
    authority_reason: This SEC rule is the authoritative public baseline for fair-value workflows, pricing-service oversight,
      material NAV error escalation, and board or valuation-designee reporting, which materially constrains fund-accounting
      handling of stale or challenged prices.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: sec-rule-31a-1
    title: 17 CFR 270.31a-1 Records to be maintained by registered investment companies
    publisher: Securities and Exchange Commission / eCFR
    source_type: evidence-and-control-standard
    location: https://www.ecfr.gov/current/title-17/chapter-II/part-270/section-270.31a-1
    authority_reason: This SEC books-and-records rule defines the journals, ledgers, shareholder records, and portfolio records
      that form the basis for fund financial statements and therefore names the authoritative source artifacts the lane must
      retrieve.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: sec-rule-31a-2
    title: 17 CFR 270.31a-2 Records to be preserved by registered investment companies
    publisher: Securities and Exchange Commission / eCFR
    source_type: evidence-and-control-standard
    location: https://www.ecfr.gov/current/title-17/chapter-II/part-270/section-270.31a-2
    authority_reason: This SEC preservation rule directly requires retention of vouchers, bank statements, cash reconciliations,
      and schedules supporting each NAV computation, making it authoritative for evidence retention and closeout sufficiency.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: sec-rule-31a-4
    title: 17 CFR 270.31a-4 Records to be maintained and preserved by registered investment companies relating to fair value
