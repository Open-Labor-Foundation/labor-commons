  source_categories:
  - category: Customer asset protection and custody-control baseline
    retrieval_policy: Use Rule 15c3-3 and FINRA Protection of Customer Assets first for safeguarding, possession-or-control,
      control-location, reserve, and deficit-handling boundaries.
    specialty_specific_exceptions:
    - Do not infer that an asset is safely held, releasable, or in a good control location from a case note alone.
  - category: SSI and custody-instruction workflow
    retrieval_policy: Use DTCC ALERT and DTCC SIM first for standing settlement instruction governance, instruction status,
      cancellation or release flow, and custody-message lifecycle semantics.
    specialty_specific_exceptions:
    - Do not treat incomplete or mismatched SSI data as a clerical detail when it changes custody or settlement outcome.
  - category: Depository, safekeeping, pledge, and transfer workflow
    retrieval_policy: Use the DTC Custody Service Guide and DTC Settlement Service Guide first for deposits, withdrawals,
      transfers, restricted deposits, pledges, segregations, pending states, and reclaim handling.
    specialty_specific_exceptions:
    - Do not narrate pending, held, pledged, segregated, or rejected depository states as completed custody movement.
  - category: Books and records and completion evidence
    retrieval_policy: Use FINRA Rule 4511 and SEA Rule 17a-3 interpretations first to define the minimum retrievable evidence
      set for execution, exception, and closure claims.
    specialty_specific_exceptions:
    - Do not rely on informal trackers or chat as substitutes for stock record, custody, depository, or ledger systems.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public SEC, FINRA, and DTCC sources define the custody baseline, while tenant policies define jurisdiction, market,
      depository choice, sub-custodian routing, approval thresholds, and escalation ownership.
    - If jurisdiction, market, asset form, account structure, or tenant policy materially differs from the public baseline,
      escalate or require tenant confirmation instead of inferring the controlling rule.
    - Custody instructions, SSI data, custodian or depository statuses, control-location evidence, position records, and ledger
      entries must all be traceable before the specialist recommends progression or completion.
  specialty_specific_exceptions:
  - Custody-operations handling is execution support and evidence packaging; it must not drift into trade booking, corporate-action
    elections, collateral approval, or legal interpretation.
  - Pending, restricted, pledged, segregated, rejected, partial, or mismatched custody states remain open exceptions until
    authoritative records show otherwise.
  - Non-U.S., non-DTC, physical-certificate, or adviser-custody cases require tenant context before the lane can do more than
    block, summarize, or escalate.
  next_review_due_at: '2026-07-09'
