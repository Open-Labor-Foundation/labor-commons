  domain_research_summary: "Financial planning and analysis in capital markets and asset management focuses on budgeting, forecasting, variance analysis, and scenario modeling for investment portfolios and funds. Key regulatory frameworks include SEC rules on performance fees (IA-1092), FINRA account recordkeeping (Rule 4512), and CFA Institute ethical standards. Accounting standards (IFRS 9, FASB 157) govern valuation and impairment. Transfer agent regulations (SEC) support settlement and corporate action timelines. The specialty requires precise use of industry lexicon (NAV, AUM, expense ratio, performance fees, hurdle rates, high-water marks, capital calls, distributions, IRR, MOIC, VaR) and avoids investment recommendations, legal/tax interpretation, payment approvals, and accounting overrides."
evaluation:
  scenarios:
  - scenario_id: variance-analysis-material-deviation
    description: "Actual management fees exceed budget by 15% for a flagship equity fund; determine if variance is material, explain causes, and route appropriately."
    inputs:
    - Budget: $2,000,000 management fees
    - Actual: $2,300,000 management fees
    - AUM growth data: +20% vs. forecast +10%
    - Fee schedule: 1% of AUM
    expected_outputs:
    - Variance explanation: "Fee variance primarily due to higher-than-forecast AUM growth; actual AUM $230M vs. forecast $200M."
    - Materiality decision: "Variance is material (>10% threshold) but explained by AUM growth; no escalation required."
    - Updated forecast: "Revise forecast to $2,300,000 based on current AUM."
  - scenario_id: capital-call-liquidity-scenario
    description: "Model liquidity impact of a $50M capital call for a private equity fund given current cash positions and redemption schedule."
    inputs:
    - Current cash: $30M
    - Upcoming redemptions: $20M next month
    - Capital call notice: $50M due in 45 days
    - Credit line availability: $40M
    expected_outputs:
    - Liquidity gap analysis: "Projected cash shortfall of $40M ($30M + $40M credit - $20M - $50M)."
    - Scenario package: "Recommend drawing $40M credit line and delaying non-essential expenditures."
    - Exception flag: "No exception; scenario within planned parameters."
  - scenario_id: performance-fee-calculation-support
    description: "Calculate performance fee for a hedge fund with a 20% fee, 8% hurdle rate, and high-water mark provision."
    inputs:
    - Beginning NAV: $100M
    - Ending NAV: $115M
    - High-water mark: $105M
    - Hurdle rate: 8% annual
    - Management fee: 2% already paid
    expected_outputs:
    - Performance fee calculation: "Performance fee = 20% * ($115M - max($105M, $100M * 1.08)) = 20% * ($115M - $108M) = $1.4M."
    - Supporting documentation: "Calculation based on SEC IA-1092 and fund governing documents."
    - Routing note: "Fee calculation within scope; send to fund accounting for booking."
  evaluation_results:
    last_evaluated_at: '2026-07-07'
    scenario_coverage_percent: 100
    authority_source_coverage_percent: 100
    readiness_verdict: "Specification complete and ready for market-ready packaging; all authority sources validated, scenarios defined, adjacent specialties mapped, and materialization expectations documented."
