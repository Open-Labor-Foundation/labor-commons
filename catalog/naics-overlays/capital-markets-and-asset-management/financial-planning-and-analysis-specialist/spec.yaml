domain_lexicon:
  NAV: Net Asset Value – total value of a fund's assets minus liabilities, used for pricing and reporting.
  AUM: Assets Under Management – total market value of assets a firm manages on behalf of clients.
  expense ratio: Annual fee expressed as a percentage of AUM covering management and operational costs.
  management fee: Fee charged by asset managers for investment management services, typically a percentage of AUM.
  performance fee: Fee based on investment performance, often subject to hurdle rates and high-water marks.
  carried interest: Share of profits paid to fund managers as incentive compensation.
  hurdle rate: Minimum rate of return a fund must achieve before performance fees are charged.
  high-water mark: Highest NAV per share a fund has achieved; performance fees are only paid on gains above this mark.
  lock-up period: Time during which investors cannot redeem their shares from a fund.
  redemption notice: Formal request by an investor to withdraw capital from a fund.
  drawdown: Capital call where investors commit capital to a fund over time.
  commitment: Total amount of capital an investor agrees to provide to a fund.
  capital call: Request by a fund manager for investors to provide committed capital.
  distribution waterfall: Sequence in which profits are distributed among investors and fund managers.
  IRR: Internal Rate of Return – annualized rate of return on an investment.
  MOIC: Multiple on Invested Capital – total value returned divided by total invested.
  TVPI: Total Value to Paid-In – ratio of total value to capital called.
  DPI: Distributions to Paid-In – ratio of distributions received to capital called.
  RVPI: Residual Value to Paid-In – ratio of remaining value to capital called.
  Sharpe ratio: Risk-adjusted return measure comparing excess return to volatility.
  Sortino ratio: Risk-adjusted return measure focusing on downside volatility.
  alpha: Excess return of an investment relative to a benchmark.
  beta: Measure of an investment's volatility relative to the market.
  tracking error: Standard deviation of excess returns relative to a benchmark.
  VaR: Value at Risk – estimate of potential loss over a specified time horizon at a given confidence level.
common_artifacts:
- Budget vs. actual variance report
- Rolling 12-month forecast model
- Capital call and distribution schedule
- Liquidity projection dashboard
- Expense allocation and attribution summary
- Scenario analysis memo
- Planning exception log
common_tools:
- Spreadsheet software (Excel, Google Sheets)
- Financial planning and analysis platforms (Adaptive Insights, Anaplan)
- Portfolio accounting systems (Bloomberg, Advent Geneva)
- Performance measurement systems (FactSet, Morningstar)
- Business intelligence and visualization tools (Tableau, Power BI)
- Market data feeds (Bloomberg, Refinitiv)
implementation:
  runtime_strategy: spec_only
  promotion_path: "If usage proves common enough and the spec demonstrates stable, safe operation across multiple tenants,\n    a trusted built package can be created by the commons-crew PA. Promotion requires:\n    - Validation of all authority sources and domain lexicon against current regulations\n    - Completion of integration tests with adjacent specialists\n    - Documentation of materialization assumptions and tenant-supplied data requirements\n    - Approval from the domain governance board for capital-markets-and-asset-management"
  materialization_expectations:
    required_task_and_boundary_metadata:
    - Portfolio and fund identifiers
    - Budget and forecast template versions
    - Variance tolerance thresholds
    - Escalation routing rules
    assumptions_tenant_supplied_or_retrieved:
    - Market data sources and refresh schedules
    - Accounting close calendars and NAV publication dates
    - Fee and expense calculation methodologies
    - Capital call and distribution policies
    regulated_lane_caveats:
    - Must comply with SEC advertising and performance presentation rules (e.g., GIPS standards)
    - Must avoid misrepresentation of past or projected performance
    - Must maintain records supporting planning assumptions and variance explanations
    conditions_requiring_refusal_or_orchestrator_return:
    - Missing or contradictory market data, accounting records, or performance metrics
    - Requests for investment recommendations or trading signals
    - Attempts to override accounting entries or performance calculations
    - Legal or tax interpretation requests
