domain_lexicon:
  - term: AUM
    definition: Assets Under Management; the total market value of assets that an investment firm manages on behalf of clients.
  - term: expense ratio
    definition: The annual fee expressed as a percentage of AUM that covers operating expenses of a fund.
  - term: management fee
    definition: A fee charged by an investment manager for managing an investment portfolio, typically a percentage of AUM.
  - term: performance fee
    definition: A fee charged by an investment manager based on the investment performance of the portfolio, often subject to a high-water mark.
  - term: NAV
    definition: Net Asset Value; the value per share of a fund, calculated as total assets minus total liabilities divided by number of shares outstanding.
  - term: rolling forecast
    definition: A forecasting process that is continuously updated by adding a new period as the most recent period is completed.
  - term: variance analysis
    definition: The process of comparing actual financial results to budgeted or forecasted amounts and explaining the differences.
  - term: capital call
    definition: A request by a fund manager to investors for a portion of the capital they have committed to the fund.
  - term: distribution waterfall
    definition: The method by which capital is distributed to investors and the fund manager, specifying the order and priority of payments.
common_artifacts:
  - artifact: Budget model
    description: Spreadsheet or software model detailing projected revenues, expenses, and capital allocations for a future period.
  - artifact: Forecast package
    description: A set of documents presenting updated financial projections, assumptions, and key drivers.
  - artifact: Variance report
    description: Analysis comparing actual results to budget/forecast, with explanations for significant variances.
  - artifact: Management dashboard
    description: Visual summary of key financial and operational metrics for executive review.
  - artifact: Board presentation
    description: Comprehensive deck for board of directors covering financial performance, forecasts, and strategic initiatives.
common_tools:
  - tool: Excel/Google Sheets
    purpose: Financial modeling, budgeting, and ad-hoc analysis.
  - tool: Adaptive Insights, Anaplan, or similar FP&A software
    purpose: Enterprise planning, forecasting, and reporting.
  - tool: Power BI, Tableau, or similar BI platform
    purpose: Data visualization and dashboard creation.
  - tool: General ledger and ERP systems (e.g., SAP, Oracle)
    purpose: Source financial data extraction.
  - tool: Portfolio accounting systems (e.g., Advent, Charles River)
    purpose: Investment performance and holding data.
implementation:
  runtime_strategy: spec_only
  promotion_path: |
    This overlay may be promoted to a trusted built package after:
    1. Usage patterns show consistent demand across multiple tenants.
    2. Common implementation patterns (e.g., integration with specific GL systems, forecast templates) are validated.
    3. Authority sources remain current and no material regulatory changes affect the lane.
    4. A build pipeline is established with versioning, testing, and rollback capabilities.
  materialization_notes: |
    Required task and boundary metadata:
    - Tenant must supply chart of accounts mapping, fiscal calendar, and reporting hierarchy.
    - Source system connectivity (GL, portfolio accounting) must be configured with appropriate data extraction schedules.
    - Forecast assumptions (e.g., market growth rates, fee schedules) must be tenant-supplied or retrieved from market data feeds.

    Assumptions that must be tenant-supplied or retrieved at runtime:
    - Organizational structure (funds, business units, cost centers).
    - Historical financial data (minimum 2-3 years for trend analysis).
    - Management reporting calendar and approval workflows.
    - Currency and consolidation rules for multi-currency entities.

    Regulated-lane caveats:
    - Financial forecasts and reports must not be presented as guaranteed performance.
    - Use of benchmarks must comply with GIPS and local regulations.
    - Data retention must meet SEC/FINRA recordkeeping requirements.

    Conditions that require refusal or orchestrator return:
    - Source financial data is incomplete, unvalidated, or from unauthorized systems.
    - Request involves creating audited financial statements or regulatory filings.
    - Request requires approval of budgets or authorization of expenditures.
    - Market data feeds are unavailable for critical forecasting assumptions.
  deployment_notes: |
    Market-ready deployment considerations:
    - Package should be deployed as a versioned artifact with clear release notes.
    - Rollback plan must include reverting to previous spec version and notifying users.
    - Monitoring should track forecast accuracy, report generation latency, and user adoption.

    Commercialization positioning:
    - Position as a specialized FP&A assistant for investment firms and asset managers, reducing manual effort in budgeting, forecasting, and performance reporting.
    - Highlight integration with industry-standard data sources and compliance with relevant regulations.
    - Package can be offered as part of a broader capital-markets automation suite.

    Runtime strategy clarification:
    - This spec is market-ready but runtime may remain `spec_only` until a trusted built package is explicitly promoted.
    - `spec_only` mode allows tenants to evaluate the lane's boundaries and outputs without full automation.
    - Promotion to built package requires validation of implementation patterns and establishment of build/deploy pipeline.
