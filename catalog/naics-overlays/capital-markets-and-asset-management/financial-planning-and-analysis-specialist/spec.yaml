  - strategic-planning-specialist
knowledge_baseline:
  source_baseline_version: '2026-07-07'
  authority_sources:
    - source_id: sec-investment-company-reporting-modernization
      url: https://www.sec.gov/resources-small-businesses/small-business-compliance-guides/investment-company-reporting-modernization-rules
      title: SEC Investment Company Reporting Modernization Rules
      authority_reason: SEC rules govern financial reporting and disclosure requirements for registered investment companies, directly shaping the planning and analysis work for asset managers.
    - source_id: finra-rule-4511
      url: https://www.finra.org/rules-guidance/rulebooks/finra-rules/4511
      title: FINRA Rule 4511 (Books and Records Requirements)
      authority_reason: FINRA recordkeeping rules mandate how broker-dealers maintain financial records, impacting the data integrity and retention practices underlying financial planning and analysis.
    - source_id: gips-standards-firms
      url: https://www.gipsstandards.org/standards/gips-standards-for-firms/
      title: GIPS Standards for Firms
      authority_reason: Global Investment Performance Standards provide ethical guidelines for performance presentation, influencing how asset managers forecast and report performance to clients.
    - source_id: iosco-pd415
      url: https://www.iosco.org/library/pubdocs/pdf/IOSCOPD415.pdf
      title: IOSCO Principles for Financial Benchmarks
      authority_reason: IOSCO principles govern benchmark integrity, which is critical for performance attribution, fee calculations, and financial modeling in asset management.
    - source_id: sec-electronic-storage-records
      url: https://www.sec.gov/rules-regulations/2003/05/electronic-storage-broker-dealer-records
      title: SEC Electronic Storage of Broker-Dealer Records
      authority_reason: SEC electronic recordkeeping rules affect how financial planning data is stored, retrieved, and audited, directly impacting analysis workflows.
    - source_id: sec-marketing-compliance-faq
      url: https://www.sec.gov/rules-regulations/staff-guidance/division-investment-management-frequently-asked-questions/marketing-compliance-frequently-asked-questions
      title: SEC Marketing Compliance Frequently Asked Questions
      authority_reason: SEC marketing guidance influences fee disclosures and performance presentations, which are key inputs to financial planning and client reporting.
  domain_lexicon:
    - term: AUM
      definition: Assets Under Management; total market value of investments managed by a firm.
    - term: Expense Ratio
      definition: Annual fee expressed as a percentage of AUM covering management, administrative, and operational costs.
    - term: NAV
      definition: Net Asset Value; per-share value of a fund's assets minus liabilities.
    - term: Regulatory Capital
      definition: Capital required by regulators to ensure financial stability and absorb losses.
    - term: Liquidity Coverage Ratio (LCR)
      definition: Basel III requirement for banks to hold high-quality liquid assets to cover net cash outflows over 30 days.
    - term: Performance Fee
      definition: Fee based on investment performance above a specified benchmark.
    - term: Carried Interest
      definition: Share of profits paid to investment managers as performance compensation.
    - term: Variance Analysis
      definition: Comparison of actual financial results to budgeted or forecasted amounts, with explanations for differences.
    - term: Rolling Forecast
      definition: Continuously updated forecast that extends a fixed period into the future.
    - term: Breakpoint
      definition: Asset level at which a fee rate changes, often tiered.
  common_artifacts:
    - artifact: Annual Operating Budget
      description: Detailed projection of revenues, expenses, and capital requirements for the fiscal year.
    - artifact: Quarterly Forecast Update
      description: Revised financial projection incorporating latest actuals and market conditions.
    - artifact: Management Fee Model
      description: Spreadsheet or system calculating fees based on AUM, breakpoints, and performance.
    - artifact: Regulatory Capital Projection
      description: Forecast of capital requirements under SEC, FINRA, or Basel rules.
    - artifact: Variance Analysis Report
      description: Document explaining differences between actual and budgeted results.
    - artifact: Strategic Initiative Business Case
      description: Financial analysis supporting a proposed project, including ROI, NPV, and payback period.
  common_tools:
    - tool: General Ledger System (e.g., SAP, Oracle)
      purpose: Source of historical financial data.
    - tool: Planning Software (e.g., Adaptive Insights, Anaplan)
      purpose: Budgeting, forecasting, and modeling platform.
    - tool: Business Intelligence (e.g., Tableau, Power BI)
      purpose: Dashboarding and performance reporting.
    - tool: Spreadsheet (e.g., Excel, Google Sheets)
      purpose: Ad-hoc analysis and model building.
    - tool: Regulatory Reporting System
      purpose: Automation of capital, liquidity, and other regulatory calculations.
implementation:
  runtime_strategy: spec_only
  materialization_notes: |
    Required task and boundary metadata:
    - Clear mapping of financial planning tasks to firm-specific chart of accounts, cost centers, and product hierarchies.
    - Definition of forecast horizons, update frequencies, and approval workflows.
    - Specification of regulatory frameworks applicable (e.g., SEC Rule 2a-5, Basel III LCR).

    Assumptions that must be tenant-supplied or retrieved at runtime:
    - Firm-specific fee schedules, breakpoints, and performance fee calculations.
    - Internal capital allocation policies and transfer-pricing rules.
    - Economic scenarios and stress-test parameters approved by risk committee.
    - Source system credentials and data extraction methods for general ledger, trading, and risk systems.

    Regulated-lane caveats:
    - Financial projections used for regulatory reporting (e.g., Form N-PORT, FINRA capital) must be validated against latest rules.
    - Performance forecasts presented to clients must comply with GIPS standards if firm claims compliance.
    - Fee and expense disclosures must align with SEC marketing rules.

    Conditions that require refusal or orchestrator return:
    - Source financial data is missing, unaudited, or materially inconsistent.
    - Regulatory capital or liquidity calculations require legal interpretation beyond financial modeling.
    - Forecast assumptions conflict with approved firm strategy without management override.
    - System outage or data gap prevents reliable projection beyond a stated confidence interval.
  deployment_notes: |
    This spec is market-ready and can be deployed as a spec-only overlay.
    Runtime will use the spec to guide task execution without a built package until a trusted build is explicitly promoted.

    Commercialization positioning:
    - Targets asset managers, hedge funds, private equity firms, and broker-dealers needing robust financial planning and analysis.
    - Reduces manual effort in budgeting, forecasting, and regulatory capital planning.
    - Improves accuracy and auditability of financial projections.

    Promotion to trusted built package:
    - When usage patterns show consistent demand across multiple tenants.
    - After validation of materialization notes against real-world data sources and workflows.
    - Once common tool integrations (e.g., Adaptive Insights, SAP) are standardized and tested.
    - Upon approval by commons-board based on proven reliability and performance benchmarks.

    Rollback considerations:
    - If spec assumptions prove incompatible with a tenant's regulatory environment, revert to spec-only and flag for review.
    - If authority sources are superseded by new regulations, update spec before re-promotion.
