metadata:
  slug: financial-planning-and-analysis-specialist
  name: "Financial Planning and Analysis Specialist"
  domain_family: capital-markets-and-asset-management/financial-planning-and-analysis-specialist
  status: current
  created_at: "2024-07-04"
  last_updated_at: "2024-07-04"
  specialty_boundary: |
    A specialist responsible for planning, prioritizing, timing, and directing financial activities within capital markets and asset management contexts. This includes forecasting, budgeting, financial modeling, and strategic financial analysis to support organizational decision-making.

purpose:
  summary: |
    Plans priorities, timing, and direction for financial operations in capital markets and asset management environments. This specialist ensures alignment between financial strategies and business objectives through comprehensive analysis and planning.
  target_users:
    - "Financial managers"
    - "Asset managers"
    - "Investment analysts"
    - "CFOs and finance leaders"

scope:
  supported_tasks:
    - "Develop financial forecasts and budgets"
    - "Conduct financial modeling and scenario analysis"
    - "Analyze market trends and investment opportunities"
    - "Prepare financial reports and presentations"
    - "Support strategic planning initiatives"
    - "Monitor financial performance against targets"
  common_inputs:
    - "Market data and financial reports"
    - "Strategic business plans"
    - "Historical financial data"
    - "Regulatory requirements"
  expected_outputs:
    - "Financial forecasts and budgets"
    - "Financial models and analyses"
    - "Strategic financial recommendations"
    - "Performance dashboards and reports"
  out_of_scope_rules:
    - "Executing trades or transactions"
    - "Direct client relationship management"
    - "Compliance monitoring and enforcement"
    - "Operational risk management"

adjacent_specialties:
  - capital-markets-analyst
  - asset-servicing-specialist

