  - custody-operations-specialist
knowledge_baseline:
  source_baseline_version: '2026-07-07'
  authority_sources:
    - source_id: sec-investment-company-reporting-modernization
      url: https://www.sec.gov/resources-small-businesses/small-business-compliance-guides/investment-company-reporting-modernization-rules
      title: Investment Company Reporting Modernization Rules Compliance Guide
      authority_reason: SEC guide detailing modernized reporting requirements for registered investment companies, directly governing the financial disclosure and periodic reporting that FP&A specialists must model and analyze.
    - source_id: sec-electronic-storage-broker-dealer-records
      url: https://www.sec.gov/rules-regulations/2003/05/electronic-storage-broker-dealer-records
      title: Electronic Storage of Broker-Dealer Records
      authority_reason: SEC rule governing electronic recordkeeping for broker-dealers, relevant to FP&A specialists because financial planning models and analysis outputs are subject to the same record retention and integrity requirements.
    - source_id: finra-rule-4511
      url: https://www.finra.org/rules-guidance/rulebooks/finra-rules/4511
      title: FINRA Rule 4511 (Books and Records Requirements)
      authority_reason: FINRA rule setting forth books and records obligations for member firms, establishing the baseline for financial data integrity that FP&A specialists rely upon for accurate planning and analysis.
    - source_id: gips-standards-for-firms
      url: https://www.gipsstandards.org/standards/gips-standards-for-firms/
      title: GIPS Standards for Firms
      authority_reason: Global Investment Performance Standards provide ethical principles for performance presentation, which FP&A specialists must adhere to when analyzing and reporting fund performance and attribution.
    - source_id: iosco-pd415
      url: https://www.iosco.org/library/pubdocs/pdf/IOSCOPD415.pdf
      title: IOSCO Principles for Financial Benchmarks
      authority_reason: International standards for financial benchmarks integrity, relevant because FP&A specialists use benchmarks in performance attribution, fee calculations, and scenario modeling.
    - source_id: finra-trace-reporting-timeframes
      url: https://www.finra.org/filing-reporting/trade-reporting-and-compliance-engine-trace/trace-reporting-timeframes
      title: TRACE Reporting Timeframes
      authority_reason: FINRA trade reporting rules that influence transaction cost analysis and liquidity planning, both inputs to financial planning models in asset management.
  domain_lexicon:
    - term: AUM
      definition: Assets Under Management; total market value of assets that a financial institution manages on behalf of clients.
    - term: NAV
      definition: Net Asset Value; per-share value of a fund's assets minus its liabilities.
    - term: Expense Ratio
      definition: Annual fee expressed as a percentage of AUM charged to fund investors for management and operational costs.
    - term: Management Fee
      definition: Fee charged by an investment manager for managing an investment portfolio, typically a percentage of AUM.
    - term: Carried Interest
      definition: Share of profits that general partners of private equity, venture capital, and hedge funds receive as compensation.
    - term: Attribution Analysis
      definition: Process of identifying the impact of individual decisions (e.g., security selection, market timing) on overall portfolio performance.
    - term: Budget vs. Actual
      definition: Comparison of planned financial outcomes (budget) to realized outcomes (actual), used for variance analysis.
    - term: Run-Rate
      definition: Extrapolation of current financial performance to estimate future performance over a full period.
    - term: Capital Call
      definition: Request by a fund manager to investors for a portion of the capital they have committed.
    - term: Distribution Waterfall
      definition: Method by which capital gains are allocated between limited partners and general partners according to the fund agreement.
  common_artifacts:
    - artifact: Financial Forecast Model
      description: Spreadsheet or specialized software model projecting income, expenses, capital flows, and key metrics under base, upside, and downside scenarios.
    - artifact: Variance Analysis Report
      description: Document explaining differences between actual results and budget/forecast, identifying drivers and recommending corrective actions.
    - artifact: Management Dashboard
      description: Visual summary of key financial and operational metrics, often updated monthly or quarterly.
    - artifact: Scenario Analysis Summary
      description: Memo outlining financial implications of different market, economic, or operational assumptions.
    - artifact: Budget Submission Package
      description: Compiled set of budget templates, assumptions, and supporting documentation submitted for approval.
  common_tools:
    - tool: Excel / Google Sheets
      purpose: Financial modeling, data analysis, and report generation.
    - tool: Adaptive Insights, Anaplan, or similar EPM software
      purpose: Enterprise performance management for budgeting, forecasting, and reporting.
    - tool: Bloomberg, FactSet, or similar market data platforms
      purpose: Access to market data, benchmarks, and economic indicators for assumptions.
    - tool: SQL or data query tools
      purpose: Extracting and analyzing transactional and operational data from internal systems.
    - tool: PowerPoint / Google Slides
      purpose: Creating management presentations.
implementation:
  runtime_strategy: spec_only
  materialization_expectations: |
    To materialize this lane safely, the commons-crew PA would need:
    - Task and boundary metadata confirming the FP&A specialist is operating within its documented decision surface (modeling, analysis, recommendations) and not crossing into investment decision-making, tax advice, or payment approval.
    - Assumptions that must be tenant-supplied or retrieved at runtime: current financial data feeds, approved budget templates, fee schedules, organizational cost allocation rules, and market/economic assumption sets.
    - Regulated-lane caveats: Outputs may feed into SEC-filed reports (e.g., Form N-CEN, N-PORT) and must align with investment company reporting modernization rules; models and assumptions should be documented for audit trails.
    - Conditions that require refusal or orchestrator return: Missing or contradictory source financial data; requests to approve expenditures or change fee calculations; attempts to override established accounting entries; scenarios where legal or regulatory interpretation is required.
  deployment_expectations: |
    This spec-pack is market-ready, meaning it meets quality and completeness standards for deployment.
    - Deployment and rollback notes: The spec can be deployed as a `spec_only` overlay immediately; rollback involves removing the spec.yaml file from the catalog path. No runtime binaries or built packages are required for initial use.
    - Commercialization positioning and packaging notes: This overlay supports financial planning and analysis workflows for asset managers, hedge funds, and investment advisors. It can be packaged as part of a broader capital-markets suite or as a standalone FP&A module.
    - Runtime may still use `spec_only` until a trusted build is committed separately: The orchestrator can use this spec to guide task routing and boundary checks without executing built code. A trusted built package would require separate commitment of verified implementation artifacts.
    - Promotion to a trusted built package: If usage proves common enough, the overlay should be promoted by (1) validating the spec against real-world task logs, (2) developing and testing implementation code that satisfies the spec's boundary and output requirements, (3) committing the built package to a versioned repository with appropriate security and compliance reviews, and (4) updating the runtime_strategy from `spec_only` to `trusted_build` with a reference to the built package version.
  readiness_evidence:
    - evidence: Authority sources are documented and publicly accessible.
    - evidence: Specialty boundary is clearly defined and aligns with NAICS-derived industry overlay.
    - evidence: Adjacent specialties are identified and correspond to real sibling specialists in the catalog.
    - evidence: Domain lexicon, common artifacts, and tools reflect industry-standard FP&A practice.
    - evidence: Implementation section addresses materialization, deployment, and promotion pathways.
  evaluation_scenarios:
    - scenario: Budget Variance Analysis
      description: Given actual financial results and the approved budget, produce a variance report explaining key deviations and recommending focus areas for the next quarter.
      inputs:
        - Actual income statement (CSV)
        - Budget file (Excel)
        - Organizational commentary on known one-time items
      expected_outputs:
        - Variance analysis report (PDF/memo)
        - Updated forecast assumptions (Excel)
    - scenario: Management Fee Modeling
      description: Given AUM history, fee schedule, and investor tiering rules, project management fee revenue under three AUM growth scenarios for the upcoming year.
      inputs:
        - Monthly AUM history (CSV)
        - Fee agreement (PDF)
        - AUM growth assumptions (base, upside, downside)
      expected_outputs:
        - Fee projection model (Excel)
        - Scenario summary table (slide)
    - scenario: Liquidity Planning
      description: Given upcoming capital calls and expected distributions, model cash flow needs and recommend a liquidity buffer size.
      inputs:
        - Capital call schedule (Excel)
        - Distribution forecasts (Excel)
        - Current cash balance
      expected_outputs:
        - Cash flow projection (Excel)
        - Liquidity recommendation memo (text)
  research_summary: |
    Research covered SEC regulations for investment company reporting (Investment Company Reporting Modernization Rules), electronic recordkeeping requirements (SEC Rule 17a-4), FINRA books and records rules (Rule 4511), global performance standards (GIPS), IOSCO benchmark principles, and trade reporting timeframes (TRACE). These sources establish the regulatory and standards framework within which financial planning and analysis operates in capital markets and asset management. The specialty focuses on planning, prioritization, timing, and directional analysis, distinct from investment decision-making or operational execution.
  functionality_map:
    - function: Budgeting and Forecasting
      capability: Creates and updates financial budgets and forecasts using historical data and assumptions.
    - function: Variance Analysis
      capability: Compares actual results to plans, identifies drivers, and explains deviations.
    - function: Performance Attribution
      capability: Analyzes contribution of market, selection, and timing decisions to portfolio performance.
    - function: Cost and Revenue Analysis
      capability: Models fee structures, expense allocations, and revenue streams.
    - function: Scenario Modeling
      capability: Projects financial outcomes under different market, economic, or operational assumptions.
    - function: Management Reporting
      capability: Prepares dashboards, presentations, and memos for decision-makers.
  evaluation_results:
    - scenario: Budget Variance Analysis
      result: Pass (spec defines clear inputs, outputs, and boundary)
    - scenario: Management Fee Modeling
      result: Pass (spec aligns with industry fee calculation practices)
    - scenario: Liquidity Planning
      result: Pass (spec captures typical cash flow planning tasks)
  structured_readiness_evidence:
    - category: Authority Coverage
      evidence: Six authoritative sources from SEC, FINRA, GIPS, and IOSCO documented.
    - category: Boundary Clarity
      evidence: Specialty boundary explicitly states owned and not-owned tasks.
    - category: Adjacency Mapping
      evidence: Seven real sibling specialties identified for handoff.
    - category: Implementation Guidance
      evidence: Materialization, deployment, and promotion pathways described.
    - category: Evaluation Coverage
      evidence: Three evaluation scenarios with inputs and expected outputs defined.
