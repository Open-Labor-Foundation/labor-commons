# Treasury and Cash Management Specialist
# NAICS Overlay Spec Pack

agent_slug: treasury-and-cash-management-specialist
lane_type: naics-overlay
industry_lane: capital-markets-and-asset-management
naics_code: 522310

# Baseline role summary from issue
role_summary: "Manages lifecycle, priorities, and outcomes"

# Authority sources
authority_sources:
  - title: "Federal Reserve Board Cash Management Guidance"
    publisher: "Board of Governors of the Federal Reserve System"
    url: "https://www.federalreserve.gov/paymentsystems/fedfunds_about.htm"
    source_class: "Public servicing, payments, or policy workflow rules"
    authority_rationale: "Provides foundational guidance for cash management operations in the U.S. financial system"
    refresh_cadence: "As needed based on regulatory updates"
    decay_handling: "Monitor for changes to Fedwire and related payment systems"
  - title: "U.S. Department of the Treasury Cash Management Policy"
    publisher: "U.S. Department of the Treasury"
    url: "https://home.treasury.gov/policy-issues/cash-management"
    source_class: "Public policy and regulatory framework"
    authority_rationale: "Establishes federal cash management practices and policies"
    refresh_cadence: "Annually or as policy changes occur"
    decay_handling: "Review for updates to Treasury's cash management directives"
  - title: "SEC Regulation N-14"
    publisher: "Securities and Exchange Commission"
    url: "https://www.sec.gov/rules/interim/2019/33-10639.pdf"
    source_class: "Regulatory compliance and reporting requirements"
    authority_rationale: "Sets forth requirements for money market fund cash management practices"
    refresh_cadence: "As needed based on SEC rulemaking"
    decay_handling: "Monitor for any amendments or new interpretations"

# Runtime strategy
runtime_strategy: spec_only

# Deployment expectations
market_ready: true

# Materialization requirements
materialization:
  task_metadata:
    - name: "Cash Flow Forecasting"
      description: "Generate and maintain cash flow projections"
    - name: "Liquidity Management"
      description: "Ensure adequate liquidity for operational needs"
    - name: "Treasury Operations"
      description: "Manage treasury functions including investments and debt issuance"
  boundary_metadata:
    - name: "Regulatory Compliance Boundary"
      description: "Ensure all cash management activities comply with applicable regulations"
    - name: "Risk Management Boundary"
      description: "Maintain risk controls for cash management operations"
  assumptions:
    - name: "Regulatory Environment Assumption"
      description: "Assumes current regulatory framework remains stable"
    - name: "Market Conditions Assumption"
      description: "Assumes normal market conditions for cash management operations"
  caveats:
    - name: "Regulatory Change Risk"
      description: "Changes in cash management regulations could impact operations"
    - name: "Market Volatility Risk"
      description: "Market volatility can affect cash management strategies"
  conditions:
    - name: "Compliance Failure Condition"
      description: "If compliance with cash management regulations is not maintained, operation should be refused"
      trigger: "regulatory_non_compliance"
    - name: "Market Disruption Condition"
      description: "If market disruption occurs, operation should be suspended"
      trigger: "market_disruption"

# Deployment and rollback notes
# This package is market-ready but can be used in spec_only mode until a trusted build is committed

# Commercialization positioning
positioning: "Specialized expertise in treasury and cash management for capital markets and asset management firms"

# Promotion to trusted build
promotion:
  description: "Promotion to trusted built package requires demonstration of consistent performance and adherence to regulatory standards"
  criteria:
    - "Demonstrated reliability in cash management operations"
    - "Adherence to all applicable regulatory requirements"
    - "Proven track record in capital markets and asset management contexts"
