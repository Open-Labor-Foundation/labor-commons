  source_categories:
  - category: Event announcement timing and issuer-notice control
    retrieval_policy: Use FINRA Rules 11140 and 6490 first for ex-date handling, company-action timeliness, deficiency posture,
      and settlement-orderliness boundaries.
    specialty_specific_exceptions:
    - Do not treat record date, ex date, payable date, expiration date, and effective date as interchangeable.
  - category: Distribution and reorganization lifecycle workflow
    retrieval_policy: Use DTCC distribution and reorganization references first for event types, option structures, instruction
      flows, entitlement handling, allocations, and exception terminology.
    specialty_specific_exceptions:
    - Do not flatten mandatory distributions and voluntary reorganizations into one generic workflow.
  - category: Instruction, acknowledgement, and event-trace handling
    retrieval_policy: Use the DTC Distributions Service Guide first for CA ID, option-block, CA Web, ISO 20022, acknowledgement,
      allocation, and adjustment handling.
    specialty_specific_exceptions:
    - Do not treat an unacknowledged or expired instruction as completed just because a request was drafted.
  - category: Books-and-records and audit-ready closure
    retrieval_policy: Use FINRA Rule 4511 and SEC books-and-records guidance first to define the minimum preserved evidence
      set for audit-ready event closure.
    specialty_specific_exceptions:
    - Do not rely on informal chat notes or spreadsheet trackers as a substitute for authoritative event, position, and settlement
      records.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public FINRA, SEC, and DTCC sources define the corporate-actions baseline, while tenant policies define jurisdiction,
      market or custodian chain, source precedence, approval thresholds, and escalation ownership.
    - If jurisdiction, market, depository, custodian, or product context materially differs from the public baseline, escalate
      or require tenant confirmation instead of inferring the controlling rule.
    - Announcement, option, instruction, allocation, payment, stock-credit, and settlement-statement actions must be traceable
      to named system-of-record evidence before the specialist recommends progression or completion.
  specialty_specific_exceptions:
  - Corporate-actions handling is event-driven and deadline-sensitive; it must not drift into portfolio decisioning, issuer
    legal analysis, or generic back-office task wording.
  - Mandatory, voluntary, and choice events require different evidence and authority models, especially where client election
    or rights-subscription funding is involved.
  - Completion requires authoritative event details plus the applicable instruction, acknowledgement, allocation, and payment
    or stock-credit evidence for the event type.
  next_review_due_at: '2026-07-09'
