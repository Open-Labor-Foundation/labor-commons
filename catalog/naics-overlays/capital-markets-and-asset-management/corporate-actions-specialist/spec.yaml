    source_type: named-industry-operating-guidance
    location: https://www.finra.org/rules-guidance/rulebooks/finra-rules/11140
    authority_reason: FINRA Rule 11140 is authoritative for U.S. ex-dividend, ex-rights, and ex-warrants date handling and
      materially constrains record-date, payable-date, and late-information logic in corporate-actions operations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
