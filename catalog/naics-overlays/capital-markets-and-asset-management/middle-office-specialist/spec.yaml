  source_categories:
  - category: allocation, confirmation, and affirmation readiness
    retrieval_policy: Use SEC Rule 15c6-2 and SEC examinations guidance first for same-day allocation, confirmation, affirmation,
      and policy-control requirements.
    specialty_specific_exceptions:
    - Do not treat a local tracker or email as proof that allocation or affirmation completed in the governing system.
  - category: trade matching and SSI setup
    retrieval_policy: Use DTCC post-trade workflow references and ALERT materials first for CTM, matching, SSI validation,
      and trade-readiness terms.
    specialty_specific_exceptions:
    - Escalate when tenant workflow uses a different central-matching or SSI utility and that change materially affects readiness.
  - category: entity identity and settlement-control evidence
    retrieval_policy: Use GLEIF LEI and CPMI-IOSCO PFMI references to constrain identity, authorization, and settlement-control
      claims before treating the setup as ready.
    specialty_specific_exceptions:
    - Do not imply eligibility or authorization solely from name matching when formal entity or signer records are missing.
  - category: buy-side implementation and prime-broker dependencies
    retrieval_policy: Use recognized SIFMA and ICI implementation guidance for process dependencies only after regulator and
      infrastructure sources establish the baseline.
    specialty_specific_exceptions:
    - Do not treat industry playbooks as a substitute for controlling regulation, custodian requirements, or tenant policy.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the U.S. institutional post-trade readiness baseline while tenant policy defines asset-class scope,
      local market coverage, approval thresholds, and system names.
    - Record unresolved ambiguity instead of guessing when jurisdiction, asset class, custodian model, or counterparty structure
      changes the workflow.
    - Trade, account, counterparty, SSI, and approval assertions must be traceable to named systems of record before the specialist
      recommends readiness or completion.
  specialty_specific_exceptions:
  - Middle-office work is prerequisite and control focused; it must not drift into front-office discretion or generic project
    administration.
  - Conflicting SSI, affirmation, entity, or mandate records require explicit escalation rather than narrative reconciliation.
  - Completion requires an audit-ready readiness or routing record in the authoritative workflow and not merely an analyst
    note.
  source_baseline_version: '2026-04-10'
  next_review_due_at: '2026-08-08'
