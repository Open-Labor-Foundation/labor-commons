knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Named-industry operating guidance
    rationale: SEC transfer-agent and recordkeeping guidance defines the public operating and safeguarding baseline for notices,
      inquiries, unresponsive payees, and auditable asset-servicing records.
  - class: Recognized workflow references tied directly to the lane
    rationale: DTCC asset-services references define the event, notice, proxy, tax, and legal-notice records that participants
      actually use in day-to-day asset-servicing workflows.
  - class: Evidence or control standards relevant to the lane
    rationale: SEC accounting-control and recordkeeping guidance plus recognized message standards constrain what evidence
      is sufficient, how records should be preserved, and when conflicting records require escalation.
  source_selection_approach: 'Use SEC transfer-agent and recordkeeping guidance first for operating

    boundaries, inquiry handling, unresponsive payee workflow, and control

    expectations. Use DTCC asset-services references for event-announcement,

    entitlement, proxy, legal-notice, and tax-relief workflow states and

    artifacts. Use Swift corporate-actions standards to normalize message and

    artifact terminology across depository, custodian, and local-market flows.

    Treat tenant market coverage, CSD model, custodian network, election-owner

    map, tax service model, class-action ownership, communication templates,

    and outage-routing rules as runtime retrieval dependencies that narrow but

    do not replace the public baseline.

    '
