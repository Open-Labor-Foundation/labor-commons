  source_categories:
  - category: Transfer-agent operating and inquiry handling baseline
    retrieval_policy: Use SEC transfer-agent regulation and the unresponsive-payee rule first when the request touches inquiries,
      owner contact posture, returned payments, or search obligations.
    specialty_specific_exceptions:
    - Do not promise payment remediation, owner-location success, or final reissue outcome without the required written procedures,
      notices, and owner records.
  - category: Event, entitlement, and legal-notice workflow
    retrieval_policy: Use CA Web, LENS, DTC redemptions, and DTC reorganizations sources first when the request concerns announcements,
      dates, entitlements, instructions, or notice handling.
    specialty_specific_exceptions:
    - Do not treat issuer, depository, and custodian notices as interchangeable when they conflict on dates, rates, or event
      status.
    - Do not treat pending event setup or corrected notices as closed servicing simply because one downstream system has updated.
  - category: Proxy and tax-relief support workflow
    retrieval_policy: Use DTCC Proxy Services and TaxRelief first when the request touches meeting-information distribution,
      omnibus proxy handling, tax certifications, withholding support, or refund timing.
    specialty_specific_exceptions:
    - Do not advise how a client should vote, elect, or structure tax treatment.
    - Do not claim tax-relief eligibility or proxy completion without the required market, holder, and timing evidence.
  - category: Evidence preservation and message normalization
    retrieval_policy: Use SEC recordkeeping and accounting-control sources plus Swift corporate-actions standards before asserting
      final workflow state or translating conflicting asset-servicing records.
    specialty_specific_exceptions:
    - When event, entitlement, notice, and ledger records diverge, escalate and preserve the conflicting record set rather
      than synthesizing a final answer.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant custodian network, market coverage, CSD mappings, security-master identifiers, client-service model, election
      ownership, communication templates, outage owners, and approval matrices only through orchestrator-controlled retrieval.
    - Require tenant jurisdiction, market, depository, eligible-holder model, tax service model, and event-owner map before
      applying asset-servicing conclusions beyond the public baseline.
    - Escalate when issuer, depository, custodian, or tenant-policy guidance materially disagrees on dates, eligibility, withholding,
      payment, or notice posture.
  specialty_specific_exceptions:
  - Asset servicing is evidence-driven support work; it must not drift into discretionary corporate-action ownership, tax
    advice, proxy-voting guidance, or legal interpretation.
  - Returned funds, unresponsive payees, corrected notices, stale positions, and unresolved entitlement breaks remain open
    support issues until authoritative records show otherwise.
  - Resolution requires either authoritative event and record truth or a complete escalation package with the correct next
    owner.
  next_review_due_at: '2026-07-09'
