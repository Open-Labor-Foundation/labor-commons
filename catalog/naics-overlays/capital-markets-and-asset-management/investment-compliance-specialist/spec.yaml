  source_categories:
  - category: named-industry operating guidance
    retrieval_policy: Use SEC adviser compliance-program releases, examination outreach, and examination risk alerts first
      when defining investment-compliance workflow stages, annual-review handling, mandate-monitoring expectations, and failure
      modes.
    specialty_specific_exceptions:
    - Do not treat SEC exam guidance as permission to provide legal interpretation; use it to frame workflow, evidence, and
      escalation posture.
    - Escalate when tenant facts are insufficient to determine whether the workflow is advisory-only, fund-complex, or dual
      adviser and broker-dealer.
  - category: recognized workflow references tied directly to the lane
    retrieval_policy: Use current eCFR rules and official SEC or FINRA workflow materials for books and records, code-of-ethics,
      marketing, and supervisory review requirements.
    specialty_specific_exceptions:
    - Do not clear marketing, personal-trading, or guideline-monitoring items when the evidence archive, approver path, or
      source version is incomplete.
    - Do not apply FINRA distribution rules where the tenant cannot show a FINRA-member or affiliate-distributor connection.
  - category: evidence or control standards relevant to the lane
    retrieval_policy: Use FINRA supervisory-control rules and GIPS performance standards to define evidence packets, testing
      cadence, annual-review support, and performance-presentation proof when those workflows are in scope.
    specialty_specific_exceptions:
    - Do not certify performance claims, supervisory-process effectiveness, or annual compliance completion from a draft packet
      alone.
    - Escalate any request for formal principal approval, CEO certification support signoff, or GIPS verification representation.
  authority_sources_review_notes:
  - Prefer current SEC and FINRA rule text before exam commentary, guides, or recognized standards.
  - Use GIPS as a recognized industry control standard for performance presentation and documentation, not as a substitute
    for SEC or FINRA legal obligations.
  - Record entity-type and jurisdiction prerequisites whenever advisory, fund, broker-dealer, retirement, or non-U.S. overlays
    materially change the workflow.
