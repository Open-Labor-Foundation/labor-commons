    publisher: U.S. Securities and Exchange Commission
    source_type: evidence-and-control-standard
    location: https://www.sec.gov/rules-regulations/2003/05/electronic-storage-broker-dealer-records
    authority_reason: Official SEC interpretive source explaining Rules 17a-3 and 17a-4 record sets, including blotters, ledgers,
      securities records, order tickets, and confirmations that analytics packages rely on as evidence.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: performance presentation and disclosure posture
    retrieval_policy: Use SEC marketing guidance and GIPS standards first when a request involves extracted, hypothetical,
      benchmark-relative, or audience-facing performance claims.
    specialty_specific_exceptions:
    - Do not present extracted, hypothetical, composite, account, and share-class performance as interchangeable.
  - category: holdings, exposure, and fund-reporting records
    retrieval_policy: Use SEC investment-company reporting guidance first for holdings, derivatives, liquidity, and reporting-cadence
      assumptions that affect asset-management analytics.
    specialty_specific_exceptions:
    - Do not assume currently proposed or delayed Form N-PORT amendments are already effective without tenant confirmation.
  - category: benchmark methodology and benchmark change handling
    retrieval_policy: Use GIPS benchmark guidance and IOSCO benchmark principles to frame benchmark methodology, data-input
      hierarchy, periodic review, and disclosure of benchmark changes.
    specialty_specific_exceptions:
    - Do not publish benchmark-relative conclusions when benchmark methodology, benchmark-change timing, or custom-blend logic
      is unresolved.
  - category: trade and execution-quality semantics
    retrieval_policy: Use FINRA TRACE guidance when transaction-time, dissemination timing, security-type reporting windows,
      or fixed-income execution scorecards are part of the analysis.
    specialty_specific_exceptions:
    - Do not treat OMS timestamps, processing timestamps, TRACE dissemination timestamps, and time of execution as interchangeable.
  - category: recordkeeping and audit trail
    retrieval_policy: Use FINRA Rule 4511 and SEC broker-dealer recordkeeping guidance before treating any metric, report,
      or disclosure-support package as audit-ready.
    specialty_specific_exceptions:
    - Do not claim a metric is supported when the underlying blotter, ledger, benchmark, pricing, or approval records are
      not preserved and retrievable.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline workflow, but tenant benchmark masters, valuation hierarchy, source precedence, composite
      maps, and approval chains remain required runtime inputs.
    - Tenant retrieval must provide current systems of record, benchmark methodology ownership, dissemination audience, currency
      policy, and share-class or sleeve logic.
    - Escalate whenever valuation, benchmark governance, disclosure approval, or portfolio authority materially changes the
      answer.
  specialty_specific_exceptions:
  - Capital-markets analytics often mixes OMS, EMS, IBOR, ABOR, benchmark, risk, and market-data records that are not interchangeable
    without an explicit source hierarchy.
  - Benchmark-relative return, total return, spread return, yield, gross exposure, net exposure, tracking error, and slippage
    each require named methodology and denominator control.
  - Requests for stronger trend, benchmark, forecast, or disclosure claims must stay caveated and route to the proper authority
    when benchmark governance, valuation, or signoff is incomplete.
  next_review_due_at: '2026-07-09'
