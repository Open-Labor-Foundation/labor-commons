      and performance-calculation discipline used across asset-management reporting.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: gips-benchmarks-guidance
    title: GIPS Guidance Statement on Benchmarks for Firms
    publisher: CFA Institute
    source_type: recognized-workflow-reference
