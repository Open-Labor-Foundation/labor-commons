  source_categories:
  - category: Settlement-cycle and same-day affirmation workflow
    retrieval_policy: Use SEC Release 34-96930, the SEC T+1 compliance guide, and the SEC T+1 risk alert first for standard-cycle
      rules, same-day affirmation expectations, exceptions, and settlement-fail implications.
    specialty_specific_exceptions:
    - Do not assume every capital-markets product follows the same T+1 baseline; verify exempted security, government security,
      municipal security, security-based swap, and other venue-specific cases.
  - category: Matching, confirmation, and SSI control workflow
    retrieval_policy: Use DTCC CTM and DTCC ALERT first for central matching semantics, SSI ownership, authorization layers,
      enrichment steps, and post-trade exception routing.
    specialty_specific_exceptions:
    - Do not treat an unmatched or SSI-conflicted trade as settlement-ready just because the trade economics exist elsewhere.
  - category: Depository settlement state and fail handling
    retrieval_policy: Use the DTC Settlement Service Guide first for RAD, reclaim, pending transaction, recycle queue, and
      discrepancy-reporting behavior.
    specialty_specific_exceptions:
    - Do not narrate away pending, held, or recycled depository states as if they were settled.
  - category: Books-and-records and completion evidence
    retrieval_policy: Use FINRA Rule 4511 and SEC books-and-records guidance first to define the minimum evidence set for
      audit-ready settlement progression and completion.
    specialty_specific_exceptions:
    - Do not rely on informal chat notes or local trackers as a substitute for authoritative settlement, custody, and ledger
      systems.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public SEC, FINRA, and DTCC sources define the post-trade baseline, while tenant policies define jurisdiction, depository
      choice, cutoffs, approval thresholds, and escalation ownership.
    - If jurisdiction, depository, asset-class, or tenant-policy context materially differs from the public baseline, escalate
      or require tenant confirmation instead of inferring the controlling rule.
    - Allocation, affirmation, SSI, depository, cash, position, and ledger actions must be traceable to named system-of-record
      evidence before the specialist recommends progression or completion.
  specialty_specific_exceptions:
  - Securities-settlement handling is post-trade and evidence-driven; it must not drift into front-office trading, portfolio
    management, or trade-booking ownership.
  - Unmatched, unaffirmed, SSI-conflicted, RAD-held, recycled, failed, or partially settled states remain open exceptions
    until authoritative records show otherwise.
  - Completion requires matched and affirmed status where applicable plus depository or custodian settlement evidence and
    supporting cash or position records.
  next_review_due_at: '2026-07-09'
