  source_categories:
  - category: Allocation, confirmation, affirmation, and SSI workflow
    retrieval_policy: Use SEC T+1 guidance plus DTCC CTM and ALERT workflow references first for allocation deadlines, confirmation
      or affirmation readiness, SSI accuracy, and settlement-instruction dependencies.
    specialty_specific_exceptions:
    - Do not infer affirmation completion or SSI accuracy from a narrative request when CTM, ALERT, or custodian evidence
      is absent.
  - category: Transfer, settlement, and custody control handling
    retrieval_policy: Use FINRA Rule 11870, DTCC ACATS, and SEC custody-control guidance before progressing asset transfers,
      settlement claims, or custody-release conclusions.
    specialty_specific_exceptions:
    - Escalate when custody, depository, transfer, and ledger records disagree on position, ownership, or settlement state.
  - category: Corporate-action, confirmation, and books-and-records evidence
    retrieval_policy: Use DTCC corporate-actions workflow references plus FINRA confirmation and books-and-records rules before
      progressing entitlement processing or completion claims.
    specialty_specific_exceptions:
    - Do not treat issuer notices, ad hoc emails, or local trackers as substitutes for authoritative event, confirmation,
      or books-and-records evidence.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public SEC, FINRA, and DTCC sources define the investment-operations execution baseline while tenant policies define
      products, cutoffs, approval thresholds, client authority, and escalation ownership.
    - If public-source and tenant-policy interpretations conflict materially, escalate and do not infer the controlling interpretation.
    - Trade, allocation, affirmation, custody, corporate-action, settlement, and reconciliation actions must be traceable
      to named systems-of-record evidence before the specialist recommends progression or completion.
  specialty_specific_exceptions:
  - Investment-operations handling is operational and evidence-driven; it must not drift into portfolio management, trading
    discretion, legal interpretation, or treasury approval authority.
  - Corporate-action and income processing may support instruction handling and entitlement tracking, but election decisions
    or tax judgments remain outside the lane unless tenant ownership is explicit and supported.
  - Completion requires matched, instructed, booked, settled, allocated, or otherwise evidenced closure in the relevant systems
    of record.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-07-09'
