  source_categories:
  - category: franchise disclosure and filing controls
    retrieval_policy: Use the FTC Franchise Rule, FTC compliance guidance, NASAA guidelines, and current state or EFD filing
      posture before treating FDD, Item 19, or Item 20 data as disclosure-ready.
    specialty_specific_exceptions:
    - Do not treat an internal dashboard or draft workbook as authority to revise FDD language or state filings.
  - category: financial performance and cohort-definition evidence
    retrieval_policy: Use FTC and NASAA FPR guidance before defining same-store sales, average unit volume, royalty-base metrics,
      or performance subsets.
    specialty_specific_exceptions:
    - Do not mix franchised and company-owned units, or active and transferred or reacquired units, without explicit cohort
      rules.
  - category: multi-unit and development-structure semantics
    retrieval_policy: Use NASAA multi-unit guidance and tenant agreement records before counting development commitments,
      openings, territories, or subfranchise relationships in one metric.
    specialty_specific_exceptions:
    - Do not treat signed multi-unit commitments as equivalent to opened units or comparable operating locations.
  - category: formal reporting and stronger-claim boundaries
    retrieval_policy: Use SEC KPI guidance and tenant disclosure approvals before publishing trend narratives, benchmarks,
      forecasts, or board or investor-style summaries.
    specialty_specific_exceptions:
    - Do not upgrade descriptive franchise analysis into earnings claims, legal representations, or public disclosure signoff.
  next_review_due_at: '2026-07-09'
