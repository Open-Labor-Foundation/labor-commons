knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official franchise rule, NAICS, and regulator sources anchor the lane to franchise agreements, fees, disclosure
      records, and franchise-system operating records rather than generic administration.
  - class: Recognized workflow references tied directly to the lane
    rationale: NASAA franchise disclosure and multi-unit guidance clarifies FDD fee schedules, multi-unit structures, state-specific
      materials, and franchise-specific evidence packages.
  - class: Evidence or control standards relevant to the lane
    rationale: FASB, IRS, NARA, and NIST sources constrain royalty accounting/tax handoffs, recordkeeping, access, audit,
      and privacy boundaries.
  source_selection_approach: 'Use FTC and eCFR sources first for federal franchise disclosure records,

    fee terminology, receipt retention, and FDD update context. Use NAICS to

    anchor franchise agreements and royalty payments as industry-specific

    intangible-asset/franchise-system activity. Use NASAA sources for

    registration-state, FDD, and multi-unit franchise structures. Use FASB and

    IRS sources only to identify accounting and tax handoff boundaries, not to

    let the lane make revenue-recognition or tax-filing decisions. Use NARA and

    NIST to constrain records, metadata, retention, access, and audit handling.

    '
  authority_sources:
  - source_id: ecfr-16-cfr-436
    title: 16 CFR Part 436 - Disclosure Requirements and Prohibitions Concerning Franchising
    publisher: Federal Trade Commission / eCFR
    source_type: named-industry-operating-guidance
    location: https://www.ecfr.gov/current/title-16/chapter-I/subchapter-D/part-436
    authority_reason: The FTC Franchise Rule is the federal baseline for franchise disclosure records, including fee disclosures,
      disclosure versions, signed receipt retention, annual updates, and material-change updates that anchor FDD fee evidence.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_after_franchise_rule_update
    status: active
  - source_id: ftc-franchise-rule-compliance-guide
    title: Franchise Rule Compliance Guide
    publisher: Federal Trade Commission
    source_type: named-industry-operating-guidance
    location: https://www.ftc.gov/business-guidance/resources/franchise-rule-compliance-guide
    authority_reason: Official FTC business guidance explains franchise disclosure timing, fee disclosure, receipt retention,
      electronic delivery, and financial performance representation boundaries used to keep royalty administration tied to
      proper franchise records.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_after_ftc_guidance_update
    status: active
  - source_id: census-naics-533110
    title: '2022 NAICS Manual: 533110 Lessors of Nonfinancial Intangible Assets (except Copyrighted Works)'
    publisher: U.S. Census Bureau
    source_type: named-industry-operating-guidance
    location: https://www.census.gov/naics/reference_files_tools/2022_NAICS_Manual.pdf
    authority_reason: The U.S. Census Bureau publishes NAICS and explicitly identifies franchise agreements, royalty payments,
      and licensing fees paid to asset holders, anchoring the royalty lane to franchise agreement and intangible-rights records.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_after_naics_revision
    status: active
  - source_id: nasaa-franchise-guidelines
    title: 2008 Franchise Registration and Disclosure Guidelines
    publisher: North American Securities Administrators Association
    source_type: recognized-workflow-reference
    location: https://www.nasaa.org/wp-content/uploads/2011/08/6-2008UFOC.pdf
    authority_reason: NASAA guidelines are the recognized registration-state franchise disclosure workflow reference and define
      FDD item structure, fee schedules, exhibits, receipts, and state filing evidence relevant to royalty records.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_after_nasaa_guidance_update
    status: active
  - source_id: nasaa-multi-unit-commentary
    title: NASAA Franchise Multi Unit Commentary
    publisher: North American Securities Administrators Association
    source_type: recognized-workflow-reference
    location: https://www.nasaa.org/industry-resources/franchise-resources/
    authority_reason: NASAA's franchise resource library identifies the adopted multi-unit commentary used by registration-state
      reviewers to clarify area development, subfranchise, and area representative structures that change royalty splits,
      participants, records, and authority boundaries.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_after_nasaa_guidance_update
    status: active
  - source_id: fasb-asu-2021-02
    title: ASU 2021-02, Franchisors - Revenue from Contracts with Customers (Subtopic 952-606)
    publisher: Financial Accounting Standards Board
    source_type: evidence-and-control-standard
    location: https://storage.fasb.org/ASU%202021-02.pdf
    authority_reason: FASB's franchisor-specific revenue guidance identifies franchise agreements, initial franchise fees,
      sales-based royalties, and revenue-recognition boundaries that require accounting-owner review rather than administrative
      improvisation.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval_or_after_fasb_update
    status: active
  - source_id: irs-publication-525
    title: Publication 525, Taxable and Nontaxable Income
    publisher: Internal Revenue Service
    source_type: evidence-and-control-standard
    location: https://www.irs.gov/publications/p525
    authority_reason: IRS guidance identifies royalties as taxable income and provides tax-reporting context, constraining
      royalty administration to evidence preparation and tax-owner routing rather than tax advice or filing decisions.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval_or_after_tax-year_revision
    status: active
  - source_id: nara-universal-erm
    title: Universal Electronic Records Management Requirements
    publisher: National Archives and Records Administration
    source_type: evidence-and-control-standard
    location: https://www.archives.gov/records-mgmt/policy/universalermrequirements
    authority_reason: NARA is the U.S. federal records-management authority, and these requirements define metadata, file
      plans, retention, disposition, access, retrieval, integrity, and audit expectations for electronic record packages.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_after_nara_update
    status: active
  - source_id: nist-sp-800-53-r5
    title: SP 800-53 Rev. 5, Security and Privacy Controls for Information Systems and Organizations
    publisher: National Institute of Standards and Technology
    source_type: evidence-and-control-standard
    location: https://csrc.nist.gov/pubs/sp/800/53/r5/upd1/final
    authority_reason: NIST SP 800-53 is a recognized public control catalog for access control, audit and accountability,
      PII processing, and system integrity controls relevant to franchisee financial and payment records.
    last_reviewed_at: '2026-04-13'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_after_nist_update
    status: active
  source_categories:
  - category: franchise fee and disclosure baseline
    retrieval_policy: Use the current franchise agreement, amendments, FDD version, Item 6 fee schedule, applicable state
      addenda, and FTC/NASAA source baseline before treating royalty, advertising fund, technology fee, minimum fee, late
      fee, or other continuing fee records as complete.
    specialty_specific_exceptions:
    - Do not infer fee terms from historic billing practice when current franchise agreement or FDD fee records are absent
      or conflict.
    - Do not let a generic donor, member, dues, or contribution workflow replace franchise royalty, unit, gross-sales, and
      remittance terminology.
  - category: unit sales and royalty evidence
    retrieval_policy: Use franchisee unit roster, POS exports, portal sales reports, gross-sales detail, excluded-sales support,
      invoice/AR records, approved adjustment records, and payment evidence before matching, exceptioning, or summarizing
      a royalty package.
    specialty_specific_exceptions:
    - Do not mark a period complete when unit sales, payment records, approved credits, or bank reconciliation evidence are
      missing or contradictory.
    - Do not approve gross-sales exclusions, minimum-fee overrides, or royalty-rate changes without delegated approval evidence.
  - category: accounting, tax, and control handoff
    retrieval_policy: Use FASB and IRS sources to identify revenue-recognition and tax-reporting owner boundaries, and use
      NARA/NIST sources to enforce records, retention, access, and audit-control expectations.
    specialty_specific_exceptions:
    - Do not make GAAP, tax, 1099, write-off, waiver, collection, legal, or audit findings decisions from an administrative
      record package.
    - Do not distribute franchisee financial or payment records when access, privacy, retention, or audit controls are missing
      or conflicted.
  next_review_due_at: '2026-07-12'
workflow_model:
  lifecycle_states:
  - intake-received
  - blocked-missing-prerequisites
  - source-records-ready
  - royalty-package-in-review
  - report-matched
  - payment-matched
  - exception-rework
  - approval-or-owner-review-pending
  - handoff-ready
  - completed-with-evidence
  - returned-to-orchestrator
  execution_steps:
  - Validate tenant service model, brand, unit or territory, franchisee role, jurisdiction, period, fee type, approval matrix,
    source hierarchy, and retrieval hooks.
  - Confirm franchise agreement, amendment, FDD Item 6 fee schedule, unit roster, sales report, payment evidence, approved
    adjustment, and system-of-record context.
  - Classify the request as in-scope, out-of-scope, blocked, exceptioned, ready for handoff, or returned to orchestrator.
  - Maintain only delegated royalty package metadata, received status, evidence checklist, due-date status, payment-match
    status, dispute flag, owner, and audit notes.
  - Hold or route packages with missing sales reports, unsupported gross-sales exclusions, unmatched payments, returned ACH,
    conflicting agreements, stale FDD references, or authority-sensitive requests.
  - Prepare completion, exception, retention/access/governance, and adjacent-lane handoff records with named source evidence.
  throughput_expectations:
  - Royalty periods should be processed by tenant reporting calendar, franchise agreement due dates, payment settlement cadence,
    and reviewer SLA.
  - Exception queues must identify unit, period, fee type, blocker, evidence gap, owner, age, and next retrieval or approval
    step.
  - Completion records must remain reversible when later contract, sales, payment, audit, or approval evidence invalidates
    package status.
  record_of_truth_systems:
  - franchise management platform and franchisee master
  - franchise agreement, FDD, amendment, and addenda repository
  - POS, sales reporting, and franchisor portal systems
  - ERP, GL, billing, AR, and revenue subledger systems
  - payment processor, ACH, card settlement, bank, lockbox, and reconciliation systems
  - workflow queue, collection/dispute case system, document repository, IAM, and audit log
