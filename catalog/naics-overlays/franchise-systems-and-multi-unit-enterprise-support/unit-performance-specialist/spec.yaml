  source_categories:
  - category: franchise disclosure and unit-status controls
    retrieval_policy: Use the FTC Franchise Rule, FTC compliance guidance, NASAA franchise resources, current FDD edition,
      Item 19 support, and Item 20 outlet status before treating unit performance metrics as disclosure-safe.
    specialty_specific_exceptions:
    - Do not treat an internal unit scorecard as authority to revise Item 19, state filings, or prospect-facing materials.
  - category: unit metric and cohort-definition evidence
    retrieval_policy: Use tenant agreement definitions, metric dictionaries, POS, royalty, ERP, unit master, and FPR support
      files before calculating AUV, same-store sales, royalty base, opening ramp, or unit benchmark cohorts.
    specialty_specific_exceptions:
    - Do not mix franchised, company-owned, transferred, reacquired, temporarily closed, immature, or terminated units without
      explicit cohort rules.
  - category: multi-unit portfolio and field-performance context
    retrieval_policy: Use NASAA multi-unit guidance, franchise agreements, area-development schedules, unit master records,
      field audit systems, and support work items before analyzing portfolio or field-intervention performance.
    specialty_specific_exceptions:
    - Do not treat signed development commitments, territory rights, or field action plans as proof of operating unit performance.
  - category: formal reporting and stronger-claim boundaries
    retrieval_policy: Use SEC KPI guidance, tenant disclosure approvals, and source refresh metadata before publishing trend
      narratives, benchmarks, forecasts, or executive reporting packages.
    specialty_specific_exceptions:
    - Do not upgrade descriptive unit analysis into causal claims, earnings claims, policy judgments, or public disclosure
      signoff.
  next_review_due_at: '2026-08-11'
