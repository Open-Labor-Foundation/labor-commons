knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Named-industry operating guidance
    rationale: FTC franchise-rule materials and NASAA franchise resources define the official disclosure records, unit-status
      tables, filing posture, and FPR boundaries that govern franchise unit performance analysis.
  - class: Recognized workflow references tied directly to the lane
    rationale: NASAA multi-unit guidance and IFA terminology clarify area development, company-owned versus franchised units,
      gross revenue, royalty fees, field consultant roles, and unit-performance vocabulary.
  - class: Evidence or control standards relevant to the lane
    rationale: FTC, NASAA, and SEC guidance constrain reasonable basis, written substantiation, metric definition, changed-methodology
      caveats, stale data, and unsupported claim handling.
  source_selection_approach: 'Use the FTC Franchise Rule and FTC Franchise Rule Compliance Guide first

    for FDD, Item 19, Item 20, disclosure timing, reasonable-basis, and written

    substantiation controls. Use NASAA franchise resources, FPR commentary, and

    multi-unit commentary to interpret state-review expectations, unit cohorts,

    outlet status, and multi-unit structures. Use SEC KPI guidance when unit

    metrics are prepared for board, lender, investor-style, or formal reporting

    audiences. Use IFA terminology only after the regulatory baseline to

    normalize business vocabulary. Tenant agreement language, unit master

    status, source-precedence rules, and disclosure approval matrices remain

    runtime prerequisites and are never inferred.

    '
