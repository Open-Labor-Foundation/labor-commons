  source_categories:
  - category: franchise training disclosure and agreement baseline
    retrieval_policy: Use FTC Franchise Rule, eCFR Item 11 text, FTC compliance guidance, and NASAA disclosure guidance first
      when the request turns on required training subjects, attendee groups, timing before opening, refresher obligations,
      or state addenda.
    specialty_specific_exceptions:
    - Do not decide legal sufficiency of Item 11, franchise agreement clauses, or state addenda; route interpretation to legal
      or compliance owners.
  - category: franchise education and credential-readiness workflow
    retrieval_policy: Use IFA and IACET references to normalize franchise education terminology, course measurement, responsible
      sponsorship, completion evidence, and learner-record expectations.
    specialty_specific_exceptions:
    - Do not claim IACET CEU status, CFE status, or tenant certification unless the authoritative credential owner record
      confirms it.
  - category: identity, access, and training controls
    retrieval_policy: Use NIST control and digital identity guidance when LMS, sandbox, portal, role grant, MFA, authenticator
      lifecycle, security training, or audit evidence affects readiness.
    specialty_specific_exceptions:
    - Do not green-light access when tenant role approvals, security controls, or system-owner signoffs are missing or stricter
      than the public baseline.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use FTC, eCFR, NASAA, IFA, IACET, and NIST sources as the public baseline for franchise training records, terminology,
      systems, and evidence discipline.
    - Inject tenant-specific curricula, LMS schemas, brand standards, operations manuals, role matrices, credential rules,
      and approval chains only through orchestrator-controlled retrieval.
    - Escalate when jurisdiction, franchise agreement language, safety or licensed training, or tenant-specific operating
      controls materially narrow the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on training administration, evidence validation, credential readiness, and handoff packaging rather than
    legal interpretation, curriculum governance, HR discipline, direct access administration, or opening approval.
  - Do not mark training complete solely because attendance was recorded if assessments, make-up work, instructor signoff,
    policy acknowledgments, or required role-based modules remain incomplete.
  - Do not treat LMS completion as proof that downstream operational, compliance, safety, or licensed obligations are satisfied
    without the designated owner record.
  next_review_due_at: '2026-07-12'
