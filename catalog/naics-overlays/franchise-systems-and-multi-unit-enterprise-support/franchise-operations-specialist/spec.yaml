  source_categories:
  - category: franchise disclosure, supplier, and operating-manual baseline
    retrieval_policy: Use the FTC Franchise Rule, FTC compliance guidance, FTC FDD education, and NASAA franchise guidance
      first when the question turns on approved suppliers, training, operating-manual obligations, territory, or multi-unit
      franchise structure.
    specialty_specific_exceptions:
    - Do not treat FDD or operating-manual references as permission to revise franchise terms, approve new suppliers, or decide
      legal rights.
  - category: pricing, fee, and promotional execution controls
    retrieval_policy: Use FTC fee and complaint-rights guidance plus NIST retail-pricing and unit-pricing references when
      price presentation, shelf tags, unit pricing, mandatory fees, or promo execution materially affect the answer.
    specialty_specific_exceptions:
    - Escalate when state pricing law, franchise relationship law, or tenant pricing policy materially narrows the public
      baseline.
  - category: item master, barcode, order, and inventory evidence discipline
    retrieval_policy: Use GS1 identifier and product-data standards to define evidence sufficiency for item setup, barcode
      use, product attributes, order handling, and inventory reconciliation.
    specialty_specific_exceptions:
    - Do not infer item readiness, receiving completion, or inventory truth when POS, ERP, OMS, or stock records conflict.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use FTC, NASAA, NIST, and GS1 sources as the public baseline for franchise product, pricing, order, promotion, and completion
      controls.
    - Inject tenant-specific operating manuals, approved supplier lists, price books, promo calendars, return rules, field-support
      SOPs, and approval matrices only through orchestrator-controlled retrieval.
    - Escalate when jurisdiction, multi-unit ownership model, regulated product category, or tenant policy changes the safe
      answer.
  specialty_specific_exceptions:
  - Keep the lane on execution-state handling, evidence discipline, and exception routing rather than legal interpretation,
    pricing strategy, or commercial approval.
  - Do not close work merely because a franchisee or field consultant says it is fixed; closure requires authoritative system
    and unit-level evidence.
  - Do not turn supplier restrictions, fee disputes, or pricing mismatches into ad hoc exceptions when the governing records
    or approvals are incomplete.
  next_review_due_at: '2026-07-09'
