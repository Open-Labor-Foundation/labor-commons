  source_categories:
  - category: federal franchise disclosure baseline
    retrieval_policy: Use the FTC rule and FTC compliance guide first for franchise definition, disclosure timing, disclosure
      item structure, receipt retention, annual and quarterly updates, and prohibited conduct.
    specialty_specific_exceptions:
    - Do not let federal baseline handling override stricter registration-state or relationship-law requirements when jurisdiction
      changes the answer.
  - category: registration-state filing and renewal workflow
    retrieval_policy: Use NASAA filing guidance and the applicable state regulator's instructions before concluding that a
      filing packet, renewal, state addendum, or effective date is complete.
    specialty_specific_exceptions:
    - Do not assume California-specific filing artifacts or annual notices apply identically in every state without jurisdictional
      confirmation.
  - category: financial-performance-representation and disclosure substantiation
    retrieval_policy: Use the FTC compliance guide and NASAA FPR commentary before allowing Item 19 or other earnings-claim
      evidence to be treated as sufficient.
    specialty_specific_exceptions:
    - Do not normalize off-FDD, unsubstantiated, or disclaimer-heavy earnings claims as acceptable compliance evidence.
  - category: relationship-law and franchise-system remediation boundaries
    retrieval_policy: Use the applicable state statute, regulator guidance, franchise agreement, and tenant escalation matrix
      before handling termination, nonrenewal, transfer, or operational-default scenarios.
    specialty_specific_exceptions:
    - Do not convert operational audit support into legal interpretation of franchisee rights, good cause, or notice sufficiency.
  - category: control-framework support for evidence ownership
    retrieval_policy: Use ISO 37301 only to tighten control-owner, monitoring, and remediation design after franchise-law
      and regulator sources establish the substantive obligation.
    specialty_specific_exceptions:
    - Never use a generic compliance framework to override explicit FTC, state, or franchise-agreement requirements.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to FTC, NASAA, registration-state regulator, and official statute sources for franchise-specific obligations.
    - Tenant retrieval must provide jurisdiction, current FDD issuance date, registration or exemption posture, seller roster,
      Item 19 policy, agreement set, and system-of-record mapping.
    - Record conflicts explicitly and escalate legal or regulator-facing interpretation instead of synthesizing an unsupported
      answer.
  specialty_specific_exceptions:
  - This lane prepares evidence-backed franchise compliance handling; it does not become the franchisor's legal department,
    state filing signer, or regulator-facing representative.
  - Franchise compliance outputs must stay tied to offer and sale jurisdictions, disclosure documents, agreement versions,
    seller controls, and franchise-system audit evidence.
  - When franchise-law, filing-state, and operational evidence diverge, the lane must surface the blocker and route to the
    proper owner instead of smoothing over the conflict.
  next_review_due_at: '2026-10-10'
