  source_categories:
  - category: Federal disclosure timing, FDD integrity, and seller conduct
    retrieval_policy: Use FTC Franchise Rule guidance first when the case turns on FDD delivery timing, Item 19 boundaries,
      Item 23 receipt handling, seller statements, or disclosure updates.
    specialty_specific_exceptions:
    - Do not convert FTC guidance into legal advice on a specific state filing or exemption question.
  - category: Filing-state workflow, effective dates, and multi-unit structure treatment
    retrieval_policy: Use NASAA and DFPI workflow guidance when the case involves state registration status, seller disclosure
      forms, state cover pages, multi-state effective dates, or multi-unit disclosure structure.
    specialty_specific_exceptions:
    - Escalate when filing-state rules, examiner comments, or multi-unit treatment materially conflict across jurisdictions.
  - category: Questionnaire, acknowledgment, and anti-waiver controls
    retrieval_policy: Use NASAA's questionnaires policy when the request involves acknowledgments, discovery-day scripts,
      non-reliance language, or any evidence artifact that could function as a waiver.
    specialty_specific_exceptions:
    - Do not ask a prospect to sign or verbally confirm subjective or waiver-like statements unless approved by legal or compliance.
  - category: Application completeness and filing evidence
    retrieval_policy: Use DFPI completeness instructions when the work turns on required submission artifacts, clean and blacklined
      copies, financial statements, addenda, seller forms, or ad-filing prerequisites.
    specialty_specific_exceptions:
    - Do not treat a partially uploaded or grossly deficient filing as if it were effective or complete.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use FTC, NASAA, and DFPI materials above as the public baseline for franchise-development support work.
    - Inject tenant-specific brand standards, broker governance, committee thresholds, territory rules, qualification criteria,
      and communication templates only through orchestrator-controlled retrieval.
    - Escalate when state-specific law, examiner direction, or brand policy materially narrows the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on administration, evidence collection, status communication, and safe routing rather than franchise sales
    persuasion or legal interpretation.
  - Do not use discovery-day notes, broker decks, CRM comments, or informal spreadsheets as a substitute for approved Item
    19 content.
  - Do not let multi-unit or area-development terminology hide the need for a specialized legal or compliance review.
  next_review_due_at: '2026-07-09'
type: agent_definition
