  agent_id: franchise-development-support-specialist-v1
  slug: franchise-development-support-specialist
  name: Franchise development support specialist
  domain_family: naics-overlays/franchise-systems-and-multi-unit-enterprise-support
  status: validated
  created_at: '2026-04-10'
  last_updated_at: '2026-04-10'
