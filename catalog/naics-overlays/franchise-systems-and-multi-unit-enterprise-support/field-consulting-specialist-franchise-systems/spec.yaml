    publisher: Electronic Code of Federal Regulations
    source_type: named-industry operating guidance
    location: https://www.ecfr.gov/current/title-16/chapter-I/subchapter-D/part-436
    authority_reason: This is the governing U.S. franchise disclosure rule. It defines the required franchise disclosure structure,
      prohibits certain practices, and anchors what franchise documents and timing constraints are authoritative before franchise-system
      work can safely rely on disclosed obligations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-franchise-rule-compliance-guide
    title: Franchise Rule Compliance Guide
    publisher: Federal Trade Commission
    source_type: recognized workflow reference tied directly to the lane
    location: https://www.ftc.gov/system/files/documents/plain-language/bus70-franchise-rule-compliance-guide.pdf
    authority_reason: The FTC's compliance guide explains how Item 11 assistance, operating-manual access, required computer
      systems, training, advertising support, contract timing, and state-law interactions should be interpreted operationally.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-fdd-deep-dive
