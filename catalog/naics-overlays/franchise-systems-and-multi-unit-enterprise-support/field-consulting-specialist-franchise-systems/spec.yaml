    publisher: Federal Trade Commission
    source_type: recognized workflow reference tied directly to the lane
    location: https://consumer.ftc.gov/consumer-alerts/2023/05/franchise-fundamentals-taking-deep-dive-franchise-disclosure-document
    authority_reason: This FTC consumer-education guidance walks through FDD Items 1 through 20 in operational terms, including
      training, advertising, approved suppliers, current and former franchisee contacts, and support-quality checks that materially
      constrain field-support assumptions.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-considering-calculating-consulting
    title: 'Franchise Fundamentals: Considering, calculating, and consulting'
    publisher: Federal Trade Commission
    source_type: recognized workflow reference tied directly to the lane
    location: https://consumer.ftc.gov/consumer-alerts/2023/07/franchise-fundamentals-considering-calculating-and-consulting
    authority_reason: This FTC guidance ties the franchise agreement, operating manual, Item 19 financial-performance representations,
      and mandatory use of independent legal and accounting review into concrete decision boundaries for franchise-system
      support work.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-policy-statement-franchise-contract-provisions
    title: Policy Statement of the Federal Trade Commission on Franchisors' Use of Contract Provisions, Including Non-Disparagement,
