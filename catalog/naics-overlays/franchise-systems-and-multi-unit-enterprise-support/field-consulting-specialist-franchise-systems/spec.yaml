    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: iso-20000-1
    title: 'ISO/IEC 20000-1:2018 - Information technology — Service management — Part 1: Service management system requirements'
    publisher: International Organization for Standardization
    source_type: evidence or control standards relevant to the lane
    location: https://www.iso.org/standard/70636.html
    authority_reason: ISO/IEC 20000-1 is the recognized service-management standard for planning, transition, delivery, and
      improvement of services, making it directly relevant to change-readiness, handoff quality, and completion evidence in
      franchise-system operations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: franchise-disclosure-and-support-obligation-baseline
    retrieval_policy: Use the FTC Franchise Rule, FTC compliance guide, and FTC franchise-education resources to anchor what
      franchise documents, support obligations, operating-manual access, training, and computer-system requirements are publicly
      established.
    specialty_specific_exceptions:
    - Do not infer that disclosed support obligations authorize the lane to alter franchise terms, fees, or legal commitments.
  - category: state-registration-and-jurisdiction-variation
    retrieval_policy: Use NASAA and official state regulator guidance to determine when state filing, amendment, addendum,
      advertising, or broker-registration rules materially change the workflow.
    specialty_specific_exceptions:
    - Escalate to franchise compliance or legal review when state-specific rules or addenda materially conflict with federal
      or tenant guidance.
  - category: incident-access-change-and-service-controls
    retrieval_policy: Use NIST and ISO service-management standards to define evidence sufficiency, incident handling, access
      control, configuration-change discipline, and closure quality for franchise-system execution work.
    specialty_specific_exceptions:
    - Do not treat generic control frameworks as permission to close work when franchise-specific artifacts, unit signoff,
      or tenant policy inputs are missing.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the franchise regulator and standards baseline above as the public source hierarchy for this lane.
    - Inject tenant-specific franchise agreements, operating manual revisions, approved supplier lists, state addenda, authority
      matrices, and system-of-record mappings only through orchestrator-controlled retrieval.
    - Escalate when jurisdiction, territory, multi-unit ownership structure, or tenant security policy changes the result.
  specialty_specific_exceptions:
  - The lane may reference FDD Items 11, 19, 20, and 22, but it cannot create or revise disclosure content or make investment
    or earnings promises.
  - Operating-manual or franchise-agreement changes require documented approver and legal/compliance ownership outside the
    lane.
  - Complaint handling must preserve franchisee ability to speak with regulators and cannot be converted into a suppression
    or retaliation workflow.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-07-09'
