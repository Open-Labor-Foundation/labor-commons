    publisher: Federal Trade Commission
    source_type: named-industry operating guidance
    location: https://www.ftc.gov/system/files/ftc_gov/pdf/policy-statement-of-the-federal-trade-commission-on-franchisors-use-of-contract-provisions-including-non-disparagement-goodwill-and-confidentiality-clauses_0.pdf
    authority_reason: The FTC's 2024 policy statement is authoritative current guidance that franchise agreements and related
      documents may not restrict communications with regulators and that complaint-handling and undisclosed-fee issues are
      boundary-sensitive for franchising workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: nasaa-franchise-guidelines
    title: Franchise Registration and Disclosure Guidelines
    publisher: North American Securities Administrators Association
    source_type: recognized workflow reference tied directly to the lane
    location: https://www.nasaa.org/industry-resources/uniform-forms/franchise-registration-and-disclosure-guidelines/
    authority_reason: NASAA's guidelines are the recognized state-registration workflow baseline for franchise disclosure
      filings and explicitly note that state franchise relationship laws can require changes beyond the federal FTC format.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
