    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: nist-800-53r5
    title: NIST SP 800-53 Rev. 5, Security and Privacy Controls for Information Systems and Organizations
    publisher: National Institute of Standards and Technology
    source_type: evidence or control standards relevant to the lane
    location: https://csrc.nist.gov/pubs/sp/800/53/r5/upd1/final
    authority_reason: NIST SP 800-53 Rev. 5 is the authoritative public control catalog for access control, audit and accountability,
