    refresh_interval_days: 120
    decay_policy: refresh on OWASP ASVS release, application profile update, or tenant secure SDLC baseline conflict
    last_reviewed_at: '2026-04-14'
    status: active
research_constraints:
  required_source_classes:
  - Named-industry operating guidance
  - Recognized workflow references tied directly to the lane
  - Evidence or control standards relevant to the lane
  required_workflow_questions:
  - What named-industry records and systems actually govern the lane?
  - What failure modes make this industry materially different from a generic function?
  - What adjacent authority boundaries constrain the lane?
  unresolved_ambiguity_policy: 'Jurisdiction, sector, contractual, product, data-residency, privacy, safety, and tenant-specific
    control obligations must be recorded as unresolved unless tenant evidence identifies the applicable rule set. No blocking
    ambiguity remains for the public validated baseline because these unresolved items are converted into runtime prerequisites
    and escalation triggers.

    '
domain_caveats:
  regulated_or_contractual_limits:
  - Cybersecurity architecture guidance may be constrained by sector rules such as financial, healthcare, public-sector, education,
    industrial, defense, payment, privacy, or critical-infrastructure obligations.
  - The specialist may identify likely obligation areas and evidence dependencies, but legal, regulatory, contractual, audit,
    or formal risk acceptance authority remains outside this lane.
  - Control mappings are implementation rationale and evidence discipline, not audit opinions, compliance certification, or
    authorization to operate.
  privacy_safety_financial_limits:
  - Architectural recommendations affecting personal data, protected data, safety-critical systems, payment flows, trading
    systems, medical devices, operational technology, or customer-impacting availability require tenant-specific owners and
    human review.
  - Conflicts between security architecture recommendations and tenant resilience, safety, regulatory, or customer-impact
    requirements must be escalated with alternatives and assumptions rather than resolved unilaterally.
materialization:
  runtime_strategy: specification-based
  safe_materialization_requirements:
  - Load task, scope, boundary, adjacent-specialist, authority-source, and refusal metadata from this manifest.
  - Require tenant architecture evidence, identity trust model, control evidence, threat/risk context, resilience constraints,
    and tenant policy context before confident recommendations.
  - Record source IDs, tenant evidence IDs, assumptions, uncertainty, residual risk owners, and handoff decisions in every
    output.
  - Enforce refusal and orchestrator return triggers before executing any workflow step.
  - Keep tenant retrieval, cache, logs, and adaptation data isolated by tenant and request context.
  trusted_build_promotion_policy:
    current_claim: No retained implementation is claimed by this package.
    promotion_criteria:
    - Sustained tenant demand shows this lane is called frequently enough to justify retained generated implementation.
    - At least two release cycles show stable scenario pass rate, no boundary regressions, and low escalation false-positive
      rate.
    - Security review approves implementation sandboxing, retrieval controls, logging, tenant isolation, and rollback behavior.
    - Generated implementation is traceable to this spec pack and has its own promotion evidence.
    retention_default: Do not store a long-lived generated implementation in-repo unless promotion criteria are met.
