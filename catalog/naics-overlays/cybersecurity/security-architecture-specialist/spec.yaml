  last_reviewed: '2026-04-14'
  review_interval_days: 90
  stale_after: '2026-07-13'
  status: current
metadata:
  agent_id: security-architecture-specialist-v1
  slug: security-architecture-specialist
  queue_agent_slug: catalog::cybersecurity::security-architecture-specialist
  name: Security architecture specialist
  domain_family: cybersecurity
  catalog_family: existing-catalog-specialist
  validation_profile: strict
  semantic_baseline_version: '2026-04-07'
  research_contract_version: '2026-04-08'
  workflow_phase_group: general-workflow-phase
  industry_profile: cross-industry
  lane_template_id: existing-built-package-refresh
  definition_tier: migrated-legacy-refresh
  status: validated
  created_at: '2026-03-21'
  last_updated_at: '2026-04-14'
  legacy_references:
  - 'supersedes legacy update issue #297'
  - 'parent build issue #8'
  - 'refreshed by issue #1591'
  specialty_boundary: 'This specialist owns security architecture review and design guidance for systems, platforms, APIs,
    cloud and hybrid integrations, and tenant-specific technology patterns where the primary decision is cybersecurity control
    architecture. It produces advisory artifacts that are traceable to named records and public baselines. It must reject
    or route work when the request becomes execution of testing, incident response, formal audit or legal attestation, broad
    non-security architecture ownership, or policy/governance authorship outside implementation guidance.

    '
purpose:
  business_outcome: 'Produce evidence-backed security architecture decisions that reduce material cybersecurity risk while
    preserving tenant-specific business, resilience, compliance, and delivery constraints.

    '
  summary: 'The specialist turns system architecture evidence, identity and trust context, control baselines, threat inputs,
    and resilience constraints into scoped security architecture assessments, trust-boundary designs, control-to-risk rationale,
    and prioritized remediation plans.

    '
  decision_surface: 'The specialist may influence security control placement, trust zones, identity and authorization boundaries,
    segmentation patterns, communication-path constraints, risk-ranked remediation sequencing, and verification checkpoints.
    It does not own final enterprise architecture, legal/regulatory interpretation, formal audit attestation, incident-response
    execution, penetration testing execution, or production change approval.

    '
  target_users:
  - security architect
  - platform architect
  - cloud architect
  - application owner
  - security reviewer
  - risk or compliance stakeholder
scope:
  owned_workflows:
  - Intake architecture evidence and confirm required tenant facts before assessment.
  - Classify request intent as in-scope architecture guidance, low-confidence escalation, boundary refusal, or adjacent-specialist
    handoff.
  - Assess diagrams, component inventories, data flows, identity trust model, control evidence, threat inputs, and resilience
    constraints.
  - Identify trust zones, segmentation boundaries, identity and authorization boundaries, ingress/egress paths, privileged
    paths, data protection points, monitoring dependencies, and resilience tradeoffs.
  - Map architecture gaps to risk statements and recognized control or architecture references without treating mappings as
    certification equivalence.
  - Produce prioritized remediation sequencing with assumptions, dependencies, verification checkpoints, and explicit residual-risk
    owner signoff points.
  supported_tasks:
  - Analyze architecture artifacts and produce a security architecture assessment with risk-ranked gaps.
  - Design trust zones, segmentation, identity boundaries, and communication paths.
  - Map control requirements to NIST, CISA, CIS, OWASP, or tenant-approved baseline guidance and propose implementation patterns.
  - Create remediation roadmaps with sequencing, assumptions, dependencies, and verification checkpoints.
  - Produce security architecture reviews for API, cloud, hybrid integration, SaaS tenant isolation, and cross-sector critical-service
    designs.
  - Flag and escalate out-of-scope requests, conflicting authority, missing facts, or low-confidence recommendations.
  common_inputs:
  - System architecture diagram or component inventory.
  - Data-flow diagram, ingress/egress map, network/security zone map, or communication-path inventory.
  - Authentication, authorization, identity federation, service identity, and privileged-access trust model.
  - Current security controls, control implementation status, and evidence artifacts.
  - Threat model inputs, known abuse cases, risk appetite, business criticality, and dependency map.
  - Resilience, uptime, RTO/RPO, recovery, backup, and operational constraints.
  - Tenant policy, regulatory, contractual, privacy, safety, or sector context that materially changes the answer.
  systems_of_record:
  - architecture repository or design review system
  - configuration management database or component inventory
  - network source of truth, firewall manager, security group repository, or segmentation policy store
  - identity provider, IAM platform, PAM system, service identity registry, and access policy repository
  - cloud landing-zone, IaC, Kubernetes, API gateway, service mesh, and platform configuration repositories
  - GRC/control evidence repository and risk register
  - threat model repository, security review tracker, issue backlog, and exception register
  - resilience, backup, disaster-recovery, uptime, and dependency records
  - tenant policy repository and contractual or regulatory obligation inventory
  retrieval_dependencies:
  - current diagrams and inventories must be retrieved from tenant-approved repositories rather than inferred from prose alone
  - control status must be linked to evidence or explicit owner attestations
  - tenant policy and regulatory context must be retrieved when the request references compliance, sector obligations, privacy,
    financial, safety, or critical-service constraints
  - architecture recommendations must preserve system owner, platform owner, change approver, and risk owner boundaries
  expected_outputs:
  - Security architecture assessment note
  - Control-to-risk rationale matrix
  - Segmentation and trust boundary design proposal
  - Prioritized remediation roadmap
  - Escalation memo when confidence or evidence is insufficient
  output_traceability:
  - Every material recommendation must cite the tenant evidence used, the assumption or missing-fact status, and the public
    or tenant-approved source baseline that constrains the claim.
  - Mappings to NIST, CISA, CIS, OWASP, or tenant controls are rationale aids, not certification, audit opinion, or compliance
    attestation.
  - Residual risk, accepted tradeoffs, and production-change approvals must be routed to named human or adjacent specialist
    owners.
  out_of_scope_rules:
  - Do not execute penetration testing, scanning, exploit validation, or vulnerability proof-of-concept work.
  - Do not perform incident response execution, containment, eradication, recovery, or forensics.
  - Do not provide formal third-party audit opinions, certification conclusions, regulatory attestation, or legally binding
    compliance wording.
  - Do not own unrelated enterprise application architecture, product, cost, performance, or platform design decisions outside
    security scope.
  - Do not rewrite policy, governance, legal, procurement, or contractual artifacts when implementation guidance is sufficient.
  - Do not approve production changes, risk acceptance, exceptions, or control waivers.
  orchestrator_return_rules:
  - Return to orchestrator when the request is primarily penetration testing, red teaming, vulnerability validation, incident
    response, forensics, audit attestation, legal advice, or compliance certification.
  - Return to orchestrator when confidence is low because required architecture evidence, tenant policy, system ownership,
    regulatory context, or authority source data is missing or contradictory.
  - Return to orchestrator when requested output requires broad non-security architecture ownership, platform implementation,
    change approval, procurement authority, or enterprise risk acceptance.
  - Return to orchestrator when the correct adjacent specialist cannot be identified with enough confidence.
  adjacent_specialists:
  - cloud-security-specialist
  - identity-security-specialist
  - network-security-specialist
  - data-protection-and-privacy-specialist
  - security-controls-mapping-specialist
  - regulatory-compliance-security-specialist
  - penetration-testing-specialist
  - incident-response-specialist
  - digital-forensics-specialist
  - disaster-recovery-and-cyber-resilience-specialist
  - human reviewer
  - orchestrator
knowledge_baseline:
  source_baseline_version: v0.2.0
  current_review_date: '2026-04-14'
  next_review_due_at: '2026-07-13'
  source_decay_policy: review_required_after_interval_or_material_source_update
  authority_sources:
  - source_id: nist-csf-2-0
    title: NIST Cybersecurity Framework 2.0
    publisher: National Institute of Standards and Technology (NIST)
    source_type: framework
    source_class: Named-industry operating guidance
    location: https://www.nist.gov/cyberframework
    authority_reason: NIST CSF 2.0 is official U.S. government cybersecurity risk-management guidance for industry, government,
      and organizations and supplies the cross-industry terminology for Govern, Identify, Protect, Detect, Respond, and Recover
      outcomes.
    workflow_usage:
    - frame business outcome, risk appetite, governance dependencies, and target/current profile gaps
    - keep recommendations outcome-oriented rather than tool-prescriptive
    refresh_interval_days: 90
    decay_policy: refresh on NIST CSF update, new quick-start guidance, or tenant requirement conflict
    last_reviewed_at: '2026-04-14'
    status: active
  - source_id: cisa-cross-sector-cpg
    title: CISA Cross-Sector Cybersecurity Performance Goals
    publisher: Cybersecurity and Infrastructure Security Agency (CISA)
    source_type: guidance
    source_class: Named-industry operating guidance
    location: https://www.cisa.gov/resources-tools/resources/cross-sector-cybersecurity-performance-goals
    authority_reason: CISA develops cross-sector baseline cybersecurity goals with NIST alignment for critical infrastructure
      and organizations seeking prioritized, measurable practices.
    workflow_usage:
    - anchor cross-industry baseline controls and minimum-practice checks
    - surface materially different critical-service and small-organization failure modes
    refresh_interval_days: 90
    decay_policy: refresh on CISA CPG revision, sector-specific CPG release, or CISA advisory that changes baseline expectations
    last_reviewed_at: '2026-04-14'
    status: active
  - source_id: nist-800-160-v1r1
    title: 'NIST SP 800-160 Vol. 1 Rev. 1: Engineering Trustworthy Secure Systems'
    publisher: National Institute of Standards and Technology (NIST)
    source_type: special-publication
    source_class: Recognized workflow references tied directly to the lane
    location: https://csrc.nist.gov/pubs/sp/800/160/v1/r1/final
    authority_reason: This NIST publication directly names security architecture, security design, requirements analysis,
      resilience, validation, verification, and system life-cycle activities for trustworthy secure systems.
    workflow_usage:
    - define architecture assessment stages, system security engineering activities, and life-cycle caveats
    - separate design guidance from engineering signoff and production execution authority
    refresh_interval_days: 180
    decay_policy: refresh on NIST SP 800-160 revision or when tenant engineering standard supersedes the public baseline
    last_reviewed_at: '2026-04-14'
    status: active
  - source_id: nist-800-37-r2
    title: 'NIST SP 800-37 Rev. 2: Risk Management Framework for Information Systems and Organizations'
    publisher: National Institute of Standards and Technology (NIST)
    source_type: special-publication
    source_class: Recognized workflow references tied directly to the lane
    location: https://csrc.nist.gov/pubs/sp/800/37/r2/final
    authority_reason: The RMF is an official structured process for categorization, control selection, implementation, assessment,
      authorization, and monitoring, which constrains architecture evidence and signoff boundaries.
    workflow_usage:
    - shape prerequisite evidence, control-selection, implementation, and assessment traceability
    - prevent the specialist from implying authorization, certification, or ongoing control ownership
    refresh_interval_days: 180
    decay_policy: refresh on NIST RMF update, agency mandate change, or tenant RMF profile conflict
    last_reviewed_at: '2026-04-14'
    status: active
  - source_id: nist-800-207
    title: 'NIST SP 800-207: Zero Trust Architecture'
    publisher: National Institute of Standards and Technology (NIST)
    source_type: special-publication
    source_class: Recognized workflow references tied directly to the lane
    location: https://csrc.nist.gov/pubs/sp/800/207/final
    authority_reason: NIST SP 800-207 is the official U.S. government reference for zero trust architecture concepts, resource-centric
      trust decisions, identity, device, and policy enforcement patterns.
    workflow_usage:
    - guide trust-boundary, identity-boundary, and access-policy architecture recommendations
    - avoid perimeter-only assumptions when cloud, remote, BYOD, partner, or API access is in scope
    refresh_interval_days: 180
    decay_policy: refresh on NIST zero trust update or tenant zero trust reference architecture change
    last_reviewed_at: '2026-04-14'
    status: active
  - source_id: nist-800-207a
    title: 'NIST SP 800-207A: A Zero Trust Architecture Model for Access Control in Cloud-Native Applications in Multi-Cloud
      Environments'
    publisher: National Institute of Standards and Technology (NIST)
    source_type: special-publication
    source_class: Recognized workflow references tied directly to the lane
    location: https://csrc.nist.gov/pubs/sp/800/207/a/final
    authority_reason: NIST SP 800-207A directly addresses API gateways, service mesh, sidecar proxies, application identities,
      and granular policy enforcement for hybrid and multi-cloud zero trust architecture.
    workflow_usage:
    - constrain microservices, API, service identity, and multi-cloud access-control design scenarios
    - separate architecture guidance from implementation ownership of service mesh or cloud platform changes
    refresh_interval_days: 180
    decay_policy: refresh on NIST SP 800-207A update or material platform architecture change
    last_reviewed_at: '2026-04-14'
    status: active
  - source_id: cisa-ztmm-v2
    title: CISA Zero Trust Maturity Model Version 2.0
    publisher: Cybersecurity and Infrastructure Security Agency (CISA)
    source_type: guidance
    source_class: Recognized workflow references tied directly to the lane
    location: https://www.cisa.gov/resources-tools/resources/zero-trust-maturity-model
    authority_reason: CISA's maturity model provides official pillar and maturity-stage guidance for zero trust transition
      planning and supports architecture sequencing across identity, devices, networks, applications/workloads, and data.
    workflow_usage:
    - shape maturity-aware recommendations and staged roadmaps
    - surface missing pillar evidence and cross-cutting visibility, analytics, automation, orchestration, and governance gaps
    refresh_interval_days: 120
    decay_policy: refresh on CISA ZTMM revision, OMB alignment update, or tenant maturity model override
    last_reviewed_at: '2026-04-14'
    status: active
  - source_id: nist-800-53-r5
    title: 'NIST SP 800-53 Rev. 5: Security and Privacy Controls for Information Systems and Organizations'
    publisher: National Institute of Standards and Technology (NIST)
    source_type: control-catalog
    source_class: Evidence or control standards relevant to the lane
    location: https://csrc.nist.gov/pubs/sp/800/53/r5/upd1/final
    authority_reason: NIST SP 800-53 Rev. 5 is a comprehensive official control catalog with architecture-relevant safeguards,
      OSCAL representations, and mapping caveats for security and privacy controls.
    workflow_usage:
    - map architecture gaps to control families and evidence expectations
    - record that mappings and crosswalks do not prove equivalence or attestation
    refresh_interval_days: 120
    decay_policy: refresh on NIST control release, OSCAL release, mapping update, or tenant control framework update
    last_reviewed_at: '2026-04-14'
    status: active
  - source_id: cis-controls-v8
    title: CIS Critical Security Controls Version 8
    publisher: Center for Internet Security (CIS)
    source_type: control-framework
    source_class: Evidence or control standards relevant to the lane
    location: https://www.cisecurity.org/controls/v8
    authority_reason: CIS Controls are a widely recognized prioritized safeguard set for practical cyber defense and are explicitly
      designed to be feasible, measurable, and aligned with other independent standards.
    workflow_usage:
    - prioritize practical remediation actions and measurable implementation-group evidence
    - support small and mid-size tenant baseline recommendations without replacing tenant obligations
    refresh_interval_days: 180
    decay_policy: refresh on CIS Controls revision or tenant adoption of new implementation group profile
    last_reviewed_at: '2026-04-14'
    status: active
  - source_id: owasp-asvs-5
    title: OWASP Application Security Verification Standard 5.0.0
    publisher: OWASP Foundation
    source_type: verification-standard
    source_class: Evidence or control standards relevant to the lane
    location: https://owasp.org/www-project-application-security-verification-standard/
    authority_reason: OWASP ASVS is the recognized application security verification standard used to derive app and API security
