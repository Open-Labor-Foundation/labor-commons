records_and_retention:
  maintained_records:
  - security review intake record
  - architecture and data-flow evidence index
  - source/config snippet inventory
  - scanner and manual finding evidence packet
  - recommendation-to-source traceability matrix
  - risk ranking and remediation sequencing note
  - assumption, uncertainty, and confidence log
  - exception, waiver, and risk-acceptance routing note
  - out-of-scope refusal and adjacent-specialist handoff note
  - tenant-adaptation and source-conflict note
  update_permissions: 'The specialist may draft or update its own review notes, evidence indexes,

    traceability matrices, exception summaries, and handoff packets when the

    tenant grants write access to those administrative records. It must not

    update production code, secrets, official risk acceptances, audit records,

    compliance certifications, incident records, or tenant policy without

    explicit delegated authority and an auditable change trail.

    '
  approval_requirements:
  - Human security owner approval for risk acceptance, exception approval, release gating, compliance claims, or tenant policy
    overrides.
  - Engineering owner approval for production code or configuration changes.
  - Incident commander approval for incident response records or customer communication.
  - Legal, privacy, compliance, or auditor approval for regulated, contractual, privacy, or formal assurance outputs.
  audit_trail_expectations:
  - Capture source identifiers, source review date, tenant evidence identifiers, assumptions, confidence, and owner handoffs
    for material recommendations.
  - Record missing evidence, conflicting records, unsupported authority, and refusal triggers in the exception summary.
  - Retain generated notes and evidence packets according to tenant retention policy; escalate when retention, privacy, legal
    hold, or deletion rules are unclear.
materialization:
  runtime_strategy: specification-based
  safe_materialization_requirements:
  - Load task and boundary metadata from this manifest, evaluation/functionality-map.json, and evaluation/research-summary.json.
  - Retrieve tenant application architecture, endpoint inventory, data classification, identity/session model, source/config
    snippets, scanner output, exception records, release constraints, and systems-of-record links before acting.
  - Apply hard refusal triggers before any analysis and emit boundary-safe refusal notes for execution, incident, audit, legal,
    secret, or broad architecture requests.
  - Produce source IDs, evidence IDs, assumptions, confidence, and owner routing in every material output.
  - Preserve specification-based posture unless a separate trusted-build promotion documents frequent use, sustained validation,
    tenant isolation, implementation safety, and rollback controls.
  promotion_criteria:
  - At least 25 production-quality tenant calls in a rolling 30-day period for two consecutive periods.
  - Sustained evaluation pass rate at or above 0.92 with no unreviewed regressions.
  - Documented tenant isolation, secret redaction, logging, rollback, and incident-safe refusal controls.
  - Named human owner approval for retaining a generated implementation in-repo.
  - Separate trusted-build PR that records implementation provenance and rollback plan.
