knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: NIST CSF and CISA cross-sector guidance define cross-industry cybersecurity outcomes, risk framing, secure-by-design
      expectations, and baseline practices for web software producers and consumers.
  - class: Recognized workflow references tied directly to the lane
    rationale: NIST SSDF, CISA secure-by-design guidance, NIST identity guidance, OWASP ASVS, OWASP API guidance, and NIST
      incident response guidance define secure SDLC, review, evidence, authentication, API, and refusal-boundary workflows
      directly relevant to web application security.
  - class: Evidence or control standards relevant to the lane
    rationale: OWASP ASVS, OWASP Top 10, OWASP API Security Top 10, CIS Controls, NIST SP 800-53, NARA records management,
      and PCI/FTC public guidance support evidence expectations, control mapping, recordkeeping, caveats, and failure handling.
  source_selection_approach: 'Use NIST and CISA sources for cross-industry cybersecurity operating

    language and secure software lifecycle framing; OWASP and CIS sources for

    application and API control terminology; NIST identity, control, and

    incident-response sources for authentication evidence, control traceability,

    and boundary routing; NARA records management for retention, audit-trail,

    and documentation discipline; and PCI/FTC public guidance only as caveats

    when payment-card or regulated customer-data facts are supplied by the

    tenant. Tenant-specific policies, platforms, sectors, control baselines,

    and regulatory obligations narrow but do not replace the public baseline

    unless an authorized tenant source hierarchy is provided.

    '
