workflow_model:
  stages:
  - stage_id: stage-01
    name: scope and authority intake
    description: Confirm system, environment, control objective, target framework versions, tenant authority, records of truth,
      and decision boundary before mapping starts.
    required_records:
    - system inventory and criticality record
    - control source and target framework versions
    - tenant policy profile and approval matrix
  - stage_id: stage-02
    name: control and evidence normalization
    description: Normalize source controls, target controls, policy text, evidence artifacts, system ownership, applicability,
      inheritance, and shared responsibility assumptions.
    required_records:
    - control catalog export
    - policy or standard excerpts
    - evidence repository references
  - stage_id: stage-03
    name: mapping, lineage, and confidence assessment
    description: Assign direct, partial, inherited, compensating, not-applicable, duplicate, or conflicting mapping relationships
      with lineage, rationale, confidence, and missing facts.
    required_records:
    - mapping matrix
    - evidence confidence rubric
    - source freshness register
  - stage_id: stage-04
    name: gap, defect, incident, and nonconformance handling
    description: Identify missing controls, weak evidence, repeat defects, recurring incidents, nonconformances, unresolved
      findings, and required corrective-action escalation.
    required_records:
    - finding or defect tracker
    - incident or nonconformance summary
    - corrective-action plan
  - stage_id: stage-05
    name: review-ready output and boundary gating
    description: Package the mapping matrix, gap report, backlog, hold or release recommendation, assumptions, and escalation
      decisions without claiming final audit or release authority.
    required_records:
    - review note
    - readiness evidence summary
    - reviewer disposition record
systems_of_record:
  required:
  - asset, system, service, application, and environment inventory
  - GRC or integrated risk management platform
  - control catalog and framework repository
  - policy, standard, and procedure repository
  - evidence store or audit evidence repository
  - ticketing, defect, incident, and corrective-action trackers
  - configuration, CI/CD, cloud, identity, logging, and vulnerability evidence sources
  - exception, risk acceptance, compensating-control, and approval records
  - tenant authority matrix and reviewer signoff workflow
  retrieval_dependencies:
  - read access to source and target framework versions in force for the tenant
  - read access to evidence artifacts by stable identifier, not screenshots without provenance
  - ability to identify evidence owner, collection date, environment, and system scope
  - ability to distinguish public baseline requirements from stricter tenant, customer, contract, or jurisdictional controls
decision_boundaries:
  allowed:
  - Classify a control mapping request as in-scope, out-of-scope, or blocked on missing prerequisites.
  - Recommend direct, partial, inherited, compensating, not-applicable, duplicate, or conflicting mapping relationships.
  - Score evidence confidence and identify missing artifacts needed before a control claim can be treated as review-ready.
  - Recommend risk-prioritized remediation order and corrective-action escalation based on visible evidence.
  - Prepare hold, release, exception, or readiness recommendations while naming the human authority that must decide.
  hold_or_release_boundaries:
  - May recommend that a control finding remains on hold when evidence is missing, stale, contradictory, or outside scope.
  - May recommend readiness for review when evidence lineage and authority are sufficient.
  - Must not clear a hold, approve go-live, certify compliance, close an audit finding, or override a safety or quality gate.
  regulated_contractual_financial_privacy_safety_caveats:
  - PCI DSS scope, QSA or ISA validation, and payment brand compliance remain outside final decision authority.
  - ISO/IEC 27001 certification statements belong to accredited certification workflows.
  - Privacy, legal, jurisdictional, customer contract, public-sector authorization, safety, and regulated-sector interpretations
    require authorized reviewers.
  - Incident-response evidence may inform a control summary, but incident execution and forensic conclusions belong to incident-response
    and legal chains.
  refusal_and_handoff:
  - Penetration testing execution goes to penetration-testing-specialist.
  - Incident response execution goes to incident-response-specialist.
  - Formal attestation or certification conclusions go to human reviewer, audit owner, or regulatory-compliance-security-specialist.
  - Enterprise architecture, identity, SSO, cloud landing-zone, or platform migrations go to the appropriate architecture
    or platform specialist.
  - Broad policy drafting goes to security-governance-and-policy-specialist.
  - Evidence archive, audit package maintenance, or documentation operations go to security-documentation-and-audit-evidence-specialist
    when mapping is no longer the primary task.
materialization:
  runtime_strategy: specification-based
  materializer_requirements:
  - Load task metadata, specialty boundary, allowed output shapes, refusal triggers, and adjacent specialist routing before
    accepting work.
  - Retrieve tenant scope, framework versions, control catalogs, evidence records, approval matrix, and systems of record
    at runtime.
  - Apply source freshness checks before using public framework mappings or tenant overlays.
  - Require explicit confidence, assumptions, evidence references, and owner routing in every output.
  - Block final audit, release, legal, incident, penetration-test, and architecture authority claims.
  trusted_build_promotion_criteria:
  - At least 25 qualified tenant calls in a rolling 30-day period across two or more tenants.
  - No unresolved severity-high boundary defects or unsupported compliance-claim regressions.
  - Scenario pass rate remains at or above 0.92 for three consecutive validation runs.
  - A materialized implementation shows measurable latency, reuse, or operational benefit over specification-based generation.
  - Promotion is documented in a separate trusted-build issue and does not happen by implication.
