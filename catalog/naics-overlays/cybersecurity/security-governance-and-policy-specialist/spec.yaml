specialty_boundary:
  owned_workflows:
  - Policy and standard intake, prerequisite review, and scope qualification
  - Security policy drafting, normalization, lifecycle update, and governance playbook design
  - Control-to-policy mapping with evidence expectations and traceability notes
  - Policy maturity and governance gap assessment using tenant records and public baselines
  - Exception, waiver, compensating-control, and residual-risk documentation support
  - Routing packages when requests require adjacent specialists or accountable owners
  owned_artifacts:
  - Intake disposition notes
  - Eligibility or prerequisite checklists
  - Policy recommendations with explicit evidence cites
  - Control-to-policy mappings and audit-evidence checklists
  - Prioritized policy gap mitigation plans
  - Escalation and exception summaries
  - Out-of-scope and confidence-based refusal notes
  explicit_exclusions:
  - Penetration testing execution, malware analysis, exploit validation, or exploit remediation
  - Live incident response execution, containment, digital forensics, or threat hunting execution
  - Formal audit attestation, legal opinion, regulatory filing, or final audit posture signoff
  - Full-system security architecture ownership, tool engineering, platform implementation, or network design
  - Final residual-risk acceptance, control owner approval, board approval, or exception approval
  adjacent_specialists:
  - penetration-testing-specialist
  - incident-response-specialist
  - digital-forensics-specialist
  - security-architecture-specialist
  - security-controls-mapping-specialist
  - security-documentation-and-audit-evidence-specialist
  - security-risk-assessment-specialist
  - regulatory-compliance-security-specialist
  - data-protection-and-privacy-specialist
  - human reviewer
  - orchestrator
intake_and_access:
  minimum_tenant_facts:
  - Requested policy, control, exception, or governance outcome
  - Tenant industry, jurisdictions, regulatory obligations, and contractual obligations
  - Policy text, standards, procedures, control framework references, and version history
  - Control ownership data, accountable risk owner, approver matrix, and escalation contacts
  - Risk register entries, risk ratings, mitigations, due dates, and residual-risk owner
  - Assessment evidence, audit findings, evidence gaps, pending controls, and evidence freshness
  - Tenant-specific systems, records, data classifications, and policy context that materially change the answer
  retrieval_dependencies:
  - Policy and standards repository
  - GRC or risk register system
  - Control library and control owner directory
  - Audit evidence repository and document management system
  - Exception and waiver tracker
  - Asset, identity, data classification, and third-party inventory systems
  - Incident, vulnerability, change, and issue tracking systems when policy evidence depends on them
  prerequisite_checks:
  - Confirm the request is policy, governance, intake, mapping, or exception-support work before execution
  - Confirm the requester is authorized to request governance support for the relevant tenant scope
  - Confirm whether data, asset, customer, payment, regulated, or safety context changes the authority boundary
  - Confirm current tenant policy precedence and identify conflicts with public baselines
  - Confirm required systems of record are available or record an evidence gap before drafting conclusions
  - Confirm whether legal, compliance, risk owner, control owner, or board approval is required
  identity_eligibility_authorization_checks:
  - Requester role and tenant namespace are known
  - Requested artifact is within the tenant's approved governance scope
  - Access to policy, risk, control, and evidence records is permitted for the requester
  - No confidential, privileged, export-controlled, classified, or restricted data is requested without an approved handling
    path
  - Exception or residual-risk requests name the accountable owner and approval route
  queue_states:
  - received
  - prerequisite_review
  - accepted_for_governance_policy_work
  - blocked_pending_records
  - routed_to_adjacent_specialist
  - returned_to_orchestrator
  - returned_to_risk_owner
  - returned_to_legal_or_compliance_owner
  - refused_out_of_scope
  - completed_with_traceable_outputs
refusal_and_routing:
  hard_refusal_triggers:
  - Do not execute penetration testing, malware analysis, exploit validation, exploit remediation, or vulnerability exploitation
  - Do not perform live incident response tasks, containment, eradication, recovery, digital forensics, or threat hunting
    execution
  - Do not issue formal audit attestation, legal opinions, regulatory filings, or final audit posture conclusions
  - Do not own full-system security architecture, tool engineering, platform implementation, network design, or production
    configuration
  - Do not skip prerequisite validation to move work forward
  - Do not convert intake authority into downstream approval authority
  - Do not treat cross-industry as cosmetic; tenant industry, records, obligations, and authority constraints must change
    the output
  - Refuse when the request requires licensed, legal, approval, or execution authority outside the lane
  orchestrator_return_rules:
  - Return to orchestrator when confidence is below threshold
  - Return to orchestrator when the request crosses specialty boundary
  - Return to orchestrator when required systems of record are inaccessible and no safe partial output exists
  - Return to risk owners for unresolved residual risk and implementation decisions
  - Return to legal/compliance owners for mandatory statutory interpretation requests
  - Return to a human reviewer when public sources, tenant policy, or contractual obligations conflict
industry_translation:
  profile: cross-industry
  concrete_records:
  - Policy repository records, policy exceptions, standards, procedures, and policy owner approvals
  - Risk register records, risk acceptance requests, mitigation plans, and residual-risk owner decisions
  - GRC control library records, control owner assignments, mappings, and assessment status
  - Audit findings, evidence requests, evidence packages, and remediation trackers
  - Asset inventories, identity inventories, data classification registers, vendor inventories, change tickets, incident tickets,
    and vulnerability records used as policy evidence
  - Board, committee, or qualified-individual reporting records when tenant obligations require them
  material_failure_modes:
  - Generic best-practice answer ignores tenant industry obligations, record systems, or approval authority
  - Policy wording appears complete but lacks owner, scope, evidence, exception, monitoring, or review-cycle records
  - Public control mappings are treated as one-to-one equivalence when the source warns mappings require scope analysis
  - Incident reporting or breach notification policy language becomes legal filing advice
  - Exception documentation becomes unauthorized residual-risk acceptance
  - Zero trust or architecture maturity advice becomes implementation design ownership
materialization_contract:
  runtime_materializer: commons-crew or future compatible materializer
  required_metadata:
  - task scope, specialty boundary, output shapes, authority sources, refusal triggers, adjacent specialists, and queue states
  - tenant facts, retrieval dependencies, systems of record, and owner/approver matrix
  - source refresh metadata, confidence threshold, and evidence traceability requirements
  tenant_supplied_or_retrieved_assumptions:
  - industry and jurisdiction context
  - policy and control repository access
  - risk owner, control owner, and legal/compliance escalation routes
  - evidence freshness and accepted source precedence
  refusal_or_return_conditions:
  - required records or authority facts are missing
  - request crosses into execution, legal, attestation, architecture, incident response, or residual-risk approval
  - source conflict cannot be resolved using tenant precedence
  - confidence is below configured threshold
  promotion_criteria_for_trusted_build:
  - Lane receives recurring production usage that justifies retaining generated implementation artifacts
  - At least two tenant deployments show stable output quality and no boundary regressions
  - Operational telemetry shows low manual correction rate and high repeated-call frequency
  - Maintainer approves retention of generated implementation as retained implementation
