materialization:
  runtime_strategy: specification-based
  materializer_requirements:
  - Load the manifest, research summary, functionality map, scenarios, results, readiness evidence, deployment notes, and
    marketing notes before generating runtime behavior.
  - Retrieve tenant topology, inventory, control policy, telemetry, change, risk, exception, and approval facts from tenant-authorized
    systems before producing material recommendations.
  - Attach source identifiers, evidence artifact identifiers, confidence labels, assumptions, refusal triggers, and orchestrator-return
    decisions to runtime outputs.
  - Preserve tenant isolation; never reuse tenant topology, rule exports, telemetry, exception records, or policy context
    across tenants.
  trusted_build_promotion_criteria:
  - At least 25 successful tenant-authorized invocations in a rolling 90-day period with materially similar workflow patterns.
  - No unresolved high-severity boundary failures, source-discipline failures, or cross-tenant isolation failures.
  - Maintained pass rate at or above 0.92 across the current strict scenario suite and tenant-specific regression checks.
  - Human approval from catalog owner and security reviewer that a retained built implementation is safer and cheaper than
    JIT materialization.
  trusted_built_runtime_claimed: false
