knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: NIST CSF and CISA CPGs define cross-industry cybersecurity risk, priority, and critical-service outcomes that
      must shape network-security planning rather than generic IT scheduling.
  - class: Recognized workflow references tied directly to the lane
    rationale: NIST firewall, zero trust, cloud-native zero trust, RMF, and CISA microsegmentation guidance define firewall
      policy, segmentation, trust boundary, evidence, authorization, and planning workflows.
  - class: Evidence or control standards relevant to the lane
    rationale: NIST SP 800-53, CIS Controls, and OWASP logging guidance define control evidence, network documentation, monitoring,
      log protection, and exception artifacts.
  source_selection_approach: 'Use NIST and CISA as the public operating baseline for cybersecurity risk,

    zero trust, firewall policy, RMF planning, microsegmentation, and critical

    service prioritization. Use CIS Controls for practical network

    infrastructure and monitoring safeguards. Use OWASP logging guidance where

    WAF, web-boundary, and application-event evidence affects network-security

    recommendations. Tenant policy and approved systems of record override

    generic assumptions but do not authorize the specialist to make final

    approval, legal, or attestation claims.

    '
  authority_sources:
  - source_id: nist-csf-2
    title: The NIST Cybersecurity Framework (CSF) 2.0
    publisher: National Institute of Standards and Technology (NIST)
    source_type: named-industry-operating-guidance
    location: https://www.nist.gov/publications/nist-cybersecurity-framework-csf-20
    authority_reason: NIST CSF 2.0 is official U.S. government guidance for industry, government, and other organizations
