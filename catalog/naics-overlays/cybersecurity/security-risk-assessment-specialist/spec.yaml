- security-governance-and-policy-specialist
- orchestrator
- human reviewer
knowledge_baseline:
  source_baseline_version: '2026-04-14'
  source_classes:
  - class: Named-industry operating guidance
    rationale: NIST CSF 2.0, CISA Cybersecurity Performance Goals, and CISA Cyber Resilience Review describe cybersecurity
      risk-management, resilience, assessment, and operating practices for cross-industry organizations.
  - class: Recognized workflow references tied directly to the lane
    rationale: NIST SP 800-30, SP 800-37, SP 800-39, CIS RAM, and OWASP risk rating define risk assessment workflow, likelihood
      and impact factors, residual risk, authorization or monitoring boundaries, and confidence limits.
  - class: Evidence or control standards relevant to the lane
    rationale: NIST SP 800-53, CIS Controls v8.1, CISA CPGs, and selected public regulator references define control evidence,
      safeguard expectations, assessment artifacts, and authority constraints.
  - class: Current package task baseline
    rationale: The existing committed package preserves legacy supported tasks, common inputs, output shapes, and refusal
      rules as regression context while the refreshed spec becomes canonical.
  source_selection_approach: 'Use NIST SP 800-30 as the primary risk assessment method, NIST SP 800-39 and CSF 2.0 for organization-wide
    risk governance and terminology, NIST SP 800-37 for RMF and authorization boundaries, NIST SP 800-53 and CIS Controls
    v8.1 for control and evidence vocabulary, CISA CPG/CRR for operational resilience and practical cross-sector security
    outcomes, CIS RAM for implementation-oriented risk assessment against CIS Controls, OWASP risk rating for application-specific
    likelihood and impact factors, and public regulator references only as caveats that trigger compliance or legal routing.

    '
