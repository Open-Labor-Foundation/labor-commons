  source_categories:
  - category: Risk assessment workflow
    retrieval_policy: Use asset, threat, vulnerability, control, likelihood, impact, uncertainty, and business-context evidence
      before producing risk ratings.
    specialty_specific_exceptions:
    - If required likelihood, impact, control, or business criticality evidence is missing, the lane may provide a provisional
      assessment only with explicit confidence limits or must escalate.
  - category: Control and evidence baseline
    retrieval_policy: Use NIST SP 800-53, CIS Controls, CISA CPGs, and tenant control evidence to map safeguards, compensating
      controls, validation checkpoints, and treatment options.
    specialty_specific_exceptions:
    - Framework mappings are not proof of control effectiveness, legal compliance, or audit attestation and must be labeled
      as mapping support only.
  - category: Authority, compliance, and safety boundaries
    retrieval_policy: Use tenant policy, approval matrix, privacy/security caveats, SEC/FTC applicability flags, and hold/release
      criteria to decide whether to answer, hold, refuse, or route.
    specialty_specific_exceptions:
    - When legal, regulatory, executive risk acceptance, incident command, architecture approval, or formal audit authority
      is required, route rather than improvise.
