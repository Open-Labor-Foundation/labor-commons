    title: 'NIST SP 800-30 Rev. 1: Guide for Conducting Risk Assessments'
    publisher: National Institute of Standards and Technology
    source_type: risk-assessment-methodology
    location: https://csrc.nist.gov/pubs/sp/800/30/r1/final
    authority_reason: Primary NIST guide for conducting risk assessments, including threat, vulnerability, likelihood, impact,
      risk determination, uncertainty, and ongoing assessment concepts used by this lane.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_nist_update
    status: active
