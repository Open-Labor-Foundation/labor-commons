    publisher: Federal Trade Commission (FTC)
    source_type: regulatory-operating-guidance
    location: https://www.ftc.gov/business-guidance/resources/ftc-safeguards-rule-what-your-business-needs-know
    authority_reason: FTC business guidance explains Safeguards Rule incident response plan elements, documentation, reporting,
      post-mortem, and board reporting expectations for covered financial institutions, illustrating regulated incident handling
      limits.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_ftc_rule_update
    status: active
  - source_id: cisa-circia
    title: Cyber Incident Reporting for Critical Infrastructure Act of 2022 (CIRCIA)
    publisher: Cybersecurity and Infrastructure Security Agency (CISA)
    source_type: critical-infrastructure-incident-reporting-guidance
    location: https://www.cisa.gov/topics/cyber-threats-and-advisories/information-sharing/cyber-incident-reporting-critical-infrastructure-act-2022-circia
    authority_reason: CISA is responsible for CIRCIA rulemaking and public guidance; the source establishes that covered cyber
      incident and ransom payment reporting depends on CISA's final rule and therefore requires legal/regulatory routing before
      final claims.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval_or_circia_final_rule_change
    status: active_watch
  source_categories:
  - category: Incident lifecycle and response workflow
    retrieval_policy: Use NIST SP 800-61r3, NIST CSF 2.0, CISA playbooks, and tenant incident policy before issuing lifecycle,
      containment, recovery, or communication recommendations.
    specialty_specific_exceptions:
    - When the request asks the lane to execute a playbook step, isolate a host, recover a system, or command the incident,
      return to orchestrator.
  - category: Evidence, telemetry, and control baseline
    retrieval_policy: Use tenant SIEM, EDR, IAM, cloud, network, ticket, asset, evidence-store, and control records before
      treating an incident assessment as complete.
    specialty_specific_exceptions:
    - If event data cannot be tied to a system of record or owner, mark confidence low and request evidence instead of asserting
      root cause or scope.
  - category: Legal, regulatory, disclosure, and audit boundaries
    retrieval_policy: Use tenant legal/regulatory routing and applicable public regulator references only to flag review needs,
      not to produce final disclosure, notification, privilege, or attestation conclusions.
    specialty_specific_exceptions:
    - If SEC, FTC, CIRCIA, state breach, sector regulator, contract, law-enforcement, insurance, or audit language determines
      the answer, return to orchestrator or legal/regulatory specialist.
  tenant_required_facts:
  - Tenant incident severity matrix, security-event threshold, and materiality or business-impact escalation criteria.
  - Affected asset inventory, owner map, business service dependency, data classification, customer or regulated-data exposure
    indicator, and criticality.
  - Current incident timeline, detection source, event indicators, telemetry excerpts, known containment state, recovery state,
    and outstanding response owners.
  - Tenant incident response policy, communication plan, legal/regulatory notification routing, evidence retention requirements,
    and approved authority matrix.
  - Access status for SIEM, SOAR, EDR, IAM, cloud logs, network telemetry, ticketing, CMDB, evidence store, communication
    archive, backup system, and corrective-action tracker.
quality_and_assurance_model:
  control_objectives:
  - Keep incident recommendations tied to named evidence, systems of record, response stage, owner, confidence, and unresolved
    assumptions.
  - Prevent over-authoritative response behavior by separating analysis and recommendation from execution, incident command,
    legal/regulatory, audit, and infrastructure authority.
  - Preserve incident hold, quarantine, release, recovery, and finding-closure boundaries until authorized owners provide
    evidence.
  - Escalate recurring incidents, repeat control failures, conflicting policies, missing telemetry, and unresolved safety
    or business-continuity facts.
  hold_or_release_boundaries:
  - A system, account, host, service, quarantine item, communication, regulatory filing, or corrective-action finding cannot
    be released or closed based only on this lane's recommendation.
  - Release recommendations must include required owner approval, evidence prerequisites, rollback considerations, monitoring
    requirements, and explicit confidence limits.
  caveats:
  - Regulated, contractual, privacy, financial, law-enforcement, insurance, public-company disclosure, and customer-notification
    obligations vary by tenant and jurisdiction.
  - Formal materiality, breach, notification, legal privilege, liability, and audit-attestation determinations require authorized
    human review.
  - Safety-critical infrastructure, OT, healthcare, financial services, public-sector, and critical infrastructure contexts
    may impose stricter incident handling or notification rules than the public baseline.
materialization_contract:
  future_runtime: commons-crew
  runtime_posture: spec_only_until_promoted
  safe_materialization_requirements:
  - Load task metadata, scope rules, supported output shapes, refusal triggers, adjacent-specialist map, validation thresholds,
    and source freshness metadata from this manifest.
  - Retrieve tenant incident policy, severity matrix, escalation tree, legal/regulatory routing, communication plan, systems-of-record
    map, and authority matrix before producing operational recommendations.
  - Require incident evidence references for timeline, telemetry, assets, owners, data classification, containment status,
    recovery status, and open approvals.
  - Preserve confidence flags, assumptions, missing-evidence lists, source citations, and owner handoff requirements in every
    output.
  - Block or return requests that require execution, privileged access, incident command, legal/regulatory determination,
    audit attestation, or hold/release authority.
  promotion_criteria:
  - Promote to retained retained implementation only after repeated tenant usage demonstrates frequent lane calls and stable
    scenario performance.
  - Require separate implementation review, runtime security review, tenant-isolation verification, regression suite, rollback
    plan, and repository owner approval before retaining generated code in-repo.
  - Do not claim retained implementation ownership from this spec-pack refresh alone.
