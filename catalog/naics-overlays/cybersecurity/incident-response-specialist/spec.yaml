- human reviewer
- orchestrator
knowledge_baseline:
  source_baseline_version: '2026-04-14'
  source_classes:
  - class: Named-industry operating guidance
    rationale: CISA, SEC, FTC, and incident-reporting references define public operating, reporting, communication, and authority
      expectations that constrain cross-industry cybersecurity incident handling.
  - class: Recognized workflow references tied directly to the lane
    rationale: NIST SP 800-61r3, NIST CSF 2.0, CISA incident response playbooks, and NIST SP 800-86 define incident response
      stages, terminology, evidence handling, and handoff boundaries.
  - class: Evidence or control standards relevant to the lane
    rationale: NIST SP 800-53 Rev. 5 and CIS Critical Security Controls define incident response controls, communication mechanisms,
      exercises, post-incident review, and security-event thresholds.
  source_selection_approach: 'Use NIST SP 800-61r3 as the primary incident-response lifecycle and risk-management baseline,
    NIST CSF 2.0 for governance and Respond/Recover outcome framing, CISA playbooks for operational procedure language, NIST
    SP 800-53 and CIS Controls for evidence/control expectations, and NIST SP 800-86 for forensic evidence boundaries. Use
    SEC, FTC, CIRCIA, state breach law, sector regulator, contractual, and tenant policy sources only to flag reporting and
    legal-review dependencies; do not synthesize final legal or regulatory language inside this lane.

    '
  authority_sources:
  - source_id: nist-sp-800-61r3
    title: 'Incident Response Recommendations and Considerations for Cybersecurity Risk Management: A CSF 2.0 Community Profile'
    publisher: National Institute of Standards and Technology (NIST)
    source_type: incident-response-workflow-reference
    location: https://csrc.nist.gov/pubs/sp/800/61/r3/final
    authority_reason: NIST SP 800-61r3 is the current federal incident response publication and directly defines incident
      response recommendations, risk-management integration, incident handling, detection, response, and recovery considerations.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_nist_revision
    status: active
  - source_id: nist-csf-2
    title: The NIST Cybersecurity Framework (CSF) 2.0
    publisher: National Institute of Standards and Technology (NIST)
    source_type: cybersecurity-risk-management-framework
    location: https://www.nist.gov/publications/nist-cybersecurity-framework-csf-20
    authority_reason: NIST CSF 2.0 is a cross-industry cybersecurity risk-management framework that defines Govern, Identify,
      Protect, Detect, Respond, and Recover outcomes used to frame response and recovery recommendations.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_nist_revision
    status: active
  - source_id: cisa-federal-ir-playbooks
    title: Federal Government Cybersecurity Incident and Vulnerability Response Playbooks
    publisher: Cybersecurity and Infrastructure Security Agency (CISA)
    source_type: incident-response-operating-playbook
    location: https://www.cisa.gov/ncas/current-activity/2021/11/16/new-federal-government-cybersecurity-incident-and-vulnerability
    authority_reason: CISA is the U.S. operational cyber agency and this playbook standardizes incident and vulnerability
      response procedures, coordination, remediation, recovery, tracking, and common response terminology for FCEB systems
      with cross-sector usefulness.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_cisa_playbook_update
    status: active
  - source_id: nist-sp-800-53r5
    title: Security and Privacy Controls for Information Systems and Organizations
    publisher: National Institute of Standards and Technology (NIST)
    source_type: security-and-privacy-control-standard
    location: https://csrc.nist.gov/pubs/sp/800/53/r5/upd1/final
    authority_reason: NIST SP 800-53 Rev. 5 is a recognized control catalog including the Incident Response control family
      and related audit, contingency, system integrity, and privacy controls used to define evidence and control expectations.
    last_reviewed_at: '2026-04-14'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval_or_control_catalog_release
    status: active
  - source_id: cis-controls-v8
