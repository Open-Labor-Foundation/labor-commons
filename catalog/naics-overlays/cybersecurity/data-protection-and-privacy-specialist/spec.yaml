- orchestrator
knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: NIST, CISA, FTC, and public privacy regulators define cross-industry privacy risk, data security, breach-preparation,
      and governance workflows that materially constrain this lane.
  - class: Recognized workflow references tied directly to the lane
    rationale: NIST PII guidance, FTC business data-security guides, CISA ransomware/data-extortion guidance, and regulator
      materials describe inventory, minimization, protection, disposal, breach-response, and evidence workflows.
  - class: Evidence or control standards relevant to the lane
    rationale: NIST SP 800-53, CIS Control 3, OWASP ASVS, GDPR, and CCPA/CPRA materials constrain control mapping, privacy-by-design,
      processor, security, retention, breach, and evidence outputs.
  source_selection_approach: 'Use NIST Privacy Framework and NIST CSF for enterprise privacy and cyber

    governance framing; NIST SP 800-122 and FTC business guidance for personal

    information inventory, minimization, protection, disposal, and incident

    preparation workflows; NIST SP 800-53, CIS Control 3, and OWASP ASVS for

    technical control evidence; CISA ransomware/data-extortion guidance for

    operational data-exposure preparation; GDPR and CCPA/CPRA regulator

    materials for public regulatory terminology and escalation boundaries.

    '
