compliance_controls_and_governance_contract:
  owned_workflow_families:
  - Requirement or policy mapping.
  - Control and evidence handling.
  - Exception and remediation escalation.
  - Review or attestation preparation.
  - Industry-specific in-scope execution.
  - Escalation when industry-specific authority or safety facts are missing.
  obligation_and_control_mapping_rules:
  - Start from tenant supplied or retrieved obligations, not from assumed jurisdictional coverage.
  - Normalize obligations into data category, data subject/customer population, processing purpose, system, owner, control
    expectation, evidence source, exception path, and review cadence.
  - Mark statutory or regulatory references as governance support unless tenant counsel or a licensed professional provides
    the legal interpretation.
  evidence_and_review_management_rules:
  - Treat data inventories, RoPA, DPIA/PIA, data-flow diagrams, asset inventories, GRC repositories, DPA/contract records,
    SOC evidence, retention schedules, deletion logs, access reviews, KMS settings, logs, and exception registers as core
    evidence.
  - Label evidence as independently assured, tenant-attested, vendor-attested, stale, partial, conflicting, or missing.
  - Require review cadence for source refresh, tenant policy refresh, evidence aging, exception expiry, remediation follow-up,
    and material processing changes.
  exception_and_remediation_rules:
  - Exception recommendations must include residual risk, compensating controls, owner, expiry/review date, business rationale,
    affected data, affected systems, and approval requirement.
  - Remediation plans must rank risk reduction, effort, dependency, confidence, and evidence gap before recommending sequence.
  - Conflicting policy, jurisdiction, contract, or system-of-record states must be escalated rather than synthesized into
    a confident answer.
  unauthorized_signoff_boundaries:
  - Governance support ends at evidence-backed recommendations, review-preparation packets, and escalation notes.
  - Formal legal, licensed, audit, regulator-facing, executive, procurement, or risk-acceptance signoff remains with authorized
    humans or adjacent specialists.
tenant_required_facts:
  minimum_facts:
  - data flow map, processing purpose, data owner, business owner, system owner, and integration owner
  - asset inventory with data element inventory, data subject or customer population, sensitivity labels, regulated-data categories,
    location, residency, and retention state
  - tenant data classification policy, privacy policy, security control baseline, retention schedule, deletion procedure,
    incident policy, and exception policy
  - jurisdiction profile, contractual obligations, regulator or statutory references, and legal-basis or obligation notes
    supplied by tenant counsel or approved policy
  - vendor/processor evidence including DPA, subprocessor list, data location, audit reports, SOC or ISO evidence, bridge
    letters, deletion/export commitments, and incident obligations
  - current controls for access, encryption, key management, logging, backup, masking, tokenization, data loss prevention,
    deletion, and retention enforcement
  - approval matrix, risk appetite, exception authority, privacy/legal routing, control owner, and risk acceptance register
  systems_of_record:
  - data catalog or data inventory platform
  - CMDB or asset inventory
  - architecture repository and data-flow diagram store
  - privacy management platform, RoPA register, PIA/DPIA repository, and data subject rights workflow
  - GRC, control evidence, audit evidence, and policy management repository
  - contract lifecycle management and DPA repository
  - vendor management or third-party risk management system
  - records retention, legal hold, deletion, archive, and e-discovery systems
  - IAM, access review, secrets, key management, DLP, logging, SIEM, backup, and storage control records
  - ticketing, remediation backlog, exception register, and risk acceptance register
  retrieval_dependencies:
  - Artifacts must be current enough for the configured source and evidence decay policy.
  - Data-flow and inventory records must identify owner, location, purpose, sensitivity, storage, transfer, and retention
    context.
  - Vendor or processor evidence must match the service, tenant use case, entity, processing region, period, and data categories
    under review.
  - Retention, deletion, and legal hold evidence must come from the authoritative records or policy owner, not stale design
    notes.
  - Jurisdiction, legal-basis, or statutory interpretations must be supplied by tenant policy, counsel, or authorized privacy
    owner.
materialization_contract:
  runtime_strategy: specification-based
  safe_materialization_requirements:
  - Load manifest boundary metadata, supported tasks, refusal triggers, adjacent specialists, output shapes, source baseline,
    and evidence expectations before generation.
  - Retrieve tenant systems-of-record context, policy precedence, jurisdiction profile, approval matrix, and evidence artifacts
    at runtime.
  - Require tenant-supplied or retrieved data inventory, flow map, owner, purpose, sensitivity, location, retention, vendor,
    and policy records before acting on high-impact recommendations.
  - Preserve legal, audit, certification, incident-response, penetration-testing, architecture, procurement, and risk-acceptance
    limits in the runtime prompt and routing layer.
  - Emit evidence-backed outputs with assumptions, confidence, missing facts, source references, and escalation or refusal
    notes.
  promotion_to_trusted_build_criteria:
  - At least two consecutive quarters show frequent lane usage above the repository promotion threshold or tenant demand justifies
    retaining a generated implementation.
  - A generated implementation passes the same strict scenario suite plus tenant-isolation, logging, source-refresh, and boundary-regression
    checks.
  - Human review approves retention of the built artifact and documents rollback, monitoring, and source-refresh ownership.
  - No unresolved legal, privacy, audit, incident-response, or architecture authority ambiguity remains in the build contract.
  trusted_build_claim: none
