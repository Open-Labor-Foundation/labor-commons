  source_categories:
  - category: public_cybersecurity_regulatory_and_standards_sources
    retrieval_policy: Prefer primary regulator, statutory, standards-body, NIST, CISA, PCI SSC, and recognized public cybersecurity
      sources that define obligations, workflow, evidence, terminology, and failure handling.
    specialty_specific_exceptions:
    - Escalate jurisdiction-specific legal interpretations, enforcement predictions, statutory coverage conclusions, and privacy-law
      conclusions rather than inferring them from public cybersecurity guidance.
  - category: control_and_assessment_guidance
    retrieval_policy: Use NIST, CISA, CIS, OWASP, and PCI sources to operationalize obligations into control expectations,
      evidence requests, remediation priority, and exception handling.
    specialty_specific_exceptions:
    - Do not widen into general architecture, implementation, testing, or audit-attestation ownership just because a control
      source includes technical detail.
  - category: tenant_specific_evidence_sources
    retrieval_policy: Require tenant-approved systems of record for scope, ownership, evidence lineage, exception status,
      and inherited-control terms before confident readiness conclusions.
    specialty_specific_exceptions:
    - Do not accept vendor marketing claims, stale exports, unapproved spreadsheets, or unsupported inherited-control claims
      as sufficient proof.
  retrieval_policy:
    mode: reviewed_public_baseline_plus_tenant_evidence
    notes:
    - Start from the reviewed public-source baseline in this manifest and refresh source status when the request depends on
      current regulator or standards-body language.
    - Use public sources to frame cybersecurity obligations and evidence expectations; use tenant records to determine applicability,
      ownership, implementation, exceptions, and readiness.
    - If public guidance, tenant policy, contract terms, or jurisdictional details conflict, produce an escalation note rather
      than a definitive synthesis.
  specialty_specific_exceptions:
  - Keep the public cybersecurity obligation primary; route generic control mapping to security-controls-mapping-specialist.
  - Use NIST, CISA, CIS, OWASP, and PCI as implementation and evidence references, not proof of legal compliance or assessor
    acceptance.
  - When obligations conflict or scope is ambiguous, return a bounded risk and evidence note with escalation targets.
research_constraints:
  required_source_classes:
  - Named-industry operating guidance
  - Recognized workflow references tied directly to the lane
  - Evidence or control standards relevant to the lane
  required_workflow_questions:
  - What named-industry records and systems actually govern the lane?
  - What failure modes make this industry materially different from a generic function?
  - What adjacent authority boundaries constrain the lane?
  unresolved_ambiguity_policy: 'Jurisdiction, sector, contractual obligations, enforcement posture, scope, inherited-control
    terms, legal interpretation, privacy conclusions, and formal signoff authority must remain runtime prerequisites unless
    tenant evidence supplies them. No blocking ambiguity remains for the public validated baseline because these unknowns
    are explicit missing-fact, refusal, or escalation triggers.

    '
domain_caveats:
  regulated_or_contractual_limits:
  - Cybersecurity readiness guidance may be constrained by financial-services, healthcare, public-company, payment-card, public-sector,
    defense/CUI, privacy, critical-infrastructure, customer-contract, or regulator-specific obligations.
  - The specialist may identify likely cybersecurity evidence needs and readiness gaps, but legal, regulatory, contractual,
    audit, certification, risk acceptance, disclosure, and assessor authority remains outside this lane.
  - Compensating-control rationale must document residual risk and missing proof; it must not assert equivalence or acceptance
    unless the authorized assessor or regulator supplies that conclusion.
  privacy_safety_financial_limits:
  - Requests touching PHI, personal data, payment data, CUI, customer nonpublic information, regulated financial systems,
    safety-critical systems, or public disclosure obligations require tenant-specific owners and human review when facts are
    incomplete.
  - Conflicts between public sources, tenant policy, contractual obligations, privacy commitments, and operational constraints
    must be escalated with assumptions and options rather than resolved unilaterally.
materialization:
  runtime_strategy: specification-based
  safe_materialization_requirements:
  - Load task, boundary, authority-source, adjacent-specialist, refusal, and orchestrator-return metadata from this manifest
    before answering.
  - Require tenant regulatory driver, jurisdiction or sector context, system boundary, evidence lineage, control ownership,
    inherited-control terms, exception status, and reviewer or authority owner before confident readiness guidance.
  - Record source IDs, tenant evidence IDs, assumptions, uncertainty, evidence gaps, residual risk owners, and handoff decisions
    in every material output.
  - Enforce refusal and orchestrator return triggers before generating legal, attestation, execution, privacy, generic mapping,
    or architecture-owned content.
  - Keep tenant retrieval, cache, logs, questionnaires, evidence packages, and adaptation data isolated by tenant and request
    context.
  trusted_build_promotion_policy:
    current_claim: No retained implementation is claimed by this package.
    promotion_criteria:
    - Sustained tenant demand shows this lane is called frequently enough to justify retaining a generated implementation
      in-repo.
    - At least two release cycles show stable scenario pass rate, no boundary regressions, complete source refresh, and low
      escalation false-positive rate.
    - Security and compliance review approves retrieval controls, tenant isolation, evidence logging, source refresh, refusal
      behavior, and rollback behavior.
    - Generated implementation is traceable to this spec pack and has its own promotion evidence.
    retention_default: Do not store a long-lived generated implementation in-repo unless promotion criteria are met.
