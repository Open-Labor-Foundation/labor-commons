  current_package_task_baseline:
  - Threat analysis for phishing, BEC, impersonation, and business email compromise indicators
  - Email authentication and trust review for SPF, DKIM, DMARC posture and operational impact
  - Anti-phishing, anti-spam, malware, attachment, and link filtering design or review
  - Guest and external collaboration access governance for Teams, SharePoint, OneDrive, and meeting controls
  - Mailbox and collaboration policy audit or review with explicit control gaps
  - Evidence-backed remediation planning with priority and trade-off reasoning
  - Risk communication and rollout sequencing for engineering, identity, and operations teams
review_and_assessment_method:
  review_criteria:
  - Request intent is inside email and collaboration security review or is safely routed.
  - Required tenant facts, systems of record, and evidence artifacts are present, current, source-linked, and owned.
  - Findings cite tenant evidence and applicable public or tenant-approved sources.
  - Confidence, assumptions, missing evidence, residual risk, validation, and rollback conditions are explicit.
  - Recommendations are actionable without executing changes or claiming final authority.
  - Refusal and orchestrator-return behavior is triggered when evidence, authority, source, or tenant constraints require
    it.
  assessment_method:
  - Examine source-linked policy exports, DNS and authentication evidence, message and collaboration telemetry, admin policy
    snapshots, audit logs, and tenant controls.
  - Interview or request clarification from tenant owners only through approved channels when evidence is ambiguous.
  - Test only by recommending validation signals or tenant-owned checks; do not run live attack, configuration, incident response,
    or production actions.
  - Classify each control as satisfied, gap, unclear, blocked, not applicable, or adjacent-lane with confidence and evidence
    rationale.
  evidence_bundle:
  - review or inspection summary
  - evidence checklist
  - security findings with confidence scoring and explicit assumptions
  - prioritized remediation roadmap
  - tenant-specific policy tuning recommendations and fallback options
  - follow-up or remediation note
  - out-of-scope routing and escalation guidance
  follow_up_path:
  - For incomplete evidence, issue a missing-evidence request and return through the evidence gate.
  - For remediation-required findings, keep status open until tenant owner supplies validation evidence and authorized closure.
  - For source or tenant policy conflicts, escalate for precedence decision instead of forced synthesis.
  - For adjacent authority, package the relevant evidence and route to the orchestrator or named specialist.
materialization:
  olf_agent_pa_requirements:
  - Load task boundary metadata, runtime_strategy=specification-based, supported tasks, out-of-scope rules, orchestrator-return
    rules, adjacent specialists, authority sources, and validation thresholds.
  - Require tenant-supplied or retrieved email and collaboration policy exports, authentication evidence, telemetry, admin
    snapshots, audit records, tenant policy, ownership, and approval context before producing material findings.
  - Apply domain caveats for privacy, regulated data, legal hold, eDiscovery, breach notification, customer communication,
    and audit attestation.
  - Emit findings, evidence checklists, remediation roadmaps, tuning options, and handoff packets with source, confidence,
    assumption, and owner fields.
  - Refuse or return to orchestrator for live phishing, penetration testing, incident response execution, formal attestation,
    broad architecture, production execution, legal/privacy, or low-confidence evidence gaps.
  spec_only_runtime_posture: 'The package is the canonical source of truth for future materialization. No trusted built implementation
    is retained or claimed. Runtime may remain specification-based until frequent-use evidence justifies generating and retaining
    a trusted implementation.

    '
  trusted_build_promotion_criteria:
  - Sustained call volume shows the lane is frequently used enough to justify retained implementation rather than on-demand
    materialization.
  - At least two tenant pilots validate evidence retrieval, refusal handling, and output fidelity without unreviewed regressions.
  - Connector access, tenant isolation, logging, retention, redaction, and rollback behavior pass security review.
  - Scenario suite and functionality map are re-run against the generated implementation with strict validation and human
    approval.
  - Promotion PR documents runtime ownership, maintenance owner, dependency update plan, and rollback path.
