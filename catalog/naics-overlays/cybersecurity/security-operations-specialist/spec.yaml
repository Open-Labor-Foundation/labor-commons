materialization_contract:
  posture: specification-based
  safe_materialization_requires:
  - task metadata for supported advisory decision types and prohibited execution actions
  - tenant-specific source-system connectors or retrieval summaries for SIEM, SOAR, EDR, ticketing, CMDB, identity, cloud,
    endpoint, email, network, and case records
  - tenant severity matrix, incident classification rules, authority map, escalation owners, legal/privacy handoff rules,
    retention expectations, and confidence thresholds
  - prompt and policy guardrails that separate advice from direct execution and block platform-specific commands
  - audit logging for request scope, evidence references, assumptions, confidence, refusal triggers, and next-owner routing
  tenant_supplied_or_retrieved_assumptions:
  - environment and tenant identity
  - authorized requester role and allowed decision type
  - asset ownership, criticality, data sensitivity, and business impact
  - systems of record and source freshness
  - existing runbooks, service levels, and rollback criteria
  - jurisdiction, contractual, privacy, and regulated reporting constraints
  refusal_or_return_conditions:
  - direct action, production command, or platform-specific remediation is requested
  - facts are missing, stale, contradictory, or cross-tenant
  - legal, privacy, regulatory, audit, incident command, forensic, malware, identity, cloud, endpoint, network, or architecture
    ownership is primary
  - public guidance and tenant policy conflict materially
  trusted_build_promotion_criteria:
  - at least two consecutive release cycles show frequent lane usage and stable request patterns
  - tenant retrieval contracts and safety guardrails are implemented and tested
  - scenario suite remains at or above strict acceptance with no unreviewed regressions
  - human security reviewer approves retention of generated implementation artifacts
  - rollback and deprecation path for the built runtime is documented
