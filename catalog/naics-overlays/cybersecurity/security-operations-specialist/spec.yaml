knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: NIST, CISA, FTC, and SEC sources define cybersecurity operations, incident response, monitoring, safeguarding,
      and reporting constraints that govern SOC intake and escalation.
  - class: Recognized workflow references tied directly to the lane
    rationale: NIST incident response and continuous monitoring references define preparation, detection, analysis, reporting,
      response-planning, and monitoring workflow stages used by security operations teams.
  - class: Evidence or control standards relevant to the lane
    rationale: NIST SP 800-92, NIST SP 800-53, CIS Controls, and OWASP logging guidance define log evidence, auditability,
      monitoring, incident response, and control artifacts needed for traceable recommendations.
  source_selection_approach: 'Use NIST and CISA as the public operating baseline for cybersecurity

    incident handling, continuous monitoring, reporting, and evidence-driven

    response planning. Use CIS Controls and OWASP logging guidance to constrain

    operational control and log-evidence expectations. Use SEC and FTC sources

    only to identify escalation caveats for regulated disclosure, customer

    information, and breach-notification authority; this lane does not draft

    formal legal or regulatory language.

    '
