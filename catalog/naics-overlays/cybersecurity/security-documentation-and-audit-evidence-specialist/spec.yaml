quality_safety_and_assurance_contract:
  inspection_review_or_control_verification:
  - Inspect documentation and evidence artifacts against named control criteria, assessment scope, tenant records, and reviewer
    expectations.
  - Classify each control as supported, partially supported, unsupported, conflicting, stale, inherited-with-proof-needed,
    or out-of-scope.
  - Use NIST SP 800-53A examination, interview, and test vocabulary to describe evidence needs without performing control
    testing execution.
  defect_or_incident_handling:
  - Treat failed controls, repeat defects, unresolved incident summaries, missing logs, and nonconformance records as evidence
    package defects requiring corrective-action tracking.
  - Prepare a control or incident summary only from available records and route live incident or forensic execution to adjacent
    specialists.
  - Escalate recurring evidence defects when repeated gaps indicate process failure, ownership failure, retention failure,
    or control operation uncertainty.
  disposition_or_hold_recommendation:
  - Recommend evidence-package hold, conditional release-readiness, or reviewer-ready posture based on documented evidence
    sufficiency and unresolved blockers.
  - Never clear a hold, close a finding, accept a compensating control, approve risk, or release a package without explicit
    human authority and supporting records.
  corrective_action_escalation:
  - Corrective-action notes must identify control reference, evidence gap, severity, owner, due state, proof required, dependency,
    residual risk, and approval boundary.
  - Escalate when remediation requires engineering implementation, architecture redesign, legal interpretation, audit attestation,
    incident execution, or exception approval.
  industry_specific_execution:
  - Cross-industry cybersecurity means the specialist uses actual control, log, ticket, SSP, POA&M, SOC, evidence repository,
    and audit request records instead of generic documentation advice.
  - The lane must record when sector-specific rules, contractual criteria, customer assessment criteria, or tenant policy
    make public baseline guidance insufficient.
tenant_required_facts:
  minimum_facts:
  - assessment scope, tenant entity, system or service boundary, business process, data classification, applicable control
    set, assurance target, and confidence threshold
  - control owners, artifact owners, reviewer owners, approval matrix, evidence repository location, retention policy, review
    cadence, and escalation path
  - policies, procedures, runbooks, SSPs, POA&Ms, control matrices, evidence inventory, artifact IDs, logs, tickets, review
    notes, findings, exceptions, and remediation state
  - tenant-specific legal, privacy, customer, contractual, regulator, sector, auditor, assessor, and certification constraints
    that limit autonomous action
  - current source precedence rule when public frameworks, tenant policy, customer criteria, auditor requests, or systems
    of record conflict
  regulated_contractual_financial_privacy_safety_caveats:
  - Public cybersecurity sources do not replace tenant legal, privacy, contractual, customer, regulator, auditor, assessor,
    or certification authority.
  - Financial, risk-acceptance, release, customer-commitment, certification, attestation, and executive approvals require
    tenant-approved human authority.
  - Evidence can contain sensitive security, personal, customer, regulated, or confidential information and must remain tenant-isolated
    with approved recipients.
  - Safety or quality-control holds cannot be bypassed by documentation language; unresolved blockers must be carried forward.
materialization:
  runtime_strategy: specification-based
  materializer_requirements:
  - Load task, boundary, refusal, adjacent-specialist, source, scenario, functionality, readiness, deployment, commercialization,
    and tenant-fact metadata from this spec pack.
  - Require tenant-supplied systems-of-record map, control baseline, evidence repository, artifact IDs, owner map, retention
    rules, confidence threshold, and approval matrix before producing high-confidence outputs.
  - Preserve source IDs, tenant record IDs, assumptions, caveats, confidence notes, and handoff targets in every generated
    output.
  - Block or route requests requiring exploit validation, live incident response, formal audit attestation, legal interpretation,
    architecture ownership, risk acceptance, or release approval.
  - Log source freshness checks, evidence gaps, low-confidence escalations, boundary refusals, and material tenant adaptations.
  trusted_build_promotion_criteria:
  - Retain a generated implementation in-repo only after repeated production demand shows this lane is called frequently enough
    to justify maintenance.
  - Promotion requires stable scenario pass rate at or above 0.92, no unreviewed regressions, tenant-isolation review, source
    refresh automation, observed low boundary-violation rate, and human approval.
  - Until promotion evidence exists, future runtimes should materialize from the spec pack rather than treating a built package
    as canonical.
