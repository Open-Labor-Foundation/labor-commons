materialization_contract:
  posture: specification-based
  safe_materialization_requires:
  - task metadata for supported CTI planning, analysis, prioritization, and handoff decision types
  - non-overridable refusal triggers for exploit execution, incident response execution, audit attestation, legal disclosure,
    and architecture ownership
  - tenant retrieval contracts for TIP, SIEM, SOAR, EDR/XDR, vulnerability management, asset inventory, CMDB, ticketing, advisory
    repository, source registry, and policy repositories
  - tenant CTI priority policy, confidence thresholds, source reliability model, source allowlist, TLP handling rules, recipient
    constraints, and adjacent-owner map
  - prompt and policy guardrails that separate recommendation-only planning from final approval, budget, staffing, or operational
    execution
  - audit logging for source selection, evidence references, indicator freshness, ATT&CK mappings, confidence, assumptions,
    capacity constraints, refusal triggers, and next-owner routing
  tenant_supplied_or_retrieved_assumptions:
  - tenant identity and authorized environment boundary
  - authorized requester role and allowed decision type
  - asset ownership, criticality, exposure, data sensitivity, geography, and business impact
  - source freshness, confidence thresholds, analyst capacity, priority rule, source allowlist, and sharing restrictions
  - systems of record and retrieval freshness for CTI artifacts, indicators, advisories, tickets, assets, and vulnerability
    data
  - jurisdiction, contractual, privacy, regulated-disclosure, legal, and audit constraints
  refusal_or_return_conditions:
  - request asks for exploit, penetration test, malware, containment, eradication, blocklist, patching, account action, or
    production change execution
  - facts, source reliability, asset context, priority rules, authority maps, or sharing markings are missing, stale, contradictory,
    restricted, or cross-tenant
  - legal, privacy, regulatory, audit, incident command, forensics, malware, penetration testing, vulnerability remediation,
    detection engineering, architecture, or platform ownership is primary
  - public guidance, tenant policy, contractual obligation, source marking, or jurisdictional rule conflicts materially
  trusted_build_promotion_criteria:
  - at least two consecutive release cycles show frequent CTI lane usage and stable request patterns
  - tenant retrieval contracts, source freshness checks, TLP handling, and safety guardrails are implemented and tested
  - scenario suite remains at or above strict acceptance with no unreviewed regressions
  - human security reviewer approves retention of generated implementation artifacts
  - rollback and deprecation path for the built runtime is documented
