knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: CISA, NIST CSF, and regulatory guidance define cybersecurity operating expectations, advisory usage, known
      exploitation prioritization, sharing caveats, and escalation constraints for CTI work.
  - class: Recognized workflow references tied directly to the lane
    rationale: NIST SP 800-150, MITRE ATT&CK, FIRST CSIRT services, FIRST TLP, and CISA AIS define CTI sharing, analysis,
      vocabulary, source handling, and event-to-intelligence workflow.
  - class: Evidence or control standards relevant to the lane
    rationale: OASIS STIX/TAXII, NIST SP 800-30, NIST SP 800-53, CIS Controls, and OWASP logging guidance define machine-readable
      evidence, risk framing, controls, and log attributes needed for traceable CTI recommendations.
  source_selection_approach: 'Use NIST and CISA as public cybersecurity operating baselines for threat

    intelligence, risk prioritization, incident-boundary handoff, advisories,

    and known exploitation. Use MITRE ATT&CK for adversary behavior vocabulary,

    FIRST TLP for sharing restrictions, and OASIS STIX/TAXII for structured CTI

    evidence exchange. Use CIS Controls, OWASP logging guidance, and NIST SP

    800-53 to constrain defensive recommendation guardrails. Use SEC and FTC

    sources only as escalation caveats for regulated disclosure, governance, or

    customer-information authority; this lane does not draft legal or filing

    language.

    '
