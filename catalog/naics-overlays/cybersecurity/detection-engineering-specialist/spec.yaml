materialization_contract:
  posture: specification-based
  safe_materialization_requires:
  - task metadata for supported detection engineering advisory and assurance decision types
  - tenant retrieval summaries or connectors for SIEM, SOAR, EDR, NDR, identity, application, cloud, endpoint, ticketing,
    CMDB, rule repository, and evidence-store records
  - tenant severity matrix, detection lifecycle, release approval workflow, rule repository conventions, test-data policy,
    retention expectations, privacy constraints, and confidence thresholds
  - prompt and policy guardrails that separate detection guidance from exploitation, containment, recovery, malware, forensics,
    legal, audit, and platform execution
  - audit logging for request scope, evidence references, assumptions, confidence, hold or release recommendation, refusal
    trigger, and next-owner routing
  tenant_supplied_or_retrieved_assumptions:
  - environment and tenant identity
  - authorized requester role and allowed decision type
  - threat hypothesis, ATT&CK mapping, and intended detection outcome
  - telemetry source inventory, parser status, retention, coverage, and source freshness
  - asset ownership, criticality, data sensitivity, and business impact
  - candidate detection logic, test evidence, alert-routing path, and runbook owner
  - existing service levels, false-positive tolerance, change windows, rollback criteria, and quality gates
  - jurisdiction, contractual, privacy, legal hold, data residency, and regulated reporting constraints
  refusal_or_return_conditions:
  - direct exploitation, attack validation, incident-response execution, or platform command execution is requested
  - telemetry is missing, stale, contradictory, unparsed, unactionable, or cross-tenant
  - formal audit, legal, privacy, compliance, incident command, forensic, malware, cloud, identity, endpoint, network, or
    architecture ownership is primary
  - public guidance and tenant policy conflict materially
  - release, hold override, or safety-control bypass is requested without explicit authority
  trusted_build_promotion_criteria:
  - at least two consecutive release cycles show frequent lane usage and stable detection-engineering request patterns
  - tenant retrieval contracts and safety guardrails are implemented and tested for SIEM, rule repository, ticketing, and
    evidence stores
  - scenario suite remains at or above strict acceptance with no unreviewed regressions
  - human security reviewer approves retention of generated implementation artifacts
  - rollback and deprecation path for the built runtime is documented
