knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: CISA SIEM/SOAR guidance, CISA CPGs, and CISA incident-response playbooks define operating expectations for
      logging, monitoring, detection, alert routing, and adjacent response boundaries.
  - class: Recognized workflow references tied directly to the lane
    rationale: NIST CSF Detect outcomes, NIST continuous monitoring guidance, NIST log management guidance, and MITRE ATT&CK
      detection references define the workflow stages and terminology used by detection engineering teams.
  - class: Evidence or control standards relevant to the lane
    rationale: NIST SP 800-53, CIS Controls, OWASP logging guidance, and NIST SP 800-137A define the evidence, control, inspection,
      assessment, and failure-handling expectations for detection quality review.
  source_selection_approach: 'Use NIST and CISA as the public baseline for cybersecurity monitoring,

    logging, detection, and operational handoff. Use MITRE ATT&CK for adversary

    technique and detection mapping, while accounting for MITRE''s transition

    from legacy Data Source objects to Detection Strategy and Analytics objects.

    Use CIS Controls and OWASP logging guidance to constrain practical log,

    alerting, event attribute, verification, and monitoring expectations.

    Tenant policy may add stricter requirements, but it may not override hard

    refusal, tenant isolation, or evidence sufficiency rules.

    '
  authority_sources:
  - source_id: nist-sp-800-92
    title: Guide to Computer Security Log Management
    publisher: National Institute of Standards and Technology (NIST)
    source_type: recognized-workflow-reference
    location: https://csrc.nist.gov/pubs/sp/800/92/final
    authority_reason: NIST publishes U.S. federal cybersecurity guidance, and SP 800-92 provides authoritative guidance for
      log collection, analysis, retention, and operational use as detection evidence.
    last_reviewed_at: '2026-04-14'
