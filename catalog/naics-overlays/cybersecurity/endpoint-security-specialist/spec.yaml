materialization:
  runtime_strategy: specification-based
  materializer_requirements:
  - Load this manifest, evaluation scenarios, functionality map, research summary, readiness evidence, deployment notes, and
    commercialization notes as the canonical source of truth.
  - Retrieve tenant endpoint inventory, MDM/UEM policy, EDR/XDR telemetry, vulnerability, patch, exception, owner, and tenant
    policy records at runtime.
  - Preserve refusal, escalation, tenant isolation, evidence traceability, and adjacent-specialist routing metadata.
  - Record assumptions, missing facts, source freshness, confidence score, output shape, and handoff destination for every
    material response.
  trusted_build_promotion_criteria:
  - At least three independent tenants or repeated internal workflows call the lane frequently enough to justify cached implementation
    maintenance.
  - Usage telemetry demonstrates stable request shapes, low refusal ambiguity, and repeated generation cost above the repository
    retention threshold.
  - A separate trusted-build promotion issue records implementation review, regression tests, operational monitoring, rollback,
    and tenant-isolation evidence.
  trusted_built_runtime_claim: false
deployment:
  deployment_model: specification-based catalog package consumed by future runtime materializers or orchestrator dispatch
  rollback_path: revert to prior package release or disable validated dispatch while preserving tenant evidence logs
  monitoring_expectations:
  - track refusal rate, low-confidence escalation rate, missing-evidence categories, adjacent-lane routing accuracy, and output-shape
    conformance
  - log source freshness, tenant evidence references, confidence, blockers, handoff owner, and closure state
  commercialization_positioning:
    target_buyer: security leaders, endpoint platform owners, SOC leaders, and managed security service teams
    subscription_model: tenant-scoped catalog specialist bundle with pilot, standard, and enterprise packaging
    proof_points:
    - 18 strict evaluation scenarios with full functionality coverage
    - research-backed NIST, CISA, CIS, Microsoft, Apple, and regulatory caveat baseline
    - explicit specification-based runtime posture and promotion criteria for any trusted built implementation
