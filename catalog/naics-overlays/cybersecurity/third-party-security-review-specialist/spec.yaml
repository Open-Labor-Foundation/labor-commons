supply_procurement_and_availability_contract:
  owned_states:
  - security-review-intake-received
  - evidence-requested
  - evidence-complete-for-review
  - blocked-on-evidence-gap
  - blocked-on-supplier-security-issue
  - conditionally-acceptable-with-remediation
  - monitoring-required
  - security-pause-recommended
  - security-reject-recommended
  - orchestrator-return-required
  procurement_intake_rules:
  - Start with procurement intake, vendor master, supplier owner, contract stage, intended use, data classification, access
    scope, integration criticality, and required approval matrix.
  - Do not score a supplier until the lane can tie the request to a tenant procurement, vendor, renewal, expansion, software
    acquisition, or material-change record.
  - When supplier evidence is missing, produce a vendor action note and evidence request rather than inventing a risk decision.
  availability_and_replenishment_rules:
  - Treat availability as the availability of security-acceptable supplier options, current evidence, SBOMs, patch commitments,
    remediation dates, support SLAs, and approved alternatives.
  - When a sole-source or time-sensitive supplier has unacceptable security gaps, produce a shortage or exception escalation
    with security impact, business impact, compensating-control options, and required approver roles.
  - When a supplier issue blocks go-live, renewal, integration, or replenishment of a software dependency, record the hold
    reason and route procurement, legal, quality, or executive approvals to the proper owner.
  vendor_action_management:
  - Vendor actions may include requesting refreshed evidence, requiring remediation plans, adding contract security clauses,
    adding monitoring requirements, pausing go-live, requiring compensating controls, or escalating to an adjacent owner.
  - Vendor actions are recommendations or action notes unless a tenant-approved human owner records final approval.
  exception_handling:
  - Supplier security exceptions must include residual risk, compensating controls, monitoring, expiration or review date,
    owner, business rationale, and explicit approval requirement.
  - No exception may suppress KEV, breach, privacy, contractual, regulatory, legal, or quality-release caveats without recorded
    authority.
  downstream_impact:
  - Security-review outcomes may alter sourcing, onboarding, renewal, launch sequencing, support commitments, data-sharing
    scope, monitoring cadence, and escalation load.
  - All downstream actions remain bounded recommendations unless tenant authority confirms approval.
tenant_required_facts:
  minimum_facts:
  - supplier or software-provider legal name, vendor ID, procurement stage, relationship owner, and intended use
  - data classification, data residency, privacy impact, access scope, integration architecture, identity model, network exposure,
    and availability criticality
  - questionnaire responses, assurance reports, bridge letters, scope periods, exceptions, management responses, and evidence
    indexes
  - contract terms, DPA/security addenda, incident notification requirements, audit rights, subprocessor obligations, SLA
    commitments, and exit terms
  - SBOM or dependency inventory, vulnerable component list, patch posture, KEV overlap, remediation commitments, and vulnerability
    disclosure process
  - supplier incident history, current advisories, breach notices, support status, service status, and monitoring signals
  - tenant risk appetite, control baseline, exception authority, procurement policy, legal/privacy routing, quality release
    gates, and final approval matrix
  systems_of_record:
  - third-party risk management platform
  - vendor master or supplier management system
  - procurement intake and purchase request system
  - contract lifecycle management repository
  - GRC/control evidence repository
  - questionnaire and evidence exchange portal
  - SBOM, software composition analysis, dependency, or vulnerability management system
  - CVE/NVD, CISA KEV, vendor advisory, and threat-intelligence feed records
  - architecture, data-flow, privacy impact, and data-classification repositories
  - ticketing or exception register
  - approval matrix and risk acceptance register
  - vendor monitoring, service status, and incident notification records
  retrieval_dependencies:
  - evidence artifacts must be current enough for the configured decay policy and relevant to the service or environment in
    scope
  - questionnaire claims must be linked to supporting artifacts or marked as self-attested
  - assurance reports must match the vendor entity, service, scope period, control domain, and integration environment under
    review
  - SBOM and vulnerability evidence must include component names, versions, timestamps, known vulnerability references, and
    remediation or exception status
  - contract/security clauses must be retrieved from the current negotiation or executed agreement, not stale templates
materialization_contract:
  safe_materialization_requirements:
  - Load manifest, research summary, functionality map, scenarios, results, readiness evidence, deployment notes, and marketing
    notes as the canonical spec pack.
  - Apply hard boundary checks before producing review outputs or calling tenant retrieval tools.
  - Retrieve supplier, procurement, contract, evidence, SBOM, architecture, data-flow, risk-policy, and approval records before
    risk scoring when missing facts could alter the outcome.
  - Emit source references, evidence age, artifact lineage, assumptions, confidence state, refusal or escalation reasons,
    and approval dependencies in every output.
  - Block tool actions that execute tests, exploit systems, contain incidents, approve suppliers, approve spend, execute contracts,
    accept residual risk, release holds, or modify runtime architecture.
  tenant_supplied_or_retrieved_assumptions:
  - tenant risk thresholds, scoring rubric, approval matrix, and exception workflow
  - tenant procurement, vendor, contract, and evidence systems of record
  - tenant source precedence when public sources, supplier evidence, and tenant policies conflict
  - tenant data classification, privacy, legal, regulatory, quality, and safety constraints
  domain_caveats:
  - Public cybersecurity guidance is a baseline; tenant policy can be stricter but cannot erase public-source urgency without
    approved authority.
  - Supplier self-attestation is weaker than scoped assurance evidence and must be labeled accordingly.
  - Formal audit reports, certifications, legal clauses, DPAs, and regulator-facing obligations require authorized human or
    adjacent-specialist review before final approval.
  - SBOM availability, access restrictions, stale components, and transitive dependencies can materially change supplier risk.
  refusal_or_return_conditions:
  - Critical tenant facts or systems of record are missing.
  - A request requires execution, formal signoff, licensed judgment, legal authority, privacy authority, procurement approval,
    financial approval, quality release, or runtime operations.
  - Source, supplier, contract, or policy conflicts lack an approved precedence rule.
  - The request treats third-party security review as generic procurement, generic cybersecurity strategy, or broad architecture
    ownership.
