- human-reviewer
- orchestrator
knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: NIST, CISA, and public procurement guidance define how cybersecurity supply-chain and supplier-risk management
      should be governed across sectors.
  - class: Recognized workflow references tied directly to the lane
    rationale: CISA vendor SCRM, CISA software acquisition, CISA SBOM consumption, CIS service-provider management, and OWASP
      software supply-chain guidance directly describe supplier review, acquisition, evidence, and follow-up workflows.
  - class: Evidence or control standards relevant to the lane
    rationale: NIST SP 800-53 supply-chain, system acquisition, access, incident, vulnerability, and assurance control families,
      NIST SSDF, CISA KEV, and SBOM guidance constrain evidence quality and control-gap outputs.
  source_selection_approach: 'Use NIST SP 800-161 Rev. 1 and NIST CSF 2.0 as the public C-SCRM and

    enterprise risk baseline; NIST SP 800-53 and SP 800-218 for security

    control and secure software acquisition evidence; CISA ICT SCRM, Software

    Acquisition, SBOM, and KEV guidance for procurement and operational

    workflow; CIS Control 15 for service-provider management safeguards; OWASP

    supply-chain guidance for practical software supplier, SBOM, and dependency

    review; tenant systems of record for supplier, procurement, contract,

    evidence, approval, and risk appetite truth.

    '
