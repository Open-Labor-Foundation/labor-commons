tenant_required_facts:
  minimum_facts:
  - Authorized tenant, asset owner, and assessment sponsor
  - Scope statement with included and excluded assets, IP ranges, hostnames, applications, APIs, cloud accounts, third parties,
    and environments
  - Written authorization, rules of engagement, permitted techniques, stop conditions, emergency contacts, and allowed test
    windows
  - Systems of record for scope, tickets, findings, evidence, reports, exceptions, and remediation ownership
  - Asset criticality, data sensitivity, business process impact, internet exposure, and compensating controls
  - Accepted risk-rating method, severity thresholds, confidence rubric, and tenant escalation policy
  - Evidence retention, report distribution, confidentiality, legal, contractual, and disclosure constraints
  - Tenant-specific policy context that materially changes testing, prioritization, or publication
  retrieval_dependencies:
  - Document repository for scope, authorization, ROE, and report templates
  - Asset inventory or CMDB
  - Vulnerability management platform
  - Ticketing and remediation tracker
  - Evidence store with timestamps and chain-of-custody metadata
  - GRC, risk register, or exception register
  - Source baseline cache for NIST, CISA, OWASP, CIS, PCI, FedRAMP, and tenant policy references
systems_of_record:
- name: assessment intake and authorization repository
  governs: Scope statement, authorization artifact, ROE, legal approval, and stop-condition truth.
- name: asset inventory or CMDB
  governs: Asset ownership, environment, criticality, exposure, and business service context.
- name: vulnerability management platform
  governs: Scanner findings, plugin metadata, timestamps, severity inputs, remediation state, and retest records.
- name: evidence repository
  governs: Screenshots, logs, request/response snippets, scan exports, manual notes, and chain-of-custody metadata.
- name: finding register or report workspace
  governs: Finding text, severity rationale, affected assets, evidence links, remediation recommendations, and publication
    state.
- name: ticketing and remediation tracker
  governs: Owner, due date, status, remediation plan, verification results, and exception linkage.
- name: risk, exception, or GRC system
  governs: Risk acceptance, compensating controls, exceptions, control mappings, and compliance-adjacent references.
- name: tenant policy and records-retention repository
  governs: Retention period, distribution approval, confidentiality handling, and tenant-specific constraints.
recordkeeping_and_administration:
  maintained_records:
  - assessment intake record
  - scope and ROE validation status
  - evidence sufficiency log
  - finding register entries and confidence labels
  - remediation verification checklist
  - out-of-scope decision note
  - orchestrator handoff packet
  - publication readiness and exception summary
  record_statuses:
  - received
  - blocked_missing_authority
  - blocked_missing_evidence
  - in_scope_advisory
  - low_confidence
  - ready_for_human_review
  - returned_to_orchestrator
  - refused_out_of_scope
  - published_by_authorized_owner
  - retired_or_superseded
  retention_rules:
    baseline: 'Preserve assessment records according to tenant retention policy, contractual obligations, applicable legal
      holds, and system-of-record retention controls. The specialist may tag records and produce retention notes but must
      not shorten retention, delete evidence, or approve disposal.

      '
    minimum_metadata:
    - source system
    - artifact owner
    - retrieval timestamp
    - hash or immutable reference when available
    - scope version
    - reviewer or approver where required
    - status change reason
  update_permissions:
    allowed:
    - Draft record update notes that describe what evidence was reviewed and what status is recommended.
    - Add advisory confidence labels, missing-evidence flags, source references, and handoff recommendations.
    - Prepare publication-readiness checklists for authorized human review.
    approval_required:
    - Publishing or distributing final reports
    - Changing official scope, ROE, risk acceptance, evidence retention, or finding closure state
    - Closing remediation tickets, exceptions, or audit-related evidence requests
    - Deleting, suppressing, or materially altering evidence
  audit_trail_expectations:
  - Every output must identify source artifacts, assumptions, missing facts, confidence level, and boundary decision.
  - Every refusal or orchestrator return must name the trigger, affected artifact, and next owner.
  - Every record update note must preserve prior status, proposed status, reason, source evidence, and reviewer requirement.
  - Every tenant-specific deviation from public guidance must be marked as tenant policy and not public baseline.
  administrative_boundary: 'The specialist may maintain records, assemble evidence, recommend status updates, and prepare
    handoff notes. It must not decide the underlying authorization, legal permission, risk acceptance, control attestation,
    remediation closure, report release, or regulatory outcome.

    '
runtime_materialization:
  materializer: commons-crew or future runtime materializer
  safe_materialization_requires:
  - task metadata including agent slug, target delivery level, runtime strategy, specialty boundary, owned workflows, allowed
    outputs, and refusal rules
  - tenant-supplied scope, authorization, ROE, asset inventory, evidence, policy, retention, report distribution, and confidence
    threshold facts
  - retrieval access to tenant systems of record listed in this manifest
  - authority-source cache with source IDs, review date, refresh interval, and decay status
  - output templates for test plans, findings, remediation plans, evidence packets, record update notes, and escalation summaries
  - orchestrator routing map for adjacent specialists and human approval owners
  must_refuse_or_return_when:
  - active testing execution, credential collection, malware simulation, phishing, or destructive testing is requested
  - legal authorization, tenant approval, scope, or ROE is missing, stale, or contradicted
  - the output would be treated as formal audit, certification, risk acceptance, or report-publication signoff
  - tenant systems of record cannot be retrieved or evidence cannot be linked to named artifacts
  - tenant policy, public source, contractual terms, or jurisdictional requirements conflict
  generated_runtime_retention_policy: 'Do not retain a trusted built implementation in the repository by default. Long-term
    storage of a generated implementation requires documented frequent-use promotion evidence, successful replay of this scenario
    suite, security review, tenant-isolation review, rollback notes, and maintainer approval.

    '
deployment:
  deployment_model: specification-based catalog package consumed by orchestrator or materializer on demand.
  rollback_path:
  - Revert this package directory to the previous committed version.
  - Disable materialization for the lane and route requests to orchestrator.
  - Invalidate source cache entries newer than the previous release.
  - Re-run strict evaluation scenarios before restoring market-facing claim.
  monitoring_and_logging:
  - Log request classification, source IDs consulted, evidence references, assumptions, confidence labels, refusal triggers,
    and orchestrator returns.
  - Monitor boundary refusals, low-confidence escalations, stale source warnings, tenant retrieval failures, and scenario-regression
    events.
  - Prohibit cross-tenant evidence storage and redact sensitive findings from shared telemetry.
commercialization:
  target_buyer: Security leaders, application security teams, vulnerability management teams, MSSPs, and consulting firms
    running recurring authorized assessments.
  user_profile: Practitioners and reviewers who need evidence-backed penetration-test planning, finding quality control, remediation
    sequencing, and audit-friendly reporting support.
  packaging_notes:
  - validated spec pack with manifest, research summary, functionality map, scenarios, results, readiness evidence, deployment
    notes, and commercialization notes.
  - Runtime remains specification-based unless usage frequency and operational evidence justify trusted-build promotion.
  - Position as a specialist advisory and documentation lane, not an exploitation runner, red-team operator, compliance attestor,
    or code-remediation service.
  subscription_model_notes:
  - Base catalog entitlement for advisory penetration-testing support.
  - Optional add-ons for evidence repository connectors, vulnerability management connectors, and tenant-specific report templates.
  - Enterprise tier can require private source-baseline review and tenant policy mapping.
  proof_points:
  - 18 validated strict-profile scenarios with pass rate 1.00 and no unreviewed regressions.
  - Research-backed source mix covering workflow, evidence, operating guidance, control standards, retention, and failure
    handling.
  - Explicit refusal and handoff rules for execution, incident response, audit attestation, secure coding, and architecture
    ownership.
  - Functional ability coverage complete across shared, records-documentation-and-administration, and cross-industry ability
    contracts.
  go_to_market_gaps:
  - External benchmark metrics for report quality and remediation adoption remain tenant-pilot dependent.
  - Pricing and connector packaging assumptions require go-to-market validation.
  - Frequent-use promotion evidence is not yet present, so retained built runtime ownership is intentionally not claimed.
