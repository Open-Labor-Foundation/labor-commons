knowledge_baseline:
  source_baseline_version: '2026-04-14'
  source_classes:
  - class: Named-industry operating guidance
    rationale: NIST CSF, CISA ransomware and cross-sector goals, FFIEC continuity guidance, SEC disclosure rules, and CIRCIA
      guidance provide public operating, recovery, reporting, and authority constraints for cyber resilience across sectors.
  - class: Recognized workflow references tied directly to the lane
    rationale: NIST contingency planning and cyber resiliency publications define recovery planning lifecycle, BIA, alternate
      processing, RTO/RPO, cyber resiliency objectives, engineering tradeoffs, testing, and maintenance.
  - class: Evidence or control standards relevant to the lane
    rationale: NIST SP 800-53 contingency controls and CIS data recovery safeguards define measurable evidence expectations
      for backups, restoration, testing, control review, and audit-ready artifacts.
  source_selection_approach: 'Use NIST SP 800-34 Rev. 1 as the primary contingency planning workflow baseline, NIST SP 800-160
    Vol. 2 Rev. 1 for cyber resiliency engineering concepts, NIST CSF 2.0 for Recover and Govern outcome framing, CISA ransomware
    and cross-sector guidance for practical destructive-event and backup guidance, NIST SP 800-53 and CIS Controls for control
    evidence, and FFIEC, SEC, CIRCIA, state breach, cyber insurance, contract, safety, and sector sources only to flag tenant-specific
    authority and escalation requirements.

    '
