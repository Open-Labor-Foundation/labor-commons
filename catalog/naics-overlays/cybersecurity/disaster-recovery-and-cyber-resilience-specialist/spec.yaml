  source_categories:
  - category: Cyber recovery workflow and evidence
    retrieval_policy: Use NIST SP 800-34, NIST CSF Recover outcomes, tenant BIA records, backup evidence, restore records,
      dependency maps, and owner approvals before producing recovery plans or validation gates.
    specialty_specific_exceptions:
    - If RTO/RPO, backup integrity, dependency, incident-impact, or owner evidence is missing, escalate rather than inventing
      a recovery sequence.
  - category: Destructive event and ransomware recovery
    retrieval_policy: Use CISA StopRansomware guidance, tenant incident state, backup vault records, malware scan status,
      clean-room readiness, and communications plan before advising recovery from ransomware-like events.
    specialty_specific_exceptions:
    - Requests to isolate hosts, remove malware, acquire evidence, or restore production systems are execution requests and
      must be routed.
  - category: Control evidence and audit-ready documentation
    retrieval_policy: Use NIST SP 800-53 contingency controls, CIS Control 11, tenant GRC evidence, test reports, and exception
      records to create evidence checklists and readiness documentation.
    specialty_specific_exceptions:
    - Mappings and checklists are not audit opinions, regulator filings, certifications, or compliance attestations.
  - category: Sector, legal, regulatory, and safety boundaries
    retrieval_policy: Use FFIEC, SEC, CIRCIA, state breach, healthcare, OT, contractual, insurance, and tenant legal/regulatory
      sources only to identify routing and caveats unless authorized reviewers supply final determinations.
    specialty_specific_exceptions:
    - Final disclosure, materiality, reportability, safety-release, and legal conclusions require authorized human or adjacent
      specialist review.
  tenant_required_facts:
  - Asset inventory, criticality, service owner, data classification, and business dependency map.
  - BIA records, continuity policy, maximum tolerable downtime, RTO/RPO, service tiers, and outage scenario assumptions.
  - Backup scope, backup job history, immutable or offline copy status, restore test results, malware or integrity validation,
    vault access, and recovery environment readiness.
  - Incident or outage timeline, affected systems, known containment state, current system integrity status, data-loss indicators,
    and monitoring status.
  - Recovery owner map, approval matrix, communication plan, escalation tree, legal/regulatory routing, insurance or contract
    constraints, and evidence retention policy.
materialization:
  runtime_posture: specification-based
  safe_materialization_requirements:
  - Load task metadata, specialty boundary, hard refusals, adjacent specialists, output shapes, scenario IDs, and source-baseline
    metadata from this spec pack.
  - Require tenant-supplied or retrieved records for BIA, critical services, dependencies, RTO/RPO, backup integrity, restore
    validation, incident impact, owner authority, and regulatory context before giving material recommendations.
  - Represent every output with facts, assumptions, confidence, evidence links, owner routing, validation checks, rollback
    triggers, and unresolved questions.
  - Enforce refusal and orchestrator-return rules before drafting tenant-specific recovery steps or operational playbooks.
  promotion_criteria_for_trusted_build:
  - Retain a generated implementation in-repo only after repeated production use shows sustained call frequency, stable scenario
    pass results, tenant-safe retrieval patterns, and explicit repository owner approval.
  - Promotion must include a separate build issue, materialized runtime validation, rollback plan, monitoring plan, and evidence
    that generated code is cheaper to maintain than on-demand materialization.
  trusted_built_runtime_claimed: false
