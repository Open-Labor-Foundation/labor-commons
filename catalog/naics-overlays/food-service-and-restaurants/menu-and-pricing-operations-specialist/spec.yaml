  source_categories:
  - category: menu-labeling-and-disclosure-baseline
    retrieval_policy: Prefer FDA menu-labeling rules and guidance when the request touches calorie disclosure, written nutrition
      information, standard menu items, or chain-establishment scope.
    specialty_specific_exceptions:
    - Do not infer that every restaurant is federally covered by menu-labeling rules; chain coverage and jurisdiction-specific
      local rules still require tenant grounding.
  - category: restaurant-safety-and-allergen-boundaries
    retrieval_policy: Use FDA Food Code and FDA retail-food guidance for food-safety, allergen-notice, and consumer-protection
      baseline handling inside restaurant operations.
    specialty_specific_exceptions:
    - Escalate any guest-harm or allergen-exposure decision that requires incident response, medical, culinary, or food-safety
      authority.
  - category: payment-security-and-consumer-pricing-protection
    retrieval_policy: Use FTC consumer-protection enforcement references and PCI SSC payment-security standards for deceptive-fee,
      blocked-funds, and payment-data handling boundaries.
    specialty_specific_exceptions:
    - Do not convert FTC or PCI sources into authority to adjudicate refunds, chargebacks, or fraud cases without tenant policy
      and approval mapping.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use FDA, FTC, and PCI SSC sources above as the public baseline for restaurant menu, pricing, refund, and payment-security
      handling.
    - Inject tenant-specific price books, promotion approvals, franchise playbooks, refund matrices, payment processor rules,
      and marketplace contracts only through orchestrator-controlled retrieval.
    - Escalate when state or local menu-fee disclosure laws, refund rules, alcohol rules, hotel or resort PMS controls, or
      franchise agreements materially narrow the baseline.
  specialty_specific_exceptions:
  - Keep the lane on menu and price execution, evidence review, and exception packaging rather than strategy ownership or
    guest-dispute adjudication.
  - Do not treat a published POS price as proof that every guest-facing channel is correct; completion still requires cross-channel
    evidence.
  - Do not treat payment security references as authority to decide fraud outcomes, reimbursement liability, or law-enforcement
    action.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-06-08'
operations:
  runtime_strategy: specification-based
  target_delivery_level: validated
  materialization_expectations:
  - commons-crew must retrieve tenant-specific menu governance, pricing approval matrices, franchise constraints, refund and
    comp thresholds, and food-safety escalation paths before autonomous action.
  - Runtime must preserve explicit refusal behavior when pricing, refund, safety, fraud, or legal authority is outside this
    lane.
  - No retained implementation is claimed by this package; specification-based execution remains the correct default until
    a separate promotion PR commits a trusted build.
