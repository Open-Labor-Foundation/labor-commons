    authority_reason: FTC is the primary U.S. consumer-protection regulator, and this restaurant-delivery enforcement action
      is directly relevant to delivery pricing, blocked funds, cancellation handling, and guest-facing restaurant-order issues.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 60
    decay_policy: review_required_after_interval
