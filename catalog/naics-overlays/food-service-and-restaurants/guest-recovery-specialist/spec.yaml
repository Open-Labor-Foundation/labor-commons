      signals that affect refund rerouting, reservation-deposit changes, and loyalty-account recovery handling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: Pricing disclosure, service-charge, and delivery-fee baseline
    retrieval_policy: Use California Attorney General and FTC restaurant-consumer-protection sources first when the request
      concerns service charges, hidden fees, delivery pricing, blocked funds, or guest-facing fee statements.
    specialty_specific_exceptions:
    - Do not generalize California-specific fee guidance across all jurisdictions without tenant and jurisdiction retrieval.
  - category: Order, booking, payment, and refund-boundary handling
    retrieval_policy: Use CFPB billing-error guidance and tenant booking or reservation policy whenever the case turns on
      duplicate charges, missing refunds, deposit disputes, no-show handling, or merchant-versus-issuer responsibility.
    specialty_specific_exceptions:
    - Do not promise a reversal or refund outcome when the record only supports escalation to the correct approver, processor,
      or front-office owner.
  - category: Menu disclosure and service-recovery communication baseline
    retrieval_policy: Use FDA menu-labeling guidance when the recovery conversation depends on menu disclosures, calorie or
      standard-menu-item status, or guest-facing product information.
    specialty_specific_exceptions:
    - Do not infer that every location is federally covered by chain-restaurant menu-labeling rules without tenant context.
  - category: Safety, contamination, illness, and fraud stop conditions
    retrieval_policy: Use FDA food-safety guidance and FTC Red Flags guidance whenever allergen, contamination, employee-illness,
      suspicious refund, identity mismatch, or account-takeover signals change the safe answer.
    specialty_specific_exceptions:
    - Do not authorize continued consumption, close a safety complaint, or change refund destinations while safety or fraud
      indicators remain unresolved.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the California Attorney General, FTC, CFPB, and FDA baseline above as the public source set for food-service-and-restaurants
      guest-recovery work.
    - Inject tenant-specific guest-recovery matrices, reservation and no-show policies, service-charge rules, refund approvals,
      marketplace contracts, processor rules, and local food-code adoption only through orchestrator-controlled retrieval.
    - Escalate when local law, franchise policy, resort dining controls, delivery-platform terms, or payment-processor rules
      materially narrow the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on guest-recovery clarification, delegated recovery actions, and escalation packaging rather than discretionary
    appeasement approval or operations ownership.
  - Do not treat an apology script or CRM note as proof that a recovery action is approved unless the recovery matrix and
    transactional records support it.
  - Do not equate restaurant hospitality tone with authority to waive fees, reverse deposits, or override refund and fraud
    controls.
  next_review_due_at: '2026-07-09'
