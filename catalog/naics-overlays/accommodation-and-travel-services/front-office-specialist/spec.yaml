- hospitality-compliance-specialist
knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Consumer-protection or public hospitality workflow guidance
    rationale: Official public hospitality workflow and accessibility guidance establishes front-desk duties, reservation
      records, accessible-room reservation constraints, and safe arrival-intake prerequisites.
  - class: Pricing, booking, refund, or guest-service operating references
    rationale: Official pricing, booking, refund, and billing references constrain how front-office intake handles rate plans,
      mandatory fees, itinerary refund signals, folio disputes, payment guarantees, and merchant-of-record boundaries.
  - class: Safety, fraud, or loss-prevention handling guidance
    rationale: Official identity-theft, payment-security, public-health, and safety guidance defines stop conditions when
      identity, payment, suspicious behavior, or guest-impact issues make check-in or routing unsafe.
  source_selection_approach: 'Use O*NET front-desk occupational duties, DOJ ADA lodging reservation

    rules, FTC short-term-lodging fee guidance, DOT aviation refund guidance,

    CFPB billing-error guidance, FTC Red Flags guidance, CDC

    travel-associated outbreak guidance, and PCI SSC call-center payment-data

    guidance before drafting front-office workflow claims. Treat tenant ID

    policy, check-in time, early-arrival rules, room-readiness policy,

    overbooking playbooks, accessible-room inventory controls, payment

    processor rules, supplier contracts, jurisdictional lodging rules, and

    safety or fraud escalation procedures as runtime retrieval dependencies.

    '
