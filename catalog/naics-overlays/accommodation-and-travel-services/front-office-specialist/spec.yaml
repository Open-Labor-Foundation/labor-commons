  source_categories:
  - category: Front-desk intake and room-readiness baseline
    retrieval_policy: Use O*NET front-desk task definitions for the public baseline of registering guests, assigning rooms,
      issuing keys, confirming reservations, verifying credit, maintaining room and account records, and using PMS or front-desk
      systems.
    specialty_specific_exceptions:
    - Do not treat O*NET duties as tenant authority to override actual room readiness, identity, payment, safety, or property
      policy.
  - category: Reservation, accessibility, pricing, refund, and billing constraints
    retrieval_policy: Use DOJ ADA, FTC fee, DOT refund, and CFPB billing guidance whenever the intake case turns on accessible-room
      readiness, fee or rate disclosure, itinerary refund signals, merchant-of-record responsibility, folio mismatch, or payment
      dispute boundaries.
    specialty_specific_exceptions:
    - Do not generalize U.S. public baseline guidance into property-specific tax, package, supplier, or jurisdiction terms
      without tenant retrieval.
    - Do not promise a refund, fee reversal, rate adjustment, or accessible-room substitution when records only support escalation.
  - category: Identity, safety, fraud, and payment-data stop conditions
    retrieval_policy: Use FTC Red Flags, CDC outbreak guidance, and PCI SSC guidance whenever altered ID, profile change,
      payment reroute, unsafe incident, public-health notice, or card-data handling changes whether check-in or routing can
      proceed.
    specialty_specific_exceptions:
    - Do not clear check-in, key issuance, or payment handling while suspicious identity, safety, public-health, or payment-security
      conditions remain unresolved.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the O*NET, DOJ, FTC, DOT, CFPB, CDC, and PCI SSC baseline above as the public source set for front-office intake
      work.
    - Inject tenant policies, brand standards, supplier agreements, payment processor rules, jurisdiction-specific lodging
      rules, room-control policies, and emergency plans only through orchestrator-controlled retrieval.
    - Escalate when jurisdiction, processor, brand, supplier, property, or tenant policy materially narrows the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on check-in eligibility, prerequisite validation, blocker identification, and owner routing rather than
    downstream execution or policy approval.
  - Do not promise room availability, key issuance, rate protection, refunds, or VIP exception treatment when the authoritative
    record only supports a blocked or escalated state.
  - Do not request or process full cardholder data through unapproved front-desk, phone, email, chat, or SMS workflows.
  next_review_due_at: '2026-06-09'
