      section directly governs accessible-room reservation descriptions, holding, and blocking obligations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: tsa-identification
    title: Identification
    publisher: Transportation Security Administration
    source_type: traveler-identity-security-guidance
    location: https://www.tsa.gov/travel/security-screening/identification
    authority_reason: TSA is the U.S. transportation security checkpoint authority, and its official identification guidance
      is authoritative for checkpoint ID expectations that affect pre-travel identity-prerequisite handling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: state-before-you-go
    title: Before You Go
    publisher: U.S. Department of State
    source_type: international-travel-preparation-guidance
    location: https://travel.state.gov/content/travel/en/international-travel/before-you-go.html
    authority_reason: The State Department is the U.S. authority for passports, travel advisories, and international travel
      preparation guidance, making it authoritative for identifying document and destination prerequisite gaps without turning
      the lane into legal or immigration advice.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ftc-red-flags-rule
    title: 'Fighting Identity Theft with the Red Flags Rule: A How-To Guide for Business'
    publisher: Federal Trade Commission
    source_type: fraud-control-guidance
    location: https://www.ftc.gov/business-guidance/resources/fighting-identity-theft-red-flags-rule-how-guide-business
    authority_reason: FTC Red Flags guidance is an authoritative public control reference for suspicious identity and account-use
      signals that affect traveler-profile changes, booking changes, payment reroutes, and refund requests.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: pci-standards
    title: PCI Security Standards
    publisher: PCI Security Standards Council
    source_type: payment-security-standard
    location: https://www.pcisecuritystandards.org/standards/
    authority_reason: PCI SSC is the recognized payment-card security standards body, and its standards constrain how travel
      booking workflows may handle cardholder data, tokens, authorizations, and contact-center payment workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the DOT, eCFR, FTC, DOJ, TSA, State Department, FTC Red Flags, and PCI SSC baseline above as the public source set
      for accommodation-and-travel-services travel-booking work.
    - Inject tenant travel policy, supplier agreements, negotiated rate rules, GDS queue handling, payment processor rules,
      destination rules, and exception matrices only through orchestrator-controlled retrieval.
    - Escalate when jurisdiction, supplier, processor, brand, travel-policy, destination, or tenant policy materially narrows
      the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on intake validation, confirmation readiness, pending summaries, and safe routing rather than pricing, refund,
    ticketing, supplier-waiver, fraud, legal, or safety approval work.
  - Do not promise no-cost rebooking, refund eligibility, waived fare difference, fee removal, inventory protection, or travel-document
    sufficiency when the authoritative record only supports clarification or escalation.
  - Do not request or process full cardholder data through booking messages, email, SMS, chat, or unapproved contact-center
    workflows.
  next_review_due_at: '2026-06-09'
