knowledge_baseline:
  source_baseline_version: '2026-04-08'
  research_contract_version: '2026-04-08'
  source_classes:
  - class: Consumer-protection or public hospitality workflow guidance
    rationale: Official hospitality, accessibility, privacy, and consumer-protection guidance defines the public baseline
      for guest-facing booking, accessibility, privacy, and data-handling controls.
  - class: Pricing, booking, refund, or guest-service operating references
    rationale: Official pricing, fee-disclosure, billing-error, and payment-control references identify booking and folio
      records, refund or issuer boundaries, and evidence required for compliant payment handling.
  - class: Safety, fraud, or loss-prevention handling guidance
    rationale: Public-health, fire-safety, fraud, and payment-security sources define stop conditions and escalation paths
      when guest harm, exposure, identity mismatch, security, or loss-prevention risk affects the answer.
  source_selection_approach: 'Use public regulators and recognized standards before tenant summaries:

    DOJ ADA lodging rules for accessibility-sensitive reservation obligations;

    FTC fee and privacy/security guidance for fee disclosure and guest-data

    controls; CFPB billing-error guidance for merchant-versus-issuer payment

    boundaries; PCI SSC merchant SAQ evidence expectations for payment-card

    controls; CDC travel-associated outbreak guidance and USFA hotel fire-safety

    material for safety-sensitive escalation; and FTC Red Flags guidance for

    identity-mismatch and fraud stop conditions. Tenant policies, brand

    standards, processor rules, supplier contracts, and jurisdictional rules

    narrow this baseline at runtime and must be retrieved before property-level

    conclusions.

    '
  authority_sources:
  - source_id: doj-ada-title-iii-lodging-reservations
    title: Americans with Disabilities Act Title III Regulations
    publisher: U.S. Department of Justice
    source_type: consumer-protection-or-public-hospitality-workflow-guidance
    location: https://www.ada.gov/law-and-regs/regulations/title-iii-regulations/
    authority_reason: DOJ is the primary federal civil-rights authority for ADA Title III enforcement, and the lodging reservations
      provisions directly govern accessible-room descriptions, reservation blocking, and accessibility-sensitive booking controls.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: doj-ada-lodging-guide
    title: 'ADA Guide for Places of Lodging: Serving Guests Who Are Blind or Who Have Low Vision'
    publisher: U.S. Department of Justice
    source_type: consumer-protection-or-public-hospitality-workflow-guidance
    location: https://www.ada.gov/resources/lodging-guide/
    authority_reason: Official DOJ lodging guidance explains hospitality-specific effective communication, alternate-format
      materials, wayfinding assistance, and service-animal handling that constrain guest-service and property-compliance workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
