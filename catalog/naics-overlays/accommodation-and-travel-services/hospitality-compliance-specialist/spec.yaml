    source_type: safety-fraud-or-loss-prevention-handling-guidance
    location: https://www.usfa.fema.gov/prevention/hotel-fires/
    authority_reason: USFA is a federal fire-safety authority, and its hotel and motel fire-safety resources are directly
      relevant to lodging fire-safety records, inspection evidence, and escalation when property safety status is uncertain.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: booking accessibility, privacy, and guest-data controls
    retrieval_policy: Use DOJ ADA lodging sources and FTC privacy/security guidance before producing accessibility, guest-data,
      or privacy complaint control summaries.
    specialty_specific_exceptions:
    - Do not treat a reservation note, guest preference, or local practice as sufficient when room features, effective communication,
      or privacy-control evidence is missing.
  - category: pricing, fee, refund, folio, and payment-control handling
    retrieval_policy: Use FTC fee guidance, CFPB billing-error guidance, PCI SSC merchant evidence expectations, and tenant
      processor rules for resort fees, amenity fees, incidental holds, duplicate charges, chargebacks, refund status, and
      cardholder-data handling.
    specialty_specific_exceptions:
    - Do not approve refunds, fee removals, or PCI compliance; prepare evidence and route to authorized owners.
  - category: safety, incident, fraud, loss-prevention, and public-health stop conditions
    retrieval_policy: Use CDC, USFA, FTC Red Flags, and tenant safety or security policies when incident logs, guest harm,
      exposure notices, identity mismatch, or loss-prevention signals change the safe answer.
    specialty_specific_exceptions:
    - Do not issue safety clearance, public-health closure, fraud findings, or security instructions beyond documented escalation.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the public source baseline for lane design and require tenant retrieval for jurisdiction, property, policy, system,
      record-location, processor, supplier, and approval context.
    - Record conflicts among public guidance, tenant policy, brand standards, supplier terms, processor rules, and jurisdiction-specific
      law instead of guessing.
    - Escalate legal, regulator-facing, payment-card certification, privacy-law signoff, public-health, safety/security, and
      policy-override issues to designated owners.
  specialty_specific_exceptions:
  - The lane produces governance support, evidence summaries, and remediation routing; it is not legal counsel, a regulator,
    a PCI assessor, a safety official, a refund approver, or the property incident commander.
  - Hospitality compliance outputs must include property, system-of-record, evidence-owner, review-cadence, exception-owner,
    and authority-boundary context.
  - High-volume guest-service compliance issues must be segmented by booking, folio, privacy, safety, fraud, or payment-control
    risk instead of handled as generic customer support.
  next_review_due_at: '2026-06-09'
