    location: https://www.ftc.gov/business-guidance/resources/protecting-personal-information-guide-business
    authority_reason: FTC is the primary federal consumer-protection regulator for unfair or deceptive data-security practices,
      and this business guide provides authoritative privacy and data-security controls relevant to guest records and complaints.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: pci-dss-saq-d-merchant
