  source_categories:
  - category: Hotel execution and operating lifecycle baseline
    retrieval_policy: Use BLS, O*NET, AHLA, and tenant SOPs to ground occupancy, room readiness, cleanliness, staffing, guest-impact,
      and completion-evidence workflows.
    specialty_specific_exceptions:
    - Do not treat public operating duty descriptions as tenant-specific staffing ratios, labor authorization, or final completion
      criteria.
  - category: Booking, pricing, payment, and accessibility constraints
    retrieval_policy: Use OpenTravel, FTC, CFPB, and DOJ sources whenever room availability, booking mismatch, folio, fee,
      refund, payment, or accessible-room handling affects operational work.
    specialty_specific_exceptions:
    - Do not approve rate, refund, fee, room-control, or accessible-room exceptions without tenant authority and front-office
      or revenue owner approval.
  - category: Safety, fraud, PMS-security, and loss-prevention stop conditions
    retrieval_policy: Use CDC, CISA, NIST, PCI SSC, and FTC Red Flags sources whenever a guest-impact issue involves outbreak,
      physical safety, PMS security, card data, suspicious identity, or loss-prevention signals.
    specialty_specific_exceptions:
    - Do not declare safety or fraud closure, request full card data, or continue normal execution when a stop condition is
      unresolved.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the BLS, O*NET, AHLA, OpenTravel, FTC, CFPB, DOJ, CDC, CISA, NIST, PCI SSC, and FTC Red Flags baseline above as
      the public source set for hotel-operations work.
    - Inject tenant room-readiness standards, staffing model, labor rules, brand standards, PMS configuration, service-recovery
      thresholds, emergency plans, local jurisdiction rules, and authority matrices only through orchestrator-controlled retrieval.
    - Escalate when public baseline guidance and tenant, brand, property, processor, supplier, labor, jurisdiction, or emergency
      policy materially conflict.
  specialty_specific_exceptions:
  - Keep the lane on execution state, operational evidence, exception packaging, and completion records rather than pricing,
    refund, front-office, fraud, safety, legal, or executive approval work.
  - Do not mark rooms, tickets, incidents, outages, or staffing fixes complete without system-of-record evidence and closure
    criteria.
  - Do not request or process full cardholder data through guest messaging, email, SMS, or unprotected workflows.
  next_review_due_at: '2026-06-09'
