knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Consumer-protection or public hospitality workflow guidance
    rationale: Federal lodging, labor, accessibility, and recognized hospitality sources define public-baseline expectations
      for hotel operating duties, room readiness, cleanliness, effective communication, and guest-impact handling.
  - class: Pricing, booking, refund, or guest-service operating references
    rationale: FTC, CFPB, DOJ, and OpenTravel sources define booking, rate, fee, payment, reservation, and accessible-room
      record constraints that hotel operations cannot override while executing day-of-stay work.
  - class: Safety, fraud, or loss-prevention handling guidance
    rationale: CDC, CISA, NIST, PCI SSC, and FTC fraud-control sources define outbreak, physical security, PMS cybersecurity,
      payment-card, and identity-risk stop conditions that require escalation.
  source_selection_approach: 'Use BLS and O*NET lodging-manager sources for public hotel operations

    duties, AHLA Safe Stay for recognized hotel cleanliness and safety

    operating guidance, OpenTravel hotel specifications for reservation,

    availability, room, rate-plan, and booking terminology, FTC and CFPB

    sources for fee, billing, and refund-boundary handling, DOJ ADA lodging

    rules for accessible-room reservation constraints, and CDC, CISA, NIST,

    PCI SSC, and FTC Red Flags sources for safety, PMS-security, card-data, and

    fraud stop conditions. Treat tenant room-readiness standards, staffing

    models, brand standards, PMS configuration, labor rules, local law,

    emergency plans, service-recovery matrices, and approval thresholds as

    runtime retrieval dependencies.

    '
