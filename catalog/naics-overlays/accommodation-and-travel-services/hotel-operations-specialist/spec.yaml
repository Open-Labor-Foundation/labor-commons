    source_type: public-hospitality-operating-reference
    location: https://www.bls.gov/ooh/management/lodging-managers.htm
    authority_reason: BLS is a U.S. federal statistical agency, and its lodging-manager profile identifies the public baseline
      for hotel operations duties such as guest-room inspections, front-office oversight, staff coordination, guest complaint
