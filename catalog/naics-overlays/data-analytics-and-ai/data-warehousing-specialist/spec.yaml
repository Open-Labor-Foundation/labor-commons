meta_agent_contracts:
  best_practices_curation:
    issue_reference: '#225'
    bootstrap_metadata:
      specialty: data warehousing
      domain: data-analytics-and-ai
      specialist_owned_delta: warehouse modeling, physical layout, workload isolation, recovery, and warehouse-only cost/performance
        controls
    request_contract:
      inputs:
      - warehouse platform and workload profile
      - modeling pattern under consideration
      - freshness, concurrency, and recovery targets
      outputs:
      - normalized warehouse best-practice summary
      - warehouse-specific risk flags
      - staleness metadata
    fallback:
      policy: Use the local manifest authority baseline and specialist-specific notes only; escalate if a recommendation would
        otherwise depend on uncited vendor-specific behavior.
      confidence_trigger: shared guidance missing, stale, or contradictory
  evaluation_design:
    issue_reference: '#302'
    bootstrap_metadata:
      specialty: data warehousing
      required_coverage: normal design guidance, governance handling, pipeline and model-adjacent failure modes, evidence
        quality, out-of-scope rejection, and low-confidence escalation
    request_contract:
      inputs:
      - specialist boundary
      - minimum scenario count
      - target delivery level
      outputs:
      - scenario catalog
      - coverage gaps
      - threshold normalization notes
    fallback:
      policy: Use the local scenario suite in this package and require human review before release.
      confidence_trigger: scenario gaps or no response
  readiness_and_evidence:
    issue_reference: '#303'
    bootstrap_metadata:
      specialty: data warehousing
      release_target: validated
    request_contract:
      inputs:
      - evaluation results
      - source baseline state
      - deployment and commercialization notes
      outputs:
      - readiness checklist
      - evidence consistency review
      - remaining release risks
    fallback:
      policy: Use local readiness evidence and keep approval notes conservative, traceable, and bounded to recorded proof
        points.
      confidence_trigger: inconsistent evidence or stale review
  deployment_package:
    issue_reference: '#304'
    bootstrap_metadata:
      specialty: data warehousing
      runtime_profile: orchestrator-hosted specialist bundle
    request_contract:
      inputs:
      - tenant adaptation policy
      - monitoring and logging expectations
      - rollback and restore requirements
      outputs:
      - deployment notes delta
      - operational readiness checklist
    fallback:
      policy: Use the repository deployment template plus warehouse-specific isolation, observability, and rollback notes.
      confidence_trigger: missing deployment boilerplate
  commercialization_and_packaging:
    issue_reference: '#305'
    bootstrap_metadata:
      specialty: data warehousing
      buyer_motion: analytics platform and warehouse modernization enablement
    request_contract:
      inputs:
      - target buyer and user profile
      - proof points
      - go-to-market assumptions
      outputs:
      - packaging notes
      - subscription model guidance
      - commercialization gaps
    fallback:
      policy: Keep commercialization claims narrow to the validated artifact bundle, documented boundaries, and recorded evaluation
        proof.
      confidence_trigger: unsupported market claims
  authority_source_policy:
    issue_reference: '#306'
    bootstrap_metadata:
      specialty: data warehousing
      source_policy: record source categories, retrieval policy, and warehouse-specific exceptions without reproducing the
        full shared corpus
    request_contract:
      inputs:
      - required source categories
      - warehouse-specific exceptions
      - refresh expectations
      outputs:
      - source policy normalization
      - recency review guidance
      - deprecation risk flags
    fallback:
      policy: Use the real public authoritative sources listed in this manifest with explicit review cadence and decay policy.
      confidence_trigger: source freshness uncertain
  specialty_boundary_and_routing:
    issue_reference: '#307'
    bootstrap_metadata:
      specialty: data warehousing
      adjacency_risks: data architecture, data integration, reporting and dashboard, database administration, MLOps
    request_contract:
      inputs:
      - candidate task
      - neighbor specialties
      - confidence level
      outputs:
      - route decision
      - boundary rationale
      - rejection phrasing
    fallback:
      policy: Prefer rejection and orchestrator handoff when ownership is ambiguous.
      confidence_trigger: cross-specialty ambiguity
  agent_package_scaffolding:
    issue_reference: '#308'
    bootstrap_metadata:
      specialty: data warehousing
      package_root: catalog/data-analytics-and-ai/data-warehousing-specialist/
    request_contract:
      inputs:
      - template paths
      - required artifact list
      - target delivery level
      outputs:
      - scaffold completion checklist
      - required file map
      - template drift warnings
    fallback:
      policy: Use repository scaffolding and fill the package locally.
      confidence_trigger: template drift or missing scaffold
