shared_meta_agent_contracts:
  bootstrap_metadata:
    package_slug: reporting-and-dashboard-specialist
    domain_slug: data-analytics-and-ai
    target_delivery_level: validated
    validation_profile: standard
    specialist_owned_responsibilities:
    - Define the narrow reporting/dashboard specialty boundary and rejection map.
    - Provide reporting-layer-only examples, escalation rules, and publication/freshness constraints.
    - Specify bootstrap metadata plus request/response contracts for shared meta-agent calls.
    - Define specialist fallback behavior when delegated outputs are unavailable, stale, or low confidence.
    delegated_responsibilities:
    - Best-practice corpus retrieval and normalization.
    - Evaluation-suite normalization and rubric boilerplate.
    - Readiness evidence packaging boilerplate.
    - Deployment package boilerplate.
    - Commercialization and packaging boilerplate.
    - Authority-source policy normalization.
    - Boundary conflict normalization where centrally derivable.
    - Package scaffolding validation.
    delegated_contracts:
      agent: best-practices-curation-specialist
      request_contract:
        request_type: authoritative_source_delta
        required_fields:
        - package_slug
        - source_categories
        - specialty_boundary
        - exceptions
      response_contract:
        deliverable: reporting-specialty source delta and normalization suggestions
      agent: evaluation-design-specialist
      request_contract:
        request_type: scenario_quality_review
        required_fields:
        - scenario_id
        - expected_behavior
        - coverage_class
        - pass_criteria
      response_contract:
        deliverable: scenario coverage validation with edge-case and rejection checks
      agent: readiness-and-evidence-specialist
      request_contract:
        request_type: market_ready_evidence_check
        required_fields:
        - delivery_status
        - human_verification
        - evaluation_thresholds
        - deployment_readiness
        - commercialization_readiness
      response_contract:
        deliverable: readiness evidence consistency review
      agent: deployment-package-specialist
      request_contract:
        request_type: runtime_and_ops_notes
        required_fields:
        - runtime_profile
        - tenant_isolation_model
        - monitoring_expectations
        - rollback_path
      response_contract:
        deliverable: deployment notes normalized to repository expectations
      agent: commercialization-and-packaging-specialist
      request_contract:
        request_type: market_packaging_review
        required_fields:
        - target_buyer
        - core_outcome
        - subscription_model
        - proof_points
      response_contract:
        deliverable: commercial positioning and packaging guidance
      agent: authority-source-policy-specialist
      request_contract:
        request_type: source_policy_review
        required_fields:
        - review_dates
        - refresh_interval_days
        - decay_policy
        - source_categories
      response_contract:
        deliverable: source freshness and decay policy normalization
      agent: specialty-boundary-and-routing-specialist
      request_contract:
        request_type: boundary_review
        required_fields:
        - in_scope_rules
        - out_of_scope_rules
        - handoff_targets
      response_contract:
        deliverable: routing conflict review and adjacent-specialty handoff checks
      agent: agent-package-scaffolding-specialist
      request_contract:
        request_type: scaffold_validation
        required_fields:
        - file_layout
        - required_artifacts
        - template_compliance
      response_contract:
        deliverable: package completeness checklist
  fallback:
    stale_threshold_days: 30
    unresponsive_threshold_minutes: 15
    on_stale: Use the manifest baseline, mark confidence as limited, and require human review before high-stakes publication
      guidance.
    on_unresponsive: Proceed only with specialist-owned baseline behavior and return unresolved delegated needs to the orchestrator.
    on_low_confidence: State uncertainty explicitly, request missing context, and avoid firm recommendations beyond reporting-layer
      safe defaults.
