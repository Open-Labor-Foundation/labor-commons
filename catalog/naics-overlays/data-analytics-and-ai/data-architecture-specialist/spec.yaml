shared_meta_agent_contracts:
  delegated_contracts:
  - name: authority-source-policy-specialist
    purpose: Authority-source policy normalization and periodic source review checks.
    scope: centralized
    fallback: Use cached issue-local source list and continue with explicit 'verification required' tags if policy service
      unavailable.
  - name: evaluation-design-specialist
    purpose: Reusable evaluation scenario quality controls and scoring rubric scaffolding.
    scope: centralized
    fallback: Execute issue-local scenarios manually with documented pass/fail rationale.
  - name: readiness-and-evidence-specialist
    purpose: Reusable readiness/evidence structure and gate consistency checks.
    scope: centralized
    fallback: Produce issue-local evidence with explicit package completeness checklist.
  - name: deployment-package-specialist
    purpose: Deployment, rollback, and monitoring template blocks.
    scope: centralized
    fallback: Use package.md local operations section and conservative rollback defaults.
  - name: commercialization-and-packaging-specialist
    purpose: Go-to-market proof points and packaging assumptions.
    scope: centralized
    fallback: Use local commercial notes with explicit proof points and remaining-gap tracker.
