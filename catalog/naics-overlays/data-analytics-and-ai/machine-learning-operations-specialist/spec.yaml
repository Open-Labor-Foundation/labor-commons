  source_categories:
  - category: official_ml_platform_docs
    retrieval_policy: Prefer current vendor-official MLOps workflow, registry, deployment, and monitoring documentation from
      major ML platforms.
    specialty_specific_exceptions:
    - Do not broaden into generic data engineering or model-development corpus unless an operational dependency must be stated
      explicitly.
  - category: open_mlop_framework_docs
    retrieval_policy: Use official open framework documentation for workflow orchestration, experiment tracking, and serving
      behavior where customers operate self-managed ML platforms.
    specialty_specific_exceptions:
    - Escalate cluster/platform administration, model-training code design, and deep infrastructure ownership instead of expanding
      the scope here.
  - category: public_governance_and_reference_architectures
    retrieval_policy: Use public AI risk frameworks and reference architectures when operational controls, approval gates,
      or monitoring governance are in scope.
    specialty_specific_exceptions:
    - Treat legal interpretation, policy certification, and enterprise governance-program design as out of scope.
