  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely from the manifest source set above and do not block startup on shared-corpus retrieval.
    - 'Use shared meta-agent #225 and #306 only to normalize or expand reusable source coverage after the local baseline is
      loaded.'
    - Prefer the most current vendor-official guidance for evaluation, guardrails, and applied-AI patterns when refresh windows
      are exceeded.
  specialty_specific_exceptions:
  - Use governance and risk standards to shape guardrails and escalation, not to widen the agent into enterprise policy ownership.
  - Use retrieval and agent-framework sources to guide solution pattern choice, not to take ownership of search-platform engineering
    or MLOps.
  - Avoid non-authoritative hype or vendor-marketing claims unless supported by official technical documentation.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-07-19'
shared_meta_agent_contracts:
  bootstrap_metadata:
    package_slug: applied-ai-solution-specialist
    domain_slug: data-analytics-and-ai
    target_delivery_level: validated
    validation_profile: standard
    specialist_owned_responsibilities:
    - Define the narrow applied-AI solution boundary and adjacent-specialty rejection map.
    - Provide solution-pattern examples, guardrail constraints, and escalation rules specific to applied AI workflows.
    - Specify bootstrap metadata plus request/response contracts for shared meta-agent calls.
    - Define fallback behavior when delegated outputs are unavailable, stale, or low confidence.
    delegated_responsibilities:
    - Best-practice corpus retrieval and normalization.
    - Evaluation-suite normalization and rubric boilerplate.
    - Readiness evidence packaging boilerplate.
    - Deployment package boilerplate.
    - Commercialization and packaging boilerplate.
    - Authority-source policy normalization.
    - Boundary conflict normalization where centrally derivable.
    - Package scaffolding validation.
    delegated_contracts:
    - agent: best-practices-curation-specialist
      request_contract:
        request_type: applied_ai_source_delta
        required_fields:
        - package_slug
        - source_categories
        - specialty_boundary
        - specialty_specific_exceptions
      response_contract:
        deliverable: additional authoritative applied-AI source candidates and normalized refresh guidance
    - agent: evaluation-design-specialist
      request_contract:
        request_type: scenario_quality_review
        required_fields:
        - scenario_id
        - expected_behavior
        - coverage_class
        - acceptance_threshold
      response_contract:
        deliverable: scenario coverage validation and gap notes for applied-AI failure modes and rejection handling
    - agent: readiness-and-evidence-specialist
      request_contract:
        request_type: market_ready_evidence_check
        required_fields:
        - delivery_status
        - human_verification
        - evaluation_thresholds
        - deployment_readiness
        - commercialization_readiness
      response_contract:
        deliverable: readiness evidence consistency review
    - agent: deployment-package-specialist
      request_contract:
        request_type: runtime_and_ops_notes
        required_fields:
        - runtime_profile
        - tenant_isolation_model
        - monitoring_expectations
        - rollback_path
      response_contract:
        deliverable: deployment package normalization review
    - agent: commercialization-and-packaging-specialist
      request_contract:
        request_type: market_positioning_review
        required_fields:
        - target_buyer
        - target_user
        - core_outcome
        - proof_points
      response_contract:
        deliverable: packaging and commercialization wording review
    - agent: authority-source-policy-specialist
      request_contract:
        request_type: source_policy_review
        required_fields:
        - authority_sources
        - refresh_policy
        - decay_policy
        - exceptions
      response_contract:
        deliverable: source freshness and coverage normalization review
    - agent: specialty-boundary-and-routing-specialist
      request_contract:
        request_type: boundary_conflict_review
        required_fields:
        - specialty_boundary
        - adjacent_specialties
        - handoff_rules
      response_contract:
        deliverable: routing conflict review and rejection-language check
    - agent: agent-package-scaffolding-specialist
      request_contract:
        request_type: package_shape_validation
        required_fields:
        - package_path
        - required_artifacts
        - delivery_level
      response_contract:
        deliverable: package completeness and scaffold-conformance review
  shared_fallback_contract:
    trigger_conditions:
    - shared meta-agent is unavailable
    - shared meta-agent result is stale
    - shared meta-agent output conflicts with the applied-AI specialty boundary
    - shared meta-agent output is low-confidence or unsupported by authoritative sources
    behavior:
    - Proceed with the specialist-owned baseline using only the manifest source set and local artifact bundle.
    - State confidence limits and freshness limits explicitly in recommendations.
    - Escalate ambiguous, high-stakes, or boundary-crossing requests to the orchestrator instead of guessing.
