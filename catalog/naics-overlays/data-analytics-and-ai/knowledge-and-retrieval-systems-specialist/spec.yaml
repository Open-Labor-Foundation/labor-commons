shared_meta_agent_contracts:
  bootstrap_metadata:
    package_slug: knowledge-and-retrieval-systems-specialist
    domain_slug: data-analytics-and-ai
    target_delivery_level: validated
    validation_profile: standard
    specialist_owned_responsibilities:
    - Define the narrow knowledge and retrieval systems specialty boundary and rejection map.
    - Provide retrieval-specific examples for indexing, chunking, hybrid search, provenance, evaluation, and failure handling.
    - Specify bootstrap metadata plus request and response contracts for shared meta-agent calls.
    - Define specialist fallback behavior when delegated outputs are unavailable, stale, conflicting, or low confidence.
    delegated_responsibilities:
    - Best-practice corpus retrieval and normalization.
    - Evaluation-suite normalization and rubric boilerplate.
    - Readiness and evidence packaging boilerplate.
    - Deployment package boilerplate.
    - Commercialization and packaging boilerplate.
    - Authority-source policy normalization.
    - Boundary conflict normalization where centrally derivable.
    - Package scaffolding validation.
    delegated_contracts:
      agent: best-practices-curation-specialist
      request_contract:
        request_type: retrieval_best_practice_delta
        required_fields:
        - package_slug
        - retrieval_pattern
        - corpus_type
        - platform_family
        - specialty_boundary
      response_contract:
        deliverable: retrieval-specialty source delta and best-practice normalization suggestions
      agent: evaluation-design-specialist
      request_contract:
        request_type: retrieval_scenario_quality_review
        required_fields:
        - scenario_id
        - expected_behavior
        - coverage_class
        - failure_mode
        - boundary_rule
      response_contract:
        deliverable: scenario coverage validation with retrieval-quality and grounding checks
      agent: readiness-and-evidence-specialist
      request_contract:
        request_type: market_ready_evidence_check
        required_fields:
        - delivery_status
        - human_verification
        - evaluation_thresholds
        - deployment_readiness
        - commercialization_readiness
      response_contract:
        deliverable: readiness evidence consistency review
      agent: deployment-package-specialist
      request_contract:
        request_type: runtime_and_ops_notes
        required_fields:
        - runtime_profile
        - tenant_isolation_model
        - monitoring_expectations
        - rollback_path
        - support_model
      response_contract:
        deliverable: deployment notes normalized to repository expectations
      agent: commercialization-and-packaging-specialist
      request_contract:
        request_type: market_packaging_review
        required_fields:
        - target_buyer
        - core_outcome
        - subscription_model
        - proof_points
        - gtm_gaps
      response_contract:
        deliverable: commercial positioning and packaging guidance
      agent: authority-source-policy-specialist
      request_contract:
        request_type: source_policy_review
        required_fields:
        - review_dates
        - refresh_interval_days
        - decay_policy
        - source_categories
        - specialty_exceptions
      response_contract:
        deliverable: source freshness and decay policy normalization
      agent: specialty-boundary-and-routing-specialist
      request_contract:
        request_type: boundary_review
        required_fields:
        - specialty_boundary
        - out_of_scope_rules
        - adjacent_specialists
        - handoff_targets
      response_contract:
        deliverable: routing conflict review and adjacent-specialty handoff checks
      agent: agent-package-scaffolding-specialist
      request_contract:
        request_type: scaffold_validation
        required_fields:
        - file_layout
        - required_artifacts
        - template_compliance
      response_contract:
        deliverable: package completion checklist
  fallback:
    stale_threshold_days: 30
    unresponsive_threshold_minutes: 15
    on_stale: Use the manifest baseline only, reduce confidence, and record delegated evidence debt without widening scope.
    on_unresponsive: Proceed with specialist-owned baseline behavior and return unresolved delegated needs to the orchestrator.
    on_low_confidence: State uncertainty explicitly, request missing retrieval evidence, and prefer conservative guidance
      or refusal over speculative retrieval claims.
