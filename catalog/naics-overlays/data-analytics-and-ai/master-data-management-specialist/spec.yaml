authority_policy:
  source_categories:
  - official-mdm-platform-documentation
  - official-stewardship-and-workflow-documentation
  - public-product-master-data-standards
  - public-ai-risk-guidance-for-ml-assisted-matching
  retrieval_policy:
  - Use only public authoritative sources in the manifest baseline.
  - At runtime, rely on manifest-pinned sources and approved tenant retrieval overlays rather than open web lookups by default.
  - Treat deprecated-but-supported product guidance as legacy-estate reference only, not as greenfield default guidance.
  specialty_specific_exceptions:
  - Use Microsoft MDS documentation only when a tenant explicitly operates or migrates a legacy MDS estate.
  - Require GS1 standards when the request centers on product master-data syndication, retail item data, or interoperable
    trade-item exchange.
  - Escalate any ML-assisted matching recommendation to governance review if auditability, explainability, or human-review
    thresholds are missing.
meta_agent_integration:
  specialist_owned_sections:
  - specialty_boundary
  - supported_tasks_and_out_of_scope_rules
  - mdm-specific-authority-policy-exceptions
  - scenario-delta-and-escalation-rules
  - tenant-isolation-contracts
  - fallback-and-routing-behavior
  delegated_sections:
  - best-practice-corpus-expansion
  - scenario-normalization-and-threshold-packaging
  - readiness-evidence-formatting
  - deployment-template-boilerplate
  - commercialization-template-boilerplate
  - source-decay-policy-normalization
  - adjacent-specialist-neighbor-normalization
  - package-scaffolding-normalization
  shared_meta_agents:
  - issue_ref: '#225'
    slug: best-practices-curation-specialist
    primary_use: Curate additional public MDM source candidates and normalize best-practice corpus updates.
    request_contract: Provide source category, mastered domain, operational topic, refresh expectation, and specialty exception.
    fallback: Freeze to current authoritative source set and prefer conservative guidance.
  - issue_ref: '#302'
    slug: evaluation-design-specialist
    primary_use: Normalize adversarial, edge-case, and rejection scenarios for MDM validation.
    request_contract: Provide scenario id, failure mode, risk level, expected behavior, and boundary rule.
    fallback: Run the local scenario suite and document explicit manual reviewer notes.
  - issue_ref: '#303'
    slug: readiness-and-evidence-specialist
    primary_use: Package readiness evidence against repository delivery contract fields.
    request_contract: Provide delivery status, human verification, deployment readiness, commercialization readiness, and
      readiness notes.
    fallback: Use local readiness evidence JSON and release review template.
  - issue_ref: '#304'
    slug: deployment-package-specialist
    primary_use: Expand rollout, rollback, monitoring, and operational notes.
    request_contract: Provide runtime profile, tenant isolation model, monitoring expectations, rollback path, and support
      model.
    fallback: Use repository deployment template with conservative tenant-isolation and rollback defaults.
  - issue_ref: '#305'
    slug: commercialization-and-packaging-specialist
    primary_use: Normalize packaging, positioning, subscription, and proof-point language.
    request_contract: Provide target buyer, core problem, subscription model, proof points, and go-to-market gaps.
    fallback: Use local buyer profile, proof points, and clearly stated assumptions.
  - issue_ref: '#306'
    slug: authority-source-policy-specialist
    primary_use: Review source refresh cadence and decay handling by source class.
    request_contract: Provide source categories, refresh policy, decay policy, stale threshold, and specialty exceptions.
    fallback: Apply fixed refresh intervals by source type and preserve review dates in the manifest.
  - issue_ref: '#307'
    slug: specialty-boundary-and-routing-specialist
    primary_use: Audit adjacency boundaries and orchestrator routing wording.
    request_contract: Provide specialty boundary, out-of-scope rules, adjacent specialists, and handoff targets.
    fallback: Keep explicit local boundary rules and route ambiguous work back to orchestrator.
  - issue_ref: '#308'
    slug: agent-package-scaffolding-specialist
    primary_use: Confirm package completeness and file-level contract compliance.
    request_contract: Provide domain slug, agent slug, required files, and target delivery level.
    fallback: Validate locally against repository scripts and required-file list.
  fallback_behavior:
    unavailable_or_stale: Operate in conservative specialist-owned baseline mode, mark assumptions and uncertainty explicitly,
      and request orchestrator re-sync before broadening claims.
    low_confidence: Escalate to orchestrator with evidence gaps, safe next steps, and refusal to guess on merge or stewardship
      decisions.
