shared_meta_agent_contracts:
  bootstrap_behavior:
    invocation_model: on-demand
    stale_policy: safe_degraded
    low_confidence_policy: escalate_to_orchestrator
  specialist_owned_responsibilities:
  - Define the narrow data governance specialty boundary and adjacency rejections.
  - Define specialty-specific glossary, classification, lineage, retention, stewardship, and evidence expectations.
  - Define bootstrap metadata and request or response contracts for delegated shared meta-agents.
  - Define fallback behavior when delegated outputs are unavailable, stale, conflicting, or low confidence.
  delegated_responsibilities:
  - Full best-practice corpus retrieval and normalization.
  - Repeated evaluation-suite scaffolding and threshold normalization.
  - Repeated readiness and evidence packaging.
  - Repeated deployment package boilerplate.
  - Repeated commercialization and packaging boilerplate.
  - Repeated authority-source policy normalization.
  - Repeated specialty-boundary normalization where centrally derivable.
  - Repeated package scaffolding boilerplate.
  contracts:
  - issue: '#225'
    agent: best-practices-curation-specialist
    owned_output:
    - governance best-practice delta suggestions
    - specialty-specific source exception candidates
    request_contract: Refresh normalized governance best-practice references when source decay triggers or a new platform
      family is introduced.
    fallback: Use the issue-local authoritative source baseline and flag any refresh debt for human review.
  - issue: '#302'
    agent: evaluation-design-specialist
    owned_output:
    - scenario additions
    - rubric normalization
    request_contract: Generate reusable governance scenario variants for new control classes while preserving the narrow specialty
      boundary.
    fallback: Execute the local 12-scenario suite manually with documented pass/fail rationale.
  - issue: '#303'
    agent: readiness-and-evidence-specialist
    owned_output:
    - readiness gate consistency check
    - evidence packaging review
    request_contract: Validate that readiness artifacts support a validated claim and that human verification is recorded.
    fallback: Repository implementer performs manual contract review and signs readiness evidence.
  - issue: '#304'
    agent: deployment-package-specialist
    owned_output:
    - deployment operations addendum
    - monitoring and rollback refinements
    request_contract: Provide reusable deployment and rollback notes that fit the specialist package type without widening
      scope.
    fallback: Use the local deployment package with conservative runtime, monitoring, and rollback defaults.
  - issue: '#305'
    agent: commercialization-and-packaging-specialist
    owned_output:
    - packaging model
    - proof point normalization
    request_contract: Validate target buyer, packaging, and subscription assumptions against the validated contract.
    fallback: Keep commercialization assumptions explicit and require product review before public sales claims expand.
  - issue: '#306'
    agent: authority-source-policy-specialist
    owned_output:
    - refresh policy validation
    - decay policy normalization
    request_contract: Review source categories, refresh intervals, and specialty-specific exceptions for stale or cross-domain
      citations.
    fallback: Default to review_required_after_interval and reduce confidence when a refresh window is exceeded.
  - issue: '#307'
    agent: specialty-boundary-and-routing-specialist
    owned_output:
    - adjacent specialty routing rules
    - boundary language refinement
    request_contract: Refine handoff phrasing for data quality, MDM, AI governance, legal/privacy, and infrastructure adjacency.
    fallback: Use the explicit local out-of-scope and orchestrator return rules.
  - issue: '#308'
    agent: agent-package-scaffolding-specialist
    owned_output:
    - template compliance check
    - artifact inventory verification
    request_contract: Verify required repository files and template alignment for this package.
    fallback: Use repository templates directly and rely on local validation scripts.
