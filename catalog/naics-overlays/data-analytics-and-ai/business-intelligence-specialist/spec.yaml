shared_meta_agent_contracts:
  bootstrap_metadata:
    package_slug: business-intelligence-specialist
    domain_slug: data-analytics-and-ai
    priority: high
    validation_profile: standard
    delegated_contracts:
      agent: best-practices-curation-specialist
      request_contract:
        request_type: authoritative_source_set
        required_fields:
        - source_id
        - title
        - publisher
        - location
        - authority_reason
        - last_reviewed_at
        response_contract:
          deliverable: priority-ranked authoritative source updates
      agent: evaluation-design-specialist
      request_contract:
        request_type: scenario_validation
        required_fields:
        - scenario_id
        - expected_behavior
        - risk_level
        - pass_criteria
        response_contract:
          deliverable: scenario set with failure-mode and out-of-scope coverage
      agent: readiness-and-evidence-specialist
      request_contract:
        request_type: evidence_packaging
        required_fields:
        - delivery_status
        - human_verification
        - deployment_readiness
        - commercialization_readiness
        response_contract:
          deliverable: human-verifiable readiness evidence draft
      agent: deployment-package-specialist
      request_contract:
        request_type: ops_runbook
        required_fields:
        - runtime_profile
        - isolation_model
        - monitoring_expectations
        - rollback_plan
        response_contract:
          deliverable: deployment and rollback notes
      agent: commercialization-and-packaging-specialist
      request_contract:
        request_type: commercial_readiness
        required_fields:
        - target_buyer
        - proof_points
        - subscription_model
        - positioning
        response_contract:
          deliverable: market readiness wording and commercialization proof points
      agent: authority-source-policy-specialist
      request_contract:
        request_type: source_policy
        required_fields:
        - refresh_policy
        - decay_rules
        - stale_thresholds
        response_contract:
          deliverable: authoritative-source policy recommendations
      agent: specialty-boundary-and-routing-specialist
      request_contract:
        request_type: boundary_review
        required_fields:
        - in_scope_rules
        - out_of_scope_rules
        - handoff_targets
        response_contract:
          deliverable: boundary conflict checks and routing map
      agent: agent-package-scaffolding-specialist
      request_type: scaffold_validation
      required_fields:
      - file_layout
      - required_artifacts
      - template_compliance
      response_contract:
        deliverable: package completion checklist
  fallback:
    stale_threshold_days: 30
    unresponsive_threshold_minutes: 15
    on_stale: Use cached authoritative sources in manifest baseline and mark recommendations as confidence-limited
    on_unresponsive: Return explicit escalation note to orchestrator with required fallback inputs and do not issue high-stakes
      recommendations
    on_low_confidence: Surface uncertainty with explicit assumptions and request owner/tenant approvals before execution guidance
