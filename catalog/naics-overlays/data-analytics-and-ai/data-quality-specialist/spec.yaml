  retrieval_policy:
    mode: deferred_shared_curation_with_local_minimum_baseline
    notes:
    - Initialize safely with the issue-local source baseline above.
    - 'Use shared meta-agent #225 and #306 for expanded corpus curation and policy normalization only when available.'
    - Do not block specialist startup on full shared-corpus retrieval.
  specialty_specific_exceptions:
  - Prefer sources that describe concrete data quality controls and validation behavior over broad warehouse architecture
    material.
  - Use governance or AI-risk sources only to support escalation and risk framing, not to widen the specialist into policy
    ownership.
