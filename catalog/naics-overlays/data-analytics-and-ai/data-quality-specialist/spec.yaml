shared_meta_agent_integration:
  required_agents:
  - issue_id: 225
    slug: best-practices-curation-specialist
    purpose: Curate reusable public data quality practice bundles and source additions.
    invocation_contract: Use only for expanding the reusable corpus; do not replace specialist-owned reasoning or widen the
      boundary.
    fallback_if_unavailable: Use the local source baseline and mark any broader best-practice request as limited to issue-local
      evidence.
  - issue_id: 302
    slug: evaluation-design-specialist
    purpose: Normalize scenario taxonomy and regression-coverage checks.
    invocation_contract: 'Use when extending scenario families; retain issue #100 minimum count, coverage classes, and quality-specific
      edge cases.'
    fallback_if_unavailable: Run the local scenario matrix manually and document pass/fail rationale in results.json.
  - issue_id: 303
    slug: readiness-and-evidence-specialist
    purpose: Check consistency between results, evidence, and release gates.
    invocation_contract: Use as a consistency review only; specialist-owned evidence and human verification remain local responsibilities.
    fallback_if_unavailable: Use the local readiness checklist and explicit evidence notes in release and readiness artifacts.
  - issue_id: 304
    slug: deployment-package-specialist
    purpose: Normalize runtime, rollback, isolation, and monitoring package structure.
    invocation_contract: Use for packaging consistency; keep data-quality-specific runtime constraints and fallback behavior
      local.
    fallback_if_unavailable: Ship the local deployment package with conservative rollback and monitoring requirements.
  - issue_id: 305
    slug: commercialization-and-packaging-specialist
    purpose: Review target buyer, packaging, and proof-point wording.
    invocation_contract: Use before external commercialization language changes; do not alter technical scope ownership.
    fallback_if_unavailable: Use local marketing notes and keep go-to-market assumptions explicit and non-committal.
  - issue_id: 306
    slug: authority-source-policy-specialist
    purpose: Normalize source review cadence, decay policy, and category coverage.
    invocation_contract: Use to review source policy consistency, not to replace the local minimum baseline needed for safe
      startup.
    fallback_if_unavailable: Retain the local source set and require manual refresh review on next release cycle.
  - issue_id: 307
    slug: specialty-boundary-and-routing-specialist
    purpose: Check adjacent-specialty routing and rejection phrasing.
    invocation_contract: Use to validate rejection language while preserving this manifest's narrow data-quality boundary.
    fallback_if_unavailable: Apply the local out-of-scope and orchestrator return rules unchanged.
  - issue_id: 308
    slug: agent-package-scaffolding-specialist
    purpose: Ensure repository package shape and file coverage remain aligned.
    invocation_contract: Use for scaffold-level checks and missing-artifact prevention.
    fallback_if_unavailable: Rely on repository validation scripts and local package completeness review.
  shared_fallback_contract:
    trigger_conditions:
    - shared meta-agent is unavailable
    - shared meta-agent result is stale
    - shared meta-agent output conflicts with the data-quality specialty boundary
    - shared meta-agent output is low-confidence or unsupported by authoritative sources
    behavior:
    - Proceed with specialist-owned baseline behavior using only the manifest source set and local artifact bundle.
    - State confidence limits and freshness limits explicitly in recommendations.
    - Escalate ambiguous or boundary-crossing requests to the orchestrator instead of guessing.
