meta_agent_contracts:
  authority_contract:
    source_pull:
      purpose: Retrieve additional best-practice corpus and normalization updates.
      inputs:
      - 'specialty: data engineering'
      - 'domain: data analytics and AI'
      - 'coverage: pipeline ops, quality, metadata, governance'
      outputs:
      - ranked authoritative source catalog
      - recency and deprecation flags
      - evidence quality notes
      fallback:
        policy: Use cached manifest sources and escalate if source freshness is stale.
        confidence_trigger: missing_or_stale_sources
  evaluation_contract:
    source_pull:
      purpose: Generate repeated evaluation scenario coverage and threshold normalization.
      inputs:
      - 'scenario class: normal, governance, failure, rejection, escalation'
      outputs:
      - pass/fail matrix
      - coverage risk summary
      fallback:
        policy: Use locally defined scenario list with explicit assumptions and mark human review required.
        confidence_trigger: no_shared_meta_agent_response
  readiness_contract:
    source_pull:
      purpose: Supply deployment/readiness/commercialization templates and sanity checks.
      inputs:
      - 'delivery status: validated'
      outputs:
      - release evidence checklist
      - packaging and commercialization readiness deltas
      fallback:
        policy: Use local deployment/readiness standards and keep commercialization claims minimal and auditable.
        confidence_trigger: stale_meta_contract
