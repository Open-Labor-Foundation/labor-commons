meta_agent_contracts:
  best_practices_curation:
    issue_reference: '#225'
    bootstrap_metadata:
      specialty: data integration
      domain: data-analytics-and-ai
      specialist_owned_delta: integration-specific connector, CDC, schema-mapping, runtime, and replay controls
    request_contract:
      inputs:
      - source system type and change pattern
      - destination analytics platform type
      - latency and recovery objectives
      outputs:
      - normalized best-practice summary
      - integration-specific risk flags
      - staleness metadata
    fallback:
      policy: Use the manifest authority baseline and specialty-specific notes only; escalate if a new pattern depends on
        uncited vendor guidance.
      confidence_trigger: shared guidance missing, stale, or contradictory
  evaluation_design:
    issue_reference: '#302'
    bootstrap_metadata:
      specialty: data integration
      required_coverage: normal guidance, governance, failure modes, evidence quality, out-of-scope rejection, low-confidence
        escalation
    request_contract:
      inputs:
      - specialist boundary
      - minimum scenario count
      - target delivery level
      outputs:
      - scenario catalog
      - coverage gaps
      - threshold normalization notes
    fallback:
      policy: Use the local scenario suite in this package and require human review before release.
      confidence_trigger: scenario gaps or no response
  readiness_and_evidence:
    issue_reference: '#303'
    bootstrap_metadata:
      specialty: data integration
      release_target: validated
    request_contract:
      inputs:
      - evaluation results
      - source baseline state
      - deployment and commercialization notes
      outputs:
      - readiness checklist
      - evidence consistency review
      - remaining release risks
    fallback:
      policy: Use local readiness evidence and keep approval notes conservative and auditable.
      confidence_trigger: inconsistent evidence or stale review
  deployment_package:
    issue_reference: '#304'
    bootstrap_metadata:
      specialty: data integration
      runtime_profile: orchestrator-hosted specialist bundle
    request_contract:
      inputs:
      - tenant adaptation policy
      - monitoring and logging requirements
      - rollback expectations
      outputs:
      - deployment notes delta
      - operational readiness checklist
    fallback:
      policy: Use repository deployment template plus specialist-specific isolation and failure-handling notes.
      confidence_trigger: missing deployment boilerplate
  commercialization_and_packaging:
    issue_reference: '#305'
    bootstrap_metadata:
      specialty: data integration
      buyer_motion: analytics/data-platform enablement
    request_contract:
      inputs:
      - target buyer and user profile
      - proof points
      - go-to-market assumptions
      outputs:
      - packaging notes
      - subscription model guidance
      - commercialization gaps
    fallback:
      policy: Keep packaging claims narrow to the validated artifact bundle and recorded proof points.
      confidence_trigger: unsupported market claims
  authority_source_policy:
    issue_reference: '#306'
    bootstrap_metadata:
      specialty: data integration
      source_policy: record categories, retrieval policy, and specialty exceptions without reproducing the full shared corpus
    request_contract:
      inputs:
      - required source categories
      - specialty exceptions
      - refresh expectations
      outputs:
      - source policy normalization
      - recency review guidance
      - deprecation risk flags
    fallback:
      policy: Use real authoritative sources listed in this manifest with explicit review cadence and decay policy.
      confidence_trigger: source freshness uncertain
  specialty_boundary_and_routing:
    issue_reference: '#307'
    bootstrap_metadata:
      specialty: data integration
      adjacency_risks: data engineering, data architecture, data warehousing, software integration engineering
    request_contract:
      inputs:
      - candidate task
      - neighbor specialties
      - confidence level
      outputs:
      - route decision
      - boundary rationale
      - rejection phrasing
    fallback:
      policy: Prefer rejection and orchestrator handoff when ownership is ambiguous.
      confidence_trigger: cross-specialty ambiguity
  agent_package_scaffolding:
    issue_reference: '#308'
    bootstrap_metadata:
      specialty: data integration
      package_root: catalog/data-analytics-and-ai/data-integration-specialist/
    request_contract:
      inputs:
      - template paths
      - required artifact list
      - target delivery level
      outputs:
      - scaffold completion checklist
      - required file map
      - template drift warnings
    fallback:
      policy: Use repository scaffolding command and fill the package locally.
      confidence_trigger: template drift or missing scaffold
