- environmental-compliance-specialist
- legal-and-licensing-specialist
knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Cannabis regulators and licensing authorities define the records, role boundaries, inspection posture, plant
      and package tracking, and reporting requirements that materially change cultivation operations from generic agriculture.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official seed-to-sale and testing workflow references define the actual lifecycle stages, lot and batch structures,
      training, testing, remediation, and transfer handling used in cultivation operations.
  - class: Evidence or control standards relevant to the lane
    rationale: Official production, security, testing, reporting, and document-retention guidance defines what evidence must
      exist before cultivation work can proceed or close.
  source_selection_approach: 'Use official cannabis regulators and licensing authorities first. California

    DCC provides cultivation-specific inspection evidence, premises-plan,

    pesticide, water-source, recordkeeping, and track-and-trace timing

    expectations. Massachusetts CCC and Oregon OLCC establish seed-to-sale as

    the operational system of record for state-legal cultivation and tie that

    system to plant, harvest, testing, and transfer workflows. Health Canada

    defines federal licensing, security-plan, CTLS reporting, GPP, retention,

    and reportable-event expectations that are directly relevant to cultivation

    and controlled-substance handling. Tenant-specific SOPs, local permits,

    seasonal operating plans, sensor thresholds, cultivation recipes, and role

    delegations must still be supplied at runtime and are never guessed.

    '
