  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the reviewed public source set above as the default baseline for cultivation-operations work.
    - Require tenant retrieval for jurisdiction-specific rules, local permits, SOPs, cultivation recipes, sensor thresholds,
      and internal authority maps before deterministic execution changes.
    - Escalate when state, provincial, territorial, or country-specific rules materially change tagging, testing, transfer,
      reporting, or destruction posture.
  specialty_specific_exceptions:
  - Do not treat one jurisdiction's track-and-trace timings or transport model as globally applicable.
  - Do not use public sources to approve tenant-specific pesticide use, water rights, security exceptions, product release,
    or legal compliance posture.
  - Require runtime retrieval for tenant-specific environmental controls, crop-steering logic, and site-specific security
    or inspection commitments.
  next_review_due_at: '2026-07-09'
