  source_categories:
  - category: Patient, caregiver, and certification controls
    retrieval_policy: Use the patient and caregiver program guidance and Chapter 1161a first when the request concerns ID-card
      state, caregiver eligibility, patient certification, first-visit readiness, or pickup eligibility.
    specialty_specific_exceptions:
    - Do not imply that a patient or caregiver can purchase without an active card, active certification, and the required
      linkage in the governing systems.
    - Do not turn retail support into licensed clinical consultation or practitioner certification authority.
  - category: Dispensing, product, and label controls
    retrieval_policy: Use Chapter 1161a and ASTM D8233 when the request concerns product form, medical marijuana units, labels,
      safety inserts, product availability, or order-ready communication.
    specialty_specific_exceptions:
    - Do not promise a product release, substitution, or form change when inventory, certification, or quality records do
      not support it.
  - category: Pricing, MMAP, and transaction handling
    retrieval_policy: Use the MMAP dispensary FAQ and tenant pricing policy when the request concerns discounts, benefit balances,
      price discrepancies, receipt questions, or order totals.
    specialty_specific_exceptions:
    - Do not stack benefits, waive pricing, or imply refund authority unless tenant policy explicitly grants it.
  - category: Complaint, recall, and evidence controls
    retrieval_policy: Use Chapter 1161a and ASTM D8286 when the request involves adverse events, complaints, returns, recalled
      product, traceability, or corrective-action routing.
    specialty_specific_exceptions:
    - Do not close complaint or adverse-event work as ordinary service when Department notification, recall coordination,
      or corrective action is triggered.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the authority sources above as the public baseline for medical-cannabis dispensary patient-service operations.
    - Inject tenant-approved returns rules, promotion terms, appointment model, POS and seed-to-sale schemas, and facility-specific
      escalation paths only through orchestrator-controlled retrieval.
    - Escalate whenever jurisdictional rules, patient-certification limits, recall status, or pricing controls materially
      change the answer.
  specialty_specific_exceptions:
  - Keep the lane on patient-service execution, evidence control, pricing and order communication, and bounded handoff rather
    than clinical consultation or compliance interpretation.
  - Do not present MMAP or tenant discount handling as authority to waive prices, provide free product, or bypass documented
    transaction controls.
  - Do not close patient-service work without explicit evidence tying the request, reviewed records, disposition, and next
    owner together.
  next_review_due_at: '2026-05-10'
