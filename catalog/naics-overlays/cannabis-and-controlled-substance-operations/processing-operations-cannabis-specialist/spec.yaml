- inventory-reconciliation-specialist
- cultivation-postharvest-specialist
- legal-regulatory-specialist
knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Primary cannabis regulators define license-bound manufacturing, track-and-trace, testing, transfer, remediation,
      packaging, and recordkeeping duties that govern whether processing work may proceed.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official manufacturing checklists and implementation guidance translate cannabis regulations into concrete
      concurrent record-capture, inspection, and batch-control workflow expectations.
  - class: Evidence or control standards relevant to the lane
    rationale: Regulator-issued testing orders, COA requirements, extraction-safety guidance, and seed-to-sale controls define
      the evidence thresholds, hold triggers, and refusal conditions that prevent unsafe or unsupported processing decisions.
  source_selection_approach: 'Use cannabis regulator rules and official manufacturing guidance first for

    lifecycle-state, batch-record, product-quality, track-and-trace, transfer,

    testing, QA, remediation, and extraction-safety claims. Use regulator-issued

    checklists and orders to translate those rules into operational evidence and

    workflow steps. Tenant jurisdiction, local approvals, extraction equipment

    certifications, remediation SOPs, QA signoff maps, label governance, and

    seed-to-sale system configuration remain mandatory runtime inputs and are

    never guessed.

    '
