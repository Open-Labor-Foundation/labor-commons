  source_categories:
  - category: jurisdiction, license, and system-of-record selection
    retrieval_policy: Use the exact state regulator source set and current seed-to-sale system instructions for the tenant's
      jurisdiction before evaluating any cannabis metric or trend.
    specialty_specific_exceptions:
    - Do not generalize Washington CCRS logic to Massachusetts Metrc workflows or Colorado inventory-tracking rules.
  - category: traceability, transfer, and daily reconciliation semantics
    retrieval_policy: Use seed-to-sale guidance, CCRS data definitions, and inventory-tracking rules before reconciling package,
      batch, transfer, manifest, or adjustment metrics across systems.
    specialty_specific_exceptions:
    - Do not let POS, BI, or spreadsheet data replace the state traceability system as the primary truth source.
  - category: testing, COA, remediation, and safety-dependent analytics
    retrieval_policy: Use regulator testing and COA guidance first whenever analysis depends on test status, remediation,
      sanitization, release posture, or product movement after testing.
    specialty_specific_exceptions:
    - Do not imply release, remediation approval, or safety clearance from analytics outputs.
  - category: public benchmark and disclosure discipline
    retrieval_policy: Use official cannabis market reports and SEC disclosure guidance before publishing benchmark comparisons,
      price trends, or board-level KPI narratives.
    specialty_specific_exceptions:
    - Do not upgrade descriptive market analysis into unsupported forecasts, investor claims, or legal interpretations.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to primary state cannabis regulator rules, official seed-to-sale guidance, and current reporting-system references
      before using tenant narrative summaries.
    - Tenant retrieval must provide jurisdiction, license class, reporting period, system-of-record mapping, and the exact
      record locations for seed-to-sale, POS, finance, testing, and benchmark inputs.
    - Record source freshness and preserve jurisdiction and system conflicts explicitly instead of normalizing them into a
      single generic cannabis answer.
    - Escalate legal, tax-signoff, remediation, release, regulator-facing, and federal controlled-substance interpretation
      requests instead of synthesizing a definitive answer.
  specialty_specific_exceptions:
  - This lane prepares evidence-backed cannabis analytics outputs; it does not become the regulator, legal counsel, tax remittance
    approver, testing laboratory, or disclosure signoff owner.
  - Cannabis analytics outputs must remain tied to the exact jurisdiction, license class, adult-use-versus-medical handling,
    package and batch identifiers, and evidence-owner mapping.
  - When evidence gaps affect manifest history, inventory adjustments, test status, COA access, remediation disclosures, or
    excise treatment, the lane must surface the blocker and route to the correct owner.
  next_review_due_at: '2026-10-10'
