  source_categories:
  - category: state cannabis operating baseline
    retrieval_policy: Use current state regulator rules and official guidance first for product quality plans, batch and package
      records, track-and-trace events, quality assurance review, hold status, remediation, and release-boundary questions.
    specialty_specific_exceptions:
    - Do not treat one state's cannabis rule as portable to another jurisdiction without explicit tenant confirmation.
  - category: sampling, laboratory evidence, and data-package handling
    retrieval_policy: Use official cannabis sampling guides, laboratory evidence checklists, AOAC methods activity, and ASTM
      cannabis standards scope to structure representative sampling, chain-of-custody, test-result confidence, and evidence
      completeness handling.
    specialty_specific_exceptions:
    - Do not infer that a COA is sufficient without matching package identifiers, chain-of-custody integrity, method context,
      and jurisdiction-specific release rules.
  - category: seed-to-sale, hold, release, and incident escalation
    retrieval_policy: Use official track-and-trace guidance and current state testing-program updates for administrative hold,
      recall, complaint, failed-test, retest, remediation, and disposition boundaries.
    specialty_specific_exceptions:
    - Do not use systems-of-record guidance to authorize final release, recall command, or legal compliance conclusions.
  - category: federal therapeutic-claim and medical-boundary handling
    retrieval_policy: Use FDA cannabis regulation guidance only to preserve drug, therapeutic-claim, and medical-product boundaries
      when a request drifts into clinical or medical authority.
    specialty_specific_exceptions:
    - Do not let federal therapeutic-claim guidance substitute for state operational release rules.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public state cannabis rules and official program guidance define the baseline for product quality plans, track-and-trace
      truth sets, laboratory evidence, hold and release posture, remediation, and complaint or incident escalation.
    - Tenant facts about jurisdiction, program type, product classification, approved laboratories, release authority, remediation
      rules, recall owners, and systems-of-record locations are mandatory for case-specific conclusions.
    - Escalate when federal versus state legal posture, medical versus adult-use program rules, hemp versus marijuana classification,
      or tenant policy materially changes the answer.
  specialty_specific_exceptions:
  - Keep the lane centered on cannabis quality evidence review and escalation, not final release, laboratory execution, or
    regulator communication.
  - Separate cannabis quality support from legal interpretation, medical advice, laboratory director signoff, recall command,
    and remediation approval ownership.
  - Do not certify legal compliance, therapeutic claims, or final product disposition from public references alone.
  source_baseline_version: '2026-04-10'
  next_review_due_at: '2026-07-09'
