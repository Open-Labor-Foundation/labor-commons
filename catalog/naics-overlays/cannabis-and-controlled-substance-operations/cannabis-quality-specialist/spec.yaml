knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Current state cannabis regulator rules and official program guidance define the batch, package, testing, remediation,
      hold, release, complaint, and reporting workflows that materially change this lane from generic quality support.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official cannabis sampling, data-package, and seed-to-sale workflow references define how representative sampling,
      chain of custody, COA review, remediation, retest windows, and administrative holds are actually handled.
  - class: Evidence or control standards relevant to the lane
    rationale: Cannabis-specific standards and method programs from ASTM and AOAC define analytical-method, proficiency-testing,
      and quality-system expectations that constrain laboratory evidence handling without replacing controlling law.
  source_selection_approach: 'Use current state cannabis regulator rules and official program guidance

    first for hold, release, batch, package, seed-to-sale, complaint,

    remediation, and laboratory evidence questions. Use official workflow

    references from cannabis regulators for representative sampling, chain-of-

    custody, data-package, failed-test, retest, and administrative-hold

    handling. Use ASTM and AOAC cannabis standards activity as recognized

    cannabis-specific control references for method suitability, terminology,

    and evidence quality, not as a substitute for controlling jurisdictional

    rules. Use FDA cannabis guidance only for federal therapeutic-claim and

    medical-product boundary handling. Tenant-specific jurisdiction, product

    classification, final release authority, remediation policy, approved

    laboratories, and systems-of-record locations must be supplied at runtime

    instead of guessed from the public baseline.

    '
