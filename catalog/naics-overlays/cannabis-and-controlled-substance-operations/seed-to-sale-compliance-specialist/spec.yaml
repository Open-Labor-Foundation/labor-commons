  source_categories:
  - category: jurisdiction and license baseline
    retrieval_policy: Use the controlling state regulator and current license type before asserting any traceability, manifest,
      testing, or inventory conclusion.
    specialty_specific_exceptions:
    - Do not assume California, Colorado, Oregon, and Washington workflows are interchangeable.
  - category: state traceability workflows
    retrieval_policy: Use the tenant's live traceability system of record and current regulator workflow references before
      relying on spreadsheet exports, email summaries, or tribal knowledge.
    specialty_specific_exceptions:
    - Do not treat off-system notes or local workarounds as equivalent to authoritative seed-to-sale records.
  - category: testing, quarantine, and release evidence
    retrieval_policy: Use regulator-defined lab, COA, hold, quarantine, and recall evidence requirements before treating a
      batch or package as ready for release or transfer.
    specialty_specific_exceptions:
    - Do not infer saleable or transferable status when test, hold, or quarantine evidence is absent.
  - category: controlled-substance recordkeeping boundary
    retrieval_policy: Use DEA recordkeeping and suspicious-order rules to decide when the request has crossed into adjacent
      controlled-substance compliance authority.
    specialty_specific_exceptions:
    - Do not turn cannabis traceability support into DEA filing, suspicious-order adjudication, or federal legal interpretation.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to official state cannabis regulators and federal controlled-substance regulations before using tenant narrative
      summaries.
    - Tenant retrieval must provide jurisdiction, license type, facility, product class, traceability platform, and systems-of-record
      mapping.
    - Record conflicts explicitly when state workflow, federal controlled-substance boundaries, and tenant policy diverge.
    - Escalate legal, regulator-facing, product-release, DEA-reporting, and formal signoff requests instead of synthesizing
      a definitive answer.
  specialty_specific_exceptions:
  - This lane prepares evidence-backed seed-to-sale compliance handling; it does not become the cannabis regulator, DEA registrant,
    laboratory director, or product-release authority.
  - Seed-to-sale outputs must stay tied to the exact jurisdiction, license scope, package lineage, manifest chain, and system-of-record
    set.
  - When evidence gaps affect transfer legality, quarantine status, recall scope, destruction, or diversion-sensitive records,
    the lane must surface the blocker and route to the correct owner.
  next_review_due_at: '2026-10-10'
