- transport-and-distribution-specialist
- waste-and-destruction-specialist
- legal-or-regulatory-counsel
knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official state cannabis regulators define manifest, transfer, package-tag, inspection, and track-and-trace
      obligations that materially change inventory handling from generic supply work.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official DEA workflow-system references such as CSOS, ARCOS, SORS, and theft or loss reporting define the actual
      record flows and escalation systems used in controlled-substance operations.
  - class: Evidence or control standards relevant to the lane
    rationale: DEA inventory, records, suspicious-order, and reporting rules define the minimum evidence, recordkeeping, and
      refusal conditions the lane must respect.
  source_selection_approach: 'Use state cannabis regulator sources for the public baseline on track-and-

    trace, package-tagged inventory, manifest handling, inspection posture, and

    transfer prerequisites. Use DEA and eCFR sources for controlled-substance

    inventory counts, ongoing recordkeeping, ordering controls, suspicious-

    order handling, and theft or loss escalation. Treat jurisdiction-specific

    cannabis rules, registrant-class differences, quota posture, tenant

    approval maps, and licensed-signatory requirements as runtime-retrieved

    overlays rather than guessed assumptions.

    '
