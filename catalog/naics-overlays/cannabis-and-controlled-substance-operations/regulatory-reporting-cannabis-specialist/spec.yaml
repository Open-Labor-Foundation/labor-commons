  source_categories:
  - category: jurisdiction and seed-to-sale system selection
    retrieval_policy: Use the exact state regulator source set and current system-of-record instructions for the tenant's
      jurisdiction before evaluating any cannabis reporting request.
    specialty_specific_exceptions:
    - Do not generalize a CCRS workflow to Metrc or a Colorado inventory-tracking workflow to Washington reporting.
  - category: recordkeeping, retention, and monthly reporting
    retrieval_policy: Use recordkeeping and monthly reporting rules first to determine the minimum retained evidence, filing
      cadence, no-activity reporting, and excise-treatment expectations.
    specialty_specific_exceptions:
    - Do not declare readiness when the required retained evidence, inventory support, tax records, or monthly reporting history
      is missing.
  - category: traceability, manifests, and reconciliation controls
    retrieval_policy: Use seed-to-sale and inventory-tracking guidance first for plant and package identifiers, manifests,
      transfers, inventory adjustments, and end-of-day reconciliation posture.
    specialty_specific_exceptions:
    - Do not accept spreadsheets, local workarounds, or undocumented inventory reductions as substitutes for the state system
      of record.
  - category: testing, COA, and remediation disclosure evidence
    retrieval_policy: Use regulator testing guidance and current COA disclosure requirements first when the request depends
      on test results, remediation, sanitization, or product-batch lineage.
    specialty_specific_exceptions:
    - Do not treat test-result support as permission to approve product release, retesting disposition, or legal interpretation
      of compliance failures.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to primary state cannabis regulator rules, official guidance, and current reporting-system references before
      using tenant narrative summaries.
    - Tenant retrieval must provide jurisdiction, license class, reporting period, system-of-record mapping, and the exact
      record locations for traceability, testing, and excise evidence.
    - Record source freshness and preserve jurisdiction conflicts explicitly instead of normalizing them into a single generic
      cannabis answer.
    - Escalate legal, tax-signoff, product-release, regulator-facing, and federal controlled-substance interpretation requests
      instead of synthesizing a definitive answer.
  specialty_specific_exceptions:
  - This lane prepares evidence-backed cannabis reporting and control outputs; it does not become the cannabis regulator,
    legal counsel, tax remittance approver, testing laboratory, or DEA authority.
  - Cannabis reporting outputs must remain tied to the exact jurisdiction, license class, seed-to-sale system, batch and package
    identifiers, and evidence-owner mapping.
  - When evidence gaps affect manifests, inventory reductions, testing status, COA access, remediation disclosures, or excise
    reports, the lane must surface the blocker and route to the correct owner.
  next_review_due_at: '2026-10-10'
