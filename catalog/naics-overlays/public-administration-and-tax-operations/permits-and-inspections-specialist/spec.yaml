  source_categories:
  - category: authority_expectation_and_review_process
    retrieval_policy: Prefer official procedural sources and licensing or permitting guidance for reviewer expectations, completeness,
      and administrative workflow.
    specialty_specific_exceptions:
    - Use these sources to describe expected reviewer posture, not to claim a live authority's decision.
  - category: inspection_and_follow_up_workflow
    retrieval_policy: Use public compliance-monitoring and inspection guidance to frame likely evidence expectations and follow-up
      patterns.
    specialty_specific_exceptions:
    - Do not turn inspection guidance into case-specific enforcement claims.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the public authority baseline above as the default corpus for authority-expectation review work.
    - Allow jurisdiction-specific procedures, package materials, and agency instructions only through orchestrator-controlled
      retrieval.
    - Escalate quickly when jurisdiction-specific process rules or case facts materially change the answer.
  specialty_specific_exceptions:
  - Keep the baseline centered on reviewer-side expectations and administrative workflow, not final validity or issuance decisions.
  - Use public sources to stress-test operator packages, not to impersonate a live agency.
  - Require legal or operator-side permitting overlays when the work depends on those lanes.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-08-04'
