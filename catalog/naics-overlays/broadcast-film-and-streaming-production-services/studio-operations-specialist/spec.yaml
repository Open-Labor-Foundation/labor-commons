knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Guild, union, and official production authorities define the records, staffing documents, performer paperwork,
      and permit dependencies that materially change studio-operations work.
  - class: Recognized workflow references tied directly to the lane
    rationale: Recognized production workflow references define how call-sheet, venue, permit, safety, and schedule handling
      must operate in real broadcast, film, and streaming environments.
  - class: Evidence or control standards relevant to the lane
    rationale: Recognized control standards define the soundstage, production-location, safety, and protected-participant
      evidence that must exist before work can advance or close.
  source_selection_approach: 'Use SAG-AFTRA, DGA, California Film Commission, California labor, CSATF,

    and NFPA public sources first to anchor the baseline for performer

    paperwork, labor-facing recordkeeping, venue and permit readiness,

    production safety, and soundstage controls. Treat tenant-specific call

    sheet templates, stage-booking systems, release templates, deal terms,

    local film-office requirements, payroll cutoffs, audience policies, and

    rights matrices as runtime retrieval dependencies that narrow but do not

    replace the public baseline.

    '
  authority_sources:
  - source_id: sagaftra-producer-portal
    title: Producer Portal
    publisher: SAG-AFTRA
    source_type: named-industry-operating-guidance
    location: https://www.sagaftra.org/producer-portal
    authority_reason: SAG-AFTRA's official producer portal is an authoritative guild source for production-facing paperwork,
      signatory obligations, and performer-document workflow references used by studio operations teams.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: sagaftra-exhibit-g
    title: Production Time Report (Exhibit G)
    publisher: SAG-AFTRA
    source_type: named-industry-operating-guidance
    location: https://www.sagaftra.org/files/production_time_report_fillable.pdf
    authority_reason: The official SAG-AFTRA Exhibit G form is an authoritative industry artifact for documenting performer
      work time, meal periods, overtime, and production-day evidence that studio operations cannot ignore at closeout.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: dga-reports-compliance
    title: Reports Compliance
    publisher: Directors Guild of America
    source_type: named-industry-operating-guidance
    location: https://www.dga.org/The-Guild/Departments/Reports-Compliance
    authority_reason: The DGA's official reports-compliance department page is authoritative for contractually required production
      documents such as deal memos, post-production addenda, employment data reports, and weekly work lists that shape studio
      staffing and documentation flow.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: cfc-locations
    title: Locations
    publisher: California Film Commission
    source_type: recognized-workflow-reference
    location: https://film.ca.gov/locations/
    authority_reason: The California Film Commission is an official state production authority, and its locations guidance
      is a recognized workflow reference for studio zones, permit pathways, insurance requirements, and state-facility filming
      dependencies.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cfc-permit-faq
    title: Permit FAQ
    publisher: California Film Commission
    source_type: recognized-workflow-reference
    location: https://film.ca.gov/state-permits/permit-faq/
    authority_reason: The California Film Commission's permit FAQ is an official workflow reference for who needs a permit,
      insurance, film-monitor costs, and special-effects permitting on state property.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cfc-safety
    title: Safety in Motion Picture Productions
    publisher: California Film Commission
    source_type: recognized-workflow-reference
    location: https://film.ca.gov/safety-in-motion-picture-productions/
    authority_reason: The California Film Commission's safety page is an official workflow reference for safety-advisor programs,
      risk assessments, and final safety evaluation reporting tied directly to production execution.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: csatf-safety-bulletins
    title: Safety Bulletins
    publisher: Contract Services Administration Trust Fund
    source_type: evidence-or-control-standard
    location: https://www.csatf.org/production-affairs-safety/safety-bulletins/
    authority_reason: CSATF safety bulletins are recognized industry control references for motion picture and television
      productions and explicitly govern bulletin distribution, call-sheet attachment, and special procedures such as minors
      performing physical activities.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: nfpa-140
    title: NFPA 140 Standard Development
    publisher: National Fire Protection Association
    source_type: evidence-or-control-standard
    location: https://www.nfpa.org/codes-and-standards/nfpa-140-standard-development/140
    authority_reason: NFPA 140 is the recognized soundstage and production-location fire-safety standard for motion picture
      and television production facilities, providing the public control baseline for studio and stage safety boundaries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: california-dlse-minor-permits
    title: Entertainment Work Permit for Minors
    publisher: California Department of Industrial Relations, Division of Labor Standards Enforcement
    source_type: evidence-or-control-standard
    location: https://www.dir.ca.gov/dlse/Entertainment-Work-Permit.htm
    authority_reason: California DLSE is the official labor authority for entertainment work permits for minors, which materially
      changes whether studio operations may proceed with youth performers or participants.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: stage, venue, and permit readiness
    retrieval_policy: Use California Film Commission location and permit guidance first when a request depends on stage access,
      state-property filming, insurance, monitors, drone use, or other venue-impact conditions.
    specialty_specific_exceptions:
    - Do not treat a booked stage or venue as ready when permit, insurance, facility, or monitor dependencies remain unresolved.
  - category: performer, staffing, and labor-facing records
    retrieval_policy: Use SAG-AFTRA Exhibit G, the SAG-AFTRA producer baseline, and DGA reports-compliance references first
      when validating performer work records, deal paperwork, weekly work documentation, and closeout evidence.
    specialty_specific_exceptions:
    - Do not close talent-support work without the time-report, deal, roster, or staffing artifacts required by the governing
      production setup.
  - category: soundstage and production safety controls
    retrieval_policy: Use California Film Commission safety guidance, CSATF safety bulletins, and NFPA 140 first when work
      involves soundstage operations, safety bulletins, physical activity, special risk conditions, or final safety evaluation
      needs.
    specialty_specific_exceptions:
    - Do not treat call-sheet attachment of a safety bulletin as equivalent to safety signoff or engineering approval when
      higher-risk work is involved.
  - category: minor-performer and protected-participant handling
    retrieval_policy: Use California labor guidance and the relevant CSATF safety materials before allowing minors or protected
      participants to proceed in physical or production-sensitive scenarios.
    specialty_specific_exceptions:
    - Do not let an audience or talent workflow proceed when required minor-work-permit or supervised-schooling evidence is
      missing.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant-approved call-sheet templates, stage-booking calendars, local permit matrices, release templates, labor-agreement
      extracts, audience policies, payroll deadlines, and rights-clearance routing only through orchestrator-controlled retrieval.
    - Require production id, shoot date, stage or venue id, current lifecycle state, owning unit, and the controlling permit
      or labor context before applying public baseline guidance to a specific request.
    - Record unresolved ambiguity instead of guessing when union, venue, permit, or safety rules materially change the next
      action.
  specialty_specific_exceptions:
  - Keep the lane focused on studio execution, schedule and readiness validation, evidence-backed completion, and escalation
    packaging rather than general production management.
  - Separate studio operations from legal rights clearance, payroll approval, labor interpretation, engineering, special-effects
    approval, and fire-life-safety signoff.
  - Do not imply completion solely because one coordinator note says the work is done if the call sheet, stage booking, permit,
    release, time-report, or wrap record materially conflicts.
  next_review_due_at: '2026-08-08'
