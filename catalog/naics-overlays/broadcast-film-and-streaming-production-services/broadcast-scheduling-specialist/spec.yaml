    authority_reason: The FCC is the authoritative U.S. broadcast regulator. The EAS TV Handbook defines required operational
      steps and test-handling behavior that scheduling cannot ignore when booking linear broadcast time.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
