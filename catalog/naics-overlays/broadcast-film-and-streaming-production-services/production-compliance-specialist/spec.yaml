  source_categories:
  - category: permit and jurisdiction baseline
    retrieval_policy: Use the controlling film office, permit portal, and area requirements for the shoot location before
      asserting that production activity can proceed.
    specialty_specific_exceptions:
    - Do not assume Los Angeles timing, insurance, or posting rules generalize to every municipality or country.
  - category: signatory and labor workpaper controls
    retrieval_policy: Use SAG-AFTRA and DGA signatory, deal-memo, production-center, and reports-compliance sources before
      treating cast or crew paperwork as complete.
    specialty_specific_exceptions:
    - Do not treat internal staffing readiness as proof that guild or union clearance, security deposit return, or payroll
      workpapers are complete.
  - category: set safety and special-activity controls
    retrieval_policy: Use OSHA baseline controls, CSATF safety bulletins, and jurisdiction-specific permit conditions before
      treating stunt, firearms, drone, vehicle, water, or special-effects work as ready.
    specialty_specific_exceptions:
    - Do not convert safety bulletin review into licensed stunt, fire-safety, aviation, or special-effects signoff.
  - category: content security and pre-release asset handling
    retrieval_policy: Use TPN and studio or streamer security requirements before treating dailies, screeners, cloud collaboration,
      or vendor access as compliant.
    specialty_specific_exceptions:
    - Do not certify a vendor or platform as secure simply because a questionnaire exists without required assessment status
      or remediation evidence.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to official film-office, guild or union, OSHA, and TPN sources before using tenant narrative summaries.
    - Tenant retrieval must provide jurisdiction, production type, union and guild coverage, special-activity profile, client-security
      requirements, and systems-of-record mapping.
    - Record conflicts explicitly when permit conditions, union documents, studio security addenda, and tenant operating practice
      diverge.
    - Escalate legal, labor-interpretation, rights-clearance, broadcaster-standards, regulator-facing, safety-signoff, and
      formal security-certification requests instead of synthesizing a definitive answer.
  specialty_specific_exceptions:
  - This lane prepares evidence-backed production compliance handling; it does not become the permitting authority, guild
    signatory department, labor counsel, unit production manager, stunt coordinator, or TPN assessor.
  - Production-compliance outputs must stay tied to the exact jurisdiction, production type, union agreement, special activity,
    and content-security requirement set.
  - When evidence gaps affect permit release, signatory readiness, safety distribution, special-activity approval, or vendor-security
    posture, the lane must surface the blocker and route to the correct owner.
  next_review_due_at: '2026-10-10'
