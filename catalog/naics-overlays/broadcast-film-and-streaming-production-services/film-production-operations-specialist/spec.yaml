knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: DGA and SAG-AFTRA public production guidance defines the named records, labor checkpoints, signatory prerequisites,
      and role boundaries that make film production operations materially different from generic execution work.
  - class: Recognized workflow references tied directly to the lane
    rationale: Film-office permit guidance and Contract Services workflow references translate industry practice into concrete
      prerequisite checks, application timing, notification, and report-handling expectations.
  - class: Evidence or control standards relevant to the lane
    rationale: Contract Services safety and training controls plus state permit and insurance requirements define the evidence
      thresholds, safety escalations, and refusal triggers that prevent unsupported on-set progression.
  source_selection_approach: 'Use DGA and SAG-AFTRA sources first for role boundaries, call-sheet and

    performer-paperwork expectations, schedule and stunt consultation limits,

    and signatory workflow. Use California Film Commission and FilmLA guidance

    for permit, insurance, notice, and special-activity prerequisites. Use

    Contract Services safety and compliance sources for training proof, roster

    posture, and safety-bulletin handling. Tenant-specific production trackers,

    call-sheet tools, payroll systems, location contracts, streamer or studio

    rules, and local jurisdiction overlays remain mandatory runtime inputs and

    are never guessed.

    '
