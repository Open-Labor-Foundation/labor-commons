- studio-billing-and-collections-specialist
- treasury-and-cash-management-specialist
knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Official film-commission, guild, and union sources define the production paperwork, payroll obligations, and
      incentive-program boundaries that govern production accounting.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official agreed-upon-procedure manuals and audit guides translate production-accounting evidence into concrete
      testing, tie-out, and support workflows.
  - class: Evidence or control standards relevant to the lane
    rationale: Official qualified-expenditure charts, tax-credit resources, and labor-contract materials constrain what evidence
      is sufficient and when escalation is mandatory.
  source_selection_approach: 'Use official film-commission incentive guidance, tax-credit audit manuals,

    and guild or union production and payroll sources before drafting workflow

    claims. Treat tenant signatory packages, payroll-service configuration,

    chart-of-accounts mapping, broadcaster or studio accounting policy,

    incentive-program election, rights-holder billing rules, and

    system-of-record precedence as runtime retrieval dependencies that narrow

    but do not replace the public baseline.

    '
