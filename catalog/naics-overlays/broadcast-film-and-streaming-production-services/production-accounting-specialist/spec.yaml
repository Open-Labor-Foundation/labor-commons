  source_categories:
  - category: production-incentive-and-qualified-spend-baseline
    retrieval_policy: Use California and Georgia film-credit program guidance before classifying spend, assembling cost-report
      support, or treating a cost as credit-eligible.
    specialty_specific_exceptions:
    - Do not guess whether a spend item is qualified, allocable, or claimable when the governing incentive program, production
      type, or location support is missing.
  - category: guild-and-union-payroll-obligations
    retrieval_policy: Use SAG-AFTRA, DGA, and IATSE or AMPTP materials before treating cast or crew labor costs, fringes,
      time reports, meal penalties, or start paperwork as supportable.
    specialty_specific_exceptions:
    - Do not interpret unresolved labor-contract disputes; escalate to labor-relations or payroll-tax owners when contract
      application is contested.
  - category: production-accounting-audit-workflow
    retrieval_policy: Use official agreed-upon procedures and audit manuals before concluding that timecards, DPRs, call sheets,
      invoices, petty cash, payroll, or bank support are sufficient.
    specialty_specific_exceptions:
    - Do not treat a cost report as fully supportable when the underlying paperwork is incomplete, unsigned, unreconciled,
      or cannot be tied to the ledger.
  - category: credit-claim-and-closeout-boundaries
    retrieval_policy: Use film-commission and tax-agency sources before advising on final filing posture, credit claim support,
      or closeout timing.
    specialty_specific_exceptions:
    - Do not certify a credit claim, tax return, or controller close package; prepare evidence-backed support and escalate
      certification to authorized owners.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant signatory packages, payroll-service configuration, chart-of-accounts maps, broadcaster or studio policy,
      rights-holder billing rules, and incentive-program elections only through orchestrator-controlled retrieval.
    - Require production type, jurisdiction, signatory status, reporting purpose, and system-of-record ownership before applying
      public guidance to a specific case.
    - Record unresolved ambiguity instead of guessing when broadcast, feature, episodic, live, remote, or streamer-specific
      rules materially change the answer.
  specialty_specific_exceptions:
  - Keep the lane focused on production-accounting evidence handling, posting readiness, reconciliation, and escalation packaging
    rather than generic accounting close or payroll administration.
  - Separate operational production-accounting work from payroll-tax, legal, labor-relations, controller, residuals, and incentive-certification
    authority.
  - Do not imply a cost is supportable solely because it appears in one budget, payroll, or ledger system if the source paperwork
    or signatory support materially conflicts.
  next_review_due_at: '2026-08-08'
