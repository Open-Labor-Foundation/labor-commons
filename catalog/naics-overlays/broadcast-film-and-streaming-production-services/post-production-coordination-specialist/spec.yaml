- media-qc-and-compliance-specialist
- legal-and-rights-clearance-specialist
knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Named-industry operating guidance
    rationale: DPP and FCC sources define broadcaster and distributor delivery expectations, post-production acceptance criteria,
      and caption carriage responsibilities that materially change this lane from generic coordination.
  - class: Recognized workflow references tied directly to the lane
    rationale: AAF, AS-11, IMF, SMPTE-TT, and IMSC references define the concrete interchange, mastering, timed-text, and
      versioning records used in post handoffs.
  - class: Evidence or control standards relevant to the lane
    rationale: FCC caption quality rules and ATSC loudness guidance define blocker thresholds and refusal triggers that a
      post coordinator must preserve rather than overrule.
  source_selection_approach: 'Use DPP guidance and AMWA or SMPTE standards first for public post

    workflow, turnover, mastering, versioning, and delivery terminology. Use

    FCC rules and orders for caption-carriage and caption-quality boundaries in

    U.S. broadcast and IP-delivered programming. Use ATSC A/85 for audio

    loudness control expectations in television delivery. Require tenant

    retrieval for exact platform specifications, destination metadata schemas,

    facility toolchain choices, approval chains, rights constraints, and any

    territorial compliance overlays.

    '
  authority_sources:
  - source_id: aaf-association-specs
    title: AAF Technical Information and Specification Library
    publisher: Advanced Authoring Format Association
    source_type: recognized-format-specification
    location: https://www.aafassociation.org/specs.html
    authority_reason: The AAF Association is the originating standards body for AAF and its specification library is authoritative
      for editorial interchange artifacts used in post turnovers.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: amwa-specifications
    title: AMWA Specifications
    publisher: Advanced Media Workflow Association
    source_type: recognized-workflow-specification
    location: https://specs.amwa.tv/specs/
    authority_reason: AMWA is a recognized media-workflow standards body and its specifications page explicitly positions
      AS-11 as the delivery specification family for finished media files.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: dpp-specs-and-guidance
    title: Specifications & Guidance
    publisher: Digital Production Partnership
    source_type: recognized-industry-guidance
    location: https://www.thedpp.com/specs/imf
    authority_reason: The DPP is a recognized media-industry operating body whose public guidance names air-ready masters,
      broadcaster delivery requirements, IMF versioning, metadata exchange, and post-production best practices.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: smpte-st-2067
    title: SMPTE ST 2067 — Interoperable Master Format (IMF)
    publisher: Society of Motion Picture and Television Engineers
    source_type: recognized-mastering-standard
    location: https://www.smpte.org/standards/st2067
    authority_reason: SMPTE is the primary standards body for professional motion-imaging engineering, and ST 2067 defines
      the IMF framework, CPL, OPL, track files, and postproduction exchange structures used for versioned masters.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: smpte-st-2052-1
    title: SMPTE ST 2052-1:2010
    publisher: Society of Motion Picture and Television Engineers
    source_type: recognized-timed-text-standard
    location: https://pub.smpte.org/doc/st2052-1/20101203-pub/st2052-1-2010.pdf
    authority_reason: SMPTE ST 2052-1 is an authoritative timed-text standard for captions and subtitles associated with a
      media asset, making it directly relevant to caption handoff evidence.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: w3c-imsc-1-1
    title: TTML Profiles for Internet Media Subtitles and Captions 1.1
    publisher: World Wide Web Consortium
    source_type: web-standard
    location: https://www.w3.org/TR/ttml-imsc1.1/
    authority_reason: W3C is the standards body for TTML and IMSC 1.1 is the authoritative Recommendation for interoperable
      subtitle and caption delivery applications worldwide.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: fcc-caption-quality-order
    title: FCC Moves to Upgrade TV Closed Captioning Quality
    publisher: Federal Communications Commission
    source_type: regulatory-order-summary
    location: https://docs.fcc.gov/public/attachments/DOC-325695A1.pdf
    authority_reason: The FCC is the U.S. regulator for broadcast and video accessibility obligations, and this order summary
      defines quality standards for accuracy, synchronicity, completeness, and placement that materially constrain post handoffs.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: fcc-ip-captioning-order
    title: Closed Captioning of Internet Protocol-Delivered Video Programming
    publisher: Federal Communications Commission
    source_type: regulatory-order
    location: https://docs.fcc.gov/public/attachments/FCC-12-9A1.pdf
    authority_reason: This FCC order is authoritative for IP-delivered caption file carriage and the requirement that providers
      and distributors agree on a mechanism identifying which programming must carry captions.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: fcc-captioning-responsibility-order
    title: FCC 16-17 Closed Captioning Responsibilities
    publisher: Federal Communications Commission
    source_type: regulatory-order
    location: https://docs.fcc.gov/public/attachments/FCC-16-17A1.pdf
    authority_reason: This FCC order allocates caption responsibilities across programmers and distributors and is authoritative
      for ownership and pass-through boundaries in delivery workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: atsc-a85
    title: A/85, Techniques for Establishing and Maintaining Audio Loudness for Digital Television
    publisher: Advanced Television Systems Committee
    source_type: recognized-broadcast-standard
    location: https://www.atsc.org/atsc-documents/a85-techniques-for-establishing-and-maintaining-audio-loudness-for-digital-television/
    authority_reason: ATSC is the recognized standards body for digital television in the U.S., and A/85 provides authoritative
      loudness-control guidance for production, distribution, and postproduction monitoring.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline for turnover, timed text, loudness, caption carriage, and destination delivery expectations,
      but tenant destination specs remain required.
    - Escalate when a broadcaster, platform, or distributor specification materially changes the artifact set, timing, or
      acceptance criteria.
    - Never infer creative signoff, accessibility certification, or platform acceptance from public baseline standards alone.
  specialty_specific_exceptions:
  - Exact destination deliverables vary by commissioning broadcaster, streamer, territory, and title type, even when AS-11
    or IMF norms exist.
  - Facility toolchains differ across NLEs, asset managers, QC tools, caption vendors, and delivery portals; the lane requires
    tenant system mapping rather than product-name assumptions.
  - Accessibility, loudness, and metadata obligations can differ across jurisdictions and distribution channels, so tenant
    or destination rules must be retrieved when they change the answer.
  next_review_due_at: '2026-10-07'
