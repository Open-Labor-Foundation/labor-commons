  source_categories:
  - category: Performer onboarding and union-document readiness
    retrieval_policy: Use SAG-AFTRA theatrical and television producer guidance first when the request concerns performer
      clearance, contracts, Exhibit G or time reports, Taft-Hartley status, final cast lists, or day-out-of-days evidence.
    specialty_specific_exceptions:
    - Do not confirm a performer is cleared to work unless the deal memo or contract state, required guild documentation,
      and tenant onboarding records agree.
    - Do not generalize one SAG-AFTRA agreement or production type across all budget tiers, media types, or jurisdictions
      without tenant agreement context.
  - category: Schedule, travel, lodging, and turnaround support
    retrieval_policy: Use SAG-AFTRA rest-period and per-diem guidance first when the request concerns turnaround, overnight
      locations, travel support, per diem, pickup times, or forced-call pressure.
    specialty_specific_exceptions:
    - Do not promise forced-call acceptance, shortened turnaround, or travel reimbursement exceptions without the approved
      owner and exact agreement context.
  - category: Minor performer readiness and welfare
    retrieval_policy: Use California entertainment-work-permit, child performer services permit, studio teacher, and CSATF
      minors guidance first when the request touches child performers, studio teachers, permits, school attendance, welfare,
      or on-set supervision.
    specialty_specific_exceptions:
    - Do not schedule or clear a minor performer when permit, studio teacher, or welfare controls are missing or ambiguous.
  - category: Representation, rights, and immigration boundaries
    retrieval_policy: Use California talent-agency licensing guidance and AMPTP work-visa guidance first when the request
      touches representation, employment procurement, O-1 or O-2 support, or international travel readiness.
    specialty_specific_exceptions:
    - Do not negotiate employment, advise on visa legality, or treat rights and publicity changes as ordinary hospitality
      work.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the authority sources above as the public baseline for broadcast, film, and streaming talent-services operations.
    - Inject tenant-approved contract terms, production-type rules, cast grids, travel desks, security workflows, venue maps,
      and rights approval paths only through orchestrator-controlled retrieval.
    - Escalate whenever union terms, labor rules, location policy, rights approvals, immigration posture, or child-performer
      controls materially change the answer.
  specialty_specific_exceptions:
  - Keep the lane on talent-services execution, readiness verification, and bounded communication rather than casting selection,
    business-affairs negotiation, payroll disposition, or legal interpretation.
  - Do not present travel or call-time servicing as authority to waive work rules, approve spend, clear rights, or override
    minor or visa prerequisites.
  - Do not close talent-services work without explicit evidence tying the request, reviewed records, disposition, and next
    owner together.
  next_review_due_at: '2026-10-07'
