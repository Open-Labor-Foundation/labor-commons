knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Guild production guidance and entertainment-labor authorities define the records, work rules, and permission
      boundaries that materially change talent-services workflows in screen production.
  - class: Recognized workflow references tied directly to the lane
    rationale: Industry operating references tied to performer travel, visa support, call-time readiness, and on-set safety
      define the workflow stages and escalation posture for talent services.
  - class: Evidence or control standards relevant to the lane
    rationale: Child-performer, rights, safety, and documentation controls define the artifacts and refusal triggers needed
      before the lane can confirm readiness or communicate next steps.
  source_selection_approach: 'Use SAG-AFTRA production guidance first to anchor performer onboarding,

    daily work paperwork, time-reporting, and cast-list evidence. Use

    California labor and entertainment-employment guidance to constrain minor

    performer handling and the boundary between production talent services and

    licensed talent-agency activity. Use AMPTP work-visa guidance and CSATF

    safety guidance to shape international-talent and safety-sensitive routing.

    Require tenant retrieval for the exact agreement, budget tier, production

    type, travel desk process, security workflow, rights approval path, and

    venue rules because those factors materially change what the lane may

    confirm or escalate.

    '
