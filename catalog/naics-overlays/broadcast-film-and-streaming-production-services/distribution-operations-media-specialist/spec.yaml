knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Named-industry operating guidance
    rationale: AMWA and MovieLabs define the public media-delivery package, ordering, inventory, status, and platform-delivery
      vocabulary that materially changes this lane.
  - class: Recognized workflow references tied directly to the lane
    rationale: MovieLabs MDC, EIDR, and SMPTE IMF guidance define how title versions, language variants, and deliverable packages
      should be tracked across content-supply workflows.
  - class: Evidence or control standards relevant to the lane
    rationale: MovieLabs QC vocabulary, SMPTE timed-text guidance, and FCC captioning obligations define quality, accessibility,
      and pass-through evidence that cannot be ignored at fulfillment closeout.
  source_selection_approach: 'Use AMWA AS-11, MovieLabs MDDF, EIDR, SMPTE IMF, and FCC or SMPTE

    accessibility guidance first to anchor title-version identification,

    asset-ordering and status messages, package structure, localization and

    caption evidence, QC vocabulary, and fulfillment completion discipline.

    Treat tenant-specific partner specs, broadcaster or platform profiles,

    rights entitlements, traffic windows, security controls, and approval

    rosters as runtime retrieval dependencies that narrow but do not replace

    the public baseline.

    '
  authority_sources:
  - source_id: amwa-as11-family
    title: 'AS-11: Media Contribution File Formats'
    publisher: Advanced Media Workflow Association
    source_type: named-industry-operating-guidance
    location: https://www.amwa.tv/specifications
    authority_reason: AMWA's official specifications page defines AS-11 as constrained media file formats for delivery of
      finished media assets to a broadcaster or publisher, making it authoritative for broadcaster-facing delivery-package
      terminology and boundaries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: amwa-as11-x9
    title: AS-11 X9
    publisher: Advanced Media Workflow Association
    source_type: named-industry-operating-guidance
    location: https://amwa-tv.github.io/AS-11_X9/AMWA_AS_11_X9.html
    authority_reason: The published AS-11 X9 specification is an authoritative AMWA rendering for North American broadcaster
      delivery and explicitly frames the package as vendor-neutral, broadcaster-neutral, self-contained, and play-out ready.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: movielabs-mddf
    title: MovieLabs Digital Distribution Framework
    publisher: MovieLabs
    source_type: named-industry-operating-guidance
    location: https://www.movielabs.com/md/
    authority_reason: MovieLabs' official MDDF overview is authoritative industry guidance for digital movie and television
      distribution workflows spanning identification, metadata, avails, asset delivery, delivery process support, and reporting.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: movielabs-aod
    title: Asset Ordering, Delivery and Tracking
    publisher: MovieLabs
    source_type: named-industry-operating-guidance
    location: https://movielabs.com/md/delivery/
    authority_reason: MovieLabs AOD is an authoritative industry workflow reference for asset availability, asset orders,
      content delivery requirements, asset status manifests, QC failure reports, and status or error communication between
      studios, platforms, and service providers.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: movielabs-avails
    title: Avails and Title List
    publisher: MovieLabs
    source_type: named-industry-operating-guidance
    location: https://www.movielabs.com/md/avails/
    authority_reason: MovieLabs Avails and Title List guidance is authoritative for precise licensing and title-availability
      metadata that constrains which asset orders and fulfillment activities are actually in scope.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: movielabs-mdc
    title: Media Delivery Core (MDC)
    publisher: MovieLabs
    source_type: recognized-workflow-reference
    location: https://movielabs.com/md/mdc/
    authority_reason: MovieLabs MDC is the recognized practical-use guide for Asset Ordering, Delivery and Tracking and provides
