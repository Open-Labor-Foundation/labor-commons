      releases.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: smpte-imf
    title: SMPTE and the IMF User Group Have Joined Forces
    publisher: Society of Motion Picture and Television Engineers
    source_type: recognized-workflow-reference
    location: https://www.smpte.org/blog/smpte-and-the-imf-user-group-have-joined-forces
    authority_reason: SMPTE is the standards body behind ST 2067, and its official IMF guidance describes IMF as a B2B package
      used for versioning and exchange between content owners, post facilities, and distribution platforms.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: movielabs-qc-vocabulary
    title: Quality Control (QC) Vocabulary
    publisher: MovieLabs
    source_type: evidence-or-control-standard
    location: https://www.movielabs.com/md/qcvocabulary/
    authority_reason: MovieLabs' QC vocabulary is a recognized control reference for encoding and naming issues found during
      media QC, which materially constrains how distribution operations interpret failure evidence and exception routing.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: fcc-ip-closed-captioning
    title: Order on Review and Notice of Apparent Liability for Forfeiture
    publisher: Federal Communications Commission
    source_type: evidence-or-control-standard
    location: https://docs.fcc.gov/public/attachments/DA-21-1183A1_Rcd.pdf
    authority_reason: The FCC is the U.S. regulator for IP-delivered video captioning requirements, and this order restates
      distributor obligations to pass through required captions, preserve caption quality, and maintain complaint-handling
      mechanisms.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: smpte-timed-text
    title: SMPTE Timed Text
    publisher: Society of Motion Picture and Television Engineers
    source_type: evidence-or-control-standard
    location: https://www.smpte.org/standards/document-index/OV
    authority_reason: SMPTE's official standards index states that SMPTE Timed Text is an FCC safe-harbor interchange and
      delivery format for online video captioning, making it authoritative for timed-text evidence and format-boundary handling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: title, version, and entitlement grounding
    retrieval_policy: Use EIDR, MovieLabs Avails, and tenant title-management records first when a request depends on territory,
      language set, edit versus manifestation, or asset entitlement posture.
    specialty_specific_exceptions:
    - Do not infer rights sufficiency from an asset order alone when avails, title list, or tenant rights systems materially
      differ.
  - category: package and asset readiness
    retrieval_policy: Use AMWA AS-11, SMPTE IMF, MovieLabs AOD, and tenant package inventories first when confirming whether
      the required master, sidecar, and metadata bundle is actually ready for fulfillment.
    specialty_specific_exceptions:
    - Do not treat a transfer job as sufficient completion evidence when the governing package manifest, checksum trail, or
      partner receipt is missing.
  - category: language, caption, and accessibility evidence
    retrieval_policy: Use MovieLabs QC vocabulary, SMPTE timed-text guidance, FCC captioning obligations, and tenant localization
      systems first when a request depends on subtitle, caption, dubbed audio, or accessibility completeness.
    specialty_specific_exceptions:
    - Do not let the lane waive caption or accessibility gaps, even if another record shows the media essence itself is available.
  - category: delivery status and exception handling
    retrieval_policy: Use MovieLabs MDC, AOD status artifacts, partner-portal receipts, transfer logs, and tenant exception
      queues first when the question is whether work is blocked, rework, or complete.
    specialty_specific_exceptions:
    - Do not close the workflow while QC failures, asset-status errors, or unresolved partner rejections remain open.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant-approved partner delivery profiles, content delivery requirements, asset-order templates, platform mappings,
      rights systems, localization workflows, and escalation ownership only through orchestrator-controlled retrieval.
    - Require title or asset id, territory or platform, current lifecycle state, governing package type, and the authoritative
      systems-of-record locations before applying the public baseline to a live request.
    - Record unresolved ambiguity instead of guessing when partner delivery specs, territory rules, or tenant policy materially
      change the next action.
  specialty_specific_exceptions:
  - Keep the lane focused on media-distribution execution, inventory and logistics readiness, evidence-backed completion,
    and escalation packaging rather than programming strategy or business decision-making.
  - Separate distribution operations from rights approval, media engineering, technical QC adjudication, accessibility waivers,
    traffic scheduling, and legal or privacy authority.
  - Do not imply completion solely because one system says delivered if the title-management, package-inventory, localization,
    QC, or partner-acceptance records materially conflict.
  next_review_due_at: '2026-08-08'
