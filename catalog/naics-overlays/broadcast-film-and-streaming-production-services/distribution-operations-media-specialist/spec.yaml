    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
  - source_id: eidr-distribution-faq
    title: How to Use EIDR to Identify Versions for Distribution Purposes FAQ
    publisher: Entertainment Identifier Registry
    source_type: recognized-workflow-reference
    location: https://www.eidr.org/documents/How%20to%20Use%20EIDR%20to%20Identify%20Versions%20for%20Distribution%20Purposes%20FAQ.pdf
    authority_reason: EIDR is the official identifier registry for audiovisual works, and its distribution-purpose FAQ is
