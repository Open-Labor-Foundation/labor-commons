- labor-and-payroll-compliance-specialist
- accessibility-and-media-compliance-specialist
- safety-and-production-risk-specialist
- legal-review-specialist
knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Recognized media-industry guidance and delivery specifications define the handoffs, acceptance states, and
      metadata requirements that make media-production analytics different from generic reporting.
  - class: Recognized workflow references tied directly to the lane
    rationale: Recognized public workflow references define how production, post, news, live, and distribution metadata flows
      across systems and why title, version, and timing lineage matter.
  - class: Evidence or control standards relevant to the lane
    rationale: Formal standards and measurement controls define what counts as sufficient evidence for time alignment, version
      packaging, accessibility artifacts, and disclosure-safe audience reporting.
  source_selection_approach: 'Use recognized media-production workflow guidance, metadata exchange

    references, delivery specifications, timecode and packaging standards, and

    measurement-control standards before drafting workflow claims. Use audience

    benchmarks and cross-platform comparison logic only after the production and

    delivery baseline is established. Tenant metric dictionaries, delivery

    contracts, rights windows, disclosure approvals, release calendars, source

    precedence, and adjacent-owner maps remain mandatory runtime inputs and are

    never guessed.

    '
  authority_sources:
  - source_id: movielabs-omc-overview
    title: Ontology for Media Creation Part 1 Overview v2.7
    publisher: MovieLabs
    source_type: recognized-workflow-reference
    location: https://mc.movielabs.com/omc/Overview/ML_Ontology_Pt1_Overview_v2.7.pdf
    authority_reason: MovieLabs is the studio-backed industry consortium behind the 2030 Vision and this ontology is a direct
      workflow reference for production identifiers, relationships, and metadata lineage across media creation systems.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: dpp-specs-guides
    title: Specifications & Guidance
    publisher: The Digital Production Partnership
    source_type: named-industry-operating-guidance
    location: https://www.thedpp.com/metadata/
    authority_reason: The DPP is a recognized media-supply-chain body whose published specifications and guidance are used
      by broadcasters, platforms, and suppliers to define delivery, metadata, and interchange expectations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: amwa-as11-x9
    title: 'AS-11 X9: NABA HD AVC Contribution Specification'
    publisher: Advanced Media Workflow Association
    source_type: named-industry-operating-guidance
    location: https://specs.amwa.tv/as-11-x9/branches/main/docs/Overview.html
    authority_reason: AMWA publishes the formal AS-11 specification family used for air-ready program contribution workflows;
      X9 is directly tied to North American broadcaster delivery expectations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: dpp-lpx
    title: DPP launches Live Production Exchange for Live Broadcasters
    publisher: The Digital Production Partnership
    source_type: recognized-workflow-reference
    location: https://www.thedpp.com/news/dpp-launches-live-production-exchange-for-live-broadcasters
    authority_reason: This DPP publication documents the LPX framework for live broadcasters and ties live-production metadata
      exchange to AMWA NMOS-based workflows, which is directly relevant to live production analytics.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: iptc-newsml-g2
    title: NewsML-G2 quick start guides
    publisher: IPTC
    source_type: recognized-workflow-reference
    location: https://iptc.org/standards/newsml-g2/quick-start-guides/
    authority_reason: IPTC is the recognized newsroom metadata standards body and NewsML-G2 is a direct operational reference
      for planning, package, and item metadata exchange in news production workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: smpte-st12-1
    title: SMPTE ST 12-1:2014 Time and Control Code
    publisher: Society of Motion Picture and Television Engineers
    source_type: evidence-or-control-standard
    location: https://pub.smpte.org/pub/st12-1/st0012-1-2014.pdf
    authority_reason: SMPTE ST 12-1 is the canonical timecode standard used to align shot, edit, logging, delivery, and playout
      evidence across media-production systems.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: smpte-st2067-3
    title: SMPTE ST 2067-3:2020 Interoperable Master Format - Composition Playlist
    publisher: Society of Motion Picture and Television Engineers
    source_type: evidence-or-control-standard
    location: https://pub.smpte.org/pub/st2067-3/st2067-3-2020.pdf
    authority_reason: SMPTE ST 2067-3 is the formal IMF composition-playlist standard and directly governs versioning, playback
      timelines, and external track-file references for file-based media mastering.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  - source_id: mrc-standards-guidelines
    title: Minimum Standards for Media Rating Research
    publisher: Media Rating Council
    source_type: evidence-or-control-standard
    location: https://www.mediaratingcouncil.org/standards-and-guidelines
    authority_reason: The MRC is the recognized standards and accreditation body for media measurement, and its minimum standards
      define methodology disclosure, system-control, and reporting expectations for media ratings.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: mrc-cross-media-video
    title: MRC Cross-Media Audience Measurement Standards (Phase I Video)
    publisher: Media Rating Council
    source_type: named-industry-operating-guidance
    location: https://www.mediaratingcouncil.org/sites/default/files/Standards/MRC%20Cross-Media%20Audience%20Measurement%20Standards%20%28Phase%20I%20Video%29%20Final.pdf
    authority_reason: These MRC standards are a direct public baseline for cross-platform video audience measurement, comparability,
      and disclosure discipline across linear and streaming environments.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: production identity and metadata lineage
    retrieval_policy: Use MovieLabs OMC plus IPTC or DPP metadata guidance before blending planning, acquisition, post, and
      publication records.
    specialty_specific_exceptions:
    - Do not treat title, episode, version, cut, window, and territory identifiers as interchangeable without mapped lineage.
  - category: finished-program and file-based delivery requirements
    retrieval_policy: Use AMWA AS-11 and DPP delivery guidance before treating an export, package, or handoff as delivered
      or broadcaster-ready.
    specialty_specific_exceptions:
    - Do not equate internal render completion with commissioner or platform acceptance.
  - category: live and newsroom metadata exchange
    retrieval_policy: Use DPP LPX and IPTC NewsML-G2 when live or news workflows are in scope and source events cross planning,
      capture, and publication systems.
    specialty_specific_exceptions:
    - Escalate whenever live rundown, contribution, and published-segment identifiers are not linked.
  - category: time alignment and version packaging controls
    retrieval_policy: Use SMPTE timecode and IMF standards before trusting edit, turnover, package, subtitle, or version comparisons
      across systems.
    specialty_specific_exceptions:
    - Do not compare version runtime, cut completion, or package readiness when timecode base or composition structure is
      unresolved.
  - category: audience measurement and disclosure controls
    retrieval_policy: Use MRC minimum standards and cross-media video standards before preparing trend, benchmark, or disclosure-safe
      audience narratives.
    specialty_specific_exceptions:
    - Do not blend first-party telemetry and accredited audience metrics into a single benchmark claim without explicit methodology
      labeling and owner approval.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline workflow, but tenant delivery contracts, rights windows, source precedence, release
      calendars, and disclosure approvals remain required for safe execution.
    - Tenant retrieval must provide title, version, platform, territory, reporting window, metric dictionary, delivery-spec
      ownership, and current systems-of-record ownership.
    - Escalate whenever public workflow guidance, commissioner specifications, MRC-style audience standards, or tenant policy
      materially changes metric definition, evidence sufficiency, or disclosure posture.
  specialty_specific_exceptions:
  - Media-production analytics often mixes schedule, cost, post, delivery, availability, and audience metrics that use different
    clocks, acceptance states, and version rules.
  - Delivered, air-ready, published, available, viewed, and completed are not interchangeable without explicit commissioner,
    platform, and tenant mapping.
  - Requests for benchmark, forecast, attribution, or public-disclosure language must stay caveated and route to the correct
    authority when comparability, methodology, approval, or evidence quality is incomplete.
  next_review_due_at: '2026-05-10'
