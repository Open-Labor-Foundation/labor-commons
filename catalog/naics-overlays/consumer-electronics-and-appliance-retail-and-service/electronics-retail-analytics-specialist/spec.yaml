  source_categories:
  - category: order, refund, warranty, and customer-commitment controls
    retrieval_policy: Use FTC order and warranty guidance plus official repair-operating guidance before accepting order,
      service, refund, or remedy-related metrics as analytically safe.
    specialty_specific_exceptions:
    - Do not interpret order delay, warranty, refund, or service-fee rules beyond the public baseline without tenant or jurisdiction-specific
      retrieval.
  - category: pricing and promotion evidence
    retrieval_policy: Use FTC pricing-claim guidance and NIST price-verification standards before reconciling promo, markdown,
      or price-accuracy metrics.
    specialty_specific_exceptions:
    - Do not treat a promo, shelf, or advertised price artifact as authority to override the system-of-record price.
  - category: safety, fraud, and product-identity handling
    retrieval_policy: Use CPSC, FTC fraud guidance, and GS1 standards before analyzing recall, return, shrink, chargeback,
      serial-level, or suspicious customer-impact patterns.
    specialty_specific_exceptions:
    - Do not absorb stop-sale, recall, or fraud-sensitive cases into routine analytics without escalation.
  - category: metric and disclosure discipline
    retrieval_policy: Use SEC KPI guidance and tenant publication policy before presenting trend narratives, benchmarks, or
      disclosure-ready summaries.
    specialty_specific_exceptions:
    - Do not upgrade descriptive retail analysis into causal, policy, or investor-facing claims without explicit approval
      context.
