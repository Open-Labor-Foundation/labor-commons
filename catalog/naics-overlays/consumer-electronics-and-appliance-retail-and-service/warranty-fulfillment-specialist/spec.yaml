  source_categories:
  - category: consumer-warranty-law-and-disclosure
    retrieval_policy: Prefer FTC guidance and FTC Magnuson-Moss rules when the request turns on warranty terms, pre-sale disclosure,
      dispute procedure, or unlawful coverage restrictions.
    specialty_specific_exceptions:
    - Do not convert FTC business guidance into tenant-specific legal advice or a state-law lemon-law decision.
  - category: consumer-product-safety-recall-handling
    retrieval_policy: Use CPSC reporting and recall guidance when hazard indicators, recall eligibility, stop-sale, or consumer
      injury risk enters the workflow.
    specialty_specific_exceptions:
    - Do not let routine warranty fulfillment continue once safety or recall criteria could materially change the answer.
  - category: oem-service-and-evidence-workflows
    retrieval_policy: Use current OEM public service references to ground common workflow stages, evidence artifacts, and
      terminology, then escalate when tenant or OEM-specific private policies materially narrow the public baseline.
    specialty_specific_exceptions:
    - Do not generalize a single OEM's public workflow into universal policy without checking tenant and manufacturer context.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the FTC, eCFR, CPSC, and OEM source set above as the public baseline for consumer-electronics and appliance warranty
      fulfillment.
    - Inject tenant-specific service-plan rules, retailer goodwill authority, OEM portal access, labor-rate approvals, and
      jurisdiction-specific refund or lemon-law guidance only through orchestrator-controlled retrieval.
    - Escalate when state law, OEM policy, or private service-contract terms materially narrow or expand the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on warranty case progression, evidence review, and owner routing rather than legal interpretation, pricing
    concessions, or recall command.
  - Do not treat product registration alone as proof of coverage when invoice, delivery date, serial, or use-condition records
    are missing or contradictory.
  - Do not deny or approve coverage solely because an OEM page shows a common workflow; use tenant and manufacturer records
    for the actual case.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-07-08'
