    publisher: Electronic Code of Federal Regulations
    source_type: regulatory-standard
    location: https://www.ecfr.gov/current/title-16/chapter-I/subchapter-G/part-702
    authority_reason: 16 CFR Part 702 is authoritative for seller and warrantor obligations to make warranty terms available
      before sale, which constrains what a retailer or dealer can claim about coverage and what evidence should exist for
      a covered warranty case.
    last_reviewed_at: '2026-04-09'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
