  source_categories:
  - category: consumer-protection and warranty baseline
    retrieval_policy: Use FTC warranty and consumer-protection guidance first, then apply tenant warranty, service-contract,
      and return-policy overlays before accepting intake or communicating payment rights.
    specialty_specific_exceptions:
    - Do not infer state-law implied-warranty scope beyond the public federal baseline without tenant or jurisdiction-specific
      policy retrieval.
  - category: repair-intake operating records
    retrieval_policy: Use public repair-dealer operating guidance for estimate, claim-check, invoice, and authorization baselines,
      then inject tenant booking, depot, and service-desk workflow rules.
    specialty_specific_exceptions:
    - Do not accept intake if serial or model identifiers, quote authorization, or possession records are absent when they
      materially change the routing outcome.
  - category: safety, data-handling, and fraud escalation
    retrieval_policy: Use CPSC safety guidance and NIST data-handling guidance before applying tenant safety, loss-prevention,
      and privacy routing rules.
    specialty_specific_exceptions:
    - Do not clear recall, stop-use, or ownership-mismatch cases in-lane.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use public baseline sources as the named-industry minimum only.
    - Resolve jurisdiction-specific estimate, refund, and service-law differences through tenant retrieval before final disposition.
    - Escalate when product-manufacturer policy, tenant policy, and public guidance conflict materially.
  specialty_specific_exceptions:
  - No final warranty adjudication or refund approval authority is exercised in this lane.
  - No safety release, recall closure, or fraud determination is made without an adjacent owner.
  - Data-bearing-device handling requires explicit tenant rules for passcode, lock-state, and sanitization responsibility.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-07-08'
