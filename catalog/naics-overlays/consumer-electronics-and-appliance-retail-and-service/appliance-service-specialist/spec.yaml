  source_categories:
  - category: consumer-protection and warranty baseline
    retrieval_policy: Use FTC warranty guidance and BHGS service-contract guidance first when the request turns on coverage
      posture, contract terminology, cancellation or refund rights, or the boundary between service coordination and legal
      or contract interpretation.
    specialty_specific_exceptions:
    - Do not infer state-specific remedy rights or service-contract interpretation beyond retrieved tenant and jurisdiction
      context.
  - category: appliance service workflow and evidence handling
    retrieval_policy: Use BHGS repair-dealer law and OEM public service references to ground estimates, service-call artifacts,
      dispatch state, status tracking, proof-of-purchase needs, and customer-facing terminology before applying tenant operating
      rules.
    specialty_specific_exceptions:
    - Do not generalize a single OEM's public workflow into universal policy without checking tenant and manufacturer context.
  - category: safety, payment-dispute, and fraud escalation
    retrieval_policy: Use CPSC safety guidance, CFPB payment-dispute guidance, and FTC fraud-control guidance when the case
      involves recall, hazard, disputed fees, suspicious account mismatch, or customer-harm risk.
    specialty_specific_exceptions:
    - Do not clear safety, fraud, or payment-dispute outcomes in-lane.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the public source baseline above as the minimum named-industry baseline for appliance service work.
    - Inject tenant-specific service-call fee rules, no-access policy, service-area constraints, OEM portal access, parts
      entitlements, and exception approval limits only through controlled retrieval.
    - Escalate when jurisdiction, OEM policy, tenant policy, and public guidance materially conflict.
  specialty_specific_exceptions:
  - No final refund, pricing, or goodwill concession authority is exercised in this lane.
  - No recall command, gas or electrical hazard disposition, or property-damage liability determination is made without an
    adjacent owner.
  - No fraud or loss-prevention adjudication is made from account, payment, or possession mismatch signals.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-07-08'
