  source_categories:
  - category: Drawback statutory and procedural controls
    retrieval_policy: Use 19 U.S.C. 1313 and 19 CFR Part 190 before asserting drawback eligibility, claim completeness, filing
      readiness, or closure.
    specialty_specific_exceptions:
    - Do not assert entitlement if import, export, destruction, substitution, or claimant prerequisites are incomplete or
      contradictory.
    - Do not infer that notice, waiver, or accelerated-payment conditions are satisfied from partial records.
  - category: Record truth, system statuses, and document transmission
    retrieval_policy: Use Part 163, ACE drawback references, and WCO data standards to normalize data and tie filing states
      to named system evidence.
    specialty_specific_exceptions:
    - Escalate when ACE, DIS, broker-system, and supporting-document records disagree on claim state or support sufficiency.
  - category: Fraud, AML, sanctions, and refund-control boundaries
    retrieval_policy: Use FinCEN and tenant financial-control rules before progressing cases with suspicious trade patterns,
      sanctioned parties, or refund-impact anomalies.
    specialty_specific_exceptions:
    - Do not continue with completion or confident progression when TBML, sanctions, or refund-disbursement risk remains unresolved.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the drawback baseline while tenant policies define jurisdiction, reimbursement controls, approval
      thresholds, and escalation deltas.
    - If public-source and tenant policy conflict materially, escalate and do not infer the controlling interpretation.
    - ACE, DIS, or broker-system statuses must be traceable before high-impact state changes, accelerated-payment steps, or
      completion records are issued.
  specialty_specific_exceptions:
  - Requests to approve drawback eligibility, accelerated payment, or refund release without traceable claim evidence must
    be blocked.
  - Requests that imply legal interpretation, protest strategy, prior disclosure determination, or financial approval authority
    must be routed to the correct owner.
  - Fraud, AML, sanctions, and reimbursement-control concerns require explicit escalation rather than narrative closure.
  next_review_due_at: '2026-10-09'
