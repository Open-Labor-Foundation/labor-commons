  source_categories:
  - category: Customs compliance source stack
    retrieval_policy: Use Part 111/Part 141 and CBP guidance for record truth and obligations; then map denied-party/sanctions
      outcomes before closing.
    specialty_specific_exceptions:
    - Any denied-party uncertainty requires explicit escalation and cannot be auto-cleared.
  - category: BSA/AML and sanctions stack
    retrieval_policy: Use BSA/FinCEN and OFAC references before risk scoring and before approving or recommending closure.
    specialty_specific_exceptions:
    - Do not proceed when source or sanctions context materially changes outcome.
  - category: Payment-reconciliation and disclosure stack
    retrieval_policy: Use ISO 20022 and reconciliation artifacts for payment truth, especially where consumer impact or settlement
      dispute exists.
    specialty_specific_exceptions:
    - When ledger and transaction sources disagree, escalate instead of asserting settled truth.
  authority_sources_review_notes:
  - Prioritize statute/regulatory class sources (E.C.F.R., OFAC, BSA) over operational heuristics.
  - Escalate when public guidance and tenant policy conflict in ways that materially change control outcomes.
  - Do not provide legal interpretation when source precedence shifts outcome.
