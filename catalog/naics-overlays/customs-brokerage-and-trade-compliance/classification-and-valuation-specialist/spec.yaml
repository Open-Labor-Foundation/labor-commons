  source_categories:
  - category: Entry and invoice truth set
    retrieval_policy: Use Part 141, HTSUS, and tenant entry workpapers before asserting that tariff classification and entered
      value are review-ready.
    specialty_specific_exceptions:
    - If invoice content or product identity is incomplete, the lane must return a missing-evidence finding instead of inferring
      classification.
  - category: Valuation and recordkeeping stack
    retrieval_policy: Use Part 152 and Part 163 before asserting that transaction value or alternate valuation method is supportable.
    specialty_specific_exceptions:
    - When required adjustments or record retention cannot be proven, the lane must escalate or block.
  - category: Rulings and post-entry adjustment stack
    retrieval_policy: Use Part 177, reconciliation guidance, and tenant escalation rules when a prior ruling, protest posture,
      or post-entry correction path changes the answer.
    specialty_specific_exceptions:
    - The lane must not claim binding effect beyond the scope of the cited ruling or the tenant's delegated authority.
  authority_sources_review_notes:
  - Prioritize binding U.S. customs authorities and official tariff references before guidance documents.
  - Use WCO and WTO sources to constrain terminology and valuation method logic, not to override U.S. law or tenant policy.
  - Escalate whenever a prior ruling, protest, or court posture materially changes the review outcome.
