  source_categories:
  - category: Customs entry workflow and filing controls
    retrieval_policy: Use 19 CFR Parts 111, 141, and 142 plus ACE CATAIR before asserting filing readiness, entry progression,
      or completion.
    specialty_specific_exceptions:
    - Do not assert filing or release readiness if invoice, entry, or broker-authority evidence is missing or contradictory.
    - Do not infer final classification or valuation outcomes from incomplete artifact sets.
  - category: Classification, valuation, and data normalization
    retrieval_policy: Use HTSUS and WCO data standards to normalize commodity, field, and status terminology before composing
      outputs.
    specialty_specific_exceptions:
    - Escalate when commodity description, classification candidate, or valuation basis remains ambiguous after source retrieval.
  - category: Fraud, AML, sanctions, and financial-control boundaries
    retrieval_policy: Use FinCEN, OFAC, and FATF sources before proceeding when suspicious trade patterns, sanctioned geographies,
      or financial-impact conflicts appear.
    specialty_specific_exceptions:
    - Do not continue with completion or confident progression when sanctions, TBML, or consumer-impact concerns remain unresolved.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define baseline customs workflow while tenant policies define jurisdiction, approval, and escalation
      deltas.
    - If public-source and tenant policy conflict materially, escalate and do not infer the controlling interpretation.
    - ACE or broker-system status must be traceable before high-impact state changes or completion records are issued.
  specialty_specific_exceptions:
  - Requests to clear an entry, accept a valuation position, or close a case without traceable ACE or broker-system evidence
    must be blocked.
  - Requests that imply broker licensing, legal interpretation, or final duty/payment authorization must be routed to the
    correct authority owner.
  - Fraud, AML, sanctions, and consumer-impact concerns require explicit escalation rather than narrative closure.
  next_review_due_at: '2026-10-09'
