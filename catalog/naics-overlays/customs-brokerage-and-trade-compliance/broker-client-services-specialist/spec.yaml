  source_categories:
  - category: Broker-service and customs-entry workflow
    retrieval_policy: Use 19 CFR Parts 111, 141, CBP broker guidance, and importer guidance first to establish who may act,
      what may be communicated, and which records are authoritative before responding.
    specialty_specific_exceptions:
    - Do not treat broker possession of documents as proof that the importer's obligation is satisfied.
    - Do not promise corrective filing outcomes when the request belongs to post-entry, drawback, or customs operations.
  - category: Recordkeeping and client evidence control
    retrieval_policy: Use Part 163 and broker records controls before confirming receipt, correction, refund, or closed-case
      state.
    specialty_specific_exceptions:
    - When case notes and customs records diverge, escalate and identify the missing source of truth.
  - category: Fraud, AML, sanctions, and payment-risk controls
    retrieval_policy: Use FinCEN, OFAC, and payment/reconciliation records before responding to unusual payment requests,
      third-party funding, or suspicious document discrepancies.
    specialty_specific_exceptions:
    - Do not continue with discretionary client accommodation when TBML, sanctions, or unresolved reconciliation indicators
      are present.
