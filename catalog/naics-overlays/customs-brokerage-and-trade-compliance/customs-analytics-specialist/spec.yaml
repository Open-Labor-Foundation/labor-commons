  source_categories:
  - category: Customs record and entry truth
    retrieval_policy: Use 19 CFR Part 163 and Part 141 before accepting broker, entry, or entry-summary values as metric truth.
    specialty_specific_exceptions:
    - Do not publish metrics when entry state, broker record, and entry-summary evidence are not aligned.
  - category: Trade reporting and filer-quality workflow
    retrieval_policy: Use CBP ACE reporting references and Census AES compliance guidance to determine report grain, freshness
      expectations, and data-correction boundaries.
    specialty_specific_exceptions:
    - When source extracts are stale or correction windows remain open, issue caveats or escalation instead of stable-trend
      claims.
  - category: Fraud, AML, sanctions, and reconciliation controls
    retrieval_policy: Use OFAC, FinCEN, FFIEC, and ISO 20022 sources before publishing analysis that touches counterparties,
      unusual trade patterns, or transaction-reconciliation conclusions.
    specialty_specific_exceptions:
    - Do not down-rank suspicious trade patterns into ordinary variance; escalate when AML or sanctions posture changes result.
  authority_sources_review_notes:
  - Prefer customs regulations and official CBP/Census workflow references before tenant heuristics.
  - Use financial-regulator and risk-control references when anomaly analysis crosses into fraud, AML, sanctions, disclosure,
    or reconciliation handling.
  - Record unresolved denominator, jurisdiction, or source-precedence ambiguity instead of guessing.
  next_review_due_at: '2026-07-08'
