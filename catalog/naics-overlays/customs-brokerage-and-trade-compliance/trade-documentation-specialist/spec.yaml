  source_categories:
  - category: Customs filing and document workflow
    retrieval_policy: Use CBP and Part 19 references first for entry/document controls; retrieve primary shipment and filing
      artifacts before assessing readiness.
    specialty_specific_exceptions:
    - Do not infer release readiness without explicit filing references and hold/release owner confirmation.
    - Escalate when import/export process state and service-system state disagree.
  - category: Fraud, AML, and identity risk
    retrieval_policy: Use FinCEN and FFIEC controls before handling suspicious transaction, disclosure-risk, or KYC/AML escalation
      scenarios.
    specialty_specific_exceptions:
    - Do not continue with release or closure when suspicious patterns or sanctions checks remain unresolved.
  - category: Payment and reconciliation integrity
    retrieval_policy: Use NACHA and FFIEC risk-control references for payment, remittance, and reconciliation conflict handling
      before closing disputes.
    specialty_specific_exceptions:
    - Escalate unreconciled ledger or claim/payment mismatches as hard blockers, not as advisory warnings.
  - category: Consumer-impact communication and remediation
    retrieval_policy: Use CFPB-aligned communication and disclosure expectations when customer impact is present.
    specialty_specific_exceptions:
    - Do not provide consumer-impact recommendations that bypass dispute-resolution or disclosure evidence requirements.
