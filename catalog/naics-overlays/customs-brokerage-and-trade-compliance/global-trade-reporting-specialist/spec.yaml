  source_categories:
  - category: Customs and export reporting record truth
    retrieval_policy: Use 19 CFR Part 163 and 15 CFR Part 30 before treating broker, import, export, or filing extracts as
      complete reporting truth.
    specialty_specific_exceptions:
    - Do not certify or release a reporting package when filing records, amendments, and supporting artifacts do not align.
  - category: Operational report assembly and filing-quality control
    retrieval_policy: Use CBP ACE reporting references and Census AES compliance material to define report grain, correction
      windows, and error-handling posture.
    specialty_specific_exceptions:
    - When report universes changed, correction windows remain open, or compliance errors persist, hold or caveat the package
      instead of presenting a clean submission state.
  - category: Sanctions, AML, and reconciliation risk controls
    retrieval_policy: Use OFAC, FinCEN, FFIEC, and ISO 20022 references before preparing outputs touching suspicious activity,
      blocked parties, payments, or ledger tie-outs.
    specialty_specific_exceptions:
    - Do not normalize sanctions-sensitive or TBML-sensitive discrepancies as ordinary report noise.
  authority_sources_review_notes:
  - Prefer CBP and Census primary workflow rules before tenant heuristics for reporting logic and evidence sufficiency.
  - Use OFAC and FinCEN whenever counterparty, jurisdiction, or transaction anomalies may change whether a report can be prepared
    or released.
  - Record unresolved jurisdictional differences and tenant precedence rules instead of guessing.
  next_review_due_at: '2026-07-08'
