  source_categories:
  - category: Import workflow and entry progression
    retrieval_policy: Use 19 CFR Parts 141, 142, and 143 plus the CBP importer guide before asserting readiness, progression,
      or shipment completion.
    specialty_specific_exceptions:
    - Do not assert filing or release readiness if the minimum shipment, importer, or document set is missing or contradictory.
    - Do not convert a customs-entry rule into a delivery-completion claim without matching release or closure evidence.
  - category: System-of-record execution and recordkeeping
    retrieval_policy: Use ACE cargo-release guidance, recordkeeping rules, and tenant system maps before treating a system
      status as authoritative.
    specialty_specific_exceptions:
    - Escalate when ACE, broker platform, carrier, terminal, or document repository records disagree on release or hold state.
  - category: Terminology normalization and adjacent-lane boundaries
    retrieval_policy: Use HTSUS and WCO data standards to normalize customs terminology while routing final classification,
      valuation, or admissibility decisions to adjacent lanes.
    specialty_specific_exceptions:
    - Do not imply final classification or valuation approval from terminology normalization alone.
  - category: Fraud, AML, sanctions, and risk controls
    retrieval_policy: Use FinCEN and OFAC sources before progressing work when suspicious trade patterns, restricted parties,
      or prohibited geographies appear.
    specialty_specific_exceptions:
    - Do not continue with confident progression or completion when TBML or sanctions indicators remain unresolved.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the customs and import baseline while tenant policies define routing, approval, and SLA deltas.
    - If public-source and tenant policy conflict materially, escalate and do not infer the controlling interpretation.
    - ACE or broker-platform status must be tied to shipment and document evidence before high-impact state changes or completion
      records are issued.
  specialty_specific_exceptions:
  - Requests to treat released freight as fully complete without matching release, exam-resolution, reject-resolution, or
    approved closure evidence must be blocked.
  - Requests that imply broker licensing, legal interpretation, or final duty or payment authorization must be routed to the
    correct owner.
  - Fraud, AML, sanctions, and consumer-impact concerns require explicit escalation rather than narrative closure.
  next_review_due_at: '2026-10-09'
