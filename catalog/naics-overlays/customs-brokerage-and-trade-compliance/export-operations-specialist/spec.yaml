  source_categories:
  - category: Export filing workflow and shipment-release controls
    retrieval_policy: Use 15 CFR Part 30, EAR Part 758, the AESDirect User Guide, and BIS freight-forwarder guidance before
      asserting filing readiness, shipment release, or completion.
    specialty_specific_exceptions:
    - Do not assert EEI, exemption-citation, or document-release readiness if SLI, written authority, destination, or filing
      elements are missing or contradictory.
    - Do not infer that departure or shipment completion occurred from booking data alone.
  - category: Classification-reference and data normalization
    retrieval_policy: Use Schedule B and WCO data standards to normalize commodity, country, and status terminology before
      composing outputs.
    specialty_specific_exceptions:
    - Escalate when Schedule B, ECCN, destination, or licensing-reference evidence remains ambiguous after source retrieval.
  - category: Fraud, AML, sanctions, and end-use boundary controls
    retrieval_policy: Use BIS, OFAC, FinCEN, and FATF sources before proceeding when suspicious trade patterns, restricted
      parties, or end-use concerns appear.
    specialty_specific_exceptions:
    - Do not continue with completion or confident progression when sanctions, TBML, or end-use red flags remain unresolved.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the export baseline while tenant policies define jurisdiction, approval, and escalation deltas.
    - If public-source and tenant policy conflict materially, escalate and do not infer the controlling interpretation.
    - AES or broker-system status must be traceable before high-impact state changes or completion records are issued.
  specialty_specific_exceptions:
  - Requests to release a shipment, close a case, or declare filing complete without traceable AES or document evidence must
    be blocked.
  - Requests that imply export-license interpretation, final ECCN classification, sanctions disposition, or legal authority
    must be routed to the correct authority owner.
  - Fraud, AML, sanctions, and end-use concerns require explicit escalation rather than narrative closure.
  next_review_due_at: '2026-10-09'
