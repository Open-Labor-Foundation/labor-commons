artifacts:
- name: sportsbook tickets and bet slips
  description: Primary wager acceptance records with wager type, amount, odds, event, and issue metadata.
- name: wagering account ledgers
  description: Authoritative account transaction histories for deposits, wagers, wins, voids, withdrawals, and holds.
- name: house rules and approved event records
  description: The governing public or tenant rule sets and event approvals that constrain settlement and cancellations.
- name: line history and grading records
  description: Audit-traceable odds changes, event result feeds, and grading outcomes tied to each wager.
- name: payout, redemption, and reconciliation records
  description: Cash, cage, voucher, kiosk, and liability records that support payout and completion decisions.
- name: AML, surveillance, and responsible-gaming evidence
  description: Suspicious-activity indicators, surveillance notes, exclusion checks, and responsible-gaming controls.
systems_of_record:
- name: sportsbook platform or event wagering system
  purpose: System of record for tickets, wagers, event grading, line history, and operational status.
- name: player account management and KYC platform
  purpose: System of record for identity, age, account status, deposits, withdrawals, and limit settings.
- name: geolocation and device-trust services
  purpose: Evidence source for jurisdiction eligibility and mobile wager acceptance controls.
- name: cage, cashiering, kiosk, and voucher systems
  purpose: System of record for cash intake, redemptions, payouts, and voucher liabilities.
- name: surveillance, AML, and compliance case systems
  purpose: Evidence source for suspicious activity, exclusion controls, and regulator-sensitive escalations.
- name: general ledger and reconciliation tooling
  purpose: System of record for liability, settlement, and outstanding payout reconciliation.
operating_model:
  lifecycle_states:
  - accepted
  - in-review
  - blocked-missing-prerequisites
  - exception-rework
  - escalated
  - ready-to-complete
  - completed
  - reopened
  state_progression_rules:
  - Move from accepted to in-review only after the ticket or account identifier, jurisdiction, channel, and governing records
    are confirmed.
  - Move to blocked-missing-prerequisites when required event, house-rule, payout, account, or systems-of-record evidence
    is absent.
  - Move to exception-rework when retrieved evidence is incomplete, contradictory, or requires corrected operational handling
    before completion.
  - Move to escalated when AML, responsible-gaming, compliance, trading, cage, or legal authority is required.
  - Move to ready-to-complete only after settlement, payout, or account-disposition evidence is internally consistent.
  - Allow reopened when new evidence invalidates a prior completion or exposes an unresolved control issue.
  throughput_expectations:
  - Prioritize same-shift handling for active payout, grading, and player-account exceptions where tenant SLAs require operational
    response.
  - Keep blocker and escalation queues explicit so unresolved cash, account, or regulator-sensitive items do not disappear
    into generic operations backlogs.
  - Do not trade speed for unsupported completion when evidence, approvals, or source precedence remain unresolved.
  completion_evidence:
  - ticket or account identifier tied to final disposition
  - governing house rule, event result, or approval reference
  - payout, redemption, settlement, or account-ledger evidence
  - systems-of-record consistency check
  - named next owner when completion is blocked or escalated
delivery:
  packaging_notes:
  - This validated overlay is delivered as a spec pack and does not claim a retained implementation.
  - Runtime remains specification-based until repeated use justifies promotion to a separately committed retained implementation.
  - Promotion requires stable retrieval of sportsbook, player-account, cash, compliance, and reconciliation records plus governed
    connector behavior.
