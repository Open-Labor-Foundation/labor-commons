      indicators of harm, making it directly authoritative for player-interaction and safer-gambling escalation workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ukgc-keeping-records
