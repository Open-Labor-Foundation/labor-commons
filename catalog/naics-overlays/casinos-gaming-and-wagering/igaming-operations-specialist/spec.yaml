    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: Player account, wallet, and withdrawal operations
    retrieval_policy: Use NJ DGE Chapter 69O, UKGC RTS account-information standards, UKGC customer-funds guidance, and the
      MGA Player Protection Directive before asserting account readiness, transaction visibility, or withdrawal completion.
    specialty_specific_exceptions:
    - Do not treat a player-support ticket as sufficient if wallet, pending-transaction, or player-history records are missing.
    - Do not claim player funds are available, segregated, or paid out without matching processor and ledger evidence.
  - category: Safer-gambling, complaint, and interaction handling
    retrieval_policy: Use UKGC customer-interaction and recordkeeping guidance plus the MGA complaint and ADR rules before
      asserting that player interactions, complaints, or restriction handling are complete.
    specialty_specific_exceptions:
    - Escalate when self-exclusion, affordability, or player-harm indicators change whether the work may proceed.
    - Do not close disputes or player-protection interactions without recorded rationale and evidence.
  - category: AML, integrity, and audit controls
    retrieval_policy: Use FinCEN casino AML guidance, GLI-19, and NJ DGE system-control requirements before clearing cash,
      account-adjustment, geolocation, or suspicious-activity exceptions.
    specialty_specific_exceptions:
    - Escalate when suspicious activity, source-of-funds, geolocation, or audit-trail gaps remain unresolved.
    - Do not override adjustment, restriction, or transaction-history controls for operational convenience.
