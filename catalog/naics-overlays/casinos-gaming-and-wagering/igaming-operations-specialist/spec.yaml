knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Gaming regulators and official gambling directives define the real player-account, wallet, complaint, restriction,
      and audit controls that make iGaming operations materially different from generic operations.
  - class: Recognized workflow references tied directly to the lane
    rationale: Remote-gambling technical standards and formal customer-interaction guidance define how account, session, interruption,
      withdrawal, and player-contact workflows must be handled.
  - class: Evidence or control standards relevant to the lane
    rationale: AML, audit-trail, integrity, and player-funds standards define the evidence thresholds, review posture, and
      refusal boundaries for regulated iGaming operations.
  source_selection_approach: 'Use primary gaming regulators first for player-account setup, wallet and

    withdrawal handling, player-funds protection, complaint management,

    responsible-gambling interactions, and technical account controls. Use

    recognized gaming-system and AML control standards to define audit trails,

    transaction logging, geolocation, and escalation boundaries. Require tenant

    retrieval for jurisdiction-specific age thresholds, identity timelines,

    state or country eligibility rules, source-of-funds thresholds, processor

    routing, and local regulator reporting deadlines.

    '
  authority_sources:
  - source_id: njdge-chapter-69o
