    publisher: New Jersey Division of Gaming Enforcement
    source_type: state-gaming-regulation
    location: https://www.nj.gov/lps/ge/docs/Regulations/CHAPTER69O.pdf
    authority_reason: Primary U.S. iGaming regulation covering patron accounts, safeguarded funds, adjustment reviews, complaint
      handling, player-protection requirements, and system reporting for a mature regulated iGaming market.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ukgc-rts-1
