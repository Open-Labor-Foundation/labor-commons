    location: https://www.gamblingcommission.gov.uk/standards/remote-gambling-and-software-technical-standards/rts-1-customer-account-information
    authority_reason: Official UK remote gambling technical standard for account statements, balances, and transaction visibility
      that directly shapes what player-account evidence and history must be available.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: ukgc-interacting-with-the-customer
    title: Interacting with the customer
    publisher: Gambling Commission
    source_type: remote-gambling-formal-guidance
