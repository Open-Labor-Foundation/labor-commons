  source_categories:
  - category: tribal gaming audit and revenue-control baseline
    retrieval_policy: Use 25 CFR 543.23, 25 CFR 543.24, and the NIGC toolkit first when tribal gaming, TICS, or SICS context
      is in scope.
    specialty_specific_exceptions:
    - Do not use federal tribal MICS to guess tenant-specific TICS or SICS details that have not been retrieved.
  - category: state gaming operating controls by game vertical
    retrieval_policy: Use Nevada MICS to identify slot, table-game, race-and-sports, and interactive-gaming artifact expectations
      before drafting workflow claims.
    specialty_specific_exceptions:
    - Escalate whenever the specific game vertical, jurisdiction, or approved internal-control procedure is unclear and would
      change the evidence required.
  - category: gross-revenue certification and reporting support
    retrieval_policy: Use New Jersey gross-revenue and casino-rule sources when the work involves tax-return support, monthly
      gross-revenue reporting, slot-drop estimation, or DGE examination boundaries.
    specialty_specific_exceptions:
    - Do not certify gross-revenue tax returns or monthly reports; prepare source-backed support and escalate certification
      to authorized owners.
  - category: audit checklist and evidence testing discipline
    retrieval_policy: Use official CPA MICS and NIGC toolkit references before approving unsupported corrections, waiving
      variances, or claiming evidence sufficiency.
    specialty_specific_exceptions:
    - Do not treat a checklist as proof that the tenant performed required procedures unless the underlying workpapers or
      system evidence are present.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant-approved internal controls, TICS or SICS, jurisdiction mappings, reporting cadence, and system-of-record
      precedence only through orchestrator-controlled retrieval.
    - Require jurisdiction, game vertical, property type, and reporting purpose before applying public gaming guidance to
      a specific case.
    - Record unresolved ambiguity instead of guessing when tribal, Nevada, New Jersey, or other jurisdiction-specific rules
      materially change the answer.
  specialty_specific_exceptions:
  - Keep the lane focused on revenue-audit evidence handling, posting readiness, reconciliation, and escalation packaging
    rather than generic accounting or compliance support.
  - Separate operational gaming revenue-audit handling from tax certification, formal accounting signoff, legal interpretation,
    patron dispute resolution, and internal-control design authority.
  - Do not imply that a gaming number is final solely because one system or recap report agrees if the count, meter, cage,
    wagering, or tax-support records materially conflict.
  next_review_due_at: '2026-08-08'
