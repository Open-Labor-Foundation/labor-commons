  source_classes:
  - class: Named-industry operating guidance
    rationale: Gaming regulators and published gaming-control rules define the operational records, gross-revenue handling,
      and audit boundaries that govern this lane.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official regulator-issued toolkits and workflow manuals translate gaming control rules into concrete audit
      testing, evidence handling, and exception workflows.
  - class: Evidence or control standards relevant to the lane
    rationale: Official audit checklists, internal-control procedures, and gross-revenue certification rules constrain what
      evidence is sufficient and when escalation is mandatory.
  source_selection_approach: 'Use regulator-issued tribal and state gaming MICS, gross-revenue rules,

    and official audit toolkits before drafting workflow claims. Treat tenant

    approved internal controls, TICS or SICS, property-specific game mix,

    reporting calendars, promotional programs, and system-of-record precedence

    as runtime retrieval dependencies that narrow but do not replace the public

    baseline.

    '
