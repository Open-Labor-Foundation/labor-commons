- surveillance-and-game-integrity-specialist
- legal-review-specialist
knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Gaming regulators and official reporting instructions define the records, filing cadence, metric logic, and
      attestation boundaries that make gaming analytics different from generic BI.
  - class: Recognized workflow references tied directly to the lane
    rationale: Recognized public gaming benchmark and revenue-tracking references keep the lane aligned to real market-trend
      and disclosure workflows without inventing metric logic.
  - class: Evidence or control standards relevant to the lane
    rationale: Public control and internal-control standards define which slot, wagering, and accounting artifacts are sufficient
      and when cross-system escalation is mandatory.
  source_selection_approach: 'Use regulator-issued gaming reporting instructions, audit and accounting

    rules, minimum internal-control standards, and official public revenue

    releases before drafting workflow claims. Use recognized public benchmark

    references only after the regulator baseline is established. Tenant metric

    dictionaries, source-precedence rules, promotional-treatment rules,

    disclosure approvals, property segmentation, and approved internal controls

    remain mandatory runtime inputs and are never guessed.

    '
  authority_sources:
