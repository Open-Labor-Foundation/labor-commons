  source_categories:
  - category: tribal gaming controls and benchmark posture
    retrieval_policy: Use 25 CFR 543 audit and revenue rules plus NIGC GGR reporting first when tribal gaming or tribal portfolio
      analytics are in scope.
    specialty_specific_exceptions:
    - Do not treat NIGC regional GGR benchmarks as property-level KPI approval or as a substitute for tenant records.
  - category: state gaming reporting and public disclosure cadence
    retrieval_policy: Use Nevada GRI and New Jersey DGE filing instructions before preparing monthly gaming trend, hold, win,
      drop, or tax-related analytics.
    specialty_specific_exceptions:
    - Do not blend Nevada, New Jersey, tribal, or other jurisdiction outputs into one metric without explicit jurisdiction
      mapping and denominator logic.
  - category: vertical-specific operating records and controls
    retrieval_policy: Use Nevada slot and race-and-sports MICS before trusting slot, sportsbook, or wagering-account metrics
      sourced from tenant systems alone.
    specialty_specific_exceptions:
    - Escalate whenever slot, sportsbook, internet gaming, or promotional workflows use different control owners or evidence
      shapes that are not yet mapped.
  - category: recognized commercial benchmark references
    retrieval_policy: Use AGA Commercial Gaming Revenue Tracker only after regulator-source definitions and tenant source
      precedence are established.
    specialty_specific_exceptions:
    - Do not turn AGA market-level trend data into unsupported property-level benchmark or causal claims.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline workflow, but tenant source precedence, promotional-treatment rules, disclosure approvals,
      and jurisdiction mappings remain required for safe execution.
    - Tenant retrieval must provide jurisdiction, property type, game vertical, channel mix, metric dictionary, approved internal
      controls, and current systems-of-record ownership.
    - Escalate whenever public regulator logic, approved internal controls, or tenant policy materially changes metric definition,
      reconciliation posture, or disclosure posture.
  specialty_specific_exceptions:
  - Gaming analytics often mixes slot, table, internet gaming, and sports wagering metrics that use different numerators,
    denominators, and promotional treatments.
  - Handle, drop, coin-in, theoretical win, actual win, GGR, and NGR are not interchangeable without explicit jurisdiction
    and tenant mapping.
  - Requests for public benchmark, forecast, or causal claims must stay caveated and route to the correct authority when comparability,
    approval, or evidence quality is incomplete.
  next_review_due_at: '2026-05-10'
