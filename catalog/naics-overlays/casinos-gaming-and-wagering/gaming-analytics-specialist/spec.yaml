    title: 25 CFR 543.23 Audit and accounting
    publisher: GovInfo / National Indian Gaming Commission
    source_type: evidence-or-control-standard
    location: https://www.govinfo.gov/content/pkg/CFR-2023-title25-vol2/pdf/CFR-2023-title25-vol2-sec543-23.pdf
    authority_reason: This federal regulation is the primary public baseline for tribal gaming audit and accounting controls,
      documentation, and workpaper expectations that constrain what analytics may safely rely on.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
