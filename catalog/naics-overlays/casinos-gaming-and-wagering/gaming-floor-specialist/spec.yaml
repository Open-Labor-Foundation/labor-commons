    authority_reason: The Nevada Gaming Control Board publishes the official slot MICS for commercial casinos and this source
      is authoritative for jackpot, fill, meter, player-tracking, and slot-accounting control expectations on the gaming floor.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
