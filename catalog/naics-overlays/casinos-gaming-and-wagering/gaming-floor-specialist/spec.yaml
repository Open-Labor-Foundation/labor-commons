  source_categories:
  - category: slot, jackpot, and player-tracking floor workflow handling
    retrieval_policy: Use Nevada slots MICS first when the workflow touches hand pays, jackpot slips, fills, progressive variances,
      player-tracking accounts, promo credits, or slot-accounting evidence.
    specialty_specific_exceptions:
    - Do not state a jackpot, fill, or player-account adjustment is complete unless slot-system, patron, and approval records
      materially agree.
  - category: table-game, fill-credit, and wagering-account handling
    retrieval_policy: Use Nevada table-games MICS first when the workflow touches fills, credits, markers, customer deposit
      withdrawals, or wagering-account transfers at live games.
    specialty_specific_exceptions:
    - Do not treat table fill, credit, or WAT events as routine cash handling without the required signatures, drop-box records,
      and public-view controls.
  - category: tribal-gaming control baseline and surveillance handling
    retrieval_policy: Use 25 CFR Part 543, NIGC checklists, and the NIGC surveillance toolkit first for tribal or compact-sensitive
      floor controls, surveillance retention, player tracking, patron deposit accounts, and audit evidence.
    specialty_specific_exceptions:
    - Do not collapse tribal MICS requirements into a commercial-casino answer without recording the jurisdiction and control
      baseline.
  - category: cash, account, and suspicious-activity controls
    retrieval_policy: Use FinCEN casino guidance and IRS W-2G instructions before responding to CTR, SAR-sensitive, identity,
      withholding, or jackpot-tax documentation questions.
    specialty_specific_exceptions:
    - Do not disclose SAR posture, invent patron identity verification, or provide tax advice beyond named documentation requirements
      and escalation triggers.
  - category: self-exclusion and responsible-gaming boundaries
    retrieval_policy: Use official self-exclusion guidance when a request touches excluded patrons, denied gaming privileges,
      or floor-routing obligations for responsible-gaming incidents.
    specialty_specific_exceptions:
    - Do not reinstate or waive self-exclusion or exclusion controls from inside the gaming-floor lane.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant jurisdiction, tribal compact or state rules, shift structure, floor map, payout thresholds, tax-handling
      procedures, and approval chains only through orchestrator-controlled retrieval.
    - Require facility, jurisdiction, game type, patron-account context, and current systems-of-record metadata before applying
      a gaming-floor outcome to a tenant case.
    - Record unresolved ambiguity instead of guessing when state controls, tribal controls, or tenant rules materially change
      the answer.
  specialty_specific_exceptions:
  - Keep the lane focused on gaming-floor execution, patron-facing issue handling, and evidence-backed closure rather than
    cage authority, surveillance investigation, or generic hospitality support.
  - Separate floor handling from AML disposition, tax advice, gaming-rule approval, device configuration, regulator reporting,
    and responsible-gaming exception authority.
  - Do not imply that a floor item is complete solely because one queue or kiosk shows done while surveillance, cage, player-account,
    or accounting records conflict.
  next_review_due_at: '2026-08-08'
