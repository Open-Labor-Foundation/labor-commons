knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Primary gaming regulators and official casino-control standards define the floor workflows, documentation,
      approvals, and authority boundaries for jackpots, fills, player accounts, and floor incidents.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official gaming worksheets, tax instructions, and floor-control toolkits define realistic workflow stages,
      artifact shapes, and named records for gaming-floor execution.
  - class: Evidence or control standards relevant to the lane
    rationale: Official audit, surveillance, AML, and control references constrain what evidence must exist before a payout,
      escalation, or completion record can be treated as audit-ready.
  source_selection_approach: 'Use Nevada Gaming Control Board, National Indian Gaming Commission,

    FinCEN, IRS, and other official gaming-regulator sources before drafting

    workflow claims. Treat tenant jurisdiction, tribal compact terms, property

    controls, shift structure, floor layout, approval matrices, progressive

    vendor interfaces, tax handling procedures, and source-of-record precedence

    as runtime retrieval dependencies that narrow but do not replace the public

    baseline.

    '
  authority_sources:
