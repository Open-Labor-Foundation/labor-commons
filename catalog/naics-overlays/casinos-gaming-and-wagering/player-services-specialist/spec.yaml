  source_categories:
  - category: Player account, wallet, and wagering controls
    retrieval_policy: Use Chapter 69O, Chapter 69N, and Nevada interactive-gaming MICS first when the request concerns registration,
      identity checks, account access, deposits, withdrawals, account statements, wagering restrictions, or wallet status.
    specialty_specific_exceptions:
    - Do not imply that a wallet, withdrawal, or wager status is final unless the player-account ledger, platform status,
      and case notes agree.
    - Do not generalize online or mobile gaming account rules into land-based patron workflows without property and jurisdiction
      context.
  - category: Self-exclusion and responsible-gaming controls
    retrieval_policy: Use Chapter 69G and the AGA Responsible Gaming Code first when the request touches self-exclusion, cooling-off,
      account closure, marketing suppression, or responsible-gaming communication.
    specialty_specific_exceptions:
    - Do not promise reinstatement, exception handling, or marketing reactivation for an excluded or restricted player.
  - category: Patron disputes, complaints, and evidence handling
    retrieval_policy: Use Regulation 7A and Chapter 69N first when the request becomes a documented patron dispute, complaint,
      or house-rule challenge requiring preserved evidence and formal routing.
    specialty_specific_exceptions:
    - Do not resolve a patron dispute as a generic service interaction when dispute forms, logs, or regulator-facing escalation
      criteria are triggered.
  - category: Cash, AML, and suspicious-activity controls
    retrieval_policy: Use FinCEN casino guidance before responding to unusual cash activity, proxy or third-party funding,
      structured withdrawals, or other suspicious-account patterns.
    specialty_specific_exceptions:
    - Do not disclose suspicious-activity posture or continue routine accommodation when AML, fraud, or surveillance indicators
      materially change the next action.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use the authority sources above as the public baseline for casinos, gaming, and wagering player-services operations.
    - Inject tenant-approved house rules, promotion terms, comp matrices, property-system schemas, and jurisdiction-specific
      dispute contacts only through orchestrator-controlled retrieval.
    - Escalate whenever property rules, tribal or state rules, self-exclusion rules, AML controls, or payout handling materially
      change the answer.
  specialty_specific_exceptions:
  - Keep the lane on player-service execution, evidence control, and bounded communication rather than wager adjudication,
    AML disposition, or regulatory interpretation.
  - Do not present player-club or wallet servicing as authority to reactivate excluded players, override wagering restrictions,
    or approve cash exceptions.
  - Do not close player-service work without explicit evidence tying the request, reviewed records, disposition, and next
    owner together.
  next_review_due_at: '2026-10-07'
