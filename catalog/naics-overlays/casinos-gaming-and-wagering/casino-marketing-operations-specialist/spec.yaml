- promotional-finance-and-reconciliation-specialist
- creative-and-brand-approval-specialist
knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Primary gaming regulators and official casino regulations define the advertising, promotional, player-eligibility,
      recordkeeping, and self-exclusion controls that govern whether casino marketing work can proceed.
  - class: Recognized workflow references tied directly to the lane
    rationale: Recognized gaming marketing and responsible-gaming workflow references define how offers, digital channels,
      affiliates, player communications, and review processes must be controlled.
  - class: Evidence or control standards relevant to the lane
    rationale: Official internal-control standards define the documentation, auditability, segregation-of-duties, and patron-account
      evidence thresholds that keep casino marketing execution from becoming unsafe or unauditable.
  source_selection_approach: 'Use gaming regulators and official casino regulations first for advertising

    truthfulness, material conditions, self-exclusion handling, player-club and

    promotional-account controls, patron eligibility, and archive expectations.

    Use recognized public gaming marketing and responsible-gaming references

    only after regulator sources establish the baseline. Tenant jurisdiction

    maps, property approval chains, offer catalogs, host-delegation limits,

    vendor contracts, consent and preference sources, and system-of-record

    precedence remain mandatory runtime inputs and are never guessed.

    '
