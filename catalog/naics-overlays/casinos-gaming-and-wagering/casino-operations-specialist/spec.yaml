knowledge_baseline:
  source_baseline_version: '2026-04-10'
  source_classes:
  - class: Named-industry operating guidance
    rationale: Gaming regulators and published minimum internal-control rules define the records, approvals, lifecycle checks,
      and patron-protection boundaries that govern casino operations work.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official regulator-issued workflow references translate gaming rules into concrete patron-complaint, dispute,
      shift, and floor-execution handling expectations.
  - class: Evidence or control standards relevant to the lane
    rationale: Official internal-control procedures and regulator forms constrain what evidence is sufficient for player-tracking,
      comp, cashless, machine-state, and completion handling.
  source_selection_approach: 'Use regulator-issued tribal and state gaming MICS, internal-control

    procedures, patron-complaint workflows, and self-exclusion materials before

    drafting workflow claims. Treat tenant approved internal controls, TICS or

    SICS, property-specific service models, host and comp matrices, cashless

    products, and system-of-record precedence as runtime retrieval

    dependencies that narrow but do not replace the public baseline.

    '
