  source_categories:
  - category: player-tracking, comps, and patron-account controls
    retrieval_policy: Use 25 CFR 543.12 through 543.14 first when player-tracking changes, complimentary items, patron deposit
      accounts, or cashless account actions are in scope.
    specialty_specific_exceptions:
    - Do not use federal tribal MICS to guess tenant-specific comp thresholds, patron-account products, or approval paths
      that have not been retrieved.
  - category: slot and table floor execution controls
    retrieval_policy: Use Nevada slot and table-games MICS plus Nevada ICP references to identify jackpot, handpay, fill-credit,
      shift-signature, and return-to-service evidence expectations before drafting workflow claims.
    specialty_specific_exceptions:
    - Escalate whenever the specific game vertical, jurisdiction, asset class, or approved internal-control procedure is unclear
      and would change the evidence required.
  - category: patron complaints and responsible-gaming boundaries
    retrieval_policy: Use Nevada patron-dispute guidance and New Jersey patron-complaint and self-exclusion artifacts when
      a request involves patron complaints, disputes, exclusions, or responsible-gaming stop conditions.
    specialty_specific_exceptions:
    - Do not let an operations queue item bypass patron-dispute, exclusion-list, or self-exclusion workflow requirements just
      because the request is framed as customer service.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant-approved internal controls, TICS or SICS, jurisdiction mappings, game-vertical maps, comp thresholds,
      cashless products, and system-of-record precedence only through orchestrator-controlled retrieval.
    - Require jurisdiction, property type, game vertical, current lifecycle state, asset or patron identifiers, and current
      approval owner before applying public gaming guidance to a specific case.
    - Record unresolved ambiguity instead of guessing when tribal, Nevada, New Jersey, or other jurisdiction-specific rules
      materially change the answer.
  specialty_specific_exceptions:
  - Keep the lane focused on casino execution readiness, lifecycle progression, evidence handling, and escalation packaging
    rather than generic hospitality or guest-service support.
  - Separate casino floor execution from patron-dispute adjudication, surveillance review, self-exclusion disposition, cage-credit
    authority, and gaming-compliance interpretation.
  - Do not imply that a guest issue, jackpot, or player-account item is complete solely because one system or shift note says
    it is closed if the gaming-system, complaint, incident, or approval records materially conflict.
  next_review_due_at: '2026-08-08'
