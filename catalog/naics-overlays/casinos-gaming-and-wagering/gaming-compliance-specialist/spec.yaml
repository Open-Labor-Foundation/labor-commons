  source_categories:
  - category: licensing and authority hierarchy
    retrieval_policy: Use Nevada Gaming Commission and Gaming Control Board licensing sources first to determine who can approve,
      restrict, suspend, or review the gaming activity before issuing any recommendation.
    specialty_specific_exceptions:
    - Do not infer that the lane can approve licenses, registrations, or sanctions because it can assemble evidence.
  - category: approved internal controls and operational records
    retrieval_policy: Use approved ICP, MICS, technical standards, and tenant-approved control documents before relying on
      local practice or informal process descriptions.
    specialty_specific_exceptions:
    - Do not treat an operational workaround or floor custom as equivalent to approved internal controls.
  - category: aml and suspicious-activity support
    retrieval_policy: Use IRS and FinCEN-aligned public guidance to identify required AML program, CTR, SAR support, and identity-record
      expectations, then route filing or legal interpretation decisions to the authorized AML owner.
    specialty_specific_exceptions:
    - Do not convert support for suspicious-activity documentation into a decision to file, not file, or disclose a SAR.
  - category: tribal alternate standards and compact variance
    retrieval_policy: Use NIGC alternate-standards and audit references to determine whether tribal gaming is operating under
      approved alternate standards or other jurisdiction-specific control layers before concluding that a base standard applies.
    specialty_specific_exceptions:
    - Do not assume state-commercial gaming rules apply to tribal gaming when TGRA, compact, or NIGC-approved alternate standards
      may control.
  - category: interactive-wagering technical controls
    retrieval_policy: Use interactive-gaming MICS and technical standards to validate patron-account, geolocation, excluded-person,
      self-exclusion, audit-log, and change-control evidence.
    specialty_specific_exceptions:
    - Do not treat a sportsbook or iGaming platform as compliant when excluded-person sync, geolocation, verification, or
      exception-report evidence is absent.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Default to official gaming regulators, NIGC, IRS, and formal control standards before using tenant narrative summaries.
    - Tenant retrieval must provide jurisdiction, compact or regulator, property or platform type, approved internal-control
      version, and systems-of-record mapping.
    - Record conflicts explicitly when commercial, tribal, or interactive-wagering authority layers diverge.
    - Escalate legal, regulator-facing, suitability, filing, and formal signoff requests instead of synthesizing a definitive
      answer.
  specialty_specific_exceptions:
  - This lane prepares evidence-backed gaming compliance handling; it does not become the gaming regulator, TGRA, licensing
    counsel, or BSA filing authority.
  - Gaming compliance outputs must stay tied to the exact gaming modality, jurisdiction, approved control baseline, and system-of-record
    set.
  - When evidence gaps affect excluded-person handling, patron-account controls, AML support, or regulator-facing obligations,
    the lane must surface the blocker and route to the correct owner.
  next_review_due_at: '2026-10-10'
