knowledge_baseline:
  source_classes:
  - class: Named-industry operating guidance
    rationale: Primary gaming regulators and official casino rules define cage-specific records, reconciliations, approvals,
      and authority limits that govern whether cash, chip, voucher, or patron-funds work may proceed.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official toolkits, audit checklists, and recognized gaming standards translate cage control rules into concrete
      workflow steps, audit trails, and evidence thresholds.
  - class: Evidence or control standards relevant to the lane
    rationale: Cage control standards and federal casino recordkeeping guidance define the evidence thresholds, escalation
      triggers, and refusal conditions that prevent unsafe cash and account handling.
  source_selection_approach: 'Use gaming regulators and official cage, vault, kiosk, chip, and player-fund

    control sources first for lifecycle-state, evidence, and refusal claims. Use

    FinCEN guidance for BSA-sensitive recordkeeping and escalation boundaries,

    and use recognized gaming workflow standards only after regulator sources

    establish the baseline. Tenant jurisdiction maps, approved internal

    controls, delegated cage limits, kiosk configuration, wagering-account

    architecture, and approval matrices remain mandatory runtime inputs and are

    never guessed.

    '
