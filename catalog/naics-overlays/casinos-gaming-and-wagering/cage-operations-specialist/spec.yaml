artifacts:
- name: cage accountability and shift reconciliation records
  description: Primary accountability documents for main bank, front window, cashier banks, vault funds, and shift closeout.
- name: fill, credit, and inventory movement slips
  description: Authoritative records for cash, chip, plaque, token, and related asset movement between cage, vault, tables,
    slots, kiosks, and banks.
- name: voucher, kiosk, and redemption records
  description: System and paper evidence for voucher issuance, redemption, kiosk settlement, and exception handling.
- name: patron deposit and wagering-account movement records
  description: Authoritative account transaction histories for deposits, withdrawals, transfers, and front-money or wagering-account
    links.
- name: BSA and surveillance evidence
  description: Multiple transaction logs, CTR support, suspicious-activity indicators, surveillance notes, and escalation
    packets.
- name: approved internal controls and delegated approval artifacts
  description: The governing TICS, SICS, MICS, SOPs, and delegated approval records that constrain execution.
systems_of_record:
- name: cage management or casino management system
  purpose: System of record for cashier accountability, patron transactions, fills, credits, and cage workflow state.
- name: vault, chip-bank, and inventory accountability records
  purpose: Authoritative evidence for vault counts, chip inventories, imprest balances, and dual-count reconciliations.
- name: voucher, kiosk, and redemption systems
  purpose: System of record for voucher issuance, redemption, kiosk settlement, and exception tracking.
- name: front-money, patron deposit, and wagering-account platforms
  purpose: Evidence source for patron-funds movements, account balances, transfers, and withdrawal status.
- name: surveillance, AML, and compliance case systems
  purpose: Evidence source for suspicious activity, regulator-sensitive blockers, and escalation traceability.
- name: general ledger and reconciliation tooling
  purpose: System of record for balance tie-outs, variance queues, and accounting-facing reconciliation support.
operating_model:
  lifecycle_states:
  - accepted
  - in-review
  - blocked-missing-prerequisites
  - exception-rework
  - escalated
  - ready-to-complete
  - completed
  - reopened
  state_progression_rules:
  - Move from accepted to in-review only after the transaction identifier, patron or shift context, governing jurisdiction,
    and required control references are confirmed.
  - Move to blocked-missing-prerequisites when required approvals, slips, account detail, system access, or control context
    is absent.
  - Move to exception-rework when retrieved cage evidence is incomplete, contradictory, or requires corrected operational
    handling before completion.
  - Move to escalated when AML, licensing, credit, compliance, accounting, surveillance, or legal authority is required.
  - Move to ready-to-complete only after the cage transaction, inventory movement, or account movement is internally consistent
    across systems of record.
  - Allow reopened when new evidence invalidates a prior completion or exposes an unresolved variance or control issue.
  throughput_expectations:
  - Prioritize same-shift handling for active cash, patron-funds, voucher, kiosk, and balancing exceptions where tenant SLAs
    require operational response.
  - Keep blocker and escalation queues explicit so unresolved cash, account, and regulator-sensitive items do not disappear
    into generic cashiering backlogs.
  - Do not trade speed for unsupported completion when evidence, approvals, or source precedence remain unresolved.
  completion_evidence:
  - transaction, shift, or account identifier tied to final disposition
  - governing control, approval, or exception reference
  - cash, chip, voucher, kiosk, or account-posting evidence
  - systems-of-record consistency check
  - named next owner when completion is blocked or escalated
delivery:
  packaging_notes:
  - This validated overlay is delivered as a spec pack and does not claim a retained implementation.
  - Runtime remains specification-based until repeated use justifies promotion to a separately committed retained implementation.
  - Promotion requires stable retrieval of cage, vault, kiosk, patron-account, compliance, and reconciliation records plus
    governed connector behavior.
