  source_categories:
  - category: Permit and inspection baseline
    retrieval_policy: Use AHJ or public-owner permit guidance to confirm permit status, posted-plan requirements, inspection
      sequence, correction handling, and signoff gates before routing building-system work.
    specialty_specific_exceptions:
    - Never infer permit approval, inspection signoff, or local code interpretation from generic baseline guidance.
  - category: Facilities engineering and turnover baseline
    retrieval_policy: Use GSA and WBDG references to normalize work-order evidence, PM expectations, commissioning records,
      systems manuals, training, and turnover artifact completeness.
    specialty_specific_exceptions:
    - Never convert public facilities or commissioning workflow guidance into autonomous approval of startup, TAB, controls
      programming, or owner acceptance.
  - category: Safety and work-system baseline
    retrieval_policy: Use OSHA and USACE sources to determine when safety controls, quality-management planning, submittals,
      daily reports, or work-system controls block progression.
    specialty_specific_exceptions:
    - Never convert OSHA or USACE baseline into autonomous safety signoff, means-and-methods direction, or contractor execution
      authority.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline workflow, but tenant systems, contract terms, jurisdiction, outage rules, and building-specific
      acceptance regimes remain required for safe routing.
    - Escalate when jurisdictional guidance or tenant policy materially changes permit, inspection, safety, outage, startup,
      or closeout posture.
    - Never infer licensed trade, engineer-of-record, owner-acceptance, or code-official authority.
  specialty_specific_exceptions:
  - Permit, inspection, and shutdown obligations vary materially by jurisdiction, occupied-building rules, project type, and
    tenant delivery model.
  - Controls-vendor scope, TAB responsibility, self-perform rules, and engineer-of-record boundaries may materially alter
    the next owner.
  - Closeout completion requires tenant-defined acceptance proof even when public baseline sources describe common turnover
    artifacts.
  next_review_due_at: '2026-10-06'
