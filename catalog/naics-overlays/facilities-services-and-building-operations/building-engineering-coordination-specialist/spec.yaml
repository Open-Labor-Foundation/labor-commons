- controls-specialist
- engineer-of-record-specialist
knowledge_baseline:
  source_baseline_version: '2026-04-08'
  source_classes:
  - class: Public permitting, inspection, or field-service guidance
    rationale: Official building-department guidance defines permit-holder duties, approved-plan availability, inspection
      sequencing, objection handling, and completion gates that govern this lane.
  - class: Site-safety or closeout workflow references
    rationale: OSHA construction rules and recognized public commissioning and turnover references define stop-work conditions,
      systems documentation expectations, deficiency handling, and closeout blockers.
  - class: Scheduling, subcontractor, or work-order operating standards
    rationale: Official or recognized public facilities and construction-administration references define PM and work-order
      evidence, coordination meetings, schedule integration, submittals, startup planning, and work-system handling.
  source_selection_approach: 'Use OSHA sources for construction safety and stop-work boundary handling,

    official AHJ guidance for permit and inspection gating, GSA facilities

    operations references for building-service contract and preventive

    maintenance evidence expectations, WBDG commissioning references for

    systems coordination and turnover artifacts, and official USACE

    construction-quality-management references for submittal, daily-report,

    schedule, and work-system handling. Treat tenant CMMS, PMIS, permitting,

    inspection, safety, controls, and document-control systems as the

    operational truth set only after the tenant names them explicitly. Do not

    infer permit approval, code interpretation, engineer-of-record authority,

    or licensed trade authority from the public baseline.

    '
