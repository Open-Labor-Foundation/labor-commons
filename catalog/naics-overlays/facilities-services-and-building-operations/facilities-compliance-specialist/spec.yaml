    publisher: Occupational Safety and Health Administration
    source_type: regulatory-standard
    location: https://www.osha.gov/laws-regs/regulations/standardnumber/1926/1926.20
    authority_reason: OSHA publishes the controlling federal construction safety standard requiring accident-prevention programs
      and frequent site, materials, and equipment inspections that can change whether facilities work may proceed.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 120
    decay_policy: review_required_after_interval
    status: active
