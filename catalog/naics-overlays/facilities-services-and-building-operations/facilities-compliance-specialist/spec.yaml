    location: https://www.wbdg.org/FFC/NAVFAC/NDBM/UFGS/01_78_00.pdf
    authority_reason: This recognized federal closeout standard is authoritative for as-builts, O&M manuals, warranties, training,
      and turnover artifacts that facilities compliance must verify before representing work as complete.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: Permit and inspection baseline
    retrieval_policy: Use AHJ permit and sign-off guidance to confirm permit status, approved-plan requirements, inspection
      sequence, correction handling, and completion gates before any compliance completion claim.
    specialty_specific_exceptions:
    - Never infer permit approval, final sign-off, or code interpretation from generic baseline guidance.
  - category: Facilities operations and contractor evidence baseline
    retrieval_policy: Use GSA facilities operations references to normalize work-order records, response classes, contractor
      qualification records, impairment coordination, and report timing.
    specialty_specific_exceptions:
    - Never convert federal public-owner workflow references into tenant-specific approval authority or universal service-level
      commitments.
  - category: Submittal and closeout baseline
    retrieval_policy: Use WBDG UFGS references to identify approved submittal states, as-built requirements, O&M manuals,
      training, warranties, and other turnover evidence.
    specialty_specific_exceptions:
    - Never mark closeout complete unless tenant acceptance and jurisdictional sign-off conditions are explicit.
  - category: Safety and responsibility-boundary baseline
    retrieval_policy: Use OSHA standards and enforcement guidance to identify when unsafe conditions, contractor-role disputes,
      or hazardous-energy controls block progression or require escalation.
    specialty_specific_exceptions:
    - Never convert OSHA baseline into autonomous safety release, legal adjudication, or means-and-methods direction.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline workflow, but tenant CMMS, permitting, inspection, safety, and document-control systems
      remain required before case-specific output is safe.
    - Permit and inspection requirements vary materially by jurisdiction, facility type, and impairment class, so runtime
      must retrieve local context before a completion-sensitive answer.
    - Maintenance-versus-construction delivery model affects which OSHA baseline is primary; runtime must preserve that distinction
      instead of flattening it.
    - Never infer AHJ approval, legal interpretation, code interpretation, licensed trade signoff, or final acceptance from
      public baseline sources alone.
  specialty_specific_exceptions:
  - Jurisdiction-specific permit names, inspection checkpoints, and sign-off packages vary materially by AHJ and by occupied-building
    policy.
  - Life-safety impairments, shutdown approvals, insurer requirements, and customer-site access rules can add tenant-specific
    controls beyond the public baseline.
  - Some work orders move under construction, prevailing-wage, or licensed-trade rules that the runtime must retrieve before
    determining the right owner.
  next_review_due_at: '2026-10-07'
