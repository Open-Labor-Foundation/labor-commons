  source_categories:
  - category: bank-fintech and embedded-finance onboarding posture
    retrieval_policy: Use interagency third-party guidance and the joint fintech due-diligence guide before asserting sponsor-bank,
      program-manager, processor, or partner onboarding workflow claims.
    specialty_specific_exceptions:
    - Do not infer sponsor-bank approval or third-party due-diligence sufficiency from a commercial contract summary alone.
    - Escalate when the tenant cannot identify whether onboarding applies to a customer, merchant, fintech partner, distributor,
      or delegated operator.
  - category: identity, CIP, KYB, and beneficial-ownership workflow
    retrieval_policy: Use FFIEC CIP and FinCEN CDD guidance before proceeding on identity, customer notice, legal-entity onboarding,
      or beneficial-ownership sufficiency.
    specialty_specific_exceptions:
    - Do not treat vendor pass or document upload status as enough when required case state, customer notice, or owner verification
      evidence is missing.
    - Do not generalize FinCEN relief into a universal rule; tenant institution type and sponsor-bank policy can narrow the
      baseline.
  - category: credentialing, access, and sanctions controls
    retrieval_policy: Use NIST identity standards and OFAC control guidance for MFA, authenticator lifecycle, role grants,
      access recovery, and sanctions-screening readiness.
    specialty_specific_exceptions:
    - Do not green-light access when tenant approval chains or stronger tenant controls narrow the public baseline.
    - Do not clear sanctions-sensitive or suspicious-activity issues inside this lane.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Use interagency banking guidance, FFIEC, FinCEN, NIST, and OFAC sources as the public baseline for fintech onboarding
      records, terminology, and control expectations.
    - Inject tenant-specific product terms, sponsor-bank playbooks, processor boarding rules, disclosure sets, settlement
      configuration, and approval matrices only through orchestrator-controlled retrieval.
    - Escalate when product type, jurisdiction, licensing posture, or owner mapping materially narrows the public baseline.
  specialty_specific_exceptions:
  - Keep the lane on readiness validation, evidence discipline, and handoff packaging rather than legal interpretation, fraud
    review, AML adjudication, underwriting, or sponsor-bank approval.
  - Do not mark onboarding complete merely because a KYC or KYB vendor returned pass if sponsor-bank approval, settlement
    setup, access controls, or launch evidence are still open.
  - Do not assume the bank, fintech, processor, or vendor owns a given onboarding step unless the tenant owner map is explicitly
    retrieved.
  next_review_due_at: '2026-07-10'
