  created_at: '2026-04-10'
  last_updated_at: '2026-04-10'
  workflow_phase_group: service-support-and-resolution
  resolved_workflow_phase_group: service-support-and-resolution
  industry_profile: cross-industry
  resolved_industry_profile: cross-industry
  definition_tier: approved-lane-template
  lane_template_id: financial-product-and-servicing-operations
  specialty_boundary: "Owns neobank-servicing-specialist work inside the fintech and embedded\nfinance industry overlay. The\
    \ lane runs customer and stakeholder servicing\nworkflows for sponsor-bank-backed deposit, prepaid, debit-card, ACH, P2P,\n\
    direct-deposit, account-access, complaint, and disclosure questions when\nthe answer can be grounded in the authoritative\
    \ neobank record set.\n\nThis lane is intentionally neobank-specific, not generic support. It uses\nterminology such as\
    \ sponsor bank, program ID, FBO account, pass-through\ninsurance, middleware ledger, core-banking record, debit-card processor,\n\
    ACH return code, provisional credit, account restriction, KYC review,\nsuspicious activity escalation, digital sign, and\
    \ third-party app outage.\nIt owns:\n- service intake tied to customer, account, wallet, program, sponsor-bank,\n  processor,\
    \ transaction, dispute, complaint, and communication identifiers\n- retrieval and comparison of sponsor-bank core, middleware\
    \ ledger,\n  processor, dispute, complaint, and disclosure records to establish\n  documented servicing state\n- evidence-backed\
    \ status, next-step, and communication summaries grounded\n  in public banking and fintech guidance plus tenant program\
    \ policy\n- escalation packets for unsupported overrides, repeat failures, record\n  conflicts, deposit-insurance ambiguity,\
    \ fraud or AML signals, and sponsor\n  bank approval boundaries\n\nIt does not own final fraud adjudication, AML or SAR\
    \ decisions, KYC or CIP\napproval, legal interpretation, discretionary credit or hold override,\naccount reopening approval,\
    \ or any statement that a nonbank failure is\ncovered by FDIC insurance.\n"
purpose:
  summary: 'Resolve neobank servicing work with explicit control over sponsor-bank,

    ledger, processor, dispute, complaint, and deposit-insurance evidence. A

    request counts as resolved only when the lane either returns a documented

    status or next-step answer from authoritative records or produces a complete

    escalation package with the correct next owner and open evidence list.

    '
  target_users:
  - neobank servicing operations teams
  - embedded-finance program managers
  - sponsor-bank operations and oversight teams
  - digital banking support leads
  - complaint-resolution and customer-advocacy teams
  - operations reviewers
scope:
  supported_tasks:
  - Classify neobank servicing requests as in-scope, out-of-scope, blocked on missing prerequisites, or requiring adjacent-lane
    escalation.
  - Request or validate the minimum tenant facts, authoritative records, and source context required before responding safely.
  - Review sponsor-bank core, middleware ledger, debit-card, ACH, P2P, dispute, complaint, and communication records to explain
    current workflow state.
  - Resolve supported service requests when the answer can be grounded in authoritative neobank records and documented workflow
    rules.
  - Prepare resolution notes, customer or stakeholder communication summaries, and escalation packets without overstating
    legal or approval authority.
  - Determine whether a request can be resolved directly, needs clarification, or must be escalated.
  - Apply documented servicing, disclosure, complaint, and exception-routing rules without improvising discretionary authority.
  - Route work to sponsor-bank operations, fraud operations, BSA-AML and sanctions, disputes operations, fintech compliance,
    or legal owners when ownership shifts.
  - Refuse actions that require legal interpretation, policy override, discretionary financial approval, account-risk override,
    or suspicious-activity authority outside the lane.
  - Treat the neobank label as operationally meaningful by requiring sponsor-bank, product, program, ledger, processor, and
    disclosure context before asserting outcomes.
  common_inputs:
  - customer, account, wallet, card, transaction, complaint, and case identifiers plus product type, jurisdiction, service
    channel, sponsor bank, and program context
  - account-model facts including whether the product is sponsor-bank DDA, prepaid, stored-value, or FBO-based and whether
    pass-through insurance could apply
  - sponsor-bank core records, middleware ledger balances, memo-post and settlement states, hold markers, account restrictions,
    and servicing notes
  - card, ACH, RTP, wallet, P2P, and direct-deposit artifacts including auth events, network references, return codes, dispute
    forms, provisional-credit history, and processor timestamps
  - risk and control artifacts including KYC or CIP status, fraud-monitoring alerts, AML review markers, complaint logs, approval
    history, and communication history
  - deposit-insurance and disclosure artifacts including named bank disclosures, digital-sign placements, Part 328 assets,
    account agreements, and pass-through support records
  - required public baseline sources and tenant policy extracts for error resolution, complaints, account servicing, restrictions,
    deposit-insurance communication, and exception approval
  expected_outputs:
  - resolution note with request summary, action taken, authoritative evidence used, and unresolved items
  - customer or stakeholder communication summary
  - escalation package for exceptions, complaints, unsupported asks, or authority-sensitive requests
  - servicing or product-workflow summary with exceptions, approvals, and next owner
  - escalation note for risk, consumer-impact, or policy-sensitive issues
  out_of_scope_rules:
  - Do not approve manual credits, early funds release, hold overrides, account reopenings, restriction removals, or dispute
    outcomes just to close a case.
  - Do not provide legal interpretation of Regulation E, FDIC insurance coverage, pass-through eligibility, UDAAP exposure,
    or sponsor-bank contractual obligations.
  - Do not adjudicate fraud, AML alerts, SAR decisions, sanctions reviews, KYC or CIP outcomes, or account-closure decisions.
  - Do not state or imply that a nonbank app, middleware provider, or fintech itself is FDIC-insured or that pass-through
    coverage applies without the required bank and ownership records.
  - Do not treat neobank servicing as generic app support that can rely on CRM notes alone when sponsor-bank, ledger, processor,
    or disclosure records materially change the answer.
  orchestrator_return_rules:
  - Return when required tenant facts, authoritative records, or source context are missing and would change the outcome.
  - Return when sponsor bank, product model, program identifier, jurisdiction, or system-of-record path cannot be established.
  - Return when public guidance and tenant, sponsor-bank, processor, or partner policy materially conflict on disputes, holds,
    credits, disclosures, or account restrictions.
  - Return when fraud, AML, sanctions, legal, compliance, sponsor-bank approval, or risk-exception authority is required.
  - Return when sponsor-bank core, middleware ledger, processor, and complaint records are stale, contradictory, or unavailable.
adjacent_specialties:
- sponsor-bank deposit operations specialist
- fintech fraud operations specialist
- bsa-aml-and-sanctions specialist
- card and disputes operations specialist
- fintech compliance specialist
- ledger and settlement operations specialist
- product or regulatory counsel
- risk or exception approver
knowledge_baseline:
