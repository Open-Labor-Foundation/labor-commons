  source_categories:
  - category: Sponsor-bank and third-party deposit arrangement governance
    retrieval_policy: Use interagency third-party risk, fintech due diligence, and third-party deposit-arrangement guidance
      first when the request depends on sponsor-bank relationships, third-party servicing, MIS ownership, or program governance.
    specialty_specific_exceptions:
    - Do not treat a neobank or fintech app as the same thing as the insured bank without named-bank evidence.
    - Escalate when the product model, sponsor-bank role, or direct-versus-third-party record ownership is unclear.
  - category: Electronic fund transfer, prepaid, and outsourced dispute workflow
    retrieval_policy: Use CFPB Regulation E FAQs, 12 CFR 1005.11, and FDIC supervisory observations before stating dispute
      timing, provisional-credit posture, or non-bank provider obligations.
    specialty_specific_exceptions:
    - Do not convert private processor or network rules into narrower consumer rights than Regulation E permits.
    - Do not close an EFT dispute because a third-party processor auto-denied the claim without a documented investigation.
  - category: Deposit insurance, pass-through, and digital disclosure control
    retrieval_policy: Use FDIC third-party app guidance, Part 328 Q&As, and pass-through coverage rules when the request involves
      insured-status statements, digital signs, FBO records, or bank-failure communication.
    specialty_specific_exceptions:
    - Do not state or imply that fintech insolvency is covered by FDIC insurance.
    - Do not represent pass-through coverage unless the named-bank, fiduciary, and beneficial-owner records are available.
  - category: Suspicious-activity and ACH fraud boundary handling
    retrieval_policy: Use FinCEN and Nacha guidance when the case includes suspicious-activity evidence, false-pretense ACH
      patterns, fraud monitoring, or requests to disclose sensitive investigative posture.
    specialty_specific_exceptions:
    - Do not disclose SAR posture or suspicious-activity evidence outside permitted handoff paths.
    - Do not promise account release or transfer completion when fraud or AML review is still active.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Inject tenant program agreements, sponsor-bank procedures, processor rulebooks, product-specific disclosures, approval
      matrices, and complaint templates only through orchestrator-controlled retrieval.
    - Require sponsor-bank, program, product-model, jurisdiction, and system-of-record context before applying account-specific
      outcomes.
    - Escalate when public baseline and tenant or sponsor-bank policy materially disagree on what may be communicated, credited,
      released, or disclosed.
  specialty_specific_exceptions:
  - Keep the lane on neobank servicing, evidence review, communication, and escalation packaging rather than final bank-risk
    or legal authority.
  - Do not let app UX or CRM notes override sponsor-bank core, ledger, processor, or disclosure records.
  - Do not reduce the lane to generic support phrasing that omits sponsor-bank, pass-through, processor, or dispute-state
    dependencies.
  next_review_due_at: '2026-07-09'
