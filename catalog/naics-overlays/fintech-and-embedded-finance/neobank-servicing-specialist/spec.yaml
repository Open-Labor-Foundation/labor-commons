  source_classes:
  - class: Named-industry operating guidance
    rationale: Neobank servicing depends on sponsor-bank, third-party deposit, and bank-fintech operating guidance that is
      more specific than generic customer support rules.
  - class: Recognized workflow references tied directly to the lane
    rationale: Official Regulation E, prepaid, dispute, and outsourced-servicing references define workflow stages, evidence
      expectations, and response limits.
  - class: Evidence or control standards relevant to the lane
    rationale: Deposit-insurance, suspicious-activity, and ACH risk-control references define what records and controls must
      exist before the lane can communicate safely.
  source_selection_approach: 'Use interagency bank-fintech and third-party deposit guidance, CFPB

    Regulation E resources, FDIC deposit-insurance guidance, FinCEN suspicious

    activity evidence rules, and Nacha risk-management guidance before drafting

    servicing or exception claims. Treat tenant program agreements, sponsor-bank

    procedures, processor rules, dispute SLAs, account agreements, approval

    matrices, and communication templates as runtime retrieval dependencies that

    narrow but do not replace the public baseline.

    '
