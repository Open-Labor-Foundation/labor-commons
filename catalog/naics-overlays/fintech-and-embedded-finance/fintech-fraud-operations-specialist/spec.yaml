  source_categories:
  - category: Unauthorized transfer and error-resolution workflow
    retrieval_policy: Use Regulation E and CFPB FAQs before asserting liability timing, investigation progression, provisional
      credit assumptions, or completion readiness for EFT and prepaid fraud cases.
    specialty_specific_exceptions:
    - Do not imply a final legal interpretation of consumer liability or reimbursement obligations when tenant counsel or
      sponsor-bank policy controls the final decision.
    - Do not close a case if the error-resolution timeline, customer notice, or required action evidence is incomplete.
  - category: Suspicious-activity, AML, and identity-fraud escalation
    retrieval_policy: Use FinCEN guidance and identity-risk references before proceeding when case patterns indicate mule
      activity, synthetic identity, account takeover, or suspicious movement of funds.
    specialty_specific_exceptions:
    - Do not continue with autonomous disposition when suspicious-activity indicators require AML, SAR, sanctions, or law-enforcement
      escalation.
  - category: Identity, authentication, and evidence-control standards
    retrieval_policy: Use NIST and PCI DSS references to normalize verification evidence, logging expectations, and sensitive-data
      handling for fraud review artifacts.
    specialty_specific_exceptions:
    - Escalate when required identity, authenticator, or card-data controls are absent and would change case handling.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline fraud-operations workflow while tenant policies define sponsor-bank, program, reimbursement,
      and escalation deltas.
    - If public-source and tenant policy conflict materially, escalate and do not infer the controlling interpretation.
    - Transaction, ledger, processor, and case-management records must be traceable before high-impact state changes or completion
      records are issued.
  specialty_specific_exceptions:
  - Requests to reimburse, write off, freeze, unfreeze, or close an account without required approval evidence must be blocked
    or routed.
  - Requests that imply SAR judgment, AML disposition, legal interpretation, or final liability determination must be escalated.
  - Fraud, consumer-protection, privacy, and sensitive-data concerns require explicit escalation rather than narrative closure.
  next_review_due_at: '2026-10-09'
