    publisher: Consumer Financial Protection Bureau
    source_type: named-industry-operating-guidance
    location: https://www.consumerfinance.gov/compliance/compliance-resources/deposit-accounts-resources/electronic-fund-transfers/electronic-fund-transfers-faqs/
    authority_reason: Official CFPB operating guidance clarifying how Regulation E applies to digital wallets, P2P transfers,
      prepaid accounts, and other fintech servicing contexts where product structure changes workflow expectations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 60
    decay_policy: review_required_after_interval
    status: active
  - source_id: cfpb-efta-exam-procedures
