    authority_reason: Official CFPB examination manual describing operational records, testing expectations, transaction samples,
      complaint handling, and control evidence relevant to EFT servicing workflows.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: interagency-third-party-risk-2023
