    publisher: Consumer Financial Protection Bureau, eCFR
    source_type: recognized-workflow-reference
    location: https://www.ecfr.gov/current/title-12/chapter-X/part-1005
    authority_reason: Primary U.S. regulation governing electronic fund transfer disclosures, error resolution, unauthorized-transfer
      handling, and consumer-notice timing that directly constrains fintech servicing and fulfillment operations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: cfpb-eft-faqs
