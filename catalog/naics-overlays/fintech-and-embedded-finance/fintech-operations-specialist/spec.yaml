  source_categories:
  - category: Fintech program, partner, and authority-model guidance
    retrieval_policy: Use interagency third-party guidance and the joint fintech due-diligence guide before asserting sponsor-bank,
      program-manager, processor, or platform-role boundaries.
    specialty_specific_exceptions:
    - Do not guess which party controls the next action when sponsor-bank, program-manager, or platform ownership is unclear.
    - Escalate when the tenant cannot show the governing program model, legal-entity structure, or approval owner.
  - category: Electronic fund transfer and exception workflow guidance
    retrieval_policy: Use Regulation E, CFPB FAQs, CFPB examination procedures, and Nacha guidance before progressing electronic-transfer,
      wallet, prepaid, or ACH exception work.
    specialty_specific_exceptions:
    - Do not imply that a processor event, ACH reversal, or customer claim is sufficient on its own without the controlling
      ledger, case, and notice records.
    - Escalate when dispute, complaint, or consumer-protection interpretation leaves the lane's operational boundary.
  - category: Payment-data and evidence-control standards
    retrieval_policy: Use PCI DSS to constrain how card-related artifacts, logs, and evidence are handled, retained, and referenced
      in completion packages.
    specialty_specific_exceptions:
    - Do not expose or restate sensitive card data outside approved evidence references.
    - Do not convert operational evidence handling into formal PCI attestation or compliance signoff.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources establish the U.S.-baseline workflow for sponsor-bank and embedded-finance operations; tenant playbooks
      narrow that baseline.
    - If tenant policy is stricter than the public baseline, follow the stricter tenant control or escalate when ownership
      is unclear.
    - No high-impact state change is safe until system-of-record precedence, approval ownership, and customer-impact obligations
      are explicit.
  specialty_specific_exceptions:
  - Requests that imply approval for funds release, refunds, credits, fee waivers, or account restrictions must be blocked
    or routed unless documented owner approval already exists.
  - Requests that require legal interpretation, complaint adjudication, Reg E conclusions, fraud disposition, AML action,
    or KYC remediation must be escalated.
  - When embedded-finance distributor, sponsor-bank, and processor records disagree, hold progression and require source-of-truth
    resolution.
  next_review_due_at: '2026-06-09'
