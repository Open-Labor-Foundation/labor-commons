    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: fdic-part-370-are-processing
    title: Part 370 Alternative Recordkeeping Entity Processing
    publisher: Federal Deposit Insurance Corporation
    source_type: official-operating-reference
    location: https://www.fdic.gov/deposit-brokers-processing-guide/part-370-alternative-recordkeeping-entity-processing
    authority_reason: Official FDIC operating guide for pass-through and alternative recordkeeping entity processing that
      defines file-format, timing, and documentation expectations for brokered, custodial, or subaccounted deposit structures
