    publisher: PCI Security Standards Council
    source_type: recognized-standard-organization
    location: https://www.pcisecuritystandards.org/standards/pci-dss/
    authority_reason: Recognized payment-card control standard defining baseline technical and operational requirements for
      entities involved in payment card processing, including processors, issuers, service providers, and integrators handling
      card data.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 365
    decay_policy: review_required_after_interval
    status: active
  source_categories:
  - category: named-industry operating guidance
    retrieval_policy: Use interagency third-party risk guidance, the joint fintech due-diligence guide, the 2024 joint deposit-products
      statement, and current FDIC custodial-account policy sources before drafting claims about program ownership, bank responsibility,
      partner oversight, or embedded-finance operating boundaries.
    specialty_specific_exceptions:
    - Do not infer sponsor-bank, processor, program-manager, or ledger ownership from marketing descriptions or contract summaries
      alone.
    - Escalate when the tenant cannot show which legal entity, bank partner, FBO or custodial structure, or funding account
      actually governs the workflow.
  - category: recognized workflow references tied directly to the lane
    retrieval_policy: Use CFPB electronic-fund-transfer guidance plus Federal Reserve ACH schedule and FAQ resources when
      charge intake, posting, return, reversal, dispute, or settlement-window questions are in scope.
    specialty_specific_exceptions:
    - Do not post, reverse, or reconcile ACH activity when the effective-entry-date, return path, settlement window, or transaction
      identifiers are missing.
    - Do not collapse card, ACH, wallet, and custodial-account timing rules into one generic workflow.
  - category: evidence or control standards relevant to the lane
    retrieval_policy: Use FDIC Part 370 sources and PCI DSS to define record completeness, file-format expectations, evidence
      retention, and payment-data handling controls before concluding that an embedded-finance integration is financially
      or operationally ready.
    specialty_specific_exceptions:
    - Do not certify deposit-insurance readiness, third-party recordkeeping sufficiency, or payment-card control sufficiency
      inside this lane.
    - Do not treat processor reports as enough evidence when beneficial-owner, subaccount, statement, or ledger-level truth
      is still incomplete.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-07-09'
