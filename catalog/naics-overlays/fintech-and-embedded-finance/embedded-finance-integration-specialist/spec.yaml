knowledge_baseline:
  authority_sources:
  - source_id: interagency-third-party-risk-2023
    title: 'Interagency Guidance on Third-Party Relationships: Risk Management'
    publisher: Board of Governors of the Federal Reserve System, FDIC, and OCC
    source_type: primary-regulatory-guidance
    location: https://www.federalreserve.gov/frrs/guidance/interagency-guidance-on-third-party-relationships.htm
    authority_reason: Primary interagency banking guidance defining the lifecycle, documentation, independent review, monitoring,
      and escalation expectations for bank-third-party relationships that underpin embedded-finance integrations.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: joint-fintech-dd-guide-2021
    title: 'Conducting Due Diligence on Financial Technology Companies: A Guide for Community Banks'
    publisher: Board of Governors of the Federal Reserve System, FDIC, and OCC
    source_type: official-guidance
    location: https://www.fdic.gov/resources/bankers/fintech/guide-introduction/
    authority_reason: Joint banking-agency operating guidance that identifies the due-diligence domains, evidence, controls,
      and dependency checks banks expect when partnering with fintech platforms and embedded-finance intermediaries.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: joint-bank-third-party-deposit-products-2024
    title: Joint Statement on Banks’ Arrangements with Third Parties to Deliver Bank Deposit Products and Services
    publisher: FDIC, Board of Governors of the Federal Reserve System, and OCC
    source_type: official-guidance
    location: https://www.fdic.gov/news/financial-institution-letters/2024/agencies-issue-statement-bank-arrangements-third-parties
    authority_reason: Current interagency statement focused on bank-third-party arrangements delivering deposit products and
      services, clarifying that the bank remains responsible and that these arrangements carry distinctive operational, compliance,
      and recordkeeping risks.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: cfpb-electronic-fund-transfers-faqs
    title: Electronic Fund Transfers FAQs
    publisher: Consumer Financial Protection Bureau
    source_type: official-regulatory-faq
    location: https://www.consumerfinance.gov/compliance/compliance-resources/deposit-accounts-resources/electronic-fund-transfers/electronic-fund-transfers-faqs/
    authority_reason: Official CFPB guidance for Regulation E coverage and error-resolution handling, including when non-bank
      P2P or wallet providers are treated as financial institutions and how unauthorized transfers must be handled.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 180
    decay_policy: review_required_after_interval
    status: active
  - source_id: fedach-processing-schedule
    title: FedACH Processing Schedule
    publisher: Federal Reserve Financial Services
    source_type: official-payments-workflow-reference
    location: https://www.frbservices.org/resources/resource-centers/same-day-ach/fedach-processing-schedule.html
    authority_reason: Official Federal Reserve ACH operations reference describing transmission deadlines, target distribution
      times, and settlement timing used to validate ACH cutoff, posting, and reconciliation checkpoints.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: same-day-ach-faq
    title: Same Day ACH Frequently Asked Questions
    publisher: Federal Reserve Financial Services
    source_type: official-payments-workflow-reference
    location: https://www.frbservices.org/resources/financial-services/ach/faq/same-day-ach.html
    authority_reason: Official Federal Reserve FAQ clarifying returns, reversals, NOCs, effective-entry-date handling, fees,
      and deadline behavior that directly affect embedded-finance ACH exception handling.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active
  - source_id: fdic-part-370
    title: 12 CFR Part 370 Recordkeeping for Timely Deposit Insurance Determination
    publisher: Federal Deposit Insurance Corporation
    source_type: primary-regulatory-guidance
    location: https://www.fdic.gov/banker-resource-center/12-cfr-part-370-recordkeeping-timely-deposit-insurance-determination
