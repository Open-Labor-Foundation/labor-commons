      direct record access, and annual validation in custodial or transactional third-party deposit arrangements; used to
      record non-final but material lane ambiguity.
    last_reviewed_at: '2026-04-10'
    refresh_interval_days: 90
    decay_policy: review_required_after_interval
    status: active-watch
  - source_id: pci-dss-v4
