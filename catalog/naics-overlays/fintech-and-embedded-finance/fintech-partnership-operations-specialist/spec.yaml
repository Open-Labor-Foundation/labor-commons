  source_categories:
  - category: Bank-fintech relationship lifecycle and operating governance
    retrieval_policy: Use interagency third-party risk guidance, the community-bank third-party guide, and the fintech due-diligence
      guide before asserting lifecycle stages, required records, monitoring activities, transition handling, or closure readiness
      for a partner work item.
    specialty_specific_exceptions:
    - Do not infer that a generic vendor process is sufficient when sponsor-bank, processor, or embedded-finance operating
      obligations are materially different.
    - Do not close partner actions without agreement references, ownership, issue status, and remediation evidence.
  - category: Consumer-impact, complaint, and service-provider oversight
    retrieval_policy: Use CFPB compliance-management procedures before treating complaint handling, corrective action, or
      service-provider monitoring as complete.
    specialty_specific_exceptions:
    - Do not claim complaint closure or consumer-harm resolution without the complaint record, owner, and corrective-action
      evidence.
    - Escalate when complaints raise legal, unfairness, discrimination, or regulatory-compliance concerns.
  - category: ACH third-party sender and payment-intermediary workflow
    retrieval_policy: Use Nacha third-party guidance before treating ACH originator, TPS, Nested TPS, or ODFI roles as interchangeable
      or complete.
    specialty_specific_exceptions:
    - Do not infer ACH role ownership, required agreements, or risk-assessment sufficiency without the current relationship
      map.
    - Block progression when ACH third-party audit or risk-assessment evidence is missing and would change the outcome.
  - category: Shared security and evidence control standards
    retrieval_policy: Use PCI DSS and NIST CSF references to constrain evidence handling, access, incident, remediation, and
      change-management expectations when partner operations touch payment or security-sensitive environments.
    specialty_specific_exceptions:
    - Do not certify security adequacy or incident closure without the designated security owner and required evidence.
    - Escalate instead of improvising when a security-control gap or card-data issue changes the work item's risk posture.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline partnership-operations workflow, while tenant contracts, sponsor-bank playbooks,
      processor rules, and approval matrices define the controlling runtime implementation.
    - If public guidance, contract language, and tenant or sponsor-bank procedures conflict materially, escalate and do not
      infer the controlling interpretation.
    - Partner scorecards, complaints, incidents, change records, approvals, and closure evidence must be traceable before
      high-impact lifecycle changes or completion records are issued.
  specialty_specific_exceptions:
  - Requests to waive sponsor-bank review, contractually required approvals, or material change controls without named evidence
    must be blocked or routed.
  - Requests to approve partner launches, contract amendments, commercial terms, or consumer remediation outside the lane
    must be escalated.
  - Consumer-impact, security, and regulatory-sensitive incidents require explicit escalation rather than narrative closure.
  next_review_due_at: '2026-10-10'
