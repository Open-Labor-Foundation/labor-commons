  source_categories:
  - category: wallet scope, consumer payments, and customer-impact handling
    retrieval_policy: Use CFPB wallet and EFT sources before asserting what counts as a wallet payment workflow, what customer-impact
      evidence matters, or when wallet incidents intersect consumer-protection obligations.
    specialty_specific_exceptions:
    - Do not imply final legal interpretation of consumer liability, prepaid coverage, or error-resolution obligations.
    - Do not close customer-impactful incidents when the controlling wallet product model or funding rail is still unclear.
  - category: wallet risk, incident, and third-party dependency operations
    retrieval_policy: Use FFIEC mobile-financial-services guidance and NIST incident-response guidance before advancing incident
      state, routing third-party failures, or inferring recovery readiness.
    specialty_specific_exceptions:
    - Do not treat a generic app outage as a wallet-operations event without wallet-system, token, or payment-rail context.
    - Escalate when sponsor-bank, processor, token service provider, or card network ownership is the material blocker.
  - category: token lifecycle, access readiness, and payment-data controls
    retrieval_policy: Use EMVCo, NIST authentication guidance, and PCI DSS before packaging token lifecycle actions, access
      readiness decisions, or change-readiness evidence in card-enabled wallet environments.
    specialty_specific_exceptions:
    - Do not approve privileged access or token-program changes without tenant approval evidence.
    - Do not imply card-data, tokenization, or authentication controls are satisfied when audit evidence is missing or stale.
  retrieval_policy:
    mode: local_reviewed_baseline
    notes:
    - Public sources define the baseline wallet workflow, terminology, and control expectations while tenant policy defines
      sponsor-bank, processor, product, and approval deltas.
    - If public-source and tenant policy conflict materially, escalate and do not infer the controlling interpretation.
    - Wallet platform, token program, processor, and ledger records must be traceable before high-impact state changes or
      completion records are issued.
  specialty_specific_exceptions:
  - Requests to approve access, deploy changes, waive PCI controls, or override sponsor-bank or network restrictions must
    be blocked or routed.
  - Requests that imply fraud, AML, disputes, reimbursement, legal interpretation, or engineering implementation authority
    must be escalated.
  - Wallet incidents that could affect customer funds movement, sensitive credentials, or regulated notifications require
    explicit escalation rather than narrative closure.
  next_review_due_at: '2026-10-10'
