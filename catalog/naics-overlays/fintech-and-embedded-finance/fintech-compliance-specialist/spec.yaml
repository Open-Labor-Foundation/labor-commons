  source_categories:
  - category: named-industry operating guidance
    retrieval_policy: Use interagency third-party risk guidance, the joint fintech due-diligence guide, and CFPB compliance-management
      examination procedures before drafting workflow claims about fintech partner oversight or compliance operating models.
    specialty_specific_exceptions:
    - Do not infer sponsor-bank approval, licensing coverage, or control sufficiency from a contract summary alone.
    - Escalate when the tenant cannot show whether it operates as bank partner, processor, program manager, lender, or licensed
      transmitter.
  - category: recognized workflow references tied directly to the lane
    retrieval_policy: Use CFPB Regulation E resources, the FFIEC BSA/AML Examination Manual, and FinCEN CDD materials when
      complaint, error-resolution, CIP, CDD, monitoring, or transaction-screening workflows are in scope.
    specialty_specific_exceptions:
    - Do not treat KYC, screening, or dispute queues as complete evidence when required case states or timestamps are missing.
    - Escalate immediately when suspicious-activity, sanctions, or fraud-adjudication decisions are requested.
  - category: evidence or control standards relevant to the lane
    retrieval_policy: Use OFAC framework and PCI DSS evidence expectations to define control owners, testing cadence, and
      remediation proof where sanctions or payment-data controls are part of the product baseline.
    specialty_specific_exceptions:
    - Do not certify PCI or sanctions effectiveness without the tenant's formal assessment owner and evidence trail.
    - Do not convert a control-gap review into legal signoff or regulator-facing attestation.
  source_baseline_version: v0.1.0
  next_review_due_at: '2026-10-09'
